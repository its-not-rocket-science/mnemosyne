# Mnemosyne corpus manifest
#
# Each entry describes one public-domain or openly-licensed source text.
# Run `poetry run mnemosyne-corpus validate` to check this file.
# Run `poetry run mnemosyne-corpus build --all` to acquire and ingest all texts.
#
# Field notes
# -----------
# source_url  : Direct URL to a plain-text or HTML file.  The acquisition
#               module auto-detects Project Gutenberg, Aozora Bunko, and
#               MediaWiki raw sources and strips boilerplate accordingly.
# license     : Must be one of: public_domain | cc0 | cc_by | cc_by_sa |
#               cc_by_nc | cc_by_nc_sa
# cefr_equivalent : Normalised CEFR level for cross-language difficulty
#               comparison.  Required when framework != CEFR.
# manifest_id : Auto-generated stable ID if omitted.  Format:
#               {language}:{framework}:{level}:{slug}:{url_hash8}
# manual_review : true = URL or content needs human check before ingestion.
# notes       : Free-text; used for acquisition hints and provenance context.
#               Does NOT affect pipeline behaviour.
#
# URL verification
# ----------------
# Project Gutenberg IDs have been cross-checked against the PG catalog.
# Aozora Bunko card/file numbers should be verified at https://www.aozora.gr.jp
# before running a large-scale ingest.
# thelatinlibrary.com entries are marked manual_review: true because the
# acquisition module uses generic HTML extraction for that domain.

