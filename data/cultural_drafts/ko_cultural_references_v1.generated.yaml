    fr: Le 'Sermon sur la montagne' de l'Évangile selon Matthieu, un recueil des enseignements de Jésus,
      y compris les Béatitudes. C'est un texte fondateur pour l'éthique chrétienne et il est largement
      cité dans les contextes chrétiens coréens.
