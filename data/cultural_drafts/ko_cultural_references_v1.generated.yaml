  short_explanation: A hyangga attributed to the monk Chungdam, composed at the request of King Gyeongdeok
    to calm the people. It emphasizes ethical governance and the well-being of the populace.
  i18n_explanations:
    en: A hyangga attributed to the monk Chungdam, composed at the request of King Gyeongdeok to calm
      the people. It emphasizes ethical governance and the well-being of the populace.
    es: Un hyangga atribuido al monje Chungdam, compuesto a petición del rey Gyeongdeok para calmar al
      pueblo. Enfatiza el gobierno ético y el bienestar de la población.
    fr: Un hyangga attribué au moine Chungdam, composé à la demande du roi Gyeongdeok pour apaiser le
      peuple. Il met l'accent sur la gouvernance éthique et le bien-être de la population.
    de: Ein Hyangga, das dem Mönch Chungdam zugeschrieben wird und auf Bitte von König Gyeongdeok verfasst
      wurde, um das Volk zu beruhigen. Es betont ethische Regierungsführung und das Wohlergehen der Bevölkerung.
    it: Un hyangga attribuito al monaco Chungdam, composto su richiesta del re Gyeongdeok per calmare
      il popolo. Enfatizza la governance etica e il benessere della popolazione.
    pt: Um hyangga atribuído ao monge Chungdam, composto a pedido do rei Gyeongdeok para acalmar o povo.
      Enfatiza a governança ética e o bem-estar da população.
    ru: Хянга, приписываемая монаху Чунгдаму, сочинённая по просьбе короля Кёндока, чтобы успокоить народ.
      В ней подчеркивается этическое управление и благополучие населения.
    ja: 僧侶チョンダムに帰される郷歌で、王キョンドクの要請により民を静めるために作られた。倫理的な統治と民衆の福祉を強調している。
    zh: 一首被认为是由僧侣忠谈所作、应景德王请求为安抚百姓而创作的乡歌。它强调道德治理和人民福祉。
    ar: قصيدة هيانغا منسوبة للراهب تشونغدام، أُلِّفت بناءً على طلب الملك غيونغدوك لتهدئة الشعب. تؤكد على
      الحكم الأخلاقي ورفاهية السكان.
    he: שיר היאנגה המיוחס לנזיר צ'ונגדאם, הולחן לבקשת המלך גיונגדאוק כדי להרגיע את העם. הוא מדגיש ממשל
      אתי ורווחת האוכלוסייה.
