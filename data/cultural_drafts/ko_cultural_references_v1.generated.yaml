- id: ko_cultural_reference_을사조약_59290e79
  language: ko
  canonical_reference: 을사조약
  reference_type: cultural_reference
  surface_patterns:
  - 을사조약
  - 을사늑약
  - 을사조약 체결
  short_explanation: The Eulsa Treaty of 1905, imposed by Japan, stripped Korea of its diplomatic sovereignty
    and made it a Japanese protectorate. It is a painful symbol of national humiliation that led to full
    colonization in 1910.
  i18n_explanations:
    en: The Eulsa Treaty of 1905, imposed by Japan, stripped Korea of its diplomatic sovereignty and made
      it a Japanese protectorate. It is a painful symbol of national humiliation that led to full colonization
      in 1910.
    es: El Tratado de Eulsa de 1905, impuesto por Japón, despojó a Corea de su soberanía diplomática y
      la convirtió en un protectorado japonés. Es un doloroso símbolo de humillación nacional que condujo
      a la colonización total en 1910.
    fr: Le traité d'Eulsa de 1905, imposé par le Japon, a privé la Corée de sa souveraineté diplomatique
      et en a fait un protectorat japonais. C'est un symbole douloureux d'humiliation nationale qui a
      conduit à la colonisation totale en 1910.
    de: Der Eulsa-Vertrag von 1905, der von Japan aufgezwungen wurde, entzog Korea seine diplomatische
      Souveränität und machte es zu einem japanischen Protektorat. Es ist ein schmerzhaftes Symbol nationaler
      Demütigung, das zur vollständigen Kolonisierung im Jahr 1910 führte.
    it: Il trattato di Eulsa del 1905, imposto dal Giappone, privò la Corea della sua sovranità diplomatica
      e la rese un protettorato giapponese. È un doloroso simbolo di umiliazione nazionale che portò alla
      completa colonizzazione nel 1910.
    pt: O Tratado de Eulsa de 1905, imposto pelo Japão, tirou da Coreia sua soberania diplomática e a
      tornou um protetorado japonês. É um doloroso símbolo de humilhação nacional que levou à colonização
      total em 1910.
    ru: Договор 1905 года «Ыльса», навязанный Японией, лишил Корею дипломатического суверенитета и сделал
      её японским протекторатом. Это болезненный символ национального унижения, который привёл к полной
      колонизации в 1910 году.
    ja: 1905年に日本が強制した乙巳条約により、韓国は外交主権を奪われ、日本の保護国となりました。これは1910年の完全な植民地化につながった、痛ましい国家の屈辱の象徴です。
    zh: 1905年日本强加的乙巳条约剥夺了韩国的外交主权，使其成为日本的保护国。这是国家屈辱的痛苦象征，最终导致1910年完全被殖民。
    ar: معاهدة أولسا عام 1905، التي فرضتها اليابان، جردت كوريا من سيادتها الدبلوماسية وجعلتها محمية يابانية.
      وهي رمز مؤلم للإذلال الوطني الذي أدى إلى الاستعمار الكامل في عام 1910.
    he: הסכם אוּלְסָה משנת 1905, שנכפה על ידי יפן, שלל מקוריאה את ריבונותה הדיפלומטית והפך אותה למדינת
      חסות יפנית. הוא סמל כואב להשפלה לאומית שהובילה לקולוניזציה מלאה ב-1910.
