- id: ko_classical_or_scriptural_allusion_윤회_9551694e
  language: ko
  canonical_reference: 윤회
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 윤회
  - 생사의 윤회
  - 윤회전생
  short_explanation: 윤회는 불교에서 생명이 죽음과 탄생을 반복하며 육도(지옥, 아귀, 축생, 아수라, 인간, 천상)를 유전하는 과정으로, 업보에 따라 다음 생이 결정됩니다.
    한국에서 대중적인 문화 속에서도 자주 언급됩니다.
  i18n_explanations:
    en: Samsara is the cycle of birth, death, and rebirth in Buddhism, revolving through six realms (hell,
      hungry ghosts, animals, asuras, humans, and heavenly beings). The next life is determined by karma.
      It is frequently mentioned in popular Korean culture.
    es: El samsara es el ciclo de nacimiento, muerte y renacimiento en el budismo, que gira a través de
      seis reinos (infierno, fantasmas hambrientos, animales, asuras, humanos y seres celestiales). La
      próxima vida está determinada por el karma. Se menciona con frecuencia en la cultura popular coreana.
    fr: Le samsara est le cycle de naissance, mort et renaissance dans le bouddhisme, tournant à travers
      six royaumes (enfer, esprits affamés, animaux, asuras, humains et êtres célestes). La prochaine
      vie est déterminée par le karma. Il est fréquemment mentionné dans la culture populaire coréenne.
    de: Samsara ist der Kreislauf von Geburt, Tod und Wiedergeburt im Buddhismus, der sich durch sechs
      Bereiche (Hölle, hungrige Geister, Tiere, Asuras, Menschen und himmlische Wesen) dreht. Das nächste
      Leben wird durch Karma bestimmt. Es wird häufig in der koreanischen Populärkultur erwähnt.
    it: Il samsara è il ciclo di nascita, morte e rinascita nel Buddismo, che si snoda attraverso sei
      regni (inferno, spiriti affamati, animali, asura, umani e esseri celesti). La prossima vita è determinata
      dal karma. È spesso menzionato nella cultura popolare coreana.
    pt: Samsara é o ciclo de nascimento, morte e renascimento no budismo, girando através de seis reinos
      (inferno, fantasmas famintos, animais, asuras, humanos e seres celestiais). A próxima vida é determinada
      pelo carma. É frequentemente mencionado na cultura popular coreana.
    ru: Сансара — это круговорот рождения, смерти и перерождения в буддизме, проходящий через шесть миров
      (ад, голодные духи, животные, асуры, люди и небесные существа). Следующая жизнь определяется кармой.
      Часто упоминается в корейской популярной культуре.
    ja: 輪廻（サンサーラ）は仏教において生命が死と誕生を繰り返し、六道（地獄、餓鬼、畜生、阿修羅、人間、天上）を輪廻する過程であり、業に従って次の生が決まります。韓国の大衆文化の中でも頻繁に言及されます。
    zh: 轮回是佛教中生命重复死亡和诞生，流转于六道（地狱、饿鬼、畜生、阿修罗、人、天）的过程，根据业力决定下一生。在韩国大众文化中也经常被提及。
    ar: السامسارا هي دورة الولادة والموت والبعث في البوذية، والتي تدور من خلال ستة عوالم (الجحيم، الأرواح
      الجائعة، الحيوانات، الأسورا، البشر، والكائنات السماوية). يتم تحديد الحياة التالية بواسطة الكارما.
      يتم ذكرها بشكل متكرر في الثقافة الشعبية الكورية.
    he: סמסרה הוא מעגל הלידה, המוות והלידה מחדש בבודהיזם, המסתובב דרך ששת העולמות (גיהנום, רוחות רעבות,
      חיות, אסורות, בני אדם וישויות שמימיות). החיים הבאים נקבעים על ידי קארמה. הוא מוזכר לעתים קרובות
      בתרבות הפופולרית הקוריאנית.
