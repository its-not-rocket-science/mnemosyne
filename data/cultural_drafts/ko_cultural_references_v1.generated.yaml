    ja: このことわざは、非常に期待されたり話題になったりすることが、しばしば期待に応えられないことを意味します。噂や外見を信じることへの警告です。
    zh: 这句谚语的意思是，备受期待或被广泛谈论的事情往往达不到预期。它警告人们不要轻信谣言或表象。
    ar: يعني هذا المثل أن الأشياء التي ينتظرها الناس بشدة أو يتحدثون عنها كثيرًا غالبًا ما تخيب التوقعات.
