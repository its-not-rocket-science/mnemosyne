  short_explanation: A hyangga attributed to the monk Wolmyeong, yearning for rebirth in the Tushita heaven
    of Maitreya. It reflects early Korean Buddhist devotional poetry.
  i18n_explanations:
    en: A hyangga attributed to the monk Wolmyeong, yearning for rebirth in the Tushita heaven of Maitreya.
      It reflects early Korean Buddhist devotional poetry.
    es: Un hyangga atribuido al monje Wolmyeong, anhelando renacer en el cielo Tushita de Maitreya. Refleja
      la poesía devocional budista coreana temprana.
    fr: Un hyangga attribué au moine Wolmyeong, aspirant à renaître dans le ciel Tushita de Maitreya.
      Il reflète la poésie dévotionnelle bouddhiste coréenne ancienne.
    de: Ein Hyangga, das dem Mönch Wolmyeong zugeschrieben wird, und sich nach Wiedergeburt im Tushita-Himmel
      von Maitreya sehnt. Es spiegelt frühe koreanische buddhistische Hingabepoesie wider.
    it: Un hyangga attribuito al monaco Wolmyeong, desideroso di rinascere nel cielo Tushita di Maitreya.
      Riflette la poesia devozionale buddista coreana antica.
    pt: Um hyangga atribuído ao monge Wolmyeong, ansiando renascer no céu Tushita de Maitreya. Reflete
      a poesia devocional budista coreana antiga.
    ru: Хянга, приписываемая монаху Вольмёну, стремящемуся к перерождению в небе Тушита Майтрейи. Она
      отражает раннюю корейскую буддийскую преданную поэзию.
    ja: 僧侶ウォルミョンに帰される郷歌で、弥勒の兜率天（トソルチョン）への再生を切望する。初期の韓国仏教信仰詩を反映している。
    zh: 一首被认为是由僧侣月明所作、渴望在弥勒的兜率天重生的乡歌。它反映了早期的韩国佛教虔诚诗歌。
    ar: قصيدة هيانغا منسوبة للراهب وولميونغ، متوقة إلى الولادة من جديد في سماء توشيتا لمايتريا. تعكس الشعر
      التعبدي البوذي الكوري المبكر.
    he: שיר היאנגה המיוחס לנזיר וולמיאונג, המתגעגע להיוולד מחדש בשמי טושיטה של מאיטרייה. הוא משקף שירת
      התמסרות בודהיסטית קוריאנית מוקדמת.
