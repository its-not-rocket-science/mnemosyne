    en: A Buddhist term denoting the 108 defilements or afflictions that hinder enlightenment, often symbolized
      by the 108 beads of a mala or the 108 tolls of a temple bell.
    es: Un término budista que designa las 108 impurezas o aflicciones que obstaculizan la iluminación,
      a menudo simbolizadas por las 108 cuentas de un mala o los 108 tañidos de una campana de templo.
    fr: Un terme bouddhiste désignant les 108 souillures ou afflictions qui entravent l'éveil, souvent
      symbolisées par les 108 grains d'un mala ou les 108 coups d'une cloche de temple.
    de: Ein buddhistischer Begriff für die 108 Befleckungen oder Verunreinigungen, die die Erleuchtung
      behindern, oft symbolisiert durch die 108 Perlen einer Mala oder die 108 Schläge einer Tempelglocke.
    it: Un termine buddista che indica le 108 impurità o afflizioni che ostacolano l'illuminazione, spesso
      simboleggiate dai 108 grani di un mala o dai 108 rintocchi di una campana del tempio.
    pt: Um termo budista que designa as 108 impurezas ou aflições que impedem a iluminação, frequentemente
      simbolizadas pelas 108 contas de um mala ou pelos 108 toques de um sino de templo.
    ru: Буддийский термин, обозначающий 108 омрачений или страданий, препятствующих просветлению, часто
      символизируемых 108 бусинами чёток мала или 108 ударами храмового колокола.
    ja: 仏教用語で、悟りを妨げる108の煩悩を指す。数珠の108個の珠や、寺院の鐘を108回撞くことに象徴される。
