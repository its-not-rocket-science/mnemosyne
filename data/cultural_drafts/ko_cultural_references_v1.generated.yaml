    'Wings' (날개).
  i18n_explanations:
    en: A line from Yi Sang's poem 'Mirror' (거울) describing a genius reduced to a stuffed specimen, symbolizing
      artistic suffocation under societal constraints. Often cited in his short story 'Wings' (날개).
    es: Un verso del poema 'Espejo' (거울) de Yi Sang que describe a un genio reducido a un espécimen disecado,
      simbolizando la asfixia artística bajo las limitaciones sociales. A menudo citado en su cuento 'Alas'
      (날개).
    fr: Un vers du poème 'Miroir' (거울) de Yi Sang décrivant un génie réduit à un spécimen empaillé, symbolisant
      l'asphyxie artistique sous les contraintes sociétales. Souvent cité dans sa nouvelle 'Ailes' (날개).
    de: Ein Vers aus Yi Sangs Gedicht 'Spiegel' (거울), das ein Genie beschreibt, das zu einem ausgestopften
      Exemplar reduziert wird, als Symbol für künstlerische Erstickung unter gesellschaftlichen Zwängen.
      Oft in seiner Kurzgeschichte 'Flügel' (날개) zitiert.
    it: Un verso dalla poesia 'Specchio' (거울) di Yi Sang che descrive un genio ridotto a un esemplare
      imbalsamato, simbolizzando la soffocazione artistica sotto i vincoli sociali. Spesso citato nel
      suo racconto 'Ali' (날개).
    pt: Um verso do poema 'Espelho' (거울) de Yi Sang descrevendo um gênio reduzido a um espécime empalhado,
      simbolizando a sufocação artística sob as restrições sociais. Frequentemente citado em seu conto
      'Asas' (날개).
    ru: Строка из стихотворения Ли Сана 'Зеркало' (거울), описывающая гения, превращённого в чучело, символизирующее
      художественное удушение под гнётом общества. Часто цитируется в его рассказе 'Крылья' (날개).
    ja: 이상의 시 '거울'의 구절로, 천재가 박제된 표본으로 전락한 모습을 통해 사회적 억압 속 예술의 질식을 상징한다. 단편 '날개'에서 자주 인용된다.
    zh: 李箱的诗《镜子》中的一行，描述了一个天才沦为填充标本，象征社会约束下的艺术窒息。经常在其短篇小说《翅膀》中被引用。
    ar: سطر من قصيدة 'مرآة' (거울) لإي سانغ يصف عبقريًا تحول إلى عينة محنطة، يرمز إلى الاختناق الفني تحت
