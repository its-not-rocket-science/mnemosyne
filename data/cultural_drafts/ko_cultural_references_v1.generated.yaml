    Pyeonggang.'
  i18n_explanations:
    en: '''Fool Ondal''; a historical figure from Goguryeo known as a simpleton who later becomes a great
      general, often used in reference to unexpected success or the tale of Ondal and Princess Pyeonggang.'
    es: '''Ondal el Tonto''; un personaje histórico de Goguryeo conocido como un simplón que luego se
      convierte en un gran general, a menudo usado en referencia a un éxito inesperado o al cuento de
      Ondal y la princesa Pyeonggang.'
    fr: '''Ondal le Fou''; un personnage historique de Goguryeo connu comme un simple d''esprit qui devient
      plus tard un grand général, souvent utilisé en référence à un succès inattendu ou au conte d''Ondal
      et de la princesse Pyeonggang.'
    de: '''Ondal der Narr''; eine historische Figur aus Goguryeo, bekannt als Einfaltspinsel, der später
      ein großer General wird, oft in Bezug auf unerwarteten Erfolg oder die Geschichte von Ondal und
      Prinzessin Pyeonggang.'
    it: '''Ondal lo Sciocco''; una figura storica del Goguryeo conosciuta come un sempliciotto che in
      seguito diventa un grande generale, spesso usata in riferimento al successo inaspettato o alla storia
      di Ondal e della principessa Pyeonggang.'
    pt: '''Ondal, o Tolo''; uma figura histórica de Goguryeo conhecida como um simplório que mais tarde
      se torna um grande general, frequentemente usado em referência a sucesso inesperado ou ao conto
      de Ondal e da Princesa Pyeonggang.'
    ru: '''Ондал-дурак''; историческая фигура из Когурё, известная как простак, который впоследствии становится
