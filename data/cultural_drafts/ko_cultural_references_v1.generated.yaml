  short_explanation: Refers to the establishment of the Joseon dynasty in 1392 by Yi Seong-gye (King Taejo).
    It succeeded the Goryeo dynasty and lasted until 1910, profoundly shaping Korean culture and institutions.
  i18n_explanations:
    en: Refers to the establishment of the Joseon dynasty in 1392 by Yi Seong-gye (King Taejo). It succeeded
      the Goryeo dynasty and lasted until 1910, profoundly shaping Korean culture and institutions.
    es: Se refiere a la fundación de la dinastía Joseon en 1392 por Yi Seong-gye (rey Taejo). Sucedió
      a la dinastía Goryeo y duró hasta 1910, moldeando profundamente la cultura e instituciones coreanas.
    fr: Fait référence à la fondation de la dynastie Joseon en 1392 par Yi Seong-gye (roi Taejo). Elle
      a succédé à la dynastie Goryeo et a duré jusqu'en 1910, façonnant profondément la culture et les
      institutions coréennes.
    de: Bezieht sich auf die Gründung der Joseon-Dynastie im Jahr 1392 durch Yi Seong-gye (König Taejo).
      Sie folgte auf die Goryeo-Dynastie und bestand bis 1910, wodurch sie die koreanische Kultur und
      Institutionen tiefgreifend prägte.
    it: Si riferisce alla fondazione della dinastia Joseon nel 1392 da parte di Yi Seong-gye (re Taejo).
      Succedette alla dinastia Goryeo e durò fino al 1910, plasmando profondamente la cultura e le istituzioni
      coreane.
    pt: Refere-se ao estabelecimento da dinastia Joseon em 1392 por Yi Seong-gye (rei Taejo). Sucedeu
      a dinastia Goryeo e durou até 1910, moldando profundamente a cultura e as instituições coreanas.
    ru: Относится к основанию династии Чосон в 1392 году Ли Сон Ге (король Тхэджо). Она сменила династию
      Корё и просуществовала до 1910 года, оказав глубокое влияние на корейскую культуру и институты.
    ja: 1392年に李成桂（太祖）によって朝鮮王朝が建国されたことを指します。高麗王朝を継承し、1910年まで続き、韓国の文化と制度に深く影響を与えました。
    zh: 指的是1392年李成桂（太祖）建立朝鲜王朝。它继承了高丽王朝，持续到1910年，深刻塑造了韩国的文化和制度。
    ar: يشير إلى تأسيس مملكة جوسون في عام 1392 على يد إي سونغ غي (الملك تايجو). خلفت مملكة غوريو واستمرت
      حتى عام 1910، وشكلت الثقافة والمؤسسات الكورية بعمق.
