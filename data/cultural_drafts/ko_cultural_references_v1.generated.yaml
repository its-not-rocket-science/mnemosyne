- id: ko_classical_or_scriptural_allusion_해탈_42d8c48b
  language: ko
  canonical_reference: 해탈
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 해탈
  - 열반
  - 해탈(解脫)
  short_explanation: 해탈은 불교에서 모든 번뇌와 속박에서 벗어난 깨달음의 상태를 의미하며, 윤회에서 벗어나 열반에 이르는 것을 말합니다. 불교 수행의 궁극적인 목표입니다.
  i18n_explanations:
    en: Liberation (moksha) in Buddhism refers to the state of enlightenment freed from all afflictions
      and bondage, escaping samsara and attaining nirvana. It is the ultimate goal of Buddhist practice.
    es: La liberación (moksha) en el budismo se refiere al estado de iluminación libre de todas las aflicciones
      y ataduras, escapando del samsara y alcanzando el nirvana. Es el objetivo último de la práctica
      budista.
    fr: La libération (moksha) dans le bouddhisme fait référence à l'état d'éveil libéré de toutes les
      afflictions et entraves, échappant au samsara et atteignant le nirvana. C'est le but ultime de la
      pratique bouddhiste.
    de: Befreiung (Moksha) im Buddhismus bezieht sich auf den Zustand der Erleuchtung, frei von allen
      Befleckungen und Bindungen, dem Entkommen aus Samsara und dem Erreichen des Nirwana. Es ist das
      ultimative Ziel der buddhistischen Praxis.
    it: La liberazione (moksha) nel Buddismo si riferisce allo stato di illuminazione libero da tutte
      le afflizioni e schiavitù, fuggendo dal samsara e raggiungendo il nirvana. È l'obiettivo ultimo
      della pratica buddista.
    pt: A libertação (moksha) no budismo refere-se ao estado de iluminação livre de todas as aflições
      e apegos, escapando do samsara e alcançando o nirvana. É o objetivo final da prática budista.
    ru: Освобождение (мокша) в буддизме относится к состоянию просветления, свободному от всех омрачений
      и привязанностей, выходу из сансары и достижению нирваны. Это конечная цель буддийской практики.
    ja: 解脱（モークシャ）は仏教においてすべての煩悩と束縛から解放された悟りの状態を意味し、輪廻から逃れて涅槃に達することを指します。仏教修行の究極の目標です。
    zh: 解脱（莫克沙）在佛教中是指摆脱所有烦恼和束缚的觉悟状态，脱离轮回达到涅槃。是佛教修行的最终目标。
