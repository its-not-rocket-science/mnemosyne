      del pueblo coreano. Aparece en los mitos chamánicos coreanos.
    fr: 마고할미 est une déesse de la mythologie coréenne, souvent associée au tissage, à la création et à
      l'origine du peuple coréen. Elle apparaît dans les mythes chamaniques coréens.
    de: 마고할미 ist eine Göttin in der koreanischen Mythologie, die oft mit Weben, Schöpfung und dem Ursprung
      des koreanischen Volkes in Verbindung gebracht wird. Sie erscheint in koreanischen schamanischen
      Mythen.
    it: 마고할미 è una dea nella mitologia coreana, spesso associata alla tessitura, alla creazione e all'origine
      del popolo coreano. Appare nei miti sciamanici coreani.
    pt: 마고할미 é uma deusa na mitologia coreana, frequentemente associada à tecelagem, criação e origem
      do povo coreano. Ela aparece nos mitos xamânicos coreanos.
    ru: 마고할미 — это богиня в корейской мифологии, часто ассоциируемая с ткачеством, творением и происхождением
      корейского народа. Она появляется в корейских шаманских мифах.
    ja: 마고할미는韓国神話の女神で、織物、創造、韓民族の起源と関連付けられることが多いです。韓国のシャーマニズム神話に登場します。
    zh: 마고할미是韩国神话中的一位女神，常与编织、创造以及韩民族的起源相关联。她出现在韩国的萨满神话中。
    ar: 마고할미 هي إلهة في الأساطير الكورية، غالبًا ما ترتبط بالنسيج والخلق وأصل الشعب الكوري. تظهر في الأساطير
      الشامانية الكورية.
    he: 마고할מי היא אלה במיתולוגיה הקוריאנית, המקושרת לעתים קרובות לאריגה, בריאה ומקור העם הקוריאני. היא
