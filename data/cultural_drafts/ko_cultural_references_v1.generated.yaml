    of karma where every action has a corresponding consequence. It is widely used in moral and ethical
    contexts in Korean culture.
  i18n_explanations:
    en: A Buddhist concept meaning 'cause and effect, retribution,' referring to the law of karma where
      every action has a corresponding consequence. It is widely used in moral and ethical contexts in
      Korean culture.
    es: Un concepto budista que significa 'causa y efecto, retribución', refiriéndose a la ley del karma
      donde cada acción tiene una consecuencia correspondiente. Es ampliamente utilizado en contextos
      morales y éticos en la cultura coreana.
    fr: Un concept bouddhiste signifiant 'cause et effet, rétribution', se référant à la loi du karma
      où chaque action a une conséquence correspondante. Il est largement utilisé dans des contextes moraux
      et éthiques dans la culture coréenne.
    de: Ein buddhistisches Konzept mit der Bedeutung 'Ursache und Wirkung, Vergeltung', das sich auf das
      Gesetz des Karma bezieht, bei dem jede Handlung eine entsprechende Konsequenz hat. Es wird in der
      koreanischen Kultur in moralischen und ethischen Zusammenhängen häufig verwendet.
    it: Un concetto buddista che significa 'causa ed effetto, retribuzione', riferito alla legge del karma
      in cui ogni azione ha una conseguenza corrispondente. È ampiamente usato in contesti morali ed etici
      nella cultura coreana.
    pt: Um conceito budista que significa 'causa e efeito, retribuição', referindo-se à lei do karma onde
      cada ação tem uma consequência correspondente. É amplamente usado em contextos morais e éticos na
      cultura coreana.
    ru: Буддийская концепция, означающая 'причина и следствие, воздаяние', относящаяся к закону кармы,
      где каждое действие имеет соответствующее последствие. Широко используется в моральном и этическом
      контексте в корейской культуре.
    ja: 「因果応報」は、すべての行動に相応の結果が生じるという因果の法則（カルマ）を指す仏教概念。韓国文化では道徳的・倫理的な文脈で広く使われています。
    zh: 佛教概念，意为“因果报应”，指因果规律，每个行为都有相应的后果。在韩国文化中广泛用于道德和伦理语境。
    ar: مفهوم بوذي يعني 'السبب والنتيجة، القصاص'، في إشارة إلى قانون الكارما حيث كل فعل له عاقبة مناظرة.
      يستخدم على نطاق واسع في السياقات الأخلاقية في الثقافة الكورية.
    he: מושג בודהיסטי שמשמעותו 'סיבה ותוצאה, גמול', המתייחס לחוק הקארמה שבו לכל פעולה יש תוצאה מתאימה.
