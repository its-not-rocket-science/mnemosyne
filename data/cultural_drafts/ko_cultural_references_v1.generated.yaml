  short_explanation: Korean independence activist (1902–1920) who led the March 1st Movement protests.
    She died in prison at age 17 and is remembered as a symbol of youthful courage and patriotic sacrifice.
  i18n_explanations:
    en: Korean independence activist (1902–1920) who led the March 1st Movement protests. She died in
      prison at age 17 and is remembered as a symbol of youthful courage and patriotic sacrifice.
    es: Activista independentista coreana (1902-1920) que lideró las protestas del Movimiento del 1 de
      marzo. Murió en prisión a los 17 años y es recordada como símbolo de valentía juvenil y sacrificio
      patriótico.
    fr: Activiste indépendantiste coréenne (1902-1920) qui a mené les manifestations du Mouvement du 1er
      mars. Elle est morte en prison à 17 ans et est rappelée comme un symbole de courage juvénile et
      de sacrifice patriotique.
    de: Koreanische Unabhängigkeitsaktivistin (1902-1920), die die Proteste der März-Bewegung anführte.
      Sie starb mit 17 Jahren im Gefängnis und wird als Symbol jugendlichen Mutes und patriotischen Opfers
      erinnert.
    it: Attivista indipendentista coreana (1902-1920) che guidò le proteste del Movimento del 1° marzo.
      Morì in prigione a 17 anni ed è ricordata come simbolo di coraggio giovanile e sacrificio patriottico.
    pt: Ativista da independência coreana (1902-1920) que liderou os protestos do Movimento de 1º de Março.
      Morreu na prisão aos 17 anos e é lembrada como símbolo de coragem juvenil e sacrifício patriótico.
    ru: Корейская активистка за независимость (1902-1920), руководившая протестами Первомартовского движения.
      Она умерла в тюрьме в 17 лет и запомнилась как символ юношеской храбрости и патриотической жертвы.
    ja: 韓国の独立運動家（1902～1920年）で、三・一運動の抗議活動を主導した。17歳で獄死し、若者の勇気と愛国心の犠牲の象徴として記憶されている。
    zh: 韩国独立活动家（1902-1920），领导了三一运动抗议活动。她在狱中去世，年仅17岁，被铭记为青年勇气和爱国牺牲的象征。
    ar: ناشطة استقلال كورية (1902-1920) قادت احتجاجات حركة 1 مارس. توفيت في السجن عن عمر 17 عامًا وتُذكر
      كرمز للشجاعة الشبابية والتضحية الوطنية.
    he: פעילת עצמאות קוריאנית (1902-1920) שהובילה את מחאות תנועת ה-1 במרץ. היא מתה בכלא בגיל 17 ומונצחת
      כסמל לאומץ נעורים ולהקרבה פטריוטית.
