- id: ko_classical_or_scriptural_allusion_호접지몽_f1ae0103
  language: ko
  canonical_reference: 호접지몽
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 호접지몽의 교훈
  - 호접지몽을 이야기하다
  - 호접지몽처럼
  short_explanation: The 'butterfly dream' from the Zhuangzi, a parable about a man who dreams he is a
    butterfly and upon waking is unsure if he is a man who dreamed of being a butterfly or a butterfly
    dreaming of being a man. It questions the nature of reality and is a classic allusion in Korean literature.
  i18n_explanations:
    en: The 'butterfly dream' from the Zhuangzi, a parable about a man who dreams he is a butterfly and
      upon waking is unsure if he is a man who dreamed of being a butterfly or a butterfly dreaming of
      being a man. It questions the nature of reality and is a classic allusion in Korean literature.
    es: El 'sueño de la mariposa' de Zhuangzi, una parábola sobre un hombre que sueña que es una mariposa
      y al despertar no está seguro de si es un hombre que soñó ser una mariposa o una mariposa que sueña
      ser un hombre. Cuestiona la naturaleza de la realidad y es una alusión clásica en la literatura
      coreana.
    fr: Le 'rêve du papillon' de Zhuangzi, une parabole sur un homme qui rêve qu'il est un papillon et
      au réveil n'est pas sûr d'être un homme qui a rêvé d'être un papillon ou un papillon qui rêve d'être
      un homme. Il questionne la nature de la réalité et est une allusion classique dans la littérature
      coréenne.
    de: Der 'Schmetterlingstraum' aus Zhuangzi, eine Parabel über einen Mann, der träumt, ein Schmetterling
      zu sein, und beim Aufwachen nicht sicher ist, ob er ein Mann ist, der träumte, ein Schmetterling
      zu sein, oder ein Schmetterling, der träumt, ein Mann zu sein. Es hinterfragt die Natur der Realität
      und ist eine klassische Anspielung in der koreanischen Literatur.
    it: Il 'sogno della farfalla' di Zhuangzi, una parabola su un uomo che sogna di essere una farfalla
      e al risveglio non è sicuro se sia un uomo che ha sognato di essere una farfalla o una farfalla
      che sogna di essere un uomo. Mette in discussione la natura della realtà ed è un'allusione classica
      nella letteratura coreana.
    pt: O 'sonho da borboleta' de Zhuangzi, uma parábola sobre um homem que sonha que é uma borboleta
      e ao acordar não tem certeza se é um homem que sonhou ser uma borboleta ou uma borboleta que sonha
      ser um homem. Questiona a natureza da realidade e é uma alusão clássica na literatura coreana.
    ru: «Сон бабочки» из Чжуан-цзы, притча о человеке, которому снится, что он бабочка, и после пробуждения
      он не уверен, является ли он человеком, которому снилось, что он бабочка, или бабочкой, которой
      снится, что она человек. Это ставит под сомнение природу реальности и является классической аллюзией
      в корейской литературе.
    ja: 荘子の「胡蝶の夢」、男が蝶になる夢を見て、目覚めた後、自分は蝶になる夢を見た男なのか、男になる夢を見ている蝶なのか分からなくなる寓話。現実の本質に疑問を投げかけ、韓国文学における古典的な引用である。
    zh: 《庄子》中的'蝴蝶梦'，一个关于一个人梦见自己是一只蝴蝶，醒来后不确定自己是梦见变成蝴蝶的人，还是梦见变成人的蝴蝶的寓言。它质疑现实的本质，是韩国文学中的经典典故。
    ar: حلم الفراشة من تشوانغ تسي، حكاية عن رجل يحلم بأنه فراشة وعند الاستيقاظ لا يعرف هل هو رجل حلم بأنه
      فراشة أم فراشة تحلم بأنها رجل. إنه يتساءل عن طبيعة الواقع وهو إشارة كلاسيكية في الأدب الكوري.
    he: חלום הפרפר של ג'ואנג דזה, משל על אדם שחולם שהוא פרפר, ועם היקיצה אינו בטוח אם הוא אדם שחלם להיות
      פרפר או פרפר שחולם להיות אדם. הוא מטיל ספק בטבע המציאות ומהווה רמז קלאסי בספרות הקוריאנית.
