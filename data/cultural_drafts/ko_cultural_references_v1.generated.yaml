  short_explanation: Yeonorang and Seonyeo are a couple from a Silla legend in the Samguk Yusa who become
    the sun and moon, explaining solar and lunar eclipses. The story highlights enduring love and natural
    phenomena.
  i18n_explanations:
    en: Yeonorang and Seonyeo are a couple from a Silla legend in the Samguk Yusa who become the sun and
      moon, explaining solar and lunar eclipses. The story highlights enduring love and natural phenomena.
    es: Yeonorang y Seonyeo son una pareja de una leyenda de Silla en el Samguk Yusa que se convierten
      en el sol y la luna, explicando los eclipses solares y lunares. La historia destaca el amor perdurable
      y los fenómenos naturales.
    fr: Yeonorang et Seonyeo sont un couple d'une légende de Silla dans le Samguk Yusa qui deviennent
      le soleil et la lune, expliquant les éclipses solaires et lunaires. L'histoire met en évidence l'amour
      durable et les phénomènes naturels.
    de: Yeonorang und Seonyeo sind ein Paar aus einer Silla-Legende im Samguk Yusa, die zur Sonne und
      zum Mond werden und so Sonnen- und Mondfinsternisse erklären. Die Geschichte betont dauerhafte Liebe
      und Naturphänomene.
    it: Yeonorang e Seonyeo sono una coppia di una leggenda di Silla nel Samguk Yusa che diventano il
      sole e la luna, spiegando le eclissi solari e lunari. La storia evidenzia l'amore duraturo e i fenomeni
      naturali.
    pt: Yeonorang e Seonyeo são um casal de uma lenda de Silla no Samguk Yusa que se tornam o sol e a
      lua, explicando eclipses solares e lunares. A história destaca o amor duradouro e fenômenos naturais.
    ru: Ёноран и Сонё — пара из легенды Силла в «Самгук Юса», которые становятся солнцем и луной, объясняя
      солнечные и лунные затмения. История подчеркивает вечную любовь и природные явления.
    ja: 延烏郎と細烏女は、『三国遺事』に登場する新羅の伝説の夫婦で、太陽と月になり、日食や月食を説明する。この物語は永遠の愛と自然現象を強調している。
    zh: 延乌郎和细乌女是《三国遗事》中新罗传说的一对夫妇，他们变成了太阳和月亮，解释了日食和月食。这个故事强调了持久的爱和自然现象。
    ar: يونورانغ وسيونيو زوجان من أسطورة شلا في سامغوك يوسا يصبحان الشمس والقمر، موضحين كسوف الشمس وخسوف
      القمر. تبرز القصة الحب الدائم والظواهر الطبيعية.
    he: יונורנג וסוניו הם זוג מאגדת סילה בסמגוק יוסה שהופכים לשמש ולירח, ומסבירים ליקויי חמה ולבנה. הסיפור
      מדגיש אהבה נצחית ותופעות טבע.
