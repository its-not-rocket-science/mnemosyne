  - 삼신산의 신선
  - 삼신산 봉래
  short_explanation: 삼신산 refers to three mythical mountains (Bongnae, Bangjang, and Yeongju) believed
    to be home to immortals in Chinese and Korean shamanism. They symbolize longevity and paradise.
  i18n_explanations:
    en: 삼신산 refers to three mythical mountains (Bongnae, Bangjang, and Yeongju) believed to be home to
      immortals in Chinese and Korean shamanism. They symbolize longevity and paradise.
    es: 삼신산 se refiere a tres montañas míticas (Bongnae, Bangjang y Yeongju) que se cree que son el hogar
      de los inmortales en el chamanismo chino y coreano. Simbolizan la longevidad y el paraíso.
    fr: 삼신산 fait référence à trois montagnes mythiques (Bongnae, Bangjang et Yeongju) censées être le
      domicile des immortels dans le chamanisme chinois et coréen. Elles symbolisent la longévité et le
      paradis.
    de: 삼신산 bezieht sich auf drei mythische Berge (Bongnae, Bangjang und Yeongju), die im chinesischen
      und koreanischen Schamanismus als Heimat der Unsterblichen gelten. Sie symbolisieren Langlebigkeit
      und Paradies.
    it: 삼신산 si riferisce a tre montagne mitiche (Bongnae, Bangjang e Yeongju) ritenute dimora degli immortali
      nello sciamanesimo cinese e coreano. Simboleggiano longevità e paradiso.
    pt: 삼신산 refere-se a três montanhas míticas (Bongnae, Bangjang e Yeongju) acreditadas como lar dos
      imortais no xamanismo chinês e coreano. Simbolizam longevidade e paraíso.
    ru: 삼신산 относится к трем мифическим горам (Поннэ, Панджан и Ёнджу), которые считаются обителью бессмертных
      в китайском и корейском шаманизме. Они символизируют долголетие и рай.
    ja: 삼신산は、中国と韓国のシャーマニズムにおいて、不老不死の仙人が住むとされる三つの神話上の山（蓬萊、方丈、瀛洲）を指します。長寿と楽園を象徴しています。
    zh: 삼신산指的是三座神话中的山（蓬莱、方丈、瀛洲），在中国和韩国萨满教中被认为是神仙的居所。它们象征着长寿和天堂。
    ar: يشير 삼신산 إلى ثلاثة جبال أسطورية (بونغني، بانغجانغ، ويونغجو) يُعتقد أنها موطن الخالدين في الشامانية
      الصينية والكورية. إنها ترمز إلى طول العمر والجنة.
    he: 삼신산 מתייחס לשלושה הרים מיתיים (בונגנה, באנגג'אנג ויונגג'ו) שנחשבים לביתם של בני האלמוות בשמאניזם
