  short_explanation: 미륵 is the Korean name for Maitreya, the future Buddha who will appear to save humanity.
    It is a key figure in Korean Buddhism and appears in folk beliefs as a savior deity.
  i18n_explanations:
    en: 미륵 is the Korean name for Maitreya, the future Buddha who will appear to save humanity. It is
      a key figure in Korean Buddhism and appears in folk beliefs as a savior deity.
    es: 미륵 es el nombre coreano de Maitreya, el futuro Buda que aparecerá para salvar a la humanidad.
      Es una figura clave en el budismo coreano y aparece en las creencias populares como una deidad salvadora.
    fr: 미륵 est le nom coréen de Maitreya, le futur Bouddha qui apparaîtra pour sauver l'humanité. C'est
      une figure clé du bouddhisme coréen et apparaît dans les croyances populaires comme une divinité
      salvatrice.
    de: 미륵 ist der koreanische Name für Maitreya, den zukünftigen Buddha, der erscheinen wird, um die
      Menschheit zu retten. Es ist eine Schlüsselfigur im koreanischen Buddhismus und erscheint in Volksglauben
      als Erlöser-Gottheit.
    it: 미륵 è il nome coreano di Maitreya, il futuro Buddha che apparirà per salvare l'umanità. È una figura
      chiave nel buddismo coreano e appare nelle credenze popolari come divinità salvatrice.
    pt: 미륵 é o nome coreano para Maitreya, o futuro Buda que aparecerá para salvar a humanidade. É uma
      figura chave no budismo coreano e aparece nas crenças populares como uma divindade salvadora.
    ru: 미륵 — это корейское имя Майтрейи, будущего Будды, который появится, чтобы спасти человечество.
      Это ключевая фигура в корейском буддизме, и в народных верованиях она выступает как божество-спаситель.
    ja: 미륵は弥勒（マイトレーヤ）の韓国名で、人類を救うために現れる未来仏です。韓国仏教の重要な人物であり、民間信仰では救世主として現れます。
    zh: 미륵是弥勒（Maitreya）的韩文名称，弥勒是未来将出现拯救人类的佛陀。它是韩国佛教的关键人物，在民间信仰中作为救世主出现。
    ar: 미륵 هو الاسم الكوري لمايتريا، بوذا المستقبل الذي سيظهر لإنقاذ البشرية. إنه شخصية رئيسية في البوذية
      الكورية ويظهر في المعتقدات الشعبية كإله منقذ.
    he: 미륵 הוא השם הקוריאני למייטריה, הבודהה העתידי שיופיע כדי להציל את האנושות. זוהי דמות מרכזית בבודהיזם
