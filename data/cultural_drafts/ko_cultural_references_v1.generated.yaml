- id: ko_classical_or_scriptural_allusion_사성제_d78b5a39
  language: ko
  canonical_reference: 사성제
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 사성제
  - 네 가지 진리
  - 사성제(四聖諦)
  short_explanation: 사성제는 불교에서 고통의 원인과 해결을 설명하는 네 가지 성스러운 진리로, 고통의 존재(고성제), 고통의 원인(집성제), 고통의 소멸(멸성제),
    소멸에 이르는 길(도성제)을 포함합니다. 이는 불교 교리의 핵심입니다.
  i18n_explanations:
    en: 'The Four Noble Truths are the four sacred truths in Buddhism that explain the cause and solution
      of suffering: the truth of suffering (dukkha), the truth of the origin of suffering (samudaya),
      the truth of the cessation of suffering (nirodha), and the truth of the path leading to the cessation
      of suffering (magga). This is the core of Buddhist doctrine.'
    es: 'Las Cuatro Nobles Verdades son las cuatro verdades sagradas del budismo que explican la causa
      y la solución del sufrimiento: la verdad del sufrimiento (dukkha), la verdad del origen del sufrimiento
      (samudaya), la verdad de la cesación del sufrimiento (nirodha) y la verdad del camino que lleva
      a la cesación del sufrimiento (magga). Este es el núcleo de la doctrina budista.'
    fr: 'Les Quatre Nobles Vérités sont les quatre vérités sacrées du bouddhisme qui expliquent la cause
      et la solution de la souffrance : la vérité de la souffrance (dukkha), la vérité de l''origine de
      la souffrance (samudaya), la vérité de la cessation de la souffrance (nirodha) et la vérité du chemin
      menant à la cessation de la souffrance (magga). C''est le cœur de la doctrine bouddhiste.'
    de: 'Die Vier Edlen Wahrheiten sind die vier heiligen Wahrheiten im Buddhismus, die Ursache und Lösung
      des Leidens erklären: die Wahrheit des Leidens (dukkha), die Wahrheit der Entstehung des Leidens
      (samudaya), die Wahrheit der Aufhebung des Leidens (nirodha) und die Wahrheit des Weges zur Aufhebung
      des Leidens (magga). Dies ist der Kern der buddhistischen Lehre.'
    it: 'Le Quattro Nobili Verità sono le quattro verità sacre del Buddismo che spiegano la causa e la
      soluzione della sofferenza: la verità della sofferenza (dukkha), la verità dell''origine della sofferenza
      (samudaya), la verità della cessazione della sofferenza (nirodha) e la verità del sentiero che porta
      alla cessazione della sofferenza (magga). Questo è il nucleo della dottrina buddista.'
    pt: 'As Quatro Nobres Verdades são as quatro verdades sagradas do budismo que explicam a causa e a
      solução do sofrimento: a verdade do sofrimento (dukkha), a verdade da origem do sofrimento (samudaya),
      a verdade da cessação do sofrimento (nirodha) e a verdade do caminho que leva à cessação do sofrimento
      (magga). Este é o núcleo da doutrina budista.'
    ru: 'Четыре благородные истины — это четыре священные истины буддизма, объясняющие причину и решение
      страданий: истина страдания (дуккха), истина происхождения страдания (самудая), истина прекращения
      страдания (ниродха) и истина пути, ведущего к прекращению страдания (магга). Это основа буддийского
      учения.'
    ja: 四諦（したい）は仏教において苦しみの原因と解決を説明する四つの聖なる真理であり、苦諦（苦しみの真理）、集諦（苦しみの原因の真理）、滅諦（苦しみの消滅の真理）、道諦（消滅に至る道の真理）を含みます。これは仏教教義の核心です。
    zh: 四圣谛是佛教中解释痛苦的原因和解决的四种神圣真理，包括苦谛（痛苦的存在）、集谛（痛苦的原因）、灭谛（痛苦的消灭）和道谛（通向消灭的道路）。这是佛教教义的核心。
    ar: 'الحقائق النبيلة الأربع هي أربع حقائق مقدسة في البوذية تشرح سبب المعاناة وحلها: حقيقة المعاناة
      (دوكا)، حقيقة أصل المعاناة (سامودايا)، حقيقة انتهاء المعاناة (نيرودها)، وحقيقة الطريق المؤدي إلى
      انتهاء المعاناة (ماجا). هذا هو جوهر العقيدة البوذية.'
    he: 'ארבע האמיתות הנאצלות הן ארבע אמיתות קדושות בבודהיזם המסבירות את הסיבה לסבל ואת הפתרון: אמיתת
      הסבל (דוקהה), אמיתת מקור הסבל (סמודיה), אמיתת הפסקת הסבל (נירודה), ואמיתת הדרך המובילה להפסקת הסבל
      (מגה). זהו הליבה של הדוקטרינה הבודהיסטית.'
