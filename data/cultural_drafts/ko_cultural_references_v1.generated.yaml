  short_explanation: A phrase from the Bible (1 Corinthians 13:4) meaning 'Love is patient,' describing
    the enduring nature of love. It is frequently quoted in Korean weddings and Christian teachings.
  i18n_explanations:
    en: A phrase from the Bible (1 Corinthians 13:4) meaning 'Love is patient,' describing the enduring
      nature of love. It is frequently quoted in Korean weddings and Christian teachings.
    es: Una frase de la Biblia (1 Corintios 13:4) que significa 'El amor es paciente', describiendo la
      naturaleza duradera del amor. Se cita con frecuencia en bodas coreanas y enseñanzas cristianas.
    fr: Une phrase de la Bible (1 Corinthiens 13:4) signifiant 'L'amour est patient', décrivant la nature
      durable de l'amour. Elle est fréquemment citée dans les mariages coréens et les enseignements chrétiens.
    de: Ein Satz aus der Bibel (1. Korinther 13,4) mit der Bedeutung 'Die Liebe ist geduldig', der die
      beständige Natur der Liebe beschreibt. Er wird häufig bei koreanischen Hochzeiten und in christlichen
      Lehren zitiert.
    it: Una frase della Bibbia (1 Corinzi 13:4) che significa 'L'amore è paziente', descrivendo la natura
      duratura dell'amore. È spesso citata nei matrimoni coreani e negli insegnamenti cristiani.
    pt: Uma frase da Bíblia (1 Coríntios 13:4) que significa 'O amor é paciente', descrevendo a natureza
      duradoura do amor. É frequentemente citada em casamentos coreanos e ensinamentos cristãos.
    ru: Фраза из Библии (1-е Коринфянам 13:4), означающая «Любовь долготерпит», описывающая долготерпение
      любви. Часто цитируется на корейских свадьбах и в христианских учениях.
    ja: 聖書（コリントの信徒への手紙一 13章4節）の一節で「愛は忍耐強い」という意味。愛の永続的な性質を表し、韓国の結婚式やキリスト教の教えで頻繁に引用される。
    zh: 来自圣经（哥林多前书13:4）的一句话，意为'爱是恒久忍耐'，描述了爱的持久本质。它经常在韩国的婚礼和基督教教导中被引用。
    ar: 'عبارة من الكتاب المقدس (1 كورنثوس 13: 4) تعني ''المحبة تتأنى''، تصف طبيعة الحب الدائمة. يتم اقتباسها
      بشكل متكرر في حفلات الزفاف الكورية والتعاليم المسيحية.'
    he: ביטוי מהתנ'ך (קורינתיים א' 13:4) שמשמעותו 'האהבה סבלנית', המתאר את טבעה המתמשך של האהבה. הוא מצוטט
