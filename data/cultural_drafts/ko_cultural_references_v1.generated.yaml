  short_explanation: Simcheong is a filial daughter who sacrifices herself for her blind father and is
    later miraculously restored. Her story, recorded in the novel 'Simcheongjeon' during the Joseon dynasty,
    symbolizes extreme filial piety and is widely adapted in Korean arts.
  i18n_explanations:
    en: Simcheong is a filial daughter who sacrifices herself for her blind father and is later miraculously
      restored. Her story, recorded in the novel 'Simcheongjeon' during the Joseon dynasty, symbolizes
      extreme filial piety and is widely adapted in Korean arts.
    es: Simcheong es una hija filial que se sacrifica por su padre ciego y luego es milagrosamente restaurada.
      Su historia, registrada en la novela 'Simcheongjeon' durante la dinastía Joseon, simboliza la piedad
      filial extrema y es ampliamente adaptada en las artes coreanas.
    fr: Simcheong est une fille pieuse qui se sacrifie pour son père aveugle et est ensuite miraculeusement
      restaurée. Son histoire, consignée dans le roman 'Simcheongjeon' sous la dynastie Joseon, symbolise
      une piété filiale extrême et est largement adaptée dans les arts coréens.
    de: Simcheong ist eine tugendhafte Tochter, die sich für ihren blinden Vater opfert und später auf
      wundersame Weise wiederhergestellt wird. Ihre Geschichte, aufgezeichnet im Roman 'Simcheongjeon'
      während der Joseon-Dynastie, symbolisiert extreme kindliche Pietät und wird in der koreanischen
      Kunst weitgehend adaptiert.
    it: Simcheong è una figlia devota che si sacrifica per il padre cieco e viene poi miracolosamente
      restaurata. La sua storia, registrata nel romanzo 'Simcheongjeon' durante la dinastia Joseon, simboleggia
      l'estrema pietà filiale ed è ampiamente adattata nelle arti coreane.
    pt: Simcheong é uma filha devota que se sacrifica pelo pai cego e depois é milagrosamente restaurada.
      Sua história, registrada no romance 'Simcheongjeon' durante a dinastia Joseon, simboliza a extrema
      piedade filial e é amplamente adaptada nas artes coreanas.
    ru: Симчхон — почтительная дочь, которая жертвует собой ради слепого отца и затем чудесным образом
      возрождается. Её история, записанная в романе «Симчхонджон» во времена династии Чосон, символизирует
      крайнюю сыновнюю почтительность и широко адаптирована в корейском искусстве.
    ja: 沈清は盲人の父親のために自己犠牲をし、後に奇跡的に生き返る孝行娘です。彼女の物語は、朝鮮時代の小説『沈清伝』に記録されており、極度の孝行を象徴し、韓国の芸術で広く脚色されています。
    zh: 沈清是一位孝女，为盲父牺牲自己，后来奇迹般复活。她的故事记载于朝鲜王朝时期的小说《沈清传》，象征着极端的孝道，并在韩国艺术中被广泛改编。
    ar: سيم تشيونغ هي ابنة بارّة تضحي بنفسها من أجل والدها الأعمى ثم تُستعاد بأعجوبة. قصتها، المسجلة في
