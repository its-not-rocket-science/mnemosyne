- id: ko_classical_or_scriptural_allusion_팔정도_8323bf50
  language: ko
  canonical_reference: 팔정도
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 팔정도
  - 여덟 가지 올바른 길
  - 팔정도(八正道)
  short_explanation: 팔정도는 불교에서 고통에서 벗어나 해탈에 이르는 여덟 가지 수행 방법으로, 정견(올바른 견해), 정사(올바른 생각), 정어(올바른 말), 정업(올바른
    행동), 정명(올바른 생활), 정정진(올바른 노력), 정념(올바른 마음챙김), 정정(올바른 집중)을 포함합니다.
  i18n_explanations:
    en: 'The Eightfold Path is a set of eight practices in Buddhism that lead to liberation from suffering:
      right view, right intention, right speech, right action, right livelihood, right effort, right mindfulness,
      and right concentration.'
    es: 'El Óctuple Sendero es un conjunto de ocho prácticas en el budismo que conducen a la liberación
      del sufrimiento: visión correcta, intención correcta, habla correcta, acción correcta, medio de
      vida correcto, esfuerzo correcto, atención plena correcta y concentración correcta.'
    fr: 'Le Noble Sentier Octuple est un ensemble de huit pratiques dans le bouddhisme qui mènent à la
      libération de la souffrance : vue juste, intention juste, parole juste, action juste, moyens d''existence
      justes, effort juste, pleine conscience juste et concentration juste.'
    de: 'Der Achtfache Pfad ist eine Reihe von acht Praktiken im Buddhismus, die zur Befreiung vom Leiden
      führen: rechte Ansicht, rechte Gesinnung, rechte Rede, rechtes Handeln, rechter Lebenserwerb, rechte
      Anstrengung, rechte Achtsamkeit und rechte Sammlung.'
    it: 'L''Ottuplice Sentiero è un insieme di otto pratiche nel Buddismo che portano alla liberazione
      dalla sofferenza: retta visione, retta intenzione, retta parola, retta azione, retto sostentamento,
      retto sforzo, retta consapevolezza e retta concentrazione.'
    pt: 'O Nobre Caminho Óctuplo é um conjunto de oito práticas no budismo que levam à libertação do sofrimento:
      visão correta, intenção correta, fala correta, ação correta, meio de vida correto, esforço correto,
      atenção plena correta e concentração correta.'
    ru: 'Восьмеричный путь — это набор из восьми практик в буддизме, ведущих к освобождению от страданий:
      правильное воззрение, правильное намерение, правильная речь, правильное действие, правильный образ
      жизни, правильное усилие, правильная осознанность и правильное сосредоточение.'
    ja: 八正道は仏教において苦しみから解放されて解脱に至る八つの修行方法であり、正見（正しい見解）、正思（正しい思考）、正語（正しい言葉）、正業（正しい行動）、正命（正しい生活）、正精進（正しい努力）、正念（正しい
      mindfulness）、正定（正しい集中）を含みます。
    zh: 八正道是佛教中脱离痛苦达到解脱的八种修行方法，包括正见（正确的见解）、正思（正确的思维）、正语（正确的言语）、正业（正确的行为）、正命（正确的生活）、正精进（正确的努力）、正念（正确的念）、正定（正确的禅定）。
    ar: 'الطريق الثماني هو مجموعة من ثماني ممارسات في البوذية تؤدي إلى التحرر من المعاناة: الرؤية الصحيحة،
      النية الصحيحة، الكلام الصحيح، العمل الصحيح، سبل العيش الصحيحة، الجهد الصحيح، الوعي التام الصحيح،
      والتركيز الصحيح.'
    he: 'הנתיב השמיני הוא קבוצה של שמונה פרקטיקות בבודהיזם המובילות לשחרור מסבל: השקפה נכונה, כוונה נכונה,
      דיבור נכון, פעולה נכונה, פרנסה נכונה, מאמץ נכון, מודעות נכונה וריכוז נכון.'
