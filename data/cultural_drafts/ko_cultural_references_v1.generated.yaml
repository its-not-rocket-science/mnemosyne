  short_explanation: Hyeokgeose is the legendary founder of Silla, one of the Three Kingdoms of Korea,
    born from a red egg and later married to Lady Aryeong. His story is recorded in the Samguk Yusa and
    Samguk Sagi.
  i18n_explanations:
    en: Hyeokgeose is the legendary founder of Silla, one of the Three Kingdoms of Korea, born from a
      red egg and later married to Lady Aryeong. His story is recorded in the Samguk Yusa and Samguk Sagi.
    es: Hyeokgeose es el legendario fundador de Silla, uno de los Tres Reinos de Corea, nacido de un huevo
      rojo y casado más tarde con la Dama Aryeong. Su historia está registrada en el Samguk Yusa y el
      Samguk Sagi.
    fr: Hyeokgeose est le fondateur légendaire de Silla, l'un des Trois Royaumes de Corée, né d'un œuf
      rouge et plus tard marié à Dame Aryeong. Son histoire est consignée dans le Samguk Yusa et le Samguk
      Sagi.
    de: Hyeokgeose ist der legendäre Gründer von Silla, einem der Drei Königreiche Koreas, geboren aus
      einem roten Ei und später mit Lady Aryeong verheiratet. Seine Geschichte ist im Samguk Yusa und
      Samguk Sagi aufgezeichnet.
    it: Hyeokgeose è il leggendario fondatore di Silla, uno dei Tre Regni di Corea, nato da un uovo rosso
      e successivamente sposato con Lady Aryeong. La sua storia è registrata nel Samguk Yusa e nel Samguk
      Sagi.
    pt: Hyeokgeose é o lendário fundador de Silla, um dos Três Reinos da Coreia, nascido de um ovo vermelho
      e posteriormente casado com a Senhora Aryeong. Sua história está registrada no Samguk Yusa e no
      Samguk Sagi.
    ru: Хёккосе — легендарный основатель Силла, одного из Трёх королевств Кореи, родившийся из красного
      яйца и позже женившийся на госпоже Арён. Его история записана в «Самгук Юса» и «Самгук Саги».
    ja: 赫居世は、韓国の三国の一つである新羅の伝説的な建国者であり、赤い卵から生まれ、後に閼英夫人と結婚した。彼の物語は『三国遺事』と『三国史記』に記録されている。
    zh: 赫居世是新罗（朝鲜三国之一）的传奇创始人，由一颗红蛋出生，后来与阏英夫人结婚。他的故事记载于《三国遗事》和《三国史记》。
    ar: هيوكجوس هو المؤسس الأسطوري لشلا، إحدى الممالك الثلاث في كوريا، ولد من بيضة حمراء وتزوج لاحقًا
      من السيدة أريونغ. قصته مسجلة في سامغوك يوسا وسامغوك ساغي.
    he: היוקגוסה הוא המייסד האגדי של סילה, אחת משלוש הממלכות של קוריאה, שנולד מביצה אדומה ומאוחר יותר
