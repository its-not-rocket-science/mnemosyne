    ja: このことわざは、小さく一見取るに足らないものでも、非常に強力または強烈である可能性があることを意味し、サイズに基づいて人や物事を過小評価しないように警告しています。
    zh: 这句谚语的意思是，小而看似微不足道的东西可能非常强大或强烈，警告不要以大小来低估某人或某物。
    ar: يعني هذا المثل أن الأشياء الصغيرة أو التي تبدو تافهة يمكن أن تكون قوية جدًا أو شديدة، محذرًا من
