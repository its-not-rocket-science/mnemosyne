  short_explanation: General Gang Gam-chan was a Goryeo military commander who led Korea to victory against
    the Khitan Liao dynasty. He is remembered for his leadership during the Third Goryeo-Khitan War and
    his famous tactical retreat.
  i18n_explanations:
    en: General Gang Gam-chan was a Goryeo military commander who led Korea to victory against the Khitan
      Liao dynasty. He is remembered for his leadership during the Third Goryeo-Khitan War and his famous
      tactical retreat.
    es: El general Gang Gam-chan fue un comandante militar de Goryeo que llevó a Corea a la victoria contra
      la dinastía Khitan Liao. Es recordado por su liderazgo durante la Tercera Guerra Goryeo-Khitan y
      su famosa retirada táctica.
    fr: Le général Gang Gam-chan était un commandant militaire de Goryeo qui a mené la Corée à la victoire
      contre la dynastie khitane Liao. Il est connu pour son leadership pendant la troisième guerre Goryeo-Khitan
      et sa célèbre retraite tactique.
    de: General Gang Gam-chan war ein militärischer Befehlshaber von Goryeo, der Korea zum Sieg gegen
      die Khitan-Liao-Dynastie führte. Er wird für seine Führung während des dritten Goryeo-Khitan-Krieges
      und seinen berühmten taktischen Rückzug in Erinnerung behalten.
    it: Il generale Gang Gam-chan fu un comandante militare di Goryeo che portò la Corea alla vittoria
      contro la dinastia Khitan Liao. È ricordato per la sua leadership durante la terza guerra Goryeo-Khitan
      e la sua famosa ritirata tattica.
    pt: O general Gang Gam-chan foi um comandante militar de Goryeo que liderou a Coreia à vitória contra
      a dinastia Khitan Liao. Ele é lembrado por sua liderança durante a Terceira Guerra Goryeo-Khitan
      e sua famosa retirada tática.
    ru: Генерал Кан Гам Чхан был военачальником Корё, который привел Корею к победе над киданьской династией
      Ляо. Он запомнился своим руководством во время третьей войны Корё-киданей и знаменитым тактическим
      отступлением.
    ja: 姜邯賛将軍は、高麗の軍事指揮官で、契丹の遼朝に対して韓国を勝利に導きました。彼は第3次高麗-契丹戦争でのリーダーシップと有名な戦術的撤退で記憶されています。
    zh: 姜邯赞将军是高丽的军事指挥官，领导韩国战胜了契丹辽朝。他在第三次高丽-契丹战争中的领导能力和著名的战术撤退被人们铭记。
