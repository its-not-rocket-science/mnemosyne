- id: ko_classical_or_scriptural_allusion_업보_eb33fd28
  language: ko
  canonical_reference: 업보
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 업보
  - 카르마의 결과
  - 업(業)의 과보
  short_explanation: 업보는 불교에서 선악의 행위가 결과로 돌아오는 인과응보의 법칙으로, 과거와 현재의 행위가 미래의 삶에 영향을 미친다는 개념입니다. 한국 문화에서
    흔히 사용되며, 도덕적 책임감을 강조합니다.
  i18n_explanations:
    en: Karma is the law of causality in Buddhism where good or bad actions bring corresponding results;
      the concept that past and present actions influence future lives. It is commonly used in Korean
      culture, emphasizing moral responsibility.
    es: El karma es la ley de causalidad en el budismo donde las acciones buenas o malas traen resultados
      correspondientes; el concepto de que las acciones pasadas y presentes influyen en vidas futuras.
      Se usa comúnmente en la cultura coreana, enfatizando la responsabilidad moral.
    fr: Le karma est la loi de causalité dans le bouddhisme où les bonnes ou mauvaises actions apportent
      des résultats correspondants ; le concept selon lequel les actions passées et présentes influencent
      les vies futures. Il est couramment utilisé dans la culture coréenne, en mettant l'accent sur la
      responsabilité morale.
    de: Karma ist das Gesetz der Kausalität im Buddhismus, wonach gute oder schlechte Taten entsprechende
      Ergebnisse bringen; das Konzept, dass vergangene und gegenwärtige Handlungen zukünftige Leben beeinflussen.
      Es wird häufig in der koreanischen Kultur verwendet und betont moralische Verantwortung.
    it: Il karma è la legge di causalità nel Buddismo in cui azioni buone o cattive portano risultati
      corrispondenti; il concetto che azioni passate e presenti influenzano le vite future. È comunemente
      usato nella cultura coreana, enfatizzando la responsabilità morale.
    pt: Carma é a lei de causalidade no budismo onde ações boas ou más trazem resultados correspondentes;
      o conceito de que ações passadas e presentes influenciam vidas futuras. É comumente usado na cultura
      coreana, enfatizando a responsabilidade moral.
    ru: Карма — это закон причинности в буддизме, согласно которому хорошие или плохие действия приносят
      соответствующие результаты; концепция, что прошлые и настоящие действия влияют на будущие жизни.
      Она широко используется в корейской культуре, подчеркивая моральную ответственность.
    ja: 業（カルマ）は仏教において善悪の行為が結果として返ってくる因果応報の法則であり、過去と現在の行為が将来の人生に影響を与えるという概念です。韓国文化でよく使われ、道徳的責任を強調します。
    zh: 业（业报）是佛教中善恶行为带来相应结果的因果报应法则，即过去和现在的行为影响未来生命的概念。在韩国文化中常用，强调道德责任。
    ar: الكارما هو قانون السببية في البوذية حيث تجلب الأفعال الجيدة أو السيئة نتائج مقابلة؛ المفهوم أن
      الأفعال الماضية والحالية تؤثر على الحياة المستقبلية. يستخدم بشكل شائع في الثقافة الكورية، مع التركيز
      على المسؤولية الأخلاقية.
    he: קארמה הוא חוק הסיבתיות בבודהיזם לפיו פעולות טובות או רעות מביאות לתוצאות תואמות; הרעיון שפעולות
      עבר והווה משפיעות על חיים עתידיים. הוא נפוץ בשימוש בתרבות הקוריאנית, תוך הדגשה של אחריות מוסרית.
