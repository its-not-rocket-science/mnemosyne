- id: ko_literary_reference_자청비_a7a5864e
  language: ko
  canonical_reference: 자청비
  reference_type: literary_reference
  surface_patterns:
  - 자청비
  - 자청비 이야기
  - 자청비 설화
  short_explanation: 자청비 is the heroine of a Jeju folk tale about a woman who becomes a deity after overcoming
    hardships, associated with agriculture and love. It is a classic example of Korean oral literature.
  i18n_explanations:
    en: 자청비 is the heroine of a Jeju folk tale about a woman who becomes a deity after overcoming hardships,
      associated with agriculture and love. It is a classic example of Korean oral literature.
    es: 자청비 es la heroína de un cuento popular de Jeju sobre una mujer que se convierte en deidad después
      de superar dificultades, asociada con la agricultura y el amor. Es un ejemplo clásico de la literatura
      oral coreana.
    fr: 자청비 est l'héroïne d'un conte populaire de Jeju sur une femme qui devient une divinité après avoir
      surmonté des épreuves, associée à l'agriculture et à l'amour. C'est un exemple classique de la littérature
      orale coréenne.
    de: 자청비 ist die Heldin eines Jeju-Volksmärchens über eine Frau, die nach Überwindung von Schwierigkeiten
      zu einer Gottheit wird, verbunden mit Landwirtschaft und Liebe. Es ist ein klassisches Beispiel
      der koreanischen mündlichen Literatur.
    it: 자청비 è l'eroina di una fiaba popolare di Jeju su una donna che diventa una divinità dopo aver superato
      le difficoltà, associata all'agricoltura e all'amore. È un classico esempio di letteratura orale
      coreana.
    pt: 자청비 é a heroína de um conto popular de Jeju sobre uma mulher que se torna uma divindade após superar
      dificuldades, associada à agricultura e ao amor. É um exemplo clássico da literatura oral coreana.
    ru: 자청비 — героиня народной сказки Чеджу о женщине, которая становится божеством после преодоления
      трудностей, связана с земледелием и любовью. Это классический пример корейской устной литературы.
    ja: 자청비는、済州島の民話のヒロインで、困難を乗り越えて女神となった女性の物語で、農業と愛に関連しています。韓国の口承文学の古典的な例です。
    zh: 자청비是济州民间故事中的女主人公，讲述了一位女性克服困难后成为女神的故事，与农业和爱情相关。这是韩国口头文学的经典例子。
    ar: 자청비 هي بطلة حكاية شعبية من جيجو عن امرأة أصبحت إلهة بعد التغلب على الصعوبات، مرتبطة بالزراعة والحب.
      إنها مثال كلاسيكي للأدب الشفهي الكوري.
    he: 자청비 היא הגיבורה של סיפור עם מג'ג'ו על אישה שהופכת לאלה לאחר שהתגברה על קשיים, הקשורה לחקלאות ואהבה.
