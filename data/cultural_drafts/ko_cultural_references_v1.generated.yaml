    en: The 'Sermon on the Mount' from the Gospel of Matthew, a collection of Jesus' teachings including
      the Beatitudes. It is a foundational text for Christian ethics and is widely referenced in Korean
      Christian contexts.
    es: El 'Sermón del Monte' del Evangelio de Mateo, una colección de enseñanzas de Jesús que incluye
      las Bienaventuranzas. Es un texto fundamental para la ética cristiana y es ampliamente referenciado
