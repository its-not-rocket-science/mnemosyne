  short_explanation: Kim Gu was a key figure in the Korean independence movement against Japanese colonial
    rule, serving as the last premier of the Provisional Government of the Republic of Korea. He is revered
    for his dedication to Korean sovereignty and unification.
  i18n_explanations:
    en: Kim Gu was a key figure in the Korean independence movement against Japanese colonial rule, serving
      as the last premier of the Provisional Government of the Republic of Korea. He is revered for his
      dedication to Korean sovereignty and unification.
    es: Kim Gu fue una figura clave en el movimiento de independencia coreano contra el dominio colonial
      japonés, sirviendo como el último primer ministro del Gobierno Provisional de la República de Corea.
      Es venerado por su dedicación a la soberanía y unificación coreanas.
    fr: Kim Gu a été une figure clé du mouvement d'indépendance coréen contre la domination coloniale
      japonaise, servant comme dernier Premier ministre du Gouvernement provisoire de la République de
      Corée. Il est vénéré pour son dévouement à la souveraineté et à l'unification coréennes.
    de: Kim Gu war eine Schlüsselfigur der koreanischen Unabhängigkeitsbewegung gegen die japanische Kolonialherrschaft
      und diente als letzter Premierminister der Provisorischen Regierung der Republik Korea. Er wird
      für sein Engagement für die koreanische Souveränität und Wiedervereinigung verehrt.
    it: Kim Gu fu una figura chiave nel movimento d'indipendenza coreano contro il dominio coloniale giapponese,
      servendo come ultimo primo ministro del Governo provvisorio della Repubblica di Corea. È venerato
      per la sua dedizione alla sovranità e all'unificazione coreane.
    pt: Kim Gu foi uma figura chave no movimento de independência coreano contra o domínio colonial japonês,
      servindo como o último primeiro-ministro do Governo Provisório da República da Coreia. Ele é reverenciado
      por sua dedicação à soberania e unificação coreanas.
    ru: Ким Гу был ключевой фигурой в корейском движении за независимость от японского колониального господства,
      занимая пост последнего премьер-министра Временного правительства Республики Корея. Он почитается
      за свою преданность суверенитету и объединению Кореи.
    ja: 金九は、日本の植民地支配に対する韓国独立運動の重要人物であり、大韓民国臨時政府の最後の首相を務めました。彼は韓国の主権と統一への献身で敬愛されています。
    zh: 金九是反对日本殖民统治的韩国独立运动的关键人物，曾担任大韩民国临时政府最后一任总理。他因致力于韩国的主权和统一而备受尊敬。
    ar: كان كيم غو شخصية رئيسية في حركة الاستقلال الكورية ضد الحكم الاستعماري الياباني، حيث شغل منصب آخر
      رئيس وزراء للحكومة المؤقتة لجمهورية كوريا. إنه يُبجّل لتفانيه في السيادة والتوحيد الكوريين.
    he: קים גו היה דמות מפתח בתנועת העצמאות הקוריאנית נגד השלטון הקולוניאלי היפני, וכיהן כראש הממשלה האחרון
