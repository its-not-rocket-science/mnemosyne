  i18n_explanations:
    en: The Buddhist doctrine of 'no-self' (anātman), which holds that there is no permanent, unchanging
      self. It is a cornerstone of Buddhist philosophy leading to liberation.
    es: La doctrina budista del 'no-yo' (anātman), que sostiene que no existe un yo permanente e inmutable.
      Es una piedra angular de la filosofía budista que conduce a la liberación.
    fr: La doctrine bouddhiste du 'non-soi' (anātman), qui soutient qu'il n'y a pas de soi permanent et
      immuable. C'est une pierre angulaire de la philosophie bouddhiste menant à la libération.
    de: Die buddhistische Lehre vom 'Nicht-Selbst' (anātman), die besagt, dass es kein permanentes, unveränderliches
      Selbst gibt. Es ist ein Eckpfeiler der buddhistischen Philosophie, der zur Befreiung führt.
    it: La dottrina buddista del 'non-sé' (anātman), che sostiene che non esiste un sé permanente e immutabile.
      È una pietra angolare della filosofia buddista che porta alla liberazione.
    pt: A doutrina budista do 'não-eu' (anātman), que afirma que não existe um eu permanente e imutável.
      É uma pedra angular da filosofia budista que leva à libertação.
    ru: Буддийская доктрина «не-я» (анатман), утверждающая, что нет постоянного, неизменного «я». Это
      краеугольный камень буддийской философии, ведущий к освобождению.
    ja: 「無我」は、永遠不変の自己は存在しないという仏教の教義（アナートマン）。解脱に至る仏教哲学の要です。
    zh: 佛教的“无我”教义（anātman），认为没有永恒不变的自我。它是佛教哲学的基石，导向解脱。
    ar: عقيدة 'اللاذات' البوذية (أناتمان)، والتي ترى أنه لا توجد ذات دائمة ثابتة. إنها حجر الزاوية في
      الفلسفة البوذية المؤدية إلى التحرر.
    he: הדוקטרינה הבודהיסטית של 'אין-עצמי' (אנאטמן), הגורסת שאין עצמי קבוע ובלתי משתנה. זוהי אבן יסוד
