    en: A Korean proverb meaning that words spoken carelessly can be overheard, cautioning against loose
      talk both day and night.
    es: Un proverbio coreano que significa que las palabras dichas descuidadamente pueden ser escuchadas,
      advirtiendo contra hablar sin cuidado tanto de día como de noche.
    fr: Un proverbe coréen signifiant que les paroles prononcées imprudemment peuvent être entendues,
      mettant en garde contre les propos négligents de jour comme de nuit.
    de: Ein koreanisches Sprichwort, das bedeutet, dass unvorsichtig gesprochene Worte belauscht werden
      können, und warnt vor lockerem Gerede bei Tag und Nacht.
    it: Un proverbio coreano che significa che le parole pronunciate con noncuranza possono essere ascoltate,
      mettendo in guardia dal parlare a vanvera sia di giorno che di notte.
    pt: Um provérbio coreano que significa que palavras ditas descuidadamente podem ser ouvidas, alertando
      contra conversa fiada tanto de dia quanto de noite.
    ru: Корейская пословица, означающая, что неосторожно сказанные слова могут быть подслушаны, предостерегая
