  i18n_explanations:
    en: 설문대할망 is a giant goddess in Jeju Island mythology who created the island's geography. She is a
      central figure in Jeju oral tradition, symbolizing maternal power and nature.
    es: 설문대할망 es una diosa gigante en la mitología de la isla de Jeju que creó la geografía de la isla.
      Es una figura central en la tradición oral de Jeju, que simboliza el poder maternal y la naturaleza.
    fr: 설문대할망 est une déesse géante dans la mythologie de l'île de Jeju qui a créé la géographie de l'île.
      Elle est une figure centrale de la tradition orale de Jeju, symbolisant le pouvoir maternel et la
      nature.
    de: 설문대할망 ist eine Riesengöttin in der Mythologie der Insel Jeju, die die Geographie der Insel erschuf.
