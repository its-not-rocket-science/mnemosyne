- id: ko_classical_or_scriptural_allusion_삼강오륜_8a9382e8
  language: ko
  canonical_reference: 삼강오륜
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 삼강오륜
  - 삼강과 오륜
  - three bonds and five relationships
  short_explanation: 'Core Confucian ethical principles: the three bonds (ruler-subject, parent-child,
    husband-wife) and five relationships (adding elder-younger and friend-friend) that define social harmony
    and moral conduct. They are foundational in traditional Korean society.'
  i18n_explanations:
    en: 'Core Confucian ethical principles: the three bonds (ruler-subject, parent-child, husband-wife)
      and five relationships (adding elder-younger and friend-friend) that define social harmony and moral
      conduct. They are foundational in traditional Korean society.'
    es: 'Principios éticos confucianos centrales: los tres vínculos (gobernante-súbdito, padre-hijo, marido-mujer)
      y cinco relaciones (añadiendo mayor-menor y amigo-amigo) que definen la armonía social y la conducta
      moral. Son fundamentales en la sociedad tradicional coreana.'
    fr: 'Principes éthiques confucéens fondamentaux : les trois liens (souverain-sujet, parent-enfant,
      mari-femme) et cinq relations (ajoutant aîné-cadet et ami-ami) qui définissent l''harmonie sociale
      et la conduite morale. Ils sont fondamentaux dans la société coréenne traditionnelle.'
    de: 'Kernkonfuzianische ethische Prinzipien: die drei Bande (Herrscher-Untertan, Eltern-Kind, Ehemann-Ehefrau)
      und fünf Beziehungen (ergänzt um Älterer-Jüngerer und Freund-Freund), die soziale Harmonie und moralisches
      Verhalten definieren. Sie sind grundlegend in der traditionellen koreanischen Gesellschaft.'
    it: 'Principi etici confuciani fondamentali: i tre legami (sovrano-suddito, genitore-figlio, marito-moglie)
      e cinque relazioni (aggiungendo anziano-giovane e amico-amico) che definiscono l''armonia sociale
      e la condotta morale. Sono fondamentali nella società tradizionale coreana.'
    pt: 'Princípios éticos confucionistas centrais: os três vínculos (governante-súdito, pai-filho, marido-mulher)
      e cinco relacionamentos (adicionando mais velho-mais novo e amigo-amigo) que definem a harmonia
      social e a conduta moral. Eles são fundamentais na sociedade coreana tradicional.'
    ru: 'Основные конфуцианские этические принципы: три узы (правитель-подданный, родитель-ребёнок, муж-жена)
      и пять отношений (добавляя старший-младший и друг-друг), которые определяют социальную гармонию
      и моральное поведение. Они являются основополагающими в традиционном корейском обществе.'
    ja: 「三綱五倫」は儒教の核となる倫理原則で、三綱（君臣・父子・夫婦）と五倫（長幼・朋友を加えた五つの関係）からなり、社会の調和と道徳的行動を定義します。伝統的な韓国社会の基盤です。
    zh: 核心儒家伦理原则：三纲（君臣、父子、夫妇）和五伦（加上长幼、朋友），定义了社会和谐与道德行为。它们是传统韩国社会的基础。
    ar: 'المبادئ الأخلاقية الكونفوشيوسية الأساسية: الروابط الثلاث (الحاكم-الرعية، الوالد-الابن، الزوج-الزوجة)
      والعلاقات الخمس (إضافة الأكبر-الأصغر والصديق-الصديق) التي تحدد الانسجام الاجتماعي والسلوك الأخلاقي.
      هي أساسية في المجتمع الكوري التقليدي.'
    he: 'עקרונות אתיים קונפוציאניים מרכזיים: שלושת הקשרים (שליט-נתין, הורה-ילד, בעל-אישה) וחמש מערכות
      יחסים (בתוספת מבוגר-צעיר וידיד-ידיד) המגדירים הרמוניה חברתית והתנהגות מוסרית. הם יסודיים בחברה הקוריאנית
      המסורתית.'
