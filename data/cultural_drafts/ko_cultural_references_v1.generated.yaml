      representing the approach of gaining wisdom through the study of phenomena.
    es: Una doctrina confuciana del 'Gran Saber' que significa 'investigar las cosas para extender el
      conocimiento', representando el enfoque de adquirir sabiduría mediante el estudio de los fenómenos.
    fr: Une doctrine confucéenne du « Grand Apprentissage » signifiant « examiner les choses pour étendre
      la connaissance », représentant l'approche consistant à acquérir la sagesse par l'étude des phénomènes.
    de: Eine konfuzianische Lehre aus der 'Großen Wissenschaft', die bedeutet 'die Dinge untersuchen,
      um das Wissen zu erweitern' und die Herangehensweise repräsentiert, Weisheit durch das Studium der
      Phänomene zu erlangen.
    it: Una dottrina confuciana dal 'Grande Studio' che significa 'investigare le cose per estendere la
      conoscenza', rappresentando l'approccio di acquisire saggezza attraverso lo studio dei fenomeni.
    pt: Uma doutrina confucionista do 'Grande Saber' que significa 'investigar as coisas para estender
      o conhecimento', representando a abordagem de adquirir sabedoria através do estudo dos fenômenos.
    ru: Конфуцианская доктрина из «Великого учения», означающая «исследовать вещи, чтобы расширить знание»
