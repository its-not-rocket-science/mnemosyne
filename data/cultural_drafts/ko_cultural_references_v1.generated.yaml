  short_explanation: A key line from the Heart Sutra stating that all phenomena are empty of inherent
    existence, yet emptiness itself is not separate from phenomena. It is a fundamental teaching of Mahayana
    Buddhism.
  i18n_explanations:
    en: A key line from the Heart Sutra stating that all phenomena are empty of inherent existence, yet
      emptiness itself is not separate from phenomena. It is a fundamental teaching of Mahayana Buddhism.
    es: Una línea clave del Sutra del Corazón que afirma que todos los fenómenos están vacíos de existencia
      inherente, pero la vacuidad misma no está separada de los fenómenos. Es una enseñanza fundamental
      del budismo Mahayana.
    fr: Une ligne clé du Sutra du Cœur affirmant que tous les phénomènes sont vides d'existence inhérente,
      mais que la vacuité elle-même n'est pas séparée des phénomènes. C'est un enseignement fondamental
      du bouddhisme Mahayana.
    de: Eine Schlüsselzeile aus dem Herz-Sutra, die besagt, dass alle Phänomene leer von inhärenter Existenz
      sind, aber die Leerheit selbst nicht von den Phänomenen getrennt ist. Es ist eine grundlegende Lehre
      des Mahayana-Buddhismus.
    it: Una frase chiave del Sutra del Cuore che afferma che tutti i fenomeni sono vuoti di esistenza
      intrinseca, ma la vacuità stessa non è separata dai fenomeni. È un insegnamento fondamentale del
      buddismo Mahayana.
    pt: Uma frase-chave do Sutra do Coração afirmando que todos os fenômenos são vazios de existência
      inerente, mas o vazio em si não está separado dos fenômenos. É um ensinamento fundamental do budismo
      Mahayana.
    ru: Ключевая строка из Сутры Сердца, утверждающая, что все явления пусты от присущего существования,
      но сама пустота неотделима от явлений. Это фундаментальное учение буддизма Махаяны.
    ja: 「色即是空、空即是色」は般若心経の重要な一節で、すべての現象は本質的な存在性を欠いているが、空そのものが現象から分離しているわけではないことを述べています。大乗仏教の根本教義です。
    zh: 《心经》中的关键句子，说一切现象皆无自性，但空性本身并不脱离现象。这是大乘佛教的基本教义。
    ar: سطر رئيسي من سوترا القلب ينص على أن جميع الظواهر فارغة من الوجود الجوهري، لكن الفراغ نفسه ليس
      منفصلاً عن الظواهر. إنه تعليم أساسي في البوذية الماهايانا.
    he: שורת מפתח מסוטרת הלב הקובעת שכל התופעות ריקות מקיום מהותי, אך הריקות עצמה אינה נפרדת מהתופעות.
