    ja: 설문대할망は、済州島の神話に登場する巨人の女神で、島の地形を創造しました。済州の口承伝承の中心人物であり、母性の力と自然を象徴しています。
    zh: 설문대할망是济州岛神话中的巨型女神，创造了该岛的地理地貌。她是济州口头传统的核心人物，象征着母性力量和自然。
    ar: 설문대할망 هي إلهة عملاقة في أساطير جزيرة جيجو التي خلقت جغرافية الجزيرة. وهي شخصية محورية في التقليد
