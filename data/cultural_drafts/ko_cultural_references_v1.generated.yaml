  short_explanation: General Eulji Mundeok was a famous Goguryeo military commander who successfully defended
    the kingdom against the Sui dynasty of China. He is celebrated for his strategic brilliance and his
    victory at the Battle of Salsu.
  i18n_explanations:
    en: General Eulji Mundeok was a famous Goguryeo military commander who successfully defended the kingdom
      against the Sui dynasty of China. He is celebrated for his strategic brilliance and his victory
      at the Battle of Salsu.
    es: El general Eulji Mundeok fue un famoso comandante militar de Goguryeo que defendió con éxito el
      reino contra la dinastía Sui de China. Es celebrado por su brillantez estratégica y su victoria
      en la Batalla de Salsu.
    fr: Le général Eulji Mundeok était un célèbre commandant militaire de Goguryeo qui a défendu avec
      succès le royaume contre la dynastie Sui de Chine. Il est célébré pour son génie stratégique et
      sa victoire à la bataille de Salsu.
    de: General Eulji Mundeok war ein berühmter militärischer Befehlshaber von Goguryeo, der das Königreich
      erfolgreich gegen die Sui-Dynastie Chinas verteidigte. Er wird für seine strategische Brillanz und
      seinen Sieg in der Schlacht von Salsu gefeiert.
    it: Il generale Eulji Mundeok fu un famoso comandante militare di Goguryeo che difese con successo
      il regno contro la dinastia Sui della Cina. È celebrato per la sua genialità strategica e la vittoria
      nella battaglia di Salsu.
    pt: O general Eulji Mundeok foi um famoso comandante militar de Goguryeo que defendeu com sucesso
      o reino contra a dinastia Sui da China. Ele é celebrado por sua brilhantismo estratégico e sua vitória
      na Batalha de Salsu.
    ru: Генерал Ыльчи Мундок был знаменитым военачальником Когурё, успешно защитившим королевство от китайской
      династии Суй. Он прославляется за свою стратегическую гениальность и победу в битве при Сальсу.
    ja: 乙支文徳将軍は、高句麗の有名な軍司令官であり、中国の隋朝から王国を守り抜きました。彼は戦略的才能と薩水の戦いでの勝利で称えられています。
    zh: 乙支文德将军是高句丽著名的军事指挥官，成功保卫了王国免受中国隋朝的侵略。他以战略才能和萨水之战的胜利而闻名。
    ar: كان الجنرال إيولجي مونديوك قائدًا عسكريًا شهيرًا من غوغوريو دافع بنجاح عن المملكة ضد سلالة سوي
      الصينية. يُحتفي به لعبقريته الاستراتيجية وانتصاره في معركة سالسو.
    he: הגנרל אולג'י מונדוק היה מפקד צבאי מפורסם מגוגוריאו שהגן בהצלחה על הממלכה נגד שושלת סווי הסינית.
      הוא נחגג על גאונותו האסטרטגית ונצחונו בקרב סאלסו.
