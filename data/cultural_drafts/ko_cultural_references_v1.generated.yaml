  short_explanation: Refers to the military retreat ordered by General Yi Seong-gye at Wihwa Island in
    1388. This act led to a coup that toppled the Goryeo dynasty and paved the way for the founding of
    Joseon.
  i18n_explanations:
    en: Refers to the military retreat ordered by General Yi Seong-gye at Wihwa Island in 1388. This act
      led to a coup that toppled the Goryeo dynasty and paved the way for the founding of Joseon.
    es: Hace referencia a la retirada militar ordenada por el general Yi Seong-gye en la isla Wihwa en
      1388. Este acto condujo a un golpe de estado que derrocó a la dinastía Goryeo y allanó el camino
      para la fundación de Joseon.
    fr: Fait référence à la retraite militaire ordonnée par le général Yi Seong-gye sur l'île de Wihwa
      en 1388. Cet acte a conduit à un coup d'État qui a renversé la dynastie Goryeo et a ouvert la voie
      à la fondation de Joseon.
    de: Bezieht sich auf den militärischen Rückzug, der von General Yi Seong-gye auf der Insel Wihwa im
      Jahr 1388 angeordnet wurde. Diese Aktion führte zu einem Putsch, der die Goryeo-Dynastie stürzte
      und den Weg für die Gründung von Joseon ebnete.
    it: Si riferisce alla ritirata militare ordinata dal generale Yi Seong-gye sull'isola di Wihwa nel
      1388. Questo atto portò a un colpo di stato che rovesciò la dinastia Goryeo e aprì la strada alla
      fondazione di Joseon.
    pt: Refere-se à retirada militar ordenada pelo general Yi Seong-gye na ilha de Wihwa em 1388. Este
      ato levou a um golpe que derrubou a dinastia Goryeo e abriu caminho para a fundação de Joseon.
    ru: Относится к военному отступлению, приказанному генералом Ли Сон Ге на острове Вихва в 1388 году.
      Это действие привело к перевороту, свергнувшему династию Корё, и проложило путь к основанию Чосон.
    ja: 1388年に李成桂将軍が威化島で命じた軍の撤退を指します。この行動はクーデターを引き起こし、高麗王朝を転覆させ、朝鮮建国への道を開きました。
    zh: 指的是1388年李成桂将军在威化岛下令的军事撤退。这一行动导致政变，推翻了高丽王朝，为建立朝鲜王朝铺平了道路。
    ar: يشير إلى الانسحاب العسكري الذي أمر به الجنرال إي سونغ غي في جزيرة وي هوا عام 1388. أدى هذا الفعل
      إلى انقلاب أطاح بمملكة غوريو ومهد الطريق لتأسيس جوسون.
    he: מתייחס לנסיגה הצבאית שהורה הגנרל יי סונג-גייה באי ויהווה בשנת 1388. פעולה זו הובילה להפיכה שהפילה
      את שושלת גוריו וסללה את הדרך להקמת ג'וסון.
