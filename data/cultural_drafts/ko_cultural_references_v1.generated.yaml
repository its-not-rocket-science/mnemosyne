  - 갑신정변 사건
  - 갑신정변 당시
  short_explanation: A failed coup d'état in 1884 by progressive reformers in Joseon, who sought rapid
    modernization and independence from Chinese influence. It lasted only three days but marked a significant
    step in Korea's reform movements.
  i18n_explanations:
    en: A failed coup d'état in 1884 by progressive reformers in Joseon, who sought rapid modernization
      and independence from Chinese influence. It lasted only three days but marked a significant step
      in Korea's reform movements.
    es: Un fallido golpe de estado en 1884 por reformistas progresistas en Joseon, que buscaban una rápida
      modernización e independencia de la influencia china. Duró solo tres días pero marcó un paso significativo
      en los movimientos reformistas de Corea.
    fr: Un coup d'État raté en 1884 mené par des réformateurs progressistes à Joseon, qui cherchaient
      une modernisation rapide et l'indépendance vis-à-vis de l'influence chinoise. Il n'a duré que trois
      jours mais a marqué une étape importante dans les mouvements de réforme en Corée.
    de: Ein gescheiterter Putsch im Jahr 1884 durch fortschrittliche Reformer in Joseon, die eine rasche
      Modernisierung und Unabhängigkeit von chinesischem Einfluss anstrebten. Es dauerte nur drei Tage,
      markierte aber einen bedeutenden Schritt in Koreas Reformbewegungen.
    it: Un fallito colpo di stato del 1884 da parte di riformatori progressisti a Joseon, che cercavano
      una rapida modernizzazione e indipendenza dall'influenza cinese. Durò solo tre giorni ma segnò un
      passo significativo nei movimenti di riforma della Corea.
    pt: Um golpe de estado fracassado em 1884 por reformadores progressistas em Joseon, que buscavam rápida
      modernização e independência da influência chinesa. Durou apenas três dias, mas marcou um passo
      significativo nos movimentos reformistas da Coreia.
    ru: Неудавшийся государственный переворот 1884 года, совершённый прогрессивными реформаторами в Чосоне,
      которые стремились к быстрой модернизации и независимости от китайского влияния. Он длился всего
      три дня, но стал важным шагом в реформаторских движениях Кореи.
    ja: 1884年に朝鮮の開化派が起こした失敗に終わったクーデター。彼らは急速な近代化と中国からの独立を目指した。わずか3日間で終わったが、韓国の改革運動における重要な一歩となった。
    zh: 1884年由朝鲜开化派发起的失败政变，旨在迅速实现现代化和摆脱中国影响。虽仅持续三天，却是韩国改革运动的重要一步。
    ar: انقلاب فاشل في عام 1884 قام به الإصلاحيون التقدميون في جوسون، الذين سعوا إلى التحديث السريع والاستقلال
      عن النفوذ الصيني. استمر ثلاثة أيام فقط لكنه كان خطوة مهمة في حركات الإصلاح في كوريا.
    he: הפיכה כושלת בשנת 1884 על ידי רפורמיסטים מתקדמים בג'וסון, שביקשו מודרניזציה מהירה ועצמאות מהשפעה
      סינית. היא נמשכה שלושה ימים בלבד אך סימנה צעד משמעותי בתנועות הרפורמה בקוריאה.
