    (National Foundation Day).
  i18n_explanations:
    en: Dangun is the legendary founder of Gojoseon, the first Korean kingdom, and appears in the Samguk
      Yusa. His myth establishes Korean national identity and is commemorated on Gaecheonjeol (National
      Foundation Day).
    es: Dangun es el legendario fundador de Gojoseon, el primer reino coreano, y aparece en el Samguk
      Yusa. Su mito establece la identidad nacional coreana y se conmemora en el Gaecheonjeol (Día de
      la Fundación Nacional).
    fr: Dangun est le fondateur légendaire de Gojoseon, le premier royaume coréen, et apparaît dans le
      Samguk Yusa. Son mythe établit l'identité nationale coréenne et est commémoré lors du Gaecheonjeol
      (Jour de la fondation nationale).
    de: Dangun ist der legendäre Gründer von Gojoseon, dem ersten koreanischen Königreich, und erscheint
      im Samguk Yusa. Sein Mythos begründet die koreanische nationale Identität und wird am Gaecheonjeol
      (Nationaler Gründungstag) gefeiert.
    it: Dangun è il leggendario fondatore di Gojoseon, il primo regno coreano, e appare nel Samguk Yusa.
      Il suo mito stabilisce l'identità nazionale coreana e viene commemorato nel Gaecheonjeol (Giorno
      della Fondazione Nazionale).
    pt: Dangun é o lendário fundador de Gojoseon, o primeiro reino coreano, e aparece no Samguk Yusa.
      Seu mito estabelece a identidade nacional coreana e é comemorado no Gaecheonjeol (Dia da Fundação
      Nacional).
    ru: Дангун — легендарный основатель Кочосона, первого корейского королевства, и упоминается в «Самгук
      Юса». Его миф устанавливает корейскую национальную идентичность и отмечается в день Кэчхонджоль
      (День основания государства).
    ja: 檀君は、最初の朝鮮王国である古朝鮮の伝説的な建国者であり、『三国遺事』に登場する。その神話は韓国の国民的アイデンティティを確立し、開天節（建国記念日）に記念される。
    zh: 檀君是高朝鲜（第一个朝鲜王国）的传奇创始人，出现在《三国遗事》中。他的神话奠定了韩国的民族认同，并在开天节（建国日）纪念。
    ar: دانغون هو المؤسس الأسطوري لجوجوسون، أول مملكة كورية، ويظهر في سامغوك يوسا. أسطورته تثبت الهوية
      الوطنية الكورية ويتم الاحتفال بها في غايتشونجول (يوم التأسيس الوطني).
    he: דאנגון הוא המייסד האגדי של גוג'וסון, הממלכה הקוריאנית הראשונה, ומופיע בסמגוק יוסה. המיתוס שלו
