  short_explanation: Korean independence activist (1879–1910) who assassinated Ito Hirobumi in 1909. He
    is revered as a martyr for Korean independence and a symbol of resistance against Japanese colonial
    rule.
  i18n_explanations:
    en: Korean independence activist (1879–1910) who assassinated Ito Hirobumi in 1909. He is revered
      as a martyr for Korean independence and a symbol of resistance against Japanese colonial rule.
    es: Activista independentista coreano (1879-1910) que asesinó a Ito Hirobumi en 1909. Es venerado
      como mártir por la independencia coreana y símbolo de resistencia contra el dominio colonial japonés.
    fr: Activiste indépendantiste coréen (1879-1910) qui a assassiné Ito Hirobumi en 1909. Il est vénéré
      comme un martyr pour l'indépendance coréenne et un symbole de résistance contre la domination coloniale
      japonaise.
    de: Koreanischer Unabhängigkeitsaktivist (1879-1910), der 1909 Ito Hirobumi ermordete. Er wird als
      Märtyrer für die koreanische Unabhängigkeit und als Symbol des Widerstands gegen die japanische
      Kolonialherrschaft verehrt.
    it: Attivista indipendentista coreano (1879-1910) che assassinò Ito Hirobumi nel 1909. È venerato
      come martire per l'indipendenza coreana e simbolo di resistenza contro il dominio coloniale giapponese.
    pt: Ativista da independência coreana (1879-1910) que assassinou Ito Hirobumi em 1909. É reverenciado
      como mártir pela independência coreana e símbolo de resistência ao domínio colonial japonês.
    ru: Корейский активист за независимость (1879–1910), убивший Ито Хиробуми в 1909 году. Он почитается
      как мученик за независимость Кореи и символ сопротивления японскому колониальному господству.
    ja: 韓国の独立運動家（1879～1910年）で、1909年に伊藤博文を暗殺した。韓国独立のための殉教者として、また日本植民地支配への抵抗の象徴として崇敬されている。
    zh: 韩国独立活动家（1879-1910），1909年刺杀伊藤博文。他被尊为韩国独立的殉道者，是反抗日本殖民统治的象征。
    ar: ناشط استقلال كوري (1879-1910) اغتال إيتو هيروبومي في عام 1909. يُبجَّل كشهيد من أجل الاستقلال
      الكوري ورمز للمقاومة ضد الحكم الاستعماري الياباني.
    he: פעיל עצמאות קוריאני (1879-1910) שרצח את איטו הירובומי ב-1909. הוא נערץ כקדוש מעונה לעצמאות קוריאה
      וכסמל להתנגדות לשלטון הקולוניאלי היפני.
