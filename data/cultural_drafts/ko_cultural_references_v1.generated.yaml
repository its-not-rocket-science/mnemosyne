  short_explanation: A Taoist concept meaning 'non-action and naturalness,' advocating living in harmony
    with the natural flow of the universe without unnecessary interference. It is a key philosophical
    ideal in Korean culture influenced by Taoism.
  i18n_explanations:
    en: A Taoist concept meaning 'non-action and naturalness,' advocating living in harmony with the natural
      flow of the universe without unnecessary interference. It is a key philosophical ideal in Korean
      culture influenced by Taoism.
    es: Un concepto taoísta que significa 'no acción y naturalidad', que aboga por vivir en armonía con
      el flujo natural del universo sin interferencias innecesarias. Es un ideal filosófico clave en la
      cultura coreana influenciada por el taoísmo.
    fr: Un concept taoïste signifiant 'non-action et naturel', prônant une vie en harmonie avec le flux
      naturel de l'univers sans interférence inutile. C'est un idéal philosophique clé dans la culture
      coréenne influencée par le taoïsme.
    de: Ein taoistisches Konzept, das 'Nicht-Handeln und Natürlichkeit' bedeutet und dafür plädiert, im
      Einklang mit dem natürlichen Fluss des Universums zu leben, ohne unnötige Eingriffe. Es ist ein
      zentrales philosophisches Ideal in der vom Taoismus beeinflussten koreanischen Kultur.
    it: Un concetto taoista che significa 'non azione e naturalezza', che sostiene la vita in armonia
      con il flusso naturale dell'universo senza interferenze inutili. È un ideale filosofico chiave nella
      cultura coreana influenzata dal taoismo.
    pt: Um conceito taoísta que significa 'não ação e naturalidade', defendendo viver em harmonia com
      o fluxo natural do universo sem interferências desnecessárias. É um ideal filosófico chave na cultura
      coreana influenciada pelo taoísmo.
    ru: Даосская концепция, означающая 'недеяние и естественность', пропагандирующая жизнь в гармонии
      с естественным течением вселенной без ненужного вмешательства. Это ключевой философский идеал в
      корейской культуре, находящейся под влиянием даосизма.
    ja: 「無為自然」を意味する道教の概念で、不必要な干渉をせずに宇宙の自然な流れと調和して生きることを提唱する。道教の影響を受けた韓国文化における重要な哲学的理想である。
    zh: 一个道家概念，意为'无为而自然'，主张与宇宙的自然流动和谐相处，不加不必要的干预。这是受道教影响的韩国文化中的一个关键哲学理想。
    ar: مفهوم طاوي يعني 'عدم الفعل والطبيعية'، يدعو إلى العيش في انسجام مع التدفق الطبيعي للكون دون تدخل
      غير ضروري. إنه مثال فلسفي رئيسي في الثقافة الكورية المتأثرة بالطاوية.
    he: מושג טאואיסטי שפירושו 'אי-פעולה וטבעיות', הדוגל בחיים בהרמוניה עם הזרם הטבעי של היקום ללא התערבות
      מיותרת. זהו אידיאל פילוסופי מרכזי בתרבות הקוריאנית המושפעת מטאואיזם.
