  short_explanation: A hyangga poem from the Silla period praising the youthful beauty of Kiparang, a
    hwarang. It is one of the 14 extant hyangga and is known for its lyrical and symbolic language.
  i18n_explanations:
    en: A hyangga poem from the Silla period praising the youthful beauty of Kiparang, a hwarang. It is
      one of the 14 extant hyangga and is known for its lyrical and symbolic language.
    es: Un poema hyangga del período Silla que alaba la belleza juvenil de Kiparang, un hwarang. Es uno
      de los 14 hyangga existentes y es conocido por su lenguaje lírico y simbólico.
    fr: Un poème hyangga de la période Silla louant la beauté juvénile de Kiparang, un hwarang. C'est
      l'un des 14 hyangga existants et est connu pour son langage lyrique et symbolique.
    de: Ein Hyangga-Gedicht aus der Silla-Zeit, das die jugendliche Schönheit von Kiparang, einem Hwarang,
      preist. Es ist eines der 14 erhaltenen Hyangga und bekannt für seine lyrische und symbolische Sprache.
    it: Una poesia hyangga del periodo Silla che loda la bellezza giovanile di Kiparang, un hwarang. È
      uno dei 14 hyangga esistenti ed è noto per il suo linguaggio lirico e simbolico.
    pt: Um poema hyangga do período Silla que elogia a beleza juvenil de Kiparang, um hwarang. É um dos
      14 hyangga existentes e é conhecido por sua linguagem lírica e simbólica.
    ru: Стихотворение хянга периода Силла, восхваляющее юную красоту Кипаранга, хварана. Это одно из 14
      сохранившихся хянга, известное своим лирическим и символическим языком.
    ja: 新羅時代の郷歌（ヒャンガ）で、花郎（ファラン）であるキパランの若々しい美しさを称賛する詩。現存する14の郷歌の一つで、抒情的で象徴的な言葉遣いで知られる。
    zh: 一首新罗时期的乡歌，赞美花郎基巴朗的青春之美。它是现存的14首乡歌之一，以其抒情和象征性的语言而闻名。
    ar: قصيدة هيانغا من عهد مملكة شيلا تمدح جمال الشباب لـ كيبارانغ، وهو هورانغ. وهي واحدة من 14 قصيدة
      هيانغا باقية وتشتهر بلغتها الغنائية والرمزية.
    he: שיר היאנגה מתקופת שילה המשבח את יופיו הנערי של קיפאראנג, הוואראנג. זהו אחד מ-14 שירי ההיאנגה הקיימים
      וידוע בשפה הלירית והסמלית שלו.
