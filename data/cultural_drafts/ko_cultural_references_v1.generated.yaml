  short_explanation: Princess Bari is a shamanic myth about the abandoned princess who journeys to the
    underworld to save her parents, becoming a goddess of shamanism. It is a foundational narrative for
    Korean shamanic rituals and represents filial piety.
  i18n_explanations:
    en: Princess Bari is a shamanic myth about the abandoned princess who journeys to the underworld to
      save her parents, becoming a goddess of shamanism. It is a foundational narrative for Korean shamanic
      rituals and represents filial piety.
    es: La princesa Bari es un mito chamánico sobre la princesa abandonada que viaja al inframundo para
      salvar a sus padres, convirtiéndose en una diosa del chamanismo. Es una narrativa fundacional para
      los rituales chamánicos coreanos y representa la piedad filial.
    fr: La princesse Bari est un mythe chamanique sur la princesse abandonnée qui voyage dans les enfers
      pour sauver ses parents, devenant une déesse du chamanisme. C'est un récit fondateur pour les rituels
      chamaniques coréens et représente la piété filiale.
    de: Prinzessin Bari ist ein schamanischer Mythos über die verlassene Prinzessin, die in die Unterwelt
      reist, um ihre Eltern zu retten, und zur Göttin des Schamanismus wird. Es ist eine grundlegende
      Erzählung für koreanische schamanische Rituale und steht für kindliche Pietät.
    it: La principessa Bari è un mito sciamanico sulla principessa abbandonata che viaggia negli inferi
      per salvare i suoi genitori, diventando una dea dello sciamanesimo. È una narrazione fondamentale
      per i rituali sciamanici coreani e rappresenta la pietà filiale.
    pt: A princesa Bari é um mito xamânico sobre a princesa abandonada que viaja ao submundo para salvar
      seus pais, tornando-se uma deusa do xamanismo. É uma narrativa fundamental para os rituais xamânicos
      coreanos e representa a piedade filial.
    ru: Принцесса Бари — шаманский миф о брошенной принцессе, которая отправляется в подземный мир, чтобы
      спасти своих родителей, и становится богиней шаманизма. Это основополагающее повествование для корейских
      шаманских ритуалов, олицетворяющее сыновнюю почтительность.
    ja: バリ公主は、捨てられた王女が両親を救うために冥界を旅し、シャーマニズムの女神になるというシャーマン神話です。韓国のシャーマン儀礼の基盤となる物語であり、孝行を象徴しています。
    zh: 巴里公主是一个萨满神话，讲述被遗弃的公主前往冥界拯救父母，成为萨满教女神的故事。它是韩国萨满仪式的基础叙事，代表了孝道。
    ar: الأميرة باري هي أسطورة شامانية عن الأميرة المهجورة التي تسافر إلى العالم السفلي لإنقاذ والديها،
      لتصبح إلهة الشامانية. إنها قصة تأسيسية للطقوس الشامانية الكورية وتمثل البر بالوالدين.
    he: הנסיכה בארי היא מיתוס שמאני על נסיכה נטושה שנוסעת לעולם התחתון כדי להציל את הוריה, והופכת לאלת
      השמאניזם. זהו סיפור יסוד לטקסים שמאניים קוריאניים ומייצג כיבוד אב ואם.
