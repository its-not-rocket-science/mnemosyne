      cristãos coreanos.
    ru: «Нагорная проповедь» из Евангелия от Матфея, собрание учений Иисуса, включая Заповеди блаженства.
      Это основополагающий текст для христианской этики, широко цитируемый в корейских христианских контекстах.
    ja: マタイによる福音書の「山上の垂訓」、イエスの教えの集大成で、至福の教えを含む。キリスト教倫理の基礎的なテキストであり、韓国のキリスト教文脈で広く引用されている。
    zh: 《马太福音》中的'登山宝训'，是耶稣教导的集合，包括八福。它是基督教伦理的基础文本，在韩国基督教背景中被广泛引用。
    ar: الموعظة على الجبل من إنجيل متى، مجموعة من تعاليم يسوع بما في ذلك التطويبات. إنه نص أساسي للأخلاق
