  short_explanation: The myth of Orpheus and Eurydice—where Orpheus loses his wife to the underworld due
    to his doubt—represents the power of art, love, and the consequences of human frailty. It is a recurring
    motif in Portuguese poetry and music.
  i18n_explanations:
    en: The myth of Orpheus and Eurydice—where Orpheus loses his wife to the underworld due to his doubt—represents
      the power of art, love, and the consequences of human frailty. It is a recurring motif in Portuguese
      poetry and music.
    es: El mito de Orfeo y Eurídice—donde Orfeo pierde a su esposa en el inframundo por su duda—representa
      el poder del arte, el amor y las consecuencias de la fragilidad humana. Es un motivo recurrente
      en la poesía y música portuguesas.
    fr: Le mythe d'Orphée et Eurydice—où Orphée perd son épouse aux enfers à cause de son doute—représente
      le pouvoir de l'art, de l'amour et les conséquences de la faiblesse humaine. C'est un motif récurrent
      dans la poésie et la musique portugaises.
    de: Der Mythos von Orpheus und Eurydike—bei dem Orpheus seine Frau durch seinen Zweifel an die Unterwelt
      verliert—repräsentiert die Macht der Kunst, der Liebe und die Folgen menschlicher Schwäche. Er ist
      ein wiederkehrendes Motiv in der portugiesischen Dichtung und Musik.
    it: Il mito di Orfeo ed Euridice—dove Orfeo perde la moglie nell'oltretomba a causa del suo dubbio—rappresenta
      il potere dell'arte, dell'amore e le conseguenze della fragilità umana. È un motivo ricorrente nella
      poesia e nella musica portoghesi.
    pt: O mito de Orfeu e Eurídice—no qual Orfeu perde sua esposa no submundo por sua dúvida—representa
      o poder da arte, do amor e as consequências da fragilidade humana. É um motivo recorrente na poesia
      e música portuguesas.
    ru: Миф об Орфее и Эвридике—где Орфей теряет жену в подземном мире из-за своего сомнения—олицетворяет
      силу искусства, любви и последствия человеческой слабости. Это повторяющийся мотив в португальской
      поэзии и музыке.
    ja: オルフェウスとエウリュディケの神話—オルフェウスが疑いゆえに妻を冥界に失う—は、芸術、愛、そして人間の脆さの帰結の力を象徴する。ポルトガルの詩と音楽における繰り返しのモチーフである。
    zh: 俄耳甫斯与欧律狄克的神话——俄耳甫斯因怀疑而失去妻子于冥界——代表了艺术与爱的力量以及人类脆弱的后果。这是葡萄牙诗歌和音乐中的反复出现的主题。
    ar: أسطورة أورفيوس ويوريديس—حيث يخسر أورفيوس زوجته في العالم السفلي بسبب شكه—تمثل قوة الفن والحب وعواقب
      الضعف البشري. إنه موضوع متكرر في الشعر والموسيقى البرتغاليتين.
    he: מיתוס אורפאוס ואורידיקה—שבו אורפאוס מאבד את אשתו לעולם התחתון בשל ספקו—מייצג את כוחה של האמנות,
      האהבה וההשלכות של חולשת האדם. זהו מוטיב חוזר בשירה ובמוזיקה הפורטוגלית.
