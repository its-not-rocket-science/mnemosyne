      bedeutenden Ergebnis.
    it: Goccia a goccia si scava la pietra. Piccoli sforzi costanti si accumulano per ottenere un risultato
      significativo nel tempo.
    pt: Grão a grão enche a galinha o papo. Pequenos esforços constantes se acumulam para alcançar um
      resultado significativo ao longo do tempo.
