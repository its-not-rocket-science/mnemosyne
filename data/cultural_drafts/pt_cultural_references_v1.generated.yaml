      60 years of Iberian union. Symbolizes national sovereignty and resistance.
    es: El levantamiento de 1640 que restauró la independencia portuguesa de España bajo el rey Juan IV,
      poniendo fin a 60 años de unión ibérica. Simboliza soberanía nacional y resistencia.
    fr: Le soulèvement de 1640 qui rétablit l'indépendance du Portugal vis-à-vis de l'Espagne sous le
