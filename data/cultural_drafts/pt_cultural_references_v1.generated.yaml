  short_explanation: A Greek myth where Prometheus steals fire from the gods to give to humans, symbolizing
    defiance, sacrifice, and the pursuit of knowledge despite punishment.
  i18n_explanations:
    en: A Greek myth where Prometheus steals fire from the gods to give to humans, symbolizing defiance,
      sacrifice, and the pursuit of knowledge despite punishment.
    es: Un mito griego en el que Prometeo roba el fuego a los dioses para dárselo a los humanos, simbolizando
      rebeldía, sacrificio y la búsqueda del conocimiento a pesar del castigo.
    fr: Un mythe grec où Prométhée vole le feu aux dieux pour l'offrir aux humains, symbolisant la rébellion,
      le sacrifice et la quête du savoir malgré le châtiment.
    de: Ein griechischer Mythos, in dem Prometheus den Göttern das Feuer stiehlt, um es den Menschen zu
      geben, Symbol für Auflehnung, Opferbereitschaft und den Drang nach Wissen trotz Strafe.
    it: Un mito greco in cui Prometeo ruba il fuoco agli dei per darlo agli uomini, simbolizzando ribellione,
      sacrificio e la ricerca della conoscenza nonostante la punizione.
    pt: Um mito grego em que Prometeu rouba o fogo dos deuses para dá-lo aos humanos, simbolizando rebeldia,
      sacrifício e a busca pelo conhecimento apesar da punição.
    ru: Греческий миф, в котором Прометей крадет огонь у богов, чтобы отдать его людям, символ неповиновения,
      самопожертвования и стремления к знаниям несмотря на наказание.
    ja: プロメテウスが神々から火を盗み人間に与えるギリシャ神話。反抗、犠牲、そして罰にもかかわらず知識を追求することを象徴する。
    zh: 希腊神话中，普罗米修斯从众神那里偷取火种给人类，象征反抗、牺牲与追求知识的坚持。
    ar: أسطورة يونانية يسرق فيها بروميثيوس النار من الآلهة ليعطيها للبشر، ترمز إلى التمرد والتضحية والسعي
      وراء المعرفة رغم العقاب.
    he: מיתוס יווני שבו פרומתאוס גונב אש מן האלים כדי לתת לבני אדם, מסמל מרד, הקרבה ורדיפת ידע למרות העונש.
