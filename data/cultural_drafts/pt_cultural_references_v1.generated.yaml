- id: pt_cultural_reference_a_revolução_dos_cravos_25_de_abril_de_1974_3b45baa7
  language: pt
  canonical_reference: a Revolução dos Cravos (25 de Abril de 1974)
  reference_type: cultural_reference
  surface_patterns:
