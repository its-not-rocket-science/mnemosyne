  short_explanation: A medieval legend about Saint George, a Christian knight who slays a dragon to save
    a princess, symbolizing the triumph of good over evil. It is a foundational myth in Portuguese and
    European chivalric tradition.
  i18n_explanations:
    en: A medieval legend about Saint George, a Christian knight who slays a dragon to save a princess,
      symbolizing the triumph of good over evil. It is a foundational myth in Portuguese and European
      chivalric tradition.
    es: Una leyenda medieval sobre San Jorge, un caballero cristiano que mata a un dragón para salvar
      a una princesa, simbolizando la victoria del bien sobre el mal. Es un mito fundacional en la tradición
      caballeresca portuguesa y europea.
    fr: Une légende médiévale sur saint Georges, un chevalier chrétien qui tue un dragon pour sauver une
      princesse, symbolisant la victoire du bien sur le mal. C'est un mythe fondateur de la tradition
      chevaleresque portugaise et européenne.
    de: Eine mittelalterliche Legende über den heiligen Georg, einen christlichen Ritter, der einen Drachen
      tötet, um eine Prinzessin zu retten, und damit den Sieg des Guten über das Böse symbolisiert. Sie
      ist ein grundlegender Mythos der portugiesischen und europäischen Rittertradition.
    it: Una leggenda medievale su san Giorgio, un cavaliere cristiano che uccide un drago per salvare
      una principessa, simboleggiando la vittoria del bene sul male. È un mito fondante della tradizione
      cavalleresca portoghese ed europea.
    pt: Uma lenda medieval sobre São Jorge, um cavaleiro cristão que mata um dragão para salvar uma princesa,
      simbolizando a vitória do bem sobre o mal. É um mito fundacional na tradição cavalheiresca portuguesa
      e europeia.
    ru: Средневековая легенда о святом Георгии, христианском рыцарe, убившем дракона, чтобы спасти принцессу,
      символизируя победу добра над злом. Это основополагающий миф португальской и европейской рыцарской
      традиции.
    ja: 中世の伝説で、聖ジョージ（騎士）がドラゴンを退治して姫を救う。善の悪に対する勝利を象徴し、ポルトガルとヨーロッパの騎士道伝統の基礎となる神話。
    zh: 中世纪传说，基督教骑士圣乔治杀死恶龙救出公主，象征着正义战胜邪恶。它是葡萄牙和欧洲骑士传统的基础神话。
    ar: أسطورة من القرون الوسطى عن القديس جاورجيوس، فارس مسيحي يقتل تنينًا لإنقاذ أميرة، مما يرمز إلى
