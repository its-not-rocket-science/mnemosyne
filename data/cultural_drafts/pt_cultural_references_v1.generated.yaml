      resulting in the latter's defeat and death, consolidating royal power in Portugal.
    es: Una batalla de la guerra civil entre las fuerzas del rey Afonso V y su tío, el Duque de Coimbra,
      que resultó en la derrota y muerte de este último, consolidando el poder real en Portugal.
    fr: Une bataille de la guerre civile opposant les forces du roi Afonso V à celles de son oncle, le
      duc de Coimbra, aboutissant à la défaite et à la mort de ce dernier, consolidant ainsi le pouvoir
      royal au Portugal.
    de: Eine Schlacht des Bürgerkriegs zwischen den Truppen von König Afonso V und seinem Onkel, dem Herzog
      von Coimbra, die mit der Niederlage und dem Tod des Letzteren endete und die königliche Macht in
      Portugal festigte.
    it: Una battaglia della guerra civile combattuta tra le forze del re Afonso V e quelle di suo zio,
      il duca di Coimbra, che portò alla sconfitta e alla morte di quest'ultimo, consolidando il potere
      reale in Portogallo.
    pt: Uma batalha da guerra civil travada entre as forças do rei Afonso V e as de seu tio, o Duque de
      Coimbra, resultando na derrota e morte deste último, consolidando o poder real em Portugal.
    ru: Сражение гражданской войны между войсками короля Афонсу V и его дяди, герцога Коимбрского, завершившееся
      поражением и гибелью последнего и укрепившее королевскую власть в Португалии.
    ja: 1449年の内戦であるアルファロベイラの戦いは、国王アフォンソ5世とその叔父であるコインブラ公との間で戦われ、後者の敗北と死をもたらし、ポルトガルにおける王権の強化につながりました。
    zh: 1449年阿尔法罗贝拉战役是一场内战，交战双方为国王阿方索五世与其叔父科英布拉公爵，后者战败身亡，王权在葡萄牙得以巩固。
    ar: معركة أهلية دارت بين قوات الملك أفونسو الخامس وعمه، دوق كويمبرا، مما أدى إلى هزيمة الأخير وموته،
