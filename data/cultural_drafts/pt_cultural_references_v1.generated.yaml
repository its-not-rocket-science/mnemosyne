  short_explanation: A biblical parable from the Gospel of Luke about a rich man who ignores a poor beggar
    (Lazarus) at his gate, only to face damnation after death. It teaches moral lessons about compassion
    and humility.
  i18n_explanations:
    en: A biblical parable from the Gospel of Luke about a rich man who ignores a poor beggar (Lazarus)
      at his gate, only to face damnation after death. It teaches moral lessons about compassion and humility.
    es: Una parábola bíblica del Evangelio de Lucas sobre un hombre rico que ignora a un pobre mendigo
      (Lázaro) a su puerta, solo para enfrentar la condenación después de la muerte. Enseña lecciones
      morales sobre compasión y humildad.
    fr: Une parabole biblique de l'Évangile selon Luc sur un homme riche qui ignore un pauvre mendiant
      (Lazare) à sa porte, pour finalement faire face à la damnation après la mort. Elle enseigne des
      leçons morales sur la compassion et l'humilité.
    de: Ein biblisches Gleichnis aus dem Lukasevangelium über einen reichen Mann, der einen armen Bettler
      (Lazarus) an seiner Tür ignoriert, nur um nach dem Tod der Verdammnis anheimzufallen. Es vermittelt
      moralische Lehren über Mitgefühl und Demut.
    it: Una parabola biblica del Vangelo di Luca su un uomo ricco che ignora un povero mendicante (Lazzaro)
      alla sua porta, per poi affrontare la dannazione dopo la morte. Insegna lezioni morali sulla compassione
      e l'umiltà.
    pt: Uma parábola bíblica do Evangelho de Lucas sobre um homem rico que ignora um pobre mendigo (Lázaro)
      à sua porta, para enfrentar a danação após a morte. Ensina lições morais sobre compaixão e humildade.
    ru: Библейская притча из Евангелия от Луки о богаче, который игнорирует бедного нищего (Лазаря) у
      своих ворот, чтобы в итоге после смерти столкнуться с проклятием. Она учит моральным урокам сострадания
      и смирения.
    ja: ルカによる福音書の寓話で、金持ちが門前の貧しい乞食（ラザロ）を無視し、死後に罰を受ける。慈悲と謙虚の道徳的教訓を説く。
    zh: 《路加福音》中的一个圣经寓言，讲述一个富人忽视门前的穷乞丐（拉撒路），最终死后面临惩罚。它传达了关于同情与谦卑的道德教训。
    ar: مثل من الإنجيل بحسب لوقا عن رجل غني تجاهل فقيرًا متسولًا (لعازر) عند بابه، ليواجه العقاب بعد الموت.
