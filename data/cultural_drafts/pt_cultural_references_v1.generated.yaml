- id: pt_classical_or_scriptural_allusion_o_mito_de_sísifo_ce40f7f9
  language: pt
  canonical_reference: o Mito de Sísifo
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - o Mito de Sísifo
  - Mito de Sísifo
  - Sísifo
  short_explanation: A Greek myth where Sisyphus is condemned to eternally roll a boulder up a hill, only
    for it to roll back down, symbolizing futile effort or absurdity.
  i18n_explanations:
    en: A Greek myth where Sisyphus is condemned to eternally roll a boulder up a hill, only for it to
      roll back down, symbolizing futile effort or absurdity.
    es: Un mito griego en el que Sísifo es condenado a empujar eternamente una roca cuesta arriba, solo
      para que ruede de vuelta abajo, simbolizando esfuerzo vano o absurdidad.
    fr: Un mythe grec où Sisyphe est condamné à pousser éternellement un rocher en haut d'une colline,
      pour le voir redescendre, symbolisant l'effort vain ou l'absurdité.
    de: Ein griechischer Mythos, in dem Sisyphos dazu verurteilt ist, ewig einen Felsen einen Hügel hinaufzurollen,
      der dann wieder hinunterrollt, Symbol für vergebliche Mühe oder Absurdität.
    it: Un mito greco in cui Sisifo è condannato a spingere eternamente un masso su per una collina, solo
      per vederlo rotolare di nuovo giù, simbolo di sforzo vano o assurdità.
    pt: Um mito grego em que Sísifo é condenado a empurrar eternamente uma pedra morro acima, só para
      que ela role de volta, simbolizando esforço vão ou absurdidade.
    ru: Греческий миф, в котором Сизиф осужден вечно катить валун вверх по холму, который затем скатывается
      обратно, символ тщетных усилий или абсурда.
    ja: シジフォスが永遠に岩を丘の上まで転がす罰を受けるギリシャ神話で、岩が転がり落ちることを繰り返し、無駄な努力や不条理を象徴する。
    zh: 希腊神话中，西西弗斯被判永远将巨石推上山顶，巨石却总是滚落，象征徒劳的努力或荒诞。
    ar: أسطورة يونانية يُحكم فيها سيسيفوس بدفع صخرة إلى أعلى تل إلى الأبد، لتعود وتسقط، ترمز إلى الجهد
      العقيم أو العبثية.
    he: מיתוס יווני שבו סיזיפוס נידון לדחוף סלע במעלה גבעה לנצח, רק כדי שיתגלגל למטה שוב, מסמל מאמץ לשווא
      או אבסורד.
