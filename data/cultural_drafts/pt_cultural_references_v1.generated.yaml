- id: pt_classical_or_scriptural_allusion_a_caixa_de_pandora_890d9532
  language: pt
  canonical_reference: a Caixa de Pandora
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - a Caixa de Pandora
  - Caixa de Pandora
  short_explanation: A myth where Pandora opens a box (or jar) releasing all the evils of the world, leaving
    only hope inside. It symbolizes unintended consequences and the introduction of suffering.
  i18n_explanations:
    en: A myth where Pandora opens a box (or jar) releasing all the evils of the world, leaving only hope
      inside. It symbolizes unintended consequences and the introduction of suffering.
    es: Un mito en el que Pandora abre una caja (o jarra) liberando todos los males del mundo, dejando
      solo la esperanza dentro. Simboliza consecuencias no deseadas y la introducción del sufrimiento.
    fr: Un mythe où Pandore ouvre une boîte (ou un vase) libérant tous les maux du monde, ne laissant
      que l'espoir à l'intérieur. Il symbolise les conséquences imprévues et l'introduction de la souffrance.
    de: Ein Mythos, in dem Pandora eine Büchse (oder ein Gefäß) öffnet und alle Übel der Welt freisetzt,
      wobei nur die Hoffnung zurückbleibt. Er symbolisiert ungewollte Folgen und das Hereinbrechen des
      Leidens.
    it: Un mito in cui Pandora apre una scatola (o un vaso) liberando tutti i mali del mondo, lasciando
      solo la speranza all'interno. Simboleggia conseguenze indesiderate e l'introduzione della sofferenza.
    pt: Um mito em que Pandora abre uma caixa (ou jarra) libertando todos os males do mundo, deixando
      apenas a esperança dentro. Simboliza consequências não intencionais e a introdução do sofrimento.
    ru: Миф, в котором Пандора открывает ящик (или сосуд), выпуская все беды мира, оставляя внутри только
      надежду. Символ непреднамеренных последствий и появления страданий.
    ja: パンドラが箱（または壺）を開け、世界のあらゆる災いを解き放ち、希望だけが残るギリシャ神話。意図しない結果と苦しみの導入を象徴する。
    zh: 潘多拉打开一个盒子（或罐子），释放出世间所有的邪恶，只留下希望在内。象征无意的后果与苦难的引入。
    ar: أسطورة تفتح فيها باندورا صندوقًا (أو جرة) لتطلق كل شرور العالم، تاركة الأمل فقط بداخله. ترمز إلى
      العواقب غير المقصودة وإدخال المعاناة.
    he: מיתוס שבו פנדורה פותחת קופסה (או כד) ומשחררת את כל הרעות בעולם, ומשאירה תקווה בלבד בפנים. מסמל
      השלכות בלתי מכוונות והכנסת סבל.
