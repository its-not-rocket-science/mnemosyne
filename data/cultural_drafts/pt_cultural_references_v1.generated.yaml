  short_explanation: Mythological creature with the body of a man and the head of a bull, trapped in the
    Labyrinth of Crete. Theseus killed it with Ariadne's help. Symbolizes complex problems and the need
    for clever solutions.
  i18n_explanations:
    en: Mythological creature with the body of a man and the head of a bull, trapped in the Labyrinth
      of Crete. Theseus killed it with Ariadne's help. Symbolizes complex problems and the need for clever
      solutions.
    es: Criatura mitológica con cuerpo de hombre y cabeza de toro, atrapada en el Laberinto de Creta.
      Teseo la mató con la ayuda de Ariadna. Simboliza problemas complejos y la necesidad de soluciones
      ingeniosas.
    fr: Créature mythologique au corps d'homme et à la tête de taureau, piégée dans le Labyrinthe de Crète.
      Thésée la tua avec l'aide d'Ariane. Symbolise les problèmes complexes et la nécessité de solutions
      ingénieuses.
    de: Mythologische Kreatur mit dem Körper eines Mannes und dem Kopf eines Stiers, gefangen im Labyrinth
      von Kreta. Theseus tötete sie mit Hilfe von Ariadne. Symbolisiert komplexe Probleme und die Notwendigkeit
      kluger Lösungen.
    it: Creatura mitologica dal corpo d'uomo e dalla testa di toro, rinchiusa nel Labirinto di Creta.
      Teseo la uccise con l'aiuto di Arianna. Simboleggia problemi complessi e la necessità di soluzioni
      ingegnose.
    pt: Criatura mitológica com corpo de homem e cabeça de touro, presa no Labirinto de Creta. Teseu a
      matou com a ajuda de Ariadne. Simboliza problemas complexos e a necessidade de soluções engenhosas.
    ru: Мифологическое существо с телом человека и головой быка, запертое в лабиринте Крита. Тесей убил
      его с помощью Ариадны. Символизирует сложные проблемы и необходимость находчивых решений.
    ja: クレタの迷宮に閉じ込められた牛頭人身のミノタウロス。テセウスがアリアドネの助けでこれを退治した。複雑な問題と巧妙な解決策の必要性を象徴する。
    zh: 克里特迷宫中被困的牛头人身怪物弥诺陶洛斯。忒修斯在阿里阿德涅的帮助下杀死了它。象征着复杂问题及需要巧妙的解决方案。
    ar: ' كائن أسطوري بجسد إنسان ورأس ثور، محبوس في متاهة كريت. قتله ثيسيوس بمساعدة أريادن. يرمز إلى المشاكل
      المعقدة والحاجة إلى حلول ذكية.'
    he: יצור מיתולוגי בעל גוף אדם וראש שור, שהיה כלוא במבוך של כרתים. תזאוס הרג אותו בעזרתה של אריאדנה.
