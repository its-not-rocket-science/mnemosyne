  short_explanation: The 1578 battle in Morocco where King Sebastian of Portugal died, leading to a dynastic
    crisis and the union of the Portuguese and Spanish crowns under Philip II. Symbolizes national tragedy
    and decline.
  i18n_explanations:
    en: The 1578 battle in Morocco where King Sebastian of Portugal died, leading to a dynastic crisis
      and the union of the Portuguese and Spanish crowns under Philip II. Symbolizes national tragedy
      and decline.
    es: La batalla de 1578 en Marruecos donde murió el rey Sebastián de Portugal, provocando una crisis
      dinástica y la unión de las coronas portuguesa y española bajo Felipe II. Simboliza tragedia y declive
      nacional.
    fr: La bataille de 1578 au Maroc où le roi Sébastien du Portugal mourut, entraînant une crise dynastique
      et l'union des couronnes portugaise et espagnole sous Philippe II. Symbole de tragédie et de déclin
      national.
    de: Die Schlacht von 1578 in Marokko, in der König Sebastian von Portugal starb, was zu einer dynastischen
      Krise und der Vereinigung der portugiesischen und spanischen Kronen unter Philipp II. führte. Symbolisiert
      nationale Tragödie und Niedergang.
    it: La battaglia del 1578 in Marocco in cui morì il re Sebastiano del Portogallo, portando a una crisi
      dinastica e all'unione delle corone portoghese e spagnola sotto Filippo II. Simboleggia tragedia
      e declino nazionale.
    pt: A batalha de 1578 em Marrocos onde o rei Sebastião de Portugal morreu, levando a uma crise dinástica
      e à união das coroas portuguesa e espanhola sob Filipe II. Simboliza tragédia e declínio nacional.
    ru: Битва 1578 года в Марокко, в которой погиб португальский король Себастьян, что привело к династическому
      кризису и объединению португальской и испанской корон под властью Филиппа II. Символизирует национальную
      трагедию и упадок.
    ja: 1578年にモロッコで行われた戦いで、ポルトガル王セバスティアンが戦死し、王朝の危機とポルトガル・スペイン両王冠のフェリペ2世による統合につながった。国家の悲劇と衰退の象徴。
    zh: 1578年摩洛哥战役中葡萄牙国王塞巴斯蒂安阵亡，引发王朝危机，葡萄牙与西班牙王冠在菲利普二世统治下合并。象征着国家悲剧与衰落。
    ar: المعركة التي وقعت عام 1578 في المغرب حيث توفي الملك سباستيان ملك البرتغال، مما أدى إلى أزمة دستورية
      ودمج التاجين البرتغالي والإسباني تحت حكم فيليب الثاني. ترمز إلى المأساة الوطنية والانحدار.
    he: הקרב בשנת 1578 במרוקו בו נהרג מלך פורטוגל סבסטיאן, שהוביל למשבר שושלתי ולאיחוד הכתרים הפורטוגלי
