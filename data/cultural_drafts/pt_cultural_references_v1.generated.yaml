  short_explanation: Barking dogs seldom bite. Suggests that those who make a lot of noise or threats
    are often harmless, while those who are silent may be more dangerous.
  i18n_explanations:
    en: Barking dogs seldom bite. Suggests that those who make a lot of noise or threats are often harmless,
      while those who are silent may be more dangerous.
    es: Perro ladrador, poco mordedor. Indica que quienes hacen mucho ruido o amenazas suelen ser inofensivos,
      mientras que los silenciosos pueden ser más peligrosos.
    fr: Chien qui aboie ne mord pas. Suggère que ceux qui font beaucoup de bruit ou de menaces sont souvent
      inoffensifs, tandis que les silencieux peuvent être plus dangereux.
    de: Hunde, die bellen, beißen nicht. Besagt, dass diejenigen, die viel Lärm machen oder drohen, oft
      harmlos sind, während Schweigsame gefährlicher sein können.
    it: Cane che abbaia non morde. Suggerisce che chi fa molto rumore o minacce è spesso innocuo, mentre
      chi tace può essere più pericoloso.
    pt: Cachorro que late não morde. Indica que quem faz muito barulho ou ameaças geralmente é inofensivo,
      enquanto os quietos podem ser mais perigosos.
    ru: Лающая собака не кусает. Говорит о том, что те, кто много шумит или угрожает, часто безвредны,
      а молчаливые могут быть опаснее.
