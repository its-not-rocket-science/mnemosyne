      divina.
    pt: Um conto popular português sobre um frei franciscano que vive despreocupado, simbolizando o ideal
      de desapego das preocupações mundanas. Reflete os valores de humildade e confiança na providência
      divina.
    ru: Португальская народная сказка о францисканском монахе, живущем без забот, олицетворяющем идеал
      отрешенности от мирских тревог. Она отражает ценности смирения и доверия к божественному провидению.
    ja: ポルトガルの民話で、世俗の心配から解放されたフランシスコ会の修道士の生き方を象徴する。謙遜と神の摂理への信頼という価値観を反映している。
    zh: 葡萄牙民间故事，讲述一个无忧无虑生活的方济各会修士，象征着超脱世俗烦恼的理想。体现了谦卑与对神圣天意的信任。
    ar: حكاية شعبية برتغالية عن راهب فرنسيسكاني يعيش بلا هموم، يرمز إلى المثل العليا للابتعاد عن هموم
