  short_explanation: The myth of the Sirens—creatures whose songs lure sailors to their doom—symbolizes
    irresistible temptation and the dangers of distraction. In Portuguese literature, it often represents
    the allure of the unknown or forbidden.
  i18n_explanations:
    en: The myth of the Sirens—creatures whose songs lure sailors to their doom—symbolizes irresistible
      temptation and the dangers of distraction. In Portuguese literature, it often represents the allure
      of the unknown or forbidden.
    es: El mito de las Sirenas—criaturas cuyo canto atrae a los marineros a la perdición—simboliza la
      tentación irresistible y los peligros de la distracción. En la literatura portuguesa, suele representar
      el atractivo de lo desconocido o prohibido.
    fr: Le mythe des Sirènes—créatures dont le chant attire les marins vers leur perte—symbolise la tentation
      irrésistible et les dangers de la distraction. Dans la littérature portugaise, il représente souvent
      l'attrait de l'inconnu ou de l'interdit.
    de: Der Mythos der Sirenen—Wesen, deren Gesang Seeleute in den Untergang lockt—symbolisiert unwiderstehliche
      Versuchung und die Gefahren der Ablenkung. In der portugiesischen Literatur steht er oft für die
      Verlockung des Unbekannten oder Verbotenen.
    it: Il mito delle Sirene—creature il cui canto attira i marinai verso la rovina—simboleggia la tentazione
      irresistibile e i pericoli della distrazione. Nella letteratura portoghese, spesso rappresenta l'attrattiva
      dell'ignoto o del proibito.
    pt: O mito das Sereias—criaturas cujo canto atrai marinheiros à perdição—simboliza a tentação irresistível
      e os perigos da distração. Na literatura portuguesa, muitas vezes representa a sedução do desconhecido
      ou do proibido.
    ru: Миф о Сиренах—существах, чьи песни заманивают моряков к гибели—символизирует неодолимое искушение
      и опасность отвлечения. В португальской литературе он часто олицетворяет соблазн неизведанного или
      запретного.
    ja: セイレーンの神話—その歌声が船乗りを破滅へと誘う生物—は、抗いがたい誘惑と気を散らす危険を象徴する。ポルトガル文学では、しばしば未知や禁忌への魅力を表す。
    zh: 塞壬的神话——那些用歌声诱惑水手走向毁灭的生物——象征着不可抗拒的诱惑和分心的危险。在葡萄牙文学中，它常常代表对未知或禁忌的诱惑。
    ar: أسطورة السirenes—كائنات تغري البحارة بالغرق في هلاكهم بأغانيها—ترمز إلى الإغراء الذي لا يقاوم
      وأخطار التشتت. في الأدب البرتغالي، غالبًا ما تمثل جاذبية المجهول أو المحرم.
    he: מיתוס הסירנות—יצורים ששרותיהם מושכות מלחים אל כלותם—מסמל את הפיתוי הבלתי-נשלט ואת סכנות ההסחה.
      בספרות הפורטוגלית הוא מייצג לעיתים קרובות את המשיכה אל הבלתי-נודע או אל האסור.
