- id: pt_cultural_reference_a_batalha_de_valdevez_1141_4846f970
  language: pt
  canonical_reference: a Batalha de Valdevez (1141)
  reference_type: cultural_reference
  surface_patterns:
  - Batalha de Valdevez
  - Combate de Valdevez
  - Batalha de São Mamede (1128) e Valdevez (1141)
  - Guerra entre Afonso Henriques e Afonso VII
  short_explanation: A military confrontation in 1141 between Afonso Henriques of Portugal and Afonso
    VII of León, consolidating Portuguese independence. Often linked to the earlier Battle of São Mamede
    (1128), it is a key event in the Reconquista and Portuguese nation-building.
  i18n_explanations:
    en: A military confrontation in 1141 between Afonso Henriques of Portugal and Afonso VII of León,
      consolidating Portuguese independence. Often linked to the earlier Battle of São Mamede (1128),
      it is a key event in the Reconquista and Portuguese nation-building.
    es: Enfrentamiento militar en 1141 entre Afonso Henriques de Portugal y Afonso VII de León, que consolidó
      la independencia portuguesa. A menudo vinculado a la anterior Batalla de São Mamede (1128), es un
      evento clave en la Reconquista y la construcción nacional portuguesa.
    fr: Affrontement militaire en 1141 entre Afonso Henriques du Portugal et Afonso VII de León, consolidant
      l'indépendance portugaise. Souvent lié à la précédente Bataille de São Mamede (1128), c'est un événement
      clé de la Reconquista et de la construction nationale portugaise.
    de: Eine militärische Auseinandersetzung im Jahr 1141 zwischen Afonso Henriques von Portugal und Afonso
      VII. von León, die die portugiesische Unabhängigkeit festigte. Oft mit der früheren Schlacht von
      São Mamede (1128) verbunden, ist sie ein Schlüsselereignis der Reconquista und des portugiesischen
      Nationenaufbaus.
    it: Uno scontro militare nel 1141 tra Afonso Henriques del Portogallo e Afonso VII di León, che consolidò
      l'indipendenza portoghese. Spesso collegato alla precedente Battaglia di São Mamede (1128), è un
      evento chiave della Reconquista e della costruzione nazionale portoghese.
    pt: Confronto militar em 1141 entre Afonso Henriques de Portugal e Afonso VII de Leão, que consolidou
      a independência portuguesa. Frequentemente ligado à anterior Batalha de São Mamede (1128), é um
      evento-chave na Reconquista e na construção da nação portuguesa.
    ru: Военное столкновение в 1141 году между Афонсу Энрикешем Португальским и Альфонсо VII Леонским,
      закрепившее независимость Португалии. Часто связывается с более ранней битвой при Сан-Мамеде (1128)
      и является ключевым событием Реконкисты и португальского нациестроительства.
    ja: 1141年にポルトガルのアフォンソ・エンriquesとレオンのアフォンソ7世との間で行われた軍事衝突。これによりポルトガルの独立が固まった。1128年のサン・マメデの戦いとしばしば関連付けられ、レコンキスタとポルトガルの国家形成における重要な出来事である。
    zh: 1141年葡萄牙的阿方索·恩里克斯与莱昂的阿方索七世之间的军事冲突，巩固了葡萄牙的独立。这一事件常与更早的圣马梅德战役（1128年）相联系，是收复失地运动和葡萄牙民族建构的关键事件。
    ar: اشتباك عسكري في عام 1141 بين أفونسو هنريكس ملك البرتغال وألفونسو السابع ملك ليون، مما عزز استقلال
      البرتغال. غالبًا ما يرتبط بهذا الحدث السابق معركة سان ماميد (1128)، وهو حدث رئيسي في حروب الاسترداد
      وبناء الأمة البرتغالية.
    he: עימות צבאי בשנת 1141 בין אפונסו אנריקש מלך פורטוגל לאלפונסו השביעי מלך לאון, שהבטיח את עצמאותה
      של פורטוגל. לעיתים קרובות מקושר לקרב סאו מאמדה הקודם (1128), והוא אירוע מרכזי ברקונקיסטה ובבניית
      האומה הפורטוגלית.
