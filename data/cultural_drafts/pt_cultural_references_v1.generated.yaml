  - Cavalo de Tróia
  - o cavalo troiano
  short_explanation: A wooden horse used by the Greeks to infiltrate and conquer Troy, symbolizing deception
    or a hidden threat. It represents a seemingly harmless gift that conceals danger.
  i18n_explanations:
    en: A wooden horse used by the Greeks to infiltrate and conquer Troy, symbolizing deception or a hidden
      threat. It represents a seemingly harmless gift that conceals danger.
    es: Un caballo de madera usado por los griegos para infiltrarse y conquistar Troya, simbolizando engaño
      o una amenaza oculta. Representa un regalo aparentemente inofensivo que esconde peligro.
    fr: Un cheval de bois utilisé par les Grecs pour infiltrer et conquérir Troie, symbolisant la tromperie
      ou une menace cachée. Il représente un cadeau en apparence inoffensif qui dissimule un danger.
    de: Ein hölzernes Pferd, mit dem die Griechen Troja infiltrierten und eroberten, Symbol für Täuschung
      oder eine verborgene Bedrohung. Es steht für ein scheinbar harmloses Geschenk, das Gefahr birgt.
    it: Un cavallo di legno usato dai Greci per infiltrarsi e conquistare Troia, simbolo di inganno o
      minaccia nascosta. Rappresenta un dono apparentemente innocuo che cela un pericolo.
    pt: Um cavalo de madeira usado pelos gregos para infiltrar e conquistar Troia, simbolizando engano
      ou uma ameaça oculta. Representa um presente aparentemente inofensivo que esconde perigo.
    ru: Деревянный конь, использованный греками для проникновения и завоевания Трои, символ обмана или
      скрытой угрозы. Олицетворяет безобидный на вид подарок, таящий опасность.
    ja: トロイを攻略するためにギリシャ人が使った木馬で、欺瞞や隠された脅威を象徴する。一見無害な贈り物が危険を隠すことを表す。
    zh: 希腊人用来渗透并征服特洛伊的木马，象征欺骗或隐藏的威胁。代表一个看似无害的礼物却隐藏危险。
    ar: حصان خشبي استخدمه الإغريق للتسلل وفتح طروادة، يرمز إلى الخداع أو التهديد الخفي. يمثل هدية تبدو
      بريئة تخفي خطرًا.
    he: סוס עץ ששימש את היוונים לחדור ולכבוש את טרויה, מסמל תרמית או איום נסתר. מייצג מתנה תמימה למראה
      שמסתירה סכנה.
