  - Tomada de Lisboa aos mouros
  - Afonso Henriques entra em Lisboa
  short_explanation: The recapture of Lisbon from the Moors in 1147 by Afonso Henriques, with the support
    of the Second Crusade. This event was crucial for the expansion of the Kingdom of Portugal and its
    consolidation as a Christian state.
  i18n_explanations:
    en: The recapture of Lisbon from the Moors in 1147 by Afonso Henriques, with the support of the Second
      Crusade. This event was crucial for the expansion of the Kingdom of Portugal and its consolidation
      as a Christian state.
    es: La reconquista de Lisboa a los musulmanes en 1147 por Afonso Henriques, con el apoyo de la Segunda
      Cruzada. Este evento fue crucial para la expansión del Reino de Portugal y su consolidación como
      estado cristiano.
    fr: La reprise de Lisbonne aux Maures en 1147 par Afonso Henriques, avec le soutien de la Deuxième
      Croisade. Cet événement fut crucial pour l'expansion du Royaume du Portugal et sa consolidation
      en tant qu'État chrétien.
    de: Die Rückeroberung Lissabons von den Mauren im Jahr 1147 durch Afonso Henriques, unterstützt von
      der Zweiten Kreuzzug. Dieses Ereignis war entscheidend für die Ausdehnung des Königreichs Portugal
      und seine Festigung als christlicher Staat.
    it: La riconquista di Lisbona dai Mori nel 1147 da parte di Afonso Henriques, con il sostegno della
      Seconda Crociata. Questo evento fu cruciale per l'espansione del Regno del Portogallo e la sua affermazione
      come stato cristiano.
    pt: A reconquista de Lisboa aos mouros em 1147 por Afonso Henriques, com o apoio da Segunda Cruzada.
      Este evento foi crucial para a expansão do Reino de Portugal e sua consolidação como estado cristão.
    ru: Отвоевание Лиссабона у мавров в 1147 году Афонсу Энрикешем при поддержке Второго крестового похода.
      Это событие стало решающим для расширения Королевства Португалия и его укрепления как христианского
      государства.
    ja: 1147年にアフォンソ・エンriquesが第二回十字軍の支援を受けてムーア人からリスボンを奪回した出来事。この出来事はポルトガル王国の拡大とキリスト教国家としての基盤固めにとって極めて重要であった。
    zh: 1147年阿方索·恩里克斯在第二次十字军支持下从摩尔人手中收复里斯本。这一事件对葡萄牙王国的扩张及其作为基督教国家的巩固至关重要。
    ar: استعادة لشبونة من المسلمين في عام 1147 على يد أفونسو هنريكس، بدعم من الحملة الصليبية الثانية.
      كان لهذا الحدث دور حاسم في توسع مملكة البرتغال وتثبيت هويتها كدولة مسيحية.
    he: כיבוש ליסבון מידי המורים בשנת 1147 על ידי אפונסו אנריקש, בסיוע מסע הצלב השני. אירוע זה היה קריטי
      להתרחבות ממלכת פורטוגל ולהתבססותה כמדינה נוצרית.
