  short_explanation: Mythological creature that terrorized Thebes by posing unsolvable riddles. Oedipus
    solved her riddle, leading to her defeat. Symbolizes intellectual challenges and the consequences
    of solving mysteries.
  i18n_explanations:
    en: Mythological creature that terrorized Thebes by posing unsolvable riddles. Oedipus solved her
      riddle, leading to her defeat. Symbolizes intellectual challenges and the consequences of solving
      mysteries.
    es: Criatura mitológica que aterrorizó a Tebas con acertijos insolubles. Edipo resolvió su enigma,
      lo que llevó a su derrota. Simboliza desafíos intelectuales y las consecuencias de resolver misterios.
    fr: Créature mythologique qui terrorisait Thèbes en posant des énigmes insolubles. Œdipe résolut son
      énigme, entraînant sa défaite. Symbolise les défis intellectuels et les conséquences de résoudre
      des mystères.
    de: Mythologische Kreatur, die Theben mit unlösbaren Rätseln terrorisierte. Ödipus löste ihr Rätsel
      und besiegte sie. Symbolisiert intellektuelle Herausforderungen und die Folgen des Lösens von Rätseln.
    it: Creatura mitologica che terrorizzava Tebe con indovinelli irrisolvibili. Edipo risolse il suo
      enigma, portando alla sua sconfitta. Simboleggia le sfide intellettuali e le conseguenze della risoluzione
      di misteri.
    pt: Criatura mitológica que aterrorizava Tebas com enigmas insolúveis. Édipo resolveu seu enigma,
      levando à sua derrota. Simboliza desafios intelectuais e as consequências de resolver mistérios.
    ru: Мифологическое существо, которое терроризировало Фивы, загадывая неразрешимые загадки. Эдип разгадал
      её загадку, что привело к её поражению. Символизирует интеллектуальные вызовы и последствия разгадывания
      тайн.
    ja: テーバイを恐怖に陥れたスフィンクスは、解けない謎をかけた。オイディプスがその謎を解き、スフィンクスを打ち破った。知的な挑戦と謎解きの結果を象徴する。
    zh: 狮身人面兽通过无法解答的谜语恐吓底比斯。俄狄浦斯解开了她的谜语，导致她的失败。象征着智力挑战及解决谜团的后果。
    ar: ' كائن أسطوري أرهب طيبة بألغاز لا حل لها. حل أوديب لغزها مما أدى إلى هزيمتها. يرمز إلى التحديات
      الفكرية وعواقب حل الألغاز.'
    he: יצור מיתולוגי שהטיל טרור על תבי באמצעות חידות בלתי פתירות. אדיפוס פתר את חידתה, מה שהוביל לתבוסתה.
      מסמל אתגרים אינטלקטואליים וההשלכות של פתרון תעלומות.
