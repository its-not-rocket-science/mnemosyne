    ja: 1383年から1385年にかけてのポルトガル継承危機中の重要な戦いであるアトレイロスの戦いでは、ポルトガル軍がカスティーリャ軍を破り、アヴィス王朝とポルトガル独立への道を開きました。
    zh: 1383–1385年葡萄牙王位继承危机期间的重要战役阿托莱罗斯战役中，葡萄牙军击败卡斯蒂利亚军，为阿维斯王朝和葡萄牙独立铺平了道路。
    ar: معركة مهمة خلال أزمة خلافة البرتغال (1383–1385)، حيث هزم الجيش البرتغالي القوات القشتالية، مما
