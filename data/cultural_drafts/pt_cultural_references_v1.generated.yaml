  short_explanation: Fernando Pessoa's 'A Mensagem' (1934) echoes Virgil's 'Aeneid' in its epic structure
    and themes of destiny and national identity, framing Portugal's historical narrative as a modern epic.
  i18n_explanations:
    en: Fernando Pessoa's 'A Mensagem' (1934) echoes Virgil's 'Aeneid' in its epic structure and themes
      of destiny and national identity, framing Portugal's historical narrative as a modern epic.
    es: La obra 'A Mensagem' (1934) de Fernando Pessoa retoma la 'Eneida' de Virgilio en su estructura
      épica y en los temas del destino y la identidad nacional, presentando la narrativa histórica de
      Portugal como una épica moderna.
    fr: Le poème 'A Mensagem' (1934) de Fernando Pessoa fait écho à l'Énéide de Virgile par sa structure
      épique et ses thèmes du destin et de l'identité nationale, présentant le récit historique du Portugal
      comme une épopée moderne.
    de: Fernando Pessoas 'A Mensagem' (1934) greift in seiner epischen Struktur und den Themen Schicksal
      und nationale Identität auf Vergils 'Aeneis' zurück und rahmt Portugals historischen Narrativ als
      modernes Epos.
    it: '''A Mensagem'' (1934) di Fernando Pessoa riecheggia l''Eneide di Virgilio nella sua struttura
