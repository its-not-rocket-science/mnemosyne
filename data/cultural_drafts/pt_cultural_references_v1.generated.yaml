  short_explanation: The myth of Narcissus—who falls in love with his own reflection—originates the concept
    of narcissism. In Portuguese culture, it symbolizes vanity, self-obsession, and the dangers of excessive
    self-regard.
  i18n_explanations:
    en: The myth of Narcissus—who falls in love with his own reflection—originates the concept of narcissism.
      In Portuguese culture, it symbolizes vanity, self-obsession, and the dangers of excessive self-regard.
    es: El mito de Narciso—que se enamora de su propio reflejo—origina el concepto de narcisismo. En la
      cultura portuguesa, simboliza la vanidad, la obsesión por uno mismo y los peligros del exceso de
      autoestima.
    fr: Le mythe de Narcisse—qui tombe amoureux de son propre reflet—est à l'origine du concept de narcissisme.
      Dans la culture portugaise, il symbolise la vanité, l'obsession de soi et les dangers d'un excès
      d'estime de soi.
    de: Der Mythos von Narziss—der sich in sein eigenes Spiegelbild verliebt—prägt den Begriff des Narzissmus.
      In der portugiesischen Kultur symbolisiert er Eitelkeit, Selbstbesessenheit und die Gefahren übermäßiger
      Selbstachtung.
    it: Il mito di Narciso—che si innamora del proprio riflesso—è all'origine del concetto di narcisismo.
      Nella cultura portoghese, simboleggia la vanità, l'ossessione per sé stessi e i pericoli dell'eccessiva
      autostima.
    pt: O mito de Narciso—que se apaixona por seu próprio reflexo—origina o conceito de narcisismo. Na
      cultura portuguesa, simboliza a vaidade, a obsessão por si mesmo e os perigos do excesso de autoestima.
    ru: Миф о Нарциссе—тот, кто влюбляется в собственное отражение—даёт начало понятию нарциссизма. В
      португальской культуре он символизирует тщеславие, самовлюблённость и опасность чрезмерного самомнения.
    ja: ナルキッソスの神話—自らの姿に恋する—はナルシシズムの概念の起源である。ポルトガル文化では、虚栄心、自己陶酔、そして過度の自尊心の危険を象徴する。
    zh: 纳西索斯的神话——他爱上自己的倒影——开创了自恋的概念。在葡萄牙文化中，它象征着虚荣、自我迷恋以及过度自爱的危险。
    ar: أسطورة نرجس—الذي يقع في حب انعكاسه—أصل لمفهوم النرجسية. في الثقافة البرتغالية، ترمز إلى الغرور،
      والهوس بالذات، وأخطار المبالغة في تقدير الذات.
    he: מיתוס נרקיסוס—שנפל בשבי דמותו שלו—הוא המקור למושג הנרקיסיזם. בתרבות הפורטוגלית הוא מסמל את הווניות,
      האובססיה העצמית ואת הסכנות של הערכה עצמית מופרזת.
