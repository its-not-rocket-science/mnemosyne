  short_explanation: The 1884–85 meeting where European powers divided Africa, formalizing Portugal's
    colonial claims (e.g., the Pink Map). Symbolizes imperialism and the scramble for Africa.
  i18n_explanations:
    en: The 1884–85 meeting where European powers divided Africa, formalizing Portugal's colonial claims
      (e.g., the Pink Map). Symbolizes imperialism and the scramble for Africa.
    es: La conferencia de 1884–85 donde las potencias europeas dividieron África, formalizando las reivindicaciones
      coloniales de Portugal (como el Mapa Rosa). Simboliza el imperialismo y la lucha por África.
    fr: La conférence de 1884–85 où les puissances européennes se partagèrent l'Afrique, officialisant
      les revendications coloniales du Portugal (comme la Carte Rose). Symbole de l'impérialisme et de
      la course à l'Afrique.
    de: Die Konferenz von 1884–85, auf der europäische Mächte Afrika aufteilten und Portugals kolonialen
      Ansprüchen (z. B. die Rosa Karte) formalisierten. Symbolisiert Imperialismus und den Wettlauf um
      Afrika.
    it: La conferenza del 1884–85 in cui le potenze europee si spartirono l'Africa, formalizzando le rivendicazioni
      coloniali del Portogallo (come la Mappa Rosa). Simboleggia l'imperialismo e la spartizione dell'Africa.
    pt: A conferência de 1884–85 em que as potências europeias dividiram a África, formalizando as reivindicações
      coloniais de Portugal (como o Mapa Cor-de-Rosa). Simboliza o imperialismo e a disputa pela África.
    ru: Конференция 1884–85 годов, на которой европейские державы разделили Африку и официально закрепили
      колониальные претензии Португалии (например, «Розовую карту»). Символизирует империализм и борьбу
      за Африку.
    ja: 1884年から85年にかけて開催された会議で、欧州列強がアフリカを分割し、ポルトガルの植民地要求（ピンクマップなど）を正式化した。帝国主義とアフリカ獲得競争の象徴。
    zh: 1884–85年欧洲列强瓜分非洲的会议，正式确立了葡萄牙的殖民要求（如“粉红地图”）。象征着帝国主义与对非洲的争夺。
    ar: المؤتمر الذي عقد عام 1884-1885 حيث قسمت القوى الأوروبية أفريقيا، معلنة المطالب الاستعمارية للبرتغال
      (مثل الخريطة الوردية). ترمز إلى الاستعمار وسعي أوروبا للسيطرة على أفريقيا.
    he: ועידת ברלין 1884–1885 בה חילקו מעצמות אירופה את אפריקה, והכירו באופן רשמי בתביעות הקולוניאליות
