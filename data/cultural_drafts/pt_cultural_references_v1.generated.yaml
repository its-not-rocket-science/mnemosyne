  short_explanation: The overthrow of the Portuguese monarchy on October 5, 1910, establishing the First
    Portuguese Republic. This event marked a major political shift and is celebrated annually as Republic
    Day.
  i18n_explanations:
    en: The overthrow of the Portuguese monarchy on October 5, 1910, establishing the First Portuguese
      Republic. This event marked a major political shift and is celebrated annually as Republic Day.
    es: El derrocamiento de la monarquía portuguesa el 5 de octubre de 1910, que estableció la Primera
      República Portuguesa. Este evento marcó un gran cambio político y se celebra anualmente como el
      Día de la República.
    fr: Le renversement de la monarchie portugaise le 5 octobre 1910, établissant la Première République
      portugaise. Cet événement a marqué un tournant politique majeur et est célébré chaque année comme
      le Jour de la République.
    de: Der Sturz der portugiesischen Monarchie am 5. Oktober 1910, der die Erste Portugiesische Republik
      begründete. Dieses Ereignis markierte einen bedeutenden politischen Wandel und wird jährlich als
      Republiktag gefeiert.
    it: La caduta della monarchia portoghese il 5 ottobre 1910, che istituì la Prima Repubblica Portoghese.
      Questo evento segnò un importante cambiamento politico ed è celebrato annualmente come Giorno della
      Repubblica.
    pt: A derrubada da monarquia portuguesa em 5 de outubro de 1910, que estabeleceu a Primeira República
      Portuguesa. Este evento marcou uma grande mudança política e é comemorado anualmente como Dia da
      República.
    ru: Свержение португальской монархии 5 октября 1910 года, в результате чего была провозглашена Первая
      Португальская Республика. Это событие ознаменовало крупный политический сдвиг и ежегодно отмечается
      как День Республики.
    ja: 1910年10月5日にポルトガル王政が打倒され、第一共和政が樹立された出来事。この政治的転換を象徴する記念日として、毎年「共和国の日」として祝われている。
    zh: 1910年10月5日推翻葡萄牙君主制，建立了第一共和国。这一事件标志着重大政治变革，并作为共和国日每年庆祝。
    ar: الإطاحة بالملكية البرتغالية في 5 أكتوبر 1910، مما أدى إلى قيام الجمهورية البرتغالية الأولى. هذا
      الحدث شكل تحولًا سياسيًا كبيرًا ويحتفل به سنويًا باعتباره يوم الجمهورية.
    he: הפלת המונרכיה הפורטוגלית ב-5 באוקטובר 1910, שהביאה להקמת הרפובליקה הפורטוגלית הראשונה. אירוע זה
