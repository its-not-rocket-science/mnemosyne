  short_explanation: A Portuguese legend about Saint Anthony of Padua performing a miracle, often involving
    a donkey kneeling before the Eucharist. It reflects medieval religious devotion and popular piety
    in Portugal.
  i18n_explanations:
    en: A Portuguese legend about Saint Anthony of Padua performing a miracle, often involving a donkey
      kneeling before the Eucharist. It reflects medieval religious devotion and popular piety in Portugal.
    es: Leyenda portuguesa sobre San Antonio de Padua que realiza un milagro, a menudo con un burro arrodillado
      ante la Eucaristía. Refleja la devoción religiosa medieval y la piedad popular en Portugal.
    fr: Légende portugaise sur saint Antoine de Padoue accomplissant un miracle, souvent représenté par
      un âne agenouillé devant l'Eucharistie. Elle reflète la dévotion religieuse médiévale et la piété
      populaire au Portugal.
    de: Portugiesische Legende über den heiligen Antonius von Padua, der ein Wunder wirkt, oft dargestellt
      durch ein vor der Eucharistie kniendes Esel. Sie spiegelt mittelalterliche Frömmigkeit und Volksglauben
      in Portugal wider.
    it: Leggenda portoghese su sant'Antonio da Padova che compie un miracolo, spesso rappresentato da
      un asino inginocchiato davanti all'Eucaristia. Riflette la devozione religiosa medievale e la pietà
      popolare in Portogallo.
    pt: Lenda portuguesa sobre Santo António de Lisboa que realiza um milagre, muitas vezes representado
      por um burro ajoelhado perante a Eucaristia. Reflete a devoção religiosa medieval e a piedade popular
      em Portugal.
    ru: Португальская легенда о святом Антонии Падуанском, совершающем чудо, часто изображаемое как осёл,
      преклоняющий колени перед Евхаристией. Отражает средневековую религиозную преданность и народное
      благочестие в Португалии.
    ja: ポルトガルの伝説で、聖アントニウス・パドヴァが奇跡を起こすというもの。しばしばロバが聖体を前にひざまずく姿で描かれる。中世の宗教的信仰とポルトガルの民衆信心を反映している。
    zh: 葡萄牙传说，圣安东尼奥·帕多瓦（葡萄牙人称为圣安东尼奥·利斯博）行奇迹，常以一头驴跪在圣体前的形象表现。反映了中世纪的宗教虔诚与葡萄牙的民间信仰。
    ar: أسطورة برتغالية عن القديس أنطونيوس البادوي الذي يؤدي معجزة، غالبًا ما تُصور على أنها حمار يركع
