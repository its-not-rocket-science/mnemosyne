  short_explanation: A Portuguese folktale about a Franciscan friar who lives carefree, symbolizing the
    ideal of detachment from worldly worries. It reflects the values of humility and trust in divine providence.
  i18n_explanations:
    en: A Portuguese folktale about a Franciscan friar who lives carefree, symbolizing the ideal of detachment
      from worldly worries. It reflects the values of humility and trust in divine providence.
    es: Un cuento popular portugués sobre un fraile franciscano que vive sin preocupaciones, simbolizando
      el ideal de desapego de las preocupaciones mundanas. Refleja los valores de humildad y confianza
      en la providencia divina.
    fr: Un conte populaire portugais sur un moine franciscain qui vit sans soucis, symbolisant l'idéal
      de détachement des préoccupations terrestres. Il reflète les valeurs d'humilité et de confiance
      en la providence divine.
    de: Ein portugiesisches Volksmärchen über einen Franziskaner-Mönch, der sorglos lebt und das Ideal
      der Loslösung von irdischen Sorgen verkörpert. Es spiegelt die Werte der Demut und des Vertrauens
      in die göttliche Vorsehung wider.
    it: Una fiaba popolare portoghese su un frate francescano che vive senza preoccupazioni, simboleggiando
