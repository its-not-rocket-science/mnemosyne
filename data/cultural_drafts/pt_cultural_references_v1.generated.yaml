  short_explanation: A fable about greed, where a man kills a hen that lays golden eggs to get all the
    gold at once, only to lose everything. It illustrates the folly of short-term thinking over sustainable
    gain.
  i18n_explanations:
    en: A fable about greed, where a man kills a hen that lays golden eggs to get all the gold at once,
      only to lose everything. It illustrates the folly of short-term thinking over sustainable gain.
    es: Una fábula sobre la avaricia, donde un hombre mata a una gallina que pone huevos de oro para obtener
      todo el oro de golpe, solo para perderlo todo. Ilustra la necedad de pensar a corto plazo en lugar
      de obtener ganancias sostenibles.
    fr: Une fable sur la cupidité, où un homme tue une poule qui pond des œufs d'or pour tout obtenir
      d'un coup, avant de tout perdre. Elle illustre la folie de privilégier le gain immédiat au détriment
      d'un profit durable.
    de: Eine Fabel über Gier, in der ein Mann eine Henne tötet, die goldene Eier legt, um auf einmal an
      das ganze Gold zu kommen, nur um alles zu verlieren. Sie zeigt die Torheit kurzfristigen Denkens
      gegenüber nachhaltigem Gewinn.
    it: Una favola sulla cupidigia, in cui un uomo uccide una gallina che depone uova d'oro per ottenere
      tutto l'oro in una volta sola, finendo per perderlo tutto. Illustra la follia di anteporre il guadagno
      immediato a quello sostenibile.
    pt: Uma fábula sobre a ganância, em que um homem mata uma galinha que põe ovos de ouro para obter
      todo o ouro de uma vez, perdendo tudo. Ilustra a tolice de pensar no curto prazo em vez de no ganho
      sustentável.
    ru: Басня о жадности, где человек убивает курицу, несущую золотые яйца, чтобы сразу получить всё золото,
      но в итоге теряет всё. Она иллюстрирует безрассудство краткосрочного мышления в ущерб устойчивому
      доходу.
    ja: 欲深さを描いた寓話で、男は金の卵を産む鶏を殺して一度に全ての金を手に入れようとするが、結局全てを失う。持続可能な利益よりも短期的な思考の愚かさを示す。
    zh: 一个关于贪婪的寓言，讲述一个男人杀死一只下金蛋的母鸡，试图一次性获得所有金子，却最终失去一切。它说明了急功近利的愚蠢。
    ar: حكاية رمزية عن الجشع، حيث يقتل رجل دجاجة تضع بيضًا ذهبيًا للحصول على كل الذهب مرة واحدة، لكنه
