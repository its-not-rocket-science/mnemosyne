      over time.
    es: Mucho hace un grano. Pequeños esfuerzos constantes se acumulan para lograr un resultado significativo
      con el tiempo.
    fr: Petit à petit, l’oiseau fait son nid. De petits efforts réguliers s’accumulent pour obtenir un
      résultat important avec le temps.
