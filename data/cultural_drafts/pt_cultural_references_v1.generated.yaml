- id: pt_classical_or_scriptural_allusion_a_hidra_de_lerna_0bf7e1d8
  language: pt
  canonical_reference: a Hidra de Lerna
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - a Hidra de Lerna
  - Hidra de Lerna
  - a Hidra
  - cortar a cabeça da Hidra
  short_explanation: Multi-headed serpent from Greek mythology whose heads regrew when cut off. Hercules
    killed it as one of his Twelve Labors. Symbolizes problems that multiply when addressed superficially.
  i18n_explanations:
    en: Multi-headed serpent from Greek mythology whose heads regrew when cut off. Hercules killed it
      as one of his Twelve Labors. Symbolizes problems that multiply when addressed superficially.
    es: Serpiente de múltiples cabezas de la mitología griega cuyas cabezas volvían a crecer al ser cortadas.
      Hércules la mató como una de sus Doce Pruebas. Simboliza problemas que se multiplican cuando se
      abordan superficialmente.
    fr: Serpent à plusieurs têtes de la mythologie grecque dont les têtes repoussaient lorsqu'on les coupait.
      Hercule la tua lors de l'un de ses Douze Travaux. Symbolise les problèmes qui s'aggravent lorsqu'on
      les aborde superficiellement.
    de: Mehrköpfige Schlange aus der griechischen Mythologie, deren Köpfe nachwuchsen, wenn man sie abschnitt.
      Herakles tötete sie als eine seiner zwölf Aufgaben. Symbolisiert Probleme, die sich verschlimmern,
      wenn man sie oberflächlich angeht.
    it: Serpente a più teste della mitologia greca le cui teste ricrescevano quando tagliate. Ercole la
      uccise come una delle sue Dodici Fatiche. Simboleggia problemi che si moltiplicano quando affrontati
      superficialmente.
    pt: Serpente de múltiplas cabeças da mitologia grega cujas cabeças renasciam quando cortadas. Hércules
      a matou como uma de suas Doze Provas. Simboliza problemas que se multiplicam quando abordados superficialmente.
    ru: Многоголовая змея из греческой мифологии, у которой отрастали новые головы, если их отрубали.
      Геракл убил её в рамках одного из двенадцати подвигов. Символизирует проблемы, которые множатся
      при поверхностном решении.
    ja: ギリシャ神話の多頭の蛇ヒュドラは首を切られると再生した。ヘラクレスが十二の功業の一つとしてこれを退治した。表面的に対処すると問題が増殖することを象徴する。
    zh: 希腊神话中九头蛇许德拉，被砍掉的头会再生。赫拉克勒斯在完成十二项功绩之一时杀死了它。象征着肤浅处理问题会导致问题倍增。
    ar: ' ثعبان متعدد الرؤوس من الميثولوجيا اليونانية، تنمو رؤوسه مجدداً عند قطعها. هرقل قتله كجزء من
      أعماله الاثني عشر. يرمز إلى المشاكل التي تتكاثر عند التعامل معها بشكل سطحي.'
    he: נחש רב-ראשי מהמיתולוגיה היוונית שראשה צמחו מחדש כאשר נכרתו. הרקולס הרג אותו כאחד משנים עשר מעלליו.
      מסמל בעיות שמתרבות כאשר מטפלים בהן באופן שטחי.
