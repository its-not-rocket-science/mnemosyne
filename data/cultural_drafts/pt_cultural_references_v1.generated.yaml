  short_explanation: The peaceful military coup in Portugal on April 25, 1974, that overthrew the authoritarian
    Estado Novo regime, leading to democracy and decolonization processes in Portugal and its former colonies.
  i18n_explanations:
    en: The peaceful military coup in Portugal on April 25, 1974, that overthrew the authoritarian Estado
      Novo regime, leading to democracy and decolonization processes in Portugal and its former colonies.
    es: El golpe de Estado pacífico en Portugal el 25 de abril de 1974 que derrocó el régimen autoritario
      del Estado Novo, dando paso a la democracia y los procesos de descolonización en Portugal y sus
      antiguas colonias.
    fr: Le coup d'État militaire pacifique au Portugal le 25 avril 1974 qui renversa le régime autoritaire
      de l'Estado Novo, ouvrant la voie à la démocratie et aux processus de décolonisation au Portugal
      et dans ses anciennes colonies.
    de: Der friedliche Militärputsch in Portugal am 25. April 1974, der das autoritäre Estado Novo-Regime
      stürzte und den Weg für Demokratie und Entkolonialisierungsprozesse in Portugal und seinen ehemaligen
      Kolonien ebnete.
    it: Il colpo di stato militare pacifico in Portogallo il 25 aprile 1974 che rovesciò il regime autoritario
      dell'Estado Novo, aprendo la strada alla democrazia e ai processi di decolonizzazione in Portogallo
      e nelle sue ex colonie.
    pt: O golpe militar pacífico em Portugal em 25 de abril de 1974 que derrubou o regime autoritário
      do Estado Novo, levando à democracia e aos processos de descolonização em Portugal e suas antigas
      colônias.
    ru: Мирный военный переворот в Португалии 25 апреля 1974 года, свергнувший авторитарный режим Estado
      Novo, открыл путь к демократии и процессам деколонизации в Португалии и её бывших колониях.
    ja: 1974年4月25日、ポルトガルで起きた無血の軍事クーデター「カーネーション革命」により、独裁政権エスタド・ノヴォが打倒され、ポルトガルと旧植民地で民主化と非植民地化が進められた。
    zh: 1974年4月25日，葡萄牙发生的不流血军事政变「康乃馨革命」，推翻了独裁的新国家体制，开启了葡萄牙及其前殖民地的民主化与非殖民化进程。
    ar: انقلاب عسكري سلمي في البرتغال في 25 أبريل 1974 أطاح بالنظام الاستبدادي إ스타דו نوفو، مما مهد الطريق
      للديمقراطية ولعمليات إنهاء الاستعمار في البرتغال ومستعمراتها السابقة.
    he: ב-25 באפריל 1974 התרחשה בפורטוגל הפיכה צבאית שקטה שהפילה את משטרEstado Novo הרודני, והובילה לדמוקרטיזציה
      ולהליכי דה-קולוניזציה בפורטוגל ובמושבותיה לשעבר.
