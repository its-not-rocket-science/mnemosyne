  short_explanation: A significant battle during the 1383–1385 Portuguese succession crisis, where Portuguese
    forces defeated Castilian troops, paving the way for the Aviz dynasty and Portugal's independence.
  i18n_explanations:
    en: A significant battle during the 1383–1385 Portuguese succession crisis, where Portuguese forces
      defeated Castilian troops, paving the way for the Aviz dynasty and Portugal's independence.
    es: Una batalla significativa durante la crisis sucesoria portuguesa de 1383–1385, donde las fuerzas
      portuguesas derrotaron a las tropas castellanas, abriendo el camino para la dinastía de Avis y la
      independencia de Portugal.
    fr: Une bataille importante pendant la crise de succession portugaise de 1383–1385, où les forces
      portugaises ont vaincu les troupes castillanes, ouvrant la voie à la dynastie d'Aviz et à l'indépendance
      du Portugal.
    de: Eine bedeutende Schlacht während der portugiesischen Thronfolgekrise von 1383–1385, in der portugiesische
      Truppen kastilische Streitkräfte besiegten und den Weg für die Dynastie Avis sowie Portugals Unabhängigkeit
      ebneten.
    it: Una battaglia significativa durante la crisi di successione portoghese del 1383–1385, in cui le
