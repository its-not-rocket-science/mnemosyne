    ja: ギリシャ神話で、アリアドネはテセウスがミノタウロスを倒すのを助け、後に彼は彼女を見捨てます。彼女はディオニュソス（バックス）に救われ、結婚します。神の報酬と変容を象徴しています。
    zh: 在希腊神话中，阿里阿德涅帮助忒修斯击败弥诺陶洛斯后被其抛弃。她被狄俄尼索斯（巴克斯）搭救并嫁给她。象征神圣的奖赏与蜕变。
