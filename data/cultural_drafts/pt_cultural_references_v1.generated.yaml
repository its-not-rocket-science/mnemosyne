  i18n_explanations:
    en: In Greek mythology, Ariadne helps Theseus defeat the Minotaur and is later abandoned by him. She
      is rescued by Dionysus (Bacchus), who marries her. Symbolizes divine reward and transformation.
    es: En la mitología griega, Ariadna ayuda a Teseo a derrotar al Minotauro y luego es abandonada por
      él. Es rescatada por Dioniso (Baco), quien se casa con ella. Simboliza la recompensa divina y la
      transformación.
    fr: Dans la mythologie grecque, Ariane aide Thésée à vaincre le Minotaure puis est abandonnée par
      lui. Elle est secourue par Dionysos (Bacchus), qui l'épouse. Symbole de récompense divine et de
      transformation.
    de: In der griechischen Mythologie hilft Ariadne Theseus, den Minotaurus zu besiegen, wird aber später
      von ihm verlassen. Sie wird von Dionysos (Bacchus) gerettet, der sie heiratet. Symbolisiert göttliche
      Belohnung und Verwandlung.
    it: Nella mitologia greca, Arianna aiuta Teseo a uccidere il Minotauro e viene poi abbandonata da
      lui. Viene salvata da Dioniso (Bacco), che la sposa. Simboleggia la ricompensa divina e la trasformazione.
    pt: Na mitologia grega, Ariadne ajuda Teseu a derrotar o Minotauro e depois é abandonada por ele.
      É resgatada por Dionísio (Baco), que se casa com ela. Simboliza a recompensa divina e a transformação.
    ru: В греческой мифологии Ариадна помогает Тесею победить Минотавра, но позже он её бросает. Её спасает
