- id: pt_proverb_tradition_antes_tarde_do_que_nunca_a853f3ee
  language: pt
  canonical_reference: Antes tarde do que nunca
  reference_type: proverb_tradition
  surface_patterns:
  - antes tarde do que nunca
  - antes tarde que nunca
  short_explanation: Better late than never. Expresses the idea that it is preferable to do something
    late rather than not at all, emphasizing timeliness over perfection.
  i18n_explanations:
    en: Better late than never. Expresses the idea that it is preferable to do something late rather than
      not at all, emphasizing timeliness over perfection.
    es: Más vale tarde que nunca. Expresa que es preferible hacer algo tarde que no hacerlo, priorizando
      la acción sobre la perfección.
    fr: Mieux vaut tard que jamais. Souligne qu'il vaut mieux agir en retard que ne pas agir du tout,
      privilégiant la ponctualité à la perfection.
    de: Lieber spät als nie. Betont, dass es besser ist, etwas spät zu tun, als es gar nicht zu tun, und
      stellt Pünktlichkeit über Perfektion.
    it: Meglio tardi che mai. Esprime l'idea che sia preferibile fare qualcosa in ritardo piuttosto che
      non farlo affatto, valorizzando la tempestività sulla perfezione.
    pt: Antes tarde do que nunca. Expressa que é preferível fazer algo tarde a não o fazer, valorizando
      a pontualidade em vez da perfeição.
    ru: Лучше поздно, чем никогда. Говорит о том, что лучше сделать что-то с опозданием, чем не сделать
      вовсе, подчёркивая своевременность.
    ja: 遅くともやらないよりはまし。行動の遅れよりも、何もしないことを戒め、完璧よりもタイミングを重視します。
