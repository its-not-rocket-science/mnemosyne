- id: pt_literary_reference_a_odisseia_de_homero_em_os_lusíadas_724e64eb
  language: pt
  canonical_reference: a Odisseia de Homero em 'Os Lusíadas'
  reference_type: literary_reference
  surface_patterns:
  - a Odisseia de Homero em 'Os Lusíadas'
  - a Odisseia em 'Os Lusíadas'
  - a Odisseia homérica em 'Os Lusíadas'
  - inspirado na Odisseia de Homero em 'Os Lusíadas'
  short_explanation: Camões' epic poem 'Os Lusíadas' (1572) draws structural and thematic parallels with
    Homer's 'Odyssey', particularly in the voyage motif and the invocation of the muse. This intertextuality
    elevates Portugal's maritime achievements to a classical grandeur.
  i18n_explanations:
    en: Camões' epic poem 'Os Lusíadas' (1572) draws structural and thematic parallels with Homer's 'Odyssey',
      particularly in the voyage motif and the invocation of the muse. This intertextuality elevates Portugal's
      maritime achievements to a classical grandeur.
    es: El poema épico de Camões, 'Os Lusíadas' (1572), establece paralelos estructurales y temáticos
      con la 'Odisea' de Homero, especialmente en el motivo del viaje y la invocación a la musa. Esta
      intertextualidad eleva los logros marítimos de Portugal a una grandeza clásica.
    fr: Le poème épique de Camões, 'Os Lusíadas' (1572), établit des parallèles structurels et thématiques
      avec l'Odyssée d'Homère, notamment dans le motif du voyage et l'invocation de la muse. Cette intertextualité
      élève les exploits maritimes du Portugal à une grandeur classique.
    de: Camões' Epos 'Os Lusíadas' (1572) zieht strukturelle und thematische Parallelen zu Homers 'Odyssee',
      insbesondere im Reise-Motiv und der Anrufung der Muse. Diese Intertextualität erhebt Portugals maritime
      Leistungen zu klassischer Größe.
    it: Il poema epico di Camões, 'Os Lusíadas' (1572), stabilisce paralleli strutturali e tematici con
      l'Odissea di Omero, in particolare nel motivo del viaggio e nell'invocazione alla musa. Questa intertestualità
      eleva le imprese marittime del Portogallo a una grandezza classica.
    pt: O poema épico de Camões, 'Os Lusíadas' (1572), estabelece paralelos estruturais e temáticos com
      a 'Odisseia' de Homero, especialmente no motivo da viagem e na invocação à musa. Essa intertextualidade
      eleva as realizações marítimas de Portugal a uma grandiosidade clássica.
    ru: Эпическая поэма Камоэнса 'Лузиады' (1572) проводит структурные и тематические параллели с 'Одиссеей'
      Гомера, особенно в мотиве странствий и обращении к музе. Эта интертекстуальность возвышает морские
      достижения Португалии до классического величия.
    ja: カモンイスの叙事詩「ウジ・リアダス」（1572年）は、ホメロスの「オデュッセイア」と構造的・主題的な類似点を持ち、特に航海のモチーフとミューズへの呼びかけに見られる。このインターテクスチュアリティは、ポルトガルの海洋的偉業を古典的な壮大さへと高めている。
    zh: 卡蒙斯的史诗《卢济塔尼亚人之歌》（1572年）在结构和主题上与荷马的《奥德赛》形成对应，特别是在航海动机和对缪斯的祈求方面。这种互文性将葡萄牙的航海成就提升到经典的宏伟境界。
    ar: ملحمة كامويس الشعرية 'لوزياداس' (1572) ترسم أوجه تشابه هيكلية وموضوعية مع 'الأوديسة' لهوميروس،
      خاصة في موضوع الرحلة ودعوة الإلهة الملهمة. هذه التداخلات النصية ترفع إنجازات البرتغال البحرية إلى
      عظمة كلاسيكية.
    he: הפואמה האפית של קמואש 'לוזיאדאש' (1572) יוצרת הקבלות מבניות ותמטיות עם 'האודיסיאה' של הומרוס,
      בעיקר במוטיב המסע ובהזמנת המוזה. אינטרטקסטואליות זו מעלה את הישגיה הימיים של פורטוגל לדרגת גדולה
      קלאסית.
