- id: pt_classical_or_scriptural_allusion_o_julgamento_de_páris_dce149f5
  language: pt
  canonical_reference: o Julgamento de Páris
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - o Julgamento de Páris
  - Julgamento de Páris
  - Páris e o julgamento
  short_explanation: Mythological episode where Paris, a Trojan prince, was asked to judge which goddess
    (Hera, Athena, or Aphrodite) was the most beautiful, leading to the Trojan War. Symbolizes difficult
    choices with far-reaching consequences.
  i18n_explanations:
    en: Mythological episode where Paris, a Trojan prince, was asked to judge which goddess (Hera, Athena,
      or Aphrodite) was the most beautiful, leading to the Trojan War. Symbolizes difficult choices with
      far-reaching consequences.
    es: Episodio mitológico en el que Paris, príncipe troyano, juzgó a las diosas Hera, Atenea y Afrodita
      para decidir cuál era la más bella, desencadenando la guerra de Troya. Simboliza decisiones difíciles
      con consecuencias profundas.
    fr: Épisode mythologique où Pâris, prince troyen, dut juger quelle déesse (Héra, Athéna ou Aphrodite)
      était la plus belle, déclenchant la guerre de Troie. Symbolise des choix difficiles aux conséquences
      lointaines.
    de: Mythologisches Ereignis, bei dem Paris, ein trojanischer Prinz, die Göttinnen Hera, Athene und
      Aphrodite als die Schönste auswählen sollte, was zum Trojanischen Krieg führte. Symbolisiert schwierige
      Entscheidungen mit weitreichenden Folgen.
    it: Episodio mitologico in cui Paride, principe troiano, dovette giudicare quale dea (Era, Atena o
      Afrodite) fosse la più bella, scatenando la guerra di Troia. Simboleggia scelte difficili con conseguenze
      di vasta portata.
    pt: Episódio mitológico em que Páris, príncipe troiano, julgou qual deusa (Hera, Atena ou Afrodite)
      era a mais bela, desencadeando a Guerra de Troia. Simboliza escolhas difíceis com consequências
      profundas.
    ru: Мифологический эпизод, в котором Парис, троянский принц, должен был выбрать, какая из богинь (Гера,
      Афина или Афродита) самая красивая, что привело к Троянской войне. Символизирует сложные решения
      с далеко идущими последствиями.
    ja: トロイの王子パリスが、ヘラ、アテナ、アフロディテの三女神のうち最も美しいのは誰かを審判した神話的エピソード。トロイ戦争の引き金となった。難しい選択とその遠大な結果を象徴する。
    zh: 特洛伊王子帕里斯被要求评判赫拉、雅典娜和阿芙罗狄蒂三位女神中谁最美丽，这一神话事件引发了特洛伊战争。象征着具有深远影响的艰难抉择。
    ar: ' Episode أسطوري حيث حكم باريس، أمير طروادة، على الآلهة هيرا وأثينا وأفروديت لتحديد أجملها، مما
      أدى إلى حرب طروادة. يرمز إلى اختيارات صعبة ذات عواقب بعيدة المدى.'
    he: Episode מיתולוגי שבו פריס, נסיך טרויה, נדרש לשפוט איזו מבין האלות הרה, אתנה ואפרודיטה היא היפה
      ביותר, מה שהוביל למלחמת טרויה. מסמל בחירות קשות עם השלכות מרחיקות לכת.
