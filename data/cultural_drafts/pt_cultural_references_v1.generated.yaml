- id: pt_classical_or_scriptural_allusion_o_fado_de_ulisses_0fe90721
  language: pt
  canonical_reference: o Fado de Ulisses
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - o Fado de Ulisses
  - Fado de Ulisses
  - o destino de Ulisses
  short_explanation: Refers to the long and perilous journey of Odysseus (Ulisses in Portuguese) back
    to Ithaca after the Trojan War, as recounted in Homer's Odyssey. Symbolizes perseverance, cunning,
    and the trials of returning home.
  i18n_explanations:
    en: Refers to the long and perilous journey of Odysseus (Ulisses in Portuguese) back to Ithaca after
      the Trojan War, as recounted in Homer's Odyssey. Symbolizes perseverance, cunning, and the trials
      of returning home.
    es: Se refiere al largo y peligroso viaje de Odiseo (Ulises en portugués) de regreso a Ítaca tras
      la guerra de Troya, según la Odisea de Homero. Simboliza perseverancia, astucia y las pruebas del
      regreso a casa.
    fr: Fait référence au long et périlleux voyage d'Ulysse (Ulisses en portugais) pour rentrer à Ithaque
      après la guerre de Troie, tel que raconté dans l'Odyssée d'Homère. Symbolise la persévérance, la
      ruse et les épreuves du retour au foyer.
    de: Bezieht sich auf die lange und gefährliche Heimreise des Odysseus (Ulisses auf Portugiesisch)
      nach Ithaka nach dem Trojanischen Krieg, wie in Homers Odyssee beschrieben. Symbolisiert Ausdauer,
      List und die Mühen der Rückkehr nach Hause.
    it: Si riferisce al lungo e pericoloso viaggio di Odisseo (Ulisse in portoghese) per tornare a Itaca
      dopo la guerra di Troia, come narrato nell'Odissea di Omero. Simboleggia perseveranza, astuzia e
      le prove del ritorno a casa.
    pt: Refere-se à longa e perigosa viagem de Odisseu (Ulisses em português) de volta a Ítaca após a
      Guerra de Troia, conforme narrado na Odisseia de Homero. Simboliza perseverança, astúcia e as provações
      do retorno ao lar.
    ru: Описывает долгий и опасный путь Одиссея (Улисса на португальском) обратно на Итаку после Троянской
      войны, как описано в «Одиссее» Гомера. Символизирует настойчивость, хитрость и испытания возвращения
      домой.
    ja: ホメロスの叙事詩「オデュッセイア」で語られるトロイ戦争後のオデュッセウス（ポルトガル語でウルisses）の長く危険な帰郷の旅。忍耐、狡智、そして故郷への帰還の試練を象徴する。
    zh: 指的是荷马史诗《奥德赛》中描述的特洛伊战争后奥德修斯（葡萄牙语称Ulisses）漫长而危险的归乡之旅。象征着坚韧、机智以及回家的磨难。
    ar: ' يشير إلى الرحلة الطويلة والخطرة التي قام بها أوديسيوس (أوليسس باللغة البرتغالية) للعودة إلى
      إيثاكا بعد حرب طروادة، كما ورد في الأوديسة لهوميروس. يرمز إلى المثابرة والدهاء ومح trials العودة
      إلى المنزل.'
    he: מתייחס למסעו הארוך והמלא סכנות של אודיסאוס (אוליסס בפורטוגזית) חזרה לאיתקה לאחר מלחמת טרויה, כפי
      שמתואר באודיסיאה של הומרוס. מסמל התמדה, ערמומיות ונסיונות שיבה הביתה.
