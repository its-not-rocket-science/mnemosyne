      и сопротивление.
    ja: 1640年の蜂起により、国王ジョアン4世の下でポルトガルがスペインから独立を回復し、60年にわたるイベリア連合が終焉した。国家主権と抵抗の象徴。
    zh: 1640年葡萄牙在国王若昂四世领导下发动起义，恢复了对西班牙的独立，结束了60年的伊比利亚联合。象征着国家主权与抵抗。
    ar: الثورة التي وقعت عام 1640 واستعادت استقلال البرتغال من إسبانيا تحت حكم الملك جواو الرابع، منهية
