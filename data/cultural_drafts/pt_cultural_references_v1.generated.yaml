- id: pt_classical_or_scriptural_allusion_o_mito_de_dédalo_e_ícaro_8b40b11c
  language: pt
  canonical_reference: o Mito de Dédalo e Ícaro
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - o Mito de Dédalo e Ícaro
  - Mito de Dédalo e Ícaro
  - Dédalo e Ícaro
  - Ícaro
  short_explanation: A Greek myth where Daedalus crafts wings for his son Icarus, who flies too close
    to the sun, melting the wax and causing his fall. It symbolizes hubris and the dangers of overreaching.
  i18n_explanations:
    en: A Greek myth where Daedalus crafts wings for his son Icarus, who flies too close to the sun, melting
      the wax and causing his fall. It symbolizes hubris and the dangers of overreaching.
    es: Un mito griego en el que Dédalo fabrica alas para su hijo Ícaro, quien vuela demasiado cerca del
      sol, derritiendo la cera y provocando su caída. Simboliza la arrogancia y los peligros de excederse.
    fr: Un mythe grec où Dédale fabrique des ailes pour son fils Icare, qui vole trop près du soleil,
      faisant fondre la cire et provoquant sa chute. Il symbolise l'orgueil démesuré et les dangers de
      la démesure.
    de: Ein griechischer Mythos, in dem Dädalus Flügel für seinen Sohn Ikarus anfertigt, der zu nah an
      die Sonne fliegt, sodass das Wachs schmilzt und er abstürzt. Er symbolisiert Hybris und die Gefahren
      des Übermuts.
    it: Un mito greco in cui Dedalo costruisce ali per suo figlio Icaro, che vola troppo vicino al sole,
      facendo sciogliere la cera e provocandone la caduta. Simboleggia la hybris e i pericoli dell'eccesso.
    pt: Um mito grego em que Dédalo fabrica asas para seu filho Ícaro, que voa muito perto do sol, derretendo
      a cera e causando sua queda. Simboliza a hybris e os perigos de se exceder.
    ru: Греческий миф, в котором Дедал делает крылья для своего сына Икара, который подлетает слишком
      близко к солнцу, воск тает, и он падает. Символ гордыни и опасностей непомерных амбиций.
    ja: ダイダロスが息子のイカロスのために翼を作り、イカロスが太陽に近づきすぎて蝋が溶け墜落するギリシャ神話。傲慢と過信の危険性を象徴する。
    zh: 希腊神话中，代达罗斯为儿子伊卡洛斯制作翅膀，伊卡洛斯飞得离太阳太近，蜡融化导致坠落。象征傲慢与过度追求的危险。
    ar: أسطورة يونانية يصنع فيها ديدالوس أجنحة لابنه إيكاروس، الذي يطير قريبًا جدًا من الشمس، مما يذيب
      الشمع ويسبب سقوطه. ترمز إلى الغرور وأخطار التطرف.
    he: מיתוס יווני שבו דדלוס מכין כנפיים לבנו איקרוס, שטס קרוב מדי לשמש, השעווה נמסה וגורמת לנפילתו.
      מסמל חוצפה וסכנות ההגזמה.
