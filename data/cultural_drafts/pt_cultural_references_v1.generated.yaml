    he: משל מהבשורה על פי לוקאס על איש עשיר שהתעלם מעני קבצן (לזרוס) ליד ביתו, ומצא את עצמו נידון לאחר
      מותו. מלמד לקחים מוסריים על חמלה וענווה.
