  short_explanation: Refers to the establishment of the Kingdom of Portugal in 1139 under Afonso Henriques,
    marking the beginning of Portugal as an independent kingdom. This event is foundational to Portuguese
    national identity and sovereignty.
  i18n_explanations:
    en: Refers to the establishment of the Kingdom of Portugal in 1139 under Afonso Henriques, marking
      the beginning of Portugal as an independent kingdom. This event is foundational to Portuguese national
      identity and sovereignty.
    es: Se refiere a la fundación del Reino de Portugal en 1139 bajo Afonso Henriques, marcando el inicio
      de Portugal como reino independiente. Este evento es fundamental para la identidad nacional y soberanía
      portuguesas.
    fr: Fait référence à la création du Royaume du Portugal en 1139 sous Afonso Henriques, marquant le
      début du Portugal en tant que royaume indépendant. Cet événement est fondateur de l'identité nationale
      et de la souveraineté portugaises.
    de: Bezieht sich auf die Gründung des Königreichs Portugal im Jahr 1139 unter Afonso Henriques, die
      den Beginn Portugals als unabhängiges Königreich markiert. Dieses Ereignis ist grundlegend für die
      portugiesische nationale Identität und Souveränität.
    it: Si riferisce alla fondazione del Regno del Portogallo nel 1139 sotto Afonso Henriques, che segna
      l'inizio del Portogallo come regno indipendente. Questo evento è fondamentale per l'identità nazionale
      e la sovranità portoghesi.
    pt: Refere-se à fundação do Reino de Portugal em 1139 por Afonso Henriques, marcando o início de Portugal
      como reino independente. Este evento é fundamental para a identidade nacional e soberania portuguesas.
    ru: Относится к созданию Королевства Португалия в 1139 году под руководством Афонсу Энрикеша, что
      ознаменовало начало Португалии как независимого королевства. Это событие является основополагающим
      для португальской национальной идентичности и суверенитета.
    ja: 1139年にアフォンソ・エンriquesによってポルトガル王国が設立されたことを指す。これはポルトガルが独立王国として始まった画期的な出来事であり、ポルトガルの国家的アイデンティティと主権の基盤となっている。
    zh: 指的是1139年阿方索·恩里克斯建立葡萄牙王国，标志着葡萄牙作为独立王国的开始。这一事件是葡萄牙民族认同与主权的基础。
    ar: يشير إلى تأسيس مملكة البرتغال عام 1139 على يد أفونسو هنريكس، مما يمثل بداية البرتغال كمملكة مستقلة.
      هذا الحدث هو حجر الأساس للهوية الوطنية البرتغالية وسيادتها.
    he: מתייחס להקמת ממלכת פורטוגל בשנת 1139 על ידי אפונסו אנריקש, המסמנת את תחילת פורטוגל כממלכה עצמאית.
