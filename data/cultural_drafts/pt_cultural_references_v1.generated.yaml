      lands outside Europe between the two crowns along a meridian 370 leagues west of the Cape Verde
      islands.
    es: Un tratado firmado entre Portugal y España, mediado por el Papa, que dividió las tierras recién
      descubiertas fuera de Europa entre las dos coronas a lo largo de un meridiano situado a 370 leguas
      al oeste de las islas de Cabo Verde.
    fr: Un traité signé entre le Portugal et l'Espagne, médiatisé par le pape, qui partagea les terres
      nouvellement découvertes hors d'Europe entre les deux couronnes le long d'un méridien situé à 370
      lieues à l'ouest des îles du Cap-Vert.
    de: Ein Vertrag zwischen Portugal und Spanien, vermittelt durch den Papst, der die neu entdeckten
