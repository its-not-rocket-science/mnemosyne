    de: Der Aufstand von 1640, der unter König Johann IV. die portugiesische Unabhängigkeit von Spanien
      wiederherstellte und 60 Jahre iberischer Union beendete. Symbolisiert nationale Souveränität und
      Widerstand.
    it: La rivolta del 1640 che restaurò l'indipendenza portoghese dalla Spagna sotto il re Giovanni IV,
      ponendo fine a 60 anni di unione iberica. Simboleggia sovranità nazionale e resistenza.
    pt: A revolta de 1640 que restaurou a independência portuguesa da Espanha sob o rei João IV, pondo
      fim a 60 anos de união ibérica. Simboliza soberania nacional e resistência.
    ru: Восстание 1640 года, которое под руководством короля Жуана IV восстановило независимость Португалии
