- id: ar_cultural_reference_من_يعرف_نفسه_يعرف_ربه_8df9b67d
  language: ar
  canonical_reference: من يعرف نفسه يعرف ربه
  reference_type: cultural_reference
  surface_patterns:
  - من يعرف نفسه يعرف ربه
  - من عرف نفسه فقد عرف ربه
  - معرفة النفس معرفة الرب
  short_explanation: This saying means 'He who knows himself knows his Lord,' promoting self-knowledge
    as a path to divine knowledge. It is a key concept in Islamic mysticism (Sufism) and is often repeated
    in spiritual discourse.
  i18n_explanations:
    en: This saying means 'He who knows himself knows his Lord,' promoting self-knowledge as a path to
      divine knowledge. It is a key concept in Islamic mysticism (Sufism) and is often repeated in spiritual
      discourse.
    es: Este dicho significa 'Quien se conoce a sí mismo conoce a su Señor', promoviendo el autoconocimiento
      como camino al conocimiento divino. Es un concepto clave en el misticismo islámico (sufismo) y se
      repite a menudo en el discurso espiritual.
    fr: Ce dicton signifie 'Celui qui se connaît lui-même connaît son Seigneur', promouvant la connaissance
      de soi comme chemin vers la connaissance divine. C'est un concept clé du mysticisme islamique (soufisme)
      et est souvent répété dans le discours spirituel.
    de: Dieser Spruch bedeutet 'Wer sich selbst kennt, kennt seinen Herrn' und fördert Selbsterkenntnis
      als Weg zur göttlichen Erkenntnis. Es ist ein Schlüsselkonzept in der islamischen Mystik (Sufismus)
      und wird oft in spirituellen Diskursen wiederholt.
    it: Questo detto significa 'Chi conosce se stesso conosce il suo Signore', promuovendo la conoscenza
      di sé come via alla conoscenza divina. È un concetto chiave nel misticismo islamico (sufismo) ed
      è spesso ripetuto nel discorso spirituale.
    pt: Este ditado significa 'Quem conhece a si mesmo conhece o seu Senhor', promovendo o autoconhecimento
      como caminho para o conhecimento divino. É um conceito-chave no misticismo islâmico (sufismo) e
      é frequentemente repetido no discurso espiritual.
    ru: Эта поговорка означает 'Кто познает себя, тот познает своего Господа', продвигая самопознание
      как путь к божественному знанию. Это ключевая концепция в исламском мистицизме (суфизме) и часто
      повторяется в духовных дискурсах.
    ja: この格言は「自分自身を知る者は、その主を知る」という意味で、自己認識を神の知識への道として促進します。イスラム神秘主義（スーフィズム）の重要な概念であり、精神的な談話でよく繰り返されます。
