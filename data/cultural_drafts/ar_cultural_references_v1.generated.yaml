  short_explanation: Uqba ibn Nafi was an Arab general under the Umayyads who led the Muslim conquest
    of North Africa and founded the city of Kairouan. He is a key figure in the spread of Islam in the
    Maghreb.
  i18n_explanations:
    en: Uqba ibn Nafi was an Arab general under the Umayyads who led the Muslim conquest of North Africa
      and founded the city of Kairouan. He is a key figure in the spread of Islam in the Maghreb.
    es: Uqba ibn Nafi fue un general árabe bajo los omeyas que lideró la conquista musulmana del norte
      de África y fundó la ciudad de Kairuán. Es una figura clave en la expansión del Islam en el Magreb.
    fr: Uqba ibn Nafi était un général arabe sous les Omeyyades qui a mené la conquête musulmane de l'Afrique
      du Nord et a fondé la ville de Kairouan. Il est une figure clé de la propagation de l'islam au Maghreb.
    de: Uqba ibn Nafi war ein arabischer General unter den Umayyaden, der die muslimische Eroberung Nordafrikas
      anführte und die Stadt Kairouan gründete. Er ist eine Schlüsselfigur bei der Verbreitung des Islam
      im Maghreb.
    it: Uqba ibn Nafi fu un generale arabo sotto gli Omayyadi che guidò la conquista musulmana del Nord
      Africa e fondò la città di Kairouan. È una figura chiave nella diffusione dell'Islam nel Maghreb.
    pt: Uqba ibn Nafi foi um general árabe sob os omíadas que liderou a conquista muçulmana do Norte da
      África e fundou a cidade de Cairuão. Ele é uma figura chave na propagação do Islã no Magreb.
    ru: Укба ибн Нафи был арабским полководцем при Омейядах, который возглавил мусульманское завоевание
      Северной Африки и основал город Кайруан. Он является ключевой фигурой в распространении ислама в
      Магрибе.
    ja: ウクバ・イブン・ナーフィはウマイヤ朝のもとで北アフリカのムスリム征服を率いたアラブの将軍で、カイラワーンの都市を創設した。彼はマグリブにおけるイスラムの普及における重要人物である。
    zh: 乌克巴·伊本·纳菲是倭马亚王朝统治下的阿拉伯将军，领导了穆斯林对北非的征服，并创立了凯鲁万城。他是伊斯兰教在马格里布传播的关键人物。
    ar: كان عقبة بن نافع قائداً عربياً تحت الأمويين قاد الفتح الإسلامي لشمال أفريقيا وأسس مدينة القيروان.
      هو شخصية رئيسية في نشر الإسلام في المغرب العربي.
