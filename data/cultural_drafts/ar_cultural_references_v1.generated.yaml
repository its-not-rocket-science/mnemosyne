- id: ar_classical_or_scriptural_allusion_ليس_الشديد_بالصرعة_إنما_الشديد_الذي_يملك_نفسه_عند_الغضب_70fb178b
  language: ar
  canonical_reference: ليس الشديد بالصرعة إنما الشديد الذي يملك نفسه عند الغضب
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - ليس الشديد بالصرعة إنما الشديد الذي يملك نفسه عند الغضب
  - الشدّة ليست بالصرعة
  - إنما الشديد الذي يملك نفسه عند الغضب
  short_explanation: This is a hadith (prophetic saying) meaning 'The strong is not the one who wrestles,
    but the strong is the one who controls himself when angry.' It emphasizes self-control over physical
    strength.
  i18n_explanations:
    en: This is a hadith (prophetic saying) meaning 'The strong is not the one who wrestles, but the strong
      is the one who controls himself when angry.' It emphasizes self-control over physical strength.
    es: Este es un hadiz (dicho profético) que significa 'El fuerte no es el que lucha, sino el que se
      controla a sí mismo cuando está enojado'. Enfatiza el autocontrol sobre la fuerza física.
    fr: Ceci est un hadith (parole prophétique) signifiant 'Le fort n'est pas celui qui lutte, mais le
      fort est celui qui se maîtrise lorsqu'il est en colère'. Il met l'accent sur la maîtrise de soi
      plutôt que sur la force physique.
    de: Dies ist ein Hadith (prophetischer Ausspruch) mit der Bedeutung 'Der Starke ist nicht der, der
      ringt, sondern der Starke ist der, der sich selbst beherrscht, wenn er wütend ist.' Es betont Selbstbeherrschung
      gegenüber körperlicher Stärke.
    it: Questo è un hadith (detto profetico) che significa 'Il forte non è colui che lotta, ma il forte
      è colui che controlla se stesso quando è arrabbiato.' Sottolinea l'autocontrollo rispetto alla forza
      fisica.
    pt: Este é um hadith (dito profético) que significa 'O forte não é aquele que luta, mas o forte é
      aquele que se controla quando está com raiva.' Enfatiza o autocontrole sobre a força física.
    ru: Это хадис (пророческое изречение), означающий 'Сильный не тот, кто борется, а сильный тот, кто
      контролирует себя, когда злится'. Он подчеркивает самоконтроль над физической силой.
    ja: これはハディース（預言者の言葉）で、'強い者は格闘に勝つ者ではなく、怒っているときに自分を制御できる者である'という意味です。身体的強さよりも自制心を強調しています。
    zh: 这是一段圣训（先知言论），意思是'强者不是摔跤的人，而是愤怒时能控制自己的人'。它强调自我控制胜过体力。
    ar: هذا حديث نبوي معناه 'ليس الشديد بالصرعة إنما الشديد الذي يملك نفسه عند الغضب'. يؤكد على ضبط النفس
      على القوة البدنية.
    he: זהו חדית' (אמרה נבואית) שפירושו 'החזק אינו זה שנאבק, אלא החזק הוא זה השולט בעצמו כאשר הוא כועס'.
      הוא מדגיש שליטה עצמית על פני כוח פיזי.
