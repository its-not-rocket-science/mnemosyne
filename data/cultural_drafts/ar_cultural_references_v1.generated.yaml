- id: ar_classical_or_scriptural_allusion_يسروا_ولا_تعسروا_4825193d
  language: ar
  canonical_reference: يسروا ولا تعسروا
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - يسروا ولا تعسروا
  - يسروا ولا تعسروا وبشروا ولا تنفروا
  - يسروا ولا تعسروا وبشروا
  short_explanation: This prophetic command means 'Make things easy, do not make them difficult,' emphasizing
    facilitation and compassion in dealings. It is a core principle in Islamic ethics.
  i18n_explanations:
    en: This prophetic command means 'Make things easy, do not make them difficult,' emphasizing facilitation
      and compassion in dealings. It is a core principle in Islamic ethics.
    es: Este mandato profético significa 'Faciliten las cosas, no las dificulten', enfatizando la facilitación
      y la compasión en los tratos. Es un principio fundamental en la ética islámica.
    fr: Cet ordre prophétique signifie 'Rendez les choses faciles, ne les rendez pas difficiles', mettant
      l'accent sur la facilitation et la compassion dans les relations. C'est un principe central de l'éthique
      islamique.
    de: Dieser prophetische Befehl bedeutet 'Macht die Dinge leicht, macht sie nicht schwer' und betont
      Erleichterung und Mitgefühl im Umgang. Es ist ein Kernprinzip der islamischen Ethik.
    it: Questo comando profetico significa 'Rendete le cose facili, non rendetele difficili', sottolineando
      la facilitazione e la compassione nei rapporti. È un principio fondamentale dell'etica islamica.
    pt: Este comando profético significa 'Facilitem as coisas, não as dificultem', enfatizando a facilitação
      e a compaixão nas relações. É um princípio central na ética islâmica.
    ru: Это пророческое повеление означает 'Облегчайте, а не усложняйте', подчеркивая облегчение и сострадание
      в делах. Это ключевой принцип исламской этики.
    ja: この預言的な命令は「物事を容易にせよ、難しくするな」という意味で、扱いにおける促進と慈愛を強調しています。イスラム倫理の核となる原則です。
    zh: 这条先知的命令意思是‘使人容易，不要使人困难’，强调在交往中的方便和同情。这是伊斯兰伦理的核心原则。
    ar: هذا الأمر النبوي يعني 'يسروا ولا تعسروا'، ويؤكد على التيسير والرحمة في التعاملات. وهو مبدأ أساسي
      في الأخلاق الإسلامية.
    he: צו נבואי זה פירושו 'הקל על הדברים, אל תעשה אותם קשים', המדגיש הקלה וחמלה ביחסים. זהו עיקרון מרכזי
      באתיקה האסלאמית.
