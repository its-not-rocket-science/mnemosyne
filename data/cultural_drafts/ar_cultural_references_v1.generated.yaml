- id: ar_classical_or_scriptural_allusion_بسم_الله_الرحمن_الرحيم_4221505b
  language: ar
  canonical_reference: بسم الله الرحمن الرحيم
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - بسم الله الرحمن الرحيم
  - بسم الله
  short_explanation: The Basmalah ('In the name of God, the Most Gracious, the Most Merciful') is the
    opening phrase of each sura in the Quran (except Sura 9) and is widely used by Muslims to begin actions,
    invoking God's blessing.
  i18n_explanations:
    en: The Basmalah ('In the name of God, the Most Gracious, the Most Merciful') is the opening phrase
      of each sura in the Quran (except Sura 9) and is widely used by Muslims to begin actions, invoking
      God's blessing.
    es: La Basmalah ('En el nombre de Dios, el Más Misericordioso, el Más Compasivo') es la frase inicial
      de cada sura del Corán (excepto la sura 9) y es ampliamente utilizada por los musulmanes para comenzar
      acciones, invocando la bendición de Dios.
    fr: La Basmalah ('Au nom de Dieu, le Tout Miséricordieux, le Très Miséricordieux') est la phrase d'ouverture
      de chaque sourate du Coran (sauf la sourate 9) et est largement utilisée par les musulmans pour
      commencer des actions, invoquant la bénédiction de Dieu.
    de: Die Basmala ('Im Namen Gottes, des Allerbarmers, des Barmherzigen') ist der Eröffnungssatz jeder
      Sure im Koran (außer Sure 9) und wird von Muslimen häufig verwendet, um Handlungen zu beginnen und
      Gottes Segen anzurufen.
    it: La Basmalah ('Nel nome di Dio, il Clemente, il Misericordioso') è la frase di apertura di ogni
      sura del Corano (eccetto la sura 9) ed è ampiamente usata dai musulmani per iniziare le azioni,
      invocando la benedizione di Dio.
    pt: A Basmalah ('Em nome de Deus, o Misericordioso, o Compassivo') é a frase de abertura de cada sura
      do Alcorão (exceto a sura 9) e é amplamente usada pelos muçulmanos para iniciar ações, invocando
      a bênção de Deus.
    ru: Басмала ('Во имя Аллаха, Милостивого, Милосердного') — это вступительная фраза каждой суры Корана
      (кроме суры 9), широко используемая мусульманами для начала действий, призывая благословение Аллаха.
    ja: ビスミッラー（「慈悲あまねく慈愛深きアッラーの御名において」）は、クルアーンの各スーラの冒頭句（第9章を除く）であり、ムスリムが行いを始める際にアッラーの祝福を求めて広く用いられる。
    zh: 太斯米（“奉至仁至慈的真主之名”）是《古兰经》每一章（第9章除外）的开头短语，穆斯林广泛用于开始行动，祈求真主的祝福。
    ar: البسملة ('بسم الله الرحمن الرحيم') هي العبارة الافتتاحية لكل سورة في القرآن (ما عدا سورة التوبة)،
      ويستخدمها المسلمون على نطاق واسع لبدء الأعمال، استدعاءً لبركة الله.
    he: הבסמאלה ('בשם אלוהים, הרחמן, הרחום') היא ביטוי הפתיחה של כל סורה בקוראן (מלבד סורה 9) והיא נמצאת
      בשימוש נרחב על ידי מוסלמים כדי להתחיל פעולות, תוך קריאה לברכת אלוהים.
