    ja: ヤルムークの戦いは、636年にイスラムアラブ軍とビザンツ帝国との間で行われた大規模な戦闘で、アラブ側の決定的勝利とシリアの併合をもたらした。
    zh: 雅尔穆克战役是公元636年穆斯林阿拉伯军队与拜占庭帝国之间的一场重大军事冲突，结果阿拉伯人取得决定性胜利，并吞并了叙利亚。
    ar: معركة اليرموك كانت اشتباكًا عسكريًا كبيرًا بين القوات العربية المسلمة والإمبراطورية البيزنطية
