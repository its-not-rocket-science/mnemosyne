- id: ar_proverb_tradition_التمس_لأخيك_عذرا_0d397fb9
  language: ar
  canonical_reference: التمس لأخيك عذرا
  reference_type: proverb_tradition
  surface_patterns:
  - التمس لأخيك عذرا
  - التمس لأخيك العذر
  - ألتمس لأخيك عذرا
  short_explanation: It means 'Seek an excuse for your brother,' encouraging giving others the benefit
    of the doubt and forgiving their mistakes. It is a widely used proverb in Arab culture promoting tolerance.
  i18n_explanations:
    en: It means 'Seek an excuse for your brother,' encouraging giving others the benefit of the doubt
      and forgiving their mistakes. It is a widely used proverb in Arab culture promoting tolerance.
    es: Significa 'Busca una excusa para tu hermano', animando a dar a otros el beneficio de la duda y
      perdonar sus errores. Es un proverbio ampliamente utilizado en la cultura árabe que promueve la
      tolerancia.
    fr: Cela signifie 'Cherche une excuse pour ton frère', encourageant à donner aux autres le bénéfice
      du doute et à pardonner leurs erreurs. C'est un proverbe largement utilisé dans la culture arabe
      promouvant la tolérance.
    de: Es bedeutet 'Suche eine Entschuldigung für deinen Bruder' und ermutigt, anderen den Vorteil des
      Zweifels zu geben und ihre Fehler zu vergeben. Es ist ein weit verbreitetes Sprichwort in der arabischen
      Kultur, das Toleranz fördert.
    it: Significa 'Cerca una scusa per tuo fratello', incoraggiando a dare agli altri il beneficio del
      dubbio e perdonare i loro errori. È un proverbio ampiamente usato nella cultura araba che promuove
      la tolleranza.
    pt: Significa 'Procure uma desculpa para seu irmão', incentivando a dar aos outros o benefício da
      dúvida e perdoar seus erros. É um provérbio amplamente usado na cultura árabe que promove a tolerância.
    ru: Это означает 'Ищи оправдание для своего брата', побуждая давать другим сомнение и прощать их ошибки.
      Это широко используемая пословица в арабской культуре, пропагандирующая терпимость.
    ja: '''あなたの兄弟のために言い訳を探せ''という意味で、他人に疑いの利益を与え、過ちを許すことを勧めています。アラブ文化で広く使われる、寛容を促進することわざです。'
    zh: 意思是'为你的兄弟寻找借口'，鼓励给予他人怀疑的好处并原谅他们的错误。这是一个在阿拉伯文化中广泛使用的谚语，倡导宽容。
    ar: تعني 'التمس لأخيك عذرا'، تشجع على إعطاء الآخرين فائدة الشك ومسامحة أخطائهم. إنه مثل شائع في الثقافة
      العربية يعزز التسامح.
    he: זה אומר 'חפש תירוץ לאחיך', מעודד לתת לאחרים את היתרון של הספק ולסלוח על טעויותיהם. זהו פתגם נפוץ
      בתרבות הערבית המקדם סובלנות.
