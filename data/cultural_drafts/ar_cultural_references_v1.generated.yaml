  - مأجوج
  - يأجوج و مأجوج
  short_explanation: In Islamic and Judeo-Christian tradition, Gog and Magog are barbarous tribes that
    will be released before the Day of Judgment to cause chaos. They symbolize destructive forces.
  i18n_explanations:
    en: In Islamic and Judeo-Christian tradition, Gog and Magog are barbarous tribes that will be released
      before the Day of Judgment to cause chaos. They symbolize destructive forces.
    es: En la tradición islámica y judeocristiana, Gog y Magog son tribus bárbaras que serán liberadas
      antes del Día del Juicio para causar caos. Simbolizan fuerzas destructivas.
    fr: Dans la tradition islamique et judéo-chrétienne, Gog et Magog sont des tribus barbares qui seront
      libérées avant le Jour du Jugement pour semer le chaos. Ils symbolisent les forces destructrices.
    de: In der islamischen und jüdisch-christlichen Tradition sind Gog und Magog barbarische Stämme, die
      vor dem Jüngsten Tag losgelassen werden, um Chaos zu verursachen. Sie symbolisieren zerstörerische
      Kräfte.
    it: Nella tradizione islamica e giudeo-cristiana, Gog e Magog sono tribù barbare che saranno liberate
      prima del Giorno del Giudizio per causare caos. Simboleggiano forze distruttive.
    pt: Na tradição islâmica e judaico-cristã, Gogue e Magogue são tribos bárbaras que serão libertadas
      antes do Dia do Juízo para causar caos. Eles simbolizam forças destrutivas.
    ru: В исламской и иудео-христианской традиции Гог и Магог — это варварские племена, которые будут
      выпущены перед Судным днем, чтобы сеять хаос. Они символизируют разрушительные силы.
    ja: イスラム教とユダヤ・キリスト教の伝統において、ゴグとマゴグは審判の日の前に解き放たれて混乱を引き起こす野蛮な部族です。それらは破壊的な力を象徴します。
    zh: 在伊斯兰教和犹太-基督教传统中，歌革和玛各是野蛮的部落，将在审判日之前被释放以造成混乱。它们象征着破坏力量。
    ar: في التقليد الإسلامي واليهودي المسيحي، يأجوج ومأجوج هما قبيلتان همجيتان سيتم إطلاقهما قبل يوم القيامة
      لإحداث الفوضى. يرمزان إلى القوى المدمرة.
    he: במסורת האסלאמית והיהודית-נוצרית, גוג ומגוג הם שבטים פראיים שישוחררו לפני יום הדין כדי לגרום לתוהו
      ובוהו. הם מסמלים כוחות הרסניים.
