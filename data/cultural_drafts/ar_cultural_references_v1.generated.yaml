  short_explanation: A classic saying meaning 'Knowledge is light, ignorance is darkness,' commonly used
    to highlight the importance of education. It is often attributed to Islamic tradition but is widely
    used in secular contexts.
  i18n_explanations:
    en: A classic saying meaning 'Knowledge is light, ignorance is darkness,' commonly used to highlight
      the importance of education. It is often attributed to Islamic tradition but is widely used in secular
      contexts.
    es: Un dicho clásico que significa 'El conocimiento es luz, la ignorancia es oscuridad', comúnmente
      usado para resaltar la importancia de la educación. A menudo se atribuye a la tradición islámica
      pero se usa ampliamente en contextos seculares.
    fr: Un dicton classique signifiant 'La connaissance est lumière, l'ignorance est ténèbres', couramment
      utilisé pour souligner l'importance de l'éducation. Il est souvent attribué à la tradition islamique
      mais largement utilisé dans des contextes laïques.
    de: Ein klassischer Spruch mit der Bedeutung 'Wissen ist Licht, Unwissenheit ist Dunkelheit', der
      häufig verwendet wird, um die Bedeutung der Bildung hervorzuheben. Wird oft der islamischen Tradition
      zugeschrieben, ist aber in säkularen Kontexten weit verbreitet.
    it: Un detto classico che significa 'La conoscenza è luce, l'ignoranza è oscurità', comunemente usato
      per evidenziare l'importanza dell'istruzione. Spesso attribuito alla tradizione islamica ma ampiamente
      usato in contesti laici.
    pt: Um ditado clássico que significa 'O conhecimento é luz, a ignorância é escuridão', comumente usado
      para destacar a importância da educação. É frequentemente atribuído à tradição islâmica, mas é amplamente
      usado em contextos seculares.
    ru: Классическое изречение, означающее 'Знание — свет, невежество — тьма', обычно используемое для
      подчеркивания важности образования. Часто приписывается исламской традиции, но широко используется
      в светских контекстах.
    ja: 「知識は光、無知は闇」という古典的な格言で、教育の重要性を強調するためによく使われます。イスラムの伝統に由来することが多いですが、世俗的な文脈でも広く使われています。
    zh: 一句经典格言，意为'知识是光明，无知是黑暗'，常用于强调教育的重要性。常被归因于伊斯兰传统，但在世俗语境中也广泛使用。
    ar: قول كلاسيكي يعني 'العلم نور والجهل ظلام'، يستخدم بشكل شائع لتسليط الضوء على أهمية التعليم. غالباً
