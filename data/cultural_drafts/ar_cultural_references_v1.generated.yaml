- id: ar_cultural_reference_معركة_الزاب_5be160f9
  language: ar
  canonical_reference: معركة الزاب
  reference_type: cultural_reference
  surface_patterns:
  - معركة الزاب
  - الزاب
  - وقعة الزاب
  short_explanation: The Battle of the Zab (750 CE) was a decisive conflict between the Umayyad and Abbasid
    forces, leading to the fall of the Umayyad Caliphate and the rise of the Abbasid dynasty.
  i18n_explanations:
    en: The Battle of the Zab (750 CE) was a decisive conflict between the Umayyad and Abbasid forces,
      leading to the fall of the Umayyad Caliphate and the rise of the Abbasid dynasty.
    es: La Batalla del Gran Zab (750 d.C.) fue un conflicto decisivo entre las fuerzas omeyas y abasíes,
      que llevó a la caída del Califato Omeya y al ascenso de la dinastía abasí.
    fr: La bataille du Grand Zab (750 de notre ère) fut un conflit décisif entre les forces omeyyades
      et abbassides, entraînant la chute du califat omeyyade et l'essor de la dynastie abbasside.
    de: Die Schlacht am Großen Zab (750 n. Chr.) war eine entscheidende Auseinandersetzung zwischen den
      umayyadischen und abbasidischen Streitkräften, die zum Sturz des Umayyaden-Kalifats und zum Aufstieg
      der Abbasiden-Dynastie führte.
    it: La battaglia del Grande Zab (750 d.C.) fu un conflitto decisivo tra le forze omayyadi e abbasidi,
      che portò alla caduta del califfato omayyade e all'ascesa della dinastia abbaside.
    pt: A Batalha do Grande Zab (750 d.C.) foi um conflito decisivo entre as forças omíadas e abássidas,
      levando à queda do Califado Omíada e à ascensão da dinastia abássida.
    ru: Битва при Великом Забе (750 год н.э.) была решающим конфликтом между омейядскими и аббасидскими
      силами, приведшим к падению Омейядского халифата и возвышению династии Аббасидов.
    ja: ザーブ川の戦い（750年）は、ウマイヤ朝とアッバース朝の勢力間の決定的な戦闘であり、ウマイヤ朝の崩壊とアッバース朝の台頭をもたらした。
    zh: 扎卜河战役（公元750年）是倭马亚王朝与阿拔斯王朝军队之间的一场决定性冲突，导致倭马亚哈里发灭亡、阿拔斯王朝崛起。
    ar: معركة الزاب (750 ميلادية) كانت صراعاً حاسماً بين القوات الأموية والعباسية، أدى إلى سقوط الخلافة
      الأموية وصعود الدولة العباسية.
    he: קרב הזאב (750 לספירה) היה עימות מכריע בין הכוחות האומיים והעבאסיים, שהוביל לנפילת הח'ליפות האומית
      ולעליית השושלת העבאסית.
