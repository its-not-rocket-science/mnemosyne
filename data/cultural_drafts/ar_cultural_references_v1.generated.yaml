  short_explanation: A righteous ruler mentioned in the Quran (Surah Al-Kahf) who traveled to the ends
    of the earth and built a wall to contain Gog and Magog; often identified with Alexander the Great
    in Islamic tradition.
  i18n_explanations:
    en: A righteous ruler mentioned in the Quran (Surah Al-Kahf) who traveled to the ends of the earth
      and built a wall to contain Gog and Magog; often identified with Alexander the Great in Islamic
      tradition.
    es: Un gobernante justo mencionado en el Corán (Surah Al-Kahf) que viajó a los confines de la tierra
      y construyó un muro para contener a Gog y Magog; a menudo identificado con Alejandro Magno en la
      tradición islámica.
    fr: Un dirigeant juste mentionné dans le Coran (Sourate Al-Kahf) qui a voyagé aux extrémités de la
      terre et a construit un mur pour contenir Gog et Magog ; souvent identifié à Alexandre le Grand
      dans la tradition islamique.
    de: Ein gerechter Herrscher, der im Koran (Surah Al-Kahf) erwähnt wird, der bis an die Enden der Erde
      reiste und eine Mauer baute, um Gog und Magog einzuschließen; in der islamischen Tradition oft mit
      Alexander dem Großen identifiziert.
    it: Un sovrano giusto menzionato nel Corano (Sura Al-Kahf) che viaggiò fino ai confini della terra
      e costruì un muro per contenere Gog e Magog; spesso identificato con Alessandro Magno nella tradizione
      islamica.
    pt: Um governante justo mencionado no Alcorão (Surah Al-Kahf) que viajou até os confins da terra e
      construiu um muro para conter Gog e Magog; frequentemente identificado com Alexandre, o Grande,
      na tradição islâmica.
    ru: Праведный правитель, упомянутый в Коране (сура Аль-Кахф), который путешествовал до краёв земли
      и построил стену, чтобы сдержать Гога и Магога; в исламской традиции часто отождествляется с Александром
      Македонским.
    ja: コーラン（スーラ・アル・カフ）に登場する正義の支配者で、地の果てまで旅をし、ゴグとマゴグを封じ込める壁を築きました。イスラムの伝統ではしばしばアレクサンダー大王と同一視されます。
    zh: 《古兰经》（山洞章）中提到的一位正义统治者，他游历了天涯海角，并建造了一堵墙来围住歌革和玛各；在伊斯兰传统中常被认同为亚历山大大帝。
    ar: حاكم صالح مذكور في القرآن (سورة الكهف) سافر إلى أقاصي الأرض وبنى سدًا لاحتواء يأجوج ومأجوج؛ غالبًا
      ما يُعرف بالإسكندر الأكبر في التقليد الإسلامي.
    he: שליט צדיק המוזכר בקוראן (סורה אל-כהף) שנסע עד קצוות הארץ ובנה חומה כדי להכיל את גוג ומגוג; מזוהה
      לעתים קרובות עם אלכסנדר מוקדון במסורת האסלאמית.
