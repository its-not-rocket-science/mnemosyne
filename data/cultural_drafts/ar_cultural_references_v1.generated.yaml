  short_explanation: The Battle of Hattin (1187 AD) was a decisive victory for Saladin over the Crusaders,
    leading to the recapture of Jerusalem and a turning point in the Crusades.
  i18n_explanations:
    en: The Battle of Hattin (1187 AD) was a decisive victory for Saladin over the Crusaders, leading
      to the recapture of Jerusalem and a turning point in the Crusades.
    es: La Batalla de Hattin (1187 d.C.) fue una victoria decisiva de Saladino sobre los cruzados, lo
      que llevó a la recaptura de Jerusalén y un punto de inflexión en las Cruzadas.
    fr: La bataille de Hattin (1187 ap. J.-C.) fut une victoire décisive de Saladin sur les croisés, conduisant
      à la reprise de Jérusalem et à un tournant dans les croisades.
    de: Die Schlacht von Hattin (1187 n. Chr.) war ein entscheidender Sieg Saladins über die Kreuzfahrer,
      der zur Rückeroberung Jerusalems und zu einem Wendepunkt in den Kreuzzügen führte.
    it: La battaglia di Hattin (1187 d.C.) fu una vittoria decisiva di Saladino sui crociati, portando
      alla riconquista di Gerusalemme e a un punto di svolta nelle Crociate.
    pt: A Batalha de Hattin (1187 d.C.) foi uma vitória decisiva de Saladino sobre os cruzados, levando
      à recaptura de Jerusalém e a um ponto de virada nas Cruzadas.
    ru: Битва при Хаттине (1187 г. н.э.) стала решающей победой Саладина над крестоносцами, приведшей
      к возвращению Иерусалима и переломному моменту в Крестовых походах.
    ja: ハッティンの戦い（1187年）は、サラディンが十字軍に対して決定的な勝利を収め、エルサレムを奪還し、十字軍の転換点となった。
    zh: 哈丁战役（公元1187年）是萨拉丁对十字军的一次决定性胜利，导致耶路撒冷被收复，成为十字军东征的转折点。
    ar: معركة حطين (1187 م) كانت نصرًا حاسمًا لصلاح الدين على الصليبيين، مما أدى إلى استعادة القدس ونقطة
      تحول في الحروب الصليبية.
    he: קרב חיטין (1187 לספירה) היה ניצחון מכריע של צלאח א-דין על הצלבנים, שהוביל לכיבוש מחדש של ירושלים
