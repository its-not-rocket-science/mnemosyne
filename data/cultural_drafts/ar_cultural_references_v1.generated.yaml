  i18n_explanations:
    en: A line from the love poetry of Majnun Layla (Qays ibn al-Mulawwah), meaning 'Asma' announced her
      separation to us.' It expresses the pain of parting from a beloved.
    es: Un verso de la poesía amorosa de Majnún Layla (Qays ibn al-Mulawwah) que significa 'Asma nos anunció
      su separación'. Expresa el dolor de la separación de un ser amado.
    fr: Un vers de la poésie amoureuse de Majnoun Layla (Qays ibn al-Mulawwah) signifiant 'Asma' nous
      a annoncé sa séparation'. Il exprime la douleur de la séparation d'avec un être aimé.
    de: 'Ein Vers aus der Liebesdichtung von Majnun Layla (Qays ibn al-Mulawwah), der bedeutet: ''Asma''
      kündigte uns ihre Trennung an.'' Er drückt den Schmerz der Trennung von einem geliebten Menschen
      aus.'
    it: Un verso della poesia d'amore di Majnun Layla (Qays ibn al-Mulawwah) che significa 'Asma' ci ha
      annunciato la sua separazione'. Esprime il dolore della separazione da un amato.
    pt: Um verso da poesia de amor de Majnun Layla (Qays ibn al-Mulawwah) que significa 'Asma' nos anunciou
      sua separação'. Expressa a dor da separação de um amado.
    ru: Строка из любовной поэзии Меджнуна Лейлы (Кайс ибн аль-Мулаввах), означающая «Асма объявила нам
      о своей разлуке». Выражает боль разлуки с возлюбленной.
    ja: マジュヌーン・ライラー（カイス・イブン・アル＝ムラウワフ）の恋愛詩の一節で、「アスマーが別れを知らせた」という意味です。愛する人との別れの痛みを表現しています。
    zh: 马杰农·莱拉（盖斯·伊本·穆拉瓦赫）爱情诗中的一行，意为“阿斯玛向我们宣布了分离”。表达与爱人分离的痛苦。
    ar: 'بيت من شعر الغزل لمجنون ليلى (قيس بن الملوح)، معناه: ''آذنتنا ببينها أسماء''. يعبر عن ألم الفراق
