- id: ar_literary_reference_وإذا_المني_ة_أنشبت_أظفارها_c2a3a57b
  language: ar
  canonical_reference: وإذا المنيَّة أنشبت أظفارها
  reference_type: literary_reference
  surface_patterns:
  - وإذا المنيَّة أنشبت أظفارها
  - إذا المنيَّة أنشبت أظفارها
  - وإذا المنايا أنشبت أظفارها
  short_explanation: A line from Al-Mutanabbi meaning 'When death sinks its claws,' often completed with
    'you find every amulet useless,' highlighting the inevitability of death.
  i18n_explanations:
    en: A line from Al-Mutanabbi meaning 'When death sinks its claws,' often completed with 'you find
      every amulet useless,' highlighting the inevitability of death.
    es: Un verso de Al-Mutanabbi que significa 'Cuando la muerte clava sus garras', a menudo completado
      con 'encuentras todo amuleto inútil', destacando la inevitabilidad de la muerte.
    fr: Un vers d'Al-Mutanabbi signifiant 'Quand la mort plante ses griffes', souvent complété par 'tu
      trouves toute amulette inutile', soulignant l'inévitabilité de la mort.
    de: 'Ein Vers von Al-Mutanabbi, der bedeutet: ''Wenn der Tod seine Krallen schlägt'', oft ergänzt
      mit ''findest du jeden Talisman nutzlos'', was die Unvermeidlichkeit des Todes hervorhebt.'
    it: Un verso di Al-Mutanabbi che significa 'Quando la morte affonda i suoi artigli', spesso completato
      con 'trovi ogni amuleto inutile', sottolineando l'inevitabilità della morte.
    pt: Um verso de Al-Mutanabbi que significa 'Quando a morte crava suas garras', frequentemente completado
      com 'você acha todo amuleto inútil', destacando a inevitabilidade da morte.
    ru: Строка из аль-Мутанабби, означающая 'Когда смерть вонзает свои когти', часто завершаемая 'ты находишь
      каждый амулет бесполезным', подчёркивающая неизбежность смерти.
    ja: アル＝ムタナッビーの一節で、「死がその爪を突き立てるとき」という意味。しばしば「あらゆるお守りが役に立たない」と続き、死の不可避性を強調している。
    zh: 穆太奈比的一行诗，意为'当死亡伸出利爪'，常接'你会发现所有护身符都无用'，强调死亡的不可避免。
    ar: بيت من المتنبي يعني 'وإذا المنيَّة أنشبت أظفارها'، وغالباً ما يُكمل بعبارة 'ألفيت كل تميمة لا
      تنفع'، مسلطاً الضوء على حتمية الموت.
    he: שורה מאל-מתנבי שמשמעותה 'כשהמוות טובע את ציפורניו', לרוב מושלמת עם 'אתה מוצא כל קמע חסר תועלת',
      המדגישה את הבלתי נמנע של המוות.
