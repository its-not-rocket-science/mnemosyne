  i18n_explanations:
    en: A common Arabic proverb meaning 'Patience is the key to relief', signifying that enduring hardship
      leads to eventual ease; deeply rooted in Islamic culture.
    es: Un proverbio árabe común que significa 'La paciencia es la clave del alivio', significando que
      soportar las dificultades conduce a la facilidad eventual; profundamente arraigado en la cultura
      islámica.
    fr: Un proverbe arabe courant signifiant 'La patience est la clé du soulagement', signifiant que l'endurance
      des difficultés mène à la facilité éventuelle ; profondément enraciné dans la culture islamique.
    de: Ein gebräuchliches arabisches Sprichwort, das bedeutet 'Geduld ist der Schlüssel zur Erleichterung',
      bedeutet, dass das Ertragen von Härten zu letztendlicher Leichtigkeit führt; tief in der islamischen
      Kultur verwurzelt.
    it: Un comune proverbio arabo che significa 'La pazienza è la chiave del sollievo', a significare
      che sopportare le difficoltà porta alla facilità eventuale; profondamente radicato nella cultura
      islamica.
    pt: Um provérbio árabe comum que significa 'A paciência é a chave para o alívio', significando que
      suportar as dificuldades leva eventualmente à facilidade; profundamente enraizado na cultura islâmica.
    ru: Распространенная арабская пословица, означающая «Терпение — ключ к облегчению», означающая, что
