  short_explanation: Abd al-Malik ibn Marwan was the fifth Umayyad caliph, reigning from 685 to 705 CE.
    He is known for centralizing the Islamic state, building the Dome of the Rock, and issuing the first
    Islamic coinage.
  i18n_explanations:
    en: Abd al-Malik ibn Marwan was the fifth Umayyad caliph, reigning from 685 to 705 CE. He is known
      for centralizing the Islamic state, building the Dome of the Rock, and issuing the first Islamic
      coinage.
    es: Abd al-Malik ibn Marwan fue el quinto califa omeya, reinando del 685 al 705 d.C. Es conocido por
      centralizar el estado islámico, construir la Cúpula de la Roca y emitir la primera moneda islámica.
    fr: Abd al-Malik ibn Marwan était le cinquième calife omeyyade, régnant de 685 à 705 de notre ère.
      Il est connu pour avoir centralisé l'État islamique, construit le Dôme du Rocher et émis la première
      monnaie islamique.
    de: Abd al-Malik ibn Marwan war der fünfte umayyadische Kalif und regierte von 685 bis 705 n. Chr.
      Er ist bekannt für die Zentralisierung des islamischen Staates, den Bau des Felsendoms und die Ausgabe
      der ersten islamischen Münzen.
    it: Abd al-Malik ibn Marwan fu il quinto califfo omayyade, regnante dal 685 al 705 d.C. È noto per
      aver centralizzato lo stato islamico, costruito la Cupola della Roccia ed emesso la prima moneta
      islamica.
    pt: Abd al-Malik ibn Marwan foi o quinto califa omíada, reinando de 685 a 705 d.C. Ele é conhecido
      por centralizar o estado islâmico, construir o Domo da Rocha e emitir a primeira moeda islâmica.
    ru: Абд аль-Малик ибн Марван был пятым омейядским халифом, правившим с 685 по 705 год н.э. Он известен
      централизацией исламского государства, строительством Купола Скалы и выпуском первых исламских монет.
    ja: アブドゥルマリク・イブン・マルワーンは第5代ウマイヤ朝カリフで、685年から705年まで統治した。彼はイスラム国家の中央集権化、岩のドームの建設、最初のイスラム硬貨の発行で知られる。
    zh: 阿卜杜勒·马利克·本·马尔万是第五任倭马亚王朝哈里发，统治期为公元685年至705年。他以中央集权伊斯兰国家、建造圆顶清真寺以及发行第一枚伊斯兰钱币而闻名。
    ar: كان عبد الملك بن مروان الخليفة الأموي الخامس، حكم من 685 إلى 705 ميلادية. يُعرف بتوحيد الدولة
      الإسلامية، وبناء قبة الصخرة، وإصدار أول عملة إسلامية.
    he: עבד אל-מלכ אבן מרואן היה הח'ליף האומיי החמישי, ששלט מ-685 עד 705 לספירה. הוא ידוע בריכוז המדינה
      האסלאמית, בניית כיפת הסלע והנפקת המטבעות האסלאמיים הראשונים.
