  - المرء بأصغريه
  short_explanation: 'It means ''A man is (known by) his two smallest parts: his heart and his tongue,''
    indicating that a person''s character is revealed through their intentions and speech. Often attributed
    to Ali ibn Abi Talib.'
  i18n_explanations:
    en: 'It means ''A man is (known by) his two smallest parts: his heart and his tongue,'' indicating
      that a person''s character is revealed through their intentions and speech. Often attributed to
      Ali ibn Abi Talib.'
    es: 'Significa ''Un hombre es (conocido por) sus dos partes más pequeñas: su corazón y su lengua'',
      indicando que el carácter de una persona se revela a través de sus intenciones y su habla. A menudo
      se atribuye a Ali ibn Abi Talib.'
    fr: 'Cela signifie ''Un homme est (connu par) ses deux plus petites parties: son cœur et sa langue'',
      indiquant que le caractère d''une personne se révèle à travers ses intentions et sa parole. Souvent
      attribué à Ali ibn Abi Talib.'
    de: 'Es bedeutet ''Ein Mann ist (bekannt durch) seine beiden kleinsten Teile: sein Herz und seine
      Zunge'', was darauf hinweist, dass der Charakter einer Person durch ihre Absichten und ihre Sprache
      offenbart wird. Oft Ali ibn Abi Talib zugeschrieben.'
    it: 'Significa ''Un uomo è (conosciuto) dalle sue due parti più piccole: il suo cuore e la sua lingua'',
      indicando che il carattere di una persona si rivela attraverso le sue intenzioni e il suo parlare.
      Spesso attribuito ad Ali ibn Abi Talib.'
    pt: 'Significa ''Um homem é (conhecido por) suas duas partes menores: seu coração e sua língua'',
      indicando que o caráter de uma pessoa é revelado através de suas intenções e fala. Frequentemente
      atribuído a Ali ibn Abi Talib.'
    ru: 'Это означает ''Человек познается по двум самым маленьким частям: сердцу и языку'', указывая,
      что характер человека раскрывается через его намерения и речь. Часто приписывается Али ибн Аби Талибу.'
    ja: '''人は最も小さな二つの部分、すなわち心と舌によって知られる''という意味で、人の性格は意図と話し方によって明らかになることを示しています。アリー・イブン・アビー・ターリブの言葉とされることが多いです。'
    zh: 意思是'人由他最微小的两部分所认识：内心和舌头'，表明一个人的性格通过他们的意图和言语显现。常归因于阿里·伊本·阿比·塔利卜。
    ar: تعني 'المرء بأصغريه قلبه ولسانه'، مشيرة إلى أن شخصية الإنسان تتجلى من خلال نواياه وكلامه. تُنسب
      غالبًا إلى علي بن أبي طالب.
    he: 'זה אומר ''אדם מוכר לפי שני חלקיו הקטנים ביותר: ליבו ולשונו'', ומצביע על כך שאופיו של אדם מתגלה
      דרך כוונותיו ודיבורו. מיוחס לעתים קרובות לעלי אבן אבי טאלב.'
