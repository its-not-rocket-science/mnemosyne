    a major center of Islamic culture and learning in North Africa.
  i18n_explanations:
    en: The founding of Kairouan in 670 CE by the Arab general Uqba ibn Nafi. Kairouan became a major
      center of Islamic culture and learning in North Africa.
    es: La fundación de Kairuán en el año 670 d.C. por el general árabe Uqba ibn Nafi. Kairuán se convirtió
      en un importante centro de cultura y aprendizaje islámico en el norte de África.
    fr: La fondation de Kairouan en 670 de notre ère par le général arabe Uqba ibn Nafi. Kairouan est
      devenue un centre majeur de la culture et de l'apprentissage islamiques en Afrique du Nord.
    de: Die Gründung von Kairouan im Jahr 670 n. Chr. durch den arabischen General Uqba ibn Nafi. Kairouan
      wurde zu einem bedeutenden Zentrum islamischer Kultur und Gelehrsamkeit in Nordafrika.
    it: La fondazione di Kairouan nel 670 d.C. da parte del generale arabo Uqba ibn Nafi. Kairouan divenne
      un importante centro di cultura e apprendimento islamico in Nord Africa.
    pt: A fundação de Cairuão em 670 d.C. pelo general árabe Uqba ibn Nafi. Cairuão tornou-se um importante
      centro de cultura e aprendizado islâmico no Norte da África.
    ru: Основание Кайруана в 670 году н.э. арабским полководцем Укбой ибн Нафи. Кайруан стал крупным центром
      исламской культуры и образования в Северной Африке.
    ja: 670年にアラブの将軍ウクバ・イブン・ナーフィによって創設されたカイラワーン。カイラワーンは北アフリカにおけるイスラム文化と学問の主要な中心地となった。
    zh: 公元670年，阿拉伯将军乌克巴·伊本·纳菲创立了凯鲁万。凯鲁万成为北非伊斯兰文化和学术的主要中心。
    ar: تأسيس القيروان عام 670 ميلادية على يد القائد العربي عقبة بن نافع. أصبحت القيروان مركزاً رئيسياً
