    pt: A conquista muçulmana da Península Ibérica (Al-Andalus) começou em 711 d.C. sob Tariq ibn Ziyad,
      estabelecendo o domínio islâmico na Espanha por séculos.
    ru: Мусульманское завоевание Пиренейского полуострова (Аль-Андалус) началось в 711 году н.э. под предводительством
