  short_explanation: A mythical island in Arabic folklore, especially in the 'One Thousand and One Nights',
    said to be inhabited by women who grow on trees or have bird-like forms, symbolizing the exotic and
    mysterious.
  i18n_explanations:
    en: A mythical island in Arabic folklore, especially in the 'One Thousand and One Nights', said to
      be inhabited by women who grow on trees or have bird-like forms, symbolizing the exotic and mysterious.
    es: Una isla mítica en el folclore árabe, especialmente en 'Las mil y una noches', que se dice está
      habitada por mujeres que crecen en los árboles o tienen formas de pájaro, simbolizando lo exótico
      y misterioso.
    fr: Une île mythique du folklore arabe, en particulier dans les 'Mille et Une Nuits', qui serait habitée
      par des femmes poussant sur les arbres ou ayant des formes d'oiseaux, symbolisant l'exotisme et
      le mystère.
    de: Eine mythische Insel in der arabischen Folklore, insbesondere in 'Tausendundeine Nacht', die angeblich
      von Frauen bewohnt wird, die auf Bäumen wachsen oder vogelähnliche Gestalten haben, und das Exotische
      und Geheimnisvolle symbolisiert.
    it: Un'isola mitica nel folklore arabo, specialmente nelle 'Mille e una notte', che si dice sia abitata
      da donne che crescono sugli alberi o hanno forme simili a uccelli, simboleggiando l'esotico e il
      misterioso.
    pt: Uma ilha mítica no folclore árabe, especialmente em 'As Mil e Uma Noites', que se diz ser habitada
      por mulheres que crescem em árvores ou têm formas de pássaros, simbolizando o exótico e misterioso.
    ru: Мифический остров в арабском фольклоре, особенно в «Тысяче и одной ночи», который, как говорят,
      населён женщинами, растущими на деревьях или имеющими птицеподобные формы, символизирующий экзотику
      и тайну.
    ja: アラブの民間伝承、特に『千夜一夜物語』に登場する神話上の島で、木に生える女性や鳥のような姿をした女性が住むと言われ、異国情緒と神秘を象徴しています。
    zh: 阿拉伯民间传说中的一个神话岛屿，尤其在《一千零一夜》中，据说是由树上长出的女人或具有鸟形女人居住，象征着异域风情和神秘。
    ar: جزيرة أسطورية في الفولكلور العربي، خاصة في 'ألف ليلة وليلة'، يقال إنها مأهولة بنساء ينمون على
