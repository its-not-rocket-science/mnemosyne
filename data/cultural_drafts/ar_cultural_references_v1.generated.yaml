    de: Die muslimische Eroberung der Iberischen Halbinsel (Al-Andalus) begann im Jahr 711 n. Chr. unter
      Tariq ibn Ziyad und begründete jahrhundertelange islamische Herrschaft in Spanien.
    it: La conquista musulmana della penisola iberica (Al-Andalus) iniziò nel 711 d.C. sotto Tariq ibn
