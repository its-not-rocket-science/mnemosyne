- id: ar_cultural_reference_سليم_الأول_2892acc8
  language: ar
  canonical_reference: سليم الأول
  reference_type: cultural_reference
  surface_patterns:
  - سليم الأول
  - السلطان سليم الأول
  - سليم
  short_explanation: Selim I (1470-1520) was the Ottoman sultan who expanded the empire into the Middle
    East, conquering the Mamluk Sultanate and assuming the caliphate. He is known as 'Selim the Grim'
    and is a prominent figure in Ottoman history.
  i18n_explanations:
    en: Selim I (1470-1520) was the Ottoman sultan who expanded the empire into the Middle East, conquering
      the Mamluk Sultanate and assuming the caliphate. He is known as 'Selim the Grim' and is a prominent
      figure in Ottoman history.
    es: Selim I (1470-1520) fue el sultán otomano que expandió el imperio hacia Oriente Medio, conquistando
      el sultanato mameluco y asumiendo el califato. Es conocido como 'Selim el Severo' y es una figura
      prominente en la historia otomana.
    fr: Selim Ier (1470-1520) fut le sultan ottoman qui étendit l'empire au Moyen-Orient, conquit le sultanat
      mamelouk et assuma le califat. Il est connu comme 'Selim le Terrible' et est une figure éminente
      de l'histoire ottomane.
    de: Selim I. (1470-1520) war der osmanische Sultan, der das Reich in den Nahen Osten ausdehnte, das
      Mamluken-Sultanat eroberte und das Kalifat übernahm. Er ist als 'Selim der Grimmige' bekannt und
      eine bedeutende Figur der osmanischen Geschichte.
    it: Selim I (1470-1520) fu il sultano ottomano che espanse l'impero in Medio Oriente, conquistò il
      sultanato mamelucco e assunse il califfato. È noto come 'Selim il Crudele' ed è una figura di spicco
      nella storia ottomana.
    pt: Selim I (1470-1520) foi o sultão otomano que expandiu o império para o Oriente Médio, conquistando
      o Sultanato Mameluco e assumindo o califado. Ele é conhecido como 'Selim o Implacável' e é uma figura
      proeminente na história otomana.
    ru: Селим I (1470-1520) был османским султаном, который расширил империю на Ближний Восток, завоевал
      Мамлюкский султанат и принял халифат. Он известен как «Селим Грозный» и является выдающейся фигурой
      в османской истории.
    ja: セリム1世（1470-1520年）はオスマン帝国のスルタンで、中東に帝国を拡大し、マムルーク朝を征服してカリフ位を継承した。「セリム・ザ・グリム」として知られ、オスマン史において重要な人物である。
    zh: 塞利姆一世（1470-1520年）是奥斯曼帝国苏丹，将帝国扩张到中东，征服了马穆鲁克苏丹国并成为哈里发。他被称作'冷酷者塞利姆'，是奥斯曼历史上的重要人物。
    ar: سليم الأول (1470-1520) كان السلطان العثماني الذي وسع الإمبراطورية نحو الشرق الأوسط، فتح السلطنة
      المملوكية وتولى الخلافة. يُعرف باسم 'سليم القاسي' وهو شخصية بارزة في التاريخ العثماني.
    he: סלים הראשון (1470-1520) היה הסולטאן העות'מאני שהרחיב את האימפריה למזרח התיכון, כבש את הסולטנות
      הממלוכית וקיבל על עצמו את הח'ליפות. הוא ידוע בתור 'סלים האכזרי' והוא דמות בולטת בהיסטוריה העות'מאנית.
