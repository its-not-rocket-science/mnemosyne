      dass er sich dem Propheten Abraham widersetzte und versuchte, ihn zu verbrennen. Er symbolisiert
      Arroganz und Trotz gegenüber Gott.
    it: Un re potente e tirannico nella tradizione islamica e biblica, noto per essersi opposto al profeta
