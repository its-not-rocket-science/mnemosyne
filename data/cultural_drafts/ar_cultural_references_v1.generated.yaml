- id: ar_literary_reference_وما_المال_والأهلون_إلا_ودائع_54e1b56a
  language: ar
  canonical_reference: وما المال والأهلون إلا ودائع
  reference_type: literary_reference
  surface_patterns:
  - وما المال والأهلون إلا ودائع
  - وما المال والأهل إلا ودائع
  - المال والأهلون ودائع
  short_explanation: A continuation of Zuhayr's Mu'allaqah meaning 'Wealth and family are but loans,'
    emphasizing that worldly possessions and loved ones are temporary trusts.
  i18n_explanations:
    en: A continuation of Zuhayr's Mu'allaqah meaning 'Wealth and family are but loans,' emphasizing that
      worldly possessions and loved ones are temporary trusts.
    es: Continuación de la Mu'allaqah de Zuhayr que significa 'La riqueza y la familia son solo préstamos',
      enfatizando que las posesiones mundanas y los seres queridos son confianzas temporales.
    fr: Suite de la Mu'allaqa de Zuhayr signifiant 'La richesse et la famille ne sont que des prêts',
      soulignant que les biens terrestres et les êtres chers sont des dépôts temporaires.
    de: 'Eine Fortsetzung von Zuhayrs Mu''allaqah, die bedeutet: ''Reichtum und Familie sind nur Leihgaben'',
      und betont, dass weltliche Besitztümer und geliebte Menschen vorübergehende anvertraute Güter sind.'
    it: Continuazione della Mu'allaqah di Zuhayr che significa 'La ricchezza e la famiglia sono solo prestiti',
      sottolineando che i beni mondani e i cari sono depositi temporanei.
    pt: Continuação da Mu'allaqah de Zuhayr que significa 'Riqueza e família são apenas empréstimos',
      enfatizando que posses mundanas e entes queridos são confianças temporárias.
    ru: Продолжение муаллаки Зухайра, означающее 'Богатство и семья — лишь займы', подчёркивая, что мирские
      блага и близкие — временные доверенности.
    ja: ズハイルのムアッラカの続きで、「富と家族は単なる貸し物に過ぎない」という意味。世俗的な所有物や愛する人々は一時的な預かりものであることを強調している。
    zh: 祖海尔悬诗的继续，意为'财富和家人只是借来的'，强调世俗财产和所爱之人都是暂时的信托。
    ar: استمرار لمعلقة زهير يعني 'وما المال والأهلون إلا ودائع'، مؤكداً أن الممتلكات الدنيوية والأحباء
      هي أمانات مؤقتة.
    he: המשך של המועלקא של זוהייר שמשמעותו 'עושר ומשפחה הם רק הלוואות', המדגיש כי רכוש גשמי ואהובים הם
      פיקדונות זמניים.
