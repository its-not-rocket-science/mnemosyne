    pt: A Batalha de Yarmouk foi um grande confronto militar entre as forças árabes muçulmanas e o Império
      Bizantino em 636 d.C., resultando em uma vitória árabe decisiva e na anexação da Síria.
    ru: Битва при Ярмуке была крупным военным столкновением между мусульманскими арабскими силами и Византийской
