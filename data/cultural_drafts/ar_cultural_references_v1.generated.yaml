- id: ar_proverb_tradition_رب_رمية_من_غير_رام_4d581ac9
  language: ar
  canonical_reference: رب رمية من غير رام
  reference_type: proverb_tradition
  surface_patterns:
  - رب رمية من غير رام
  - رب رمية من غير رامٍ
  - رُبَّ رَمْيَةٍ مِنْ غَيْرِ رَامٍ
  short_explanation: A classical Arabic proverb meaning 'Many a shot comes from a non-archer', emphasizing
    that skill is not always necessary for success; often used to highlight unexpected outcomes.
  i18n_explanations:
    en: A classical Arabic proverb meaning 'Many a shot comes from a non-archer', emphasizing that skill
      is not always necessary for success; often used to highlight unexpected outcomes.
    es: Proverbio árabe clásico que significa 'Muchos disparos vienen de un no arquero', enfatizando que
      la habilidad no siempre es necesaria para el éxito; a menudo usado para resaltar resultados inesperados.
    fr: Un proverbe arabe classique signifiant 'Beaucoup de coups viennent d'un non-archer', soulignant
      que la compétence n'est pas toujours nécessaire pour réussir ; souvent utilisé pour mettre en évidence
      des résultats inattendus.
    de: Ein klassisches arabisches Sprichwort, das bedeutet 'Viele Schüsse kommen von einem Nicht-Bogenschützen',
      betont, dass Geschick nicht immer notwendig für Erfolg ist; oft verwendet, um unerwartete Ergebnisse
      hervorzuheben.
    it: Un proverbio arabo classico che significa 'Molti colpi vengono da un non arciere', sottolineando
      che l'abilità non è sempre necessaria per il successo; spesso usato per evidenziare risultati inaspettati.
    pt: Um provérbio árabe clássico que significa 'Muitos tiros vêm de um não-arqueiro', enfatizando que
      a habilidade nem sempre é necessária para o sucesso; frequentemente usado para destacar resultados
      inesperados.
    ru: Классическая арабская пословица, означающая «Многие выстрелы исходят от не-лучника», подчеркивающая,
      что мастерство не всегда необходимо для успеха; часто используется для выделения неожиданных результатов.
    ja: 古典的なアラビアのことわざで、「多くの矢は射手ではない者から放たれる」という意味。成功に必ずしも技術が必要ではないことを強調し、予期せぬ結果を指摘するのに使われる。
    zh: 一句经典的阿拉伯谚语，意思是‘许多箭射自非弓箭手’，强调技能并非成功的必要条件；常用于突出意想不到的结果。
    ar: مثل عربي كلاسيكي يعني 'رب رمية من غير رام'، ويؤكد أن المهارة ليست ضرورية دائمًا للنجاح؛ غالبًا
      ما يستخدم لتسليط الضوء على نتائج غير متوقعة.
    he: פתגם ערבי קלאסי שמשמעותו 'רבים החצים באים ממי שאינו קשת', המדגיש שלא תמיד נדרשת מיומנות להצלחה;
      משמש לעתים קרובות להדגשת תוצאות בלתי צפויות.
