- id: ar_classical_or_scriptural_allusion_الدال_على_الخير_كفاعله_0cb5b05f
  language: ar
  canonical_reference: الدال على الخير كفاعله
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - الدال على الخير كفاعله
  - دال على الخير كفاعله
  - من دل على خير فله مثل أجر فاعله
  short_explanation: This hadith means that the one who guides others to a good deed receives the same
    reward as the one who performs it. It encourages promoting virtue and is often cited in Islamic contexts.
  i18n_explanations:
    en: This hadith means that the one who guides others to a good deed receives the same reward as the
      one who performs it. It encourages promoting virtue and is often cited in Islamic contexts.
    es: Este hadiz significa que quien guía a otros hacia una buena acción recibe la misma recompensa
      que quien la realiza. Fomenta la promoción de la virtud y se cita a menudo en contextos islámicos.
    fr: Ce hadith signifie que celui qui guide les autres vers une bonne action reçoit la même récompense
      que celui qui l'accomplit. Il encourage la promotion de la vertu et est souvent cité dans des contextes
      islamiques.
    de: Dieser Hadith bedeutet, dass derjenige, der andere zu einer guten Tat führt, die gleiche Belohnung
      erhält wie derjenige, der sie ausführt. Er fördert die Tugend und wird oft in islamischen Kontexten
      zitiert.
    it: Questo hadith significa che colui che guida gli altri verso una buona azione riceve la stessa
      ricompensa di chi la compie. Incoraggia la promozione della virtù ed è spesso citato in contesti
      islamici.
    pt: Este hadith significa que aquele que guia outros para uma boa ação recebe a mesma recompensa que
      aquele que a realiza. Incentiva a promoção da virtude e é frequentemente citado em contextos islâmicos.
    ru: Этот хадис означает, что тот, кто направляет других к доброму делу, получает такую же награду,
      как и тот, кто его совершает. Он поощряет распространение добродетели и часто цитируется в исламских
      контекстах.
    ja: このハディースは、他人を善行に導く者は、その行いを行う者と同じ報酬を受けるという意味です。美徳を促進することを奨励し、イスラムの文脈でよく引用されます。
    zh: 这段圣训的意思是，引导他人行善者将获得与行善者相同的报酬。它鼓励弘扬美德，常在伊斯兰语境中被引用。
    ar: يعني هذا الحديث أن الذي يدل على الخير يحصل على نفس أجر فاعله. يشجع على نشر الفضيلة ويستشهد به
      كثيرًا في السياقات الإسلامية.
    he: החדית' הזה פירושו שהמדריך אחרים למעשה טוב מקבל את אותו שכר כמו זה שמבצע אותו. הוא מעודד קידום
      מידות טובות ומצוטט לעתים קרובות בהקשרים אסלאמיים.
