  - فاحتفلي بجهلي
  - يا عين فاحتفلي
  short_explanation: A line from Al-Mutanabbi's poem, meaning 'O eye, celebrate my ignorance.' It is a
    lament on the foolishness of youth or the regret of old age, often used in reflective contexts.
  i18n_explanations:
    en: A line from Al-Mutanabbi's poem, meaning 'O eye, celebrate my ignorance.' It is a lament on the
      foolishness of youth or the regret of old age, often used in reflective contexts.
    es: Un verso del poema de Al-Mutanabbi que significa 'Oh ojo, celebra mi ignorancia'. Es un lamento
      sobre la necedad de la juventud o el arrepentimiento de la vejez, a menudo usado en contextos reflexivos.
    fr: Un vers du poème d'Al-Mutanabbi signifiant 'Ô œil, célèbre mon ignorance.' C'est une lamentation
      sur la folie de la jeunesse ou le regret de la vieillesse, souvent utilisé dans des contextes de
      réflexion.
    de: 'Ein Vers aus Al-Mutanabbis Gedicht, der bedeutet: ''O Auge, feiere meine Unwissenheit.'' Es ist
      eine Klage über die Torheit der Jugend oder die Reue des Alters, oft in reflektierenden Kontexten
      verwendet.'
    it: Un verso della poesia di Al-Mutanabbi che significa 'O occhio, celebra la mia ignoranza'. È un
      lamento sulla stoltezza della giovinezza o il rimpianto della vecchiaia, spesso usato in contesti
      riflessivi.
    pt: Um verso do poema de Al-Mutanabbi que significa 'Ó olho, celebra minha ignorância'. É um lamento
      sobre a tolice da juventude ou o arrependimento da velhice, frequentemente usado em contextos reflexivos.
    ru: Строка из стихотворения Аль-Мутанабби, означающая «О око, отпразднуй мое невежество». Это жалоба
      на глупость молодости или сожаление о старости, часто используется в размышлениях.
    ja: アル＝ムタナッビーの詩の一節で、「おお目よ、我が無知を祝え」という意味です。若さの愚かさや老年の後悔を嘆くもので、内省的な文脈でよく使われます。
    zh: 阿尔-穆太奈比诗句中的一行，意为“哦，眼睛，庆祝我的无知吧”。这是对青春愚蠢或年老遗憾的哀叹，常用于反思语境。
    ar: 'بيت من شعر المتنبي معناه: ''ألا يا عين فاحتفلي بجهلي''. إنه تألم على حماقة الشباب أو ندم الشيخوخة،
      ويُستخدم غالبًا في السياقات التأملية.'
    he: שורה משירו של אל-מותנבי, משמעותה 'הו עין, חגגי את בורותי'. היא קינה על טיפשות הנעורים או חרטת
