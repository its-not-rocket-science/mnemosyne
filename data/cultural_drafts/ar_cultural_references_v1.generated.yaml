    en: A powerful and tyrannical king in Islamic and biblical tradition, known for opposing Prophet Abraham
      and attempting to burn him. He symbolizes arrogance and defiance of God.
    es: Un rey poderoso y tiránico en la tradición islámica y bíblica, conocido por oponerse al profeta
      Abraham e intentar quemarlo. Simboliza la arrogancia y el desafío a Dios.
    fr: Un roi puissant et tyrannique dans la tradition islamique et biblique, connu pour s'être opposé
