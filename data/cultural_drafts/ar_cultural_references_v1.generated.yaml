- id: ar_cultural_reference_معركة_دابق_3cbf8c03
  language: ar
  canonical_reference: معركة دابق
  reference_type: cultural_reference
  surface_patterns:
  - معركة دابق
  - دابق
  - موقعة دابق
  short_explanation: The Battle of Dabiq (1516) was a decisive Ottoman-Mamluk battle near Aleppo, leading
    to Ottoman conquest of Syria and Egypt. It is a key historical event in late medieval Middle Eastern
    history.
  i18n_explanations:
    en: The Battle of Dabiq (1516) was a decisive Ottoman-Mamluk battle near Aleppo, leading to Ottoman
      conquest of Syria and Egypt. It is a key historical event in late medieval Middle Eastern history.
    es: La batalla de Dabiq (1516) fue una batalla decisiva otomano-mameluca cerca de Alepo, que condujo
      a la conquista otomana de Siria y Egipto. Es un evento histórico clave en la historia del Medio
      Oriente a finales de la Edad Media.
    fr: La bataille de Dabiq (1516) fut une bataille décisive entre Ottomans et Mamelouks près d'Alep,
      menant à la conquête ottomane de la Syrie et de l'Égypte. C'est un événement historique clé dans
      l'histoire du Moyen-Orient à la fin du Moyen Âge.
    de: Die Schlacht von Dabiq (1516) war eine entscheidende osmanisch-mamlukische Schlacht in der Nähe
      von Aleppo, die zur osmanischen Eroberung Syriens und Ägyptens führte. Es ist ein wichtiges historisches
      Ereignis in der spätmittelalterlichen Geschichte des Nahen Ostens.
    it: La battaglia di Dabiq (1516) fu una battaglia decisiva tra ottomani e mamelucchi vicino ad Aleppo,
      che portò alla conquista ottomana della Siria e dell'Egitto. È un evento storico chiave nella storia
      del Medio Oriente tardo medievale.
    pt: A Batalha de Dabiq (1516) foi uma batalha decisiva otomano-mameluca perto de Aleppo, levando à
      conquista otomana da Síria e do Egito. É um evento histórico chave na história do Oriente Médio
      no final da Idade Média.
    ru: Битва при Дабике (1516) была решающим сражением между османами и мамлюками близ Алеппо, приведшим
      к османскому завоеванию Сирии и Египта. Это ключевое историческое событие в истории Ближнего Востока
      позднего средневековья.
    ja: ダビークの戦い（1516年）は、アレッポ近郊で行われたオスマン＝マムルークの決戦であり、オスマン帝国によるシリアとエジプト征服につながった。中世後期の中東史における重要な歴史的出来事である。
    zh: 达比克战役（1516年）是奥斯曼与马穆鲁克在阿勒颇附近的一场决定性战役，导致了奥斯曼对叙利亚和埃及的征服。这是中世纪末期中东历史的一个关键事件。
    ar: معركة دابق (1516) كانت معركة حاسمة بين العثمانيين والمماليك بالقرب من حلب، وأدت إلى الفتح العثماني
      لسوريا ومصر. وهي حدث تاريخي رئيسي في تاريخ الشرق الأوسط في أواخر العصور الوسطى.
    he: קרב דאביק (1516) היה קרב מכריע בין העות'מאנים לממלוכים ליד חלב, שהוביל לכיבוש העות'מאני של סוריה
      ומצרים. זהו אירוע היסטורי מרכזי בהיסטוריה של המזרח התיכון בשלהי ימי הביניים.
