- id: ar_classical_or_scriptural_allusion_كل_بني_آدم_خطاء_وخير_الخطائين_التوابون_15779755
  language: ar
  canonical_reference: كل بني آدم خطاء وخير الخطائين التوابون
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - كل بني آدم خطاء وخير الخطائين التوابون
  - كل ابن آدم خطاء
  - وخير الخطائين التوابون
  short_explanation: This hadith states that all humans sin, and the best of sinners are those who repent.
    It emphasizes human fallibility and the importance of repentance.
  i18n_explanations:
    en: This hadith states that all humans sin, and the best of sinners are those who repent. It emphasizes
      human fallibility and the importance of repentance.
    es: Este hadiz afirma que todos los humanos pecan, y los mejores de los pecadores son aquellos que
      se arrepienten. Enfatiza la falibilidad humana y la importancia del arrepentimiento.
    fr: Ce hadith affirme que tous les humains pèchent, et les meilleurs des pécheurs sont ceux qui se
      repentent. Il souligne la faillibilité humaine et l'importance du repentir.
    de: Dieser Hadith besagt, dass alle Menschen sündigen, und die besten der Sünder sind diejenigen,
      die bereuen. Er betont die menschliche Fehlbarkeit und die Bedeutung der Reue.
    it: Questo hadith afferma che tutti gli umani peccano, e i migliori dei peccatori sono coloro che
      si pentono. Sottolinea la fallibilità umana e l'importanza del pentimento.
    pt: Este hadith afirma que todos os humanos pecam, e os melhores dos pecadores são aqueles que se
      arrependem. Enfatiza a falibilidade humana e a importância do arrependimento.
    ru: Этот хадис утверждает, что все люди грешат, и лучшие из грешников - те, кто кается. Он подчеркивает
      человеческую подверженность ошибкам и важность покаяния.
    ja: このハディースは、すべての人間は罪を犯し、罪人のうち最良の者は悔い改める者であると述べています。人間の不完全さと悔い改めの重要性を強調しています。
    zh: 这段圣训指出，所有的人都会犯罪，而最好的罪人是那些忏悔的人。它强调了人的易错性和忏悔的重要性。
    ar: ينص هذا الحديث على أن جميع البشر يخطئون، وخير الخطائين هم التوابون. ويؤكد على ضعف البشرية وأهمية
      التوبة.
    he: חדית' זה קובע כי כל בני האדם חוטאים, והטובים שבחוטאים הם אלה שחוזרים בתשובה. הוא מדגיש את האנושיות
      השגויה ואת חשיבות התשובה.
