- id: ar_cultural_reference_ثورة_الزنج_7cd54a20
  language: ar
  canonical_reference: ثورة الزنج
  reference_type: cultural_reference
  surface_patterns:
  - ثورة الزنج
  - ثورة الزنوج
  - الزنج
  short_explanation: The Zanj Rebellion was a major slave revolt in 9th-century Abbasid Iraq (869-883
    CE), involving East African slaves (Zanj) and other groups. It is a key historical event illustrating
    social and racial tensions in the Islamic Golden Age.
  i18n_explanations:
    en: The Zanj Rebellion was a major slave revolt in 9th-century Abbasid Iraq (869-883 CE), involving
      East African slaves (Zanj) and other groups. It is a key historical event illustrating social and
      racial tensions in the Islamic Golden Age.
    es: La rebelión de Zanj fue una gran revuelta de esclavos en el Iraq abasí del siglo IX (869-883 d.C.),
      que involucró a esclavos de África oriental (Zanj) y otros grupos. Es un evento histórico clave
      que ilustra las tensiones sociales y raciales en la Edad de Oro del Islam.
    fr: La révolte des Zanj fut une grande révolte d'esclaves dans l'Irak abbasside du IXe siècle (869-883
      ap. J.-C.), impliquant des esclaves d'Afrique de l'Est (Zanj) et d'autres groupes. C'est un événement
      historique clé illustrant les tensions sociales et raciales dans l'âge d'or islamique.
    de: Der Zanj-Aufstand war ein großer Sklavenaufstand im abbasidischen Irak des 9. Jahrhunderts (869-883
      n. Chr.), an dem ostafrikanische Sklaven (Zanj) und andere Gruppen beteiligt waren. Es ist ein wichtiges
      historisches Ereignis, das soziale und rassische Spannungen im islamischen Goldenen Zeitalter veranschaulicht.
    it: La rivolta degli Zanj fu una grande rivolta di schiavi nell'Iraq abbaside del IX secolo (869-883
      d.C.), che coinvolse schiavi dell'Africa orientale (Zanj) e altri gruppi. È un evento storico chiave
      che illustra le tensioni sociali e razziali nell'età dell'oro islamica.
    pt: A Rebelião Zanj foi uma grande revolta de escravos no Iraque abássida do século IX (869-883 d.C.),
      envolvendo escravos da África Oriental (Zanj) e outros grupos. É um evento histórico chave que ilustra
      tensões sociais e raciais na Idade de Ouro Islâmica.
    ru: Восстание зинджей было крупным восстанием рабов в Аббасидском Ираке IX века (869-883 гг. н.э.),
      в котором участвовали восточноафриканские рабы (зинджи) и другие группы. Это ключевое историческое
      событие, иллюстрирующее социальную и расовую напряженность в исламском Золотом веке.
    ja: ザンジュの乱は、9世紀のアッバース朝イラク（869年〜883年）における大規模な奴隷反乱で、東アフリカの奴隷（ザンジュ）や他の集団が関与した。イスラム黄金時代の社会的・人種的緊張を示す重要な歴史的出来事である。
    zh: 赞吉起义是9世纪阿拔斯王朝伊拉克（869-883年）发生的一场大规模奴隶起义，涉及东非奴隶（赞吉）和其他群体。这是说明伊斯兰黄金时代社会与种族紧张关系的关键历史事件。
    ar: ثورة الزنج كانت ثورة كبرى للعبيد في العراق العباسي في القرن التاسع (869-883 م)، شارك فيها عبيد
      من شرق إفريقيا (الزنج) ومجموعات أخرى. وهي حدث تاريخي رئيسي يوضح التوترات الاجتماعية والعرقية في
      العصر الذهبي الإسلامي.
    he: מרד הזנג' היה מרד עבדים גדול בעיראק העבאסית של המאה ה-9 (869-883 לספירה), שהשתתפו בו עבדים ממזרח
      אפריקה (זנג') וקבוצות אחרות. זהו אירוע היסטורי מרכזי הממחיש מתחים חברתיים וגזעיים בתור הזהב האסלאמי.
