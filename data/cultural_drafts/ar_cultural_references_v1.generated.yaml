- id: ar_classical_or_scriptural_allusion_إياك_نعبد_وإياك_نستعين_4d4d6067
  language: ar
  canonical_reference: إياك نعبد وإياك نستعين
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - إياك نعبد وإياك نستعين
  - إياك نعبد
  - نعبد وإياك نستعين
  short_explanation: Verse from the Quran (Al-Fatiha 1:5) meaning 'You alone we worship and You alone
    we ask for help.' It is recited in every unit of the Muslim daily prayer, emphasizing monotheism and
    reliance on God.
  i18n_explanations:
    en: Verse from the Quran (Al-Fatiha 1:5) meaning 'You alone we worship and You alone we ask for help.'
      It is recited in every unit of the Muslim daily prayer, emphasizing monotheism and reliance on God.
    es: Versículo del Corán (Al-Fatiha 1:5) que significa 'Solo a Ti adoramos y solo a Ti pedimos ayuda'.
      Se recita en cada unidad de la oración diaria musulmana, enfatizando el monoteísmo y la confianza
      en Dios.
    fr: Verset du Coran (Al-Fatiha 1:5) signifiant 'C'est Toi seul que nous adorons, et c'est Toi seul
      dont nous implorons l'aide'. Il est récité dans chaque unité de la prière quotidienne musulmane,
      soulignant le monothéisme et la confiance en Dieu.
    de: Vers aus dem Koran (Al-Fatiha 1:5) mit der Bedeutung 'Dir allein dienen wir, und Dich allein bitten
      wir um Hilfe'. Er wird in jeder Einheit des muslimischen täglichen Gebets rezitiert und betont den
      Monotheismus und die Abhängigkeit von Gott.
    it: Versetto del Corano (Al-Fatiha 1:5) che significa 'Solo Te adoriamo e solo Te invochiamo per aiuto'.
      Viene recitato in ogni unità della preghiera quotidiana musulmana, enfatizzando il monoteismo e
      la fiducia in Dio.
    pt: Versículo do Alcorão (Al-Fatiha 1:5) que significa 'Só a Ti adoramos e só a Ti pedimos ajuda'.
      É recitado em cada unidade da oração diária muçulmana, enfatizando o monoteísmo e a confiança em
      Deus.
    ru: Аят из Корана (Аль-Фатиха 1:5), означающий 'Тебе одному мы поклоняемся и Тебя одного молим о помощи'.
      Он читается в каждом элементе ежедневной мусульманской молитвы, подчеркивая единобожие и упование
      на Бога.
    ja: クルアーン（アル＝ファーティハ1:5）の節で、「私たちはあなただけを崇拝し、あなただけに助けを求めます」という意味。イスラム教徒の毎日の祈りの各ユニットで唱えられ、一神教と神への依存を強調します。
    zh: 《古兰经》（法谛海章1:5）经文，意为‘我们只崇拜你，只求你帮助’。在穆斯林每日礼拜的每一拜中诵读，强调一神论和对真主的信赖。
    ar: آية من القرآن (الفاتحة 1:5) معناها 'إياك نعبد وإياك نستعين'. تُتلى في كل ركعة من الصلاة اليومية
      للمسلمين، مؤكدة على التوحيد والاعتماد على الله.
    he: פסוק מהקוראן (אל-פאתחה 1:5) במשמעות 'רק אותך אנו עובדים ורק ממך אנו מבקשים עזרה'. הוא נאמר בכל
      יחידה של התפילה המוסלמית היומית, תוך הדגשת המונותיאיזם והתלות באלוהים.
