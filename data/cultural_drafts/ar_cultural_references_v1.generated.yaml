- id: ar_literary_reference_ألا_كل_شيء_ما_خلا_الله_باطل_847e68e2
  language: ar
  canonical_reference: ألا كل شيء ما خلا الله باطل
  reference_type: literary_reference
  surface_patterns:
  - ألا كل شيء ما خلا الله باطل
  - كل شيء ما خلا الله باطل
  - وكل شيء ما خلا الله باطل
  short_explanation: A line from Zuhayr's Mu'allaqah meaning 'Verily, everything except God is false,'
    reflecting the transience of worldly life and the permanence of the divine.
  i18n_explanations:
    en: A line from Zuhayr's Mu'allaqah meaning 'Verily, everything except God is false,' reflecting the
      transience of worldly life and the permanence of the divine.
    es: Un verso de la Mu'allaqah de Zuhayr que significa 'En verdad, todo excepto Dios es falso', reflejando
      la fugacidad de la vida mundana y la permanencia divina.
    fr: Un vers de la Mu'allaqa de Zuhayr signifiant 'En vérité, tout sauf Dieu est faux', reflétant la
      fugacité de la vie terrestre et la permanence du divin.
    de: 'Ein Vers aus Zuhayrs Mu''allaqah, der bedeutet: ''Wahrlich, alles außer Gott ist falsch'', und
      die Vergänglichkeit des irdischen Lebens sowie die Beständigkeit des Göttlichen widerspiegelt.'
    it: Un verso della Mu'allaqah di Zuhayr che significa 'In verità, tutto tranne Dio è falso', riflettendo
      la transitorietà della vita mondana e la permanenza del divino.
    pt: Um verso da Mu'allaqah de Zuhayr que significa 'Na verdade, tudo exceto Deus é falso', refletindo
      a transitoriedade da vida mundana e a permanência do divino.
    ru: Строка из муаллаки Зухайра, означающая 'Воистину, всё, кроме Бога, ложно', отражающая быстротечность
      мирской жизни и вечность божественного.
    ja: ズハイルのムアッラカの一節で、「まことに、神以外のすべては虚偽である」という意味。この世の儚さと神の永遠性を反映している。
    zh: 祖海尔悬诗中的一行，意为'确实，除真主外一切都是虚妄'，反映了世俗生活的短暂和神圣的永恒。
    ar: بيت من معلقة زهير يعني 'ألا كل شيء ما خلا الله باطل'، يعكس زوال الحياة الدنيا وديمومة الإله.
    he: שורה מהמועלקא של זוהייר שמשמעותה 'אמנם, כל דבר מלבד אלוהים הוא שקר', המשקפת את הארעיות של החיים
      הגשמיים ואת הנצחיות של האלוהי.
