- id: ar_literary_reference_ألا_أيها_الليل_الطويل_ألا_انجل_eba4aab0
  language: ar
  canonical_reference: ألا أيها الليل الطويل ألا انجل
  reference_type: literary_reference
  surface_patterns:
  - ألا أيها الليل الطويل ألا انجل
  - ألا أيها الليل الطويل
  - يا ليل طويل ألا انجل
  short_explanation: A line from Labid's Mu'allaqah meaning 'O long night, why don't you clear away,'
    expressing impatience for dawn and relief from sorrow.
  i18n_explanations:
    en: A line from Labid's Mu'allaqah meaning 'O long night, why don't you clear away,' expressing impatience
      for dawn and relief from sorrow.
    es: Un verso de la Mu'allaqah de Labid que significa 'Oh larga noche, ¿por qué no te despejas?', expresando
      impaciencia por el amanecer y alivio del dolor.
    fr: Un vers de la Mu'allaqa de Labid signifiant 'Ô longue nuit, pourquoi ne te dégages-tu pas', exprimant
      l'impatience de voir l'aube et le soulagement de la tristesse.
    de: 'Ein Vers aus Labids Mu''allaqah, der bedeutet: ''O lange Nacht, warum klärst du dich nicht auf'',
      und Ungeduld auf den Morgen und Erleichterung von Kummer ausdrückt.'
    it: Un verso della Mu'allaqah di Labid che significa 'O lunga notte, perché non ti schiarisci', esprimendo
      impazienza per l'alba e sollievo dal dolore.
    pt: Um verso da Mu'allaqah de Labid que significa 'Ó longa noite, por que não clareias?', expressando
      impaciência pelo amanhecer e alívio da tristeza.
    ru: Строка из муаллаки Лабида, означающая 'О долгая ночь, почему ты не рассеиваешься', выражающая
      нетерпение в ожидании рассвета и облегчения от печали.
    ja: ラビードのムアッラカの一節で、「おお長い夜よ、どうして晴れないのか」という意味。夜明けへの切望と悲しみからの解放を表現している。
    zh: 拉比德悬诗中的一行，意为'哦漫长的夜，为什么不消散'，表达了对黎明的急切盼望和对悲伤解脱的渴望。
    ar: بيت من معلقة لبيد يعني 'ألا أيها الليل الطويل ألا انجل'، يعبر عن نفاد الصبر لطلوع الفجر والخلاص
      من الحزن.
    he: שורה מהמועלקא של לביד שמשמעותה 'הו לילה ארוך, למה לא תתפנה?', המביעה חוסר סבלנות לשחר והקלה מצער.
