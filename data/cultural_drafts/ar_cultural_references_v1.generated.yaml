- id: ar_literary_reference_أمن_أم_حزنة_بالرباب_الدار_5796bba5
  language: ar
  canonical_reference: أمن أم حزنة بالرباب الدار
  reference_type: literary_reference
  surface_patterns:
  - أمن أم حزنة بالرباب الدار
  - أمن أم حزنة بالرباب
  short_explanation: Opening line of a poem by Imru' al-Qais, invoking the memory of a beloved woman named
    Um Haznah and the place Al-Rabab. It reflects the pre-Islamic poetic tradition of stopping at ruins
    and recalling past loves.
  i18n_explanations:
    en: Opening line of a poem by Imru' al-Qais, invoking the memory of a beloved woman named Um Haznah
      and the place Al-Rabab. It reflects the pre-Islamic poetic tradition of stopping at ruins and recalling
      past loves.
    es: Verso inicial de un poema de Imru' al-Qais, que evoca el recuerdo de una amada llamada Um Haznah
      y el lugar Al-Rabab. Refleja la tradición poética preislámica de detenerse en las ruinas y recordar
      amores pasados.
    fr: Premier vers d'un poème d'Imru' al-Qais, évoquant le souvenir d'une bien-aimée nommée Um Haznah
      et du lieu Al-Rabab. Il reflète la tradition poétique préislamique de s'arrêter sur les ruines et
      de se rappeler les amours passées.
    de: Eröffnungszeile eines Gedichts von Imru' al-Qais, die die Erinnerung an eine geliebte Frau namens
      Um Haznah und den Ort Al-Rabab heraufbeschwört. Sie spiegelt die vorislamische poetische Tradition
      wider, an Ruinen haltzumachen und vergangene Lieben zu beschwören.
    it: Verso di apertura di una poesia di Imru' al-Qais, che richiama il ricordo di una donna amata di
      nome Um Haznah e del luogo Al-Rabab. Riflette la tradizione poetica pre-islamica di fermarsi alle
      rovine e ricordare gli amori passati.
    pt: Verso de abertura de um poema de Imru' al-Qais, evocando a memória de uma amada chamada Um Haznah
      e o lugar Al-Rabab. Reflete a tradição poética pré-islâmica de parar nas ruínas e recordar amores
      passados.
    ru: Начальная строка стихотворения Имру аль-Кайса, вызывающая воспоминание о возлюбленной по имени
      Ум Хазнах и месте Аль-Рабаб. Она отражает доисламскую поэтическую традицию остановки у руин и воспоминания
      о прошлых любовях.
    ja: イムルウ・アル＝カイスの詩の冒頭行で、ウム・ハズナという愛しい女性とアル＝ラバブという場所の記憶を呼び起こす。廃墟に立ち止まり過ぎ去った恋を回想するイスラーム以前の詩の伝統を反映している。
    zh: 伊姆鲁·盖斯诗歌的开篇诗句，唤起对名为乌姆·哈兹娜的爱人和阿尔-拉巴布之地的记忆。它反映了前伊斯兰诗歌传统，即驻足废墟，追忆逝去的爱情。
    ar: البيت الافتتاحي لقصيدة امرئ القيس، يستحضر ذكرى حبيبة تدعى أم حزنة ومكان الرباب. يعكس التقليد الشعري
      الجاهلي في الوقوف على الأطلال وتذكر الأحباب.
    he: שורת הפתיחה של שיר מאת אמרו אלקיס, המעלה את זכר אהובה בשם אום חזנה והמקום אל-רבאב. היא משקפת את
      המסורת השירית הקדם-אסלאמית של עצירה בחורבות והיזכרות באהבות עבר.
