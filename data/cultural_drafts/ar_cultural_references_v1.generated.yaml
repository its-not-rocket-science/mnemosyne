  short_explanation: This phrase ('Praise be to God, Lord of the worlds') is the first verse of Surah
    Al-Fatiha, the opening chapter of the Quran, and is frequently used by Muslims to express gratitude
    to God.
  i18n_explanations:
    en: This phrase ('Praise be to God, Lord of the worlds') is the first verse of Surah Al-Fatiha, the
      opening chapter of the Quran, and is frequently used by Muslims to express gratitude to God.
    es: Esta frase ('Alabado sea Dios, Señor de los mundos') es el primer versículo de la Sura Al-Fatiha,
      el capítulo inicial del Corán, y es frecuentemente usada por los musulmanes para expresar gratitud
      a Dios.
    fr: Cette phrase ('Louange à Dieu, Seigneur des mondes') est le premier verset de la sourate Al-Fatiha,
      le chapitre d'ouverture du Coran, et est fréquemment utilisée par les musulmans pour exprimer leur
      gratitude envers Dieu.
    de: Dieser Satz ('Lob sei Gott, dem Herrn der Welten') ist der erste Vers der Sura Al-Fatiha, dem
      Eröffnungskapitel des Korans, und wird häufig von Muslimen verwendet, um Gott Dankbarkeit auszudrücken.
    it: Questa frase ('Sia lode a Dio, Signore dei mondi') è il primo versetto della Sura Al-Fatiha, il
      capitolo iniziale del Corano, ed è frequentemente usata dai musulmani per esprimere gratitudine
      a Dio.
    pt: Esta frase ('Louvado seja Deus, Senhor dos mundos') é o primeiro versículo da Sura Al-Fatiha,
      o capítulo de abertura do Alcorão, e é frequentemente usada pelos muçulmanos para expressar gratidão
      a Deus.
    ru: Эта фраза ('Хвала Аллаху, Господу миров') является первым аятом суры Аль-Фатиха, открывающей главы
      Корана, и часто используется мусульманами для выражения благодарности Аллаху.
    ja: この句（「万物の主アッラーに Praise be」）は、クルアーンの冒頭の章であるスーラ・アル＝ファーティハの最初の節であり、ムスリムがアッラーへの感謝を表すために頻繁に用いる。
    zh: 这句（“一切赞颂全归真主，全世界的主”）是《古兰经》首章《法蒂哈》的第一节经文，穆斯林经常用它来表达对真主的感激。
    ar: هذه العبارة ('الحمد لله رب العالمين') هي أول آية من سورة الفاتحة، الفصل الافتتاحي للقرآن، ويستخدمها
