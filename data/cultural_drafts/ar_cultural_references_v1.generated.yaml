- id: ar_literary_reference_رب_أخ_لم_تلده_أمك_f31e073f
  language: ar
  canonical_reference: رب أخ لم تلده أمك
  reference_type: literary_reference
  surface_patterns:
  - رب أخ لم تلده أمك
  - وَرُبَّ أَخٍ لَمْ تَلِدْهُ أُمُّكَ
  - رب أخ لم تلد أمك
  short_explanation: A famous line from Al-Mutanabbi's poetry meaning 'Many a brother is not born of your
    mother', emphasizing that a true friend can be closer than a blood sibling.
  i18n_explanations:
    en: A famous line from Al-Mutanabbi's poetry meaning 'Many a brother is not born of your mother',
      emphasizing that a true friend can be closer than a blood sibling.
    es: Un famoso verso de la poesía de Al-Mutanabbi que significa 'Muchos hermanos no nacen de tu madre',
      enfatizando que un verdadero amigo puede ser más cercano que un hermano de sangre.
    fr: Un vers célèbre de la poésie d'Al-Mutanabbi signifiant 'Beaucoup de frères ne sont pas nés de
      ta mère', soulignant qu'un véritable ami peut être plus proche qu'un frère de sang.
    de: Eine berühmte Zeile aus der Dichtung von Al-Mutanabbi, die bedeutet 'Viele Brüder werden nicht
      von deiner Mutter geboren', betont, dass ein wahrer Freund enger sein kann als ein leiblicher Bruder.
    it: Un famoso verso della poesia di Al-Mutanabbi che significa 'Molti fratelli non sono nati da tua
      madre', sottolineando che un vero amico può essere più vicino di un fratello di sangue.
    pt: Um famoso verso da poesia de Al-Mutanabbi que significa 'Muitos irmãos não nascem da sua mãe',
      enfatizando que um verdadeiro amigo pode ser mais próximo que um irmão de sangue.
    ru: Известная строка из поэзии Аль-Мутанабби, означающая «Многие братья не рождены от твоей матери»,
      подчеркивающая, что настоящий друг может быть ближе кровного родственника.
    ja: アル＝ムタナッビーの詩の有名な一節で、「多くの兄弟はあなたの母から生まれたわけではない」という意味。真の友人は血の繋がった兄弟よりも親しくなりうることを強調する。
    zh: 穆太奈比诗歌中的著名诗句，意为‘许多兄弟并非你母亲所生’，强调真正的朋友可能比血缘兄弟更亲近。
    ar: سطر مشهور من شعر المتنبي يعني 'رب أخ لم تلده أمك'، ويؤكد أن الصديق الحقيقي يمكن أن يكون أقرب من
      الأخ الشقيق.
    he: שורה מפורסמת משירת אל-מוטנבי שמשמעותה 'רבים האחים שאינם נולדים מאמך', המדגישה שחבר אמת יכול להיות
      קרוב יותר מאח ביולוגי.
