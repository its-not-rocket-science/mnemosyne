    en: A line from Al-Mutanabbi's poem, meaning 'Are you not the best of those who ride mounts?' It is
      used as a rhetorical question to praise someone's superiority.
    es: Un verso del poema de Al-Mutanabbi que significa '¿No sois los mejores de los que montan cabalgaduras?'
      Se usa como pregunta retórica para alabar la superioridad de alguien.
    fr: Un vers du poème d'Al-Mutanabbi signifiant 'N'êtes-vous pas les meilleurs de ceux qui montent
      des montures ?' Il est utilisé comme question rhétorique pour louer la supériorité de quelqu'un.
    de: 'Ein Vers aus Al-Mutanabbis Gedicht, der bedeutet: ''Seid ihr nicht die Besten derer, die Reittiere
      besteigen?'' Es wird als rhetorische Frage verwendet, um die Überlegenheit einer Person zu loben.'
    it: Un verso della poesia di Al-Mutanabbi che significa 'Non siete voi i migliori tra coloro che cavalcano
      montature?' È usato come domanda retorica per lodare la superiorità di qualcuno.
    pt: Um verso do poema de Al-Mutanabbi que significa 'Não sois vós os melhores dos que montam cavalgaduras?'
      É usado como pergunta retórica para elogiar a superioridade de alguém.
    ru: Строка из стихотворения Аль-Мутанабби, означающая «Разве вы не лучшие из тех, кто ездит верхом?»
