    ja: 一般的なアラビアのことわざで、「忍耐は救済の鍵」という意味。困難に耐えることが最終的な楽さにつながることを示し、イスラム文化に深く根ざしている。
    zh: 一句常见的阿拉伯谚语，意为‘忍耐是解脱的关键’，表示忍受苦难最终会带来轻松；深深植根于伊斯兰文化。
