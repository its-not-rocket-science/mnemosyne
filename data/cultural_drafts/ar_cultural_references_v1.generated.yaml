    ja: イベリア半島（アル＝アンダルス）のイスラム征服は711年にタリク・イブン・ジヤドのもとで始まり、スペインに数世紀にわたるイスラム支配を確立した。
    zh: 穆斯林对伊比利亚半岛（安达卢斯）的征服始于711年，由塔里克·伊本·齐亚德领导，在西班牙建立了长达数个世纪的伊斯兰统治。
    ar: بدأ الفتح الإسلامي لشبه الجزيرة الأيبيرية (الأندلس) عام 711 ميلادي بقيادة طارق بن زياد، مما أسس
