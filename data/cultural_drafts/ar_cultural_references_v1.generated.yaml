    en: A common patriotic greeting in Arabic, meaning 'Good morning, my homeland.' It expresses affection
      and loyalty to one's country, often used in songs, poetry, and everyday speech.
    es: Un saludo patriótico común en árabe, que significa 'Buenos días, mi patria'. Expresa afecto y
      lealtad al propio país, a menudo usado en canciones, poesía y el habla cotidiana.
    fr: Un salut patriotique courant en arabe, signifiant 'Bonjour, ma patrie'. Il exprime l'affection
      et la loyauté envers son pays, souvent utilisé dans les chansons, la poésie et le langage quotidien.
    de: Ein üblicher patriotischer Gruß auf Arabisch, was 'Guten Morgen, meine Heimat' bedeutet. Er drückt
      Zuneigung und Loyalität zum eigenen Land aus und wird oft in Liedern, Gedichten und der Alltagssprache
      verwendet.
    it: Un comune saluto patriottico in arabo, che significa 'Buongiorno, mia patria'. Esprime affetto
      e lealtà verso il proprio paese, spesso usato in canzoni, poesia e linguaggio quotidiano.
    pt: Uma saudação patriótica comum em árabe, que significa 'Bom dia, minha pátria'. Expressa afeto
      e lealdade ao próprio país, frequentemente usada em músicas, poesia e na fala cotidiana.
    ru: Распространённое патриотическое приветствие на арабском языке, означающее 'Доброе утро, моя родина'.
