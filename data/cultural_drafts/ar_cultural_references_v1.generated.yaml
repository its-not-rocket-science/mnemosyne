  i18n_explanations:
    en: The Umayyad Caliphate was the first hereditary Islamic dynasty ruling from 661 to 750 CE, based
      in Damascus, with significant cultural and political impact.
    es: El Califato Omeya fue la primera dinastía hereditaria islámica que gobernó desde 661 hasta 750
      d.C., con sede en Damasco, con un impacto cultural y político significativo.
    fr: Le califat omeyyade fut la première dynastie héréditaire islamique régnant de 661 à 750 de notre
