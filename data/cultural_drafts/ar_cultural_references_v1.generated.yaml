    zh: 《古兰经》2:256的这句短语宣告了伊斯兰教中的宗教自由，指出信仰问题上没有强迫。经常在宗教宽容和人权的讨论中被引用。
    ar: هذه العبارة من القرآن 2:256 تعلن حرية الدين في الإسلام، مبينة أنه لا إكراه في أمور الإيمان. كثيرًا
