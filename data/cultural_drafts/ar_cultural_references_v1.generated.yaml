      en asuntos de fe. Se cita con frecuencia en debates sobre tolerancia religiosa y derechos humanos.
    fr: Cette phrase du Coran 2:256 déclare la liberté de religion en Islam, affirmant qu'il n'y a pas
      de contrainte en matière de foi. Elle est souvent citée dans les discussions sur la tolérance religieuse
      et les droits de l'homme.
