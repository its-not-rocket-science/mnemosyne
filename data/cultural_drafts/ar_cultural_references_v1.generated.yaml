  short_explanation: A celebrated line by Al-Mutanabbi meaning 'Every person is accustomed to what his
    time brings.' It is often used as a proverb about human nature and adaptation to circumstances.
  i18n_explanations:
    en: A celebrated line by Al-Mutanabbi meaning 'Every person is accustomed to what his time brings.'
      It is often used as a proverb about human nature and adaptation to circumstances.
    es: Un célebre verso de Al-Mutanabbi que significa 'Cada persona está acostumbrada a lo que su tiempo
      trae'. A menudo se usa como proverbio sobre la naturaleza humana y la adaptación a las circunstancias.
    fr: Un vers célèbre d'Al-Mutanabbi signifiant 'Chaque personne est habituée à ce que son temps apporte'.
      Il est souvent utilisé comme proverbe sur la nature humaine et l'adaptation aux circonstances.
    de: Ein berühmter Vers von Al-Mutanabbi mit der Bedeutung 'Jeder Mensch ist an das gewöhnt, was seine
      Zeit bringt.' Es wird oft als Sprichwort über die menschliche Natur und Anpassung an Gegebenheiten
      verwendet.
