- id: ar_cultural_reference_الحجاج_بن_يوسف_الثقفي_6b93ac76
  language: ar
  canonical_reference: الحجاج بن يوسف الثقفي
  reference_type: cultural_reference
  surface_patterns:
  - الحجاج بن يوسف الثقفي
  - الحجاج بن يوسف
  - الحجاج الثقفي
  - الحجاج
  short_explanation: Al-Hajjaj ibn Yusuf al-Thaqafi was a powerful and controversial Umayyad governor
    (c. 661-714 CE), known for his iron-fisted rule and role in consolidating Umayyad power across the
    Islamic empire. He remains a symbol of ruthless governance in Arabic literature.
  i18n_explanations:
    en: Al-Hajjaj ibn Yusuf al-Thaqafi was a powerful and controversial Umayyad governor (c. 661-714 CE),
      known for his iron-fisted rule and role in consolidating Umayyad power across the Islamic empire.
      He remains a symbol of ruthless governance in Arabic literature.
    es: Al-Hajjaj ibn Yusuf al-Thaqafi fue un poderoso y controvertido gobernador omeya (c. 661-714 d.C.),
      conocido por su gobierno de mano dura y su papel en la consolidación del poder omeya en todo el
      imperio islámico. Sigue siendo un símbolo de gobierno despiadado en la literatura árabe.
    fr: Al-Hajjaj ibn Yusuf al-Thaqafi était un puissant et controversé gouverneur omeyyade (c. 661-714
      ap. J.-C.), connu pour sa main de fer et son rôle dans la consolidation du pouvoir omeyyade à travers
      l'empire islamique. Il reste un symbole de gouvernance impitoyable dans la littérature arabe.
    de: Al-Hadschadsch ibn Yusuf ath-Thaqafi war ein mächtiger und umstrittener umayyadischer Gouverneur
      (ca. 661-714 n. Chr.), bekannt für seine eiserne Herrschaft und seine Rolle bei der Festigung der
      umayyadischen Macht im gesamten islamischen Reich. Er bleibt ein Symbol für rücksichtslose Regierungsführung
      in der arabischen Literatur.
    it: Al-Hajjaj ibn Yusuf al-Thaqafi fu un potente e controverso governatore omayyade (c. 661-714 d.C.),
      noto per il suo pugno di ferro e per il suo ruolo nel consolidare il potere omayyade in tutto l'impero
      islamico. Rimane un simbolo di governo spietato nella letteratura araba.
    pt: Al-Hajjaj ibn Yusuf al-Thaqafi foi um poderoso e controverso governador omíada (c. 661-714 d.C.),
      conhecido por seu governo de ferro e seu papel na consolidação do poder omíada em todo o império
      islâmico. Ele continua sendo um símbolo de governo implacável na literatura árabe.
    ru: Аль-Хаджжадж ибн Юсуф ас-Сакафи был могущественным и противоречивым омейядским наместником (ок.
      661–714 гг. н.э.), известным своим железным правлением и ролью в укреплении власти Омейядов по всей
      исламской империи. Он остается символом безжалостного правления в арабской литературе.
    ja: アル＝ハッジャージュ・ブン・ユースフ・アッ＝サカフィーは、強力で物議を醸したウマイヤ朝の総督（661年～714年頃）であり、鉄の支配とイスラム帝国全体におけるウマイヤ権力の強化に尽力したことで知られる。アラビア文学において冷酷な統治の象徴であり続けている。
    zh: 哈贾吉·本·优素福·萨卡菲是强大的且富有争议的倭马亚总督（约661-714年），以其铁腕统治和在伊斯兰帝国各地巩固倭马亚政权的作用而闻名。在阿拉伯文学中，他仍然是残酷统治的象征。
    ar: الحجاج بن يوسف الثقفي كان والياً أموياً قوياً ومثيراً للجدل (حوالي 661-714 م)، اشتهر بحكمه الحديدي
      ودوره في توطيد السلطة الأموية في جميع أنحاء الإمبراطورية الإسلامية. ولا يزال رمزاً للحكم القاسي
      في الأدب العربي.
    he: אל-חג'אג' בן יוסף א-ת'קפי היה מושל אומיי חזק ושנוי במחלוקת (בערך 661-714 לספירה), הידוע בשלטון
      הברזל שלו ובתפקידו באיחוד הכוח האומיי ברחבי האימפריה האסלאמית. הוא נותר סמל לממשל חסר רחמים בספרות
      הערבית.
