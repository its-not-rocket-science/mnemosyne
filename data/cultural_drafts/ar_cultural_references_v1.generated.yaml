- id: ar_literary_reference_ولقد_ذكرتك_والرماح_نواهل_8a39d2ea
  language: ar
  canonical_reference: ولقد ذكرتك والرماح نواهل
  reference_type: literary_reference
  surface_patterns:
  - ولقد ذكرتك والرماح نواهل
  - وذكرتك والرماح نواهل
  - ولقد ذكرتك والرماح نواهل مني
  short_explanation: A famous line from 'Antarah's Mu'allaqah meaning 'I remembered you while the spears
    were drinking (my blood),' a classic depiction of love amidst battle.
  i18n_explanations:
    en: A famous line from 'Antarah's Mu'allaqah meaning 'I remembered you while the spears were drinking
      (my blood),' a classic depiction of love amidst battle.
    es: Un famoso verso de la Mu'allaqah de 'Antarah que significa 'Te recordé mientras las lanzas bebían
      (mi sangre)', una clásica representación del amor en medio de la batalla.
    fr: Un vers célèbre de la Mu'allaqa d''Antarah signifiant 'Je me suis souvenu de toi tandis que les
      lances buvaient (mon sang)', une représentation classique de l'amour au milieu de la bataille.
    de: 'Ein berühmter Vers aus ''Antarahs Mu''allaqah, der bedeutet: ''Ich erinnerte mich an dich, während
      die Speere (mein Blut) tranken'', eine klassische Darstellung der Liebe im Kampf.'
    it: Un famoso verso della Mu'allaqah di 'Antarah che significa 'Mi sono ricordato di te mentre le
      lance bevevano (il mio sangue)', una classica rappresentazione dell'amore in battaglia.
    pt: Um famoso verso da Mu'allaqah de 'Antarah que significa 'Lembrei de ti enquanto as lanças bebiam
      (meu sangue)', uma representação clássica do amor em meio à batalha.
    ru: Знаменитая строка из муаллаки Антары, означающая 'Я вспомнил тебя, когда копья пили (мою кровь)',
      классическое изображение любви среди битвы.
    ja: アンタラのムアッラカの有名な一節で、「槍が（私の血を）飲んでいる間、私はあなたを思い出した」という意味。戦いの中での愛を古典的に描いている。
    zh: 安塔拉悬诗中的著名诗句，意为'当长矛在饮（我的血）时，我仍把你记起'，经典描绘了战场中的爱情。
    ar: بيت مشهور من معلقة عنترة يعني 'ولقد ذكرتك والرماح نواهل'، تصوير كلاسيكي للحب في خضم المعركة.
    he: שורה מפורסמת מהמועלקא של ענטרה שמשמעותה 'זכרתי אותך בזמן שהחניתות שתו (דמי)', תיאור קלאסי של אהבה
      בתוך קרב.
