- id: ar_classical_or_scriptural_allusion_المؤمن_القوي_خير_وأحب_إلى_الله_من_المؤمن_الضعيف_26d65e10
  language: ar
  canonical_reference: المؤمن القوي خير وأحب إلى الله من المؤمن الضعيف
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - المؤمن القوي خير وأحب إلى الله من المؤمن الضعيف
  - المؤمن القوي أحب إلى الله من المؤمن الضعيف
  - القوي خير وأحب إلى الله من الضعيف
  short_explanation: This hadith states that a strong believer (in faith and character) is better and
    more beloved to God than a weak one, but both possess goodness. It encourages self-improvement and
    reliance on God.
  i18n_explanations:
    en: This hadith states that a strong believer (in faith and character) is better and more beloved
      to God than a weak one, but both possess goodness. It encourages self-improvement and reliance on
      God.
    es: Este hadiz afirma que un creyente fuerte (en fe y carácter) es mejor y más amado por Dios que
      uno débil, pero ambos poseen bondad. Fomenta la superación personal y la confianza en Dios.
    fr: Ce hadith affirme qu'un croyant fort (dans la foi et le caractère) est meilleur et plus aimé de
      Dieu qu'un croyant faible, mais tous deux possèdent la bonté. Il encourage l'amélioration de soi
      et la confiance en Dieu.
    de: Dieser Hadith besagt, dass ein starker Gläubiger (im Glauben und Charakter) besser und bei Gott
      beliebter ist als ein schwacher, aber beide besitzen Güte. Er ermutigt zur Selbstverbesserung und
      zum Vertrauen auf Gott.
    it: Questo hadith afferma che un credente forte (nella fede e nel carattere) è migliore e più amato
      da Dio di uno debole, ma entrambi possiedono bontà. Incoraggia il miglioramento di sé e l'affidamento
      a Dio.
    pt: Este hadith afirma que um crente forte (na fé e no caráter) é melhor e mais amado por Deus do
      que um fraco, mas ambos possuem bondade. Incentiva o autoaperfeiçoamento e a confiança em Deus.
    ru: Этот хадис утверждает, что сильный верующий (в вере и характере) лучше и более любим Богом, чем
      слабый, но оба обладают добром. Он поощряет самосовершенствование и упование на Бога.
    ja: このハディースは、強い信仰と人格を持つ信者は弱い信者よりも優れており、神に愛されるが、両者とも善性を備えていると述べています。自己改善と神への信頼を促します。
    zh: 这段圣训指出，坚强的信士（在信仰和品德上）比软弱的信士更好、更受真主喜爱，但两者都拥有善。它鼓励自我提升和信赖真主。
    ar: يذكر هذا الحديث أن المؤمن القوي (في الإيمان والخلق) خير وأحب إلى الله من المؤمن الضعيف، ولكن كليهما
      فيه خير. وهو يشجع على تحسين الذات والاعتماد على الله.
    he: החדית' הזה קובע שמאמין חזק (באמונה ובאופי) טוב ואהוב יותר לאלוהים מאשר מאמין חלש, אך לשניהם יש
      טוב. הוא מעודד שיפור עצמי והסתמכות על אלוהים.
