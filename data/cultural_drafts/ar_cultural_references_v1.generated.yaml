- id: ar_classical_or_scriptural_allusion_بيعة_الرضوان_fd8ab63d
  language: ar
  canonical_reference: بيعة الرضوان
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - بيعة الرضوان
  - بيعة الشجرة
  short_explanation: The Pledge of Ridwan (also known as the Pledge of the Tree) was a vow of loyalty
    taken by Muslims under the Prophet Muhammad in 628 CE, mentioned in the Quran (48:18) as a key event
    symbolizing divine approval.
  i18n_explanations:
    en: The Pledge of Ridwan (also known as the Pledge of the Tree) was a vow of loyalty taken by Muslims
      under the Prophet Muhammad in 628 CE, mentioned in the Quran (48:18) as a key event symbolizing
      divine approval.
    es: El Juramento de Ridwan (también conocido como el Juramento del Árbol) fue un voto de lealtad realizado
      por los musulmanes bajo el Profeta Muhammad en 628 d.C., mencionado en el Corán (48:18) como un
      evento clave que simboliza la aprobación divina.
    fr: Le Serment de Ridwan (également connu sous le nom de Serment de l'Arbre) était un vœu de loyauté
      pris par les musulmans sous le Prophète Muhammad en 628 de notre ère, mentionné dans le Coran (48:18)
      comme un événement clé symbolisant l'approbation divine.
    de: Das Gelübde von Ridwan (auch bekannt als das Gelübde des Baumes) war ein Treueschwur, den Muslime
      unter dem Propheten Muhammad im Jahr 628 n. Chr. ablegten, im Koran (48:18) als Schlüsselereignis
      erwähnt, das göttliche Zustimmung symbolisiert.
    it: Il Patto di Ridwan (noto anche come Patto dell'Albero) fu un voto di fedeltà dei musulmani sotto
      il Profeta Muhammad nel 628 d.C., menzionato nel Corano (48:18) come evento chiave che simboleggia
      l'approvazione divina.
    pt: O Juramento de Ridwan (também conhecido como Juramento da Árvore) foi um voto de lealdade feito
      pelos muçulmanos sob o Profeta Muhammad em 628 d.C., mencionado no Alcorão (48:18) como um evento
      chave que simboliza a aprovação divina.
    ru: Клятва Ридвана (также известная как Клятва под деревом) была обетом верности, данным мусульманами
      под предводительством Пророка Мухаммеда в 628 году н. э., упоминается в Коране (48:18) как ключевое
      событие, символизирующее божественное одобрение.
    ja: リドワーンの誓い（木の誓いとしても知られる）は、628年に預言者ムハンマドのもとでムスリムが行った忠誠の誓いであり、コーラン（48:18）に神の承認を象徴する重要な出来事として言及されている。
    zh: 里德万誓约（也称为树下誓约）是公元628年穆斯林在先知穆罕默德领导下做出的忠诚誓言，在《古兰经》（48:18）中被提及，是象征神圣认可的关键事件。
    ar: بيعة الرضوان (المعروفة أيضًا باسم بيعة الشجرة) كانت يمين الولاء التي أداها المسلمون تحت قيادة
      النبي محمد في 628 ميلادية، وقد ذُكرت في القرآن (48:18) كحدث رئيسي يرمز إلى الرضا الإلهي.
    he: שבועת רידוואן (הידועה גם כשבועת העץ) הייתה נדר נאמנות שנשאו המוסלמים תחת הנביא מוחמד בשנת 628
      לספירה, מוזכרת בקוראן (48:18) כאירוע מפתח המסמל אישור אלוהי.
