  short_explanation: The Conquest of Mecca (630 AD) was the peaceful capture of Mecca by Prophet Muhammad,
    leading to the establishment of Islam in the city and the cleansing of the Kaaba of idols.
  i18n_explanations:
    en: The Conquest of Mecca (630 AD) was the peaceful capture of Mecca by Prophet Muhammad, leading
      to the establishment of Islam in the city and the cleansing of the Kaaba of idols.
    es: La Conquista de La Meca (630 d.C.) fue la captura pacífica de La Meca por el Profeta Muhammad,
      lo que llevó al establecimiento del Islam en la ciudad y la limpieza de la Kaaba de ídolos.
    fr: La conquête de La Mecque (630 ap. J.-C.) fut la capture pacifique de La Mecque par le prophète
      Mahomet, conduisant à l'établissement de l'Islam dans la ville et au nettoyage de la Kaaba des idoles.
    de: Die Eroberung Mekkas (630 n. Chr.) war die friedliche Einnahme Mekkas durch den Propheten Muhammad,
      die zur Etablierung des Islam in der Stadt und zur Reinigung der Kaaba von Götzenbildern führte.
    it: La conquista della Mecca (630 d.C.) fu la cattura pacifica della Mecca da parte del Profeta Maometto,
      portando all'istituzione dell'Islam nella città e alla purificazione della Kaaba dagli idoli.
    pt: A Conquista de Meca (630 d.C.) foi a captura pacífica de Meca pelo Profeta Muhammad, levando ao
      estabelecimento do Islã na cidade e à limpeza da Caaba de ídolos.
    ru: Завоевание Мекки (630 г. н.э.) было мирным захватом Мекки пророком Мухаммадом, что привело к утверждению
      ислама в городе и очищению Каабы от идолов.
    ja: メッカ征服（630年）は、預言者ムハンマドによるメッカの平和的な占領であり、市内にイスラム教が確立され、カーバ神殿から偶像が一掃された。
    zh: 征服麦加（公元630年）是先知穆罕默德和平占领麦加，导致伊斯兰教在该城确立，并清除克尔白中的偶像。
    ar: فتح مكة (630 م) كان الاستيلاء السلمي على مكة من قبل النبي محمد، مما أدى إلى ترسيخ الإسلام في المدينة
      وتطهير الكعبة من الأصنام.
    he: כיבוש מכה (630 לספירה) היה הכיבוש השליו של מכה על ידי הנביא מוחמד, שהוביל להקמת האסלאם בעיר ולטיהור
