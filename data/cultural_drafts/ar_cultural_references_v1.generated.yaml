    es: La batalla de Yarmouk fue un importante enfrentamiento militar entre las fuerzas árabes musulmanas
      y el Imperio bizantino en el 636 d.C., que resultó en una victoria decisiva árabe y la anexión de
      Siria.
    fr: La bataille de Yarmouk fut un affrontement majeur entre les forces arabes musulmanes et l'Empire
      byzantin en 636 apr. J.-C., aboutissant à une victoire décisive arabe et à l'annexion de la Syrie.
    de: Die Schlacht am Jarmuk war eine bedeutende militärische Auseinandersetzung zwischen den muslimisch-arabischen
