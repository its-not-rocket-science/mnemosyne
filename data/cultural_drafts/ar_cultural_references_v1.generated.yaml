    en: A phrase from Mahmoud Darwish's poem 'Palestinian Eyes', metaphorically linking the beloved's
      eyes to Palestinian identity and resistance. It is emblematic of Darwish's poetic connection between
      love and homeland.
    es: Una frase del poema 'Ojos palestinos' de Mahmoud Darwish, que vincula metafóricamente los ojos
      de la amada con la identidad y la resistencia palestinas. Es emblemática de la conexión poética
      de Darwish entre el amor y la patria.
    fr: Une phrase du poème 'Yeux palestiniens' de Mahmoud Darwich, reliant métaphoriquement les yeux
      de l'être aimé à l'identité et à la résistance palestiniennes. Elle est emblématique du lien poétique
      de Darwich entre l'amour et la patrie.
    de: Eine Phrase aus Mahmud Darwischs Gedicht 'Palästinensische Augen', die die Augen der Geliebten
      metaphorisch mit der palästinensischen Identität und dem Widerstand verbindet. Sie ist sinnbildlich
      für Darwischs poetische Verbindung von Liebe und Heimat.
    it: Una frase dalla poesia 'Occhi palestinesi' di Mahmoud Darwish, che collega metaforicamente gli
      occhi dell'amata all'identità e alla resistenza palestinesi. È emblematica del legame poetico di
      Darwish tra amore e patria.
    pt: Uma frase do poema 'Olhos Palestinos' de Mahmoud Darwish, ligando metaforicamente os olhos da
      amada à identidade e resistência palestinas. É emblemática da conexão poética de Darwish entre amor
      e pátria.
    ru: Фраза из стихотворения Махмуда Дарвиша 'Палестинские глаза', метафорически связывающая глаза возлюбленной
      с палестинской идентичностью и сопротивлением. Она символизирует поэтическую связь Дарвиша между
      любовью и родиной.
    ja: マフムード・ダルウィーシュの詩『パレスチナの目』の一節で、愛する人の目をパレスチナのアイデンティティと抵抗に隠喩的に結びつけている。ダルウィーシュの愛と故郷を結ぶ詩的関係を象徴している。
    zh: 马哈茂德·达尔维什的诗《巴勒斯坦的眼睛》中的一句话，隐喻地将爱人的眼睛与巴勒斯坦身份和抵抗联系起来。体现了达尔维什将爱情与祖国联系起来的诗意。
