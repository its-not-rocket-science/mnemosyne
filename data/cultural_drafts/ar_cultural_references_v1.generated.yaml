- id: ar_cultural_reference_معركة_بلاط_الشهداء_c5b3bf1d
  language: ar
  canonical_reference: معركة بلاط الشهداء
  reference_type: cultural_reference
  surface_patterns:
  - معركة بلاط الشهداء
  - بلاط الشهداء
  - معركة بواتييه
  short_explanation: The Battle of Tours (or Poitiers) in 732 CE was a conflict between Frankish and Umayyad
    forces, where Charles Martel halted the Muslim advance into Western Europe. Known in Arabic as 'Balat
    al-Shuhada' (Pavement of Martyrs).
  i18n_explanations:
    en: The Battle of Tours (or Poitiers) in 732 CE was a conflict between Frankish and Umayyad forces,
      where Charles Martel halted the Muslim advance into Western Europe. Known in Arabic as 'Balat al-Shuhada'
      (Pavement of Martyrs).
    es: La batalla de Tours (o Poitiers) en 732 d.C. fue un conflicto entre las fuerzas francas y omeyas,
      donde Carlos Martel detuvo el avance musulmán hacia Europa occidental. Conocida en árabe como 'Balat
      al-Shuhada' (Pavimento de los Mártires).
    fr: La bataille de Tours (ou Poitiers) en 732 apr. J.-C. fut un conflit entre les forces franques
      et omeyyades, où Charles Martel stoppa l'avancée musulmane en Europe occidentale. Connue en arabe
      sous le nom de 'Balat al-Shuhada' (Pavé des Martyrs).
    de: Die Schlacht von Tours (oder Poitiers) im Jahr 732 n. Chr. war eine Auseinandersetzung zwischen
      fränkischen und umayyadischen Streitkräften, bei der Karl Martell den muslimischen Vormarsch nach
      Westeuropa stoppte. Auf Arabisch bekannt als 'Balat al-Shuhada' (Pflaster der Märtyrer).
    it: La battaglia di Tours (o Poitiers) nel 732 d.C. fu un conflitto tra le forze franche e omayyadi,
      dove Carlo Martello fermò l'avanzata musulmana nell'Europa occidentale. Conosciuta in arabo come
      'Balat al-Shuhada' (Pavimento dei Martiri).
    pt: A Batalha de Tours (ou Poitiers) em 732 d.C. foi um conflito entre as forças francas e omíadas,
      onde Carlos Martel interrompeu o avanço muçulmano na Europa Ocidental. Conhecida em árabe como 'Balat
      al-Shuhada' (Pavimento dos Mártires).
    ru: Битва при Туре (или Пуатье) в 732 году н.э. была столкновением между франкскими и омейядскими
      войсками, где Карл Мартелл остановил мусульманское продвижение в Западную Европу. Известна на арабском
      как 'Балат аш-Шухада' (Мостовая мучеников).
    ja: 732年のトゥール（ポワティエ）の戦いは、フランク軍とウマイヤ軍の間の戦闘で、カール・マルテルが西ヨーロッパへのイスラム勢力の進出を阻止した。アラビア語では「バラト・アッ＝シュハダー（殉教者の舗道）」として知られる。
    zh: 732年的图尔战役（或普瓦捷战役）是法兰克军队与倭马亚军队之间的冲突，查理·马特阻止了穆斯林向西欧的推进。阿拉伯语中称为「巴拉特·舒哈达」（殉道者之路）。
    ar: معركة بلاط الشهداء (أو معركة بواتييه) عام 732 ميلادي كانت صراعًا بين القوات الفرنجية والأموية،
      حيث أوقف شارل مارتل التقدم الإسلامي نحو أوروبا الغربية. تعرف بالعربية باسم 'بلاط الشهداء'.
    he: קרב טור (או פואטייה) בשנת 732 לספירה היה עימות בין כוחות פרנקים לאומיים, שבו קרל מרטל עצר את ההתקדמות
      המוסלמית למערב אירופה. ידוע בערבית בשם 'בלאט א-שוהדא' (ריצוף השהידים).
  learner_level: B2
  confidence: 0.85
