- id: ar_classical_or_scriptural_allusion_إنما_الصبر_عند_الصدمة_الأولى_b35b402f
  language: ar
  canonical_reference: إنما الصبر عند الصدمة الأولى
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - إنما الصبر عند الصدمة الأولى
  - الصبر عند الصدمة الأولى
  - الصبر عند أول الصدمة
  short_explanation: This hadith teaches that true patience is shown at the initial impact of a calamity,
    not later. It is a common reminder in Islamic teachings about the virtue of patience.
  i18n_explanations:
    en: This hadith teaches that true patience is shown at the initial impact of a calamity, not later.
      It is a common reminder in Islamic teachings about the virtue of patience.
    es: Este hadiz enseña que la verdadera paciencia se demuestra en el impacto inicial de una calamidad,
      no después. Es un recordatorio común en las enseñanzas islámicas sobre la virtud de la paciencia.
    fr: Ce hadith enseigne que la vraie patience se manifeste lors du premier choc d'une calamité, pas
      plus tard. C'est un rappel courant dans les enseignements islamiques sur la vertu de la patience.
    de: Dieser Hadith lehrt, dass wahre Geduld beim ersten Auftreten eines Unglücks gezeigt wird, nicht
      später. Es ist eine häufige Erinnerung in islamischen Lehren an die Tugend der Geduld.
    it: Questo hadith insegna che la vera pazienza si dimostra al primo impatto di una calamità, non dopo.
      È un comune richiamo negli insegnamenti islamici sulla virtù della pazienza.
    pt: Este hadith ensina que a verdadeira paciência é demonstrada no primeiro impacto de uma calamidade,
      não depois. É um lembrete comum nos ensinamentos islâmicos sobre a virtude da paciência.
    ru: Этот хадис учит, что истинное терпение проявляется при первом ударе бедствия, а не позже. Это
      распространенное напоминание в исламских учениях о добродетели терпения.
    ja: このハディースは、真の忍耐は災難の最初の衝撃の時に示され、後ではないと教えています。忍耐の美徳についてのイスラムの教えでよく言及されるものです。
    zh: 这段圣训教导说，真正的忍耐是在灾难最初冲击时表现出来的，而非之后。这是伊斯兰教导中关于忍耐美德的常见提醒。
    ar: يعلمنا هذا الحديث أن الصبر الحقيقي يكون عند الصدمة الأولى للبلاء، وليس بعد ذلك. وهو تذكير شائع
      في التعاليم الإسلامية عن فضيلة الصبر.
    he: החדית' הזה מלמד שסבלנות אמיתית מתגלה בפגיעה הראשונית של אסון, לא מאוחר יותר. זוהי תזכורת נפוצה
      בתורות האסלאם על מידת הסבלנות.
