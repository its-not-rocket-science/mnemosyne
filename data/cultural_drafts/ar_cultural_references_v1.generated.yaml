  short_explanation: Harun al-Rashid was the fifth Abbasid caliph, ruling from 786 to 809 CE. He is a
    central figure in Islamic history and appears in many stories from One Thousand and One Nights, symbolizing
    the golden age of the Abbasid Caliphate.
  i18n_explanations:
    en: Harun al-Rashid was the fifth Abbasid caliph, ruling from 786 to 809 CE. He is a central figure
      in Islamic history and appears in many stories from One Thousand and One Nights, symbolizing the
      golden age of the Abbasid Caliphate.
    es: Harun al-Rashid fue el quinto califa abasí, gobernando del 786 al 809 d.C. Es una figura central
      en la historia islámica y aparece en muchos cuentos de Las mil y una noches, simbolizando la edad
      de oro del Califato Abasí.
    fr: Harun al-Rashid était le cinquième calife abbasside, régnant de 786 à 809 de notre ère. Il est
      une figure centrale de l'histoire islamique et apparaît dans de nombreuses histoires des Mille et
      Une Nuits, symbolisant l'âge d'or du califat abbasside.
    de: Harun al-Raschid war der fünfte abbasidische Kalif und regierte von 786 bis 809 n. Chr. Er ist
      eine zentrale Figur der islamischen Geschichte und kommt in vielen Geschichten aus Tausendundeine
      Nacht vor, die das goldene Zeitalter des Abbasiden-Kalifats symbolisieren.
    it: Harun al-Rashid fu il quinto califfo abbaside, regnante dal 786 al 809 d.C. È una figura centrale
      nella storia islamica e appare in molte storie de Le mille e una notte, simboleggiando l'età d'oro
      del califfato abbaside.
    pt: Harun al-Rashid foi o quinto califa abássida, governando de 786 a 809 d.C. Ele é uma figura central
      na história islâmica e aparece em muitas histórias de As Mil e Uma Noites, simbolizando a era de
      ouro do Califado Abássida.
    ru: Харун ар-Рашид был пятым аббасидским халифом, правившим с 786 по 809 год н.э. Он является центральной
      фигурой в исламской истории и появляется во многих историях из «Тысячи и одной ночи», символизируя
      золотой век Аббасидского халифата.
    ja: ハルーン・アッ＝ラシードは第5代アッバース朝カリフで、786年から809年まで統治した。彼はイスラム史の中心人物であり、『千夜一夜物語』の多くの物語に登場し、アッバース朝の黄金時代を象徴している。
    zh: 哈伦·拉希德是第五任阿拔斯王朝哈里发，统治期为公元786年至809年。他是伊斯兰历史的核心人物，出现在《一千零一夜》的许多故事中，象征着阿拔斯哈里发的黄金时代。
    ar: كان هارون الرشيد الخليفة العباسي الخامس، حكم من 786 إلى 809 ميلادية. هو شخصية محورية في التاريخ
      الإسلامي ويظهر في العديد من قصص ألف ليلة وليلة، رمزاً للعصر الذهبي للخلافة العباسية.
    he: הארון א-רשיד היה הח'ליף העבאסי החמישי, ששלט מ-786 עד 809 לספירה. הוא דמות מרכזית בהיסטוריה האסלאמית
      ומופיע בסיפורים רבים של 'אלף לילה ולילה', המסמל את תור הזהב של הח'ליפות העבאסית.
