    it: Il califfato omayyade fu la prima dinastia ereditaria islamica che governò dal 661 al 750 d.C.,
      con sede a Damasco, con un significativo impatto culturale e politico.
    pt: O Califado Omíada foi a primeira dinastia hereditária islâmica que governou de 661 a 750 d.C.,
