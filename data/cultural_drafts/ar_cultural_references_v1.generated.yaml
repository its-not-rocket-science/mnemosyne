- id: ar_classical_or_scriptural_allusion_لا_يلدغ_المؤمن_من_جحر_مرتين_5f29104c
  language: ar
  canonical_reference: لا يلدغ المؤمن من جحر مرتين
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - لا يلدغ المؤمن من جحر مرتين
  - لا يلدغ المؤمن من جحر واحد مرتين
  - لا يلدغ المؤمن من نفس الجحر مرتين
  short_explanation: This proverb, attributed to the Prophet Muhammad, means that a wise believer does
    not make the same mistake twice. It emphasizes learning from experience and is widely used in Arabic
    as a caution against repeating errors.
  i18n_explanations:
    en: This proverb, attributed to the Prophet Muhammad, means that a wise believer does not make the
      same mistake twice. It emphasizes learning from experience and is widely used in Arabic as a caution
      against repeating errors.
    es: Este proverbio, atribuido al Profeta Muhammad, significa que un creyente sabio no comete el mismo
      error dos veces. Enfatiza aprender de la experiencia y se usa ampliamente en árabe como advertencia
      contra repetir errores.
    fr: Ce proverbe, attribué au Prophète Muhammad, signifie qu'un croyant sage ne commet pas deux fois
      la même erreur. Il souligne l'importance de tirer des leçons de l'expérience et est largement utilisé
      en arabe pour mettre en garde contre la répétition des erreurs.
    de: Dieses Sprichwort, das dem Propheten Muhammad zugeschrieben wird, bedeutet, dass ein weiser Gläubiger
      nicht zweimal denselben Fehler macht. Es betont das Lernen aus Erfahrung und wird im Arabischen
      häufig als Warnung vor wiederholten Fehlern verwendet.
    it: Questo proverbio, attribuito al Profeta Maometto, significa che un credente saggio non commette
      due volte lo stesso errore. Sottolinea l'importanza di imparare dall'esperienza ed è ampiamente
      usato in arabo come monito contro il ripetere errori.
    pt: Este provérbio, atribuído ao Profeta Muhammad, significa que um crente sábio não comete o mesmo
      erro duas vezes. Enfatiza aprender com a experiência e é amplamente usado em árabe como um alerta
      contra repetir erros.
    ru: Эта пословица, приписываемая пророку Мухаммаду, означает, что мудрый верующий не совершает одну
      и ту же ошибку дважды. Она подчеркивает важность обучения на опыте и широко используется в арабском
      языке как предостережение от повторения ошибок.
    ja: 預言者ムハンマドに帰されるこのことわざは、賢い信者は同じ過ちを二度犯さないという意味です。経験から学ぶことを強調し、アラビア語で過ちの繰り返しに対する警告として広く使われています。
    zh: 这句谚语归功于先知穆罕默德，意思是明智的信徒不会两次犯同样的错误。它强调从经验中学习，在阿拉伯语中广泛用作对重复错误的警示。
    ar: هذا المثل المنسوب إلى النبي محمد يعني أن المؤمن الحكيم لا يلدغ من الجحر مرتين. ويؤكد على التعلم
      من التجربة ويستخدم على نطاق واسع في العربية كتحذير من تكرار الأخطاء.
    he: הפתגם הזה, המיוחס לנביא מוחמד, פירושו שמאמין חכם אינו עושה אותה טעות פעמיים. הוא מדגיש למידה מניסיון
      ונמצא בשימוש נרחב בערבית כאזהרה מפני חזרה על טעויות.
