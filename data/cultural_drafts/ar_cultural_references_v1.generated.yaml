  - مخافة الله رأس الحكمة
  - أصل الحكمة مخافة الله
  short_explanation: Meaning 'The head of wisdom is the fear of God,' this saying underscores that piety
    is the foundation of wisdom. It is a well-known religious saying similar to a hadith.
  i18n_explanations:
    en: Meaning 'The head of wisdom is the fear of God,' this saying underscores that piety is the foundation
      of wisdom. It is a well-known religious saying similar to a hadith.
    es: Significa 'La cabeza de la sabiduría es el temor de Dios', este dicho subraya que la piedad es
      el fundamento de la sabiduría. Es un dicho religioso bien conocido similar a un hadiz.
    fr: Signifiant 'La tête de la sagesse est la crainte de Dieu', ce dicton souligne que la piété est
      le fondement de la sagesse. C'est un dicton religieux bien connu similaire à un hadith.
    de: Dieser Spruch bedeutet 'Die Spitze der Weisheit ist die Gottesfurcht' und unterstreicht, dass
      Frömmigkeit die Grundlage der Weisheit ist. Es ist ein bekannter religiöser Ausspruch, ähnlich einem
      Hadith.
    it: Significando 'La testa della saggezza è il timore di Dio', questo detto sottolinea che la pietà
      è il fondamento della saggezza. È un detto religioso ben noto simile a un hadith.
    pt: Significando 'A cabeça da sabedoria é o temor de Deus', este ditado enfatiza que a piedade é a
      base da sabedoria. É um ditado religioso bem conhecido semelhante a um hadith.
    ru: Означая 'Глава мудрости — страх Божий', эта поговорка подчеркивает, что благочестие является основой
      мудрости. Это хорошо известное религиозное изречение, похожее на хадис.
    ja: '''知恵の頂点は神への畏れである''という意味で、敬虔さが知恵の基盤であることを強調しています。ハディースに似た広く知られた宗教的な言葉です。'
    zh: 意思是'智慧之首是敬畏真主'，这句话强调虔诚是智慧的基础。这是一个众所周知的宗教谚语，类似于圣训。
    ar: تعني 'رأس الحكمة مخافة الله'، هذا القول يؤكد أن التقوى هي أساس الحكمة. إنه قول ديني معروف يشبه
      الحديث.
    he: פירושו 'ראש החכמה הוא יראת אלוהים', אמרה זו מדגישה שיראת שמיים היא בסיס החכמה. זו אמרה דתית ידועה
      הדומה לחדית'.
