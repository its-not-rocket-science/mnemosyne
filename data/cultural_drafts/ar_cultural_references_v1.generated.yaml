- id: ar_cultural_reference_محمد_الفاتح_dfaa80c7
  language: ar
  canonical_reference: محمد الفاتح
  reference_type: cultural_reference
  surface_patterns:
  - محمد الفاتح
  - السلطان محمد الفاتح
  - أبو الفتح
  - محمد الثاني
  short_explanation: Mehmed the Conqueror (1432-1481) was the Ottoman sultan who conquered Constantinople
    in 1453, ending the Byzantine Empire. He is a revered historical figure in Turkish and Islamic history,
    symbolizing military prowess and cultural patronage.
  i18n_explanations:
    en: Mehmed the Conqueror (1432-1481) was the Ottoman sultan who conquered Constantinople in 1453,
      ending the Byzantine Empire. He is a revered historical figure in Turkish and Islamic history, symbolizing
      military prowess and cultural patronage.
    es: Mehmed el Conquistador (1432-1481) fue el sultán otomano que conquistó Constantinopla en 1453,
      poniendo fin al Imperio bizantino. Es una figura histórica venerada en la historia turca e islámica,
      que simboliza la destreza militar y el mecenazgo cultural.
    fr: Mehmed le Conquérant (1432-1481) était le sultan ottoman qui a conquis Constantinople en 1453,
      mettant fin à l'Empire byzantin. Il est une figure historique vénérée dans l'histoire turque et
      islamique, symbolisant la prouesse militaire et le mécénat culturel.
    de: Mehmed der Eroberer (1432–1481) war der osmanische Sultan, der 1453 Konstantinopel eroberte und
      damit das Byzantinische Reich beendete. Er ist eine verehrte historische Figur in der türkischen
      und islamischen Geschichte und symbolisiert militärische Stärke und kulturelle Förderung.
    it: Maometto il Conquistatore (1432-1481) fu il sultano ottomano che conquistò Costantinopoli nel
      1453, ponendo fine all'Impero bizantino. È una figura storica venerata nella storia turca e islamica,
      simbolo di abilità militare e mecenatismo culturale.
    pt: Maomé, o Conquistador (1432-1481) foi o sultão otomano que conquistou Constantinopla em 1453,
      encerrando o Império Bizantino. Ele é uma figura histórica reverenciada na história turca e islâmica,
      simbolizando proeza militar e patrocínio cultural.
    ru: Мехмед II Завоеватель (1432–1481) был османским султаном, захватившим Константинополь в 1453 году,
      положив конец Византийской империи. Он является почитаемой исторической фигурой в турецкой и исламской
      истории, символизирующей военную доблесть и покровительство культуре.
    ja: 征服王メフメト（1432-1481年）は、1453年にコンスタンティノープルを征服し、東ローマ帝国を滅ぼしたオスマン帝国のスルタンである。トルコとイスラムの歴史において崇敬される人物であり、軍事力と文化の後援を象徴している。
    zh: 穆罕默德二世（征服者）（1432-1481年）是奥斯曼帝国苏丹，于1453年征服君士坦丁堡，结束了拜占庭帝国。他是土耳其和伊斯兰历史上备受尊敬的人物，象征着军事才能和文化赞助。
    ar: محمد الفاتح (1432-1481) كان السلطان العثماني الذي فتح القسطنطينية عام 1453، منهياً الإمبراطورية
      البيزنطية. وهو شخصية تاريخية مبجلة في التاريخ التركي والإسلامي، ترمز إلى البراعة العسكرية ورعاية
      الثقافة.
    he: מהמט הכובש (1432-1481) היה הסולטאן העות'מאני שכבש את קונסטנטינופול ב-1453, וסיים את האימפריה הביזנטית.
      הוא דמות היסטורית נערצת בהיסטוריה הטורקית והאסלאמית, המסמלת כוח צבאי ופטרונות תרבותית.
