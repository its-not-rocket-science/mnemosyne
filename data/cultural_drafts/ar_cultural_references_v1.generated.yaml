    ru: Омейядский халифат был первой наследственной исламской династией, правившей с 661 по 750 год н.
      э., с центром в Дамаске, оказавшей значительное культурное и политическое влияние.
    ja: ウマイヤ朝は661年から750年まで統治した最初の世襲イスラム王朝であり、ダマスカスに拠点を置き、文化的・政治的影響が大きかった。
    zh: 倭马亚哈里发国是第一个世袭伊斯兰王朝，从公元661年到750年统治，首都位于大马士革，具有重大的文化和政治影响。
