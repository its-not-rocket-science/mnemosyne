- id: ar_classical_or_scriptural_allusion_إن_من_البيان_لسحرا_5aaf8210
  language: ar
  canonical_reference: إن من البيان لسحرا
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - إن من البيان لسحرا
  - من البيان سحر
  - في البيان سحر
  short_explanation: This phrase means 'Indeed, there is magic in eloquence,' highlighting the persuasive
    and captivating power of speech. It is attributed to Prophet Muhammad and is often used to encourage
    effective communication.
  i18n_explanations:
    en: This phrase means 'Indeed, there is magic in eloquence,' highlighting the persuasive and captivating
      power of speech. It is attributed to Prophet Muhammad and is often used to encourage effective communication.
    es: Esta frase significa 'En verdad, hay magia en la elocuencia', destacando el poder persuasivo y
      cautivador del habla. Se atribuye al Profeta Muhammad y se usa a menudo para fomentar una comunicación
      efectiva.
    fr: Cette phrase signifie 'En vérité, il y a de la magie dans l'éloquence', soulignant le pouvoir
      persuasif et captivant de la parole. Elle est attribuée au Prophète Mahomet et est souvent utilisée
      pour encourager une communication efficace.
    de: Dieser Satz bedeutet 'Wahrlich, es gibt Magie in der Beredsamkeit' und hebt die überzeugende und
      fesselnde Kraft der Rede hervor. Er wird dem Propheten Mohammed zugeschrieben und wird oft verwendet,
      um effektive Kommunikation zu fördern.
    it: Questa frase significa 'In verità, c'è magia nell'eloquenza', evidenziando il potere persuasivo
      e coinvolgente del discorso. È attribuita al Profeta Maometto ed è spesso usata per incoraggiare
      una comunicazione efficace.
    pt: Esta frase significa 'Na verdade, há magia na eloquência', destacando o poder persuasivo e cativante
      da fala. É atribuída ao Profeta Muhammad e é frequentemente usada para incentivar a comunicação
      eficaz.
    ru: Эта фраза означает 'Воистину, есть волшебство в красноречии', подчеркивая убедительную и захватывающую
      силу речи. Она приписывается Пророку Мухаммеду и часто используется для поощрения эффективного общения.
    ja: このフレーズは「実に、雄弁に魔法がある」という意味で、話し言葉の説得力と魅了する力を強調しています。預言者ムハンマドに帰せられ、効果的なコミュニケーションを促すためによく使われます。
    zh: 这句话的意思是‘的确，雄辩中有魔力’，强调了言语的说服力和迷人力量。它出自先知穆罕默德，常被用来鼓励有效的沟通。
    ar: تعني هذه العبارة 'إن من البيان لسحرا'، وتبرز القوة المقنعة والآسرة للكلام. تُنسب إلى النبي محمد
      صلى الله عليه وسلم، وغالبًا ما تُستخدم لتشجيع التواصل الفعال.
    he: ביטוי זה פירושו 'אכן, יש קסם בריהוט', המדגיש את הכוח המשכנע והמרתק של הדיבור. הוא מיוחס לנביא
      מוחמד ומשמש לעתים קרובות כדי לעודד תקשורת אפקטיבית.
