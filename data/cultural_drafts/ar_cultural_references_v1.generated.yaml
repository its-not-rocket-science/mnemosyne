- id: ar_literary_reference_فغض_الطرف_إنك_من_نمير_91e9ce5a
  language: ar
  canonical_reference: فغض الطرف إنك من نمير
  reference_type: literary_reference
  surface_patterns:
  - فغض الطرف
  - فغض الطرف إنك من نمير
  - غض الطرف
  short_explanation: A line from Al-Farazdaq's poem, meaning 'Lower your gaze, for you are from Numayr.'
    It is used as a proverb to advise humility, implying that the person is from a humble tribe and should
    not boast.
  i18n_explanations:
    en: A line from Al-Farazdaq's poem, meaning 'Lower your gaze, for you are from Numayr.' It is used
      as a proverb to advise humility, implying that the person is from a humble tribe and should not
      boast.
    es: Un verso del poema de Al-Farazdaq que significa 'Baja la mirada, porque eres de Numayr'. Se usa
      como proverbio para aconsejar humildad, implicando que la persona es de una tribu humilde y no debe
      presumir.
    fr: Un vers du poème d'Al-Farazdaq signifiant 'Baisse le regard, car tu es de Numayr'. Il est utilisé
      comme proverbe pour conseiller l'humilité, sous-entendant que la personne est d'une tribu modeste
      et ne doit pas se vanter.
    de: 'Ein Vers aus Al-Farazdaqs Gedicht, der bedeutet: ''Senke deinen Blick, denn du bist von Numayr.''
      Es wird als Sprichwort verwendet, um Demut zu raten, und impliziert, dass die Person aus einem bescheidenen
      Stamm stammt und nicht prahlen sollte.'
    it: Un verso della poesia di Al-Farazdaq che significa 'Abbassa lo sguardo, perché sei di Numayr'.
      È usato come proverbio per consigliare umiltà, implicando che la persona proviene da una tribù umile
      e non dovrebbe vantarsi.
    pt: Um verso do poema de Al-Farazdaq que significa 'Abaixe o olhar, pois você é de Numayr'. É usado
      como provérbio para aconselhar humildade, implicando que a pessoa é de uma tribo humilde e não deve
      se gabar.
    ru: Строка из стихотворения Аль-Фараздака, означающая «Опусти взор, ибо ты из Нумайр». Используется
      как пословица, советующая смирение, подразумевая, что человек из скромного племени и не должен хвастаться.
    ja: アル＝ファラズダクの詩の一節で、「目を伏せよ、汝はヌマイールの者だから」という意味です。謙虚さを促すことわざとして使われ、その人物が卑しい部族出身であり誇るべきではないことを示唆します。
    zh: 阿尔-法拉兹达克诗句中的一行，意为“垂下目光，因为你来自努迈尔”。它被用作谚语，劝人谦虚，暗示此人出身低微的部落，不应自夸。
    ar: 'بيت من شعر الفرزدق، ومعناه: ''اغضض بصرك فإنك من نمير''. يُستخدم كمثل للتواضع، مما يعني أن الشخص
      من قبيلة متواضعة ولا ينبغي له التفاخر.'
