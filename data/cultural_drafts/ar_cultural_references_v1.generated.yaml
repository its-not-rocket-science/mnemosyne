- id: ar_proverb_tradition_إذا_حضر_الماء_بطل_التيمم_294d061d
  language: ar
  canonical_reference: إذا حضر الماء بطل التيمم
  reference_type: proverb_tradition
  surface_patterns:
  - إذا حضر الماء بطل التيمم
  - عند حضور الماء يبطل التيمم
  - حضور الماء يبطل التيمم
  short_explanation: This proverb means 'When water is present, tayammum (dry ablution) becomes void,'
    indicating that when the essential means is available, the substitute is no longer valid. It is used
    metaphorically to stress priority and relevance.
  i18n_explanations:
    en: This proverb means 'When water is present, tayammum (dry ablution) becomes void,' indicating that
      when the essential means is available, the substitute is no longer valid. It is used metaphorically
      to stress priority and relevance.
    es: Este proverbio significa 'Cuando el agua está presente, el tayammum (ablución seca) se vuelve
      nulo', indicando que cuando el medio esencial está disponible, el sustituto ya no es válido. Se
      usa metafóricamente para enfatizar la prioridad y la relevancia.
    fr: Ce proverbe signifie 'Quand l'eau est présente, le tayammum (ablution sèche) devient nul', indiquant
      que lorsque le moyen essentiel est disponible, le substitut n'est plus valable. Il est utilisé métaphoriquement
      pour souligner la priorité et la pertinence.
    de: Dieses Sprichwort bedeutet 'Wenn Wasser vorhanden ist, wird Tayammum (trockene Waschung) ungültig',
      was darauf hinweist, dass wenn das wesentliche Mittel verfügbar ist, der Ersatz nicht mehr gültig
      ist. Es wird metaphorisch verwendet, um Priorität und Relevanz zu betonen.
    it: Questo proverbio significa 'Quando l'acqua è presente, il tayammum (abluzione secca) diventa nullo',
      indicando che quando il mezzo essenziale è disponibile, il sostituto non è più valido. Viene usato
      metaforicamente per sottolineare priorità e rilevanza.
    pt: Este provérbio significa 'Quando a água está presente, o tayammum (ablução seca) torna-se nulo',
      indicando que quando o meio essencial está disponível, o substituto não é mais válido. É usado metaforicamente
      para enfatizar prioridade e relevância.
    ru: Эта пословица означает 'Когда есть вода, таяммум (сухое омовение) становится недействительным',
      указывая на то, что когда основное средство доступно, замена более недействительна. Она используется
      метафорически, чтобы подчеркнуть приоритет и актуальность.
    ja: このことわざは「水があるとき、タヤンムム（乾式の清め）は無効になる」という意味で、本質的な手段が利用可能な場合、代用はもはや無効であることを示しています。優先順位と関連性を強調するために比喩的に使われます。
    zh: 这句谚语的意思是‘当水存在时，土净（干洗）就无效了’，表明当基本手段可用时，替代品不再有效。它被用作隐喻来强调优先性和相关性。
    ar: هذا المثل يعني 'إذا حضر الماء بطل التيمم'، مشيرًا إلى أنه عندما يكون الوسيلة الأساسية متاحة، فإن
      البديل لم يعد صالحًا. يُستخدم مجازًا للتأكيد على الأولوية والأهمية.
    he: פתגם זה פירושו 'כשמים נוכחים, טיאמום (הטהרה היבשה) מתבטל', המציין שכאשר האמצעי החיוני זמין, תחליף
      אינו תקף עוד. הוא משמש באופן מטפורי כדי להדגיש עדיפות ורלוונטיות.
