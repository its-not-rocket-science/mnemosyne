  short_explanation: This hadith promises that God will exalt those who are humble for His sake. It is
    widely used to promote humility in Islamic tradition.
  i18n_explanations:
    en: This hadith promises that God will exalt those who are humble for His sake. It is widely used
      to promote humility in Islamic tradition.
    es: Este hadiz promete que Dios exaltará a quienes sean humildes por Su causa. Se usa ampliamente
      para promover la humildad en la tradición islámica.
    fr: Ce hadith promet que Dieu élèvera ceux qui sont humbles pour Lui. Il est largement utilisé pour
      promouvoir l'humilité dans la tradition islamique.
    de: Dieser Hadith verspricht, dass Gott diejenigen erhöhen wird, die um Seinetwillen demütig sind.
      Er wird in der islamischen Tradition häufig verwendet, um Demut zu fördern.
    it: Questo hadith promette che Dio esalterà coloro che sono umili per Lui. È ampiamente usato per
      promuovere l'umiltà nella tradizione islamica.
    pt: Este hadith promete que Deus exaltará aqueles que são humildes por Sua causa. É amplamente usado
      para promover a humildade na tradição islâmica.
    ru: Этот хадис обещает, что Бог возвысит тех, кто смирен ради Него. Он широко используется для поощрения
      смирения в исламской традиции.
    ja: このハディースは、神のために謙虚である者を神が高めてくださると約束しています。イスラムの伝統において謙虚さを促すために広く用いられています。
    zh: 这段圣训承诺，真主将擢升那些为祂而谦逊的人。它在伊斯兰传统中被广泛用于弘扬谦逊。
    ar: يعد هذا الحديث بأن الله سيرفع من تواضع له. ويستخدم على نطاق واسع لتعزيز التواضع في التقاليد الإسلامية.
    he: החדית' הזה מבטיח שאלוהים ירים את אלה שענווים למענו. הוא נמצא בשימוש נרחב לקידום ענווה במסורת האסלאמית.
