- id: ar_cultural_reference_طارق_بن_زياد_94a3e678
  language: ar
  canonical_reference: طارق بن زياد
  reference_type: cultural_reference
  surface_patterns:
  - طارق بن زياد
  - طارق
  - ابن زياد
  short_explanation: 'Tariq ibn Ziyad was the Umayyad general who led the Muslim conquest of Visigothic
    Hispania in 711 CE, landing at Gibraltar (named after him: Jabal Tariq).'
  i18n_explanations:
    en: 'Tariq ibn Ziyad was the Umayyad general who led the Muslim conquest of Visigothic Hispania in
      711 CE, landing at Gibraltar (named after him: Jabal Tariq).'
    es: 'Tariq ibn Ziyad fue el general omeya que dirigió la conquista musulmana de la Hispania visigoda
      en el 711 d.C., desembarcando en Gibraltar (llamado así en su honor: Yabal Tariq).'
    fr: 'Tariq ibn Ziyad fut le général omeyyade qui mena la conquête musulmane de l''Hispanie wisigothique
      en 711 apr. J.-C., débarquant à Gibraltar (nommé d''après lui: Djebel Tariq).'
    de: 'Tariq ibn Ziyad war der umayyadische General, der im Jahr 711 n. Chr. die muslimische Eroberung
      des westgotischen Hispanien anführte und bei Gibraltar landete (benannt nach ihm: Jabal Tariq).'
    it: 'Tariq ibn Ziyad fu il generale omayyade che guidò la conquista musulmana della Spagna visigota
      nel 711 d.C., sbarcando a Gibilterra (dal nome di lui: Jabal Tariq).'
    pt: 'Tariq ibn Ziyad foi o general omíada que liderou a conquista muçulmana da Hispânia Visigótica
      em 711 d.C., desembarcando em Gibraltar (nomeado em sua homenagem: Jabal Tariq).'
    ru: 'Тарик ибн Зияд был омейядским полководцем, возглавившим мусульманское завоевание вестготской
      Испании в 711 году н.э., высадившись в Гибралтаре (названном в его честь: Джебель Тарик).'
    ja: タリク・イブン・ジヤードは、711年に西ゴート王国のイスラム征服を率いたウマイヤ朝の将軍で、ジブラルタル（彼の名にちなんで「ジャバル・タリク」）に上陸した。
    zh: 塔里克·伊本·齐亚德是倭马亚王朝的将军，于711年领导了穆斯林对西哥特西班牙的征服，在直布罗陀（以他命名：贾巴尔·塔里克）登陆。
    ar: 'طارق بن زياد هو القائد الأموي الذي قاد الفتح الإسلامي لهسبانيا القوطية الغربية عام 711 ميلادي،
      ونزل في جبل طارق (المسمى باسمه: جبل طارق).'
    he: 'טארק בן זיאד היה הגנרל האומיי שהוביל את הכיבוש המוסלמי של היספניה הוויזיגותית בשנת 711 לספירה,
