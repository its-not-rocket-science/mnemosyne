  short_explanation: The great flood sent by God in the time of Prophet Noah, which covered the earth,
    as described in the Quran and Bible. It symbolizes divine punishment and rescue of the faithful.
  i18n_explanations:
    en: The great flood sent by God in the time of Prophet Noah, which covered the earth, as described
      in the Quran and Bible. It symbolizes divine punishment and rescue of the faithful.
    es: El gran diluvio enviado por Dios en la época del profeta Noé, que cubrió la tierra, como se describe
      en el Corán y la Biblia. Simboliza el castigo divino y el rescate de los fieles.
    fr: Le grand déluge envoyé par Dieu à l'époque du prophète Noé, qui a recouvert la terre, comme décrit
      dans le Coran et la Bible. Il symbolise le châtiment divin et le sauvetage des fidèles.
    de: Die große Flut, die Gott zur Zeit des Propheten Noah sandte und die die Erde bedeckte, wie im
      Koran und in der Bibel beschrieben. Sie symbolisiert göttliche Bestrafung und Rettung der Gläubigen.
    it: Il grande diluvio inviato da Dio al tempo del profeta Noè, che coprì la terra, come descritto
      nel Corano e nella Bibbia. Simboleggia la punizione divina e il salvataggio dei fedeli.
    pt: O grande dilúvio enviado por Deus na época do profeta Noé, que cobriu a terra, conforme descrito
      no Alcorão e na Bíblia. Simboliza o castigo divino e o resgate dos fiéis.
    ru: Великий потоп, посланный Богом во времена пророка Ноя, который покрыл землю, как описано в Коране
      и Библии. Он символизирует божественное наказание и спасение верующих.
    ja: コーランと聖書に記されている、預言者ノアの時代に神が送った地球を覆う大洪水。それは神の罰と信者の救出を象徴しています。
    zh: 在《古兰经》和《圣经》中描述的，由上帝在先知诺亚时代降下的大洪水，覆盖了大地。它象征着神圣的惩罚和对信徒的拯救。
    ar: الطوفان العظيم الذي أرسله الله في زمن النبي نوح، والذي غطى الأرض، كما ورد في القرآن والكتاب المقدس.
      يرمز إلى العقاب الإلهي وإنقاذ المؤمنين.
    he: המבול הגדול שנשלח על ידי אלוהים בימי הנביא נוח, שכיסה את הארץ, כמתואר בקוראן ובתנ"ך. הוא מסמל
      עונש אלוהי והצלת המאמינים.
