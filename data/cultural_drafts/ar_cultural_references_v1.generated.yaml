    zh: 阿尔-穆太奈比诗句中的一行，意为“你们难道不是骑乘者中最优秀的吗？”用作反问句来赞美某人的优越性。
    ar: 'بيت من شعر المتنبي معناه: ''ألستم خير من ركب المطايا؟'' يُستخدم كسؤال بلاغي للإشادة بتفوق شخص
