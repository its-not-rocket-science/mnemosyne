- id: it_proverb_tradition_chi_è_causa_del_suo_male_pianga_se_stesso_0e9817e6
  language: it
  canonical_reference: Chi è causa del suo male pianga se stesso
  reference_type: proverb_tradition
  surface_patterns:
  - Chi è causa del suo male, pianga se stesso
  - Chi è causa del suo male pianga sé stesso
  short_explanation: 'This proverb means ''Who is the cause of his own suffering, let him weep for himself.''
    It conveys personal responsibility: one must accept the consequences of one''s own actions.'
  i18n_explanations:
    en: 'This proverb means ''Who is the cause of his own suffering, let him weep for himself.'' It conveys
      personal responsibility: one must accept the consequences of one''s own actions.'
    es: 'Este proverbio significa ''Quien es causa de su propio mal, que llore por sí mismo''. Transmite
      responsabilidad personal: uno debe aceptar las consecuencias de sus propias acciones.'
    fr: 'Ce proverbe signifie ''Qui est cause de son propre mal, qu''il pleure sur lui-même''. Il exprime
      la responsabilité personnelle : on doit accepter les conséquences de ses propres actes.'
    de: 'Dieses Sprichwort bedeutet ''Wer die Ursache seines eigenen Übels ist, der weine um sich selbst''.
      Es vermittelt Eigenverantwortung: Man muss die Konsequenzen des eigenen Handelns akzeptieren.'
    it: 'Questo proverbio significa ''Chi è causa del suo male pianga se stesso''. Trasmette la responsabilità
      personale: si devono accettare le conseguenze delle proprie azioni.'
    pt: 'Este provérbio significa ''Quem é causa do seu próprio mal, chore por si mesmo''. Transmite responsabilidade
      pessoal: deve-se aceitar as consequências das próprias ações.'
    ru: 'Эта пословица означает ''Кто является причиной своего собственного несчастья, пусть плачет о
      себе же''. Она передает личную ответственность: нужно принимать последствия собственных действий.'
    ja: このことわざは『自分の苦しみの原因を作った者は、自分のために泣くべきだ』という意味です。自分の行動の結果を受け入れなければならないという個人の責任を伝えます。
    zh: 这句谚语的意思是‘谁是自己痛苦的起因，就为自己哭泣吧’。它传达个人责任：一个人必须接受自己行为的后果。
    ar: 'يعني هذا المثل ''من هو سبب شره، فليبك على نفسه''. إنه ينقل المسؤولية الشخصية: يجب على المرء قبول
      عواقب أفعاله.'
    he: 'הפתגם הזה אומר ''מי שגורם לצרה שלו, שיבכה על עצמו''. הוא מעביר אחריות אישית: אדם חייב לקבל את
      ההשלכות של מעשיו.'
