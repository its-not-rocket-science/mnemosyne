- id: it_proverb_tradition_dai_nemici_mi_guardo_io_dagli_amici_mi_guardi_dio_c49b27e0
  language: it
  canonical_reference: Dai nemici mi guardo io, dagli amici mi guardi Dio
  reference_type: proverb_tradition
  surface_patterns:
  - Dai nemici mi guardo io, dagli amici mi guardi Dio
  - Dai nemici mi difendo io, dagli amici mi difenda Dio
  - Dagli amici mi guardi Dio
  short_explanation: Expresses that betrayal by friends is more dangerous and unexpected than attacks
    by enemies, so one must rely on divine protection from friends' treachery.
  i18n_explanations:
    en: Expresses that betrayal by friends is more dangerous and unexpected than attacks by enemies, so
      one must rely on divine protection from friends' treachery.
    es: Expresa que la traición de los amigos es más peligrosa e inesperada que los ataques de los enemigos,
      por lo que uno debe confiar en la protección divina contra la traición de los amigos.
    fr: Exprime que la trahison des amis est plus dangereuse et inattendue que les attaques des ennemis,
      donc on doit compter sur la protection divine contre la perfidie des amis.
    de: Drückt aus, dass der Verrat von Freunden gefährlicher und unerwarteter ist als Angriffe von Feinden,
      daher muss man auf göttlichen Schutz vor der Treulosigkeit von Freunden vertrauen.
    it: Esprime che il tradimento degli amici è più pericoloso e inaspettato degli attacchi dei nemici,
      quindi bisogna fare affidamento sulla protezione divina dalla perfidia degli amici.
    pt: Expressa que a traição dos amigos é mais perigosa e inesperada do que os ataques dos inimigos,
      por isso deve-se confiar na proteção divina contra a perfídia dos amigos.
    ru: Выражает, что предательство друзей более опасно и неожиданно, чем атаки врагов, поэтому нужно
      полагаться на божественную защиту от вероломства друзей.
    ja: 友人による裏切りは敵による攻撃よりも危険で予期せぬものであると表現し、神の保護に頼らなければならないと述べています。
    zh: 表达了朋友的背叛比敌人的攻击更危险和出乎意料，因此必须依靠上帝的保护来防止朋友的背信弃义。
    ar: يعبر عن أن خيانة الأصدقاء أكثر خطورة وغير متوقعة من هجمات الأعداء، لذلك يجب الاعتماد على الحماية
      الإلهية من غدر الأصدقاء.
    he: מבטא שבגידה של חברים מסוכנת ובלתי צפויה יותר מהתקפות של אויבים, ולכן יש לסמוך על הגנה אלוהית מפני
