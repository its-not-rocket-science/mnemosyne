    zh: 这句话出自福音书中耶稣邀请小孩到他面前，强调孩童般信心的重要性。常用于突出纯真和对神的敞开。
    ar: تُنسب هذه العبارة إلى يسوع في الأناجيل، حيث يدعو الأطفال إليه ويؤكد على أهمية الإيمان الطفولي.
