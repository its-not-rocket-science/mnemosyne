- id: it_proverb_tradition_occhio_non_vede_cuore_non_duole_11b6afac
  language: it
  canonical_reference: Occhio non vede, cuore non duole
  reference_type: proverb_tradition
  surface_patterns:
  - Occhio non vede, cuore non duole
  - Occhio che non vede, cuore che non duole
  - Ciò che l'occhio non vede, il cuore non duole
  short_explanation: Literally 'what the eye does not see, the heart does not grieve'; means ignorance
    of unpleasant facts spares one from suffering. Used to justify avoidance or blissful ignorance.
  i18n_explanations:
    en: Literally 'what the eye does not see, the heart does not grieve'; means ignorance of unpleasant
      facts spares one from suffering. Used to justify avoidance or blissful ignorance.
    es: Literalmente 'lo que el ojo no ve, el corazón no duele'; significa que la ignorancia de hechos
      desagradables evita el sufrimiento. Se usa para justificar la evasión o la ignorancia dichosa.
    fr: Littéralement 'ce que l'œil ne voit pas, le cœur ne souffre pas'; signifie que l'ignorance de
      faits désagréables épargne la souffrance. Utilisé pour justifier l'évitement ou l'ignorance heureuse.
    de: Wörtlich 'was das Auge nicht sieht, betrübt das Herz nicht'; bedeutet, dass Unwissenheit über
      unangenehme Tatsachen vor Leid bewahrt. Wird verwendet, um Vermeidung oder glückliche Unwissenheit
      zu rechtfertigen.
    it: Letteralmente 'quello che l'occhio non vede, il cuore non duole'; significa che l'ignoranza di
