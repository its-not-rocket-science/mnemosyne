- id: it_proverb_tradition_a_tutto_c_è_rimedio_fuorché_alla_morte_2afcea3e
  language: it
  canonical_reference: A tutto c'è rimedio, fuorché alla morte
  reference_type: proverb_tradition
  surface_patterns:
  - A tutto c'è rimedio, fuorché alla morte
  - A tutto c'è rimedio fuorché alla morte
  - Per tutto c'è rimedio, tranne che per la morte
  short_explanation: Means 'there is a remedy for everything except death'; conveys that most problems
    can be solved, but death is inevitable. A fatalistic yet comforting proverb.
  i18n_explanations:
    en: Means 'there is a remedy for everything except death'; conveys that most problems can be solved,
      but death is inevitable. A fatalistic yet comforting proverb.
    es: Significa 'hay remedio para todo excepto la muerte'; transmite que la mayoría de los problemas
      se pueden resolver, pero la muerte es inevitable. Un proverbio fatalista pero reconfortante.
    fr: Signifie 'il y a un remède à tout sauf à la mort'; exprime que la plupart des problèmes peuvent
      être résolus, mais la mort est inévitable. Un proverbe fataliste mais réconfortant.
    de: Bedeutet 'es gibt ein Heilmittel für alles außer dem Tod'; vermittelt, dass die meisten Probleme
      gelöst werden können, aber der Tod unvermeidlich ist. Ein fatalistisches, aber tröstliches Sprichwort.
    it: Significa 'a tutto c'è rimedio, fuorché alla morte'; trasmette che la maggior parte dei problemi
      può essere risolta, ma la morte è inevitabile. Un proverbio fatalistico ma confortante.
    pt: Significa 'há remédio para tudo, exceto para a morte'; transmite que a maioria dos problemas pode
      ser resolvida, mas a morte é inevitável. Um provérbio fatalista, porém reconfortante.
    ru: Означает «есть лекарство от всего, кроме смерти»; передает, что большинство проблем можно решить,
      но смерть неизбежна. Фаталистическая, но утешительная пословица.
    ja: 「死以外にはすべてに治療法がある」という意味；ほとんどの問題は解決できるが、死は避けられないと伝える。運命論的でありながら慰めとなることわざ。
    zh: 意思是“除了死亡，一切皆有补救之法”；传达大多数问题都可以解决，但死亡不可避免。一句宿命但又令人安慰的谚语。
    ar: تعني "هناك علاج لكل شيء إلا الموت"؛ توضح أن معظم المشاكل يمكن حلها، لكن الموت لا مفر منه. مثل
      قدري لكنه مريح.
    he: פירושו "יש תרופה לכל דבר מלבד המוות"; מעביר שרוב הבעיות ניתנות לפתרון, אך המוות הוא בלתי נמנע.
