    ja: ピッカルダ・ドナーティが天国で語った一行で、「神の意志の中に我々の平和がある」という意味で、真の平和は神の意志に従うことから来るという考えを表しています。
    zh: 这是皮卡尔达·多纳蒂在天堂中说的一句话，意为“在他的旨意中是我们的平安”，表达了真正的平安来自于顺服上帝的旨意。
    ar: سطر قالته بيكاردا دوناتي في الجنة، معناه 'في مشيئته سلامنا'، معبرًا عن فكرة أن السلام الحقيقي
