    ar: العلم ثلاثي الألوان هو العلم الوطني الإيطالي، ويتكون من ثلاثة أشرطة عمودية بالأخضر والأبيض والأحمر،
      واعتمد عام 1797 ويرمز إلى الجمهورية الإيطالية.
    he: הטריקולור הוא הדגל הלאומי האיטלקי, המורכב משלושה פסים אנכיים ירוק, לבן ואדום, שאומץ בשנת 1797
