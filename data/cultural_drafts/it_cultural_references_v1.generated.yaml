    zh: 皮亚门突破发生于1870年9月20日，当时意大利军队突破了罗马城墙，导致了罗马的吞并和意大利统一的完成。
    ar: حدث اختراق بورتا بيا في 20 سبتمبر 1870، عندما اخترقت القوات الإيطالية سور مدينة روما، مما أدى
