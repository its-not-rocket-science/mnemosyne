    it: La famosa affermazione di Cartesio 'Cogito, ergo sum' (Penso, dunque sono) è il primo principio
      della sua filosofia, che stabilisce l'autocoscienza come fondamento della conoscenza.
    pt: A famosa declaração de Descartes 'Cogito, ergo sum' (Penso, logo existo) é o primeiro princípio
      de sua filosofia, estabelecendo a autoconsciência como base do conhecimento.
    ru: Знаменитое утверждение Декарта «Cogito, ergo sum» (Я мыслю, следовательно, я существую) является
