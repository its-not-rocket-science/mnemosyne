    en: This is one of the Beatitudes from Jesus' Sermon on the Mount, meaning 'Blessed are the peacemakers'.
      It emphasizes the virtue of promoting peace and reconciliation.
    es: Esta es una de las Bienaventuranzas del Sermón del Monte de Jesús, que significa 'Bienaventurados
      los pacificadores'. Enfatiza la virtud de promover la paz y la reconciliación.
    fr: C'est l'une des Béatitudes du Sermon sur la montagne de Jésus, signifiant 'Heureux les artisans
      de paix'. Elle souligne la vertu de promouvoir la paix et la réconciliation.
    de: Dies ist eine der Seligpreisungen aus Jesu Bergpredigt, was bedeutet 'Selig sind die Friedensstifter'.
      Es betont die Tugend, Frieden und Versöhnung zu fördern.
    it: Questa è una delle Beatitudini dal Discorso della Montagna di Gesù, che significa 'Beati gli operatori
      di pace'. Sottolinea la virtù di promuovere pace e riconciliazione.
    pt: Esta é uma das Bem-aventuranças do Sermão do Monte de Jesus, significando 'Bem-aventurados os
      pacificadores'. Enfatiza a virtude de promover a paz e a reconciliação.
    ru: Это одна из заповедей блаженства из Нагорной проповеди Иисуса, означающая 'Блаженны миротворцы'.
