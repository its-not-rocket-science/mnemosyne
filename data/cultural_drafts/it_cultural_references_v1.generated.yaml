- id: it_classical_or_scriptural_allusion_dare_a_cesare_quel_che_è_di_cesare_039cf601
  language: it
  canonical_reference: Dare a Cesare quel che è di Cesare
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Dare a Cesare quel che è di Cesare
  - Rendere a Cesare quel che è di Cesare
  - Date a Cesare quel che è di Cesare
  short_explanation: This saying of Jesus addresses the relationship between religious and political obligations.
    It advocates giving to the state what belongs to the state, while giving to God what belongs to God.
  i18n_explanations:
    en: This saying of Jesus addresses the relationship between religious and political obligations. It
      advocates giving to the state what belongs to the state, while giving to God what belongs to God.
    es: Este dicho de Jesús aborda la relación entre las obligaciones religiosas y políticas. Aboga por
      dar al estado lo que pertenece al estado, mientras se da a Dios lo que pertenece a Dios.
    fr: Cette parole de Jésus aborde la relation entre les obligations religieuses et politiques. Elle
      préconise de donner à l'État ce qui appartient à l'État, tout en donnant à Dieu ce qui appartient
      à Dieu.
    de: Dieser Ausspruch Jesu bezieht sich auf das Verhältnis zwischen religiösen und politischen Pflichten.
      Er befürwortet, dem Staat zu geben, was dem Staat gehört, und Gott zu geben, was Gott gehört.
    it: Questo detto di Gesù affronta la relazione tra obblighi religiosi e politici. Sostiene di dare
      a Cesare ciò che è di Cesare e a Dio ciò che è di Dio.
    pt: Este dito de Jesus aborda a relação entre obrigações religiosas e políticas. Defende dar ao Estado
      o que pertence ao Estado, enquanto dá a Deus o que pertence a Deus.
    ru: Это изречение Иисуса затрагивает отношения между религиозными и политическими обязанностями. Оно
      призывает отдавать кесарю кесарево, а Богу Богово.
    ja: このイエスの言葉は、宗教的義務と政治的義務の関係について述べています。カエサルのものはカエサルに、神のものは神に返すことを勧めています。
    zh: 耶稣的这句话涉及宗教义务和政治义务之间的关系。它主张将属于凯撒的归给凯撒，将属于上帝的归给上帝。
    ar: يقول يسوع هذا القول لمعالجة العلاقة بين الالتزامات الدينية والسياسية. يدعو إلى إعطاء القيصر ما
      للقيصر، وإعطاء الله ما لله.
    he: אמרה זו של ישוע עוסקת ביחס בין חובות דתיות ופוליטיות. היא תומכת בנתינה לקיסר את אשר לקיסר, ולאלוהים
      את אשר לאלוהים.
