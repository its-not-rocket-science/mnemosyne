  short_explanation: A line spoken by Piccarda Donati in Paradise, meaning 'In His will is our peace,'
    expressing the idea that true peace comes from aligning with God's will.
  i18n_explanations:
    en: A line spoken by Piccarda Donati in Paradise, meaning 'In His will is our peace,' expressing the
      idea that true peace comes from aligning with God's will.
    es: Un verso dicho por Piccarda Donati en el Paraíso, que significa 'En su voluntad está nuestra paz',
      expresando la idea de que la verdadera paz proviene de alinearse con la voluntad de Dios.
    fr: Un vers prononcé par Piccarda Donati au Paradis, signifiant 'Dans Sa volonté est notre paix',
      exprimant l'idée que la vraie paix vient de l'alignement avec la volonté de Dieu.
    de: Eine Zeile, die von Piccarda Donati im Paradies gesprochen wird, bedeutet 'In seinem Willen ist
      unser Friede', und drückt die Idee aus, dass wahrer Friede aus der Übereinstimmung mit Gottes Willen
      kommt.
    it: Un verso pronunciato da Piccarda Donati nel Paradiso, che significa 'Nella sua volontà è la nostra
      pace', esprimendo l'idea che la vera pace deriva dall'allinearsi con la volontà di Dio.
    pt: Um verso dito por Piccarda Donati no Paraíso, significando 'Na sua vontade está a nossa paz',
      expressando a ideia de que a verdadeira paz vem do alinhamento com a vontade de Deus.
    ru: Строка, произнесенная Пиккардой Донати в Раю, означающая 'В Его воле наш покой', выражающая идею,
