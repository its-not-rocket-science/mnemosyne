      эпохи. Введена Цицероном в его речах против Катилины.
    ja: ラテン語で「ああ、時代よ、ああ、風習よ！」。現代の道徳の衰退を嘆くために使われる。キケロがカティリナ弾劾演説で用いた。
    zh: 拉丁语短语，意为“哦，时代！哦，风俗！”。用来感叹当代道德的沦丧。由西塞罗在他的卡提利纳演说中提出。
