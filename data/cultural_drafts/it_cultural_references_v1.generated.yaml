  - il mondo come volontà e rappresentazione
  short_explanation: The magnum opus of Arthur Schopenhauer, presenting his philosophy that the world
    is both Will (a blind striving force) and Representation (a mental construct). It is a cornerstone
    of Italian philosophical discourse.
  i18n_explanations:
    en: The magnum opus of Arthur Schopenhauer, presenting his philosophy that the world is both Will
      (a blind striving force) and Representation (a mental construct). It is a cornerstone of Italian
      philosophical discourse.
    es: La obra magna de Arthur Schopenhauer, que presenta su filosofía de que el mundo es tanto Voluntad
      (una fuerza ciega de esfuerzo) como Representación (una construcción mental). Es una piedra angular
      del discurso filosófico italiano.
    fr: Le chef-d'œuvre d'Arthur Schopenhauer, présentant sa philosophie selon laquelle le monde est à
      la fois Volonté (une force aveugle de poussée) et Représentation (une construction mentale). C'est
      une pierre angulaire du discours philosophique italien.
    de: Das Hauptwerk von Arthur Schopenhauer, das seine Philosophie darstellt, dass die Welt sowohl Wille
      (eine blinde Drangkraft) als auch Vorstellung (eine mentale Konstruktion) ist. Es ist ein Eckpfeiler
      des italienischen philosophischen Diskurses.
    it: L'opera magnum di Arthur Schopenhauer, che presenta la sua filosofia secondo cui il mondo è sia
      Volontà (una forza cieca e impulsiva) che Rappresentazione (una costruzione mentale). È una pietra
      angolare del discorso filosofico italiano.
    pt: A obra magna de Arthur Schopenhauer, apresentando sua filosofia de que o mundo é tanto Vontade
      (uma força cega de impulso) quanto Representação (uma construção mental). É uma pedra angular do
      discurso filosófico italiano.
    ru: Главный труд Артура Шопенгауэра, представляющий его философию, согласно которой мир является одновременно
      Волей (слепой движущей силой) и Представлением (ментальной конструкцией). Это краеугольный камень
      итальянского философского дискурса.
    ja: アルトゥル・ショーペンハウアーの主著で、世界が意志（盲目的な衝動の力）と表象（心的構成物）の両方であるという彼の哲学を提示する。イタリアの哲学談議の礎石である。
    zh: 阿图尔·叔本华的代表作，阐述了他的哲学：世界既是意志（一种盲目的驱动力），又是表象（一种心理构造）。它是意大利哲学论述的基石。
    ar: أعمال آرثر شوبنهاور العظيمة، التي تعرض فلسفته بأن العالم هو كل من الإرادة (قوة دافعة عمياء) والتمثيل
