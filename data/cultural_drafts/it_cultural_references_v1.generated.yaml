      De las Odas de Horacio, celebrando su legado poético.
    fr: Latin pour 'Je ne mourrai pas tout entier.' Exprime l'espoir que son œuvre confère l'immortalité.
      Des Odes d'Horace, célébrant son héritage poétique.
    de: Latein für 'Ich werde nicht ganz sterben.' Drückt die Hoffnung aus, dass das eigene Werk Unsterblichkeit
      verleiht. Aus den Oden des Horaz, die sein dichterisches Erbe feiern.
    it: Latino per 'Non morirò del tutto.' Esprime la speranza che la propria opera possa garantire l'immortalità.
      Dalle Odi di Orazio, che celebrano la sua eredità poetica.
    pt: Latim para 'Não morrerei totalmente.' Expressa a esperança de que a obra de alguém conceda imortalidade.
      Das Odes de Horácio, celebrando seu legado poético.
    ru: Латинская фраза 'Я не умру целиком.' Выражает надежду, что творчество дарует бессмертие. Из Од
      Горация, прославляющих его поэтическое наследие.
    ja: ラテン語で「私は完全には死なない」。自分の作品が不死を与えるという希望を表す。ホラティウスの『歌集』から、彼の詩的遺産を称えて。
    zh: 拉丁语短语，意为“我不会完全死去”。表达了希望自己的作品能带来不朽。出自贺拉斯的《颂歌》，赞美他的诗歌遗产。
    ar: عبارة لاتينية تعني 'لن أموت بالكامل.' تعبر عن الأمل في أن يمنح العمل الخلود. من قصائد هوراس، احتفالاً
