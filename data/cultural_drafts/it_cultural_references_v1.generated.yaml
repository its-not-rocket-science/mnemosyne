    en: This phrase comes from the story of the woman caught in adultery, where Jesus challenges the accusers.
      It means that only those who are faultless have the right to condemn others.
    es: Esta frase proviene de la historia de la mujer sorprendida en adulterio, donde Jesús desafía a
      los acusadores. Significa que solo aquellos que están libres de culpa tienen derecho a condenar
      a otros.
