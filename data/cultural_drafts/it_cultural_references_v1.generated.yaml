  i18n_explanations:
    en: Famous line from the aria 'Vesti la giubba' in Leoncavallo's opera Pagliacci. It means 'Laugh,
      clown' and is used to express bitter irony or forced cheerfulness in the face of heartbreak.
    es: Famosa línea del aria 'Vesti la giubba' en la ópera Pagliacci de Leoncavallo. Significa 'Ríe,
      payaso' y se usa para expresar amarga ironía o alegría forzada ante la desilusión amorosa.
    fr: Célèbre réplique de l'air 'Vesti la giubba' dans l'opéra Pagliacci de Leoncavallo. Cela signifie
      'Ris, clown' et est utilisé pour exprimer une ironie amère ou une gaieté forcée face au chagrin.
    de: Berühmte Zeile aus der Arie 'Vesti la giubba' in Leoncavallos Oper Pagliacci. Sie bedeutet 'Lache,
      Clown' und drückt bittere Ironie oder erzwungene Heiterkeit angesichts von Liebeskummer aus.
    it: Famoso verso dell'aria 'Vesti la giubba' nell'opera Pagliacci di Leoncavallo. Significa 'Ridi,
      pagliaccio' ed è usato per esprimere amara ironia o allegria forzata di fronte al crepacuore.
    pt: Famosa frase da ária 'Vesti la giubba' na ópera Pagliacci de Leoncavallo. Significa 'Ria, palhaço'
      e é usada para expressar amarga ironia ou alegria forçada diante da desilusão amorosa.
    ru: Знаменитая строка из арии 'Vesti la giubba' в опере Леонкавалло 'Паяцы'. Означает 'Смейся, клоун'
      и используется для выражения горькой иронии или вынужденного веселья перед лицом сердечной боли.
    ja: レオンカヴァッロのオペラ『道化師』のアリア『衣をつけろ』の有名な一節。「笑え、道化師」という意味で、失恋に直面して苦い皮肉や無理な明るさを表現するのに使われる。
    zh: 莱翁卡瓦洛歌剧《丑角》中咏叹调《穿上戏服》的著名台词。意为'笑吧，小丑'，用来表达面对心碎时的苦涩讽刺或强颜欢笑。
    ar: سطر شهير من أغنية 'Vesti la giubba' في أوبرا Pagliacci لليونكافالو. يعني 'اضحك أيها المهرج' ويستخدم
      للتعبير عن السخرية المرة أو البهجة المصطنعة في مواجهة انكسار القلب.
    he: שורה מפורסמת מהאריה 'Vesti la giubba' באופרה 'פאליאצ'י' של לאונקוואלו. פירושה 'צחק, ליצן' והיא
