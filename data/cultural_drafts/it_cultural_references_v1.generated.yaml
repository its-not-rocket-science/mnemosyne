- id: it_proverb_tradition_la_verità_è_figlia_del_tempo_7d5486c0
  language: it
  canonical_reference: La verità è figlia del tempo
  reference_type: proverb_tradition
  surface_patterns:
  - la verità è figlia del tempo
  - verità figlia del tempo
  - figlia del tempo
  short_explanation: Proverb meaning that truth emerges over time; derived from the Latin 'Veritas filia
    temporis' attributed to Aulus Gellius. Commonly used in Italian to express that time reveals the truth.
  i18n_explanations:
    en: Proverb meaning that truth emerges over time; derived from the Latin 'Veritas filia temporis'
      attributed to Aulus Gellius. Commonly used in Italian to express that time reveals the truth.
    es: Proverbio que significa que la verdad emerge con el tiempo; derivado del latín 'Veritas filia
      temporis' atribuido a Aulo Gelio. Comúnmente usado en italiano para expresar que el tiempo revela
      la verdad.
    fr: Proverbe signifiant que la vérité émerge avec le temps ; dérivé du latin 'Veritas filia temporis'
      attribué à Aulu-Gelle. Couramment utilisé en italien pour exprimer que le temps révèle la vérité.
    de: Sprichwort, das besagt, dass die Wahrheit mit der Zeit ans Licht kommt; abgeleitet vom lateinischen
      'Veritas filia temporis', zugeschrieben Aulus Gellius. Wird im Italienischen häufig verwendet, um
      auszudrücken, dass die Zeit die Wahrheit offenbart.
    it: Proverbio che significa che la verità emerge col tempo; derivato dal latino 'Veritas filia temporis'
      attribuito ad Aulo Gellio. Comunemente usato in italiano per esprimere che il tempo rivela la verità.
    pt: Provérbio que significa que a verdade emerge com o tempo; derivado do latim 'Veritas filia temporis'
      atribuído a Aulo Gélio. Comumente usado em italiano para expressar que o tempo revela a verdade.
    ru: Пословица, означающая, что истина со временем выходит наружу; происходит от латинского 'Veritas
      filia temporis', приписываемого Авлу Геллию. Обычно используется в итальянском языке, чтобы выразить,
      что время раскрывает правду.
    ja: 真実は時間とともに明らかになるという意味の諺。ラテン語の 'Veritas filia temporis'（アウルス・ゲッリウスに帰される）に由来する。時間が真実を明らかにするということをイタリア語で表現する際に一般的に使われる。
    zh: 谚语，意思是真相随着时间的推移而显现；源自拉丁语'Veritas filia temporis'，归于奥鲁斯·格利乌斯。在意大利语中常用以表达时间揭示真理。
    ar: مثل يعني أن الحقيقة تظهر مع مرور الوقت؛ مشتق من اللاتينية 'Veritas filia temporis' المنسوبة إلى
      أولوس غيليوس. يستخدم بشكل شائع في الإيطالية للتعبير عن أن الزمن يكشف الحقيقة.
    he: פתגם שמשמעותו שהאמת מתגלה עם הזמן; נגזר מהלטינית 'Veritas filia temporis' המיוחסת לאולוס גליוס.
