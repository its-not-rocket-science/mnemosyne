- id: it_proverb_tradition_acqua_passata_non_macina_più_87046e35
  language: it
  canonical_reference: Acqua passata non macina più
  reference_type: proverb_tradition
  surface_patterns:
  - Acqua passata non macina più
  - acqua passata non macina
  - acqua passata macina poco
  short_explanation: 'Literal: ''Water that has passed no longer turns the mill.'' Means let bygones be
    bygones; past events are no longer relevant.'
  i18n_explanations:
    en: 'Literal: ''Water that has passed no longer turns the mill.'' Means let bygones be bygones; past
      events are no longer relevant.'
    es: 'Literal: ''El agua que ha pasado ya no mueve el molino.'' Significa que lo pasado, pasado está;
      los eventos pasados ya no son relevantes.'
    fr: 'Littéral : ''L''eau qui est passée ne fait plus tourner le moulin.'' Signifie que le passé est
      le passé ; les événements passés ne sont plus pertinents.'
    de: 'Wörtlich: ''Wasser, das vorbeigeflossen ist, kann keine Mühle mehr antreiben.'' Bedeutet, dass
      Vergangenes vergangen sein soll; vergangene Ereignisse sind nicht mehr relevant.'
    it: 'Letterale: ''L''acqua passata non macina più.'' Significa lasciar perdere il passato; gli eventi
      passati non sono più rilevanti.'
    pt: 'Literal: ''A água que passou não move mais o moinho.'' Significa que o passado é passado; eventos
      passados não são mais relevantes.'
    ru: 'Буквально: ''Вода, которая прошла, больше не вращает мельницу.'' Означает, что прошлое осталось
      в прошлом; минувшие события больше не имеют значения.'
    ja: '直訳: ''過ぎ去った水はもはや粉を挽かない''。過去のことは水に流す、という意味。過去の出来事はもはや重要ではない。'
    zh: 字面意思：'流过的水不再推磨。'意思是让过去的成为过去；过去的事件不再相关。
    ar: 'حرفياً: ''الماء الذي مضى لم يعد يدير الطاحونة.'' يعني أن الماضي قد مضى؛ الأحداث الماضية لم تعد
      ذات صلة.'
    he: 'תרגום מילולי: ''מים שעברו כבר לא מסובבים את הטחנה.'' פירושו שיהיה מה שהיה; אירועי העבר אינם רלוונטיים
      עוד.'
