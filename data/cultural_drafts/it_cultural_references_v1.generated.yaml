- id: it_cultural_reference_il_ratto_delle_sabine_cde678bd
  language: it
  canonical_reference: Il Ratto delle Sabine
  reference_type: cultural_reference
  surface_patterns:
  - ratto delle Sabine
  - il ratto delle Sabine
  - Sabine rapimento
  short_explanation: The Rape of the Sabine Women refers to the abduction of Sabine women by early Romans,
    a foundational myth of Rome described by Livy and depicted in art, symbolizing the union of Romans
    and Sabines.
  i18n_explanations:
    en: The Rape of the Sabine Women refers to the abduction of Sabine women by early Romans, a foundational
      myth of Rome described by Livy and depicted in art, symbolizing the union of Romans and Sabines.
    es: El rapto de las sabinas se refiere al secuestro de mujeres sabinas por los primeros romanos, un
      mito fundacional de Roma descrito por Livio y representado en el arte, que simboliza la unión de
      romanos y sabinos.
    fr: L'enlèvement des Sabines fait référence à l'enlèvement de femmes sabines par les premiers Romains,
      un mythe fondateur de Rome décrit par Tite-Live et représenté dans l'art, symbolisant l'union des
      Romains et des Sabins.
    de: Der Raub der Sabinerinnen bezieht sich auf die Entführung sabinischer Frauen durch frühe Römer,
      ein Gründungsmythos Roms, der von Livius beschrieben und in der Kunst dargestellt wird, und symbolisiert
      die Vereinigung von Römern und Sabinern.
    it: Il Ratto delle Sabine si riferisce al rapimento delle donne sabine da parte dei primi romani,
      un mito fondativo di Roma descritto da Livio e raffigurato nell'arte, che simboleggia l'unione di
      romani e sabini.
    pt: O Rapto das Sabinas refere-se ao sequestro de mulheres sabinas pelos primeiros romanos, um mito
      fundador de Roma descrito por Lívio e retratado na arte, simbolizando a união de romanos e sabinos.
    ru: Похищение сабинянок относится к похищению сабинских женщин ранними римлянами, основополагающему
      мифу Рима, описанному Ливием и изображённому в искусстве, символизирующему союз римлян и сабинян.
    ja: サビニの女たちの略奪は、初期ローマ人によるサビニ女性の拉致を指し、リウィウスによって記述され芸術に描かれたローマの建国神話であり、ローマ人とサビニ人の結合を象徴する。
    zh: 劫夺萨宾妇女指早期罗马人掳走萨宾妇女，是李维所描述的罗马建国神话，并在艺术中描绘，象征着罗马人与萨宾人的联合。
    ar: اغتصاب نساء سابين يشير إلى اختطاف نساء سابين من قبل الرومان الأوائل، وهي أسطورة تأسيس روما وصفها
      ليفي وصُوّرت في الفن، وترمز إلى اتحاد الرومان والسابين.
    he: אונס הנשים הסאביניות מתייחס לחטיפת נשים סאביניות על ידי הרומאים הקדומים, מיתוס יסוד של רומא שתואר
      על ידי ליוויוס והוצג באמנות, המסמל את האיחוד בין הרומאים לסאבינים.
