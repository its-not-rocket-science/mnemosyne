- id: it_proverb_tradition_chi_vive_sperando_muore_disperando_16cd7f12
  language: it
  canonical_reference: Chi vive sperando muore disperando
  reference_type: proverb_tradition
  surface_patterns:
  - Chi vive sperando muore disperando
  - Chi vive di speranza muore disperato
  - Chi vive nella speranza muore disperato
  short_explanation: Warns that excessive hope without action leads to disappointment; a cautionary proverb
    about relying on uncertain future outcomes.
  i18n_explanations:
    en: Warns that excessive hope without action leads to disappointment; a cautionary proverb about relying
      on uncertain future outcomes.
    es: Advierte que la esperanza excesiva sin acción lleva a la decepción; un proverbio de advertencia
      sobre confiar en resultados futuros inciertos.
    fr: Met en garde que l'espoir excessif sans action mène à la déception; un proverbe de mise en garde
      sur le fait de compter sur des résultats futurs incertains.
    de: Warnt davor, dass übermäßige Hoffnung ohne Handeln zur Enttäuschung führt; ein warnendes Sprichwort,
      das davor warnt, sich auf unsichere zukünftige Ergebnisse zu verlassen.
    it: Avverte che la speranza eccessiva senza azione porta alla delusione; un proverbio di cautela sul
      fare affidamento su risultati futuri incerti.
    pt: Adverte que a esperança excessiva sem ação leva à decepção; um provérbio de cautela sobre confiar
      em resultados futuros incertos.
    ru: Предупреждает, что чрезмерная надежда без действий ведет к разочарованию; осторожная пословица
      о надежде на неопределенные будущие результаты.
    ja: 行動を伴わない過度の希望は失望につながると警告しています。不確実な将来の結果に頼ることへの戒めのことわざです。
    zh: 警告说，没有行动的过度希望会导致失望；这是一个关于依赖不确定未来结果的警示性谚语。
    ar: يحذر من أن الأمل المفرط دون عمل يؤدي إلى خيبة الأمل؛ مثل تحذيري حول الاعتماد على نتائج مستقبلية
