- id: it_proverb_tradition_moglie_e_buoi_dei_paesi_tuoi_fc897fc6
  language: it
  canonical_reference: Moglie e buoi dei paesi tuoi
  reference_type: proverb_tradition
  surface_patterns:
  - Moglie e buoi dei paesi tuoi
  - moglie e buoi da' paesi tuoi
  short_explanation: Advises to marry locals and buy livestock from nearby; metaphorically, stick to what
    you know and trust familiar origins.
  i18n_explanations:
    en: Advises to marry locals and buy livestock from nearby; metaphorically, stick to what you know
      and trust familiar origins.
    es: Aconseja casarse con personas locales y comprar ganado de cerca; metafóricamente, quédate con
      lo que conoces y confía en orígenes familiares.
    fr: Conseille de se marier avec des gens du pays et d'acheter du bétail local ; métaphoriquement,
      restez fidèle à ce que vous connaissez et faites confiance aux origines familières.
    de: 'Rät, Einheimische zu heiraten und Vieh aus der Nähe zu kaufen; metaphorisch: bleib bei dem, was
      du kennst, und vertraue vertrauten Ursprüngen.'
    it: Consiglia di sposare persone del posto e comprare bestiame nelle vicinanze; metaforicamente, attieniti
      a ciò che conosci e fidati delle origini familiari.
