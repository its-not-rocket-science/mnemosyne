  i18n_explanations:
    en: A proverb-like line meaning 'a small spark kindles a great flame,' used by Dante to indicate that
      small beginnings can lead to great outcomes.
    es: Un verso parecido a un proverbio que significa 'una pequeña chispa enciende una gran llama', usado
      por Dante para indicar que los pequeños comienzos pueden llevar a grandes resultados.
    fr: Un vers proverbial signifiant 'une petite étincelle allume une grande flamme', utilisé par Dante
      pour indiquer que les petits commencements peuvent mener à de grands résultats.
    de: Eine sprichwortartige Zeile mit der Bedeutung 'Ein kleiner Funke entfacht eine große Flamme',
      die von Dante verwendet wird, um anzudeuten, dass kleine Anfänge zu großen Ergebnissen führen können.
    it: Un verso proverbiale che significa 'una piccola favilla accende una grande fiamma', usato da Dante
      per indicare che piccoli inizi possono portare a grandi risultati.
    pt: Um verso proverbial que significa 'uma pequena faísca acende uma grande chama', usado por Dante
      para indicar que pequenos começos podem levar a grandes resultados.
    ru: Строка, похожая на пословицу, означающая 'маленькая искра разжигает большое пламя', используемая
      Данте, чтобы указать, что маленькие начинания могут привести к большим результатам.
    ja: 「小さな火花が大きな炎を燃え上がらせる」という意味の格言のような一行で、ダンテが小さな始まりが大きな結果につながることを示すために用いています。
    zh: 一句谚语式的诗句，意为“小小的火花点燃巨大的火焰”，但丁用它来表示小的开端可以导致伟大的结果。
    ar: سطر شبيه بالمثل يعني 'شرارة صغيرة تشعل لهبًا كبيرًا'، استخدمه دانتي للإشارة إلى أن البدايات الصغيرة
      يمكن أن تؤدي إلى نتائج عظيمة.
    he: שורה דמוית פתגם שמשמעותה 'ניצוץ קטן מצית להבה גדולה', ששימש את דנטה לציין שהתחלות קטנות יכולות
