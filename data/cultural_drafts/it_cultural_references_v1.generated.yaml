- id: it_proverb_tradition_il_meglio_è_nemico_del_bene_ec69bae2
  language: it
  canonical_reference: Il meglio è nemico del bene
  reference_type: proverb_tradition
  surface_patterns:
  - Il meglio è nemico del bene
  - Meglio è nemico del bene
  - Il meglio è nemico del buono
  short_explanation: Means 'the best is the enemy of good'; warns against perfectionism that prevents
    achieving something good. Common in Italian to advocate for satisfaction with good results.
  i18n_explanations:
    en: Means 'the best is the enemy of good'; warns against perfectionism that prevents achieving something
      good. Common in Italian to advocate for satisfaction with good results.
    es: Significa 'lo mejor es enemigo de lo bueno'; advierte contra el perfeccionismo que impide lograr
      algo bueno. Común en italiano para abogar por la satisfacción con buenos resultados.
    fr: Signifie 'le mieux est l'ennemi du bien'; met en garde contre le perfectionnisme qui empêche d'atteindre
      quelque chose de bon. Courant en italien pour prôner la satisfaction avec de bons résultats.
    de: Bedeutet 'das Beste ist der Feind des Guten'; warnt vor Perfektionismus, der das Erreichen von
      etwas Gutem verhindert. Im Italienischen gebräuchlich, um für Zufriedenheit mit guten Ergebnissen
      zu plädieren.
    it: Significa 'il meglio è nemico del bene'; mette in guardia contro il perfezionismo che impedisce
      di raggiungere qualcosa di buono. Comune in italiano per sostenere la soddisfazione per buoni risultati.
    pt: Significa 'o melhor é inimigo do bom'; adverte contra o perfeccionismo que impede alcançar algo
      bom. Comum em italiano para defender a satisfação com bons resultados.
    ru: Означает «лучшее — враг хорошего»; предупреждает против перфекционизма, который мешает достичь
      чего-то хорошего. Распространено в итальянском языке, чтобы призывать к удовлетворению хорошими
      результатами.
    ja: 「最善は善の敵」という意味で、何か良いものを達成するのを妨げる完璧主義に警告を発する。イタリア語でよく使われ、良い結果に満足することを勧める。
    zh: 意思是“最好是好的敌人”；警告完美主义会阻碍实现好的事物。在意大利语中常见，提倡对良好结果感到满意。
    ar: تعني "الأفضل هو عدو الجيد"؛ تحذر من السعي للكمال الذي يمنع تحقيق شيء جيد. شائعة في الإيطالية للدعوة
