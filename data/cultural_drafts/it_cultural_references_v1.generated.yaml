      phrase celebrating diligent effort, often used in educational and motivational contexts.
    es: Un verso de las Geórgicas de Virgilio que significa 'el trabajo persistente lo vence todo'. Es
      una frase proverbial latina que celebra el esfuerzo diligente, a menudo usada en contextos educativos
      y motivacionales.
    fr: Un vers des Géorgiques de Virgile signifiant 'le travail obstiné vient à bout de tout'. C'est
      une expression proverbiale latine célébrant l'effort assidu, souvent utilisée dans des contextes
      éducatifs et motivationnels.
    de: Ein Vers aus Vergils Georgica mit der Bedeutung 'beharrliche Arbeit besiegt alles'. Es ist ein
      sprichwörtlicher lateinischer Ausdruck, der fleißige Anstrengung feiert, oft in Bildungs- und Motivationskontexten
      verwendet.
    it: Un verso delle Georgiche di Virgilio che significa 'il lavoro ostinato vince tutto'. È una frase
      proverbiale latina che celebra lo sforzo diligente, spesso usata in contesti educativi e motivazionali.
    pt: Um verso das Geórgicas de Virgílio que significa 'o trabalho persistente vence tudo'. É uma frase
      proverbial latina que celebra o esforço diligente, frequentemente usada em contextos educacionais
      e motivacionais.
    ru: Строка из 'Георгик' Вергилия, означающая 'упорный труд побеждает всё'. Это латинская пословица,
      прославляющая усердные усилия, часто используемая в образовательных и мотивационных контекстах.
    ja: ウェルギリウスの『農耕詩』からの一節で、「絶え間ない努力はすべてを克服する」の意。勤勉な努力を称えるラテン語のことわざで、教育やモチベーションの文脈でよく使われる。
    zh: 维吉尔《农事诗》中的一句，意为“坚持不懈的劳作征服一切”。这是一句拉丁谚语，赞美勤奋努力，常用于教育和激励语境。
    ar: سطر من 'الجيورجيكس' لفيرجيل يعني 'العمل الدؤوب ينتصر على كل شيء'. إنها عبارة لاتينية مثلية تحتفي
