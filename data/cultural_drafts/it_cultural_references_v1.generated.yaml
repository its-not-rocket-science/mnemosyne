      l'ouverture à Dieu.
    de: Dieser Satz wird Jesus in den Evangelien zugeschrieben, der Kinder zu sich einlädt und die Bedeutung
      des kindlichen Glaubens betont. Er wird oft verwendet, um Unschuld und Offenheit gegenüber Gott
      hervorzuheben.
