      que seuls ceux qui sont irréprochables ont le droit de condamner les autres.
    de: Dieser Satz stammt aus der Geschichte der Frau, die beim Ehebruch ertappt wurde, in der Jesus
      die Ankläger herausfordert. Es bedeutet, dass nur diejenigen, die ohne Fehler sind, das Recht haben,
      andere zu verurteilen.
    it: Questa frase proviene dalla storia della donna sorpresa in adulterio, dove Gesù sfida gli accusatori.
      Significa che solo coloro che sono senza peccato hanno il diritto di condannare gli altri.
    pt: Esta frase vem da história da mulher apanhada em adultério, onde Jesus desafia os acusadores.
