  short_explanation: The bundle of rods with an axe, an ancient Roman symbol adopted by Benito Mussolini's
    fascist party as their emblem, representing strength through unity.
  i18n_explanations:
    en: The bundle of rods with an axe, an ancient Roman symbol adopted by Benito Mussolini's fascist
      party as their emblem, representing strength through unity.
    es: El haz de varas con un hacha, un símbolo romano antiguo adoptado por el partido fascista de Benito
      Mussolini como su emblema, que representa la fuerza a través de la unidad.
    fr: Le faisceau de verges avec une hache, un symbole romain antique adopté par le parti fasciste de
      Benito Mussolini comme emblème, représentant la force par l'unité.
    de: Das Rutenbündel mit einem Beil, ein antikes römisches Symbol, das von Benito Mussolinis faschistischer
      Partei als Emblem übernommen wurde und Stärke durch Einheit symbolisiert.
    it: Il fascio di verghe con un'ascia, un simbolo romano antico adottato dal partito fascista di Benito
      Mussolini come emblema, che rappresenta la forza attraverso l'unità.
    pt: O feixe de varas com um machado, um símbolo romano antigo adotado pelo partido fascista de Benito
      Mussolini como seu emblema, representando a força através da unidade.
    ru: Пучок прутьев с топором, древнеримский символ, принятый фашистской партией Бенито Муссолини в
      качестве эмблемы, олицетворяющий силу через единство.
    ja: 斧が付いた棒の束。ベニート・ムッソリーニのファシスト党が紋章として採用した古代ローマのシンボルで、団結による強さを表す。
    zh: 一捆束棒加一把斧头，是古罗马的象征，被贝尼托·墨索里尼的法西斯党采用作为标志，代表团结产生力量。
    ar: حزمة القضبان مع فأس، رمز روماني قديم تبناه الحزب الفاشي بينيتو موسوليني كشعار له، يمثل القوة من
