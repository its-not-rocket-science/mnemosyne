  short_explanation: The Capitoline Wolf is a bronze statue of a she-wolf suckling the infant twins Romulus
    and Remus, symbolizing the founding of Rome and a key emblem of the city.
  i18n_explanations:
    en: The Capitoline Wolf is a bronze statue of a she-wolf suckling the infant twins Romulus and Remus,
      symbolizing the founding of Rome and a key emblem of the city.
    es: La Loba Capitolina es una estatua de bronce de una loba amamantando a los gemelos Rómulo y Remo,
      que simboliza la fundación de Roma y es un emblema clave de la ciudad.
    fr: La Louve capitoline est une statue en bronze d'une louve allaitant les jumeaux Romulus et Rémus,
      symbolisant la fondation de Rome et un emblème clé de la ville.
    de: Die kapitolinische Wölfin ist eine Bronzestatue einer Wölfin, die die Zwillinge Romulus und Remus
      säugt, symbolisiert die Gründung Roms und ist ein wichtiges Wahrzeichen der Stadt.
    it: La Lupa capitolina è una statua in bronzo di una lupa che allatta i gemelli Romolo e Remo, simbolo
      della fondazione di Roma ed emblema chiave della città.
    pt: A Loba Capitolina é uma estátua de bronze de uma loba amamentando os gêmeos Rômulo e Remo, simbolizando
      a fundação de Roma e um emblema chave da cidade.
    ru: Капитолийская волчица — бронзовая статуя волчицы, кормящей близнецов Ромула и Рема, символизирующая
      основание Рима и являющаяся ключевой эмблемой города.
    ja: カピトリーノの牝狼は、ローマ建国を象徴する双子のロムルスとレムスに乳を与える牝狼のブロンズ像で、都市の重要標章である。
    zh: 卡比托利欧狼是一尊青铜母狼雕像，正在哺育婴儿双胞胎罗慕路斯与雷穆斯，象征着罗马的建立，是该市的重要标志。
    ar: الذئبة الكابيتولينية هي تمثال برونزي لذئبة ترضع التوأم رومولوس وريموس، وترمز إلى تأسيس روما وهي
