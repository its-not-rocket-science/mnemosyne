- id: it_literary_reference_solo_e_pensoso_i_più_deserti_campi_e9b37f39
  language: it
  canonical_reference: Solo e pensoso i più deserti campi
  reference_type: literary_reference
  surface_patterns:
  - Solo e pensoso i più deserti campi
  - Solo e pensoso
  - Solo e pensoso vo misurando
  short_explanation: Opening line of Petrarch's sonnet 'Solo e pensoso', expressing the poet's solitary
    and melancholic state as he measures the deserted fields. It is a hallmark of Petrarchan introspection
    and influence on subsequent European lyric poetry.
  i18n_explanations:
    en: Opening line of Petrarch's sonnet 'Solo e pensoso', expressing the poet's solitary and melancholic
      state as he measures the deserted fields. It is a hallmark of Petrarchan introspection and influence
      on subsequent European lyric poetry.
    es: Verso inicial del soneto 'Solo e pensoso' de Petrarca, que expresa el estado solitario y melancólico
      del poeta mientras mide los campos desiertos. Es una muestra de la introspección petrarquista y
      su influencia en la poesía lírica europea posterior.
    fr: Premier vers du sonnet 'Solo e pensoso' de Pétrarque, exprimant l'état solitaire et mélancolique
      du poète alors qu'il parcourt les champs déserts. C'est un exemple de l'introspection pétrarquienne
      et de son influence sur la poésie lyrique européenne ultérieure.
    de: Eröffnungszeile von Petrarcas Sonett 'Solo e pensoso', die den einsamen und melancholischen Zustand
      des Dichters ausdrückt, während er die verlassenen Felder durchmisst. Es ist ein Kennzeichen petrarkistischer
      Introspektion und Einfluss auf die spätere europäische Lyrik.
    it: Verso d'apertura del sonetto 'Solo e pensoso' del Petrarca, che esprime lo stato solitario e malinconico
      del poeta mentre misura i campi deserti. È un esempio di introspezione petrarchesca e influenza
      sulla successiva poesia lirica europea.
    pt: Verso inicial do soneto 'Solo e pensoso' de Petrarca, expressando o estado solitário e melancólico
      do poeta enquanto mede os campos desertos. É uma marca da introspecção petrarquiana e sua influência
      na poesia lírica europeia subsequente.
    ru: Начальная строка сонета Петрарки 'Solo e pensoso', выражающая одинокое и меланхоличное состояние
      поэта, когда он измеряет пустынные поля. Это образец петрарковской интроспекции и влияния на последующую
      европейскую лирическую поэзию.
    ja: ペトラルカのソネット『Solo e pensoso』の冒頭行。詩人が孤独で憂鬱な様子で人里離れた野原を歩む様を表現している。ペトラルカ風内省と後のヨーロッパ抒情詩への影響を示す代表的な一節。
    zh: 彼特拉克十四行诗《Solo e pensoso》的开篇诗句，表达了诗人独自忧郁地丈量荒凉田野的状态。这是彼特拉克式内省的标志，对后来的欧洲抒情诗产生了影响。
    ar: السطر الافتتاحي من السونيتة 'Solo e pensoso' لبيترارك، يعبر عن حالة الشاعر الوحيدة والحزينة وهو
      يجوب الحقول المقفرة. إنها علامة على التأمل البتراركي وتأثيره على الشعر الغنائي الأوروبي اللاحق.
    he: שורת הפתיחה של הסונטה 'Solo e pensoso' מאת פטרארקה, המבטאת את מצבו הבודד והמלנכולי של המשורר כשהוא
      מודד את השדות השוממים. זהו סימן היכר של ההתבוננות הפנימית הפטרארכאית והשפעתה על השירה הלירית האירופית
      המאוחרת.
