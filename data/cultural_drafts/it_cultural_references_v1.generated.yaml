      Aussage in der christlichen Theologie, die oft verwendet wird, um die Zentralität der Liebe im Glauben
      zu betonen.
    it: Questa frase della Prima Lettera di Giovanni definisce la natura di Dio come amore. È un'affermazione
      fondamentale nella teologia cristiana, spesso usata per enfatizzare la centralità dell'amore nella
      fede.
    pt: Esta frase da Primeira Epístola de João define a natureza de Deus como amor. É uma declaração
      fundamental na teologia cristã, frequentemente usada para enfatizar a centralidade do amor na fé.
    ru: Эта фраза из Первого послания Иоанна определяет природу Бога как любовь. Это фундаментальное утверждение
      христианского богословия, часто используемое для подчеркивания центральной роли любви в вере.
    ja: このフレーズはヨハネの手紙一に由来し、神の本質を愛と定義する。キリスト教神学の基本的な主張であり、信仰における愛の中心性を強調するのに使われる。
    zh: 这句话出自约翰一书，定义神的本质就是爱。是基督教神学的基本陈述，常用来强调爱在信仰中的核心地位。
    ar: هذه العبارة من رسالة يوحنا الأولى تعرف طبيعة الله بأنها محبة. إنها تصريح أساسي في اللاهوت المسيحي،
