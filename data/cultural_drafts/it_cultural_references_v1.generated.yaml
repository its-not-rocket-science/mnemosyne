    ja: ジュゼッペ・ヴェルディのオペラ『ナブッコ』の有名な合唱曲で、『Va, pensiero, sull'ali dorate』としても知られる。自由への憧れを象徴し、イタリア統一のアンセムとなった。
    zh: 朱塞佩·威尔第歌剧《纳布科》中著名的合唱曲，也称为《飞吧，思想，乘着金色的翅膀》。它象征着对自由的渴望，并成为意大利统一的赞歌。
    ar: الكورس الشهير من أوبرا جوزيبي فيردي 'نابوكو'، المعروف أيضًا باسم 'Va, pensiero, sull'ali dorate'.
