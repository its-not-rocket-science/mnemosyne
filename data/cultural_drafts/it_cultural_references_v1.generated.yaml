- id: it_cultural_reference_l_8_settembre_f4073f02
  language: it
  canonical_reference: L'8 settembre
  reference_type: cultural_reference
  surface_patterns:
  - 8 settembre
  - l'8 settembre
  short_explanation: Refers to September 8, 1943, the date of the Armistice of Cassibile, when Italy surrendered
    to the Allies, leading to the fall of the fascist regime and the beginning of the Resistance.
  i18n_explanations:
    en: Refers to September 8, 1943, the date of the Armistice of Cassibile, when Italy surrendered to
      the Allies, leading to the fall of the fascist regime and the beginning of the Resistance.
    es: Se refiere al 8 de septiembre de 1943, fecha del Armisticio de Cassibile, cuando Italia se rindió
      ante los Aliados, lo que llevó a la caída del régimen fascista y al comienzo de la Resistencia.
    fr: Fait référence au 8 septembre 1943, date de l'armistice de Cassibile, lorsque l'Italie s'est rendue
      aux Alliés, entraînant la chute du régime fasciste et le début de la Résistance.
    de: Bezieht sich auf den 8. September 1943, das Datum des Waffenstillstands von Cassibile, als Italien
      vor den Alliierten kapitulierte, was zum Sturz des faschistischen Regimes und zum Beginn des Widerstands
      führte.
    it: Si riferisce all'8 settembre 1943, data dell'armistizio di Cassibile, quando l'Italia si arrese
      agli Alleati, portando alla caduta del regime fascista e all'inizio della Resistenza.
    pt: Refere-se a 8 de setembro de 1943, a data do Armistício de Cassibile, quando a Itália se rendeu
      aos Aliados, levando à queda do regime fascista e ao início da Resistência.
    ru: Относится к 8 сентября 1943 года, дате Кассибильского перемирия, когда Италия капитулировала перед
      союзниками, что привело к падению фашистского режима и началу Сопротивления.
    ja: 1943年9月8日、カッシビレ休戦協定の日付。イタリアが連合国に降伏し、ファシスト政権の崩壊とレジスタンスの開始につながった。
    zh: 指1943年9月8日，卡西比莱停战协定签署之日，意大利向盟军投降，导致法西斯政权垮台，抵抗运动开始。
    ar: يشير إلى 8 سبتمبر 1943، تاريخ هدنة كاسيبيلي، عندما استسلمت إيطاليا للحلفاء، مما أدى إلى سقوط النظام
      الفاشي وبداية المقاومة.
    he: מתייחס ל-8 בספטמבר 1943, תאריך שביתת הנשק של קסיבילה, כאשר איטליה נכנעה לבעלות הברית, מה שהוביל
