  - Se non è vero, è ben trovato
  short_explanation: This phrase means 'If it is not true, it is very well invented.' It is used to acknowledge
    that a story, though possibly untrue, is cleverly crafted and worth repeating.
  i18n_explanations:
    en: This phrase means 'If it is not true, it is very well invented.' It is used to acknowledge that
      a story, though possibly untrue, is cleverly crafted and worth repeating.
    es: Esta frase significa 'Si no es verdad, está muy bien inventada'. Se usa para reconocer que una
      historia, aunque posiblemente falsa, está ingeniosamente elaborada y vale la pena repetirla.
    fr: Cette phrase signifie 'Si ce n'est pas vrai, c'est très bien inventé'. Elle est utilisée pour
      reconnaître qu'une histoire, bien que possiblement fausse, est habilement conçue et mérite d'être
      répétée.
    de: Dieser Satz bedeutet 'Wenn es nicht wahr ist, ist es sehr gut erfunden'. Er wird verwendet, um
      anzuerkennen, dass eine Geschichte, obwohl möglicherweise unwahr, klug konstruiert und wiederholenswert
      ist.
    it: Questa frase significa 'Se non è vero, è molto ben trovato'. Si usa per riconoscere che una storia,
      anche se forse falsa, è abilmente costruita e vale la pena di essere ripetuta.
    pt: Esta frase significa 'Se não é verdade, é muito bem inventado'. É usada para reconhecer que uma
      história, embora possivelmente falsa, é engenhosamente elaborada e vale a pena ser repetida.
    ru: Эта фраза означает 'Если это не правда, то это очень хорошо придумано'. Она используется для признания
