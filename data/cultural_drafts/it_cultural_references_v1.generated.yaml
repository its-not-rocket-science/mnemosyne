  i18n_explanations:
    en: First words of Virgil's Aeneid, announcing the theme of arms (war) and the man (Aeneas). It is
      one of the most famous opening lines in Western literature, frequently cited and parodied.
    es: Primeras palabras de la Eneida de Virgilio, que anuncian el tema de las armas (guerra) y el hombre
      (Eneas). Es uno de los versos iniciales más famosos de la literatura occidental, frecuentemente
      citado y parodiado.
    fr: Premiers mots de l'Énéide de Virgile, annonçant le thème des armes (la guerre) et de l'homme (Énée).
      C'est l'un des vers d'ouverture les plus célèbres de la littérature occidentale, souvent cité et
      parodié.
    de: Die ersten Worte von Vergils Aeneis, die das Thema der Waffen (Krieg) und des Mannes (Aeneas)
      ankündigen. Es ist eine der berühmtesten Eröffnungszeilen der westlichen Literatur, häufig zitiert
      und parodiert.
    it: Prime parole dell'Eneide di Virgilio, che annunciano il tema delle armi (guerra) e dell'uomo (Enea).
      È uno dei versi d'apertura più famosi della letteratura occidentale, spesso citato e parodiato.
    pt: Primeiras palavras da Eneida de Virgílio, anunciando o tema das armas (guerra) e do homem (Eneias).
      É um dos versos de abertura mais famosos da literatura ocidental, frequentemente citado e parodiado.
    ru: Первые слова 'Энеиды' Вергилия, объявляющие тему оружия (войны) и мужа (Энея). Это одна из самых
      известных начальных строк в западной литературе, часто цитируемая и пародируемая.
    ja: ウェルギリウスの『アエネーイス』の最初の言葉。武器（戦争）と英雄（アエネーアス）の主題を告げる。西洋文学で最も有名な冒頭行の一つで、頻繁に引用、パロディされる。
    zh: 维吉尔《埃涅阿斯纪》的开篇词，宣告了战争（武器）与英雄（埃涅阿斯）的主题。这是西方文学中最著名的开场白之一，经常被引用和模仿。
    ar: الكلمات الأولى من الإنيادة لفيرجيل، تعلن موضوع الأسلحة (الحرب) والرجل (إينياس). إنها واحدة من
