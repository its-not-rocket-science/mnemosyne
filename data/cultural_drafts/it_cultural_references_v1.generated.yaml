      fundamental en la teología cristiana, a menudo usada para enfatizar la centralidad del amor en la
      fe.
    fr: Cette phrase de la Première Épître de Jean définit la nature de Dieu comme l'amour. C'est une
      déclaration fondamentale de la théologie chrétienne, souvent utilisée pour souligner la centralité
      de l'amour dans la foi.
