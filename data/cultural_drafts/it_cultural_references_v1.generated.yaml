      повторения.
    ja: このフレーズは『真実でなくとも、よくできている』という意味です。物語がたとえ真実でなくても、巧みに作られていて繰り返す価値があると認める際に使われます。
    zh: 这句话的意思是‘即使不是真的，也编得巧妙’。用于承认一个故事虽然可能不真实，但构思巧妙，值得重复。
    ar: تعني هذه العبارة 'إذا لم يكن صحيحًا، فهو مخترع بشكل جيد جدًا'. تُستخدم للإقرار بأن القصة، على
