- id: it_proverb_tradition_buon_sangue_non_mente_7e722680
  language: it
  canonical_reference: Buon sangue non mente
  reference_type: proverb_tradition
  surface_patterns:
  - Buon sangue non mente
  - Il buon sangue non mente
  - Di buon sangue non si mente
  short_explanation: Means that true hereditary qualities or character will eventually manifest; used
    to assert that someone's innate goodness or lineage shows through their actions.
  i18n_explanations:
    en: Means that true hereditary qualities or character will eventually manifest; used to assert that
      someone's innate goodness or lineage shows through their actions.
    es: Significa que las verdaderas cualidades hereditarias o el carácter se manifestarán eventualmente;
      se usa para afirmar que la bondad innata o el linaje de alguien se muestra a través de sus acciones.
    fr: Signifie que les véritables qualités héréditaires ou le caractère finiront par se manifester;
      utilisé pour affirmer que la bonté innée ou la lignée de quelqu'un se révèle à travers ses actions.
    de: Bedeutet, dass sich wahre erbliche Eigenschaften oder der Charakter schließlich zeigen; verwendet,
      um zu behaupten, dass die angeborene Güte oder Abstammung einer Person durch ihre Handlungen sichtbar
      wird.
    it: Significa che le vere qualità ereditarie o il carattere si manifesteranno alla fine; usato per
      affermare che la bontà innata o il lignaggio di qualcuno si mostra attraverso le sue azioni.
    pt: Significa que as verdadeiras qualidades hereditárias ou o caráter acabarão por se manifestar;
      usado para afirmar que a bondade inata ou a linhagem de alguém se mostra através de suas ações.
    ru: Означает, что истинные наследственные качества или характер в конечном итоге проявятся; используется,
      чтобы утверждать, что врожденная доброта или происхождение человека проявляются через его действия.
    ja: 本当の遺伝的資質や性格は最終的に現れることを意味します。誰かの生来の善良さや血筋が行動に表れると主張するために使われます。
    zh: 意思是真正的遗传品质或性格最终会显现出来；用于断言某人的先天善良或血统会通过其行为表现出来。
    ar: يعني أن الصفات الوراثية الحقيقية أو الشخصية ستظهر في النهاية؛ يُستخدم للتأكيد على أن الخير الفطري
      أو النسب يظهر من خلال أفعال الشخص.
    he: פירושו שתכונות תורשתיות אמיתיות או אופי יתגלו בסופו של דבר; משמש לטעון שהטוב הפנימי או היוחסין
      של מישהו מתגלים דרך מעשיו.
