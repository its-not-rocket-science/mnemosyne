      d'un gain modeste mais certain que de risquer pour un gain potentiel plus important.
    de: Entspricht 'Der Spatz in der Hand ist besser als die Taube auf dem Dach', betont, dass es besser
      ist, sich mit einem bescheidenen, aber sicheren Gewinn zufrieden zu geben, als ihn für einen möglichen
      größeren zu riskieren.
    it: Equivalente a 'Meglio un uovo oggi che una gallina domani', sottolineando che è meglio accontentarsi
      di un guadagno modesto ma certo che rischiarlo per uno potenzialmente maggiore.
    pt: Equivalente a 'Mais vale um pássaro na mão do que dois voando', enfatizando que é melhor contentar-se
      com um ganho modesto mas certo do que arriscá-lo por um potencial maior.
    ru: Эквивалентно 'Лучше синица в руках, чем журавль в небе', подчеркивая, что лучше довольствоваться
      скромным, но верным выигрышем, чем рисковать им ради потенциально большего.
    ja: 「手上の鳥は藪の中の二羽の価値がある」に相当し、ささやかでも確実な利益を得ることに満足し、より大きな可能性のある利益のためにそれを危険にさらさない方が良いことを強調しています。
    zh: 相当于'双鸟在林不如一鸟在手'，强调满足于微薄但确定的收益，而不是为了可能更大的收益而冒险。
    ar: يعادل 'عصفور في اليد خير من عشرة على الشجرة'، ويؤكد أنه من الأفضل الاكتفاء بمكسب متواضع لكن مؤكد
      بدلاً من المخاطرة به من أجل مكسب أكبر محتمل.
    he: מקביל ל'ציפור ביד שווה שתיים על העץ', ומדגיש שעדיף להסתפק ברווח צנוע אך בטוח מאשר לסכן אותו תמורת
