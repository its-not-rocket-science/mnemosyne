      la muralla de Roma, lo que llevó a la anexión de Roma y la finalización de la unificación italiana.
    fr: La brèche de la Porta Pia s'est produite le 20 septembre 1870, lorsque les troupes italiennes
      ont percé le mur d'enceinte de Rome, conduisant à l'annexion de Rome et à l'achèvement de l'unification
      italienne.
    de: Der Durchbruch an der Porta Pia ereignete sich am 20. September 1870, als italienische Truppen
