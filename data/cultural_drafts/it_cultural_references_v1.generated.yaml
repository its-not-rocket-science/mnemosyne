      blanco y rojo, adoptada en 1797 y que simboliza la República Italiana.
    fr: Le tricolore est le drapeau national italien, composé de trois bandes verticales vertes, blanches
      et rouges, adopté en 1797 et symbolisant la République italienne.
    de: Das Trikolore ist die italienische Nationalflagge, bestehend aus drei vertikalen Streifen in Grün,
      Weiß und Rot, 1797 angenommen und symbolisiert die Italienische Republik.
    it: Il tricolore è la bandiera nazionale italiana, composta da tre strisce verticali di colore verde,
      bianco e rosso, adottata nel 1797 e simbolo della Repubblica Italiana.
    pt: O tricolor é a bandeira nacional italiana, composta por três listras verticais verde, branca e
      vermelha, adotada em 1797 e simbolizando a República Italiana.
    ru: Триколор — это итальянский национальный флаг, состоящий из трёх вертикальных полос зелёного, белого
