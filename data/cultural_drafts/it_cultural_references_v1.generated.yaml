  i18n_explanations:
    en: This is a teaching of Jesus about refraining from judging others, as found in the Sermon on the
      Mount. It warns that the measure we use for others will be used for us.
    es: Esta es una enseñanza de Jesús acerca de abstenerse de juzgar a otros, como se encuentra en el
      Sermón del Monte. Advierte que la medida que usamos con los demás se usará con nosotros.
    fr: C'est un enseignement de Jésus sur le fait de ne pas juger les autres, comme on le trouve dans
      le Sermon sur la montagne. Il avertit que la mesure que nous utilisons pour les autres sera utilisée
      pour nous.
    de: Dies ist eine Lehre Jesu, andere nicht zu verurteilen, wie sie in der Bergpredigt zu finden ist.
      Sie warnt, dass das Maß, mit dem wir andere messen, auch an uns angelegt wird.
    it: Questo è un insegnamento di Gesù sull'astenersi dal giudicare gli altri, come si trova nel Discorso
      della Montagna. Avverte che la misura che usiamo per gli altri sarà usata per noi.
    pt: Este é um ensinamento de Jesus sobre não julgar os outros, como encontrado no Sermão do Monte.
      Adverte que a medida que usamos para os outros será usada para nós.
    ru: Это учение Иисуса о воздержании от осуждения других, как сказано в Нагорной проповеди. Оно предупреждает,
      что мерой, которой мы мерим других, будет отмерено и нам.
    ja: これはイエスの山上の垂訓にある、他人を裁くことを控える教えです。自分が他人に用いる尺度が自分にも用いられることを警告しています。
    zh: 这是耶稣在登山宝训中的教导，关于不要论断他人。它警告说，我们用什么量器量给人，也必用什么量器量给我们。
    ar: هذا تعليم من يسوع عن الامتناع عن الحكم على الآخرين، كما ورد في عظة الجبل. يحذر من أن المكيال الذي
      نكيل به للآخرين سيكال لنا.
    he: זהו לימוד של ישוע על הימנעות משיפוט אחרים, כפי שנמצא בדרשת ההר. הוא מזהיר שהמידה שבה אנו מודדים
