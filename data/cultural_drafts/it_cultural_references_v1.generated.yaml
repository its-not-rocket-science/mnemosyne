    a lot but do nothing productive. Emphasizes action over words.
  i18n_explanations:
    en: Literally 'a rooster that crows does not lay eggs'; used to criticize those who talk a lot but
      do nothing productive. Emphasizes action over words.
    es: Literalmente 'un gallo que canta no pone huevos'; se usa para criticar a quienes hablan mucho
      pero no hacen nada productivo. Enfatiza la acción sobre las palabras.
    fr: Littéralement 'un coq qui chante ne pond pas d'œufs'; utilisé pour critiquer ceux qui parlent
      beaucoup mais ne font rien de productif. Met l'accent sur l'action plutôt que les paroles.
    de: Wörtlich 'ein Hahn, der kräht, legt keine Eier'; verwendet, um diejenigen zu kritisieren, die
      viel reden, aber nichts Produktives tun. Betont Handlung über Worte.
    it: Letteralmente 'un gallo che canta non fa l'uovo'; usato per criticare coloro che parlano molto
      ma non fanno nulla di produttivo. Sottolinea l'azione rispetto alle parole.
    pt: Literalmente 'um galo que canta não põe ovos'; usado para criticar aqueles que falam muito mas
      não fazem nada produtivo. Enfatiza a ação sobre as palavras.
    ru: Буквально «поющий петух яиц не несет»; используется для критики тех, кто много говорит, но не
      делает ничего продуктивного. Подчеркивает действие, а не слова.
    ja: 文字通り「鳴く雄鶏は卵を産まない」；多くを語るが生産的なことをしない人々を批判するのに使われる。言葉よりも行動を重視する。
    zh: 字面意思是“打鸣的公鸡不下蛋”；用来批评那些说得多但做不出成果的人。强调行动胜于言语。
    ar: حرفياً "الديك الذي يصيح لا يضع البيض"؛ يستخدم لانتقاد من يتحدثون كثيراً لكن لا يفعلون شيئاً منتجاً.
