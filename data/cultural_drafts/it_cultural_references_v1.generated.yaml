- id: it_cultural_reference_il_saluto_romano_2c9adf22
  language: it
  canonical_reference: Il saluto romano
  reference_type: cultural_reference
  surface_patterns:
  - saluto romano
  - il saluto romano
  - gesto romano
  short_explanation: The Roman salute is a gesture with the right hand extended forward and upward, historically
    associated with ancient Rome but widely used as a symbol of Fascist Italy in the 20th century.
  i18n_explanations:
    en: The Roman salute is a gesture with the right hand extended forward and upward, historically associated
      with ancient Rome but widely used as a symbol of Fascist Italy in the 20th century.
    es: El saludo romano es un gesto con la mano derecha extendida hacia adelante y arriba, históricamente
      asociado con la antigua Roma, pero ampliamente utilizado como símbolo de la Italia fascista en el
      siglo XX.
    fr: Le salut romain est un geste consistant à tendre la main droite vers l'avant et vers le haut,
      historiquement associé à la Rome antique mais largement utilisé comme symbole de l'Italie fasciste
      au XXe siècle.
    de: Der römische Gruß ist eine Geste mit der rechten Hand, die nach vorne und oben gestreckt wird,
      historisch mit dem antiken Rom verbunden, aber im 20. Jahrhundert weitgehend als Symbol des faschistischen
      Italiens verwendet.
    it: Il saluto romano è un gesto con la mano destra estesa in avanti e verso l'alto, storicamente associato
      all'antica Roma ma ampiamente usato come simbolo dell'Italia fascista nel XX secolo.
    pt: A saudação romana é um gesto com a mão direita estendida para frente e para cima, historicamente
      associado à Roma antiga, mas amplamente usado como símbolo da Itália fascista no século XX.
    ru: Римское приветствие — это жест с правой рукой, вытянутой вперёд и вверх, исторически связанный
      с Древним Римом, но широко использовавшийся как символ фашистской Италии в XX веке.
    ja: ローマ式敬礼は、右手を前方上方に伸ばすジェスチャーで、歴史的には古代ローマに関連するが、20世紀にはファシストイタリアの象徴として広く用いられた。
    zh: 罗马式敬礼是一种将右手向前上方伸出的手势，历史上与古罗马有关，但在20世纪被广泛用作法西斯意大利的象征。
    ar: التحية الرومانية هي إشارة بمد اليد اليمنى إلى الأمام وإلى الأعلى، وترتبط تاريخياً بروما القديمة
      ولكنها استُخدمت على نطاق واسع كرمز لإيطاليا الفاشية في القرن العشرين.
    he: ההצדעה הרומית היא מחווה ביד ימין המושטת קדימה ולמעלה, הקשורה היסטורית לרומא העתיקה אך שימשה רבות
      כסמל לאיטליה הפאשיסטית במאה ה-20.
