    zh: 这句话出自耶稣面对行淫时被捉的女人时挑战指控者的故事。它意味着只有无罪的人才有权利定别人的罪。
    ar: هذه العبارة تأتي من قصة المرأة التي أمسكت في الزنا، حيث تحدى يسوع المتهمين. تعني أنه فقط أولئك
