- id: it_literary_reference_così_è_se_vi_pare_e21cf7d7
  language: it
  canonical_reference: Così è se vi pare
  reference_type: literary_reference
  surface_patterns:
  - Così è se vi pare
  - Così è (se vi pare)
  short_explanation: This is the title of a play by Luigi Pirandello, exploring the relativity of truth
    and perception. It is used to express that one's subjective reality is valid, even if others disagree.
  i18n_explanations:
    en: This is the title of a play by Luigi Pirandello, exploring the relativity of truth and perception.
      It is used to express that one's subjective reality is valid, even if others disagree.
    es: Es el título de una obra de Luigi Pirandello que explora la relatividad de la verdad y la percepción.
      Se utiliza para expresar que la realidad subjetiva de uno es válida, incluso si otros no están de
      acuerdo.
    fr: C'est le titre d'une pièce de Luigi Pirandello explorant la relativité de la vérité et de la perception.
      Il est utilisé pour exprimer que la réalité subjective d'une personne est valide, même si d'autres
      ne sont pas d'accord.
    de: Dies ist der Titel eines Stücks von Luigi Pirandello, das die Relativität von Wahrheit und Wahrnehmung
      untersucht. Es wird verwendet, um auszudrücken, dass die subjektive Realität einer Person gültig
      ist, auch wenn andere widersprechen.
    it: È il titolo di un'opera teatrale di Luigi Pirandello che esplora la relatività della verità e
      della percezione. Si usa per esprimere che la propria realtà soggettiva è valida, anche se altri
      non sono d'accordo.
    pt: É o título de uma peça de Luigi Pirandello que explora a relatividade da verdade e da percepção.
      É usado para expressar que a realidade subjetiva de alguém é válida, mesmo que outros discordem.
    ru: Это название пьесы Луиджи Пиранделло, исследующей относительность истины и восприятия. Используется
      для выражения того, что субъективная реальность человека действительна, даже если другие не согласны.
    ja: ルイジ・ピランデッロの戯曲のタイトルで、真実と認識の相対性を探求しています。自分の主観的な現実が、他人が同意しなくても有効であることを表現するために使われます。
    zh: 这是路易吉·皮兰德娄的一部戏剧的标题，探讨真理和感知的相对性。用于表达一个人的主观现实是有效的，即使其他人不同意。
    ar: هذا هو عنوان مسرحية للويجي بيرانديللو تستكشف نسبية الحقيقة والإدراك. تُستخدم للتعبير عن أن الواقع
