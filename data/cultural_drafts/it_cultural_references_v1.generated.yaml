    ja: デカルトの有名な命題「Cogito, ergo sum」（我思う、ゆえに我あり）は彼の哲学の第一原理であり、自己認識を知識の基盤として確立します。
    zh: 笛卡尔的著名宣言“我思故我在”是他哲学的第一原理，将自我意识确立为知识的基础。
    ar: عبارة ديكارت الشهيرة "أنا أفكر، إذن أنا موجود" هي المبدأ الأول لفلسفته، حيث تضع الوعي الذاتي كأساس
