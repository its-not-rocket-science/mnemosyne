    en: Descartes' famous statement 'Cogito, ergo sum' (I think, therefore I am) is the first principle
      of his philosophy, establishing self-awareness as the foundation of knowledge.
    es: La famosa declaración de Descartes 'Cogito, ergo sum' (Pienso, luego existo) es el primer principio
      de su filosofía, estableciendo la autoconciencia como base del conocimiento.
    fr: La célèbre déclaration de Descartes « Cogito, ergo sum » (Je pense, donc je suis) est le premier
