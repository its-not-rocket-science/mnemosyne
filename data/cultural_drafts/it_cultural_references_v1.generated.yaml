    ja: このフレーズは最後の晩餐でイエスが語り、聖体の制定をしたもの。キリスト教典礼の中心であり、信者に彼の記念として儀式を繰り返すよう命じている。
    zh: 这句话是耶稣在最后的晚餐时说的，设立了圣餐。在基督教礼仪中至关重要，命令信徒重复这仪式来记念他。
    ar: هذه العبارة قالها يسوع خلال العشاء الأخير، مؤسسًا القربان المقدس. هي ذات أهمية مركزية في الليتورجيا
