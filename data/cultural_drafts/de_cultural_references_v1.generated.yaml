  short_explanation: Refers to the sword suspended over Damocles by Dionysius I of Syracuse, illustrating
    the constant danger faced by those in power.
  i18n_explanations:
    en: Refers to the sword suspended over Damocles by Dionysius I of Syracuse, illustrating the constant
      danger faced by those in power.
    es: Se refiere a la espada suspendida sobre Damocles por Dionisio I de Siracusa, que ilustra el peligro
      constante que enfrentan los poderosos.
    fr: Fait référence à l'épée suspendue au-dessus de Damoclès par Denys Ier de Syracuse, illustrant
      le danger constant auquel sont confrontés ceux qui détiennent le pouvoir.
    de: Bezieht sich auf das über Damokles hängende Schwert von Dionysius I. von Syrakus, das die ständige
      Gefahr veranschaulicht, der Machthaber ausgesetzt sind.
    it: Si riferisce alla spada sospesa sopra Damocle da Dionisio I di Siracusa, che illustra il pericolo
      costante affrontato da chi detiene il potere.
    pt: Refere-se à espada suspensa sobre Dâmocles por Dionísio I de Siracusa, ilustrando o perigo constante
      enfrentado por aqueles no poder.
    ru: Относится к мечу, подвешенному над Дамоклом Дионисием I Сиракузским, иллюстрирующему постоянную
