  short_explanation: Refers to the idol fashioned by the Israelites while Moses was on Sinai (Exodus 32).
    It symbolizes idolatry and the worship of material wealth, often used to criticize excessive materialism.
  i18n_explanations:
    en: Refers to the idol fashioned by the Israelites while Moses was on Sinai (Exodus 32). It symbolizes
      idolatry and the worship of material wealth, often used to criticize excessive materialism.
    es: Se refiere al ídolo que los israelitas hicieron mientras Moisés estaba en el Sinaí (Éxodo 32).
      Simboliza la idolatría y la adoración de la riqueza material, y se usa a menudo para criticar el
      materialismo excesivo.
    fr: Fait référence à l'idole que les Israélites ont fabriquée pendant que Moïse était sur le Sinaï
      (Exode 32). Elle symbolise l'idolâtrie et le culte de la richesse matérielle, et est souvent utilisée
      pour critiquer le matérialisme excessif.
    de: Bezieht sich auf das Götzenbild, das die Israeliten anfertigten, während Mose auf dem Sinai war
      (Exodus 32). Es symbolisiert Götzendienst und die Verehrung materiellen Reichtums und wird oft verwendet,
      um übermäßigen Materialismus zu kritisieren.
    it: Si riferisce all'idolo fabbricato dagli israeliti mentre Mosè era sul Sinai (Esodo 32). Simboleggia
      l'idolatria e l'adorazione della ricchezza materiale, spesso usato per criticare il materialismo
      eccessivo.
    pt: Refere-se ao ídolo que os israelitas fizeram enquanto Moisés estava no Sinai (Êxodo 32). Simboliza
      a idolatria e a adoração da riqueza material, frequentemente usado para criticar o materialismo
      excessivo.
    ru: Относится к идолу, которого израильтяне сделали, пока Моисей был на Синае (Исход 32). Он символизирует
      идолопоклонство и поклонение материальному богатству, часто используется для критики чрезмерного
      материализма.
    ja: モーセがシナイ山にいる間にイスラエル人が作った偶像を指します（出エジプト記32）。偶像崇拝と物質的富への崇拝を象徴し、過度の物質主義を批判するのによく使われます。
    zh: 指摩西在西奈山时以色列人铸造的偶像（出埃及记32）。象征偶像崇拜和对物质财富的崇拜，常用于批评过度物质主义。
    ar: يشير إلى الصنم الذي صنعه بنو إسرائيل بينما كان موسى على جبل سيناء (سفر الخروج 32). يرمز إلى عبادة
