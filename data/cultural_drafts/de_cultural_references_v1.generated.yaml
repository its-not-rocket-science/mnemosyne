- id: de_classical_or_scriptural_allusion_die_eherne_schlange_325677ec
  language: de
  canonical_reference: Die eherne Schlange
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - die eherne Schlange
  - eherne Schlange
  short_explanation: Literally 'the brazen serpent', this refers to the bronze serpent God instructed
    Moses to make in Numbers 21:9, which healed the Israelites from snake bites when they looked at it.
    It is often used as a symbol of healing or salvation.
  i18n_explanations:
    en: Literally 'the brazen serpent', this refers to the bronze serpent God instructed Moses to make
      in Numbers 21:9, which healed the Israelites from snake bites when they looked at it. It is often
      used as a symbol of healing or salvation.
    es: Literalmente 'la serpiente de bronce', se refiere a la serpiente de bronce que Dios instruyó a
      Moisés hacer en Números 21:9, que sanaba a los israelitas de las mordeduras de serpiente cuando
      la miraban. A menudo se usa como símbolo de sanación o salvación.
    fr: Littéralement 'le serpent d'airain', cela fait référence au serpent de bronze que Dieu ordonna
      à Moïse de fabriquer dans Nombres 21:9, qui guérissait les Israélites des morsures de serpent lorsqu'ils
      le regardaient. Il est souvent utilisé comme symbole de guérison ou de salut.
    de: Wörtlich 'die eherne Schlange', bezieht sich dies auf die bronzene Schlange, die Gott Mose in
      Numeri 21:9 zu machen befahl, die die Israeliten von Schlangenbissen heilte, wenn sie sie ansahen.
      Sie wird oft als Symbol für Heilung oder Erlösung verwendet.
    it: Letteralmente 'il serpente di bronzo', si riferisce al serpente di bronzo che Dio ordinò a Mosè
      di fare in Numeri 21:9, che guariva gli israeliti dai morsi di serpente quando lo guardavano. È
      spesso usato come simbolo di guarigione o salvezza.
    pt: Literalmente 'a serpente de bronze', refere-se à serpente de bronze que Deus instruiu Moisés a
      fazer em Números 21:9, que curava os israelitas de picadas de cobra quando a olhavam. É frequentemente
      usada como símbolo de cura ou salvação.
    ru: Буквально 'медный змей', это относится к медному змею, которого Бог повелел Моисею сделать в Числах
      21:9, который исцелял израильтян от укусов змей, когда они смотрели на него. Часто используется
      как символ исцеления или спасения.
    ja: 文字通り『青銅の蛇』を意味し、神がモーセに作るよう指示した青銅の蛇（民数記21章9節）を指し、イスラエル人がそれを見ると蛇の咬傷が治りました。これはしばしば癒しや救いの象徴として用いられます。
    zh: 字面意思是'铜蛇'，指上帝在民数记21:9中指示摩西制造的铜蛇，以色列人一看它就被蛇咬伤得医治。它常被用作医治或拯救的象征。
    ar: حرفيًا 'الحية النحاسية'، يشير هذا إلى الحية النحاسية التي أمر الله موسى بصنعها في سفر العدد 21:9،
      والتي كانت تشفي بني إسرائيل من لدغات الثعابين عندما ينظرون إليها. غالبًا ما تستخدم كرمز للشفاء أو
      الخلاص.
    he: פשוטו כמשמעו 'נחש הנחושת', הכוונה היא לנחש הנחושת שאלוהים ציווה על משה לעשות במדבר כ"א, 9, שריפא
      את בני ישראל מהכשות נחשים כשהביטו בו. הוא משמש לעתים קרובות כסמל לריפוי או ישועה.
