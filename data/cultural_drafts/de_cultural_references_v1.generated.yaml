- id: de_proverb_tradition_ausnahmen_bestätigen_die_regel_6d769e05
  language: de
  canonical_reference: Ausnahmen bestätigen die Regel
  reference_type: proverb_tradition
  surface_patterns:
  - Ausnahmen bestätigen die Regel
  - Die Ausnahme bestätigt die Regel
  short_explanation: This maxim means that the existence of an exception confirms the existence of a rule.
    It is used to justify occasional deviations without invalidating the general principle.
  i18n_explanations:
    en: This maxim means that the existence of an exception confirms the existence of a rule. It is used
      to justify occasional deviations without invalidating the general principle.
    es: Esta máxima significa que la existencia de una excepción confirma la existencia de una regla.
      Se utiliza para justificar desviaciones ocasionales sin invalidar el principio general.
    fr: Cette maxime signifie que l'existence d'une exception confirme l'existence d'une règle. Elle est
      utilisée pour justifier des écarts occasionnels sans invalider le principe général.
    de: Diese Maxime bedeutet, dass die Existenz einer Ausnahme die Existenz einer Regel bestätigt. Sie
      wird verwendet, um gelegentliche Abweichungen zu rechtfertigen, ohne das allgemeine Prinzip zu entkräften.
    it: Questa massima significa che l'esistenza di un'eccezione conferma l'esistenza di una regola. Viene
      usata per giustificare deviazioni occasionali senza invalidare il principio generale.
    pt: Esta máxima significa que a existência de uma exceção confirma a existência de uma regra. É usada
      para justificar desvios ocasionais sem invalidar o princípio geral.
    ru: Эта максима означает, что существование исключения подтверждает существование правила. Она используется
      для оправдания occasionalных отклонений без опровержения общего принципа.
    ja: この格言は、例外の存在が規則の存在を確認するという意味です。一般原則を無効にすることなく、時折の逸脱を正当化するために使われます。
    zh: 这句格言的意思是，例外的存在证实了规则的存在。它被用来证明偶尔的偏离是合理的，而不否定一般原则。
    ar: تعني هذه الحكمة أن وجود استثناء يؤكد وجود قاعدة. تُستخدم لتبرير الانحرافات العرضية دون إبطال المبدأ
      العام.
    he: כלל זה אומר שקיומו של חריג מאשר את קיומו של כלל. הוא משמש כדי להצדיק סטיות מזדמנות מבלי לבטל את
      העיקרון הכללי.
