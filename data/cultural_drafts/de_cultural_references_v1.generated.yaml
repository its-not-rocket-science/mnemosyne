- id: de_proverb_tradition_eigenlob_stinkt_4c559198
  language: de
  canonical_reference: Eigenlob stinkt
  reference_type: proverb_tradition
  surface_patterns:
  - Eigenlob stinkt
  - Eigenlob stinkt, sagt man
  - Eigenlob stinkt doch
  - Eigenlob stinkt wirklich
  - Eigenlob stinkt immer
  short_explanation: This German proverb means 'self-praise stinks' and conveys that bragging about oneself
    is distasteful and socially frowned upon. It is a common saying used to discourage boastfulness.
  i18n_explanations:
    en: This German proverb means 'self-praise stinks' and conveys that bragging about oneself is distasteful
      and socially frowned upon. It is a common saying used to discourage boastfulness.
    es: Este proverbio alemán significa 'la autopromoción apesta' y transmite que presumir de uno mismo
      es de mal gusto y socialmente mal visto. Es un dicho común para desalentar la jactancia.
    fr: Ce proverbe allemand signifie 'l'auto-éloge pue' et indique que se vanter de soi-même est déplaisant
      et socialement mal vu. C'est un dicton courant pour décourager la vantardise.
    de: Dieses deutsche Sprichwort bedeutet 'Eigenlob stinkt' und vermittelt, dass Prahlen mit sich selbst
      geschmacklos und gesellschaftlich verpönt ist. Es ist eine gängige Redewendung, um Angeberei zu
      missbilligen.
    it: Questo proverbio tedesco significa 'l'autoelogio puzza' e trasmette che vantarsi di sé è di cattivo
      gusto e socialmente disapprovato. È un detto comune per scoraggiare la vanagloria.
    pt: Este provérbio alemão significa 'autopromoção cheira mal' e transmite que se gabar de si mesmo
      é desagradável e socialmente malvisto. É um ditado comum para desencorajar a ostentação.
    ru: Эта немецкая пословица означает 'самовосхваление воняет' и передает, что хвастаться собой неприятно
      и не одобряется обществом. Это распространенное высказывание, призванное отучить от хвастовства.
    ja: このドイツのことわざは「自己賛美は悪臭を放つ」という意味で、自慢することは不快で社会的に嫌われることを伝えます。自慢を戒める一般的なことわざです。
    zh: 这句德国谚语的意思是“自我吹嘘很臭”，表达了自夸是令人反感且不受社会欢迎的。这是一句常用于劝阻自吹自擂的俗语。
    ar: يعني هذا المثل الألماني 'المديح الذاتي نتن' ويوحي بأن التفاخر بالنفس مستهجن وغير مقبول اجتماعيًا.
      إنه مثل شائع يستخدم لثني الناس عن التفاخر.
    he: הפתגם הגרמני הזה אומר 'שבח עצמי מסריח' ומעביר שהתרברבות עצמית היא חסרת טעם ולא מקובלת חברתית.
      זהו פתגם נפוץ שנועד להרתיע מהתפארות.
