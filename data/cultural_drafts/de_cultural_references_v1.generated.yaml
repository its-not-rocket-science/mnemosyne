      la culture occidentale.
    de: Bezieht sich auf die zwei steinernen Tafeln mit den Zehn Geboten, die Mose auf dem Berg Sinai
      gegeben wurden (Exodus 31,18; 32,15-16). Sie repräsentieren das göttliche Gesetz und die moralische
      Grundlage in der westlichen Kultur.
    it: Si riferisce alle due tavole di pietra incise con i Dieci Comandamenti date a Mosè sul monte Sinai
