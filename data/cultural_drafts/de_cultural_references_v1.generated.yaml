    pt: Refere-se às duas tábuas de pedra inscritas com os Dez Mandamentos dadas a Moisés no Monte Sinai
      (Êxodo 31:18, 32:15-16). Elas representam a lei divina e o fundamento moral na cultura ocidental.
    ru: Относится к двум каменным скрижалям с Десятью заповедями, данным Моисею на горе Синай (Исход 31:18,
