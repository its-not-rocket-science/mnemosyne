    de: Aus Schillers Wilhelm Tell, gesprochen von Walter Fürst. Es drückt die Tugend der Selbstlosigkeit
      und des Voranstellens anderer aus, ein verbreitetes moralisches Ideal in der deutschen Kultur.
    it: Dal Guglielmo Tell di Schiller, detto da Walter Fürst. Esprime la virtù dell'altruismo e del mettere
      gli altri al primo posto, un ideale morale comune nella cultura tedesca.
    pt: Do Guilherme Tell de Schiller, dito por Walter Fürst. Expressa a virtude do altruísmo e colocar
      os outros em primeiro lugar, um ideal moral comum na cultura alemã.
    ru: Из «Вильгельма Телля» Шиллера, сказано Вальтером Фюрстом. Выражает добродетель самоотверженности
      и приоритета других, распространённый моральный идеал в немецкой культуре.
    ja: シラー『ヴィルヘルム・テル』より、ヴァルター・フュルストの言葉。無私の美徳と他者を優先することを表現しており、ドイツ文化における共通の道徳的理想。
    zh: 出自席勒的《威廉·退尔》，沃尔特·富尔斯特说的话。它表达了无私和把他人放在首位的美德，这是德国文化中常见的道德理想。
    ar: من مسرحية شيلر "ويليام تيل"، قالها والتر فورست. تعبر عن فضيلة الإيثار وتقديم الآخرين على النفس،
