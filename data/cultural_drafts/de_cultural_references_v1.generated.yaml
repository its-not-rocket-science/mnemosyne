    fr: Ce proverbe signifie que les malheurs arrivent rarement seuls ; les mauvais événements ont tendance
      à se produire ensemble. C'est l'équivalent de 'Un malheur n'arrive jamais seul'.
    de: Dieses Sprichwort bedeutet, dass Unglücke selten allein kommen; schlechte Ereignisse treten oft
