      un punto sin retorno. Se usa para señalar que se ha tomado una decisión irreversible.
    fr: Latin signifiant 'le sort en est jeté', attribué à Jules César lorsqu'il franchit le Rubicon,
      indiquant un point de non-retour. Utilisé pour signaler qu'une décision irréversible a été prise.
    de: Lateinisch für 'Der Würfel ist gefallen', Julius Cäsar zugeschrieben, als er den Rubikon überschritt,
