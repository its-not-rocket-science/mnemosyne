- id: de_cultural_reference_das_kommt_mir_spanisch_vor_3fc6ec3b
  language: de
  canonical_reference: Das kommt mir spanisch vor
  reference_type: cultural_reference
  surface_patterns:
  - Das kommt mir spanisch vor
  - Das kommt mir spanisch vor!
  short_explanation: This phrase means 'that seems strange or suspicious to me.' Historically, it reflects
    a time when Spanish language and customs were perceived as foreign and incomprehensible in German-speaking
    regions.
  i18n_explanations:
    en: This phrase means 'that seems strange or suspicious to me.' Historically, it reflects a time when
      Spanish language and customs were perceived as foreign and incomprehensible in German-speaking regions.
    es: Esta frase significa 'eso me parece extraño o sospechoso'. Históricamente, refleja una época en
      que el idioma y las costumbres españolas eran percibidos como extraños e incomprensibles en las
      regiones de habla alemana.
    fr: Cette phrase signifie 'cela me semble étrange ou suspect'. Historiquement, elle reflète une époque
      où la langue et les coutumes espagnoles étaient perçues comme étrangères et incompréhensibles dans
      les régions germanophones.
    de: Dieser Satz bedeutet 'das kommt mir seltsam oder verdächtig vor'. Historisch gesehen spiegelt
      er eine Zeit wider, in der die spanische Sprache und Bräuche in deutschsprachigen Regionen als fremd
      und unverständlich wahrgenommen wurden.
    it: Questa frase significa 'mi sembra strano o sospetto'. Storicamente, riflette un periodo in cui
      la lingua e i costumi spagnoli erano percepiti come strani e incomprensibili nelle regioni di lingua
      tedesca.
    pt: Esta frase significa 'isso me parece estranho ou suspeito'. Historicamente, reflete uma época
