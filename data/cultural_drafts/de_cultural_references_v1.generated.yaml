- id: de_proverb_tradition_lügen_haben_kurze_beine_c6d6234c
  language: de
  canonical_reference: Lügen haben kurze Beine
  reference_type: proverb_tradition
  surface_patterns:
  - Lügen haben kurze Beine
  - Eine Lüge hat kurze Beine
  - Lügen haben kurze Beine, die Wahrheit nicht
  short_explanation: Literally 'Lies have short legs,' meaning lies are quickly discovered and don't last
    long. It emphasizes the value of honesty.
  i18n_explanations:
    en: Literally 'Lies have short legs,' meaning lies are quickly discovered and don't last long. It
      emphasizes the value of honesty.
    es: Literalmente 'Las mentiras tienen patas cortas', significa que las mentiras se descubren rápidamente
      y no duran mucho. Enfatiza el valor de la honestidad.
    fr: Littéralement 'Les mensonges ont des jambes courtes', ce qui signifie que les mensonges sont rapidement
      découverts et ne durent pas longtemps. Il souligne la valeur de l'honnêteté.
    de: Wörtlich 'Lügen haben kurze Beine', was bedeutet, dass Lügen schnell entdeckt werden und nicht
      lange anhalten. Es betont den Wert der Ehrlichkeit.
    it: Letteralmente 'Le bugie hanno le gambe corte', significa che le bugie vengono scoperte rapidamente
      e non durano a lungo. Sottolinea il valore dell'onestà.
    pt: Literalmente 'Mentiras têm pernas curtas', significando que mentiras são rapidamente descobertas
      e não duram muito. Enfatiza o valor da honestidade.
    ru: Буквально «У лжи короткие ноги», что означает, что ложь быстро раскрывается и недолговечна. Подчеркивает
      ценность честности.
    ja: 直訳すると「嘘には短い脚がある」という意味で、嘘はすぐにばれて長くは続かないことを意味します。誠実さの価値を強調しています。
    zh: 字面意思是“谎言腿短”，意味着谎言很快就会被揭穿，不会持久。强调了诚实的重要性。
