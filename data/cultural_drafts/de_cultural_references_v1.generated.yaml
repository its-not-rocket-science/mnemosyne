- id: de_proverb_tradition_da_liegt_der_hase_im_pfeffer_c2de7b9f
  language: de
  canonical_reference: Da liegt der Hase im Pfeffer
  reference_type: proverb_tradition
  surface_patterns:
  - Da liegt der Hase im Pfeffer
  - Hier liegt der Hase im Pfeffer
  short_explanation: This idiom means 'that's the crux of the matter' or 'that's where the difficulty
    lies.' It originates from hunting, where pepper was used to mask the smell of hare; finding the hare
    in the pepper meant finding the key point.
  i18n_explanations:
    en: This idiom means 'that's the crux of the matter' or 'that's where the difficulty lies.' It originates
      from hunting, where pepper was used to mask the smell of hare; finding the hare in the pepper meant
      finding the key point.
    es: Esta expresión significa 'ese es el meollo del asunto' o 'ahí radica la dificultad'. Se origina
      en la caza, donde se usaba pimienta para enmascarar el olor de la liebre; encontrar la liebre en
      la pimienta significaba encontrar el punto clave.
    fr: Cette expression signifie « c'est le nœud du problème » ou « c'est là que se trouve la difficulté
      ». Elle provient de la chasse, où le poivre était utilisé pour masquer l'odeur du lièvre ; trouver
      le lièvre dans le poivre signifiait trouver le point clé.
    de: Diese Redewendung bedeutet 'das ist der Kern der Sache' oder 'dort liegt die Schwierigkeit'. Sie
