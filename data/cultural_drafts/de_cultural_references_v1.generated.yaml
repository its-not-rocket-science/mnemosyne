- id: de_classical_or_scriptural_allusion_der_ödipuskomplex_391ffaad
  language: de
  canonical_reference: Der Ödipuskomplex
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Ödipuskomplex
  - ödipaler Konflikt
  - ödipale Phase
  short_explanation: A psychoanalytic concept by Sigmund Freud, derived from the Greek tragedy of Oedipus,
    describing a child's unconscious sexual desire for the opposite-sex parent and rivalry with the same-sex
    parent. It is a key term in Freudian theory.
  i18n_explanations:
    en: A psychoanalytic concept by Sigmund Freud, derived from the Greek tragedy of Oedipus, describing
      a child's unconscious sexual desire for the opposite-sex parent and rivalry with the same-sex parent.
      It is a key term in Freudian theory.
    es: Un concepto psicoanalítico de Sigmund Freud, derivado de la tragedia griega de Edipo, que describe
      el deseo sexual inconsciente de un niño por el progenitor del sexo opuesto y la rivalidad con el
      progenitor del mismo sexo. Es un término clave en la teoría freudiana.
    fr: Un concept psychanalytique de Sigmund Freud, dérivé de la tragédie grecque d'Œdipe, décrivant
      le désir sexuel inconscient d'un enfant pour le parent du sexe opposé et la rivalité avec le parent
      du même sexe. C'est un terme clé de la théorie freudienne.
    de: Ein psychoanalytisches Konzept von Sigmund Freud, abgeleitet von der griechischen Tragödie des
      Ödipus, das das unbewusste sexuelle Verlangen eines Kindes nach dem gegengeschlechtlichen Elternteil
      und die Rivalität mit dem gleichgeschlechtlichen Elternteil beschreibt. Es ist ein Schlüsselbegriff
      der Freudschen Theorie.
    it: Un concetto psicoanalitico di Sigmund Freud, derivato dalla tragedia greca di Edipo, che descrive
      il desiderio sessuale inconscio di un bambino verso il genitore di sesso opposto e la rivalità con
      il genitore dello stesso sesso. È un termine chiave nella teoria freudiana.
    pt: Um conceito psicanalítico de Sigmund Freud, derivado da tragédia grega de Édipo, que descreve
      o desejo sexual inconsciente de uma criança pelo progenitor do sexo oposto e a rivalidade com o
      progenitor do mesmo sexo. É um termo-chave na teoria freudiana.
    ru: Психоаналитическое понятие Зигмунда Фрейда, происходящее от греческой трагедии об Эдипе, описывающее
      бессознательное сексуальное влечение ребенка к родителю противоположного пола и соперничество с
      родителем того же пола. Это ключевой термин в теории Фрейда.
    ja: ジークムント・フロイトによる精神分析概念で、ギリシャ悲劇のオイディプスに由来し、子供が異性の親に対して無意識の性的欲求を持ち、同性の親と競争することを説明します。フロイト理論の重要な用語です。
    zh: 西格蒙德·弗洛伊德的精神分析概念，源于希腊悲剧《俄狄浦斯王》，描述儿童对异性父母的无意识性欲及对同性父母的竞争。是弗洛伊德理论的关键术语。
    ar: مفهوم تحليلي نفسي لسيغموند فرويد، مشتق من المأساة اليونانية لأوديب، يصف الرغبة الجنسية اللاواعية
      للطفل تجاه الوالد من الجنس الآخر والتنافس مع الوالد من نفس الجنس. إنه مصطلح رئيسي في نظرية فرويد.
    he: מושג פסיכואנליטי של זיגמונד פרויד, הנגזר מהטרגדיה היוונית של אדיפוס, המתאר תשוקה מינית לא-מודעת
      של ילד להורה מהמין השני ויריבות עם ההורה מאותו המין. זהו מונח מפתח בתיאוריה הפרוידיאנית.
