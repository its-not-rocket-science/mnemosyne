      obstacle persistant. Son origine est biblique, du livre des Nombres 33:55, où Dieu avertit que les
      habitants de Canaan deviendront 'des épines dans vos yeux'.
    de: Diese deutsche Redewendung, die dem englischen 'a thorn in one's side' entspricht, bezeichnet
