- id: de_proverb_tradition_reden_ist_silber_schweigen_ist_gold_d53e87c3
  language: de
  canonical_reference: Reden ist Silber, Schweigen ist Gold
  reference_type: proverb_tradition
  surface_patterns:
  - Reden ist Silber, Schweigen ist Gold
  - Schweigen ist Gold, Reden ist Silber
  - Reden ist Silber, aber Schweigen ist Gold
  short_explanation: Literally 'Speech is silver, silence is golden.' It suggests that silence is more
    valuable than speaking, often implying it is better to stay quiet than to say something unnecessary.
  i18n_explanations:
    en: Literally 'Speech is silver, silence is golden.' It suggests that silence is more valuable than
      speaking, often implying it is better to stay quiet than to say something unnecessary.
    es: Literalmente 'Hablar es plata, callar es oro'. Sugiere que el silencio es más valioso que hablar,
      a menudo implicando que es mejor callarse que decir algo innecesario.
    fr: Littéralement 'Parler est d'argent, se taire est d'or'. Cela suggère que le silence est plus précieux
      que la parole, impliquant souvent qu'il vaut mieux se taire que de dire quelque chose d'inutile.
    de: Wörtlich 'Reden ist Silber, Schweigen ist Gold'. Es deutet darauf hin, dass Schweigen wertvoller
      ist als Reden, oft mit der Implikation, dass es besser ist, still zu sein, als etwas Unnötiges zu
      sagen.
    it: Letteralmente 'Parlare è argento, tacere è oro'. Suggerisce che il silenzio sia più prezioso del
      parlare, spesso implicando che sia meglio rimanere in silenzio piuttosto che dire qualcosa di non
      necessario.
    pt: Literalmente 'Falar é prata, calar é ouro'. Sugere que o silêncio é mais valioso do que falar,
      muitas vezes implicando que é melhor ficar quieto do que dizer algo desnecessário.
    ru: Буквально «Речь — серебро, молчание — золото». Предполагает, что молчание ценнее разговора, часто
      подразумевая, что лучше промолчать, чем сказать что-то лишнее.
    ja: 直訳すると「話すことは銀、黙ることは金」。沈黙は話すことよりも価値があることを示唆しており、不要なことを言うよりも黙っている方が良いという意味がしばしば含まれています。
    zh: 字面意思是“说话是银，沉默是金”。它暗示沉默比说话更有价值，通常意味着保持安静比说一些不必要的话更好。
    ar: حرفياً 'الكلام فضة، والسكوت ذهب'. يشير إلى أن الصمت أكثر قيمة من الكلام، وغالباً ما يعني أنه من
      الأفضل التزام الصمت بدلاً من قول شيء غير ضروري.
    he: תרגום מילולי 'דיבור הוא כסף, שתיקה היא זהב'. מציע ששתיקה יקרה יותר מדיבור, לעתים קרובות מרמז שעדיף
      לשתוק מאשר לומר משהו מיותר.
