- id: de_proverb_tradition_wie_man_in_den_wald_hineinruft_so_schallt_es_heraus_b443b116
  language: de
  canonical_reference: Wie man in den Wald hineinruft, so schallt es heraus
  reference_type: proverb_tradition
  surface_patterns:
  - Wie man in den Wald hineinruft, so schallt es heraus
  - Wie man in den Wald hineinruft...
  - Es schallt heraus, wie man hineinruft
  short_explanation: This proverb means that the way you treat others will be returned to you; actions
    have consequences. It is often used to emphasize reciprocity or karma in social interactions.
  i18n_explanations:
    en: This proverb means that the way you treat others will be returned to you; actions have consequences.
      It is often used to emphasize reciprocity or karma in social interactions.
    es: Este proverbio significa que la forma en que tratas a los demás te será devuelta; las acciones
      tienen consecuencias. A menudo se usa para enfatizar la reciprocidad o el karma en las interacciones
      sociales.
    fr: Ce proverbe signifie que la façon dont vous traitez les autres vous sera rendue ; les actions
      ont des conséquences. Il est souvent utilisé pour souligner la réciprocité ou le karma dans les
      interactions sociales.
    de: Dieses Sprichwort bedeutet, dass die Art und Weise, wie du andere behandelst, zu dir zurückkommt;
      Handlungen haben Konsequenzen. Es wird oft verwendet, um Gegenseitigkeit oder Karma in sozialen
      Interaktionen zu betonen.
    it: Questo proverbio significa che il modo in cui tratti gli altri ti verrà restituito; le azioni
      hanno conseguenze. Viene spesso usato per enfatizzare la reciprocità o il karma nelle interazioni
      sociali.
    pt: Este provérbio significa que a maneira como você trata os outros será retornada a você; as ações
      têm consequências. É frequentemente usado para enfatizar a reciprocidade ou o karma nas interações
      sociais.
    ru: Эта пословица означает, что то, как вы относитесь к другим, вернется к вам; действия имеют последствия.
      Часто используется для подчеркивания взаимности или кармы в социальных взаимодействиях.
    ja: このことわざは、他人に対する扱い方が自分に返ってくるという意味で、行動には結果が伴うことを示します。社会的な相互関係やカルマを強調する際によく使われます。
    zh: 这句谚语的意思是，你对待他人的方式会回报到你身上；行动都有后果。常用于强调社交中的互惠或因果报应。
    ar: هذا المثل يعني أن الطريقة التي تعامل بها الآخرين ستعود إليك؛ الأفعال لها عواقب. وغالبًا ما يُستخدم
      للتأكيد على المعاملة بالمثل أو الكارما في التفاعلات الاجتماعية.
    he: הפתגם הזה אומר שהדרך שבה אתה מתייחס לאחרים תחזור אליך; למעשים יש השלכות. הוא משמש לעתים קרובות
      כדי להדגיש הדדיות או קארמה באינטראקציות חברתיות.
