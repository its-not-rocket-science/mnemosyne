    pt: Latim para 'a sorte está lançada', atribuído a Júlio César ao cruzar o Rubicão, indicando um ponto
      sem retorno. Usado para sinalizar que uma decisão irreversível foi tomada.
    ru: Латинское выражение, означающее 'жребий брошен', приписываемое Юлию Цезарю при переходе через
