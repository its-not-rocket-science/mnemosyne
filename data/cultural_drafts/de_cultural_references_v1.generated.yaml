- id: de_proverb_tradition_wer_zuerst_kommt_mahlt_zuerst_d2eeefd1
  language: de
  canonical_reference: Wer zuerst kommt, mahlt zuerst
  reference_type: proverb_tradition
  surface_patterns:
  - Wer zuerst kommt, mahlt zuerst
  - Wer zuerst kommt, mahlt zuerst (first come, first served)
  - Der zuerst kommt, mahlt zuerst
  short_explanation: 'Equivalent to ''First come, first served.'' Originally from milling: the first to
    arrive gets his grain ground first. Emphasizes priority based on order of arrival.'
  i18n_explanations:
    en: 'Equivalent to ''First come, first served.'' Originally from milling: the first to arrive gets
      his grain ground first. Emphasizes priority based on order of arrival.'
    es: 'Equivalente a ''El primero en llegar, primero en ser servido''. Originalmente de la molienda:
      el primero en llegar muele su grano primero. Enfatiza la prioridad según el orden de llegada.'
    fr: 'Équivalent de ''Premier arrivé, premier servi''. À l''origine de la meunerie : le premier arrivé
      fait moudre son grain en premier. Met l''accent sur la priorité basée sur l''ordre d''arrivée.'
    de: 'Entspricht dem Grundsatz ''Wer zuerst kommt, mahlt zuerst''. Ursprünglich aus dem Mühlenwesen:
      Der zuerst Ankommende lässt sein Getreide zuerst mahlen. Betont die Priorität nach der Reihenfolge
      des Eintreffens.'
    it: 'Equivalente a ''Prima arriva, prima serve''. Originariamente dalla macinazione: il primo ad arrivare
      fa macinare il suo grano per primo. Sottolinea la priorità in base all''ordine di arrivo.'
    pt: 'Equivalente a ''Quem chega primeiro, é servido primeiro''. Originalmente da moagem: o primeiro
      a chegar tem seu grão moído primeiro. Enfatiza a prioridade com base na ordem de chegada.'
    ru: 'Эквивалент пословицы «Кто первый пришел, того первого и обслужили». Первоначально из мукомольного
      дела: пришедший первым мелет свое зерно первым. Подчеркивает приоритет на основе порядка прибытия.'
    ja: 「早い者勝ち」に相当します。元々は製粉業から来ており、最初に到着した人が最初に穀物を挽きます。到着順に基づく優先順位を強調しています。
    zh: 相当于“先到先得”。最初来自磨坊：先到的人先磨谷物。强调按到达顺序优先。
    ar: 'مكافئ لـ ''الأول يأتي، الأول يُخدم''. أصلاً من الطحن: أول من يصل يطحن حبّه أولاً. يؤكد على الأولوية
      بناءً على ترتيب الوصول.'
    he: 'מקביל ל''כל הקודם זוכה''. במקור מהטחינה: הראשון שמגיע טוחן את התבואה שלו ראשון. מדגיש עדיפות
      לפי סדר ההגעה.'
