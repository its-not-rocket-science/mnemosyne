      im Pfeffer zu finden bedeutete, den entscheidenden Punkt zu finden.
    it: Questa espressione significa 'questo è il nocciolo della questione' o 'lì sta la difficoltà'.
      Ha origine nella caccia, dove il pepe veniva usato per mascherare l'odore della lepre; trovare la
      lepre nel pepe significava trovare il punto chiave.
    pt: Esta expressão significa 'esse é o cerne da questão' ou 'aí reside a dificuldade'. Origina-se
