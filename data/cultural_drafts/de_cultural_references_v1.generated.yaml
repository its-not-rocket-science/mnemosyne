- id: de_classical_or_scriptural_allusion_der_brennende_dornbusch_14527acc
  language: de
  canonical_reference: Der brennende Dornbusch
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - der brennende Dornbusch
  - brennender Dornbusch
  short_explanation: This phrase refers to the burning bush from Exodus 3:2, which burned but was not
    consumed, and from which God spoke to Moses. It symbolizes divine presence and revelation.
  i18n_explanations:
    en: This phrase refers to the burning bush from Exodus 3:2, which burned but was not consumed, and
      from which God spoke to Moses. It symbolizes divine presence and revelation.
    es: Esta frase se refiere a la zarza ardiente de Éxodo 3:2, que ardía pero no se consumía, y desde
      la cual Dios habló a Moisés. Simboliza la presencia divina y la revelación.
    fr: Cette expression fait référence au buisson ardent d'Exode 3:2, qui brûlait sans se consumer et
      duquel Dieu parla à Moïse. Il symbolise la présence divine et la révélation.
    de: Diese Redewendung bezieht sich auf den brennenden Dornbusch aus Exodus 3:2, der brannte, aber
      nicht verbrannte und aus dem Gott zu Mose sprach. Er symbolisiert göttliche Gegenwart und Offenbarung.
    it: Questa frase si riferisce al roveto ardente di Esodo 3:2, che bruciava ma non si consumava, e
      dal quale Dio parlò a Mosè. Simboleggia la presenza divina e la rivelazione.
    pt: Essa frase se refere à sarça ardente de Êxodo 3:2, que ardia mas não se consumia, e da qual Deus
      falou a Moisés. Simboliza a presença divina e a revelação.
    ru: Эта фраза относится к неопалимой купине из Исхода 3:2, которая горела, но не сгорала, и из которой
      Бог говорил с Моисеем. Она символизирует божественное присутствие и откровение.
    ja: このフレーズは出エジプト記3章2節の燃える柴を指し、燃えても焼け尽きず、神がモーセに語りかけました。神の臨在と啓示を象徴します。
    zh: 这个短语指出埃及记3:2中的燃烧的荆棘，它烧着却没有烧毁，上帝从荆棘中向摩西说话。它象征着神的同在和对人的启示。
    ar: تشير هذه العبارة إلى العليقة المشتعلة من سفر الخروج 3:2، التي كانت تحترق لكنها لا تلتهم، والتي
      تكلم الله منها إلى موسى. ترمز إلى الحضور الإلهي والوحي.
    he: ביטוי זה מתייחס לסנה הבוער משמות ג', 2, אשר בער ולא אכל, ומתוכו דיבר אלוהים אל משה. הוא מסמל נוכחות
      אלוהית והתגלות.
