  i18n_explanations:
    en: This proverb advises sticking to one's area of expertise, originating from a story about the painter
      Apelles and a shoemaker. It is equivalent to 'Stick to your last'.
    es: Este proverbio aconseja ceñirse a la propia área de especialización, originado en una historia
      sobre el pintor Apeles y un zapatero. Es el equivalente de 'Zapatero, a tus zapatos'.
    fr: Ce proverbe conseille de s'en tenir à son domaine d'expertise, originaire d'une histoire sur le
      peintre Apelle et un cordonnier. C'est l'équivalent de 'Cordonnier, tiens-toi à ta chaussure'.
    de: Dieses Sprichwort rät, sich an seinen eigenen Fachbereich zu halten, stammt aus einer Geschichte
      über den Maler Apelles und einen Schuster. Es ist das Äquivalent zu 'Schuster, bleib bei deinen
