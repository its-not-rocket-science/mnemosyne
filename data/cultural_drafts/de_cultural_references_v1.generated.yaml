- id: de_literary_reference_die_axt_im_haus_erspart_den_zimmermann_715f4039
  language: de
  canonical_reference: Die Axt im Haus erspart den Zimmermann
  reference_type: literary_reference
  surface_patterns:
  - Die Axt im Haus erspart den Zimmermann
  - Die Axt im Hause erspart den Zimmermann
  - Eine Axt im Haus erspart den Zimmermann
  short_explanation: From Schiller's Wilhelm Tell, spoken by Tell when he refuses to bow to the hat on
    a pole. It means that being self-reliant and prepared saves you from having to depend on others. A
    German proverb.
  i18n_explanations:
    en: From Schiller's Wilhelm Tell, spoken by Tell when he refuses to bow to the hat on a pole. It means
      that being self-reliant and prepared saves you from having to depend on others. A German proverb.
    es: Del Guillermo Tell de Schiller, dicho por Tell cuando se niega a inclinarse ante el sombrero en
      un poste. Significa que ser autosuficiente y estar preparado te evita tener que depender de otros.
      Un proverbio alemán.
    fr: Du Guillaume Tell de Schiller, dit par Tell lorsqu'il refuse de s'incliner devant le chapeau sur
      un poteau. Cela signifie qu'être autonome et préparé vous évite de devoir dépendre des autres. Un
      proverbe allemand.
    de: Aus Schillers Wilhelm Tell, gesprochen von Tell, als er sich weigert, vor dem Hut auf der Stange
      zu verbeugen. Es bedeutet, dass Selbstständigkeit und Vorbereitung einen davor bewahren, von anderen
      abhängig zu sein. Ein deutsches Sprichwort.
    it: Dal Guglielmo Tell di Schiller, detto da Tell quando rifiuta di inchinarsi al cappello su un palo.
      Significa che essere autosufficienti e preparati ti evita di dover dipendere dagli altri. Un proverbio
      tedesco.
    pt: Do Guilherme Tell de Schiller, dito por Tell quando se recusa a se curvar ao chapéu em uma haste.
      Significa que ser autossuficiente e preparado evita ter que depender dos outros. Um provérbio alemão.
    ru: Из «Вильгельма Телля» Шиллера, сказано Теллем, когда он отказывается кланяться шляпе на шесте.
      Означает, что самостоятельность и подготовленность избавляют от необходимости зависеть от других.
      Немецкая пословица.
    ja: シラー『ヴィルヘルム・テル』より、テルが竿の上の帽子にお辞儀を拒否した時の言葉。自立して備えがあれば他人に頼らずに済むという意味。ドイツの諺。
    zh: 出自席勒的《威廉·退尔》，退尔拒绝向杆上的帽子鞠躬时说的话。意为自力更生和做好准备能让你不必依赖他人。一句德国谚语。
    ar: من مسرحية شيلر "ويليام تيل"، قالها تيل عندما رفض الانحناء للقبعة على عمود. تعني أن الاعتماد على
      الذات والاستعداد يوفران عليك الاضطرار إلى الاعتماد على الآخرين. مثل ألماني.
    he: מתוך "וילהלם טל" של שילר, נאמר על ידי טל כאשר הוא מסרב להשתחוות לכובע על מוט. פירושו שהסתמכות
      עצמית ומוכנות חוסכות את הצורך להיות תלוי באחרים. פתגם גרמני.
