  - der Roman Buddenbrooks
  short_explanation: This is a novel by Thomas Mann, published in 1901, depicting the decline of a wealthy
    merchant family over several generations. It is considered a classic of German literature and won
    Mann the Nobel Prize in Literature.
  i18n_explanations:
    en: This is a novel by Thomas Mann, published in 1901, depicting the decline of a wealthy merchant
      family over several generations. It is considered a classic of German literature and won Mann the
      Nobel Prize in Literature.
