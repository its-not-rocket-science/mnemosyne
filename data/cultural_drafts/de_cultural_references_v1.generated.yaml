    fr: Ce proverbe allemand signifie qu'une personne qui a eu une mauvaise expérience sera prudente pour
      l'éviter à nouveau. C'est l'équivalent de 'Chat échaudé craint l'eau froide'.
    de: Dieses deutsche Sprichwort bedeutet, dass eine Person, die eine schlechte Erfahrung gemacht hat,
