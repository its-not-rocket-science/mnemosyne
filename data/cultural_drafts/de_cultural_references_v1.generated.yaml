- id: de_classical_or_scriptural_allusion_die_sisyphusarbeit_3489fbbd
  language: de
  canonical_reference: Die Sisyphusarbeit
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Sisyphusarbeit
  - die Sisyphusarbeit
  - eine Sisyphusarbeit
  - Sisyphus-Arbeit
  short_explanation: Describes a task that is endless and futile, like the myth of Sisyphus who was condemned
    to roll a boulder up a hill only to have it roll back down.
  i18n_explanations:
    en: Describes a task that is endless and futile, like the myth of Sisyphus who was condemned to roll
      a boulder up a hill only to have it roll back down.
    es: Describe una tarea que es interminable y fútil, como el mito de Sísifo, que fue condenado a hacer
      rodar una roca cuesta arriba solo para que volviera a caer.
    fr: Décrit une tâche sans fin et vaine, comme le mythe de Sisyphe condamné à rouler un rocher en haut
      d'une colline pour le voir redescendre.
    de: Beschreibt eine endlose und sinnlose Aufgabe, ähnlich dem Mythos des Sisyphos, der dazu verdammt
      war, einen Felsen einen Berg hochzurollen, nur damit er wieder herunterrollt.
    it: Descrive un compito infinito e futile, come il mito di Sisifo condannato a far rotolare un masso
      su per una collina solo per vederlo rotolare giù.
    pt: Descreve uma tarefa interminável e fútil, como o mito de Sísifo, condenado a rolar uma pedra morro
      acima apenas para vê-la rolar de volta.
    ru: Описывает бесконечное и бесполезное занятие, подобно мифу о Сизифе, который был осужден вкатывать
      камень на гору, откуда он снова скатывался вниз.
    ja: 終わりのない無駄な作業を指す。シーシュポスの神話に由来し、彼は岩を丘の上に押し上げるが、また転がり落ちるという罰を受けた。
    zh: 描述一项无尽且徒劳的任务，就像西西弗斯的神话，他被罚将一块巨石推上山，但石头总会滚回山下。
    ar: يصف مهمة لا نهاية لها ولا جدوى منها، مثل أسطورة سيزيف الذي حكم عليه بدحرجة صخرة إلى أعلى التل
