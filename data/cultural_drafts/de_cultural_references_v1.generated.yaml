- id: de_classical_or_scriptural_allusion_der_elektrakomplex_f29b8f04
  language: de
  canonical_reference: Der Elektrakomplex
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Elektrakomplex
  - elektra Komplex
  short_explanation: A psychoanalytic concept by Sigmund Freud, parallel to the Oedipus complex in girls,
    based on the Greek myth of Electra, who sought her father's love and rivaled her mother. It describes
    female psychosexual development.
  i18n_explanations:
    en: A psychoanalytic concept by Sigmund Freud, parallel to the Oedipus complex in girls, based on
      the Greek myth of Electra, who sought her father's love and rivaled her mother. It describes female
      psychosexual development.
    es: Un concepto psicoanalítico de Sigmund Freud, paralelo al complejo de Edipo en las niñas, basado
      en el mito griego de Electra, que buscaba el amor de su padre y rivalizaba con su madre. Describe
      el desarrollo psicosexual femenino.
    fr: Un concept psychanalytique de Sigmund Freud, parallèle au complexe d'Œdipe chez les filles, basé
      sur le mythe grec d'Électre, qui recherchait l'amour de son père et rivalisait avec sa mère. Il
      décrit le développement psychosexuel féminin.
    de: Ein psychoanalytisches Konzept von Sigmund Freud, parallel zum Ödipuskomplex bei Mädchen, basierend
      auf dem griechischen Mythos der Elektra, die die Liebe ihres Vaters suchte und mit ihrer Mutter
      rivalisierte. Es beschreibt die weibliche psychosexuelle Entwicklung.
    it: Un concetto psicoanalitico di Sigmund Freud, parallelo al complesso di Edipo nelle bambine, basato
      sul mito greco di Elettra, che cercava l'amore di suo padre e rivaleggiava con sua madre. Descrive
      lo sviluppo psicosessuale femminile.
    pt: Um conceito psicanalítico de Sigmund Freud, paralelo ao complexo de Édipo em meninas, baseado
      no mito grego de Electra, que buscava o amor de seu pai e rivalizava com sua mãe. Descreve o desenvolvimento
      psicossexual feminino.
    ru: Психоаналитическое понятие Зигмунда Фрейда, параллельное эдипову комплексу у девочек, основанное
      на греческом мифе об Электре, которая искала любви отца и соперничала с матерью. Описывает женское
      психосексуальное развитие.
    ja: ジークムント・フロイトによる精神分析概念で、女児におけるエディプスコンプレックスに相当し、ギリシャ神話のエレクトラに基づきます。エレクトラは父の愛を求め、母と競いました。女性的な心理性的発達を説明します。
    zh: 西格蒙德·弗洛伊德的精神分析概念，相当于女孩的俄狄浦斯情结，基于希腊神话中厄勒克特拉寻求父亲的爱并嫉妒母亲的故事。描述女性心理性发展。
    ar: مفهوم تحليلي نفسي لسيغموند فرويد، موازٍ لعقدة أوديب لدى الفتيات، استنادًا إلى الأسطورة اليونانية
