    a cunning trick that leads to downfall.
  i18n_explanations:
    en: Refers to the deceptive wooden horse used by the Greeks to infiltrate Troy, symbolizing a cunning
      trick that leads to downfall.
    es: Se refiere al caballo de madera engañoso utilizado por los griegos para infiltrarse en Troya,
      simbolizando un truco astuto que lleva a la ruina.
    fr: Fait référence au cheval de bois trompeur utilisé par les Grecs pour s'infiltrer dans Troie, symbolisant
      une ruse qui mène à la chute.
    de: Bezieht sich auf das trügerische hölzerne Pferd, das die Griechen nutzten, um in Troja einzudringen,
      und symbolisiert einen listigen Trick, der zum Untergang führt.
    it: Si riferisce al cavallo di legno ingannevole usato dai Greci per infiltrarsi a Troia, simboleggiando
      un astuto inganno che porta alla rovina.
    pt: Refere-se ao cavalo de madeira enganoso usado pelos gregos para se infiltrar em Troia, simbolizando
      um truque astuto que leva à ruína.
    ru: Относится к обманному деревянному коню, использованному греками для проникновения в Трою, символизируя
      хитрую уловку, ведущую к краху.
    ja: トロイに侵入するためにギリシャ人が使った欺瞞の木馬を指し、狡猾な策略が破滅を招くことを象徴する。
    zh: 指希腊人用来潜入特洛伊的诡计木马，象征着导致覆灭的狡猾伎俩。
    ar: يشير إلى الحصان الخشبي المخادع الذي استخدمه اليونانيون للتسلل إلى طروادة، ويرمز إلى خدعة ماكرة
