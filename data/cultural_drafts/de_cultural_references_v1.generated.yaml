- id: de_literary_reference_biedermann_und_die_brandstifter_64550cb0
  language: de
  canonical_reference: Biedermann und die Brandstifter
  reference_type: literary_reference
  surface_patterns:
  - Biedermann und die Brandstifter
  - Die Brandstifter
  - Biedermann
  short_explanation: A play by Max Frisch that serves as an allegory for the rise of fascism, where the
    complacent bourgeois Biedermann allows arsonists to destroy his home despite warnings. It criticizes
    willful ignorance.
  i18n_explanations:
    en: A play by Max Frisch that serves as an allegory for the rise of fascism, where the complacent
      bourgeois Biedermann allows arsonists to destroy his home despite warnings. It criticizes willful
      ignorance.
    es: Una obra de Max Frisch que sirve como alegoría del ascenso del fascismo, donde el complaciente
      burgués Biedermann permite que los incendiarios destruyan su casa a pesar de las advertencias. Critica
      la ignorancia deliberada.
    fr: Une pièce de Max Frisch qui sert d'allégorie à la montée du fascisme, où le bourgeois complaisant
      Biedermann permet à des incendiaires de détruire sa maison malgré les avertissements. Elle critique
      l'ignorance volontaire.
    de: Ein Theaterstück von Max Frisch, das als Allegorie für den Aufstieg des Faschismus dient, in dem
      der selbstgefällige Bürger Biedermann trotz Warnungen Brandstiftern erlaubt, sein Haus zu zerstören.
      Es kritisiert bewusste Ignoranz.
    it: Un'opera teatrale di Max Frisch che funge da allegoria dell'ascesa del fascismo, in cui il compiacente
      borghese Biedermann permette agli incendiari di distruggere la sua casa nonostante gli avvertimenti.
      Critica l'ignoranza volontaria.
    pt: Uma peça de Max Frisch que serve como uma alegoria para a ascensão do fascismo, onde o burguês
      complacente Biedermann permite que incendiários destruam sua casa apesar dos avisos. Critica a ignorância
      intencional.
    ru: Пьеса Макса Фриша, которая служит аллегорией возвышения фашизма, где самоуспокоенный буржуа Бидерманн
