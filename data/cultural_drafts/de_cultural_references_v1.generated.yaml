- id: de_proverb_tradition_was_ein_häkchen_werden_will_krümmt_sich_beizeiten_ebb6527b
  language: de
  canonical_reference: Was ein Häkchen werden will, krümmt sich beizeiten
  reference_type: proverb_tradition
  surface_patterns:
  - Was ein Häkchen werden will, krümmt sich beizeiten
  - Ein Häkchen, das werden will, krümmt sich beizeiten
  - Wer ein Häkchen werden will, krümmt sich beizeiten
  short_explanation: This proverb means that to achieve something, one must start preparing early and
    adapt oneself accordingly. It emphasizes the importance of early preparation and discipline.
  i18n_explanations:
    en: This proverb means that to achieve something, one must start preparing early and adapt oneself
      accordingly. It emphasizes the importance of early preparation and discipline.
    es: Este proverbio significa que para lograr algo, uno debe comenzar a prepararse temprano y adaptarse
      en consecuencia. Enfatiza la importancia de la preparación temprana y la disciplina.
    fr: Ce proverbe signifie que pour accomplir quelque chose, il faut commencer à se préparer tôt et
      s'adapter en conséquence. Il souligne l'importance de la préparation précoce et de la discipline.
    de: Dieses Sprichwort bedeutet, dass man, um etwas zu erreichen, frühzeitig mit der Vorbereitung beginnen
      und sich entsprechend anpassen muss. Es betont die Bedeutung früher Vorbereitung und Disziplin.
    it: Questo proverbio significa che per ottenere qualcosa, bisogna iniziare a prepararsi presto e adattarsi
      di conseguenza. Sottolinea l'importanza della preparazione precoce e della disciplina.
    pt: Este provérbio significa que para alcançar algo, deve-se começar a preparar-se cedo e adaptar-se
      de acordo. Enfatiza a importância da preparação precoce e da disciplina.
    ru: Эта пословица означает, что для достижения чего-либо нужно начинать готовиться заранее и соответствующим
      образом адаптироваться. Она подчеркивает важность ранней подготовки и дисциплины.
    ja: このことわざは、何かを成し遂げるためには早いうちから準備を始め、それに応じて自分を適応させる必要があるという意味です。早期の準備と規律の重要性を強調しています。
    zh: 这句谚语的意思是，要达成某件事，就必须及早开始准备并相应调整自己。它强调了早期准备和纪律的重要性。
    ar: يعني هذا المثل أنه لتحقيق شيء ما، يجب البدء في التحضير مبكرًا والتكيف وفقًا لذلك. ويؤكد على أهمية
      التحضير المبكر والانضباط.
    he: פתגם זה אומר שכדי להשיג משהו, יש להתחיל בהכנה מוקדמת ולהסתגל בהתאם. הוא מדגיש את חשיבות ההכנה
      המוקדמת והמשמעת.
