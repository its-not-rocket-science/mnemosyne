    ja: これはトーマス・マンの小説で、1901年に出版され、裕福な商人一家の数世代にわたる衰退を描いています。ドイツ文学の古典とされ、マンにノーベル文学賞をもたらしました。
    zh: 这是托马斯·曼的小说，出版于1901年，描绘了一个富裕商人家族数代人的衰落。它被认为是德国文学的经典之作，并为曼赢得了诺贝尔文学奖。
    ar: هذه رواية لتوماس مان، نُشرت عام 1901، تصور انحدار عائلة تجارية ثرية على مدى عدة أجيال. تُعتبر
