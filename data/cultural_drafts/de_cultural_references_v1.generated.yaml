- id: de_classical_or_scriptural_allusion_das_land_wo_milch_und_honig_fliesst_43d62f8e
  language: de
  canonical_reference: Das Land, wo Milch und Honig fließt
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - das Land, wo Milch und Honig fließt
  - ein Land, in dem Milch und Honig fließen
  - Milch und Honig
  short_explanation: This phrase describes a place of abundance and prosperity, literally 'the land flowing
    with milk and honey'. It appears multiple times in the Old Testament, e.g., Exodus 3:8, as a description
    of the Promised Land.
  i18n_explanations:
    en: This phrase describes a place of abundance and prosperity, literally 'the land flowing with milk
      and honey'. It appears multiple times in the Old Testament, e.g., Exodus 3:8, as a description of
      the Promised Land.
    es: Esta frase describe un lugar de abundancia y prosperidad, literalmente 'la tierra que fluye leche
      y miel'. Aparece varias veces en el Antiguo Testamento, por ejemplo, Éxodo 3:8, como descripción
      de la Tierra Prometida.
    fr: Cette expression décrit un lieu d'abondance et de prospérité, littéralement 'la terre où coulent
      le lait et le miel'. Elle apparaît plusieurs fois dans l'Ancien Testament, par exemple, Exode 3:8,
      comme description de la Terre Promise.
    de: Diese Redewendung beschreibt einen Ort des Überflusses und Wohlstands, wörtlich 'das Land, in
      dem Milch und Honig fließen'. Sie kommt mehrmals im Alten Testament vor, z.B. Exodus 3:8, als Beschreibung
      des Gelobten Landes.
    it: Questa frase descrive un luogo di abbondanza e prosperità, letteralmente 'la terra dove scorrono
      latte e miele'. Appare più volte nell'Antico Testamento, ad esempio, Esodo 3:8, come descrizione
      della Terra Promessa.
    pt: Essa frase descreve um lugar de abundância e prosperidade, literalmente 'a terra que mana leite
      e mel'. Aparece várias vezes no Antigo Testamento, por exemplo, Êxodo 3:8, como descrição da Terra
      Prometida.
    ru: Эта фраза описывает место изобилия и процветания, буквально 'земля, где течет молоко и мед'. Она
      встречается несколько раз в Ветхом Завете, например, Исход 3:8, как описание Земли Обетованной.
    ja: このフレーズは豊かさと繁栄の地を表し、文字通りには『乳と蜜の流れる地』です。旧約聖書に何度も登場し、例えば出エジプト記3章8節で約束の地の描写として使われています。
    zh: 这个短语描述了一个富足繁荣的地方，字面意思是'流奶与蜜之地'。它多次出现在旧约圣经中，例如出埃及记3:8，作为应许之地的描述。
    ar: تصف هذه العبارة مكانًا للوفرة والازدهار، حرفيًا 'الأرض التي تفيض لبناً وعسلاً'. تظهر عدة مرات
      في العهد القديم، على سبيل المثال، سفر الخروج 3:8، كوصف لأرض الميعاد.
    he: ביטוי זה מתאר מקום של שפע ושגשוג, פשוטו כמשמעו 'ארץ זבת חלב ודבש'. הוא מופיע מספר פעמים בתנ"ך,
