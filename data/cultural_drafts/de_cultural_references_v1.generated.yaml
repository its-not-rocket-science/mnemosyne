  short_explanation: Refers to the extremely filthy stables of King Augeas, cleaned by Hercules as one
    of his labours; used for any situation that is deeply corrupt or neglected.
  i18n_explanations:
    en: Refers to the extremely filthy stables of King Augeas, cleaned by Hercules as one of his labours;
      used for any situation that is deeply corrupt or neglected.
    es: Se refiere a los establos extremadamente sucios del rey Augías, limpiados por Hércules como uno
      de sus trabajos; se usa para cualquier situación profundamente corrupta o descuidada.
    fr: Fait référence aux écuries extrêmement sales du roi Augias, nettoyées par Hercule comme l'un de
      ses travaux ; utilisé pour toute situation profondément corrompue ou négligée.
    de: Bezieht sich auf die äußerst schmutzigen Ställe des Königs Augias, die Herkules als eine seiner
      Arbeiten reinigte; steht für jede zutiefst korrupte oder vernachlässigte Situation.
    it: Si riferisce alle stalle estremamente sporche del re Augia, pulite da Ercole come una delle sue
      fatiche; usato per qualsiasi situazione profondamente corrotta o trascurata.
    pt: Refere-se aos estábulos extremamente sujos do rei Augias, limpos por Hércules como um de seus
      trabalhos; usado para qualquer situação profundamente corrupta ou negligenciada.
    ru: Относится к чрезвычайно грязным конюшням царя Авгия, очищенным Гераклом как один из его подвигов;
      используется для любой ситуации, глубоко коррумпированной или запущенной.
    ja: アウゲイアス王の非常に汚い馬小屋を指し、ヘラクレスがその一つの功業として掃除した；深く腐敗した、または放置された状況に対して用いられる。
    zh: 指奥革阿斯国王极其肮脏的马厩，赫拉克勒斯将其清理作为一项任务；用于任何严重腐败或被忽视的境况。
    ar: يشير إلى إسطبلات الملك أوجياس شديدة القذارة، التي نظفها هرقل كأحد أعماله؛ يستخدم لأي حالة شديدة
