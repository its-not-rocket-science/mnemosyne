  short_explanation: Refers to the miraculous food God provided to the Israelites during their 40 years
    in the wilderness (Exodus 16). It symbolizes divine provision and is often used metaphorically for
    unexpected sustenance.
  i18n_explanations:
    en: Refers to the miraculous food God provided to the Israelites during their 40 years in the wilderness
      (Exodus 16). It symbolizes divine provision and is often used metaphorically for unexpected sustenance.
    es: Se refiere al alimento milagroso que Dios proporcionó a los israelitas durante sus 40 años en
      el desierto (Éxodo 16). Simboliza la provisión divina y se usa a menudo metafóricamente para referirse
      al sustento inesperado.
    fr: Fait référence à la nourriture miraculeuse que Dieu a fournie aux Israélites pendant leurs 40
      ans dans le désert (Exode 16). Elle symbolise la providence divine et est souvent utilisée métaphoriquement
      pour désigner une subsistance inattendue.
    de: Bezieht sich auf die wundersame Speise, die Gott den Israeliten während ihrer 40 Jahre in der
