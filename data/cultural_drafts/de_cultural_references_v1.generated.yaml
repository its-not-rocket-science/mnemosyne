- id: de_classical_or_scriptural_allusion_das_prokrustesbett_e4ac1893
  language: de
  canonical_reference: Das Prokrustesbett
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Prokrustesbett
  - das Prokrustesbett
  - ein Prokrustesbett
  - Prokrustesbett (Metapher)
  short_explanation: Refers to a situation where something is forced to conform to a standard, often violently.
    Derived from the Greek myth of Procrustes, who stretched or cut his victims to fit his bed.
  i18n_explanations:
    en: Refers to a situation where something is forced to conform to a standard, often violently. Derived
      from the Greek myth of Procrustes, who stretched or cut his victims to fit his bed.
    es: Se refiere a una situación en la que algo es forzado a ajustarse a un estándar, a menudo violentamente.
      Deriva del mito griego de Procusto, que estiraba o cortaba a sus víctimas para que encajaran en
      su cama.
    fr: Fait référence à une situation où quelque chose est contraint de se conformer à une norme, souvent
      violemment. Dérivé du mythe grec de Procrustée, qui étirait ou coupait ses victimes pour les adapter
      à son lit.
    de: Bezeichnet eine Situation, in der etwas gewaltsam an eine Norm angepasst wird. Abgeleitet vom
      griechischen Mythos des Prokrustes, der seine Opfer streckte oder verstümmelte, um sie in sein Bett
      zu pressen.
    it: Si riferisce a una situazione in cui qualcosa è costretto a conformarsi a uno standard, spesso
      violentemente. Derivato dal mito greco di Procuste, che allungava o tagliava le sue vittime per
      adattarle al suo letto.
    pt: Refere-se a uma situação em que algo é forçado a se conformar a um padrão, frequentemente de forma
      violenta. Derivado do mito grego de Procrustes, que esticava ou cortava suas vítimas para caberem
      em sua cama.
    ru: Относится к ситуации, когда что-то насильно приводят к единому стандарту. Происходит от греческого
      мифа о Прокрусте, который растягивал или обрубал свои жертвы, чтобы они подошли к его кровати.
    ja: 何かが強制的に基準に合わせられる状況を指す。ギリシャ神話のプロクラステスが被害者を自分のベッドに合わせるために引き伸ばしたり切断したりしたことに由来する。
    zh: 指某种事物被强行要求符合某一标准，往往带有暴力性。源自希腊神话中普洛克路斯忒斯的故事，他为了让人躺在他的床上而拉伸或砍断受害者的身体。
    ar: يشير إلى موقف يُجبر فيه شيء ما على الامتثال لمعيار، غالبًا بعنف. مشتق من الأسطورة اليونانية عن
      بروكريستس، الذي كان يمد أو يقطع ضحاياه لتناسب سريره.
    he: מתייחס למצב שבו כופים על משהו להתאים לתקן, לעתים באלימות. מקורו במיתוס היווני על פרוקרוסטס, שמתח
      או חתך את קורבנותיו כדי שיתאימו למיטתו.
