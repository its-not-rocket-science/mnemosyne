- id: de_proverb_tradition_den_bock_zum_gärtner_machen_54360123
  language: de
  canonical_reference: Den Bock zum Gärtner machen
  reference_type: proverb_tradition
  surface_patterns:
  - Den Bock zum Gärtner machen
  short_explanation: This idiom means to put someone in a position where they are likely to abuse their
    power or act against the interests of the task, implying a poor choice of person for a responsible
    role.
  i18n_explanations:
    en: This idiom means to put someone in a position where they are likely to abuse their power or act
      against the interests of the task, implying a poor choice of person for a responsible role.
    es: Esta expresión significa poner a alguien en una posición en la que es probable que abuse de su
      poder o actúe en contra de los intereses de la tarea, implicando una mala elección de persona para
      un rol responsable.
    fr: Cette expression signifie placer quelqu'un dans une position où il est susceptible d'abuser de
      son pouvoir ou d'agir contre les intérêts de la tâche, impliquant un mauvais choix de personne pour
      un rôle responsable.
    de: Diese Redewendung bedeutet, jemanden in eine Position zu bringen, in der er wahrscheinlich seine
      Macht missbraucht oder gegen die Interessen der Aufgabe handelt, was eine schlechte Wahl einer Person
      für eine verantwortungsvolle Rolle impliziert.
    it: Questa espressione significa mettere qualcuno in una posizione in cui è probabile che abusi del
      proprio potere o agisca contro gli interessi del compito, implicando una scelta sbagliata di persona
      per un ruolo responsabile.
    pt: Esta expressão significa colocar alguém em uma posição onde é provável que abuse de seu poder
      ou aja contra os interesses da tarefa, implicando uma má escolha de pessoa para um papel responsável.
    ru: Эта идиома означает поставить кого-то в положение, где он, вероятно, злоупотребит своей властью
      или будет действовать против интересов задачи, подразумевая плохой выбор человека для ответственной
      роли.
    ja: この慣用句は、誰かをその権力を乱用したり、任務の利益に反して行動したりする可能性が高い立場に置くことを意味し、責任ある役割に不適切な人を選ぶことを暗示します。
    zh: 这个习语的意思是让某人处于可能滥用权力或违背任务利益的位置，暗示为责任角色选择了错误的人。
    ar: يعني هذا التعبير وضع شخص ما في منصب يحتمل فيه إساءة استخدام سلطته أو العمل ضد مصالح المهمة، مما
      يشير إلى سوء اختيار الشخص لدور مسؤول.
    he: ביטוי זה אומר להעמיד מישהו בעמדה שבה הוא עלול לנצל לרעה את כוחו או לפעול נגד האינטרסים של המשימה,
