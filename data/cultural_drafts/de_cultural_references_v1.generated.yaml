- id: de_classical_or_scriptural_allusion_die_zehn_plagen_ceb755d8
  language: de
  canonical_reference: Die zehn Plagen
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - die zehn Plagen
  - die zehn ägyptischen Plagen
  - die Plagen Ägyptens
  short_explanation: Refers to the ten disasters God inflicted on Egypt to compel Pharaoh to free the
    Israelites (Exodus 7-12). In German culture, it is used to describe a series of severe calamities.
  i18n_explanations:
    en: Refers to the ten disasters God inflicted on Egypt to compel Pharaoh to free the Israelites (Exodus
      7-12). In German culture, it is used to describe a series of severe calamities.
    es: Se refiere a las diez plagas que Dios infligió a Egipto para obligar al Faraón a liberar a los
      israelitas (Éxodo 7-12). En la cultura alemana, se utiliza para describir una serie de calamidades
      graves.
    fr: Fait référence aux dix plaies que Dieu a infligées à l'Égypte pour contraindre Pharaon à libérer
      les Israélites (Exode 7-12). Dans la culture allemande, on l'emploie pour décrire une série de calamités
      sévères.
    de: Bezieht sich auf die zehn Plagen, die Gott über Ägypten brachte, um den Pharao zu zwingen, die
      Israeliten freizulassen (Exodus 7-12). In der deutschen Kultur wird es verwendet, um eine Reihe
      schwerer Katastrophen zu beschreiben.
    it: Si riferisce alle dieci piaghe che Dio inflisse all'Egitto per costringere il Faraone a liberare
      gli israeliti (Esodo 7-12). Nella cultura tedesca, è usato per descrivere una serie di gravi calamità.
    pt: Refere-se às dez pragas que Deus infligiu ao Egito para obrigar o Faraó a libertar os israelitas
      (Êxodo 7-12). Na cultura alemã, é usado para descrever uma série de calamidades graves.
    ru: Относится к десяти казням, которые Бог наслал на Египет, чтобы заставить фараона отпустить израильтян
