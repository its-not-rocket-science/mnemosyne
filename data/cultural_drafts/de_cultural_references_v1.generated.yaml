    en: A German proverb meaning 'Those who love each other tease each other.' It reflects the belief
      that playful teasing is a sign of affection.
    es: Un proverbio alemán que significa 'Los que se aman se molestan mutuamente.' Refleja la creencia
      de que las bromas juguetonas son una señal de afecto.
    fr: Un proverbe allemand signifiant 'Ceux qui s'aiment se taquinent.' Il reflète la croyance que les
      taquineries espiègles sont un signe d'affection.
    de: 'Ein deutsches Sprichwort, das bedeutet: ''Die sich lieben, necken sich.'' Es spiegelt die Überzeugung
      wider, dass spielerisches Necken ein Zeichen von Zuneigung ist.'
    it: Un proverbio tedesco che significa 'Chi si ama si prende in giro.' Riflette la convinzione che
      le prese in giro scherzose siano un segno di affetto.
    pt: Um provérbio alemão que significa 'Aqueles que se amam provocam uns aos outros.' Reflete a crença
      de que as provocações brincalhonas são um sinal de afeto.
    ru: 'Немецкая пословица, означающая: «Те, кто любят друг друга, дразнят друг друга». Она отражает
