  short_explanation: The Peace of Augsburg (1555) established the principle 'cuius regio, eius religio'
    in the Holy Roman Empire, allowing rulers to determine the religion of their territory.
  i18n_explanations:
    en: The Peace of Augsburg (1555) established the principle 'cuius regio, eius religio' in the Holy
      Roman Empire, allowing rulers to determine the religion of their territory.
    es: La Paz de Augsburgo (1555) estableció el principio 'cuius regio, eius religio' en el Sacro Imperio
      Romano Germánico, permitiendo a los gobernantes determinar la religión de su territorio.
    fr: La paix d'Augsbourg (1555) a établi le principe « cuius regio, eius religio » dans le Saint-Empire
      romain germanique, permettant aux souverains de déterminer la religion de leur territoire.
    de: Der Augsburger Religionsfriede (1555) etablierte das Prinzip 'cuius regio, eius religio' im Heiligen
      Römischen Reich, das den Herrschern erlaubte, die Religion ihres Territoriums zu bestimmen.
    it: La pace di Augusta (1555) stabilì il principio 'cuius regio, eius religio' nel Sacro Romano Impero,
      permettendo ai sovrani di determinare la religione del loro territorio.
    pt: A Paz de Augsburgo (1555) estabeleceu o princípio 'cuius regio, eius religio' no Sacro Império
      Romano-Germânico, permitindo que os governantes determinassem a religião de seu território.
    ru: Аугсбургский мир (1555) установил принцип «cuius regio, eius religio» в Священной Римской империи,
      позволяя правителям определять религию своей территории.
    ja: アウクスブルクの宗教和約（1555年）は、神聖ローマ帝国において「cuius regio, eius religio」の原則を確立し、統治者が領土の宗教を決定することを認めた。
    zh: 《奥格斯堡宗教和约》（1555年）在神圣罗马帝国确立了“cuius regio, eius religio”原则，允许统治者决定其领土的宗教。
    ar: أسلم سلام أوغسبورغ (1555) مبدأ "cuius regio, eius religio" في الإمبراطورية الرومانية المقدسة،
      مما سمح للحكام بتحديد دين أراضيهم.
    he: שלום אאוגסבורג (1555) קבע את העיקרון "cuius regio, eius religio" באימפריה הרומית הקדושה, ואפשר
      לשליטים לקבוע את דת שטחם.
