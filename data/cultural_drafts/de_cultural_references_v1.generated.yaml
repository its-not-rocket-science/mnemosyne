- id: de_literary_reference_da_steh_ich_nun_ich_armer_tor_f0bfe2bf
  language: de
  canonical_reference: Da steh ich nun, ich armer Tor!
  reference_type: literary_reference
  surface_patterns:
  - Da steh ich nun, ich armer Tor
  - Da steht er nun, der arme Tor
  - Da steh' ich nun, ich armer Tor
  short_explanation: Spoken by Faust at the beginning of Goethe's Faust, expressing his frustration after
    realizing that despite all his studies, he knows no more than before. It has become a common phrase
    for someone who feels foolish or stuck.
  i18n_explanations:
    en: Spoken by Faust at the beginning of Goethe's Faust, expressing his frustration after realizing
      that despite all his studies, he knows no more than before. It has become a common phrase for someone
      who feels foolish or stuck.
    es: Dicho por Fausto al comienzo del Fausto de Goethe, expresando su frustración al darse cuenta de
      que, a pesar de todos sus estudios, no sabe más que antes. Se ha convertido en una frase común para
      alguien que se siente tonto o estancado.
    fr: Prononcé par Faust au début du Faust de Goethe, exprimant sa frustration après avoir réalisé que
      malgré toutes ses études, il n'en sait pas plus qu'avant. C'est devenu une expression courante pour
      quelqu'un qui se sent stupide ou coincé.
    de: '"Da steh ich nun, ich armer Tor!" ist der Beginn von Goethes Faust. Faust drückt seine Frustration
      aus, dass er trotz all seiner Studien nicht mehr weiß als zuvor. Der Satz ist zu einer gängigen
      Redewendung für jemanden, der sich töricht oder festgefahren fühlt.'
    it: Pronunciato da Faust all'inizio del Faust di Goethe, esprime la sua frustrazione dopo aver capito
      che nonostante tutti i suoi studi, non sa più di prima. È diventata una frase comune per qualcuno
      che si sente sciocco o bloccato.
    pt: Dito por Fausto no início do Fausto de Goethe, expressando sua frustração ao perceber que, apesar
      de todos os seus estudos, ele não sabe mais do que antes. Tornou-se uma frase comum para alguém
      que se sente tolo ou preso.
    ru: Произнесено Фаустом в начале «Фауста» Гёте, выражая его разочарование после осознания того, что,
      несмотря на все свои занятия, он знает не больше, чем раньше. Стало распространённой фразой для
      описания человека, чувствующего себя глупым или в тупике.
    ja: ゲーテ『ファウスト』の冒頭でファウストが発する言葉。あらゆる学問を究めたにもかかわらず、以前と変わらず何も知らないことに気づき、 frustration を表現している。愚かさや行き詰まりを感じる人に対する一般的な表現となっている。
    zh: 歌德《浮士德》开头浮士德说的话，表达了他的挫败感：尽管他研究了所有学问，但他并不比以前知道得更多。这已成为形容感到愚蠢或陷入困境的人的常用短语。
    ar: قالها فاوست في بداية مسرحية غوته "فاوست"، معبراً عن إحباطه بعد أن أدرك أنه رغم كل دراساته، لا
      يعرف أكثر من قبل. أصبحت عبارة شائعة لشخص يشعر بالغباء أو العجز.
    he: נאמר על ידי פאוסט בתחילת ה"פאוסט" של גתה, המבטא את תסכולו לאחר שהבין שלמרות כל לימודיו, הוא אינו
      יודע יותר מבעבר. הפך לביטוי נפוץ למי שמרגיש טיפש או תקוע.
