- id: de_proverb_tradition_man_sieht_den_wald_vor_lauter_bäumen_nicht_9cd9f033
  language: de
  canonical_reference: Man sieht den Wald vor lauter Bäumen nicht
  reference_type: proverb_tradition
  surface_patterns:
  - Man sieht den Wald vor lauter Bäumen nicht
  - Den Wald vor lauter Bäumen nicht sehen
  - Vor lauter Bäumen den Wald nicht sehen
  short_explanation: This proverb means that one is unable to see the bigger picture because of focusing
    too much on details. It is used to criticize an overly narrow perspective.
  i18n_explanations:
    en: This proverb means that one is unable to see the bigger picture because of focusing too much on
      details. It is used to criticize an overly narrow perspective.
    es: Este proverbio significa que uno es incapaz de ver el panorama general debido a centrarse demasiado
      en los detalles. Se utiliza para criticar una perspectiva demasiado estrecha.
    fr: Ce proverbe signifie que l'on est incapable de voir la situation dans son ensemble parce qu'on
      se concentre trop sur les détails. Il est utilisé pour critiquer une perspective trop étroite.
    de: Dieses Sprichwort bedeutet, dass man das große Ganze nicht sehen kann, weil man sich zu sehr auf
      Details konzentriert. Es wird verwendet, um eine zu enge Perspektive zu kritisieren.
    it: Questo proverbio significa che non si riesce a vedere il quadro generale perché ci si concentra
      troppo sui dettagli. È usato per criticare una prospettiva eccessivamente ristretta.
    pt: Este provérbio significa que não se consegue ver o quadro geral por focar demasiado nos detalhes.
      É usado para criticar uma perspectiva excessivamente estreita.
    ru: Эта пословица означает, что человек не может увидеть общую картину из-за слишком большого внимания
      к деталям. Используется для критики слишком узкого взгляда.
    ja: このことわざは、細部に集中しすぎて全体像が見えなくなることを意味します。狭い視野を批判するために使われます。
    zh: 这句谚语的意思是，由于过于关注细节，无法看到全局。它被用来批评过于狭隘的视角。
    ar: يعني هذا المثل أن الشخص غير قادر على رؤية الصورة الأكبر بسبب التركيز المفرط على التفاصيل. يستخدم
      لانتقاد النظرة الضيقة جدًا.
    he: פתגם זה אומר שאדם אינו מסוגל לראות את התמונה הגדולה בגלל התמקדות יתר בפרטים. הוא משמש לביקורת
      על פרספקטיבה צרה מדי.
