      famiglia di commercianti attraverso diverse generazioni. È considerato un classico della letteratura
      tedesca e ha valso a Mann il Premio Nobel per la Letteratura.
    pt: Este é um romance de Thomas Mann, publicado em 1901, que retrata o declínio de uma rica família
      de comerciantes ao longo de várias gerações. É considerado um clássico da literatura alemã e rendeu
      a Mann o Prêmio Nobel de Literatura.
    ru: Это роман Томаса Манна, опубликованный в 1901 году, описывающий упадок богатой купеческой семьи
      на протяжении нескольких поколений. Он считается классикой немецкой литературы и принес Манну Нобелевскую
