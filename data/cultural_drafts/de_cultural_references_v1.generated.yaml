- id: de_classical_or_scriptural_allusion_der_stein_des_anstosses_cbdcd9b5
  language: de
  canonical_reference: Der Stein des Anstoßes
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - der Stein des Anstoßes
  - ein Stein des Anstoßes
  - Stein des Anstoßes sein
  short_explanation: Meaning 'the stumbling block', this phrase denotes an obstacle or cause of offense.
    It originates from the Bible, e.g., Isaiah 8:14 and Romans 9:33, where it refers to Christ as a stone
    of stumbling.
  i18n_explanations:
    en: Meaning 'the stumbling block', this phrase denotes an obstacle or cause of offense. It originates
      from the Bible, e.g., Isaiah 8:14 and Romans 9:33, where it refers to Christ as a stone of stumbling.
    es: Significando 'la piedra de tropiezo', esta frase denota un obstáculo o causa de ofensa. Se origina
      en la Biblia, por ejemplo, Isaías 8:14 y Romanos 9:33, donde se refiere a Cristo como una piedra
      de tropiezo.
    fr: Signifiant 'la pierre d'achoppement', cette expression désigne un obstacle ou une cause d'offense.
      Elle trouve son origine dans la Bible, par exemple, Ésaïe 8:14 et Romains 9:33, où elle se réfère
      au Christ comme une pierre d'achoppement.
    de: Die Bedeutung 'der Stolperstein', diese Phrase bezeichnet ein Hindernis oder einen Anstoß. Sie
      stammt aus der Bibel, z.B. Jesaja 8:14 und Römer 9:33, wo sie sich auf Christus als einen Stein
      des Anstoßes bezieht.
    it: Che significa 'la pietra d'inciampo', questa frase indica un ostacolo o una causa di offesa. Ha
      origine nella Bibbia, ad esempio, Isaia 8:14 e Romani 9:33, dove si riferisce a Cristo come una
      pietra d'inciampo.
    pt: Significando 'a pedra de tropeço', essa frase denota um obstáculo ou causa de ofensa. Origina-se
      na Bíblia, por exemplo, Isaías 8:14 e Romanos 9:33, onde se refere a Cristo como uma pedra de tropeço.
    ru: Означая 'камень преткновения', эта фраза обозначает препятствие или причину обиды. Она происходит
      из Библии, например, Исаия 8:14 и Римлянам 9:33, где она относится ко Христу как к камню преткновения.
    ja: 「つまずきの石」を意味し、障害や気分を害する原因を表します。聖書に由来し、例えばイザヤ書8章14節やローマ人への手紙9章33節で、キリストがつまずきの石として言及されています。
    zh: 意思是'绊脚石'，这个短语表示障碍或冒犯的原因。它源于圣经，例如以赛亚书8:14和罗马书9:33，其中提到基督是绊脚的石头。
    ar: بمعنى 'حجر العثرة'، تشير هذه العبارة إلى عائق أو سبب للإهانة. أصلها من الكتاب المقدس، على سبيل
      المثال، إشعياء 8:14 ورومية 9:33، حيث يشير إلى المسيح كحجر عثرة.
    he: פירושו 'אבן נגף', ביטוי זה מציין מכשול או סיבה להיעלב. מקורו בתנ"ך, למשל, ישעיהו ח', 14 ואל הרומים
      ט', 33, שם הוא מתייחס למשיח כאבן נגף.
