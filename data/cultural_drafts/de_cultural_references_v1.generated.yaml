    ja: 神がイスラエル人に荒野の40年の間与えた奇跡の食物を指します（出エジプト記16）。神の備えを象徴し、しばしば予期せぬ糧の比喩として使われます。
    zh: 指上帝在以色列人40年旷野漂流期间赐予的神奇食物（出埃及记16）。象征着天赐之恩，常被用作意外供养的比喻。
    ar: يشير إلى الطعام المعجزي الذي وفره الله لبني إسرائيل خلال 40 سنة في البرية (سفر الخروج 16). يرمز
