    ja: シナイ山でモーセに与えられた十戒が刻まれた二枚の石の板を指します（出エジプト記31:18, 32:15-16）。西洋文化において神の律法と道徳の基盤を表しています。
    zh: 指在西奈山上赐给摩西刻有十诫的两块石版（出埃及记31:18, 32:15-16）。象征神法和西方文化的道德基础。
    ar: يشير إلى لوحي الحجر المنقوش عليهما الوصايا العشر اللذين أُعطيا لموسى على جبل سيناء (سفر الخروج
