    en: Refers to the two stone tablets inscribed with the Ten Commandments given to Moses on Mount Sinai
      (Exodus 31:18, 32:15-16). They represent divine law and moral foundation in Western culture.
    es: Se refiere a las dos tablas de piedra inscritas con los Diez Mandamientos entregadas a Moisés
