- id: de_proverb_tradition_wer_den_schaden_hat_braucht_für_den_spott_nicht_zu_sorgen_c989c979
  language: de
  canonical_reference: Wer den Schaden hat, braucht für den Spott nicht zu sorgen
  reference_type: proverb_tradition
  surface_patterns:
  - Wer den Schaden hat, braucht für den Spott nicht zu sorgen
  - Wer den Schaden hat, hat auch den Spott
  - Den Schaden haben und den Spott dazu
  short_explanation: This proverb means that when someone suffers a loss or damage, others will mock them
    anyway, so they don't need to worry about that. It highlights that misfortune often attracts ridicule.
  i18n_explanations:
    en: This proverb means that when someone suffers a loss or damage, others will mock them anyway, so
      they don't need to worry about that. It highlights that misfortune often attracts ridicule.
    es: Este proverbio significa que cuando alguien sufre una pérdida o daño, otros se burlarán de todos
      modos, por lo que no necesita preocuparse por eso. Destaca que la desgracia a menudo atrae el ridículo.
    fr: Ce proverbe signifie que lorsque quelqu'un subit une perte ou un dommage, les autres se moqueront
      de lui de toute façon, donc il n'a pas à s'en soucier. Il souligne que le malheur attire souvent
      les moqueries.
    de: Dieses Sprichwort bedeutet, dass, wenn jemand einen Verlust oder Schaden erleidet, andere ihn
      ohnehin verspotten werden, also braucht er sich darüber keine Sorgen zu machen. Es hebt hervor,
      dass Unglück oft Spott anzieht.
    it: Questo proverbio significa che quando qualcuno subisce una perdita o un danno, gli altri lo derideranno
      comunque, quindi non deve preoccuparsi. Sottolinea che la sfortuna spesso attira il ridicolo.
    pt: Este provérbio significa que quando alguém sofre uma perda ou dano, outros irão zombar deles de
      qualquer maneira, então não precisam se preocupar com isso. Destaca que o infortúnio muitas vezes
      atrai o ridículo.
    ru: Эта пословица означает, что когда кто-то терпит убыток или ущерб, другие все равно будут насмехаться,
      так что не стоит об этом беспокоиться. Подчеркивается, что несчастье часто привлекает насмешки.
    ja: このことわざは、誰かが損失や損害を被ったとき、他人はとにかく嘲笑するので、そのことについて心配する必要はないという意味です。不幸はしばしば嘲笑を招くことを強調しています。
    zh: 这句谚语的意思是，当某人遭受损失或损害时，其他人无论如何都会嘲笑他们，所以他们不必为此担心。它强调了不幸往往引来嘲笑。
    ar: يعني هذا المثل أنه عندما يتعرض شخص ما لخسارة أو ضرر، سيسخر منه الآخرون على أي حال، لذلك لا داعي
      للقلق بشأن ذلك. يسلط الضوء على أن المصيبة غالبًا ما تجلب السخرية.
    he: פתגם זה אומר שכאשר מישהו סובל מהפסד או נזק, אחרים ילעגו לו בכל מקרה, אז הוא לא צריך לדאוג מכך.
      הוא מדגיש שאסון מושך לעתים קרובות לעג.
