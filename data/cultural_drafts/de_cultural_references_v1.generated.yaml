    ja: このことわざは、自分の専門分野に留まるよう助言するもので、画家アペレスと靴屋の逸話に由来します。「自分の最後（靴型）に留まれ」に相当します。
    zh: 这句谚语建议专注于自己的专业领域，源自画家阿佩莱斯和一个鞋匠的故事。相当于“鞋匠，守好你的楦头”。
