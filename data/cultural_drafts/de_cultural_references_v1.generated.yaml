- id: de_proverb_tradition_der_appetit_kommt_beim_essen_5fc4d55c
  language: de
  canonical_reference: Der Appetit kommt beim Essen
  reference_type: proverb_tradition
  surface_patterns:
  - Der Appetit kommt beim Essen
  - Der Appetit kommt mit dem Essen
  - Beim Essen kommt der Appetit
  short_explanation: This proverb means that as one begins an activity, interest or desire grows. It is
    often used to encourage starting a task, as motivation will follow. The phrase originates from François
    Rabelais' 'Gargantua'.
  i18n_explanations:
    en: This proverb means that as one begins an activity, interest or desire grows. It is often used
      to encourage starting a task, as motivation will follow. The phrase originates from François Rabelais'
      'Gargantua'.
    es: Este proverbio significa que a medida que uno comienza una actividad, el interés o el deseo crecen.
      A menudo se usa para animar a comenzar una tarea, ya que la motivación vendrá después. La frase
      se origina en 'Gargantúa' de François Rabelais.
    fr: Ce proverbe signifie qu'à mesure que l'on commence une activité, l'intérêt ou le désir grandit.
      Il est souvent utilisé pour encourager à commencer une tâche, car la motivation suivra. L'expression
      provient du 'Gargantua' de François Rabelais.
    de: Dieses Sprichwort bedeutet, dass das Interesse oder Verlangen wächst, wenn man mit einer Aktivität
      beginnt. Es wird oft verwendet, um zu ermutigen, eine Aufgabe zu beginnen, da die Motivation folgen
      wird. Der Ausdruck stammt aus François Rabelais' 'Gargantua'.
    it: Questo proverbio significa che man mano che si inizia un'attività, l'interesse o il desiderio
      cresce. È spesso usato per incoraggiare a iniziare un compito, poiché la motivazione seguirà. La
      frase proviene dal 'Gargantua' di François Rabelais.
    pt: Este provérbio significa que à medida que se inicia uma atividade, o interesse ou desejo cresce.
      É frequentemente usado para encorajar o início de uma tarefa, pois a motivação virá. A frase tem
      origem no 'Gargântua' de François Rabelais.
    ru: Эта пословица означает, что по мере того, как человек начинает какое-либо занятие, интерес или
      желание растет. Ее часто используют, чтобы побудить начать задачу, так как мотивация придет позже.
      Фраза происходит из 'Гаргантюа' Франсуа Рабле.
    ja: このことわざは、活動を始めると興味や欲求が高まるという意味です。タスクを開始するよう促すためによく使われます。やる気は後からついてくるという考えです。この言葉はフランソワ・ラブレーの『ガルガンチュア』に由来します。
    zh: 这句谚语的意思是，当一个人开始一项活动时，兴趣或欲望会随之增长。它常被用来鼓励开始一项任务，因为动力会随之而来。这句话源自弗朗索瓦·拉伯雷的《巨人传》。
    ar: يعني هذا المثل أنه كلما بدأ الشخص نشاطًا، يزداد الاهتمام أو الرغبة. غالبًا ما يستخدم لتشجيع بدء
      مهمة، لأن الدافع سيأتي لاحقًا. العبارة مأخوذة من 'غارغانتوا' لفرانسوا رابليه.
    he: פתגם זה אומר שככל שמתחילים בפעילות, העניין או הרצון גדלים. הוא משמש לעתים קרובות לעידוד התחלת
      משימה, שכן המוטיבציה תגיע אחר כך. הביטוי מקורו ב'גרגנטואה' של פרנסואה רבלה.
