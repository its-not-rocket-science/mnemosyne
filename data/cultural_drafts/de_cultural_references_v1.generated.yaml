    ja: このドイツ語のイディオムは、英語の 'a thorn in one's side' に相当し、絶え間ない悩みや障害を指します。その起源は聖書の民数記33章55節で、神がカナンの住民が『あなたがたの目に棘となる』と警告している箇所にあります。
