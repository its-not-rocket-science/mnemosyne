- id: de_classical_or_scriptural_allusion_der_zankapfel_9059b51e
  language: de
  canonical_reference: Der Zankapfel
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Zankapfel
  - der Zankapfel
  - Erisapfel
  - Apfel der Zwietracht
  short_explanation: Refers to the golden apple thrown by Eris at the wedding of Peleus and Thetis, leading
    to the Judgement of Paris and the Trojan War; used for any object or issue that causes discord.
  i18n_explanations:
    en: Refers to the golden apple thrown by Eris at the wedding of Peleus and Thetis, leading to the
      Judgement of Paris and the Trojan War; used for any object or issue that causes discord.
    es: Se refiere a la manzana de oro lanzada por Eris en la boda de Peleo y Tetis, que condujo al Juicio
      de Paris y la Guerra de Troya; se usa para cualquier objeto o tema que cause discordia.
    fr: Fait référence à la pomme d'or lancée par Éris lors du mariage de Pélée et Thétis, menant au Jugement
      de Pâris et à la guerre de Troie ; utilisé pour tout objet ou problème source de discorde.
    de: Bezieht sich auf den goldenen Apfel, den Eris bei der Hochzeit von Peleus und Thetis warf, was
      zum Urteil des Paris und zum Trojanischen Krieg führte; steht für jeden Gegenstand oder jedes Thema,
      das Zwietracht stiftet.
    it: Si riferisce alla mela d'oro lanciata da Eris al matrimonio di Peleo e Teti, che portò al Giudizio
      di Paride e alla guerra di Troia; usato per qualsiasi oggetto o questione che causa discordia.
    pt: Refere-se à maçã de ouro lançada por Éris no casamento de Peleu e Tétis, levando ao Julgamento
      de Páris e à Guerra de Troia; usado para qualquer objeto ou questão que cause discórdia.
    ru: Относится к золотому яблоку, брошенному Эридой на свадьбе Пелея и Фетиды, что привело к Суду Париса
      и Троянской войне; используется для обозначения любого предмета или вопроса, вызывающего раздор.
    ja: ペレウスとテティスの結婚式でエリスが投げた黄金の林檎を指し、パリスの審判とトロイア戦争を引き起こした；不和を引き起こすあらゆる物体や問題に対して用いられる。
    zh: 指厄里斯在珀琉斯和忒提斯的婚礼上抛出的金苹果，导致了帕里斯的评判和特洛伊战争；用于任何引发不和的物体或问题。
    ar: يشير إلى التفاحة الذهبية التي ألقتها إيريس في حفل زفاف بيليوس وثيتيس، مما أدى إلى حكم باريس وحرب
      طروادة؛ يستخدم لأي شيء أو قضية تسبب الشقاق.
    he: מתייחס לתפוח הזהב שהושלך על ידי אריס בחתונת פלאוס ותטיס, שהוביל למשפט פאריס ולמלחמת טרויה; משמש
      לכל חפץ או נושא הגורם למחלוקת.
