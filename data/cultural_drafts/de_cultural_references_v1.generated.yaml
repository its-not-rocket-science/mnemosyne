  short_explanation: This is a play by Swiss author Max Frisch, first performed in 1961. It deals with
    prejudice, identity, and scapegoating, set in the fictional country of Andorra, where a young man
    is wrongly persecuted as a Jew.
  i18n_explanations:
    en: This is a play by Swiss author Max Frisch, first performed in 1961. It deals with prejudice, identity,
      and scapegoating, set in the fictional country of Andorra, where a young man is wrongly persecuted
      as a Jew.
    es: Esta es una obra del autor suizo Max Frisch, representada por primera vez en 1961. Trata sobre
      los prejuicios, la identidad y el chivo expiatorio, ambientada en el país ficticio de Andorra, donde
      un joven es perseguido injustamente por ser judío.
    fr: C'est une pièce de l'auteur suisse Max Frisch, créée en 1961. Elle traite des préjugés, de l'identité
      et du bouc émissaire, située dans le pays fictif d'Andorre, où un jeune homme est injustement persécuté
      en tant que Juif.
    de: Dies ist ein Theaterstück des Schweizer Autors Max Frisch, uraufgeführt 1961. Es befasst sich
      mit Vorurteilen, Identität und Sündenbockfindung, spielt im fiktiven Land Andorra, wo ein junger
      Mann zu Unrecht als Jude verfolgt wird.
    it: Questa è un'opera teatrale dell'autore svizzero Max Frisch, rappresentata per la prima volta nel
      1961. Tratta di pregiudizio, identità e capro espiatorio, ambientata nel fittizio paese di Andorra,
      dove un giovane viene ingiustamente perseguitato come ebreo.
    pt: Esta é uma peça do autor suíço Max Frisch, encenada pela primeira vez em 1961. Aborda preconceito,
      identidade e bode expiatório, ambientada no país fictício de Andorra, onde um jovem é injustamente
      perseguido como judeu.
    ru: Это пьеса швейцарского автора Макса Фриша, впервые поставленная в 1961 году. Она затрагивает темы
      предрассудков, идентичности и поиска козла отпущения, действие происходит в вымышленной стране Андорра,
      где молодого человека несправедливо преследуют как еврея.
    ja: これはスイスの作家マックス・フリッシュによる戯曲で、1961年に初演されました。偏見、アイデンティティ、スケープゴートをテーマに、架空の国アンドラで若い男性がユダヤ人として不当に迫害される物語です。
    zh: 这是瑞士作家马克斯·弗里施的一部戏剧，于1961年首演。它探讨了偏见、身份认同和替罪羊现象，背景设定在虚构的国家安道尔，一个年轻人被错误地当作犹太人而遭到迫害。
    ar: هذه مسرحية للكاتب السويسري ماكس فريش، عُرضت لأول مرة عام 1961. تتناول التحيز والهوية وكبش الفداء،
