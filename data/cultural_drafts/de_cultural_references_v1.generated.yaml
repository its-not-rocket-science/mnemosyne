- id: de_classical_or_scriptural_allusion_der_durchzug_durchs_rote_meer_55894cd3
  language: de
  canonical_reference: Der Durchzug durchs Rote Meer
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - der Durchzug durchs Rote Meer
  - der Zug durch das Rote Meer
  - die Teilung des Roten Meeres
  short_explanation: Refers to the miracle in Exodus 14 where God divided the Red Sea to allow the Israelites
    to escape from Egypt. It is a powerful symbol of deliverance and is often evoked in contexts of seemingly
    impossible salvation.
  i18n_explanations:
    en: Refers to the miracle in Exodus 14 where God divided the Red Sea to allow the Israelites to escape
      from Egypt. It is a powerful symbol of deliverance and is often evoked in contexts of seemingly
      impossible salvation.
    es: Se refiere al milagro en Éxodo 14 donde Dios dividió el Mar Rojo para permitir que los israelitas
      escaparan de Egipto. Es un poderoso símbolo de liberación y a menudo se evoca en contextos de salvación
      aparentemente imposible.
    fr: Fait référence au miracle dans Exode 14 où Dieu a divisé la mer Rouge pour permettre aux Israélites
      de s'échapper d'Égypte. C'est un puissant symbole de délivrance et il est souvent évoqué dans des
      contextes de salut apparemment impossible.
    de: Bezieht sich auf das Wunder in Exodus 14, wo Gott das Rote Meer teilte, um den Israeliten die
      Flucht aus Ägypten zu ermöglichen. Es ist ein kraftvolles Symbol der Befreiung und wird oft in Zusammenhängen
      scheinbar unmöglicher Rettung angeführt.
    it: Si riferisce al miracolo in Esodo 14 dove Dio divise il Mar Rosso per permettere agli israeliti
      di fuggire dall'Egitto. È un potente simbolo di liberazione ed è spesso evocato in contesti di salvezza
      apparentemente impossibile.
    pt: Refere-se ao milagre em Êxodo 14 onde Deus dividiu o Mar Vermelho para permitir que os israelitas
      escapassem do Egito. É um poderoso símbolo de libertação e é frequentemente evocado em contextos
      de salvação aparentemente impossível.
    ru: Относится к чуду в Исходе 14, где Бог разделил Красное море, чтобы позволить израильтянам бежать
      из Египта. Это мощный символ избавления, и его часто упоминают в контексте, казалось бы, невозможного
      спасения.
    ja: 出エジプト記14章で神が紅海を分け、イスラエル人がエジプトから逃れることを可能にした奇跡を指します。解放の強力な象徴であり、不可能と思われる救いの文脈でしばしば引用されます。
    zh: 指出埃及记14章中上帝分开红海让以色列人逃离埃及的神迹。是救赎的有力象征，常被用来形容看似不可能的拯救情景。
    ar: يشير إلى المعجزة في سفر الخروج 14 حيث شق الله البحر الأحمر للسماح لبني إسرائيل بالهروب من مصر.
      إنه رمز قوي للخلاص وغالباً ما يُستحضر في سياقات الخلاص المستحيل ظاهرياً.
    he: מתייחס לנס בשמות י"ד שבו אלוהים קרע את ים סוף כדי לאפשר לבני ישראל להימלט ממצרים. זהו סמל רב עוצמה
