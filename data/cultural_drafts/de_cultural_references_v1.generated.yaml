- id: de_literary_reference_erst_kommt_das_fressen_dann_kommt_die_moral_7cd5f801
  language: de
  canonical_reference: Erst kommt das Fressen, dann kommt die Moral
  reference_type: literary_reference
  surface_patterns:
  - Erst kommt das Fressen, dann kommt die Moral
  - Erst das Fressen, dann die Moral
  - Erst kommt das Fressen, dann die Moral
  short_explanation: This phrase from Bertolt Brecht's 'Die Dreigroschenoper' (The Threepenny Opera) asserts
    that basic material needs (food) must be met before moral considerations can apply. It has become
    a common German saying criticizing idealism that ignores economic realities.
  i18n_explanations:
    en: This phrase from Bertolt Brecht's 'Die Dreigroschenoper' (The Threepenny Opera) asserts that basic
      material needs (food) must be met before moral considerations can apply. It has become a common
      German saying criticizing idealism that ignores economic realities.
    es: Esta frase de Bertolt Brecht en 'La ópera de los tres centavos' sostiene que las necesidades materiales
      básicas (comida) deben ser satisfechas antes de que puedan aplicarse consideraciones morales. Se
      ha convertido en un dicho alemán común que critica el idealismo que ignora las realidades económicas.
    fr: Cette phrase de Bertolt Brecht dans 'L'Opéra de quat'sous' affirme que les besoins matériels de
      base (nourriture) doivent être satisfaits avant que les considérations morales puissent s'appliquer.
      Elle est devenue un dicton allemand courant critiquant l'idéalisme qui ignore les réalités économiques.
    de: Dieser Satz aus Bertolt Brechts 'Die Dreigroschenoper' besagt, dass grundlegende materielle Bedürfnisse
      (Essen) erfüllt sein müssen, bevor moralische Überlegungen greifen können. Er ist zu einer gängigen
      deutschen Redewendung geworden, die Idealismus kritisiert, der wirtschaftliche Realitäten ignoriert.
    it: Questa frase di Bertolt Brecht ne 'L'opera da tre soldi' afferma che i bisogni materiali di base
      (cibo) devono essere soddisfatti prima che possano applicarsi considerazioni morali. È diventato
      un detto tedesco comune che critica l'idealismo che ignora le realtà economiche.
    pt: Esta frase de Bertolt Brecht em 'A Ópera dos Mendigos' afirma que as necessidades materiais básicas
      (comida) devem ser atendidas antes que considerações morais possam ser aplicadas. Tornou-se um ditado
      alemão comum que critica o idealismo que ignora as realidades econômicas.
    ru: Эта фраза из «Трёхгрошовой оперы» Бертольта Брехта утверждает, что основные материальные потребности
      (еда) должны быть удовлетворены, прежде чем можно будет применять моральные соображения. Она стала
      распространённой немецкой поговоркой, критикующей идеализм, игнорирующий экономические реалии.
    ja: このフレーズはベルトルト・ブレヒトの『三文オペラ』からのもので、道徳的考慮が適用される前に基本的な物質的欲求（食物）が満たされなければならないと主張している。経済的現実を無視した理想主義を批判するドイツの一般的なことわざとなっている。
    zh: 这句出自贝尔托·布莱希特《三文钱的歌剧》的名言断言，在道德考虑适用之前，必须满足基本的物质需求（食物）。它已成为一个常见的德语谚语，批评忽视经济现实的理想主义。
    ar: تعبر هذه العبارة من أوبرا الثلاثة بنسات لبرتولت بريخت عن أن الاحتياجات المادية الأساسية (الطعام)
      يجب أن تُلبى قبل أن يمكن تطبيق الاعتبارات الأخلاقية. وقد أصبحت مقولة ألمانية شائعة تنتقد المثالية
      التي تتجاهل الحقائق الاقتصادية.
    he: משפט זה מתוך 'אופרת הגרושים' של ברטולט ברכט קובע כי צרכים חומריים בסיסיים (אוכל) חייבים להיות
      מסופקים לפני שניתן להחיל שיקולים מוסריים. הוא הפך לאמרה גרמנית נפוצה המבקרת אידיאליזם המתעלם מהמציאות
      הכלכלית.
