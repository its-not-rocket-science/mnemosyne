- id: de_proverb_tradition_wer_nicht_hören_will_muss_fühlen_ac406655
  language: de
  canonical_reference: Wer nicht hören will, muss fühlen
  reference_type: proverb_tradition
  surface_patterns:
  - Wer nicht hören will, muss fühlen
  - Wer nicht hören will, der muss fühlen
  - Nicht hören wollen, fühlen müssen
  short_explanation: This proverb means that if someone refuses to listen to advice or warnings, they
    will have to experience the negative consequences themselves. It is often used as a reprimand.
  i18n_explanations:
    en: This proverb means that if someone refuses to listen to advice or warnings, they will have to
      experience the negative consequences themselves. It is often used as a reprimand.
    es: Este proverbio significa que si alguien se niega a escuchar consejos o advertencias, tendrá que
      experimentar las consecuencias negativas por sí mismo. A menudo se usa como reprimenda.
    fr: Ce proverbe signifie que si quelqu'un refuse d'écouter les conseils ou les avertissements, il
      devra en subir lui-même les conséquences négatives. Il est souvent utilisé comme réprimande.
    de: Dieses Sprichwort bedeutet, dass jemand, der sich weigert, auf Ratschläge oder Warnungen zu hören,
      die negativen Konsequenzen selbst erfahren muss. Es wird oft als Tadel verwendet.
    it: Questo proverbio significa che se qualcuno si rifiuta di ascoltare consigli o avvertimenti, dovrà
      sperimentare lui stesso le conseguenze negative. Viene spesso usato come rimprovero.
    pt: Este provérbio significa que se alguém se recusa a ouvir conselhos ou avisos, terá que experimentar
      as consequências negativas por si mesmo. É frequentemente usado como repreensão.
    ru: Эта пословица означает, что если кто-то отказывается слушать советы или предупреждения, ему придется
      испытать негативные последствия на себе. Часто используется как упрек.
    ja: このことわざは、アドバイスや警告を聞こうとしない人は、自ら否定的な結果を経験しなければならないという意味です。よく叱責として使われます。
    zh: 这句谚语的意思是，如果有人拒绝听从建议或警告，他们将不得不自己承受负面后果。它常被用作训斥。
    ar: يعني هذا المثل أنه إذا رفض شخص ما الاستماع إلى النصائح أو التحذيرات، فسيتعين عليه تجربة العواقب
      السلبية بنفسه. غالبًا ما يستخدم كتوبيخ.
    he: פתגם זה אומר שאם מישהו מסרב להקשיב לעצות או אזהרות, הוא יצטרך לחוות את ההשלכות השליליות בעצמו.
      הוא משמש לעתים קרובות כנזיפה.
