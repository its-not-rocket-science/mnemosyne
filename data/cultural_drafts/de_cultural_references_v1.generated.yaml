    ja: これはトーマス・マンの有名な中編小説のタイトルで、1912年に出版されました。ヴェネツィアでの休暇中に作家グスタフ・フォン・アッシェンバッハが少年に惹かれていく様子を描き、美、衰退、死というテーマを探求しています。
    zh: 这是托马斯·曼著名中篇小说的标题，发表于1912年。它讲述了作家古斯塔夫·冯·阿申巴赫在威尼斯度假时对一个小男孩的痴迷吸引，探讨了美、衰败和死亡等主题。
    ar: هذا هو عنوان رواية قصيرة مشهورة لتوماس مان، نُشرت عام 1912. تروي قصة انجذاب الكاتب غوستاف فون
      أشينباخ القهري لصبي صغير أثناء عطلته في البندقية، وتستكشف موضوعات الجمال والانحلال والفناء.
    he: זהו שמה של נובלה מפורסמת מאת תומאס מאן, שפורסמה ב-1912. היא מספרת על משיכתו האובססיבית של הסופר
