    ja: このフレーズは「それは私には奇妙または怪しく思える」という意味です。歴史的には、ドイツ語圏でスペイン語や習慣が異質で理解できないと見なされていた時代を反映しています。
    zh: 这个短语的意思是‘我觉得这很奇怪或可疑’。历史上，它反映了在德语区，西班牙语言和习俗被视为陌生和难以理解的时代。
    ar: تعني هذه العبارة 'هذا يبدو غريبًا أو مريبًا بالنسبة لي'. تاريخيًا، تعكس وقتًا كانت فيه اللغة والعادات
