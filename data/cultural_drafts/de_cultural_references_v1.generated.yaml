      inaspettato.
    pt: Refere-se ao alimento milagroso que Deus forneceu aos israelitas durante seus 40 anos no deserto
      (Êxodo 16). Simboliza a provisão divina e é frequentemente usado metaforicamente para sustento inesperado.
    ru: Относится к чудесной пище, которую Бог давал израильтянам во время их 40-летнего странствия в
