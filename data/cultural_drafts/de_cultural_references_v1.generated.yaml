      en Venecia, y explora temas de belleza, decadencia y mortalidad.
    fr: C'est le titre d'une célèbre nouvelle de Thomas Mann, publiée en 1912. Elle raconte l'attirance
      obsessionnelle de l'écrivain Gustav von Aschenbach pour un jeune garçon pendant ses vacances à Venise,
      et explore les thèmes de la beauté, de la décadence et de la mortalité.
    de: Dies ist der Titel einer berühmten Novelle von Thomas Mann, veröffentlicht 1912. Sie erzählt die
      obsessive Anziehung des Schriftstellers Gustav von Aschenbach zu einem Jungen während eines Urlaubs
      in Venedig und behandelt Themen wie Schönheit, Verfall und Sterblichkeit.
    it: Questo è il titolo di una famosa novella di Thomas Mann, pubblicata nel 1912. Racconta l'attrazione
      ossessiva dello scrittore Gustav von Aschenbach per un ragazzo durante una vacanza a Venezia, ed
      esplora i temi della bellezza, del decadimento e della mortalità.
    pt: Este é o título de uma famosa novela de Thomas Mann, publicada em 1912. Conta a história da atração
      obsessiva do escritor Gustav von Aschenbach por um menino durante suas férias em Veneza, e explora
      temas de beleza, decadência e mortalidade.
    ru: Это название знаменитой новеллы Томаса Манна, опубликованной в 1912 году. В ней рассказывается
      об одержимом влечении писателя Густава фон Ашенбаха к мальчику во время отдыха в Венеции, и исследуются
