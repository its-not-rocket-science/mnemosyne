    zh: 这句德国谚语的意思是，有过糟糕经历的人会小心避免再次发生。相当于“一朝被蛇咬，十年怕井绳”。
    ar: يعني هذا المثل الألماني أن الشخص الذي مر بتجربة سيئة سيكون حذرًا لتجنبها مرة أخرى. وهو ما يعادل
