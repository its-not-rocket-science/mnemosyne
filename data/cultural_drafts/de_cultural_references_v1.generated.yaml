  - Grau, lieber Freund, ist alle Theorie
  short_explanation: From Goethe's Faust, said by Mephistopheles to a student. It critiques abstract theory
    as being lifeless compared to practical experience. A common German saying.
  i18n_explanations:
    en: From Goethe's Faust, said by Mephistopheles to a student. It critiques abstract theory as being
      lifeless compared to practical experience. A common German saying.
    es: Del Fausto de Goethe, dicho por Mefistófeles a un estudiante. Critica la teoría abstracta por
      ser sin vida en comparación con la experiencia práctica. Un dicho alemán común.
    fr: Du Faust de Goethe, dit par Méphistophélès à un étudiant. Il critique la théorie abstraite comme
      étant sans vie par rapport à l'expérience pratique. Un dicton allemand courant.
    de: Aus Goethes Faust, gesprochen von Mephistopheles zu einem Schüler. Es kritisiert die abstrakte
      Theorie als leblos im Vergleich zur praktischen Erfahrung. Ein verbreitetes deutsches Sprichwort.
    it: Dal Faust di Goethe, detto da Mefistofele a uno studente. Critica la teoria astratta come priva
      di vita rispetto all'esperienza pratica. Un detto tedesco comune.
    pt: Do Fausto de Goethe, dito por Mefistófeles a um estudante. Critica a teoria abstrata como sem
      vida em comparação com a experiência prática. Um ditado alemão comum.
    ru: Из «Фауста» Гёте, сказано Мефистофелем студенту. Критикует абстрактную теорию как безжизненную
      по сравнению с практическим опытом. Распространённая немецкая поговорка.
    ja: ゲーテ『ファウスト』より、メフィストフェレスが学生に言う言葉。抽象的理論は実践的経験に比べて生気がないと批判する。一般的なドイツのことわざ。
    zh: 出自歌德《浮士德》，梅菲斯特对一个学生说的话。它批评抽象理论相较于实践经验缺乏生命力。是一个常见的德国谚语。
    ar: من مسرحية غوته "فاوست"، قالها مفيستوفيليس لطالب. ينتقد النظرية المجردة بأنها بلا حياة مقارنة بالتجربة
