  i18n_explanations:
    en: A proverb equivalent to 'speak of the devil,' used when someone being discussed appears unexpectedly.
      Its origin is uncertain, possibly from folk tradition.
    es: Un proverbio equivalente a 'hablando del rey de Roma', usado cuando alguien de quien se habla
      aparece inesperadamente. Su origen es incierto, posiblemente de la tradición popular.
    fr: Un proverbe équivalent à 'quand on parle du loup', utilisé lorsque quelqu'un dont on parle apparaît
      de manière inattendue. Son origine est incertaine, peut-être de la tradition populaire.
    de: Ein Sprichwort, das dem deutschen 'Wenn man vom Teufel spricht' entspricht, verwendet, wenn jemand,
      über den gesprochen wird, unerwartet erscheint. Sein Ursprung ist unsicher, möglicherweise aus der
      Volkstradition.
    it: Un proverbio equivalente a 'parli del diavolo e spuntano le corna', usato quando qualcuno di cui
      si sta parlando appare inaspettatamente. La sua origine è incerta, probabilmente dalla tradizione
      popolare.
    pt: Um provérbio equivalente a 'falando no diabo', usado quando alguém de quem se fala aparece inesperadamente.
      Sua origem é incerta, possivelmente da tradição popular.
    ru: Пословица, эквивалентная русской «лёгок на помине», используется, когда тот, о ком говорят, появляется
      неожиданно. Происхождение неясно, возможно, из фольклора.
