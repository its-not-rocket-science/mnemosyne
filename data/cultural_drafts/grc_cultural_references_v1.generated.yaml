    it: Frammento di Eraclito che afferma che il conflitto o la lotta è il principio generatore di tutte
      le cose. Sottolinea il ruolo dell'opposizione nella creazione e nel cambiamento.
    pt: Fragmento de Heráclito que afirma que o conflito ou a luta é o princípio gerador de todas as coisas.
