    en: 'The Riddle of the Sphinx, posed to passersby: ''What walks on four legs in the morning, two at
      noon, and three in the evening?'' Oedipus solved it, and the Sphinx killed herself. It symbolizes
      an inscrutable puzzle.'
    es: 'El acertijo de la Esfinge, planteado a los transeúntes: ''¿Qué camina con cuatro patas por la
      mañana, dos al mediodía y tres por la tarde?'' Edipo lo resolvió, y la Esfinge se suicidó. Simboliza
      un enigma insondable.'
    fr: 'L''énigme du Sphinx, posée aux passants : ''Qu''est-ce qui marche à quatre pattes le matin, à
      deux à midi et à trois le soir ?'' Œdipe la résolut, et le Sphinx se tua. Elle symbolise une énigme
      impénétrable.'
    de: 'Das Rätsel der Sphinx, gestellt an Vorbeigehende: ''Was geht morgens auf vier Beinen, mittags
      auf zwei und abends auf drei?'' Ödipus löste es, und die Sphinx tötete sich selbst. Es symbolisiert
      ein undurchdringliches Rätsel.'
    it: 'L''enigma della Sfinge, posto ai passanti: ''Cosa cammina a quattro zampe al mattino, due a mezzogiorno
      e tre alla sera?'' Edipo lo risolse, e la Sfinge si uccise. Simboleggia un enigma imperscrutabile.'
    pt: 'O enigma da Esfinge, proposto aos transeuntes: ''O que anda com quatro pernas pela manhã, duas
      ao meio-dia e três à noite?'' Édipo o resolveu, e a Esfinge se matou. Simboliza um enigma insondável.'
    ru: 'Загадка Сфинкса, задаваемая прохожим: «Кто утром ходит на четырех ногах, днем на двух, а вечером
      на трех?» Эдип разгадал ее, и Сфинкс убила себя. Она символизирует непостижимую загадку.'
    ja: スピンクスの謎かけは、通行人に「朝は四本足、昼は二本足、夕方は三本足で歩くものは何か？」と問うもの。オイディプスが解き、スピンクスは自殺した。不可解な謎を象徴する。
    zh: 斯芬克斯之谜向路人提出：“什么东西早晨四条腿，中午两条腿，晚上三条腿？”俄狄浦斯解开了谜底，斯芬克斯自杀。它象征着难以捉摸的谜题。
    ar: 'لغز أبو الهول، الذي يطرح على المارة: ''ما الذي يمشي على أربع أرجل في الصباح، واثنتين في الظهيرة،
      وثلاث في المساء؟'' حله أوديب، فقتل أبو الهول نفسه. يرمز إلى لغز غامض.'
    he: 'חידת הספינקס, שהוצגה לעוברים ושבים: ''מה הולך על ארבע רגליים בבוקר, שתיים בצהריים ושלוש בערב?''
      אדיפוס פתר אותה, והספינקס התאבד. היא מסמלת חידה בלתי פתירה.'
