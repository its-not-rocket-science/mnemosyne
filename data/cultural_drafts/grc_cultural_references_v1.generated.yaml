    fr: L'Hydre de Lerne était un serpent monstrueux à plusieurs têtes qui en repoussait deux pour chaque
      tête coupée, tué par Héraclès lors de son deuxième travail. Elle symbolise un problème persistant
      et qui se multiplie.
    de: Die Lernäische Hydra war eine monströse vielköpfige Schlange, die für jeden abgeschlagenen Kopf
