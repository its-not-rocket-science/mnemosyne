    pt: As maçãs de ouro foram um presente de casamento para Hera, guardadas pelas Hespérides e um dragão.
      Héracles foi encarregado de recuperá-las como um de seus doze trabalhos.
    ru: Золотые яблоки были свадебным подарком Гере, охранялись Гесперидами и драконом. Геракл должен
      был добыть их в качестве одного из двенадцати подвигов.
    ja: 黄金の林檎はヘーラーの婚礼の贈り物で、ヘスペリデスと竜が守っていた。ヘラクレスは十二の功業の一つとしてそれを取り戻すよう命じられた。
    zh: 金苹果是给赫拉的结婚礼物，由赫斯珀里得斯和一条龙守护。赫拉克勒斯被指派取回金苹果作为他的十二项功业之一。
    ar: كانت التفاحات الذهبية هدية زفاف لهيرا، تحرسها الهيسبيريدات وتنين. تم تكليف هيراكليس باستعادتها
