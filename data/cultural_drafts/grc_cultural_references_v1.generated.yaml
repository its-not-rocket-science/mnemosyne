    a foundational philosophical tenet and a widely used proverb expressing the recognition of one's own
    ignorance.
  i18n_explanations:
    en: Socrates' statement of intellectual humility, known from Plato's 'Apology', has become a foundational
      philosophical tenet and a widely used proverb expressing the recognition of one's own ignorance.
    es: La declaración de humildad intelectual de Sócrates, conocida por la 'Apología' de Platón, se ha
      convertido en un principio filosófico fundamental y un proverbio ampliamente utilizado que expresa
      el reconocimiento de la propia ignorancia.
    fr: La déclaration d'humilité intellectuelle de Socrate, connue de l''Apologie' de Platon, est devenue
      un principe philosophique fondamental et un proverbe largement utilisé exprimant la reconnaissance
      de sa propre ignorance.
    de: Sokrates' Aussage über intellektuelle Demut, bekannt aus Platons 'Apologie', ist zu einem grundlegenden
      philosophischen Grundsatz und einem weit verbreiteten Sprichwort geworden, das das Erkennen der
      eigenen Unwissenheit ausdrückt.
    it: L'affermazione di umiltà intellettuale di Socrate, nota dall''Apologia' di Platone, è diventata
      un principio filosofico fondamentale e un proverbio ampiamente usato che esprime il riconoscimento
      della propria ignoranza.
    pt: A declaração de humildade intelectual de Sócrates, conhecida da 'Apologia' de Platão, tornou-se
      um princípio filosófico fundamental e um provérbio amplamente usado que expressa o reconhecimento
      da própria ignorância.
    ru: Утверждение Сократа об интеллектуальном смирении, известное из 'Апологии' Платона, стало основополагающим
      философским принципом и широко используемой пословицей, выражающей признание собственного невежества.
    ja: ソクラテスの知的謙虚さの声明は、プラトンの『ソクラテスの弁明』から知られ、基本的な哲学的教義となり、自分の無知を認識することを表す広く使われることわざとなった。
    zh: 苏格拉底关于智力谦逊的陈述，出自柏拉图的《申辩篇》，已成为一个基础性的哲学原则和广泛使用的谚语，表达了对自己无知的认识。
    ar: بيان سقراط عن التواضع الفكري، المعروف من 'دفاع أفلاطون'، أصبح مبدأ فلسفياً أساسياً ومثلًا شائعاً
