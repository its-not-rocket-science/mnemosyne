- id: grc_literary_reference_μηδένα_πρὸ_του_τέλουσ_μακάριζε_25025d79
  language: grc
  canonical_reference: Μηδένα πρὸ τοῦ τέλους μακάριζε
  reference_type: literary_reference
  surface_patterns:
  - μηδένα πρὸ τοῦ τέλους μακάριζε
  - μηδένα προ του τέλους μακάριζε
  - call no man happy until death
  - judge no man happy before his death
  short_explanation: A famous saying from Herodotus' Histories, where Solon warns Croesus that one cannot
    be called happy until the end of their life, as fortune can change. It counsels humility and caution
    in judging lives.
  i18n_explanations:
    en: A famous saying from Herodotus' Histories, where Solon warns Croesus that one cannot be called
      happy until the end of their life, as fortune can change. It counsels humility and caution in judging
      lives.
    es: Famoso dicho de las Historias de Heródoto, donde Solón advierte a Creso que no se puede considerar
      feliz a alguien hasta el final de su vida, ya que la fortuna puede cambiar. Aconseja humildad y
      cautela al juzgar vidas.
    fr: Célèbre dicton tiré des Histoires d'Hérodote, où Solon avertit Crésus que l'on ne peut appeler
      personne heureux avant la fin de sa vie, car la fortune peut changer. Il conseille l'humilité et
      la prudence dans le jugement des vies.
    de: Ein berühmter Ausspruch aus Herodots Historien, wo Solon Krösus warnt, dass man niemanden vor
      dem Ende seines Lebens glücklich preisen könne, da das Glück sich wenden kann. Er rät zur Demut
      und Vorsicht bei der Beurteilung von Leben.
    it: Famoso detto dalle Storie di Erodoto, in cui Solone avverte Creso che non si può chiamare felice
      nessuno fino alla fine della sua vita, poiché la fortuna può cambiare. Consiglia umiltà e cautela
      nel giudicare le vite.
    pt: Famoso ditado das Histórias de Heródoto, onde Sólon adverte Creso que ninguém pode ser chamado
      feliz até o fim de sua vida, pois a sorte pode mudar. Aconselha humildade e cautela ao julgar vidas.
    ru: Известное изречение из 'Истории' Геродота, где Солон предупреждает Креза, что нельзя называть
      человека счастливым до конца его жизни, так как судьба может измениться. Оно призывает к смирению
      и осторожности в оценке жизней.
    ja: ヘロドトスの『歴史』に出てくる有名な言葉で、ソロンがクロイソスに、人生の終わりまで人は幸せと言えないと警告した。運命は変わるからである。人生を判断する際の謙虚さと慎重さを説く。
    zh: 希罗多德《历史》中的一句名言，梭伦警告克罗伊斯说，在生命结束之前，不能称一个人为幸福，因为命运可能会改变。它劝诫人们在评判人生时要谦虚谨慎。
    ar: مقولة شهيرة من تواريخ هيرودوت، حيث يحذر سولون كروسوس أنه لا يمكن تسمية أي شخص سعيدًا حتى نهاية
      حياته، لأن الحظ قد يتغير. ينصح بالتواضع والحذر في الحكم على حياة الناس.
    he: אימרה מפורסמת מתוך ה'היסטוריות' של הרודוטוס, שבה סולון מזהיר את קרויסוס שאי אפשר לקרוא לאדם מאושר
