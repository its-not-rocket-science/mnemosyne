  short_explanation: Alexander the Great (356-323 BCE) was the king of Macedon who conquered the Persian
    Empire and spread Hellenistic culture. He is a central figure in Greek history and appears in numerous
    ancient sources such as Arrian's Anabasis and Plutarch's Life of Alexander.
  i18n_explanations:
    en: Alexander the Great (356-323 BCE) was the king of Macedon who conquered the Persian Empire and
      spread Hellenistic culture. He is a central figure in Greek history and appears in numerous ancient
      sources such as Arrian's Anabasis and Plutarch's Life of Alexander.
    es: Alejandro Magno (356-323 a.C.) fue el rey de Macedonia que conquistó el Imperio persa y difundió
      la cultura helenística. Es una figura central en la historia griega y aparece en numerosas fuentes
      antiguas como la Anábasis de Arriano y la Vida de Alejandro de Plutarco.
    fr: Alexandre le Grand (356-323 av. J.-C.) fut le roi de Macédoine qui conquit l'Empire perse et répandit
      la culture hellénistique. C'est une figure centrale de l'histoire grecque, apparaissant dans de
      nombreuses sources anciennes comme l'Anabase d'Arrien et la Vie d'Alexandre de Plutarque.
    de: Alexander der Große (356-323 v. Chr.) war der König von Makedonien, der das Perserreich eroberte
      und die hellenistische Kultur verbreitete. Er ist eine zentrale Figur der griechischen Geschichte
      und erscheint in zahlreichen antiken Quellen wie Arrians Anabasis und Plutarchs Alexanderleben.
    it: Alessandro Magno (356-323 a.C.) fu il re di Macedonia che conquistò l'Impero persiano e diffuse
      la cultura ellenistica. È una figura centrale nella storia greca e appare in numerose fonti antiche
      come l'Anabasi di Arriano e la Vita di Alessandro di Plutarco.
    pt: Alexandre, o Grande (356-323 a.C.) foi o rei da Macedônia que conquistou o Império Persa e difundiu
      a cultura helenística. É uma figura central na história grega e aparece em inúmeras fontes antigas
      como a Anábase de Arriano e a Vida de Alexandre de Plutarco.
    ru: Александр Македонский (356-323 гг. до н.э.) был царём Македонии, покорившим Персидскую империю
      и распространившим эллинистическую культуру. Он является центральной фигурой греческой истории и
      упоминается во многих античных источниках, таких как «Анабасис» Арриана и «Жизнь Александра» Плутарха.
    ja: アレクサンドロス大王（紀元前356-323年）は、ペルシア帝国を征服しヘレニズム文化を広めたマケドニアの王である。ギリシャ史の中心的人物であり、アッリアノスの『アレクサンドロス東征記』やプルタルコスの『アレクサンドロス伝』など多くの古代資料に登場する。
    zh: 亚历山大大帝（公元前356-323年）是马其顿国王，征服了波斯帝国并传播了希腊化文化。他是希腊历史的核心人物，出现在众多古代文献中，如阿里安的《远征记》和普鲁塔克的《亚历山大传》。
    ar: الإسكندر الأكبر (356-323 قبل الميلاد) كان ملك مقدونيا الذي غزا الإمبراطورية الفارسية ونشر الثقافة
      الهلنستية. هو شخصية محورية في التاريخ اليوناني ويظهر في العديد من المصادر القديمة مثل أناباسيس أريان
      وحياة الإسكندر لبلوتارخ.
    he: אלכסנדר הגדול (356-323 לפנה"ס) היה מלך מוקדון שכבש את האימפריה הפרסית והפיץ את התרבות ההלניסטית.
      הוא דמות מרכזית בהיסטוריה היוונית ומופיע במקורות עתיקים רבים כמו "אנבסיס" של אריאנוס ו"חיי אלכסנדר"
      של פלוטרכוס.
