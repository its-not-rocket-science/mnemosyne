      examine le conflit entre la loi de l'État et le devoir moral, et reste un classique du théâtre grec.
    de: Eine Tragödie von Sophokles über Antigone, die das Edikt von König Kreon missachtet, ihren Bruder
      zu begraben. Sie untersucht den Konflikt zwischen Staatsgesetz und moralischer Pflicht und bleibt
      ein Klassiker des griechischen Dramas.
    it: Una tragedia di Sofocle su Antigone, che sfida l'editto del re Creonte di seppellire suo fratello.
      Esamina il conflitto tra legge statale e dovere morale e rimane un classico del dramma greco.
    pt: Uma tragédia de Sófocles sobre Antígona, que desafia o decreto do rei Creonte de enterrar seu
