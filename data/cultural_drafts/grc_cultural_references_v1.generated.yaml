  short_explanation: Refers to the cunning net Hephaestus crafted to trap his wife Aphrodite and her lover
    Ares, as told in Homer's Odyssey. It symbolizes an inescapable trap or shameful exposure.
  i18n_explanations:
    en: Refers to the cunning net Hephaestus crafted to trap his wife Aphrodite and her lover Ares, as
      told in Homer's Odyssey. It symbolizes an inescapable trap or shameful exposure.
    es: Se refiere a la astuta red que Hefesto creó para atrapar a su esposa Afrodita y a su amante Ares,
      según se cuenta en la Odisea de Homero. Simboliza una trampa ineludible o una exposición vergonzosa.
    fr: Fait référence au filet rusé qu'Héphaïstos a fabriqué pour piéger sa femme Aphrodite et son amant
      Arès, comme raconté dans l'Odyssée d'Homère. Il symbolise un piège inévitable ou une exposition
      honteuse.
    de: Bezieht sich auf das listige Netz, das Hephaistos schmiedete, um seine Frau Aphrodite und ihren
      Liebhaber Ares zu fangen, wie in Homers Odyssee erzählt. Es symbolisiert eine unausweichliche Falle
      oder eine schändliche Enthüllung.
    it: Si riferisce all'astuta rete che Efesto creò per intrappolare sua moglie Afrodite e il suo amante
