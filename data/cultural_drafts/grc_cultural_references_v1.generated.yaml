    ja: 「トロイの略奪」は、ギリシャ神話の中心的な出来事である伝説的なトロイの破壊を指す。また、トロイア戦争叙事詩群の失われた叙事詩のタイトルでもある。
    zh: 「特洛伊陷落」指传说中特洛伊的毁灭，是希腊神话的核心事件。也是特洛伊战争系列中一部失传史诗的标题。
    ar: يشير «نهب طروادة» إلى التدمير الأسطوري لطروادة، وهو حدث محوري في الأساطير اليونانية. كما كان عنوانًا
