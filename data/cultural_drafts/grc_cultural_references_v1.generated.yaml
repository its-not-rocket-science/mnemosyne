    ja: 何かが目前の事柄に関係ないときに言う言葉で、古代ギリシャ劇で合唱隊や俳優が劇の幻想を破ったことに由来する。悲劇とディオニュソス崇拝との関連を示している。
    zh: 当某事与当前问题无关时所说的一句话，起源于古希腊戏剧中合唱队或演员打破戏剧幻觉的时刻。它反映了悲剧与狄俄尼索斯崇拜之间的联系。
    ar: عبارة تُقال عندما يكون الشيء غير ذي صلة بالموضوع، نشأت في المسرح اليوناني القديم عندما كسر الجوقة
