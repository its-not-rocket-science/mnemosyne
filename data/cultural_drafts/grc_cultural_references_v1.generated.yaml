    and reveals hidden thoughts. Attributed to the Greek poet Alcaeus.
  i18n_explanations:
    en: A proverb meaning 'in wine there is truth,' indicating that alcohol loosens inhibitions and reveals
      hidden thoughts. Attributed to the Greek poet Alcaeus.
    es: Un proverbio que significa 'en el vino está la verdad', indicando que el alcohol afloja las inhibiciones
      y revela pensamientos ocultos. Atribuido al poeta griego Alceo.
    fr: Un proverbe signifiant 'dans le vin se trouve la vérité', indiquant que l'alcool relâche les inhibitions
      et révèle des pensées cachées. Attribué au poète grec Alcée.
    de: Ein Sprichwort, das bedeutet 'Im Wein liegt Wahrheit', und darauf hinweist, dass Alkohol Hemmungen
      löst und verborgene Gedanken offenbart. Zugeschrieben dem griechischen Dichter Alkaios.
    it: Un proverbio che significa 'nel vino c'è la verità', indicando che l'alcol allenta le inibizioni
      e rivela pensieri nascosti. Attribuito al poeta greco Alceo.
    pt: Um provérbio que significa 'no vinho está a verdade', indicando que o álcool solta as inibições
      e revela pensamentos ocultos. Atribuído ao poeta grego Alceu.
    ru: Пословица, означающая «в вине истина», указывающая, что алкоголь ослабляет запреты и раскрывает
      скрытые мысли. Приписывается греческому поэту Алкею.
    ja: 「酒に真実あり」という意味のことわざで、アルコールが抑制を緩め隠された考えを明らかにすることを示す。ギリシャの詩人アルカイオスに帰せられる。
    zh: 谚语，意为“酒中有真理”，表明酒精会放松抑制，揭示隐藏的想法。归功于希腊诗人阿尔凯奥斯。
    ar: مثل يعني 'في الخمر الحقيقة'، يشير إلى أن الكحول يخفف الموانع ويكشف الأفكار الخفية. يُنسب إلى الشاعر
      اليوناني ألكايوس.
    he: פתגם שמשמעותו 'ביין יש אמת', המצביע על כך שאלכוהול משחרר עכבות וחושף מחשבות נסתרות. מיוחס למשורר
