      fondatrice de la littérature occidentale explorant le destin et le libre arbitre.
    de: Eine Tragödie von Sophokles, bekannt als Ödipus Rex, über König Ödipus, der unwissentlich eine
      Prophezeiung erfüllt, dass er seinen Vater töten und seine Mutter heiraten wird. Es ist ein grundlegendes
      Werk der westlichen Literatur, das Schicksal und freien Willen erforscht.
    it: Una tragedia di Sofocle, conosciuta come Edipo Re, riguardante il re Edipo che inconsapevolmente
      realizza la profezia di uccidere suo padre e sposare sua madre. È un'opera fondamentale della letteratura
      occidentale che esplora il destino e il libero arbitrio.
    pt: Uma tragédia de Sófocles, conhecida como Édipo Rei, sobre o rei Édipo que, sem saber, cumpre a
      profecia de que matará seu pai e se casará com sua mãe. É uma obra fundamental da literatura ocidental
      que explora o destino e o livre arbítrio.
