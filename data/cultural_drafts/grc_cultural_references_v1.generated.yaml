  short_explanation: Daedalus crafted wings of feathers and wax to escape from the Labyrinth. His son
    Icarus flew too close to the sun, melting the wax. The story is a cautionary tale about hubris.
  i18n_explanations:
    en: Daedalus crafted wings of feathers and wax to escape from the Labyrinth. His son Icarus flew too
      close to the sun, melting the wax. The story is a cautionary tale about hubris.
    es: Dédalo fabricó alas de plumas y cera para escapar del Laberinto. Su hijo Ícaro voló demasiado
      cerca del sol, derritiendo la cera. La historia es una advertencia sobre la hybris.
    fr: Dédale fabriqua des ailes de plumes et de cire pour s'échapper du Labyrinthe. Son fils Icare vola
      trop près du soleil, faisant fondre la cire. L'histoire est un récit édifiant sur l'hybris.
    de: Daedalus fertigte Flügel aus Federn und Wachs an, um aus dem Labyrinth zu entkommen. Sein Sohn
      Ikarus flog zu nahe an die Sonne, wodurch das Wachs schmolz. Die Geschichte ist eine warnende Erzählung
      über Hybris.
    it: Dedalo costruì ali di piume e cera per fuggire dal Labirinto. Suo figlio Icaro volò troppo vicino
      al sole, sciogliendo la cera. La storia è un racconto ammonitore sulla hubris.
    pt: Dédalo criou asas de penas e cera para escapar do Labirinto. Seu filho Ícaro voou muito perto
      do sol, derretendo a cera. A história é um conto de advertência sobre a hybris.
    ru: Дедал смастерил крылья из перьев и воска, чтобы сбежать из Лабиринта. Его сын Икар подлетел слишком
      близко к солнцу, воск расплавился. История является предостережением о гордыне.
    ja: ダイダロスは迷宮から脱出するために羽毛と蝋の翼を作った。彼の息子イカロスは太陽に近づきすぎて蝋が溶けた。この物語は傲慢に対する戒めである。
    zh: 代达罗斯用羽毛和蜡制作了翅膀以逃离迷宫。他的儿子伊卡洛斯飞得离太阳太近，蜡融化了。这个故事是关于狂妄自大的警示。
    ar: صنع دايدالوس أجنحة من الريش والشمع للهروب من المتاهة. طار ابنه إيكاروس بالقرب من الشمس، مما أدى
      إلى ذوبان الشمع. القصة هي حكاية تحذيرية عن الغطرسة.
    he: דדלוס יצר כנפיים מנוצות ושעווה כדי לברוח מהמבוך. בנו איקרוס עף קרוב מדי לשמש, השעווה נמסה. הסיפור
