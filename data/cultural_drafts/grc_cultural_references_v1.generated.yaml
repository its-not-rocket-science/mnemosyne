  i18n_explanations:
    en: The Chimera was a fire-breathing hybrid monster with a lion's head, goat's body, and serpent's
      tail, killed by Bellerophon. It represents something impossible or fantastical, from which the word
      'chimera' derives.
    es: La Quimera era un monstruo híbrido que escupía fuego, con cabeza de león, cuerpo de cabra y cola
      de serpiente, muerto por Belerofonte. Representa algo imposible o fantástico, de donde deriva la
      palabra 'quimera'.
    fr: La Chimère était un monstre hybride cracheur de feu, avec une tête de lion, un corps de chèvre
      et une queue de serpent, tué par Bellérophon. Elle représente quelque chose d'impossible ou de fantastique,
      d'où dérive le mot 'chimère'.
    de: Die Chimäre war ein feuerspeiendes Hybridmonster mit Löwenkopf, Ziegenkörper und Schlangenschwanz,
      getötet von Bellerophon. Sie repräsentiert etwas Unmögliches oder Fantastisches, von dem das Wort
      'Chimäre' abgeleitet ist.
    it: La Chimera era un mostro ibrido sputafuoco con testa di leone, corpo di capra e coda di serpente,
      uccisa da Bellerofonte. Rappresenta qualcosa di impossibile o fantastico, da cui deriva la parola
      'chimera'.
    pt: A Quimera era um monstro híbrido que cuspia fogo, com cabeça de leão, corpo de cabra e cauda de
      serpente, morto por Belerofonte. Representa algo impossível ou fantástico, de onde deriva a palavra
      'quimera'.
    ru: Химера была огнедышащим гибридным чудовищем с головой льва, телом козы и хвостом змеи, убитым
      Беллерофонтом. Она представляет собой нечто невозможное или фантастическое, откуда происходит слово
      'химера'.
    ja: キマイラは、ライオンの頭、ヤギの体、蛇の尾を持つ火を吹く混成怪物で、ベレロポーンによって倒された。不可能または空想的なものを表し、そこから「キメラ」という言葉が派生した。
    zh: 喀迈拉是一只喷火的三头混合怪兽，拥有狮头、羊身和蛇尾，被柏勒洛丰杀死。它代表着不可能或幻想的事物，单词“chimera”源于此。
    ar: الكيميرا كانت وحشًا هجينًا ينفث النار، برأس أسد وجسد عنزة وذيل أفعى، قتله بيليروفون. إنها تمثل
