    es: Fragmento de Heráclito que afirma que el conflicto o la lucha es el principio generador de todas
      las cosas. Destaca el papel de la oposición en la creación y el cambio.
    fr: Fragment d'Héraclite affirmant que le conflit ou la lutte est le principe générateur de toutes
