      la mythologie grecque. C'était aussi le titre d'une épopée perdue du Cycle troyen.
    de: Die 'Zerstörung Trojas' bezieht sich auf die legendäre Zerstörung Trojas, ein zentrales Ereignis
      der griechischen Mythologie. Es war auch der Titel eines verlorenen Epos im Trojanischen Zyklus.
    it: Il 'Sacco di Troia' si riferisce alla leggendaria distruzione di Troia, un evento centrale nella
      mitologia greca. Era anche il titolo di un poema epico perduto del Ciclo Troiano.
