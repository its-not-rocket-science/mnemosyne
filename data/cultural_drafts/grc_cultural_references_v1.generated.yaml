    his fierce anger that drives the plot.
  i18n_explanations:
    en: The wrath of Achilles is the central theme of Homer's Iliad; the participle encapsulates his fierce
      anger that drives the plot.
    es: La ira de Aquiles es el tema central de la Ilíada de Homero; el participio encapsula su feroz
      enfado que impulsa la trama.
    fr: La colère d'Achille est le thème central de l'Iliade d'Homère ; le participe résume sa fureur
      qui anime l'intrigue.
    de: Der Zorn des Achill ist das zentrale Thema von Homers Ilias; das Partizip fasst seine wilde Wut
      zusammen, die die Handlung vorantreibt.
    it: L'ira di Achille è il tema centrale dell'Iliade di Omero; il participio racchiude la sua feroce
      rabbia che guida la trama.
    pt: A ira de Aquiles é o tema central da Ilíada de Homero; o particípio encapsula sua feroz raiva
      que impulsiona a trama.
    ru: Гнев Ахиллеса — центральная тема 'Илиады' Гомера; причастие encapsulates его яростный гнев, движущий
      сюжет.
    ja: アキレウスの怒りはホメロスの『イーリアス』の中心主題であり、分詞はプロットを駆動する彼の激しい怒りを凝縮している。
