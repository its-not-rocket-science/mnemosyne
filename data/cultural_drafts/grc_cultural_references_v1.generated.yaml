  short_explanation: Philip II of Macedon (382-336 BCE) was the father of Alexander the Great who unified
    Greece and laid the foundation for the conquests of his son. He is extensively discussed in Plutarch's
    Life of Alexander and in Diodorus Siculus's Library of History.
  i18n_explanations:
    en: Philip II of Macedon (382-336 BCE) was the father of Alexander the Great who unified Greece and
      laid the foundation for the conquests of his son. He is extensively discussed in Plutarch's Life
      of Alexander and in Diodorus Siculus's Library of History.
    es: Filipo II de Macedonia (382-336 a.C.) fue el padre de Alejandro Magno, quien unificó Grecia y
      sentó las bases para las conquistas de su hijo. Es discutido extensamente en la Vida de Alejandro
      de Plutarco y en la Biblioteca Histórica de Diodoro Sículo.
    fr: Philippe II de Macédoine (382-336 av. J.-C.) fut le père d'Alexandre le Grand, qui unifia la Grèce
      et jeta les bases des conquêtes de son fils. Il est amplement traité dans la Vie d'Alexandre de
      Plutarque et dans la Bibliothèque historique de Diodore de Sicile.
    de: Philipp II. von Makedonien (382-336 v. Chr.) war der Vater Alexanders des Großen, der Griechenland
      einigte und die Grundlage für die Eroberungen seines Sohnes legte. Er wird ausführlich in Plutarchs
      Alexanderleben und in Diodors Historischer Bibliothek behandelt.
    it: Filippo II di Macedonia (382-336 a.C.) fu il padre di Alessandro Magno che unificò la Grecia e
      gettò le basi per le conquiste del figlio. È ampiamente discusso nella Vita di Alessandro di Plutarco
      e nella Biblioteca storica di Diodoro Siculo.
    pt: Filipe II da Macedônia (382-336 a.C.) foi o pai de Alexandre, o Grande, que unificou a Grécia
      e lançou as bases para as conquistas de seu filho. É extensivamente discutido na Vida de Alexandre
      de Plutarco e na Biblioteca Histórica de Diodoro Sículo.
    ru: Филипп II Македонский (382-336 гг. до н.э.) был отцом Александра Македонского, объединившим Грецию
      и заложившим основы для завоеваний своего сына. Он подробно рассматривается в «Жизни Александра»
      Плутарха и в «Исторической библиотеке» Диодора Сицилийского.
    ja: マケドニア王ピリッポス2世（紀元前382-336年）はアレクサンドロス大王の父であり、ギリシャを統一し、息子の征服の基礎を築いた。プルタルコスの『アレクサンドロス伝』やディオドロス・シケリアの『歴史叢書』で広く論じられている。
    zh: 马其顿的腓力二世（公元前382-336年）是亚历山大大帝的父亲，他统一了希腊，为其子的征服奠定了基础。普鲁塔克的《亚历山大传》和狄奥多罗斯的《历史丛书》中对他有广泛论述。
    ar: فيليب الثاني المقدوني (382-336 قبل الميلاد) كان والد الإسكندر الأكبر الذي وحد اليونان وأرسى الأساس
      لفتوحات ابنه. تمت مناقشته على نطاق واسع في حياة الإسكندر لبلوتارخ وفي مكتبة التاريخ لديودور الصقلي.
    he: פיליפוס השני ממוקדון (382-336 לפנה"ס) היה אביו של אלכסנדר הגדול שאיחד את יוון והניח את הבסיס לכיבושי
      בנו. הוא נדון בהרחבה ב"חיי אלכסנדר" של פלוטרכוס וב"הספרייה ההיסטורית" של דיודורוס סיקולוס.
