  - in wine, truth
  short_explanation: Meaning 'in wine there is truth,' this proverb suggests that alcohol loosens inhibitions
    and reveals hidden thoughts. Attributed to the poet Alcaeus but widely used in later Greek and Roman
    traditions.
  i18n_explanations:
    en: Meaning 'in wine there is truth,' this proverb suggests that alcohol loosens inhibitions and reveals
      hidden thoughts. Attributed to the poet Alcaeus but widely used in later Greek and Roman traditions.
    es: Significa 'en el vino está la verdad', este proverbio sugiere que el alcohol afloja las inhibiciones
      y revela pensamientos ocultos. Atribuido al poeta Alceo, pero ampliamente utilizado en tradiciones
      griegas y romanas posteriores.
    fr: Signifiant 'dans le vin, la vérité', ce proverbe suggère que l'alcool relâche les inhibitions
      et révèle les pensées cachées. Attribué au poète Alcée, mais largement utilisé dans les traditions
      grecques et romaines ultérieures.
    de: Bedeutet 'im Wein liegt Wahrheit'. Dieses Sprichwort besagt, dass Alkohol Hemmungen löst und verborgene
      Gedanken offenbart. Es wird dem Dichter Alkaios zugeschrieben, war aber in späteren griechischen
      und römischen Traditionen weit verbreitet.
    it: Significa 'nel vino la verità', questo proverbio suggerisce che l'alcol allenta le inibizioni
      e rivela pensieri nascosti. Attribuito al poeta Alceo, ma ampiamente usato nelle successive tradizioni
      greche e romane.
    pt: Significando 'no vinho há verdade', este provérbio sugere que o álcool solta as inibições e revela
      pensamentos ocultos. Atribuído ao poeta Alceu, mas amplamente usado nas tradições grega e romana
      posteriores.
    ru: Означает 'в вине истина', эта пословица предполагает, что алкоголь ослабляет торможение и раскрывает
      скрытые мысли. Приписывается поэту Алкею, но широко использовалась в более поздних греческих и римских
      традициях.
    ja: '''酒に真実あり''という意味で、酒が抑制を緩め隠された考えを明らかにすることを示すことわざ。詩人アルカイオスに帰されるが、後のギリシャ・ローマの伝統で広く使われた。'
    zh: 意思是‘酒中有真理’，这句谚语表明酒精能放松抑制，揭示隐藏的想法。归功于诗人阿尔凯奥斯，但在后来的希腊和罗马传统中被广泛使用。
    ar: معنى 'في الخمر الحقيقة'، هذا المثل يوحي بأن الكحول يخفف الموانع ويكشف الأفكار الخفية. يُنسب للشاعر
