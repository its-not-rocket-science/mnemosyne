      tragedy and the worship of Dionysus.
    es: Frase que se dice cuando algo es irrelevante para el asunto en cuestión, originada en el teatro
      griego antiguo cuando el coro o los actores rompían la ilusión dramática. Refleja la conexión entre
      la tragedia y el culto a Dioniso.
    fr: Expression utilisée lorsque quelque chose n'a aucun rapport avec le sujet, originaire du théâtre
      grec antique quand le chœur ou les acteurs brisaient l'illusion dramatique. Elle reflète le lien
      entre la tragédie et le culte de Dionysos.
    de: Ein Ausdruck, der verwendet wird, wenn etwas für die vorliegende Sache irrelevant ist. Er stammt
      aus dem antiken griechischen Theater, wenn der Chor oder die Schauspieler die dramatische Illusion
      durchbrachen. Er spiegelt die Verbindung zwischen Tragödie und dem Dionysoskult wider.
    it: Espressione usata quando qualcosa è irrilevante per la questione in esame, originaria del teatro
      greco antico quando il coro o gli attori infrangevano l'illusione drammatica. Riflette il legame
      tra la tragedia e il culto di Dioniso.
    pt: Frase dita quando algo é irrelevante para o assunto em questão, originada no teatro grego antigo
      quando o coro ou atores quebravam a ilusão dramática. Reflete a conexão entre a tragédia e o culto
      a Dionísio.
    ru: Фраза, произносимая, когда что-то не относится к делу, возникшая в древнегреческом театре, когда
