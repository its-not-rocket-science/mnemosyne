    es: Las manzanas de oro fueron un regalo de bodas para Hera, custodiadas por las Hespérides y un dragón.
      Heracles tuvo la tarea de recuperarlas como uno de sus doce trabajos.
    fr: Les pommes d'or étaient un cadeau de mariage pour Héra, gardées par les Hespérides et un dragon.
