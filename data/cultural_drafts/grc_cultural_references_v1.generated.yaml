  short_explanation: 'From Pericles'' Funeral Oration in Thucydides: ''For great men, the whole earth
    is a tomb.'' It means that famous individuals are honored everywhere, not just in their homeland.'
  i18n_explanations:
    en: 'From Pericles'' Funeral Oration in Thucydides: ''For great men, the whole earth is a tomb.''
      It means that famous individuals are honored everywhere, not just in their homeland.'
    es: 'Del discurso fúnebre de Pericles en Tucídides: ''Para los grandes hombres, toda la tierra es
      una tumba''. Significa que las personas famosas son honradas en todas partes, no solo en su patria.'
    fr: 'Du discours funèbre de Périclès chez Thucydide : ''Pour les grands hommes, la terre entière est
      un tombeau.'' Cela signifie que les personnes célèbres sont honorées partout, pas seulement dans
      leur patrie.'
    de: 'Aus der Gefallenenrede des Perikles bei Thukydides: ''Für große Männer ist die ganze Erde ein
      Grab.'' Es bedeutet, dass berühmte Personen überall geehrt werden, nicht nur in ihrer Heimat.'
    it: 'Dal discorso funebre di Pericle in Tucidide: ''Per i grandi uomini, tutta la terra è una tomba.''
      Significa che le persone famose sono onorate ovunque, non solo nella loro patria.'
    pt: 'Do discurso fúnebre de Péricles em Tucídides: ''Para os grandes homens, toda a terra é um túmulo.''
      Significa que pessoas famosas são honradas em todos os lugares, não apenas em sua pátria.'
    ru: 'Из надгробной речи Перикла у Фукидида: «Для великих людей вся земля — могила». Это означает,
      что известные люди почитаются повсюду, а не только на родине.'
    ja: トゥキュディデスによるペリクレスの葬送演説から：「偉大な男たちにとって、全地は墓である」。これは、有名な人物は故郷だけでなくどこでも称えられることを意味する。
    zh: 出自修昔底德《伯罗奔尼撒战争史》中伯里克利的葬礼演说：“对于伟大的人，整个地球都是墓碑。”意思是杰出人物处处受人敬仰，不仅限于家乡。
    ar: 'من خطبة بريكليس الجنائزية عند ثوسيديدس: «بالنسبة للرجال العظماء، الأرض كلها قبر». يعني أن الأشخاص
      المشهورين يُكرمون في كل مكان، وليس فقط في وطنهم.'
    he: 'מתוך נאום ההספד של פריקלס אצל תוקידידס: ''עבור אנשים גדולים, כל הארץ היא קבר''. פירושו שאנשים
      מפורסמים זוכים לכבוד בכל מקום, לא רק במולדתם.'
