    ja: 戦いは万物の父であるというヘラクレイトスの断片。闘争が万物の生成原理であると主張し、創造と変化における対立の役割を強調している。
    zh: 赫拉克利特的一则残篇，断言冲突或斗争是万物的生成原则。它强调了对立在创造和变化中的作用。
    ar: مقطع من هيراقليطس يؤكد أن الصراع أو النزاع هو المبدأ المولد لكل الأشياء. يبرز دور المعارضة في
