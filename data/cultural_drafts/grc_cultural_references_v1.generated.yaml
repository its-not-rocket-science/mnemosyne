  short_explanation: Refers to the myth of Sisyphus, who was condemned to roll a boulder up a hill for
    eternity, symbolizing futile or endless labor. The phrase is a metaphor for a task that never ends.
  i18n_explanations:
    en: Refers to the myth of Sisyphus, who was condemned to roll a boulder up a hill for eternity, symbolizing
      futile or endless labor. The phrase is a metaphor for a task that never ends.
    es: Se refiere al mito de Sísifo, quien fue condenado a rodar una roca cuesta arriba por la eternidad,
      simbolizando un trabajo fútil o interminable. La frase es una metáfora de una tarea que nunca termina.
    fr: Fait référence au mythe de Sisyphe, condamné à rouler un rocher en haut d'une colline pour l'éternité,
      symbolisant un travail futile ou sans fin. La phrase est une métaphore d'une tâche qui ne se termine
      jamais.
    de: Bezieht sich auf den Mythos von Sisyphos, der dazu verurteilt war, für die Ewigkeit einen Felsen
      einen Hügel hinaufzurollen, was sinnlose oder endlose Arbeit symbolisiert. Der Ausdruck ist eine
      Metapher für eine nie endende Aufgabe.
    it: Si riferisce al mito di Sisifo, che fu condannato a far rotolare un masso su per una collina per
