  short_explanation: Turkish proverb meaning 'A drowning man will clutch at a snake'. It describes a desperate
    person who will grasp at any chance, even a dangerous one, to save themselves.
  i18n_explanations:
    en: Turkish proverb meaning 'A drowning man will clutch at a snake'. It describes a desperate person
      who will grasp at any chance, even a dangerous one, to save themselves.
    es: Proverbio turco que significa 'Un hombre que se ahoga se aferrará a una serpiente'. Describe a
      una persona desesperada que se aferrará a cualquier oportunidad, incluso peligrosa, para salvarse.
    fr: Proverbe turc signifiant 'Un homme qui se noie s'accrochera à un serpent'. Il décrit une personne
      désespérée qui saisira toute chance, même dangereuse, pour se sauver.
    de: Türkisches Sprichwort, das bedeutet 'Ein Ertrinkender klammert sich an eine Schlange'. Es beschreibt
      einen verzweifelten Menschen, der jede noch so gefährliche Gelegenheit ergreift, um sich zu retten.
    it: Proverbio turco che significa 'Un uomo che sta annegando si aggrapperà a un serpente'. Descrive
      una persona disperata che afferrerà qualsiasi possibilità, anche pericolosa, per salvarsi.
    pt: Provérbio turco que significa 'Um homem que está se afogando se agarrará a uma cobra'. Descreve
      uma pessoa desesperada que se agarrará a qualquer chance, mesmo perigosa, para se salvar.
    ru: Турецкая пословица, означающая «Утопающий за змею ухватится». Она описывает отчаявшегося человека,
      который ухватится за любую возможность, даже опасную, чтобы спастись.
    ja: 「溺れる者は蛇にすがる」という意味のトルコのことわざ。絶望した人は危険なものでも、どんなチャンスにもすがりついて助かろうとする様子を表しています。
    zh: 土耳其谚语，意为“溺水的人连蛇也会抓住”。它描述了一个绝望的人会抓住任何机会，甚至是危险的机会来拯救自己。
    ar: مثل تركي يعني 'الغريق يتعلق بالثعبان'. يصف شخصًا يائسًا سيتشبث بأي فرصة، حتى لو كانت خطيرة، لإنقاذ
      نفسه.
    he: פתגם טורקי שפירושו 'אדם טובע יאחז בנחש'. הוא מתאר אדם נואש שיתפוס כל הזדמנות, אפילו מסוכנת, כדי
