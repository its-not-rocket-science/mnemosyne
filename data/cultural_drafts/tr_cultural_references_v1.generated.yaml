    en: Literally 'the blind and the deaf entertain each other'. Used to describe a situation where incompetent
      people support each other, or where people overlook each other's flaws.
    es: Literalmente 'los ciegos y los sordos se entretienen mutuamente'. Se usa para describir una situación
      donde personas incompetentes se apoyan entre sí, o donde las personas pasan por alto los defectos
      de los demás.
    fr: Littéralement 'les aveugles et les sourds se divertissent mutuellement'. Utilisé pour décrire
      une situation où des personnes incompétentes se soutiennent mutuellement, ou où les gens ignorent
      les défauts des autres.
    de: Wörtlich 'die Blinden und die Tauben unterhalten sich gegenseitig'. Wird verwendet, um eine Situation
      zu beschreiben, in der inkompetente Menschen sich gegenseitig unterstützen oder in der Menschen
      die Fehler des anderen übersehen.
    it: Letteralmente 'i ciechi e i sordi si intrattengono a vicenda'. Usato per descrivere una situazione
      in cui persone incompetenti si sostengono a vicenda, o in cui le persone trascurano i difetti degli
      altri.
    pt: Literalmente 'os cegos e os surdos se entretêm mutuamente'. Usado para descrever uma situação
      onde pessoas incompetentes se apoiam mutuamente, ou onde as pessoas ignoram os defeitos umas das
      outras.
    ru: Буквально 'слепые и глухие развлекают друг друга'. Используется для описания ситуации, когда некомпетентные
      люди поддерживают друг друга, или когда люди не замечают недостатков друг друга.
    ja: 文字通り「盲人と聾者が互いに楽しませ合う」。無能な人々が互いに支え合ったり、人々が互いの欠点を見過ごしたりする状況を表すために使われる。
    zh: 字面意思是“盲人和聋人互相娱乐”。用于描述无能的人互相支持，或者人们忽视彼此缺点的情形。
    ar: حرفيًا 'الأعمى والأصم يسليان بعضهما البعض'. يُستخدم لوصف موقف حيث يدعم الأشخاص غير الأكفاء بعضهم
