    de: Naima (Mustafa Naima) war ein osmanischer Historiker, bekannt für seine Chronik 'Tarih-i Naima',
      die die osmanische Geschichte von 1591 bis 1660 abdeckt. Sie ist eine Schlüsselquelle für die Zeit.
    it: Naima (Mustafa Naima) fu uno storico ottomano noto per la sua cronaca 'Tarih-i Naima', che copre
