  short_explanation: A Turkish proverb meaning 'Everyone reads what they know.' It implies that people
    tend to stick to their own knowledge and opinions, often ignoring others' perspectives.
  i18n_explanations:
    en: A Turkish proverb meaning 'Everyone reads what they know.' It implies that people tend to stick
      to their own knowledge and opinions, often ignoring others' perspectives.
    es: Un proverbio turco que significa 'Cada uno lee lo que sabe.' Implica que las personas tienden
      a aferrarse a su propio conocimiento y opiniones, ignorando a menudo las perspectivas de los demás.
    fr: Un proverbe turc signifiant 'Chacun lit ce qu'il sait.' Il implique que les gens ont tendance
      à s'en tenir à leurs propres connaissances et opinions, ignorant souvent les perspectives des autres.
    de: Ein türkisches Sprichwort, das bedeutet 'Jeder liest, was er weiß.' Es impliziert, dass Menschen
      dazu neigen, an ihrem eigenen Wissen und ihren Meinungen festzuhalten und oft die Perspektiven anderer
      ignorieren.
    it: Un proverbio turco che significa 'Ognuno legge ciò che sa.' Implica che le persone tendono a rimanere
      fedeli alle proprie conoscenze e opinioni, spesso ignorando le prospettive altrui.
    pt: Um provérbio turco que significa 'Cada um lê o que sabe.' Implica que as pessoas tendem a se ater
      ao seu próprio conhecimento e opiniões, muitas vezes ignorando as perspectivas dos outros.
    ru: Турецкая пословица, означающая 'Каждый читает то, что знает.' Она подразумевает, что люди склонны
      придерживаться своих собственных знаний и мнений, часто игнорируя точки зрения других.
    ja: 「各自が知っていることを読む」という意味のトルコのことわざ。人々は自分の知識や意見に固執し、他人の視点を無視しがちであることを示唆する。
    zh: 一句土耳其谚语，意思是“每个人读自己知道的东西。”它暗示人们倾向于坚持自己的知识和观点，常常忽视他人的看法。
    ar: مثل تركي يعني 'كل شخص يقرأ ما يعرفه.' يشير إلى أن الناس يميلون إلى التمسك بمعارفهم وآرائهم، وغالبًا
      ما يتجاهلون وجهات نظر الآخرين.
    he: פתגם טורקי שפירושו 'כל אחד קורא את מה שהוא יודע.' הוא מרמז שאנשים נוטים להיצמד לידע ולדעות שלהם,
