- id: tr_cultural_reference_i_stanbul_un_fethi_c6983aab
  language: tr
  canonical_reference: İstanbul’un Fethi
  reference_type: cultural_reference
  surface_patterns:
  - İstanbul'un Fethi
  - Feth-i İstanbul
  - İstanbul fethi
  short_explanation: The conquest of Constantinople (Istanbul) by the Ottoman Empire in 1453 under Mehmed
    II. It marks a pivotal moment in Turkish and world history, symbolizing the rise of Ottoman power
    and the end of the Byzantine Empire.
  i18n_explanations:
    en: The conquest of Constantinople (Istanbul) by the Ottoman Empire in 1453 under Mehmed II. It marks
      a pivotal moment in Turkish and world history, symbolizing the rise of Ottoman power and the end
      of the Byzantine Empire.
    es: La conquista de Constantinopla (Estambul) por el Imperio Otomano en 1453 bajo Mehmed II. Marca
      un momento crucial en la historia turca y mundial, simbolizando el ascenso del poder otomano y el
      fin del Imperio Bizantino.
    fr: La conquête de Constantinople (Istanbul) par l'Empire ottoman en 1453 sous Mehmed II. Elle marque
      un moment charnière de l'histoire turque et mondiale, symbolisant l'essor de la puissance ottomane
      et la fin de l'Empire byzantin.
    de: Die Eroberung Konstantinopels (Istanbul) durch das Osmanische Reich im Jahr 1453 unter Mehmed
      II. Sie markiert einen Wendepunkt in der türkischen und Weltgeschichte und symbolisiert den Aufstieg
      der osmanischen Macht und das Ende des Byzantinischen Reiches.
    it: La conquista di Costantinopoli (Istanbul) da parte dell'Impero Ottomano nel 1453 sotto Mehmed
      II. Segna un momento cruciale nella storia turca e mondiale, simboleggiando l'ascesa del potere
      ottomano e la fine dell'Impero Bizantino.
    pt: A conquista de Constantinopla (Istambul) pelo Império Otomano em 1453 sob Mehmed II. Marca um
      momento crucial na história turca e mundial, simbolizando a ascensão do poder otomano e o fim do
      Império Bizantino.
    ru: Завоевание Константинополя (Стамбула) Османской империей в 1453 году под предводительством Мехмеда
      II. Это знаменует поворотный момент в турецкой и мировой истории, символизируя возвышение османской
