    ja: ズィヤ・ギョカルプ（1876-1924）はトルコの社会学者、作家、詩人であり、トルコ民族主義の父と見なされている。彼の思想はトルコ共和国の建国理念に大きな影響を与え、トルコ化、イスラム化、近代化を強調した。
    zh: 齐亚·格卡尔普（1876-1924）是土耳其社会学家、作家和诗人，被认为是土耳其民族主义之父。他的思想深刻影响了土耳其共和国的建国意识形态，强调土耳其化、伊斯兰化和现代化。
    ar: ضياء جوكالب (1876-1924) كان عالم اجتماع وكاتباً وشاعراً تركياً، يعتبر أب القومية التركية. أثرت
