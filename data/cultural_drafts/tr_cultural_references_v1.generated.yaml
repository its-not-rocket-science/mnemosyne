    it: Questo proverbio turco significa 'Ciò che guadagna poco, guadagna molto.' Suggerisce che i piccoli
      guadagni costanti si accumulano nel tempo, promuovendo pazienza e perseveranza.
    pt: Este provérbio turco significa 'O que ganha pouco, ganha muito.' Sugere que pequenos ganhos constantes
