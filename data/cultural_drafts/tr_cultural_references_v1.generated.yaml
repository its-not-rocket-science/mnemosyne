- id: tr_cultural_reference_ne_oldum_delisi_olmamak_50099d64
  language: tr
  canonical_reference: Ne oldum delisi olmamak
  reference_type: cultural_reference
  surface_patterns:
  - ne oldum delisi olmamak
  - ne oldum delisi
  - ne oldum delisine dönmek
  short_explanation: A phrase meaning 'not to become crazy with sudden success or wealth,' warning against
    arrogance. It reflects a cultural value of humility.
  i18n_explanations:
    en: A phrase meaning 'not to become crazy with sudden success or wealth,' warning against arrogance.
      It reflects a cultural value of humility.
    es: Frase que significa 'no volverse loco con el éxito o la riqueza repentinos', advirtiendo contra
      la arrogancia. Refleja un valor cultural de humildad.
