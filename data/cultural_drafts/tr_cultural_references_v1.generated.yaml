    it: Un proverbio turco che significa 'Tutto ciò che è nuovo è buono, ma un vecchio amico è il migliore.'
      Sottolinea il valore delle amicizie di lunga data rispetto ai nuovi beni.
    pt: Um provérbio turco que significa 'Tudo novo é bom, mas um amigo velho é o melhor.' Enfatiza o
      valor das amizades duradouras sobre as novas posses.
    ru: Турецкая пословица, означающая 'Всё новое хорошо, но старый друг лучше всех.' Она подчёркивает
      ценность давней дружбы по сравнению с новыми приобретениями.
    ja: 「新しいものはすべて良いが、古い友人が最良」という意味のトルコのことわざ。新しい所有物よりも長年の友情の価値を強調する。
    zh: 一句土耳其谚语，意思是“一切新的都好，但老朋友最好。”它强调长期友谊比新财产更有价值。
