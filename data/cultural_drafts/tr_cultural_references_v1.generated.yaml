  short_explanation: Türk Dil Kurumu (Turkish Language Association) is the official regulatory body for
    the Turkish language, founded in 1932 by Atatürk. It conducts language reforms and publishes dictionaries.
  i18n_explanations:
    en: Türk Dil Kurumu (Turkish Language Association) is the official regulatory body for the Turkish
      language, founded in 1932 by Atatürk. It conducts language reforms and publishes dictionaries.
    es: Türk Dil Kurumu (Asociación de la Lengua Turca) es el organismo regulador oficial de la lengua
      turca, fundado en 1932 por Atatürk. Realiza reformas lingüísticas y publica diccionarios.
    fr: Türk Dil Kurumu (Association de la langue turque) est l'organisme officiel de régulation de la
      langue turque, fondé en 1932 par Atatürk. Il mène des réformes linguistiques et publie des dictionnaires.
    de: Türk Dil Kurumu (Türkische Sprachvereinigung) ist die offizielle Regulierungsbehörde für die türkische
      Sprache, gegründet 1932 von Atatürk. Sie führt Sprachreformen durch und veröffentlicht Wörterbücher.
    it: Türk Dil Kurumu (Associazione della Lingua Turca) è l'organismo ufficiale di regolamentazione
      della lingua turca, fondato nel 1932 da Atatürk. Conduce riforme linguistiche e pubblica dizionari.
    pt: Türk Dil Kurumu (Associação da Língua Turca) é o órgão regulador oficial da língua turca, fundado
      em 1932 por Atatürk. Realiza reformas linguísticas e publica dicionários.
    ru: Тюрк Диль Куруму (Турецкая языковая ассоциация) — официальный регулирующий орган турецкого языка,
      основанный в 1932 году Ататюрком. Проводит языковые реформы и публикует словари.
    ja: トルコ語協会（Türk Dil Kurumu）は、1932年にアタテュルクによって設立されたトルコ語の公式規制機関です。言語改革を行い、辞書を出版しています。
    zh: 土耳其语言协会（Türk Dil Kurumu）是土耳其语的官方监管机构，由阿塔图尔克于1932年创立。它进行语言改革并出版词典。
    ar: جمعية اللغة التركية (Türk Dil Kurumu) هي الهيئة التنظيمية الرسمية للغة التركية، أسسها أتاتورك
      في عام 1932. تقوم بإجراء إصلاحات لغوية وتنشر القواميس.
    he: אגודת השפה הטורקית (Türk Dil Kurumu) היא הגוף הרשמי המסדיר את השפה הטורקית, שנוסד ב-1932 על ידי
