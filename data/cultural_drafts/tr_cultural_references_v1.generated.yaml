    en: A Turkish proverb meaning 'Every day is a holiday for a fool.' It suggests that foolish or carefree
      people find joy in simple things and are not burdened by responsibilities.
    es: Proverbio turco que significa 'Cada día es fiesta para un tonto.' Sugiere que las personas tontas
      o despreocupadas encuentran alegría en cosas simples y no están agobiadas por responsabilidades.
    fr: Proverbe turc signifiant 'Chaque jour est un jour de fête pour un fou.' Il suggère que les personnes
      insouciantes ou folles trouvent de la joie dans les choses simples et ne sont pas accablées par
      les responsabilités.
    de: Ein türkisches Sprichwort, das bedeutet 'Jeder Tag ist ein Feiertag für einen Narren.' Es deutet
