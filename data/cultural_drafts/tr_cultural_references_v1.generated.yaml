  i18n_explanations:
    en: A Turkish proverb meaning 'There is death, there is separation,' reminding that life is uncertain
      and that both death and parting are inevitable realities.
    es: Proverbio turco que significa 'Hay muerte, hay separación', recordando que la vida es incierta
      y que tanto la muerte como la separación son realidades inevitables.
    fr: Proverbe turc signifiant 'Il y a la mort, il y a la séparation', rappelant que la vie est incertaine
      et que la mort et la séparation sont des réalités inévitables.
    de: Ein türkisches Sprichwort, das bedeutet 'Es gibt den Tod, es gibt die Trennung', erinnert daran,
      dass das Leben unsicher ist und sowohl Tod als auch Trennung unvermeidliche Realitäten sind.
    it: Proverbio turco che significa 'C'è la morte, c'è la separazione', ricordando che la vita è incerta
      e che sia la morte che la separazione sono realtà inevitabili.
    pt: Provérbio turco que significa 'Há morte, há separação', lembrando que a vida é incerta e que tanto
      a morte quanto a separação são realidades inevitáveis.
