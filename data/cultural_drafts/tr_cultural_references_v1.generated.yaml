    es: Modismo turco que se refiere a una persona perezosa o inútil, literalmente 'burro de tarhana',
      de la idea de que un burro usado para hacer tarhana (una sopa seca) no es muy útil.
    fr: Idiome turc désignant une personne paresseuse ou bonne à rien, littéralement 'âne de tarhana',
      de l'idée qu'un âne utilisé pour faire du tarhana (une soupe séchée) n'est pas très utile.
    de: Eine türkische Redewendung, die sich auf eine faule oder nichtsnutzige Person bezieht, wörtlich
      'Tarhana-Esel', von der Vorstellung, dass ein Esel, der zur Herstellung von Tarhana (einer getrockneten
      Suppe) verwendet wird, nicht sehr nützlich ist.
    it: Idioma turco che si riferisce a una persona pigra o buona a nulla, letteralmente 'asino di tarhana',
      dall'idea che un asino usato per fare tarhana (una zuppa secca) non sia molto utile.
    pt: Expressão idiomática turca que se refere a uma pessoa preguiçosa ou inútil, literalmente 'burro
      de tarhana', da ideia de que um burro usado para fazer tarhana (uma sopa seca) não é muito útil.
