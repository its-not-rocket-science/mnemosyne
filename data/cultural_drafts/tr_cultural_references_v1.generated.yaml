  i18n_explanations:
    en: A line from Pir Sultan Abdal's poem, meaning 'I came to this false world and I go.' It reflects
      the transient and deceptive nature of worldly life, a common theme in Alevi-Bektashi poetry.
    es: Un verso del poema de Pir Sultan Abdal, que significa 'Vine a este mundo falso y me voy'. Refleja
