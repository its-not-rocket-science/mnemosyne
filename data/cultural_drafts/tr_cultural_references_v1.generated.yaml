      familiar, calidez y prosperidad. El hogar (ocak) simboliza el hogar y el linaje.
    fr: Expression turque signifiant 'Que le foyer ne s'éteigne jamais', utilisée comme bénédiction pour
      la continuité familiale, la chaleur et la prospérité. Le foyer (ocak) symbolise la maison et la
      lignée.
    de: Ein türkischer Ausdruck, der bedeutet 'Möge der Herd nie ausgehen', verwendet als Segen für Familienkontinuität,
      Wärme und Wohlstand. Der Herd (ocak) symbolisiert Zuhause und Abstammung.
    it: Espressione turca che significa 'Che il focolare non si spenga mai', usata come benedizione per
      la continuità familiare, il calore e la prosperità. Il focolare (ocak) simboleggia la casa e il
      lignaggio.
    pt: Expressão turca que significa 'Que a lareira nunca se apague', usada como bênção para continuidade
      familiar, calor e prosperidade. A lareira (ocak) simboliza o lar e a linhagem.
    ru: Турецкое выражение, означающее 'Пусть очаг никогда не погаснет', используемое как благословение
      на продолжение рода, тепло и процветание. Очаг (ocak) символизирует дом и родословную.
