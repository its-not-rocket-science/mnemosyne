    squandered quickly. It warns against relying on inheritance without earning one's own living.
  i18n_explanations:
    en: A proverb meaning 'Father's wealth is quickly spent' – inherited wealth is often squandered quickly.
      It warns against relying on inheritance without earning one's own living.
    es: Un proverbio que significa 'La riqueza del padre se gasta rápido' – la riqueza heredada a menudo
      se derrocha rápidamente. Advierte contra depender de la herencia sin ganarse la vida.
    fr: Un proverbe signifiant 'La richesse du père se dépense vite' – la richesse héritée est souvent
      dilapidée rapidement. Il met en garde contre le fait de compter sur l'héritage sans gagner sa vie.
    de: Ein Sprichwort, das bedeutet 'Das Vermögen des Vaters ist schnell ausgegeben' – geerbtes Vermögen
      wird oft schnell verschwendet. Es warnt davor, sich auf das Erbe zu verlassen, ohne seinen eigenen
      Lebensunterhalt zu verdienen.
    it: Un proverbio che significa 'La ricchezza del padre si spende in fretta' – la ricchezza ereditata
      viene spesso sperperata rapidamente. Avverte di non fare affidamento sull'eredità senza guadagnarsi
      da vivere.
    pt: Um provérbio que significa 'A riqueza do pai acaba rápido' – a riqueza herdada é muitas vezes
      desperdiçada rapidamente. Adverte contra confiar na herança sem ganhar a própria vida.
    ru: Пословица, означающая 'Отцовское богатство быстро тратится' – унаследованное богатство часто быстро
