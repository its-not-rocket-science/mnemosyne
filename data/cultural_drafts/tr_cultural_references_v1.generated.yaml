- id: tr_proverb_tradition_hırsıza_kilit_olmaz_cb0f8506
  language: tr
  canonical_reference: Hırsıza kilit olmaz
  reference_type: proverb_tradition
  surface_patterns:
  - Hırsıza kilit olmaz
  - Hırsıza kilit olmaz, hırsız her kilidi açar
  short_explanation: A Turkish proverb meaning 'There is no lock for a thief.' It suggests that determined
    thieves will find a way to break any lock, so security measures are ultimately futile against them.
  i18n_explanations:
    en: A Turkish proverb meaning 'There is no lock for a thief.' It suggests that determined thieves
      will find a way to break any lock, so security measures are ultimately futile against them.
    es: Un proverbio turco que significa 'No hay cerradura para un ladrón.' Sugiere que los ladrones decididos
      encontrarán la manera de romper cualquier cerradura, por lo que las medidas de seguridad son en
      última instancia inútiles contra ellos.
    fr: Un proverbe turc signifiant 'Il n'y a pas de serrure pour un voleur.' Il suggère que les voleurs
      déterminés trouveront un moyen de briser toute serrure, donc les mesures de sécurité sont finalement
      vaines contre eux.
    de: Ein türkisches Sprichwort, das bedeutet 'Es gibt kein Schloss für einen Dieb.' Es deutet darauf
      hin, dass entschlossene Diebe einen Weg finden, jedes Schloss zu knacken, sodass Sicherheitsmaßnahmen
      letztlich nutzlos gegen sie sind.
    it: Un proverbio turco che significa 'Non esiste serratura per un ladro.' Suggerisce che i ladri determinati
      troveranno un modo per scassinare qualsiasi serratura, quindi le misure di sicurezza sono inutili
      contro di loro.
    pt: Um provérbio turco que significa 'Não há fechadura para ladrão.' Sugere que ladrões determinados
      encontrarão uma maneira de quebrar qualquer fechadura, então as medidas de segurança são inúteis
      contra eles.
