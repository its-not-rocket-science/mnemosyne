    hard work and hardship are necessary for achieving rewards or divine mercy.
  i18n_explanations:
    en: A Turkish proverb meaning 'Without effort, there is no blessing.' It emphasizes that hard work
      and hardship are necessary for achieving rewards or divine mercy.
    es: Proverbio turco que significa 'Sin esfuerzo no hay bendición'. Enfatiza que el trabajo duro y
      las dificultades son necesarios para obtener recompensas o misericordia divina.
    fr: Proverbe turc signifiant 'Sans effort, il n'y a pas de bénédiction'. Il souligne que le travail
      acharné et les difficultés sont nécessaires pour obtenir des récompenses ou la miséricorde divine.
    de: Ein türkisches Sprichwort, das bedeutet 'Ohne Mühe gibt es keinen Segen'. Es betont, dass harte
