  short_explanation: Turkish proverb meaning 'Even the drum plays for its match'. It suggests that people
    or things naturally seek or associate with those of similar status, quality, or kind.
  i18n_explanations:
    en: Turkish proverb meaning 'Even the drum plays for its match'. It suggests that people or things
      naturally seek or associate with those of similar status, quality, or kind.
    es: Proverbio turco que significa 'Incluso el tambor toca para su igual'. Sugiere que las personas
      o cosas buscan o se asocian naturalmente con aquellos de estatus, calidad o tipo similar.
    fr: Proverbe turc signifiant 'Même le tambour joue pour son égal'. Il suggère que les personnes ou
      les choses recherchent ou s'associent naturellement avec celles de statut, qualité ou nature similaire.
    de: Türkisches Sprichwort, das bedeutet 'Sogar die Trommel spielt für ihresgleichen'. Es deutet darauf
      hin, dass Menschen oder Dinge natürlicherweise solche mit ähnlichem Status, ähnlicher Qualität oder
      Art suchen oder sich mit ihnen verbinden.
    it: Proverbio turco che significa 'Anche il tamburo suona per il suo pari'. Suggerisce che le persone
      o le cose cercano o si associano naturalmente a quelle di status, qualità o tipo simile.
    pt: Provérbio turco que significa 'Até o tambor toca para o seu igual'. Sugere que pessoas ou coisas
      naturalmente buscam ou se associam com aqueles de status, qualidade ou tipo semelhante.
    ru: Турецкая пословица, означающая «Даже барабан играет для своего ровни». Она предполагает, что люди
      или вещи естественным образом ищут или объединяются с теми, кто имеет схожий статус, качество или
      вид.
    ja: 「太鼓でさえ自分の相手に合わせて鳴る」という意味のトルコのことわざ。人や物は自然と似た地位、質、種類のものを求める、または結びつくことを示唆しています。
    zh: 土耳其谚语，意为“连鼓也只与相配的鼓一起敲响”。它暗示人或事物自然会寻找或与相似地位、品质或类型的人或事物交往。
    ar: مثل تركي يعني 'حتى الطبل يعزف لمن يناسبه'. يشير إلى أن الأشخاص أو الأشياء يبحثون أو يرتبطون بشكل
      طبيعي بمن هم من نفس المكانة أو الجودة أو النوع.
    he: פתגם טורקי שפירושו 'אפילו התוף מנגן לבן זוגו'. הוא מציע שאנשים או דברים מחפשים או מתקשרים באופן
