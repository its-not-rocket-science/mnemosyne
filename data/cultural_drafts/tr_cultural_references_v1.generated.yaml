  short_explanation: Nutuk (The Speech) is a historical speech delivered by Mustafa Kemal Atatürk in 1927,
    recounting the Turkish War of Independence and the founding of the Republic of Turkey. It is a foundational
    text of modern Turkish nationalism.
  i18n_explanations:
    en: Nutuk (The Speech) is a historical speech delivered by Mustafa Kemal Atatürk in 1927, recounting
      the Turkish War of Independence and the founding of the Republic of Turkey. It is a foundational
      text of modern Turkish nationalism.
    es: Nutuk (El Discurso) es un discurso histórico pronunciado por Mustafa Kemal Atatürk en 1927, que
      relata la Guerra de Independencia turca y la fundación de la República de Turquía. Es un texto fundacional
      del nacionalismo turco moderno.
    fr: Nutuk (Le Discours) est un discours historique prononcé par Mustafa Kemal Atatürk en 1927, relatant
      la guerre d'indépendance turque et la fondation de la République de Turquie. C'est un texte fondateur
      du nationalisme turc moderne.
    de: Nutuk (Die Rede) ist eine historische Rede von Mustafa Kemal Atatürk aus dem Jahr 1927, die den
      türkischen Unabhängigkeitskrieg und die Gründung der Republik Türkei schildert. Es ist ein grundlegender
      Text des modernen türkischen Nationalismus.
    it: Nutuk (Il Discorso) è un discorso storico tenuto da Mustafa Kemal Atatürk nel 1927, che racconta
      la guerra d'indipendenza turca e la fondazione della Repubblica di Turchia. È un testo fondamentale
      del nazionalismo turco moderno.
    pt: Nutuk (O Discurso) é um discurso histórico proferido por Mustafa Kemal Atatürk em 1927, narrando
      a Guerra de Independência Turca e a fundação da República da Turquia. É um texto fundamental do
      nacionalismo turco moderno.
    ru: Нутук (Речь) — историческая речь, произнесённая Мустафой Кемалем Ататюрком в 1927 году, в которой
      описываются Турецкая война за независимость и основание Турецкой Республики. Это основополагающий
      текст современного турецкого национализма.
    ja: ヌトゥク（演説）は、1927年にムスタファ・ケマル・アタテュルクが行った歴史的な演説で、トルコ独立戦争とトルコ共和国の建国を語っています。現代トルコ民族主義の基礎となる文書です。
    zh: 《努图克》（演讲）是穆斯塔法·凯末尔·阿塔图尔克于1927年发表的历史性演讲，讲述了土耳其独立战争和土耳其共和国的建立。它是现代土耳其民族主义的基础文本。
    ar: نطق (الخطاب) هو خطاب تاريخي ألقاه مصطفى كمال أتاتورك في عام 1927، يروي حرب الاستقلال التركية وتأسيس
      الجمهورية التركية. وهو نص تأسيسي للقومية التركية الحديثة.
    he: נוטוק (הנאום) הוא נאום היסטורי שנשא מוסטפא כמאל אטאטורק ב-1927, המתאר את מלחמת העצמאות הטורקית
