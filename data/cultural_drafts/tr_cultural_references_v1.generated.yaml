      che danneggia entrambe le parti o è a doppio taglio.
    pt: Refere-se a uma espada persa que corta nos dois sentidos; usado metaforicamente para algo que
      prejudica ambos os lados ou tem dois gumes.
    ru: Относится к персидскому мечу, который режет в обе стороны; используется метафорически для чего-то,
