- id: tr_literary_reference_mevlana_nın_sözü_dün_dünde_kaldı_9db42701
  language: tr
  canonical_reference: 'Mevlana''nın sözü: ''Dün dünde kaldı'''
  reference_type: literary_reference
  surface_patterns:
  - dün dünde kaldı
  - 'Mevlana der ki: dün dünde kaldı'
  - dün dünde kaldı Mevlana
  short_explanation: A famous saying by the 13th-century Persian poet and Sufi mystic Rumi (Mevlana),
    meaning 'Yesterday is left in yesterday.' It encourages living in the present and not dwelling on
    the past.
  i18n_explanations:
    en: A famous saying by the 13th-century Persian poet and Sufi mystic Rumi (Mevlana), meaning 'Yesterday
      is left in yesterday.' It encourages living in the present and not dwelling on the past.
    es: Un famoso dicho del poeta persa y místico sufí del siglo XIII Rumi (Mevlana), que significa 'Ayer
      quedó en ayer'. Alienta a vivir en el presente y no detenerse en el pasado.
    fr: Un célèbre dicton du poète persan et mystique soufi du XIIIe siècle Rumi (Mevlana), signifiant
      'Hier est resté dans hier'. Il encourage à vivre dans le présent et à ne pas s'attarder sur le passé.
    de: Ein berühmter Ausspruch des persischen Dichters und Sufi-Mystikers Rumi (Mevlana) aus dem 13.
      Jahrhundert, der bedeutet 'Gestern ist in gestern geblieben'. Er ermutigt, in der Gegenwart zu leben
      und nicht in der Vergangenheit zu verweilen.
    it: Un famoso detto del poeta persiano e mistico sufi del XIII secolo Rumi (Mevlana), che significa
      'Ieri è rimasto in ieri'. Incoraggia a vivere nel presente e a non soffermarsi sul passato.
    pt: Um famoso ditado do poeta persa e místico sufi do século XIII Rumi (Mevlana), que significa 'Ontem
      ficou no ontem'. Incentiva a viver no presente e não se prender ao passado.
    ru: Известное изречение персидского поэта и суфийского мистика XIII века Руми (Мевлана), означающее
      'Вчера осталось во вчера'. Оно призывает жить настоящим и не зацикливаться на прошлом.
    ja: 13世紀のペルシャ詩人でスーフィー神秘家のルーミー（メヴラーナ）の有名な言葉で、「昨日は昨日に残った」という意味。現在を生き、過去にこだわらないことを促す。
    zh: 13世纪波斯诗人、苏菲神秘主义者鲁米（梅夫拉纳）的一句名言，意思是“昨天已经留在昨天”。它鼓励活在当下，不沉溺于过去。
    ar: قول مشهور للشاعر الفارسي والمتصوف الصوفي في القرن الثالث عشر جلال الدين الرومي (مولانا)، ويعني
      'الأمس بقي في الأمس'. يشجع على العيش في الحاضر وعدم التوقف عند الماضي.
    he: אמרה מפורסמת של המשורר הפרסי והמיסטיקן הסופי מהמאה ה-13 רומי (מאולאנה), שפירושה 'אתמול נשאר באתמול'.
