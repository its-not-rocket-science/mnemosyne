  short_explanation: A proverb meaning 'to join a caravan with a lame donkey,' used to describe someone
    who tries to keep up with others despite being ill-equipped or slow, often resulting in failure or
    delay.
  i18n_explanations:
    en: A proverb meaning 'to join a caravan with a lame donkey,' used to describe someone who tries to
      keep up with others despite being ill-equipped or slow, often resulting in failure or delay.
    es: Un proverbio que significa 'unirse a una caravana con un burro cojo', usado para describir a alguien
      que intenta seguir el ritmo de otros a pesar de estar mal equipado o ser lento, a menudo resultando
      en fracaso o retraso.
    fr: Un proverbe signifiant 'se joindre à une caravane avec un âne boiteux', utilisé pour décrire quelqu'un
      qui essaie de suivre les autres malgré un équipement insuffisant ou une lenteur, entraînant souvent
      un échec ou un retard.
    de: Ein Sprichwort, das bedeutet 'sich mit einem lahmen Esel einer Karawane anschließen', verwendet,
      um jemanden zu beschreiben, der trotz schlechter Ausrüstung oder Langsamkeit versucht, mit anderen
      Schritt zu halten, was oft zu Misserfolg oder Verzögerung führt.
    it: Un proverbio che significa 'unirsi a una carovana con un asino zoppo', usato per descrivere qualcuno
      che cerca di stare al passo con gli altri nonostante sia mal equipaggiato o lento, spesso con conseguente
      fallimento o ritardo.
    pt: Um provérbio que significa 'juntar-se a uma caravana com um burro manco', usado para descrever
      alguém que tenta acompanhar os outros apesar de estar mal equipado ou ser lento, muitas vezes resultando
      em fracasso ou atraso.
    ru: Пословица, означающая 'присоединиться к каравану с хромым ослом', используется для описания того,
      кто пытается не отставать от других, несмотря на плохую оснащенность или медлительность, что часто
      приводит к неудаче или задержке.
    ja: 「足の悪いロバで隊商に加わる」という意味のことわざで、装備が不十分だったり遅かったりするにもかかわらず他人についていこうとする人を表し、しばしば失敗や遅れを招く。
    zh: 一句谚语，意思是“带着瘸驴加入商队”，用于描述某人尽管装备不足或行动缓慢却试图跟上他人，往往导致失败或延误。
    ar: مثل يعني 'الانضمام إلى قافلة بحمار أعرج'، يُستخدم لوصف شخص يحاول مواكبة الآخرين على الرغم من ضعف
