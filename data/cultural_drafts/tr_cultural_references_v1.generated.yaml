  short_explanation: Village Institutes were a network of rural teacher-training schools established in
    Turkey in 1940 to promote education and development in villages. They are a significant part of Turkish
    educational history.
  i18n_explanations:
    en: Village Institutes were a network of rural teacher-training schools established in Turkey in 1940
      to promote education and development in villages. They are a significant part of Turkish educational
      history.
    es: Los Institutos de Aldea fueron una red de escuelas rurales de formación de maestros establecidas
      en Turquía en 1940 para promover la educación y el desarrollo en las aldeas. Son una parte significativa
      de la historia educativa turca.
    fr: Les Instituts de Village étaient un réseau d'écoles rurales de formation d'enseignants créé en
      Turquie en 1940 pour promouvoir l'éducation et le développement dans les villages. Ils constituent
      une part importante de l'histoire éducative turque.
    de: Die Dorfinstitute waren ein Netzwerk ländlicher Lehrerbildungsschulen, die 1940 in der Türkei
      gegründet wurden, um Bildung und Entwicklung in Dörfern zu fördern. Sie sind ein bedeutender Teil
      der türkischen Bildungsgeschichte.
    it: Gli Istituti di Villaggio erano una rete di scuole rurali per la formazione degli insegnanti istituita
      in Turchia nel 1940 per promuovere l'istruzione e lo sviluppo nei villaggi. Sono una parte significativa
      della storia educativa turca.
    pt: Os Institutos de Aldeia foram uma rede de escolas rurais de formação de professores estabelecida
