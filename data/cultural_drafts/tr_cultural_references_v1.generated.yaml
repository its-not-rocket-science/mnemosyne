  short_explanation: Turkish proverb meaning 'There is worse than worse'; expresses that no matter how
    bad a situation is, there could be something even worse, often used to console or relativize.
  i18n_explanations:
    en: Turkish proverb meaning 'There is worse than worse'; expresses that no matter how bad a situation
      is, there could be something even worse, often used to console or relativize.
    es: Proverbio turco que significa 'Hay peor que lo peor'; expresa que por muy mala que sea una situación,
      podría haber algo aún peor, usado a menudo para consolar o relativizar.
    fr: Proverbe turc signifiant 'Il y a pire que le pire' ; exprime que quelle que soit la gravité d'une
      situation, il pourrait y avoir quelque chose d'encore pire, souvent utilisé pour consoler ou relativiser.
    de: 'Türkisches Sprichwort: ''Es gibt Schlimmeres als das Schlimmste''; drückt aus, dass es, egal
      wie schlimm eine Situation ist, noch etwas Schlimmeres geben könnte, oft verwendet, um zu trösten
      oder zu relativieren.'
    it: Proverbio turco che significa 'C'è di peggio del peggio'; esprime che per quanto brutta sia una
      situazione, potrebbe esserci qualcosa di ancora peggiore, spesso usato per consolare o relativizzare.
    pt: Provérbio turco que significa 'Há pior do que o pior'; expressa que por mais ruim que seja uma
      situação, pode haver algo ainda pior, frequentemente usado para consolar ou relativizar.
    ru: Турецкая пословица, означающая 'Есть хуже, чем худшее'; выражает, что как бы ни была плоха ситуация,
      может быть еще хуже, часто используется для утешения или релятивизации.
