      mientras se toman las acciones necesarias.
    fr: Une phrase faisant référence au secret ou à l'essence du 'tawakkul' (confiance en Dieu), souvent
      utilisée dans les contextes soufis et islamiques pour désigner une confiance totale en la volonté
      divine tout en prenant les actions nécessaires.
    de: Ein Ausdruck, der sich auf das Geheimnis oder Wesen des 'Tawakkul' (Vertrauen auf Gott) bezieht,
