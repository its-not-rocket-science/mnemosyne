  i18n_explanations:
    en: A Turkish proverb meaning 'Everything new is good, but a friend old is best.' It emphasizes the
      value of long-standing friendships over new possessions.
    es: Un proverbio turco que significa 'Todo lo nuevo es bueno, pero un amigo viejo es mejor.' Enfatiza
      el valor de las amistades duraderas sobre las posesiones nuevas.
    fr: Un proverbe turc signifiant 'Tout ce qui est nouveau est bon, mais un vieil ami est le meilleur.'
      Il souligne la valeur des amitiés de longue date par rapport aux nouvelles possessions.
    de: Ein türkisches Sprichwort, das bedeutet 'Alles Neue ist gut, aber ein alter Freund ist am besten.'
