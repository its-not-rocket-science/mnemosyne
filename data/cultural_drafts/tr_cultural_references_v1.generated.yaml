- id: tr_proverb_tradition_mal_canın_yongasıdır_12d51811
  language: tr
  canonical_reference: Mal canın yongasıdır
  reference_type: proverb_tradition
  surface_patterns:
  - mal canın yongasıdır
  - mal canın yongası
  short_explanation: This Turkish proverb means 'Wealth is a chip off one's life,' implying that material
    possessions are earned at the expense of one's life and health. It reflects the cultural value that
    health and life are more precious than wealth.
  i18n_explanations:
    en: This Turkish proverb means 'Wealth is a chip off one's life,' implying that material possessions
      are earned at the expense of one's life and health. It reflects the cultural value that health and
      life are more precious than wealth.
    es: Este proverbio turco significa 'La riqueza es una astilla de la vida', implicando que las posesiones
      materiales se ganan a costa de la vida y la salud. Refleja el valor cultural de que la salud y la
      vida son más preciosas que la riqueza.
    fr: Ce proverbe turc signifie 'La richesse est un éclat de la vie', impliquant que les biens matériels
      sont gagnés au détriment de la vie et de la santé. Il reflète la valeur culturelle selon laquelle
      la santé et la vie sont plus précieuses que la richesse.
    de: Dieses türkische Sprichwort bedeutet 'Reichtum ist ein Splitter des Lebens' und impliziert, dass
      materielle Besitztümer auf Kosten von Leben und Gesundheit erworben werden. Es spiegelt den kulturellen
      Wert wider, dass Gesundheit und Leben wertvoller sind als Reichtum.
    it: Questo proverbio turco significa 'La ricchezza è una scheggia della vita', implicando che i beni
      materiali sono guadagnati a scapito della vita e della salute. Riflette il valore culturale che
      la salute e la vita sono più preziose della ricchezza.
    pt: Este provérbio turco significa 'A riqueza é uma lasca da vida', implicando que os bens materiais
      são ganhos às custas da vida e da saúde. Reflete o valor cultural de que a saúde e a vida são mais
      preciosas que a riqueza.
    ru: Эта турецкая пословица означает 'Богатство — это щепка от жизни', подразумевая, что материальные
      блага приобретаются ценой жизни и здоровья. Она отражает культурную ценность, что здоровье и жизнь
      дороже богатства.
    ja: このトルコのことわざは「富は人生の一片」という意味で、物質的な所有物は人生と健康を犠牲にして得られることを示唆しています。健康と命が富よりも貴重であるという文化的価値を反映しています。
    zh: 这句土耳其谚语的意思是“财富是生命的一片”，暗示物质财富是以生命和健康为代价获得的。它反映了健康和生活比财富更宝贵的文化价值观。
    ar: هذا المثل التركي يعني 'الثروة هي شظية من الحياة'، مما يشير إلى أن الممتلكات المادية تُكتسب على
      حساب الحياة والصحة. إنه يعكس القيمة الثقافية بأن الصحة والحياة أغلى من الثروة.
    he: פתגם טורקי זה פירושו 'עושר הוא רסיס מהחיים', ומרמז כי רכוש חומרי מושג במחיר החיים והבריאות. הוא
      משקף את הערך התרבותי שבריאות וחיים יקרים יותר מעושר.
