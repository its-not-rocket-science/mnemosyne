      история любви, являющаяся шедевром суфийской аллегории.
    ja: フズーリー（1494年頃-1556年）はアゼルバイジャン出身の著名なオスマン詩人で、トルコ語、ペルシア語、アラビア語で執筆した。最も有名な作品は『ライラとマジュヌーン』で、スーフィー寓意の傑作である悲恋物語である。
    zh: 富祖里（约1494-1556）是阿塞拜疆裔的杰出奥斯曼诗人，用土耳其语、波斯语和阿拉伯语写作。他最著名的作品是《蕾莉与马杰农》，这是一部悲剧爱情故事，也是苏菲寓言的杰作。
    ar: فضولي (حوالي 1494-1556) كان شاعراً عثمانياً بارزاً من أصل أذربيجاني، يكتب بالتركية والفارسية والعربية.
