      and helping someone who later harms you.
    es: Proverbio turco que significa 'Alimenta al cuervo y te sacará el ojo'; advierte contra la ingratitud
      y ayudar a alguien que luego te daña.
    fr: Proverbe turc signifiant 'Nourris le corbeau et il te crèvera l'œil' ; met en garde contre l'ingratitude
      et le fait d'aider quelqu'un qui vous nuit ensuite.
    de: 'Türkisches Sprichwort: ''Füttere die Krähe, und sie wird dir das Auge aushacken''; warnt vor
      Undankbarkeit und davor, jemandem zu helfen, der einem später schadet.'
    it: Proverbio turco che significa 'Dai da mangiare al corvo e ti caverà l'occhio'; mette in guardia
      dall'ingratitudine e dall'aiutare qualcuno che poi ti danneggia.
    pt: Provérbio turco que significa 'Alimente o corvo e ele arrancará seu olho'; adverte contra a ingratidão
      e ajudar alguém que depois te prejudica.
    ru: Турецкая пословица, означающая 'Накорми ворона, а он выклюет тебе глаз'; предупреждает о неблагодарности
      и помощи тому, кто впоследствии причинит вред.
    ja: 「カラスに餌をやれば、目をつつかれる」という意味のトルコのことわざ。恩知らずや、後に害をなす者を助けることへの警告。
    zh: 土耳其谚语，意为‘喂乌鸦，它会啄你的眼睛’；警告不要忘恩负义，不要帮助后来会伤害你的人。
