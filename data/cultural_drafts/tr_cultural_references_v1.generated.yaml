- id: tr_literary_reference_şeyh_galib_14672d89
  language: tr
  canonical_reference: Şeyh Galib
  reference_type: literary_reference
  surface_patterns:
  - Şeyh Galib
  - Şeyh Galip
  - Galib Dede
  short_explanation: Şeyh Galib (1757-1799) was an Ottoman poet and Sufi mystic, best known for his masterpiece
    'Hüsn ü Aşk' (Beauty and Love), a symbolic allegory of divine love. He is considered one of the greatest
    poets of Ottoman Divan literature.
  i18n_explanations:
    en: Şeyh Galib (1757-1799) was an Ottoman poet and Sufi mystic, best known for his masterpiece 'Hüsn
      ü Aşk' (Beauty and Love), a symbolic allegory of divine love. He is considered one of the greatest
      poets of Ottoman Divan literature.
    es: Şeyh Galib (1757-1799) fue un poeta otomano y místico sufí, conocido por su obra maestra 'Hüsn
      ü Aşk' (Belleza y Amor), una alegoría simbólica del amor divino. Es considerado uno de los más grandes
      poetas de la literatura diván otomana.
    fr: Şeyh Galib (1757-1799) était un poète ottoman et mystique soufi, surtout connu pour son chef-d'œuvre
      'Hüsn ü Aşk' (Beauté et Amour), une allégorie symbolique de l'amour divin. Il est considéré comme
      l'un des plus grands poètes de la littérature divan ottomane.
    de: Şeyh Galib (1757-1799) war ein osmanischer Dichter und Sufi-Mystiker, bekannt für sein Meisterwerk
      'Hüsn ü Aşk' (Schönheit und Liebe), eine symbolische Allegorie der göttlichen Liebe. Er gilt als
      einer der größten Dichter der osmanischen Divan-Literatur.
    it: Şeyh Galib (1757-1799) fu un poeta ottomano e mistico sufi, noto per il suo capolavoro 'Hüsn ü
      Aşk' (Bellezza e Amore), un'allegoria simbolica dell'amore divino. È considerato uno dei più grandi
      poeti della letteratura divan ottomana.
    pt: Şeyh Galib (1757-1799) foi um poeta otomano e místico sufi, mais conhecido por sua obra-prima
      'Hüsn ü Aşk' (Beleza e Amor), uma alegoria simbólica do amor divino. É considerado um dos maiores
      poetas da literatura divã otomana.
    ru: Шейх Галиб (1757-1799) — османский поэт и суфийский мистик, наиболее известный своим шедевром
      «Хюсн ю Ашк» (Красота и Любовь), символической аллегорией божественной любви. Считается одним из
      величайших поэтов османской диванной литературы.
    ja: シェイフ・ガーリブ（1757-1799）はオスマン帝国の詩人でありスーフィーの神秘家で、代表作『美と愛』（Hüsn ü Aşk）は神の愛の象徴的寓意詩である。彼はオスマン・ディヴァン文学の最も偉大な詩人の一人と見なされている。
    zh: 谢赫·加利布（1757-1799）是奥斯曼诗人和苏菲神秘主义者，以其代表作《美与爱》（Hüsn ü Aşk）而闻名，这是一部关于神圣之爱的象征性寓言。他被认为是奥斯曼迪万文学最伟大的诗人之一。
    ar: شيخ غالب (1757-1799) كان شاعراً عثمانياً ومتصوفاً صوفياً، اشتهر برائعته 'حسن وعشق' (الجمال والحب)،
      وهي قصة رمزية رمزية للحب الإلهي. يعتبر من أعظم شعراء الأدب الديواني العثماني.
    he: שייח' גאליב (1757-1799) היה משורר עות'מאני ומיסטיקן סופי, הידוע בעיקר ביצירת המופת שלו 'חוסן עא'שק'
