    pt: Türk Tarih Kurumu (Sociedade Histórica Turca) é uma sociedade acadêmica fundada em 1931 por Atatürk
      para pesquisar a história turca. Publica obras históricas e organiza conferências.
    ru: Тюрк Тарих Куруму (Турецкое историческое общество) — научное общество, основанное в 1931 году
      Ататюрком для исследования турецкой истории. Публикует исторические труды и организует конференции.
    ja: トルコ歴史協会（Türk Tarih Kurumu）は、1931年にアタテュルクによって設立された、トルコの歴史を研究する学術団体です。歴史書を出版し、会議を開催しています。
    zh: 土耳其历史学会（Türk Tarih Kurumu）是一个学术团体，由阿塔图尔克于1931年创立，旨在研究土耳其历史。它出版历史著作并组织会议。
