    of leadership.
  i18n_explanations:
    en: The Epic of Oğuz Kağan is a foundational Turkic epic narrating the life and conquests of Oğuz
      Kağan, the legendary ancestor of the Oghuz Turks. It embodies Turkic mythology and ideals of leadership.
    es: La Epopeya de Oğuz Kağan es una épica túrquica fundamental que narra la vida y conquistas de Oğuz
      Kağan, el legendario ancestro de los turcos oguz. Encarna la mitología túrquica y los ideales de
      liderazgo.
    fr: L'Épopée d'Oğuz Kağan est une épopée turcique fondamentale racontant la vie et les conquêtes d'Oğuz
      Kağan, l'ancêtre légendaire des Turcs Oghouzes. Elle incarne la mythologie turcique et les idéaux
      de leadership.
    de: Das Epos von Oğuz Kağan ist ein grundlegendes turkisches Epos, das das Leben und die Eroberungen
      von Oğuz Kağan, dem legendären Vorfahren der Oghusen, erzählt. Es verkörpert die turkische Mythologie
      und Führungsideale.
    it: L'Epopea di Oğuz Kağan è un'epopea turca fondamentale che narra la vita e le conquiste di Oğuz
      Kağan, il leggendario antenato dei turchi Oghuz. Incarna la mitologia turca e gli ideali di leadership.
    pt: A Epopeia de Oğuz Kağan é uma épica turca fundamental que narra a vida e as conquistas de Oğuz
      Kağan, o lendário ancestral dos turcos oguz. Ela incorpora a mitologia turca e os ideais de liderança.
    ru: Эпос об Огуз-хане — основополагающий тюркский эпос, повествующий о жизни и завоеваниях Огуз-хана,
      легендарного предка огузских тюрок. Он воплощает тюркскую мифологию и идеалы лидерства.
    ja: オグズ・カガンの叙事詩は、オグズ・トルコ人の伝説的な祖先であるオグズ・カガンの生涯と征服を語る、基礎的なテュルク叙事詩です。テュルク神話とリーダーシップの理想を体現しています。
    zh: 《乌古斯可汗史诗》是一部基础性的突厥史诗，讲述了乌古斯可汗（乌古斯突厥人的传奇祖先）的生平和征服事迹。它体现了突厥神话和领导理想。
    ar: ملحمة أوغوز كاغان هي ملحمة تركية تأسيسية تروي حياة وفتوحات أوغوز كاغان، الجد الأسطوري للأتراك
