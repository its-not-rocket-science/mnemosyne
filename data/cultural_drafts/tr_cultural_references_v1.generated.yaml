    en: Fuzûlî (c. 1494-1556) was a prominent Ottoman poet of Azerbaijani origin, writing in Turkish,
      Persian, and Arabic. His most famous work is 'Leyla vü Mecnun', a tragic love story that is a masterpiece
      of Sufi allegory.
    es: Fuzûlî (c. 1494-1556) fue un destacado poeta otomano de origen azerbaiyano, que escribió en turco,
      persa y árabe. Su obra más famosa es 'Leyla vü Mecnun', una trágica historia de amor que es una
      obra maestra de la alegoría sufí.
    fr: Fuzûlî (c. 1494-1556) était un éminent poète ottoman d'origine azerbaïdjanaise, écrivant en turc,
      persan et arabe. Son œuvre la plus célèbre est 'Leyla vü Mecnun', une histoire d'amour tragique
      qui est un chef-d'œuvre de l'allégorie soufie.
    de: Fuzûlî (ca. 1494-1556) war ein bedeutender osmanischer Dichter aserbaidschanischer Herkunft, der
      auf Türkisch, Persisch und Arabisch schrieb. Sein bekanntestes Werk ist 'Leyla vü Mecnun', eine
      tragische Liebesgeschichte, die ein Meisterwerk der Sufi-Allegorie ist.
    it: Fuzûlî (c. 1494-1556) fu un importante poeta ottomano di origine azera, scrivendo in turco, persiano
      e arabo. La sua opera più famosa è 'Leyla vü Mecnun', una tragica storia d'amore che è un capolavoro
      dell'allegoria sufi.
    pt: Fuzûlî (c. 1494-1556) foi um proeminente poeta otomano de origem azerbaijana, escrevendo em turco,
      persa e árabe. Sua obra mais famosa é 'Leyla vü Mecnun', uma trágica história de amor que é uma
      obra-prima da alegoria sufi.
    ru: Физули (ок. 1494-1556) — выдающийся османский поэт азербайджанского происхождения, писавший на
