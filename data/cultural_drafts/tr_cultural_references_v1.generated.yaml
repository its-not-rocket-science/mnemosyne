- id: tr_proverb_tradition_sana_söylüyorum_kızım_sen_anla_gelinim_af0184d8
  language: tr
  canonical_reference: Sana söylüyorum kızım, sen anla gelinim
  reference_type: proverb_tradition
  surface_patterns:
  - Sana söylüyorum kızım, sen anla gelinim
  - Sana söylüyorum kızım sen anla gelinim
  - Sana diyorum kızım, sen anla gelinim
  short_explanation: A Turkish proverb meaning 'I am saying to you, my daughter, but you understand, my
    daughter-in-law.' It describes indirect communication where a message is intended for someone else
    but spoken to another person present.
  i18n_explanations:
    en: A Turkish proverb meaning 'I am saying to you, my daughter, but you understand, my daughter-in-law.'
      It describes indirect communication where a message is intended for someone else but spoken to another
      person present.
    es: Proverbio turco que significa 'Te lo digo a ti, hija mía, pero entiéndelo tú, nuera mía'. Describe
      la comunicación indirecta donde un mensaje está destinado a otra persona pero se dice a alguien
      presente.
    fr: Proverbe turc signifiant 'Je te le dis à toi, ma fille, mais toi, ma belle-fille, comprends-le'.
      Il décrit une communication indirecte où un message est destiné à quelqu'un d'autre mais dit à une
      autre personne présente.
    de: Ein türkisches Sprichwort, das bedeutet 'Ich sage es dir, meine Tochter, aber du verstehst es,
      meine Schwiegertochter'. Es beschreibt indirekte Kommunikation, bei der eine Nachricht für jemand
      anderen bestimmt ist, aber zu einer anwesenden Person gesprochen wird.
    it: Proverbio turco che significa 'Lo dico a te, figlia mia, ma tu capisci, nuora mia'. Descrive una
      comunicazione indiretta in cui un messaggio è destinato a qualcun altro ma viene detto a un'altra
      persona presente.
    pt: Provérbio turco que significa 'Estou dizendo a você, minha filha, mas você entende, minha nora'.
      Descreve comunicação indireta onde uma mensagem é destinada a outra pessoa, mas dita a alguém presente.
    ru: Турецкая пословица, означающая «Я говорю тебе, дочь моя, но ты понимай, невестка моя». Она описывает
      косвенное общение, когда сообщение предназначено для другого человека, но говорится присутствующему.
    ja: トルコのことわざで、「私はあなたに言っている、私の娘よ、しかしあなたは理解しなさい、私の嫁よ」という意味。メッセージが他の人に向けられているが、その場にいる別の人に話す間接的なコミュニケーションを表す。
    zh: 土耳其谚语，意为“我对你说，我的女儿，但你要明白，我的儿媳”。它描述了一种间接沟通，即信息是针对别人的，但却对在场的另一个人说。
    ar: مثل تركي يعني 'أنا أقول لك يا ابنتي، لكن أنتِ افهمي يا زوجة ابني'. يصف التواصل غير المباشر حيث
      تكون الرسالة موجهة لشخص آخر ولكن تُقال لشخص آخر حاضر.
    he: פתגם טורקי שפירושו 'אני אומר לך, בתי, אבל את תביני, כלתי'. הוא מתאר תקשורת עקיפה שבה מסר מיועד
      למישהו אחר אך נאמר לאדם אחר שנמצא.
