      Republik Türkei, mit Betonung auf Türkisierung, Islamisierung und Modernisierung.
    it: Ziya Gökalp (1876-1924) è stato un sociologo, scrittore e poeta turco, considerato il padre del
      nazionalismo turco. Le sue idee hanno fortemente influenzato l'ideologia fondante della Repubblica
      di Turchia, enfatizzando la turchizzazione, l'islamizzazione e la modernizzazione.
    pt: Ziya Gökalp (1876-1924) foi um sociólogo, escritor e poeta turco, considerado o pai do nacionalismo
      turco. Suas ideias influenciaram fortemente a ideologia fundadora da República da Turquia, enfatizando
