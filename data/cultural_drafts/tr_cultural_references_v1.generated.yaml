  short_explanation: This Turkish proverb means 'He who seeks a faultless friend remains friendless.'
    It warns against unrealistic expectations in friendship, emphasizing that everyone has flaws.
  i18n_explanations:
    en: This Turkish proverb means 'He who seeks a faultless friend remains friendless.' It warns against
      unrealistic expectations in friendship, emphasizing that everyone has flaws.
    es: Este proverbio turco significa 'Quien busca un amigo sin defectos se queda sin amigos.' Advierte
      contra expectativas poco realistas en la amistad, enfatizando que todos tienen defectos.
    fr: Ce proverbe turc signifie 'Celui qui cherche un ami sans défaut reste sans ami.' Il met en garde
      contre des attentes irréalistes en amitié, soulignant que tout le monde a des défauts.
    de: Dieses türkische Sprichwort bedeutet 'Wer einen makellosen Freund sucht, bleibt freundlos.' Es
      warnt vor unrealistischen Erwartungen in der Freundschaft und betont, dass jeder Fehler hat.
    it: Questo proverbio turco significa 'Chi cerca un amico senza difetti rimane senza amici.' Avverte
      contro aspettative irrealistiche nell'amicizia, sottolineando che tutti hanno difetti.
    pt: Este provérbio turco significa 'Quem procura um amigo sem defeitos fica sem amigos.' Adverte contra
      expectativas irreais na amizade, enfatizando que todos têm falhas.
    ru: Эта турецкая пословица означает 'Кто ищет безупречного друга, остаётся без друзей.' Она предостерегает
      от нереалистичных ожиданий в дружбе, подчёркивая, что у каждого есть недостатки.
    ja: このトルコのことわざは「欠点のない友を探す者は友を失う」という意味です。友情に非現実的な期待を抱くことを戒め、誰にでも欠点があることを強調しています。
    zh: 这句土耳其谚语的意思是“寻找完美朋友的人最终没有朋友”。它告诫人们对友谊不要有不切实际的期望，强调每个人都有缺点。
    ar: هذا المثل التركي يعني 'من يبحث عن صديق بلا عيوب يبقى بلا أصدقاء.' إنه يحذر من التوقعات غير الواقعية
      في الصداقة، مؤكداً أن كل شخص لديه عيوب.
    he: הפתגם הטורקי הזה אומר 'מי שמחפש חבר ללא פגמים נשאר ללא חברים.' הוא מזהיר מפני ציפיות לא מציאותיות
      בידידות, ומדגיש שלכל אחד יש פגמים.
