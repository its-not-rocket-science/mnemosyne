  i18n_explanations:
    en: This Turkish proverb means 'The caravan moves on, the dog barks,' implying that important work
      continues despite petty criticism or obstacles.
    es: Este proverbio turco significa 'La caravana sigue, el perro ladra', implicando que el trabajo
      importante continúa a pesar de críticas u obstáculos menores.
    fr: Ce proverbe turc signifie 'La caravane avance, le chien aboie', suggérant que le travail important
      continue malgré les critiques ou obstacles mesquins.
    de: Dieses türkische Sprichwort bedeutet 'Die Karawane zieht weiter, der Hund bellt', was besagt,
      dass wichtige Arbeit trotz kleinlicher Kritik oder Hindernissen fortgesetzt wird.
    it: Questo proverbio turco significa 'La carovana va avanti, il cane abbaia', implicando che il lavoro
      importante continua nonostante critiche o ostacoli meschini.
    pt: Este provérbio turco significa 'A caravana segue, o cachorro late', implicando que o trabalho
      importante continua apesar de críticas ou obstáculos mesquinhos.
    ru: Эта турецкая пословица означает 'Караван идет, собака лает', подразумевая, что важная работа продолжается,
