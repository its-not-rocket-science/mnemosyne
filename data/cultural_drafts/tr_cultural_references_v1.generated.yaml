- id: tr_classical_or_scriptural_allusion_sırat_köprüsü_c563ea2c
  language: tr
  canonical_reference: Sırat köprüsü
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Sırat köprüsü
  - Sırat Köprüsü
  - sırat köprüsü
  short_explanation: A bridge in Islamic eschatology that is as thin as a hair and sharper than a sword,
    which all souls must cross on Judgment Day; the righteous pass easily while sinners fall into hell.
    It symbolizes a difficult trial or narrow path.
  i18n_explanations:
    en: A bridge in Islamic eschatology that is as thin as a hair and sharper than a sword, which all
      souls must cross on Judgment Day; the righteous pass easily while sinners fall into hell. It symbolizes
      a difficult trial or narrow path.
    es: Un puente en la escatología islámica tan delgado como un cabello y más afilado que una espada,
      que todas las almas deben cruzar en el Día del Juicio; los justos pasan fácilmente mientras los
      pecadores caen al infierno. Simboliza una prueba difícil o un camino estrecho.
    fr: Un pont dans l'eschatologie islamique aussi fin qu'un cheveu et plus tranchant qu'une épée, que
      toutes les âmes doivent traverser le Jour du Jugement ; les justes passent facilement tandis que
      les pécheurs tombent en enfer. Il symbolise une épreuve difficile ou un chemin étroit.
    de: Eine Brücke in der islamischen Eschatologie, die so dünn wie ein Haar und schärfer als ein Schwert
      ist, die alle Seelen am Jüngsten Tag überqueren müssen; die Gerechten passieren leicht, während
      Sünder in die Hölle fallen. Sie symbolisiert eine schwere Prüfung oder einen schmalen Pfad.
    it: Un ponte nell'escatologia islamica sottile come un capello e più affilato di una spada, che tutte
      le anime devono attraversare nel Giorno del Giudizio; i giusti passano facilmente mentre i peccatori
      cadono all'inferno. Simboleggia una prova difficile o un sentiero stretto.
    pt: Uma ponte na escatologia islâmica tão fina quanto um fio de cabelo e mais afiada que uma espada,
      que todas as almas devem cruzar no Dia do Julgamento; os justos passam facilmente enquanto os pecadores
      caem no inferno. Simboliza uma provação difícil ou um caminho estreito.
    ru: Мост в исламской эсхатологии, тонкий как волос и острее меча, который все души должны пересечь
      в Судный день; праведники проходят легко, а грешники падают в ад. Символизирует трудное испытание
      или узкий путь.
    ja: イスラム終末論における橋で、髪の毛のように細く、剣よりも鋭く、審判の日にすべての魂が渡らなければならない。正しい者は容易に渡り、罪人は地獄に落ちる。困難な試練や狭い道を象徴する。
    zh: 伊斯兰末世论中的一座桥，细如发丝，利如刀剑，所有灵魂在审判日必须通过；义人轻松通过，罪人坠入火狱。象征艰难的考验或狭窄的道路。
    ar: جسر في علم الأخرويات الإسلامية رفيع كالشعرة وأحد من السيف، يجب على جميع الأرواح عبوره يوم القيامة؛
      الصالحون يعبرون بسهولة بينما يسقط الخطاة في الجحيم. يرمز إلى اختبار صعب أو طريق ضيق.
    he: גשר באסכטולוגיה האסלאמית דק כשערה וחד מחרב, שכל הנשמות חייבות לחצות ביום הדין; הצדיקים עוברים
      בקלות בעוד החוטאים נופלים לגיהנום. הוא מסמל מבחן קשה או דרך צרה.
