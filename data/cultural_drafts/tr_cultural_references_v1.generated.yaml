    zh: 字面意思是“每一天都有它的夜晚”。意思是每种情况，无论好坏，都会结束；没有什么是永恒的。鼓励耐心和远见。
    ar: حرفياً 'كل يوم له مساؤه'. يعني أن كل موقف، جيداً كان أم سيئاً، ينتهي؛ لا شيء يدوم للأبد. يشجع
