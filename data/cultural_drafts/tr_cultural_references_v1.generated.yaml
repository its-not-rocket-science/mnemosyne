- id: tr_literary_reference_şinasi_2026834d
  language: tr
  canonical_reference: Şinasi
  reference_type: literary_reference
  surface_patterns:
  - Şinasi
  - İbrahim Şinasi
  - Şinasi Efendi
  short_explanation: Şinasi (1826-1871) was a pioneering Ottoman journalist, poet, and playwright, often
    considered one of the founders of modern Turkish literature. He introduced Western literary forms
    and advocated for simplification of the Ottoman Turkish language.
  i18n_explanations:
    en: Şinasi (1826-1871) was a pioneering Ottoman journalist, poet, and playwright, often considered
      one of the founders of modern Turkish literature. He introduced Western literary forms and advocated
      for simplification of the Ottoman Turkish language.
    es: Şinasi (1826-1871) fue un pionero periodista, poeta y dramaturgo otomano, a menudo considerado
      uno de los fundadores de la literatura turca moderna. Introdujo formas literarias occidentales y
      abogó por la simplificación del idioma turco otomano.
    fr: Şinasi (1826-1871) était un journaliste, poète et dramaturge ottoman pionnier, souvent considéré
      comme l'un des fondateurs de la littérature turque moderne. Il a introduit des formes littéraires
      occidentales et a plaidé pour la simplification de la langue turque ottomane.
    de: Şinasi (1826-1871) war ein bahnbrechender osmanischer Journalist, Dichter und Dramatiker, der
      oft als einer der Begründer der modernen türkischen Literatur gilt. Er führte westliche Literaturformen
      ein und setzte sich für die Vereinfachung der osmanisch-türkischen Sprache ein.
    it: Şinasi (1826-1871) è stato un pioniere giornalista, poeta e drammaturgo ottomano, spesso considerato
      uno dei fondatori della letteratura turca moderna. Introdusse forme letterarie occidentali e sostenne
      la semplificazione della lingua turca ottomana.
    pt: Şinasi (1826-1871) foi um pioneiro jornalista, poeta e dramaturgo otomano, frequentemente considerado
      um dos fundadores da literatura turca moderna. Ele introduziu formas literárias ocidentais e defendeu
      a simplificação da língua turca otomana.
    ru: Шинаси (1826-1871) был пионером османской журналистики, поэтом и драматургом, часто считающимся
      одним из основателей современной турецкой литературы. Он ввел западные литературные формы и выступал
      за упрощение османско-турецкого языка.
    ja: シナシ（1826-1871）は、オスマン帝国の先駆的なジャーナリスト、詩人、劇作家であり、近代トルコ文学の創始者の一人と見なされています。彼は西洋の文学形式を導入し、オスマントルコ語の簡略化を提唱しました。
    zh: Şinasi（1826-1871）是奥斯曼帝国先驱记者、诗人和剧作家，常被视为现代土耳其文学的奠基人之一。他引入了西方文学形式，并倡导简化奥斯曼土耳其语。
