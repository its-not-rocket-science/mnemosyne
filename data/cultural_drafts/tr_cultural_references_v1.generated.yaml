  short_explanation: Malazgirt (Manzikert) is the site of the 1071 battle where the Seljuk Turks defeated
    the Byzantine Empire, opening Anatolia to Turkish settlement and marking a pivotal moment in Turkish
    history.
  i18n_explanations:
    en: Malazgirt (Manzikert) is the site of the 1071 battle where the Seljuk Turks defeated the Byzantine
      Empire, opening Anatolia to Turkish settlement and marking a pivotal moment in Turkish history.
    es: Malazgirt (Manzikert) es el lugar de la batalla de 1071 donde los turcos selyúcidas derrotaron
      al Imperio bizantino, abriendo Anatolia al asentamiento turco y marcando un momento crucial en la
      historia turca.
    fr: Malazgirt (Manzikert) est le site de la bataille de 1071 où les Turcs seldjoukides ont vaincu
      l'Empire byzantin, ouvrant l'Anatolie à la colonisation turque et marquant un tournant dans l'histoire
      turque.
    de: Malazgirt (Manzikert) ist der Ort der Schlacht von 1071, in der die seldschukischen Türken das
      Byzantinische Reich besiegten, Anatolien für türkische Besiedlung öffneten und einen Wendepunkt
      in der türkischen Geschichte markierten.
    it: Malazgirt (Manzikert) è il sito della battaglia del 1071 in cui i turchi selgiuchidi sconfissero
      l'Impero bizantino, aprendo l'Anatolia all'insediamento turco e segnando un momento cruciale nella
      storia turca.
    pt: Malazgirt (Manzikert) é o local da batalha de 1071 onde os turcos seljúcidas derrotaram o Império
      Bizantino, abrindo a Anatólia para o assentamento turco e marcando um momento crucial na história
      turca.
    ru: Малазгирт (Манцикерт) — место битвы 1071 года, в которой сельджукские турки разгромили Византийскую
      империю, открыв Анатолию для турецкого заселения и ознаменовав поворотный момент в турецкой истории.
    ja: マラズギルト（マンジケルト）は、1071年にセルジューク朝トルコがビザンツ帝国を破った戦いの地であり、アナトリアをトルコ人の定住地として開放し、トルコ史における分岐点となった。
    zh: 马拉兹吉尔特（曼齐刻尔特）是1071年战役的地点，塞尔柱突厥人击败了拜占庭帝国，打开了安纳托利亚供突厥人定居，标志着土耳其历史上的一个关键时刻。
    ar: ملاذكرد (مانزيكرت) هو موقع معركة 1071 حيث هزم الأتراك السلاجقة الإمبراطورية البيزنطية، وفتحوا
      الأناضول للاستيطان التركي، مما يمثل لحظة محورية في التاريخ التركي.
    he: מלאזגירט (מנזיקרט) הוא אתר הקרב של 1071 שבו הביסו הטורקים הסלג'וקים את האימפריה הביזנטית, פתחו
