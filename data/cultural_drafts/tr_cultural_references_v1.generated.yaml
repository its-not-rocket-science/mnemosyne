  short_explanation: This Turkish proverb means 'Tell me who your friend is, and I'll tell you who you
    are.' It reflects the belief that one's character is reflected in their choice of friends.
  i18n_explanations:
    en: This Turkish proverb means 'Tell me who your friend is, and I'll tell you who you are.' It reflects
      the belief that one's character is reflected in their choice of friends.
    es: Este proverbio turco significa 'Dime quién es tu amigo y te diré quién eres.' Refleja la creencia
      de que el carácter de uno se refleja en su elección de amigos.
    fr: Ce proverbe turc signifie 'Dis-moi qui est ton ami, je te dirai qui tu es.' Il reflète la croyance
      que le caractère d'une personne se reflète dans son choix d'amis.
    de: Dieses türkische Sprichwort bedeutet 'Sag mir, wer dein Freund ist, und ich sage dir, wer du bist.'
      Es spiegelt die Überzeugung wider, dass sich der Charakter eines Menschen in der Wahl seiner Freunde
      widerspiegelt.
    it: Questo proverbio turco significa 'Dimmi chi è il tuo amico e ti dirò chi sei.' Riflette la convinzione
      che il carattere di una persona si rifletta nella scelta degli amici.
    pt: Este provérbio turco significa 'Diga-me quem é seu amigo e lhe direi quem você é.' Reflete a crença
      de que o caráter de uma pessoa se reflete na escolha de amigos.
    ru: Эта турецкая пословица означает 'Скажи мне, кто твой друг, и я скажу, кто ты.' Она отражает убеждение,
      что характер человека отражается в выборе друзей.
    ja: このトルコのことわざは「あなたの友達が誰か教えてください、そうすればあなたが誰か教えます」という意味です。人の性格は友達の選択に反映されるという信念を表しています。
    zh: 这句土耳其谚语的意思是“告诉我你的朋友是谁，我就告诉你你是谁”。它反映了一个人的性格体现在他们对朋友的选择上。
    ar: هذا المثل التركي يعني 'قل لي من هو صديقك أقل لك من أنت.' إنه يعكس الاعتقاد بأن شخصية المرء تنعكس
      في اختياره للأصدقاء.
    he: הפתגם הטורקי הזה אומר 'אמור לי מי חברך, ואומר לך מי אתה.' הוא משקף את האמונה שאופיו של אדם משתקף
      בבחירת חבריו.
