  short_explanation: A proverb meaning 'They don't give milk to a child who doesn't cry,' implying that
    one must speak up or complain to get what they need. It reflects a pragmatic approach to seeking attention
    or help.
  i18n_explanations:
    en: A proverb meaning 'They don't give milk to a child who doesn't cry,' implying that one must speak
      up or complain to get what they need. It reflects a pragmatic approach to seeking attention or help.
    es: Un proverbio que significa 'No le dan leche a un niño que no llora', implicando que uno debe hablar
      o quejarse para obtener lo que necesita. Refleja un enfoque pragmático para buscar atención o ayuda.
    fr: Un proverbe signifiant 'On ne donne pas de lait à un enfant qui ne pleure pas', impliquant qu'il
      faut parler ou se plaindre pour obtenir ce dont on a besoin. Il reflète une approche pragmatique
      pour attirer l'attention ou l'aide.
    de: Ein Sprichwort, das bedeutet 'Einem Kind, das nicht weint, gibt man keine Milch', was impliziert,
      dass man seine Stimme erheben oder sich beschweren muss, um zu bekommen, was man braucht. Es spiegelt
      einen pragmatischen Ansatz wider, um Aufmerksamkeit oder Hilfe zu suchen.
    it: Un proverbio che significa 'Non danno latte a un bambino che non piange', implicando che bisogna
      parlare o lamentarsi per ottenere ciò di cui si ha bisogno. Riflette un approccio pragmatico per
      cercare attenzione o aiuto.
    pt: Um provérbio que significa 'Não dão leite a uma criança que não chora', implicando que é preciso
      falar ou reclamar para conseguir o que precisa. Reflete uma abordagem pragmática para buscar atenção
      ou ajuda.
    ru: Пословица, означающая 'Ребёнку, который не плачет, молока не дают', подразумевающая, что нужно
      высказываться или жаловаться, чтобы получить необходимое. Отражает прагматичный подход к поиску
      внимания или помощи.
