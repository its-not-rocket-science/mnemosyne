      Verantwortung belastet sind.
    it: Proverbio turco che significa 'Ogni giorno è una festa per uno sciocco.' Suggerisce che le persone
      sciocche o spensierate trovano gioia nelle cose semplici e non sono appesantite dalle responsabilità.
    pt: Provérbio turco que significa 'Cada dia é feriado para um tolo.' Sugere que pessoas tolas ou despreocupadas
      encontram alegria em coisas simples e não são sobrecarregadas por responsabilidades.
