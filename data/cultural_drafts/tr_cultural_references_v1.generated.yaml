- id: tr_classical_or_scriptural_allusion_ergenekon_destanı_4dfafd61
  language: tr
  canonical_reference: Ergenekon Destanı
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Ergenekon Destanı
  - Ergenekon
  short_explanation: The Ergenekon Epic is a Turkic myth about a legendary valley where Turks were trapped
    and later freed by a blacksmith, symbolizing resilience and rebirth. It is a key part of Turkish national
    identity.
  i18n_explanations:
    en: The Ergenekon Epic is a Turkic myth about a legendary valley where Turks were trapped and later
      freed by a blacksmith, symbolizing resilience and rebirth. It is a key part of Turkish national
      identity.
    es: La Epopeya de Ergenekon es un mito túrquico sobre un valle legendario donde los turcos estuvieron
      atrapados y luego liberados por un herrero, simbolizando resiliencia y renacimiento. Es una parte
      clave de la identidad nacional turca.
    fr: L'Épopée d'Ergenekon est un mythe turcique sur une vallée légendaire où les Turcs étaient piégés
      puis libérés par un forgeron, symbolisant la résilience et la renaissance. C'est un élément clé
      de l'identité nationale turque.
    de: Das Ergenekon-Epos ist ein turkischer Mythos über ein legendäres Tal, in dem Türken gefangen waren
      und später von einem Schmied befreit wurden, was Widerstandsfähigkeit und Wiedergeburt symbolisiert.
      Es ist ein Schlüsselelement der türkischen nationalen Identität.
    it: L'Epopea di Ergenekon è un mito turco su una valle leggendaria dove i turchi furono intrappolati
      e poi liberati da un fabbro, simboleggiando resilienza e rinascita. È una parte chiave dell'identità
      nazionale turca.
    pt: A Epopeia de Ergenekon é um mito turco sobre um vale lendário onde os turcos foram presos e depois
      libertados por um ferreiro, simbolizando resiliência e renascimento. É uma parte fundamental da
      identidade nacional turca.
    ru: Эпос об Эргенеконе — тюркский миф о легендарной долине, где турки были заперты, а затем освобождены
      кузнецом, символизирующий стойкость и возрождение. Это ключевая часть турецкой национальной идентичности.
    ja: エルゲネコン叙事詩は、トルコ人が閉じ込められ、後に鍛冶屋によって解放された伝説の谷についてのテュルク神話であり、回復力と再生を象徴しています。トルコの国民的アイデンティティの重要な部分です。
    zh: 《埃尔盖内孔史诗》是一个突厥神话，讲述了一个传奇山谷，土耳其人曾被困其中，后来被一位铁匠解救，象征着坚韧和重生。它是土耳其民族认同的关键部分。
    ar: ملحمة إرغينيكون هي أسطورة تركية عن وادٍ أسطوري حوصر فيه الأتراك ثم أطلق سراحهم حداد، ترمز إلى
      المرونة والبعث. وهي جزء أساسي من الهوية الوطنية التركية.
    he: האפוס של ארגנקון הוא מיתוס טורקי על עמק אגדי שבו הטורקים היו לכודים ולאחר מכן שוחררו על ידי נפח,
      המסמל חוסן ולידה מחדש. זהו חלק מרכזי בזהות הלאומית הטורקית.
