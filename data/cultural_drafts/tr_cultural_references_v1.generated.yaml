    en: Türk Tarih Kurumu (Turkish Historical Society) is a scholarly society founded in 1931 by Atatürk
      to research Turkish history. It publishes historical works and organizes conferences.
    es: Türk Tarih Kurumu (Sociedad Histórica Turca) es una sociedad académica fundada en 1931 por Atatürk
      para investigar la historia turca. Publica obras históricas y organiza conferencias.
    fr: Türk Tarih Kurumu (Société historique turque) est une société savante fondée en 1931 par Atatürk
      pour rechercher l'histoire turque. Elle publie des ouvrages historiques et organise des conférences.
    de: Türk Tarih Kurumu (Türkische Historische Gesellschaft) ist eine wissenschaftliche Gesellschaft,
      die 1931 von Atatürk zur Erforschung der türkischen Geschichte gegründet wurde. Sie veröffentlicht
