- id: tr_literary_reference_kadı_burhaneddin_4aebfbec
  language: tr
  canonical_reference: Kadı Burhaneddin
  reference_type: literary_reference
  surface_patterns:
  - Kadı Burhaneddin
  - Burhaneddin
  short_explanation: Kadı Burhaneddin was a 14th-century Turkish poet, scholar, and statesman who served
    as a judge (kadı) and later as a ruler. His poetry is a significant part of classical Turkish literature,
    known for its depth and use of Sufi themes.
  i18n_explanations:
    en: Kadı Burhaneddin was a 14th-century Turkish poet, scholar, and statesman who served as a judge
      (kadı) and later as a ruler. His poetry is a significant part of classical Turkish literature, known
      for its depth and use of Sufi themes.
    es: Kadı Burhaneddin fue un poeta, erudito y estadista turco del siglo XIV que sirvió como juez (kadı)
      y más tarde como gobernante. Su poesía es una parte significativa de la literatura clásica turca,
      conocida por su profundidad y el uso de temas sufíes.
    fr: Kadı Burhaneddin était un poète, érudit et homme d'État turc du XIVe siècle qui a servi comme
      juge (kadı) puis comme souverain. Sa poésie est une partie importante de la littérature classique
      turque, connue pour sa profondeur et l'utilisation de thèmes soufis.
    de: Kadı Burhaneddin war ein türkischer Dichter, Gelehrter und Staatsmann des 14. Jahrhunderts, der
      als Richter (Kadı) und später als Herrscher diente. Seine Dichtung ist ein bedeutender Teil der
      klassischen türkischen Literatur, bekannt für ihre Tiefe und die Verwendung sufischer Themen.
    it: Kadı Burhaneddin è stato un poeta, studioso e statista turco del XIV secolo che ha servito come
      giudice (kadı) e successivamente come sovrano. La sua poesia è una parte significativa della letteratura
      classica turca, nota per la sua profondità e l'uso di temi sufi.
    pt: Kadı Burhaneddin foi um poeta, estudioso e estadista turco do século XIV que serviu como juiz
      (kadı) e depois como governante. Sua poesia é uma parte significativa da literatura clássica turca,
      conhecida por sua profundidade e uso de temas sufis.
    ru: Кады Бурханеддин — турецкий поэт, учёный и государственный деятель XIV века, служивший судьёй
      (кады) и позже правителем. Его поэзия является значительной частью классической турецкой литературы,
      известной своей глубиной и использованием суфийских тем.
    ja: カドゥ・ブルハネッディンは14世紀のトルコの詩人、学者、政治家で、裁判官（カドゥ）を務めた後、統治者となりました。彼の詩は古典トルコ文学の重要な一部であり、その深みとスーフィーのテーマの使用で知られています。
    zh: 卡迪·布尔哈内丁是14世纪的土耳其诗人、学者和政治家，曾担任法官（卡迪），后来成为统治者。他的诗歌是古典土耳其文学的重要组成部分，以其深度和运用苏菲主题而闻名。
    ar: قاضي برهان الدين كان شاعراً وعالماً ورجل دولة تركياً في القرن الرابع عشر، عمل قاضياً ثم حاكماً.
