    es: Ziya Gökalp (1876-1924) fue un sociólogo, escritor y poeta turco, considerado el padre del nacionalismo
      turco. Sus ideas influyeron fuertemente en la ideología fundacional de la República de Turquía,
      enfatizando la turquificación, islamización y modernización.
    fr: Ziya Gökalp (1876-1924) était un sociologue, écrivain et poète turc, considéré comme le père du
