    flexibility and adapting to circumstances rather than resisting change.
  i18n_explanations:
    en: A Turkish proverb meaning 'If time does not suit you, you adapt to time.' It emphasizes flexibility
      and adapting to circumstances rather than resisting change.
    es: Un proverbio turco que significa 'Si el tiempo no te conviene, tú te adaptas al tiempo'. Enfatiza
      la flexibilidad y la adaptación a las circunstancias en lugar de resistirse al cambio.
    fr: Un proverbe turc signifiant 'Si le temps ne te convient pas, tu t'adaptes au temps'. Il met l'accent
      sur la flexibilité et l'adaptation aux circonstances plutôt que de résister au changement.
    de: Ein türkisches Sprichwort, das bedeutet 'Wenn die Zeit dir nicht passt, passt du dich der Zeit
      an'. Es betont Flexibilität und Anpassung an die Umstände statt Widerstand gegen Veränderung.
    it: Un proverbio turco che significa 'Se il tempo non ti si addice, ti adatti al tempo'. Sottolinea
      la flessibilità e l'adattamento alle circostanze piuttosto che resistere al cambiamento.
    pt: Um provérbio turco que significa 'Se o tempo não te serve, tu te adaptas ao tempo'. Enfatiza a
