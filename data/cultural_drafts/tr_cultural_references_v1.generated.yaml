    ja: ネヴシェヒルリ・ダマト・イブラヒム・パシャは、チューリップ時代（1718-1730）のオスマン帝国の大宰相で、芸術と建築のパトロンとして知られています。彼はネヴシェヒルの出身で、王女と結婚しました。
    zh: 内夫谢希尔利·达马特·易卜拉欣帕夏是郁金香时代（1718-1730）奥斯曼帝国的大维齐尔，以赞助艺术和建筑而闻名。他来自内夫谢希尔，并娶了一位公主。
