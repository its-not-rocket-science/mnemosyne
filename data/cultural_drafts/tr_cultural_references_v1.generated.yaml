- id: tr_proverb_tradition_sen_ağa_ben_ağa_inekleri_kim_sağa_808cead1
  language: tr
  canonical_reference: Sen ağa ben ağa, inekleri kim sağa
  reference_type: proverb_tradition
  surface_patterns:
  - Sen ağa ben ağa, inekleri kim sağa
  - Sen ağa ben ağa inekleri kim sağa
  - Sen ağa ben ağa, bu inekleri kim sağacak
  short_explanation: A Turkish proverb meaning 'If you are a master and I am a master, who will milk the
    cows?' It criticizes situations where everyone wants to be in charge but no one does the actual work.
  i18n_explanations:
    en: A Turkish proverb meaning 'If you are a master and I am a master, who will milk the cows?' It
      criticizes situations where everyone wants to be in charge but no one does the actual work.
    es: Proverbio turco que significa 'Si tú eres el amo y yo soy el amo, ¿quién ordeñará las vacas?'
      Critica situaciones donde todos quieren estar a cargo pero nadie hace el trabajo real.
    fr: Proverbe turc signifiant 'Si tu es le maître et je suis le maître, qui traira les vaches ?' Il
      critique les situations où tout le monde veut être responsable mais personne ne fait le travail
      réel.
    de: Ein türkisches Sprichwort, das bedeutet 'Wenn du der Herr bist und ich der Herr bin, wer wird
      die Kühe melken?' Es kritisiert Situationen, in denen alle das Sagen haben wollen, aber niemand
      die eigentliche Arbeit macht.
    it: Proverbio turco che significa 'Se tu sei il padrone e io sono il padrone, chi mungerà le mucche?'
      Critica situazioni in cui tutti vogliono comandare ma nessuno fa il lavoro vero.
    pt: Provérbio turco que significa 'Se você é o patrão e eu sou o patrão, quem vai ordenhar as vacas?'
      Critica situações onde todos querem estar no comando, mas ninguém faz o trabalho real.
    ru: Турецкая пословица, означающая «Если ты господин и я господин, кто будет доить коров?» Она критикует
      ситуации, когда все хотят быть главными, но никто не выполняет реальную работу.
    ja: トルコのことわざで、「あなたが主人で私が主人なら、誰が牛の乳を搾るのか？」という意味。皆が指揮を執りたがるが実際の仕事を誰もしない状況を批判する。
    zh: 土耳其谚语，意为“如果你是大爷，我也是大爷，谁来挤牛奶？”它批评了每个人都想当领导但没人做实际工作的情况。
    ar: مثل تركي يعني 'إذا كنت أنت السيد وأنا السيد، فمن سيحلب الأبقار؟' ينتقد المواقف التي يريد فيها
      الجميع أن يكونوا مسؤولين ولكن لا أحد يقوم بالعمل الفعلي.
    he: פתגם טורקי שפירושו 'אם אתה האדון ואני האדון, מי יחלוב את הפרות?' הוא מבקר מצבים שבהם כולם רוצים
      להיות אחראים אבל אף אחד לא עושה את העבודה בפועל.
