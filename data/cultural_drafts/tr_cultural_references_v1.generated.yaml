    fr: Un vers du poème de Pir Sultan Abdal, signifiant 'Je suis venu dans ce monde faux et je m'en vais'.
      Il reflète la nature transitoire et trompeuse de la vie terrestre, un thème courant dans la poésie
      alévie-bektachie.
    de: 'Eine Zeile aus Pir Sultan Abdals Gedicht, die bedeutet: ''Ich kam in diese falsche Welt und gehe
      fort.'' Sie spiegelt die vergängliche und trügerische Natur des irdischen Lebens wider, ein häufiges
      Thema in der alevitisch-bektaschitischen Dichtung.'
    it: Un verso della poesia di Pir Sultan Abdal, che significa 'Sono venuto in questo mondo falso e
      me ne vado'. Riflette la natura transitoria e ingannevole della vita mondana, un tema comune nella
      poesia Alevi-Bektashi.
    pt: Um verso do poema de Pir Sultan Abdal, que significa 'Vim a este mundo falso e vou embora'. Reflete
      a natureza transitória e enganosa da vida mundana, um tema comum na poesia Alevi-Bektashi.
    ru: 'Строка из стихотворения Пир Султан Абдала, означающая: «Я пришел в этот ложный мир и ухожу».
      Она отражает преходящую и обманчивую природу мирской жизни, распространенную тему в поэзии алевитов-бекташей.'
    ja: ピル・スルタン・アブダルの詩の一節で、「この偽りの世界に来て、去っていく」という意味。世俗的な人生の儚さと欺瞞性を反映しており、アレヴィー・ベクタシュ派の詩に共通するテーマである。
    zh: 皮尔·苏丹·阿卜杜勒的诗句，意为“我来到这个虚假的世界，然后离去”。反映了世俗生活的短暂和欺骗性，这是阿列维-贝克塔什诗歌中的常见主题。
    ar: بيت من قصيدة بير سلطان عبدال، معناه 'جئت إلى هذا العالم الزائف وأذهب'. يعكس الطبيعة الزائلة والخادعة
