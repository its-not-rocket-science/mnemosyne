    a close companion of Osman I, founder of the Ottoman Empire; his descendants formed the Mihaloğlu
    family.
  i18n_explanations:
    en: A Byzantine-born Ottoman frontier lord (uc bey) who converted to Islam and became a close companion
      of Osman I, founder of the Ottoman Empire; his descendants formed the Mihaloğlu family.
    es: Un señor fronterizo otomano (uc bey) de origen bizantino que se convirtió al islam y se convirtió
      en un compañero cercano de Osman I, fundador del Imperio Otomano; sus descendientes formaron la
      familia Mihaloğlu.
    fr: Un seigneur frontalier ottoman (uc bey) d'origine byzantine qui s'est converti à l'islam et est
      devenu un compagnon proche d'Osman Ier, fondateur de l'Empire ottoman ; ses descendants ont formé
      la famille Mihaloğlu.
    de: Ein byzantinisch geborener osmanischer Grenzfürst (uc bey), der zum Islam konvertierte und ein
      enger Gefährte von Osman I., dem Gründer des Osmanischen Reiches, wurde; seine Nachkommen bildeten
      die Familie Mihaloğlu.
    it: Un signore di frontiera ottomano (uc bey) di origine bizantina che si convertì all'Islam e divenne
      un compagno stretto di Osman I, fondatore dell'Impero Ottomano; i suoi discendenti formarono la
      famiglia Mihaloğlu.
    pt: Um senhor fronteiriço otomano (uc bey) de origem bizantina que se converteu ao Islã e se tornou
      um companheiro próximo de Osman I, fundador do Império Otomano; seus descendentes formaram a família
      Mihaloğlu.
    ru: Османский пограничный правитель (уч-бей) византийского происхождения, принявший ислам и ставший
      близким соратником Османа I, основателя Османской империи; его потомки образовали род Михалоглу.
    ja: ビザンツ出身のオスマン帝国の辺境領主（ウチ・ベイ）で、イスラム教に改宗し、オスマン帝国の創設者オスマン1世の親しい仲間となった。彼の子孫はミハログル家を形成した。
    zh: 拜占庭出生的奥斯曼边疆领主（uc bey），皈依伊斯兰教，成为奥斯曼帝国创始人奥斯曼一世的亲密伙伴；其后代形成了米哈洛格鲁家族。
    ar: أمير حدود عثماني (أوج بك) من أصل بيزنطي اعتنق الإسلام وأصبح رفيقاً مقرباً لعثمان الأول، مؤسس الدولة
