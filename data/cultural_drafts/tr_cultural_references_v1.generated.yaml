    It is widely used in Turkish daily speech.
  i18n_explanations:
    en: Equivalent to 'You reap what you sow,' a proverb emphasizing that actions have consequences. It
      is widely used in Turkish daily speech.
    es: Equivalente a 'Cosechas lo que siembras', un proverbio que enfatiza que las acciones tienen consecuencias.
      Se usa ampliamente en el habla cotidiana turca.
    fr: Équivalent de 'On récolte ce que l'on sème', un proverbe soulignant que les actions ont des conséquences.
      Il est largement utilisé dans le langage courant turc.
    de: Entspricht 'Man erntet, was man sät', ein Sprichwort, das betont, dass Handlungen Konsequenzen
      haben. Es wird im türkischen Alltag häufig verwendet.
    it: Equivalente a 'Si raccoglie ciò che si semina', un proverbio che sottolinea che le azioni hanno
      conseguenze. È ampiamente usato nel linguaggio quotidiano turco.
    pt: Equivalente a 'Você colhe o que planta', um provérbio que enfatiza que as ações têm consequências.
