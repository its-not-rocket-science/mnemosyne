  short_explanation: Kaf Dağı is a mythical mountain in Islamic and Turkish folklore, often described
    as the mountain range that surrounds the world. It appears in tales such as 'Köroğlu' and is used
    metaphorically to refer to a distant, unreachable place.
  i18n_explanations:
    en: Kaf Dağı is a mythical mountain in Islamic and Turkish folklore, often described as the mountain
      range that surrounds the world. It appears in tales such as 'Köroğlu' and is used metaphorically
      to refer to a distant, unreachable place.
    es: Kaf Dağı es una montaña mítica en el folclore islámico y turco, a menudo descrita como la cordillera
      que rodea el mundo. Aparece en cuentos como 'Köroğlu' y se usa metafóricamente para referirse a
      un lugar distante e inalcanzable.
    fr: Kaf Dağı est une montagne mythique du folklore islamique et turc, souvent décrite comme la chaîne
      de montagnes qui entoure le monde. Elle apparaît dans des contes comme 'Köroğlu' et est utilisée
      métaphoriquement pour désigner un lieu lointain et inaccessible.
    de: Kaf Dağı ist ein mythischer Berg in der islamischen und türkischen Folklore, oft beschrieben als
      die Bergkette, die die Welt umgibt. Er kommt in Erzählungen wie 'Köroğlu' vor und wird metaphorisch
      für einen fernen, unerreichbaren Ort verwendet.
    it: Kaf Dağı è una montagna mitica nel folklore islamico e turco, spesso descritta come la catena
      montuosa che circonda il mondo. Appare in racconti come 'Köroğlu' ed è usata metaforicamente per
      riferirsi a un luogo lontano e irraggiungibile.
    pt: Kaf Dağı é uma montanha mítica no folclore islâmico e turco, frequentemente descrita como a cordilheira
      que circunda o mundo. Aparece em contos como 'Köroğlu' e é usada metaforicamente para se referir
      a um lugar distante e inatingível.
    ru: Каф-Даг — мифическая гора в исламском и турецком фольклоре, часто описываемая как горный хребет,
      окружающий мир. Она фигурирует в сказаниях, таких как «Кёроглу», и используется метафорически для
      обозначения далёкого, недостижимого места.
    ja: カフ山はイスラムとトルコの民間伝承に登場する伝説の山で、世界を囲む山脈として描かれることが多いです。「キョロール」などの物語に登場し、遠くて到達不可能な場所を比喩的に指すのに使われます。
    zh: 卡夫山是伊斯兰和土耳其民间传说中的神话山脉，常被描述为环绕世界的山脉。它出现在《科罗格鲁》等故事中，并被隐喻地用来指代遥远、无法到达的地方。
    ar: جبل قاف هو جبل أسطوري في الفولكلور الإسلامي والتركي، يوصف غالباً بأنه سلسلة الجبال التي تحيط بالعالم.
      يظهر في حكايات مثل 'كوروغلو' ويستخدم مجازياً للإشارة إلى مكان بعيد لا يمكن الوصول إليه.
    he: קאף דאע' הוא הר מיתולוגי בפולקלור האסלאמי והטורקי, המתואר לעתים קרובות כרכס ההרים המקיף את העולם.
      הוא מופיע בסיפורים כמו 'קרוגלו' ומשמש כמטאפורה למקום רחוק ובלתי מושג.
