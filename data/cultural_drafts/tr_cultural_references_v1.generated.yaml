- id: tr_cultural_reference_i_stanbul_u_alan_fatih_tir_134ef7bd
  language: tr
  canonical_reference: İstanbul'u alan Fatih'tir.
  reference_type: cultural_reference
  surface_patterns:
  - İstanbul'u alan Fatih'tir
  - Fatih İstanbul'u aldı
  - İstanbul'un fatihi
  short_explanation: Refers to Sultan Mehmed II, known as Fatih (the Conqueror), who captured Constantinople
    (Istanbul) in 1453. The phrase is used to attribute a great achievement to a specific person.
  i18n_explanations:
    en: Refers to Sultan Mehmed II, known as Fatih (the Conqueror), who captured Constantinople (Istanbul)
      in 1453. The phrase is used to attribute a great achievement to a specific person.
    es: Se refiere al sultán Mehmed II, conocido como Fatih (el Conquistador), quien capturó Constantinopla
      (Estambul) en 1453. La frase se usa para atribuir un gran logro a una persona específica.
    fr: Fait référence au sultan Mehmed II, connu sous le nom de Fatih (le Conquérant), qui a capturé
      Constantinople (Istanbul) en 1453. L'expression est utilisée pour attribuer un grand exploit à une
      personne spécifique.
    de: Bezieht sich auf Sultan Mehmed II., bekannt als Fatih (der Eroberer), der 1453 Konstantinopel
      (Istanbul) eroberte. Der Satz wird verwendet, um eine große Leistung einer bestimmten Person zuzuschreiben.
    it: Si riferisce al sultano Mehmed II, noto come Fatih (il Conquistatore), che conquistò Costantinopoli
      (Istanbul) nel 1453. La frase è usata per attribuire un grande risultato a una persona specifica.
    pt: Refere-se ao sultão Mehmed II, conhecido como Fatih (o Conquistador), que capturou Constantinopla
      (Istambul) em 1453. A frase é usada para atribuir uma grande realização a uma pessoa específica.
    ru: Относится к султану Мехмеду II, известному как Фатих (Завоеватель), который захватил Константинополь
      (Стамбул) в 1453 году. Фраза используется для приписывания великого достижения конкретному человеку.
    ja: 1453年にコンスタンティノープル（イスタンブール）を征服したファーティフ（征服者）として知られるスルタン・メフメト2世を指す。このフレーズは、偉大な業績を特定の人物に帰するために使われる。
    zh: 指苏丹穆罕默德二世，被称为法提赫（征服者），他于1453年攻占了君士坦丁堡（伊斯坦布尔）。这句话用于将一项伟大成就归功于特定的人。
    ar: يشير إلى السلطان محمد الثاني، المعروف باسم الفاتح، الذي استولى على القسطنطينية (إسطنبول) عام 1453.
      تُستخدم العبارة لنسب إنجاز عظيم إلى شخص معين.
    he: מתייחס לסולטאן מהמט השני, הידוע כפאטיח (הכובש), שכבש את קונסטנטינופול (איסטנבול) בשנת 1453. הביטוי
