  short_explanation: Turkish proverb meaning 'Little drops make a great lake' or 'Many a little makes
    a mickle'. It emphasizes that small, consistent efforts accumulate to produce significant results.
  i18n_explanations:
    en: Turkish proverb meaning 'Little drops make a great lake' or 'Many a little makes a mickle'. It
      emphasizes that small, consistent efforts accumulate to produce significant results.
    es: Proverbio turco que significa 'Gotas pequeñas hacen un gran lago' o 'Muchos pocos hacen un mucho'.
      Enfatiza que los esfuerzos pequeños y constantes se acumulan para producir resultados significativos.
    fr: Proverbe turc signifiant 'Les petites gouttes font un grand lac' ou 'Les petits ruisseaux font
      les grandes rivières'. Il souligne que les petits efforts constants s'accumulent pour produire des
      résultats significatifs.
    de: Türkisches Sprichwort, das bedeutet 'Kleine Tropfen machen einen großen See' oder 'Viel Kleinvieh
      macht auch Mist'. Es betont, dass kleine, beständige Bemühungen sich anhäufen, um bedeutende Ergebnisse
      zu erzielen.
    it: Proverbio turco che significa 'Piccole gocce fanno un grande lago' o 'Tanti pochi fanno un molto'.
      Sottolinea che piccoli sforzi costanti si accumulano per produrre risultati significativi.
    pt: Provérbio turco que significa 'Pequenas gotas fazem um grande lago' ou 'Muitos poucos fazem um
      muito'. Enfatiza que pequenos esforços consistentes se acumulam para produzir resultados significativos.
    ru: Турецкая пословица, означающая «Капля за каплей образуется озеро» или «Много малого составляет
      большое». Она подчеркивает, что небольшие постоянные усилия накапливаются и приводят к значительным
      результатам.
    ja: 「小さな滴が集まって大きな湖になる」または「塵も積もれば山となる」という意味のトルコのことわざ。小さな継続的な努力が積み重なって大きな結果を生むことを強調しています。
    zh: 土耳其谚语，意为“滴水成湖”或“积少成多”。它强调微小而持续的努力会累积产生显著成果。
    ar: مثل تركي يعني 'قطرات صغيرة تصنع بحيرة كبيرة' أو 'الكثير من القليل يصنع الكثير'. يؤكد أن الجهود
      الصغيرة والمستمرة تتراكم لإنتاج نتائج كبيرة.
    he: פתגם טורקי שפירושו 'טיפות קטנות עושות אגם גדול' או 'הרבה מעט עושה הרבה'. הוא מדגיש שמאמצים קטנים
      ועקביים מצטברים כדי להניב תוצאות משמעותיות.
