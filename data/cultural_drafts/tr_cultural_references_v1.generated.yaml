  short_explanation: A Turkish proverb meaning 'Don't knock on doors, or they'll knock on yours,' warning
    that if you bother others, you may be bothered in return; akin to 'what goes around comes around.'
  i18n_explanations:
    en: A Turkish proverb meaning 'Don't knock on doors, or they'll knock on yours,' warning that if you
      bother others, you may be bothered in return; akin to 'what goes around comes around.'
    es: Proverbio turco que significa 'No toques puertas, o tocarán la tuya', advirtiendo que si molestas
      a otros, puedes ser molestado a cambio; similar a 'lo que siembras, cosechas'.
    fr: Proverbe turc signifiant 'Ne frappe pas aux portes, ou ils frapperont à la tienne', avertissant
      que si vous dérangez les autres, vous pourriez être dérangé en retour; semblable à 'ce qui se passe,
      se retourne'.
    de: Ein türkisches Sprichwort, das bedeutet 'Klopfe nicht an Türen, sonst klopfen sie an deine', und
      warnt, dass wenn du andere störst, du selbst gestört werden könntest; ähnlich wie 'was du gibst,
      kommt zurück'.
    it: Proverbio turco che significa 'Non bussare alle porte, o busseranno alla tua', avvertendo che
      se disturbi gli altri, potresti essere disturbato a tua volta; simile a 'chi la fa, l'aspetti'.
    pt: Provérbio turco que significa 'Não bata em portas, ou baterão na sua', alertando que se você incomodar
      os outros, pode ser incomodado em troca; semelhante a 'quem com ferro fere, com ferro será ferido'.
    ru: Турецкая пословица, означающая 'Не стучи в двери, иначе постучат в твою', предупреждающая, что
      если вы беспокоите других, вас могут побеспокоить в ответ; аналогично 'как аукнется, так и откликнется'.
    ja: 「ドアをノックするな、さもないとあなたのドアがノックされる」という意味のトルコのことわざで、他人を悩ませると自分も悩まされるかもしれないと警告しています。「自業自得」に似ています。
    zh: 土耳其谚语，意为'不要敲门，否则他们会敲你的门'，警告如果你打扰别人，你可能会被反过来打扰；类似于'善有善报，恶有恶报'。
    ar: مثل تركي يعني 'لا تطرق الأبواب، وإلا سيطرقون بابك'، محذرًا من أنك إذا أزعجت الآخرين، فقد تُزعج
      بالمثل؛ يشبه 'كما تدين تدان'.
    he: פתגם טורקי שפירושו 'אל תדפוק על דלתות, או שידפקו על שלך', המזהיר שאם תפריע לאחרים, אתה עלול להיות
