  short_explanation: A phrase meaning 'May friends remember me', often used to express a desire to be
    remembered after death. It is the title of a famous poem by Turkish poet Orhan Veli Kanık.
  i18n_explanations:
    en: A phrase meaning 'May friends remember me', often used to express a desire to be remembered after
      death. It is the title of a famous poem by Turkish poet Orhan Veli Kanık.
    es: Una frase que significa 'Que los amigos me recuerden', a menudo usada para expresar el deseo de
      ser recordado después de la muerte. Es el título de un famoso poema del poeta turco Orhan Veli Kanık.
    fr: Une phrase signifiant 'Que les amis se souviennent de moi', souvent utilisée pour exprimer le
      désir d'être rappelé après la mort. C'est le titre d'un célèbre poème du poète turc Orhan Veli Kanık.
    de: Ein Satz, der bedeutet 'Mögen Freunde sich an mich erinnern', oft verwendet, um den Wunsch auszudrücken,
      nach dem Tod in Erinnerung zu bleiben. Es ist der Titel eines berühmten Gedichts des türkischen
      Dichters Orhan Veli Kanık.
    it: Una frase che significa 'Che gli amici mi ricordino', spesso usata per esprimere il desiderio
      di essere ricordati dopo la morte. È il titolo di una famosa poesia del poeta turco Orhan Veli Kanık.
    pt: Uma frase que significa 'Que os amigos se lembrem de mim', frequentemente usada para expressar
      o desejo de ser lembrado após a morte. É o título de um famoso poema do poeta turco Orhan Veli Kanık.
    ru: Фраза, означающая 'Пусть друзья помнят меня', часто используется для выражения желания быть remembered
      после смерти. Это название известного стихотворения турецкого поэта Орхана Вели Каныка.
    ja: 「友よ、私を覚えていてほしい」という意味のフレーズで、死後も記憶されたいという願いを表すのに使われる。トルコの詩人オルハン・ヴェリ・カヌクの有名な詩のタイトル。
    zh: 意为‘愿朋友们记住我’，常用来表达希望死后被记住的愿望。这是土耳其诗人奥尔汗·韦利·卡内克一首著名诗作的标题。
    ar: عبارة تعني 'ليذكرني الأصدقاء'، غالباً ما تستخدم للتعبير عن الرغبة في أن يُذكر بعد الموت. إنها
