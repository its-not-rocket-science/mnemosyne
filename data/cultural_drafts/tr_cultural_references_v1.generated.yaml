- id: tr_proverb_tradition_hamama_giren_terler_cd58309a
  language: tr
  canonical_reference: Hamama giren terler
  reference_type: proverb_tradition
  surface_patterns:
  - hamama giren terler
  - hamama giren terler misali
  short_explanation: Literally 'who enters the bath sweats'. It means that if you undertake a task, you
    must accept its consequences or difficulties. Similar to 'if you can't stand the heat, get out of
    the kitchen'.
  i18n_explanations:
    en: Literally 'who enters the bath sweats'. It means that if you undertake a task, you must accept
      its consequences or difficulties. Similar to 'if you can't stand the heat, get out of the kitchen'.
    es: Literalmente 'quien entra al baño suda'. Significa que si emprendes una tarea, debes aceptar sus
      consecuencias o dificultades. Similar a 'si no soportas el calor, sal de la cocina'.
    fr: Littéralement 'qui entre au bain transpire'. Cela signifie que si vous entreprenez une tâche,
      vous devez en accepter les conséquences ou les difficultés. Similaire à 'si vous ne supportez pas
      la chaleur, sortez de la cuisine'.
    de: Wörtlich 'wer ins Bad geht, schwitzt'. Es bedeutet, dass man die Konsequenzen oder Schwierigkeiten
      einer Aufgabe akzeptieren muss. Ähnlich wie 'wenn dir die Hitze zu viel wird, verlass die Küche'.
    it: Letteralmente 'chi entra nel bagno suda'. Significa che se si intraprende un compito, se ne devono
      accettare le conseguenze o le difficoltà. Simile a 'se non sopporti il caldo, esci dalla cucina'.
    pt: Literalmente 'quem entra no banho sua'. Significa que se você assume uma tarefa, deve aceitar
      suas consequências ou dificuldades. Semelhante a 'se não aguenta o calor, saia da cozinha'.
    ru: Буквально 'кто входит в баню, тот потеет'. Означает, что если вы беретесь за дело, вы должны принять
      его последствия или трудности. Аналогично 'если не выносишь жары, уходи из кухни'.
    ja: 文字通り「風呂に入る者は汗をかく」。仕事を引き受けるなら、その結果や困難を受け入れなければならないという意味。「暑さに耐えられないなら台所を出て行け」に類似。
    zh: 字面意思是“进浴室的人会出汗”。意思是如果你承担一项任务，就必须接受其后果或困难。类似于“受不了热，就离开厨房”。
