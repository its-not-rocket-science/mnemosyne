    away at any time.
  i18n_explanations:
    en: This Turkish proverb means 'He who rides a borrowed horse dismounts quickly.' It warns against
      relying on borrowed or temporary things, as they are not permanent and can be taken away at any
      time.
    es: Este proverbio turco significa 'Quien monta un caballo prestado se baja rápido.' Advierte contra
      confiar en cosas prestadas o temporales, ya que no son permanentes y pueden ser quitadas en cualquier
      momento.
    fr: Ce proverbe turc signifie 'Celui qui monte un cheval emprunté descend vite.' Il met en garde contre
      le fait de compter sur des choses empruntées ou temporaires, car elles ne sont pas permanentes et
      peuvent être reprises à tout moment.
    de: Dieses türkische Sprichwort bedeutet 'Wer ein geliehenes Pferd reitet, steigt schnell ab.' Es
      warnt davor, sich auf geliehene oder vorübergehende Dinge zu verlassen, da sie nicht dauerhaft sind
      und jederzeit weggenommen werden können.
    it: Questo proverbio turco significa 'Chi cavalca un cavallo preso in prestito scende velocemente.'
