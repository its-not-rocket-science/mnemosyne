    fr: Ce proverbe turc signifie 'Le chat appelle pourri le foie qu'il ne peut atteindre', semblable
      à 'raisins verts'. Il décrit quelqu'un qui dénigre ce qu'il ne peut obtenir.
    de: Dieses türkische Sprichwort bedeutet 'Die Katze nennt die Leber, die sie nicht erreichen kann,
