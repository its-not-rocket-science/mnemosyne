    fr: Un vers du poète turc du XIIIe siècle Yunus Emre, signifiant 'Aimons et soyons aimés'. Il reflète
      sa philosophie d'amour universel et d'humanisme, soulignant l'amour comme essence de la vie.
    de: Ein Vers des türkischen Dichters Yunus Emre aus dem 13. Jahrhundert, der bedeutet 'Lasst uns lieben
      und geliebt werden'. Er spiegelt seine Philosophie der universellen Liebe und des Humanismus wider
      und betont die Liebe als Essenz des Lebens.
