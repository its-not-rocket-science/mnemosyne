- id: tr_proverb_tradition_meydan_boş_deve_yok_f3ca9b31
  language: tr
  canonical_reference: Meydan boş, deve yok
  reference_type: proverb_tradition
  surface_patterns:
  - meydan boş deve yok
  - meydan boş
  short_explanation: This Turkish proverb means 'The square is empty, there is no camel,' used to indicate
    that there is no opportunity or means to do something. It reflects a fatalistic attitude when circumstances
    are unfavorable.
  i18n_explanations:
    en: This Turkish proverb means 'The square is empty, there is no camel,' used to indicate that there
      is no opportunity or means to do something. It reflects a fatalistic attitude when circumstances
      are unfavorable.
    es: Este proverbio turco significa 'La plaza está vacía, no hay camello', usado para indicar que no
      hay oportunidad o medios para hacer algo. Refleja una actitud fatalista cuando las circunstancias
      son desfavorables.
    fr: Ce proverbe turc signifie 'La place est vide, il n'y a pas de chameau', utilisé pour indiquer
      qu'il n'y a ni opportunité ni moyen de faire quelque chose. Il reflète une attitude fataliste lorsque
      les circonstances sont défavorables.
    de: Dieses türkische Sprichwort bedeutet 'Der Platz ist leer, es gibt kein Kamel' und wird verwendet,
      um anzuzeigen, dass es keine Gelegenheit oder Mittel gibt, etwas zu tun. Es spiegelt eine fatalistische
      Haltung wider, wenn die Umstände ungünstig sind.
    it: Questo proverbio turco significa 'La piazza è vuota, non c'è cammello', usato per indicare che
      non c'è opportunità o mezzo per fare qualcosa. Riflette un atteggiamento fatalista quando le circostanze
      sono sfavorevoli.
    pt: Este provérbio turco significa 'A praça está vazia, não há camelo', usado para indicar que não
      há oportunidade ou meios para fazer algo. Reflete uma atitude fatalista quando as circunstâncias
      são desfavoráveis.
    ru: Эта турецкая пословица означает 'Площадь пуста, верблюда нет', используется, чтобы указать, что
      нет возможности или средств что-либо сделать. Она отражает фаталистическое отношение, когда обстоятельства
      неблагоприятны.
    ja: このトルコのことわざは「広場は空っぽ、ラクダはいない」という意味で、何かをする機会や手段がないことを示すために使われます。状況が不利なときの運命論的な態度を反映しています。
    zh: 这句土耳其谚语的意思是“广场空荡荡，没有骆驼”，用于表示没有机会或手段做某事。它反映了在不利情况下的宿命论态度。
    ar: هذا المثل التركي يعني 'الساحة فارغة، لا يوجد جمل'، يُستخدم للإشارة إلى عدم وجود فرصة أو وسيلة
      لفعل شيء. إنه يعكس موقفًا قدريًا عندما تكون الظروف غير مواتية.
    he: פתגם טורקי זה פירושו 'הכיכר ריקה, אין גמל', ומשמש לציון שאין הזדמנות או אמצעי לעשות משהו. הוא
      משקף גישה פטליסטית כאשר הנסיבות אינן נוחות.
