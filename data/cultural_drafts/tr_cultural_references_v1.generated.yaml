- id: tr_literary_reference_minnet_eylemem_a8648aa0
  language: tr
  canonical_reference: Minnet eylemem
  reference_type: literary_reference
  surface_patterns:
  - minnet eylemem
  - minnet eyleme
  - minnet etmem
  short_explanation: A phrase meaning 'I will not express gratitude' or 'I will not be indebted,' often
    used to assert independence. It appears in Turkish folk literature and poetry.
  i18n_explanations:
    en: A phrase meaning 'I will not express gratitude' or 'I will not be indebted,' often used to assert
      independence. It appears in Turkish folk literature and poetry.
    es: Frase que significa 'no expresaré gratitud' o 'no estaré en deuda', usada a menudo para afirmar
      la independencia. Aparece en la literatura y poesía popular turca.
    fr: Une phrase signifiant 'je n'exprimerai pas de gratitude' ou 'je ne serai pas redevable', souvent
      utilisée pour affirmer son indépendance. Elle apparaît dans la littérature et la poésie populaires
      turques.
    de: Ein Ausdruck, der bedeutet 'Ich werde keine Dankbarkeit ausdrücken' oder 'Ich werde nicht verschuldet
      sein', oft verwendet, um Unabhängigkeit zu behaupten. Er kommt in der türkischen Volksliteratur
      und Poesie vor.
    it: Una frase che significa 'non esprimerò gratitudine' o 'non sarò in debito', spesso usata per affermare
      l'indipendenza. Appare nella letteratura e poesia popolare turca.
    pt: Uma frase que significa 'não expressarei gratidão' ou 'não estarei em dívida', frequentemente
      usada para afirmar independência. Aparece na literatura e poesia popular turca.
    ru: Фраза, означающая «я не буду выражать благодарность» или «я не буду в долгу», часто используется
      для утверждения независимости. Встречается в турецкой народной литературе и поэзии.
    ja: 「感謝を表さない」「借りを作らない」という意味のフレーズで、独立を主張する際によく使われる。トルコの民俗文学や詩に登場する。
    zh: 意为“我不会表达感激”或“我不会欠人情”的短语，常用于表明独立。出现在土耳其民间文学和诗歌中。
    ar: عبارة تعني 'لن أعرب عن الامتنان' أو 'لن أكون مدينًا'، تُستخدم غالبًا لتأكيد الاستقلال. تظهر في
      الأدب الشعبي والشعر التركي.
    he: ביטוי שמשמעותו 'לא אביע תודה' או 'לא אהיה חייב', המשמש לעתים קרובות להצהרת עצמאות. הוא מופיע בספרות
      העממית והשירה הטורקית.
