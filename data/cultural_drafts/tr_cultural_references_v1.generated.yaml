- id: tr_proverb_tradition_her_işte_bir_hayır_vardır_1c2cbb70
  language: tr
  canonical_reference: Her işte bir hayır vardır
  reference_type: proverb_tradition
  surface_patterns:
  - her işte bir hayır vardır
  - her işte bir hayır vardır deyimi
  short_explanation: Literally 'there is a goodness in every matter'. It means that even in bad events,
    there may be a hidden benefit or divine wisdom. Similar to 'every cloud has a silver lining'.
  i18n_explanations:
    en: Literally 'there is a goodness in every matter'. It means that even in bad events, there may be
      a hidden benefit or divine wisdom. Similar to 'every cloud has a silver lining'.
    es: Literalmente 'hay un bien en cada asunto'. Significa que incluso en los malos eventos, puede haber
      un beneficio oculto o sabiduría divina. Similar a 'no hay mal que por bien no venga'.
    fr: Littéralement 'il y a un bien dans chaque affaire'. Cela signifie que même dans les mauvais événements,
      il peut y avoir un bénéfice caché ou une sagesse divine. Similaire à 'à quelque chose malheur est
      bon'.
    de: Wörtlich 'es gibt eine Güte in jeder Angelegenheit'. Es bedeutet, dass selbst in schlechten Ereignissen
      ein versteckter Nutzen oder göttliche Weisheit stecken kann. Ähnlich wie 'jedes Unglück hat sein
      Gutes'.
    it: Letteralmente 'c'è un bene in ogni faccenda'. Significa che anche negli eventi negativi, può esserci
      un beneficio nascosto o una saggezza divina. Simile a 'non tutto il male viene per nuocere'.
    pt: Literalmente 'há um bem em cada assunto'. Significa que mesmo em eventos ruins, pode haver um
      benefício oculto ou sabedoria divina. Semelhante a 'todo mal tem seu bem'.
    ru: Буквально 'в каждом деле есть добро'. Означает, что даже в плохих событиях может быть скрытая
      выгода или божественная мудрость. Аналогично 'нет худа без добра'.
    ja: 文字通り「すべての事柄には善がある」。悪い出来事にも隠れた利益や神の知恵があるかもしれないという意味。「どの雲にも銀の裏地がある」に類似。
    zh: 字面意思是“每件事都有其好处”。意思是即使在坏事中，也可能有隐藏的好处或天意。类似于“每朵乌云都有银边”。
    ar: حرفياً 'هناك خير في كل أمر'. يعني أنه حتى في الأحداث السيئة، قد تكون هناك فائدة خفية أو حكمة إلهية.
      مشابه لـ 'رب ضارة نافعة'.
    he: תרתי משמע 'יש טוב בכל עניין'. פירושו שגם באירועים רעים, עשויה להיות תועלת נסתרת או חוכמה אלוהית.
