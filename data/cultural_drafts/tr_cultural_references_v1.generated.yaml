      die unersetzliche Bindung zur Mutter.
    it: Un proverbio che significa 'Se qualcuno piange, è mia madre che piange; il resto sono lacrime
      finte', evidenziando la sincerità unica dell'amore di una madre rispetto agli altri. Sottolinea
      il legame insostituibile con la propria madre.
    pt: Um provérbio que significa 'Se alguém chora, é minha mãe que chora; o resto são lágrimas falsas',
