  short_explanation: This Turkish proverb means 'What does one hand have? Two hands make a sound.' It
    emphasizes the power of collaboration and teamwork over individual effort.
  i18n_explanations:
    en: This Turkish proverb means 'What does one hand have? Two hands make a sound.' It emphasizes the
      power of collaboration and teamwork over individual effort.
    es: Este proverbio turco significa '¿Qué tiene una mano? Dos manos hacen sonido.' Enfatiza el poder
      de la colaboración y el trabajo en equipo sobre el esfuerzo individual.
    fr: Ce proverbe turc signifie 'Qu'a une main ? Deux mains font du bruit.' Il souligne la puissance
      de la collaboration et du travail d'équipe par rapport à l'effort individuel.
    de: Dieses türkische Sprichwort bedeutet 'Was hat eine Hand? Zwei Hände machen Geräusch.' Es betont
      die Kraft der Zusammenarbeit und Teamarbeit gegenüber individueller Anstrengung.
    it: Questo proverbio turco significa 'Cosa ha una mano? Due mani fanno rumore.' Sottolinea il potere
      della collaborazione e del lavoro di squadra rispetto allo sforzo individuale.
    pt: Este provérbio turco significa 'O que uma mão tem? Duas mãos fazem barulho.' Enfatiza o poder
      da colaboração e do trabalho em equipe sobre o esforço individual.
    ru: Эта турецкая пословица означает 'Что есть у одной руки? Две руки издают звук.' Она подчёркивает
      силу сотрудничества и командной работы по сравнению с индивидуальными усилиями.
    ja: このトルコのことわざは「片手に何がある？両手で音がする」という意味です。個人の努力よりも協力とチームワークの力を強調しています。
    zh: 这句土耳其谚语的意思是“一只手有什么？两只手才有声音”。它强调协作和团队合作比个人努力更有力量。
    ar: هذا المثل التركي يعني 'ماذا تملك يد واحدة؟ يدان تصدران صوتاً.' إنه يؤكد على قوة التعاون والعمل
      الجماعي على الجهد الفردي.
    he: הפתגם הטורקי הזה אומר 'מה יש ליד אחת? שתי ידיים משמיעות קול.' הוא מדגיש את כוחו של שיתוף פעולה
