- id: tr_classical_or_scriptural_allusion_dede_korkut_hikayeleri_d2efa2e0
  language: tr
  canonical_reference: Dede Korkut Hikayeleri
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Dede Korkut Hikayeleri
  - Dede Korkut
  - Korkut Ata
  short_explanation: The Book of Dede Korkut is a collection of twelve epic stories from the Oghuz Turks,
    blending pre-Islamic and Islamic elements. It is a masterpiece of Turkish oral literature and a UNESCO
    Intangible Cultural Heritage.
  i18n_explanations:
    en: The Book of Dede Korkut is a collection of twelve epic stories from the Oghuz Turks, blending
      pre-Islamic and Islamic elements. It is a masterpiece of Turkish oral literature and a UNESCO Intangible
      Cultural Heritage.
    es: El Libro de Dede Korkut es una colección de doce historias épicas de los turcos oguz, que combina
      elementos preislámicos e islámicos. Es una obra maestra de la literatura oral turca y Patrimonio
      Cultural Inmaterial de la UNESCO.
    fr: Le Livre de Dede Korkut est un recueil de douze récits épiques des Turcs Oghouzes, mêlant éléments
      préislamiques et islamiques. C'est un chef-d'œuvre de la littérature orale turque et un patrimoine
      culturel immatériel de l'UNESCO.
    de: Das Buch des Dede Korkut ist eine Sammlung von zwölf epischen Geschichten der Oghusen, die vorislamische
      und islamische Elemente vermischt. Es ist ein Meisterwerk der türkischen mündlichen Literatur und
      ein UNESCO-Weltkulturerbe.
    it: Il Libro di Dede Korkut è una raccolta di dodici storie epiche dei turchi Oghuz, che mescola elementi
      preislamici e islamici. È un capolavoro della letteratura orale turca e Patrimonio Culturale Immateriale
      dell'UNESCO.
    pt: O Livro de Dede Korkut é uma coleção de doze histórias épicas dos turcos oguz, misturando elementos
      pré-islâmicos e islâmicos. É uma obra-prima da literatura oral turca e Patrimônio Cultural Imaterial
      da UNESCO.
    ru: Книга Деде Коркута — сборник двенадцати эпических сказаний огузских тюрок, сочетающий доисламские
      и исламские элементы. Это шедевр турецкой устной литературы и объект нематериального культурного
      наследия ЮНЕСКО.
    ja: 『デデ・コルクトの書』は、オグズ・トルコ人の12の叙事詩を集めたもので、イスラーム以前とイスラームの要素を融合しています。トルコ口承文学の傑作であり、ユネスコ無形文化遺産です。
    zh: 《代代·科尔库特之书》是一部由十二篇乌古斯突厥人史诗故事组成的集子，融合了前伊斯兰和伊斯兰元素。它是土耳其口头文学的杰作，也是联合国教科文组织非物质文化遗产。
    ar: كتاب دده قورقوت هو مجموعة من اثنتي عشرة قصة ملحمية من الأتراك الأوغوز، تمزج بين العناصر الإسلامية
      وما قبل الإسلام. إنها تحفة من الأدب الشفوي التركي وتراث ثقافي غير مادي لليونسكو.
    he: ספר דדה קורקוט הוא אוסף של שנים עשר סיפורים אפיים מהטורקים האוע'וזים, המשלב אלמנטים פרה-אסלאמיים
      ואסלאמיים. זוהי יצירת מופת של הספרות שבעל-פה הטורקית ומורשת תרבותית בלתי מוחשית של אונסק"ו.
