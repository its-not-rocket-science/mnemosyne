      de juzgar a las personas por su apariencia. Critica el respeto superficial basado en la riqueza
      o la vestimenta.
    fr: Une célèbre anecdote de Nasreddin Hoca où il dit à son manteau de manger, soulignant l'hypocrisie
      de juger les gens sur leur apparence. Elle critique le respect superficiel basé sur la richesse
      ou l'habit.
    de: Eine berühmte Anekdote von Nasreddin Hoca, in der er seinem Mantel sagt, er solle essen, und damit
      die Heuchelei hervorhebt, Menschen nach ihrem Äußeren zu beurteilen. Sie kritisiert oberflächlichen
      Respekt aufgrund von Reichtum oder Kleidung.
    it: Un famoso aneddoto di Nasreddin Hoca in cui dice al suo cappotto di mangiare, evidenziando l'ipocrisia
