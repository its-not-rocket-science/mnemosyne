- id: tr_literary_reference_bâkî_3c279cac
  language: tr
  canonical_reference: Bâkî
  reference_type: literary_reference
  surface_patterns:
  - Bâkî
  - Baki
  - Bâkî-i Âzam
  short_explanation: Bâkî (1526-1600) was a renowned Ottoman poet, often called 'Sultan of Poets' (Sultânü'ş-şuarâ).
    He is a master of classical Ottoman poetry, known for his gazels and kasides, and his work reflects
    the grandeur of the Ottoman Empire.
  i18n_explanations:
    en: Bâkî (1526-1600) was a renowned Ottoman poet, often called 'Sultan of Poets' (Sultânü'ş-şuarâ).
      He is a master of classical Ottoman poetry, known for his gazels and kasides, and his work reflects
      the grandeur of the Ottoman Empire.
    es: Bâkî (1526-1600) fue un renombrado poeta otomano, a menudo llamado 'Sultán de los Poetas' (Sultânü'ş-şuarâ).
      Es un maestro de la poesía clásica otomana, conocido por sus gazales y casidas, y su obra refleja
      la grandeza del Imperio Otomano.
    fr: Bâkî (1526-1600) était un célèbre poète ottoman, souvent appelé 'Sultan des poètes' (Sultânü'ş-şuarâ).
      C'est un maître de la poésie classique ottomane, connu pour ses gazels et kasides, et son œuvre
      reflète la grandeur de l'Empire ottoman.
    de: Bâkî (1526-1600) war ein berühmter osmanischer Dichter, oft 'Sultan der Dichter' (Sultânü'ş-şuarâ)
      genannt. Er ist ein Meister der klassischen osmanischen Poesie, bekannt für seine Ghaselen und Kasiden,
      und sein Werk spiegelt die Größe des Osmanischen Reiches wider.
    it: Bâkî (1526-1600) fu un rinomato poeta ottomano, spesso chiamato 'Sultano dei Poeti' (Sultânü'ş-şuarâ).
      È un maestro della poesia classica ottomana, noto per i suoi ghazal e qasida, e la sua opera riflette
      la grandezza dell'Impero Ottomano.
    pt: Bâkî (1526-1600) foi um renomado poeta otomano, frequentemente chamado de 'Sultão dos Poetas'
      (Sultânü'ş-şuarâ). É um mestre da poesia clássica otomana, conhecido por seus gazéis e casidas,
      e seu trabalho reflete a grandeza do Império Otomano.
    ru: Баки (1526-1600) — известный османский поэт, часто называемый «Султаном поэтов» (Sultânü'ş-şuarâ).
      Он является мастером классической османской поэзии, известен своими газелями и касыдами, и его творчество
      отражает величие Османской империи.
    ja: バーキー（1526-1600）は著名なオスマン帝国の詩人で、「詩人のスルタン」（Sultânü'ş-şuarâ）と呼ばれる。古典オスマン詩の巨匠で、ガザルやカスィーダで知られ、その作品はオスマン帝国の壮大さを反映している。
    zh: 巴基（1526-1600）是著名的奥斯曼诗人，常被称为“诗人苏丹”（Sultânü'ş-şuarâ）。他是古典奥斯曼诗歌的大师，以其加扎勒和卡西达闻名，作品反映了奥斯曼帝国的辉煌。
    ar: باقي (1526-1600) كان شاعراً عثمانياً مشهوراً، يُطلق عليه غالباً 'سلطان الشعراء' (سلطان الشعراء).
      وهو أستاذ في الشعر العثماني الكلاسيكي، معروف بغزلياته وقصائده، ويعكس عمله عظمة الإمبراطورية العثمانية.
    he: באקי (1526-1600) היה משורר עות'מאני נודע, המכונה לעתים קרובות 'סולטן המשוררים' (Sultânü'ş-şuarâ).
      הוא אמן של השירה העות'מאנית הקלאסית, ידוע בגזל ובקסידות שלו, ויצירתו משקפת את גדולתה של האימפריה
      העות'מאנית.
