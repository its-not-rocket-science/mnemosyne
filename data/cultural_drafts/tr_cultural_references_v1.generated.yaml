- id: tr_proverb_tradition_mızrak_çuvala_sığmaz_e3b45892
  language: tr
  canonical_reference: Mızrak çuvala sığmaz
  reference_type: proverb_tradition
  surface_patterns:
  - mızrak çuvala sığmaz
  - mızrak çuvala sığmazmış
  short_explanation: This Turkish proverb means 'A spear cannot fit into a sack,' implying that a conspicuous
    truth or fact cannot be hidden. It is used when something obvious cannot be concealed.
  i18n_explanations:
    en: This Turkish proverb means 'A spear cannot fit into a sack,' implying that a conspicuous truth
      or fact cannot be hidden. It is used when something obvious cannot be concealed.
    es: Este proverbio turco significa 'Una lanza no cabe en un saco', implicando que una verdad o hecho
      evidente no puede ocultarse. Se usa cuando algo obvio no puede ser ocultado.
    fr: Ce proverbe turc signifie 'Une lance ne peut pas tenir dans un sac', impliquant qu'une vérité
      ou un fait évident ne peut être caché. Il est utilisé quand quelque chose d'évident ne peut être
      dissimulé.
    de: Dieses türkische Sprichwort bedeutet 'Ein Speer passt nicht in einen Sack' und impliziert, dass
      eine offensichtliche Wahrheit oder Tatsache nicht verborgen werden kann. Es wird verwendet, wenn
      etwas Offensichtliches nicht verheimlicht werden kann.
    it: Questo proverbio turco significa 'Una lancia non può entrare in un sacco', implicando che una
      verità o un fatto evidente non può essere nascosto. Si usa quando qualcosa di ovvio non può essere
      celato.
    pt: Este provérbio turco significa 'Uma lança não cabe em um saco', implicando que uma verdade ou
      fato evidente não pode ser escondido. É usado quando algo óbvio não pode ser ocultado.
    ru: Эта турецкая пословица означает 'Копье не помещается в мешок', подразумевая, что очевидную правду
      или факт нельзя скрыть. Она используется, когда что-то очевидное невозможно утаить.
    ja: このトルコのことわざは「槍は袋に入らない」という意味で、目立つ真実や事実は隠せないことを示唆しています。明白なことが隠せない場合に使われます。
    zh: 这句土耳其谚语的意思是“长矛装不进袋子”，暗示明显的真相或事实无法隐藏。用于某件显而易见的事情无法被掩盖的情况。
    ar: هذا المثل التركي يعني 'الرمح لا يدخل في الجوال'، مما يشير إلى أن الحقيقة أو الواقع الواضح لا يمكن
      إخفاؤه. يُستخدم عندما لا يمكن إخفاء شيء واضح.
    he: פתגם טורקי זה פירושו 'חנית לא נכנסת לשק', ומרמז כי אמת או עובדה בולטת לא ניתן להסתיר. הוא משמש
      כאשר משהו ברור לא ניתן להסתרה.
