    zh: 土耳其语表达，意为“愿炉火永不熄灭”，用作祝福家庭延续、温暖和繁荣。炉灶（ocak）象征着家庭和血统。
    ar: تعبير تركي يعني 'لا ينطفئ الموقد أبدًا'، يُستخدم كدعاء لاستمرارية الأسرة والدفء والازدهار. الموقد
