  short_explanation: Kardeş Kanı (Brother's Blood) is a Turkish idiom referring to fratricide or the killing
    of a brother, often used metaphorically to describe betrayal or conflict among siblings or close allies.
  i18n_explanations:
    en: Kardeş Kanı (Brother's Blood) is a Turkish idiom referring to fratricide or the killing of a brother,
      often used metaphorically to describe betrayal or conflict among siblings or close allies.
    es: Kardeş Kanı (Sangre de Hermano) es un modismo turco que se refiere al fratricidio o la muerte
      de un hermano, a menudo usado metafóricamente para describir traición o conflicto entre hermanos
      o aliados cercanos.
    fr: Kardeş Kanı (Sang du Frère) est une expression idiomatique turque désignant le fratricide ou le
      meurtre d'un frère, souvent utilisée métaphoriquement pour décrire la trahison ou le conflit entre
      frères et sœurs ou alliés proches.
    de: Kardeş Kanı (Bruderblut) ist eine türkische Redewendung, die sich auf Brudermord oder die Tötung
      eines Bruders bezieht, oft metaphorisch verwendet, um Verrat oder Konflikte zwischen Geschwistern
      oder engen Verbündeten zu beschreiben.
    it: Kardeş Kanı (Sangue del Fratello) è un'espressione idiomatica turca che si riferisce al fratricidio
      o all'uccisione di un fratello, spesso usata metaforicamente per descrivere tradimento o conflitto
      tra fratelli o alleati stretti.
    pt: Kardeş Kanı (Sangue do Irmão) é uma expressão idiomática turca que se refere ao fratricídio ou
      à morte de um irmão, frequentemente usada metaforicamente para descrever traição ou conflito entre
      irmãos ou aliados próximos.
    ru: Kardeş Kanı (Кровь брата) — турецкая идиома, обозначающая братоубийство или убийство брата, часто
      используемая метафорически для описания предательства или конфликта между братьями и сёстрами или
      близкими союзниками.
    ja: Kardeş Kanı（兄弟の血）はトルコ語の慣用句で、兄弟殺しや兄弟の殺害を指し、兄弟や親しい同盟者間の裏切りや対立を比喩的に表現するのに使われます。
    zh: Kardeş Kanı（兄弟之血）是一个土耳其习语，指弑兄或杀害兄弟，常用来比喻兄弟姐妹或亲密盟友之间的背叛或冲突。
    ar: Kardeş Kanı (دم الأخ) هو تعبير اصطلاحي تركي يشير إلى قتل الأخ أو قتل شقيق، وغالبًا ما يستخدم مجازيًا
      لوصف الخيانة أو الصراع بين الأشقاء أو الحلفاء المقربين.
    he: Kardeş Kanı (דם אח) הוא ביטוי אידיומטי טורקי המתייחס לרצח אחים או להריגת אח, המשמש לעתים קרובות
