  language: tr
  canonical_reference: Mantığın sınırı yok
  reference_type: cultural_reference
  surface_patterns:
  - mantığın sınırı yok
  - mantığın sınırı yoktur
  short_explanation: This phrase means 'There is no limit to logic,' often used to emphasize that reasoning
    can be applied endlessly. It is a common expression in Turkish intellectual discourse.
  i18n_explanations:
    en: This phrase means 'There is no limit to logic,' often used to emphasize that reasoning can be
      applied endlessly. It is a common expression in Turkish intellectual discourse.
    es: Esta frase significa 'No hay límite para la lógica', a menudo usada para enfatizar que el razonamiento
      se puede aplicar sin fin. Es una expresión común en el discurso intelectual turco.
    fr: Cette phrase signifie 'Il n'y a pas de limite à la logique', souvent utilisée pour souligner que
      le raisonnement peut être appliqué sans fin. C'est une expression courante dans le discours intellectuel
      turc.
    de: Dieser Satz bedeutet 'Es gibt keine Grenze für die Logik' und wird oft verwendet, um zu betonen,
      dass das Denken endlos angewendet werden kann. Es ist ein häufiger Ausdruck im türkischen intellektuellen
      Diskurs.
    it: Questa frase significa 'Non c'è limite alla logica', spesso usata per sottolineare che il ragionamento
      può essere applicato all'infinito. È un'espressione comune nel discorso intellettuale turco.
    pt: Esta frase significa 'Não há limite para a lógica', frequentemente usada para enfatizar que o
      raciocínio pode ser aplicado infinitamente. É uma expressão comum no discurso intelectual turco.
    ru: Эта фраза означает 'Нет предела логике', часто используется, чтобы подчеркнуть, что рассуждения
      можно применять бесконечно. Это распространенное выражение в турецком интеллектуальном дискурсе.
    ja: このフレーズは「論理に限界はない」という意味で、推論が無限に適用できることを強調するためによく使われます。トルコの知的言説で一般的な表現です。
    zh: 这句话的意思是“逻辑没有极限”，常用于强调推理可以无限应用。这是土耳其知识界常见的表达。
    ar: هذه العبارة تعني 'لا حدود للمنطق'، وغالبًا ما تستخدم للتأكيد على أن التفكير يمكن تطبيقه بلا نهاية.
      إنها تعبير شائع في الخطاب الفكري التركي.
    he: ביטוי זה פירושו 'אין גבול להיגיון', ומשמש לעתים קרובות כדי להדגיש שניתן ליישם חשיבה ללא סוף. זהו
      ביטוי נפוץ בשיח האינטלקטואלי הטורקי.
