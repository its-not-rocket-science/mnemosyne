      достичь.
    ja: このトルコのことわざは「猫は届かないレバーを腐っていると言う」という意味で、「酸っぱい葡萄」に似ています。手に入らないものをけなす人を描写します。
    zh: 这句土耳其谚语的意思是“猫把够不到的肝脏称为腐烂的”，类似于“酸葡萄”。它描述某人贬低自己无法得到的东西。
    ar: هذا المثل التركي يعني 'القط يدعو الكبد الذي لا يستطيع الوصول إليه فاسدًا'، مشابهًا لـ 'عنب حامض'.
