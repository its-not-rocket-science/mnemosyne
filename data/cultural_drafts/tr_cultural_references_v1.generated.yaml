      who has survived a battle or massacre. It conveys resilience and survival against odds.
    es: Un modismo turco que significa 'superviviente de la espada' o 'sobrante de la espada', refiriéndose
      a alguien que ha sobrevivido a una batalla o masacre. Transmite resiliencia y supervivencia contra
      todo pronóstico.
    fr: Un idiome turc signifiant 'survivant de l'épée' ou 'restant de l'épée', faisant référence à quelqu'un
      qui a survécu à une bataille ou à un massacre. Il exprime la résilience et la survie contre toute
      attente.
    de: Eine türkische Redewendung, die 'Überlebender des Schwertes' oder 'Übriggebliebener vom Schwert'
      bedeutet und sich auf jemanden bezieht, der eine Schlacht oder ein Massaker überlebt hat. Sie vermittelt
      Widerstandsfähigkeit und Überleben gegen alle Widrigkeiten.
    it: Un'espressione idiomatica turca che significa 'sopravvissuto alla spada' o 'avanzo della spada',
