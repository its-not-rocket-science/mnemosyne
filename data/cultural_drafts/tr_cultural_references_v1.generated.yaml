- id: tr_cultural_reference_kasım_ad8a86f1
  language: tr
  canonical_reference: Kasım
  reference_type: cultural_reference
  surface_patterns:
  - Kasım
  - Kasım ayı
  - Kasım günü
  short_explanation: Kasım (November) is the eleventh month of the year in the Gregorian calendar, but
    in Turkish culture it also marks the beginning of winter according to traditional calendar (Rumi calendar).
    The phrase 'Kasım günü' can refer to a specific day or period.
  i18n_explanations:
    en: Kasım (November) is the eleventh month of the year in the Gregorian calendar, but in Turkish culture
      it also marks the beginning of winter according to traditional calendar (Rumi calendar). The phrase
      'Kasım günü' can refer to a specific day or period.
    es: Kasım (Noviembre) es el undécimo mes del año en el calendario gregoriano, pero en la cultura turca
      también marca el comienzo del invierno según el calendario tradicional (calendario Rumi). La frase
      'Kasım günü' puede referirse a un día o período específico.
    fr: Kasım (Novembre) est le onzième mois de l'année dans le calendrier grégorien, mais dans la culture
      turque, il marque également le début de l'hiver selon le calendrier traditionnel (calendrier Rumi).
      L'expression 'Kasım günü' peut désigner un jour ou une période spécifique.
    de: Kasım (November) ist der elfte Monat des Jahres im gregorianischen Kalender, aber in der türkischen
      Kultur markiert er auch den Beginn des Winters nach dem traditionellen Kalender (Rumi-Kalender).
      Der Ausdruck 'Kasım günü' kann sich auf einen bestimmten Tag oder Zeitraum beziehen.
    it: Kasım (Novembre) è l'undicesimo mese dell'anno nel calendario gregoriano, ma nella cultura turca
      segna anche l'inizio dell'inverno secondo il calendario tradizionale (calendario Rumi). L'espressione
      'Kasım günü' può riferirsi a un giorno o periodo specifico.
    pt: Kasım (Novembro) é o décimo primeiro mês do ano no calendário gregoriano, mas na cultura turca
      também marca o início do inverno de acordo com o calendário tradicional (calendário Rumi). A expressão
      'Kasım günü' pode se referir a um dia ou período específico.
    ru: Касым (Ноябрь) — одиннадцатый месяц года по григорианскому календарю, но в турецкой культуре он
      также знаменует начало зимы по традиционному календарю (календарь Руми). Фраза 'Kasım günü' может
      относиться к определённому дню или периоду.
    ja: カスム（11月）はグレゴリオ暦の年の11番目の月ですが、トルコ文化では伝統的な暦（ルーミー暦）に従って冬の始まりを示します。「カスムの日」という表現は特定の日や期間を指すことがあります。
    zh: Kasım（十一月）是公历年的第十一个月，但在土耳其文化中，根据传统历法（鲁米历），它也标志着冬天的开始。短语“Kasım günü”可以指特定的某一天或时期。
    ar: كاسم (نوفمبر) هو الشهر الحادي عشر من السنة في التقويم الغريغوري، لكنه في الثقافة التركية يمثل
      أيضًا بداية الشتاء وفقًا للتقويم التقليدي (تقويم رومي). يمكن أن تشير عبارة 'Kasım günü' إلى يوم
      أو فترة محددة.
    he: קאסים (נובמבר) הוא החודש האחד-עשר בשנה בלוח הגרגוריאני, אך בתרבות הטורקית הוא גם מסמן את תחילת
