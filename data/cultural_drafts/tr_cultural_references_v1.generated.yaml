    heritage.
  i18n_explanations:
    en: A genre of Turkish folk poetry sung with the saz (a stringed instrument), traditionally performed
      by wandering minstrels (âşıks). It is a key element of Turkish oral literature and cultural heritage.
    es: Un género de poesía popular turca cantada con el saz (instrumento de cuerda), tradicionalmente
      interpretado por trovadores ambulantes (âşıks). Es un elemento clave de la literatura oral y el
      patrimonio cultural turco.
    fr: Un genre de poésie populaire turque chantée avec le saz (instrument à cordes), traditionnellement
      interprété par des ménestrels itinérants (âşıks). C'est un élément clé de la littérature orale et
      du patrimoine culturel turcs.
    de: Eine Gattung der türkischen Volksdichtung, die mit der Saz (einem Saiteninstrument) gesungen wird
      und traditionell von wandernden Barden (Âşıks) vorgetragen wird. Sie ist ein Schlüsselelement der
      türkischen mündlichen Literatur und des kulturellen Erbes.
    it: Un genere di poesia popolare turca cantata con il saz (strumento a corde), tradizionalmente eseguita
      da menestrelli erranti (âşıks). È un elemento chiave della letteratura orale e del patrimonio culturale
      turco.
    pt: Um gênero de poesia popular turca cantada com o saz (instrumento de cordas), tradicionalmente
      executado por menestréis errantes (âşıks). É um elemento-chave da literatura oral e do patrimônio
      cultural turco.
    ru: Жанр турецкой народной поэзии, исполняемой под саз (струнный инструмент), традиционно исполняемый
      странствующими менестрелями (ашыками). Это ключевой элемент турецкой устной литературы и культурного
      наследия.
    ja: サズ（弦楽器）を伴奏に歌われるトルコ民俗詩のジャンルで、伝統的に放浪の吟遊詩人（アシュク）によって演奏される。トルコの口承文学と文化遺産の重要な要素である。
    zh: 一种土耳其民间诗歌体裁，用萨兹琴（一种弦乐器）伴奏演唱，传统上由流浪吟游诗人（âşıks）表演。它是土耳其口头文学和文化遗产的关键元素。
    ar: نوع من الشعر الشعبي التركي يُغنى مع الساز (آلة وترية)، ويؤديه تقليديًا الشعراء المتجولون (العاشقون).
