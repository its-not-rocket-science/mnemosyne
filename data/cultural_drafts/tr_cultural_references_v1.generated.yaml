  i18n_explanations:
    en: Nedim (c. 1681-1730) was an Ottoman poet of the Tulip Era, known for his lively, hedonistic, and
      innovative poetry. He broke from classical conventions and celebrated love, wine, and the pleasures
      of Istanbul life.
    es: Nedim (c. 1681-1730) fue un poeta otomano de la Era de los Tulipanes, conocido por su poesía vivaz,
      hedonista e innovadora. Rompió con las convenciones clásicas y celebró el amor, el vino y los placeres
      de la vida en Estambul.
    fr: Nedim (c. 1681-1730) était un poète ottoman de l'ère des tulipes, connu pour sa poésie vive, hédoniste
      et innovante. Il a rompu avec les conventions classiques et célébré l'amour, le vin et les plaisirs
      de la vie stambouliote.
    de: Nedim (ca. 1681-1730) war ein osmanischer Dichter der Tulpenzeit, bekannt für seine lebhafte,
      hedonistische und innovative Dichtung. Er brach mit klassischen Konventionen und feierte Liebe,
      Wein und die Freuden des Istanbuler Lebens.
    it: Nedim (c. 1681-1730) fu un poeta ottomano dell'Epoca dei Tulipani, noto per la sua poesia vivace,
      edonistica e innovativa. Ruppe con le convenzioni classiche e celebrò l'amore, il vino e i piaceri
      della vita di Istanbul.
    pt: Nedim (c. 1681-1730) foi um poeta otomano da Era das Tulipas, conhecido por sua poesia viva, hedonista
      e inovadora. Ele rompeu com as convenções clássicas e celebrou o amor, o vinho e os prazeres da
      vida em Istambul.
    ru: Недим (ок. 1681-1730) — османский поэт эпохи тюльпанов, известный своей живой, гедонистической
      и новаторской поэзией. Он порвал с классическими условностями и воспевал любовь, вино и удовольствия
      стамбульской жизни.
    ja: ネディム（1681年頃-1730年）はチューリップ時代のオスマン詩人で、活気に満ちた快楽主義的で革新的な詩で知られる。古典的な慣習を打ち破り、愛、ワイン、イスタンブールの生活の喜びを称えた。
    zh: 内迪姆（约1681-1730）是郁金香时代的奥斯曼诗人，以其生动、享乐主义和创新的诗歌而闻名。他打破了古典传统，歌颂爱情、美酒和伊斯坦布尔生活的乐趣。
    ar: نديم (حوالي 1681-1730) كان شاعراً عثمانياً من عصر التوليب، معروفاً بشعره الحيوي، المتمتع، والمبتكر.
