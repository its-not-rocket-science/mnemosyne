      незаменимую связь с матерью.
    ja: 「誰かが泣くなら、それは私の母が泣くのだ。残りは偽りの涙だ」という意味のことわざで、他の人と比較した母親の愛の独特な誠実さを強調しています。母親とのかけがえのない絆を強調しています。
