  - kaz gelen yerden tavuk esirgenir mi
  short_explanation: This Turkish proverb means 'Where geese come, chickens are not spared,' implying
    that when a generous opportunity arises, one should not hold back smaller offerings. It emphasizes
    reciprocity and abundance.
  i18n_explanations:
    en: This Turkish proverb means 'Where geese come, chickens are not spared,' implying that when a generous
      opportunity arises, one should not hold back smaller offerings. It emphasizes reciprocity and abundance.
    es: Este proverbio turco significa 'Donde vienen gansos, no se escatiman pollos', implicando que cuando
      surge una oportunidad generosa, no se deben retener ofrendas menores. Enfatiza la reciprocidad y
      la abundancia.
    fr: Ce proverbe turc signifie 'Là où viennent les oies, on n'épargne pas les poulets', suggérant que
      lorsqu'une opportunité généreuse se présente, il ne faut pas retenir de petites offrandes. Il souligne
      la réciprocité et l'abondance.
    de: Dieses türkische Sprichwort bedeutet 'Wo Gänse kommen, werden Hühner nicht verschont', was besagt,
      dass man bei einer großzügigen Gelegenheit kleinere Gaben nicht zurückhalten sollte. Es betont Gegenseitigkeit
      und Überfluss.
    it: Questo proverbio turco significa 'Dove arrivano le oche, non si risparmiano i polli', implicando
      che quando si presenta un'opportunità generosa, non si dovrebbero trattenere offerte minori. Sottolinea
      reciprocità e abbondanza.
    pt: Este provérbio turco significa 'Onde vêm gansos, não se poupam galinhas', implicando que quando
      surge uma oportunidade generosa, não se deve reter ofertas menores. Enfatiza reciprocidade e abundância.
    ru: Эта турецкая пословица означает 'Где приходят гуси, там не жалеют кур', подразумевая, что когда
      появляется щедрая возможность, не следует удерживать мелкие подношения. Она подчеркивает взаимность
      и изобилие.
    ja: このトルコのことわざは「ガチョウが来るところでは、鶏は惜しまれない」という意味で、寛大な機会が訪れたときには、小さな提供物を惜しむべきではないことを示しています。互恵性と豊かさを強調しています。
    zh: 这句土耳其谚语的意思是“鹅来的地方，鸡不会被吝惜”，暗示当慷慨的机会出现时，不应保留较小的奉献。它强调互惠和丰裕。
    ar: هذا المثل التركي يعني 'حيث يأتي الإوز، لا يُبخل بالدجاج'، مما يشير إلى أنه عندما تظهر فرصة سخية،
