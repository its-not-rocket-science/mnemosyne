    ru: Эквивалент пословицы «Что посеешь, то и пожнешь», подчеркивающей, что действия имеют последствия.
      Широко используется в повседневной турецкой речи.
    ja: 「蒔いた種は自分で刈り取る」に相当することわざで、行動には結果が伴うことを強調する。トルコの日常会話で広く使われる。
    zh: 相当于“种瓜得瓜，种豆得豆”，强调行为有后果的谚语。在土耳其日常用语中广泛使用。
    ar: مكافئ لـ 'كما تزرع تحصد'، مثل يؤكد أن الأفعال لها عواقب. يُستخدم على نطاق واسع في الحديث اليومي
