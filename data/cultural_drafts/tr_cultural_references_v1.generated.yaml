    ja: ナイマ（ムスタファ・ナイマ）は、1591年から1660年までのオスマン帝国の歴史を扱った年代記『タリーフ・イ・ナイマ』で知られるオスマン帝国の歴史家です。この時代の重要な資料です。
    zh: 奈玛（穆斯塔法·奈玛）是一位奥斯曼历史学家，以其编年史《奈玛史》而闻名，该书记载了1591年至1660年的奥斯曼历史。它是该时期的关键史料。
    ar: نعيمة (مصطفى نعيمة) كان مؤرخًا عثمانيًا معروفًا بمؤلفه 'تاريخ نعيمة' الذي يغطي التاريخ العثماني
