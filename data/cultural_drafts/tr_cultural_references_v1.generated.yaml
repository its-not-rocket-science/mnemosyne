  short_explanation: The tenth and longest-reigning sultan of the Ottoman Empire (1520-1566), known as
    'the Lawgiver' for his legal reforms and 'the Magnificent' for his military campaigns and cultural
    patronage.
  i18n_explanations:
    en: The tenth and longest-reigning sultan of the Ottoman Empire (1520-1566), known as 'the Lawgiver'
      for his legal reforms and 'the Magnificent' for his military campaigns and cultural patronage.
    es: El décimo sultán del Imperio Otomano y el de reinado más largo (1520-1566), conocido como 'el
      Legislador' por sus reformas legales y 'el Magnífico' por sus campañas militares y mecenazgo cultural.
    fr: Le dixième sultan de l'Empire ottoman et celui qui a régné le plus longtemps (1520-1566), connu
      comme 'le Législateur' pour ses réformes juridiques et 'le Magnifique' pour ses campagnes militaires
      et son mécénat culturel.
    de: Der zehnte und am längsten regierende Sultan des Osmanischen Reiches (1520-1566), bekannt als
      'der Gesetzgeber' für seine Rechtsreformen und 'der Prächtige' für seine Feldzüge und kulturelle
      Förderung.
    it: Il decimo sultano dell'Impero Ottomano e quello con il regno più lungo (1520-1566), noto come
      'il Legislatore' per le sue riforme legali e 'il Magnifico' per le sue campagne militari e il mecenatismo
      culturale.
    pt: O décimo sultão do Império Otomano e o que reinou por mais tempo (1520-1566), conhecido como 'o
      Legislador' por suas reformas legais e 'o Magnífico' por suas campanhas militares e patrocínio cultural.
    ru: Десятый и самый долгоправящий султан Османской империи (1520-1566), известный как 'Законодатель'
      за свои правовые реформы и 'Великолепный' за военные кампании и покровительство культуре.
    ja: オスマン帝国の第10代スルタンで最も長く統治した（1520-1566）。法改正により「立法者」、軍事作戦と文化支援により「壮麗王」として知られる。
    zh: 奥斯曼帝国第十位苏丹，在位时间最长（1520-1566），因其法律改革而被称为“立法者”，因其军事行动和文化赞助而被称为“大帝”。
    ar: السلطان العاشر والأطول حكماً في الدولة العثمانية (1520-1566)، المعروف بـ 'المشرع' لإصلاحاته القانونية
      و'العظيم' لحملاته العسكرية ورعايته الثقافية.
    he: הסולטן העשירי והארוך ביותר בשלטון של האימפריה העות'מאנית (1520-1566), ידוע כ'המחוקק' בשל רפורמות
