    be cautious and pretend to be friendly with a dangerous person until the danger is past.
  i18n_explanations:
    en: Equivalent to 'call the bear uncle until you cross the bridge'. Means one should be cautious and
      pretend to be friendly with a dangerous person until the danger is past.
    es: Equivalente a 'llama al oso tío hasta que cruces el puente'. Significa que uno debe ser cauteloso
      y fingir ser amigable con una persona peligrosa hasta que pase el peligro.
    fr: Équivalent de 'appelle l'ours oncle jusqu'à ce que tu traverses le pont'. Signifie qu'il faut
      être prudent et faire semblant d'être amical avec une personne dangereuse jusqu'à ce que le danger
      soit passé.
    de: Entspricht 'nenn den Bären Onkel, bis du die Brücke überquerst'. Bedeutet, dass man vorsichtig
      sein und so tun sollte, als sei man freundlich zu einer gefährlichen Person, bis die Gefahr vorüber
      ist.
    it: Equivalente a 'chiama l'orso zio finché non attraversi il ponte'. Significa che si deve essere
      cauti e fingere di essere amichevoli con una persona pericolosa finché il pericolo non è passato.
    pt: Equivalente a 'chame o urso de tio até atravessar a ponte'. Significa que se deve ser cauteloso
      e fingir ser amigável com uma pessoa perigosa até que o perigo passe.
    ru: Эквивалентно 'называй медведя дядей, пока не перейдешь мост'. Означает, что нужно быть осторожным
      и притворяться дружелюбным с опасным человеком, пока опасность не минует.
    ja: 「橋を渡るまでは熊をおじさんと呼べ」に相当。危険が過ぎ去るまで、危険な人物に友好的に振る舞い、用心深くあるべきという意味。
    zh: 相当于“过桥之前叫熊叔叔”。意思是应该谨慎，在危险过去之前假装对危险人物友好。
    ar: يعادل 'نادِ الدب عمًا حتى تعبر الجسر'. يعني أنه يجب على المرء أن يكون حذرًا ويتظاهر بالود مع شخص
      خطير حتى يزول الخطر.
    he: מקביל ל'קרא לדוב דוד עד שתחצה את הגשר'. פירושו שיש להיזהר ולהעמיד פנים ידידותיים כלפי אדם מסוכן
