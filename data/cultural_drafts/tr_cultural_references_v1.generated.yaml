  short_explanation: A Turkish proverb meaning 'It came this way, it goes this way,' used to express resignation
    to the status quo or the idea that things have always been and will continue to be a certain way.
    It reflects a fatalistic acceptance of tradition or circumstances.
  i18n_explanations:
    en: A Turkish proverb meaning 'It came this way, it goes this way,' used to express resignation to
      the status quo or the idea that things have always been and will continue to be a certain way. It
      reflects a fatalistic acceptance of tradition or circumstances.
    es: Proverbio turco que significa 'Así llegó, así se va', usado para expresar resignación al statu
      quo o la idea de que las cosas siempre han sido y seguirán siendo de cierta manera. Refleja una
      aceptación fatalista de la tradición o las circunstancias.
    fr: Proverbe turc signifiant 'C'est venu ainsi, ça s'en va ainsi', utilisé pour exprimer la résignation
      au statu quo ou l'idée que les choses ont toujours été et continueront d'être d'une certaine manière.
      Il reflète une acceptation fataliste de la tradition ou des circonstances.
    de: Ein türkisches Sprichwort, das bedeutet 'So ist es gekommen, so geht es', verwendet, um Resignation
      gegenüber dem Status quo oder die Vorstellung auszudrücken, dass die Dinge schon immer so waren
      und so bleiben werden. Es spiegelt eine fatalistische Akzeptanz von Tradition oder Umständen wider.
    it: Proverbio turco che significa 'Così è venuto, così se ne va', usato per esprimere rassegnazione
      allo status quo o l'idea che le cose sono sempre state e continueranno ad essere in un certo modo.
      Riflette un'accettazione fatalistica della tradizione o delle circostanze.
    pt: Provérbio turco que significa 'Assim veio, assim vai', usado para expressar resignação ao status
      quo ou a ideia de que as coisas sempre foram e continuarão a ser de uma certa maneira. Reflete uma
      aceitação fatalista da tradição ou das circunstâncias.
    ru: Турецкая пословица, означающая 'Так пришло, так и уходит', используется для выражения смирения
      со статус-кво или идеи, что вещи всегда были и будут определенным образом. Отражает фаталистическое
      принятие традиции или обстоятельств.
    ja: 「こうして来た、こうして去る」という意味のトルコのことわざで、現状への諦めや、物事は常にそうであり続けるという考えを表す。伝統や状況に対する運命論的な受容を反映する。
    zh: 土耳其谚语，意为“这样来，这样去”，用于表达对现状的顺从或认为事情一直如此并将继续如此的想法。反映了对传统或环境的宿命论接受。
    ar: مثل تركي يعني 'هكذا جاء، هكذا يذهب'، يستخدم للتعبير عن الاستسلام للوضع الراهن أو فكرة أن الأمور
