  - şeytan işi yok insan işi çok
  short_explanation: This Turkish proverb means 'There is no devil's work, but plenty of human work',
    implying that human mischief is more common than demonic influence. It reflects a cultural tendency
    to attribute wrongdoing to human nature.
  i18n_explanations:
    en: This Turkish proverb means 'There is no devil's work, but plenty of human work', implying that
      human mischief is more common than demonic influence. It reflects a cultural tendency to attribute
      wrongdoing to human nature.
    es: Este proverbio turco significa 'No hay trabajo del diablo, pero mucho trabajo humano', implicando
      que las travesuras humanas son más comunes que la influencia demoníaca. Refleja una tendencia cultural
      a atribuir las malas acciones a la naturaleza humana.
    fr: Ce proverbe turc signifie 'Il n'y a pas d'œuvre du diable, mais beaucoup d'œuvre humaine', impliquant
      que les méfaits humains sont plus courants que l'influence démoniaque. Il reflète une tendance culturelle
      à attribuer les méfaits à la nature humaine.
    de: Dieses türkische Sprichwort bedeutet 'Es gibt keine Teufelsarbeit, aber viel menschliche Arbeit',
      was impliziert, dass menschlicher Unfug häufiger ist als dämonischer Einfluss. Es spiegelt eine
      kulturelle Tendenz wider, Fehlverhalten der menschlichen Natur zuzuschreiben.
    it: Questo proverbio turco significa 'Non c'è opera del diavolo, ma molta opera umana', implicando
      che i misfatti umani sono più comuni dell'influenza demoniaca. Riflette una tendenza culturale ad
      attribuire il comportamento scorretto alla natura umana.
    pt: Este provérbio turco significa 'Não há trabalho do diabo, mas muito trabalho humano', implicando
      que as travessuras humanas são mais comuns do que a influência demoníaca. Reflete uma tendência
      cultural de atribuir erros à natureza humana.
    ru: Эта турецкая пословица означает 'Нет дьявольской работы, но много человеческой', подразумевая,
      что человеческие шалости более распространены, чем демоническое влияние. Она отражает культурную
      тенденцию приписывать проступки человеческой природе.
    ja: このトルコのことわざは「悪魔の仕事はなく、人間の仕事は多い」という意味で、人間の悪戯は悪魔の影響よりも一般的であることを示唆しています。不正を人間の本性に帰する文化的傾向を反映しています。
    zh: 这句土耳其谚语意为‘没有魔鬼的工作，但有很多人的工作’，暗示人类的恶作剧比恶魔的影响更常见。它反映了将错误归因于人性的文化倾向。
    ar: هذا المثل التركي يعني 'لا عمل للشيطان، بل عمل الإنسان كثير'، مما يعني أن الأذى البشري أكثر شيوعاً
      من التأثير الشيطاني. يعكس ميلاً ثقافياً لنسب الأخطاء إلى الطبيعة البشرية.
    he: הפתגם הטורקי הזה פירושו 'אין עבודת שטן, אבל הרבה עבודת אדם', ומרמז ששובבות אנושית נפוצה יותר מהשפעה
