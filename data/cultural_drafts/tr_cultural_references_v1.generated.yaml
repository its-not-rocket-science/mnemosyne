- id: tr_cultural_reference_nizam_ı_cedid_e127d772
  language: tr
  canonical_reference: Nizam-ı Cedid
  reference_type: cultural_reference
  surface_patterns:
  - Nizam-ı Cedid
  - Nizam-ı Cedid ordusu
  - Nizam-ı Cedid reformları
  short_explanation: Nizam-ı Cedid (New Order) was a series of military and administrative reforms introduced
    by Ottoman Sultan Selim III in the late 18th century, aiming to modernize the empire. It included
    a new European-style army.
  i18n_explanations:
    en: Nizam-ı Cedid (New Order) was a series of military and administrative reforms introduced by Ottoman
      Sultan Selim III in the late 18th century, aiming to modernize the empire. It included a new European-style
      army.
    es: Nizam-ı Cedid (Nuevo Orden) fue una serie de reformas militares y administrativas introducidas
      por el sultán otomano Selim III a finales del siglo XVIII, con el objetivo de modernizar el imperio.
      Incluía un nuevo ejército de estilo europeo.
    fr: Nizam-ı Cedid (Nouvel Ordre) était une série de réformes militaires et administratives introduites
      par le sultan ottoman Selim III à la fin du XVIIIe siècle, visant à moderniser l'empire. Il comprenait
      une nouvelle armée de style européen.
    de: Nizam-ı Cedid (Neue Ordnung) war eine Reihe von militärischen und administrativen Reformen, die
      von Sultan Selim III. im späten 18. Jahrhundert eingeführt wurden, um das Reich zu modernisieren.
      Es beinhaltete eine neue Armee nach europäischem Vorbild.
    it: Nizam-ı Cedid (Nuovo Ordine) fu una serie di riforme militari e amministrative introdotte dal
      sultano ottomano Selim III alla fine del XVIII secolo, con l'obiettivo di modernizzare l'impero.
      Includeva un nuovo esercito di stampo europeo.
    pt: Nizam-ı Cedid (Nova Ordem) foi uma série de reformas militares e administrativas introduzidas
      pelo sultão otomano Selim III no final do século XVIII, visando modernizar o império. Incluía um
      novo exército de estilo europeu.
    ru: Низам-и Джедид (Новый порядок) представлял собой серию военных и административных реформ, введённых
      османским султаном Селимом III в конце XVIII века с целью модернизации империи. Он включал новую
      армию европейского образца.
    ja: ニザーム・イ・ジェディード（新秩序）は、18世紀後半にオスマン帝国のスルタン、セリム3世によって導入された一連の軍事・行政改革であり、帝国の近代化を目指しました。これにはヨーロッパ式の新しい軍隊が含まれていました。
    zh: 尼扎姆·杰迪德（新秩序）是奥斯曼苏丹塞利姆三世在18世纪末推行的一系列军事和行政改革，旨在实现帝国现代化。其中包括一支新的欧式军队。
    ar: النظام الجديد (نظام جديد) كان سلسلة من الإصلاحات العسكرية والإدارية التي أدخلها السلطان العثماني
      سليم الثالث في أواخر القرن الثامن عشر بهدف تحديث الإمبراطورية. تضمن جيشًا جديدًا على الطراز الأوروبي.
    he: ניזאם-י ג'דיד (סדר חדש) הייתה סדרה של רפורמות צבאיות ומנהליות שהונהגו על ידי הסולטן העות'מאני
      סלים השלישי בסוף המאה ה-18, במטרה למודרניזציה של האימפריה. היא כללה צבא חדש בסגנון אירופי.
