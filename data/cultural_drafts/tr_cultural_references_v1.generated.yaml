  short_explanation: A Turkish proverb meaning 'a thousand people are sacrificed for one person,' used
    to express extreme devotion or willingness to sacrifice many for the sake of a single valued individual.
    It reflects hierarchical social values and loyalty.
  i18n_explanations:
    en: A Turkish proverb meaning 'a thousand people are sacrificed for one person,' used to express extreme
      devotion or willingness to sacrifice many for the sake of a single valued individual. It reflects
      hierarchical social values and loyalty.
    es: Proverbio turco que significa 'mil personas son sacrificadas por una persona', usado para expresar
      devoción extrema o disposición a sacrificar a muchos por un solo individuo valorado. Refleja valores
      sociales jerárquicos y lealtad.
    fr: Proverbe turc signifiant 'mille personnes sont sacrifiées pour une personne', utilisé pour exprimer
      une dévotion extrême ou la volonté de sacrifier beaucoup pour un seul individu valorisé. Il reflète
      des valeurs sociales hiérarchiques et la loyauté.
    de: Ein türkisches Sprichwort, das bedeutet 'tausend Menschen werden für eine Person geopfert', verwendet,
      um extreme Hingabe oder die Bereitschaft auszudrücken, viele für einen einzigen geschätzten Menschen
      zu opfern. Es spiegelt hierarchische soziale Werte und Loyalität wider.
    it: Proverbio turco che significa 'mille persone sono sacrificate per una persona', usato per esprimere
      devozione estrema o disponibilità a sacrificare molti per un singolo individuo apprezzato. Riflette
      valori sociali gerarchici e lealtà.
    pt: Provérbio turco que significa 'mil pessoas são sacrificadas por uma pessoa', usado para expressar
      devoção extrema ou disposição para sacrificar muitos por um único indivíduo valorizado. Reflete
      valores sociais hierárquicos e lealdade.
    ru: Турецкая пословица, означающая 'тысяча людей приносятся в жертву ради одного человека', используется
      для выражения крайней преданности или готовности пожертвовать многими ради одного ценного человека.
      Отражает иерархические социальные ценности и верность.
    ja: 「一人のために千人を犠牲にする」という意味のトルコのことわざで、極度の献身や一人の大切な人のために多くを犠牲にする意志を表す。階層的な社会的価値観と忠誠心を反映する。
    zh: 土耳其谚语，意为“一千人为一人牺牲”，用于表达极端的奉献精神或愿意为单个有价值的人牺牲许多人。反映了等级社会价值观和忠诚。
    ar: مثل تركي يعني 'يتم التضحية بألف شخص من أجل شخص واحد'، يستخدم للتعبير عن التفاني الشديد أو الاستعداد
