- id: tr_proverb_tradition_mart_kapıdan_baktırır_kazma_kürek_yaktırır_fdec5a52
  language: tr
  canonical_reference: Mart kapıdan baktırır, kazma kürek yaktırır
  reference_type: proverb_tradition
  surface_patterns:
  - mart kapıdan baktırır kazma kürek yaktırır
  - mart kapıdan baktırır
  short_explanation: 'This Turkish proverb describes the unpredictable weather of March: it first invites
    you out (mild weather) but then forces you to burn your tools for warmth (cold returns). It warns
    against being deceived by early spring warmth.'
  i18n_explanations:
    en: 'This Turkish proverb describes the unpredictable weather of March: it first invites you out (mild
      weather) but then forces you to burn your tools for warmth (cold returns). It warns against being
      deceived by early spring warmth.'
    es: 'Este proverbio turco describe el clima impredecible de marzo: primero te invita a salir (clima
      templado) pero luego te obliga a quemar tus herramientas para calentarte (el frío regresa). Advierte
      contra dejarse engañar por el calor temprano de la primavera.'
    fr: 'Ce proverbe turc décrit le temps imprévisible de mars : il vous invite d''abord à sortir (temps
      doux) mais vous oblige ensuite à brûler vos outils pour vous réchauffer (le froid revient). Il met
      en garde contre le fait de se laisser tromper par la chaleur précoce du printemps.'
    de: 'Dieses türkische Sprichwort beschreibt das unberechenbare Wetter im März: Zuerst lädt es einen
      ein, nach draußen zu gehen (mildes Wetter), aber dann zwingt es einen, seine Werkzeuge zu verbrennen,
      um sich zu wärmen (Kälte kehrt zurück). Es warnt davor, sich von der frühen Frühlingswärme täuschen
      zu lassen.'
    it: 'Questo proverbio turco descrive il tempo imprevedibile di marzo: prima ti invita a uscire (clima
      mite) ma poi ti costringe a bruciare i tuoi attrezzi per riscaldarti (il freddo ritorna). Avverte
      di non lasciarsi ingannare dal calore primaverile precoce.'
    pt: 'Este provérbio turco descreve o clima imprevisível de março: primeiro convida você a sair (clima
      ameno), mas depois força você a queimar suas ferramentas para se aquecer (o frio retorna). Adverte
      contra ser enganado pelo calor do início da primavera.'
    ru: 'Эта турецкая пословица описывает непредсказуемую погоду марта: сначала она приглашает вас выйти
      (мягкая погода), но затем заставляет сжигать инструменты для тепла (холод возвращается). Она предупреждает,
      чтобы не обманываться ранним весенним теплом.'
    ja: このトルコのことわざは、3月の予測不可能な天気を表しています。最初は外出を誘いますが（穏やかな天気）、その後、暖を取るために道具を燃やさざるを得なくなります（寒さが戻る）。早春の暖かさに惑わされないように警告しています。
    zh: 这句土耳其谚语描述了三月变幻莫测的天气：它先邀请你出门（天气温和），但随后迫使你烧掉工具取暖（寒冷回归）。它警告不要被早春的温暖所欺骗。
    ar: 'يصف هذا المثل التركي طقس مارس غير المتوقع: أولاً يدعوك للخروج (طقس معتدل) لكنه بعد ذلك يجبرك
      على حرق أدواتك للتدفئة (يعود البرد). إنه يحذر من الانخداع بدفء أوائل الربيع.'
    he: 'פתגם טורקי זה מתאר את מזג האוויר הבלתי צפוי של מרץ: תחילה הוא מזמין אותך לצאת (מזג אוויר מתון)
      אך לאחר מכן מאלץ אותך לשרוף את הכלים שלך כדי להתחמם (הקור חוזר). הוא מזהיר מפני הונאה על ידי חום
      האביב המוקדם.'
  learner_level: B1
