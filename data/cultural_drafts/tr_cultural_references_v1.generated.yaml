    success or satisfaction comes to those who are patient and persevere.
  i18n_explanations:
    en: Turkish equivalent of 'He who laughs last laughs best'; emphasizes that ultimate success or satisfaction
      comes to those who are patient and persevere.
    es: Equivalente turco de 'El que ríe último ríe mejor'; enfatiza que el éxito o la satisfacción final
      llega a quienes son pacientes y perseveran.
    fr: Équivalent turc de 'Rira bien qui rira le dernier' ; souligne que le succès ou la satisfaction
      ultime revient à ceux qui sont patients et persévèrent.
    de: Türkisches Äquivalent von 'Wer zuletzt lacht, lacht am besten'; betont, dass letztendlicher Erfolg
      oder Zufriedenheit denen zuteilwird, die geduldig sind und durchhalten.
    it: Equivalente turco di 'Ride bene chi ride ultimo'; sottolinea che il successo o la soddisfazione
      finale arriva a chi è paziente e persevera.
    pt: Equivalente turco de 'Quem ri por último ri melhor'; enfatiza que o sucesso ou a satisfação final
      vem para aqueles que são pacientes e perseveram.
    ru: Турецкий эквивалент пословицы «Хорошо смеётся тот, кто смеётся последним»; подчёркивает, что окончательный
      успех или удовлетворение приходит к тем, кто терпелив и настойчив.
    ja: 「最後に笑う者が最もよく笑う」のトルコ語版。忍耐強く粘り強い者に最終的な成功や満足がもたらされることを強調する。
    zh: 土耳其语中相当于“笑到最后的人笑得最好”；强调最终的胜利或满足属于那些有耐心和坚持不懈的人。
    ar: المكافئ التركي لمثل 'من يضحك أخيراً يضحك أفضل'؛ يؤكد أن النجاح أو الرضا النهائي يأتي لمن يتحلى
      بالصبر والمثابرة.
    he: המקבילה הטורקית ל'מי שצוחק אחרון צוחק הכי טוב'; מדגישה שההצלחה או הסיפוק הסופי מגיעים למי שסבלני
