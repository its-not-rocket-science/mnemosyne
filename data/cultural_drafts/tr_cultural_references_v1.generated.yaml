  - taşıma suyla değirmen dönmez
  short_explanation: Literally 'A mill does not turn with carried water', this proverb means that makeshift
    solutions won't sustain a process. It is used to criticize unsustainable or inefficient methods.
  i18n_explanations:
    en: Literally 'A mill does not turn with carried water', this proverb means that makeshift solutions
      won't sustain a process. It is used to criticize unsustainable or inefficient methods.
    es: Literalmente 'Un molino no gira con agua transportada', este proverbio significa que las soluciones
      improvisadas no sostienen un proceso. Se usa para criticar métodos insostenibles o ineficientes.
    fr: Littéralement 'Un moulin ne tourne pas avec de l'eau transportée', ce proverbe signifie que les
      solutions de fortune ne soutiennent pas un processus. Il est utilisé pour critiquer les méthodes
      non durables ou inefficaces.
    de: Wörtlich 'Eine Mühle dreht sich nicht mit getragenem Wasser'. Dieses Sprichwort bedeutet, dass
      provisorische Lösungen einen Prozess nicht aufrechterhalten können. Es wird verwendet, um nicht
      nachhaltige oder ineffiziente Methoden zu kritisieren.
    it: Letteralmente 'Un mulino non gira con acqua trasportata', questo proverbio significa che le soluzioni
      improvvisate non sostengono un processo. Viene usato per criticare metodi insostenibili o inefficienti.
    pt: Literalmente 'Um moinho não gira com água transportada', este provérbio significa que soluções
      improvisadas não sustentam um processo. É usado para criticar métodos insustentáveis ou ineficientes.
    ru: Буквально 'Мельница не вертится на принесённой воде'. Эта пословица означает, что временные решения
      не поддерживают процесс. Используется для критики неустойчивых или неэффективных методов.
    ja: 文字通り「運ばれた水では水車は回らない」という意味で、間に合わせの解決策ではプロセスを持続できないことを示します。持続不可能または非効率な方法を批判するために使われます。
    zh: 字面意思是‘运来的水不能转动磨坊’，这句谚语意味着临时解决方案无法维持一个过程。用于批评不可持续或低效的方法。
    ar: حرفياً 'الطاحونة لا تدور بالماء المنقول'، يعني هذا المثل أن الحلول المؤقتة لا تدعم العملية. يستخدم
