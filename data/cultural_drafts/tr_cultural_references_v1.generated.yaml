    en: A Turkish proverb meaning 'Habits don't leave until life leaves,' indicating that deeply ingrained
      habits are very hard to change, often persisting until death.
    es: Proverbio turco que significa 'Los hábitos no se van hasta que la vida se va', indicando que los
      hábitos profundamente arraigados son muy difíciles de cambiar, a menudo persistiendo hasta la muerte.
    fr: Proverbe turc signifiant 'Les habitudes ne partent pas tant que la vie ne part pas', indiquant
      que les habitudes profondément enracinées sont très difficiles à changer, persistant souvent jusqu'à
      la mort.
    de: Ein türkisches Sprichwort, das bedeutet 'Gewohnheiten verlassen einen nicht, bis das Leben verlässt',
      und darauf hinweist, dass tief verwurzelte Gewohnheiten sehr schwer zu ändern sind und oft bis zum
      Tod bestehen bleiben.
    it: Proverbio turco che significa 'Le abitudini non se ne vanno finché la vita non se ne va', indicando
      che le abitudini profondamente radicate sono molto difficili da cambiare, spesso persistendo fino
      alla morte.
    pt: Provérbio turco que significa 'Os hábitos não vão embora até que a vida vá embora', indicando
      que hábitos profundamente enraizados são muito difíceis de mudar, muitas vezes persistindo até a
      morte.
    ru: Турецкая пословица, означающая 'Привычки не уходят, пока не уйдет жизнь', указывающая на то, что
      глубоко укоренившиеся привычки очень трудно изменить, они часто сохраняются до смерти.
    ja: 「習慣は命が去るまで去らない」という意味のトルコのことわざで、深く根付いた習慣は非常に変えにくく、しばしば死ぬまで続くことを示しています。
    zh: 土耳其谚语，意为'习惯直到生命离去才会离开'，表明根深蒂固的习惯很难改变，常常持续到死亡。
    ar: مثل تركي يعني 'العادات لا تترك حتى تترك الحياة'، مشيرًا إلى أن العادات الراسخة يصعب تغييرها جدًا،
