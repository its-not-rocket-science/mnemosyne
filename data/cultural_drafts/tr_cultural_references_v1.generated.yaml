- id: tr_proverb_tradition_bir_fincan_kahvenin_kırk_yıl_hatırı_vardır_cc0135f5
  language: tr
  canonical_reference: Bir fincan kahvenin kırk yıl hatırı vardır
  reference_type: proverb_tradition
  surface_patterns:
  - bir fincan kahvenin kırk yıl hatırı vardır
  - kahvenin kırk yıl hatırı
  - fincan kahvenin hatırı
  short_explanation: A Turkish proverb meaning that a small kindness, like offering a cup of coffee, creates
    a lasting debt of gratitude that should be remembered for forty years. It emphasizes the importance
    of hospitality and reciprocity in Turkish culture.
  i18n_explanations:
    en: A Turkish proverb meaning that a small kindness, like offering a cup of coffee, creates a lasting
      debt of gratitude that should be remembered for forty years. It emphasizes the importance of hospitality
      and reciprocity in Turkish culture.
    es: Proverbio turco que significa que un pequeño favor, como ofrecer una taza de café, crea una deuda
      de gratitud duradera que debe recordarse durante cuarenta años. Enfatiza la importancia de la hospitalidad
      y la reciprocidad en la cultura turca.
    fr: Proverbe turc signifiant qu'une petite gentillesse, comme offrir une tasse de café, crée une dette
      de gratitude durable qui doit être rappelée pendant quarante ans. Il souligne l'importance de l'hospitalité
      et de la réciprocité dans la culture turque.
    de: Ein türkisches Sprichwort, das besagt, dass eine kleine Freundlichkeit, wie das Anbieten einer
      Tasse Kaffee, eine dauerhafte Dankesschuld schafft, die vierzig Jahre lang in Erinnerung bleiben
      sollte. Es betont die Bedeutung von Gastfreundschaft und Gegenseitigkeit in der türkischen Kultur.
    it: Proverbio turco che significa che una piccola gentilezza, come offrire una tazza di caffè, crea
      un debito di gratitudine duraturo che dovrebbe essere ricordato per quarant'anni. Sottolinea l'importanza
      dell'ospitalità e della reciprocità nella cultura turca.
    pt: Provérbio turco que significa que uma pequena gentileza, como oferecer uma xícara de café, cria
      uma dívida duradoura de gratidão que deve ser lembrada por quarenta anos. Enfatiza a importância
      da hospitalidade e reciprocidade na cultura turca.
    ru: Турецкая пословица, означающая, что маленькая доброта, например, предложение чашки кофе, создает
      долг благодарности, который следует помнить сорок лет. Подчеркивает важность гостеприимства и взаимности
      в турецкой культуре.
    ja: 一杯のコーヒーを提供するような小さな親切が40年間記憶されるべき感謝の負債を生むというトルコのことわざ。トルコ文化におけるもてなしと互恵性の重要性を強調する。
    zh: 土耳其谚语，意为像提供一杯咖啡这样的小善举会创造一种持久的感恩之情，应铭记四十年。强调土耳其文化中好客和互惠的重要性。
    ar: مثل تركي يعني أن اللطف الصغير، مثل تقديم فنجان قهوة، يخلق دينًا دائمًا من الامتنان يجب تذكره لمدة
      أربعين عامًا. يؤكد على أهمية الضيافة والمعاملة بالمثل في الثقافة التركية.
    he: פתגם טורקי שמשמעותו שמעשה חסד קטן, כמו הצעת כוס קפה, יוצר חוב תודה מתמשך שיש לזכור במשך ארבעים
      שנה. הוא מדגיש את חשיבות האירוח וההדדיות בתרבות הטורקית.
