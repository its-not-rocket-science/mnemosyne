  short_explanation: A Turkish proverb meaning 'A friend looks at the head, an enemy at the feet.' It
    implies that a true friend cares about your honor and well-being, while an enemy looks for your flaws.
  i18n_explanations:
    en: A Turkish proverb meaning 'A friend looks at the head, an enemy at the feet.' It implies that
      a true friend cares about your honor and well-being, while an enemy looks for your flaws.
    es: Proverbio turco que significa 'Un amigo mira la cabeza, un enemigo los pies.' Implica que un verdadero
      amigo se preocupa por tu honor y bienestar, mientras que un enemigo busca tus defectos.
    fr: Proverbe turc signifiant 'Un ami regarde la tête, un ennemi les pieds.' Il implique qu'un véritable
      ami se soucie de votre honneur et de votre bien-être, tandis qu'un ennemi cherche vos défauts.
    de: Ein türkisches Sprichwort, das bedeutet 'Ein Freund schaut auf den Kopf, ein Feind auf die Füße.'
      Es impliziert, dass ein wahrer Freund sich um deine Ehre und dein Wohlbefinden kümmert, während
      ein Feind nach deinen Fehlern sucht.
    it: Proverbio turco che significa 'Un amico guarda la testa, un nemico i piedi.' Implica che un vero
      amico si preoccupa del tuo onore e benessere, mentre un nemico cerca i tuoi difetti.
    pt: Provérbio turco que significa 'Um amigo olha para a cabeça, um inimigo para os pés.' Implica que
      um verdadeiro amigo se preocupa com sua honra e bem-estar, enquanto um inimigo procura seus defeitos.
    ru: Турецкая пословица, означающая 'Друг смотрит на голову, враг — на ноги.' Она подразумевает, что
      настоящий друг заботится о вашей чести и благополучии, а враг ищет ваши недостатки.
    ja: 「友は頭を見、敵は足を見る」という意味のトルコのことわざ。真の友人はあなたの名誉と幸福を気にかけるが、敵はあなたの欠点を探すことを示唆する。
    zh: 土耳其谚语，意为“朋友看头，敌人看脚”。它暗示真正的朋友关心你的荣誉和福祉，而敌人则寻找你的缺点。
    ar: مثل تركي يعني 'الصديق ينظر إلى الرأس، والعدو إلى القدمين.' يشير إلى أن الصديق الحقيقي يهتم بشرفك
      ورفاهيتك، بينما يبحث العدو عن عيوبك.
