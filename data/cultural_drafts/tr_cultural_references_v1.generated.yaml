  short_explanation: A Turkish proverb meaning 'Keep the straw, its time will come.' It advises to save
    even seemingly worthless things as they may become useful later.
  i18n_explanations:
    en: A Turkish proverb meaning 'Keep the straw, its time will come.' It advises to save even seemingly
      worthless things as they may become useful later.
    es: Proverbio turco que significa 'Guarda la paja, llegará su momento'. Aconseja guardar incluso cosas
      aparentemente inútiles, ya que pueden ser útiles más tarde.
    fr: Proverbe turc signifiant 'Garde la paille, son temps viendra'. Il conseille de conserver même
      les choses apparemment sans valeur car elles peuvent devenir utiles plus tard.
    de: Ein türkisches Sprichwort, das bedeutet 'Heb das Stroh auf, seine Zeit wird kommen'. Es rät, selbst
      scheinbar wertlose Dinge aufzubewahren, da sie später nützlich werden können.
    it: Proverbio turco che significa 'Conserva la paglia, arriverà il suo momento'. Consiglia di conservare
      anche cose apparentemente inutili perché potrebbero diventare utili in seguito.
    pt: Provérbio turco que significa 'Guarde a palha, chegará o seu tempo'. Aconselha a guardar até coisas
      aparentemente inúteis, pois podem se tornar úteis mais tarde.
    ru: Турецкая пословица, означающая «Храни солому, придёт её время». Она советует сохранять даже, казалось
      бы, бесполезные вещи, так как они могут пригодиться позже.
    ja: トルコのことわざで、「わらをしまっておけ、その時が来る」という意味。一見無価値なものでも後で役立つかもしれないので取っておくよう助言する。
    zh: 土耳其谚语，意为“保存稻草，它的时机终会到来”。建议即使看似无用的东西也要保存，因为它们以后可能会变得有用。
    ar: مثل تركي يعني 'احفظ التبن، سيأتي وقته'. ينصح بحفظ حتى الأشياء التي تبدو عديمة القيمة لأنها قد
      تصبح مفيدة لاحقاً.
    he: פתגם טורקי שפירושו 'שמור את התבן, יבוא זמנו'. הוא מייעץ לשמור אפילו דברים שנראים חסרי ערך כי הם
