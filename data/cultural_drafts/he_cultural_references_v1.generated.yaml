    of the Temple.
  i18n_explanations:
    en: The Hasmonean period (140–37 BCE), when the Maccabees established an independent Jewish kingdom
      after revolting against the Seleucid Empire. Celebrated during Hanukkah for the rededication of
      the Temple.
    es: El período asmoneo (140–37 a.C.), cuando los macabeos establecieron un reino judío independiente
      tras rebelarse contra el Imperio seléucida. Se celebra durante Janucá por la rededicación del Templo.
    fr: La période hasmonéenne (140–37 av. J.-C.), durant laquelle les Maccabées établirent un royaume
      juif indépendant après s'être révolté contre l'Empire séleucide. Célébrée pendant Hanouka pour la
      dédicace du Temple.
    de: Die hasmonäische Zeit (140–37 v. Chr.), in der die Makkabäer nach ihrem Aufstand gegen das Seleukidenreich
      ein unabhängiges jüdisches Königreich gründeten. Wird während Chanukka für die Wiedereinweihung
      des Tempels gefeiert.
    it: Il periodo asmoneo (140–37 a.C.), quando i Maccabei stabilirono un regno ebraico indipendente
      dopo la rivolta contro l'Impero seleucide. Celebrato durante Hanukkah per la riconsacrazione del
      Tempio.
    pt: O período hasmoneu (140–37 a.C.), quando os macabeus estabeleceram um reino judeu independente
      após se rebelarem contra o Império Selêucida. Celebrado durante Hanukkah pela rededicação do Templo.
    ru: Хасмонейский период (140–37 гг. до н.э.), когда Маккавеи основали независимое еврейское царство
      после восстания против империи Селевкидов. Празднуется во время Хануки в честь освящения Храма.
    ja: ハスモン朝時代（紀元前140–37年）、マカバイがセレウコス朝に反抗して独立ユダヤ王国を樹立した時代。ハンヌカーで神殿の再奉献が祝われる。
