    struggles within the Zionist movement in the early 20th century.
  i18n_explanations:
    en: Refers to the political leadership during the tenure of Ze'ev Jabotinsky, a key figure in the
      Zionist movement and founder of Revisionist Zionism. It symbolizes the ideological and political
      struggles within the Zionist movement in the early 20th century.
    es: Se refiere al liderazgo político durante el mandato de Ze'ev Jabotinsky, figura clave del movimiento
      sionista y fundador del sionismo revisionista. Simboliza las luchas ideológicas y políticas dentro
      del movimiento sionista a principios del siglo XX.
    fr: Fait référence à la direction politique durant le mandat de Ze'ev Jabotinsky, figure majeure du
      mouvement sioniste et fondateur du sionisme révisionniste. Il symbolise les luttes idéologiques
      et politiques au sein du mouvement sioniste au début du XXe siècle.
    de: Bezieht sich auf die politische Führung während der Amtszeit von Ze'ev Jabotinsky, einer Schlüsselfigur
      der zionistischen Bewegung und Gründer des revisionistischen Zionismus. Es symbolisiert die ideologischen
      und politischen Auseinandersetzungen innerhalb der zionistischen Bewegung im frühen 20. Jahrhundert.
    it: Si riferisce alla leadership politica durante il mandato di Ze'ev Jabotinsky, figura chiave del
      movimento sionista e fondatore del sionismo revisionista. Simboleggia le lotte ideologiche e politiche
      all'interno del movimento sionista nei primi del Novecento.
    pt: Refere-se à liderança política durante o mandato de Ze'ev Jabotinsky, figura-chave do movimento
      sionista e fundador do sionismo revisionista. Simboliza as lutas ideológicas e políticas dentro
      do movimento sionista no início do século XX.
    ru: Относится к политическому лидерству во время пребывания в должности Зеэва Жаботинского, ключевой
      фигуры сионистского движения и основателя ревизионистского сионизма. Оно символизирует идеологические
      и политические борьбы внутри сионистского движения в начале XX века.
    ja: 20世紀初頭のシオニズム運動内の思想的・政治的闘争を象徴する、シオニスト運動の重要人物であり修正主義シオニズムの創始者であるゼエヴ・ジャボチンスキーの時代における政治指導を指す。
    zh: 指的是在兹维·贾鲍廷斯基任职期间的政治领导地位，他是犹太复国主义运动的重要人物及修正主义犹太复国主义的创始人。它象征着20世纪初犹太复国主义运动内部的思想与政治斗争。
    ar: يشير إلى القيادة السياسية خلال فترة زئيف جابوتنسكي، شخصية رئيسية في الحركة الصهيونية ومؤسس الصهيونية
