    en: A Hebrew proverb expressing the idea that one cannot benefit from something that is already full
      or complete, often used to describe situations where no additional help or resources are needed.
    es: Un proverbio hebreo que expresa la idea de que no se puede beneficiar de algo que ya está completo
      o lleno, usado para describir situaciones en las que no se necesita ayuda o recursos adicionales.
    fr: Un proverbe hébreu exprimant l'idée qu'on ne peut pas bénéficier de quelque chose qui est déjà
      plein ou complet, souvent utilisé pour décrire des situations où aucune aide ou ressource supplémentaire
      n'est nécessaire.
    de: Ein hebräisches Sprichwort, das die Idee ausdrückt, dass man nicht von etwas profitieren kann,
      das bereits voll oder vollständig ist, oft verwendet, um Situationen zu beschreiben, in denen keine
      zusätzliche Hilfe oder Ressourcen benötigt werden.
    it: Un proverbio ebraico che esprime l'idea che non si può trarre beneficio da qualcosa che è già
      pieno o completo, spesso usato per descrivere situazioni in cui non servono aiuti o risorse aggiuntive.
    pt: Um provérbio hebraico que expressa a ideia de que não se pode se beneficiar de algo que já está
      completo ou cheio, usado para descrever situações em que não há necessidade de ajuda ou recursos
      adicionais.
    ru: Еврейская пословица, выражающая идею, что нельзя извлечь пользу из того, что уже полно или завершено,
      часто используется для описания ситуаций, когда не требуется дополнительная помощь или ресурсы.
    ja: ヘブライのことわざで、すでに満ちているものから利益を得ることはできないという考えを表す。追加の助けや資源が不要な状況を説明する際に用いられる。
    zh: 一句希伯来谚语，表达无法从已满或完整的事物中获益的想法，常用于描述不需要额外帮助或资源的情况。
    ar: مثل عبري يعبر عن فكرة أنه لا يمكن الاستفادة من شيء ممتلئ أو مكتمل بالفعل، وغالبًا ما يستخدم لوصف
