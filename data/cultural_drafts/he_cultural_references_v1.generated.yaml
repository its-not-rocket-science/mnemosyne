  short_explanation: A phrase alluding to the idea that divine wisdom (Torah) descends from heaven to
    earth. It reflects a theological concept found in Jewish tradition, emphasizing revelation and accessibility
    of sacred knowledge.
  i18n_explanations:
    en: A phrase alluding to the idea that divine wisdom (Torah) descends from heaven to earth. It reflects
      a theological concept found in Jewish tradition, emphasizing revelation and accessibility of sacred
      knowledge.
    es: Una frase que alude a la idea de que la sabiduría divina (la Torá) desciende del cielo a la tierra.
      Refleja un concepto teológico de la tradición judía, destacando la revelación y el acceso al conocimiento
      sagrado.
    fr: Une expression qui évoque l'idée que la sagesse divine (la Torah) descend du ciel vers la terre.
      Elle reflète un concept théologique de la tradition juive, soulignant la révélation et l'accessibilité
      du savoir sacré.
    de: Ein Ausdruck, der die Vorstellung widerspiegelt, dass die göttliche Weisheit (die Tora) vom Himmel
      zur Erde herabsteigt. Er verweist auf ein theologisches Konzept der jüdischen Tradition, das die
      Offenbarung und Zugänglichkeit des heiligen Wissens betont.
    it: Un'espressione che allude all'idea che la sapienza divina (la Torah) scenda dal cielo alla terra.
      Riflette un concetto teologico della tradizione ebraica, sottolineando la rivelazione e l'accessibilità
      della conoscenza sacra.
    pt: Uma expressão que alude à ideia de que a sabedoria divina (a Torá) desce do céu à terra. Reflete
      um conceito teológico da tradição judaica, destacando a revelação e o acesso ao conhecimento sagrado.
    ru: Выражение, отсылающее к идее, что божественная мудрость (Тора) нисходит с небес на землю. Отражает
      теологическое понятие еврейской традиции, подчеркивающее откровение и доступность священного знания.
    ja: 天から地へと神の知恵（トーラー）が降りてくるという考えを示す表現。ユダヤ教の伝統における啓示と聖なる知識へのアクセスを強調する神学的概念を反映する。
    zh: 一句典故，指神圣智慧（托拉）自天而降。体现了犹太传统中的神学理念，强调启示与圣知的可及性。
    ar: عبارة تشير إلى فكرة أن الحكمة الإلهية (التوراة) تنزل من السماء إلى الأرض. تعكس مفهومًا لاهوتيًا
