  - אין מעשה עד שיהיה הכל
  - אין מעשה עד שיהיה הכל מוכן
  short_explanation: A Hebrew proverb meaning 'nothing is done until everything is ready,' emphasizing
    thorough preparation before action. It reflects a cultural value on planning and completeness.
  i18n_explanations:
    en: A Hebrew proverb meaning 'nothing is done until everything is ready,' emphasizing thorough preparation
      before action. It reflects a cultural value on planning and completeness.
    es: Un proverbio hebreo que significa 'nada se hace hasta que todo esté listo', destacando la importancia
      de una preparación exhaustiva antes de actuar. Refleja un valor cultural en la planificación y la
      integridad.
    fr: Un proverbe hébreu signifiant 'rien n'est fait tant que tout n'est pas prêt', soulignant l'importance
      d'une préparation minutieuse avant d'agir. Il reflète une valeur culturelle de planification et
      d'exhaustivité.
    de: Ein hebräisches Sprichwort mit der Bedeutung 'nichts wird getan, bis alles bereit ist', das die
      gründliche Vorbereitung vor dem Handeln betont. Es spiegelt einen kulturellen Wert auf Planung und
      Vollständigkeit wider.
    it: Un proverbio ebraico che significa 'nulla è fatto finché tutto non è pronto', sottolineando l'importanza
      di una preparazione accurata prima di agire. Riflette un valore culturale sulla pianificazione e
      la completezza.
    pt: Um provérbio hebraico que significa 'nada é feito até que tudo esteja pronto', destacando a importância
      de uma preparação minuciosa antes de agir. Reflete um valor cultural na planejamento e na completude.
    ru: Еврейская пословица, означающая 'ничего не делается, пока всё не готово', подчеркивающая важность
      тщательной подготовки перед действием. Отражает культурную ценность планирования и завершённости.
    ja: ヘブライのことわざで、「すべてが整うまでは何も行われない」を意味し、行動の前に徹底的な準備の重要性を強調します。計画と完全性の文化的価値を反映しています。
    zh: 希伯来谚语，意为‘万事俱备方可行动’，强调行动前的充分准备。体现了文化中对计划和完整性的重视。
    ar: مثل عبري يعني 'لا شيء يتم حتى يكون كل شيء جاهزًا'، مؤكدًا على أهمية التحضير الدقيق قبل التصرف.
      يعكس قيمة ثقافية في التخطيط والإلمام الكامل.
    he: פתגם עברי שפירושו 'שום דבר לא נעשה עד שכל דבר מוכן', המדגיש את חשיבות ההכנה היסודית לפני פעולה.
      משקף ערך תרבותי בתכנון ובשלמות.
