  - אֶת הַתּוֹרָה לֹא יִקְרָא אָדָם
  - אֵין אִישׁ קוֹרֵא אֶת הַתּוֹרָה
  short_explanation: A proverb emphasizing the rarity of individuals who truly engage with and study the
    Torah, suggesting that most do not fulfill this spiritual duty. It reflects a cultural value placed
    on Torah study as a lifelong obligation.
  i18n_explanations:
    en: A proverb emphasizing the rarity of individuals who truly engage with and study the Torah, suggesting
      that most do not fulfill this spiritual duty. It reflects a cultural value placed on Torah study
      as a lifelong obligation.
    es: Un proverbio que enfatiza la rareza de quienes realmente se dedican al estudio de la Torá, sugiriendo
      que la mayoría no cumple con este deber espiritual. Refleja el valor cultural otorgado al estudio
      de la Torá como una obligación de por vida.
    fr: Un proverbe soulignant la rareté des individus qui s'engagent vraiment dans l'étude de la Torah,
      suggérant que la plupart ne remplissent pas ce devoir spirituel. Il reflète une valeur culturelle
      accordée à l'étude de la Torah comme obligation de toute une vie.
    de: Ein Sprichwort, das die Seltenheit von Menschen betont, die sich wirklich mit dem Studium der
      Tora befassen, und darauf hinweist, dass die meisten dieser spirituellen Pflicht nicht nachkommen.
      Es spiegelt den kulturellen Wert wider, der dem Torastudium als lebenslange Verpflichtung beigemessen
      wird.
    it: Un proverbio che sottolinea la rarità di coloro che si dedicano davvero allo studio della Torah,
      suggerendo che la maggior parte non adempie a questo dovere spirituale. Riflette il valore culturale
      attribuito allo studio della Torah come obbligo per tutta la vita.
    pt: Um provérbio que enfatiza a raridade de indivíduos que realmente se dedicam ao estudo da Torá,
      sugerindo que a maioria não cumpre esse dever espiritual. Reflete o valor cultural atribuído ao
      estudo da Torá como uma obrigação vitalícia.
    ru: Поговорка, подчеркивающая редкость людей, которые действительно занимаются изучением Торы, что
      большинство не выполняет эту духовную обязанность. Отражает культурную ценность изучения Торы как
      пожизненного долга.
    ja: トーラーの研究に真剣に取り組む人の希少性を強調することわざで、多くの人がこの精神的義務を果たしていないことを示唆しています。生涯にわたる義務としてトーラー研究に価値を置く文化を反映しています。
    zh: 一句强调真正研习《托拉》的人极为罕见的谚语，暗示大多数人未能履行这一精神义务。反映了将研习《托拉》视为终身义务的文化价值观。
    ar: مثل شعبي يبرز ندرة الأفراد الذين يكرسون أنفسهم لدراسة التوراة، مما يشير إلى أن معظمهم لا يفي بهذا
      الواجب الروحي. يعكس قيمة ثقافية تُعلي من شأن دراسة التوراة بوصفها التزامًا مدى الحياة.
    he: פתגם המדגיש את נדירותם של אנשים שבאמת עוסקים בלימוד התורה, ומרמז שרוב האנשים אינם ממלאים חובה
      רוחנית זו. משקף את הערך התרבותי המיוחס ללימוד התורה כחובה לכל החיים.
