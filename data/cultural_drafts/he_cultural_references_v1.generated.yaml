  - מלחמת הגליל
  short_explanation: Refers to the 1948 Arab-Israeli War, during which Jewish forces captured the Galilee
    region in northern Israel. The phrase emphasizes the liberation of the area from Arab control.
  i18n_explanations:
    en: Refers to the 1948 Arab-Israeli War, during which Jewish forces captured the Galilee region in
      northern Israel. The phrase emphasizes the liberation of the area from Arab control.
    es: Se refiere a la Guerra Árabe-Israelí de 1948, durante la cual las fuerzas judías capturaron la
      región de Galilea en el norte de Israel. La frase enfatiza la liberación de la zona del control
      árabe.
    fr: Fait référence à la guerre israélo-arabe de 1948, au cours de laquelle les forces juives ont capturé
      la région de Galilée dans le nord d'Israël. L'expression souligne la libération de cette zone du
      contrôle arabe.
    de: Bezieht sich auf den israelisch-arabischen Krieg von 1948, in dessen Verlauf israelische Streitkräfte
      die Region Galiläa im Norden Israels eroberten. Der Ausdruck betont die Befreiung dieses Gebiets
      von arabischer Kontrolle.
    it: Si riferisce alla guerra arabo-israeliana del 1948, durante la quale le forze ebraiche catturarono
      la regione della Galilea nel nord di Israele. La frase sottolinea la liberazione dell'area dal controllo
      arabo.
    pt: Refere-se à Guerra Árabe-Israelense de 1948, quando as forças israelenses capturaram a região
      da Galileia, no norte de Israel. A expressão enfatiza a libertação da área do controle árabe.
    ru: Относится к арабо-израильской войне 1948 года, в ходе которой израильские силы захватили Галилею
      на севере Израиля. Фраза подчеркивает освобождение этого региона от арабского контроля.
    ja: これは、1948年の第一次中東戦争（イスラエル独立戦争）中にユダヤ軍がイスラエル北部のガリラヤ地方を占領したことを指す。この表現は、同地域がアラブ支配から解放されたことを強調している。
    zh: 指1948年阿以战争期间，以色列军队占领以色列北部的加利利地区。该短语强调该地区从阿拉伯控制下解放出来。
    ar: يشير إلى الحرب العربية الإسرائيلية عام 1948، حيث استولت القوات اليهودية على منطقة الجليل في شمال
      إسرائيل. تؤكد العبارة على تحرير المنطقة من السيطرة العربية.
    he: מתייחס למלחמת העצמאות (1948), במהלכה כבשו כוחות היישוב היהודי את הגליל בצפון ישראל. הביטוי מדגיש
      את שחרור האזור משליטת הערבים.
