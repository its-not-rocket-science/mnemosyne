- id: he_classical_or_scriptural_allusion_א_ל_ת_פ_ת_ח_פ_ה_ל_ש_ט_ן_401441c1
  language: he
  canonical_reference: אַל תִּפְתַּח פֶּה לַשָּׂטָן
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - אל תפתח פה לשטן
  - אל תפתח לו פה לשטן
  short_explanation: A Hebrew idiom derived from Jewish tradition, warning against giving the devil (or
    evil forces) an opportunity to act through careless speech. It underscores the power of words in Jewish
    thought.
  i18n_explanations:
    en: A Hebrew idiom derived from Jewish tradition, warning against giving the devil (or evil forces)
      an opportunity to act through careless speech. It underscores the power of words in Jewish thought.
    es: Una expresión hebrea de tradición judía que advierte contra dar al diablo (o fuerzas malignas)
      la oportunidad de actuar mediante palabras descuidadas. Subraya el poder de las palabras en el pensamiento
      judío.
    fr: Une expression hébraïque issue de la tradition juive, mettant en garde contre le fait de donner
      au diable (ou aux forces du mal) l'occasion d'agir par des paroles négligentes. Elle souligne le
      pouvoir des mots dans la pensée juive.
    de: Ein hebräischer Ausdruck aus der jüdischen Tradition, der davor warnt, dem Teufel (oder bösen
      Mächten) durch unbedachte Worte eine Chance zu geben. Er unterstreicht die Macht der Worte im jüdischen
      Denken.
    it: Un'espressione ebraica derivata dalla tradizione ebraica che avverte di non dare al diavolo (o
      alle forze del male) l'opportunità di agire attraverso parole trascurate. Sottolinea il potere delle
      parole nel pensiero ebraico.
    pt: Uma expressão hebraica da tradição judaica que adverte contra dar ao diabo (ou forças malignas)
      a oportunidade de agir por meio de palavras descuidadas. Ressalta o poder das palavras no pensamento
      judaico.
    ru: Еврейское выражение из еврейской традиции, предупреждающее о том, что неосторожные слова могут
      дать дьяволу (или злым силам) возможность действовать. Подчеркивает силу слова в еврейской мысли.
    ja: ユダヤ教の伝統に由来するヘブライ語の成句で、不用意な発言によって悪魔（あるいは邪悪な力）に行動の機会を与えることを戒めます。ユダヤ思想における言葉の力を強調しています。
    zh: 源自犹太传统的希伯来语习语，告诫人们切勿因言语不慎给魔鬼（或邪恶势力）可乘之机。强调了犹太思想中语言的力量。
    ar: تعبير عبري مستمد من التقليد اليهودي، يحذر من إعطاء الشيطان (أو القوى الشريرة) فرصة للعمل من خلال
      كلام مهمل. يسلط الضوء على قوة الكلمات في الفكر اليهودي.
    he: ביטוי עברי מן המסורת היהודית, המזהיר שלא לתת לשטן (או לכוחות הרע) הזדמנות לפעול באמצעות דיבור
      רשלני. מדגיש את כוחן של המילים במחשבה היהודית.
