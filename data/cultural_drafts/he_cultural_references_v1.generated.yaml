- id: he_literary_reference_ל_א_א_מ_ר_ת_י_ד_ב_ר_ל_א_א_מ_ר_ת_י_962289d6
  language: he
  canonical_reference: לֹא אָמַרְתִּי דָּבָר, לֹא אָמַרְתִּי
  reference_type: literary_reference
  surface_patterns:
  - לא אמרתי דבר
  - לא אמרתי כלום
  - לא אמרתי דבר, לא אמרתי
  short_explanation: A phrase expressing denial or insistence that one has not spoken, often used in a
    defensive or emphatic tone. It conveys a sense of innocence or lack of involvement in a matter.
  i18n_explanations:
    en: A phrase expressing denial or insistence that one has not spoken, often used in a defensive or
      emphatic tone. It conveys a sense of innocence or lack of involvement in a matter.
    es: Frase que expresa negación o insistencia en que no se ha hablado, usada con tono defensivo o enfático.
      Transmite una sensación de inocencia o falta de participación en el asunto.
    fr: Expression exprimant un déni ou une insistance sur le fait de ne pas avoir parlé, souvent employée
      sur un ton défensif ou emphatique. Convoie un sentiment d'innocence ou de non-implication dans une
      affaire.
    de: Ein Sprichwort, das eine Leugnung oder Betonung ausdrückt, dass man nichts gesagt hat, oft in
      defensivem oder nachdrücklichem Ton verwendet. Es vermittelt ein Gefühl von Unschuld oder mangelnder
      Beteiligung an einer Angelegenheit.
    it: Un'espressione che esprime diniego o insistenza sul fatto di non aver parlato, spesso usata con
      tono difensivo o enfatico. Trasmette un senso di innocenza o di non coinvolgimento nella questione.
    pt: Expressão que expressa negação ou insistência em que não se falou, frequentemente usada com tom
      defensivo ou enfático. Transmite uma sensação de inocência ou falta de envolvimento no assunto.
    ru: Выражение, выражающее отрицание или настойчивое утверждение, что человек ничего не говорил, часто
      используется в оборонительном или подчёркнутом тоне. Передаёт ощущение невиновности или непричастности
      к делу.
    ja: 否定や、自分が何も話していないという強調を表す表現で、防御的な調子や強調のニュアンスで使われます。無実さや関与していないという感覚を伝えます。
    zh: 表达否认或坚称自己未发言的说法，常用于辩解或强调的语气。传达出一种无辜或与事件无关的感觉。
    ar: تعبير يعبر عن إنكار أو إصرار على عدم التحدث، وغالبًا ما يُستخدم بنبرة دفاعية أو حاسمة. ينقل شعورًا
