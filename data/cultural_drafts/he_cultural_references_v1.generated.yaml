  short_explanation: The opening verse of the Hebrew Bible (Genesis 1:1), meaning 'In the beginning God
    created the heavens and the earth.' It is foundational to Jewish and Christian theology, symbolizing
    creation and divine order.
  i18n_explanations:
    en: The opening verse of the Hebrew Bible (Genesis 1:1), meaning 'In the beginning God created the
      heavens and the earth.' It is foundational to Jewish and Christian theology, symbolizing creation
      and divine order.
    es: El primer versículo de la Biblia hebrea (Génesis 1:1), que significa 'En el principio Dios creó
      los cielos y la tierra'. Es fundamental en la teología judía y cristiana, simbolizando la creación
      y el orden divino.
    fr: Le premier verset de la Bible hébraïque (Genèse 1:1), signifiant 'Au commencement, Dieu créa les
      cieux et la terre'. Fondement de la théologie juive et chrétienne, il symbolise la création et l'ordre
      divin.
    de: 'Der erste Vers der hebräischen Bibel (Genesis 1,1), der bedeutet: ''Am Anfang schuf Gott Himmel
      und Erde''. Er ist grundlegend für die jüdische und christliche Theologie und symbolisiert Schöpfung
      und göttliche Ordnung.'
    it: Il primo versetto della Bibbia ebraica (Genesi 1:1), che significa 'In principio Dio creò il cielo
      e la terra'. È fondamentale nella teologia ebraica e cristiana, simboleggiando la creazione e l'ordine
      divino.
    pt: O primeiro versículo da Bíblia hebraica (Gênesis 1:1), que significa 'No princípio, Deus criou
      os céus e a terra'. É fundamental na teologia judaica e cristã, simbolizando a criação e a ordem
      divina.
    ru: Первая строка еврейской Библии (Бытие 1:1), означающая 'В начале сотворил Бог небо и землю'. Это
      основополагающий текст для иудаизма и христианства, символизирующий творение и божественный порядок.
    ja: ヘブライ語聖書の冒頭の言葉（創世記1:1）、「初めに神は天と地を創造された」という意味。ユダヤ教とキリスト教の神学の基礎であり、創造と神の秩序を象徴している。
    zh: 希伯来圣经的开篇语（创世记1:1），意为「起初神创造天地」。这是犹太教和基督教神学的基础，象征着创造与神圣秩序。
    ar: الآية الافتتاحية من الكتاب المقدس العبري (التكوين 1:1)، التي تعني 'في البدء خلق الله السماوات
      والأرض'. وهي أساسية في اللاهوت اليهودي والمسيحي، وترمز إلى الخلق والنظام الإلهي.
    he: פסוק הפתיחה של התנ"ך (בראשית א:א), שמשמעו 'בראשית ברא אלוהים את השמים ואת הארץ'. פסוק יסודי ביהדות
      ובנצרות, המסמל בריאה וסדר אלוהי.
