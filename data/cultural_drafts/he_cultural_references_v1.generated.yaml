  i18n_explanations:
    en: Refers to David Ben-Gurion (1886–1973), the primary founder and first Prime Minister of Israel,
      who played a central role in the establishment of the State of Israel in 1948.
    es: Se refiere a David Ben-Gurion (1886–1973), principal fundador y primer primer ministro de Israel,
      quien jugó un papel central en la creación del Estado de Israel en 1948.
    fr: Fait référence à David Ben Gourion (1886–1973), fondateur principal et premier Premier ministre
      d'Israël, qui a joué un rôle central dans la création de l'État d'Israël en 1948.
    de: Bezieht sich auf David Ben-Gurion (1886–1973), den Hauptgründer und ersten Ministerpräsidenten
      Israels, der eine zentrale Rolle bei der Gründung des Staates Israel 1948 spielte.
    it: Si riferisce a David Ben-Gurion (1886–1973), principale fondatore e primo Primo ministro di Israele,
      che ebbe un ruolo centrale nella fondazione dello Stato di Israele nel 1948.
    pt: Refere-se a David Ben-Gurion (1886–1973), principal fundador e primeiro primeiro-ministro de Israel,
      que teve um papel central na criação do Estado de Israel em 1948.
    ru: Относится к Давиду Бен-Гуриону (1886–1973), главному основателю и первому премьер-министру Израиля,
      сыгравшему центральную роль в создании государства Израиль в 1948 году.
    ja: これは、イスラエルの建国に中心的な役割を果たした初代首相であり、イスラエルの主要な建国者であったダビデ・ベン＝グリオン（1886–1973）を指す。
    zh: 指大卫·本-古里安（1886–1973），以色列的主要创始人和首任总理，在1948年以色列建国过程中发挥了核心作用。
    ar: يشير إلى ديفيد بن غوريون (1886–1973)، المؤسس الرئيسي وأول رئيس وزراء لإسرائيل، الذي لعب دوراً
      مركزياً في تأسيس دولة إسرائيل عام 1948.
    he: מתייחס לדוד בן-גוריון (1886–1973), מייסדה הראשי וראש הממשלה הראשון של ישראל, אשר מילא תפקיד מרכזי
      בהקמת המדינה ב-1948.
