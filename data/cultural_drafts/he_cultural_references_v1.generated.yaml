- id: he_proverb_tradition_א_ל_ת_ז_כ_ר_ר_אש_נו_ת_26f731b1
  language: he
  canonical_reference: אַל תִּזְכֹּר רִאשֹׁנוֹת
  reference_type: proverb_tradition
  surface_patterns:
  - אל תזכור ראשונות
  - אל תזכור ראשונותיך
  - אל תזכור ראשונותיו
  - לא לזכור ראשונות
  short_explanation: A Hebrew proverb advising against dwelling on past mistakes or grievances, encouraging
    a forward-looking perspective. It reflects a cultural emphasis on resilience and moving past difficulties.
  i18n_explanations:
    en: A Hebrew proverb advising against dwelling on past mistakes or grievances, encouraging a forward-looking
      perspective. It reflects a cultural emphasis on resilience and moving past difficulties.
    es: Un proverbio hebreo que aconseja no aferrarse a errores o resentimientos pasados, fomentando una
      perspectiva orientada al futuro. Refleja un énfasis cultural en la resiliencia y el superarse.
    fr: Un proverbe hébreu conseillant de ne pas s'attarder sur les erreurs ou griefs passés, encourageant
      une vision tournée vers l'avenir. Il reflète une emphase culturelle sur la résilience et le dépassement.
    de: Ein hebräisches Sprichwort, das davor warnt, an vergangenen Fehlern oder Groll festzuhalten, und
      eine zukunftsorientierte Perspektive fördert. Es spiegelt einen kulturellen Fokus auf Resilienz
      und Bewältigung wider.
    it: Un proverbio ebraico che consiglia di non indugiare su errori o rancori passati, incoraggiando
      una prospettiva orientata al futuro. Riflette un'enfasi culturale sulla resilienza e il superamento.
    pt: Um provérbio hebraico que aconselha não se deter em erros ou ressentimentos passados, incentivando
      uma perspectiva voltada para o futuro. Reflete uma ênfase cultural na resiliência e superação.
    ru: Еврейская пословица, советующая не зацикливаться на прошлых ошибках или обидах, поощряя взгляд
      в будущее. Отражает культурный акцент на стойкости и преодолении трудностей.
    ja: 過去の過ちや恨みにとらわれず、前向きな視点を奨励するヘブライのことわざ。回復力と困難を乗り越える文化的価値を反映しています。
    zh: 希伯来谚语，劝诫人们不要沉溺于过去的错误或怨恨，鼓励面向未来的态度。体现了文化中对韧性和克服困难的重视。
    ar: مثل عبري ينصح بعدم التعلق بالأخطاء أو المظالم الماضية، مشجعًا على نظرة مستقبلية. يعكس التركيز
      الثقافي على المرونة وتجاوز الصعوبات.
    he: פתגם עברי הממליץ שלא להיתקע על טעויות או כעסים מן העבר, ומעודד מבט קדימה. משקף דגש תרבותי על חוסן
      והתגברות על קשיים.
