- id: he_cultural_reference_ה_ג_ז_רו_ת_ש_ל_ה_נ_ס_יך_ב_ו_נ_יפ_צ_יו_aa8fa097
  language: he
  canonical_reference: הַגְּזֵרוֹת שֶׁל הַנָּסִיךְ בּוֹנִיפַצְיוֹ
  reference_type: cultural_reference
  surface_patterns:
  - גזרות הנסיך בוניפציו
  - גזרות בוניפציו
  - גזרות הנסיך
  short_explanation: Refers to the decrees issued by Prince Eugene of Savoy (1663–1736), a prominent military
    leader in the Habsburg monarchy, symbolizing oppressive or burdensome policies. In Hebrew, it metaphorically
    denotes unjust or harsh measures.
  i18n_explanations:
    en: Refers to the decrees issued by Prince Eugene of Savoy (1663–1736), a prominent military leader
      in the Habsburg monarchy, symbolizing oppressive or burdensome policies. In Hebrew, it metaphorically
      denotes unjust or harsh measures.
    es: Se refiere a los decretos emitidos por el príncipe Eugenio de Saboya (1663–1736), destacado líder
      militar de la monarquía Habsburgo, que simbolizan políticas opresivas o gravosas. En hebreo, metafóricamente
      denota medidas injustas o severas.
    fr: Fait référence aux décrets émis par le prince Eugène de Savoie (1663–1736), chef militaire de
      la monarchie des Habsbourg, symbolisant des politiques oppressives ou pesantes. En hébreu, cela
      désigne métaphoriquement des mesures injustes ou sévères.
    de: Bezieht sich auf die Dekrete des Prinzen Eugen von Savoyen (1663–1736), eines bedeutenden Militärführers
      der Habsburger Monarchie, die für unterdrückende oder belastende Maßnahmen stehen. Im Hebräischen
      bezeichnet es metaphorisch ungerechte oder harte Maßnahmen.
    it: Si riferisce ai decreti emanati dal principe Eugenio di Savoia (1663–1736), importante leader
      militare della monarchia asburgica, che simboleggiano politiche oppressive o gravose. In ebraico
      indica metaforicamente misure ingiuste o severe.
    pt: Refere-se aos decretos emitidos pelo príncipe Eugênio de Saboia (1663–1736), líder militar proeminente
      da monarquia Habsburgo, que simbolizam políticas opressivas ou onerosas. Em hebraico, metaforicamente
      denota medidas injustas ou severas.
    ru: Относится к указам принца Евгения Савойского (1663–1736), выдающегося военного лидера Габсбургской
      монархии, которые символизируют угнетающую или обременительную политику. На иврите это метафора
      несправедливых или жестких мер.
    ja: これは、ハプスブルク君主国の著名な軍事指導者であったプリンツ・オイゲン（1663–1736）が発した法令を指し、圧政的または負担の大きな政策を象徴する。ヘブライ語では不当または厳しい措置を暗に示す。
    zh: 指哈布斯堡王朝著名军事领袖欧根亲王（1663–1736）颁布的法令，象征压迫或沉重的政策。在希伯来语中，隐喻不公或严厉的措施。
    ar: يشير إلى المراسيم التي أصدرها الأمير أوجين دي سافوي (1663–1736)، القائد العسكري البارز في الإمبراطورية
      النمساوية، والتي ترمز إلى سياسات قمعية أو مرهقة. في العبرية، يدل هذا المصطلح مجازياً على تدابير
      ظالمة أو قاسية.
    he: מתייחס לצווים שהוציא הנסיך אויגן מסבויה (1663–1736), מנהיג צבאי בולט באימפריה ההבסבורגית, המסמלים
      מדיניות מדכאת או מעיקה. בעברית, משמש כמטפורה למדיניות לא צודקת או נוקשה.
