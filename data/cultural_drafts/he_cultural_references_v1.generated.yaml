  short_explanation: A phrase implying that something is already decided or fated, often used in a resigned
    or fatalistic tone. It suggests that a matter is 'written on the wall' and cannot be changed.
  i18n_explanations:
    en: A phrase implying that something is already decided or fated, often used in a resigned or fatalistic
      tone. It suggests that a matter is 'written on the wall' and cannot be changed.
    es: Frase que implica que algo ya está decidido o predestinado, usada con tono resignado o fatalista.
      Sugiere que un asunto está 'escrito en la pared' y no puede cambiarse.
    fr: Expression signifiant que quelque chose est déjà décidé ou inévitable, souvent employée avec résignation
      ou fatalisme. Elle suggère qu'une affaire est 'écrite sur le mur' et ne peut être changée.
    de: Ein Sprichwort, das bedeutet, dass etwas bereits entschieden oder vorbestimmt ist, oft in resigniertem
      oder fatalistischem Ton. Es deutet darauf hin, dass eine Angelegenheit 'an der Wand geschrieben'
      ist und sich nicht ändern lässt.
    it: Un'espressione che implica che qualcosa è già deciso o predestinato, spesso usata con tono rassegnato
      o fatalista. Suggerisce che una questione è 'scritta sul muro' e non può essere cambiata.
    pt: Expressão que implica que algo já está decidido ou predestinado, usada com tom resignado ou fatalista.
      Sugere que um assunto está 'escrito na parede' e não pode ser mudado.
    ru: Выражение, означающее, что что-то уже решено или предопределено, часто используется с оттенком
      фатализма или безысходности. Оно подразумевает, что дело 'написано на стене' и не может быть изменено.
    ja: 何かがすでに決まっている、あるいは運命づけられていることを示す表現で、諦めや宿命的な調子で使われます。物事が「壁に書かれている」ように変えられないことを暗示します。
    zh: 表示某事已成定局或命中注定的说法，常用于无奈或宿命的语气。暗示某事已‘写在墙上’，无法改变。
    ar: تعبير يفيد أن شيئًا ما قد حُسم أو قُدر مسبقًا، ويُستخدم غالبًا بنبرة يائسة أو قاتمة. يشير إلى
      أن الأمر 'مكتوب على الجدار' ولا يمكن تغييره.
    he: ביטוי שמשמעו שדבר כבר נחרץ או נגזר, לרוב בנימה של התייאשות או קבלת הגורל. מרמז שהעניין 'כתוב על
      הקיר' ואינו ניתן לשינוי.
