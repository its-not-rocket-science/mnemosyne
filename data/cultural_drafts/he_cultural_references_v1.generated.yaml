  short_explanation: Refers to the modern Zionist movement and the establishment of Jewish settlements
    in Ottoman and British Mandate Palestine, marking the beginning of the contemporary State of Israel.
    It encapsulates the ideological and practical efforts to revive Jewish life in the ancestral homeland.
  i18n_explanations:
    en: Refers to the modern Zionist movement and the establishment of Jewish settlements in Ottoman and
      British Mandate Palestine, marking the beginning of the contemporary State of Israel. It encapsulates
      the ideological and practical efforts to revive Jewish life in the ancestral homeland.
    es: Se refiere al movimiento sionista moderno y al establecimiento de asentamientos judíos en la Palestina
      otomana y bajo el Mandato Británico, marcando el inicio del Estado de Israel contemporáneo. Encapsula
      los esfuerzos ideológicos y prácticos para revivir la vida judía en la tierra ancestral.
    fr: Fait référence au mouvement sioniste moderne et à l'établissement de colonies juives en Palestine
      ottomane et sous mandat britannique, marquant le début de l'État d'Israël contemporain. Il incarne
      les efforts idéologiques et pratiques pour revitaliser la vie juive dans la terre ancestrale.
    de: Bezieht sich auf die moderne zionistische Bewegung und die Gründung jüdischer Siedlungen im Osmanischen
      Reich und unter britischem Mandat in Palästina, was den Beginn des modernen Staates Israel markiert.
      Es umfasst die ideologischen und praktischen Bemühungen, das jüdische Leben in der angestammten
      Heimat wiederzubeleben.
    it: Si riferisce al movimento sionista moderno e all'istituzione di insediamenti ebraici in Palestina
      ottomana e sotto il Mandato britannico, segnando l'inizio dello Stato di Israele contemporaneo.
      Incarna gli sforzi ideologici e pratici per rivitalizzare la vita ebraica nella terra ancestrale.
    pt: Refere-se ao movimento sionista moderno e ao estabelecimento de assentamentos judaicos na Palestina
      otomana e sob o Mandato Britânico, marcando o início do Estado de Israel contemporâneo. Engloba
      os esforços ideológicos e práticos para reviver a vida judaica na terra ancestral.
    ru: Относится к современному сионистскому движению и созданию еврейских поселений в Османской и Британской
      подмандатной Палестине, что ознаменовало начало современного Государства Израиль. Оно охватывает
      идеологические и практические усилия по возрождению еврейской жизни на исторической родине.
    ja: 近代シオニズム運動とオスマン帝国およびイギリス委任統治下のパレスチナにおけるユダヤ人入植地の設立を指し、現代のイスラエル国家の始まりを示す。これは、先祖の地におけるユダヤ人の生活を再興するための思想的・実践的な取り組みを象徴している。
    zh: 指的是现代犹太复国主义运动及在奥斯曼帝国和英国托管下的巴勒斯坦建立犹太人定居点，标志着现代以色列国的开端。它体现了在祖居地复兴犹太生活的思想与实践努力。
    ar: يشير إلى الحركة الصهيونية الحديثة وإنشاء المستوطنات اليهودية في فلسطين العثمانية وتحت الانتداب
      البريطاني، مما يمثل بداية الدولة الإسرائيلية المعاصرة. ويجسد الجهود الفكرية والعملية لإحياء الحياة
      اليهودية في الأرض الأصلية.
    he: מתייחס לתנועה הציונית המודרנית ולהקמת התיישבות יהודית בארץ ישראל בתקופת האימפריה העות'מאנית והמנדט
      הבריטי, המסמנת את תחילתו של מדינת ישראל העכשווית. הוא מקיף את המאמצים האידאולוגיים והמעשיים להחיות
      את החיים היהודיים במולדת ההיסטורית.
