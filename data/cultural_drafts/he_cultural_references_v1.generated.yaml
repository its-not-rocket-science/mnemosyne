    en: Refers to the biblical commandment regarding the consecration of the firstborn sons of Israel
      to divine service, as part of the covenant with God. It carries theological significance in Jewish
      tradition regarding the sanctity of the priestly class.
    es: Se refiere al mandamiento bíblico sobre la consagración de los primogénitos de Israel al servicio
      divino, como parte del pacto con Dios. Tiene importancia teológica en la tradición judía respecto
