  - גזרות שוא
  - גזרות השוא
  short_explanation: A phrase meaning 'empty decrees' or 'futile decrees,' referring to oppressive laws
    or decrees that lack real power or enforcement. Often used in modern Hebrew to describe ineffective
    policies.
  i18n_explanations:
    en: A phrase meaning 'empty decrees' or 'futile decrees,' referring to oppressive laws or decrees
      that lack real power or enforcement. Often used in modern Hebrew to describe ineffective policies.
    es: Una frase que significa 'decretos vacíos' o 'decretos fútiles', refiriéndose a leyes o decretos
      opresivos que carecen de poder o aplicación real. Se usa en hebreo moderno para describir políticas
      ineficaces.
    fr: Une expression signifiant 'décrets vides' ou 'décrets futiles', désignant des lois ou décrets
      oppressifs qui manquent de pouvoir ou d'application réelle. Utilisée en hébreu moderne pour décrire
      des politiques inefficaces.
    de: Ein Ausdruck, der 'leere Verfügungen' oder 'nutzlose Erlasse' bedeutet und sich auf unterdrückerische
      Gesetze oder Erlasse bezieht, die keine echte Macht oder Durchsetzung haben. Wird im modernen Hebräisch
      für wirkungslose Maßnahmen verwendet.
    it: Un'espressione che significa 'decreti vuoti' o 'decreti futili', riferendosi a leggi o decreti
      oppressivi privi di reale potere o applicazione. Usata in ebraico moderno per descrivere politiche
      inefficaci.
    pt: Uma expressão que significa 'decretos vazios' ou 'decretos fúteis', referindo-se a leis ou decretos
      opressivos que não têm poder ou aplicação real. Usada no hebraico moderno para descrever políticas
      ineficazes.
    ru: Выражение, означающее 'пустые указы' или 'бесполезные декреты', относящееся к репрессивным законам
      или указам, не имеющим реальной силы или применения. Часто используется в современном иврите для
      описания неэффективных политик.
    ja: '''空の布告''または''無駄な布告''を意味する表現で、実効力や執行力のない抑圧的な法律や布告を指す。現代ヘブライ語では非効率的な政策を表すのに使われる。'
    zh: 一个意为“空洞法令”或“无效法令”的短语，指那些缺乏实际权力或执行力的压迫性法律或法令。现代希伯来语中常用于描述无效政策。
    ar: تعبير يعني 'أوامر فارغة' أو 'أوامر عقيمة'، ويشير إلى قوانين أو أوامر قمعية لا تملك سلطة أو تنفيذ
      حقيقي. يُستخدم في العبرية الحديثة لوصف سياسات غير فعالة.
    he: ביטוי שפירושו 'גזרות ריקות' או 'גזרות סרק', המתייחס לחוקים או גזרות מדכאות חסרי כוח או אכיפה ממשיים.
      משמש בעברית מודרנית לתיאור מדיניות לא יעילה.
