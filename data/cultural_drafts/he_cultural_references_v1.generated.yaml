  - המזמור יבוא לביתנו
  short_explanation: A phrase suggesting a future event that is highly anticipated or inevitable, often
    used humorously or ironically. It originates from a song about the return of the Messiah, implying
    a long-awaited but uncertain arrival.
  i18n_explanations:
    en: A phrase suggesting a future event that is highly anticipated or inevitable, often used humorously
      or ironically. It originates from a song about the return of the Messiah, implying a long-awaited
      but uncertain arrival.
    es: Frase que sugiere un evento futuro muy esperado o inevitable, usada a menudo con humor o ironía.
      Proviene de una canción sobre el regreso del Mesías, lo que implica una llegada largamente esperada
      pero incierta.
    fr: Expression suggérant un événement futur très attendu ou inévitable, souvent employée avec humour
      ou ironie. Elle provient d'une chanson sur le retour du Messie, impliquant une arrivée longtemps
      espérée mais incertaine.
    de: Ein Sprichwort, das ein zukünftiges, sehnlich erwartetes oder unvermeidliches Ereignis andeutet,
      oft humorvoll oder ironisch verwendet. Es stammt aus einem Lied über die Rückkehr des Messias und
      deutet auf eine lang ersehnte, aber unsichere Ankunft hin.
    it: Un'espressione che suggerisce un evento futuro molto atteso o inevitabile, spesso usata con umorismo
      o ironia. Deriva da una canzone sul ritorno del Messia, implicando un arrivo a lungo atteso ma incerto.
    pt: Expressão que sugere um evento futuro muito aguardado ou inevitável, frequentemente usada com
      humor ou ironia. Origina-se de uma canção sobre o retorno do Messias, implicando uma chegada há
      muito esperada, mas incerta.
    ru: Выражение, подразумевающее будущее событие, которое либо очень ожидаемо, либо неизбежно, часто
      используется с юмором или иронией. Оно восходит к песне о возвращении Мессии, что подразумевает
      долгожданное, но неопределённое событие.
    ja: 将来の出来事で、非常に待ち望まれているか、避けられないことを示唆する表現で、しばしばユーモアや皮肉を込めて使われます。メシアの帰還についての歌に由来し、長年待ち望まれたものの到来が不確実であることを暗示します。
    zh: 暗示某个未来事件备受期待或不可避免的说法，常以幽默或讽刺的语气使用。源自一首关于弥赛亚归来的歌曲，暗示一个期待已久但不确定的到来。
    ar: تعبير يشير إلى حدث مستقبلي متوقع بشدة أو محتوم، وغالبًا ما يُستخدم بهزل أو سخرية. ينبع من أغنية
