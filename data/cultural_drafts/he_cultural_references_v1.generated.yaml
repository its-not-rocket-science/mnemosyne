      en los reyes vecinos. Se cita a menudo para ilustrar la influencia de largo alcance del reinado
      de Salomón.
    fr: Cette phrase décrit l'émerveillement et la crainte que la sagesse et le pouvoir de Salomon inspiraient
      aux rois voisins. Elle est souvent citée pour illustrer l'influence étendue du règne de Salomon.
    de: Dieser Satz beschreibt die Ehrfurcht und Furcht, die Salomons Weisheit und Macht bei den benachbarten
      Königen auslösten. Er wird oft zitiert, um den weitreichenden Einfluss von Salomons Herrschaft zu
      veranschaulichen.
    it: Questa frase descrive lo stupore e il timore che la sapienza e il potere di Salomone ispiravano
      ai re vicini. Viene spesso citata per illustrare l'influenza a lungo raggio del regno di Salomone.
    pt: Esta frase descreve o temor e a admiração que a sabedoria e o poder de Salomão inspiraram nos
      reis vizinhos. É frequentemente citada para ilustrar a influência abrangente do reinado de Salomão.
    ru: Эта фраза описывает трепет и страх, которые мудрость и могущество Соломона внушали соседним царям.
      Её часто цитируют, чтобы проиллюстрировать всеобъемлющее влияние царствования Соломона.
    ja: この言葉は、ソロモンの知恵と力が近隣の王たちに与えた畏敬と恐怖を表しています。ソロモンの治世の広範な影響力を示すためにしばしば引用されます。
    zh: 这句话描述了所罗门的智慧和权力在邻国君王中引起的敬畏和恐惧。这句话常被引用，以展示所罗门统治的深远影响。
    ar: تdescribe هذه الجملة الدهشة والخوف اللذين أثارتهما حكمة سليمان وقوته في الملوك المجاورة. غالبًا
