  short_explanation: A proverb meaning that one does not gain strength from suffering or hardship alone.
    It suggests that adversity must be overcome through resilience and action, not merely endured.
  i18n_explanations:
    en: A proverb meaning that one does not gain strength from suffering or hardship alone. It suggests
      that adversity must be overcome through resilience and action, not merely endured.
    es: Un proverbio que significa que no se gana fuerza solo por sufrir o pasar dificultades. Sugiere
      que la adversidad debe superarse mediante la resiliencia y la acción, no simplemente soportarse.
    fr: Un proverbe signifiant qu'on ne tire pas de force du simple fait de souffrir ou de subir des épreuves.
      Il suggère que l'adversité doit être surmontée par la résilience et l'action, et non simplement
      endurée.
    de: Ein Sprichwort, das bedeutet, dass man keine Stärke allein durch Leiden oder harte Zeiten gewinnt.
      Es deutet darauf hin, dass Widrigkeiten durch Widerstandsfähigkeit und Handeln überwunden werden
      müssen, nicht nur ertragen.
    it: Un proverbio che significa che non si guadagna forza dal semplice soffrire o affrontare difficoltà.
      Suggerisce che l'avversità deve essere superata attraverso la resilienza e l'azione, non solo subita.
    pt: Um provérbio que significa que não se ganha força apenas sofrendo ou passando por dificuldades.
      Sugere que a adversidade deve ser superada por meio de resiliência e ação, não apenas suportada.
    ru: Пословица, означающая, что нельзя обрести силу, просто страдая или перенося трудности. Она предполагает,
      что трудности нужно преодолевать с помощью стойкости и действия, а не просто терпеть.
    ja: 苦しみや困難だけで強さが得られるわけではないという意味の格言。逆境は単に耐えるのではなく、回復力と行動によって乗り越えなければならないことを示唆しています。
    zh: 一句谚语，意为仅仅忍受苦难或困境不会让人变得强大。它建议逆境必须通过韧性和行动来克服，而不仅仅是忍受。
    ar: مثل يعني أن المرء لا يكتسب القوة من المعاناة أو الشدة وحدها. يقترح أن على المرء التغلب على المصاعب
      من خلال المرونة والعمل، وليس مجرد تحملها.
    he: פתגם שפירושו שאין אדם מתחזק רק מהסבל או הקושי עצמם. מציע כי יש להתגבר על הקשיים באמצעות חוסן ופעולה,
      ולא רק לסבול אותם.
