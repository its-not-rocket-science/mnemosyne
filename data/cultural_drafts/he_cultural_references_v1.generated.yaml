      die militärische Stärke im vorstaatlichen Israel symbolisiert.
    it: Espressione che si riferisce al Palmach (forza d'élite della Haganah) a Tel Aviv, simbolo dello
      spirito pionieristico e dell'eccellenza militare nell'Israele pre-statale.
