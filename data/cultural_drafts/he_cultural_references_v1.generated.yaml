    pt: Refere-se à sabedoria concedida por Deus a Salomão e à sua autoria dos Provérbios (Mishlei), destacando
      seu papel como rei sábio e instrutor de sabedoria moral e prática.
    ru: Относится к божественно дарованной Соломону мудрости и авторству Книги Притчей (Мишлей), подчеркивая
