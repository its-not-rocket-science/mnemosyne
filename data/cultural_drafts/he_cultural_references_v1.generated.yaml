  short_explanation: The destruction of the Second Temple in 70 CE by the Romans, marking the end of Jewish
    sovereignty in Judea and the beginning of the Jewish diaspora. A pivotal event in Jewish history symbolizing
    exile and loss.
  i18n_explanations:
    en: The destruction of the Second Temple in 70 CE by the Romans, marking the end of Jewish sovereignty
      in Judea and the beginning of the Jewish diaspora. A pivotal event in Jewish history symbolizing
      exile and loss.
    es: La destrucción del Segundo Templo en el año 70 d.C. por los romanos, que marcó el fin de la soberanía
      judía en Judea y el inicio de la diáspora judía. Un evento clave en la historia judía que simboliza
      el exilio y la pérdida.
    fr: La destruction du Second Temple en 70 ap. J.-C. par les Romains, marquant la fin de la souveraineté
      juive en Judée et le début de la diaspora juive. Un événement clé de l'histoire juive symbolisant
      l'exil et la perte.
    de: Die Zerstörung des Zweiten Tempels im Jahr 70 n. Chr. durch die Römer, die das Ende der jüdischen
      Souveränität in Judäa und den Beginn der jüdischen Diaspora markierte. Ein zentrales Ereignis der
      jüdischen Geschichte, das Exil und Verlust symbolisiert.
    it: La distruzione del Secondo Tempio nel 70 d.C. da parte dei Romani, che segnò la fine della sovranità
      ebraica in Giudea e l'inizio della diaspora ebraica. Un evento fondamentale nella storia ebraica
      che simboleggia l'esilio e la perdita.
    pt: A destruição do Segundo Templo em 70 d.C. pelos romanos, que marcou o fim da soberania judaica
      na Judeia e o início da diáspora judaica. Um evento pivotal na história judaica que simboliza o
      exílio e a perda.
    ru: Разрушение Второго Храма в 70 году н.э. римлянами, положившее конец еврейскому суверенитету в
      Иудее и начавшее еврейскую диаспору. Ключевое событие еврейской истории, символизирующее изгнание
      и утрату.
    ja: 紀元70年にローマ人によって第二神殿が破壊され、ユダヤの主権が終焉し、ユダヤ人のディアスポラが始まった。ユダヤ史における象徴的な出来事であり、追放と喪失を表す。
    zh: 公元70年，罗马人摧毁第二圣殿，标志着犹太人在犹地亚的主权终结和犹太人流散的开始。这是犹太历史中的关键事件，象征着流亡与失落。
    ar: دمار الهيكل الثاني عام 70 م على يد الرومان، مما أنهى السيادة اليهودية في يهودا وبدء الشتات اليهودي.
      حدث محوري في التاريخ اليهودي يرمز إلى المنفى والخسارة.
    he: חורבן בית המקדש השני בשנת 70 לספירה בידי הרומאים, אשר סימן את סוף הריבונות היהודית ביהודה ותחילת
      הגלות היהודית. אירוע מכונן בהיסטוריה היהודית המסמל גלות ואובדן.
