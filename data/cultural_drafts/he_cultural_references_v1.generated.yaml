- id: he_cultural_reference_ע_ל_י_ו_ן_ב_מ_ל_ח_מ_ת_ש_ש_ת_ה_י_מ_ים_cab490a2
  language: he
  canonical_reference: עֲלִיּוֹן בְּמִלְחֶמֶת שִׁשֶׁת הַיָּמִים
  reference_type: cultural_reference
  surface_patterns:
