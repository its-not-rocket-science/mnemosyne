  short_explanation: Until when will the candle and the table remain? A rhetorical question expressing
    frustration or impatience with a situation that seems endless, often used in modern Hebrew.
  i18n_explanations:
    en: Until when will the candle and the table remain? A rhetorical question expressing frustration
      or impatience with a situation that seems endless, often used in modern Hebrew.
    es: ¿Hasta cuándo quedarán la vela y la mesa? Una pregunta retórica que expresa frustración o impaciencia
      con una situación que parece interminable, usada comúnmente en hebreo moderno.
    fr: Jusqu’à quand la bougie et la table resteront-elles ? Une question rhétorique exprimant frustration
      ou impatience face à une situation qui semble sans fin, souvent utilisée en hébreu moderne.
    de: Wie lange noch werden die Kerze und der Tisch stehen? Eine rhetorische Frage, die Frustration
      oder Ungeduld mit einer endlosen Situation ausdrückt, oft im modernen Hebräisch verwendet.
    it: Fino a quando resteranno la candela e la tavola? Una domanda retorica che esprime frustrazione
      o impazienza per una situazione che sembra infinita, spesso usata nell’ebraico moderno.
    pt: Até quando a vela e a mesa vão ficar? Uma pergunta retórica que expressa frustração ou impaciência
      com uma situação que parece interminável, comumente usada no hebraico moderno.
    ru: Доколе же свеча и стол будут стоять? Риторический вопрос, выражающий раздражение или нетерпение
      по поводу затянувшейся ситуации, часто используемый в современном иврите.
    ja: いつまでろうそくとテーブルは残るのか？果てしなく思える状況に対するいらだちや焦りを表す修辞疑問。現代ヘブライ語でよく使われる。
    zh: 蜡烛和餐桌要到什么时候才能停止？一种反问，表达对似乎无休止情况的挫败或不耐烦，常用于现代希伯来语。
    ar: حتى متى ستبقى الشمعة والمائدة؟ سؤال بلاغي يعبر عن الإحباط أو عدم الصبر تجاه موقف يبدو لا نهاية
      له، ويُستخدم غالبًا في العبرية الحديثة.
    he: עד מתי הנר והשולחן? שאלה רטורית המביעה תסכול או חוסר סבלנות כלפי מצב שנראה אינסופי, בשימוש נפוץ
