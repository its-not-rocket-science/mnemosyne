      Dienst als Teil des Bundes mit Gott. Es trägt theologische Bedeutung in der jüdischen Tradition
      hinsichtlich der Heiligkeit der Priesterklasse.
    it: Si riferisce al comandamento biblico che consacra i primogeniti maschi di Israele al servizio
      divino, parte dell'alleanza con Dio. Ha un significato teologico nella tradizione ebraica riguardo
      alla santità della classe sacerdotale.
    pt: Refere-se ao mandamento bíblico sobre a consagração dos primogênitos de Israel ao serviço divino,
      como parte da aliança com Deus. Tem importância teológica na tradição judaica quanto à santidade
      da classe sacerdotal.
    ru: Относится к библейской заповеди о посвящении первенцев Израиля божественному служению как части
      завета с Богом. Имеет теологическое значение в еврейской традиции в отношении святости священнического
