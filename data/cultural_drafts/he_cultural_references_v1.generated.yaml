  canonical_reference: בִּלְבַד שֶׁיְּהֵא תַּלְמִיד חָכָם נִכְנָס וּמְצִיאוּת
  reference_type: literary_reference
  surface_patterns:
  - בִּלְבַד שֶׁיְּהֵא תַּלְמִיד חָכָם נִכְנָס וּמְצִיאוּת
  - תַּלְמִיד חָכָם נִכְנָס וּמְצִיאוּת
  - בִּלְבַד שֶׁיִּהְיֶה תַּלְמִיד חָכָם נִכְנָס וּמְצִיאוּת
  short_explanation: A Talmudic phrase emphasizing that Torah study must be accompanied by practical application
    ('nitsuts' meaning 'sparks' or 'action'). It reflects the ideal of integrating wisdom with deeds.
  i18n_explanations:
    en: A Talmudic phrase emphasizing that Torah study must be accompanied by practical application ('nitsuts'
      meaning 'sparks' or 'action'). It reflects the ideal of integrating wisdom with deeds.
    es: Una frase talmúdica que enfatiza que el estudio de la Torá debe ir acompañado de aplicación práctica
      ('nitsuts', que significa 'chispas' o 'acción'). Refleja el ideal de integrar la sabiduría con las
      acciones.
    fr: Une phrase talmudique soulignant que l'étude de la Torah doit s'accompagner d'une application
      pratique ('nitsuts', signifiant 'étincelles' ou 'action'). Elle reflète l'idéal d'intégrer la sagesse
      aux actes.
    de: Ein talmudischer Ausdruck, der betont, dass das Studium der Tora von praktischer Anwendung begleitet
      sein muss ('nitsuts' bedeutet 'Funken' oder 'Handeln'). Er spiegelt das Ideal wider, Weisheit mit
      Taten zu verbinden.
    it: Una frase talmudica che sottolinea come lo studio della Torah debba essere accompagnato da un'applicazione
      pratica ('nitsuts', che significa 'scintille' o 'azione'). Riflette l'ideale di integrare la saggezza
      con le azioni.
    pt: Uma frase talmúdica que enfatiza que o estudo da Torá deve ser acompanhado de aplicação prática
      ('nitsuts', que significa 'faíscas' ou 'ação'). Reflete o ideal de integrar a sabedoria com as ações.
    ru: Талмудическое выражение, подчеркивающее, что изучение Торы должно сопровождаться практическим
      применением ('nitsuts' означает 'искры' или 'действие'). Отражает идеал соединения мудрости с делами.
    ja: タルムードの言葉で、トーラーの学びは実践的な応用（'ニツツ'は「火花」や「行動」を意味）を伴わなければならないと強調しています。知恵と行いを統合する理想を反映しています。
    zh: 一句塔木德箴言，强调研习《托拉》必须与实践应用相结合（'尼楚茨'意为'火花'或'行动'）。反映了将智慧与行为融合的理想。
    ar: عبارة تلمودية تؤكد أن دراسة التوراة يجب أن تصاحبها تطبيق عملي (نيتسوتس بمعنى 'شرارات' أو 'عمل').
      تعكس المثل العليا المتمثلة في دمج الحكمة مع الأفعال.
    he: ביטוי תלמודי המדגיש כי לימוד התורה חייב ללוות ביישום מעשי ('ניצוצות' פירושו 'ניצוצות' או 'מעשה').
      משקף את האידיאל של שילוב חוכמה עם מעשים.
