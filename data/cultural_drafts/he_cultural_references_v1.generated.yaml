    en: Do not take vengeance or bear a grudge; a biblical commandment promoting forgiveness and reconciliation
      rather than retaliation.
    es: No busques venganza ni guardes rencor; un mandamiento bíblico que promueve el perdón y la reconciliación
      en lugar de la retaliación.
    fr: Ne te venge pas et ne garde pas de rancœur ; un commandement biblique qui prône le pardon et la
      réconciliation plutôt que la vengeance.
    de: Du sollst nicht nachtragen oder Rache üben; ein biblisches Gebot, das Versöhnung und Vergebung
      statt Vergeltung fördert.
