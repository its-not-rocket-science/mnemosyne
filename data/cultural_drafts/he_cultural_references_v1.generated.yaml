  short_explanation: A phrase from modern Hebrew literature, often paired with 'אֵי שָׁם הַמִּטְחָנִים,'
    lamenting the absence of prophets in contemporary times. It reflects a cultural longing for moral
    and spiritual leadership.
  i18n_explanations:
    en: A phrase from modern Hebrew literature, often paired with 'אֵי שָׁם הַמִּטְחָנִים,' lamenting
      the absence of prophets in contemporary times. It reflects a cultural longing for moral and spiritual
      leadership.
    es: Una expresión de la literatura hebrea moderna, a menudo usada junto a 'אֵי שָׁם הַמִּטְחָנִים',
      que lamenta la ausencia de profetas en la actualidad. Refleja un anhelo cultural por liderazgo moral
      y espiritual.
    fr: Une expression de la littérature hébraïque moderne, souvent associée à 'אֵי שָׁם הַמִּטְחָנִים',
      déplorant l'absence de prophètes dans les temps contemporains. Elle reflète un désir culturel de
      leadership moral et spirituel.
    de: Ein Ausdruck der modernen hebräischen Literatur, oft in Verbindung mit 'אֵי שָׁם הַמִּטְחָנִים'
      verwendet, der das Fehlen von Propheten in der Gegenwart beklagt. Er spiegelt ein kulturelles Verlangen
      nach moralischer und spiritueller Führung wider.
    it: Un'espressione della letteratura ebraica moderna, spesso abbinata a 'אֵי שָׁם הַמִּטְחָנִים',
      che deplora l'assenza di profeti nei tempi contemporanei. Riflette un desiderio culturale di leadership
      morale e spirituale.
    pt: Uma expressão da literatura hebraica moderna, frequentemente usada junto a 'אֵי שָׁם הַמִּטְחָנִים',
      que lamenta a ausência de profetas nos tempos atuais. Reflete um anseio cultural por liderança moral
      e espiritual.
    ru: Выражение из современной еврейской литературы, часто используемое вместе с 'אֵי שָׁם הַמִּטְחָנִים',
      сожалеющее об отсутствии пророков в современную эпоху. Отражает культурное стремление к моральному
      и духовному лидерству.
    ja: 近代ヘブライ文学の表現で、「אֵי שָׁם הַמִּטְחָנִים」としばしば組み合わせて、現代における預言者の不在を嘆くものです。道徳的・精神的指導への文化的な渇望を反映しています。
    zh: 现代希伯来文学中的一个短语，常与‘אֵי שָׁם הַמִּטְחָנִים’并用，哀叹当代先知的缺失。体现了文化对道德和精神领导力的渴望。
    ar: تعبير من الأدب العبري الحديث، غالبًا ما يُستخدم مع 'אֵי שָׁם הַמִּטְחָנִים'، ويتأسف على غياب الأنبياء
      في الأزمنة المعاصرة. يعكس تطلعًا ثقافيًا للقيادة الأخلاقية والروحية.
    he: ביטוי מן הספרות העברית המודרנית, הנעשה שימושי לעיתים יחד עם 'אֵי שָׁם הַמִּטְחָנִים', המבכה את
