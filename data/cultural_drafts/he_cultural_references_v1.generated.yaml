  short_explanation: A phrase from the poem 'Eretz Israel' by Hayim Nahman Bialik, symbolizing the division
    of the heavens as a metaphor for cosmic or existential separation. Often used in modern Hebrew to
    evoke a sense of profound change.
  i18n_explanations:
    en: A phrase from the poem 'Eretz Israel' by Hayim Nahman Bialik, symbolizing the division of the
      heavens as a metaphor for cosmic or existential separation. Often used in modern Hebrew to evoke
      a sense of profound change.
    es: Una frase del poema 'Eretz Israel' de Hayim Nahman Bialik, que simboliza la división de los cielos
      como metáfora de separación cósmica o existencial. Se usa en hebreo moderno para evocar un sentido
      de cambio profundo.
    fr: Une expression du poème 'Eretz Israel' de Hayim Nahman Bialik, symbolisant la division des cieux
      comme métaphore de séparation cosmique ou existentielle. Souvent utilisée en hébreu moderne pour
      évoquer un profond changement.
    de: Ein Ausdruck aus dem Gedicht 'Eretz Israel' von Hayim Nahman Bialik, der die Teilung des Himmels
      als Metapher für kosmische oder existenzielle Trennung symbolisiert. Wird oft im modernen Hebräisch
      verwendet, um einen tiefgreifenden Wandel zu beschreiben.
    it: Un'espressione tratta dal poema 'Eretz Israel' di Hayim Nahman Bialik, che simboleggia la divisione
      dei cieli come metafora di separazione cosmica o esistenziale. Usata spesso in ebraico moderno per
      evocare un senso di cambiamento profondo.
    pt: Uma expressão do poema 'Eretz Israel' de Hayim Nahman Bialik, que simboliza a divisão dos céus
      como metáfora de separação cósmica ou existencial. Usada em hebraico moderno para evocar um senso
      de mudança profunda.
    ru: Выражение из стихотворения 'Eretz Israel' Хаима Нахмана Бялика, символизирующее разделение небес
      как метафору космического или экзистенциального разрыва. Часто используется в современном иврите
      для передачи ощущения глубоких перемен.
    ja: ハイム・ナフマン・ビアリクの詩「エレツ・イスラエル」の一節で、天の分裂を宇宙的あるいは存在的な分離のメタファーとして象徴する。現代ヘブライ語で深い変化を感じさせる際に用いられる。
    zh: 海姆·纳赫曼·比亚利克诗作《以色列之地》中的一句，将天空的分裂象征为宇宙或存在分离的隐喻。现代希伯来语中常用来表达深刻变化的感受。
    ar: عبارة من قصيدة 'ארץ ישראל' لهاييم נחמן بياليك، ترمز إلى تقسيم السماوات كاستعارة للانفصال الكوني
      أو الوجودي. تُستخدم غالبًا في العبرية الحديثة لإثارة شعور بالتغيير العميق.
    he: ביטוי מהשיר 'ארץ ישראל' של חיים נחמן ביאליק, המסמל את חלוקת השמים כמטפורה להפרדה קוסמית או קיומית.
      משמש לעיתים קרובות בעברית מודרנית כדי להעלות תחושה של שינוי עמוק.
