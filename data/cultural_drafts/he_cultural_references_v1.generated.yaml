  short_explanation: A proverb meaning that every planted tree must have roots, symbolizing that all endeavors
    require a solid foundation. It underscores the importance of preparation and grounding in Jewish thought.
  i18n_explanations:
    en: A proverb meaning that every planted tree must have roots, symbolizing that all endeavors require
      a solid foundation. It underscores the importance of preparation and grounding in Jewish thought.
    es: Un proverbio que significa que todo árbol plantado debe tener raíces, simbolizando que todos los
      esfuerzos requieren una base sólida. Subraya la importancia de la preparación y el arraigo en el
      pensamiento judío.
    fr: Un proverbe signifiant que tout arbre planté doit avoir des racines, symbolisant que toute entreprise
      nécessite une base solide. Il souligne l'importance de la préparation et de l'enracinement dans
      la pensée juive.
    de: Ein Sprichwort, das bedeutet, dass jeder gepflanzte Baum Wurzeln haben muss, was symbolisiert,
