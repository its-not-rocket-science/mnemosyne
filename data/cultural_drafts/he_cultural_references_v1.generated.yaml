      und Verwurzelung im jüdischen Denken.
    it: Un proverbio che significa che ogni albero piantato deve avere radici, simboleggiando che ogni
      impresa richiede una solida base. Sottolinea l'importanza della preparazione e dell'adesione ai
      valori nella tradizione ebraica.
    pt: Um provérbio que significa que toda árvore plantada deve ter raízes, simbolizando que todos os
      empreendimentos requerem uma base sólida. Ressalta a importância da preparação e do enraizamento
      no pensamento judaico.
    ru: Пословица, означающая, что каждое посаженное дерево должно иметь корни, символизируя, что любое
      начинание требует прочной основы. Она подчеркивает важность подготовки и укорененности в еврейской
      мысли.
    ja: 植えられた木は根を持たなければならないという意味の格言で、あらゆる取り組みにはしっかりとした基盤が必要であることを象徴しています。ユダヤ思想における準備と根付きの重要性を強調しています。
    zh: 一句谚语，意为每棵种植的树都必须有根，象征着所有事业都需要坚实的基础。它强调了在犹太思想中准备和根基的重要性。
    ar: مثل يعني أن كل شجرة مزروعة يجب أن يكون لها جذور، مما يرمز إلى أن كل مسعى يتطلب أساسًا متينًا.
