  short_explanation: The Six-Day War of June 1967, where Israel defeated Arab coalition forces, capturing
    the Sinai Peninsula, Gaza Strip, West Bank, Golan Heights, and East Jerusalem. A defining moment in
    modern Israeli history.
  i18n_explanations:
    en: The Six-Day War of June 1967, where Israel defeated Arab coalition forces, capturing the Sinai
      Peninsula, Gaza Strip, West Bank, Golan Heights, and East Jerusalem. A defining moment in modern
      Israeli history.
    es: La Guerra de los Seis Días de junio de 1967, en la que Israel derrotó a las fuerzas de la coalición
      árabe, capturando la península del Sinaí, la Franja de Gaza, Cisjordania, los Altos del Golán y
      Jerusalén Este. Un momento definitorio en la historia moderna de Israel.
    fr: La guerre des Six Jours de juin 1967, au cours de laquelle Israël a vaincu les forces de la coalition
      arabe, capturant la péninsule du Sinaï, la bande de Gaza, la Cisjordanie, le plateau du Golan et
      Jérusalem-Est. Un moment décisif de l'histoire israélienne moderne.
    de: Der Sechstagekrieg im Juni 1967, in dem Israel die arabischen Koalitionstruppen besiegte und die
      Sinai-Halbinsel, den Gazastreifen, das Westjordanland, die Golanhöhen und Ost-Jerusalem eroberte.
      Ein prägendes Ereignis der modernen israelischen Geschichte.
    it: La Guerra dei Sei Giorni del giugno 1967, in cui Israele sconfisse le forze della coalizione araba,
      conquistando la penisola del Sinai, la Striscia di Gaza, la Cisgiordania, le Alture del Golan e
      Gerusalemme Est. Un momento fondamentale nella storia moderna di Israele.
    pt: A Guerra dos Seis Dias de junho de 1967, na qual Israel derrotou as forças da coalizão árabe,
      capturando a península do Sinai, a Faixa de Gaza, a Cisjordânia, as Colinas de Golã e Jerusalém
      Oriental. Um momento definidor da história moderna de Israel.
    ru: Шестидневная война июня 1967 года, в ходе которой Израиль разгромил арабскую коалицию и захватил
      Синайский полуостров, сектор Газа, Западный берег, Голанские высоты и Восточный Иерусалим. Определяющий
      момент в современной истории Израиля.
    ja: 1967年6月の六日間戦争で、イスラエルはアラブ連合軍を破り、シナイ半島、ガザ地区、ヨルダン川西岸、ゴラン高原、東エルサレムを占領した。イスラエル近代史の画期的な出来事。
    zh: 1967年6月的六日战争中，以色列击败阿拉伯联军，占领西奈半岛、加沙地带、约旦河西岸、戈兰高地和东耶路撒冷。这是现代以色列历史的转折点。
    ar: حرب الأيام الستة في يونيو 1967، حيث هزم إسرائيل قوات التحالف العربي، واستولى على سيناء وغزة والضفة
      الغربية وهضبة الجولان والقدس الشرقية. لحظة حاسمة في التاريخ الإسرائيلي الحديث.
