  short_explanation: A Hebrew proverb meaning 'there are things that have not yet been said,' often used
    to encourage open dialogue or to acknowledge unspoken truths.
  i18n_explanations:
    en: A Hebrew proverb meaning 'there are things that have not yet been said,' often used to encourage
      open dialogue or to acknowledge unspoken truths.
    es: Un proverbio hebreo que significa 'hay cosas que aún no se han dicho', usado para fomentar el
      diálogo abierto o reconocer verdades no expresadas.
    fr: Un proverbe hébraïque signifiant 'il y a des choses qui n'ont pas encore été dites', souvent utilisé
      pour encourager le dialogue ouvert ou reconnaître des vérités non exprimées.
    de: Ein hebräisches Sprichwort, das bedeutet 'es gibt Dinge, die noch nicht gesagt wurden', oft verwendet,
      um offenen Dialog zu fördern oder unausgesprochene Wahrheiten anzuerkennen.
    it: Un proverbio ebraico che significa 'ci sono cose che non sono state ancora dette', usato per incoraggiare
      il dialogo aperto o riconoscere verità non espresse.
    pt: Um provérbio hebraico que significa 'há coisas que ainda não foram ditas', usado para incentivar
      o diálogo aberto ou reconhecer verdades não expressas.
    ru: Еврейская пословица, означающая 'есть вещи, которые ещё не были сказаны', часто используется для
      поощрения откровенного диалога или признания невысказанных истин.
    ja: ヘブライ語のことわざで、「まだ言われていないことがある」という意味で、率直な対話を促したり、言葉にされていない真実を認める際に使われる。
    zh: 一句希伯来谚语，意为“有些话还没有说出口”，常用于鼓励坦诚对话或承认未言明的真相。
    ar: مثل عبري يعني 'هناك أشياء لم تُقال بعد'، يُستخدم لتشجيع الحوار المفتوح أو الاعتراف بالحقائق غير
      المعلنة.
    he: פתגם עברי שמשמעו 'יש דברים שעדיין לא נאמרו', המשמש לעיתים קרובות לעידוד שיח פתוח או להכרה באמיתות
