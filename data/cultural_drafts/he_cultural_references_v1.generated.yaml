- id: he_proverb_tradition_ב_ל_י_כ_ת_ב_סו_פ_ר_א_ת_ה_ת_ו_ר_ה_b90a2a69
  language: he
  canonical_reference: בַּל יִכָּתֵב סוֹפֵר אֶת הַתּוֹרָה
  reference_type: proverb_tradition
  surface_patterns:
  - בַּל יִכָּתֵב סוֹפֵר אֶת הַתּוֹרָה
  - לֹא יִכָּתֵב סוֹפֵר אֶת הַתּוֹרָה
  - אֵין סוֹפֵר כּוֹתֵב אֶת הַתּוֹרָה
  short_explanation: A proverb cautioning against the act of writing the Torah, implying that the sacred
    text should not be treated lightly or altered. It reflects reverence for the Torah scroll as a holy
    object.
  i18n_explanations:
    en: A proverb cautioning against the act of writing the Torah, implying that the sacred text should
      not be treated lightly or altered. It reflects reverence for the Torah scroll as a holy object.
    es: Un proverbio que advierte contra el acto de escribir la Torá, sugiriendo que el texto sagrado
      no debe tratarse a la ligera ni alterarse. Refleja el respeto por el rollo de la Torá como objeto
      sagrado.
    fr: Un proverbe mettant en garde contre l'acte d'écrire la Torah, impliquant que le texte sacré ne
      doit pas être traité à la légère ni modifié. Il reflète le respect dû au rouleau de la Torah en
      tant qu'objet saint.
    de: Ein Sprichwort, das vor dem Schreiben der Tora warnt und impliziert, dass der heilige Text nicht
      leichtfertig behandelt oder verändert werden darf. Es spiegelt die Ehrfurcht vor der Torarolle als
      heiligem Gegenstand wider.
    it: Un proverbio che mette in guardia contro l'atto di scrivere la Torah, suggerendo che il testo
      sacro non deve essere trattato con leggerezza o alterato. Riflette il rispetto per il rotolo della
      Torah come oggetto sacro.
    pt: Um provérbio que adverte contra o ato de escrever a Torá, sugerindo que o texto sagrado não deve
      ser tratado levianamente ou alterado. Reflete o respeito pelo pergaminho da Torá como objeto sagrado.
    ru: Поговорка, предостерегающая от написания Торы, что подразумевает, что священный текст не должен
      быть легкомысленно изменен. Отражает благоговение перед свитком Торы как священным объектом.
    ja: トーラーを書き記す行為に警告を発することわざで、聖なるテキストを軽々しく扱ったり改変したりすべきでないことを示唆しています。トーラーの巻物を聖なる対象として敬う気持ちを反映しています。
    zh: 一句告诫不可书写《托拉》的谚语，暗示神圣文本不应被轻率对待或篡改。反映了对《托拉》卷轴作为圣物的崇敬。
    ar: مثل يحذر من كتابة التوراة، مما يعني أن النص المقدس لا ينبغي التعامل معه باستهتار أو تغييره. يعكس
      الاحترام للدرع التوراتي بوصفه شيئًا مقدسًا.
    he: פתגם המזהיר מפני כתיבת התורה, ומרמז שהטקסט הקדוש לא יטופל בקלות ראש או ישונה. משקף את הכבוד לספר
      התורה כאל חפץ קדוש.
