    return of the Jewish people to their homeland after the Babylonian exile. Rooted in prophecies like
    Isaiah 11:11-12.
  i18n_explanations:
    en: The biblical concept of the gathering of the exiles from Egypt, referring to the return of the
      Jewish people to their homeland after the Babylonian exile. Rooted in prophecies like Isaiah 11:11-12.
    es: El concepto bíblico de la reunión de los exiliados de Egipto, que se refiere al regreso del pueblo
      judío a su tierra natal tras el exilio babilónico. Basado en profecías como Isaías 11:11-12.
    fr: Le concept biblique de la réunion des exilés d'Égypte, désignant le retour du peuple juif dans
      sa patrie après l'exil babylonien. Fondé sur des prophéties comme Isaïe 11:11-12.
    de: Das biblische Konzept der Sammlung der Exulanten aus Ägypten, das sich auf die Rückkehr des jüdischen
      Volkes in seine Heimat nach dem babylonischen Exil bezieht. Verwurzelt in Prophezeiungen wie Jesaja
      11:11-12.
    it: Il concetto biblico della riunione degli esiliati dall'Egitto, riferito al ritorno del popolo
      ebraico nella sua terra dopo l'esilio babilonese. Radicato in profezie come Isaia 11:11-12.
    pt: O conceito bíblico da reunião dos exilados do Egito, referindo-se ao retorno do povo judeu à sua
      terra natal após o exílio babilônico. Baseado em profecias como Isaías 11:11-12.
    ru: Библейское понятие о собирании изгнанников из Египта, относящееся к возвращению еврейского народа
      на родину после вавилонского пленения. Укоренено в пророчествах, таких как Исаия 11:11-12.
    ja: エジプトからの追放者の集結という聖書の概念で、バビロン捕囚後のユダヤ人の故郷への帰還を指す。イザヤ書11:11-12などの預言に根ざす。
    zh: 圣经中“从埃及聚集被流放者”的概念，指的是巴比伦流放后犹太人返回故土。根植于《以赛亚书》11:11-12等预言。
    ar: المفهوم التوراتي لجمع المنفيين من مصر، والذي يشير إلى عودة الشعب اليهودي إلى أرضه بعد السبي البابلي.
      مستند إلى نبوءات مثل إشعياء 11:11-12.
    he: הרעיון המקראי של כינוס הגולים ממצרים, המתייחס לשיבת עם ישראל לארצו לאחר גלות בבל. מעוגן בנבואות
      כדוגמת ישעיהו יא:11-12.
