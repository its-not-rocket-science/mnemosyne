  short_explanation: Refers to the Golden Age of Jewish culture in medieval Spain (8th–15th centuries),
    marked by significant contributions to philosophy, science, and literature. It symbolizes a period
    of coexistence and cultural flourishing before the expulsion of Jews in 1492.
  i18n_explanations:
    en: Refers to the Golden Age of Jewish culture in medieval Spain (8th–15th centuries), marked by significant
      contributions to philosophy, science, and literature. It symbolizes a period of coexistence and
      cultural flourishing before the expulsion of Jews in 1492.
    es: Se refiere a la Edad de Oro de la cultura judía en la España medieval (siglos VIII–XV), marcada
      por importantes contribuciones a la filosofía, la ciencia y la literatura. Simboliza un período
      de convivencia y florecimiento cultural antes de la expulsión de los judíos en 1492.
    fr: Fait référence à l'âge d'or de la culture juive en Espagne médiévale (VIIIe–XVe siècles), marqué
      par d'importantes contributions à la philosophie, aux sciences et à la littérature. Il symbolise
      une période de coexistence et d'épanouissement culturel avant l'expulsion des Juifs en 1492.
    de: Bezieht sich auf das Goldene Zeitalter der jüdischen Kultur im mittelalterlichen Spanien (8.–15.
      Jahrhundert), das durch bedeutende Beiträge zur Philosophie, Wissenschaft und Literatur geprägt
      war. Es symbolisiert eine Phase des Zusammenlebens und kulturellen Aufblühens vor der Vertreibung
      der Juden 1492.
    it: Si riferisce all'età dell'oro della cultura ebraica nella Spagna medievale (secoli VIII–XV), segnata
      da importanti contributi alla filosofia, alla scienza e alla letteratura. Simboleggia un periodo
      di convivenza e fioritura culturale prima dell'espulsione degli ebrei nel 1492.
    pt: Refere-se à Idade de Ouro da cultura judaica na Espanha medieval (séculos VIII–XV), marcada por
      contribuições significativas à filosofia, ciência e literatura. Simboliza um período de coexistência
      e florescimento cultural antes da expulsão dos judeus em 1492.
    ru: Относится к Золотому веку еврейской культуры в средневековой Испании (VIII–XV века), отмеченному
      значительным вкладом в философию, науку и литературу. Символизирует период сосуществования и культурного
      расцвета перед изгнанием евреев в 1492 году.
    ja: 8世紀から15世紀にかけてのスペインにおけるユダヤ文化の黄金時代を指し、哲学、科学、文学への多大な貢献で知られる。1492年のユダヤ人追放前の共存と文化的繁栄の時代を象徴する。
    zh: 指的是中世纪西班牙（8至15世纪）的犹太文化黄金时代，在哲学、科学和文学领域做出了重大贡献。它象征着1492年犹太人被驱逐前的共存与文化繁荣时期。
    ar: يشير إلى العصر الذهبي للثقافة اليهودية في إسبانيا في العصور الوسطى (القرن الثامن إلى الخامس عشر)،
      والذي تميز بمساهمات كبيرة في الفلسفة والعلوم والأدب. يرمز إلى فترة من التعايش والازدهار الثقافي
      قبل طرد اليهود في عام 1492.
    he: מתייחס לתור הזהב של התרבות היהודית בספרד בימי הביניים (מאות 8–15), אשר התאפיין בתרומות משמעותיות
      לפילוסופיה, למדע ולספרות. מסמל תקופה של חיים משותפים ופריחה תרבותית לפני גירוש היהודים ב-1492.
