- id: he_literary_reference_א_י_ש_ם_ה_נ_ב_יא_ים_8a1d957d
  language: he
  canonical_reference: אֵי שָׁם הַנְּבִיאִים
  reference_type: literary_reference
  surface_patterns:
  - אֵי שָׁם הַנְּבִיאִים
  - אֵי שָׁם נְבִיאִים
  - אֵי שָׁם הַנְּבִיאִים הַלָּלוּ
  short_explanation: A rhetorical question expressing skepticism about the existence or presence of prophets
    in a given context. Often used to question authority or the presence of moral guidance.
  i18n_explanations:
    en: A rhetorical question expressing skepticism about the existence or presence of prophets in a given
      context. Often used to question authority or the presence of moral guidance.
    es: Pregunta retórica que expresa escepticismo sobre la existencia o presencia de profetas en un contexto
      determinado. Suele usarse para cuestionar la autoridad o la guía moral.
    fr: Question rhétorique exprimant le scepticisme quant à l'existence ou à la présence de prophètes
      dans un contexte donné. Souvent utilisée pour remettre en cause l'autorité ou la présence d'un guide
      moral.
    de: Eine rhetorische Frage, die den Zweifel an der Existenz oder Gegenwart von Propheten in einem
      bestimmten Kontext ausdrückt. Wird oft verwendet, um Autorität oder moralische Führung infrage zu
      stellen.
    it: Una domanda retorica che esprime scetticismo sull'esistenza o presenza di profeti in un dato contesto.
      Spesso usata per mettere in discussione l'autorità o la guida morale.
    pt: Uma pergunta retórica que expressa ceticismo sobre a existência ou presença de profetas em um
      dado contexto. Geralmente usada para questionar autoridade ou orientação moral.
