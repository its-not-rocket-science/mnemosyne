      invece della ritorsione.
    pt: Não te vingues nem guardes rancor; um mandamento bíblico que promove o perdão e a reconciliação
      em vez da retaliação.
    ru: Не мсти и не имей злобы; библейская заповедь, призывающая к прощению и примирению, а не к мести.
    ja: 復讐してはならず、恨みを抱いてはならない。聖書の戒めであり、報復よりも許しと和解を促す。
    zh: 不可报复，也不可怀恨；圣经戒律，倡导宽恕与和解而非报复。
    ar: لا تنتقم ولا تحقد. وصية توراتية تدعو إلى المسامحة والمصالحة بدلاً من الانتقام.
    he: לא תקם ולא תטור. מצווה מקראית הקוראת לסליחה ולפיוס במקום נקמה.
