    ja: ソロモンに与えられた神の知恵と、彼が箴言（ミシュレー）の作者であることを指し、道徳的・実践的知恵の賢王であり教師としての役割を強調しています。
    zh: 指上帝赐予所罗门的智慧及其所著《箴言》（米示利）的作者身份，强调其作为智慧君王及道德与实践智慧导师的角色。
    ar: يشير إلى الحكمة الإلهية التي منحها الله لسليمان، وإلى تأليفه لسفر الأمثال (ميشلي)، مع تسليط الضوء
