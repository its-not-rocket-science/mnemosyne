- id: he_cultural_reference_ה_מ_ל_ח_מ_ה_ל_ש_ח_רו_ר_ה_ג_ל_יל_12bab9a8
  language: he
  canonical_reference: הַמִּלְחָמָה לְשִׁחְרוּר הַגָּלִיל
  reference_type: cultural_reference
  surface_patterns:
