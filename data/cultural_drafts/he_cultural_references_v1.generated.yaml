- id: he_proverb_tradition_א_ין_מ_ע_ש_ה_ע_ד_ה_כ_ל_b4fd31ac
  language: he
  canonical_reference: אֵין מַעֲשֶׂה עַד הַכֹּל
  reference_type: proverb_tradition
  surface_patterns:
