  short_explanation: Refers to David Ben-Gurion's vision and efforts to develop the Negev Desert, symbolizing
    Israel's pioneering spirit and commitment to making the desert bloom. It reflects the Zionist ideal
    of transforming barren land into productive territory.
  i18n_explanations:
    en: Refers to David Ben-Gurion's vision and efforts to develop the Negev Desert, symbolizing Israel's
      pioneering spirit and commitment to making the desert bloom. It reflects the Zionist ideal of transforming
      barren land into productive territory.
    es: Se refiere a la visión y esfuerzos de David Ben-Gurion para desarrollar el desierto del Néguev,
      simbolizando el espíritu pionero de Israel y su compromiso de hacer florecer el desierto. Refleja
      el ideal sionista de transformar tierras áridas en territorios productivos.
    fr: Fait référence à la vision et aux efforts de David Ben-Gurion pour développer le désert du Néguev,
      symbolisant l'esprit pionnier d'Israël et son engagement à faire fleurir le désert. Il reflète l'idéal
      sioniste de transformer des terres arides en territoires productifs.
    de: Bezieht sich auf die Vision und die Bemühungen von David Ben-Gurion, die Wüste Negev zu entwickeln,
      was den Pioniergeist Israels und sein Engagement symbolisiert, die Wüste erblühen zu lassen. Es
      spiegelt das zionistische Ideal wider, unfruchtbares Land in produktives Gebiet zu verwandeln.
    it: Si riferisce alla visione e agli sforzi di David Ben-Gurion per sviluppare il deserto del Negev,
      simboleggiando lo spirito pionieristico di Israele e il suo impegno a far fiorire il deserto. Riflette
      l'ideale sionista di trasformare terre aride in territori produttivi.
    pt: Refere-se à visão e aos esforços de David Ben-Gurion para desenvolver o deserto do Neguev, simbolizando
      o espírito pioneiro de Israel e seu compromisso de fazer o deserto florescer. Reflete o ideal sionista
      de transformar terras áridas em territórios produtivos.
    ru: Относится к видению и усилиям Давида Бен-Гуриона по развитию пустыни Негев, символизируя дух первопроходцев
      Израиля и стремление превратить пустыню в цветущую территорию. Отражает сионистский идеал преобразования
      бесплодных земель в продуктивные территории.
    ja: イスラエルの先駆的精神と砂漠を花開かせるという決意を象徴する、ダビデ・ベン＝グリオンによるネゲヴ砂漠開発のビジョンと努力を指す。これは、不毛の地を生産的な領域に変えるというシオニストの理想を反映している。
    zh: 指的是大卫·本-古里安开发内盖夫沙漠的愿景与努力，象征着以色列的开拓精神及将沙漠变绿洲的承诺。它体现了将荒地变为生产性领土的犹太复国主义理想。
    ar: يشير إلى رؤية ودافيد بن غوريون لتطوير صحراء النقب، مما يرمز إلى الروح الرائدة لإسرائيل والتزامها
      بجعل الصحراء تزدهر. يعكس المثل الأعلى الصهيوني المتمثل في تحويل الأراضي القاحلة إلى مناطق منتجة.
    he: מתייחס לחזונו ומאמציו של דוד בן-גוריון לפתח את הנגב, המסמלים את רוח החלוציות של ישראל ומחויבותה
      להפוך את המדבר לפרח. משקף את האידיאל הציוני להפוך אדמה צחיחה לשטחים פוריים.
