- id: he_literary_reference_ב_י_מ_ים_ה_ה_ם_א_ין_כ_ה_ן_ו_א_ין_ש_ו_ט_ר_b9014050
  language: he
  canonical_reference: בַּיָּמִים הָהֵם אֵין כֵּהֵן וְאֵין שׁוֹטֵר
  reference_type: literary_reference
  surface_patterns:
  - בַּיָּמִים הָהֵם אֵין כֵּהֵן וְאֵין שׁוֹטֵר
  - בַּיָּמִים הָהֵם לֹא הָיָה כֹּהֵן וְלֹא שׁוֹטֵר
  - בַּיָּמִים הָהֵם אֵין כֹּהֵן וְאֵין שׁוֹטֵר
  short_explanation: A phrase from the Book of Judges describing a period of spiritual and political decline
    in Israel, where there was no priest (kohen) to guide religious life and no leader (shotar) to enforce
    justice.
  i18n_explanations:
    en: A phrase from the Book of Judges describing a period of spiritual and political decline in Israel,
      where there was no priest (kohen) to guide religious life and no leader (shotar) to enforce justice.
    es: Una frase del Libro de los Jueces que describe un período de declive espiritual y político en
      Israel, donde no había sacerdote (kohen) que guiara la vida religiosa ni líder (shotar) que hiciera
      cumplir la justicia.
    fr: Une phrase du Livre des Juges décrivant une période de déclin spirituel et politique en Israël,
      où il n'y avait ni prêtre (kohen) pour guider la vie religieuse ni dirigeant (shotar) pour faire
      respecter la justice.
    de: Ein Satz aus dem Buch der Richter, der eine Zeit des geistigen und politischen Niedergangs in
      Israel beschreibt, in der es weder einen Priester (Kohen) gab, der das religiöse Leben leitete,
      noch einen Anführer (Shotar), der Gerechtigkeit durchsetzte.
    it: Una frase del Libro dei Giudici che descrive un periodo di declino spirituale e politico in Israele,
      in cui non c'era un sacerdote (kohen) a guidare la vita religiosa né un leader (shotar) a far rispettare
      la giustizia.
    pt: Uma frase do Livro dos Juízes que descreve um período de declínio espiritual e político em Israel,
      onde não havia sacerdote (kohen) para guiar a vida religiosa nem líder (shotar) para fazer cumprir
      a justiça.
    ru: Фраза из Книги Судей, описывающая период духовного и политического упадка в Израиле, когда не
      было священника (коhен), чтобы наставлять в религиозной жизни, и не было лидера (шотар), чтобы обеспечивать
      справедливость.
    ja: 士師記の言葉で、イスラエルにおける精神的・政治的衰退の時代を描写しています。そこには宗教生活を導く祭司（コーヘン）も、正義を執行する指導者（ショーター）もいませんでした。
    zh: 《士师记》中的一句话，描述了以色列在精神和政治上衰落的时期，当时没有祭司（Kohen）引导宗教生活，也没有领袖（Shotar）执行正义。
    ar: عبارة من سفر القضاة تصف فترة من الانحطاط الروحي والسياسي في إسرائيل، حيث لم يكن هناك كاهن (كوهين)
      يرشد الحياة الدينية ولا قائد (شوتار) يفرض العدل.
    he: ביטוי מספר שופטים המתאר תקופה של שקיעה רוחנית ופוליטית בישראל, שבה לא היה כהן להדריך את החיים
      הדתיים ולא שוטר לאכוף צדק.
