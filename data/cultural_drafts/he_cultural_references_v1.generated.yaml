      положения.
    ja: 戦略的または中心的な位置を表す表現で、文字通り「家の中心の位置」。現代ヘブライ語では比喩的に重要な役割や中核的な地位を指す際に用いられる。
    zh: 形容战略性或中心位置的短语，字面义为“房子中心的位置”。现代希伯来语中常用作比喻，表示关键角色或核心地位。
