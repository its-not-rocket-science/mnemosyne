      de la casa'. Se usa metafóricamente en hebreo moderno para denotar un papel clave o una posición
      crucial.
    fr: Expression désignant une position stratégique ou centrale, littéralement 'une position au cœur
      de la maison'. Utilisée métaphoriquement en hébreu moderne pour évoquer un rôle clé ou une position
      pivot.
