  short_explanation: Humans do not live by bread alone; emphasizes that spiritual and moral sustenance
    is as vital as physical nourishment. The phrase originates from a biblical verse about divine provision.
  i18n_explanations:
    en: Humans do not live by bread alone; emphasizes that spiritual and moral sustenance is as vital
      as physical nourishment. The phrase originates from a biblical verse about divine provision.
    es: El ser humano no vive solo de pan; destaca que el sustento espiritual y moral es tan vital como
      el físico. La frase proviene de un versículo bíblico sobre la provisión divina.
    fr: L’homme ne vit pas seulement de pain ; cela souligne que la nourriture spirituelle et morale est
      aussi vitale que la nourriture physique. La phrase vient d’un verset biblique sur la providence
      divine.
    de: Der Mensch lebt nicht vom Brot allein; es betont, dass geistige und moralische Nahrung ebenso
      lebensnotwendig ist wie die körperliche. Der Ausdruck stammt aus einem biblischen Vers über göttliche
      Versorgung.
    it: L’uomo non vive di solo pane; sottolinea che il sostentamento spirituale e morale è altrettanto
      vitale di quello fisico. La frase proviene da un versetto biblico sulla provvidenza divina.
    pt: O homem não vive só de pão; destaca que o sustento espiritual e moral é tão vital quanto o físico.
      A frase vem de um versículo bíblico sobre provisão divina.
    ru: Не хлебом единым жив человек; подчеркивает, что духовная и нравственная пища не менее важна, чем
      физическая. Фраза восходит к библейскому стиху о божественном провидении.
    ja: 人はパンのみにて生きるに非ず。霊的・道徳的な糧が、肉体的な糧と同じく不可欠であることを強調する。この言葉は、神の恵みについての聖書の一節に由来する。
    zh: 人不单靠食物生活；强调精神和道德的滋养与物质营养同样重要。此语出自圣经中关于神圣供应的经文。
    ar: ليس الإنسان بحياته على الخبز وحده، بل على كل كلمة تخرج من فم الله. تؤكد على أن الغذاء الروحي والأخلاقي同样
      مهم كالغذاء الجسدي، وتأتي من آية في الكتاب المقدس عن العناية الإلهية.
    he: לא על הלחם לבדו יחיה האדם; מדגישה כי המזון הרוחני והמוסרי חשוב באותה מידה כמו המזון הגופני. הביטוי
      מקורו בפסוק מקראי על ההשגחה האלוהית.
