      divina.
    fr: Désigne la capacité d'Agni à incarner ou 'porter' le feu, symbolisant son rôle de porteur d'offrandes
      sacrificielles aux dieux. Représente le lien sacré entre le feu et la communication divine.
    de: Bezeichnet Agnis Fähigkeit, Feuer zu verkörpern oder zu 'tragen', was seine Rolle als Überbringer
      von Opfergaben an die Götter symbolisiert. Steht für die heilige Verbindung zwischen Feuer und göttlicher
      Kommunikation.
    it: Indica la capacità di Agni di incarnare o 'portare' il fuoco, simboleggiando il suo ruolo di portatore
      di offerte sacrificali agli dei. Rappresenta il legame sacro tra fuoco e comunicazione divina.
    pt: Denota a capacidade de Agni de encarnar ou 'sustentar' o fogo, simbolizando seu papel como portador
      de oferendas sacrificiais aos deuses. Representa a conexão sagrada entre o fogo e a comunicação
      divina.
    ru: Обозначает способность Агни воплощать или 'держать' огонь, символизируя его роль как посредника
