- id: hi_proverb_tradition_ट_ट_द_ल_न_ट_ट_दम_2d807dfb
  language: hi
  canonical_reference: टूटा दिल न टूटा दम
  reference_type: proverb_tradition
  surface_patterns:
  - टूटा दिल न टूटा दम
  - टूटा दिल न टूटा दम है
  - टूटा दिल न टूटा दम वाली बात
  short_explanation: A phrase expressing resilience or perseverance despite emotional or physical hardship.
    It metaphorically suggests that even if one's heart is broken, one's spirit remains unbroken.
  i18n_explanations:
    en: A phrase expressing resilience or perseverance despite emotional or physical hardship. It metaphorically
      suggests that even if one's heart is broken, one's spirit remains unbroken.
    es: Frase que expresa resiliencia o perseverancia ante el sufrimiento emocional o físico. Metafóricamente
      sugiere que, aunque el corazón esté roto, el espíritu permanece intacto.
    fr: Une expression exprimant la résilience ou la persévérance face à l'adversité émotionnelle ou physique.
      Métaphoriquement, même si le cœur est brisé, l'esprit reste intact.
    de: 'Ein Ausdruck, der Widerstandsfähigkeit oder Durchhaltevermögen trotz emotionaler oder körperlicher
      Härte beschreibt. Metaphorisch bedeutet es: Selbst wenn das Herz gebrochen ist, bleibt der Geist
      ungebrochen.'
    it: Un'espressione che indica resilienza o perseveranza nonostante le avversità emotive o fisiche.
      Metaforicamente suggerisce che, anche se il cuore è spezzato, lo spirito rimane intatto.
    pt: Uma expressão que expressa resiliência ou perseverança apesar de dificuldades emocionais ou físicas.
      Metaforicamente, mesmo com o coração partido, o espírito permanece inquebrantável.
    ru: 'Выражение, передающее стойкость или упорство перед лицом эмоциональных или физических трудностей.
      Метафорически: даже если сердце разбито, дух остаётся непоколебимым.'
    ja: 心身の苦難にも屈しない強さや忍耐を表す言葉。たとえ心が傷ついても、精神は折れないというたとえ。
    zh: 表达在情感或身体困境中坚韧不拔的短语。比喻即使心碎，精神依然不屈。
    ar: عبارة تعبر عن الصلابة أو المثابرة رغم المعاناة العاطفية أو الجسدية. مجازياً، حتى لو تحطم القلب،
      يبقى الروح قوياً.
    he: 'ביטוי המביע חוסן או התמדה למרות קשיים רגשיים או גופניים. מטפורית: גם אם הלב שבור, הרוח נותרת
      שלמה.'
