  - तोता रटता है
  short_explanation: A phrase from medieval Hindi literature, often attributed to the poet Tulsidas, meaning
    'the parrot is reciting by rote.' It refers to rote learning without understanding, often used to
    criticize superficial knowledge.
  i18n_explanations:
    en: A phrase from medieval Hindi literature, often attributed to the poet Tulsidas, meaning 'the parrot
      is reciting by rote.' It refers to rote learning without understanding, often used to criticize
      superficial knowledge.
    es: Frase de la literatura hindi medieval, atribuida al poeta Tulsidas, que significa 'el loro recita
      de memoria'. Se refiere al aprendizaje memorístico sin comprensión, usado para criticar el conocimiento
      superficial.
    fr: Une expression de la littérature hindi médiévale, souvent attribuée au poète Tulsidas, signifiant
      'le perroquet récite par cœur'. Elle désigne l'apprentissage par cœur sans compréhension, souvent
      utilisé pour critiquer le savoir superficiel.
    de: Ein Ausdruck aus der mittelalterlichen Hindi-Literatur, oft dem Dichter Tulsidas zugeschrieben,
      der 'der Papagei rezitiert auswendig' bedeutet. Bezieht sich auf das Auswendiglernen ohne Verständnis,
      oft zur Kritik an oberflächlichem Wissen verwendet.
    it: Un'espressione della letteratura hindi medievale, spesso attribuita al poeta Tulsidas, che significa
      'il pappagallo recita a memoria'. Si riferisce all'apprendimento mnemonico senza comprensione, usato
      per criticare la conoscenza superficiale.
    pt: Expressão da literatura hindi medieval, frequentemente atribuída ao poeta Tulsidas, que significa
      'o papagaio repete de cor'. Refere-se ao aprendizado mecânico sem compreensão, usado para criticar
      o conhecimento superficial.
    ru: Выражение из средневековой литературы на хинди, часто приписываемое поэту Тулсидасу, означающее
      'попугай повторяет наизусть'. Относится к механическому заучиванию без понимания, часто используется
      для критики поверхностных знаний.
    ja: 中世ヒンディー文学に由来する表現で、しばしば詩人トゥルシーダスに帰せられる「オウムが暗唱する」という意味。理解なしの丸暗記を指し、表面的な知識を批判する際に用いられる。
    zh: 中世纪印地语文学中的短语，常被归于诗人杜尔西达斯，意为“鹦鹉背诵”。指机械记忆而无理解的学习，常用于批评肤浅的知识。
    ar: عبارة من الأدب الهندي الوسيط، غالبًا ما تُنسب للشاعر تولسيداس، وتعني 'الببغاء يردد من الذاكرة'.
