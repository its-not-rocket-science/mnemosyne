- id: hi_literary_reference_ठन_ठन_ग_प_ल_8e059705
  language: hi
  canonical_reference: ठन-ठन गोपाल
  reference_type: literary_reference
  surface_patterns:
  - ठन-ठन गोपाल
  - ठन ठन गोपाल
  - ठन-ठन गोपाल बजे
  short_explanation: A phrase from the devotional poetry of Kabir, referring to the sound of the anklets
    worn by Lord Krishna (Gopal) during his playful dances (Raas Leela). Symbolizes divine joy and devotion.
  i18n_explanations:
    en: A phrase from the devotional poetry of Kabir, referring to the sound of the anklets worn by Lord
      Krishna (Gopal) during his playful dances (Raas Leela). Symbolizes divine joy and devotion.
    es: Frase de la poesía devocional de Kabir que alude al sonido de los cascabeles que lleva el Señor
      Krishna (Gopal) durante sus danzas juguetonas (Raas Leela). Simboliza la alegría y devoción divina.
    fr: Une expression tirée de la poésie dévotionnelle de Kabir, évoquant le son des clochettes portées
      par le Seigneur Krishna (Gopal) lors de ses danses ludiques (Raas Leela). Symbolise la joie et la
      dévotion divine.
    de: Ein Ausdruck aus der devotionalen Dichtung Kabirs, der das Klingeln der Fußglöckchen beschreibt,
      die Lord Krishna (Gopal) während seiner spielerischen Tänze (Raas Leela) trägt. Symbolisiert göttliche
      Freude und Hingabe.
    it: Un'espressione tratta dalla poesia devota di Kabir, che si riferisce al suono dei sonagli indossati
      da Lord Krishna (Gopal) durante le sue danze giocose (Raas Leela). Simboleggia la gioia e la devozione
      divina.
    pt: Expressão da poesia devocional de Kabir, referindo-se ao som dos guizos usados por Lord Krishna
      (Gopal) durante suas danças lúdicas (Raas Leela). Simboliza a alegria e devoção divinas.
    ru: Выражение из поэзии Кабира, описывающее звон колокольчиков, которые носил Господь Кришна (Гопал)
      во время своих игривых танцев (Рас Лила). Символизирует божественную радость и преданность.
    ja: カビールの詩に由来する表現で、神クリシュナ（ゴーパール）が遊戯の踊り（ラース・リーラー）で身に着ける足首の鈴の音を指す。神聖な喜びと献身を象徴する。
    zh: 卡比尔的诗歌中提到的短语，指的是克里希纳（戈帕尔）在其嬉戏舞蹈（罗萨利拉）时佩戴的脚环发出的声音。象征着神圣的喜悦与虔诚。
    ar: عبارة من شعر كابير Devotional، تشير إلى صوت الخلخال الذي يلبسه اللورد كريشنا (جوبال) أثناء رقصاته
      المرحة (راس لييلا). ترمز إلى الفرح الإلهي والتفاني.
    he: ביטוי משירת הקודש של קאביר, המתייחס לצלצול הפעמונים שנענדו על ידי האל קרישנה (גופאל) במהלך ריקודיו
      השובבים (ראס לילה). מסמל שמחה אלוהית ו devotion.
