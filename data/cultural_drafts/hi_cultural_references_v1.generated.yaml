- id: hi_proverb_tradition_न_स_च_ह_ख_य_ब_ल_ल_हज_क_चल_bea7868c
  language: hi
  canonical_reference: नौ सौ चूहे खाय बिल्ली हज को चली
  reference_type: proverb_tradition
  surface_patterns:
  - नौ सौ चूहे खाय बिल्ली हज को चली
  - नौ सौ चूहे खाकर बिल्ली हज को चली
  - नौ सौ चूहे खाकर हज को चली
  short_explanation: A proverb criticizing hypocrisy, where someone who has done wrong (e.g., eaten hundreds
    of mice) still seeks religious merit (e.g., going on Hajj). It highlights the absurdity of expecting
    redemption without change.
  i18n_explanations:
    en: A proverb criticizing hypocrisy, where someone who has done wrong (e.g., eaten hundreds of mice)
      still seeks religious merit (e.g., going on Hajj). It highlights the absurdity of expecting redemption
      without change.
    es: Un refrán que critica la hipocresía, donde alguien que ha hecho el mal (por ejemplo, comido cientos
      de ratones) aún busca mérito religioso (por ejemplo, ir a La Meca). Destaca lo absurdo de esperar
      redención sin cambiar.
    fr: Un proverbe critiquant l'hypocrisie, où quelqu'un qui a mal agi (par exemple, mangé des centaines
      de souris) cherche encore un mérite religieux (par exemple, partir en pèlerinage à La Mecque). Il
      souligne l'absurdité d'attendre une rédemption sans changement.
    de: Ein Sprichwort, das Heuchelei kritisiert, bei dem jemand, der Unrecht getan hat (z. B. hundert
      Mäuse gefressen hat), trotzdem religiöses Verdienst sucht (z. B. nach Mekka pilgert). Es zeigt die
      Absurdität, Erlösung ohne Veränderung zu erwarten.
    it: Un proverbio che critica l'ipocrisia, in cui qualcuno che ha fatto del male (ad esempio, mangiato
      centinaia di topi) cerca ancora un merito religioso (ad esempio, andare in pellegrinaggio alla Mecca).
      Evidenzia l'assurdità di aspettarsi redenzione senza cambiamento.
    pt: Um provérbio que critica a hipocrisia, onde alguém que fez o mal (por exemplo, comeu centenas
      de ratos) ainda busca mérito religioso (por exemplo, ir em peregrinação a Meca). Ressalta a absurdidade
      de esperar redenção sem mudança.
    ru: Поговорка, осуждающая лицемерие, где тот, кто совершил зло (например, съел сотни мышей), всё равно
      стремится к религиозным заслугам (например, отправиться в хадж). Подчёркивает абсурдность ожидания
      искупления без перемен.
    ja: 偽善を批判することわざで、悪事を働いた者（例えばネズミを何百匹も食べた猫）がそれでも宗教的な功徳（例えばメッカ巡礼）を求める。変わることなく赦しを期待する absurdity（不条理）を示す。
    zh: 批评伪善的谚语，指做过坏事的人（如吃了数百只老鼠的猫）仍试图追求宗教功德（如去麦加朝圣）。强调期待救赎而不改变的荒谬。
    ar: مثل ينتقد النفاق، حيث يقوم شخص ما بفعل الشر (مثل أكل مئات الفئران) ثم يسعى إلى فضل ديني (مثل الذهاب
      إلى الحج). يسلط الضوء على عبثية توقع الخلاص دون تغيير.
    he: פתגם המבקר צביעות, שבו אדם שעשה מעשים רעים (למשל, אכל מאות עכברים) עדיין מבקש זכות דתית (למשל,
      לעלות לרגל למכה). מדגיש את האבסורד שבקבלת כפרה ללא שינוי.
