  i18n_explanations:
    en: A proverb meaning 'In a group of blind people, the one with partial sight is king.' It signifies
      that in a deficient group, even a mediocre person appears superior.
    es: Un refrán que significa 'Entre ciegos, el tuerto es rey.' Significa que en un grupo deficiente,
      incluso una persona mediocre parece superior.
    fr: Un proverbe signifiant 'Parmi les aveugles, le borgne est roi.' Il signifie que dans un groupe
      défaillant, même une personne médiocre semble supérieure.
    de: Ein Sprichwort mit der Bedeutung 'Unter Blinden ist der Einäugige König.' Es bedeutet, dass in
      einer mangelhaften Gruppe selbst eine mittelmäßige Person überlegen wirkt.
