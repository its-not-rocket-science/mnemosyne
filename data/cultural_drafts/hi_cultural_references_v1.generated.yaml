      escasez.
    fr: Un proverbe signifiant 'seulement trois feuilles de l'arbre dhak', désignant quelque chose de
      peu de valeur ou de substance malgré les apparences. L'arbre dhak n'a que trois feuilles par branche,
      symbolisant la rareté.
    de: Ein Sprichwort, das 'nur drei Blätter des Dhak-Baums' bedeutet und etwas bezeichnet, das trotz
      seines Aussehens wenig Wert oder Substanz hat. Der Dhak-Baum hat nur drei Blätter pro Zweig, was
      Knappheit symbolisiert.
    it: Un proverbio che significa 'solo tre foglie dell'albero dhak', implicando qualcosa di scarso valore
