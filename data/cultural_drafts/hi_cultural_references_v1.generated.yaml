    pt: Os éditos do imperador Ashoka gravados em pilares e rochas, que promovem uma governança moral
      e a não violência, são textos fundamentais na história indiana e no budismo.
    ru: Указы императора Ашоки, высеченные на колоннах и скалах и проповедующие нравственное правление
      и ненасилие, являются основополагающими текстами в истории Индии и буддизма.
    ja: アショーカ王の石柱碑文は、倫理的な統治と非暴力を説き、インドの歴史と仏教の基礎となる重要な文献である。
    zh: 阿育王在石柱和岩石上刻写的诏书，倡导道德治理与非暴力，是印度历史和佛教的基础文献。
    ar: مراسيم الإمبراطور أشوكا المنقوشة على الأعمدة والصخور، والتي تعزز الحكم الأخلاقي واللاعنف، هي نصوص
