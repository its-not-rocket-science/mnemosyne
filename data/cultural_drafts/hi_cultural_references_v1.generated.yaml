      entre lo que la gente dice y lo que realmente hace, usado para criticar la hipocresía.
    fr: Un proverbe signifiant 'les actes valent mieux que les paroles', faisant référence à l'écart entre
      ce que les gens disent et ce qu'ils font réellement, souvent utilisé pour critiquer l'hypocrisie.
