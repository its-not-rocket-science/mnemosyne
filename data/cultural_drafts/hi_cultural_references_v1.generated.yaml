- id: hi_proverb_tradition_क_ल_अक_षर_भ_स_बर_बर_f8059156
  language: hi
  canonical_reference: काला अक्षर भैंस बराबर
  reference_type: proverb_tradition
  surface_patterns:
  - काला अक्षर भैंस बराबर
  - काला अक्षर भैंस के बराबर
  short_explanation: Used to describe someone who is completely illiterate, comparing their inability
    to read even a single letter to the size of a buffalo. Highlights extreme ignorance.
  i18n_explanations:
    en: Used to describe someone who is completely illiterate, comparing their inability to read even
      a single letter to the size of a buffalo. Highlights extreme ignorance.
    es: Se usa para describir a alguien completamente analfabeto, comparando su incapacidad para leer
      incluso una sola letra con el tamaño de un búfalo. Destaca la ignorancia extrema.
    fr: S'emploie pour décrire quelqu'un d'entièrement analphabète, comparant son incapacité à lire même
      une seule lettre à la taille d'un buffle. Met en évidence une ignorance extrême.
    de: Wird verwendet, um jemanden zu beschreiben, der völlig analphabetisch ist, indem seine Unfähigkeit,
      auch nur einen einzigen Buchstaben zu lesen, mit der Größe eines Büffels verglichen wird. Hebt extreme
      Unwissenheit hervor.
    it: Si usa per descrivere qualcuno completamente analfabeta, paragonando la sua incapacità di leggere
      anche una sola lettera alle dimensioni di un bufalo. Evidenzia un'ignoranza estrema.
    pt: É usado para descrever alguém completamente analfabeto, comparando sua incapacidade de ler até
      mesmo uma única letra ao tamanho de um búfalo. Destaca a ignorância extrema.
    ru: Используется для описания человека, который абсолютно неграмотен, сравнивая его неспособность
      прочитать даже одну букву с размером буйвола. Подчеркивает крайнюю безграмотность.
    ja: 完全な文盲を表す際に使われ、文字を読めないことが水牛ほどの大きさにたとえられる。極端な無知を強調する表現。
    zh: 用来形容完全文盲的人，将其连一个字都不认得比作水牛般大小。强调极度无知。
    ar: يستخدم لوصف شخص完全 أمي، بمقارنة عدم قدرته على قراءة حتى حرف واحد بحجم جاموس. يبرز الجهل الشديد.
    he: משמש לתיאור אדם שאינו יודע קרוא וכתוב כלל, תוך השוואת חוסר יכולתו לקרוא אפילו אות אחת לגודלו של
      תאו. מדגיש בורות קיצונית.
