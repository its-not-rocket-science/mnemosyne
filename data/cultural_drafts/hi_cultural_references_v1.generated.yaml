- id: hi_literary_reference_वह_पथब_ध_थ_a30a8801
  language: hi
  canonical_reference: वह पथबंधु था
  reference_type: literary_reference
  surface_patterns:
  - वह पथबंधु था
  - पथबंधु
  - पथबंधु के रूप में
  short_explanation: A phrase from the Hindi epic 'Ramcharitmanas' by Tulsidas, where 'पथबंधु' (pathbandhu)
    means 'a friend on the path' or 'a guide.' It is often used to describe someone who is a true companion
    or guide in life's journey.
  i18n_explanations:
    en: A phrase from the Hindi epic 'Ramcharitmanas' by Tulsidas, where 'पथबंधु' (pathbandhu) means 'a
      friend on the path' or 'a guide.' It is often used to describe someone who is a true companion or
      guide in life's journey.
    es: Frase del poema épico hindi 'Ramcharitmanas' de Tulsidas, donde 'पथबंधु' (pathbandhu) significa
      'un amigo en el camino' o 'guía'. Se usa para describir a alguien que es un verdadero compañero
      o guía en el viaje de la vida.
    fr: Expression tirée de l'épopée hindi 'Ramcharitmanas' de Tulsidas, où 'पथबंधु' (pathbandhu) signifie
      'un ami sur le chemin' ou 'un guide'. Elle est souvent utilisée pour décrire quelqu'un qui est un
      vrai compagnon ou guide dans le voyage de la vie.
    de: Ein Ausdruck aus dem Hindi-Epos 'Ramcharitmanas' von Tulsidas, wobei 'पथबंधु' (pathbandhu) 'ein
      Freund auf dem Weg' oder 'ein Führer' bedeutet. Wird oft für jemanden verwendet, der ein wahrer
      Begleiter oder Führer im Leben ist.
    it: Frase tratta dall'epopea hindi 'Ramcharitmanas' di Tulsidas, dove 'पथबंधु' (pathbandhu) significa
      'un amico sul cammino' o 'una guida'. Viene usata per descrivere qualcuno che è un vero compagno
      o guida nel viaggio della vita.
    pt: Expressão do épico hindi 'Ramcharitmanas' de Tulsidas, onde 'पथबंधु' (pathbandhu) significa 'um
      amigo no caminho' ou 'um guia'. É usada para descrever alguém que é um verdadeiro companheiro ou
      guia na jornada da vida.
    ru: Выражение из хинди эпической поэмы 'Рамчаритаманас' Тулсидаса, где 'पथबंधु' (pathbandhu) означает
      'друг на пути' или 'проводник'. Часто используется для описания того, кто является верным спутником
      или наставником в жизненном пути.
    ja: トゥルシーダースのヒンディー語叙事詩「ラームチャリットマーナス」に由来する表現で、「पथबंधु」（pathbandhu）は「道の友」または「案内人」を意味する。人生の旅路における真の仲間や案内人を表すのに使われる。
    zh: 出自杜勒西达斯的印地语史诗《罗摩功行录》中的短语，其中‘पथबंधु’（pathbandhu）意为‘路上的朋友’或‘向导’。常用于描述人生旅途中的真正伙伴或导师。
    ar: عبارة من الملحمة الهندية 'رامتشريتماناس' لتولسيداس، حيث تعني 'पथबंधु' (pathbandhu) 'صديق في الطريق'
      أو 'دليل'. تُستخدم لوصف شخص ما يكون رفيقًا حقيقيًا أو دليلًا في رحلة الحياة.
    he: ביטוי מהאפוס ההודי 'ראם צ'ריט מאנס' של טולסידאס, שבו 'पथबंधु' (pathbandhu) פירושו 'חבר בדרך' או
      'מדריך'. משמש לתיאור מישהו שהוא חבר אמיתי או מדריך במסע החיים.
