- id: hi_proverb_tradition_एक_त_कर_ल_द_ज_न_म_चढ_a484c005
  language: hi
  canonical_reference: एक तो करेला दूजा नीम चढ़ा
  reference_type: proverb_tradition
  surface_patterns:
  - एक तो करेला दूजा नीम चढ़ा
  - करेला नीम चढ़ा
  short_explanation: Describes a situation where two or more negative qualities compound, making a bad
    situation worse. Literally refers to a bitter gourd (karela) coated with the bitter neem, symbolizing
    extreme bitterness.
  i18n_explanations:
    en: Describes a situation where two or more negative qualities compound, making a bad situation worse.
      Literally refers to a bitter gourd (karela) coated with the bitter neem, symbolizing extreme bitterness.
    es: Describe una situación en la que dos o más cualidades negativas se suman, empeorando una mala
      situación. Literalmente se refiere a una calabaza amarga (karela) cubierta de neem amargo, simbolizando
      extrema amargura.
    fr: Décrit une situation où deux ou plusieurs qualités négatives s'ajoutent, aggravant une situation
      déjà mauvaise. Fait littéralement référence à une courge amère (karela) recouverte de neem amer,
      symbolisant une amertume extrême.
    de: Beschreibt eine Situation, in der sich zwei oder mehr negative Eigenschaften verstärken und eine
      schlechte Lage verschlimmern. Bezieht sich wörtlich auf eine bittere Karela, die mit bitterem Neem
      überzogen ist, und symbolisiert extreme Bitterkeit.
    it: Descrive una situazione in cui due o più qualità negative si sommano, peggiorando una situazione
      già negativa. Si riferisce letteralmente a una zucca amara (karela) ricoperta di neem amaro, simbolo
      di estrema amarezza.
    pt: Descreve uma situação em que duas ou mais qualidades negativas se somam, piorando uma situação
      ruim. Refere-se literalmente a um cabaça amarga (karela) coberta de nim amargo, simbolizando extrema
      amargura.
    ru: Описывает ситуацию, когда две или более отрицательные черты усиливают друг друга, ухудшая плохое
      положение. Буквально относится к горькой тыкве (карела), покрытой горьким нимом, что символизирует
      крайнюю горечь.
    ja: 二つ以上の悪い特性が重なり、悪い状況をさらに悪化させることを表す。苦いゴーヤ（カレラ）にさらに苦いニームが coating されている様子から、極端な苦さを象徴する。
    zh: 形容两种或更多负面特质叠加，使糟糕的情况雪上加霜。字面指一种苦瓜（karela）外面裹着苦涩的印度苦楝树叶，象征极度苦涩。
    ar: يصف موقفًا تتجمع فيه صفتان أو أكثر سلبيتان، مما يجعل الوضع السيئ أسوأ. يشير حرفيًا إلى قرع مر
      (كarela) مغطى بنيم مر، مما يرمز إلى المرارة الشديدة.
    he: מתאר מצב שבו שתי תכונות שליליות או יותר מתחברות זו לזו, ומחמירות מצב רע. מתייחס באופן מילולי לירק
      מר (קארה) המכוסה בעלים מרירים של עץ הנים, המסמל מרירות קיצונית.
