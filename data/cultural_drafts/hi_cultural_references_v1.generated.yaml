      del XVIII secolo.
    pt: Refere-se à Terceira Batalha de Panipat (1761), onde os maratas foram derrotados por Ahmad Shah
      Abdali. Simboliza o declínio do poder marata e as mudanças na dinâmica política da Índia do século
      XVIII.
    ru: Относится к третьей битве при Панипате (1761 год), в которой маратхи были разбиты Ахмад-шахом
      Абдали. Символизирует упадок власти маратхов и изменение политической динамики в Индии XVIII века.
