    pt: Um provérbio que significa 'apenas três folhas da árvore dhak', referindo-se a algo de pouco valor
      ou substância apesar das aparências. A árvore dhak tem apenas três folhas por galho, simbolizando
      escassez.
    ru: Поговорка, означающая 'всего три листа дерева дхак', что подразумевает нечто малозначительное
