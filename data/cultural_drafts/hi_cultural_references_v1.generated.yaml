  short_explanation: Refers to the coronation of Chandragupta Maurya, founder of the Maurya Empire, marking
    the establishment of one of ancient India's largest empires. Symbolizes political legitimacy and imperial
    power in Indian history.
  i18n_explanations:
    en: Refers to the coronation of Chandragupta Maurya, founder of the Maurya Empire, marking the establishment
      of one of ancient India's largest empires. Symbolizes political legitimacy and imperial power in
      Indian history.
    es: Se refiere a la coronación de Chandragupta Maurya, fundador del Imperio Maurya, que marcó el establecimiento
      de uno de los mayores imperios de la antigua India. Simboliza la legitimidad política y el poder
      imperial en la historia india.
    fr: Fait référence au couronnement de Chandragupta Maurya, fondateur de l'Empire Maurya, marquant
      l'établissement de l'un des plus grands empires de l'Inde ancienne. Symbolise la légitimité politique
      et le pouvoir impérial dans l'histoire indienne.
    de: Bezieht sich auf die Krönung von Chandragupta Maurya, Gründer des Maurya-Reiches, die die Entstehung
      eines der größten Reiche des alten Indien markierte. Symbolisiert politische Legitimität und kaiserliche
      Macht in der indischen Geschichte.
    it: Si riferisce all'incoronazione di Chandragupta Maurya, fondatore dell'Impero Maurya, che segnò
      la nascita di uno dei più grandi imperi dell'antica India. Simboleggia la legittimità politica e
      il potere imperiale nella storia indiana.
    pt: Refere-se à coroação de Chandragupta Maurya, fundador do Império Maurya, que marcou o estabelecimento
      de um dos maiores impérios da Índia antiga. Simboliza a legitimidade política e o poder imperial
      na história indiana.
    ru: Относится к коронации Чандрагупты Маурьи, основателя империи Маурьев, ознаменовавшей создание
      одного из крупнейших империй Древней Индии. Символизирует политическую легитимность и императорскую
      власть в индийской истории.
    ja: 古代インド最大の帝国の一つであるマウリヤ朝を創設したチャンドラグプタ・マウリヤの戴冠式を指す。インドの歴史における政治的正統性と帝国の権力を象徴する。
    zh: 指孔雀王朝的创立者月护王（Chandragupta Maurya）的加冕典礼，标志着古代印度最大帝国之一的建立。象征着印度历史中的政治合法性与帝国权力。
    ar: يشير إلى تتويج تشاندراغوبتا موريا، مؤسس إمبراطورية موريا، والذي يمثل تأسيس إحدى أكبر الإمبراطوريات
      في الهند القديمة. يرمز إلى الشرعية السياسية والسلطة الإمبراطورية في التاريخ الهندي.
    he: מתייחס לטקס ההכתרה של צ'נדרגופטה מאוריה, מייסד אימפריית מאוריה, אשר סימן את הקמתה של אחת האימפריות
      הגדולות ביותר בתולדות הודו העתיקה. מסמל לגיטימיות פוליטית וכוח אימפריאלי בהיסטוריה ההודית.
