- id: hi_literary_reference_अग_न_क_उष_99fcdbf5
  language: hi
  canonical_reference: अग्नि की उषा
  reference_type: literary_reference
  surface_patterns:
  - अग्नि की उषा
  - अग्नि-की-उषा
  - अग्निकीउषा
  short_explanation: Refers to the dawn (उषा) associated with fire (अग्नि), symbolizing the beginning
    of a new era or awakening. Often used metaphorically in poetry and literature.
  i18n_explanations:
    en: Refers to the dawn (उषा) associated with fire (अग्नि), symbolizing the beginning of a new era
      or awakening. Often used metaphorically in poetry and literature.
    es: Se refiere al amanecer (उषा) asociado al fuego (अग्नि), simbolizando el inicio de una nueva era
      o despertar. Usado metafóricamente en poesía y literatura.
    fr: Fait référence à l'aube (उषा) associée au feu (अग्नि), symbolisant le début d'une nouvelle ère
      ou d'un réveil. Utilisé métaphoriquement en poésie et en littérature.
    de: Bezieht sich auf die Morgenröte (उषा), die mit dem Feuer (अग्नि) verbunden ist und den Beginn
      einer neuen Ära oder Erweckung symbolisiert. Metaphorisch in Poesie und Literatur verwendet.
    it: Si riferisce all'alba (उषा) associata al fuoco (अग्नि), simbolo dell'inizio di una nuova era o
      risveglio. Usato metaforicamente in poesia e letteratura.
    pt: Refere-se ao alvorecer (उषा) associado ao fogo (अग्नि), simbolizando o início de uma nova era
      ou despertar. Usado metaforicamente na poesia e literatura.
    ru: Означает рассвет (उषа), связанный с огнём (अग्नि), символизирующий начало новой эры или пробуждение.
      Часто используется метафорически в поэзии и литературе.
    ja: 火（अग्नि）に結びつけられた夜明け（उषा）を指し、新時代の始まりや目覚めを象徴する。詩や文学で比喩的に用いられる。
    zh: 指与火（अग्नि）相关的黎明（उषा），象征新时代的开始或觉醒。常在诗歌和文学中比喻使用。
    ar: يشير إلى الفجر (उषा) المرتبط بالنار (अग्नि)، ويرمز إلى بداية عصر جديد أو اليقظة. يُستخدم مجازيًا
      في الشعر والأدب.
    he: מתייחס לשחר (उषा) הקשור לאש (अग्नि), המסמל את תחילתה של תקופה חדשה או התעוררות. משמש באופן מטפורי
      בשירה ובספרות.
