- id: hi_literary_reference_क_तन_प_क_स_त_न_aaef1e35
  language: hi
  canonical_reference: कितने पाकिस्तान
  reference_type: literary_reference
  surface_patterns:
  - कितने पाकिस्तान
  - कितने पाकिस्तान हैं
  - कितने पाकिस्तान होंगे
  short_explanation: The title of a novel by Kamleshwar, exploring themes of partition, identity, and
    the lingering effects of the 1947 division of India and Pakistan. The phrase metaphorically questions
    the number of divisions or separations that exist in society.
  i18n_explanations:
    en: The title of a novel by Kamleshwar, exploring themes of partition, identity, and the lingering
      effects of the 1947 division of India and Pakistan. The phrase metaphorically questions the number
      of divisions or separations that exist in society.
    es: Título de una novela de Kamleshwar que explora temas de partición, identidad y los efectos duraderos
      de la división de India y Pakistán en 1947. La frase cuestiona metafóricamente el número de divisiones
      o separaciones que existen en la sociedad.
    fr: Titre d'un roman de Kamleshwar qui explore les thèmes de la partition, de l'identité et des effets
      persistants de la division de l'Inde et du Pakistan en 1947. La phrase questionne métaphoriquement
      le nombre de divisions ou de séparations existant dans la société.
    de: Der Titel eines Romans von Kamleshwar, der Themen wie Teilung, Identität und die anhaltenden Folgen
      der Teilung Indiens und Pakistans 1947 untersucht. Der Ausdruck stellt metaphorisch die Frage nach
      der Anzahl der Spaltungen oder Trennungen in der Gesellschaft.
    it: Titolo di un romanzo di Kamleshwar che esplora temi di divisione, identità e gli effetti duraturi
      della spartizione dell'India e del Pakistan nel 1947. La frase mette in discussione metaforicamente
      il numero di divisioni o separazioni esistenti nella società.
    pt: Título de um romance de Kamleshwar que explora temas de partição, identidade e os efeitos duradouros
      da divisão da Índia e do Paquistão em 1947. A frase questiona metaforicamente o número de divisões
      ou separações existentes na sociedade.
    ru: Название романа Камлешвара, исследующего темы раздела, идентичности и последствий раздела Индии
      и Пакистана в 1947 году. Фраза метафорически ставит вопрос о количестве разделений или разобщений
      в обществе.
    ja: 1947年のインド・パキスタン分離の影響やアイデンティティ、分断をテーマとしたカムレシュワルの小説のタイトル。社会に存在する分裂や隔たりの数を問う metaphor 的な表現。
    zh: 卡姆莱什瓦尔的小说标题，探讨分裂、身份认同以及1947年印度和巴基斯坦分治的持久影响。该短语隐喻性地质疑社会中存在的分裂或隔阂的数量。
    ar: عنوان رواية للكاتب كامليشوار، تستكشف مواضيع التقسيم والهوية والآثار المستمرة لتقسيم الهند وباكستان
      عام 1947. السؤال المجازي يتناول عدد الانقسامات أو الفواصل الموجودة في المجتمع.
    he: כותרת של רומן מאת קאמלשוואר, הבוחן נושאים של חלוקה, זהות והשפעותיה המתמשכות של חלוקת הודו ופקיסטן
      ב-1947. הביטוי שואל באופן מטפורי כמה חלוקות או הפרדות קיימות בחברה.
