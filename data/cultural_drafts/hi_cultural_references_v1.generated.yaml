    social justice.
  i18n_explanations:
    en: The reforms led by Raja Ram Mohan Roy, a 19th-century social reformer who campaigned against practices
      like sati (widow burning) and founded the Brahmo Samaj to promote monotheism and social justice.
    es: Las reformas lideradas por Raja Ram Mohan Roy, reformador social del siglo XIX que luchó contra
      prácticas como el sati (quema de viudas) y fundó el Brahmo Samaj para promover el monoteísmo y la
      justicia social.
    fr: Les réformes menées par Raja Ram Mohan Roy, réformateur social du XIXe siècle qui a milité contre
      des pratiques comme le sati (immolation des veuves) et fondé le Brahmo Samaj pour promouvoir le
      monothéisme et la justice sociale.
    de: Die Reformen unter der Führung von Raja Ram Mohan Roy, einem Sozialreformer des 19. Jahrhunderts,
      der sich gegen Praktiken wie Sati (Witwenverbrennung) einsetzte und die Brahmo Samaj gründete, um
      Monotheismus und soziale Gerechtigkeit zu fördern.
    it: Le riforme guidate da Raja Ram Mohan Roy, riformatore sociale del XIX secolo che combatté pratiche
      come il sati (bruciatura delle vedove) e fondò il Brahmo Samaj per promuovere il monoteismo e la
      giustizia sociale.
    pt: As reformas lideradas por Raja Ram Mohan Roy, reformador social do século XIX que lutou contra
      práticas como o sati (queima de viúvas) e fundou o Brahmo Samaj para promover o monoteísmo e a justiça
      social.
    ru: Реформы, возглавляемые Раджей Рам Моханом Роем, социальным реформатором XIX века, который боролся
      против таких практик, как сати (сожжение вдов), и основал Брахмо Самадж для продвижения монотеизма
      и социальной справедливости.
    ja: 19世紀の社会改革者ラジャ・ラム・モーハン・ロイが主導した改革は、サティ（寡婦焼身）などの慣習に反対し、一神教と社会正義を推進するためにブラフモ・サマージを設立しました。
    zh: 拉贾·拉姆·莫汉·罗伊领导的改革，这位19世纪的社会改革家反对如萨蒂（寡妇殉葬）等陋习，并创立了婆罗门社团以推广一神论与社会正义。
    ar: الإصلاحات التي قادها راجا رام موهان روي، المصلح الاجتماعي في القرن التاسع عشر، الذي ناضل ضد ممارسات
