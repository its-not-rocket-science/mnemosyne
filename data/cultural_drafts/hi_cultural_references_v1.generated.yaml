- id: hi_cultural_reference_अग_न_क_प_रण_म_c6e9e57e
  language: hi
  canonical_reference: अग्नि को प्रणाम
  reference_type: cultural_reference
  surface_patterns:
  - अग्नि को प्रणाम
  - अग्नि को प्रणाम करें
  - अग्नि को प्रणाम करना
  - अग्नि को प्रणाम करना चाहिए
  short_explanation: A respectful greeting or salutation to fire, often used in Hindu rituals or daily
    life to honor the sacred element of fire (Agni). It reflects reverence for Agni as a deity and messenger
    between humans and the divine.
  i18n_explanations:
    en: A respectful greeting or salutation to fire, often used in Hindu rituals or daily life to honor
      the sacred element of fire (Agni). It reflects reverence for Agni as a deity and messenger between
      humans and the divine.
    es: Saludo o reverencia al fuego, usado en rituales hindúes o en la vida diaria para honrar el elemento
      sagrado del fuego (Agni). Refleja respeto por Agni como deidad y mensajero entre humanos y lo divino.
    fr: Salutation respectueuse au feu, souvent utilisée dans les rituels hindous ou la vie quotidienne
      pour honorer l'élément sacré du feu (Agni). Elle reflète la vénération d'Aagni en tant que divinité
      et messager entre les humains et le divin.
    de: Eine respektvolle Begrüßung oder Verehrung des Feuers, oft in hinduistischen Ritualen oder im
      Alltag verwendet, um das heilige Element Feuer (Agni) zu ehren. Sie spiegelt die Verehrung Agni
      als Gottheit und Boten zwischen Menschen und dem Göttlichen wider.
    it: Un saluto rispettoso al fuoco, spesso usato in rituali induisti o nella vita quotidiana per onorare
      l'elemento sacro del fuoco (Agni). Riflette la venerazione di Agni come divinità e messaggero tra
      umani e il divino.
    pt: Uma saudação respeitosa ao fogo, frequentemente usada em rituais hindus ou no cotidiano para honrar
      o elemento sagrado do fogo (Agni). Reflete reverência a Agni como divindade e mensageiro entre humanos
      e o divino.
    ru: Почтительное приветствие или поклонение огню, часто используемое в индуистских ритуалах или в
      повседневной жизни для почитания священного элемента огня (Агни). Отражает уважение к Агни как к
      божеству и посреднику между людьми и божественным.
    ja: 火に対する敬意のこもった挨拶や敬礼で、ヒンドゥー教の儀式や日常生活で火（アグニ）という神聖な元素を敬う際に用いられます。アグニを人間と神聖なるものとの仲介者として崇敬する表れです。
    zh: 对火的尊敬问候或致敬，常用于印度教仪式或日常生活中，以敬奉火神（阿格尼）这一神圣元素。体现了对阿格尼作为神灵和人与神之间使者的崇敬。
    ar: تحية أو إجلال للنار، تُستخدم غالبًا في الطقوس الهندوسية أو الحياة اليومية لتكريم عنصر النار المقدس
      (أغني). تعكس الاحترام لأغني باعتباره إلهًا ورسولًا بين البشر والإلهي.
    he: ברכה או הכרה מכובדת לאש, הנהוגה בטקסים הינדיים או בחיי היומיום לכבוד היסוד הקדוש אש (אגני). משקפת
      כבוד לאגני כאל וכשליח בין בני אדם לאלוהי.
