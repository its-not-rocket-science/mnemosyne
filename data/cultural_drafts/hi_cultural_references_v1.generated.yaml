      à l'abandon. Elle est célèbre pour être le titre d'un roman de Krishna Sobti.
    de: Ein metaphorischer Ausdruck für einen Ort des Todes oder der Verwüstung, oft verbunden mit Trostlosigkeit
      und Verlassenheit. Berühmt durch den Titel eines Romans von Krishna Sobti.
    it: Espressione metaforica per descrivere un luogo di morte o rovina, spesso associato a desolazione
      e abbandono. È famosa per essere il titolo di un romanzo di Krishna Sobti.
    pt: Expressão metafórica para descrever um lugar de morte ou ruína, frequentemente associado à desolação
