    en: Denotes Agni's ability to embody or 'hold' fire, symbolizing his role as the carrier of sacrificial
      offerings to the gods. Represents the sacred connection between fire and divine communication.
    es: Denota la capacidad de Agni para encarnar o 'sostener' el fuego, simbolizando su papel como portador
