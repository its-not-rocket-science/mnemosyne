  short_explanation: Karna's legendary generosity, exemplified by his willingness to give away even his
    own armor and earrings, symbolizes selflessness and moral duty in the Mahabharata.
  i18n_explanations:
    en: Karna's legendary generosity, exemplified by his willingness to give away even his own armor and
      earrings, symbolizes selflessness and moral duty in the Mahabharata.
    es: La legendaria generosidad de Karna, ejemplificada por su disposición a donar incluso su propia
      armadura y aretes, simboliza el desinterés y el deber moral en el Mahabharata.
    fr: La générosité légendaire de Karna, illustrée par sa volonté de donner même son armure et ses boucles
      d'oreilles, symbolise l'abnégation et le devoir moral dans le Mahabharata.
    de: Karnas legendäre Großzügigkeit, die sich darin zeigt, dass er sogar seine eigene Rüstung und Ohrringe
      verschenkte, symbolisiert Selbstlosigkeit und moralische Pflicht im Mahabharata.
    it: La leggendaria generosità di Karna, esemplificata dalla sua disponibilità a donare anche la sua
      stessa armatura e orecchini, simboleggia l'abnegazione e il dovere morale nel Mahabharata.
    pt: A generosidade lendária de Karna, exemplificada por sua disposição de doar até mesmo sua própria
      armadura e brincos, simboliza o desprendimento e o dever moral no Mahabharata.
    ru: Легендарная щедрость Карны, проявившаяся в его готовности отдать даже собственные доспехи и серьги,
      символизирует самоотверженность и моральный долг в «Махабхарате».
    ja: カルナの legendary な寛大さ、すなわち自らの甲冑やイヤリングまで与えるという彼の意志は、マハーバーラタにおける無私の精神と道徳的義務を象徴している。
    zh: 迦尔纳的传奇慷慨， exemplified by his willingness to give away even his own armor and earrings，象征着《摩诃婆罗多》中无私与道德责任。
    ar: كرم كارنا الأسطوري، المتمثل في رغبته في التبرع حتى بدرعه وحلقه، يرمز إلى الإيثار والواجب الأخلاقي
      في المهابهاراتا.
    he: נדיבותו האגדית של קרנה, שבאה לידי ביטוי בנכונותו לוותר אפילו על שריונו ועגיליו, מסמלת הקרבה עצמית
      וחובה מוסרית במהאבהארטה.
