    en: Guru Gobind Singh founded the Khalsa Panth in 1699, a Sikh warrior community symbolizing courage,
      equality, and devotion, central to Sikh identity and history.
    es: Guru Gobind Singh fundó el Khalsa Panth en 1699, una comunidad guerrera sij que simboliza el valor,
      la igualdad y la devoción, fundamental en la identidad e historia sij.
    fr: Guru Gobind Singh a fondé le Khalsa Panth en 1699, une communauté guerrière sikhe symbolisant
