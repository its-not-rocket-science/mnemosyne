    ja: グル・ゴビンド・シングは1699年にカルサ・パンスを創設し、勇気、平等、献身を象徴するシク教の戦士共同体を確立した。これはシク教のアイデンティティと歴史の中心を成す。
    zh: 锡克教第十代祖师戈宾德·辛格于1699年创立卡尔萨（Khalsa），一个象征勇气、平等与虔诚的锡克教武士团体，是锡克教身份与历史的核心。
    ar: أسس غورو غوبيند سينغ خالسا بانث في عام 1699، وهي جماعة سيخية محاربة ترمز للشجاعة والمساواة والتفاني،
