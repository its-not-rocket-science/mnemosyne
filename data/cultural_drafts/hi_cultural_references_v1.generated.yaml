- id: hi_proverb_tradition_क_आ_चल_ह_स_क_च_ल_30110a2b
  language: hi
  canonical_reference: कौआ चले हंस की चाल
  reference_type: proverb_tradition
  surface_patterns:
  - कौआ चले हंस की चाल
  - कौआ हंस की चाल चल रहा है
  short_explanation: Refers to someone trying to imitate or copy the behavior of another, often in an
    unsuccessful or ridiculous manner. Compares a crow attempting to walk like a swan.
  i18n_explanations:
    en: Refers to someone trying to imitate or copy the behavior of another, often in an unsuccessful
      or ridiculous manner. Compares a crow attempting to walk like a swan.
    es: Se refiere a alguien que intenta imitar o copiar el comportamiento de otro, a menudo de manera
      poco exitosa o ridícula. Compara a un cuervo tratando de caminar como un cisne.
    fr: Fait référence à quelqu'un qui essaie d'imiter ou de copier le comportement d'un autre, souvent
      de manière peu réussie ou ridicule. Compare un corbeau qui tente de marcher comme un cygne.
    de: Bezieht sich auf jemanden, der versucht, das Verhalten eines anderen nachzuahmen oder zu kopieren,
      oft auf eine erfolglose oder lächerliche Weise. Vergleicht einen Raben, der versucht, wie ein Schwan
      zu gehen.
    it: Si riferisce a qualcuno che cerca di imitare o copiare il comportamento di un altro, spesso in
      modo poco riuscito o ridicolo. Paragona un corvo che cerca di camminare come un cigno.
    pt: Refere-se a alguém que tenta imitar ou copiar o comportamento de outro, muitas vezes de forma
      malsucedida ou ridícula. Compara um corvo tentando andar como um cisne.
    ru: Описывает того, кто пытается подражать или копировать поведение другого, часто неудачно или нелепо.
      Сравнивает ворону, пытающуюся ходить как лебедь.
    ja: 他人の行動を真似しようとする、しばしば失敗したり滑稽に見えたりする様子を指す。烏が白鳥のように歩こうとする様子に例える。
    zh: 指某人试图模仿他人的行为，通常以不成功或滑稽的方式。比喻乌鸦试图像天鹅一样走路。
    ar: يشير إلى شخص يحاول تقليد سلوك شخص آخر، غالبًا بطريقة غير ناجحة أو سخيفة. يقارن غرابًا يحاول المشي
      مثل بجعة.
    he: מתייחס למישהו שמנסה לחקות התנהגות של אחר, לעיתים באופן לא מוצלח או מגוחך. משווה עורב המנסה ללכת
      כמו ברבור.
