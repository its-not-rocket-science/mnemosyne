  short_explanation: Describes the divine play (leela) of Agni, highlighting his multifaceted role as
    a purifier, messenger, and destroyer in Hindu cosmology. Represents the cyclical nature of fire in
    creation and destruction.
  i18n_explanations:
    en: Describes the divine play (leela) of Agni, highlighting his multifaceted role as a purifier, messenger,
      and destroyer in Hindu cosmology. Represents the cyclical nature of fire in creation and destruction.
    es: Describe la acción divina (leela) de Agni, destacando su papel multifacético como purificador,
      mensajero y destructor en la cosmología hindú. Representa la naturaleza cíclica del fuego en la
      creación y destrucción.
    fr: Décrit le jeu divin (leela) d'Agni, mettant en avant son rôle multiforme en tant que purificateur,
      messager et destructeur dans la cosmologie hindoue. Représente la nature cyclique du feu dans la
      création et la destruction.
    de: Beschreibt das göttliche Spiel (Leela) von Agni und hebt seine vielschichtige Rolle als Reiniger,
      Bote und Zerstörer in der hinduistischen Kosmologie hervor. Steht für den zyklischen Charakter des
      Feuers in Schöpfung und Zerstörung.
    it: Descrive il gioco divino (leela) di Agni, evidenziando il suo ruolo multiforme come purificatore,
      messaggero e distruttore nella cosmologia induista. Rappresenta la natura ciclica del fuoco nella
      creazione e distruzione.
    pt: Descreve a ação divina (leela) de Agni, destacando seu papel multifacetado como purificador, mensageiro
      e destruidor na cosmologia hindu. Representa a natureza cíclica do fogo na criação e destruição.
    ru: Описывает божественное проявление (лила) Агни, подчеркивая его многогранную роль как очистителя,
      посланника и разрушителя в индуистской космологии. Олицетворяет циклическую природу огня в творении
      и разрушении.
    ja: アグニの神聖な遊戯（リーラ）を表し、ヒンドゥー宇宙論における彼の多面的な役割（浄化者、使者、破壊者）を強調する。創造と破壊における火の循環的な性質を表す。
    zh: 描述阿格尼的神圣游戏（利拉），突出他在印度教宇宙论中作为净化者、使者和破坏者的多重角色。象征火在创造与毁灭中的循环本质。
    ar: يصف اللعب الإلهي (ليلا) لأغني، مسلطًا على دوره المتعدد كمنقٍ ومرسل ومدمر في الكوزمولوجيا الهندوسية.
