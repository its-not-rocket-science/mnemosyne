  short_explanation: Aurangzeb's policies of religious conversion and enforcement of Islamic orthodoxy
    during his reign (1658–1707) remain controversial, often cited in discussions of Mughal religious
    tolerance.
  i18n_explanations:
    en: Aurangzeb's policies of religious conversion and enforcement of Islamic orthodoxy during his reign
      (1658–1707) remain controversial, often cited in discussions of Mughal religious tolerance.
    es: Las políticas de conversión religiosa y aplicación de la ortodoxia islámica de Aurangzeb durante
      su reinado (1658–1707) siguen siendo controvertidas y se citan frecuentemente en debates sobre la
      tolerancia religiosa mogol.
    fr: Les politiques de conversion religieuse et d'application de l'orthodoxie islamique d'Aurangzeb
      pendant son règne (1658–1707) restent controversées et sont souvent citées dans les discussions
      sur la tolérance religieuse moghole.
    de: Aurangzebs Politik der religiösen Konversion und Durchsetzung islamischer Orthodoxie während seiner
      Herrschaft (1658–1707) bleibt umstritten und wird oft in Diskussionen über religiöse Toleranz im
      Mogulreich angeführt.
    it: Le politiche di conversione religiosa e imposizione dell'ortodossia islamica di Aurangzeb durante
      il suo regno (1658–1707) rimangono controverse e spesso citate nei dibattiti sulla tolleranza religiosa
      dei Moghul.
    pt: As políticas de conversão religiosa e imposição da ortodoxia islâmica de Aurangzeb durante seu
      reinado (1658–1707) permanecem controversas e são frequentemente citadas em discussões sobre a tolerância
      religiosa mogol.
    ru: Политика Аурангзеба по религиозным обращениям и ужесточению исламской ортодоксии в период его
      правления (1658–1707) остаётся спорной и часто упоминается в дискуссиях о религиозной терпимости
      империи Великих Моголов.
    ja: アウラングゼーブの治世（1658-1707）における宗教改宗政策とイスラム教の正統主義の強制は議論を呼び、ムガル帝国の宗教寛容に関する議論でしばしば引き合いに出される。
    zh: 奥朗则布在其统治期间（1658-1707）推行的宗教改宗政策及强制伊斯兰正统，至今仍有争议，常被引用于讨论莫卧儿王朝的宗教宽容。
    ar: سياسات أورنجزيب المتعلقة بتحويل الأديان وفرض الأرثوذكسية الإسلامية خلال حكمه (1658–1707) لا تزال
      مثيرة للجدل، وغالباً ما تُذكر في مناقشات حول التسامح الديني في الإمبراطورية المغولية.
    he: מדיניות ההמרה הדתית והאכיפה של האורתודוקסיה האסלאמית של אורנגזב במהלך שלטונו (1658–1707) נותרה
