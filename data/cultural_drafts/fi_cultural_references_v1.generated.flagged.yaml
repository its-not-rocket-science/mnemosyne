- id: fi_cultural_reference_ilmarisen_takoma_dd44e2dc
  language: fi
  canonical_reference: Ilmarisen takoma
  reference_type: cultural_reference
  surface_patterns:
  - Ilmarisen takoma
  - Ilmarisen takoja
  - Ilmarisen takomana
  short_explanation: 'Forged by Ilmarinen: refers to the legendary smith Ilmarinen from Kalevala, whose
    creations are unmatched in skill; used metaphorically for anything masterfully crafted.'
  i18n_explanations:
    en: 'Forged by Ilmarinen: refers to the legendary smith Ilmarinen from Kalevala, whose creations are
      unmatched in skill; used metaphorically for anything masterfully crafted.'
    es: 'Forjado por Ilmarinen: se refiere al legendario herrero Ilmarinen de Kalevala, cuyas creaciones
      no tienen igual en habilidad; se usa metafóricamente para cualquier cosa magistralmente elaborada.'
    fr: 'Forgé par Ilmarinen : fait référence au légendaire forgeron Ilmarinen du Kalevala, dont les créations
      sont inégalées en compétence ; utilisé métaphoriquement pour tout ce qui est magistralement fabriqué.'
    de: 'Geschmiedet von Ilmarinen: bezieht sich auf den legendären Schmied Ilmarinen aus Kalevala, dessen
      Kreationen an Können unübertroffen sind; metaphorisch verwendet für alles meisterhaft Gefertigte.'
    it: 'Forgiato da Ilmarinen: si riferisce al leggendario fabbro Ilmarinen del Kalevala, le cui creazioni
      sono ineguagliabili per abilità; usato metaforicamente per qualsiasi cosa magistralmente realizzata.'
    pt: 'Forjado por Ilmarinen: refere-se ao lendário ferreiro Ilmarinen do Kalevala, cujas criações são
      inigualáveis em habilidade; usado metaforicamente para qualquer coisa magistralmente confeccionada.'
    ru: 'Выковано Ильмариненом: относится к легендарному кузнецу Ильмаринену из «Калевалы», чьи творения
      непревзойдённы в мастерстве; используется метафорически для чего-либо искусно сделанного.'
    ja: イルマリネンによって鍛えられた：『カレワラ』の伝説の鍛冶屋イルマリネンを指し、その作品は技術的に比類がない；巧みに作られたものの比喩として用いられる。
    zh: 伊尔马利宁锻造：指《卡勒瓦拉》中传奇铁匠伊尔马利宁，其作品技艺无与伦比；比喻任何精工细作之物。
    ar: 'مصوغ بواسطة إلمارينن: يشير إلى الحداد الأسطوري إلمارينن من كاليفالا، الذي لا تضاهى إبداعاته في
      المهارة؛ يستخدم مجازًا لأي شيء مصنوع بإتقان.'
    he: 'מחושל על ידי אילמרינן: מתייחס לנפח האגדי אילמרינן מהקלוואלה, שיצירותיו ללא תחרות במיומנות; משמש
      באופן מטפורי לכל דבר המעוצב במומחיות.'
