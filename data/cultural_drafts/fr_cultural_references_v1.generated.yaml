- id: fr_literary_reference_l_existence_précède_l_essence_d8e252a8
  language: fr
  canonical_reference: L'existence précède l'essence
  reference_type: literary_reference
  surface_patterns:
  - L'existence précède l'essence
  - existence précède essence
  - l'existence avant l'essence
  short_explanation: A central tenet of existentialism, particularly Jean-Paul Sartre's philosophy, meaning
    that humans first exist, then define their essence through actions and choices. It emphasizes individual
    freedom and responsibility.
  i18n_explanations:
    en: A central tenet of existentialism, particularly Jean-Paul Sartre's philosophy, meaning that humans
      first exist, then define their essence through actions and choices. It emphasizes individual freedom
      and responsibility.
    es: Un principio central del existencialismo, particularmente la filosofía de Jean-Paul Sartre, que
      significa que los humanos primero existen, luego definen su esencia a través de acciones y elecciones.
      Enfatiza la libertad y responsabilidad individual.
    fr: Un principe central de l'existentialisme, en particulier la philosophie de Jean-Paul Sartre, signifiant
      que les humains existent d'abord, puis définissent leur essence par leurs actions et choix. Il souligne
      la liberté et la responsabilité individuelles.
    de: Ein zentraler Grundsatz des Existentialismus, insbesondere der Philosophie Jean-Paul Sartres,
      dass der Mensch zuerst existiert und dann sein Wesen durch Handlungen und Entscheidungen definiert.
      Es betont individuelle Freiheit und Verantwortung.
    it: Un principio centrale dell'esistenzialismo, in particolare della filosofia di Jean-Paul Sartre,
      che significa che gli umani prima esistono, poi definiscono la loro essenza attraverso azioni e
      scelte. Sottolinea la libertà e la responsabilità individuale.
    pt: Um princípio central do existencialismo, particularmente da filosofia de Jean-Paul Sartre, significando
      que os humanos primeiro existem, depois definem sua essência por meio de ações e escolhas. Enfatiza
      a liberdade e a responsabilidade individuais.
    ru: Центральный принцип экзистенциализма, особенно философии Жан-Поля Сартра, означающий, что люди
      сначала существуют, а затем определяют свою сущность через действия и выбор. Он подчеркивает индивидуальную
      свободу и ответственность.
    ja: 実存主義、特にジャン＝ポール・サルトルの哲学の中心的教義で、人間はまず存在し、その後行動と選択を通じて本質を定義するという意味です。個人の自由と責任を強調します。
    zh: 存在主义（尤其是让-保罗·萨特哲学）的核心原则，意指人类首先存在，然后通过行动和选择来定义自己的本质。强调个人自由和责任。
    ar: مبدأ أساسي للوجودية، وخاصة فلسفة جان بول سارتر، ويعني أن البشر موجودون أولاً، ثم يحددون جوهرهم
      من خلال الأفعال والاختيارات. ويؤكد على الحرية والمسؤولية الفردية.
    he: עיקרון מרכזי של האקזיסטנציאליזם, במיוחד הפילוסופיה של ז'אן-פול סארטר, שמשמעותו שבני אדם קודם כל
      קיימים, ואז מגדירים את מהותם באמצעות פעולות ובחירות. הוא מדגיש חופש ואחריות אישיים.
