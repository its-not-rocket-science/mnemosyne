  short_explanation: Refers to the punishment of Prometheus in Greek mythology, who was chained to a rock
    and had his liver eaten daily by an eagle for stealing fire from the gods and giving it to humanity.
    Symbolizes suffering for a noble cause or severe punishment for transgression.
  i18n_explanations:
    en: Refers to the punishment of Prometheus in Greek mythology, who was chained to a rock and had his
      liver eaten daily by an eagle for stealing fire from the gods and giving it to humanity. Symbolizes
      suffering for a noble cause or severe punishment for transgression.
    es: Se refiere al castigo de Prometeo en la mitología griega, quien fue encadenado a una roca y un
      águila le devoraba el hígado diariamente por robar el fuego de los dioses y dárselo a la humanidad.
      Simboliza el sufrimiento por una causa noble o un castigo severo por una transgresión.
    fr: Fait référence au châtiment de Prométhée dans la mythologie grecque, qui fut enchaîné à un rocher
      et dont un aigle lui dévorait le foie chaque jour pour avoir volé le feu des dieux et l'avoir donné
      à l'humanité. Symbolise la souffrance pour une noble cause ou une punition sévère pour une transgression.
    de: Bezieht sich auf die Bestrafung des Prometheus in der griechischen Mythologie, der an einen Felsen
      gekettet wurde und dem ein Adler täglich die Leber fraß, weil er den Göttern das Feuer gestohlen
      und den Menschen gegeben hatte. Symbolisiert Leid für eine edle Sache oder strenge Bestrafung für
      Übertretung.
    it: Si riferisce alla punizione di Prometeo nella mitologia greca, che fu incatenato a una roccia
      e un'aquila gli divorava il fegato ogni giorno per aver rubato il fuoco agli dei e averlo dato all'umanità.
      Simboleggia la sofferenza per una nobile causa o una punizione severa per una trasgressione.
    pt: Refere-se ao castigo de Prometeu na mitologia grega, que foi acorrentado a uma rocha e tinha seu
      fígado comido diariamente por uma águia por roubar o fogo dos deuses e dá-lo à humanidade. Simboliza
      sofrimento por uma causa nobre ou punição severa por transgressão.
    ru: Относится к наказанию Прометея в греческой мифологии, который был прикован к скале, и орел ежедневно
      выклевывал его печень за то, что он украл огонь у богов и отдал его людям. Символизирует страдания
      за благородное дело или суровое наказание за проступок.
    ja: ギリシャ神話におけるプロメテウスの罰を指し、彼は神々から火を盗んで人類に与えた罰として岩に鎖で縛られ、毎日鷲に肝臓を食べられた。高貴な大義のための苦しみ、または違反に対する厳しい罰を象徴する。
    zh: 指的是希腊神话中普罗米修斯因盗取天火给人类而被锁在岩石上，每天被鹰啄食肝脏的惩罚。象征为崇高事业受苦，或因越界而受严惩。
    ar: يشير إلى عقاب بروميثيوس في الأساطير اليونانية، الذي قُيد بالسلاسل إلى صخرة وكان نسر يأكل كبده
      يومياً لأنه سرق النار من الآلهة وأعطاها للبشر. يرمز إلى المعاناة من أجل قضية نبيلة أو عقاب شديد
      على التجاوز.
    he: מתייחס לעונשו של פרומתאוס במיתולוגיה היוונית, שנכבל לסלע ונשר אכל את כבדו מדי יום על שגנב את האש
      מהאלים ונתן אותה לאנושות. מסמל סבל למען מטרה נעלה או ענישה חמורה על עברה.
