  short_explanation: Oath taken by the Third Estate of the Estates-General on June 20, 1789, vowing not
    to separate until a new constitution was established; a pivotal event in the French Revolution.
  i18n_explanations:
    en: Oath taken by the Third Estate of the Estates-General on June 20, 1789, vowing not to separate
      until a new constitution was established; a pivotal event in the French Revolution.
    es: Juramento prestado por el Tercer Estado de los Estados Generales el 20 de junio de 1789, comprometiéndose
      a no separarse hasta que se estableciera una nueva constitución; un evento clave en la Revolución
      Francesa.
    fr: Serment prononcé par le Tiers État des États généraux le 20 juin 1789, jurant de ne pas se séparer
      jusqu'à ce qu'une nouvelle constitution soit établie ; un événement clé de la Révolution française.
    de: Eid, der am 20. Juni 1789 vom Dritten Stand der Generalstände geleistet wurde, um sich nicht zu
      trennen, bis eine neue Verfassung errichtet war; ein entscheidendes Ereignis der Französischen Revolution.
    it: Giuramento prestato dal Terzo Stato degli Stati Generali il 20 giugno 1789, impegnandosi a non
      separarsi finché non fosse stata stabilita una nuova costituzione; un evento fondamentale della
      Rivoluzione francese.
    pt: Juramento feito pelo Terceiro Estado dos Estados Gerais em 20 de junho de 1789, comprometendo-se
      a não se separar até que uma nova constituição fosse estabelecida; um evento crucial na Revolução
      Francesa.
    ru: Клятва, данная третьим сословием Генеральных штатов 20 июня 1789 года, обещание не расходиться
      до тех пор, пока не будет принята новая конституция; ключевое событие Французской революции.
    ja: 1789年6月20日、全国三部会の第三身分が、新憲法が制定されるまで解散しないと誓った誓約。フランス革命の重要な出来事。
    zh: 1789年6月20日，三级会议的第三等级宣誓，在制定新宪法之前绝不解散；法国大革命的关键事件。
    ar: قسم أقيم من قبل الطبقة الثالثة من المجلس العام في 20 يونيو 1789، يتعهد بعدم الانفصال حتى يتم وضع
      دستور جديد؛ حدث محوري في الثورة الفرنسية.
    he: שבועה שנשבעה המעמד השלישי של אספת המעמדות ב-20 ביוני 1789, להתחייב לא להיפרד עד להקמת חוקה חדשה;
      אירוע מרכזי במהפכה הצרפתית.
