- id: fr_literary_reference_la_madeleine_de_proust_1c9b1bc3
  language: fr
  canonical_reference: La madeleine de Proust
  reference_type: literary_reference
  surface_patterns:
  - La madeleine de Proust
  - une madeleine de Proust
  - la madeleine proustienne
  short_explanation: Refers to a sensory experience that triggers involuntary memories, inspired by Marcel
    Proust's description of tasting a madeleine cake in 'À la recherche du temps perdu'. It symbolizes
    the power of memory evoked by a small, everyday object.
  i18n_explanations:
    en: Refers to a sensory experience that triggers involuntary memories, inspired by Marcel Proust's
      description of tasting a madeleine cake in 'À la recherche du temps perdu'. It symbolizes the power
      of memory evoked by a small, everyday object.
    es: Se refiere a una experiencia sensorial que desencadena recuerdos involuntarios, inspirada en la
      descripción de Marcel Proust de probar un pastel de madeleine en 'En busca del tiempo perdido'.
      Simboliza el poder de la memoria evocada por un objeto pequeño y cotidiano.
    fr: Fait référence à une expérience sensorielle qui déclenche des souvenirs involontaires, inspirée
      par la description de Marcel Proust de la dégustation d'un gâteau madeleine dans 'À la recherche
      du temps perdu'. Il symbolise le pouvoir de la mémoire évoquée par un petit objet du quotidien.
    de: Bezieht sich auf eine sensorische Erfahrung, die unwillkürliche Erinnerungen auslöst, inspiriert
      von Marcel Prousts Beschreibung des Geschmacks eines Madeleine-Kuchens in 'Auf der Suche nach der
      verlorenen Zeit'. Es symbolisiert die Kraft der Erinnerung, die durch einen kleinen Alltagsgegenstand
      hervorgerufen wird.
    it: Si riferisce a un'esperienza sensoriale che scatena ricordi involontari, ispirata dalla descrizione
      di Marcel Proust dell'assaggio di una madeleine in 'Alla ricerca del tempo perduto'. Simboleggia
      il potere della memoria evocata da un piccolo oggetto quotidiano.
    pt: Refere-se a uma experiência sensorial que desencadeia memórias involuntárias, inspirada na descrição
      de Marcel Proust de provar um bolo madeleine em 'Em busca do tempo perdido'. Simboliza o poder da
      memória evocada por um pequeno objeto cotidiano.
    ru: Относится к сенсорному опыту, вызывающему непроизвольные воспоминания, вдохновленному описанием
      Марселем Прустом вкуса пирожного мадлен в романе «В поисках утраченного времени». Символизирует
      силу памяти, вызванной маленьким повседневным предметом.
    ja: マルセル・プルーストの『失われた時を求めて』でマドレーヌケーキを味わう描写に触発された、無意識の記憶を呼び起こす感覚体験を指します。小さな日常の物によって呼び起こされる記憶の力を象徴しています。
    zh: 指一种引发不由自主记忆的感官体验，灵感来自马塞尔·普鲁斯特在《追忆似水年华》中品尝玛德琳蛋糕的描述。象征着由一个小日常物品所唤起的记忆的力量。
    ar: يشير إلى تجربة حسية تثير ذكريات لا إرادية، مستوحاة من وصف مارسيل بروست لتذوق كعكة مادلين في 'البحث
      عن الزمن المفقود'. يرمز إلى قوة الذاكرة التي يثيرها شيء صغير يومي.
    he: מתייחס לחוויה חושית המעוררת זיכרונות לא רצוניים, בהשראת תיאורו של מרסל פרוסט מטעימת עוגת מדלן
      ב'בחיפוש אחר הזמן האבוד'. הוא מסמל את כוחה של הזיכרון שמעורר חפץ קטן ויומיומי.
