  short_explanation: From Pierre Corneille's tragedy 'Cinna', this line expresses the Stoic ideal of self-mastery,
    equating control over oneself with control over the universe. It is a classic example of French classical
    theater's focus on inner strength.
  i18n_explanations:
    en: From Pierre Corneille's tragedy 'Cinna', this line expresses the Stoic ideal of self-mastery,
      equating control over oneself with control over the universe. It is a classic example of French
      classical theater's focus on inner strength.
    es: De la tragedia 'Cinna' de Pierre Corneille, esta frase expresa el ideal estoico del autodominio,
      equiparando el control de uno mismo con el control del universo. Es un ejemplo clásico del énfasis
      del teatro clásico francés en la fortaleza interior.
    fr: De la tragédie 'Cinna' de Pierre Corneille, cette réplique exprime l'idéal stoïcien de la maîtrise
      de soi, en assimilant le contrôle de soi au contrôle de l'univers. C'est un exemple classique de
      l'accent mis par le théâtre classique français sur la force intérieure.
    de: Aus Pierre Corneilles Tragödie 'Cinna' drückt dieser Satz das stoische Ideal der Selbstbeherrschung
      aus, indem er die Kontrolle über sich selbst mit der Kontrolle über das Universum gleichsetzt. Es
      ist ein klassisches Beispiel für die Betonung innerer Stärke im französischen klassischen Theater.
    it: Dalla tragedia 'Cinna' di Pierre Corneille, questa frase esprime l'ideale stoico dell'autodominio,
      equiparando il controllo su se stessi al controllo sull'universo. È un classico esempio dell'enfasi
      del teatro classico francese sulla forza interiore.
    pt: Da tragédia 'Cinna' de Pierre Corneille, esta frase expressa o ideal estoico do autocontrole,
      equiparando o controle sobre si mesmo ao controle sobre o universo. É um exemplo clássico do foco
      do teatro clássico francês na força interior.
    ru: Из трагедии Пьера Корнеля «Цинна» эта фраза выражает стоический идеал самообладания, приравнивая
      контроль над собой к контролю над вселенной. Это классический пример акцента французского классического
      театра на внутренней силе.
    ja: ピエール・コルネイユの悲劇『シンナ』からのこの台詞は、自己統制のストア派の理想を表現し、自己の制御を宇宙の制御と同等と見なしています。フランス古典演劇が内面の強さに焦点を当てた古典的な例です。
    zh: 出自皮埃尔·高乃依的悲剧《西拿》，这句台词表达了斯多葛学派自我掌控的理想，将控制自己等同于控制宇宙。这是法国古典戏剧强调内心力量的经典例子。
