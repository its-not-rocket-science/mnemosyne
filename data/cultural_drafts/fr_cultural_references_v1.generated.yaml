- id: fr_cultural_reference_l_appel_du_18_juin_65f30cde
  language: fr
  canonical_reference: L'Appel du 18 juin
  reference_type: cultural_reference
  surface_patterns:
  - L'Appel du 18 juin
  - Appel du 18 juin
  short_explanation: Radio speech by Charles de Gaulle on June 18, 1940, from London, urging French resistance
    against Nazi occupation. It is considered the founding act of the Free French Forces.
  i18n_explanations:
    en: Radio speech by Charles de Gaulle on June 18, 1940, from London, urging French resistance against
      Nazi occupation. It is considered the founding act of the Free French Forces.
    es: Discurso radiofónico de Charles de Gaulle el 18 de junio de 1940 desde Londres, instando a la
      resistencia francesa contra la ocupación nazi. Se considera el acto fundacional de las Fuerzas Francesas
      Libres.
    fr: Discours radiophonique de Charles de Gaulle le 18 juin 1940 depuis Londres, exhortant à la résistance
      française contre l'occupation nazie. Il est considéré comme l'acte fondateur des Forces françaises
      libres.
    de: Radiorede von Charles de Gaulle am 18. Juni 1940 aus London, in der er zum französischen Widerstand
      gegen die Nazi-Besatzung aufrief. Sie gilt als Gründungsakt der Freien Französischen Streitkräfte.
    it: Discorso radiofonico di Charles de Gaulle il 18 giugno 1940 da Londra, invitante alla resistenza
      francese contro l'occupazione nazista. È considerato l'atto fondatore delle Forze Francesi Libere.
    pt: Discurso de rádio de Charles de Gaulle em 18 de junho de 1940, de Londres, exortando à resistência
      francesa contra a ocupação nazista. É considerado o ato fundador das Forças Francesas Livres.
    ru: Радиообращение Шарля де Голля 18 июня 1940 года из Лондона, призывающее к французскому сопротивлению
      против нацистской оккупации. Считается основополагающим актом Свободных французских сил.
    ja: 1940年6月18日、シャルル・ド・ゴールがロンドンから行ったラジオ演説。ナチス占領に対するフランスのレジスタンスを呼びかけた。自由フランス軍の創設行為と見なされている。
