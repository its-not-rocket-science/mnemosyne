    ru: Эта французская пословица означает 'Ничего не дается даром', указывая на то, что всё имеет свою
      цену. Это распространенное выражение прагматизма.
    ja: このフランスのことわざは「ただで何かを得ることはできない」という意味で、すべてには代償があることを示しています。実用主義の一般的な表現です。
    zh: 这句法国谚语的意思是'没有免费的午餐'，表明一切都有代价。这是实用主义的常见表达。
    ar: يعني هذا المثل الفرنسي 'لا تحصل على شيء مقابل لا شيء'، مشيراً إلى أن كل شيء له ثمن. إنه تعبير
