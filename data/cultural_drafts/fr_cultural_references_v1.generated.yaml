- id: fr_proverb_tradition_il_n_y_a_que_la_vérité_qui_blesse_920a5087
  language: fr
  canonical_reference: Il n’y a que la vérité qui blesse
  reference_type: proverb_tradition
  surface_patterns:
  - Il n’y a que la vérité qui blesse
  - Seule la vérité blesse
  - C'est la vérité qui blesse
  short_explanation: This French proverb means 'only the truth hurts,' emphasizing that painful remarks
    are often true. It is commonly used to acknowledge the sting of an honest criticism.
  i18n_explanations:
    en: This French proverb means 'only the truth hurts,' emphasizing that painful remarks are often true.
      It is commonly used to acknowledge the sting of an honest criticism.
    es: Este proverbio francés significa 'solo la verdad duele', enfatizando que los comentarios dolorosos
      suelen ser ciertos. Se usa comúnmente para reconocer el aguijón de una crítica honesta.
    fr: Ce proverbe français signifie « seule la vérité blesse », soulignant que les remarques douloureuses
      sont souvent vraies. Il est couramment utilisé pour reconnaître la piqûre d'une critique honnête.
    de: Dieses französische Sprichwort bedeutet 'nur die Wahrheit tut weh' und betont, dass schmerzhafte
      Bemerkungen oft wahr sind. Es wird häufig verwendet, um den Stachel einer ehrlichen Kritik anzuerkennen.
    it: Questo proverbio francese significa 'solo la verità fa male', sottolineando che le osservazioni
      dolorose sono spesso vere. È comunemente usato per riconoscere il pungiglione di una critica onesta.
    pt: Este provérbio francês significa 'só a verdade dói', enfatizando que comentários dolorosos são
      geralmente verdadeiros. É comumente usado para reconhecer a picada de uma crítica honesta.
    ru: Эта французская пословица означает «только правда ранит», подчеркивая, что болезненные замечания
      часто правдивы. Обычно используется, чтобы признать укол честной критики.
    ja: このフランスの諺は「真実だけが傷つける」という意味で、痛みを伴う発言はしばしば真実であることを強調しています。誠実な批判の痛みを認める際によく使われます。
    zh: 这句法国谚语意思是‘只有真相才伤人’，强调令人痛苦的言论往往是真实的。通常用于承认诚实批评的刺痛。
    ar: هذا المثل الفرنسي يعني 'الحقيقة فقط هي التي تؤذي'، مؤكدًا أن الملاحظات المؤلمة غالبًا ما تكون
      صحيحة. يُستخدم عادةً للاعتراف بوخز النقد الصادق.
    he: הפתגם הצרפתי הזה פירושו 'רק האמת כואבת', ומדגיש שהערות כואבות הן לעתים קרובות אמת. הוא משמש בדרך
      כלל כדי להכיר בעקיצתה של ביקורת כנה.
