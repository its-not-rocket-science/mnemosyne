- id: fr_classical_or_scriptural_allusion_connais_toi_toi_même_7e7f0d0c
  language: fr
  canonical_reference: Connais-toi toi-même
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - connais-toi toi-même
  - connais-toi
  short_explanation: This ancient Greek maxim (γνῶθι σεαυτόν) was inscribed at the Temple of Apollo at
    Delphi and famously used by Socrates. It emphasizes self-knowledge as a fundamental virtue, and is
    widely used in French as a call for introspection.
  i18n_explanations:
    en: This ancient Greek maxim (γνῶθι σεαυτόν) was inscribed at the Temple of Apollo at Delphi and famously
      used by Socrates. It emphasizes self-knowledge as a fundamental virtue, and is widely used in French
      as a call for introspection.
    es: Esta máxima griega antigua (γνῶθι σεαυτόν) estaba inscrita en el Templo de Apolo en Delfos y fue
      famosamente utilizada por Sócrates. Enfatiza el autoconocimiento como una virtud fundamental, y
      se usa ampliamente en francés como un llamado a la introspección.
    fr: Cette maxime grecque antique (γνῶθι σεαυτόν) était inscrite au temple d'Apollon à Delphes et a
      été utilisée célèbrement par Socrate. Elle met l'accent sur la connaissance de soi comme vertu fondamentale,
      et est largement utilisée en français comme un appel à l'introspection.
    de: Diese altgriechische Maxime (γνῶθι σεαυτόν) war im Tempel des Apollon in Delphi eingeschrieben
      und wurde berühmt von Sokrates verwendet. Sie betont Selbsterkenntnis als grundlegende Tugend und
      wird im Französischen häufig als Aufruf zur Selbstbesinnung verwendet.
    it: Questa massima greca antica (γνῶθι σεαυτόν) era incisa nel Tempio di Apollo a Delfi e fu famosamente
      usata da Socrate. Sottolinea la conoscenza di sé come virtù fondamentale, ed è ampiamente usata
      in francese come un invito all'introspezione.
    pt: Esta máxima grega antiga (γνῶθι σεαυτόν) estava inscrita no Templo de Apolo em Delfos e foi famosamente
      usada por Sócrates. Ela enfatiza o autoconhecimento como uma virtude fundamental, e é amplamente
      usada em francês como um chamado à introspecção.
    ru: Этот древнегреческий афоризм (γνῶθι σεαυτόν) был высечен в храме Аполлона в Дельфах и знаменит
      использованием Сократом. Он подчёркивает самопознание как фундаментальную добродетель и широко используется
      во французском языке как призыв к интроспекции.
    ja: この古代ギリシャの格言 (γνῶθι σεαυτόν) はデルポイのアポロン神殿に刻まれ、ソクラテスが有名に使用しました。自己認識を基本的な美徳として強調し、フランス語で内省への呼びかけとして広く使用されています。
    zh: 这句古希腊格言 (γνῶθι σεαυτόν) 刻在德尔斐的阿波罗神庙上，苏格拉底曾著名地引用过。它强调自我认识是一项基本美德，在法语中被广泛用作对自省的呼吁。
    ar: هذه المقولة اليونانية القديمة (γνῶθι σεαυτόν) كانت منقوشة في معبد أبولو في دلفي واستخدمها سقراط
      بشكل مشهور. تؤكد على معرفة الذات كفضيلة أساسية، وتستخدم على نطاق واسع في الفرنسية كدعوة للتأمل الذاتي.
    he: המקסימה היוונית העתיקה הזו (γνῶθι σεαυτόν) נחקקה במקדש אפולו בדלפי ושימשה את סוקרטס בצורה מפורסמת.
      היא מדגישה ידיעה עצמית כמידה בסיסית, ונמצאת בשימוש נרחב בצרפתית כקריאה להתבוננות פנימית.
