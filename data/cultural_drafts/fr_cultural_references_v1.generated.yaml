- id: fr_proverb_tradition_pierre_qui_roule_n_amasse_pas_mousse_e677eade
  language: fr
  canonical_reference: Pierre qui roule n’amasse pas mousse
  reference_type: proverb_tradition
  surface_patterns:
  - Pierre qui roule n’amasse pas mousse
  - Une pierre qui roule n'amasse pas mousse
  - Pierre qui roule n'amasse point mousse
  short_explanation: This French proverb means 'a rolling stone gathers no moss', suggesting that a person
    who frequently changes jobs or locations does not accumulate wealth or stable relationships.
  i18n_explanations:
    en: This French proverb means 'a rolling stone gathers no moss', suggesting that a person who frequently
      changes jobs or locations does not accumulate wealth or stable relationships.
    es: Este proverbio francés significa 'piedra que rueda no acumula musgo', sugiriendo que una persona
      que cambia frecuentemente de trabajo o de lugar no acumula riqueza ni relaciones estables.
    fr: Ce proverbe français signifie 'Pierre qui roule n’amasse pas mousse', suggérant qu’une personne
      qui change fréquemment de travail ou de lieu n’accumule ni richesse ni relations stables.
    de: Dieses französische Sprichwort bedeutet 'ein rollender Stein setzt kein Moos an' und legt nahe,
      dass eine Person, die häufig den Job oder den Ort wechselt, weder Reichtum noch stabile Beziehungen
      aufbaut.
    it: Questo proverbio francese significa 'sasso che rotola non accumula muschio', suggerendo che una
      persona che cambia frequentemente lavoro o luogo non accumula ricchezza né relazioni stabili.
    pt: Este provérbio francês significa 'pedra que rola não cria musgo', sugerindo que uma pessoa que
      muda frequentemente de emprego ou de local não acumula riqueza nem relacionamentos estáveis.
    ru: Эта французская пословица означает 'катящийся камень мох не собирает', намекая на то, что человек,
      часто меняющий работу или место жительства, не накапливает ни богатства, ни стабильных отношений.
    ja: このフランスのことわざは「転がる石には苔が生えない」という意味で、頻繁に仕事や場所を変える人は富や安定した人間関係を築けないことを示唆しています。
    zh: 这句法语谚语的意思是‘滚石不生苔’，暗示经常换工作或搬家的人无法积累财富或建立稳定的关系。
    ar: هذا المثل الفرنسي يعني 'الحجر المتدحرج لا يجمع الطحلب'، مشيرًا إلى أن الشخص الذي يغير وظائفه أو
      أماكنه بشكل متكرر لا يجمع ثروة أو علاقات مستقرة.
    he: פתגם צרפתי זה פירושו 'אבן מתגלגלת לא אוספת אזוב', ומציע שאדם שמחליף עבודות או מקומות לעתים קרובות
      אינו צובר עושר או קשרים יציבים.
