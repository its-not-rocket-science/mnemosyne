    zh: 西蒙娜·德·波伏娃《第二性》中的开创性论述，认为性别认同是社会建构而非生物决定的。这是女权主义理论的基石。
    ar: بيان مؤسس من كتاب 'الجنس الثاني' لسيمون دي بوفوار، يجادل بأن الهوية الجندرية مبنية اجتماعيًا وليست
