      primera certeza de la existencia propia basada en el acto de pensar. Es una piedra angular de la
      filosofía occidental y una expresión francesa común.
    fr: La célèbre déclaration philosophique de René Descartes dans le 'Discours de la méthode', établissant
      la première certitude de l'existence de soi fondée sur l'acte de penser. C'est une pierre angulaire
      de la philosophie occidentale et une expression française courante.
    de: René Descartes' berühmte philosophische Aussage aus dem 'Discours de la méthode', die die erste
      Gewissheit der eigenen Existenz auf der Grundlage des Denkaktes begründet. Es ist ein Eckpfeiler
      der westlichen Philosophie und ein gebräuchlicher französischer Ausdruck.
    it: La famosa affermazione filosofica di René Descartes dal 'Discorso sul metodo', che stabilisce
      la prima certezza dell'esistenza del sé basata sull'atto di pensare. È una pietra miliare della
      filosofia occidentale e un'espressione francese comune.
    pt: A famosa declaração filosófica de René Descartes do 'Discurso do Método', estabelecendo a primeira
      certeza da existência do eu baseada no ato de pensar. É uma pedra angular da filosofia ocidental
      e uma expressão francesa comum.
    ru: Знаменитое философское утверждение Рене Декарта из «Рассуждения о методе», устанавливающее первую
      достоверность собственного существования на основе акта мышления. Это краеугольный камень западной
      философии и распространённое французское выражение.
    ja: ルネ・デカルトの『方法序説』からの有名な哲学的声明で、考える行為に基づいて自己存在の最初の確実性を確立します。西洋哲学の礎石であり、一般的なフランス語表現です。
    zh: 勒内·笛卡尔在《方法论》中著名的哲学陈述，基于思考的行为确立了自我存在的第一个确定性。这是西方哲学的基石，也是一句常见的法语表达。
    ar: العبارة الفلسفية الشهيرة لرينيه ديكارت من 'خطاب المنهج'، التي تثبت اليقين الأول لوجود الذات بناءً
      على فعل التفكير. إنها حجر الزاوية في الفلسفة الغربية وتعبير فرنسي شائع.
    he: הצהרתו הפילוסופית המפורסמת של רנה דקארט מתוך 'מאמר על המתודה', הקובעת את הוודאות הראשונה של קיום
      העצמי המבוססת על פעולת החשיבה. זוהי אבן יסוד בפילוסופיה המערבית וביטוי צרפתי נפוץ.
