  short_explanation: Play by Samuel Beckett, in which two tramps, Vladimir and Estragon, wait endlessly
    for a mysterious figure named Godot, embodying the absurdity and meaninglessness of human existence.
  i18n_explanations:
    en: Play by Samuel Beckett, in which two tramps, Vladimir and Estragon, wait endlessly for a mysterious
      figure named Godot, embodying the absurdity and meaninglessness of human existence.
    es: Obra de Samuel Beckett, en la que dos vagabundos, Vladimir y Estragón, esperan interminablemente
      a un misterioso personaje llamado Godot, encarnando el absurdo y la falta de sentido de la existencia
      humana.
