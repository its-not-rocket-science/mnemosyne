- id: fr_literary_reference_le_complexe_d_œdipe_e96c05c6
  language: fr
  canonical_reference: Le complexe d'Œdipe
  reference_type: literary_reference
  surface_patterns:
  - complexe d'Œdipe
  - le complexe d'Œdipe
  - Œdipe complexe
  short_explanation: A psychoanalytic concept introduced by Sigmund Freud, based on the Greek myth of
    Oedipus who unknowingly kills his father and marries his mother. It describes a child's unconscious
    sexual desire for the opposite-sex parent and rivalry with the same-sex parent.
  i18n_explanations:
    en: A psychoanalytic concept introduced by Sigmund Freud, based on the Greek myth of Oedipus who unknowingly
      kills his father and marries his mother. It describes a child's unconscious sexual desire for the
      opposite-sex parent and rivalry with the same-sex parent.
    es: Un concepto psicoanalítico introducido por Sigmund Freud, basado en el mito griego de Edipo, que
      sin saberlo mata a su padre y se casa con su madre. Describe el deseo sexual inconsciente de un
      niño hacia el progenitor del sexo opuesto y la rivalidad con el del mismo sexo.
    fr: Un concept psychanalytique introduit par Sigmund Freud, basé sur le mythe grec d'Œdipe qui tue
      involontairement son père et épouse sa mère. Il décrit le désir sexuel inconscient d'un enfant pour
      le parent du sexe opposé et la rivalité avec le parent du même sexe.
    de: Ein von Sigmund Freud eingeführtes psychoanalytisches Konzept, basierend auf dem griechischen
      Mythos von Ödipus, der unwissentlich seinen Vater tötet und seine Mutter heiratet. Es beschreibt
      das unbewusste sexuelle Verlangen eines Kindes nach dem Elternteil des anderen Geschlechts und die
      Rivalität mit dem gleichgeschlechtlichen Elternteil.
    it: Un concetto psicoanalitico introdotto da Sigmund Freud, basato sul mito greco di Edipo che uccide
      inconsapevolmente suo padre e sposa sua madre. Descrive il desiderio sessuale inconscio di un bambino
      per il genitore di sesso opposto e la rivalità con quello dello stesso sesso.
    pt: Um conceito psicanalítico introduzido por Sigmund Freud, baseado no mito grego de Édipo, que sem
      saber mata seu pai e casa com sua mãe. Descreve o desejo sexual inconsciente de uma criança pelo
      genitor do sexo oposto e a rivalidade com o do mesmo sexo.
    ru: Психоаналитическая концепция, введенная Зигмундом Фрейдом, основанная на греческом мифе об Эдипе,
      который невольно убивает своего отца и женится на своей матери. Описывает бессознательное сексуальное
      влечение ребенка к родителю противоположного пола и соперничество с родителем того же пола.
    ja: ジークムント・フロイトによって導入された精神分析の概念で、無意識のうちに父を殺し母と結婚するオイディプスのギリシャ神話に基づく。子どもが異性の親に対して無意識の性的欲求を持ち、同性の親と競争することを描写する。
    zh: 由西格蒙德·弗洛伊德引入的精神分析概念，基于俄狄浦斯无意中杀父娶母的希腊神话。描述了儿童对异性父母的无意识性欲以及对同性父母的竞争。
    ar: مفهوم تحليلي نفسي قدمه سيغموند فرويد، استنادًا إلى الأسطورة اليونانية لأوديب الذي يقتل والده دون
      علم ويتزوج والدته. يصف الرغبة الجنسية اللاواعية للطفل تجاه الوالد من الجنس الآخر والتنافس مع الوالد
      من نفس الجنس.
    he: מושג פסיכואנליטי שהוצג על ידי זיגמונד פרויד, המבוסס על המיתוס היווני של אדיפוס שהורג את אביו שלא
      ביודעין ונושא את אמו לאישה. הוא מתאר את התשוקה המינית הלא מודעת של ילד להורה מהמין השני ואת היריבות
      עם ההורה מאותו המין.
