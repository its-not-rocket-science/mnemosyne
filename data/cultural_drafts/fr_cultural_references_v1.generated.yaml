- id: fr_proverb_tradition_petit_à_petit_l_oiseau_fait_son_nid_dd24e83d
  language: fr
  canonical_reference: Petit à petit, l’oiseau fait son nid
  reference_type: proverb_tradition
  surface_patterns:
  - Petit à petit, l’oiseau fait son nid
  - Peu à peu, l’oiseau fait son nid
  - L’oiseau fait son nid petit à petit
  short_explanation: This French proverb means 'little by little, the bird builds its nest', emphasizing
    that steady, incremental effort leads to success. It is equivalent to 'slow and steady wins the race'.
  i18n_explanations:
    en: This French proverb means 'little by little, the bird builds its nest', emphasizing that steady,
      incremental effort leads to success. It is equivalent to 'slow and steady wins the race'.
    es: Este proverbio francés significa 'poco a poco, el pájaro construye su nido', enfatizando que el
      esfuerzo constante e incremental conduce al éxito. Es equivalente a 'despacio y con constancia se
      gana la carrera'.
    fr: Ce proverbe français signifie 'petit à petit, l’oiseau fait son nid', soulignant qu’un effort
      régulier et progressif mène au succès. Il est équivalent à l'expression anglaise 'slow and steady
      wins the race'.
    de: Dieses französische Sprichwort bedeutet 'nach und nach baut der Vogel sein Nest' und betont, dass
      stetige, schrittweise Anstrengung zum Erfolg führt. Es entspricht dem englischen 'slow and steady
      wins the race'.
    it: Questo proverbio francese significa 'poco a poco, l'uccello costruisce il suo nido', sottolineando
      che uno sforzo costante e incrementale porta al successo. È equivalente a 'chi va piano va sano
      e va lontano'.
    pt: Este provérbio francês significa 'pouco a pouco, o pássaro faz seu ninho', enfatizando que o esforço
      constante e incremental leva ao sucesso. É equivalente a 'devagar e sempre'.
    ru: Эта французская пословица означает 'мало-помалу птица вьет гнездо', подчеркивая, что устойчивое,
      постепенное усилие ведет к успеху. Она эквивалентна английской пословице 'тише едешь — дальше будешь'.
    ja: このフランスのことわざは「少しずつ鳥は巣を作る」という意味で、着実な努力が成功につながることを強調しています。英語の「slow and steady wins the race」に相当します。
    zh: 这句法语谚语的意思是‘小鸟一点一点筑巢’，强调稳步、渐进的努力会带来成功。相当于英语谚语‘slow and steady wins the race’。
    ar: هذا المثل الفرنسي يعني 'شيئًا فشيئًا، يبني العصفور عشه'، مؤكدًا أن الجهد الثابت والمتدرج يؤدي
      إلى النجاح. وهو يعادل المثل الإنجليزي 'بطيء وثابت يفوز بالسباق'.
    he: פתגם צרפתי זה פירושו 'לאט לאט, הציפור בונה את קנה', ומדגיש שמאמץ יציב והדרגתי מוביל להצלחה. הוא
      שקול לפתגם האנגלי 'איטי ויציב מנצח במירוץ'.
