- id: fr_classical_or_scriptural_allusion_l_homme_est_un_loup_pour_l_homme_dfe871f6
  language: fr
  canonical_reference: L'homme est un loup pour l'homme
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - l'homme est un loup pour l'homme
  - homo homini lupus
  short_explanation: This Latin proverb (homo homini lupus) from Plautus' play 'Asinaria' and later used
    by Hobbes describes humanity's inherent cruelty towards each other. It is a common French expression
    highlighting the dark side of human nature.
  i18n_explanations:
    en: This Latin proverb (homo homini lupus) from Plautus' play 'Asinaria' and later used by Hobbes
      describes humanity's inherent cruelty towards each other. It is a common French expression highlighting
      the dark side of human nature.
    es: Este proverbio latino (homo homini lupus) de la obra 'Asinaria' de Plauto y posteriormente utilizado
      por Hobbes describe la crueldad inherente de la humanidad hacia los demás. Es una expresión francesa
      común que resalta el lado oscuro de la naturaleza humana.
    fr: Ce proverbe latin (homo homini lupus) de la pièce 'Asinaria' de Plaute et plus tard utilisé par
      Hobbes décrit la cruauté inhérente de l'humanité envers les autres. C'est une expression française
      courante qui met en évidence le côté sombre de la nature humaine.
    de: Dieses lateinische Sprichwort (homo homini lupus) aus Plautus' Stück 'Asinaria' und später von
      Hobbes verwendet, beschreibt die inhärente Grausamkeit der Menschheit gegeneinander. Es ist ein
      gebräuchlicher französischer Ausdruck, der die dunkle Seite der menschlichen Natur hervorhebt.
    it: Questo proverbio latino (homo homini lupus) dalla commedia 'Asinaria' di Plauto e successivamente
      usato da Hobbes descrive la crudeltà inerente dell'umanità verso gli altri. È un'espressione francese
      comune che evidenzia il lato oscuro della natura umana.
    pt: Este provérbio latino (homo homini lupus) da peça 'Asinaria' de Plauto e posteriormente usado
      por Hobbes descreve a crueldade inerente da humanidade uns para com os outros. É uma expressão francesa
      comum que destaca o lado sombrio da natureza humana.
    ru: Эта латинская пословица (homo homini lupus) из пьесы Плавта «Ослы» и позднее использованная Гоббсом
      описывает врождённую жестокость человечества по отношению друг к другу. Это распространённое французское
      выражение, подчёркивающее тёмную сторону человеческой природы.
    ja: プラウトゥスの戯曲『驢馬』に由来し、後にホッブズが用いたラテン語の諺 (homo homini lupus) は、人間の互いに対する生来の残酷さを表しています。人間性の暗い側面を強調する一般的なフランス語表現です。
    zh: 这句拉丁语谚语（homo homini lupus）出自普劳图斯的戏剧《驴的喜剧》，后被霍布斯引用，描述了人类彼此之间固有的残忍。这是一句常见的法语表达，突出了人性阴暗的一面。
    ar: هذا المثل اللاتيني (homo homini lupus) من مسرحية 'أسيناريا' لبلوتوس واستخدمه لاحقاً هوبز يصف القسوة
      المتأصلة في البشر تجاه بعضهم البعض. إنه تعبير فرنسي شائع يسلط الضوء على الجانب المظلم من الطبيعة
      البشرية.
    he: הפתגם הלטיני הזה (homo homini lupus) ממחזהו של פלאוטוס 'אסינריה' ובהמשך בשימוש הובס מתאר את האכזריות
      הטבועה של האנושות זה כלפי זה. זהו ביטוי צרפתי נפוץ המדגיש את הצד האפל של הטבע האנושי.
