- id: fr_proverb_tradition_l_habit_ne_fait_pas_le_moine_c3025ef2
  language: fr
  canonical_reference: L’habit ne fait pas le moine
  reference_type: proverb_tradition
  surface_patterns:
  - L’habit ne fait pas le moine
  - L'habit ne fait pas le moine
  - Habit ne fait pas moine
  short_explanation: This French proverb means 'the habit does not make the monk', cautioning against
    judging by appearances alone. It is similar to 'don't judge a book by its cover'.
  i18n_explanations:
    en: This French proverb means 'the habit does not make the monk', cautioning against judging by appearances
      alone. It is similar to 'don't judge a book by its cover'.
    es: Este proverbio francés significa 'el hábito no hace al monje', advirtiendo contra juzgar solo
      por las apariencias. Es similar a 'no juzgues un libro por su portada'.
    fr: Ce proverbe français signifie 'l'habit ne fait pas le moine', mettant en garde contre le jugement
      basé sur les apparences. Il est similaire à 'il ne faut pas se fier aux apparences'.
    de: Dieses französische Sprichwort bedeutet 'die Kutte macht noch keinen Mönch' und warnt davor, nur
      nach dem Äußeren zu urteilen. Es ist ähnlich wie 'man soll ein Buch nicht nach seinem Einband beurteilen'.
    it: Questo proverbio francese significa 'l'abito non fa il monaco', mettendo in guardia dal giudicare
      solo dalle apparenze. È simile a 'non giudicare un libro dalla copertina'.
    pt: Este provérbio francês significa 'o hábito não faz o monge', alertando contra julgar apenas pelas
      aparências. É semelhante a 'não julgue um livro pela capa'.
    ru: Эта французская пословица означает 'одежда не делает монахом', предостерегая от суждения по внешности.
      Она аналогична английской 'не суди книгу по обложке'.
    ja: このフランスのことわざは「習慣が僧侶を作るのではない」という意味で、外見だけで判断することへの警告です。英語の「don't judge a book by its cover」に似ています。
    zh: 这句法语谚语的意思是‘穿着僧袍不一定是僧侣’，告诫不要仅凭外表判断。类似于‘不要以貌取人’。
    ar: هذا المثل الفرنسي يعني 'العادة لا تصنع الراهب'، محذرًا من الحكم على المظاهر فقط. وهو مشابه للمثل
      الإنجليزي 'لا تحكم على الكتاب من غلافه'.
    he: פתגם צרפתי זה פירושו 'המנהג לא עושה את הנזיר', ומזהיר מפני שיפוט לפי מראה חיצוני בלבד. הוא דומה
      ל'אל תשפוט ספר לפי הכריכה שלו'.
