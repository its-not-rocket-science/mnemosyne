- id: fr_cultural_reference_rien_ne_se_perd_rien_ne_se_crée_tout_se_transforme_6c626eb6
  language: fr
  canonical_reference: Rien ne se perd, rien ne se crée, tout se transforme
  reference_type: cultural_reference
  surface_patterns:
  - Rien ne se perd, rien ne se crée, tout se transforme
  - rien ne se perd, rien ne se crée
  - tout se transforme
  short_explanation: This phrase summarizes the law of conservation of mass, stating that matter is neither
    created nor destroyed, only transformed. It is widely used in popular science and environmental contexts.
  i18n_explanations:
    en: This phrase summarizes the law of conservation of mass, stating that matter is neither created
      nor destroyed, only transformed. It is widely used in popular science and environmental contexts.
    es: Esta frase resume la ley de conservación de la masa, afirmando que la materia no se crea ni se
      destruye, solo se transforma. Se utiliza ampliamente en ciencia popular y contextos ambientales.
    fr: Cette phrase résume la loi de conservation de la masse, affirmant que la matière ne se crée ni
      ne se détruit, seulement se transforme. Elle est largement utilisée dans la science populaire et
      les contextes environnementaux.
    de: Dieser Satz fasst das Gesetz der Massenerhaltung zusammen, das besagt, dass Materie weder erschaffen
      noch zerstört, sondern nur umgewandelt wird. Es wird häufig in der Populärwissenschaft und in Umweltkontexten
      verwendet.
    it: Questa frase riassume la legge di conservazione della massa, affermando che la materia non si
      crea né si distrugge, ma solo si trasforma. È ampiamente usata nella divulgazione scientifica e
      in contesti ambientali.
    pt: Esta frase resume a lei da conservação da massa, afirmando que a matéria não é criada nem destruída,
      apenas transformada. É amplamente usada na ciência popular e em contextos ambientais.
    ru: Эта фраза резюмирует закон сохранения массы, утверждая, что материя не создаётся и не уничтожается,
      а только преобразуется. Она широко используется в научно-популярных и экологических контекстах.
    ja: このフレーズは質量保存の法則を要約しており、物質は生成も消滅もせず、単に変換されると述べています。ポピュラーサイエンスや環境の文脈で広く使われています。
    zh: 这句话概括了质量守恒定律，即物质既不能被创造也不能被消灭，只能转化。它广泛用于科普和环境语境中。
    ar: تلخص هذه العبارة قانون حفظ الكتلة، مؤكدة أن المادة لا تُخلق ولا تُدمر، بل تتحول فقط. وتُستخدم
      على نطاق واسع في العلوم الشعبية والسياقات البيئية.
    he: משפט זה מסכם את חוק שימור המסה, הקובע כי חומר אינו נוצר ואינו מושמד, אלא רק עובר שינוי. הוא נמצא
      בשימוש נרחב במדע פופולרי ובהקשרים סביבתיים.
