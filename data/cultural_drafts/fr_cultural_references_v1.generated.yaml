  i18n_explanations:
    en: This French proverb means 'You get nothing for nothing,' indicating that everything has a cost.
      It is a common expression of pragmatism.
    es: Este proverbio francés significa 'Nada se consigue sin nada', indicando que todo tiene un costo.
      Es una expresión común de pragmatismo.
    fr: Ce proverbe français signifie 'On n'a rien pour rien', indiquant que tout a un coût. C'est une
      expression courante de pragmatisme.
    de: Dieses französische Sprichwort bedeutet 'Nichts ist umsonst' und zeigt, dass alles seinen Preis
      hat. Es ist ein verbreiteter Ausdruck des Pragmatismus.
    it: Questo proverbio francese significa 'Non si ha nulla per nulla', indicando che tutto ha un costo.
