      sans fin un mystérieux personnage nommé Godot, incarnant l'absurdité et le non-sens de l'existence
      humaine.
    de: Theaterstück von Samuel Beckett, in dem zwei Landstreicher, Wladimir und Estragon, endlos auf
      eine mysteriöse Figur namens Godot warten, die die Absurdität und Sinnlosigkeit der menschlichen
      Existenz verkörpert.
    it: Opera teatrale di Samuel Beckett, in cui due vagabondi, Vladimir ed Estragone, aspettano all'infinito
      un misterioso personaggio di nome Godot, incarnando l'assurdità e l'insensatezza dell'esistenza
      umana.
    pt: Peça de Samuel Beckett, na qual dois vagabundos, Vladimir e Estragon, esperam infinitamente por
      uma figura misteriosa chamada Godot, personificando o absurdo e a falta de sentido da existência
      humana.
