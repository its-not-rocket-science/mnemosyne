- id: fr_literary_reference_il_faut_cultiver_notre_jardin_1092b1e4
  language: fr
  canonical_reference: Il faut cultiver notre jardin
  reference_type: literary_reference
  surface_patterns:
  - Il faut cultiver notre jardin
  - cultivons notre jardin
  - il faut cultiver le jardin
  short_explanation: The final line of Voltaire's Candide, advocating for practical work as a way to cope
    with the world's problems. It symbolizes a rejection of metaphysical speculation in favor of tangible
    action.
  i18n_explanations:
    en: The final line of Voltaire's Candide, advocating for practical work as a way to cope with the
      world's problems. It symbolizes a rejection of metaphysical speculation in favor of tangible action.
    es: La última línea de Cándido de Voltaire, que aboga por el trabajo práctico como una forma de hacer
      frente a los problemas del mundo. Simboliza un rechazo a la especulación metafísica a favor de la
      acción tangible.
    fr: La dernière ligne de Candide de Voltaire, prônant le travail pratique comme moyen de faire face
      aux problèmes du monde. Elle symbolise un rejet de la spéculation métaphysique au profit d'une action
      tangible.
    de: Der letzte Satz von Voltaires Candide, der praktische Arbeit als Mittel zur Bewältigung der Weltprobleme
      befürwortet. Er symbolisiert eine Ablehnung metaphysischer Spekulation zugunsten greifbarer Handlungen.
    it: L'ultima riga del Candido di Voltaire, che sostiene il lavoro pratico come modo per affrontare
      i problemi del mondo. Simboleggia un rifiuto della speculazione metafisica a favore dell'azione
      tangibile.
    pt: A última linha de Cândido, de Voltaire, defendendo o trabalho prático como forma de lidar com
      os problemas do mundo. Simboliza uma rejeição da especulação metafísica em favor da ação tangível.
    ru: Последняя строка «Кандида» Вольтера, пропагандирующая практическую работу как способ справляться
