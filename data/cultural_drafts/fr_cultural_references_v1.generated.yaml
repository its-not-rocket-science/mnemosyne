      à rouler un rocher en haut d'une colline pour qu'il redescende, comme métaphore de l'absurdité de
      la vie et de la lutte humaine pour trouver un sens.
    de: Bezieht sich auf Albert Camus' philosophischen Essay, der den griechischen Mythos von Sisyphos
