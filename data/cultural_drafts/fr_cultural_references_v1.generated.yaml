- id: fr_classical_or_scriptural_allusion_qui_sème_le_vent_récolte_la_tempête_ea955a41
  language: fr
  canonical_reference: Qui sème le vent récolte la tempête
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Qui sème le vent récolte la tempête
  - Semer le vent et récolter la tempête
  - Celui qui sème le vent récolte la tempête
  short_explanation: This French proverb, derived from the Bible (Hosea 8:7), means 'who sows the wind
    reaps the whirlwind', warning that harmful actions will bring severe consequences.
  i18n_explanations:
    en: This French proverb, derived from the Bible (Hosea 8:7), means 'who sows the wind reaps the whirlwind',
      warning that harmful actions will bring severe consequences.
    es: Este proverbio francés, derivado de la Biblia (Oseas 8:7), significa 'quien siembra viento, cosecha
      tempestades', advirtiendo que las acciones dañinas traerán graves consecuencias.
    fr: Ce proverbe français, tiré de la Bible (Osée 8:7), signifie 'qui sème le vent récolte la tempête',
      avertissant que les actions nuisibles entraînent de graves conséquences.
    de: Dieses französische Sprichwort, abgeleitet aus der Bibel (Hosea 8,7), bedeutet 'wer Wind sät,
      wird Sturm ernten' und warnt davor, dass schädliche Handlungen schwerwiegende Folgen haben.
    it: Questo proverbio francese, derivato dalla Bibbia (Osea 8:7), significa 'chi semina vento raccoglie
      tempesta', avvertendo che le azioni dannose portano a gravi conseguenze.
    pt: Este provérbio francês, derivado da Bíblia (Oseias 8:7), significa 'quem semeia vento colhe tempestade',
      alertando que ações prejudiciais trarão sérias consequências.
    ru: Эта французская пословица, взятая из Библии (Осия 8:7), означает 'кто сеет ветер, пожнет бурю',
      предупреждая, что вредные действия приведут к тяжелым последствиям.
    ja: このフランスのことわざは聖書（ホセア書8:7）に由来し、「風をまく者は嵐を刈り取る」という意味で、有害な行動が深刻な結果をもたらすと警告しています。
    zh: 这句法语谚语源自圣经（何西阿书8:7），意思是‘种风者收获风暴’，警告有害的行为会带来严重的后果。
    ar: 'هذا المثل الفرنسي، المستمد من الكتاب المقدس (هوشع 8: 7)، يعني ''من يزرع الريح يحصد العاصفة''،
      محذرًا من أن الأفعال الضارة ستؤدي إلى عواقب وخيمة.'
    he: פתגם צרפתי זה, שמקורו בתנ"ך (הושע ח' 7), פירושו 'הזורע רוח יקצור סופה', ומזהיר שמעשים מזיקים יביאו
      לתוצאות חמורות.
