- id: fr_cultural_reference_vive_le_québec_libre_c0e8785c
  language: fr
  canonical_reference: Vive le Québec libre!
  reference_type: cultural_reference
  surface_patterns:
  - Vive le Québec libre!
  - Vive le Québec libre !
  - vive le Québec libre
  short_explanation: Slogan shouted by Charles de Gaulle in Montreal on July 24, 1967, expressing support
    for Quebec sovereignty. It caused a diplomatic incident and remains iconic for Quebec nationalism.
  i18n_explanations:
    en: Slogan shouted by Charles de Gaulle in Montreal on July 24, 1967, expressing support for Quebec
      sovereignty. It caused a diplomatic incident and remains iconic for Quebec nationalism.
    es: Eslogan gritado por Charles de Gaulle en Montreal el 24 de julio de 1967, expresando apoyo a la
      soberanía de Quebec. Provocó un incidente diplomático y sigue siendo icónico para el nacionalismo
      quebequense.
    fr: Slogan crié par Charles de Gaulle à Montréal le 24 juillet 1967, exprimant son soutien à la souveraineté
      du Québec. Il a provoqué un incident diplomatique et reste emblématique du nationalisme québécois.
    de: Slogan, den Charles de Gaulle am 24. Juli 1967 in Montréal rief, um seine Unterstützung für die
      Souveränität Québecs auszudrücken. Er verursachte einen diplomatischen Zwischenfall und ist bis
      heute ein Symbol des Québec-Nationalismus.
    it: Slogan gridato da Charles de Gaulle a Montréal il 24 luglio 1967, esprimendo sostegno alla sovranità
      del Québec. Causò un incidente diplomatico e rimane iconico per il nazionalismo quebecchese.
    pt: Slogan gritado por Charles de Gaulle em Montreal em 24 de julho de 1967, expressando apoio à soberania
      de Quebec. Causou um incidente diplomático e permanece icônico para o nacionalismo quebequense.
    ru: Лозунг, выкрикнутый Шарлем де Голлем в Монреале 24 июля 1967 года, выражающий поддержку суверенитета
      Квебека. Вызвал дипломатический инцидент и остается культовым для квебекского национализма.
    ja: 1967年7月24日、シャルル・ド・ゴールがモントリオールで叫んだスローガンで、ケベックの主権への支持を表明。外交問題を引き起こし、ケベック・ナショナリズムの象徴として現在も有名。
    zh: 1967年7月24日，夏尔·戴高乐在蒙特利尔高喊的口号，表达对魁北克主权的支持。它引发了一场外交事件，并仍然是魁北克民族主义的标志性口号。
    ar: شعار صرخ به شارل ديغول في مونتريال في 24 يوليو 1967، معبرًا عن دعمه لسيادة كيبيك. تسبب في حادثة
