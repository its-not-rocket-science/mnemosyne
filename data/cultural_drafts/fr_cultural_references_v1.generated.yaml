- id: fr_literary_reference_l_enfer_c_est_les_autres_e087c13e
  language: fr
  canonical_reference: L'enfer, c'est les autres
  reference_type: literary_reference
  surface_patterns:
  - L'enfer, c'est les autres
  - l'enfer c'est les autres
  short_explanation: Famous line from Jean-Paul Sartre's play 'Huis Clos' (No Exit), expressing the idea
    that hell is not a place but the torment of being constantly judged by others. It encapsulates Sartre's
    existentialist philosophy.
  i18n_explanations:
    en: Famous line from Jean-Paul Sartre's play 'Huis Clos' (No Exit), expressing the idea that hell
      is not a place but the torment of being constantly judged by others. It encapsulates Sartre's existentialist
      philosophy.
    es: Famoso verso de la obra de Jean-Paul Sartre 'Huis Clos' (A puerta cerrada), que expresa la idea
      de que el infierno no es un lugar sino el tormento de ser constantemente juzgado por los demás.
      Resumes la filosofía existencialista de Sartre.
    fr: Réplique célèbre de la pièce de Jean-Paul Sartre 'Huis Clos', exprimant l'idée que l'enfer n'est
      pas un lieu mais le tourment d'être constamment jugé par autrui. Elle résume la philosophie existentialiste
      de Sartre.
    de: Berühmter Satz aus Jean-Paul Sartres Stück 'Geschlossene Gesellschaft', der die Idee ausdrückt,
      dass die Hölle kein Ort ist, sondern die Qual, ständig von anderen beurteilt zu werden. Er fasst
      Sartres existentialistische Philosophie zusammen.
    it: Famosa battuta dell'opera di Jean-Paul Sartre 'Huis Clos' (A porte chiuse), che esprime l'idea
      che l'inferno non è un luogo ma il tormento di essere costantemente giudicati dagli altri. Riassume
      la filosofia esistenzialista di Sartre.
    pt: Frase famosa da peça de Jean-Paul Sartre 'Huis Clos' (Entre Quatro Paredes), expressando a ideia
      de que o inferno não é um lugar, mas o tormento de ser constantemente julgado pelos outros. Resume
      a filosofia existencialista de Sartre.
    ru: Знаменитая фраза из пьесы Жана-Поля Сартра «За закрытыми дверями», выражающая идею о том, что
      ад — это не место, а мука быть постоянно осуждаемым другими. Она воплощает экзистенциалистскую философию
      Сартра.
    ja: ジャン＝ポール・サルトルの戯曲『出口なし』の有名な台詞で、地獄とは場所ではなく、他者から常に裁かれる苦痛であるという考えを表現しています。サルトルの実存主義哲学を要約しています。
    zh: 让-保罗·萨特戏剧《禁闭》中的著名台词，表达了地狱不是一个地方，而是不断被他人评判的折磨这一思想。它概括了萨特的存在主义哲学。
    ar: سطر مشهور من مسرحية جان بول سارتر 'خلف الأبواب المغلقة'، يعبر عن فكرة أن الجحيم ليس مكانًا بل
      هو عذاب التعرض للحكم المستمر من الآخرين. يلخص فلسفة سارتر الوجودية.
    he: שורה מפורסמת ממחזהו של ז'אן-פול סארטר 'דלתות סגורות', המבטאת את הרעיון שהגיהנום אינו מקום אלא
