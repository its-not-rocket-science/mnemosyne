    en: 'National motto of France, originating from the French Revolution. It symbolizes the core values
      of the Republic: individual freedom, equality before law, and brotherhood among citizens.'
    es: 'Lema nacional de Francia, originado en la Revolución Francesa. Simboliza los valores fundamentales
      de la República: libertad individual, igualdad ante la ley y fraternidad entre ciudadanos.'
    fr: 'Devise nationale de la France, issue de la Révolution française. Elle symbolise les valeurs fondamentales
      de la République : liberté individuelle, égalité devant la loi et fraternité entre les citoyens.'
    de: 'Nationales Motto Frankreichs, das aus der Französischen Revolution stammt. Es symbolisiert die
      Kernwerte der Republik: individuelle Freiheit, Gleichheit vor dem Gesetz und Brüderlichkeit unter
      den Bürgern.'
    it: 'Motto nazionale della Francia, originato dalla Rivoluzione francese. Simboleggia i valori fondamentali
      della Repubblica: libertà individuale, uguaglianza davanti alla legge e fraternità tra cittadini.'
    pt: 'Lema nacional da França, originado na Revolução Francesa. Simboliza os valores fundamentais da
      República: liberdade individual, igualdade perante a lei e fraternidade entre cidadãos.'
    ru: 'Национальный девиз Франции, берущий начало во Французской революции. Он символизирует основные
      ценности Республики: индивидуальную свободу, равенство перед законом и братство между гражданами.'
    ja: フランスの国家標語で、フランス革命に由来する。共和国の核となる価値観、すなわち個人の自由、法の下の平等、市民間の友愛を象徴している。
    zh: 法国的国家格言，源自法国大革命。它象征着共和国的核心价值：个人自由、法律面前人人平等和公民之间的博爱。
    ar: 'الشعار الوطني لفرنسا، نشأ من الثورة الفرنسية. يرمز إلى القيم الأساسية للجمهورية: الحرية الفردية،
      المساواة أمام القانون، والأخوة بين المواطنين.'
    he: 'המוטו הלאומי של צרפת, שמקורו במהפכה הצרפתית. הוא מסמל את ערכי הליבה של הרפובליקה: חירות אישית,
