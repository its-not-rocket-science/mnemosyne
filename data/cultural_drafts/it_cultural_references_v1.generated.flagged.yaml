- id: it_proverb_tradition_il_tempo_è_denaro_a4a058ec
  language: it
  canonical_reference: Il tempo è denaro
  reference_type: proverb_tradition
  surface_patterns:
  - Il tempo è denaro
  - tempo è denaro
  - il tempo è oro
  short_explanation: Equivalent to 'Time is money'; emphasizes the value of time in productivity. A modern
    calque from English, widely used in business contexts.
  i18n_explanations:
    en: Equivalent to 'Time is money'; emphasizes the value of time in productivity. A modern calque from
      English, widely used in business contexts.
    es: Equivalente a 'El tiempo es dinero'; enfatiza el valor del tiempo en la productividad. Un calco
      moderno del inglés, muy usado en contextos empresariales.
    fr: Équivalent de 'Le temps, c’est de l’argent'; souligne la valeur du temps dans la productivité.
      Un calque moderne de l’anglais, largement utilisé dans les contextes professionnels.
    de: Entspricht 'Zeit ist Geld'; betont den Wert der Zeit für die Produktivität. Ein moderner Anglizismus,
      häufig in Geschäftskontexten verwendet.
    it: Equivalente a 'Il tempo è denaro'; enfatizza il valore del tempo nella produttività. Un calco
      moderno dall'inglese, ampiamente usato in contesti aziendali.
    pt: Equivalente a 'Tempo é dinheiro'; enfatiza o valor do tempo na produtividade. Um calque moderno
      do inglês, amplamente usado em contextos empresariais.
    ru: Эквивалентно 'Время — деньги'; подчеркивает ценность времени в продуктивности. Современная калька
      с английского, широко используется в деловом контексте.
    ja: 「時は金なり」に相当。生産性における時間の価値を強調する。英語からの現代的な借用で、ビジネス文脈で広く使われる。
    zh: 相当于'时间就是金钱'；强调时间在生产力中的价值。是现代从英语借用的说法，广泛用于商业语境。
    ar: يعادل 'الوقت من ذهب'؛ يؤكد على قيمة الوقت في الإنتاجية. اقتراض حديث من الإنجليزية، يستخدم على
      نطاق واسع في سياقات الأعمال.
    he: מקביל ל'זמן הוא כסף'; מדגיש את ערך הזמן ביעילות. שאילה מודרנית מאנגלית, נפוצה בהקשרים עסקיים.
