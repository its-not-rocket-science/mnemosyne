  short_explanation: Latin phrase meaning 'Rome, capital of the world,' used to express the dominance
    and centrality of Rome in antiquity and later Christian contexts.
  i18n_explanations:
    en: Latin phrase meaning 'Rome, capital of the world,' used to express the dominance and centrality
      of Rome in antiquity and later Christian contexts.
    es: Frase latina que significa 'Roma, capital del mundo', usada para expresar el dominio y la centralidad
      de Roma en la antigüedad y posteriormente en contextos cristianos.
    fr: Locution latine signifiant 'Rome, capitale du monde', utilisée pour exprimer la domination et
      la centralité de Rome dans l'Antiquité et plus tard dans des contextes chrétiens.
    de: Lateinische Phrase mit der Bedeutung 'Rom, Hauptstadt der Welt', die die Dominanz und Zentralität
      Roms in der Antike und später in christlichen Kontexten ausdrückt.
    it: Frase latina che significa 'Roma, capitale del mondo', usata per esprimere il dominio e la centralità
      di Roma nell'antichità e successivamente in contesti cristiani.
    pt: Frase latina que significa 'Roma, capital do mundo', usada para expressar o domínio e a centralidade
      de Roma na antiguidade e posteriormente em contextos cristãos.
    ru: Латинская фраза, означающая 'Рим — столица мира', используемая для выражения господства и центральности
      Рима в древности и позднее в христианских контекстах.
    ja: 「ローマ、世界の首都」を意味するラテン語のフレーズ。古代および後のキリスト教の文脈でローマの支配と中心性を表現するために使われる。
    zh: 拉丁语短语，意为“罗马，世界之都”，用于表达罗马在古代及后来基督教语境中的统治地位和中心地位。
    ar: عبارة لاتينية تعني 'روما عاصمة العالم'، تُستخدم للتعبير عن هيمنة روما ومركزيتها في العصور القديمة
      ولاحقًا في السياقات المسيحية.
    he: ביטוי לטיני שפירושו 'רומא, בירת העולם', המשמש להבעת הדומיננטיות והמרכזיות של רומא בעת העתיקה ובהקשרים
      נוצריים מאוחרים יותר.
