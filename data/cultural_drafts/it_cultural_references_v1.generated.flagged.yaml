- id: it_literary_reference_ragazzi_di_vita_d4af990c
  language: it
  canonical_reference: Ragazzi di vita
  reference_type: literary_reference
  surface_patterns:
  - Ragazzi di vita
  short_explanation: Pier Paolo Pasolini's first novel, depicting the lives of young street toughs in
    the Roman suburbs; marks the beginning of Italian neorealism in literature.
  i18n_explanations:
    en: Pier Paolo Pasolini's first novel, depicting the lives of young street toughs in the Roman suburbs;
      marks the beginning of Italian neorealism in literature.
    es: Primera novela de Pier Paolo Pasolini, que retrata las vidas de jóvenes maleantes callejeros en
      los suburbios romanos; marca el inicio del neorrealismo italiano en la literatura.
    fr: Premier roman de Pier Paolo Pasolini, décrivant la vie de jeunes voyous des rues dans les banlieues
      romaines; marque le début du néoréalisme italien en littérature.
    de: Pier Paolo Pasolinis erster Roman, der das Leben junger Straßenschläger in den römischen Vorstädten
      schildert; markiert den Beginn des italienischen Neorealismus in der Literatur.
    it: Primo romanzo di Pier Paolo Pasolini, che descrive la vita di giovani teppisti di strada nei sobborghi
      romani; segna l'inizio del neorealismo italiano in letteratura.
    pt: Primeiro romance de Pier Paolo Pasolini, retratando a vida de jovens marginais das ruas nos subúrbios
      romanos; marca o início do neorrealismo italiano na literatura.
    ru: Первый роман Пьера Паоло Пазолини, изображающий жизнь молодых уличных хулиганов в римских пригородах;
      знаменует начало итальянского неореализма в литературе.
    ja: ピエル・パオロ・パゾリーニの最初の小説。ローマ郊外の若いストリートギャングの生活を描き、文学におけるイタリアンネオレアリズモの始まりを示す。
    zh: 皮埃尔·保罗·帕索里尼的首部小说，描绘罗马郊区街头混混的生活；标志着意大利文学新现实主义的开端。
    ar: أول رواية لبيير باولو باسوليني، تصور حياة شباب الشوارع في ضواحي روما؛ تمثل بداية الواقعية الجديدة
      الإيطالية في الأدب.
    he: הרומן הראשון של פייר פאולו פאזוליני, המתאר את חייהם של צעירי רחוב קשוחים בפרברי רומא; מסמן את
