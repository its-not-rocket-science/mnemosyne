- id: it_proverb_tradition_tanta_testa_tanto_cappello_1689afc5
  language: it
  canonical_reference: Tanta testa, tanto cappello
  reference_type: proverb_tradition
  surface_patterns:
  - Tanta testa, tanto cappello
  - a testa grande, cappello grande
  short_explanation: 'Literal: ''So much head, so much hat.'' Used to indicate proportionality or that
    each person gets what they deserve, often with a fatalistic tone.'
  i18n_explanations:
    en: 'Literal: ''So much head, so much hat.'' Used to indicate proportionality or that each person
      gets what they deserve, often with a fatalistic tone.'
    es: 'Literal: ''Tanta cabeza, tanto sombrero.'' Se usa para indicar proporcionalidad o que cada persona
      recibe lo que merece, a menudo con un tono fatalista.'
    fr: 'Littéral : ''Tant de tête, tant de chapeau.'' Utilisé pour indiquer la proportionnalité ou que
      chacun obtient ce qu’il mérite, souvent avec un ton fataliste.'
    de: 'Wörtlich: ''So viel Kopf, so viel Hut.'' Wird verwendet, um Verhältnismäßigkeit anzuzeigen oder
      dass jeder bekommt, was er verdient, oft mit fatalistischem Ton.'
    it: 'Letterale: ''Tanta testa, tanto cappello.'' Usato per indicare proporzionalità o che ognuno ottiene
      ciò che merita, spesso con tono fatalistico.'
    pt: 'Literal: ''Tanta cabeça, tanto chapéu.'' Usado para indicar proporcionalidade ou que cada um
      recebe o que merece, muitas vezes com um tom fatalista.'
    ru: 'Буквально: ''Сколько головы, столько и шляпы.'' Используется для указания пропорциональности
      или того, что каждый получает то, что заслуживает, часто с фаталистическим оттенком.'
    ja: '直訳: ''頭の大きさに応じて帽子も決まる''。比例関係や、人はそれぞれにふさわしいものを受けることを示す。しばしば運命論的なニュアンスで使われる。'
    zh: 字面意思：'多大的头，多大的帽子。'用于表示比例性或每个人得到他们应得的，常带有宿命论的语气。
    ar: 'حرفياً: ''بقدر الرأس، بقدر القبعة.'' يُستخدم للإشارة إلى التناسب أو أن كل شخص يحصل على ما يستحقه،
      غالباً بنبرة قدرية.'
    he: 'תרגום מילולי: ''כל כך הרבה ראש, כל כך הרבה כובע.'' משמש לציון פרופורציה או שכל אחד מקבל את המגיע
      לו, לעתים קרובות בנימה פטליסטית.'
