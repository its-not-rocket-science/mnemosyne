- id: it_cultural_reference_l_angoscia_5462ae6a
  language: it
  canonical_reference: L'angoscia
  reference_type: cultural_reference
  surface_patterns:
  - angoscia
  - l'angoscia
  short_explanation: In existentialist philosophy, 'angoscia' (angst) refers to the profound anxiety or
    dread that arises from human freedom and the responsibility to choose one's own essence.
  i18n_explanations:
    en: In existentialist philosophy, 'angoscia' (angst) refers to the profound anxiety or dread that
      arises from human freedom and the responsibility to choose one's own essence.
    es: En la filosofía existencialista, la 'angoscia' (angustia) se refiere a la profunda ansiedad o
      temor que surge de la libertad humana y la responsabilidad de elegir la propia esencia.
    fr: Dans la philosophie existentielle, l'« angoscia » (angoisse) désigne l'anxiété profonde ou l'effroi
      qui découle de la liberté humaine et de la responsabilité de choisir sa propre essence.
    de: In der existentialistischen Philosophie bezieht sich 'Angoscia' (Angst) auf die tiefe Besorgnis
      oder Furcht, die aus der menschlichen Freiheit und der Verantwortung, das eigene Wesen zu wählen,
      entsteht.
    it: Nella filosofia esistenzialista, l'angoscia si riferisce all'ansia profonda o al timore che deriva
      dalla libertà umana e dalla responsabilità di scegliere la propria essenza.
    pt: Na filosofia existencialista, 'angoscia' (angústia) refere-se à profunda ansiedade ou pavor que
      surge da liberdade humana e da responsabilidade de escolher a própria essência.
    ru: В экзистенциалистской философии «ангосция» (тревога) относится к глубокой тревоге или ужасу, возникающим
      из человеческой свободы и ответственности выбора собственной сущности.
    ja: 実存主義哲学において、「アンゴスチャ」（不安）とは、人間の自由と自己の本質を選択する責任から生じる深い不安や恐怖を指します。
    zh: 在存在主义哲学中，“angoscia”（焦虑）指的是源于人类自由和选择自己本质的责任而产生的深刻焦虑或恐惧。
    ar: في الفلسفة الوجودية، تشير "الأنغوسيا" (القلق) إلى القلق العميق أو الرعب الذي ينشأ من الحرية البشرية
      ومسؤولية اختيار جوهر الفرد.
    he: בפילוסופיה האקזיסטנציאליסטית, 'אנגוסיה' (חרדה) מתייחסת לחרדה העמוקה או לאימה הנובעת מהחופש האנושי
      ומהאחריות לבחור את המהות העצמית.
