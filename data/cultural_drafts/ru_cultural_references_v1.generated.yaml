- id: ru_cultural_reference_кровавое_воскресенье_a21cb867
  language: ru
  canonical_reference: Кровавое воскресенье
  reference_type: cultural_reference
  surface_patterns:
  - Кровавое воскресенье
  short_explanation: Refers to January 9, 1905, when Imperial Russian troops fired on unarmed demonstrators
    in St. Petersburg, sparking the 1905 Revolution. Symbolizes state violence against peaceful protest.
  i18n_explanations:
    en: Refers to January 9, 1905, when Imperial Russian troops fired on unarmed demonstrators in St.
      Petersburg, sparking the 1905 Revolution. Symbolizes state violence against peaceful protest.
    es: Se refiere al 9 de enero de 1905, cuando tropas rusas imperiales dispararon contra manifestantes
      desarmados en San Petersburgo, desencadenando la Revolución de 1905. Simboliza la violencia estatal
      contra protestas pacíficas.
    fr: Fait référence au 9 janvier 1905, lorsque des troupes impériales russes ont tiré sur des manifestants
      pacifiques à Saint-Pétersbourg, déclenchant la Révolution de 1905. Symbolise la violence d'État
      contre les protestations pacifiques.
    de: Bezieht sich auf den 9. Januar 1905, als zaristische Truppen in St. Petersburg auf unbewaffnete
      Demonstranten schossen und damit die Revolution von 1905 auslösten. Steht für staatliche Gewalt
      gegen friedlichen Protest.
    it: Si riferisce al 9 gennaio 1905, quando truppe imperiali russe spararono contro manifestanti disarmati
      a San Pietroburgo, scatenando la Rivoluzione del 1905. Simboleggia la violenza statale contro proteste
      pacifiche.
    pt: Refere-se a 9 de janeiro de 1905, quando tropas russas imperiais atiraram em manifestantes desarmados
      em São Petersburgo, desencadeando a Revolução de 1905. Simboliza a violência estatal contra protestos
      pacíficos.
    ru: Относится к 9 января 1905 года, когда царские войска расстреляли мирных демонстрантов в Санкт-Петербурге,
      что стало началом Революции 1905 года. Символизирует насилие государства против мирных протестов.
    ja: 1905年1月9日に帝政ロシア軍がサンクトペテルブルクで非武装のデモ参加者を射撃し、1905年革命を引き起こした事件を指す。平和的抗議に対する国家暴力の象徴。
    zh: 指1905年1月9日帝俄军队在圣彼得堡向手无寸铁的示威者开枪，引发1905年革命。象征国家暴力对和平抗议的镇压。
    ar: يشير إلى 9 يناير/كانون الثاني 1905، عندما أطلقت القوات الإمبراطورية الروسية النار على متظاهرين
      عزل في سانت بطرسبرغ، مما أشعل ثورة 1905. يرمز إلى عنف الدولة ضد الاحتجاجات السلمية.
    he: מתייחס ל-9 בינואר 1905, כאשר כוחות צבא האימפריה הרוסית ירו על מפגינים לא חמושים בסנקט פטרבורג,
