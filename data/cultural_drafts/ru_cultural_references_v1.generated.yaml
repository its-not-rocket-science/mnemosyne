  i18n_explanations:
    en: Refers to something that started well but failed to develop or thrive. Often used to describe
      unfulfilled potential or wasted opportunities.
    es: Se refiere a algo que comenzó bien pero no logró desarrollarse o prosperar. Suele usarse para
      describir potencial no aprovechado o oportunidades desperdiciadas.
    fr: Fait référence à quelque chose qui a bien commencé mais n'a pas réussi à se développer ou à prospérer.
      Souvent utilisé pour décrire un potentiel non réalisé ou des opportunités gaspillées.
    de: Bezieht sich auf etwas, das gut begann, sich aber nicht weiterentwickeln oder gedeihen konnte.
      Wird oft für ungenutztes Potenzial oder vertane Chancen verwendet.
    it: Si riferisce a qualcosa che è iniziato bene ma non è riuscito a svilupparsi o prosperare. Spesso
      usato per descrivere un potenziale inutilizzato o opportunità sprecate.
    pt: Refere-se a algo que começou bem, mas não conseguiu se desenvolver ou prosperar. Geralmente usado
