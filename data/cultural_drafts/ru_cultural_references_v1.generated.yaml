    and humility. It reflects the Russian cultural value of continuous self-improvement.
  i18n_explanations:
    en: A proverb meaning 'Live a century, learn a century'—emphasizing lifelong learning and humility.
      It reflects the Russian cultural value of continuous self-improvement.
    es: Refrán que significa 'Vive un siglo, aprende un siglo', destacando el aprendizaje continuo y la
      humildad. Refleja el valor cultural ruso de la superación personal.
    fr: Proverbe signifiant 'Vivre un siècle, apprendre un siècle', soulignant l'apprentissage continu
      et l'humilité. Il reflète la valeur culturelle russe de l'amélioration de soi.
    de: Ein Sprichwort mit der Bedeutung 'Lebe ein Jahrhundert, lerne ein Jahrhundert' — betont lebenslanges
      Lernen und Demut. Es spiegelt den russischen Kulturwert der kontinuierlichen Selbstverbesserung
      wider.
    it: Un proverbio che significa 'Vivi un secolo, impara un secolo', che sottolinea l'apprendimento
      continuo e l'umiltà. Riflette il valore culturale russo del miglioramento personale.
    pt: Um provérbio que significa 'Viva um século, aprenda um século', enfatizando a aprendizagem ao
      longo da vida e a humildade. Reflete o valor cultural russo da melhoria contínua.
    ru: Пословица, означающая 'Живи век, учись век', подчеркивающая важность обучения на протяжении всей
      жизни и смирения. Отражает русскую культурную ценность постоянного самосовершенствования.
    ja: 「百年生きて、百年学べ」という意味の諺で、生涯学習と謙虚さを重視します。ロシア文化における継続的な自己向上の価値観を反映しています。
    zh: 意为“活一百年，学一百年”的谚语，强调终身学习和谦逊。反映了俄罗斯文化中不断自我完善的价值观。
    ar: مثل يعني 'عش قرنًا، تعلم قرنًا'، يسلط الضوء على التعلم مدى الحياة والتواضع. يعكس القيمة الثقافية
