- id: ru_classical_or_scriptural_allusion_взятие_бастилии_3386e049
  language: ru
  canonical_reference: Взятие Бастилии
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Взятие Бастилии
  - штурм Бастилии
  - падение Бастилии
  short_explanation: Refers to the storming of the Bastille prison on July 14, 1789, a pivotal event of
    the French Revolution symbolizing the overthrow of the monarchy and the rise of popular sovereignty.
  i18n_explanations:
    en: Refers to the storming of the Bastille prison on July 14, 1789, a pivotal event of the French
      Revolution symbolizing the overthrow of the monarchy and the rise of popular sovereignty.
    es: Se refiere a la toma de la prisión de la Bastilla el 14 de julio de 1789, un evento clave de la
      Revolución Francesa que simboliza el derrocamiento de la monarquía y el ascenso de la soberanía
      popular.
    fr: Fait référence à la prise de la prison de la Bastille le 14 juillet 1789, un événement clé de
      la Révolution française symbolisant le renversement de la monarchie et l'avènement de la souveraineté
      populaire.
    de: Bezieht sich auf die Erstürmung des Staatsgefängnisses Bastille am 14. Juli 1789, ein zentrales
      Ereignis der Französischen Revolution, das den Sturz der Monarchie und den Aufstieg der Volkssouveränität
      symbolisiert.
    it: Si riferisce alla presa della prigione della Bastiglia il 14 luglio 1789, un evento cruciale della
      Rivoluzione francese che simboleggia la caduta della monarchia e l'ascesa della sovranità popolare.
    pt: Refere-se à tomada da prisão da Bastilha em 14 de julho de 1789, um evento pivotal da Revolução
      Francesa que simboliza a derrubada da monarquia e o surgimento da soberania popular.
    ru: Относится к штурму тюрьмы Бастилия 14 июля 1789 года, ключевому событию Великой французской революции,
      символизирующему свержение монархии и утверждение народного суверенитета.
    ja: 1789年7月14日に起きたバスティーユ牢獄の襲撃事件を指し、フランス革命の転換点であり、君主制の打倒と人民主権の台頭を象徴する出来事。
    zh: 指的是1789年7月14日攻占巴士底狱这一事件，法国大革命的关键时刻，象征着君主制的推翻和人民主权的兴起。
    ar: يشير إلى اقتحام سجن الباستيل في 14 يوليو 1789، وهو حدث محوري في الثورة الفرنسية يرمز إلى إسقاط
      الملكية وصعود السيادة الشعبية.
    he: מתייחס לכיבוש בית הכלא הבסטיליה ב-14 ביולי 1789, אירוע מכונן במהפכה הצרפתית המסמל את הפלת המלוכה
      ועליית ריבונות העם.
