    ja: アリストテレスに帰せられる格言で、真実が個人的な忠誠よりも優先されることを強調しています。知的または道徳的な議論における公平性を正当化するためにしばしば用いられます。
    zh: 归于亚里士多德的经典名言，强调真理重于个人忠诚。常用于为知识或道德辩论中的公正性辩护。
    ar: قول كلاسيكي يُنسب إلى أرسطو، يبرز الأولوية للحقيقة على الولاء الشخصي. يُستخدم غالبًا لتبرير الحيادية
