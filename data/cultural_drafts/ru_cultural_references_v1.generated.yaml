    en: A fatalistic proverb meaning that some people's inherent flaws or bad habits cannot be changed,
      even by death. It reflects a belief in the immutability of character.
    es: Refrán fatalista que significa que los defectos o malos hábitos inherentes de algunas personas
      no pueden cambiarse ni siquiera con la muerte. Refleja la creencia en la inmutabilidad del carácter.
    fr: Proverbe fataliste signifiant que les défauts ou mauvaises habitudes inhérents de certaines personnes
      ne peuvent être changés, même par la mort. Il reflète une croyance en l'immuabilité du caractère.
    de: Ein fatalistisches Sprichwort, das besagt, dass die angeborenen Fehler oder schlechten Gewohnheiten
      mancher Menschen nicht einmal durch den Tod geändert werden können. Es spiegelt den Glauben an die
      Unveränderlichkeit des Charakters wider.
    it: Un proverbio fatalista che significa che i difetti o le cattive abitudini innate di alcune persone
      non possono essere cambiati, nemmeno dalla morte. Riflette la convinzione nell'immutabilità del
      carattere.
    pt: Um provérbio fatalista que significa que os defeitos ou maus hábitos inerentes de algumas pessoas
      não podem ser mudados nem mesmo pela morte. Reflete a crença na imutabilidade do caráter.
