- id: ru_proverb_tradition_богатство_нищету_родит_64b342e6
  language: ru
  canonical_reference: Богатство нищету родит
  reference_type: proverb_tradition
  surface_patterns:
  - Богатство нищету родит
  - От богатства до нищеты один шаг
  - Богатство нищету родит, а бедность — разум
  short_explanation: A Russian proverb warning that wealth can lead to poverty if mismanaged, or that
    excessive wealth may breed laziness and ruin. Reflects traditional caution against greed and financial
    recklessness.
  i18n_explanations:
    en: A Russian proverb warning that wealth can lead to poverty if mismanaged, or that excessive wealth
      may breed laziness and ruin. Reflects traditional caution against greed and financial recklessness.
    es: Un refrán ruso que advierte que la riqueza puede llevar a la pobreza si se malgasta, o que la
      riqueza excesiva puede generar pereza y ruina. Refleja la advertencia tradicional contra la avaricia
      y la imprudencia financiera.
    fr: Un proverbe russe avertissant que la richesse peut mener à la pauvreté si elle est mal gérée,
      ou que l'opulence excessive peut engendrer la paresse et la ruine. Reflète la prudence traditionnelle
      contre la cupidité et l'imprudence financière.
    de: Ein russisches Sprichwort, das warnt, dass Reichtum zu Armut führen kann, wenn er schlecht verwaltet
      wird, oder dass übermäßiger Reichtum Faulheit und Ruin hervorbringen kann. Zeigt die traditionelle
      Vorsicht vor Gier und finanzieller Leichtsinnigkeit.
    it: Un proverbio russo che avverte che la ricchezza può portare alla povertà se mal gestita, o che
      l'eccesso di ricchezza può generare pigrizia e rovina. Riflette la tradizionale cautela contro l'avidità
      e l'imprudenza finanziaria.
    pt: Um provérbio russo que adverte que a riqueza pode levar à pobreza se mal administrada, ou que
      a riqueza excessiva pode gerar preguiça e ruína. Reflete o tradicional cuidado contra a ganância
      e a imprudência financeira.
    ru: Русская пословица, предупреждающая, что богатство может привести к бедности при неразумном управлении,
      или что чрезмерное богатство способно порождать лень и разорение. Отражает традиционное предостережение
      от жадности и финансовой безрассудности.
    ja: ロシアのことわざで、財産は不適切に管理されれば貧困につながる、あるいは過度な富は怠惰と破滅を招くという警告。貪欲と金銭的無謀さへの伝統的な警戒を反映している。
    zh: 俄罗斯谚语，警告说财富若管理不当会导致贫困，或过度财富可能滋生懒惰与毁灭。反映了对贪婪和金钱无度的传统警惕。
    ar: مثل روسي يحذر من أن الثروة قد تؤدي إلى الفقر إذا لم تُدار بشكل صحيح، أو أن الثروة المفرطة قد تولد
      الكسل والخراب. يعكس الحذر التقليدي من الجشع وعدم الحكمة المالية.
    he: פתגם רוסי המזהיר כי עושר עלול להוביל לעוני אם מנוהל בצורה גרועה, או שעושר מופרז עלול לגרום לעצלנות
      ולהרס. משקף את הזהירות המסורתית מפני חמדנות וחוסר אחריות כלכלית.
