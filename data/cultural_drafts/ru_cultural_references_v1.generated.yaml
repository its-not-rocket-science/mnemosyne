    en: A poetic line from Alexander Pushkin's poem 'The Bronze Horseman' (1833), symbolizing Peter the
      Great's westernizing reforms and Russia's opening to European culture and trade.
    es: Un verso poético del poema 'El Jinete de Bronce' (1833) de Alexander Pushkin, que simboliza las
      reformas occidentalizadoras de Pedro el Grande y la apertura de Rusia a la cultura y el comercio
      europeos.
    fr: Un vers poétique du poème 'Le Cavalier de bronze' (1833) d'Alexandre Pouchkine, symbolisant les
      réformes occidentalistes de Pierre le Grand et l'ouverture de la Russie à la culture et au commerce
      européens.
    de: Ein poetischer Vers aus Alexander Puschkins Gedicht 'Der eherne Reiter' (1833), der Peters des
      Großen Reformen zur Westöffnung und Russlands Hinwendung zu europäischer Kultur und Handel symbolisiert.
    it: Un verso poetico del poema 'Il cavaliere di bronzo' (1833) di Aleksandr Puškin, che simboleggia
