  short_explanation: A fatalistic expression acknowledging that life's gifts and losses are ultimately
    in God's hands. It is often used to console someone after a loss.
  i18n_explanations:
    en: A fatalistic expression acknowledging that life's gifts and losses are ultimately in God's hands.
      It is often used to console someone after a loss.
    es: Expresión fatalista que reconoce que los dones y pérdidas de la vida están en última instancia
      en manos de Dios. Se usa a menudo para consolar a alguien tras una pérdida.
    fr: Expression fataliste reconnaissant que les dons et les pertes de la vie sont ultimement entre
      les mains de Dieu. Elle est souvent utilisée pour consoler quelqu'un après une perte.
    de: Ein fatalistischer Ausdruck, der anerkennt, dass die Gaben und Verluste des Lebens letztlich in
      Gottes Händen liegen. Wird oft verwendet, um jemanden nach einem Verlust zu trösten.
    it: Espressione fatalista che riconosce come i doni e le perdite della vita siano in ultima analisi
      nelle mani di Dio. Viene spesso usata per consolare qualcuno dopo una perdita.
    pt: Expressão fatalista que reconhece que os dons e perdas da vida estão, em última instância, nas
      mãos de Deus. É frequentemente usada para consolar alguém após uma perda.
    ru: Фаталистическое выражение, признающее, что дары и потери жизни в конечном итоге находятся в руках
      Божьих. Часто используется, чтобы утешить кого-то после утраты.
    ja: 人生の恵みと損失は最終的に神の手に委ねられていると認める運命論的な表現。しばしば、損失を経験した人に慰めの言葉として用いられる。
    zh: 一种宿命论的表达，承认生活的赐予和损失最终掌握在上帝手中。常用于在失去后安慰他人。
    ar: تعبير فاتيلي يعترف بأن هبات الحياة وخسائرها تقع في نهاية المطاف في أيدي الله. غالبًا ما يستخدم
      لتسلية شخص بعد خسارة.
    he: ביטוי פטליסטי המכיר בכך שמתנות החיים והאובדנים נמצאים בסופו של דבר בידי האל. משמש לעיתים קרובות
