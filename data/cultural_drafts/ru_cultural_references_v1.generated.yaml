    en: A line from Pushkin's poem 'Демон' (1823–1833), symbolizing inner conflict and duality. It reflects
      the struggle between good and evil, love and hatred, or idealism and cynicism in human nature.
    es: Una línea del poema de Pushkin 'Demon' (1823–1833) que simboliza el conflicto interno y la dualidad.
      Refleja la lucha entre el bien y el mal, el amor y el odio, o el idealismo y el cinismo en la naturaleza
      humana.
    fr: Une ligne du poème de Pouchkine 'Le Démon' (1823–1833), symbolisant le conflit intérieur et la
      dualité. Elle reflète la lutte entre le bien et le mal, l'amour et la haine, ou l'idéalisme et le
      cynisme dans la nature humaine.
    de: Eine Zeile aus Puschkins Gedicht 'Der Dämon' (1823–1833), die inneren Konflikt und Dualität symbolisiert.
      Sie spiegelt den Kampf zwischen Gut und Böse, Liebe und Hass oder Idealismus und Zynismus in der
      menschlichen Natur wider.
    it: Una linea della poesia di Puškin 'Il Demone' (1823–1833) che simboleggia il conflitto interiore
      e la dualità. Riflette la lotta tra bene e male, amore e odio, o idealismo e cinismo nella natura
      umana.
    pt: Uma linha do poema de Pushkin 'O Demônio' (1823–1833) que simboliza o conflito interno e a dualidade.
      Reflete a luta entre o bem e o mal, o amor e o ódio, ou o idealismo e o cinismo na natureza humana.
    ru: Строка из поэмы Пушкина 'Демон' (1823–1833), символизирующая внутренний конфликт и двойственность.
      Отражает борьбу между добром и злом, любовью и ненавистью или идеализмом и цинизмом в человеческой
      природе.
    ja: プーシキンの詩「悪魔」（1823–1833年）の一節で、内面の葛藤と二重性を象徴する。人間の本性における善と悪、愛と憎しみ、理想主義と皮肉の葛藤を反映している。
    zh: 普希金诗作《恶魔》（1823–1833）中的一句，象征内心的冲突与双重性。反映了人性中善与恶、爱与恨或理想主义与愤世嫉俗的挣扎。
    ar: سطر من قصيدة بوشكين 'الشيطان' (1823–1833)، يرمز للصراع الداخلي والثنائية. يعكس الصراع بين الخير
