  short_explanation: A proverb emphasizing the superiority of direct experience over secondhand information.
    It underscores the value of personal observation in understanding the world.
  i18n_explanations:
    en: A proverb emphasizing the superiority of direct experience over secondhand information. It underscores
      the value of personal observation in understanding the world.
    es: Un refrán que destaca la superioridad de la experiencia directa sobre la información de segunda
      mano. Subraya el valor de la observación personal para entender el mundo.
    fr: Un proverbe soulignant la supériorité de l'expérience directe sur l'information de seconde main.
      Il met en avant l'importance de l'observation personnelle pour comprendre le monde.
    de: Ein Sprichwort, das die Überlegenheit direkter Erfahrung gegenüber zweitrangigen Informationen
      betont. Es unterstreicht den Wert persönlicher Beobachtung für das Verständnis der Welt.
    it: Un proverbio che sottolinea la superiorità dell'esperienza diretta rispetto alle informazioni
      di seconda mano. Evidenzia il valore dell'osservazione personale per comprendere il mondo.
    pt: Um provérbio que destaca a superioridade da experiência direta sobre informações de segunda mão.
      Ressalta o valor da observação pessoal para entender o mundo.
    ru: Пословица, подчеркивающая преимущество личного опыта перед чужими рассказами. Подчеркивает ценность
      личного наблюдения для понимания мира.
    ja: 直接体験の重要性を説くことわざ。世界を理解するには、自分で見ることが大切だという価値観を示す。
    zh: 一句强调亲眼所见胜于道听途说的谚语。强调个人观察在理解世界中的价值。
