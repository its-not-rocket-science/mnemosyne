- id: ru_classical_or_scriptural_allusion_время_собирать_камни_96074e80
  language: ru
  canonical_reference: Время собирать камни
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - время собирать камни
  - время собирать камни, и время разбрасывать камни
  - время разбрасывать камни
  short_explanation: A time to gather stones, and a time to scatter them. A phrase from Ecclesiastes (Ecclesiastes
    3:5) symbolizing the cyclical nature of life and the importance of timing.
  i18n_explanations:
    en: A time to gather stones, and a time to scatter them. A phrase from Ecclesiastes (Ecclesiastes
      3:5) symbolizing the cyclical nature of life and the importance of timing.
    es: Tiempo de recoger piedras, y tiempo de esparcirlas. Frase del Eclesiastés (Eclesiastés 3:5) que
      simboliza la naturaleza cíclica de la vida y la importancia del momento adecuado.
    fr: Un temps pour ramasser des pierres, et un temps pour les disperser. Expression de l’Ecclésiaste
      (Ecclésiaste 3:5) symbolisant le caractère cyclique de la vie et l’importance du moment opportun.
    de: Eine Zeit, Steine zu sammeln, und eine Zeit, sie zu zerstreuen. Ein Spruch aus dem Prediger Salomo
      (Prediger 3:5), der das zyklische Wesen des Lebens und die Bedeutung des richtigen Zeitpunkts symbolisiert.
    it: C’è un tempo per raccogliere pietre e un tempo per disperderle. Un detto dell’Ecclesiaste (Ecclesiaste
      3:5) che simboleggia la natura ciclica della vita e l’importanza del momento giusto.
    pt: Há tempo de ajuntar pedras e tempo de espalhá-las. Frase do Eclesiastes (Eclesiastes 3:5) que
      simboliza a natureza cíclica da vida e a importância do momento certo.
    ru: Время собирать камни и время разбрасывать их. Выражение из книги Екклесиаста (Екклесиаст 3:5),
      символизирующее цикличность жизни и важность своевременности.
    ja: 石を集める時もあれば、ばらまく時もある。伝道の書（伝道の書3:5）の言葉で、人生の循環的な性質とタイミングの重要性を象徴しています。
    zh: 有聚石的時候，也有散石的時候。出自《传道书》（传道书3:5）的一句话，象征着生命的循环性和时机的重要性。
    ar: زمن لجمع الحجارة وزمن لتفريقها. عبارة من سفر الجامعة (الجامعة 3:5) ترمز إلى الطبيعة الدورية للحياة
      وأهمية التوقيت.
    he: עת לכנוס אבנים ועת להפיץ אותן. ביטוי מספר קהלת (קהלת ג:5) המסמל את טבע החיים המעגלי ואת חשיבות
      המועד הנכון.
