- id: ru_proverb_tradition_волков_бояться_в_лес_не_ходить_8f7dbd55
  language: ru
  canonical_reference: Волков бояться — в лес не ходить
  reference_type: proverb_tradition
  surface_patterns:
  - Волков бояться — в лес не ходить
  - Волков бояться — в лес не ходить, а если не ходить, то грибов не набрать
  - Кто боится волков, тот в лес не ходит
  short_explanation: A proverb meaning 'If you fear wolves, don't go into the forest'—advising against
    avoiding challenges due to fear. It underscores courage and the acceptance of risks for potential
    rewards.
  i18n_explanations:
    en: A proverb meaning 'If you fear wolves, don't go into the forest'—advising against avoiding challenges
      due to fear. It underscores courage and the acceptance of risks for potential rewards.
    es: Refrán que significa 'Si temes a los lobos, no entres al bosque', desaconsejando evitar los desafíos
      por miedo. Subraya el valor del coraje y la aceptación de riesgos para posibles recompensas.
    fr: Proverbe signifiant 'Si tu as peur des loups, ne va pas dans la forêt' — déconseillant d'éviter
      les défis par crainte. Il souligne l'importance du courage et de l'acceptation des risques pour
      des récompenses potentielles.
    de: Ein Sprichwort mit der Bedeutung 'Wenn du die Wölfe fürchtest, geh nicht in den Wald' — rät davon
      ab, Herausforderungen aus Angst zu vermeiden. Es unterstreicht Mut und die Akzeptanz von Risiken
      für mögliche Belohnungen.
    it: Un proverbio che significa 'Se hai paura dei lupi, non andare nel bosco', sconsigliando di evitare
      le sfide per paura. Sottolinea il valore del coraggio e l'accettazione dei rischi per potenziali
      ricompense.
    pt: Um provérbio que significa 'Se você tem medo de lobos, não entre na floresta', desencorajando
      evitar desafios por medo. Ressalta a importância da coragem e da aceitação de riscos por recompensas
      potenciais.
    ru: Пословица, означающая 'Если боишься волков, не ходи в лес', советует не избегать трудностей из-за
      страха. Подчеркивает важность мужества и принятия рисков ради возможных наград.
    ja: 「狼を恐れるなら森に行くな」という意味の諺で、恐怖心から挑戦を避けることを戒めます。潜在的な報酬のためにリスクを受け入れる勇気の重要性を強調します。
    zh: 意为“如果怕狼，就别进森林”的谚语，告诫不要因恐惧而回避挑战。强调为潜在回报而接受风险和勇气的重要性。
    ar: مثل يعني 'إذا كنت تخشى الذئاب، فلا تدخل الغابة'، ينصح بعدم تجنب التحديات بسبب الخوف. يسلط الضوء
      على أهمية الشجاعة وقبول المخاطر من أجل مكافآت محتملة.
    he: פתגם שפירושו 'אם אתה חושש מזאבים, אל תלך ליער' — מייעץ שלא להימנע מאתגרים מתוך פחד. מדגיש את חשיבות
      האומץ והקבלה של סיכונים למען תגמולים פוטנציאליים.
