- id: ru_proverb_tradition_между_молотом_и_наковальней_ead50759
  language: ru
  canonical_reference: Между молотом и наковальней
  reference_type: proverb_tradition
  surface_patterns:
  - между молотом и наковальней
  - оказаться между молотом и наковальней
  - между молотом и наковальней и притом
  short_explanation: A Russian proverb meaning to be in a difficult position between two equally dangerous
    or unfavorable choices, derived from the blacksmith's dilemma of being crushed between hammer and
    anvil.
  i18n_explanations:
    en: A Russian proverb meaning to be in a difficult position between two equally dangerous or unfavorable
      choices, derived from the blacksmith's dilemma of being crushed between hammer and anvil.
    es: Un refrán ruso que significa estar en una posición difícil entre dos opciones igualmente peligrosas
      o desfavorables, derivado del dilema del herrero de ser aplastado entre el martillo y el yunque.
    fr: Un proverbe russe signifiant se trouver dans une situation difficile entre deux choix tout aussi
      dangereux ou défavorables, inspiré du dilemme du forgeron écrasé entre le marteau et l'enclume.
    de: Ein russisches Sprichwort, das bedeutet, sich in einer schwierigen Lage zwischen zwei gleich gefährlichen
      oder ungünstigen Möglichkeiten zu befinden, abgeleitet von der Zwickmühle des Schmieds, der zwischen
      Hammer und Amboss zermalmt wird.
    it: Un proverbio russo che significa trovarsi in una posizione difficile tra due scelte ugualmente
      pericolose o sfavorevoli, derivato dal dilemma del fabbro schiacciato tra martello e incudine.
    pt: Um provérbio russo que significa estar em uma posição difícil entre duas opções igualmente perigosas
      ou desfavoráveis, derivado do dilema do ferreiro esmagado entre o martelo e a bigorna.
    ru: Русская пословица, означающая находиться в сложном положении между двумя одинаково опасными или
      невыгодными выборами, восходит к дилемме кузнеца, зажатого между молотом и наковальней.
    ja: ハンマーと金床に挟まれる鍛冶職人のジレンマに由来する、ロシアのことわざで、二つの危険または不利な選択肢の間で板挟みになる状況を表す。
    zh: 源自铁匠在铁锤与铁砧间左右为难的困境，俄罗斯谚语指处于两个同样危险或不利选择之间的艰难境地。
    ar: مثل روسي يعني أن تكون في موقف صعب بين خيارين متساويين في الخطورة أو السوء، مستوحى من معضلة الحداد
      الذي يُسحق بين المطرقة والسندان.
    he: ביטוי רוסי שפירושו להיות במצב קשה בין שתי בחירות שוות בסכנתן או בחסרונן, נלקח מדILEמתו של הנפח
