  - Сократ обвинялся в развращении юношества
  - обвинение Сократа в развращении молодежи
  short_explanation: A reference to the historical accusation against Socrates in ancient Athens, as recorded
    by Plato and Xenophon. In Russian culture, it symbolizes the conflict between individual thought and
    societal norms.
  i18n_explanations:
    en: A reference to the historical accusation against Socrates in ancient Athens, as recorded by Plato
      and Xenophon. In Russian culture, it symbolizes the conflict between individual thought and societal
      norms.
    es: Referencia a la acusación histórica contra Sócrates en la antigua Atenas, según lo registrado
      por Platón y Jenofonte. En la cultura rusa, simboliza el conflicto entre el pensamiento individual
      y las normas sociales.
    fr: Référence à l'accusation historique portée contre Socrate dans l'Athènes antique, telle que rapportée
      par Platon et Xénophon. Dans la culture russe, elle symbolise le conflit entre la pensée individuelle
      et les normes sociétales.
    de: Ein Verweis auf die historische Anklage gegen Sokrates im antiken Athen, wie sie von Platon und
      Xenophon überliefert ist. In der russischen Kultur symbolisiert sie den Konflikt zwischen individuellem
      Denken und gesellschaftlichen Normen.
    it: Riferimento all'accusa storica mossa a Socrate nell'antica Atene, come riportato da Platone e
      Senofonte. Nella cultura russa simboleggia il conflitto tra pensiero individuale e norme sociali.
    pt: Referência à acusação histórica contra Sócrates na antiga Atenas, conforme registrada por Platão
      e Xenofonte. Na cultura russa, simboliza o conflito entre o pensamento individual e as normas sociais.
    ru: Отсылка к историческому обвинению Сократа в Древних Афинах, зафиксированному Платоном и Ксенофонтом.
      В русской культуре это символизирует конфликт между индивидуальным мышлением и общественными нормами.
    ja: 古代アテナイにおけるソクラテスへの歴史的な告発を指す（プラトンとクセノフォンの記録による）。ロシア文化では、個人の思考と社会規範の対立を象徴する。
    zh: 指古代雅典对苏格拉底的历史指控，如柏拉图和色诺芬所记载。在俄罗斯文化中，它象征着个人思想与社会规范的冲突。
    ar: إشارة إلى الاتهام التاريخي لسقراط في أثينا القديمة، كما سجله أفلاطون وزينوفون. في الثقافة الروسية،
