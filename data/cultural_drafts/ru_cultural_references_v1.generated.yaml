    pt: Refere-se aos doze apóstolos de Jesus Cristo no Novo Testamento, simbolizando os seguidores centrais
      do cristianismo. Na cultura russa, a expressão costuma carregar conotações de unidade, missão ou
      um grupo seleto.
    ru: Относится к двенадцати апостолам Иисуса Христа в Новом Завете, символизируя основных последователей
