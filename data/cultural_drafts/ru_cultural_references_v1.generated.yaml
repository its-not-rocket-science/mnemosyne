- id: ru_classical_or_scriptural_allusion_сократ_был_виновен_в_том_что_развращал_юношество_b715acb8
  language: ru
  canonical_reference: Сократ был виновен в том, что развращал юношество
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
