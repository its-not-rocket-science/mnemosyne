- id: ru_classical_or_scriptural_allusion_глас_вопиющего_в_пустыне_e7196f62
  language: ru
  canonical_reference: Глас вопиющего в пустыне
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - глас вопиющего в пустыне
  - глас вопиющего в пустыне, и сказал
  - в пустыне глас вопиющего
  short_explanation: The voice of one crying in the wilderness. A biblical phrase from the Gospel of John
    (John 1:23), referring to John the Baptist's mission to prepare the way for Christ.
  i18n_explanations:
    en: The voice of one crying in the wilderness. A biblical phrase from the Gospel of John (John 1:23),
      referring to John the Baptist's mission to prepare the way for Christ.
    es: La voz del que clama en el desierto. Frase bíblica del Evangelio de Juan (Juan 1:23), que se refiere
      a la misión de Juan el Bautista de preparar el camino para Cristo.
    fr: La voix de celui qui crie dans le désert. Expression biblique tirée de l’Évangile selon Jean (Jean
      1:23), désignant la mission de Jean-Baptiste de préparer la venue du Christ.
    de: Die Stimme des Rufers in der Wüste. Ein biblischer Ausdruck aus dem Johannesevangelium (Johannes
      1:23), der auf die Mission Johannes des Täufers zur Vorbereitung des Weges für Christus hinweist.
    it: La voce di chi grida nel deserto. Un’espressione biblica tratta dal Vangelo di Giovanni (Giovanni
      1:23), che si riferisce alla missione di Giovanni Battista di preparare la via per Cristo.
    pt: A voz do que clama no deserto. Expressão bíblica do Evangelho de João (João 1:23), referindo-se
      à missão de João Batista de preparar o caminho para Cristo.
