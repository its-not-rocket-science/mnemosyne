      und materielle Fragilität wider.
    it: Un proverbio che significa 'Dove è sottile, si strappa', suggerendo che le debolezze o le situazioni
      fragili sono le prime a cedere sotto pressione. Riflette una visione pragmatica della fragilità
      umana e materiale.
    pt: Um provérbio que significa 'Onde é fino, rasga', sugerindo que as fraquezas ou situações frágeis
      são as primeiras a falhar sob pressão. Reflete uma visão pragmática da fragilidade humana e material.
    ru: Пословица, означающая 'Где тонко, там и рвётся', suggesting that weaknesses or fragile situations
