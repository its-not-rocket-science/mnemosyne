    en: Emphasizes that success requires effort and hard work. It is a direct encouragement to be industrious
      and persistent.
    es: Destaca que el éxito requiere esfuerzo y trabajo duro. Es un aliento directo a ser laborioso y
      persistente.
    fr: Souligne que le succès exige de l'effort et du travail acharné. C'est un encouragement direct
