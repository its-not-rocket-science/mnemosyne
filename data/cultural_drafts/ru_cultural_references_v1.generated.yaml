- id: ru_classical_or_scriptural_allusion_быть_как_фома_неверный_887db722
  language: ru
  canonical_reference: Быть как Фома неверный
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Фома неверный
  - как Фома неверный
  - быть Фомой неверным
  - Фома неверующий
  short_explanation: A phrase derived from the biblical story of Thomas the Apostle (John 20:24-29), who
    doubted Jesus' resurrection until he saw the wounds. Used to describe a skeptic who refuses to believe
    without proof.
  i18n_explanations:
    en: A phrase derived from the biblical story of Thomas the Apostle (John 20:24-29), who doubted Jesus'
      resurrection until he saw the wounds. Used to describe a skeptic who refuses to believe without
      proof.
    es: Frase derivada de la historia bíblica del apóstol Tomás (Juan 20:24-29), quien dudó de la resurrección
      de Jesús hasta ver las heridas. Se usa para describir a un escéptico que no cree sin pruebas.
    fr: Expression tirée de l'histoire biblique de l'apôtre Thomas (Jean 20:24-29), qui douta de la résurrection
      de Jésus jusqu'à voir ses blessures. Utilisée pour décrire un sceptique qui refuse de croire sans
      preuve.
    de: Ein Ausdruck, der sich von der biblischen Geschichte des Apostels Thomas (Johannes 20:24-29) ableitet,
      der an der Auferstehung Jesu zweifelte, bis er die Wunden sah. Wird für einen Skeptiker verwendet,
      der nicht ohne Beweis glauben will.
    it: Un'espressione derivata dalla storia biblica dell'apostolo Tommaso (Giovanni 20:24-29), che dubitò
      della resurrezione di Gesù finché non vide le ferite. Usata per descrivere uno scettico che non
      crede senza prove.
    pt: Expressão derivada da história bíblica do apóstolo Tomé (João 20:24-29), que duvidou da ressurreição
      de Jesus até ver as feridas. Usada para descrever um cético que não acredita sem provas.
    ru: Выражение, восходящее к библейской истории апостола Фомы (Иоанн 20:24-29), который усомнился в
      воскресении Иисуса, пока не увидел раны. Употребляется для описания скептика, не верящего без доказательств.
    ja: 使徒トマス（ヨハネによる福音書20:24-29）の逸話に由来する表現で、イエスの復活を疑ったトマスが傷を確認するまで信じなかった。証拠なしには信じない懐疑主義者を表すのに使われる。
    zh: 源自圣经中使徒多马（约翰福音20:24-29）的故事，他因未见伤痕而怀疑耶稣复活。用于形容不见证据不肯相信的怀疑论者。
    ar: تعبير مستمد من القصة التوراتية للرسول توما (يوحنا 20:24-29)، الذي شك في قيامة يسوع حتى رأى الجروح.
      يُستخدم لوصف متشكك يرفض الإيمان بدون دليل.
    he: ביטוי שמקורו בסיפורו של השליח תומא (יוחנן כ, כד-כט), אשר הטיל ספק בתחייתו של ישו עד שראה את הפצעים.
      משמש לתיאור ספקן שלא מאמין ללא הוכחה.
