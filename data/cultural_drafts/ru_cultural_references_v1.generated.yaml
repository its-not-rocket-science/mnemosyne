  i18n_explanations:
    en: A classical maxim attributed to Aristotle, emphasizing the priority of truth over personal loyalty.
      Often used to justify impartiality in intellectual or moral debates.
    es: Un dicho clásico atribuido a Aristóteles que enfatiza la prioridad de la verdad sobre la lealtad
      personal. Se usa para justificar la imparcialidad en debates intelectuales o morales.
    fr: Une maxime classique attribuée à Aristote, soulignant la priorité de la vérité sur la loyauté
      personnelle. Souvent utilisée pour justifier l'impartialité dans les débats intellectuels ou moraux.
    de: Ein klassischer Ausspruch, der Aristoteles zugeschrieben wird, der die Priorität der Wahrheit
      über persönliche Loyalität betont. Wird oft verwendet, um Unparteilichkeit in intellektuellen oder
      moralischen Debatten zu rechtfertigen.
    it: Un detto classico attribuito ad Aristotele che sottolinea la priorità della verità sulla lealtà
      personale. Spesso usato per giustificare l'imparzialità nei dibattiti intellettuali o morali.
    pt: Um dito clássico atribuído a Aristóteles que enfatiza a prioridade da verdade sobre a lealdade
      pessoal. Geralmente usado para justificar a imparcialidade em debates intelectuais ou morais.
    ru: Классический афоризм, приписываемый Аристотелю, подчеркивающий приоритет истины над личной преданностью.
