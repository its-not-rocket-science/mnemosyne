      times. The phrase is famously associated with Pushkin’s poem about the Decembrists.
    es: Una reflexión nostálgica sobre el pasado heroico, usada para contrastar la supuesta decadencia
      de los tiempos modernos. La frase está asociada a un poema de Pushkin sobre los decembristas.
    fr: Une réflexion nostalgique sur un passé héroïque, souvent utilisée pour contraster avec le déclin
      perçu des temps modernes. La phrase est célèbrement liée au poème de Pouchkine sur les Décembristes.
    de: Eine nostalgische Reflexion über eine heroische Vergangenheit, oft genutzt, um den vermeintlichen
      Niedergang der modernen Zeit zu kontrastieren. Der Ausdruck ist berühmt durch Puschkins Gedicht
      über die Dekabristen.
    it: Una riflessione nostalgica sul passato eroico, spesso usata per contrapporre il presunto declino
      dei tempi moderni. La frase è famosa per essere associata a una poesia di Puškin sui decabristi.
    pt: Uma reflexão nostálgica sobre um passado heroico, frequentemente usada para contrastar a suposta
      decadência dos tempos modernos. A frase é famosa por estar associada a um poema de Pushkin sobre
      os decembristas.
    ru: Ностальгическое размышление о героическом прошлом, часто используемое для контраста с воспринимаемым
      упадком современности. Фраза знаменита в связи с пушкинским стихотворением о декабристах.
    ja: かつての英雄的な時代を懐かしむ反省の言葉で、現代の衰退と対比されることが多いです。このフレーズはプーシキンのデカブリストについての詩に由来します。
    zh: 对英雄往昔的怀念之辞，常用于与现代衰落感形成对比。这句话因普希金关于十二月党人的诗而闻名。
    ar: تأمل حنين في الماضي البطولي، غالبًا ما يُستخدم لمقارنة الانحدار المدرك للعصر الحديث. العبارة مرتبطة
