- id: ru_literary_reference_поёт_душа_93c26ca5
  language: ru
  canonical_reference: Поёт душа
  reference_type: literary_reference
  surface_patterns:
  - душа поёт
  - у него душа поёт
  - душа поёт от радости
  - душа поёт и ликует
  short_explanation: Expresses deep inner joy or emotional fulfillment, often used to describe a state
    of happiness that resonates with one's soul. The phrase is commonly used in everyday speech and literature
    to convey profound emotional satisfaction.
  i18n_explanations:
    en: Expresses deep inner joy or emotional fulfillment, often used to describe a state of happiness
      that resonates with one's soul. The phrase is commonly used in everyday speech and literature to
      convey profound emotional satisfaction.
    es: Expresa una alegría interior profunda o satisfacción emocional, usada para describir un estado
      de felicidad que resuena con el alma. La frase es común en el habla cotidiana y la literatura para
      transmitir una profunda satisfacción emocional.
    fr: Exprime une joie intérieure profonde ou une plénitude émotionnelle, souvent utilisée pour décrire
      un état de bonheur qui résonne avec l'âme. La phrase est courante dans le langage quotidien et la
      littérature pour évoquer une satisfaction émotionnelle profonde.
    de: Drückt tiefe innere Freude oder emotionale Erfüllung aus, oft verwendet, um einen Zustand des
      Glücks zu beschreiben, der mit der Seele resoniert. Der Ausdruck ist im Alltag und in der Literatur
      verbreitet, um tiefe emotionale Zufriedenheit zu vermitteln.
    it: Esprime una gioia interiore profonda o una soddisfazione emotiva, spesso usata per descrivere
      uno stato di felicità che risuona con l'anima. La frase è comune nel linguaggio quotidiano e nella
      letteratura per trasmettere una profonda soddisfazione emotiva.
    pt: Expressa uma alegria interior profunda ou satisfação emocional, frequentemente usada para descrever
      um estado de felicidade que ressoa com a alma. A frase é comum na linguagem cotidiana e na literatura
      para transmitir profunda satisfação emocional.
    ru: Выражает глубокую внутреннюю радость или эмоциональное удовлетворение, часто используется для
      описания состояния счастья, которое резонирует с душой. Фраза распространена в повседневной речи
      и литературе для передачи глубокого эмоционального удовлетворения.
    ja: 深い内面の喜びや感情的な充足感を表し、魂に響く幸福の状態を描写する際に使われます。日常会話や文学で、深い感情的な満足を伝えるために用いられる表現です。
    zh: 表达深层的内心喜悦或情感满足，常用于描述与灵魂共鸣的幸福状态。该短语在日常语言和文学中常用于传达深刻的情感满足。
    ar: يعبر عن فرح داخلي عميق أو رضا عاطفي، ويُستخدم غالبًا لوصف حالة سعادة تت resonates مع الروح. العبارة
      شائعة في اللغة اليومية والأدب لنقل رضا عاطفي عميق.
    he: מבטא שמחה פנימית עמוקה או סיפוק רגשי, ומשמש לרוב לתיאור מצב של אושר שמהדהד עם הנשמה. הביטוי נפוץ
      בשפה היומיומית ובספרות כדי להביע סיפוק רגשי עמוק.
