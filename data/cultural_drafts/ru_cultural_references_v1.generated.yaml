  short_explanation: Every snipe praises its own swamp; people tend to praise what they know best or are
    familiar with. A common Russian proverb reflecting subjectivity in judgment.
  i18n_explanations:
    en: Every snipe praises its own swamp; people tend to praise what they know best or are familiar with.
      A common Russian proverb reflecting subjectivity in judgment.
    es: Cada ave zancuda alaba su propio pantano; la gente tiende a elogiar lo que mejor conoce o con
      lo que está familiarizada. Un refrán ruso común que refleja la subjetividad en el juicio.
    fr: Chaque bécasse vante son propre marais ; les gens ont tendance à louer ce qu'ils connaissent le
      mieux ou ce qui leur est familier. Un proverbe russe courant reflétant la subjectivité dans le jugement.
    de: Jeder Vogel lobt seinen eigenen Sumpf; Menschen neigen dazu, das zu preisen, was sie am besten
      kennen oder mit dem sie vertraut sind. Ein gängiges russisches Sprichwort zur Subjektivität im Urteil.
    it: Ogni uccello loda la sua palude; le persone tendono a elogiare ciò che conoscono meglio o con
      cui sono familiari. Un proverbio russo comune che riflette la soggettività nei giudizi.
    pt: Cada ave que vive em pântano elogia o seu próprio brejo; as pessoas tendem a elogiar o que conhecem
      melhor ou com o que estão familiarizadas. Um ditado russo comum que reflete a subjetividade nos
      julgamentos.
    ru: Каждый кулик своё болото хвалит; люди склонны хвалить то, что им лучше знакомо или привычно. Распространённое
      русское присловие, отражающее субъективность в суждениях.
    ja: それぞれの鳥が自分の沼地を褒める。人は自分が最も知るものや慣れ親しんだものを称賛する傾向があるという意味。ロシアの一般的なことわざで、主観的な判断を反映する。
    zh: 每只鹬都夸自己的沼泽；人们往往赞美自己最熟悉或了解的事物。一句常见的俄罗斯谚语，反映判断的主观性。
    ar: كل طائر يمدح مستنقعه الخاص؛ يميل الناس إلى الثناء على ما يعرفونه جيدًا أو ما اعتادوا عليه. مثل
