    ja: 新約聖書に登場するイエス・キリストの12使徒を指し、キリスト教の中核的な信者を象徴する。ロシア文化では、この表現はしばしば団結、使命、あるいは選ばれた集団を示唆する。
    zh: 指《新约》中耶稣基督的十二门徒，象征基督教的核心追随者。在俄罗斯文化中，该短语常隐含团结、使命或精英群体的含义。
