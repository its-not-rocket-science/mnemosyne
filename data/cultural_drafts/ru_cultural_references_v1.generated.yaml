- id: ru_classical_or_scriptural_allusion_свобода_это_осознанная_необходимость_2a097832
  language: ru
  canonical_reference: Свобода — это осознанная необходимость
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Свобода — это осознанная необходимость
  - свобода есть осознанная необходимость
  - осознанная необходимость как свобода
  short_explanation: A paraphrase of Hegel's concept that true freedom is the recognition and acceptance
    of necessity. In Russian thought, it is often associated with the philosophy of Vladimir Solovyov
    and later existentialist interpretations.
  i18n_explanations:
    en: A paraphrase of Hegel's concept that true freedom is the recognition and acceptance of necessity.
      In Russian thought, it is often associated with the philosophy of Vladimir Solovyov and later existentialist
      interpretations.
    es: Una paráfrasis del concepto de Hegel según el cual la verdadera libertad es el reconocimiento
      y la aceptación de la necesidad. En el pensamiento ruso, suele asociarse con la filosofía de Vladímir
      Soloviov y con interpretaciones existencialistas posteriores.
    fr: Une paraphrase du concept hégélien selon lequel la véritable liberté est la reconnaissance et
      l'acceptation de la nécessité. Dans la pensée russe, elle est souvent associée à la philosophie
      de Vladimir Soloviev et à des interprétations existentialistes ultérieures.
    de: Eine Umschreibung von Hegels Konzept, dass wahre Freiheit die Anerkennung und Akzeptanz von Notwendigkeit
      ist. Im russischen Denken wird es oft mit der Philosophie von Wladimir Solowjow und späteren existenzialistischen
      Interpretationen in Verbindung gebracht.
    it: Una parafrasi del concetto hegeliano secondo cui la vera libertà è il riconoscimento e l'accettazione
      della necessità. Nel pensiero russo è spesso associata alla filosofia di Vladimir Solov'ëv e a interpretazioni
      esistenzialiste successive.
    pt: Uma paráfrase do conceito de Hegel segundo o qual a verdadeira liberdade é o reconhecimento e
      a aceitação da necessidade. No pensamento russo, costuma estar associada à filosofia de Vladimir
      Solovyov e a interpretações existencialistas posteriores.
    ru: Парафраз гегелевского понятия о том, что истинная свобода — это осознание и принятие необходимости.
      В русской мысли оно часто связывается с философией Владимира Соловьёва и более поздними экзистенциалистскими
      интерпретациями.
    ja: ヘーゲルの概念「真の自由とは必然性の認識と受容である」を言い換えたもの。ロシア思想では、しばしばウラジーミル・ソロヴィヨフの哲学やその後の実存主義的解釈と結びつけられる。
    zh: 对黑格尔“自由即对必然的认识和接受”这一概念的意译。在俄罗斯思想中，它常与弗拉基米尔·索洛维约夫的哲学及后来的存在主义解释联系在一起。
    ar: إعادة صياغة لمفهوم هيغل القائل بأن الحرية الحقيقية هي الاعتراف بقبول الضرورة. في الفكر الروسي،
      غالبًا ما ترتبط بفلسفة فلاديمير سولوفيوف والتفسيرات الوجودية اللاحقة.
    he: פרפרזה לרעיון של הגל לפיו חירות אמיתית היא הכרה וקבלה של הכרח. במחשבה הרוסית היא קשורה לעיתים
      קרובות לפילוסופיה של ולדימיר סולוביוב ולפרשנויות אקזיסטנציאליסטיות מאוחרות יותר.
