    en: Nothing ventured, nothing gained; implies that one must take risks to achieve success. A modern
      Russian proverb, often used in motivational contexts.
    es: Quien no arriesga, no gana; implica que hay que asumir riesgos para alcanzar el éxito. Un refrán
      ruso moderno, usado a menudo en contextos motivacionales.
    fr: Qui ne risque rien n'a rien ; cela implique qu'il faut prendre des risques pour réussir. Un proverbe
