      la ricerca della consapevolezza di sé e dell'introspezione come percorso verso la saggezza.
    pt: Um famoso lema atribuído ao Oráculo de Delfos e associado a Sócrates. Na cultura russa, simboliza
      a busca pela autoconhecimento e introspecção como caminho para a sabedoria.
    ru: Знаменитое изречение, приписываемое Дельфийскому оракулу и связанное с Сократом. В русской культуре
      символизирует стремление к самопознанию и самоанализу как путь к мудрости.
    ja: デルフォイの神託に由来し、ソクラテスと結びつけられた有名な格言。ロシア文化では、自己認識と内省の追求を知恵への道として象徴する。
    zh: 传为德尔菲神谕并与苏格拉底相关的著名箴言。在俄罗斯文化中，象征着通过自我认知与内省追求智慧的道路。
    ar: مبدأ مشهور يُنسب إلى وحي دلفي ويرتبط بسقراط. في الثقافة الروسية، يرمز إلى السعي وراء الوعي الذاتي
