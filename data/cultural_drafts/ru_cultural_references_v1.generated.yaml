- id: ru_literary_reference_давайте_петь_и_смеяться_пока_мы_молоды_и_пьяны_b2a78e10
  language: ru
  canonical_reference: Давайте петь и смеяться, пока мы молоды и пьяны
  reference_type: literary_reference
  surface_patterns:
  - Давайте петь и смеяться, пока мы молоды и пьяны
  - петь и смеяться, пока молоды и пьяны
  - жить, пока молоды и пьяны
  short_explanation: A call to embrace life’s joys while young and intoxicated, symbolizing the fleeting
    nature of youth and vitality. The phrase is often cited as a manifesto of hedonistic youth culture.
  i18n_explanations:
    en: A call to embrace life’s joys while young and intoxicated, symbolizing the fleeting nature of
      youth and vitality. The phrase is often cited as a manifesto of hedonistic youth culture.
    es: Un llamado a disfrutar de las alegrías de la vida mientras se es joven y está ebrio, simbolizando
      la fugacidad de la juventud y la vitalidad. La frase se cita como un manifiesto de la cultura juvenil
      hedonista.
    fr: Un appel à savourer les joies de la vie tant qu'on est jeune et ivre, symbolisant la fugacité
      de la jeunesse et de la vitalité. La phrase est souvent citée comme un manifeste de la culture hédoniste
      de la jeunesse.
    de: Ein Aufruf, die Freuden des Lebens zu genießen, solange man jung und berauscht ist, und damit
      die Vergänglichkeit von Jugend und Lebenskraft symbolisiert. Der Satz gilt als Manifest der hedonistischen
      Jugendkultur.
    it: Un invito a godersi le gioie della vita finché si è giovani e ubriachi, simboleggiando la fugacità
      della giovinezza e della vitalità. La frase è spesso citata come manifesto della cultura giovanile
      edonistica.
    pt: Um chamado para abraçar as alegrias da vida enquanto jovens e intoxicados, simbolizando a natureza
      efêmera da juventude e da vitalidade. A frase é frequentemente citada como um manifesto da cultura
      juvenil hedonista.
    ru: Призыв наслаждаться радостями жизни, пока молод и пьян, что символизирует мимолётность юности
      и жизненной силы. Фраза часто воспринимается как манифест гедонистической молодёжной культуры.
    ja: 若く酔っている間に人生の喜びを謳歌しようと呼びかける言葉で、若さと活力の儚さを象徴しています。このフレーズは享楽的な若者文化の宣言とされています。
    zh: 趁着年轻和醉意纵情享受生活之乐的号召，象征着青春与活力的短暂。这句话常被视为享乐主义青年文化的宣言。
    ar: نداء للاستمتاع بفرح الحياة ما دمت شابا وسكرانا، مما يرمز إلى زوال الشباب والنشاط. العبارة غالبًا
      ما تُنسب كإعلان لثقافة الشباب المتعة.
    he: קריאה ליהנות משמחות החיים כל עוד צעירים ושיכורים, המסמלת את חולפת הנעורים והחיות. הביטוי מצוטט
      לעיתים קרובות כמניפסט של תרבות הנוער ההדוניסטית.
