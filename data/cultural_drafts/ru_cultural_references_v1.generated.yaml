      est centrale dans la pratique liturgique orthodoxe et souvent appelée simplement 'la Liturgie de
      saint Jean Chrysostome'.
    de: Die Göttliche Liturgie des heiligen Johannes Chrysostomos, der am häufigsten gefeierte eucharistische
      Gottesdienst in der orthodoxen Kirche, ist nach dem Theologen und Erzbischof von Konstantinopel
      aus dem 4. Jahrhundert benannt. Sie ist zentral für die orthodoxe Liturgie und wird oft einfach
      'die Liturgie des heiligen Johannes Chrysostomos' genannt.
    it: La Divina Liturgia di san Giovanni Crisostomo, il servizio eucaristico più celebrato nella Chiesa
      ortodossa orientale, prende il nome dal teologo e arcivescovo di Costantinopoli del IV secolo. È
      centrale nella pratica liturgica ortodossa ed è spesso chiamata semplicemente 'la Liturgia di san
      Giovanni Crisostomo'.
    pt: A Divina Liturgia de São João Crisóstomo, o serviço eucarístico mais celebrado na Igreja Ortodoxa
      Oriental, leva o nome do teólogo e arcebispo de Constantinopla do século IV. É central na prática
      litúrgica ortodoxa e muitas vezes chamada simplesmente de 'a Liturgia de São João Crisóstomo'.
    ru: Божественная литургия святителя Иоанна Златоуста — наиболее часто совершаемая евхаристическая
      служба в Православной церкви, названная в честь богослова и константинопольского архиепископа IV
      века. Она занимает центральное место в православной литургической практике и часто называется просто
      «литургией Иоанна Златоуста».
    ja: 聖金口イオアンの奉神礼（典礼）は、東方正教会で最も一般的に行われる聖体礼儀で、4世紀の神学者でありコンスタンティノープル大主教であった聖金口イオアンに由来します。正教会の典礼実践の中心であり、しばしば「聖金口イオアンの奉神礼」と呼ばれます。
    zh: 圣金口若望礼仪是东正教最常举行的圣餐仪式，以4世纪神学家、君士坦丁堡大主教圣金口若望命名。它是正教礼仪实践的核心，通常简称为「圣金口若望礼仪」。
    ar: الليتورجيا الإلهية للقديس يوحنا ذهبي الفم هي الخدمة الإفخارستية الأكثر شيوعًا في الكنيسة الأرثوذكسية
      الشرقية، والتي سميت على اسم اللاهوتي ومطران القسطنطينية في القرن الرابع. وهي مركزية في الممارسة
      الليتورجية الأرثوذكسية وغالبًا ما تسمى ببساطة «ليتورجيا القديس يوحنا ذهبي الفم».
    he: ההליטורגיה האלוהית של יוחנן כריסוסטומוס היא הטקס האוכריסטי הנפוץ ביותר בכנסייה האורתודוקסית המזרחית,
      הקרוי על שם התאולוג והארכיבישוף של קונסטנטינופול מהמאה הרביעית. היא מרכזית בפרקטיקה הליטורגית האורתודוקסית
      ונקראת לרוב פשוט 'הליטורגיה של יוחנן כריסוסטומוס'.
