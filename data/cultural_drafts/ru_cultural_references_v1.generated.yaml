  - Сколько ни корми волка, он всё в лес смотрит
  short_explanation: A proverb suggesting that some people or animals cannot be changed by kindness or
    nurturing; their nature remains unchanged. It reflects a cynical view of human or animal behavior.
  i18n_explanations:
    en: A proverb suggesting that some people or animals cannot be changed by kindness or nurturing; their
      nature remains unchanged. It reflects a cynical view of human or animal behavior.
    es: Un refrán que sugiere que algunas personas o animales no pueden ser cambiados por amabilidad o
      cuidado; su naturaleza permanece inalterable. Refleja una visión cínica del comportamiento humano
      o animal.
    fr: Un proverbe suggérant que certaines personnes ou animaux ne peuvent être changés par la gentillesse
      ou l'affection ; leur nature reste inchangée. Il reflète une vision cynique du comportement humain
      ou animal.
    de: Ein Sprichwort, das besagt, dass manche Menschen oder Tiere durch Freundlichkeit oder Fürsorge
      nicht verändert werden können; ihre Natur bleibt unverändert. Es spiegelt eine zynische Sicht auf
      menschliches oder tierisches Verhalten wider.
    it: Un proverbio che suggerisce che alcune persone o animali non possono essere cambiati dalla gentilezza
      o dall'affetto; la loro natura rimane immutata. Riflette una visione cinica del comportamento umano
      o animale.
    pt: Um provérbio que sugere que algumas pessoas ou animais não podem ser mudados pela bondade ou cuidado;
      sua natureza permanece inalterada. Reflete uma visão cínica do comportamento humano ou animal.
    ru: Пословица, suggesting что некоторых людей или животных нельзя изменить добротой или заботой; их
      природа остается неизменной. Отражает циничный взгляд на поведение человека или животного.
    ja: どれだけ優しく育てても、狼は結局森を目指すという意味のことわざ。人間や動物の本性は変わらないという、皮肉な見方を反映する。
    zh: 一句意指无论怎么善待，有些人或动物也不会改变；他们的本性依旧的谚语。反映了对人或动物行为的一种愤世嫉俗的看法。
    ar: مثل يقول إنه مهما喂ته من لطف، فإن الذئب سيظل ينظر إلى الغابة. يشير إلى أن بعض الناس أو الحيوانات
      لا يمكن تغييرهم، وتبقى طبيعتهم كما هي. يعكس نظرة متشائمة للسلوك البشري أو الحيواني.
    he: פתגם שמרמז שאנשים או בעלי חיים מסוימים לא ניתן לשנות באמצעות חסד או טיפול; טבעם נותר ללא שינוי.
