- id: ru_cultural_reference_владимирская_икона_божией_матери_c6db592f
  language: ru
  canonical_reference: Владимирская икона Божией Матери
  reference_type: cultural_reference
  surface_patterns:
  - Владимирская икона Божией Матери
  - Владимирская икона
  - Владимирская Богоматерь
  short_explanation: One of the most revered icons in Russian Orthodoxy, depicting the Virgin Mary with
    the Christ Child. It is believed to have miraculous powers and is associated with the protection of
    Russia. The icon is named after the city of Vladimir, where it was historically venerated.
  i18n_explanations:
    en: One of the most revered icons in Russian Orthodoxy, depicting the Virgin Mary with the Christ
      Child. It is believed to have miraculous powers and is associated with the protection of Russia.
      The icon is named after the city of Vladimir, where it was historically venerated.
    es: Una de las iconos más veneradas en la ortodoxia rusa, que representa a la Virgen María con el
      Niño Jesús. Se cree que tiene poderes milagrosos y está asociada con la protección de Rusia. La
      icono toma su nombre de la ciudad de Vladimir, donde históricamente fue venerada.
    fr: L'une des icônes les plus vénérées dans l'orthodoxie russe, représentant la Vierge Marie avec
      l'Enfant Jésus. On lui attribue des pouvoirs miraculeux et elle est associée à la protection de
      la Russie. L'icône tire son nom de la ville de Vladimir, où elle était historiquement vénérée.
    de: Eine der verehrtesten Ikonen der russischen Orthodoxie, die die Jungfrau Maria mit dem Christuskind
      darstellt. Ihr werden wundersame Kräfte zugeschrieben und sie gilt als Beschützerin Russlands. Die
      Ikone ist nach der Stadt Wladimir benannt, wo sie historisch verehrt wurde.
    it: Una delle icone più venerate nell'ortodossia russa, che rappresenta la Vergine Maria con il Bambino
      Gesù. Si crede abbia poteri miracolosi ed è associata alla protezione della Russia. L'icona prende
      il nome dalla città di Vladimir, dove storicamente era venerata.
    pt: Uma das ícones mais veneradas na ortodoxia russa, que representa a Virgem Maria com o Menino Jesus.
      Acredita-se que possua poderes milagrosos e está associada à proteção da Rússia. A ícone recebe
      o nome da cidade de Vladimir, onde historicamente era venerada.
    ru: Одна из самых почитаемых икон в русской православной традиции, изображающая Богородицу с Младенцем
      Христом. Считается чудотворной и ассоциируется с защитой России. Икона названа в честь города Владимир,
      где она исторически почиталась.
    ja: ロシア正教会で最も崇敬される聖像の一つで、幼子イエスを抱く聖母マリアを描いています。奇跡を起こす力があると信じられ、ロシアの守護と結びつけられています。この聖像は、かつて崇敬された都市ウラジーミルにちなんで名付けられました。
    zh: 俄罗斯正教会最受尊敬的圣像之一，描绘圣母玛利亚与圣婴耶稣。被认为具有神奇力量，并与保护俄罗斯联系在一起。该圣像以弗拉基米尔市命名，历史上曾在那里受到崇敬。
    ar: أحد الأيقونات الأكثر تبجيلاً في الأرثوذكسية الروسية، ويمثل السيدة العذراء مع الطفل يسوع. يعتقد
      أنها تمتلك قوى خارقة وترتبط بحماية روسيا. سميت الأيقونة على اسم مدينة فلاديمير، حيث كانت historically
      تبجل تاريخياً.
    he: אחת האיקונות הנערצות ביותר בנצרות האורתודוקסית הרוסית, המציגה את הבתולה מרים עם ישו התינוק. מאמינים
      שהיא בעלת כוחות נסים ומשויכת להגנתה של רוסיה. האיקונה נקראת על שם העיר ולדימיר, שם הייתה מוערצת
      באופן היסטורי.
