- id: ru_proverb_tradition_мир_хижинам_война_дворцам_fda6f7a7
  language: ru
  canonical_reference: Мир хижинам — война дворцам
  reference_type: proverb_tradition
  surface_patterns:
  - Мир хижинам — война дворцам
  - мир хижинам, война дворцам
  short_explanation: A revolutionary slogan from the late 18th century, advocating for the overthrow of
    the aristocracy ('palaces') in favor of the common people ('huts'). Reflects class struggle and egalitarian
    ideals.
  i18n_explanations:
    en: A revolutionary slogan from the late 18th century, advocating for the overthrow of the aristocracy
      ('palaces') in favor of the common people ('huts'). Reflects class struggle and egalitarian ideals.
    es: Un eslogan revolucionario del siglo XVIII tardío, que aboga por el derrocamiento de la aristocracia
      ('palacios') en favor del pueblo ('chozas'). Refleja la lucha de clases y los ideales igualitarios.
    fr: Un slogan révolutionnaire de la fin du XVIIIe siècle, prônant le renversement de l'aristocratie
      ('palais') au profit du peuple ('cabanes'). Illustre la lutte des classes et les idéaux égalitaires.
    de: Ein revolutionärer Slogan aus dem späten 18. Jahrhundert, der den Sturz der Aristokratie ('Paläste')
      zugunsten des einfachen Volkes ('Hütten') fordert. Steht für Klassenkampf und egalitäre Ideale.
    it: Uno slogan rivoluzionario della fine del XVIII secolo, che invoca il rovesciamento dell'aristocrazia
      ('palazzi') a favore del popolo ('capanne'). Riflette la lotta di classe e gli ideali egualitari.
    pt: Um slogan revolucionário do final do século XVIII, que defende a derrubada da aristocracia ('palácios')
      em favor do povo ('cabanas'). Reflete a luta de classes e ideais igualitários.
    ru: Революционный лозунг конца XVIII века, призывающий к свержению аристократии ('дворцы') в пользу
      простого народа ('хижины'). Отражает классовую борьбу и эгалитарные идеалы.
    ja: 18世紀末の革命的なスローガンで、貴族階級（宮殿）の打倒と庶民（小屋）の擁護を訴える。階級闘争と平等主義の理想を反映する。
    zh: 18世纪末的一句革命口号，主张推翻贵族阶层（“宫殿”）以拥护平民（“茅舍”）。体现阶级斗争与平等主义理想。
    ar: شعار ثوري من أواخر القرن الثامن عشر، يدعو إلى الإطاحة بالأرستقراطية ("القصور") لصالح الشعب ("الأكواخ").
      يعكس الصراع الطبقي والمثالية المساواتية.
    he: סיסמה מהפכנית מסוף המאה ה-18, הקוראת להפלת האצולה ("ארמונות") לטובת העם ("בקתות"). משקפת מאבק
      מעמדי ואידיאלים שוויוניים.
