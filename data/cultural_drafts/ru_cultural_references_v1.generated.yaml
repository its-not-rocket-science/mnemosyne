  short_explanation: Historic theater in St. Petersburg, opened in 1827, known for hosting premieres of
    Russian operas and plays. Symbolizes cultural heritage of the imperial era.
  i18n_explanations:
    en: Historic theater in St. Petersburg, opened in 1827, known for hosting premieres of Russian operas
      and plays. Symbolizes cultural heritage of the imperial era.
    es: Teatro histórico en San Petersburgo, inaugurado en 1827, conocido por albergar estrenos de óperas
      y obras rusas. Simboliza el patrimonio cultural de la era imperial.
    fr: Théâtre historique de Saint-Pétersbourg, ouvert en 1827, connu pour avoir accueilli les premières
      de nombreuses opéras et pièces russes. Symbole du patrimoine culturel de l'ère impériale.
    de: Historisches Theater in St. Petersburg, eröffnet 1827, bekannt für die Uraufführungen russischer
      Opern und Theaterstücke. Symbolisiert das kulturelle Erbe der Zarenzeit.
    it: Teatro storico di San Pietroburgo, inaugurato nel 1827, noto per aver ospitato le anteprime di
      opere e opere teatrali russe. Simboleggia il patrimonio culturale dell'era imperiale.
    pt: Teatro histórico em São Petersburgo, inaugurado em 1827, conhecido por sediar estreias de óperas
      e peças russas. Simboliza o patrimônio cultural da era imperial.
    ru: Исторический театр в Санкт-Петербурге, открытый в 1827 году, известный премьерами русских опер
      и спектаклей. Символизирует культурное наследие имперской эпохи.
    ja: 1827年に開業したサンクトペテルブルクの歴史的劇場で、ロシアのオペラや演劇の初演で知られる。帝政時代の文化遺産の象徴。
    zh: 圣彼得堡历史悠久的剧院，创建于1827年，以首演俄语歌剧和戏剧而闻名。象征帝国时代的文化遗产。
    ar: مسرح تاريخي في سانت بطرسبرغ، افتتح عام 1827، معروف باستضافة عروض أوبرا ومسرحيات روسية لأول مرة.
