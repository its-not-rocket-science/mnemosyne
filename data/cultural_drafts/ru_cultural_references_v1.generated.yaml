  - выше лба уши не бывают
  short_explanation: 'Literal meaning: ''Ears don''t grow above the forehead.'' Figuratively, it means
    one should not expect more than what is reasonable or possible; accept one''s limitations.'
  i18n_explanations:
    en: 'Literal meaning: ''Ears don''t grow above the forehead.'' Figuratively, it means one should not
      expect more than what is reasonable or possible; accept one''s limitations.'
    es: 'Significado literal: ''Las orejas no crecen por encima de la frente.'' Figuradamente, significa
      que no se debe esperar más de lo razonable o posible; aceptar las propias limitaciones.'
    fr: 'Sens littéral : ''Les oreilles ne poussent pas au-dessus du front.'' Au figuré, cela signifie
      qu''on ne doit pas attendre plus que ce qui est raisonnable ou possible ; accepter ses limites.'
    de: 'Wörtliche Bedeutung: ''Ohren wachsen nicht über der Stirn.'' Im übertragenen Sinne bedeutet es,
      dass man nicht mehr erwarten sollte, als vernünftig oder möglich ist; seine Grenzen akzeptieren.'
    it: 'Significato letterale: ''Le orecchie non crescono sopra la fronte.'' In senso figurato, significa
      che non si dovrebbe pretendere più di quanto sia ragionevole o possibile; accettare i propri limiti.'
    pt: 'Significado literal: ''Orelhas não crescem acima da testa.'' Figurativamente, significa que não
      se deve esperar mais do que o razoável ou possível; aceitar as próprias limitações.'
    ru: 'Буквально: ''Уши не растут выше лба.'' В переносном смысле означает, что не стоит ожидать больше,
      чем разумно или возможно; принимать свои ограничения.'
    ja: 文字通りの意味は「耳は額の上には生えない」。比喩的には、合理的または可能な範囲を超えることを期待すべきではないという意味。自分の限界を受け入れること。
    zh: 字面意思是‘耳朵不会长在额头上’。比喻义是一个人不应期望超出合理或可能的范围；接受自己的局限。
    ar: 'المعنى الحرفي: ''الأذنان لا تنموان فوق الجبهة''. مجازيًا، يعني ألا تتوقع أكثر مما هو معقول أو
      ممكن؛ تقبل حدودك.'
    he: 'פירוש מילולי: ''אוזניים לא גדלות מעל המצח''. באופן סמלי, פירושו שלא צריך לצפות ליותר ממה שסביר
      או אפשרי; לקבל את מגבלותיך.'
