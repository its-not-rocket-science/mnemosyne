- id: ru_cultural_reference_вселенская_панихида_fb256473
  language: ru
  canonical_reference: Вселенская панихида
  reference_type: cultural_reference
  surface_patterns:
  - Вселенская панихида
  - вселенская панихида по усопшим
  short_explanation: A memorial service in the Eastern Orthodox Church, held for the repose of the souls
    of the departed, often on the third, ninth, and fortieth days after death, as well as on annual commemorations.
    It is a central ritual in Orthodox funeral traditions.
  i18n_explanations:
    en: A memorial service in the Eastern Orthodox Church, held for the repose of the souls of the departed,
      often on the third, ninth, and fortieth days after death, as well as on annual commemorations. It
      is a central ritual in Orthodox funeral traditions.
    es: Un servicio memorial en la Iglesia Ortodoxa Oriental, celebrado para el descanso de las almas
      de los difuntos, generalmente en el tercer, noveno y cuadragésimo día después de la muerte, así
      como en conmemoraciones anuales. Es un ritual central en las tradiciones funerarias ortodoxas.
    fr: Un office commémoratif dans l'Église orthodoxe orientale, célébré pour le repos des âmes des défunts,
      souvent aux troisième, neuvième et quarantième jours après le décès, ainsi que lors de commémorations
      annuelles. C'est un rituel central dans les traditions funéraires orthodoxes.
    de: Ein Gedächtnisgottesdienst in der orthodoxen Kirche, der für die Ruhe der Seelen der Verstorbenen
      abgehalten wird, oft am dritten, neunten und vierzigsten Tag nach dem Tod sowie bei jährlichen Gedenkfeiern.
      Er ist ein zentrales Ritual in der orthodoxen Begräbnistradition.
    it: Un ufficio commemorativo nella Chiesa ortodossa orientale, celebrato per il riposo delle anime
      dei defunti, spesso al terzo, nono e quarantesimo giorno dopo la morte, nonché in commemorazioni
      annuali. È un rituale centrale nelle tradizioni funebri ortodosse.
    pt: Um serviço memorial na Igreja Ortodoxa Oriental, realizado para o repouso das almas dos falecidos,
      geralmente no terceiro, nono e quadragésimo dias após a morte, bem como em comemorações anuais.
      É um ritual central nas tradições funerárias ortodoxas.
    ru: Поминальная служба в Православной церкви, совершаемая для упокоения душ усопших, часто на третий,
      девятый и сороковой дни после смерти, а также в дни ежегодных поминаний. Это центральный обряд в
      православных погребальных традициях.
    ja: 正教会で行われる死者の霊魂の安息を祈る記念式典で、通常は死後3日目、9日目、40日目、および年忌の際に執り行われます。正教の葬送儀礼の中心的な儀式です。
    zh: 东正教为亡者灵魂安息而举行的纪念仪式，通常在去世后第三天、第九天、第四十天以及每年的忌日举行。这是正教葬礼传统中的核心仪式。
    ar: مراسم تذكارية في الكنيسة الأرثوذكسية الشرقية، تقام لتكريم أرواح المتوفين، غالبًا في اليوم الثالث
      والتاسع والأربعين بعد الوفاة، بالإضافة إلى التذكارات السنوية. إنها طقوس مركزية في تقاليد الجنازات
      الأرثوذكسية.
    he: טקס זיכרון בנצרות האורתודוקסית המזרחית, הנערך למען מנוחת נשמות הנפטרים, לרוב ביום השלישי, התשיעי
      והארבעים לאחר המוות, וכן בטקסי זיכרון שנתיים. זהו טקס מרכזי במסורת ההלוויות האורתודוקסית.
