  - Без муки науки не бывает
  short_explanation: A proverb meaning 'No pain, no gain' or 'There is no knowledge without effort,' emphasizing
    the necessity of hard work for learning and achievement.
  i18n_explanations:
    en: A proverb meaning 'No pain, no gain' or 'There is no knowledge without effort,' emphasizing the
      necessity of hard work for learning and achievement.
    es: Un refrán que significa 'Sin esfuerzo no hay recompensa' o 'No hay conocimiento sin trabajo,'
      destacando la necesidad del esfuerzo para aprender y lograr metas.
    fr: Un proverbe signifiant 'Sans peine, pas de gain' ou 'On n'apprend rien sans effort,' soulignant
      la nécessité du travail pour acquérir des connaissances et réussir.
    de: Ein Sprichwort mit der Bedeutung 'Ohne Fleiß kein Preis' oder 'Ohne Anstrengung kein Wissen,'
      das die Notwendigkeit harter Arbeit für Lernen und Erfolg betont.
    it: Un proverbio che significa 'Nessun dolore, nessun guadagno' o 'Non c'è conoscenza senza sforzo,'
      sottolineando la necessità del duro lavoro per apprendere e ottenere risultati.
    pt: Um provérbio que significa 'Sem dor, não há ganho' ou 'Não há conhecimento sem esforço,' destacando
      a necessidade de trabalho árduo para aprender e alcançar objetivos.
    ru: Пословица, означающая 'Без труда не вытащишь и рыбку из пруда' или 'Нет знания без усилий,' подчеркивающая
      необходимость упорного труда для обучения и достижений.
    ja: 「努力なくして成果なし」または「努力なくして知識なし」を意味することわざで、学習と達成に努力が不可欠であることを強調しています。
    zh: 一句谚语，意为‘没有痛苦就没有收获’或‘没有努力就没有知识’，强调学习和成就需要付出努力。
    ar: مثل يقول 'لا كسب بدون تعب' أو 'لا علم بدون جهد'، مؤكدًا ضرورة العمل الشاق للتعلم والإنجاز.
    he: פתגם שמשמעו 'ללא מאמץ אין תועלת' או 'אין ידע ללא עבודה קשה,' המדגיש את הצורך במאמץ ללמידה והצלחה.
