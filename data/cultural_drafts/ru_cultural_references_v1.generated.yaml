- id: ru_classical_or_scriptural_allusion_вера_без_дел_мертва_a68ca507
  language: ru
  canonical_reference: Вера без дел мертва
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - вера без дел мертва
  - вера без дел мертва есть
  - вера без дел мертва и
  - вера без дел мертва, ибо
  short_explanation: Faith without works is dead. A biblical phrase emphasizing that true faith must be
    accompanied by action, originating from the Epistle of James (James 2:17, 26).
  i18n_explanations:
    en: Faith without works is dead. A biblical phrase emphasizing that true faith must be accompanied
      by action, originating from the Epistle of James (James 2:17, 26).
    es: La fe sin obras está muerta. Frase bíblica que enfatiza que la verdadera fe debe ir acompañada
      de acciones, tomada de la Epístola de Santiago (Santiago 2:17, 26).
    fr: La foi sans les œuvres est morte. Expression biblique soulignant que la vraie foi doit s’accompagner
      d’actions, tirée de l’Épître de Jacques (Jacques 2:17, 26).
    de: Glaube ohne Werke ist tot. Ein biblischer Ausdruck, der betont, dass echter Glaube von Taten begleitet
      sein muss, aus dem Jakobusbrief (Jakobus 2:17, 26).
    it: La fede senza le opere è morta. Un’espressione biblica che sottolinea come la vera fede debba
      accompagnarsi alle azioni, tratta dall’Epistola di Giacomo (Giacomo 2:17, 26).
    pt: A fé sem obras é morta. Expressão bíblica que enfatiza que a verdadeira fé deve ser acompanhada
      de ações, retirada da Epístola de Tiago (Tiago 2:17, 26).
    ru: Вера без дел мертва. Библейское выражение, подчеркивающее, что истинная вера должна сопровождаться
      делами, из Послания Иакова (Иак. 2:17, 26).
    ja: 信仰は行いがなければ死んでいる。真の信仰は行いを伴わなければならないという聖書の言葉で、ヤコブの手紙（ヤコブ2:17, 26）に由来します。
    zh: 信仰若没有行为就是死的。圣经中强调真正的信仰必须伴随行动的一句话，出自《雅各书》（雅各书2:17, 26）。
    ar: الإيمان بدون أعمال ميت. عبارة كتابية تؤكد أن الإيمان الحقيقي يجب أن يصحبه عمل، مأخوذة من رسالة
      يعقوب (يعقوب 2:17، 26).
    he: האמונה ללא מעשים מתה. ביטוי מקראי המדגיש כי האמונה האמיתית חייבת ללוות במעשים, מתוך אגרת יעקב
      (יעקב ב:17, 26).
