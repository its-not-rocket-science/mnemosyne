  short_explanation: Phrase denoting the peak of an artist's career or a moment of greatest success. Originates
    from the idea of a star (звезда) shining brightest at its zenith.
  i18n_explanations:
    en: Phrase denoting the peak of an artist's career or a moment of greatest success. Originates from
      the idea of a star (звезда) shining brightest at its zenith.
    es: Frase que denota el punto más alto de la carrera de un artista o un momento de máximo éxito. Proviene
      de la idea de una estrella (звезда) brillando con más intensidad en su cenit.
    fr: Expression désignant l'apogée de la carrière d'un artiste ou un moment de grand succès. Vient
      de l'idée d'une étoile (звезда) brillant le plus fort à son zénith.
    de: Ausdruck für den Höhepunkt der Karriere eines Künstlers oder einen Moment des größten Erfolgs.
      Stammt von der Idee eines Sterns (звезда), der in seinem Zenit am hellsten leuchtet.
    it: Espressione che indica il culmine della carriera di un artista o un momento di massimo successo.
      Deriva dall'idea di una stella (звезда) che brilla più intensamente al suo zenit.
    pt: Expressão que denota o auge da carreira de um artista ou um momento de grande sucesso. Vem da
      ideia de uma estrela (звезда) brilhando mais intensamente em seu zênite.
    ru: Выражение, обозначающее пик карьеры артиста или момент наивысшего успеха. Происходит от идеи звезды
      (звезда), сияющей ярче всего в зените.
    ja: 芸術家のキャリアの頂点や最大の成功の瞬間を表す言葉。星（звезда）が天頂で最も輝くという考えに由来する。
    zh: 形容艺术家事业巅峰或最成功时刻的短语，源于星星（звезда）在天顶最闪耀的意象。
    ar: عبارة تدل على ذروة مهنة الفنان أو لحظة النجاح الأكبر. تأتي من فكرة أن النجمة (звезда) تتألق أكثر
      في أوجها.
    he: ביטוי המציין את שיאה של הקריירה של אמן או רגע ההצלחה הגדול ביותר. נובע מהרעיון שבהיותה של כוכב
