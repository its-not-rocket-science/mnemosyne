- id: ru_cultural_reference_точка_невозврата_228f7c8f
  language: ru
  canonical_reference: Точка невозврата
  reference_type: cultural_reference
  surface_patterns:
  - точка невозврата
  - перейти точку невозврата
  - достичь точки невозврата
  short_explanation: A metaphorical term for a critical moment beyond which a situation becomes irreversible.
    It originates from aviation and space exploration but is widely used in Russian discourse to describe
    irreversible decisions or changes in various contexts.
  i18n_explanations:
    en: A metaphorical term for a critical moment beyond which a situation becomes irreversible. It originates
      from aviation and space exploration but is widely used in Russian discourse to describe irreversible
      decisions or changes in various contexts.
    es: Un término metafórico para un momento crítico más allá del cual una situación se vuelve irreversible.
      Tiene su origen en la aviación y la exploración espacial, pero se usa ampliamente en el discurso
      ruso para describir decisiones o cambios irreversibles en diversos contextos.
    fr: Un terme métaphorique désignant un moment critique au-delà duquel une situation devient irréversible.
      Il trouve son origine dans l'aviation et l'exploration spatiale, mais est largement utilisé dans
      le discours russe pour décrire des décisions ou des changements irréversibles dans divers contextes.
    de: Ein metaphorischer Begriff für einen kritischen Moment, nach dem eine Situation unumkehrbar wird.
      Er stammt aus der Luftfahrt und Raumfahrt, wird aber im russischen Diskurs häufig verwendet, um
      irreversible Entscheidungen oder Veränderungen in verschiedenen Kontexten zu beschreiben.
    it: Un termine metaforico per indicare un momento critico oltre il quale una situazione diventa irreversibile.
      Ha origine nell'aviazione e nell'esplorazione spaziale, ma è ampiamente usato nel discorso russo
      per descrivere decisioni o cambiamenti irreversibili in vari contesti.
    pt: Um termo metafórico para um momento crítico além do qual uma situação se torna irreversível. Originou-se
      na aviação e na exploração espacial, mas é amplamente usado no discurso russo para descrever decisões
      ou mudanças irreversíveis em vários contextos.
    ru: Метафорический термин для обозначения критического момента, после которого ситуация становится
      необратимой. Происходит из авиации и космонавтики, но широко используется в русском дискурсе для
      описания необратимых решений или изменений в различных контекстах.
    ja: 状況が irreversible（取り返しのつかない）になる臨界点を指す比喩的な用語。航空や宇宙探査に由来しますが、ロシア語の discourse（言説）では、さまざまな文脈で irreversible
      な決定や変化を表すのに広く使われます。
    zh: 一个比喻性的术语，指代一个关键时刻，过了这个点情况将变得不可逆转。源自航空和太空探索，但在俄语语境中广泛用于描述各种情况下的不可逆转的决定或变化。
    ar: مصطلح مجازي يشير إلى لحظة حاسمة بعد تجاوزها تصبح الوضع لا رجعة فيه. ينشأ من الطيران واستكشاف الفضاء،
      لكنه يُستخدم على نطاق واسع في الخطاب الروسي لوصف قرارات أو تغييرات لا رجعة فيها في سياقات مختلفة.
    he: מונח מטאפורי לזמן קריטי שמעבר לו המצב הופך לבלתי הפיך. מקורו בתחום התעופה וחלל, אך משמש באופן
