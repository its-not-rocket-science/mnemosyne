    de: Wer nicht wagt, der nicht gewinnt; bedeutet, dass man Risiken eingehen muss, um Erfolg zu haben.
      Ein modernes russisches Sprichwort, oft in motivierenden Kontexten verwendet.
    it: Chi non rischia, non beve champagne; implica che bisogna correre rischi per ottenere successo.
