- id: ru_proverb_tradition_бог_троицу_любит_f1980b10
  language: ru
  canonical_reference: Бог троицу любит
  reference_type: proverb_tradition
  surface_patterns:
  - Бог троицу любит
  - Бог троицу любит, а святую душу в радость
  - Бог троицу любит, а четвертого не терпит
  short_explanation: A Russian proverb suggesting that God favors groups of three (the Holy Trinity) but
    dislikes a fourth person intruding. Reflects cultural and religious emphasis on triads and caution
    against overcrowding.
  i18n_explanations:
    en: A Russian proverb suggesting that God favors groups of three (the Holy Trinity) but dislikes a
      fourth person intruding. Reflects cultural and religious emphasis on triads and caution against
      overcrowding.
    es: Un refrán ruso que sugiere que Dios favorece los grupos de tres (la Santísima Trinidad) pero no
      le gusta que una cuarta persona se entrometa. Refleja el énfasis cultural y religioso en los tríos
      y la precaución contra el hacinamiento.
    fr: Un proverbe russe suggérant que Dieu favorise les groupes de trois (la Sainte Trinité) mais n'aime
      pas qu'une quatrième personne s'immisce. Reflète l'accent culturel et religieux sur les triades
      et la prudence face à la surpopulation.
    de: Ein russisches Sprichwort, das besagt, dass Gott Gruppen von drei (die Heilige Dreifaltigkeit)
      mag, aber eine vierte Person nicht duldet. Zeigt die kulturelle und religiöse Betonung von Triaden
      und Vorsicht vor Überfüllung.
    it: Un proverbio russo che suggerisce che Dio favorisce i gruppi di tre (la Santissima Trinità) ma
      non gradisce un quarto intruso. Riflette l'enfasi culturale e religiosa sulle triadi e la cautela
      contro l'affollamento.
    pt: Um provérbio russo que sugere que Deus favorece grupos de três (a Santíssima Trindade), mas não
      gosta de uma quarta pessoa intrusa. Reflete a ênfase cultural e religiosa nas tríades e o cuidado
      contra a superlotação.
    ru: Русская пословица, предполагающая, что Бог любит тройки (Святую Троицу), но не терпит четвёртого
      лишнего. Отражает культурный и религиозный акцент на триадах и предостережение от перенаселённости.
    ja: ロシアのことわざで、神は3人組（聖三位一体）を好むが、4人目の侵入者は嫌うというもの。文化的・宗教的な三位一体の重視と過密への警戒を反映している。
    zh: 俄罗斯谚语，称上帝喜欢三人组（圣三一），但讨厌第四者插足。反映了文化和宗教对三位一体的强调以及对拥挤的警惕。
    ar: مثل روسي يقول إن الله يحب المجموعات الثلاثية (الثالوث المقدس) لكنه لا يحب intrusion (دخول) شخص
      رابع. يعكس التركيز الثقافي والديني على الثلاثيات والحذر من الازدحام.
    he: פתגם רוסי הטוען שאלוהים אוהב שלשות (השילוש הקדוש) אך שונא אדם רביעי שמפריע. משקף את הדגש התרבותי
      והדתי על שלשות ואת הזהירות מפני צפיפות.
