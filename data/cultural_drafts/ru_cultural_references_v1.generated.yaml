  short_explanation: A humorous and affectionate phrase addressing a mother or a beloved woman, often
    used in informal contexts. It blends reverence ('Владычица моя' – 'My sovereign') with playful intimacy
    ('мама Рома').
  i18n_explanations:
    en: A humorous and affectionate phrase addressing a mother or a beloved woman, often used in informal
      contexts. It blends reverence ('Владычица моя' – 'My sovereign') with playful intimacy ('мама Рома').
    es: Frase humorística y afectuosa para dirigirse a una madre o mujer querida, usada en contextos informales.
      Combina reverencia ('Владычица моя' – 'Mi soberana') con intimidad juguetona ('мама Рома').
    fr: Une expression humoristique et affectueuse pour s'adresser à une mère ou une femme aimée, souvent
      utilisée dans un contexte informel. Elle mêle révérence ('Владычица моя' – 'Ma souveraine') et intimité
      ludique ('мама Рома').
    de: Ein humorvoller und liebevoller Ausdruck, um sich an eine Mutter oder geliebte Frau zu wenden,
      oft in informellen Kontexten verwendet. Er verbindet Ehrfurcht ('Владычица моя' – 'Meine Herrscherin')
      mit spielerischer Vertrautheit ('мама Рома').
    it: Un'espressione affettuosa e umoristica per rivolgersi a una madre o a una donna amata, spesso
      usata in contesti informali. Unisce reverenza ('Владычица моя' – 'Mia sovrana') e intimità giocosa
      ('мама Рома').
    pt: Uma expressão afetuosa e humorística para se dirigir a uma mãe ou mulher amada, usada em contextos
      informais. Combina reverência ('Владычица моя' – 'Minha soberana') com intimidade brincalhona ('мама
      Рома').
    ru: Шутливое и ласковое обращение к матери или любимой женщине, часто используемое в неформальной
      обстановке. Сочетает почтение ('Владычица моя' – 'Моя владычица') с игривой близостью ('мама Рома').
    ja: 母親や愛する女性に向けたユーモアと愛情のこもった表現で、カジュアルな場面で使われます。敬意を込めた「Владычица моя」（「我が女王よ」）と親しみを込めた「мама Рома」を組み合わせています。
    zh: 一种幽默而亲昵的表达，用于称呼母亲或心爱的女性，常用于非正式场合。结合了敬意（'Владычица моя'意为'我的女王'）与俏皮的亲密（'мама Рома'）。
    ar: عبارة فكاهية وعاطفية توجه إلى الأم أو المرأة المحبوبة، تستخدم غالبًا في سياقات غير رسمية. تجمع
