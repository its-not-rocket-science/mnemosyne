  short_explanation: A proverb meaning that good times do not last forever; hardship will eventually follow.
    It reflects the cyclical nature of life and the inevitability of change.
  i18n_explanations:
    en: A proverb meaning that good times do not last forever; hardship will eventually follow. It reflects
      the cyclical nature of life and the inevitability of change.
    es: Un refrán que significa que los buenos tiempos no duran para siempre; la adversidad llegará tarde
      o temprano. Refleja la naturaleza cíclica de la vida y la inevitabilidad del cambio.
    fr: Un proverbe signifiant que les bons moments ne durent pas éternellement ; les difficultés finiront
      par arriver. Il reflète la nature cyclique de la vie et l'inévitabilité du changement.
    de: Ein Sprichwort, das bedeutet, dass gute Zeiten nicht ewig andauern; irgendwann folgt die Not.
      Es spiegelt die zyklische Natur des Lebens und die Unvermeidlichkeit von Veränderungen wider.
    it: Un proverbio che significa che i bei tempi non durano per sempre; prima o poi arriveranno le difficoltà.
      Riflette la natura ciclica della vita e l'inevitabilità del cambiamento.
    pt: Um provérbio que significa que os bons tempos não duram para sempre; a dificuldade chegará cedo
