- id: ru_cultural_reference_вальс_фантазия_bec71223
  language: ru
  canonical_reference: Вальс-фантазия
  reference_type: cultural_reference
  surface_patterns:
  - Вальс-фантазия
  short_explanation: A concert waltz composed by Mikhail Glinka in 1839, blending Russian folk elements
    with Romantic virtuosity. It is one of the most famous Russian waltzes and often associated with elegance
    and national musical identity.
  i18n_explanations:
    en: A concert waltz composed by Mikhail Glinka in 1839, blending Russian folk elements with Romantic
      virtuosity. It is one of the most famous Russian waltzes and often associated with elegance and
      national musical identity.
    es: Un vals concertístico compuesto por Mijaíl Glinka en 1839, que fusiona elementos folclóricos rusos
      con virtuosismo romántico. Es uno de los valses rusos más famosos y suele asociarse con elegancia
      e identidad musical nacional.
    fr: Une valse de concert composée par Mikhaïl Glinka en 1839, mêlant des éléments folkloriques russes
      à un virtuosisme romantique. C'est l'une des valses russes les plus célèbres et elle est souvent
      associée à l'élégance et à l'identité musicale nationale.
    de: Ein Konzertwalzer, komponiert von Michail Glinka im Jahr 1839, der russische Volksmelodien mit
      romantischer Virtuosität verbindet. Er gehört zu den berühmtesten russischen Walzern und wird oft
      mit Eleganz und nationaler musikalischer Identität in Verbindung gebracht.
    it: Un valzer da concerto composto da Michail Glinka nel 1839, che fonde elementi folcloristici russi
      con virtuosismo romantico. È uno dei valzer russi più famosi ed è spesso associato all'eleganza
      e all'identità musicale nazionale.
    pt: Uma valsa de concerto composta por Mikhail Glinka em 1839, que combina elementos folclóricos russos
      com virtuosismo romântico. É uma das valsas russas mais famosas e frequentemente associada à elegância
      e à identidade musical nacional.
    ru: Концертный вальс Михаила Глинки, написанный в 1839 году, сочетает русские народные мотивы с романтической
      виртуозностью. Один из самых известных русских вальсов, ассоциируемый с изяществом и национальной
      музыкальной идентичностью.
    ja: ミハイル・グリンカが1839年に作曲したコンサート用ワルツで、ロシアの民謡的要素とロマン派の技巧が融合されています。ロシアを代表するワルツの一つで、優雅さと国家的な音楽的アイデンティティと結びつけられることが多いです。
    zh: 米哈伊尔·格林卡于1839年创作的音乐会圆舞曲，融合了俄罗斯民间元素与浪漫主义的技巧。它是最著名的俄罗斯圆舞曲之一，常与优雅和民族音乐身份联系在一起。
    ar: واحدة من موسيقى الفالس الكونسير التي ألفها ميخائيل غلينكا عام 1839، تجمع بين عناصر الفولكلور الروسي
      مع البراعة الرومانسية. تعد من أشهر الفالسات الروسية وترتبط غالبًا بالأناقة والهوية الموسيقية الوطنية.
    he: ואלס קונצרטי שחיבר מיכאיל גלינקה בשנת 1839, המשלב יסודות עממיים רוסיים עם וירטואוזיות רומנטית.
      אחד הוואלסים הרוסיים המפורסמים ביותר, ומשויך לעיתים קרובות לאלגנטיות ולזהות המוזיקלית הלאומית.
