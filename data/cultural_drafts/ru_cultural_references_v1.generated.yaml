- id: ru_proverb_tradition_волка_ноги_кормят_06645dbf
  language: ru
  canonical_reference: Волка ноги кормят
  reference_type: proverb_tradition
  surface_patterns:
  - Волка ноги кормят
  - Волка ноги кормят, а зайца зубы кормят
  - Волка ноги кормят, а зайца зубы кормят, а человека ум
  short_explanation: A proverb meaning 'A wolf is fed by its legs'—highlighting the importance of action,
    mobility, and initiative over passive reliance. Often contrasted with the fate of the hare ('teeth
    feed') and humans ('mind feeds').
  i18n_explanations:
    en: A proverb meaning 'A wolf is fed by its legs'—highlighting the importance of action, mobility,
      and initiative over passive reliance. Often contrasted with the fate of the hare ('teeth feed')
      and humans ('mind feeds').
    es: Refrán que significa 'Al lobo lo alimentan sus patas', destacando la importancia de la acción,
      la movilidad y la iniciativa sobre la dependencia pasiva. Suele contrastarse con el destino de la
      liebre ('los dientes alimentan') y los humanos ('la mente alimenta').
    fr: Proverbe signifiant 'Le loup est nourri par ses pattes', soulignant l'importance de l'action,
      de la mobilité et de l'initiative plutôt que de la dépendance passive. Souvent contrasté avec le
      destin du lièvre ('les dents nourrissent') et des humains ('l'esprit nourrit').
    de: Ein Sprichwort mit der Bedeutung 'Der Wolf wird von seinen Beinen ernährt' — betont die Bedeutung
      von Tatkraft, Mobilität und Initiative gegenüber passiver Abhängigkeit. Wird oft mit dem Schicksal
      des Hasen ('die Zähne ernähren') und der Menschen ('der Verstand ernährt') kontrastiert.
    it: Un proverbio che significa 'Il lupo è nutrito dalle sue zampe', che sottolinea l'importanza dell'azione,
      della mobilità e dell'iniziativa rispetto alla dipendenza passiva. Spesso viene contrapposto al
      destino della lepre ('i denti nutrono') e degli umani ('la mente nutre').
    pt: Um provérbio que significa 'O lobo é alimentado por suas patas', destacando a importância da ação,
      mobilidade e iniciativa sobre a dependência passiva. Muitas vezes é contrastado com o destino da
      lebre ('os dentes alimentam') e dos humanos ('a mente alimenta').
    ru: Пословица, означающая 'Волка кормят ноги', подчеркивающая важность действия, мобильности и инициативы
      вместо пассивной зависимости. Часто противопоставляется судьбе зайца ('зубы кормят') и человека
      ('ум кормит').
    ja: 「狼は足で養われる」という意味の諺で、受動的な依存よりも行動、機動性、主体性の重要性を強調します。しばしばウサギ（「歯が養う」）や人間（「知性が養う」）の運命と対比されます。
    zh: 意为“狼靠腿吃饭”的谚语，强调行动、机动性和主动性的重要性，而不是被动依赖。常与兔子（“牙齿喂养”）和人类（“头脑喂养”）的命运形成对比。
    ar: مثل يعني 'الذئب يطعمه ساقاه'، يسلط الضوء على أهمية العمل والحركة والمبادرة بدلاً من الاعتماد السلبي.
      غالبًا ما يقارن بمصير الأرنب ('الأسنان تطعم') والبشر ('العقل يطعم').
    he: פתגם שפירושו 'הזאב ניזון מרגליו' — מדגיש את חשיבות הפעולה, הניידות והמוטיבציה על פני תלות פסיבית.
      לעיתים קרובות מושווה לגורל הארנב ('השיניים מזינות') ולאדם ('השכל מזין').
