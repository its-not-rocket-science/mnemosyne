    en: A reference to Dmitry Mamin-Sibiryak's 1891 children's story 'The Grey Neck' (Серая шейка), about
      a wounded duckling. The phrase is often used metaphorically to describe someone who is vulnerable
      or out of place.
    es: Referencia al cuento infantil de 1891 'El Cuello Gris' (Серая шейка) de Dmitry Mamin-Sibiryak,
      sobre un patito herido. La frase se usa metafóricamente para describir a alguien vulnerable o fuera
      de lugar.
    fr: Référence au conte pour enfants de 1891 'Le Cou de gris' (Серая шейка) de Dmitri Mamine-Sibiriak,
      sur un caneton blessé. Cette expression est souvent utilisée métaphoriquement pour décrire quelqu'un
      de vulnérable ou inadapté.
    de: Ein Verweis auf die Kindergeschichte 'Der graue Hals' (Серая шейка) von Dmitry Mamin-Sibiryak
      aus dem Jahr 1891 über ein verletztes Entenküken. Der Ausdruck wird oft metaphorisch verwendet,
      um jemanden zu beschreiben, der verletzlich oder fehl am Platz ist.
    it: Riferimento alla fiaba per bambini del 1891 'Il collo grigio' (Серая шейка) di Dmitry Mamin-Sibiryak,
      su un anatroccolo ferito. La frase viene spesso usata in senso metaforico per descrivere qualcuno
      di vulnerabile o fuori posto.
    pt: Referência à história infantil de 1891 'O Pescoço Cinzento' (Серая шейка) de Dmitry Mamin-Sibiryak,
      sobre um patinho ferido. A expressão é frequentemente usada metaforicamente para descrever alguém
      vulnerável ou deslocado.
