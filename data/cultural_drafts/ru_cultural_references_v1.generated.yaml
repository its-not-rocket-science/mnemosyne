  short_explanation: A Russian proverb meaning 'Everyone is a big shot in their own swamp,' suggesting
    that people tend to overestimate their importance in familiar settings. It highlights humility and
    the relativity of self-perception.
  i18n_explanations:
    en: A Russian proverb meaning 'Everyone is a big shot in their own swamp,' suggesting that people
      tend to overestimate their importance in familiar settings. It highlights humility and the relativity
      of self-perception.
    es: Un proverbio ruso que significa 'Todos son importantes en su propio pantano,' sugiriendo que las
      personas tienden a sobrevalorar su importancia en entornos familiares. Destaca la humildad y la
      relatividad de la autopercepción.
    fr: Un proverbe russe signifiant 'Chacun est un grand homme dans son propre marais,' suggérant que
      les gens ont tendance à surestimer leur importance dans des contextes familiers. Il met en avant
      l'humilité et la relativité de la perception de soi.
    de: Ein russisches Sprichwort mit der Bedeutung 'Jeder ist ein großer Mann in seinem eigenen Sumpf,'
      was darauf hindeutet, dass Menschen dazu neigen, ihre Bedeutung in vertrauten Umgebungen zu überschätzen.
      Es betont Demut und die Relativität der Selbstwahrnehmung.
    it: Un proverbio russo che significa 'Tutti sono grandi nel proprio pantano,' suggerendo che le persone
      tendono a sopravvalutare la propria importanza in ambienti familiari. Sottolinea l'umiltà e la relatività
      della percezione di sé.
    pt: Um provérbio russo que significa 'Todos são grandes no seu próprio pântano,' sugerindo que as
      pessoas tendem a superestimar sua importância em ambientes familiares. Destaca a humildade e a relatividade
      da autoimagem.
    ru: Русская пословица 'Всяк кулик на своём болоте велик,' означающая, что каждый склонен преувеличивать
      свою значимость в знакомой обстановке. Подчеркивает скромность и относительность самооценки.
    ja: ロシアのことわざで「自分の沼では誰もが偉い」を意味します。人は慣れた環境で自分の重要性を過大評価しがちであることを示し、謙虚さと自己認識の相対性を強調します。
    zh: 俄罗斯谚语，意为“在自己的沼泽里，每只鹬都是伟大的”，比喻人们在熟悉的环境中往往高估自己的重要性。强调谦逊和自我认知的相对性。
    ar: مثل روسي يعني 'كل شخص عظيم في مستنقعه الخاص'، مما يشير إلى أن الناس تميل إلى المبالغة في تقدير
      أهميتهم في البيئات المألوفة. يبرز التواضع والنسبية في إدراك الذات.
    he: פתגם רוסי שמשמעו 'כל אחד הוא גדול בביצה שלו', ומרמז שאנשים נוטים להגזים בחשיבותם בסביבה מוכרת.
