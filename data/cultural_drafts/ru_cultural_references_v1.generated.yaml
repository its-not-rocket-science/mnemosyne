  short_explanation: Refers to the twelve apostles of Jesus Christ in the New Testament, symbolizing the
    core followers of Christianity. In Russian culture, the phrase often carries connotations of unity,
    mission, or a select group.
  i18n_explanations:
    en: Refers to the twelve apostles of Jesus Christ in the New Testament, symbolizing the core followers
      of Christianity. In Russian culture, the phrase often carries connotations of unity, mission, or
      a select group.
    es: Se refiere a los doce apóstoles de Jesucristo en el Nuevo Testamento, simbolizando a los seguidores
      centrales del cristianismo. En la cultura rusa, la frase suele tener connotaciones de unidad, misión
      o un grupo selecto.
    fr: Fait référence aux douze apôtres de Jésus-Christ dans le Nouveau Testament, symbolisant les disciples
      centraux du christianisme. Dans la culture russe, l'expression évoque souvent l'unité, la mission
      ou un groupe d'élite.
    de: Bezieht sich auf die zwölf Apostel Jesu Christi im Neuen Testament, die die zentralen Anhänger
      des Christentums symbolisieren. Im russischen Kulturkontext trägt der Begriff oft Konnotationen
      von Einheit, Mission oder einer ausgewählten Gruppe.
    it: Si riferisce ai dodici apostoli di Gesù Cristo nel Nuovo Testamento, simbolo dei discepoli centrali
