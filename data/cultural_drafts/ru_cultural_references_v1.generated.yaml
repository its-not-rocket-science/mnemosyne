- id: ru_cultural_reference_железный_занавес_11ba4ea8
  language: ru
  canonical_reference: Железный занавес
  reference_type: cultural_reference
  surface_patterns:
  - железный занавес
  short_explanation: A metaphor for the ideological and physical division between the Soviet bloc and
    the West during the Cold War. Coined by Joseph Goebbels in 1945 and popularized by Winston Churchill
    in 1946.
  i18n_explanations:
    en: A metaphor for the ideological and physical division between the Soviet bloc and the West during
      the Cold War. Coined by Joseph Goebbels in 1945 and popularized by Winston Churchill in 1946.
    es: Metáfora de la división ideológica y física entre el bloque soviético y Occidente durante la Guerra
      Fría. Acuñada por Joseph Goebbels en 1945 y popularizada por Winston Churchill en 1946.
    fr: Métaphore de la division idéologique et physique entre le bloc soviétique et l'Occident pendant
      la Guerre froide. Forgée par Joseph Goebbels en 1945 et popularisée par Winston Churchill en 1946.
    de: Metapher für die ideologische und physische Teilung zwischen dem sowjetischen Machtblock und dem
      Westen während des Kalten Krieges. Prägte Joseph Goebbels 1945 und wurde von Winston Churchill 1946
      populär.
    it: Metafora della divisione ideologica e fisica tra il blocco sovietico e l'Occidente durante la
      Guerra fredda. Coniata da Joseph Goebbels nel 1945 e diffusa da Winston Churchill nel 1946.
    pt: Metáfora da divisão ideológica e física entre o bloco soviético e o Ocidente durante a Guerra
      Fria. Criada por Joseph Goebbels em 1945 e popularizada por Winston Churchill em 1946.
    ru: Метафора идеологического и физического разделения между советским блоком и Западом во время Холодной
      войны. Впервые использована Йозефом Геббельсом в 1945 году и популяризирована Уинстоном Черчиллем
      в 1946 году.
    ja: 冷戦期におけるソ連圏と西側諸国のイデオロギー的・物理的分断を表す比喩。1945年にヨーゼフ・ゲッベルスによって造られ、1946年にウィンストン・チャーチルによって広められた。
    zh: 指冷战期间苏联集团与西方阵营之间的意识形态与物理隔绝。该词由约瑟夫·戈培尔于1945年首创，后由温斯顿·丘吉尔于1946年推广。
    ar: استعارة للقسم الأيديولوجي والفيزيائي بين الكتلة السوفيتية والغرب خلال الحرب الباردة. صاغها جوزيف
      غوبلز عام 1945 وشاعها ونستون تشرشل عام 1946.
    he: מטאפורה לחלוקה האידאולוגית והפיזית בין הגוש הסובייטי למערב במהלך המלחמה הקרה. נטבע על ידי יוזף
      גבלס ב-1945 וזכה לתפוצה רחבה בעקבות נאומו של וינסטון צ'רצ'יל ב-1946.
