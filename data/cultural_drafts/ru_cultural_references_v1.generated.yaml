    ja: 永遠に忘れ去るよう神に祈る言葉で、痛ましい記憶や苦しみから逃れたいという願望と結びつきます。この表現は、解放を求める聖書や民間の祈りに通じています。
    zh: 向上帝祈求永远遗忘的祷告，常与逃离痛苦记忆或苦难的愿望相关。这句话反映了圣经和民间祈祷中对救赎的呼唤。
