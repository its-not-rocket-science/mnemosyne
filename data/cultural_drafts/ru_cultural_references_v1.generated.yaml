- id: ru_cultural_reference_севильский_цирюльник_7bfb4f90
  language: ru
  canonical_reference: Севильский цирюльник
  reference_type: cultural_reference
  surface_patterns:
  - Севильский цирюльник
  - цирюльник из Севильи
  - опера 'Севильский цирюльник'
  short_explanation: Refers to the famous opera 'Il barbiere di Siviglia' by Gioachino Rossini, based
    on Pierre Beaumarchais' play. In Russian culture, it symbolizes wit, intrigue, and comedic resolution,
    often used metaphorically in discussions of clever schemes or social maneuvering.
  i18n_explanations:
    en: Refers to the famous opera 'Il barbiere di Siviglia' by Gioachino Rossini, based on Pierre Beaumarchais'
      play. In Russian culture, it symbolizes wit, intrigue, and comedic resolution, often used metaphorically
      in discussions of clever schemes or social maneuvering.
    es: Se refiere a la famosa ópera 'El barbero de Sevilla' de Gioachino Rossini, basada en la obra de
      Pierre Beaumarchais. En la cultura rusa, simboliza ingenio, intriga y resolución cómica, y se usa
      metafóricamente en discusiones sobre planes astutos o maniobras sociales.
    fr: Fait référence à la célèbre opéra 'Le Barbier de Séville' de Gioachino Rossini, inspiré de la
      pièce de Pierre Beaumarchais. Dans la culture russe, elle symbolise l'esprit, l'intrigue et la résolution
      comique, souvent utilisée métaphoriquement pour évoquer des stratagèmes ingénieux ou des manœuvres
      sociales.
    de: Bezieht sich auf die berühmte Oper 'Der Barbier von Sevilla' von Gioachino Rossini, basierend
      auf dem Stück von Pierre Beaumarchais. In der russischen Kultur symbolisiert sie Witz, Intrige und
      komische Auflösung, oft metaphorisch in Diskussionen über clevere Pläne oder soziale Manöver verwendet.
    it: Si riferisce alla famosa opera 'Il barbiere di Siviglia' di Gioachino Rossini, tratta dall'opera
      di Pierre Beaumarchais. Nella cultura russa, simboleggia arguzia, intrigo e risoluzione comica,
      spesso usata metaforicamente per discutere di piani astuti o manovre sociali.
    pt: Refere-se à famosa ópera 'O Barbeiro de Sevilha' de Gioachino Rossini, baseada na peça de Pierre
      Beaumarchais. Na cultura russa, simboliza engenhosidade, intriga e resolução cômica, frequentemente
      usada metaforicamente em discussões sobre esquemas inteligentes ou manobras sociais.
    ru: Относится к знаменитой опере 'Севильский цирюльник' Джоаккино Россини, созданной по пьесе Пьера
      Бомарше. В русской культуре она символизирует остроумие, интригу и комедийное разрешение, часто
      используется метафорически в обсуждениях хитрых планов или социальных манёвров.
    ja: ジョアキーノ・ロッシーニによるピエール・ボーマルシェの戯曲を原作とする有名なオペラ「セビリアの理髪師」を指します。ロシア文化では、機知、策略、コミカルな解決を象徴し、巧妙な計画や社会的駆け引きについて語る際に比喩的に用いられます。
    zh: 指的是乔阿基诺·罗西尼根据皮埃尔·博马舍的戏剧创作的著名歌剧《塞维利亚的理发师》。在俄罗斯文化中，它象征着机智、阴谋和喜剧性的解决，常被用作比喻，讨论巧妙的计划或社会策略。
    ar: يشير إلى الأوبرا الشهيرة 'حلاق إشبيلية' لجواكينو روسيني، المستوحاة من مسرحية بيير بومارشيه. في
      الثقافة الروسية، ترمز إلى الذكاء والمكر والحل الكوميدي، وغالبًا ما تُستخدم مجازيًا في مناقشات حول
      خطط ذكية أو المناورات الاجتماعية.
    he: מתייחס לאופרה המפורסמת 'הספר מסביליה' מאת ג'ואקינו רוסיני, המבוססת על מחזה של פייר בומרשה. בתרבות
      הרוסית היא מסמלת פיקחות, תככים ופתרון קומי, ונעשה בה שימוש מטאפורי בדיונים על תוכניות ערמומיות או
      תמרונים חברתיים.
