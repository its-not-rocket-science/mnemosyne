  - От сумы и от тюрьмы не зарекайся
  - От сумы да от тюрьмы не отрекайся
  short_explanation: A proverb warning that one should never swear off misfortune, as poverty and imprisonment
    are unpredictable fates that can befall anyone.
  i18n_explanations:
    en: A proverb warning that one should never swear off misfortune, as poverty and imprisonment are
      unpredictable fates that can befall anyone.
    es: Un refrán que advierte que nunca se debe jurar evitar la desgracia, ya que la pobreza y la prisión
      son destinos impredecibles que pueden afectar a cualquiera.
    fr: Un proverbe qui met en garde contre le fait de jurer de ne jamais connaître la malchance, car
      la pauvreté et l'emprisonnement sont des destins imprévisibles qui peuvent toucher n'importe qui.
    de: Ein Sprichwort, das davor warnt, sich gegen Unglück zu verwahren, da Armut und Gefängnis unvorhersehbare
      Schicksalsschläge sind, die jeden treffen können.
    it: Un proverbio che avverte di non giurare di evitare la sventura, poiché la povertà e il carcere
      sono destini imprevedibili che possono colpire chiunque.
    pt: Um provérbio que adverte para nunca jurar evitar a desgraça, já que a pobreza e a prisão são destinos
      imprevisíveis que podem atingir qualquer um.
    ru: Пословица, предупреждающая, что нельзя зарок давать избежать беды, так как бедность и тюрьма —
      непредсказуемые напасти, которые могут постичь каждого.
    ja: 貧困や投獄といった不運は誰にでも起こりうるため、決してそれを避けると誓ってはいけないという戒めの言葉。
    zh: 一句告诫人们切勿发誓避免厄运的谚语，因为贫困与坐牢是任何人都可能遭遇的不可预测的命运。
    ar: مثل يحذر من عدم الحلف على تجنب الشقاء، لأن الفقر والسجن مصير غير متوقع يمكن أن يصيب أي شخص.
    he: פתגם המזהיר שלא להישבע להימנע ממזל רע, שכן עוני ומאסר הם גורלות בלתי צפויים שיכולים לפקוד כל אחד.
