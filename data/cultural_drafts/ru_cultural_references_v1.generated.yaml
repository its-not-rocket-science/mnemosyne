- id: ru_cultural_reference_всякая_всячина_2798599e
  language: ru
  canonical_reference: Всякая всячина
  reference_type: cultural_reference
  surface_patterns:
  - всякая всячина
  - всякая всячина и разное
  - разная всячина
  short_explanation: A colloquial Russian phrase meaning 'all sorts of things' or 'miscellaneous.' It
    is used to describe a collection of unrelated items or topics, often humorously or dismissively.
  i18n_explanations:
    en: A colloquial Russian phrase meaning 'all sorts of things' or 'miscellaneous.' It is used to describe
      a collection of unrelated items or topics, often humorously or dismissively.
    es: Una expresión coloquial rusa que significa 'de todo un poco' o 'miscelánea.' Se usa para describir
      una colección de elementos o temas no relacionados, a menudo de manera humorística o despectiva.
    fr: Une expression russe familière signifiant 'tout et n'importe quoi' ou 'divers.' Elle sert à décrire
      un ensemble d'éléments ou de sujets sans lien, souvent de manière humoristique ou péjorative.
    de: Ein umgangssprachlicher russischer Ausdruck mit der Bedeutung 'alles Mögliche' oder 'Verschiedenes.'
      Er wird verwendet, um eine Sammlung von unzusammenhängenden Dingen oder Themen zu beschreiben, oft
      humorvoll oder abwertend.
    it: Una frase colloquiale russa che significa 'di tutto un po'' o 'vario.' Viene usata per descrivere
      una raccolta di elementi o argomenti non correlati, spesso in modo umoristico o sprezzante.
    pt: Uma expressão coloquial russa que significa 'coisas variadas' ou 'miscelânea.' É usada para descrever
      uma coleção de itens ou tópicos não relacionados, muitas vezes de forma humorística ou desdenhosa.
    ru: Разговорная русская фраза 'всякая всячина,' означающая 'все подряд' или 'разное.' Используется
      для описания сборника несвязанных предметов или тем, часто шутливо или пренебрежительно.
    ja: ロシア語の口語表現で「あれやこれや」や「雑多なもの」を意味します。関連性のないアイテムや話題の集まりを、しばしばユーモラスに、あるいは軽蔑的に表現する際に使われます。
    zh: 俄语口语短语，意为“各种各样的东西”或“杂七杂八”。用于描述一堆不相关的物品或话题，常带有幽默或轻蔑的语气。
