- id: ru_cultural_reference_год_великого_перелома_914b50ef
  language: ru
  canonical_reference: Год великого перелома
  reference_type: cultural_reference
  surface_patterns:
  - Год великого перелома
  - 1929 год — год великого перелома
  short_explanation: A phrase coined by Stalin to describe 1929, the year of forced collectivization and
    rapid industrialization in the USSR, marking a decisive break with the New Economic Policy (NEP).
  i18n_explanations:
    en: A phrase coined by Stalin to describe 1929, the year of forced collectivization and rapid industrialization
      in the USSR, marking a decisive break with the New Economic Policy (NEP).
    es: Frase acuñada por Stalin para describir 1929, año de la colectivización forzada y la industrialización
      acelerada en la URSS, marcando una ruptura decisiva con la Nueva Política Económica (NEP).
    fr: Expression forgée par Staline pour désigner 1929, année de la collectivisation forcée et de l'industrialisation
      rapide en URSS, marquant une rupture décisive avec la Nouvelle Politique Économique (NEP).
    de: Von Stalin geprägter Ausdruck für das Jahr 1929, das durch erzwungene Kollektivierung und rasche
      Industrialisierung in der UdSSR geprägt war und einen entscheidenden Bruch mit der Neuen Ökonomischen
      Politik (NEP) markierte.
    it: Espressione coniata da Stalin per descrivere il 1929, anno della collettivizzazione forzata e
      dell'industrializzazione rapida nell'URSS, che segnò una rottura decisiva con la Nuova Politica
      Economica (NEP).
    pt: Frase cunhada por Stalin para descrever 1929, ano da coletivização forçada e da industrialização
      acelerada na URSS, marcando uma ruptura decisiva com a Nova Política Econômica (NEP).
    ru: Фраза, введённая Сталиным для обозначения 1929 года — периода форсированной коллективизации и
      ускоренной индустриализации в СССР, ознаменовавшего решительный разрыв с Новой экономической политикой
      (НЭП).
    ja: スターリンが造った表現で、1929年を指し、ソ連における強制的な集団化と急速な工業化の年を表し、新経済政策（NEP）との決別を示す。
    zh: 斯大林创造的术语，指1929年苏联强制集体化和快速工业化的一年，标志着与新经济政策（NEP）的决裂。
    ar: عبارة صاغها ستالين لوصف عام 1929، عام التجميع القسري والصناعة السريعة في الاتحاد السوفيتي، مما
      مثل قطيعة حاسمة مع السياسة الاقتصادية الجديدة (NEP).
    he: ביטוי שטבע סטלין לתיאור שנת 1929, שנת הקולקטיביזציה הכפויה והתיעוש המהיר בברית המועצות, אשר סימנה
      פרידה מכרעת מהנא
    politik: הכלכלית החדשה (NEP).
