- id: ru_cultural_reference_божия_коровка_f8aeb664
  language: ru
  canonical_reference: Божия коровка
  reference_type: cultural_reference
  surface_patterns:
  - божия коровка
  - божья коровка
  short_explanation: A colloquial Russian name for the ladybug, literally 'God's little cow,' reflecting
    folk beliefs that these insects bring good luck and are harmless. Also used as a term of endearment
    for children.
  i18n_explanations:
    en: A colloquial Russian name for the ladybug, literally 'God's little cow,' reflecting folk beliefs
      that these insects bring good luck and are harmless. Also used as a term of endearment for children.
    es: Nombre coloquial ruso para la mariquita, literalmente 'vaca pequeña de Dios', reflejando creencias
      populares de que estos insectos traen buena suerte y son inofensivos. También se usa como término
      de cariño para niños.
    fr: Nom familier russe de la coccinelle, littéralement 'vachette de Dieu', reflétant les croyances
      populaires selon lesquelles ces insectes portent bonheur et sont inoffensifs. Utilisé aussi comme
      terme d'affection pour les enfants.
    de: Ein umgangssprachlicher russischer Name für den Marienkäfer, wörtlich 'Gottes kleine Kuh', der
      auf den Volksglauben zurückgeht, dass diese Insekten Glück bringen und harmlos sind. Wird auch als
      Kosewort für Kinder verwendet.
    it: Nome colloquiale russo per la coccinella, letteralmente 'mucchetta di Dio', che riflette la credenza
      popolare secondo cui questi insetti portano fortuna e sono innocui. Usato anche come vezzeggiativo
      per i bambini.
    pt: Nome coloquial russo para a joaninha, literalmente 'vacazinha de Deus', refletindo crenças populares
      de que esses insetos trazem boa sorte e são inofensivos. Também usado como termo de carinho para
      crianças.
    ru: Разговорное русское название божьей коровки, буквально 'Божья коровка', отражающее народные поверья,
      что эти насекомые приносят удачу и безвредны. Также используется как ласковое обращение к детям.
    ja: ロシア語の口語でテントウムシを指す「神の小さな牛」という名前で、この虫が幸運をもたらし無害であるという民間信仰を反映。子供への愛称としても使われる。
    zh: 俄语俗称瓢虫的名称，字面意思为「上帝的小母牛」，反映了民间信仰认为这种昆虫带来好运且无害。也用作对孩子的昵称。
    ar: اسم روسي عامي للدعسوقة، حرفياً 'عجل الله الصغير'، يعكس المعتقدات الشعبية بأن هذه الحشرات تجلب
      الحظ السعيد harmless. كما يُستخدم كاسم محبب للأطفال.
    he: כינוי רוסי עממי ל ladybug (פרת משה רבנו), מילולית 'פרה קטנה של אלוהים', המשקף אמונות עממיות לפיהן
      חרקים אלו מביאים מזל טוב ואינם מזיקים. משמש גם ככינוי חיבה לילדים.
