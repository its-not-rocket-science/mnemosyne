  short_explanation: Famous line from Yesenin's 1925 poem expressing joy in life despite hardships. Symbolizes
    Russian folk optimism and resilience.
  i18n_explanations:
    en: Famous line from Yesenin's 1925 poem expressing joy in life despite hardships. Symbolizes Russian
      folk optimism and resilience.
    es: Frase famosa del poema de Yesenin (1925) que expresa alegría en la vida a pesar de las dificultades.
      Simboliza el optimismo y la resiliencia del folclore ruso.
    fr: Vers célèbre du poème de Essenine (1925) exprimant la joie de vivre malgré les épreuves. Symbole
      de l'optimisme et de la résilience du folklore russe.
    de: Berühmter Vers aus Essenins Gedicht (1925), der Lebensfreude trotz Widrigkeiten ausdrückt. Symbolisiert
      den Optimismus und die Widerstandsfähigkeit des russischen Volksglaubens.
    it: Verso famoso della poesia di Esenin (1925) che esprime gioia di vivere nonostante le avversità.
      Simboleggia l'ottimismo e la resilienza del folclore russo.
    pt: Verso famoso do poema de Yesenin (1925) que expressa alegria de viver apesar das dificuldades.
      Simboliza o otimismo e a resiliência do folclore russo.
    ru: Знаменитая строка из стихотворения Есенина (1925), выражающая радость жизни несмотря на трудности.
      Символизирует русский народный оптимизм и стойкость.
    ja: イェセーニンの1925年の詩の有名な一節で、困難にもかかわらず人生の喜びを表現している。ロシアの民俗的な楽観主義と強靭さを象徴する。
    zh: 叶赛宁1925年诗作中的著名诗句，表达尽管生活艰难仍对生活充满喜悦。象征俄罗斯民间的乐观主义与韧性。
    ar: سطر مشهور من قصيدة Есенин (1925) يعبر عن الفرح بالحياة رغم الصعوبات. يرمز إلى التفاؤل والمرونة
      في الثقافة الشعبية الروسية.
    he: השורה המפורסמת משירו של יסנין (1925) המביעה שמחת חיים למרות הקשיים. מסמלת את האופטימיות והחוסן
