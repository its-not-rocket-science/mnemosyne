      людей нельзя изменить даже смертью. Отражает веру в неизменность характера.
    ja: 人の生まれつきの欠点や悪い習慣は、死によっても変えることができないという運命論的な諺。性格の不変性を表しています。
    zh: 一个宿命论的谚语，意思是有些人的先天缺陷或坏习惯即使死亡也无法改变。反映了对性格不可改变的信念。
