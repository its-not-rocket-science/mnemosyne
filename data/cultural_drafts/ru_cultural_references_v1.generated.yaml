- id: ru_cultural_reference_где_раки_зимуют_458e8660
  language: ru
  canonical_reference: Где раки зимуют
  reference_type: cultural_reference
  surface_patterns:
  - где раки зимуют
  - показать, где раки зимуют
  - знать, где раки зимуют
  short_explanation: A phrase used to threaten someone with severe consequences or to indicate that someone
    knows a place of punishment or danger. Originates from folk tales where crayfish (раки) were believed
    to hibernate in deep waters.
  i18n_explanations:
    en: A phrase used to threaten someone with severe consequences or to indicate that someone knows a
      place of punishment or danger. Originates from folk tales where crayfish (раки) were believed to
      hibernate in deep waters.
    es: Frase usada para amenazar a alguien con consecuencias graves o indicar que alguien conoce un lugar
      de castigo o peligro. Proviene de cuentos populares donde se creía que los cangrejos de río (раки)
      hibernaban en aguas profundas.
    fr: Expression utilisée pour menacer quelqu'un de conséquences graves ou indiquer que quelqu'un connaît
      un lieu de punition ou de danger. Vient de contes populaires où l'on croyait que les écrevisses
      (раки) hibernaient dans les eaux profondes.
    de: Ein Ausdruck, der verwendet wird, um jemandem mit schweren Konsequenzen zu drohen oder anzudeuten,
      dass jemand einen Ort der Bestrafung oder Gefahr kennt. Stammt aus Volksmärchen, in denen Krebse
      (раки) in tiefen Gewässern überwintern sollten.
    it: Frase usata per minacciare qualcuno con gravi conseguenze o indicare che qualcuno conosce un luogo
      di punizione o pericolo. Deriva da racconti popolari in cui si credeva che i gamberi (раки) andassero
      in letargo nelle acque profonde.
    pt: Expressão usada para ameaçar alguém com consequências graves ou indicar que alguém conhece um
      lugar de punição ou perigo. Origina-se de contos populares onde se acreditava que os lagostins (раки)
      hibernavam em águas profundas.
    ru: Выражение, используемое для угрозы кому-либо серьёзными последствиями или указания на то, что
      кто-то знает место наказания или опасности. Происходит из народных сказок, где раки ( crayfish )
      считались зимующими в глубоких водах.
    ja: 誰かに重大な結果をもって脅すため、あるいは誰かが罰や危険の場所を知っていることを示すために使われる表現。民話に由来し、ザリガニ（раки）が深い水中で冬眠すると信じられていた。
    zh: 用来威胁某人严重后果或表示某人知道一个惩罚或危险之地的短语。源于民间故事，其中螯虾（раки）被认为在深水中冬眠。
    ar: عبارة تستخدم لتهديد شخص ما بعواقب وخيمة أو للإشارة إلى أن شخصًا ما يعرف مكان عقاب أو خطر. تأتي
      من الحكايات الشعبية حيث كان يُعتقد أن السرطانات (раки) تسبت في المياه العميقة.
    he: ביטוי המשמש לאיים על מישהו בהשלכות חמורות או לציין שמישהו יודע על מקום עונשין או סכנה. מקורו באגדות
      עם שבהן האמינו שסרטנים (раки) חורפים במים עמוקים.
