- id: ru_cultural_reference_кармен_судьба_fedee84b
  language: ru
  canonical_reference: Кармен — судьба
  reference_type: cultural_reference
  surface_patterns:
  - Кармен — судьба
  - Кармен как судьба
  - судьба, как Кармен
  short_explanation: Refers to the tragic and passionate fate of the character Carmen from Prosper Mérimée's
    novella and Bizet's opera, symbolizing a doomed love. In Russian culture, it often signifies an inescapable,
    fiery destiny.
  i18n_explanations:
    en: Refers to the tragic and passionate fate of the character Carmen from Prosper Mérimée's novella
      and Bizet's opera, symbolizing a doomed love. In Russian culture, it often signifies an inescapable,
      fiery destiny.
    es: Se refiere al destino trágico y apasionado del personaje Carmen de la novela de Prosper Mérimée
      y la ópera de Bizet, simbolizando un amor condenado. En la cultura rusa, a menudo representa un
      destino ardiente e inevitable.
    fr: Fait référence au destin tragique et passionné du personnage Carmen, issu de la nouvelle de Prosper
      Mérimée et de l'opéra de Bizet, symbolisant un amour perdu. Dans la culture russe, il évoque souvent
      un destin brûlant et inéluctable.
    de: Bezieht sich auf das tragische und leidenschaftliche Schicksal der Figur Carmen aus Mérimées Novelle
      und Bizets Oper, das eine verlorene Liebe symbolisiert. In der russischen Kultur steht es oft für
      ein unausweichliches, feuriges Schicksal.
    it: Si riferisce al destino tragico e appassionato del personaggio Carmen, tratto dal romanzo di Prosper
      Mérimée e dall'opera di Bizet, simbolo di un amore perduto. Nella cultura russa, spesso indica un
      destino ardente e inevitabile.
    pt: Refere-se ao destino trágico e apaixonado da personagem Carmen, da novela de Prosper Mérimée e
      da ópera de Bizet, simbolizando um amor condenado. Na cultura russa, muitas vezes representa um
      destino ardente e inevitável.
    ru: Олицетворяет трагическую и страстную судьбу Кармен — героини новеллы Проспера Мериме и оперы Бизе,
      символ обречённой любви. В русской культуре часто означает неотвратимую, огненную участь.
    ja: メリメの小説とビゼーのオペラに登場するカルメンの悲劇的で情熱的な運命を指し、破滅的な愛を象徴する。ロシア文化ではしばしば避けられない激しい宿命を表す。
    zh: 指代梅里美小说和比才歌剧中卡门的悲剧而热烈的命运，象征着一段注定失败的爱情。在俄罗斯文化中，常喻为无法逃脱的炽热命运。
    ar: يشير إلى المصير المأساوي والعاطفي لشخصية كارمن من رواية بروسبير ميريميه وأوبرا بيزيه، ويرمز إلى
      حب محكوم عليه بالفشل. في الثقافة الروسية، غالبًا ما يمثل مصيرًا حارًا لا مفر منه.
    he: מתייחס לגורלה הטרגי והסוער של דמותה של כרמן מתוך נובלתו של פרוספר מרימה ואופרה מאת ביזה, המסמלת
      אהבה אבודה. בתרבות הרוסית, לעיתים קרובות מסמל גורל בלתי נמנע ואש.
