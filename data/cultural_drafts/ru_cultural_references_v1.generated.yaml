  short_explanation: Refers to the East–West Schism of 1054, the formal split between the Eastern Orthodox
    and Roman Catholic churches. Symbolizes deep theological and cultural divisions in Christianity.
  i18n_explanations:
    en: Refers to the East–West Schism of 1054, the formal split between the Eastern Orthodox and Roman
      Catholic churches. Symbolizes deep theological and cultural divisions in Christianity.
    es: Se refiere al Cisma de Oriente de 1054, la división formal entre las iglesias ortodoxa oriental
      y católica romana. Simboliza profundas divisiones teológicas y culturales en el cristianismo.
    fr: Fait référence au Grand Schisme d'Orient de 1054, la scission formelle entre les Églises orthodoxe
      orientale et catholique romaine. Symbolise des divisions théologiques et culturelles profondes dans
      le christianisme.
    de: Bezieht sich auf das Morgenländische Schisma von 1054, die formelle Spaltung zwischen der orthodoxen
      und der römisch-katholischen Kirche. Symbolisiert tiefe theologische und kulturelle Gegensätze im
      Christentum.
    it: Si riferisce allo Scisma d'Oriente del 1054, la divisione formale tra la Chiesa ortodossa orientale
      e quella cattolica romana. Simboleggia profonde divisioni teologiche e culturali nel cristianesimo.
    pt: Refere-se ao Grande Cisma do Oriente de 1054, a divisão formal entre as Igrejas Ortodoxa Oriental
      e Católica Romana. Simboliza profundas divisões teológicas e culturais no cristianismo.
    ru: Относится к Великому расколу церквей 1054 года, формальному разделению между Восточной православной
      и Римско-католической церквями. Символизирует глубокие теологические и культурные разногласия в
      христианстве.
    ja: 1054年の東西教会の分裂（大シスマ）を指す。東方正教会とローマ・カトリック教会の正式な分裂を表し、キリスト教における深い神学的・文化的分断を象徴する。
    zh: 指的是1054年的东-西教会大分裂，即东正教与罗马天主教的正式分裂。象征基督教内部深刻的神学与文化分歧。
    ar: يشير إلى الانشقاق العظيم بين الكنيستين الشرقية والغربية عام 1054، وهو الانقسام الرسمي بين الكنيسة
      الأرثوذكسية الشرقية والكنيسة الكاثوليكية الرومانية. يرمز إلى انقسامات عميقة في المسيحية من الناحية
      اللاهوتية والثقافية.
    he: מתייחס לפילוג הגדול בין הכנסיות בשנת 1054, הפיצול הפורמלי בין הכנסייה האורתודוקסית המזרחית לבין
      הכנסייה הקתולית הרומית. מסמל את הפערים התיאולוגיים והתרבותיים העמוקים בנצרות.
