- id: ru_cultural_reference_венок_на_могилу_пушкина_b4036282
  language: ru
  canonical_reference: Венок на могилу Пушкина
  reference_type: cultural_reference
  surface_patterns:
  - венок на могилу Пушкина
  - венок Пушкину
  short_explanation: A poetic tradition of laying wreaths or flowers at the tomb of Alexander Pushkin
    in the Alexander Garden, Moscow, or at his grave in the Alexander Monastery in St. Petersburg. It
    symbolizes homage to Russia's national poet and is a common act of cultural reverence.
  i18n_explanations:
    en: A poetic tradition of laying wreaths or flowers at the tomb of Alexander Pushkin in the Alexander
      Garden, Moscow, or at his grave in the Alexander Monastery in St. Petersburg. It symbolizes homage
      to Russia's national poet and is a common act of cultural reverence.
    es: Una tradición poética de colocar coronas o flores en la tumba de Aleksandr Pushkin en el Jardín
      de Alejandro, Moscú, o en su tumba en el Monasterio de Alejandro en San Petersburgo. Simboliza homenaje
      al poeta nacional de Rusia y es un acto común de reverencia cultural.
    fr: Une tradition poétique consistant à déposer des couronnes ou des fleurs sur la tombe d'Alexandre
      Pouchkine dans le Jardin Alexandre à Moscou ou sur sa sépulture au monastère Alexandre à Saint-Pétersbourg.
      Elle symbolise l'hommage au poète national de la Russie et est un acte courant de vénération culturelle.
    de: Ein poetischer Brauch, Kränze oder Blumen am Grab von Alexander Puschkin im Alexander-Garten in
      Moskau oder an seinem Grab im Alexander-Kloster in St. Petersburg niederzulegen. Er symbolisiert
      die Ehrerbietung gegenüber Russlands Nationaldichter und ist ein üblicher Akt der kulturellen Verehrung.
    it: Una tradizione poetica di deporre corone o fiori sulla tomba di Aleksandr Puškin nel Giardino
      Aleksandrovskij a Mosca o sulla sua tomba nel Monastero di Aleksandr a San Pietroburgo. Simboleggia
      l'omaggio al poeta nazionale della Russia ed è un atto comune di devozione culturale.
    pt: Uma tradição poética de depositar coroas ou flores no túmulo de Alexander Pushkin no Jardim Alexandrovsky,
      em Moscou, ou em seu túmulo no Mosteiro Alexandrovsky, em São Petersburgo. Simboliza homenagem ao
      poeta nacional da Rússia e é um ato comum de reverência cultural.
    ru: Поэтическая традиция возложения венков или цветов на могилу Александра Пушкина в Александровском
      саду в Москве или на его могиле в Александро-Невской лавре в Санкт-Петербурге. Символизирует дань
      уважения национальному поэту России и является распространённым актом культурного почитания.
    ja: モスクワのアレクサンドル庭園にあるプーシキンの墓、またはサンクトペテルブルクのアレクサンドル修道院にある彼の墓に花輪や花を捧げる詩的な伝統。ロシアの国民的詩人に対する敬意の象徴であり、文化的敬意の一般的な行為です。
    zh: 在莫斯科亚历山大花园的普希金墓前或圣彼得堡亚历山大修道院的普希金墓前敬献花圈或鲜花的诗意传统。象征着对俄罗斯民族诗人致敬，是一种常见的文化崇敬行为。
    ar: تقليد شعري يتمثل بوضع أكاليل أو زهور على قبر ألكسندر بوشكين في حديقة ألكساندر بموسكو، أو على قبره
      في دير ألكساندر في سانت بطرسبرغ. يرمز إلى الاحترام للشاعر الوطني لروسيا وهو عمل شائع من التبجيل
      الثقافي.
    he: מסורת שירית של הנחת זרי פרחים או פרחים על קברו של אלכסנדר פושקין בגן אלכסנדר במוסקבה או על קברו
      במנזר אלכסנדר בסנקט פטרבורג. מסמלת כבוד למשורר הלאומי של רוסיה והיא מעשה נפוץ של כבוד תרבותי.
