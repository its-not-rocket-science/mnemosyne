  short_explanation: A biblical commandment from the Sermon on the Mount (Matthew 7:1), advising against
    judging others to avoid divine judgment. It is widely cited in Russian religious and moral discourse
    as a principle of tolerance and humility.
  i18n_explanations:
    en: A biblical commandment from the Sermon on the Mount (Matthew 7:1), advising against judging others
      to avoid divine judgment. It is widely cited in Russian religious and moral discourse as a principle
      of tolerance and humility.
    es: Un mandamiento bíblico del Sermón de la Montaña (Mateo 7:1) que advierte contra juzgar a otros
      para evitar el juicio divino. Se cita ampliamente en el discurso religioso y moral ruso como principio
      de tolerancia y humildad.
    fr: Un commandement biblique issu du Sermon sur la Montagne (Matthieu 7:1), conseillant de ne pas
      juger autrui pour éviter le jugement divin. Il est largement cité dans le discours religieux et
      moral russe comme principe de tolérance et d'humilité.
    de: Ein biblisches Gebot aus der Bergpredigt (Matthäus 7,1), das davor warnt, andere zu verurteilen,
      um göttliches Gericht zu vermeiden. Es wird im russischen religiösen und moralischen Diskurs häufig
      als Prinzip der Toleranz und Demut zitiert.
    it: Un comandamento biblico del Discorso della Montagna (Matteo 7:1) che consiglia di non giudicare
      gli altri per evitare il giudizio divino. È ampiamente citato nel discorso religioso e morale russo
      come principio di tolleranza e umiltà.
    pt: Um mandamento bíblico do Sermão da Montanha (Mateus 7:1), aconselhando não julgar os outros para
      evitar o julgamento divino. É amplamente citado no discurso religioso e moral russo como princípio
      de tolerância e humildade.
    ru: Библейская заповедь из Нагорной проповеди (Евангелие от Матфея 7:1), призывающая не судить других,
      чтобы избежать Божьего суда. Широко цитируется в русском религиозном и моральном дискурсе как принцип
      терпимости и смирения.
    ja: 山上の垂訓（マタイによる福音書7:1）に由来する聖書の戒めで、他者を裁かないことで神の裁きを避けるよう勧める。ロシアの宗教的・道徳的言説で寛容と謙虚の原則として広く引用される。
    zh: 出自《马太福音》第七章第一节（山上宝训）的圣经戒律，劝诫勿论断他人以免受神的审判。在俄罗斯宗教与道德话语中被广泛引用，作为宽容与谦卑的原则。
    ar: أمرٌ توراتي من عظة الجبل (متى 7:1) ينصح بعدم الحكم على الآخرين لتجنب الحكم الإلهي. يُستشهد به
