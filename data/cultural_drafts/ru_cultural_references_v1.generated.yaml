- id: ru_literary_reference_год_сорок_первый_роковой_1acce904
  language: ru
  canonical_reference: Год сорок первый, роковой
  reference_type: literary_reference
  surface_patterns:
  - Год сорок первый, роковой
  - сорок первый год, роковой
  - роковой сорок первый год
  short_explanation: A phrase from Anna Akhmatova's poem 'Rekviem' (Requiem), referring to 1937, the peak
    of Stalin's Great Purge, symbolizing a year of immense suffering and tragedy.
  i18n_explanations:
    en: A phrase from Anna Akhmatova's poem 'Rekviem' (Requiem), referring to 1937, the peak of Stalin's
      Great Purge, symbolizing a year of immense suffering and tragedy.
    es: Frase del poema 'Réquiem' de Anna Ajmátova, que alude a 1937, el año álgido de la Gran Purga de
      Stalin, simbolizando un año de sufrimiento y tragedia inmensos.
    fr: Expression tirée du poème 'Requiem' d'Anna Akhmatova, faisant référence à 1937, l'apogée des Grandes
      Purges staliniennes, symbolisant une année de souffrance et de tragédie immenses.
    de: Ein Zitat aus Anna Achmatowas Gedicht 'Requiem', das sich auf das Jahr 1937 bezieht, den Höhepunkt
      von Stalins Großer Säuberung, und ein Jahr unermesslichen Leidens und Tragödie symbolisiert.
    it: Frase tratta dalla poesia 'Requiem' di Anna Achmatova, che si riferisce al 1937, l'apice delle
      Grandi Purghe staliniane, simboleggiando un anno di immense sofferenze e tragedie.
    pt: Frase do poema 'Réquiem' de Anna Akhmatova, referindo-se a 1937, auge da Grande Purga de Stalin,
      simbolizando um ano de sofrimento e tragédia imensos.
    ru: Строка из поэмы Анны Ахматовой 'Реквием', относящаяся к 1937 году — пику сталинских репрессий,
      символизирующая год невыразимых страданий и трагедии.
    ja: アンナ・アフマートヴァの詩「レクイエム」の一節で、スターリンの大粛清のピークであった1937年を指し、計り知れない苦難と悲劇の年を象徴する。
    zh: 出自安娜·阿赫玛托娃诗作《安魂曲》的诗句，指1937年——斯大林大清洗的顶峰，象征着苦难与悲剧的一年。
    ar: عبارة من قصيدة 'الرثاء' لأننا أخماتوفا، تشير إلى عام 1937، ذروة التطهير الكبير لستالين، ورمزًا
