- id: ru_classical_or_scriptural_allusion_апостол_ты_ли_это_98f279b3
  language: ru
  canonical_reference: Апостол, ты ли это?
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Апостол, ты ли это?
  - ты ли это, апостол?
  - Апостол ли это?
  short_explanation: A rhetorical question expressing doubt or surprise, often used when someone's actions
    or words seem hypocritical or inconsistent with their expected role. The phrase alludes to the biblical
    story of Judas' betrayal of Jesus, implying a sense of betrayal or disillusionment.
  i18n_explanations:
    en: A rhetorical question expressing doubt or surprise, often used when someone's actions or words
      seem hypocritical or inconsistent with their expected role. The phrase alludes to the biblical story
      of Judas' betrayal of Jesus, implying a sense of betrayal or disillusionment.
    es: Una pregunta retórica que expresa duda o sorpresa, usada cuando las acciones o palabras de alguien
      parecen hipócritas o inconsistentes con el papel que se espera de ellos. La frase alude a la historia
      bíblica de la traición de Judas a Jesús, lo que implica una sensación de traición o desilusión.
    fr: Une question rhétorique exprimant le doute ou la surprise, souvent utilisée lorsque les actions
      ou les paroles de quelqu'un semblent hypocrites ou incohérentes avec le rôle attendu. La phrase
      fait référence à l'histoire biblique de la trahison de Judas envers Jésus, impliquant un sentiment
      de trahison ou de désillusion.
    de: Eine rhetorische Frage, die Zweifel oder Überraschung ausdrückt, oft verwendet, wenn jemandes
      Handlungen oder Worte scheinheilig oder unvereinbar mit der erwarteten Rolle wirken. Der Ausdruck
      spielt auf die biblische Geschichte von Judas' Verrat an Jesus an und impliziert ein Gefühl von
      Verrat oder Enttäuschung.
    it: Una domanda retorica che esprime dubbio o sorpresa, spesso usata quando le azioni o le parole
      di qualcuno sembrano ipocrite o incoerenti con il ruolo che ci si aspetta da loro. La frase allude
      alla storia biblica del tradimento di Giuda nei confronti di Gesù, implicando un senso di tradimento
      o disillusione.
    pt: Uma pergunta retórica que expressa dúvida ou surpresa, frequentemente usada quando as ações ou
      palavras de alguém parecem hipócritas ou inconsistentes com o papel esperado. A frase alude à história
      bíblica da traição de Judas a Jesus, implicando um sentimento de traição ou desilusão.
    ru: Риторический вопрос, выражающий сомнение или удивление, часто используемый, когда действия или
      слова кого-то кажутся лицемерными или несоответствующими их ожидаемой роли. Фраза отсылает к библейской
      истории предательства Иуды Иисуса, подразумевая чувство предательства или разочарования.
    ja: 疑いや驚きを表す修辞疑問文で、誰かの行動や言葉が偽善的であったり、期待される役割と矛盾しているように見える際に用いられます。この表現は、ユダによるイエスの裏切りの聖書の物語に由来し、裏切りや失望の感情を暗示します。
    zh: 一个表达怀疑或惊讶的反问句，常用于某人的行为或言语似乎虚伪或与其预期角色不符时。该短语暗指圣经中犹大背叛耶稣的故事，暗示一种背叛或失望的感觉。
    ar: سؤال بلاغي يعبر عن شك أو دهشة، يُستخدم غالبًا عندما تبدو تصرفات أو أقوال شخص ما نفاقًا أو غير
      متسقة مع الدور المتوقع منه. تشير العبارة إلى قصة يهوذا خيانة يسوع في الكتاب المقدس، مما يدل على
      شعور بالخيانة أو الإحباط.
    he: שאלה רטורית המביעה ספק או הפתעה, המשמשת לעיתים קרובות כאשר מעשיו או דבריו של מישהו נראים צבועים
      או לא עקביים עם התפקיד המצופה ממנו. הביטוי מרמז לסיפור הבגידה של יהודה בישו בברית החדשה, ומעיד על
      תחושת בגידה או אכזבה.
