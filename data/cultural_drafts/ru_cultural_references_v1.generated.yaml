  short_explanation: A triad of moral ideals (reasonable, good, eternal) often cited in Russian cultural
    and educational discourse, particularly in the context of moral upbringing and Soviet-era values.
    It reflects a blend of Enlightenment ideals and traditional Russian moral philosophy.
  i18n_explanations:
    en: A triad of moral ideals (reasonable, good, eternal) often cited in Russian cultural and educational
      discourse, particularly in the context of moral upbringing and Soviet-era values. It reflects a
      blend of Enlightenment ideals and traditional Russian moral philosophy.
    es: Tríada de ideales morales (razonable, bueno, eterno) citada frecuentemente en el discurso cultural
      y educativo ruso, especialmente en el contexto de la formación moral y los valores de la era soviética.
      Refleja una mezcla de ideales ilustrados y la filosofía moral rusa tradicional.
    fr: Une triade d'idéaux moraux (raisonnable, bon, éternel) souvent citée dans le discours culturel
      et éducatif russe, notamment dans le contexte de l'éducation morale et des valeurs de l'ère soviétique.
      Elle reflète un mélange d'idéaux des Lumières et de la philosophie morale russe traditionnelle.
    de: Eine Trias moralischer Ideale (vernünftig, gut, ewig), die häufig in der russischen Kultur- und
      Bildungsdiskussion, besonders im Kontext der moralischen Erziehung und sowjetischer Werte, zitiert
      wird. Sie vereint Aufklärungsideale mit traditioneller russischer Moralphilosophie.
    it: Una triade di ideali morali (ragionevole, buono, eterno) spesso citata nel discorso culturale
      ed educativo russo, in particolare nel contesto dell'educazione morale e dei valori dell'era sovietica.
      Riflette una fusione tra ideali illuministici e la filosofia morale russa tradizionale.
    pt: Tríade de ideais morais (razoável, bom, eterno) frequentemente citada no discurso cultural e educacional
      russo, especialmente no contexto da formação moral e dos valores da era soviética. Reflete uma mistura
      de ideais iluministas e da filosofia moral russa tradicional.
    ru: Триада моральных идеалов (разумное, доброе, вечное), часто цитируемая в русском культурном и образовательном
      дискурсе, особенно в контексте нравственного воспитания и советских ценностей. Отражает сочетание
      идеалов Просвещения и традиционной русской нравственной философии.
    ja: ロシアの文化的・教育的な言説で頻繁に引用される、道徳的理想の三位一体（合理的、善、永遠）。特に道徳教育やソビエト時代の価値観の文脈で語られ、啓蒙主義の理想と伝統的なロシアの道徳哲学が融合したものである。
    zh: 俄罗斯文化和教育话语中常被引用的道德理想三位一体（合理、善、永恒），尤见于道德培养和苏联时代价值观的语境。体现了启蒙理想与传统俄罗斯道德哲学的融合。
    ar: مثلث المثل الأخلاقية (المعقول، الخير، الأبدي) الذي يُذكر كثيرًا في الخطاب الثقافي والتربوي الروسي،
