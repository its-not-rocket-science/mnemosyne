  short_explanation: A liturgical title for Jesus Christ, derived from the Gospel of John (1:29), where
    John the Baptist refers to Jesus as the 'Lamb of God who takes away the sins of the world.' Central
    to Christian theology and liturgy.
  i18n_explanations:
    en: A liturgical title for Jesus Christ, derived from the Gospel of John (1:29), where John the Baptist
      refers to Jesus as the 'Lamb of God who takes away the sins of the world.' Central to Christian
      theology and liturgy.
    es: Título litúrgico de Jesucristo, derivado del Evangelio de Juan (1:29), donde Juan el Bautista
      se refiere a Jesús como el 'Cordero de Dios que quita el pecado del mundo'. Central en la teología
      y liturgia cristiana.
    fr: Titre liturgique de Jésus-Christ, tiré de l'Évangile de Jean (1:29), où Jean-Baptiste désigne
      Jésus comme l'« Agneau de Dieu qui enlève le péché du monde ». Central dans la théologie et la liturgie
      chrétiennes.
    de: Ein liturgischer Titel für Jesus Christus, abgeleitet aus dem Johannesevangelium (1:29), wo Johannes
      der Täufer Jesus als das « Lamm Gottes, das die Sünde der Welt trägt » bezeichnet. Zentral in christlicher
      Theologie und Liturgie.
    it: Titolo liturgico di Gesù Cristo, derivato dal Vangelo di Giovanni (1:29), dove Giovanni Battista
      si riferisce a Gesù come l'« Agnello di Dio che toglie i peccati del mondo ». Centrale nella teologia
      e liturgia cristiana.
    pt: Título litúrgico de Jesus Cristo, derivado do Evangelho de João (1:29), onde João Batista se refere
      a Jesus como o 'Cordeiro de Deus que tira o pecado do mundo'. Central na teologia e liturgia cristãs.
    ru: Литургическое название Иисуса Христа, происходящее из Евангелия от Иоанна (1:29), где Иоанн Креститель
      называет Иисуса «Агнцем Божиим, Который берет на Себя грех мира». Центральное в христианской теологии
      и литургии.
    ja: イエス・キリストの Liturgy（典礼）上の称号で、ヨハネによる福音書（1:29）で洗礼者ヨハネが「世の罪を取り除く神の子羊」と呼んだことに由来。キリスト教神学と Liturgy（典礼）の中心的概念。
    zh: 耶稣基督的礼仪称号，源自《约翰福音》（1:29），施洗者约翰称耶稣为「除去世人罪孽的神的羔羊」。在基督教神学和礼仪中占核心地位。
    ar: لقب ليتورجي ليسوع المسيح، مأخوذ من إنجيل يوحنا (1:29)، حيث يصف يوحنا المعمدان يسوع بأنه «خروف
