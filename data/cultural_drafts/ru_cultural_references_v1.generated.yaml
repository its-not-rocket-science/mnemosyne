    turn out.' It reflects folk fatalism and reliance on divine will.
  i18n_explanations:
    en: An expression of uncertainty about the future, literally 'God knows how this will turn out.' It
      reflects folk fatalism and reliance on divine will.
    es: Una expresión de incertidumbre sobre el futuro, literalmente 'Dios sabe cómo saldrá esto'. Refleja
      el fatalismo popular y la dependencia de la voluntad divina.
    fr: Une expression d'incertitude quant à l'avenir, littéralement 'Dieu sait comment cela se passera'.
      Elle reflète le fatalisme populaire et la confiance en la volonté divine.
    de: Ein Ausdruck der Unsicherheit über die Zukunft, wörtlich 'Gott weiß, wie das ausgehen wird'. Er
      spiegelt den Volksfatalismus und die Abhängigkeit vom göttlichen Willen wider.
    it: Un'espressione di incertezza sul futuro, letteralmente 'Dio sa come andrà'. Riflette il fatalismo
      popolare e la fiducia nella volontà divina.
    pt: Uma expressão de incerteza sobre o futuro, literalmente 'Deus sabe como isso vai ser'. Reflete
      o fatalismo popular e a confiança na vontade divina.
    ru: Выражение неуверенности в будущем, буквально 'Бог весть, как это будет'. Отражает народный фатализм
      и упование на божью волю.
    ja: 未来への不確実さを表す言葉で、文字通り「神のみぞ知る」という意味です。民間の運命論と神の意志への依存を反映しています。
    zh: 表达对未来的不确定性的说法，字面意思为“只有天知道会怎样”。反映了民间的宿命论和对神意的依赖。
    ar: تعبير عن عدم اليقين بشأن المستقبل، حرفيًا 'الله يعلم كيف ستكون الأمور'. يعكس القدرية الشعبية والاعتماد
      على الإرادة الإلهية.
    he: ביטוי של חוסר ודאות לגבי העתיד, מילולית 'רק אלוהים יודע איך זה יסתיים'. משקף את הגורלנות העממית
      והסתמכות על רצון האל.
