- id: ru_literary_reference_светить_и_никаких_гвоздей_c3b75c68
  language: ru
  canonical_reference: Светить — и никаких гвоздей!
  reference_type: literary_reference
  surface_patterns:
  - Светить — и никаких гвоздей!
  - светить — и никаких гвоздей
  - светить и никаких гвоздей
  short_explanation: A famous line from Vladimir Mayakovsky's 1923 poem 'About This' (Про это), symbolizing
    the poet's commitment to pure artistry without compromise. It is often cited to emphasize dedication
    to one's craft.
  i18n_explanations:
    en: A famous line from Vladimir Mayakovsky's 1923 poem 'About This' (Про это), symbolizing the poet's
      commitment to pure artistry without compromise. It is often cited to emphasize dedication to one's
      craft.
    es: Frase famosa del poema de 1923 'Sobre esto' (Про это) de Vladimir Mayakovsky, que simboliza el
      compromiso del poeta con el arte puro sin concesiones. Se cita a menudo para enfatizar la dedicación
      a un oficio.
    fr: Une réplique célèbre du poème de 1923 'À ce sujet' (Про это) de Vladimir Maïakovski, symbolisant
      l'engagement du poète envers un art pur sans compromis. Elle est souvent citée pour souligner le
      dévouement à son métier.
    de: Ein berühmter Vers aus Wladimir Majakowskis Gedicht 'Davon' (Про это) von 1923, der die Verpflichtung
      des Dichters zu reiner Kunst ohne Kompromisse symbolisiert. Wird oft zitiert, um Hingabe an sein
      Handwerk zu betonen.
    it: Una celebre frase del poema del 1923 'A proposito di questo' (Про это) di Vladimir Majakovskij,
      che simboleggia l'impegno del poeta verso un'arte pura senza compromessi. Viene spesso citata per
      enfatizzare la dedizione al proprio mestiere.
    pt: Frase famosa do poema de 1923 'Sobre Isso' (Про это) de Vladimir Mayakovsky, que simboliza o compromisso
      do poeta com a arte pura sem concessões. É frequentemente citada para enfatizar a dedicação ao ofício.
    ru: Знаменитая строка из стихотворения Владимира Маяковского 1923 года 'Про это', символизирующая
      его преданность чистому искусству без компромиссов. Часто цитируется, чтобы подчеркнуть преданность
      своему делу.
    ja: 1923年のウラジーミル・マヤコフスキーの詩「これについて」（Про это）の有名な一節で、詩人が妥協のない純粋な芸術への献身を象徴している。自分の仕事への専念を強調する際によく引用される。
    zh: 弗拉基米尔·马雅可夫斯基1923年诗作《论此》（Про это）中的著名诗句，象征诗人对纯粹艺术的无条件忠诚。常被引用以强调对自己手艺的奉献。
    ar: سطر مشهور من قصيدة فلاديمير ماياكوفسكي لعام 1923 'عن هذا' (Про это)، يرمز إلى التزام الشاعر بالفن
      الخالص دون مساومة. غالبًا ما يُستشهد به لتأكيد التفاني في الحرفة.
    he: משפט מפורסם מהשיר של ולדימיר מאיאקובסקי מ-1923 'על זה' (Про это), המסמל את מחויבותו של המשורר
      לאמנות טהורה ללא פשרות. לעיתים קרובות מצוטט כדי להדגיש מסירות למקצוע.
