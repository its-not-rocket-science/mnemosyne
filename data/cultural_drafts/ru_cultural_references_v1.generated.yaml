    ja: 自分自身を愛するように隣人を愛せよ。キリスト教の中心的な戒めで、新約聖書（マタイによる福音書22:39、マルコによる福音書12:31）に由来します。
    zh: 要爱人如己。基督教的核心戒律之一，源自《新约》（马太福音22:39，马可福音12:31）。
    ar: أحب قريبك كنفسك. وصية مركزية في المسيحية، مأخوذة من العهد الجديد (متى 22:39، مرقس 12:31).
    he: ואהבת לרעך כמוך. מצוות מרכזית בנצרות, המבוססת על הברית החדשה (מתי כב:39, מרקוס יב:31).
