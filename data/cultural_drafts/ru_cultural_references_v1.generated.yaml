  short_explanation: A proverb describing an unlikely or dysfunctional household where incompatible individuals
    are forced to live together, often used to describe a chaotic or mismatched group.
  i18n_explanations:
    en: A proverb describing an unlikely or dysfunctional household where incompatible individuals are
      forced to live together, often used to describe a chaotic or mismatched group.
    es: Un refrán que describe un hogar improbable o disfuncional donde personas incompatibles se ven
      obligadas a vivir juntas, usado a menudo para describir un grupo caótico o desajustado.
    fr: Un proverbe décrivant un foyer improbable ou dysfonctionnel où des individus incompatibles sont
      forcés de vivre ensemble, souvent utilisé pour décrire un groupe chaotique ou désuni.
    de: Ein Sprichwort, das einen unwahrscheinlichen oder dysfunktionalen Haushalt beschreibt, in dem
      unvereinbare Personen gezwungen sind, zusammenzuleben, oft verwendet für eine chaotische oder unpassende
      Gruppe.
    it: Un proverbio che descrive un nucleo familiare improbabile o disfunzionale in cui persone incompatibili
      sono costrette a vivere insieme, spesso usato per descrivere un gruppo caotico o mal assortito.
    pt: Um provérbio que descreve um lar improvável ou disfuncional onde pessoas incompatíveis são obrigadas
      a viver juntas, frequentemente usado para descrever um grupo caótico ou desajustado.
    ru: Пословица, описывающая маловероятное или дисфункциональное домашнее хозяйство, где несовместимые
      люди вынуждены жить вместе, часто используется для описания хаотичной или несочетаемой группы.
    ja: 互いに相容れない者たちが無理やり一緒に暮らす、ありそうもないまたは機能不全の家庭を表すことわざ。混沌とした不釣り合いな集団を指すのにも使われる。
    zh: 一句描述不太可能或功能失调的家庭，其中不相容的人被迫共同生活的谚语，常用于形容混乱或不匹配的群体。
    ar: مثل يصف أسرة غير محتملة أو غير وظيفية يعيش فيها أفراد غير متوافقين مجبرين على العيش معًا، وغالبًا
