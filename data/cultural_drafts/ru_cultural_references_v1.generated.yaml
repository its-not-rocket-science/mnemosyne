    fragility.
  i18n_explanations:
    en: A proverb meaning 'Where it's thin, it tears'—suggesting that weaknesses or fragile situations
      are the first to fail under pressure. It reflects a pragmatic view of human and material fragility.
    es: Refrán que significa 'Donde es delgado, se rompe', sugiriendo que las debilidades o situaciones
      frágiles son las primeras en fallar bajo presión. Refleja una visión pragmática de la fragilidad
      humana y material.
    fr: Proverbe signifiant 'Là où c'est fin, ça se déchire' — suggérant que les faiblesses ou les situations
      fragiles sont les premières à céder sous la pression. Il reflète une vision pragmatique de la fragilité
      humaine et matérielle.
    de: Ein Sprichwort mit der Bedeutung 'Wo es dünn ist, reißt es' — deutet darauf hin, dass Schwächen
