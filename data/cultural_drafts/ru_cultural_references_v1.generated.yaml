- id: ru_proverb_tradition_от_сумы_да_от_тюрьмы_не_зарекайся_55381c89
  language: ru
  canonical_reference: От сумы да от тюрьмы не зарекайся
  reference_type: proverb_tradition
  surface_patterns:
