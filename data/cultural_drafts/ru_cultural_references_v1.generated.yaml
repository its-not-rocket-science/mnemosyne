- id: ru_literary_reference_игорев_полк_3bccb1a0
  language: ru
  canonical_reference: Игорев полк
  reference_type: literary_reference
  surface_patterns:
  - Игорев полк
  - полк Игоря
  - войско Игоря
  short_explanation: Refers to the military campaign of Prince Igor Svyatoslavich against the Polovtsians
    in 1185, immortalized in the Old East Slavic epic *The Tale of Igor's Campaign*. Symbolizes bravery,
    military prowess, and historical valor.
  i18n_explanations:
    en: Refers to the military campaign of Prince Igor Svyatoslavich against the Polovtsians in 1185,
      immortalized in the Old East Slavic epic *The Tale of Igor's Campaign*. Symbolizes bravery, military
      prowess, and historical valor.
    es: Se refiere a la campaña militar del príncipe Igor Sviatoslávich contra los polovtsianos en 1185,
      inmortalizada en el poema épico eslavo oriental *El Cantar de las huestes de Igor*. Simboliza valentía,
      destreza militar y valor histórico.
    fr: Fait référence à la campagne militaire du prince Igor Sviatoslavitch contre les Polovtses en 1185,
      immortalisée dans l'épopée slave orientale *Le Dit de la campagne d'Igor*. Symbolise le courage,
      la prouesse militaire et la valeur historique.
    de: Bezieht sich auf den Feldzug des Fürsten Igor Swjatoslawitsch gegen die Polowzer im Jahr 1185,
      der im altrussischen Epos *Die Igor-Schlacht* verewigt wurde. Steht für Tapferkeit, militärische
      Stärke und historischen Heldenmut.
    it: Si riferisce alla campagna militare del principe Igor Svjatoslavič contro i polovzi nel 1185,
      immortalata nell'epopea slava orientale *Il racconto della schiera di Igor*. Simboleggia coraggio,
      abilità militare e valore storico.
    pt: Refere-se à campanha militar do príncipe Igor Sviatoslaviche contra os polovtsianos em 1185, imortalizada
      no épico eslavo oriental *O Conto da Campanha de Igor*. Simboliza bravura, proeza militar e valor
      histórico.
    ru: Относится к военному походу князя Игоря Святославича против половцев в 1185 году, прославленному
      в древнерусском эпосе «Слово о полку Игореве». Символизирует храбрость, военное мастерство и историческую
      доблесть.
    ja: 1185年に公爵イーゴリ・スヴャトスラヴィチがポロヴェツ族に対して行った遠征を指し、古代東スラヴの叙事詩『イーゴリ遠征物語』に不朽の名を残す。勇気、軍事的才能、歴史的価値を象徴する。
    zh: 指1185年伊戈尔·斯维亚托斯拉维奇公爵对波洛韦次人的军事远征，在古东斯拉夫史诗《伊戈尔远征记》中被永载史册。象征勇气、军事才能与历史英勇。
    ar: يشير إلى الحملة العسكرية للأمير إيغور سفياتوسلافيتش ضد القبيلة الذهبية في عام 1185، والتي خلدت
      في الملحمة السلافية الشرقية "قصة حملة إيغور". ترمز إلى الشجاعة والبراعة العسكرية والقيمة التاريخية.
    he: מתייחס למסע הצבאי של הנסיך איגור סוויאטוסלביץ' נגד הפולובצים בשנת 1185, אשר הונצח באפוס הסלאבי
