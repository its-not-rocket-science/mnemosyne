  short_explanation: A proverb advising contentment with what one already has, as seeking more good may
    lead to loss. It emphasizes the value of appreciating current blessings.
  i18n_explanations:
    en: A proverb advising contentment with what one already has, as seeking more good may lead to loss.
      It emphasizes the value of appreciating current blessings.
    es: Un refrán que aconseja conformarse con lo que ya se tiene, ya que buscar más bien puede llevar
      a la pérdida. Destaca el valor de apreciar las bendiciones actuales.
    fr: Un proverbe conseillant de se contenter de ce que l'on a déjà, car chercher davantage de bien
      peut mener à la perte. Il met en avant l'importance d'apprécier les bénédictions présentes.
    de: Ein Sprichwort, das rät, mit dem zufrieden zu sein, was man bereits hat, da das Streben nach mehr
      Gutes zu Verlust führen kann. Es betont den Wert, die aktuellen Segnungen zu schätzen.
    it: Un proverbio che consiglia di accontentarsi di ciò che si ha già, poiché cercare di più potrebbe
      portare a perdere ciò che si possiede. Sottolinea il valore di apprezzare le benedizioni attuali.
    pt: Um provérbio que aconselha a se contentar com o que já se tem, pois buscar mais pode levar à perda.
      Enfatiza o valor de apreciar as bênçãos atuais.
    ru: Пословица, советующая довольствоваться тем, что уже есть, так как стремление к большему может
      привести к утрате. Подчеркивает ценность благодарности за текущие блага.
    ja: すでに持っているものに満足すべきで、さらなる幸せを求めると失うことになるという意味のことわざ。現在の恵みを大切にする価値観を示す。
    zh: 一句劝诫满足于现有的，因为追求更多可能导致失去的谚语。强调珍惜当下福祉的价值。
    ar: مثل ينصح بالرضا بما لديك، لأن السعي وراء المزيد من الخير قد يؤدي إلى الفقدان. يبرز أهمية تقدير
