- id: ru_classical_or_scriptural_allusion_владимир_креститель_735b5608
  language: ru
  canonical_reference: Владимир Креститель
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Владимир Креститель
  - князь Владимир
  - крещение Руси
  - святой Владимир
  short_explanation: Refers to Prince Vladimir the Great (c. 958–1015), who Christianized Kievan Rus'
    in 988, marking the adoption of Orthodox Christianity as the state religion and a foundational event
    in Russian history.
  i18n_explanations:
    en: Refers to Prince Vladimir the Great (c. 958–1015), who Christianized Kievan Rus' in 988, marking
      the adoption of Orthodox Christianity as the state religion and a foundational event in Russian
      history.
    es: Se refiere al príncipe Vladimiro el Grande (c. 958–1015), quien cristianizó la Rus de Kiev en
      el año 988, marcando la adopción del cristianismo ortodoxo como religión de Estado y un evento fundacional
      en la historia rusa.
    fr: Fait référence au prince Vladimir le Grand (vers 958–1015), qui christianisa la Rus' de Kiev en
      988, marquant l'adoption du christianisme orthodoxe comme religion d'État et un événement fondateur
      de l'histoire russe.
    de: Bezieht sich auf Fürst Wladimir den Großen (ca. 958–1015), der 988 die Christianisierung der Kiewer
      Rus vollzog und damit die Annahme des orthodoxen Christentums als Staatsreligion sowie ein prägendes
      Ereignis der russischen Geschichte einleitete.
    it: Si riferisce al principe Vladimiro il Grande (ca. 958–1015), che cristianizzò la Rus' di Kiev
      nel 988, segnando l'adozione del cristianesimo ortodosso come religione di Stato e un evento fondante
      della storia russa.
    pt: Refere-se ao príncipe Vladimir, o Grande (c. 958–1015), que cristianizou a Rus' de Kiev em 988,
      marcando a adoção do cristianismo ortodoxo como religião de Estado e um evento fundador da história
      russa.
    ru: Относится к князю Владимиру Святославичу (ок. 958–1015), который в 988 году крестил Киевскую Русь,
      что ознаменовало принятие православия как государственной религии и стало ключевым событием в истории
      Руси.
    ja: 958年頃から1015年にかけて活躍したキエフ大公ウラジーミル大公（聖公）を指し、988年にキエフ・ルーシをキリスト教化し、正教会を国教として採用した歴史的転換点となった出来事。
    zh: 指的是基辅罗斯大公弗拉基米尔大帝（约958–1015），他于988年使基辅罗斯基督教化，标志着东正教被定为国教，并成为俄罗斯历史的奠基事件。
    ar: يشير إلى الأمير فلاديمير العظيم (حوالي 958–1015)، الذيChristianized روس كييف في عام 988، مما أدى
      إلى اعتماد المسيحية الأرثوذكسية كدين للدولة وحدث تأسيس في التاريخ الروسي.
    he: מתייחס לנסיך ולדימיר הגדול (בערך 958–1015), שהטביל את רוס של קייב לנצרות בשנת 988, צעד שהביא לאימוץ
      הנצרות האורתודוקסית כדת המדינה ואירוע מכונן בהיסטוריה הרוסית.
