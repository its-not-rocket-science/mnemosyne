- id: ru_literary_reference_волчица_с_рагуилом_сговорилась_3eefc0d2
  language: ru
  canonical_reference: Волчица с Рагуилом сговорилась
  reference_type: literary_reference
  surface_patterns:
  - Волчица с Рагуилом сговорилась
  - Волчица с Рагуилом сговорились
  - Волчица и Рагуил сговорились
  short_explanation: An allusion to Ivan Krylov's fable 'Волк на псарне' (The Wolf in the Kennel), where
    a cunning wolf (symbolizing Napoleon) attempts to negotiate with a clever fox (symbolizing Russian
    diplomacy). The phrase refers to a deceptive or manipulative alliance.
  i18n_explanations:
    en: An allusion to Ivan Krylov's fable 'Волк на псарне' (The Wolf in the Kennel), where a cunning
      wolf (symbolizing Napoleon) attempts to negotiate with a clever fox (symbolizing Russian diplomacy).
      The phrase refers to a deceptive or manipulative alliance.
    es: Una alusión a la fábula de Iván Krylov 'El lobo en el redil', donde un lobo astuto (símbolo de
      Napoleón) intenta negociar con un zorro inteligente (símbolo de la diplomacia rusa). La frase se
      refiere a una alianza engañosa o manipuladora.
    fr: Une allusion à la fable d'Ivan Krylov 'Le Loup dans la bergerie', où un loup rusé (symbolisant
      Napoléon) tente de négocier avec un renard malin (symbolisant la diplomatie russe). L'expression
      désigne une alliance trompeuse ou manipulatrice.
    de: Eine Anspielung auf die Fabel 'Der Wolf im Schafstall' von Iwan Krylow, in der ein schlauer Wolf
      (Symbol für Napoleon) versucht, mit einem klugen Fuchs (Symbol für die russische Diplomatie) zu
      verhandeln. Der Ausdruck bezieht sich auf ein trügerisches oder manipulatives Bündnis.
    it: Un'allusione alla favola di Ivan Krylov 'Il lupo nel pollaio', in cui un lupo astuto (simbolo
      di Napoleone) cerca di negoziare con una volpe intelligente (simbolo della diplomazia russa). La
      frase si riferisce a un'alleanza ingannevole o manipolativa.
    pt: Uma alusão à fábula de Ivan Krylov 'O Lobo no Galinheiro', onde um lobo astuto (símbolo de Napoleão)
      tenta negociar com uma raposa esperta (símbolo da diplomacia russa). A expressão refere-se a uma
      aliança enganosa ou manipuladora.
    ru: Отсылка к басне Ивана Крылова 'Волк на псарне', где хитрая лиса (олицетворяющая русскую дипломатию)
      перехитрила волка (олицетворяющего Наполеона). Фраза относится к обманчивому или манипулятивному
      альянсу.
    ja: イワン・クリーロフの寓話「羊舎の狼」への言及で、狡猾な狼（ナポレオンを象徴）が賢い狐（ロシア外交を象徴）と交渉を試みる。この表現は欺瞞的または操作的な同盟を指す。
    zh: 对伊万·克雷洛夫寓言《狼入羊舍》的典故，其中狡猾的狼（象征拿破仑）试图与聪明的狐狸（象征俄罗斯外交）谈判。此短语指代一个欺骗性或操纵性的联盟。
    ar: إشارة إلى قصة إيفان كريلوف 'الذئب في حظيرة الغنم'، حيث يحاول ذئب ماكر (يرمز إلى نابليون) التفاوض
      مع ثعلب ذكي (يرمز إلى الدبلوماسية الروسية). العبارة تشير إلى تحالف مخادع أو manipulative.
    he: רמז לאלגוריה של איוון קרילוב 'הזאב בלול התרנגולות', שבה זאב ערמומי (המסמל את נפוליאון) מנסה לנהל
      משא ומתן עם שועל פיקח (המסמל את הדיפלומטיה הרוסית). הביטוי מתייחס לברית מטעה או מניפולטיבית.
