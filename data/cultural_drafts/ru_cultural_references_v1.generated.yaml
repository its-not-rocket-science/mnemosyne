    by a significant future event (often marriage), implying temporary inconvenience.
  i18n_explanations:
    en: A humorous proverb suggesting that minor injuries or problems will heal or resolve by a significant
      future event (often marriage), implying temporary inconvenience.
    es: Refrán humorístico que sugiere que las heridas o problemas menores sanarán o se resolverán para
      una fecha importante en el futuro (a menudo una boda), lo que implica una molestia temporal.
    fr: Proverbe humoristique suggérant que les petites blessures ou problèmes guériront ou se résoudront
      d'ici un événement important dans le futur (souvent un mariage), impliquant une gêne temporaire.
    de: Ein humorvolles Sprichwort, das nahelegt, dass kleinere Verletzungen oder Probleme bis zu einem
      wichtigen zukünftigen Ereignis (oft einer Hochzeit) verheilen oder sich lösen werden, was auf eine
      vorübergehende Unannehmlichkeit hindeutet.
    it: Un proverbio umoristico che suggerisce che ferite o problemi minori guariranno o si risolveranno
      entro un evento futuro significativo (spesso un matrimonio), implicando un disagio temporaneo.
    pt: Um provérbio humorístico que sugere que ferimentos ou problemas menores serão curados ou resolvidos
