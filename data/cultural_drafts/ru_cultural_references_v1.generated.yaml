- id: ru_literary_reference_барышня_и_хулиган_7bf8036a
  language: ru
  canonical_reference: Барышня и хулиган
  reference_type: literary_reference
  surface_patterns:
  - Барышня и хулиган
  - фильм 'Барышня и хулиган'
  - песня 'Барышня и хулиган'
  short_explanation: A reference to a 1918 silent film directed by Владимир Маяковский and Евгений Славинский,
    as well as a later song by Маяковский. The phrase symbolizes a contrast between refined femininity
    ('baryshnya') and rough masculinity ('khaligan').
  i18n_explanations:
    en: A reference to a 1918 silent film directed by Владимир Маяковский and Евгений Славинский, as well
      as a later song by Маяковский. The phrase symbolizes a contrast between refined femininity ('baryshnya')
      and rough masculinity ('khaligan').
    es: Referencia a una película muda de 1918 dirigida por Владимир Маяковский y Евгений Славинский,
      así como a una canción posterior de Маяковский. La frase simboliza un contraste entre la feminidad
      refinada ('baryshnya') y la masculinidad ruda ('khaligan').
    fr: Référence à un film muet de 1918 réalisé par Владимир Маяковский et Евгений Славинский, ainsi
      qu'à une chanson ultérieure de Маяковский. L'expression symbolise un contraste entre la féminité
      raffinée ('baryshnya') et la masculinité brutale ('khaligan').
    de: Ein Verweis auf einen stummen Film aus dem Jahr 1918, der von Владимир Маяковский und Евгений
      Славинский inszeniert wurde, sowie auf ein späteres Lied von Маяковский. Der Ausdruck symbolisiert
      einen Kontrast zwischen verfeinerter Weiblichkeit ('baryshnya') und rauer Männlichkeit ('khaligan').
    it: Riferimento a un film muto del 1918 diretto da Владимир Маяковский e Евгений Славинский, nonché
      a una canzone successiva di Маяковский. La frase simboleggia un contrasto tra la femminilità raffinata
      ('baryshnya') e la mascolinità rozza ('khaligan').
    pt: Referência a um filme mudo de 1918 dirigido por Владимир Маяковский e Евгений Славинский, além
      de uma canção posterior de Маяковский. A frase simboliza um contraste entre a feminilidade refinada
      ('baryshnya') e a masculinidade rude ('khaligan').
    ru: Отсылка к немому фильму 1918 года, снятому Владимиром Маяковским и Евгением Славинским, а также
      к более поздней песне Маяковского. Фраза символизирует контраст между утончённой женственностью
      ('барышня') и грубой мужской силой ('хулиган').
    ja: 1918年の無声映画をウラジーミル・マヤコフスキーとエフゲニー・スラヴィンスキーが監督したことに加え、マヤコフスキーによる後の楽曲も指します。このフレーズは洗練された女性性（「バリシュニャ」）と粗野な男性性（「フリガン」）の対比を象徴しています。
    zh: 指代1918年由弗拉基米尔·马雅可夫斯基和叶夫根尼·斯拉文斯基导演的无声电影，以及马雅可夫斯基后来创作的一首歌曲。该短语象征着优雅女性（「барышня」）与粗犷男性（「хулиган」）之间的对比。
    ar: إشارة إلى فيلم صامت من عام 1918 أخرجه فلاديمير ماياكوفسكي ويوجين سلافينسكي، بالإضافة إلى أغنية
      لاحقة لماياكوفسكي. العبارة ترمز إلى التناقض بين الأنوثة الرقيقة ('باريشنيا') والرجولة الخشنة ('خليغان').
    he: התייחסות לסרט אילם משנת 1918 שביים ולדימיר מאיאקובסקי ויבגני סלאבינסקי, וכן לשיר מאוחר יותר של
      מאיאקובסקי. הביטוי מסמל ניגוד בין נשיות מעודנת ('בריישניה') וגבריות גסה ('חוליגן').
