    pt: Esta coleção de contos populares do Oriente Médio, conhecida como 'As Mil e Uma Noites', apresenta
      histórias de aventura, magia e moralidade, influenciando a literatura em todo o mundo.
    ru: Эта коллекция народных сказок Ближнего Востока, известная как 'Тысяча и одна ночь', содержит истории
