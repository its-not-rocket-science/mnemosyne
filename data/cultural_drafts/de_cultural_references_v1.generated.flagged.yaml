- id: de_cultural_reference_die_freude_an_der_kunst_453b27a0
  language: de
  canonical_reference: Die Freude an der Kunst
  reference_type: cultural_reference
  surface_patterns:
  - Die Freude an der Kunst
  - Freude an der Kunst
  short_explanation: Translating to 'The Joy of Art', this phrase encapsulates the appreciation and emotional
    response elicited by artistic expression. It is often referenced in discussions about aesthetics and
    the value of art in society.
  i18n_explanations:
    en: Translating to 'The Joy of Art', this phrase encapsulates the appreciation and emotional response
      elicited by artistic expression. It is often referenced in discussions about aesthetics and the
      value of art in society.
    es: Traducido como 'La alegría del arte', esta frase encapsula la apreciación y la respuesta emocional
      que provoca la expresión artística. A menudo se hace referencia en discusiones sobre estética y
      el valor del arte en la sociedad.
    fr: Se traduisant par 'La Joie de l'Art', cette phrase encapsule l'appréciation et la réponse émotionnelle
      suscitée par l'expression artistique. Elle est souvent mentionnée dans les discussions sur l'esthétique
      et la valeur de l'art dans la société.
    de: Übersetzt als 'Die Freude an der Kunst' fasst dieser Ausdruck die Wertschätzung und emotionale
      Reaktion zusammen, die durch künstlerische Ausdrucksformen hervorgerufen werden. Er wird oft in
      Diskussionen über Ästhetik und den Wert von Kunst in der Gesellschaft erwähnt.
    it: Tradotto come 'La gioia dell'arte', questa frase racchiude l'apprezzamento e la risposta emotiva
      suscitata dall'espressione artistica. Viene spesso citata nelle discussioni sull'estetica e sul
      valore dell'arte nella società.
    pt: Traduzido como 'A Alegria da Arte', esta frase encapsula a apreciação e a resposta emocional provocada
      pela expressão artística. É frequentemente referenciada em discussões sobre estética e o valor da
      arte na sociedade.
    ru: Переводится как 'Радость искусства', эта фраза охватывает признательность и эмоциональную реакцию,
      вызываемую художественным выражением. Она часто упоминается в обсуждениях о эстетике и ценности
      искусства в обществе.
    ja: '''芸術の喜び''と訳されるこのフレーズは、芸術的表現によって引き起こされる感謝と感情的反応を要約しています。これは、審美性や芸術の社会的価値に関する議論でしばしば言及されます。'
    zh: '''艺术的喜悦''的翻译，这个短语概括了艺术表现所引发的欣赏和情感反应。它常常在关于美学和艺术在社会中价值的讨论中被提及。'
    ar: تُترجم إلى 'فرحة الفن'، وتلخص هذه العبارة التقدير والاستجابة العاطفية التي تثيرها التعبيرات الفنية.
