    ja: これは中東の民話のコレクションで、「千夜一夜物語」として知られ、冒険、魔法、道徳の物語が特徴で、世界中の文学に影響を与えています。
    zh: 这是一部中东民间故事集，称为《一千零一夜》，包含冒险、魔法和道德的故事，对全球文学产生了影响。
    ar: هذه مجموعة من الحكايات الشعبية من الشرق الأوسط، المعروفة باسم 'ألف ليلة وليلة'، تحتوي على قصص
