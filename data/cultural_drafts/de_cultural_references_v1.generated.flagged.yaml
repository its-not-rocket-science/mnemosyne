- id: de_cultural_reference_die_sieben_todsünden_bcedb8ab
  language: de
  canonical_reference: Die sieben Todsünden
  reference_type: cultural_reference
  surface_patterns:
  - Die sieben Todsünden
  - sieben Todsünden
  short_explanation: Refers to the seven deadly sins in Christian theology, which are vices that can lead
    to further immorality. They are often referenced in literature and art to illustrate moral lessons.
  i18n_explanations:
    en: Refers to the seven deadly sins in Christian theology, which are vices that can lead to further
      immorality. They are often referenced in literature and art to illustrate moral lessons.
    es: Se refiere a los siete pecados capitales en la teología cristiana, que son vicios que pueden llevar
      a una mayor inmoralidad. A menudo se mencionan en la literatura y el arte para ilustrar lecciones
      morales.
    fr: Fait référence aux sept péchés capitaux dans la théologie chrétienne, qui sont des vices pouvant
      mener à une immoralité accrue. Ils sont souvent mentionnés dans la littérature et l'art pour illustrer
      des leçons morales.
    de: Bezieht sich auf die sieben Todsünden in der christlichen Theologie, die Laster sind, die zu weiterer
      Unmoral führen können. Sie werden oft in Literatur und Kunst zitiert, um moralische Lektionen zu
      veranschaulichen.
    it: Si riferisce ai sette peccati capitali nella teologia cristiana, che sono vizi che possono portare
      a ulteriore immoralità. Sono spesso citati nella letteratura e nell'arte per illustrare lezioni
      morali.
    pt: Refere-se aos sete pecados capitais na teologia cristã, que são vícios que podem levar a uma maior
      imoralidade. Muitas vezes são mencionados na literatura e na arte para ilustrar lições morais.
    ru: Относится к семи смертным грехам в христианской теологии, которые являются пороками, способными
      привести к дальнейшей аморальности. Они часто упоминаются в литературе и искусстве для иллюстрации
      моральных уроков.
    ja: キリスト教神学における七つの大罪を指し、さらなる不道徳につながる可能性のある悪徳です。文学や芸術で道徳的教訓を示すためにしばしば言及されます。
    zh: 指的是基督教神学中的七宗罪，这些罪恶可能导致进一步的不道德行为。它们常在文学和艺术中被提及，以说明道德教训。
    ar: تشير إلى الخطايا السبع المميتة في اللاهوت المسيحي، وهي رذائل يمكن أن تؤدي إلى مزيد من الفساد.
      وغالبًا ما يتم الإشارة إليها في الأدب والفن لتوضيح الدروس الأخلاقية.
    he: מתייחס לשבעת החטאים הקטלניים בתיאולוגיה הנוצרית, שהם רעות שיכולות להוביל לאי מוסריות נוספת. הם
      לעיתים קרובות מוזכרים בספרות ובאמנות כדי להמחיש לקחים מוסריים.
