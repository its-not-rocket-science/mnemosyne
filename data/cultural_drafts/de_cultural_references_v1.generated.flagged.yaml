- id: de_classical_or_scriptural_allusion_schicksalsgöttinnen_5093e55d
  language: de
  canonical_reference: Schicksalsgöttinnen
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Schicksalsgöttinnen
  - Schicksalsgöttin
  short_explanation: Schicksalsgöttinnen, or the Fates, are figures from mythology representing destiny
    and fate, often referenced in literature to symbolize the inescapable nature of fate.
  i18n_explanations:
    en: Schicksalsgöttinnen, or the Fates, are figures from mythology representing destiny and fate, often
      referenced in literature to symbolize the inescapable nature of fate.
    es: Schicksalsgöttinnen, o las Parcas, son figuras de la mitología que representan el destino y el
      destino, a menudo referenciadas en la literatura para simbolizar la naturaleza ineludible del destino.
    fr: Les Schicksalsgöttinnen, ou les Parques, sont des figures de la mythologie représentant le destin
      et la fatalité, souvent citées dans la littérature pour symboliser la nature inéluctable du destin.
    de: Schicksalsgöttinnen, oder die Moiren, sind Figuren aus der Mythologie, die Schicksal und Bestimmung
      repräsentieren und oft in der Literatur zitiert werden, um die unausweichliche Natur des Schicksals
      zu symbolisieren.
    it: Le Schicksalsgöttinnen, o le Moire, sono figure della mitologia che rappresentano il destino e
      il fato, spesso citate nella letteratura per simboleggiare la natura ineluttabile del destino.
    pt: As Schicksalsgöttinnen, ou as Moiras, são figuras da mitologia que representam o destino e o fado,
      frequentemente referenciadas na literatura para simbolizar a natureza inevitável do destino.
    ru: Шиксальсгеттинен, или судьбы, - это фигуры из мифологии, представляющие судьбу и рок, часто упоминаемые
      в литературе для символизации неотвратимой природы судьбы.
    ja: シュキッツァルスゲッティネン、または運命の女神は、運命と宿命を表す神話の人物であり、文学でしばしば運命の避けられない性質を象徴するために言及されます。
    zh: Schicksalsgöttinnen，或命运女神，是代表命运和宿命的神话人物，常在文学中被提及以象征命运的不可避免性。
    ar: Schicksalsgöttinnen، أو الآلهة القدر، هم شخصيات من الأساطير تمثل القدر والمصير، وغالبًا ما يتم
      الإشارة إليهم في الأدب لرمزية الطبيعة الحتمية للقدر.
    he: Schicksalsgöttinnen, או הגורלות, הן דמויות מהמיתולוגיה המייצגות את הגורל והפאט, לעיתים קרובות
