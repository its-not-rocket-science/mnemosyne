      divin.
    de: Wird in Kontexten verwendet, in denen Feuer metaphorisch oder wörtlich anwesend ist, z. B. bei
      Eiden, Geständnissen oder Ritualen. Oft impliziert es, der Wahrheit oder göttlichen Urteilen zu
      begegnen.
    it: Usato in contesti in cui il fuoco è presente, letteralmente o metaforicamente, come in giuramenti,
      confessioni o rituali. Spesso implica affrontare la verità o un giudizio divino.
