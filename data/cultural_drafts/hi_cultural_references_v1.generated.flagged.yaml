    texts to describe Agni's divine manifestations or his role as a witness in rituals.
  i18n_explanations:
    en: Refers to the form or appearance of fire (Agni), often used in Vedic and Puranic texts to describe
      Agni's divine manifestations or his role as a witness in rituals.
    es: Se refiere a la forma o apariencia del fuego (Agni), utilizado en textos védicos y puránicos para
      describir sus manifestaciones divinas o su papel como testigo en rituales.
    fr: Fait référence à la forme ou à l'apparence du feu (Agni), souvent utilisée dans les textes védiques
      et puraniques pour décrire ses manifestations divines ou son rôle de témoin dans les rituels.
    de: Bezieht sich auf die Gestalt oder das Erscheinungsbild des Feuers (Agni), das in vedischen und
      puranischen Texten verwendet wird, um seine göttlichen Manifestationen oder seine Rolle als Zeuge
      in Ritualen zu beschreiben.
    it: Si riferisce alla forma o all'aspetto del fuoco (Agni), spesso usato nei testi vedici e puranici
      per descrivere le sue manifestazioni divine o il suo ruolo di testimone nei rituali.
    pt: Refere-se à forma ou aparência do fogo (Agni), frequentemente usado em textos védicos e purânicos
      para descrever suas manifestações divinas ou seu papel como testemunha em rituais.
    ru: Описывает форму или облик огня (Агни), часто используемое в ведических и пуранических текстах
      для описания божественных проявлений Агни или его роли свидетеля в ритуалах.
    ja: 火（アグニ）の形態や外観を指し、ヴェーダやプラーナ文献でアグニの神聖な顕現や儀式における証人としての役割を描写する際に用いられます。
    zh: 指火神（阿格尼）的形态或外观，常用于吠陀经和往世书文本中描述阿格尼的神圣显现或其在仪式中的见证者角色。
    ar: يشير إلى شكل أو مظهر النار (أغني)، ويُستخدم غالبًا في النصوص الفيدية والبورانية لوصف مظاهره الإلهية
