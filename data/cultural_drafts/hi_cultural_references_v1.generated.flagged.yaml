  short_explanation: Refers to proximity to fire, often in a literal sense (e.g., sitting near a hearth)
    or metaphorically (e.g., being close to divine energy or truth).
  i18n_explanations:
    en: Refers to proximity to fire, often in a literal sense (e.g., sitting near a hearth) or metaphorically
      (e.g., being close to divine energy or truth).
    es: Se refiere a la proximidad al fuego, ya sea en sentido literal (como sentarse cerca de un hogar)
      o metafórico (como estar cerca de energía divina o verdad).
    fr: Fait référence à la proximité du feu, souvent au sens littéral (comme s'asseoir près d'un foyer)
      ou métaphorique (comme être proche d'une énergie ou vérité divine).
    de: Bezieht sich auf die Nähe zum Feuer, oft im wörtlichen Sinne (z. B. in der Nähe eines Herdes sitzen)
      oder metaphorisch (z. B. in der Nähe göttlicher Energie oder Wahrheit sein).
    it: Si riferisce alla vicinanza al fuoco, spesso in senso letterale (come sedersi vicino a un focolare)
      o metaforico (come essere vicino a energia divina o verità).
    pt: Refere-se à proximidade do fogo, muitas vezes em sentido literal (como sentar-se perto de uma
      lareira) ou metafórico (como estar perto de energia divina ou verdade).
    ru: Относится к близости к огню, часто в буквальном смысле (например, сидеть у очага) или метафорически
      (например, быть близким к божественной энергии или истине).
    ja: 火に近い状態を指します。文字通りの意味（例えば炉端に座る）でも、比喩的な意味（神聖なエネルギーや真実に近づく）でも用いられます。
    zh: 指靠近火焰，通常是字面意思（如坐在炉边），或比喻义（如接近神圣能量或真理）。
    ar: يشير إلى القرب من النار، غالبًا بالمعنى الحرفي (مثل الجلوس بالقرب من موقد) أو المجازي (مثل الاقتراب
      من الطاقة الإلهية أو الحقيقة).
    he: מתייחסת לקרבה לאש, לרוב במשמעות מילולית (כגון ישיבה ליד אח) או מטפורית (כגון קרבה לאנרגיה אלוהית
