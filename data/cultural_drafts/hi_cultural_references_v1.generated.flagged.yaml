- id: hi_proverb_tradition_ठ_ड_ल_ह_4450e008
  language: hi
  canonical_reference: ठंडा लोहा
  reference_type: proverb_tradition
  surface_patterns:
  - ठंडा लोहा
  - ठंडा लोहा पड़ना
  - ठंडे लोहे से
  - ठंडे लोहे की तरह
  short_explanation: Refers to something that is unyielding, rigid, or unresponsive, often used metaphorically
    for a person or situation that is emotionally cold or unfeeling. The phrase originates from the literal
    meaning of cold iron, which is hard and unyielding.
  i18n_explanations:
    en: Refers to something that is unyielding, rigid, or unresponsive, often used metaphorically for
      a person or situation that is emotionally cold or unfeeling. The phrase originates from the literal
      meaning of cold iron, which is hard and unyielding.
    es: Se refiere a algo inflexible, rígido o insensible, usado metafóricamente para describir a una
      persona o situación emocionalmente fría o indiferente. La expresión proviene del significado literal
      del hierro frío, que es duro e inflexible.
    fr: Désigne quelque chose d'inflexible, rigide ou insensible, souvent utilisé métaphoriquement pour
      une personne ou une situation émotionnellement froide ou indifférente. L'expression vient du sens
      littéral du fer froid, dur et inflexible.
    de: Bezeichnet etwas Unnachgiebiges, Starres oder Unempfängliches, oft metaphorisch für eine emotional
      kalte oder gefühllose Person oder Situation. Der Ausdruck stammt von der wörtlichen Bedeutung von
      kaltem Eisen, das hart und unnachgiebig ist.
    it: Si riferisce a qualcosa di inflessibile, rigido o insensibile, usato metaforicamente per una persona
      o situazione emotivamente fredda o indifferente. L'espressione deriva dal significato letterale
      del ferro freddo, duro e inflessibile.
    pt: Refere-se a algo inflexível, rígido ou insensível, usado metaforicamente para descrever uma pessoa
      ou situação emocionalmente fria ou indiferente. A expressão vem do significado literal do ferro
      frio, que é duro e inflexível.
    ru: Означает что-то негнущееся, жёсткое или невосприимчивое, часто метафорически используется для
      описания человека или ситуации, эмоционально холодных или безразличных. Выражение происходит от
      буквального значения холодного железа, которое твёрдое и негнущееся.
    ja: 硬くて融通が利かない、感情的に冷たい人や状況を表す比喩表現。語源は文字通りの「冷たい鉄」で、硬くて曲がらない性質から来ている。
    zh: 指坚硬、顽固或无动于衷的事物，常用于比喻情感冷漠或无情的人或情况。源自字面意思的冷铁，坚硬且不屈。
    ar: يشير إلى شيء جامد أو قاس أو غير مستجيب، ويُستخدم مجازًا لوصف شخص أو موقف عاطفيًا باردًا أو غير
      مبالي. originates from the literal meaning of cold iron, which is hard and unyielding.
    he: מתייחס למשהו נוקשה, קשיח או חסר רגש, לעיתים קרובות באופן מטפורי לאדם או מצב קרים רגשית או אדישים.
      הביטוי נובע ממשמעות המילולית של ברזל קר, שהוא קשה ובלתי ניתן לכיפוף.
