  - अग्नि का पुत्र कहलाना
  short_explanation: Refers to Kartikeya (Murugan in Tamil tradition), the Hindu god of war, born from
    the fiery seed of Shiva. Symbolizes divine power and valor.
  i18n_explanations:
    en: Refers to Kartikeya (Murugan in Tamil tradition), the Hindu god of war, born from the fiery seed
      of Shiva. Symbolizes divine power and valor.
    es: Se refiere a Kartikeya (Murugan en la tradición tamil), el dios hindú de la guerra, nacido de
      la semilla ardiente de Shiva. Simboliza poder y valor divinos.
    fr: Fait référence à Kartikeya (Murugan dans la tradition tamoule), le dieu hindou de la guerre, né
      de la semence ardente de Shiva. Symbolise le pouvoir et la valeur divins.
    de: Bezieht sich auf Kartikeya (Murugan in der tamilischen Tradition), den hinduistischen Kriegsgott,
      der aus Shivas feurigem Samen geboren wurde. Symbolisiert göttliche Kraft und Tapferkeit.
    it: Si riferisce a Kartikeya (Murugan nella tradizione tamil), il dio induista della guerra, nato
      dal seme infuocato di Shiva. Simboleggia il potere e il valore divini.
    pt: Refere-se a Kartikeya (Murugan na tradição tâmil), o deus hindu da guerra, nascido da semente
      ardente de Shiva. Simboliza poder e valor divinos.
    ru: Относится к Картикее (Муругану в тамильской традиции), богу войны в индуизме, рождённому из огненного
      семени Шивы. Символизирует божественную силу и доблесть.
    ja: カルティケーヤ（タミルの伝統ではムルガン）を指す。シヴァの炎の精子から生まれた戦いの神。神聖な力と勇気を象徴する。
    zh: 指的是战神迦梨陀（泰米尔传统中的穆鲁甘），湿婆的火焰之子。象征神圣的力量与勇气。
    ar: يشير إلى كارتيكيا (موروغان في التقليد التاميلي)، إله الحرب الهندوسي، المولود من بذرة شيفا النارية.
      يرمز إلى القوة والشجاعة الإلهيتين.
    he: מתייחס לקרטיקיה (מורוגן במסורת הטמילית), אל המלחמה ההינדי, שנולד מזרעו האש של שיווה. מסמל כוח
      וגבורה אלוהיים.
