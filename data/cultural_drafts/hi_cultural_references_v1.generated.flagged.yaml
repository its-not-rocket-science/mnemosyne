  short_explanation: A cultural and political reference to the debate surrounding the status of Hinduism
    as India's 'national religion,' reflecting historical, legal, and social discussions about secularism
    and religious identity in India.
  i18n_explanations:
    en: A cultural and political reference to the debate surrounding the status of Hinduism as India's
      'national religion,' reflecting historical, legal, and social discussions about secularism and religious
      identity in India.
    es: Una referencia cultural y política al debate sobre el estatus del hinduismo como 'religión nacional'
      de la India, reflejando discusiones históricas, legales y sociales sobre el secularismo y la identidad
      religiosa en el país.
    fr: Une référence culturelle et politique au débat entourant le statut de l'hindouisme comme 'religion
      nationale' de l'Inde, reflétant des discussions historiques, juridiques et sociales sur le sécularisme
      et l'identité religieuse dans le pays.
    de: Ein kultureller und politischer Verweis auf die Debatte um den Status des Hinduismus als 'Nationalreligion'
      Indiens, die historische, rechtliche und soziale Diskussionen über Säkularismus und religiöse Identität
      in Indien widerspiegelt.
    it: Un riferimento culturale e politico al dibattito sullo status dell'induismo come 'religione nazionale'
      dell'India, che riflette discussioni storiche, legali e sociali sul secolarismo e l'identità religiosa
      nel paese.
    pt: Uma referência cultural e política ao debate sobre o status do hinduísmo como 'religião nacional'
      da Índia, refletindo discussões históricas, legais e sociais sobre secularismo e identidade religiosa
      no país.
    ru: Культурный и политический термин, отражающий дискуссии о статусе индуизма как 'национальной религии'
      Индии, включая исторические, правовые и социальные обсуждения секуляризма и религиозной идентичности
      в стране.
    ja: インドにおけるヒンドゥー教の「国教」としての地位に関する議論を指す文化的・政治的な言及。インドの世俗主義と宗教的アイデンティティに関する歴史的、法的、社会的な議論を反映する。
    zh: 印度教作为印度“国教”地位的争议的文化与政治表述，反映了印度关于世俗主义与宗教认同的历史、法律与社会讨论。
