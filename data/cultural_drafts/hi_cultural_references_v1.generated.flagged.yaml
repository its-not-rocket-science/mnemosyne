  short_explanation: Refers to Alexander the Great's invasion of India in 326 BCE, a significant event
    in ancient Indian history. Often discussed in the context of cultural exchange and military history.
  i18n_explanations:
    en: Refers to Alexander the Great's invasion of India in 326 BCE, a significant event in ancient Indian
      history. Often discussed in the context of cultural exchange and military history.
    es: Se refiere a la invasión de la India por Alejandro Magno en el 326 a.C., un evento significativo
      en la historia antigua de la India. Suele analizarse en el contexto del intercambio cultural y la
      historia militar.
    fr: Fait référence à l'invasion de l'Inde par Alexandre le Grand en 326 av. J.-C., un événement marquant
      de l'histoire ancienne de l'Inde. Souvent étudié dans le contexte des échanges culturels et de l'histoire
      militaire.
    de: Bezieht sich auf den Einmarsch Alexanders des Großen in Indien im Jahr 326 v. Chr., ein bedeutendes
      Ereignis der antiken indischen Geschichte. Wird oft im Kontext von Kulturaustausch und Militärgeschichte
      diskutiert.
    it: Si riferisce all'invasione dell'India da parte di Alessandro Magno nel 326 a.C., un evento significativo
      della storia antica indiana. Spesso discusso nel contesto degli scambi culturali e della storia
      militare.
    pt: Refere-se à invasão da Índia por Alexandre, o Grande, em 326 a.C., um evento significativo da
      história antiga indiana. Geralmente discutido no contexto de trocas culturais e história militar.
    ru: Описывает вторжение Александра Македонского в Индию в 326 году до н.э., значительное событие древней
      индийской истории. Часто обсуждается в контексте культурного обмена и военной истории.
    ja: 紀元前326年にアレクサンドロス大王が行ったインド侵攻を指す。古代インド史における重要な出来事であり、文化交流や軍事史の文脈で議論されることが多い。
    zh: 指的是公元前326年亚历山大大帝对印度的入侵，古印度历史上的一个重要事件。通常在文化交流和军事史的背景下讨论。
    ar: يشير إلى غزو الإسكندر الأكبر للهند عام 326 قبل الميلاد، وهو حدث مهم في التاريخ الهندي القديم.
      غالبًا ما يناقش في سياق التبادل الثقافي والتاريخ العسكري.
    he: מתייחס לפלישתו של אלכסנדר הגדול להודו בשנת 326 לפנה"ס, אירוע משמעותי בהיסטוריה העתיקה של הודו.
