  short_explanation: A Vedic mantra from the Rigveda (10.121) invoking the golden embryo (Hiranyagarbha),
    symbolizing the origin of the universe and the creative principle in Hindu cosmology.
  i18n_explanations:
    en: A Vedic mantra from the Rigveda (10.121) invoking the golden embryo (Hiranyagarbha), symbolizing
      the origin of the universe and the creative principle in Hindu cosmology.
    es: Un mantra védico del Rigveda (10.121) que invoca el embrión dorado (Hiranyagarbha), simbolizando
      el origen del universo y el principio creativo en la cosmología hindú.
    fr: Un mantra védique du Rigveda (10.121) invoquant l'embryon d'or (Hiranyagarbha), symbolisant l'origine
      de l'univers et le principe créateur dans la cosmologie hindoue.
    de: Ein vedischer Mantra aus dem Rigveda (10.121), der den goldenen Embryo (Hiranyagarbha) anruft
      und den Ursprung des Universums sowie das schöpferische Prinzip in der hinduistischen Kosmologie
      symbolisiert.
    it: Un mantra vedico del Rigveda (10.121) che invoca l'embrione dorato (Hiranyagarbha), simbolo dell'origine
      dell'universo e del principio creativo nella cosmologia induista.
    pt: Um mantra védico do Rigveda (10.121) que invoca o embrião dourado (Hiranyagarbha), simbolizando
      a origem do universo e o princípio criativo na cosmologia hindu.
    ru: Веддийский мантра из Ригведы (10.121), призывающая золотой зародыш (Хираньягарбху), символизирующий
      происхождение вселенной и творческий принцип в индуистской космологии.
    ja: リグヴェーダ（10.121）に収められたヴェーダのマントラで、黄金の胎児（ヒラニヤガルバ）を呼び起こし、宇宙の起源とヒンドゥー宇宙論における創造原理を象徴する。
    zh: 《梨俱吠陀》（10.121）中的吠陀咒语，祈求金胎（Hiranyagarbha），象征宇宙起源及印度教宇宙论中的创造原理。
    ar: مقطوعة من الريجفدا (10.121) تدعو الجنين الذهبي ( Hiranyagarbha )، ترمز إلى أصل الكون والمبدأ الخلاق
      في الكوزمولوجيا الهندوسية.
    he: מנטרה וודית מתוך הריג ודה (10.121) הקוראת לעובר הזהוב (הירניאגרבה), המסמלת את מקור היקום ועקרון
      הבריאה בקוסמולוגיה ההינדית.
