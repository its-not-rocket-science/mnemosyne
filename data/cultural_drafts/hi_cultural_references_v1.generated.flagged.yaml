- id: hi_proverb_tradition_ज_स_न_ग_व_स_स_व_856ce114
  language: hi
  canonical_reference: जैसे नागा वैसे सेवा
  reference_type: proverb_tradition
  surface_patterns:
  - जैसे नागा वैसे सेवा
  - नागा जैसा सेवा
  short_explanation: Implies that service or behavior should match the nature or status of the person
    being served. Derived from the word 'naga' (naked), suggesting that one should serve in a manner appropriate
    to the recipient's condition.
  i18n_explanations:
    en: Implies that service or behavior should match the nature or status of the person being served.
      Derived from the word 'naga' (naked), suggesting that one should serve in a manner appropriate to
      the recipient's condition.
    es: Implica que el servicio o comportamiento debe adaptarse a la naturaleza o estatus de la persona
      servida. Proviene de la palabra 'naga' (desnudo), sugiriendo que se debe servir de manera adecuada
      a la condición del receptor.
    fr: Implique que le service ou le comportement doit correspondre à la nature ou au statut de la personne
      servie. Vient du mot 'naga' (nu), suggérant qu'il faut servir de manière appropriée à la condition
      du bénéficiaire.
    de: Beinhaltet, dass Dienstleistung oder Verhalten dem Wesen oder Status der bedienten Person entsprechen
      sollten. Stammt vom Wort 'naga' (nackt) und deutet darauf hin, dass man auf angemessene Weise dienen
      sollte.
    it: Implica che il servizio o il comportamento debba corrispondere alla natura o allo status della
      persona servita. Deriva dalla parola 'naga' (nudo), suggerendo di servire in modo appropriato alla
      condizione del ricevente.
    pt: Implica que o serviço ou comportamento deve corresponder à natureza ou ao status da pessoa servida.
      Deriva da palavra 'naga' (nu), sugerindo servir de maneira apropriada à condição do receptor.
    ru: Подразумевает, что обслуживание или поведение должны соответствовать природе или статусу обслуживаемого
      человека. Происходит от слова 'naga' (голый), suggesting that one should serve in a manner appropriate
      to the recipient's condition.
    ja: 奉仕や行動は、相手の性質や地位に応じたものであるべきだという意味。'ナガ'（裸）という言葉から派生し、受け手の状況に適した方法で奉仕すべきだという示唆を含む。
    zh: 意味着服务或行为应与被服务者的性质或地位相匹配。源自词语'naga'（裸体），建议应以与受服务者状况相适应的方式提供服务。
    ar: يشير إلى أن الخدمة أو السلوك يجب أن يتوافق مع طبيعة أو وضع الشخص الذي يتم خدمته. مشتق من كلمة
      'ناغا' (عريان)، مما يوحي بضرورة تقديم الخدمة بطريقة تتناسب مع حالة المتلقي.
    he: מרמז שיש להתאים את השירות או ההתנהגות לטבע או למעמד של האדם הנעזר. נובע מהמילה 'נאגה' (עירום),
      ומציע שיש לשרת באופן הולם למצבו של המקבל.
