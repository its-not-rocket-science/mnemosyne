  short_explanation: Refers to the betrayal of Jayachandra (Prithviraj Chauhan's father-in-law) during
    the Second Battle of Tarain (1192), often cited as a symbol of treachery in Indian history and literature.
  i18n_explanations:
    en: Refers to the betrayal of Jayachandra (Prithviraj Chauhan's father-in-law) during the Second Battle
      of Tarain (1192), often cited as a symbol of treachery in Indian history and literature.
    es: Se refiere a la traición de Jayachandra (suegro de Prithviraj Chauhan) durante la Segunda Batalla
      de Tarain (1192), frecuentemente citada como símbolo de perfidia en la historia y literatura india.
    fr: Fait référence à la trahison de Jayachandra (beau-père de Prithviraj Chauhan) lors de la deuxième
      bataille de Tarain (1192), souvent citée comme symbole de perfidie dans l'histoire et la littérature
      indiennes.
    de: Bezieht sich auf den Verrat von Jayachandra (Schwiegervater von Prithviraj Chauhan) während der
      zweiten Schlacht von Tarain (1192), oft als Symbol für Verrat in der indischen Geschichte und Literatur
      zitiert.
    it: Si riferisce al tradimento di Jayachandra (suocero di Prithviraj Chauhan) durante la seconda battaglia
      di Tarain (1192), spesso citato come simbolo di tradimento nella storia e nella letteratura indiana.
    pt: Refere-se à traição de Jayachandra (sogro de Prithviraj Chauhan) durante a Segunda Batalha de
      Tarain (1192), frequentemente citada como símbolo de perfídia na história e literatura indianas.
    ru: Относится к предательству Джаячандры (тестя Притхвираджа Чаухана) во время второй битвы при Тараине
      (1192 год), часто цитируемому как символ вероломства в индийской истории и литературе.
    ja: 1192年の第二次タラインの戦いで、プリトヴィーラージ・チャウハンの義父であるジャヤチャンドラが裏切ったことを指す。インドの歴史と文学における裏切りの象徴としてしばしば引用される。
    zh: 指1192年第二次塔赖茵战役中，普里特维拉杰·乔汉的岳父查亚昌德的背叛。常被视为印度历史与文学中背叛的象征。
    ar: يشير إلى خيانة جاياشاندرا (حمو بريثفيراج تشوهان) خلال المعركة الثانية فيTarain (1192)، وغالبًا
      ما تُذكر كرمز للخيانة في التاريخ والأدب الهندي.
    he: מתייחס לבגידתו של ג'איאצ'אנדרה (חמיו של פריטוויראג' צ'אוהאן) במהלך הקרב השני בטראין (1192). לעיתים
