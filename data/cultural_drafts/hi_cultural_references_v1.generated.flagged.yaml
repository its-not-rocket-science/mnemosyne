- id: hi_classical_or_scriptural_allusion_ह_रण_यगर_भ_स_ज_म_9e96a924
  language: hi
  canonical_reference: हिरण्यगर्भः सृजामि
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
