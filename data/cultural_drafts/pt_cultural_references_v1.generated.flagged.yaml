- id: pt_cultural_reference_a_convenção_de_gramido_1847_82034bd1
  language: pt
  canonical_reference: a Convenção de Gramido (1847)
  reference_type: cultural_reference
  surface_patterns:
  - a Convenção de Gramido
  - Convenção de Gramido
  - Convenção do Gramido
  short_explanation: A treaty signed in 1847 that ended the Portuguese Civil War (1828-1834), establishing
    peace between liberal and absolutist factions. It marked the consolidation of liberalism in Portugal.
  i18n_explanations:
    en: A treaty signed in 1847 that ended the Portuguese Civil War (1828-1834), establishing peace between
      liberal and absolutist factions. It marked the consolidation of liberalism in Portugal.
    es: Un tratado firmado en 1847 que puso fin a la Guerra Civil Portuguesa (1828-1834), estableciendo
      la paz entre facciones liberales y absolutistas. Marcó la consolidación del liberalismo en Portugal.
    fr: Un traité signé en 1847 qui mit fin à la guerre civile portugaise (1828-1834), établissant la
      paix entre factions libérales et absolutistes. Il marqua la consolidation du libéralisme au Portugal.
    de: Ein 1847 unterzeichneter Vertrag, der den portugiesischen Bürgerkrieg (1828-1834) beendete und
      Frieden zwischen liberalen und absolutistischen Fraktionen herstellte. Er markierte die Konsolidierung
      des Liberalismus in Portugal.
    it: Un trattato firmato nel 1847 che pose fine alla guerra civile portoghese (1828-1834), stabilendo
      la pace tra fazioni liberali e assolutiste. Segnò la consolidazione del liberalismo in Portogallo.
    pt: Um tratado assinado em 1847 que pôs fim à Guerra Civil Portuguesa (1828-1834), estabelecendo a
      paz entre facções liberais e absolutistas. Marcou a consolidação do liberalismo em Portugal.
    ru: Договор, подписанный в 1847 году, положивший конец португальской гражданской войне (1828–1834)
      и установивший мир между либеральными и абсолютистскими фракциями. Он ознаменовал консолидацию либерализма
      в Португалии.
    ja: 1847年に署名された条約で、ポルトガル内戦（1828-1834年）を終結させ、自由主義派と絶対主義派の和平を確立した。ポルトガルにおける自由主義の定着を示した。
    zh: 1847年签署的一项条约，结束了葡萄牙内战（1828-1834年），在自由派与保守派之间建立了和平。标志着自由主义在葡萄牙的确立。
    ar: معاهدة وقعتها البرتغال عام 1847 وأنهت الحرب الأهلية البرتغالية (1828-1834)، مما أسس السلام بين
      الفصائل الليبرالية والمت保لية. وكرست هذا الاتفاق ترسيخ الليبرالية في البرتغال.
    he: אמנה שנחתמה ב-1847 שהביאה לסיום מלחמת האזרחים הפורטוגלית (1828-1834), תוך כינון שלום בין הפלגים
      הליברליים והאבסולוטיסטיים. סימנה את התבססות הליברליזם בפורטוגל.
