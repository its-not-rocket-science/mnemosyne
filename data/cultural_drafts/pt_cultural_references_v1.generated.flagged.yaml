- id: pt_cultural_reference_a_fundação_da_pátria_portuguesa_por_viriato_52fe56d5
  language: pt
  canonical_reference: a Fundação da Pátria Portuguesa por Viriato
  reference_type: cultural_reference
  surface_patterns:
  - Fundação da Pátria Portuguesa por Viriato
  - Viriato como fundador de Portugal
  - Lenda de Viriato e a resistência lusitana
  - Viriato, herói nacional português
  short_explanation: A mythologized reference to Viriato, a Lusitanian leader who resisted Roman rule
    in the 2nd century BCE. Though historically Viriato did not found Portugal, he is mythologized as
    a symbol of Portuguese resistance and national identity.
  i18n_explanations:
    en: A mythologized reference to Viriato, a Lusitanian leader who resisted Roman rule in the 2nd century
      BCE. Though historically Viriato did not found Portugal, he is mythologized as a symbol of Portuguese
      resistance and national identity.
    es: Referencia mitificada a Viriato, líder lusitano que resistió el dominio romano en el siglo II
      a.C. Aunque históricamente Viriato no fundó Portugal, es mitificado como símbolo de la resistencia
      y la identidad nacional portuguesa.
    fr: Référence mythifiée à Viriate, chef lusitanien qui résista à la domination romaine au IIe siècle
      av. J.-C. Bien qu'historiquement Viriate n'ait pas fondé le Portugal, il est mythifié comme symbole
      de la résistance et de l'identité nationale portugaise.
    de: Eine mythische Bezugnahme auf Viriatus, einen lusitanischen Anführer, der im 2. Jahrhundert v.
      Chr. gegen die römische Herrschaft Widerstand leistete. Obwohl Viriatus historisch Portugal nicht
      gründete, wird er als Symbol des portugiesischen Widerstands und der nationalen Identität mythologisiert.
    it: Riferimento mitizzato a Viriato, leader lusitano che resistette al dominio romano nel II secolo
      a.C. Sebbene storicamente Viriato non abbia fondato il Portogallo, è mitizzato come simbolo della
      resistenza e dell'identità nazionale portoghese.
    pt: Referência mitificada a Viriato, líder lusitano que resistiu ao domínio romano no século II a.C.
      Embora historicamente Viriato não tenha fundado Portugal, é mitificado como símbolo da resistência
      e identidade nacional portuguesa.
    ru: Мифологизированное упоминание Вириата, лигурийского лидера, который сопротивлялся римскому правлению
      во II веке до н.э. Хотя исторически Вириат не основал Португалию, он мифологизируется как символ
      португальского сопротивления и национальной идентичности.
    ja: 紀元前2世紀にローマ支配に抵抗したルシタニアの指導者ヴィリアトゥスへの神話的言及。歴史的にはヴィリアトゥスがポルトガルを建国したわけではないが、ポルトガルの抵抗と国家アイデンティティの象徴として神話化されている。
    zh: 对维里亚托的神话化描述，他是公元前2世纪抵抗罗马统治的卢西塔尼亚领袖。尽管历史上维里亚托并未建立葡萄牙，但他被神话为葡萄牙抵抗与民族认同的象征。
    ar: إشارة أسطورية إلى فيرياتو، زعيم لوسيتاني قاوم الحكم الروماني في القرن الثاني قبل الميلاد. على
      الرغم من أن فيرياتو لم يؤسس البرتغال تاريخياً، إلا أنه يُمجّد كرمز للمقاومة والهوية الوطنية البرتغالية.
    he: התייחסות מיתולוגית לוירייאטו, מנהיג לוסיטני שמרד בשלטון הרומי במאה השנייה לפני הספירה. אף שוירייאטו
      לא ייסד היסטורית את פורטוגל, הוא מיתולוגי כסמל ההתנגדות והזהות הלאומית הפורטוגלית.
