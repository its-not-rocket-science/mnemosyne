- id: pt_classical_or_scriptural_allusion_a_lenda_de_lázaro_e_o_rico_avareza_1eaf70c2
  language: pt
  canonical_reference: a Lenda de Lázaro e o Rico Avareza
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Lázaro e o Rico Avareza
  - lenda de Lázaro e o Rico
  - o Rico e Lázaro
  - parábola do Rico e Lázaro
  short_explanation: A biblical parable from the Gospel of Luke about a rich man who ignores a poor beggar
    (Lazarus) at his gate, only to face damnation after death. It teaches moral lessons about compassion
    and humility.
  i18n_explanations:
    en: A biblical parable from the Gospel of Luke about a rich man who ignores a poor beggar (Lazarus)
      at his gate, only to face damnation after death. It teaches moral lessons about compassion and humility.
    es: Una parábola bíblica del Evangelio de Lucas sobre un hombre rico que ignora a un pobre mendigo
