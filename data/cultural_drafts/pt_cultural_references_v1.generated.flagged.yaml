  - lenda de D. João e a Freira de Évora
  - a Freira de Évora
  - D. João de Évora
  short_explanation: A medieval legend from Évora, Portugal, about a nobleman (D. João) who falls in love
    with a nun, leading to a tragic outcome. It reflects themes of forbidden love and religious constraints
    in medieval society.
  i18n_explanations:
    en: A medieval legend from Évora, Portugal, about a nobleman (D. João) who falls in love with a nun,
      leading to a tragic outcome. It reflects themes of forbidden love and religious constraints in medieval
      society.
    es: Una leyenda medieval de Évora, Portugal, sobre un noble (D. João) que se enamora de una monja,
      lo que lleva a un trágico desenlace. Refleja temas de amor prohibido y las restricciones religiosas
      en la sociedad medieval.
    fr: Une légende médiévale d'Évora, au Portugal, sur un noble (D. João) qui tombe amoureux d'une religieuse,
      menant à une issue tragique. Elle reflète les thèmes de l'amour interdit et des contraintes religieuses
      dans la société médiévale.
    de: Eine mittelalterliche Legende aus Évora, Portugal, über einen Adligen (D. João), der sich in eine
      Nonne verliebt, was zu einem tragischen Ausgang führt. Sie spiegelt Themen verbotener Liebe und
      religiöser Zwänge in der mittelalterlichen Gesellschaft wider.
    it: Una leggenda medievale di Évora, in Portogallo, su un nobile (D. João) che si innamora di una
      suora, portando a un tragico epilogo. Riflette temi di amore proibito e vincoli religiosi nella
      società medievale.
    pt: Uma lenda medieval de Évora, Portugal, sobre um nobre (D. João) que se apaixona por uma freira,
      levando a um desfecho trágico. Reflete temas de amor proibido e restrições religiosas na sociedade
      medieval.
    ru: Средневековая легенда из Эворы, Португалия, о знатном человеке (D. João), который влюбляется в
      монахиню, что приводит к трагическому исходу. Она отражает темы запретной любви и религиозных ограничений
      в средневековом обществе.
    ja: ポルトガルのエヴォラ発祥の medieval な伝説で、貴族（D. João）が修道女に恋をし、悲劇的な結末を迎える。中世社会における禁断の愛と宗教的制約を反映している。
    zh: 葡萄牙埃武拉的中世纪传说，讲述贵族D. João爱上修女，最终酿成悲剧。反映了中世纪社会中禁忌之爱与宗教束缚的主题。
    ar: أسطورة من القرون الوسطى من إبورا، البرتغال، تحكي عن نبيل (D. João) يقع في حب راهبة، مما يؤدي إلى
      نهاية مأساوية. تعكس مواضيع الحب المحرم والقيود الدينية في المجتمع الأوروبي في العصور الوسطى.
    he: אגדה מימי הביניים מאבור, פורטוגל, על אציל (D. João) שהתאהב בנזירה, מה שהוביל לתוצאה טרגית. משקפת
