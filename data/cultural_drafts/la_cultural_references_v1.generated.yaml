  short_explanation: A phrase suggesting that justice is called for when little remains to be done, often
    used to emphasize the importance of fairness in critical moments. It reflects Roman legal and rhetorical
    ideals.
  i18n_explanations:
    en: A phrase suggesting that justice is called for when little remains to be done, often used to emphasize
      the importance of fairness in critical moments. It reflects Roman legal and rhetorical ideals.
    es: Frase que sugiere que se exige justicia cuando queda poco por hacer, usada para enfatizar la importancia
      de la equidad en momentos críticos. Refleja ideales legales y retóricos romanos.
    fr: Une phrase suggérant que la justice est requise quand il reste peu à faire, souvent utilisée pour
      souligner l'importance de l'équité dans les moments critiques. Elle reflète les idéaux juridiques
      et rhétoriques romains.
    de: Ein Spruch, der nahelegt, dass Gerechtigkeit gefordert wird, wenn wenig zu tun bleibt, oft verwendet,
      um die Bedeutung von Fairness in kritischen Momenten zu betonen. Er spiegelt römische Rechts- und
      Redekunstideale wider.
    it: Un detto che suggerisce che la giustizia è richiesta quando rimane poco da fare, usato per enfatizzare
      l'importanza dell'equità nei momenti critici. Riflette gli ideali giuridici e retorici romani.
    pt: Uma frase que sugere que a justiça é exigida quando resta pouco a fazer, frequentemente usada
      para enfatizar a importância da equidade em momentos críticos. Reflete ideais jurídicos e retóricos
      romanos.
    ru: Фраза, подразумевающая, что справедливость необходима, когда остаётся мало дел, часто используется
      для подчёркивания важности честности в критических моментах. Отражает римские идеалы права и риторики.
    ja: ' justice（正義）が求められるのは、やるべきことがほとんど残っていない時だと示唆する言葉で、危機的な局面で公平性の重要性を強調する際に用いられる。ローマの法と修辞学の理想を反映している。'
    zh: 一个说法，暗示在所剩无几时需要伸张正义，常用于强调关键时刻公平的重要性。体现了罗马法律与修辞理想。
    ar: عبارة تشير إلى أن العدالة تُطالب بها عندما يبقى القليل ليفعل، وغالباً ما تُستخدم لتأكيد أهمية
