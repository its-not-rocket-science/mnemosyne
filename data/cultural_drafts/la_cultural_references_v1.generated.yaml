  short_explanation: A Latin phrase meaning 'the masks of the drama,' referring to the list of characters
    in a play. It is now used more broadly for any cast of characters in literature or media.
  i18n_explanations:
    en: A Latin phrase meaning 'the masks of the drama,' referring to the list of characters in a play.
      It is now used more broadly for any cast of characters in literature or media.
    es: Una frase latina que significa 'las máscaras del drama', que se refiere a la lista de personajes
      en una obra de teatro. Hoy se usa más ampliamente para cualquier reparto de personajes en literatura
      o medios.
    fr: Une expression latine signifiant 'les masques du drame', désignant la liste des personnages d'une
      pièce de théâtre. Elle est aujourd'hui utilisée plus largement pour tout casting de personnages
      dans la littérature ou les médias.
    de: Ein lateinischer Ausdruck mit der Bedeutung 'die Masken des Dramas', der sich auf die Liste der
      Figuren in einem Theaterstück bezieht. Heute wird er allgemeiner für jede Besetzung von Figuren
      in Literatur oder Medien verwendet.
    it: Una frase latina che significa 'le maschere del dramma', riferita all'elenco dei personaggi in
      un'opera teatrale. Oggi viene usata più in generale per qualsiasi cast di personaggi in letteratura
      o nei media.
    pt: Uma expressão latina que significa 'as máscaras do drama', referindo-se à lista de personagens
      em uma peça teatral. Hoje é usada de forma mais ampla para qualquer elenco de personagens na literatura
      ou mídia.
    ru: Латинское выражение, означающее 'маски драмы', относится к списку персонажей в пьесе. Сегодня
      оно используется шире для обозначения любого состава персонажей в литературе или СМИ.
    ja: 「劇の仮面」を意味するラテン語で、演劇における登場人物のリストを指す。今日では文学やメディアにおける登場人物の総称として広く使われる。
    zh: 拉丁语短语，意为“戏剧的面具”，指代剧本中的人物列表。现今更广泛用于指代文学或媒体中的任何角色阵容。
    ar: عبارة لاتينية تعني 'أقنعة الدراما'، وتشير إلى قائمة الشخصيات في مسرحية. تُستخدم الآن بشكل أوسع
