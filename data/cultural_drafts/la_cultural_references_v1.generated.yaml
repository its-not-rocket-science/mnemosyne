  short_explanation: A proverb meaning 'An eagle does not catch flies,' symbolizing that great people
    do not concern themselves with trivial matters. It reflects Roman ideals of magnanimity and focus
    on the important.
  i18n_explanations:
    en: A proverb meaning 'An eagle does not catch flies,' symbolizing that great people do not concern
      themselves with trivial matters. It reflects Roman ideals of magnanimity and focus on the important.
    es: Un proverbio que significa 'Un águila no caza moscas,' simbolizando que las personas grandes no
      se preocupan por asuntos triviales. Refleja los ideales romanos de magnanimidad y enfoque en lo
      importante.
    fr: Un proverbe signifiant 'Un aigle ne chasse pas les mouches,' symbolisant que les grands esprits
      ne s'abaissent pas à des choses insignifiantes. Il reflète les idéaux romains de magnanimité et
      de concentration sur l'essentiel.
    de: Ein Sprichwort mit der Bedeutung 'Ein Adler fängt keine Fliegen,' das symbolisiert, dass große
      Menschen sich nicht mit unwichtigen Dingen beschäftigen. Es spiegelt römische Ideale von Großmut
      und Fokus auf das Wesentliche wider.
    it: Un proverbio che significa 'Un'aquila non caccia le mosche,' simbolizzando che le persone grandi
      non si curano di cose banali. Riflette gli ideali romani di magnanimità e concentrazione su ciò
      che conta.
    pt: Um provérbio que significa 'Uma águia não caça moscas,' simbolizando que pessoas grandes não se
      preocupam com coisas triviais. Reflete os ideais romanos de magnanimidade e foco no que é importante.
    ru: Поговорка со значением 'Орёл не ловит мух,' символизирующая, что великие люди не занимаются пустяками.
      Отражает римские идеалы великодушия и сосредоточенности на главном.
    ja: 「鷲はハエを捕まえない」という意味の格言で、偉大な人は些細なことに関わらないことを象徴する。ローマの寛大さと重要なことに集中する理想を反映している。
    zh: 一句谚语，意为‘鹰不捕蝇’，象征伟人不屑琐事。体现罗马人崇尚宽宏大量、专注要事的理想。
    ar: مثل يعني 'النسر لا يصطاد الذباب'، يرمز إلى أن العظماء لا يهتمون بالأمور التافهة. يعكس المثل العليا
