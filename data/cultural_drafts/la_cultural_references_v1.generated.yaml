- id: la_cultural_reference_captive_spectator_146d9305
  language: la
  canonical_reference: Captive spectator
  reference_type: cultural_reference
  surface_patterns:
  - captive spectator
  - captive spectators
  - the captive spectator
  short_explanation: A term describing an audience member who is metaphorically 'captive' to the performance,
    unable to leave or disengage fully. It originates from theater studies and critiques passive consumption
    of media.
  i18n_explanations:
    en: A term describing an audience member who is metaphorically 'captive' to the performance, unable
      to leave or disengage fully. It originates from theater studies and critiques passive consumption
      of media.
    es: Término que describe a un espectador 'cautivo' de la representación, incapaz de irse o desconectarse
      por completo. Surgió en estudios teatrales y critica el consumo pasivo de medios.
    fr: Un terme décrivant un spectateur 'captif' de la performance, incapable de partir ou de se détacher
      complètement. Issu des études théâtrales, il critique la consommation passive des médias.
    de: Ein Begriff für einen Zuschauer, der metaphorisch 'gefangen' von der Aufführung ist und sich nicht
      vollständig lösen oder gehen kann. Stammt aus der Theaterwissenschaft und kritisiert passive Medienkonsumhaltung.
    it: Un termine che descrive uno spettatore 'prigioniero' della performance, incapace di andarsene
      o disimpegnarsi completamente. Nasce dagli studi teatrali e critica il consumo passivo dei media.
    pt: Termo que descreve um espectador 'cativo' da performance, incapaz de sair ou se desengajar completamente.
      Originou-se em estudos teatrais e critica o consumo passivo de mídia.
    ru: Термин, описывающий зрителя, который метафорически 'пленён' представлением и не может полностью
      отвлечься или уйти. Происходит из театральных исследований и критикует пассивное потребление медиа.
    ja: 「捕らわれた観客」という用語で、パフォーマンスに metaphor的に 'とらわれた' 観客を指し、完全に離れたり切り離されたりできない状態を表す。劇場研究に由来し、メディアの受動的消費を批判する。
    zh: 一个术语，描述被表演‘俘获’的观众，无法完全离开或 disengage。源自戏剧研究，批评对媒体的被动消费。
    ar: مصطلح يصف متفرجًا 'أسيرًا' للأداء، غير قادر على المغادرة أو الانفصال تمامًا. نشأ في دراسات المسرح
