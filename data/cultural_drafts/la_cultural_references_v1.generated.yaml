      um Unglück abzuwenden, oft in abergläubischem oder rituellem Kontext.
    it: Locuzione latina che significa 'possa l'omen essere assente' o 'non ci sia un cattivo presagio'.
      Viene usata per scacciare la sfortuna o evitare disgrazie, spesso in contesti superstiziosi o rituali.
    pt: Expressão latina que significa 'que o presságio esteja ausente' ou 'que não haja mau presságio'.
