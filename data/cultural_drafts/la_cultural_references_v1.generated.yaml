    he: קרברוס הוא הכלב בעל שלושת הראשים השומר על שער העולם התחתון במיתולוגיה היוונית והרומית, הידוע בנביחותיו
      האימתניות. הביטוי 'Cerberus latrans' ('קרברוס הנובח') מתייחס לשומר המיתולוגי הזה.
