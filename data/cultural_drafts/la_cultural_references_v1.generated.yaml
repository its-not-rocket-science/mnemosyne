  - Dido Aeneae causa moritur
  short_explanation: Refers to the tragic death of Dido, Queen of Carthage, who kills herself after Aeneas
    abandons her in Virgil's *Aeneid*. Symbolizes unrequited love and despair.
  i18n_explanations:
    en: Refers to the tragic death of Dido, Queen of Carthage, who kills herself after Aeneas abandons
      her in Virgil's *Aeneid*. Symbolizes unrequited love and despair.
    es: Se refiere a la muerte trágica de Dido, reina de Cartago, quien se suicida tras ser abandonada
      por Eneas en la *Eneida* de Virgilio. Simboliza el amor no correspondido y la desesperación.
    fr: Fait référence à la mort tragique de Didon, reine de Carthage, qui se suicide après qu'Énée l'ait
      abandonnée dans l’*Énéide* de Virgile. Symbolise l'amour non partagé et le désespoir.
    de: Bezieht sich auf den tragischen Tod der Dido, Königin von Karthago, die sich nach Aeneas’ Abschied
      in Vergils *Aeneis* das Leben nimmt. Symbolisiert unerwiderte Liebe und Verzweiflung.
    it: Si riferisce alla tragica morte di Didone, regina di Cartagine, che si uccide dopo essere stata
      abbandonata da Enea nel poema *Eneide* di Virgilio. Simboleggia l'amore non corrisposto e la disperazione.
    pt: Refere-se à morte trágica de Dido, rainha de Cartago, que se suicida após ser abandonada por Eneias
      na *Eneida* de Virgílio. Simboliza o amor não correspondido e o desespero.
