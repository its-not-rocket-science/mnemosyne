  short_explanation: A medieval Latin legal maxim meaning 'Actors in church do not make clerics,' emphasizing
    that mere appearance or role-playing does not confer true status or authority.
  i18n_explanations:
    en: A medieval Latin legal maxim meaning 'Actors in church do not make clerics,' emphasizing that
      mere appearance or role-playing does not confer true status or authority.
    es: Máxima legal medieval en latín que significa 'Los actores en la iglesia no hacen clérigos', destacando
      que la mera apariencia o representación no confiere verdadero estatus o autoridad.
    fr: Un adage juridique médiéval latin signifiant 'Les acteurs dans l'église ne font pas des clercs',
      soulignant que l'apparence ou le jeu de rôle ne confère pas un véritable statut ou autorité.
    de: Ein mittelalterliches lateinisches Rechtsprinzip mit der Bedeutung 'Schauspieler in der Kirche
      machen keine Geistlichen', das betont, dass bloße Darstellung oder Rollenspiel keinen wahren Status
      oder Autorität verleiht.
    it: Un antico principio giuridico latino che significa 'Gli attori in chiesa non fanno chierici',
      sottolineando che l'apparenza o il ruolo recitato non conferiscono un vero status o autorità.
    pt: Um antigo princípio jurídico latino que significa 'Atores na igreja não fazem clérigos', enfatizando
      que a mera aparência ou representação não confere status ou autoridade verdadeiros.
    ru: Средневековая латинская правовая максима 'Актёры в церкви не делают клириков', подчёркивающая,
      что внешний вид или игра роли не дают истинного статуса или власти.
    ja: 「教会の俳優は聖職者にならない」という中世ラテン語の法格言で、外見や役割演技だけでは真の地位や権威は得られないことを強調する。
    zh: 中世纪拉丁法律格言，意为‘教堂中的演员不成修士’，强调外表或角色扮演并不能赋予真正的地位或权威。
    ar: مبدأ قانوني لاتيني قديم يعني 'الممثلون في الكنيسة لا يصيرون رجال دين'، مؤكدًا أن المظهر أو التمثيل
      لا يمنح مكانة أو سلطة حقيقية.
    he: עיקרון משפטי לטיני מימי הביניים שפירושו 'שחקנים בכנסייה אינם הופכים לכמרים', המדגיש כי הופעה או
