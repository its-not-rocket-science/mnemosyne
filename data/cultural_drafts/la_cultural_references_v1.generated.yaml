- id: la_proverb_tradition_mutatis_mutandis_86ad1b73
  language: la
  canonical_reference: Mutatis mutandis
  reference_type: proverb_tradition
  surface_patterns:
  - mutatis mutandis
  - mutatis mutandis (with the necessary changes having been made)
  - with the necessary changes
  short_explanation: A Latin phrase meaning 'with the necessary changes having been made,' used to indicate
    that a statement or principle applies generally but requires adjustments for specific cases. It is
    commonly employed in legal, academic, and diplomatic contexts.
  i18n_explanations:
    en: A Latin phrase meaning 'with the necessary changes having been made,' used to indicate that a
      statement or principle applies generally but requires adjustments for specific cases. It is commonly
      employed in legal, academic, and diplomatic contexts.
    es: Frase latina que significa 'hechas las modificaciones necesarias', usada para indicar que un principio
      se aplica en general pero requiere ajustes en casos específicos. Se emplea comúnmente en contextos
      legales, académicos y diplomáticos.
    fr: Locution latine signifiant 'les changements nécessaires ayant été apportés', utilisée pour indiquer
      qu'une affirmation ou un principe s'applique de manière générale mais nécessite des ajustements
      pour des cas spécifiques. Employée couramment dans les contextes juridiques, universitaires et diplomatiques.
    de: Ein lateinischer Ausdruck, der 'mit den notwendigen Änderungen' bedeutet und darauf hinweist,
      dass eine Aussage oder ein Prinzip allgemein gilt, aber für spezifische Fälle Anpassungen erfordert.
      Wird häufig in rechtlichen, akademischen und diplomatischen Kontexten verwendet.
    it: Locuzione latina che significa 'con i necessari cambiamenti apportati', usata per indicare che
      un'affermazione o un principio si applica in generale ma richiede adattamenti per casi specifici.
      Comunemente impiegata in contesti legali, accademici e diplomatici.
    pt: Expressão latina que significa 'feitas as alterações necessárias', usada para indicar que um princípio
      se aplica de modo geral, mas requer ajustes em casos específicos. Comumente empregada em contextos
      jurídicos, acadêmicos e diplomáticos.
    ru: Латинское выражение, означающее 'с необходимыми изменениями', используемое для указания на то,
      что утверждение или принцип применяется в общем случае, но требует корректировок для конкретных
      ситуаций. Часто используется в юридических, научных и дипломатических контекстах.
    ja: 「必要な変更を加えた上で」を意味するラテン語の成句で、原則や発言が一般的に当てはまるが、具体的なケースでは調整が必要であることを示す。法的、学術的、外交的な文脈でよく用いられる。
    zh: 拉丁语短语，意为“在必要的变更之后”，用于表示某个陈述或原则普遍适用，但在具体情况下需要调整。常用于法律、学术和外交语境。
    ar: عبارة لاتينية تعني 'بعد إجراء التغييرات اللازمة'، وتُستخدم للإشارة إلى أن مبدأً أو قولًا ينطبق
      بشكل عام لكنه يحتاج إلى تعديلات في حالات محددة. تُستخدم غالبًا في السياقات القانونية والأكاديمية
