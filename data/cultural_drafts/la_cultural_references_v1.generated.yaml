    religious centers in the ancient Greek world. Delphi became the site of the Oracle of Apollo, central
    to Greek religion and politics.
  i18n_explanations:
    en: Refers to the establishment of the cult of Apollo at Delphi, one of the most important religious
      centers in the ancient Greek world. Delphi became the site of the Oracle of Apollo, central to Greek
      religion and politics.
    es: Se refiere al establecimiento del culto a Apolo en Delfos, uno de los centros religiosos más importantes
      del mundo griego antiguo. Delfos se convirtió en el lugar del Oráculo de Apolo, fundamental en la
      religión y política griegas.
    fr: Fait référence à l'établissement du culte d'Apollon à Delphes, l'un des centres religieux les
      plus importants du monde grec antique. Delphes devint le site de l'Oracle d'Apollon, central dans
      la religion et la politique grecques.
    de: Bezieht sich auf die Gründung des Apollon-Kults in Delphi, einem der wichtigsten religiösen Zentren
      der antiken griechischen Welt. Delphi wurde zum Standort des Orakels von Apollon, das für die griechische
      Religion und Politik von zentraler Bedeutung war.
    it: Si riferisce all'istituzione del culto di Apollo a Delfi, uno dei centri religiosi più importanti
      del mondo greco antico. Delfi divenne il sito dell'Oracolo di Apollo, centrale nella religione e
      nella politica greche.
    pt: Refere-se ao estabelecimento do culto a Apolo em Delfos, um dos centros religiosos mais importantes
      do mundo grego antigo. Delfos tornou-se o local do Oráculo de Apolo, central na religião e política
      gregas.
    ru: Относится к основанию культа Аполлона в Дельфах, одном из важнейших религиозных центров древнего
      греческого мира. Дельфы стали местом Оракула Аполлона, центрального для греческой религии и политики.
    ja: 古代ギリシャ世界で最も重要な宗教的中心地の一つであったデルポイにアポロン信仰が始まったことを指す。デルポイはアポロンの神託所が置かれ、ギリシャの宗教と政治の中心となった。
    zh: 指在古希腊世界最重要的宗教中心之一——德尔斐建立阿波罗崇拜。德尔斐成为阿波罗神谕的所在地，对希腊宗教和政治具有核心地位。
    ar: يشير إلى تأسيس عبادة أبولو في دلف، أحد أهم المراكز الدينية في العالم اليوناني القديم. أصبحت دلف
      موقعًا لوحي أبولو، الذي كان محوريًا في الدين والسياسة اليونانيين.
    he: מתייחס להקמת פולחן אפולו בדלפי, אחד ממרכזי הדת החשובים ביותר בעולם היווני העתיק. דלפי הפכה למיקום
      הנבואה של אפולו, שהייתה מרכזית בדת ובפוליטיקה היווניות.
