  short_explanation: A proverb meaning 'A true friend is recognized in uncertain times,' highlighting
    the value of steadfast friendship during adversity. It is widely cited in classical and later literature.
  i18n_explanations:
    en: A proverb meaning 'A true friend is recognized in uncertain times,' highlighting the value of
      steadfast friendship during adversity. It is widely cited in classical and later literature.
    es: Un proverbio que significa 'Un verdadero amigo se reconoce en tiempos inciertos,' destacando el
      valor de la amistad constante en la adversidad. Es ampliamente citado en la literatura clásica y
      posterior.
    fr: Un proverbe signifiant 'Un vrai ami se reconnaît dans l'adversité,' soulignant la valeur d'une
      amitié solide en temps de crise. Il est largement cité dans la littérature classique et ultérieure.
    de: Ein Sprichwort mit der Bedeutung 'Ein wahrer Freund erkennt man in unsicheren Zeiten,' das den
      Wert einer beständigen Freundschaft in der Not betont. Es wird häufig in der klassischen und späteren
      Literatur zitiert.
    it: Un proverbio che significa 'Un vero amico si riconosce nei momenti incerti,' che sottolinea il
      valore dell'amicizia salda nell'avversità. È ampiamente citato nella letteratura classica e successiva.
    pt: Um provérbio que significa 'Um verdadeiro amigo é reconhecido em tempos incertos,' destacando
      o valor da amizade constante na adversidade. É amplamente citado na literatura clássica e posterior.
    ru: Поговорка со значением 'Настоящий друг познаётся в беде,' подчёркивающая ценность верной дружбы
      в трудные времена. Широко цитируется в классической и более поздней литературе.
    ja: 「真の友は逆境にあるときにわかる」という意味の格言で、困難な時における堅固な友情の価値を強調する。古典文学から後世の作品まで幅広く引用される。
    zh: 一句谚语，意为‘患难见真交’，强调逆境中忠诚友谊的价值。在古典及后世文学中广为引用。
