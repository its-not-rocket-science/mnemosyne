- id: la_classical_or_scriptural_allusion_cassandrae_vaticinatio_d9d07d19
  language: la
  canonical_reference: Cassandrae vaticinatio
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Cassandrae vaticinatio
  - vaticinatio Cassandrae
  - Cassandrae vaticinari
  - Cassandrae praedictio
  short_explanation: A 'Cassandra prophecy,' referring to a prediction that is ignored or disbelieved
    despite being true. Cassandra, a Trojan priestess, was cursed by Apollo to prophesy truthfully but
    never be believed.
  i18n_explanations:
    en: A 'Cassandra prophecy,' referring to a prediction that is ignored or disbelieved despite being
      true. Cassandra, a Trojan priestess, was cursed by Apollo to prophesy truthfully but never be believed.
    es: Una 'profecía de Casandra', que se refiere a una predicción ignorada o no creída a pesar de ser
      verdadera. Casandra, sacerdotisa troyana, fue maldecida por Apolo para profetizar con verdad pero
      nunca ser creída.
    fr: Une 'prophétie de Cassandre', désignant une prédiction ignorée ou non crue malgré sa véracité.
      Cassandre, prêtresse troyenne, fut maudite par Apollon pour prophétiser la vérité sans jamais être
      crue.
    de: Eine 'Kassandra-Prophezeiung', also eine Vorhersage, die trotz ihrer Richtigkeit ignoriert oder
      nicht geglaubt wird. Kassandra, eine trojanische Priesterin, wurde von Apollon verflucht, wahrhaftig
      zu prophezeien, aber nie geglaubt zu werden.
    it: Una 'profezia di Cassandra', cioè una predizione ignorata o non creduta nonostante sia vera. Cassandra,
      sacerdotessa troiana, fu maledetta da Apollo affinché profetizzasse il vero ma non fosse mai creduta.
    pt: Uma 'profecia de Cassandra', referindo-se a uma previsão ignorada ou não acreditada, apesar de
      ser verdadeira. Cassandra, sacerdotisa troiana, foi amaldiçoada por Apolo para profetizar a verdade,
      mas nunca ser acreditada.
    ru: «Кассандровы пророчества», предсказания, которые игнорируются или не верят, несмотря на их истинность.
      Кассандра, троянская жрица, была проклята Аполлоном пророчествовать правду, но её никогда не слушали.
    ja: 「カサンドラの予言」とは、真実であるにもかかわらず無視されたり信じられなかったりする予言を指す。トロイの巫女カサンドラはアポロンに呪われ、真実を預言したが決して信じられなかった。
    zh: 「卡珊德拉的预言」，指的是尽管预言成真却被忽视或不被相信。特洛伊女祭司卡珊德拉被阿波罗诅咒，能预言真相却永远不被人相信。
    ar: «نبوءة كاساندرا»، أي تنبؤ يتم تجاهله أو عدم تصديقه رغم صحته. كاساندرا، كاهنة طروادية، لعنها أبولو
      كي تنبئ بالحق لكنها لم تُصدق قط.
    he: «נבואת קסנדרה» – נבואה הנזנחת או לא נאמנה למרות היותה נכונה. קסנדרה, כוהנת מטרויה, הוקללה על ידי
      אפולו לנבא באמת אך לעולם לא להיאמן.
