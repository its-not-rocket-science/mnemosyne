  short_explanation: A Latin proverb meaning 'The corruption of the best is the worst.' It reflects the
    idea that the fall of the virtuous or excellent is more damaging than the failure of the mediocre.
  i18n_explanations:
    en: A Latin proverb meaning 'The corruption of the best is the worst.' It reflects the idea that the
      fall of the virtuous or excellent is more damaging than the failure of the mediocre.
    es: Un proverbio latino que significa 'La corrupción de lo mejor es lo peor'. Refleja la idea de que
      la caída del virtuoso o excelente es más dañina que el fracaso del mediocre.
    fr: Un proverbe latin signifiant 'La corruption du meilleur est la pire'. Il reflète l’idée que la
      chute du vertueux ou de l’excellente est plus dommageable que l’échec du médiocre.
    de: Ein lateinisches Sprichwort mit der Bedeutung 'Die Verderbnis des Besten ist das Schlimmste'.
      Es besagt, dass der Fall des Tugendhaften oder Hervorragenden schädlicher ist als das Versagen des
      Mittelmäßigen.
    it: Un proverbio latino che significa 'La corruzione del meglio è la peggiore'. Riflette l'idea che
      la caduta del virtuoso o dell'eccellente sia più dannosa del fallimento del mediocre.
    pt: Um provérbio latino que significa 'A corrupção do melhor é a pior'. Reflete a ideia de que a queda
      do virtuoso ou excelente é mais prejudicial do que o fracasso do medíocre.
    ru: Латинская пословица 'Падение лучшего — худшее'. Отражает мысль, что гибель добродетельного или
      выдающегося человека более разрушительна, чем неудача посредственного.
    ja: ラテン語の格言で「最善の堕落ほど最悪のものはない」を意味する。優れた者の没落が凡庸な者の失敗よりも深刻な損害をもたらすという考えを反映する。
    zh: 拉丁谚语，意为“最优之腐化为最恶”。意指贤者或优秀者的堕落比平庸者的失败更具破坏性。
    ar: مثل لاتيني يعني 'فساد الأفضل هو الأسوأ'. يعكس فكرة أن سقوط الفاضل أو الممتاز أكثر ضرراً من فشل
      المتوسط.
    he: פתגם לטיני שפירושו 'השחתת הטוב ביותר היא הגרועה ביותר'. משקף את הרעיון שהנפילה של הצדיק או המצוין
