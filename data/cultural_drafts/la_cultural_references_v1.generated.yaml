      llevar una vida plena, a menudo asociada al estoicismo y la filosofía moral romana.
    fr: Expression latine signifiant 'l'art de vivre', désignant des approches philosophiques ou pratiques
      pour mener une vie épanouie, souvent liée au stoïcisme et à la philosophie morale romaine.
    de: Lateinischer Ausdruck für 'die Kunst des Lebens', der philosophische oder praktische Ansätze für
