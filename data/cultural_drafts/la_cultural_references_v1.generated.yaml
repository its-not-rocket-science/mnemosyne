    it: Espressione latina che significa 'l'arte di vivere', riferita ad approcci filosofici o pratici
      per condurre una vita appagante, spesso associata allo stoicismo e alla filosofia morale romana.
    pt: Expressão latina que significa 'a arte de viver', referindo-se a abordagens filosóficas ou práticas
      para levar uma vida plena, frequentemente associada ao estoicismo e à filosofia moral romana.
