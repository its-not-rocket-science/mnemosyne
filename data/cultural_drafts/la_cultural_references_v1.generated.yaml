- id: la_literary_reference_crescit_amor_nummi_quantum_ipsa_pecunia_crescit_cbc81cca
  language: la
  canonical_reference: Crescit amor nummi quantum ipsa pecunia crescit
  reference_type: literary_reference
  surface_patterns:
  - Crescit amor nummi quantum ipsa pecunia crescit
  - Crescit amor nummi, quantum ipsa pecunia crescit
  - Amor nummi crescit quantum pecunia crescit
  short_explanation: This line expresses the idea that the love of money grows in proportion to the increase
    in wealth itself. It reflects a cynical view of avarice, suggesting that greed is insatiable and escalates
    with prosperity.
  i18n_explanations:
    en: This line expresses the idea that the love of money grows in proportion to the increase in wealth
      itself. It reflects a cynical view of avarice, suggesting that greed is insatiable and escalates
      with prosperity.
    es: Esta línea expresa la idea de que el amor al dinero crece en proporción al aumento de la riqueza
      misma. Refleja una visión cínica de la avaricia, sugiriendo que la codicia es insaciable y se intensifica
      con la prosperidad.
    fr: Cette ligne exprime l'idée que l'amour de l'argent croît proportionnellement à l'augmentation
      de la richesse elle-même. Elle reflète une vision cynique de l'avarice, suggérant que la cupidité
      est insatiable et s'intensifie avec la prospérité.
    de: Diese Zeile drückt die Idee aus, dass die Liebe zum Geld im gleichen Maße wächst wie der Reichtum
      selbst. Sie spiegelt eine zynische Sicht auf die Habgier wider und deutet darauf hin, dass Gier
      unersättlich ist und mit Wohlstand zunimmt.
    it: Questa frase esprime l'idea che l'amore per il denaro cresce proporzionalmente all'aumento della
      ricchezza stessa. Riflette una visione cinica dell'avarizia, suggerendo che la cupidigia è insaziabile
      e cresce con la prosperità.
    pt: Esta linha expressa a ideia de que o amor pelo dinheiro cresce na mesma proporção do aumento da
      riqueza. Reflete uma visão cínica da avareza, sugerindo que a ganância é insaciável e aumenta com
      a prosperidade.
    ru: Эта строка выражает идею о том, что любовь к деньгам растёт пропорционально увеличению самого
      богатства. Она отражает циничный взгляд на жадность, предполагая, что алчность ненасытна и усиливается
      с ростом достатка.
    ja: この言葉は、金銭への愛が富の増加に比例して大きくなるという考えを表しています。貪欲は満たされることなく、繁栄と共に増大するという皮肉な見方を反映しています。
    zh: 这句话表达了一个观点：对金钱的爱随着财富的增长而增长。它反映了一种对贪婪的讽刺看法，暗示贪欲永无止境，且随着财富的增加而膨胀。
    ar: تعبر هذه العبارة عن فكرة أن حب المال يزداد مع زيادة الثروة ذاتها. تعكس نظرة ساخرة للحرص، وتوحي
      بأن الجشع لا يشبع ويتزايد مع الازدهار.
    he: משפט זה מבטא את הרעיון שאהבת הכסף גדלה ביחס לעלייה בעושר עצמו. הוא משקף תפיסה צינית של תאוות בצע,
      ומרמז שהחמדנות אינה יודעת שובע וגדלה עם השגשוג.
