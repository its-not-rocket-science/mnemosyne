  short_explanation: A line from Horace's 'Ars Poetica,' satirizing grand but empty promises or efforts
    that produce trivial results. It critiques overblown rhetoric or projects that fail to meet expectations.
  i18n_explanations:
    en: A line from Horace's 'Ars Poetica,' satirizing grand but empty promises or efforts that produce
      trivial results. It critiques overblown rhetoric or projects that fail to meet expectations.
    es: Verso de la 'Ars Poetica' de Horacio que satiriza promesas o esfuerzos grandilocuentes pero vacíos
      que producen resultados triviales. Critica la retórica exagerada o proyectos que no cumplen expectativas.
    fr: Un vers de l'Ars Poetica d'Horace, qui satirise les promesses ou efforts grandiloquents mais vides
      de sens produisant des résultats dérisoires. Il critique la rhétorique outrancière ou les projets
      qui ne répondent pas aux attentes.
    de: Ein Vers aus Horaz' 'Ars Poetica,' der großspurige, aber leere Versprechungen oder Anstrengungen,
      die nur lächerlich geringe Ergebnisse hervorbringen, satirisch anprangert. Er kritisiert übertriebene
      Rhetorik oder Projekte, die Erwartungen nicht erfüllen.
    it: Un verso dell'Ars Poetica di Orazio che satireggia promesse o sforzi grandiosi ma vuoti che producono
      risultati banali. Critica la retorica esagerata o progetti che non soddisfano le aspettative.
    pt: Um verso da 'Ars Poetica' de Horácio que satiriza promessas ou esforços grandiosos mas vazios
      que produzem resultados triviais. Critica a retórica exagerada ou projetos que não atendem às expectativas.
    ru: Строка из 'Ars Poetica' Горация, высмеивающая грандиозные, но пустые обещания или усилия, приводящие
      к тривиальным результатам. Критикует помпезную риторику или проекты, не оправдывающие ожиданий.
    ja: ホラティウスの「詩学」の一節で、壮大だが中身のない約束や努力が取るに足らない結果を生むことを風刺している。誇張されたレトリックや期待に応えられないプロジェクトを批判している。
    zh: 贺拉斯《诗艺》中的一句，讽刺华而不实的承诺或努力只能产生微不足道的结果。批评夸大其词的修辞或未能达成期望的项目。
    ar: سطر من 'أرس بوتيكا' لهوراس، يسخر من الوعود أو الجهود العظيمة ولكنها فارغة تنتج نتائج تافهة. ينتقد
      البلاغة المبالغ فيها أو المشاريع التي لا تلبي التوقعات.
    he: שורה מ'אמנות השירה' של הורטיוס, הסאטירה על הבטחות או מאמצים גדולים אך ריקים שמניבים תוצאות ridículas.
