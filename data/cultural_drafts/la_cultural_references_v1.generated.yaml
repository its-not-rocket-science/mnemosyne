- id: la_proverb_tradition_beati_monoculi_in_terra_caecorum_98aefba8
  language: la
  canonical_reference: Beati monoculi in terra caecorum
  reference_type: proverb_tradition
  surface_patterns:
  - Beati monoculi in terra caecorum
  - Beatus monoculus in terra caecorum
  - Beati monoculi in terra caecorum dicuntur
  - Beatus monoculus in terra caecorum rex est
  short_explanation: A proverb meaning 'Blessed are the one-eyed in the land of the blind,' suggesting
    that even limited ability can appear great in a context of widespread incompetence. It is often cited
    in discussions of relative merit.
  i18n_explanations:
    en: A proverb meaning 'Blessed are the one-eyed in the land of the blind,' suggesting that even limited
      ability can appear great in a context of widespread incompetence. It is often cited in discussions
      of relative merit.
    es: Un proverbio que significa 'Benditos los tuerto en tierra de ciegos,' sugiriendo que incluso una
      capacidad limitada puede parecer grande en un contexto de incompetencia generalizada. Se cita a
      menudo en discusiones sobre mérito relativo.
    fr: Un proverbe signifiant 'Heureux les borgnes dans le pays des aveugles,' suggérant qu'une compétence
      limitée peut paraître grande dans un contexte d'incompétence généralisée. Il est souvent cité dans
      les discussions sur le mérite relatif.
    de: Ein Sprichwort mit der Bedeutung 'Selig sind die Einäugigen im Land der Blinden,' das nahelegt,
      dass selbst begrenzte Fähigkeiten in einem Umfeld allgemeiner Inkompetenz groß erscheinen können.
      Es wird oft in Diskussionen über relative Verdienste zitiert.
    it: Un proverbio che significa 'Beati i guerci nella terra dei ciechi,' suggerendo che anche una capacità
      limitata può sembrare grande in un contesto di incompetenza diffusa. Viene spesso citato nelle discussioni
      sul merito relativo.
    pt: Um provérbio que significa 'Bem-aventurados os que têm um olho na terra dos cegos,' sugerindo
      que até uma capacidade limitada pode parecer grande em um contexto de incompetência generalizada.
      É frequentemente citado em discussões sobre mérito relativo.
    ru: Поговорка со значением 'Блаженны одноглазые в стране слепых,' suggesting that even limited ability
      can appear great in a context of widespread incompetence. Её часто цитируют в обсуждениях относительной
      ценности.
    ja: 「盲人の国の隻眼の人は幸いなり」という意味の格言で、広く無能が蔓延する状況では限られた能力さえも偉大に見えることを示唆する。相対的な価値について語る際によく引用される。
    zh: 一句谚语，意为‘盲人国里独眼称王’，暗示在普遍无能的环境中，即使有限的能力也能显得卓越。常用于讨论相对价值时。
    ar: مثل يعني 'طوبى لأصحاب العين الواحدة في أرض العميان'، يقترح أن حتى القدرة المحدودة قد تبدو عظيمة
      في سياق من عدم الكفاءة السائد. غالبًا ما يُذكر في مناقشات المزايا النسبية.
    he: פתגם שפירושו 'אשרי הפיקחים בארץ העיוורים', המדגיש כי יכולת מוגבלת עשויה להיראות גדולה בהקשר של
      חוסר יכולת נרחב. מצוטט לעיתים קרובות בדיונים על ערך יחסי.
