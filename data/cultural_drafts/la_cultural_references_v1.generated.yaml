- id: la_proverb_tradition_e_cantu_dignoscitur_avis_0a3ff629
  language: la
  canonical_reference: E cantu dignoscitur avis
  reference_type: proverb_tradition
  surface_patterns:
  - E cantu dignoscitur avis
  - Ex cantu dignoscitur avis
  - Dignoscitur avis ex cantu
  - Ex cantu avis dignoscitur
  short_explanation: This proverb means 'A bird is known by its song,' suggesting that a person's character
    or nature can be discerned from their speech or actions. It is often used to emphasize the importance
    of listening to someone's words to understand their true nature.
  i18n_explanations:
    en: This proverb means 'A bird is known by its song,' suggesting that a person's character or nature
      can be discerned from their speech or actions. It is often used to emphasize the importance of listening
      to someone's words to understand their true nature.
    es: Este proverbio significa 'Por su canto se conoce al pájaro', sugiriendo que el carácter o la naturaleza
      de una persona pueden discernirse por sus palabras o acciones. Se usa para enfatizar la importancia
      de escuchar a alguien para entender su verdadera esencia.
    fr: Ce proverbe signifie 'L'oiseau se reconnaît à son chant', suggérant que le caractère ou la nature
      d'une personne peut être discerné par ses paroles ou ses actes. Il est souvent utilisé pour souligner
      l'importance d'écouter quelqu'un pour comprendre sa véritable nature.
    de: Dieses Sprichwort bedeutet 'An seinem Gesang erkennt man den Vogel', was darauf hindeutet, dass
      man den Charakter oder das Wesen einer Person an ihren Worten oder Handlungen erkennen kann. Es
      wird oft verwendet, um die Bedeutung des Zuhörens zu betonen, um die wahre Natur einer Person zu
      verstehen.
    it: Questo proverbio significa 'L'uccello si riconosce dal suo canto', suggerendo che il carattere
      o la natura di una persona possono essere compresi dalle sue parole o azioni. Viene spesso usato
      per sottolineare l'importanza di ascoltare qualcuno per capire la sua vera natura.
    pt: Este provérbio significa 'Pelo canto se conhece a ave', sugerindo que o caráter ou a natureza
      de uma pessoa pode ser discernido por suas palavras ou ações. É frequentemente usado para enfatizar
      a importância de ouvir alguém para entender sua verdadeira essência.
    ru: Эта пословица означает 'Птицу узнают по её песне', что предполагает, что характер или сущность
      человека можно распознать по его словам или поступкам. Её часто используют, чтобы подчеркнуть важность
      слушать человека, чтобы понять его истинную натуру.
    ja: このことわざは「鳥はその鳴き声でわかる」を意味し、人の性格や本質はその言葉や行動から見抜けるという考えを表しています。人の真の性質を理解するために、その言葉を聞くことの重要性を強調する際にしばしば用いられます。
    zh: 这句谚语意思是“听其鸣声便知其鸟”，意指通过一个人的言语或行为可以判断其品格或本性。常用于强调倾听他人言语以了解其真实本质的重要性。
    ar: هذا المثل يعني 'الطائر يُعرف من تغريده'، مما يشير إلى أنه يمكن تمييز شخصية أو طبيعة الشخص من خلال
      كلامه أو أفعاله. غالبًا ما يُستخدم للتأكيد على أهمية الاستماع إلى شخص لفهم حقيقته.
    he: פתגם זה פירושו 'הציפור מזוהה לפי שירתה', ומרמז כי ניתן לזהות את אופיו או טבעו של אדם דרך דבריו
      או מעשיו. משתמשים בו לעיתים קרובות כדי להדגיש את חשיבות ההקשבה לאדם כדי להבין את מהותו האמיתית.
