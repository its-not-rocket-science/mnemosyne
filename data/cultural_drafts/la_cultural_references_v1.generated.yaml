  short_explanation: A Latin phrase meaning 'the blood of Aeneas is washed away,' referring to the idea
    of vengeance or purification through bloodshed. It originates from Virgil's *Aeneid*, symbolizing
    the cycle of violence in the founding of Rome.
  i18n_explanations:
    en: A Latin phrase meaning 'the blood of Aeneas is washed away,' referring to the idea of vengeance
      or purification through bloodshed. It originates from Virgil's *Aeneid*, symbolizing the cycle of
      violence in the founding of Rome.
    es: Frase latina que significa 'se lava la sangre de Eneas', aludiendo a la venganza o purificación
      mediante derramamiento de sangre. Proviene de la *Eneida* de Virgilio y simboliza el ciclo de violencia
      en la fundación de Roma.
    fr: Locution latine signifiant 'le sang d'Énée est lavé', évoquant l'idée de vengeance ou de purification
      par le sang. Issue de l’*Énéide* de Virgile, elle symbolise le cycle de violence dans la fondation
      de Rome.
    de: Lateinischer Ausdruck für 'das Blut des Aeneas wird abgewaschen', der Rache oder Reinigung durch
      Blutvergießen meint. Entstammt Vergils *Aeneis* und steht für den Gewaltkreislauf bei Roms Gründung.
    it: Locuzione latina che significa 'il sangue di Enea è lavato', riferendosi all'idea di vendetta
      o purificazione attraverso lo spargimento di sangue. Deriva dall’*Eneide* di Virgilio e simboleggia
      il ciclo di violenza nella fondazione di Roma.
    pt: Expressão latina que significa 'o sangue de Eneias é lavado', referindo-se à ideia de vingança
      ou purificação por derramamento de sangue. Vem da *Eneida* de Virgílio e simboliza o ciclo de violência
      na fundação de Roma.
    ru: Латинское выражение, означающее 'кровь Энея смыта', относящееся к идее мести или очищения через
      кровопролитие. Взято из «Энеиды» Вергилия и символизирует цикл насилия при основании Рима.
    ja: ラテン語の成句で、「アイネイアースの血は洗い流される」を意味し、血によって復讐や浄化を表す。ウェルギリウスの『アエネイス』に由来し、ローマ建国の暴力のサイクルを象徴する。
    zh: 拉丁语短语，意为“埃涅阿斯的血被洗去”，指通过流血进行复仇或净化的概念。源自维吉尔的《埃涅阿斯纪》，象征罗马建国中的暴力循环。
    ar: عبارة لاتينية تعني 'يُغسل دم إينياس'، تشير إلى فكرة الانتقام أو التطهير عبر سفك الدماء. مستمدة
