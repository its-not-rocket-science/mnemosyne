- id: la_cultural_reference_cleopatra_vii_regnum_aegypti_gubernat_e65a8587
  language: la
  canonical_reference: Cleopatra VII regnum Aegypti gubernat
  reference_type: cultural_reference
  surface_patterns:
  - Cleopatra VII regnum Aegypti gubernat
  - Cleopatra regnum Aegypti gubernat
  - Cleopatra Aegypti regnum tenet
  - Cleopatra Aegypti regnabat
  short_explanation: Refers to Cleopatra VII Philopator, the last active ruler of the Ptolemaic Kingdom
    of Egypt, known for her political acumen and relationships with Roman leaders Julius Caesar and Mark
    Antony. She symbolizes the end of ancient Egypt's independence.
  i18n_explanations:
    en: Refers to Cleopatra VII Philopator, the last active ruler of the Ptolemaic Kingdom of Egypt, known
      for her political acumen and relationships with Roman leaders Julius Caesar and Mark Antony. She
      symbolizes the end of ancient Egypt's independence.
    es: Se refiere a Cleopatra VII Filópator, la última gobernante activa del Reino Ptolemaico de Egipto,
      conocida por su astucia política y sus relaciones con los líderes romanos Julio César y Marco Antonio.
      Simboliza el fin de la independencia del antiguo Egipto.
    fr: Fait référence à Cléopâtre VII Philopator, dernière souveraine active du royaume ptolémaïque d'Égypte,
      connue pour son intelligence politique et ses relations avec les dirigeants romains Jules César
      et Marc Antoine. Elle symbolise la fin de l'indépendance de l'Égypte antique.
    de: Bezieht sich auf Kleopatra VII. Philopator, die letzte regierende Herrscherin des Ptolemäerreichs
      in Ägypten, bekannt für ihre politische Klugheit und ihre Beziehungen zu den römischen Führern Julius
      Caesar und Mark Anton. Sie symbolisiert das Ende der Unabhängigkeit des alten Ägypten.
    it: Si riferisce a Cleopatra VII Filopatore, ultima sovrana attiva del Regno tolemaico d'Egitto, nota
      per la sua astuzia politica e le relazioni con i leader romani Giulio Cesare e Marco Antonio. Simboleggia
      la fine dell'indipendenza dell'antico Egitto.
    pt: Refere-se a Cleópatra VII Filópator, a última governante ativa do Reino Ptolomaico do Egito, conhecida
      por sua astúcia política e relações com os líderes romanos Júlio César e Marco Antônio. Simboliza
      o fim da independência do Egito antigo.
    ru: Относится к Клеопатре VII Филопатор, последней правящей правительнице Птолемеевского Египта, известной
      своей политической проницательностью и отношениями с римскими лидерами Юлием Цезарем и Марком Антонием.
      Она символизирует конец независимости Древнего Египта.
    ja: プトレマイオス朝エジプト最後の実権を握った女王クレオパトラ7世フィロパトルを指す。ローマの指導者ユリウス・カエサルとマルクス・アントニウスとの関係で知られ、古代エジプトの独立の終焉を象徴する。
    zh: 指的是埃及托勒密王朝最后一位实际统治的女王克利奥帕特拉七世（菲洛帕托尔），以其政治才能和与罗马领袖朱利叶斯·恺撒及马克·安东尼的关系闻名。她象征着古埃及独立时代的终结。
    ar: يشير إلى كليوباترا السابعة فيلوباتور، آخر حاكمة نشطة لمملكة مصر البطلمية، المعروفة بذكائها السياسي
      وعلاقاتها مع القادة الرومان يوليوس قيصر ومارك أنطوني. ترمز إلى نهاية استقلال مصر القديمة.
    he: מתייחס לקלאופטרה השביעית פילופטור, השליטה האחרונה במצרים התלמיית, הידועה בחוכמתה הפוליטית ובקשריה
