  short_explanation: A proverb meaning 'Spoken words fly away, written words remain,' emphasizing the
    permanence and importance of written records over fleeting speech.
  i18n_explanations:
    en: A proverb meaning 'Spoken words fly away, written words remain,' emphasizing the permanence and
      importance of written records over fleeting speech.
    es: Proverbio que significa 'Las palabras dichas vuelan, las escritas permanecen', destacando la permanencia
      e importancia de los registros escritos sobre el habla efímera.
    fr: Un proverbe signifiant 'Les mots prononcés s'envolent, les écrits restent', soulignant la permanence
      et l'importance des documents écrits face à la parole éphémère.
    de: Ein Sprichwort mit der Bedeutung 'Gesprochene Worte verfliegen, geschriebene bleiben', das die
      Beständigkeit und Bedeutung schriftlicher Aufzeichnungen gegenüber flüchtiger Rede betont.
    it: Un proverbio che significa 'Le parole dette volano via, quelle scritte rimangono', sottolineando
      la permanenza e l'importanza dei documenti scritti rispetto al discorso effimero.
    pt: Um provérbio que significa 'Palavras ditas voam, escritas permanecem', destacando a permanência
      e importância dos registros escritos sobre a fala fugaz.
    ru: Поговорка 'Сказанное улетает, написанное остаётся', подчеркивающая неизменность и важность письменных
      записей по сравнению с мимолётной речью.
    ja: 「言葉は飛び去るが、書かれたものは残る」という格言で、口頭の言葉よりも書き言葉の永続性と重要性を強調する。
    zh: 一句谚语，意为‘言语易逝，文字永存’，强调书面记录的永恒性与重要性超过短暂的口头言语。
    ar: مثل يقول 'الكلمات المنطوقة تطير، المكتوبة تبقى'، مؤكدًا على ديمومة وأهمية السجلات المكتوبة مقارنة
      بالكلام العابر.
    he: פתגם שפירושו 'דברים שנאמרים עפים, כתובים נשארים', המדגיש את הנצחיות והחשיבות של רישומים כתובים
      לעומת דיבור חולף.
