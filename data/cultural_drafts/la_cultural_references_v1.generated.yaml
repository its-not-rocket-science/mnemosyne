- id: la_literary_reference_sic_transit_gloria_mundi_3a6a1772
  language: la
  canonical_reference: Sic transit gloria mundi
  reference_type: literary_reference
  surface_patterns:
  - Sic transit gloria mundi
  - Sic transit gloria huius mundi
  - Sic transit gloria mundi, sic transit
  short_explanation: A Latin phrase meaning 'Thus passes the glory of the world.' It originates from the
    ceremonial rite during the papal coronation, where a bundle of flax is burned while the phrase is
    intoned, symbolizing the transience of earthly power and fame.
  i18n_explanations:
    en: A Latin phrase meaning 'Thus passes the glory of the world.' It originates from the ceremonial
      rite during the papal coronation, where a bundle of flax is burned while the phrase is intoned,
      symbolizing the transience of earthly power and fame.
    es: Una frase latina que significa 'Así pasa la gloria del mundo'. Tiene su origen en el rito ceremonial
      durante la coronación papal, donde se quema un haz de lino mientras se pronuncia la frase, simbolizando
      la fugacidad del poder y la fama terrenales.
    fr: Une expression latine signifiant 'Ainsi passe la gloire du monde'. Elle trouve son origine dans
      le rite cérémoniel lors du couronnement papal, où un faisceau de lin est brûlé tandis que la phrase
      est prononcée, symbolisant la fugacité du pouvoir et de la gloire terrestres.
    de: Ein lateinischer Ausdruck mit der Bedeutung 'So vergeht der Ruhm der Welt'. Er stammt aus dem
      zeremoniellen Ritus während der Papstkrönung, bei dem ein Bündel Flachs verbrannt wird, während
      der Satz gesprochen wird. Er symbolisiert die Vergänglichkeit irdischer Macht und Berühmtheit.
    it: Una frase latina che significa 'Così passa la gloria del mondo'. Ha origine dal rito cerimoniale
      durante l'incoronazione papale, in cui un fascio di lino viene bruciato mentre si pronuncia la frase,
      simboleggiando la transitorietà del potere e della fama terreni.
    pt: Uma frase latina que significa 'Assim passa a glória do mundo'. Tem origem no rito cerimonial
      durante a coroação papal, onde um feixe de linho é queimado enquanto a frase é entoada, simbolizando
      a transitoriedade do poder e da fama terrenos.
    ru: Латинское выражение, означающее 'Так проходит слава мира'. Оно происходит из церемониального обряда
      папской коронации, где пучок льна сжигается под произнесение этой фразы, символизируя преходящесть
      земной власти и славы.
    ja: 「かくして世界の栄光は過ぎ去る」というラテン語の成句。教皇戴冠式の儀式に由来し、亜麻の束が燃やされながらこの言葉が唱えられ、地上の権力と名声の儚さを象徴する。
    zh: 拉丁语成语，意为“世间荣耀如此流逝”。源于教皇加冕仪式中的传统仪式，当一束亚麻被焚烧时，此语被诵念，象征着世俗权力与荣耀的短暂。
    ar: عبارة لاتينية تعني 'هكذا تمر مجد العالم'. تنشأ من الطقس الاحتفالي أثناء تتويج البابا، حيث يتم
      حرق حزمة من الكتان أثناء ترديد العبارة، مما يرمز إلى زوال السلطة والمجد الدنيويين.
    he: ביטוי לטיני שפירושו 'כך חולפת תהילת העולם'. מקורו בטקס הכתרת האפיפיור, בו נשרפת צרור פשתן תוך
      אמירת הביטוי, כסמל לחולפתם של כוח ותהילה ארציים.
