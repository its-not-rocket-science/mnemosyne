    fr: Un proverbe signifiant 'elle corrige les mœurs en riant', souvent utilisé pour décrire le rôle
      de la satire dans la société. Il exprime l'idée que l'humour peut révéler et réformer les vices
      sociaux.
    de: Ein Sprichwort mit der Bedeutung 'es bessert die Sitten durch Lachen', oft verwendet, um die Rolle
      der Satire in der Gesellschaft zu beschreiben. Es fasst die Idee zusammen, dass Humor gesellschaftliche
      Laster aufdecken und reformieren kann.
    it: Un proverbio che significa 'corregge i costumi ridendo', usato per descrivere il ruolo della satira
      nella società. Incarna l'idea che l'umorismo possa esporre e riformare i vizi sociali.
    pt: Um provérbio que significa 'corrige os costumes rindo', usado para descrever o papel da sátira
      na sociedade. Enfatiza a ideia de que o humor pode expor e reformar os vícios sociais.
    ru: Поговорка, означающая 'исправляет нравы смехом', часто используется для описания роли сатиры в
      обществе. Воплощает идею, что юмор может разоблачать и исправлять социальные пороки.
    ja: 「笑いによって風習を正す」という意味のラテン語の格言で、社会における風刺の役割を表す際に用いられる。ユーモアが社会の悪弊を暴き改善するという考えを表している。
    zh: 拉丁谚语，意为“通过笑声纠正风俗”，常用于描述讽刺在社会中的作用。体现了幽默可以揭露并改良社会弊病的理念。
    ar: مثل لاتيني يعني 'يصلح الأخلاق بالضحك'، ويُستخدم لوصف دور السخرية في المجتمع. يعبر عن فكرة أن الفكاهة
      يمكن أن تكشف وتصلح الرذائل الاجتماعية.
    he: פתגם לטיני שפירושו 'מתקן את המידות בצחוק', המשמש לתיאור תפקידה של הסאטירה בחברה. מבטא את הרעיון
      שבהומור ניתן לחשוף ולשפר פגמים חברתיים.
