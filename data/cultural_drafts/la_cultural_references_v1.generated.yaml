  - Ave Caesar morituri te salutant
  - Hail Caesar, those who are about to die salute you
  short_explanation: A phrase reportedly spoken by gladiators to the Roman emperor before combat, meaning
    'Hail Caesar, those who are about to die salute you.' It reflects the ritualized nature of gladiatorial
    games in ancient Rome.
  i18n_explanations:
    en: A phrase reportedly spoken by gladiators to the Roman emperor before combat, meaning 'Hail Caesar,
      those who are about to die salute you.' It reflects the ritualized nature of gladiatorial games
      in ancient Rome.
    es: Frase que, según se dice, los gladiadores pronunciaban ante el emperador romano antes del combate,
      significando 'Salve, César, los que van a morir te saludan'. Refleja el carácter ritualizado de
      los juegos de gladiadores en la antigua Roma.
    fr: Phrase que les gladiateurs auraient adressée à l'empereur romain avant le combat, signifiant 'Salut
      César, ceux qui vont mourir te saluent'. Elle reflète le caractère ritualisé des jeux de gladiateurs
      dans la Rome antique.
    de: Ein angeblich von Gladiatoren vor dem Kampf an den römischen Kaiser gerichteter Gruß mit der Bedeutung
      'Sei gegrüßt, Caesar, die dem Tod Geweihten grüßen dich'. Er spiegelt den ritualisierten Charakter
      der Gladiatorenspiele im antiken Rom wider.
    it: Un'espressione che, secondo la tradizione, i gladiatori rivolgevano all'imperatore romano prima
      del combattimento, significando 'Ave, Cesare, coloro che stanno per morire ti salutano'. Riflette
      il carattere rituale dei giochi gladiatori nell'antica Roma.
    pt: Frase que, segundo a tradição, os gladiadores dirigiam ao imperador romano antes da luta, significando
