  short_explanation: A Latin epithet for Jupiter, meaning 'Jupiter the Thunderer,' referring to the Roman
    god of the sky and king of the gods, who was believed to wield thunder as a weapon. The cult of Jupiter
    Tonans was prominent in Rome.
  i18n_explanations:
    en: A Latin epithet for Jupiter, meaning 'Jupiter the Thunderer,' referring to the Roman god of the
      sky and king of the gods, who was believed to wield thunder as a weapon. The cult of Jupiter Tonans
      was prominent in Rome.
    es: Un epíteto latino para Júpiter, que significa 'Júpiter el Tonante', refiriéndose al dios romano
      del cielo y rey de los dioses, al que se creía que blandía el trueno como arma. El culto a Júpiter
      Tonante fue prominente en Roma.
    fr: Un épithète latine pour Jupiter, signifiant 'Jupiter le Tonnant', faisant référence au dieu romain
      du ciel et roi des dieux, que l'on croyait brandir la foudre comme une arme. Le culte de Jupiter
      Tonans était important à Rome.
    de: Ein lateinischer Beiname für Jupiter, der 'Jupiter der Donnerer' bedeutet, und sich auf den römischen
      Gott des Himmels und König der Götter bezieht, der als Blitzeschleuderer galt. Der Kult des Jupiter
      Tonans war in Rom bedeutend.
    it: Un epiteto latino per Giove, che significa 'Giove il Tonante', riferendosi al dio romano del cielo
      e re degli dei, che si credeva brandisse il tuono come arma. Il culto di Giove Tonante era prominente
      a Roma.
    pt: Um epíteto latino para Júpiter, que significa 'Júpiter o Trovejante', referindo-se ao deus romano
      do céu e rei dos deuses, que se acreditava manejar o trovão como arma. O culto a Júpiter Tonante
      foi proeminente em Roma.
    ru: Латинский эпитет Юпитера, означающий 'Юпитер Громовержец', относящийся к римскому богу неба и
      царю богов, который, как считалось, метал молнии. Культ Юпитера Тонанса был распространён в Риме.
    ja: ローマの最高神ユピテルのラテン語における異名で、「雷神ユピテル」を意味します。天空の神であり、雷を武器として振るう存在と信じられていました。ローマではユピテル・トナンスの信仰が盛んでした。
    zh: 拉丁语中对朱庇特的称号，意为“雷霆之神朱庇特”，指罗马的天空之神和众神之王，传说他以雷电为武器。朱庇特·托南斯的崇拜在古罗马颇为显著。
    ar: لقب لاتيني لجوبيتر، ويعني 'جوبيتر الراعد'، ويشير إلى إله السماء وملك الآلهة عند الرومان، الذي
      كان يُعتقد أنه يحمل البرق كسلاح. كان عبادة جوبيتر الراعد بارزة في روما.
    he: כינוי לטיני ליופיטר, שמשמעו 'יופיטר הרעם', בהתייחס לאל הרומי של השמים ומלך האלים, שנחשב כמי שמחזיק
      ברעם כנשק. פולחנו של יופיטר הרעם היה בולט ברומא.
