- id: la_classical_or_scriptural_allusion_argus_oculos_habere_9d106435
  language: la
  canonical_reference: Argus oculos habere
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Argus oculos habere
  - oculos Argus habere
  - oculos habere velut Argus
  - Argus oculis
  short_explanation: To have 'eyes like Argus,' meaning to be vigilant or watchful. Argus Panoptes, the
    hundred-eyed giant in Greek myth, was slain by Hermes but his eyes were placed in the peacock's tail
    by Hera.
  i18n_explanations:
    en: To have 'eyes like Argus,' meaning to be vigilant or watchful. Argus Panoptes, the hundred-eyed
      giant in Greek myth, was slain by Hermes but his eyes were placed in the peacock's tail by Hera.
    es: Tener 'ojos como Argos', es decir, ser vigilante. Argos Panoptes, el gigante de cien ojos de la
      mitología griega, fue muerto por Hermes, pero Hera colocó sus ojos en la cola del pavo real.
    fr: Avoir 'des yeux comme Argus', c'est-à-dire être vigilant. Argus Panoptès, le géant aux cent yeux
      de la mythologie grecque, fut tué par Hermès, mais Héra plaça ses yeux dans la queue du paon.
    de: «Augen wie Argus haben» bedeutet wachsam zu sein. Argus Panoptes, der hundertäugige Riese der
      griechischen Mythologie, wurde von Hermes getötet, doch Hera setzte seine Augen in den Pfauenwedel.
    it: Avere 'occhi come Argo', cioè essere vigile. Argo Panoptes, il gigante dai cento occhi della mitologia
      greca, fu ucciso da Ermes, ma Era pose i suoi occhi nella coda del pavone.
    pt: Ter 'olhos como Argus', ou seja, ser vigilante. Argus Panoptes, o gigante de cem olhos da mitologia
      grega, foi morto por Hermes, mas Hera colocou seus olhos na cauda do pavão.
    ru: Иметь 'глаза как у Аргуса' — значит быть бдительным. Аргус Панофтис, стоокий великан из греческой
      мифологии, был убит Гермесом, но Гера поместила его глаза в хвост павлина.
    ja: 「アルゴスの目を持つ」とは、警戒心が強いことを意味する。ギリシャ神話の百眼の巨人アルゴス・パノプテースはヘルメスに殺されたが、ヘラはその目を孔雀の尾に移した。
    zh: 「长着阿尔戈斯的眼睛」意即警惕。希腊神话中百眼巨人阿尔戈斯被赫尔墨斯杀死，赫拉将其眼睛嵌入孔雀尾巴。
    ar: «أن يكون لديك عيون مثل أركوس» بمعنى اليقظة. أركوس بانوبتس، العملاق ذو المئة عين في الميثولوجيا
      اليونانية، قتل على يد هيرميس، لكن هيرا وضعت عينيه في ذيل الطاووس.
    he: להחזיק 'עיניים כמו ארגוס' – כלומר להיות ערני. ארגוס פנופטס, הענק בעל מאה העיניים מהמיתולוגיה היוונית,
      נהרג על ידי הרמס, אך הרה שמה את עיניו בזנב הטווס.
