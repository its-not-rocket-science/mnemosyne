- id: la_cultural_reference_decemviri_legibus_scribendis_55d290b8
  language: la
  canonical_reference: Decemviri legibus scribendis
  reference_type: cultural_reference
  surface_patterns:
  - Decemviri legibus scribendis
  - Decemviri leges scribere iussi sunt
  - Decemviri legum scriptores
  - Decemviri decem leges scripserunt
  short_explanation: The Decemviri legibus scribendis were a commission of ten men appointed in 451–450
    BC to codify Roman law, resulting in the Twelve Tables, the foundation of Roman law. They symbolize
    the transition from oral to written legal tradition in Rome.
  i18n_explanations:
    en: The Decemviri legibus scribendis were a commission of ten men appointed in 451–450 BC to codify
      Roman law, resulting in the Twelve Tables, the foundation of Roman law. They symbolize the transition
      from oral to written legal tradition in Rome.
    es: Los Decemviros legibus scribendis fueron una comisión de diez hombres nombrados en el 451–450
      a.C. para codificar el derecho romano, dando como resultado las Doce Tablas, base del derecho romano.
      Simbolizan la transición de la tradición legal oral a la escrita en Roma.
    fr: Les Decemvirs legibus scribendis étaient une commission de dix hommes nommés en 451–450 av. J.-C.
      pour codifier le droit romain, aboutissant aux Douze Tables, fondement du droit romain. Ils symbolisent
      la transition de la tradition juridique orale à l'écrit à Rome.
    de: Die Decemviri legibus scribendis waren eine Kommission von zehn Männern, die 451–450 v. Chr. ernannt
      wurde, um das römische Recht zu kodifizieren, was in den Zwölf Tafeln, der Grundlage des römischen
      Rechts, mündete. Sie symbolisieren den Übergang von mündlicher zu schriftlicher Rechtstradition
      in Rom.
    it: I Decemviri legibus scribendis furono una commissione di dieci uomini nominati nel 451–450 a.C.
      per codificare il diritto romano, dando origine alle Dodici Tavole, fondamento del diritto romano.
      Simboleggiano la transizione dalla tradizione giuridica orale a quella scritta a Roma.
    pt: Os Decênviros legibus scribendis foram uma comissão de dez homens nomeados em 451–450 a.C. para
      codificar o direito romano, resultando nas Doze Tábuas, base do direito romano. Simbolizam a transição
      da tradição jurídica oral para a escrita em Roma.
    ru: Деcemвиры по составлению законов (Decemviri legibus scribendis) — комиссия из десяти человек,
      назначенная в 451–450 годах до н. э. для кодификации римского права, результатом которой стали XII
      таблиц — основа римского права. Они символизируют переход от устной к письменной правовой традиции
      в Риме.
    ja: 法制定十人委員会（Decemviri legibus scribendis）は、紀元前451–450年に任命された10人の委員からなる委員会で、ローマ法の成文化（十二表法）につながった。彼らはローマにおける口承から文書による法的伝統への移行を象徴する。
    zh: 《十二铜表法》制定委员会（Decemviri legibus scribendis）是公元前451–450年任命的十人委员会，负责编纂罗马法，最终形成了罗马法的基础——《十二表法》。他们象征着罗马从口头到成文法律传统的转变。
    ar: كان الديسيمفيري ليغيبوس سكريبينديس لجنة مكونة من عشرة رجال تم تعيينهم في 451–450 ق.م لتدوين القانون
      الروماني، مما أدى إلىTables Twelve، أساس القانون الروماني. إنهم يرمزون إلى الانتقال من التقليد القانوني
      الشفهي إلى المكتوب في روما.
    he: ה-Decemviri legibus scribendis היו ועדה של עשרה אנשים שמונו בשנת 451–450 לפנה"ס לקודיפיקציה של
      החוק הרומי, אשר הובילה ליצירת שנים עשר הלוחות, הבסיס לחוק הרומי. הם מסמלים את המעבר ממסורת משפטית
      בעל פה לכתובה ברומא.
