- id: la_cultural_reference_horas_non_numero_nisi_serenas_2c81d384
  language: la
  canonical_reference: Horas non numero nisi serenas
  reference_type: cultural_reference
  surface_patterns:
  - Horas non numero nisi serenas
  - Horas non numero nisi serenas,
  - Nisi serenas horas non numero
  short_explanation: This phrase means 'I count only the serene hours,' reflecting a Stoic or philosophical
    attitude toward time, valuing only peaceful and meaningful moments. It is often associated with sundials
    and epitaphs.
  i18n_explanations:
    en: This phrase means 'I count only the serene hours,' reflecting a Stoic or philosophical attitude
      toward time, valuing only peaceful and meaningful moments. It is often associated with sundials
      and epitaphs.
    es: Esta frase significa 'Solo cuento las horas serenas', reflejando una actitud estoica o filosófica
      hacia el tiempo, valorando solo los momentos pacíficos y significativos. Suele asociarse con relojes
      de sol y epitafios.
    fr: Cette phrase signifie 'Je ne compte que les heures sereines', reflétant une attitude stoïcienne
      ou philosophique envers le temps, ne valorisant que les moments paisibles et significatifs. Elle
      est souvent associée aux cadrans solaires et aux épitaphes.
    de: Dieser Satz bedeutet 'Ich zähle nur die heiteren Stunden', was eine stoische oder philosophische
      Haltung gegenüber der Zeit widerspiegelt, die nur friedvolle und bedeutungsvolle Momente wertschätzt.
      Er wird oft mit Sonnenuhren und Grabinschriften in Verbindung gebracht.
    it: Questa frase significa 'Conto solo le ore serene', riflettendo un atteggiamento stoico o filosofico
      verso il tempo, che valorizza solo i momenti pacifici e significativi. È spesso associata a meridiane
      e epitaffi.
    pt: Esta frase significa 'Só conto as horas serenas', refletindo uma atitude estoica ou filosófica
      em relação ao tempo, valorizando apenas os momentos pacíficos e significativos. Geralmente está
      associada a relógios de sol e epitáfios.
    ru: Эта фраза означает 'Я считаю только безмятежные часы', отражая стоическое или философское отношение
      ко времени, которое ценит лишь мирные и значимые моменты. Часто ассоциируется с солнечными часами
      и эпитафиями.
    ja: この言葉は「穏やかな時だけを数える」を意味し、時間に対するストイックあるいは哲学的な態度を反映しています。平和で意義深い瞬間だけを重視するものです。日時計や墓碑銘としばしば関連付けられます。
    zh: 这句话的意思是“我只计算宁静的时光”，体现了一种对时间的斯多葛或哲学态度，只珍视平静而有意义的时刻。常与日晷和墓志铭联系在一起。
    ar: هذه العبارة تعني 'أنا أحصي الساعات الهادئة فقط'، مما يعكس موقفًا روحيًا أو فلسفيًا تجاه الزمن،
      حيث لا تُقدَّر سوى اللحظات الهادئة والمعنى. غالبًا ما ترتبط بالساعات الشمسية والنقوش الجنائزية.
    he: משפט זה פירושו 'אני סופר רק את השעות השלוות', ומשקף גישה סטואית או פילוסופית לזמן, שמעריכה רק
      רגעים של שלווה ומשמעות. לעיתים קרובות הוא מקושר לשעוני שמש ואפיטפים.
