- id: la_cultural_reference_arsinoën_ptolemaeorum_domum_fundatam_e621e5af
  language: la
  canonical_reference: Arsinoën Ptolemaeorum domum fundatam
  reference_type: cultural_reference
  surface_patterns:
  - Arsinoën Ptolemaeorum domum fundatam
  - domum Ptolemaeorum ab Arsinoë fundatam
  - Arsinoë domum Ptolemaeorum condidit
  - domus Ptolemaeorum
  short_explanation: Refers to the founding of the Ptolemaic dynasty's royal house by Arsinoë II, wife
    of Ptolemy II Philadelphus. The Ptolemaic dynasty ruled Egypt from 305 BCE to 30 BCE and was one of
    the most influential Hellenistic dynasties.
  i18n_explanations:
    en: Refers to the founding of the Ptolemaic dynasty's royal house by Arsinoë II, wife of Ptolemy II
      Philadelphus. The Ptolemaic dynasty ruled Egypt from 305 BCE to 30 BCE and was one of the most influential
      Hellenistic dynasties.
    es: Se refiere a la fundación de la casa real de la dinastía ptolemaica por Arsínoe II, esposa de
      Ptolomeo II Filadelfo. La dinastía ptolemaica gobernó Egipto desde el 305 a.C. hasta el 30 a.C.
      y fue una de las dinastías helenísticas más influyentes.
    fr: Fait référence à la fondation de la maison royale de la dynastie ptolémaïque par Arsinoé II, épouse
      de Ptolémée II Philadelphe. La dynastie ptolémaïque régna sur l'Égypte de 305 av. J.-C. à 30 av.
      J.-C. et fut l'une des dynasties hellénistiques les plus influentes.
    de: Bezieht sich auf die Gründung des königlichen Hauses der ptolemäischen Dynastie durch Arsinoë
      II, Ehefrau von Ptolemaios II. Philadelphos. Die ptolemäische Dynastie herrschte von 305 v. Chr.
      bis 30 v. Chr. über Ägypten und war eine der einflussreichsten hellenistischen Dynastien.
    it: Si riferisce alla fondazione della casa reale della dinastia tolemaica da parte di Arsinoe II,
      moglie di Tolomeo II Filadelfo. La dinastia tolemaica governò l'Egitto dal 305 a.C. al 30 a.C. ed
      è stata una delle dinastie ellenistiche più influenti.
    pt: Refere-se à fundação da casa real da dinastia ptolemaica por Arsínoe II, esposa de Ptolomeu II
      Filadelfo. A dinastia ptolemaica governou o Egito de 305 a.C. a 30 a.C. e foi uma das dinastias
      helenísticas mais influentes.
    ru: Относится к основанию царского дома Птолемеевской династии Арсиноей II, женой Птолемея II Филадельфа.
      Птолемеевская династия правила Египтом с 305 г. до н.э. по 30 г. до н.э. и была одной из самых влиятельных
      эллинистических династий.
    ja: 紀元前3世紀から紀元前1世紀にかけてエジプトを支配したプトレマイオス朝の王家の基盤を、プトレマイオス2世フィラデルフォスの妃アルシノエ2世が築いたことを指す。ヘレニズム時代で最も影響力のあった王朝の一つである。
    zh: 指托勒密二世的妻子阿尔西诺伊二世建立的托勒密王朝王室。托勒密王朝统治埃及于公元前305年至公元前30年，是最具影响力的希腊化王朝之一。
    ar: يشير إلى تأسيس البيت الملكي لدولة البطالمة من قبل أرسينوي الثانية، زوجة بطليموس الثاني فيلاديلفوس.
      حكمت سلالة البطالمة مصر من عام 305 قبل الميلاد إلى 30 قبل الميلاد وكانت واحدة من أكثر السلالات الهلنستية
      تأثيرًا.
    he: מתייחס להקמת בית המלוכה של השושלת התלמית על ידי ארסינואי השנייה, אשתו של תלמי השני פילדלפוס. השושלת
      התלמית שלטה במצרים מ-305 לפנה"ס עד 30 לפנה"ס והייתה אחת השושלות ההלניסטיות המשפיעות ביותר.
