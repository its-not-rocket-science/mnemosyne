    ja: フランスのルイ14世の個人的モットーで、「多くに劣らず」または「多くに等しい」を意味する。太陽王の神権と絶対的権力への信念を反映している。
    zh: 法国国王路易十四的个人箴言，意为“不亚于众人”或“与众人平等”。体现了“太阳王”对其神授权力和绝对权力的信念。
    ar: الشعار الشخصي للملك لويس الرابع عشر ملك فرنسا، ويعني 'غير أدنى للكثيرين' أو 'مساوٍ للكثيرين'.
