      moment.
    es: Frase de las *Cartas a Lucilio* de Séneca que significa 'Recuerda vivir'. Es un llamado a la atención
      plena y al aprecio por la vida, reflejando la filosofía estoica sobre la importancia de vivir el
      presente.
    fr: Une phrase des *Lettres à Lucilius* de Sénèque signifiant 'Souviens-toi de vivre'. C'est un appel
