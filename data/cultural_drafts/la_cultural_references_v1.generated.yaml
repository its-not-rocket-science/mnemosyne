- id: la_literary_reference_augustum_imperium_ad_finem_saeculi_reduxit_1a528335
  language: la
  canonical_reference: Augustum imperium ad finem saeculi reduxit
  reference_type: literary_reference
  surface_patterns:
  - Augustum imperium ad finem saeculi reduxit
  - imperium Augustum ad finem saeculi reduxit
  - ad finem saeculi imperium Augustum reduxit
  short_explanation: This phrase refers to the extension of the Roman Empire's power to the end of the
    age, often associated with the reign of Augustus and the Pax Romana. It signifies the peak and endurance
    of Roman imperial authority.
  i18n_explanations:
    en: This phrase refers to the extension of the Roman Empire's power to the end of the age, often associated
      with the reign of Augustus and the Pax Romana. It signifies the peak and endurance of Roman imperial
      authority.
    es: Esta frase se refiere a la extensión del poder del Imperio Romano hasta el fin de la era, asociada
      frecuentemente con el reinado de Augusto y la Pax Romana. Significa el apogeo y la perdurabilidad
      de la autoridad imperial romana.
    fr: Cette expression désigne l'extension du pouvoir de l'Empire romain jusqu'à la fin de l'Antiquité,
      souvent liée au règne d'Auguste et à la Pax Romana. Elle symbolise l'apogée et la pérennité de l'autorité
      impériale romaine.
    de: Dieser Ausdruck bezieht sich auf die Ausdehnung der Macht des Römischen Reiches bis zum Ende der
      Antike, oft verbunden mit der Regierungszeit des Augustus und der Pax Romana. Er steht für den Höhepunkt
      und die Beständigkeit der römischen Kaiserherrschaft.
    it: Questa frase si riferisce all'estensione del potere dell'Impero romano fino alla fine dell'età
      antica, spesso associata al regno di Augusto e alla Pax Romana. Indica l'apice e la durata dell'autorità
      imperiale romana.
    pt: Esta frase refere-se à extensão do poder do Império Romano até o fim da Antiguidade, frequentemente
      associada ao reinado de Augusto e à Pax Romana. Significa o auge e a durabilidade da autoridade
      imperial romana.
    ru: Эта фраза относится к расширению власти Римской империи до конца античного периода, часто связываемого
      с правлением Августа и Pax Romana. Она символизирует пик и устойчивость римской императорской власти.
    ja: この表現は、ローマ帝国の権力が古代末期まで拡大したことを指し、しばしばアウグストゥスの治世とパクス・ロマーナに関連付けられます。ローマ帝国の権威の絶頂と持続を象徴しています。
    zh: 这一短语指的是罗马帝国的权力延伸至古代末期，通常与奥古斯都统治时期和罗马和平相关联。它象征着罗马帝国权威的顶峰与持久。
    ar: تشير هذه العبارة إلى امتداد سلطة الإمبراطورية الرومانية حتى نهاية العصر، وغالبًا ما ترتبط بحكم
      أغسطس والسلام الروماني. إنها تدل على ذروة وسلطة الإمبراطورية الرومانية.
    he: ביטוי זה מתייחס להרחבת כוחה של האימפריה הרומית עד סוף העת העתיקה, לעיתים קרובות קשור לשלטונו של
      אוגוסטוס ולפאקס רומאנה. הוא מסמל את שיאה והמשכיותה של הסמכות הקיסרית הרומית.
