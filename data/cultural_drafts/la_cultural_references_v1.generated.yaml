- id: la_classical_or_scriptural_allusion_deucalionis_genus_247ff5c8
  language: la
  canonical_reference: Deucalionis genus
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Deucalionis genus
  - Deucalionis stirps
  - Deucalioneae stirpis
  - Deucalionis
  short_explanation: Deucalion was the Greek equivalent of Noah, who survived a great flood and repopulated
    the earth by throwing stones over his shoulder that turned into people. The phrase refers to the human
    race descended from him.
  i18n_explanations:
    en: Deucalion was the Greek equivalent of Noah, who survived a great flood and repopulated the earth
      by throwing stones over his shoulder that turned into people. The phrase refers to the human race
      descended from him.
    es: Deucalión fue el equivalente griego de Noé, quien sobrevivió al gran diluvio y repobló la tierra
      lanzando piedras por encima de su hombro que se convertían en personas. La frase se refiere a la
      raza humana descendiente de él.
    fr: 'Deucalion était l''équivalent grec de Noé : il survécut au grand déluge et repeupla la Terre
      en jetant des pierres par-dessus son épaule qui se transformaient en humains. L''expression désigne
      l''humanité issue de lui.'
    de: Deukalion war der griechische Noah, der die große Sintflut überlebte und die Erde neu besiedelte,
      indem er Steine über seine Schulter warf, die zu Menschen wurden. Der Ausdruck bezieht sich auf
      die Menschheit, die von ihm abstammt.
    it: 'Deucalione era l''equivalente greco di Noè: sopravvisse al grande diluvio e ripopolò la Terra
      gettando pietre oltre le sue spalle che si trasformavano in persone. La frase si riferisce al genere
      umano discendente da lui.'
    pt: Deucalião foi o equivalente grego de Noé, que sobreviveu ao grande dilúvio e repovoou a Terra
      jogando pedras por cima do ombro que se transformavam em pessoas. A frase refere-se à raça humana
      descendente dele.
    ru: Девкалион — греческий аналог библейского Ноя, переживший великий потоп и заселивший землю, бросая
      камни за спину, которые превращались в людей. Фраза относится к человечеству, произошедшему от него.
    ja: デュカリオンはギリシャ神話におけるノアのような存在で、大洪水を生き延び、肩越しに投げた石が人になったとされています。この表現は彼の子孫である人類を指します。
    zh: 丢卡利翁是希腊神话中诺亚的对应人物，他幸存大洪水后通过投掷身后的石头（变成人）重新繁衍了人类。这个短语指的是源自他的人类种族。
    ar: ديوكاليون هو النظير اليوناني لنوح، الذي نجا من الطوفان العظيم وأعادت الأرض سكانها بإلقاء الحجارة
      فوق كتفه التي تحولت إلى أشخاص. العبارة تشير إلى الجنس البشري المنحدر منه.
    he: דאוקליון הוא המקביל היווני לנח, ששרד את המבול הגדול ויישב מחדש את הארץ על ידי זריקת אבנים מעבר
      לכתפו שהפכו לאנשים. הביטוי מתייחס לגזע האנושי שממנו הוא צאצא.
