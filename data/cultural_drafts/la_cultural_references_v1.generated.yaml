- id: la_classical_or_scriptural_allusion_vae_victis_d6dee459
  language: la
  canonical_reference: Vae victis!
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Vae victis!
  - vae victis
  - Woe to the conquered!
  short_explanation: A Latin phrase attributed to the Gallic chieftain Brennus, meaning 'Woe to the conquered!'
    It reflects the harsh reality of defeat in ancient warfare, where the victor dictated terms without
    mercy.
  i18n_explanations:
    en: A Latin phrase attributed to the Gallic chieftain Brennus, meaning 'Woe to the conquered!' It
      reflects the harsh reality of defeat in ancient warfare, where the victor dictated terms without
      mercy.
    es: Frase latina atribuida al caudillo galo Brenno, que significa '¡Ay de los vencidos!'. Refleja
      la cruda realidad de la derrota en la guerra antigua, donde el vencedor imponía condiciones sin
      piedad.
    fr: Expression latine attribuée au chef gaulois Brennus, signifiant 'Malheur aux vaincus !'. Elle
      reflète la dure réalité de la défaite dans l'Antiquité, où le vainqueur imposait ses conditions
      sans pitié.
    de: Ein lateinischer Ausspruch, der dem gallischen Anführer Brennus zugeschrieben wird und 'Wehe den
      Besiegten!' bedeutet. Er spiegelt die harte Realität der Niederlage im antiken Krieg wider, in dem
      der Sieger gnadenlos seine Bedingungen diktierte.
    it: Un'espressione latina attribuita al capo gallico Brenno, che significa 'Guai ai vinti!'. Riflette
      la dura realtà della sconfitta nella guerra antica, in cui il vincitore dettava condizioni senza
      pietà.
    pt: Expressão latina atribuída ao chefe gaulês Brenno, que significa 'Ai dos vencidos!'. Reflete a
      dura realidade da derrota na guerra antiga, onde o vencedor impunha condições sem piedade.
    ru: Латинское выражение, приписываемое галльскому вождю Бренну, означающее 'Горе побежденным!'. Оно
      отражает суровую реальность поражения в древних войнах, где победитель диктовал условия безжалостно.
    ja: ガリア人の首領ブレンヌスに由来するラテン語の成句で、「敗者に災いあれ！」を意味します。古代戦争における敗北の厳しい現実を反映し、勝利者が容赦なく条件を押し付けたことを示します。
    zh: 拉丁语短语，传为高卢首领布伦努斯所言，意为“苦难降临于被征服者！”这反映了古代战争中失败的残酷现实，胜者无情地强加条件。
    ar: عبارة لاتينية تنسب إلى القائد الغالي برينوس، وتعني "ويل للمهزومين!"، وتعكس القسوة في الهزيمة في
      الحروب القديمة، حيث فرض المنتصر شروطه بلا رحمة.
    he: ביטוי לטיני המיוחס למנהיג הגאלי ברנוס, שפירושו 'אוי למנוצחים!'. הוא משקף את המציאות הקשה של תבוסה
      במלחמות העתיקות, שבהן המנצח הטיל תנאים ללא רחמים.
