- id: la_cultural_reference_crassus_parthis_apud_carrhas_cecidit_4ec2f37c
  language: la
  canonical_reference: Crassus Parthis apud Carrhas cecidit
  reference_type: cultural_reference
  surface_patterns:
  - Crassus Parthis apud Carrhas cecidit
  - Crassus in pugna apud Carrhas cecidit
  - Crassus a Parthis apud Carrhas interfectus est
  - Crassus apud Carrhas occisus est
  short_explanation: Refers to the defeat and death of Marcus Licinius Crassus, a Roman general and politician,
    at the Battle of Carrhae (53 BC) against the Parthians. This event marked the end of Crassus' ambitions
    and the beginning of Rome's eastern conflicts with Parthia.
  i18n_explanations:
    en: Refers to the defeat and death of Marcus Licinius Crassus, a Roman general and politician, at
      the Battle of Carrhae (53 BC) against the Parthians. This event marked the end of Crassus' ambitions
      and the beginning of Rome's eastern conflicts with Parthia.
    es: Se refiere a la derrota y muerte de Marco Licinio Craso, general y político romano, en la Batalla
      de Carras (53 a.C.) contra los partos. Este evento marcó el fin de las ambiciones de Craso y el
      inicio de los conflictos orientales de Roma con Partia.
    fr: Fait référence à la défaite et à la mort de Marcus Licinius Crassus, général et homme politique
      romain, lors de la bataille de Carrhes (53 av. J.-C.) contre les Parthes. Cet événement marqua la
      fin des ambitions de Crassus et le début des conflits orientaux de Rome avec la Parthie.
    de: Bezieht sich auf die Niederlage und den Tod des römischen Generals und Politikers Marcus Licinius
      Crassus in der Schlacht bei Carrhae (53 v. Chr.) gegen die Parther. Dieses Ereignis markierte das
      Ende von Crassus' Ambitionen und den Beginn Roms östlicher Konflikte mit Parthien.
    it: Si riferisce alla sconfitta e alla morte di Marco Licinio Crasso, generale e politico romano,
      nella Battaglia di Carre (53 a.C.) contro i Parti. Questo evento segnò la fine delle ambizioni di
      Crasso e l'inizio dei conflitti orientali di Roma con la Partia.
    pt: Refere-se à derrota e morte de Marco Licínio Crasso, general e político romano, na Batalha de
      Carrhae (53 a.C.) contra os partos. Este evento marcou o fim das ambições de Crasso e o início dos
      conflitos orientais de Roma com a Pártia.
    ru: Относится к поражению и гибели римского полководца и политика Марка Лициния Красса в битве при
      Каррах (53 г. до н. э.) против парфян. Это событие ознаменовало конец амбиций Красса и начало восточных
      конфликтов Рима с Парфией.
    ja: ローマの将軍・政治家マルクス・リキニウス・クラッススが、パルティアとのカルラエの戦い（紀元前53年）で敗北し戦死したことを指す。この出来事はクラッススの野望の終焉と、ローマとパルティアとの東方紛争の始まりを示す。
    zh: 指的是罗马将军兼政治家马库斯·李锡尼·克拉苏在公元前53年与帕提亚人进行的卡莱战役中战败身亡。这一事件标志着克拉苏野心的终结，以及罗马与帕提亚东方冲突的开始。
    ar: يشير إلى هزيمة ومقتل ماركوس ليكيوس كراسوس، الجنرال والسياسي الروماني، في معركة Carrhae (53 ق.م)
      ضد الفرثيين. هذا الحدث يمثل نهاية طموحات كراسوس وبداية الصراعات الشرقية لروما مع فرثيا.
    he: מתייחס לתבוסתו ולמותו של מרקוס ליקיניוס קראסוס, גנרל ופוליטיקאי רומאי, בקרב חרן (53 לפנה"ס) נגד
      הפרתים. אירוע זה סימן את סוף שאיפותיו של קראסוס ואת תחילת הסכסוכים המזרחיים של רומא עם הפרתים.
