  short_explanation: A famous line from Horace's *Odes*, meaning 'Seize the day,' urging the reader to
    make the most of the present moment rather than trusting in the future.
  i18n_explanations:
    en: A famous line from Horace's *Odes*, meaning 'Seize the day,' urging the reader to make the most
      of the present moment rather than trusting in the future.
    es: Frase famosa de las *Odas* de Horacio que significa 'Aprovecha el día', instando a aprovechar
      el momento presente en lugar de confiar en el futuro.
    fr: Vers célèbre des *Odes* d'Horace signifiant 'Cueille le jour', incitant à profiter du moment présent
      plutôt que de se fier à l'avenir.
    de: Berühmter Vers aus Horaz' *Oden* mit der Bedeutung 'Pflücke den Tag', der dazu auffordert, den
      gegenwärtigen Moment zu nutzen, statt auf die Zukunft zu vertrauen.
    it: Frase famosa delle *Odi* di Orazio che significa 'Cogli l'attimo', esortando a sfruttare il momento
      presente piuttosto che affidarsi al futuro.
    pt: Frase famosa das *Odes* de Horácio que significa 'Aproveite o dia', incentivando a aproveitar
      o momento presente em vez de confiar no futuro.
    ru: Знаменитая строка из «Од» Горация, означающая 'Лови день', призывающая использовать настоящий
      момент, а не полагаться на будущее.
    ja: ホラティウスの《歌集》の有名な一節で、「今を摘め」を意味し、未来に頼るのではなく現在の瞬間を最大限に生きるよう促す言葉。
    zh: 贺拉斯《颂诗》中的著名诗句，意为“把握今日”，敦促人们充分利用当下，而非寄望于未来。
    ar: سطر مشهور من *الأغاني* لهوراس يعني 'اغتنم اليوم'، يحث القارئ على الاستفادة القصوى من اللحظة الحالية
