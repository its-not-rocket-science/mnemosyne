- id: la_classical_or_scriptural_allusion_summum_bonum_57aa4d1a
  language: la
  canonical_reference: Summum bonum
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - summum bonum
  - the highest good
  - the supreme good
  short_explanation: A philosophical concept from Aristotle and later Roman Stoics, referring to the ultimate
    good or highest aim of human life. In Christian theology, it is often associated with the concept
    of God as the ultimate good.
  i18n_explanations:
    en: A philosophical concept from Aristotle and later Roman Stoics, referring to the ultimate good
      or highest aim of human life. In Christian theology, it is often associated with the concept of
      God as the ultimate good.
    es: Concepto filosófico de Aristóteles y los estoicos romanos posteriores, que se refiere al bien
      supremo o al fin último de la vida humana. En la teología cristiana, a menudo se asocia con la idea
      de Dios como el bien supremo.
    fr: Concept philosophique d'Aristote et des stoïciens romains ultérieurs, désignant le bien suprême
      ou le but ultime de la vie humaine. En théologie chrétienne, il est souvent associé à l'idée de
      Dieu comme bien suprême.
    de: Ein philosophisches Konzept von Aristoteles und späteren römischen Stoikern, das sich auf das
      höchste Gut oder das höchste Ziel des menschlichen Lebens bezieht. In der christlichen Theologie
      wird es oft mit der Vorstellung von Gott als dem höchsten Gut verbunden.
    it: Un concetto filosofico di Aristotele e degli stoici romani successivi, che si riferisce al sommo
      bene o al fine ultimo della vita umana. Nella teologia cristiana, è spesso associato all'idea di
      Dio come sommo bene.
    pt: Um conceito filosófico de Aristóteles e dos estoicos romanos posteriores, referindo-se ao bem
      supremo ou ao objetivo máximo da vida humana. Na teologia cristã, é frequentemente associado à ideia
      de Deus como o bem supremo.
    ru: Философское понятие, восходящее к Аристотелю и поздним римским стоикам, обозначающее высшее благо
      или высшую цель человеческой жизни. В христианской теологии оно часто ассоциируется с представлением
      о Боге как о высшем благе.
    ja: アリストテレスや後期のローマ期ストア派の哲学概念で、人間の生における究極の善、すなわち最高の目的を指す。キリスト教神学では、しばしば神を最高の善とする概念と結びつけられる。
    zh: 源自亚里士多德及后世罗马斯多葛派的哲学概念，指人生的终极善或最高目标。在基督教神学中，它常与上帝作为终极善的概念相联系。
    ar: مفهوم فلسفي يعود لأرسطو ولاحقًا الرواقية الرومانية، يشير إلى الخير الأسمى أو الهدف الأسمى للحياة
      الإنسانية. في اللاهوت المسيحي، غالبًا ما يرتبط بمفهوم الله باعتباره الخير الأسمى.
    he: מושג פילוסופי שמקורו באריסטו ובסטואים הרומיים המאוחרים, המתייחס לטוב העליון או למטרה העליונה של
      החיים האנושיים. בתאולוגיה הנוצרית, הוא מקושר לרוב לרעיון האל כטוב העליון.
