  short_explanation: A formal document summarizing a person's education, work experience, and skills,
    used primarily in academic and professional contexts. Derived from Latin meaning 'course of life'.
  i18n_explanations:
    en: A formal document summarizing a person's education, work experience, and skills, used primarily
      in academic and professional contexts. Derived from Latin meaning 'course of life'.
    es: Documento formal que resume la educación, experiencia laboral y habilidades de una persona, utilizado
      principalmente en contextos académicos y profesionales. Proviene del latín y significa 'curso de
      la vida'.
    fr: Document formel résumant l'éducation, l'expérience professionnelle et les compétences d'une personne,
      utilisé principalement dans des contextes académiques et professionnels. Vient du latin et signifie
      'parcours de vie'.
