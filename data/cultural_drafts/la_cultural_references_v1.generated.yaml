    de: Ein Sprichwort mit der Bedeutung 'Wer liebt, der züchtigt auch', das betont, dass wahre Zuneigung
      manchmal Korrektur erfordert. Es spiegelt römische Moralvorstellungen über Disziplin in Beziehungen
      wider.
    it: Un proverbio che significa 'Chi ama bene, castiga bene', sottolineando che l'affetto vero a volte
