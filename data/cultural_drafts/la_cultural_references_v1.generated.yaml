  short_explanation: The dawn ('Aurora') turning the sky red, a poetic motif describing the break of day.
    Common in Latin poetry to evoke the passage of time or the start of a new day.
  i18n_explanations:
    en: The dawn ('Aurora') turning the sky red, a poetic motif describing the break of day. Common in
      Latin poetry to evoke the passage of time or the start of a new day.
    es: El amanecer ('Aurora') tiñendo el cielo de rojo, un motivo poético que describe el inicio del
      día. Común en la poesía latina para evocar el paso del tiempo o el comienzo de un nuevo día.
    fr: L'aube ('Aurora') rougissant le ciel, un motif poétique décrivant le lever du jour. Fréquent dans
      la poésie latine pour évoquer le passage du temps ou le début d'une nouvelle journée.
    de: Die Morgenröte ('Aurora'), die den Himmel rot färbt, ein poetisches Motiv für den Tagesanbruch.
      Häufig in der lateinischen Dichtung, um den Lauf der Zeit oder den Beginn eines neuen Tages zu beschreiben.
    it: L'alba ('Aurora') che tinge di rosso il cielo, un motivo poetico che descrive l'inizio del giorno.
      Comune nella poesia latina per evocare il trascorrere del tempo o l'inizio di una nuova giornata.
    pt: A aurora ('Aurora') tingindo o céu de vermelho, um motivo poético que descreve o início do dia.
      Comum na poesia latina para evocar a passagem do tempo ou o começo de um novo dia.
    ru: Рассвет ('Аврора'), окрашивающий небо в красный цвет, поэтический мотив, описывающий начало дня.
      Часто встречается в латинской поэзии, чтобы передать течение времени или начало нового дня.
    ja: 夜明けの「アウロラ」が空を赤く染める、日の出を描写する詩的モチーフ。ラテン詩で時間の流れや新たな日の始まりを表すのに一般的だった。
    zh: 曙光（奥罗拉）将天空染红，描述破晓的诗意意象。常见于拉丁诗歌，用以表现时光流逝或新的一天的开始。
    ar: الفجر («أورورا») الذي يحمر السماء، وهو موضوع شعري يصف بداية النهار. شائع في الشعر اللاتيني لاستحضار
      مرور الزمن أو بداية يوم جديد.
    he: השחר («אורורה») שצובע את השמיים באדום, מוטיב שירי המתאר את תחילת היום. נפוץ בשירה הלטינית כדי
