  - Holy cross be my light, let not the dragon be my guide
  short_explanation: A medieval Christian incantation or charm, often inscribed on amulets or crosses,
    invoking divine protection against evil. The phrase contrasts the holy cross with the dragon (symbol
    of Satan) as a guide.
  i18n_explanations:
    en: A medieval Christian incantation or charm, often inscribed on amulets or crosses, invoking divine
      protection against evil. The phrase contrasts the holy cross with the dragon (symbol of Satan) as
      a guide.
    es: Conjuros o hechizos cristianos medievales, a menudo inscritos en amuletos o cruces, que invocan
      protección divina contra el mal. La frase contrasta la cruz sagrada con el dragón (símbolo de Satanás)
      como guía.
    fr: Incantation ou charme chrétien médiéval, souvent gravé sur des amulettes ou des croix, invoquant
      la protection divine contre le mal. La phrase oppose la croix sacrée au dragon (symbole de Satan)
      comme guide.
    de: Ein mittelalterlicher christlicher Zauberspruch oder Segensspruch, oft auf Amuletten oder Kreuzen
      eingeritzt, der göttlichen Schutz vor dem Bösen erfleht. Der Satz stellt das heilige Kreuz dem Drachen
      (Symbol Satans) als Wegweiser gegenüber.
    it: Un incantesimo o formula cristiana medievale, spesso incisa su amuleti o croci, che invoca la
      protezione divina contro il male. La frase contrappone la croce santa al drago (simbolo di Satana)
      come guida.
    pt: Encantamento ou feitiço cristão medieval, frequentemente inscrito em amuletos ou cruzes, que invoca
      proteção divina contra o mal. A frase contrasta a cruz sagrada com o dragão (símbolo de Satanás)
      como guia.
    ru: Средневековое христианское заклинание или оберег, часто выгравированное на амулетах или крестах,
      призывающее божественную защиту от зла. Фраза противопоставляет святой крест дракону (символу Сатаны)
      как проводнику.
    ja: 中世キリスト教の呪文やおまじないで、悪からの神聖な守りを求める言葉。しばしば護符や十字架に刻まれ、聖なる十字架と竜（サタンの象徴）を対比させ、導き手としています。
    zh: 中世纪基督教咒语或护身符，常刻于护身符或十字架上，祈求神圣的护佑以抵御邪恶。该短语将圣十字与龙（撒旦的象征）对比，视其为指引。
    ar: تعويذة أو سحر مسيحي من القرون الوسطى، غالبًا ما يُنقش على التمائم أو الصلبان، يدعو للحماية الإلهية
      من الشر. العبارة تقارن الصليب المقدس بالتنين (رمز الشيطان) كدليل.
    he: לחש או קמע נוצרי מימי הביניים, לעיתים נחרט על קמעות או צלבים, המזמן הגנה אלוהית מפני הרע. הביטוי
