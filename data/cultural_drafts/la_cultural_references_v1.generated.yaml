  short_explanation: The Colosseum, also known as the Flavian Amphitheatre, was commissioned by Emperor
    Vespasian and completed by his son Titus in 80 AD. It is an iconic symbol of Imperial Rome and its
    architectural and cultural legacy.
  i18n_explanations:
    en: The Colosseum, also known as the Flavian Amphitheatre, was commissioned by Emperor Vespasian and
      completed by his son Titus in 80 AD. It is an iconic symbol of Imperial Rome and its architectural
      and cultural legacy.
    es: El Coliseo, también conocido como el Anfiteatro Flavio, fue encargado por el emperador Vespasiano
      y completado por su hijo Tito en el año 80 d.C. Es un símbolo icónico de la Roma Imperial y su legado
      arquitectónico y cultural.
    fr: Le Colisée, aussi appelé amphithéâtre Flavien, fut commandé par l'empereur Vespasien et achevé
      par son fils Titus en 80 ap. J.-C. C'est un symbole emblématique de la Rome impériale et de son
      héritage architectural et culturel.
    de: Das Kolosseum, auch bekannt als das flavische Amphitheater, wurde von Kaiser Vespasian in Auftrag
      gegeben und von seinem Sohn Titus im Jahr 80 n. Chr. fertiggestellt. Es ist ein ikonisches Symbol
      des Römischen Reiches und seines architektonischen und kulturellen Erbes.
    it: Il Colosseo, noto anche come Anfiteatro Flavio, fu commissionato dall'imperatore Vespasiano e
      completato da suo figlio Tito nell'80 d.C. È un simbolo iconico dell'Impero Romano e del suo lascito
      architettonico e culturale.
    pt: O Coliseu, também conhecido como Anfiteatro Flaviano, foi encomendado pelo imperador Vespasiano
      e concluído por seu filho Tito em 80 d.C. É um símbolo icônico da Roma Imperial e de seu legado
      arquitetônico e cultural.
    ru: Колизей, также известный как Флавиев амфитеатр, был заложен императором Веспасианом и завершён
      его сыном Титом в 80 году н. э. Это знаковый символ Римской империи и её архитектурного и культурного
      наследия.
    ja: コロッセウム（フラウィウス円形闘技場とも呼ばれる）は、皇帝ウェスパシアヌスによって建設が命じられ、その息子ティトゥスによって紀元80年に完成された。ローマ帝国の象徴であり、その建築と文化の遺産を表す。
    zh: 科洛西姆（又称弗拉维安竞技场）由皇帝维斯帕シア努斯下令建造，其子提图斯于公元80年完工。它是罗马帝国的标志性象征，代表着其建筑与文化遗产。
    ar: الكولوسيوم، المعروف أيضًا باسم المدرج الفلافيان، تم تكليفه من قبل الإمبراطور فسبازيان وتم الانتهاء
