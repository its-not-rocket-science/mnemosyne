    someone to proceed with what they are doing. It reflects the energetic and direct style of Roman theatrical
    dialogue.
  i18n_explanations:
    en: A phrase from Roman comedy, often attributed to Plautus, encouraging action or urging someone
      to proceed with what they are doing. It reflects the energetic and direct style of Roman theatrical
      dialogue.
    es: Frase de la comedia romana, atribuida a menudo a Plauto, que anima a actuar o insta a alguien
      a seguir con lo que está haciendo. Refleja el estilo enérgico y directo del diálogo teatral romano.
    fr: Une phrase de la comédie romaine, souvent attribuée à Plaute, encourageant l'action ou incitant
      à poursuivre ce que l'on fait. Elle reflète le style énergique et direct du dialogue théâtral romain.
    de: Ein Ausspruch aus der römischen Komödie, oft Plautus zugeschrieben, der zur Tat oder zum Weitermachen
      auffordert. Er spiegelt den energischen und direkten Stil der römischen Theaterdialoge wider.
    it: Una frase della commedia romana, spesso attribuita a Plauto, che incoraggia l'azione o esorta
