- id: la_cultural_reference_ara_pacis_augustae_dedicata_a4b42454
  language: la
  canonical_reference: Ara Pacis Augustae dedicata
  reference_type: cultural_reference
  surface_patterns:
  - Ara Pacis Augustae dedicata
  - Ara Pacis Augustae
  - Ara Pacis
  - Ara Pacis Augustae dedicata est
  short_explanation: Refers to the Altar of Augustan Peace (Ara Pacis Augustae), a monumental altar in
    Rome commissioned by the Roman Senate to honor the return of Emperor Augustus from Gaul and Hispania
    in 13 BCE. It symbolizes the peace and prosperity of the Augustan era.
  i18n_explanations:
    en: Refers to the Altar of Augustan Peace (Ara Pacis Augustae), a monumental altar in Rome commissioned
      by the Roman Senate to honor the return of Emperor Augustus from Gaul and Hispania in 13 BCE. It
      symbolizes the peace and prosperity of the Augustan era.
    es: Se refiere al Altar de la Paz Augusta (Ara Pacis Augustae), un altar monumental en Roma encargado
      por el Senado romano para honrar el regreso del emperador Augusto de la Galia e Hispania en el 13
      a.C. Simboliza la paz y prosperidad de la era augusta.
    fr: Fait référence à l'Autel de la Paix d'Auguste (Ara Pacis Augustae), un autel monumental à Rome
      commandé par le Sénat romain pour honorer le retour de l'empereur Auguste de Gaule et d'Hispanie
      en 13 av. J.-C. Il symbolise la paix et la prospérité de l'ère augustéenne.
    de: Bezieht sich auf den Altar des Augustäischen Friedens (Ara Pacis Augustae), einen monumentalen
      Altar in Rom, der vom römischen Senat zur Ehrung der Rückkehr von Kaiser Augustus aus Gallien und
      Hispania im Jahr 13 v. Chr. in Auftrag gegeben wurde. Er symbolisiert den Frieden und Wohlstand
      der augusteischen Ära.
    it: Si riferisce all'Ara Pacis Augustae, un altare monumentale a Roma commissionato dal Senato romano
      per onorare il ritorno dell'imperatore Augusto dalla Gallia e dalla Hispania nel 13 a.C. Simboleggia
      la pace e la prosperità dell'era augustea.
    pt: Refere-se ao Altar da Paz Augusta (Ara Pacis Augustae), um altar monumental em Roma encomendado
      pelo Senado romano para homenagear o retorno do imperador Augusto da Gália e Hispânia em 13 a.C.
      Simboliza a paz e prosperidade da era augustana.
    ru: Относится к Алтарю Августовского мира (Ara Pacis Augustae), монументальному алтарю в Риме, заказанному
      римским Сенатом в честь возвращения императора Августа из Галлии и Испании в 13 г. до н.э. Он символизирует
      мир и процветание августовской эпохи.
    ja: 紀元前13年にローマ皇帝アウグストゥスがガリアとヒスパニアから帰還したことを讃えるため、元老院がローマに建立した記念祭壇「アラ・パキス・アウグスタエ」を指す。アウグストゥス時代の平和と繁栄の象徴である。
    zh: 指为纪念公元前13年奥古斯都皇帝从高卢和西班牙返回罗马而由罗马元老院下令建造的和平祭坛（Ara Pacis Augustae）。它象征着奥古斯都时代的和平与繁荣。
    ar: يشير إلى مذبح السلام أغسطس (Ara Pacis Augustae)، وهو مذبح ضخم في روما أمر مجلس الشيوخ الروماني
      بإنشائه تكريمًا لعودة الإمبراطور أغسطس من بلاد الغال وهسبانيا عام 13 قبل الميلاد. يرمز إلى السلام
      والازدهار في عصر أغسطس.
    he: מתייחס למזבח השלום של אוגוסטוס (Ara Pacis Augustae), מזבח מונומנטלי ברומא שהוזמן על ידי הסנאט
      הרומי לכבוד שובו של הקיסר אוגוסטוס מגאליה והיספניה בשנת 13 לפנה"ס. מסמל את השלום והשגשוג של תקופת
      אוגוסטוס.
