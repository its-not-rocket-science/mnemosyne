      de vivre dans le moment présent.
    de: Ein Zitat aus Senecas *Briefe an Lucilius* mit der Bedeutung 'Denke daran zu leben'. Es ist ein
      Aufruf zur Achtsamkeit und zur Wertschätzung des Lebens und spiegelt die stoische Philosophie über
      die Bedeutung des gegenwärtigen Moments wider.
    it: Una frase delle *Lettere a Lucilio* di Seneca che significa 'Ricordati di vivere'. È un invito
      alla consapevolezza e all'apprezzamento della vita, riflettendo la filosofia stoica sull'importanza
      di vivere nel momento presente.
    pt: Frase das *Cartas a Lucílio* de Sêneca que significa 'Lembre-se de viver'. É um chamado à atenção
      plena e à apreciação da vida, refletindo a filosofia estoica sobre a importância de viver o presente.
    ru: Цитата из «Писем к Луцилию» Сенеки, означающая 'Помни о жизни'. Это призыв к осознанности и ценности
