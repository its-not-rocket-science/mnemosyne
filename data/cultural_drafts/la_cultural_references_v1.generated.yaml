- id: la_literary_reference_atticus_ciceroni_familiaris_b970efc2
  language: la
  canonical_reference: Atticus Ciceroni familiaris
  reference_type: literary_reference
  surface_patterns:
  - Atticus Ciceroni familiaris
  - Atticus familiaris Ciceronis
  - Cicero et Atticus familiariter utebantur
  - Atticus Ciceroni amicus
  short_explanation: Refers to the close friendship between Titus Pomponius Atticus, a Roman eques and
    publisher, and Marcus Tullius Cicero, the famous orator and statesman. Their friendship is documented
    in Cicero's letters, particularly the 'Epistulae ad Atticum'.
  i18n_explanations:
    en: Refers to the close friendship between Titus Pomponius Atticus, a Roman eques and publisher, and
      Marcus Tullius Cicero, the famous orator and statesman. Their friendship is documented in Cicero's
      letters, particularly the 'Epistulae ad Atticum'.
    es: Se refiere a la estrecha amistad entre Tito Pomponio Ático, un caballero romano y editor, y Marco
      Tulio Cicerón, famoso orador y estadista. Su amistad está documentada en las cartas de Cicerón,
      especialmente en las 'Epístolas a Ático'.
    fr: Fait référence à l'amitié étroite entre Titus Pomponius Atticus, un chevalier romain et éditeur,
      et Marcus Tullius Cicero, célèbre orateur et homme d'État. Leur amitié est documentée dans les lettres
      de Cicéron, notamment les 'Epistulae ad Atticum'.
    de: Bezieht sich auf die enge Freundschaft zwischen Titus Pomponius Atticus, einem römischen Ritter
      und Verleger, und Marcus Tullius Cicero, dem berühmten Redner und Staatsmann. Ihre Freundschaft
      ist in Ciceros Briefen, insbesondere den 'Epistulae ad Atticum', dokumentiert.
    it: Si riferisce all'amicizia stretta tra Tito Pomponio Attico, un cavaliere romano ed editore, e
      Marco Tullio Cicerone, famoso oratore e uomo di stato. La loro amicizia è documentata nelle lettere
      di Cicerone, in particolare nelle 'Epistulae ad Atticum'.
    pt: Refere-se à amizade próxima entre Tito Pomponio Ático, um cavaleiro romano e editor, e Marco Túlio
      Cícero, famoso orador e estadista. Sua amizade está documentada nas cartas de Cícero, especialmente
      nas 'Epistulae ad Atticum'.
    ru: Относится к близкой дружбе между Титом Помпонием Аттиком, римским всадником и издателем, и Марком
      Туллием Цицероном, знаменитым оратором и государственным деятелем. Их дружба задокументирована в
      письмах Цицерона, особенно в 'Письмах к Аттику'.
    ja: ローマの騎士であり出版業者でもあったティトゥス・ポンポニウス・アッティクスと、有名な弁論家・政治家マルクス・トゥッリウス・キケロとの親密な友情を指す。彼らの友情はキケロの書簡、特に「アッティクス宛書簡」に記録されている。
    zh: 指罗马骑士兼出版商提图斯·庞波尼乌斯·阿提库斯与著名演说家兼政治家马库斯·图利乌斯·西塞罗之间的亲密友谊。他们的友谊在西塞罗的书信中有记载，特别是《致阿提库斯书信》。
    ar: يشير إلى الصداقة الوثيقة بين تيتوس بومبونيوس أتيكوس، فارس روماني وناشر، وماركوس توليوس شيشرون،
      الخطيب الشهير ورجل الدولة. تم توثيق صداقتهما في رسائل شيشرون، وخاصة "رسائل إلى أتيكوس".
    he: מתייחס לידידות הקרובה בין טיטוס פומפוניוס אטיקוס, אביר רומאי ומוציא לאור, ומרקוס טוליוס קיקרו,
      הנואם והמדינאי המפורסם. ידידותם מתועדת במכתביו של קיקרו, ובמיוחד ב'איגרות אל אטיקוס'.
