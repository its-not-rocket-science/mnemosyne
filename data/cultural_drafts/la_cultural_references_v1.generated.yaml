  short_explanation: A proverb meaning 'Out of the abundance of the heart the mouth speaks,' reflecting
    the idea that words reveal one's true thoughts and feelings. It originates from the New Testament
    and is widely used in Christian moral teachings.
  i18n_explanations:
    en: A proverb meaning 'Out of the abundance of the heart the mouth speaks,' reflecting the idea that
      words reveal one's true thoughts and feelings. It originates from the New Testament and is widely
      used in Christian moral teachings.
    es: Un proverbio que significa 'De la abundancia del corazón habla la boca', reflejando la idea de
      que las palabras revelan los verdaderos pensamientos y sentimientos. Proviene del Nuevo Testamento
      y se usa ampliamente en enseñanzas morales cristianas.
    fr: Un proverbe signifiant 'C'est de l'abondance du cœur que la bouche parle', reflétant l'idée que
      les mots révèlent les vraies pensées et sentiments. Il vient du Nouveau Testament et est largement
      utilisé dans l'enseignement moral chrétien.
    de: Ein Sprichwort mit der Bedeutung 'Aus der Fülle des Herzens spricht der Mund', das besagt, dass
      Worte die wahren Gedanken und Gefühle verraten. Es stammt aus dem Neuen Testament und wird in der
      christlichen Moraltheologie häufig verwendet.
    it: Un proverbio che significa 'Dalla pienezza del cuore parla la bocca', riflettendo l'idea che le
      parole rivelano i veri pensieri e sentimenti. Proviene dal Nuovo Testamento ed è ampiamente usato
      negli insegnamenti morali cristiani.
    pt: Um provérbio que significa 'Da abundância do coração fala a boca', refletindo a ideia de que as
      palavras revelam os verdadeiros pensamentos e sentimentos. Origina-se do Novo Testamento e é amplamente
      usado nos ensinamentos morais cristãos.
    ru: Поговорка, означающая 'От избытка сердца говорят уста', отражающая идею, что слова раскрывают
      истинные мысли и чувства. Впервые встречается в Новом Завете и широко используется в христианском
      нравственном учении.
    ja: 「心の豊かさから口は語る」という意味の格言で、言葉が真の思いと言葉を明らかにするという考えを反映しています。新約聖書に由来し、キリスト教の道徳教義で広く用いられています。
    zh: 拉丁谚语，意为“心中充满，口中吐露”，意指言语能揭示一个人的真实想法和感受。源自《新约圣经》，在基督教道德教义中广泛使用。
    ar: مثل لاتيني يعني 'من فيض القلب يتكلم الفم'، يعكس فكرة أن الكلمات تكشف الأفكار والمشاعر الحقيقية.
      ينحدر من العهد الجديد ويُستخدم على نطاق واسع في التعاليم الأخلاقية المسيحية.
    he: פתגם בלטינית שפירושו 'מפי השפע שבלב מדברים השפתיים', משקף את הרעיון שדברים מגלים את המחשבות והרגשות
      האמיתיים. מקורו בברית החדשה ונפוץ בהוראה המוסרית הנוצרית.
