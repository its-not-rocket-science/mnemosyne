- id: la_literary_reference_byzantium_a_constantino_conditum_1f1fbfcc
  language: la
  canonical_reference: Byzantium a Constantino conditum
  reference_type: literary_reference
  surface_patterns:
  - Byzantium a Constantino conditum
  - Constantinus Byzantium condidit
  - Byzantium conditum a Constantino
  short_explanation: This refers to the refounding of Byzantium as Constantinople by Emperor Constantine
    the Great in 330 AD. It marks the city's transformation into the capital of the Eastern Roman Empire
    and later the Byzantine Empire.
  i18n_explanations:
    en: This refers to the refounding of Byzantium as Constantinople by Emperor Constantine the Great
      in 330 AD. It marks the city's transformation into the capital of the Eastern Roman Empire and later
      the Byzantine Empire.
    es: Esto se refiere a la refundación de Bizancio como Constantinopla por el emperador Constantino
      el Grande en el año 330 d.C. Marca la transformación de la ciudad en la capital del Imperio Romano
      de Oriente y, más tarde, del Imperio Bizantino.
    fr: Cela fait référence à la refondation de Byzance en tant que Constantinople par l'empereur Constantin
      le Grand en 330 ap. J.-C. Cela marque la transformation de la ville en capitale de l'Empire romain
      d'Orient, puis plus tard de l'Empire byzantin.
    de: Dies bezieht sich auf die Neugründung von Byzanz als Konstantinopel durch Kaiser Konstantin den
      Großen im Jahr 330 n. Chr. Es markiert die Verwandlung der Stadt in die Hauptstadt des Oströmischen
      Reiches und später des Byzantinischen Reiches.
    it: Questo si riferisce alla rifondazione di Bisanzio come Costantinopoli da parte dell'imperatore
      Costantino il Grande nel 330 d.C. Segna la trasformazione della città nella capitale dell'Impero
      Romano d'Oriente e, in seguito, dell'Impero Bizantino.
    pt: Isso se refere à refundação de Bizâncio como Constantinopla pelo imperador Constantino, o Grande,
      em 330 d.C. Marca a transformação da cidade na capital do Império Romano do Oriente e, posteriormente,
      do Império Bizantino.
    ru: Это относится к переоснованию Византия как Константинополя императором Константином Великим в
      330 году н.э. Это знаменует превращение города в столицу Восточной Римской империи, а позже — Византийской
      империи.
    ja: これは、330年に皇帝コンスタンティヌス大帝によってビザンティウムがコンスタンティノープルとして再建されたことを指します。この出来事は、都市が東ローマ帝国、そして後にビザンツ帝国の首都へと変貌したことを示しています。
    zh: 这指的是公元330年由君士坦丁大帝重建拜占庭为君士坦丁堡。它标志着该城转变为东罗马帝国，后又成为拜占庭帝国的首都。
    ar: يشير هذا إلى إعادة تأسيس بيزنطة كقسطنطينية على يد الإمبراطور قسطنطين العظيم عام 330 م. إنه يرمز
      إلى تحول المدينة إلى عاصمة الإمبراطورية الرومانية الشرقية لاحقًا الإمبراطورية البيزنطية.
    he: ביטוי זה מתייחס להקמתה מחדש של ביזנטיון כקונסטנטינופול על ידי הקיסר קונסטנטינוס הגדול בשנת 330
      לספירה. הוא מסמל את הפיכתה של העיר לבירת האימפריה הרומית המזרחית ולאחר מכן לאימפריה הביזנטית.
