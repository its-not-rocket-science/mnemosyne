    ja: セネカの『ルキリウスへの手紙』の一節で「生きることを忘れるな」を意味する。これはマインドフルネスと生命の尊重への呼びかけであり、現在の瞬間を生きることの重要性についてのストア哲学を反映している。
    zh: 塞涅卡《致卢西利乌斯的信》中的一句话，意为‘记住要生活’。这是对专注与生命的珍视的呼唤，体现了斯多葛派哲学对活在当下的重视。
