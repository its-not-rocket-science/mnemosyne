    fr: Cerbère est le chien à trois têtes qui garde l'entrée des Enfers dans la mythologie grecque et
      romaine, connu pour ses aboiements féroces. L'expression 'Cerberus latrans' ('Cerbère aboyant')
      fait référence à ce gardien mythologique.
    de: Kerberos ist der dreiköpfige Hund, der in der griechischen und römischen Mythologie den Eingang
      zur Unterwelt bewacht und für sein wildes Bellen bekannt ist. Der Ausdruck 'Cerberus latrans' ('bellender
      Kerberos') bezieht sich auf diesen mythologischen Wächter.
    it: Cerbero è il cane a tre teste che custodisce l'ingresso agli Inferi nella mitologia greca e romana,
      noto per il suo latrato feroce. La frase 'Cerberus latrans' ('Cerbero che abbaia') si riferisce
      a questo guardiano mitologico.
    pt: Cérbero é o cão de três cabeças que guarda a entrada do Mundo Inferior na mitologia grega e romana,
      conhecido por seus latidos ferozes. A expressão 'Cerberus latrans' ('Cérbero latindo') refere-se
      a este guardião mitológico.
    ru: Кербер — трёхголовый пёс, охраняющий вход в подземный мир в греческой и римской мифологии, известный
      своим свирепым лаем. Фраза 'Cerberus latrans' ('лающий Кербер') относится к этому мифологическому
      стражу.
    ja: ケルベロスはギリシャ・ローマ神話で冥界の入口を守る3つの頭を持つ犬で、凶暴な吠え声で知られています。'Cerberus latrans'（'吠えるケルベロス'）という表現はこの神話上の番犬を指します。
    zh: Cerberus（地狱守门犬）是希腊和罗马神话中看守冥界入口的三头犬，以凶猛的吠叫著称。短语“Cerberus latrans”（“吠叫的Cerberus”）指的就是这位神话守护者。
    ar: سيربيروس هو الكلب ذو الرؤوس الثلاثة الذي يحرس مدخل العالم السفلي في الميثولوجيا اليونانية والرومانية،
