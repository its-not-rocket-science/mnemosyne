- id: la_cultural_reference_ancus_marcius_pontem_sublicium_facit_e169c816
  language: la
  canonical_reference: Ancus Marcius pontem sublicium facit
  reference_type: cultural_reference
  surface_patterns:
  - Ancus Marcius pontem sublicium facit
  - pontem sublicium Ancus Marcius facit
  - pontem sublicium facere coeptum est ab Ancus Marcius
  - pontem sublicium
  short_explanation: Refers to the legendary fourth king of Rome, Ancus Marcius, who is credited with
    building Rome's first bridge across the Tiber, the Pons Sublicius, a wooden structure of vital strategic
    importance. This bridge became a symbol of Roman engineering and resilience.
  i18n_explanations:
    en: Refers to the legendary fourth king of Rome, Ancus Marcius, who is credited with building Rome's
      first bridge across the Tiber, the Pons Sublicius, a wooden structure of vital strategic importance.
      This bridge became a symbol of Roman engineering and resilience.
    es: Se refiere al legendario cuarto rey de Roma, Anco Marcio, al que se atribuye la construcción del
      primer puente sobre el Tíber, el Pons Sublicius, una estructura de madera de vital importancia estratégica.
      Este puente se convirtió en símbolo de la ingeniería y resiliencia romanas.
    fr: Fait référence au quatrième roi légendaire de Rome, Ancus Marcius, crédité de la construction
      du premier pont sur le Tibre, le Pons Sublicius, une structure en bois d'importance stratégique
      vitale. Ce pont devint un symbole de l'ingénierie et de la résilience romaines.
    de: Bezieht sich auf den legendären vierten König Roms, Ancus Marcius, dem der Bau der ersten Brücke
      über den Tiber, der Pons Sublicius, einer hölzernen Struktur von vitaler strategischer Bedeutung,
      zugeschrieben wird. Diese Brücke wurde zum Symbol römischer Ingenieurskunst und Widerstandsfähigkeit.
    it: Si riferisce al leggendario quarto re di Roma, Anco Marcio, a cui si attribuisce la costruzione
      del primo ponte sul Tevere, il Pons Sublicius, una struttura lignea di vitale importanza strategica.
      Questo ponte divenne simbolo dell'ingegneria e della resilienza romane.
    pt: Refere-se ao lendário quarto rei de Roma, Anco Márcio, ao qual se atribui a construção da primeira
      ponte sobre o Tibre, a Pons Sublicius, uma estrutura de madeira de vital importância estratégica.
      Esta ponte tornou-se símbolo da engenharia e resiliência romanas.
    ru: Относится к легендарному четвёртому царю Рима, Анку Марцию, которому приписывают строительство
      первого моста через Тибр, Понс Сулиций, деревянной конструкции жизненно важного стратегического
      значения. Этот мост стал символом римской инженерии и стойкости.
    ja: 伝説的なローマの第4代王アンクス・マルキウスが、戦略的に重要な木造橋ポンス・スブリキウスをテヴェレ川に架けたことを指す。この橋はローマの工学と不屈の精神の象徴となった。
    zh: 指传说中罗马的第四位国王安库斯·马尔基乌斯在台伯河上建造第一座桥——苏布利修斯桥（木制结构，战略意义重大）。这座桥成为罗马工程和韧性的象征。
    ar: يشير إلى الملك الرابع الأسطوري لروما، أنكس ماركيوس، الذي يُنسب إليه بناء أول جسر عبر نهر التيبر،
      جسر Pons Sublicius، وهو هيكل خشبي ذو أهمية استراتيجية حيوية. أصبح هذا الجسر رمزًا للهندسة الرومانية
      والمرونة.
    he: מתייחס למלך הרביעי האגדי של רומא, אנקוס מארקיוס, אשר מיוחס לו בניית הגשר הראשון מעל נהר הטיבר,
      Pons Sublicius, מבנה עץ בעל חשיבות אסטרטגית חיונית. גשר זה הפך לסמל ההנדסה והחוסן הרומיים.
