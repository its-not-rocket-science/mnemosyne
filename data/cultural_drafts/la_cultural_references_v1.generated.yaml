  short_explanation: A famous aphorism attributed to Hippocrates, later popularized by Seneca, meaning
    'Art is long, life is short.' It emphasizes the vastness of knowledge and the brevity of human life.
  i18n_explanations:
    en: A famous aphorism attributed to Hippocrates, later popularized by Seneca, meaning 'Art is long,
      life is short.' It emphasizes the vastness of knowledge and the brevity of human life.
    es: Un famoso aforismo atribuido a Hipócrates, popularizado luego por Séneca, que significa 'El arte
      es largo, la vida es breve.' Destaca la vastedad del conocimiento y la brevedad de la vida humana.
    fr: Un aphorisme célèbre attribué à Hippocrate, popularisé plus tard par Sénèque, signifiant 'L'art
      est long, la vie est brève.' Il souligne l'immensité du savoir et la brièveté de la vie humaine.
    de: Ein berühmter Aphorismus, der Hippokrates zugeschrieben wird und später von Seneca populär gemacht
      wurde, bedeutet 'Die Kunst ist lang, das Leben ist kurz.' Er betont die Weite des Wissens und die
      Kürze des menschlichen Lebens.
    it: Un famoso aforisma attribuito a Ippocrate, poi reso popolare da Seneca, che significa 'L'arte
      è lunga, la vita è breve.' Sottolinea l'ampiezza della conoscenza e la brevità della vita umana.
    pt: Um famoso aforismo atribuído a Hipócrates, popularizado depois por Sêneca, que significa 'A arte
      é longa, a vida é breve.' Enfatiza a vastidão do conhecimento e a brevidade da vida humana.
    ru: Знаменитый афоризм, приписываемый Гиппократу и позже популяризованный Сенекой, означающий 'Искусство
      вечно, жизнь коротка'. Подчеркивает безграничность знаний и скоротечность человеческой жизни.
    ja: ヒポクラテスに由来し、後にセネカによって広められた有名な警句で、「芸術は長く、人生は短い」を意味する。知識の広大さと人間の人生の短さを強調する。
    zh: 源于希波克拉底的著名警句，后由塞内卡传播，意为“艺术长存，生命短暂”。强调知识的浩瀚与人生的短促。
    ar: قول مأثور شهير ينسب إلى أبقراط، ثم اشتهر على يد سينيكا، ويعني 'الفن طويل، الحياة قصيرة'. يبرز
