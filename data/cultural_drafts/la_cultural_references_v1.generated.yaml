    (1096–1099). It became a rallying cry for Christian warriors, expressing divine sanction for their
    cause.
  i18n_explanations:
    en: A slogan from the Latin phrase 'God wills it,' popularized during the First Crusade (1096–1099).
      It became a rallying cry for Christian warriors, expressing divine sanction for their cause.
    es: Un lema de la frase latina 'Dios lo quiere', popularizado durante la Primera Cruzada (1096–1099).
      Se convirtió en grito de guerra de los guerreros cristianos, expresando la sanción divina de su
      causa.
    fr: Un slogan issu de la phrase latine 'Dieu le veut', popularisé lors de la première croisade (1096–1099).
      Il devint un cri de ralliement pour les guerriers chrétiens, exprimant la bénédiction divine de
      leur cause.
    de: Ein Schlachtruf aus dem lateinischen 'Gott will es', der während des Ersten Kreuzzugs (1096–1099)
      geprägt wurde. Er wurde zum Kampfruf christlicher Krieger und drückte die göttliche Billigung ihres
      Anliegens aus.
    it: Uno slogan derivato dalla frase latina 'Dio lo vuole', diffuso durante la Prima Crociata (1096–1099).
      Divenne un grido di guerra per i guerrieri cristiani, esprimendo la sanzione divina della loro causa.
    pt: Um lema da frase latina 'Deus o quer', popularizado durante a Primeira Cruzada (1096–1099). Tornou-se
      um grito de guerra dos guerreiros cristãos, expressando a sanção divina de sua causa.
    ru: Лозунг на латыни 'Такова воля Божья', популяризованный во время Первого крестового похода (1096–1099).
      Став боевым кличем христианских воинов, он выражал божественное одобрение их дела.
    ja: ラテン語の「神の望みなり」というスローガンで、第一回十字軍（1096–1099）で広まった。キリスト教戦士たちの戦闘の叫びとなり、彼らの大義への神の承認を表した。
    zh: 拉丁语口号“上帝的旨意”，在第一次十字军东征（1096–1099）期间广为流传。成为基督教战士的战斗口号，表达对其事业的神圣认可。
    ar: شعار لاتيني يعني 'الله يريد ذلك' ، انتشر خلال الحملة الصليبية الأولى (1096–1099). أصبح هتافًا
