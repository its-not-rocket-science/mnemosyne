- id: la_proverb_tradition_per_aspera_ad_astra_2bfd93cc
  language: la
  canonical_reference: Per aspera ad astra
  reference_type: proverb_tradition
  surface_patterns:
  - Per aspera ad astra
  - Ad astra per aspera
  - Per aspera ad astra!
  short_explanation: A motivational phrase meaning 'Through hardships to the stars,' symbolizing perseverance
    leading to success. It reflects Stoic philosophy and has been widely adopted in modern contexts.
  i18n_explanations:
    en: A motivational phrase meaning 'Through hardships to the stars,' symbolizing perseverance leading
      to success. It reflects Stoic philosophy and has been widely adopted in modern contexts.
    es: Frase motivacional que significa 'A través de las dificultades hacia las estrellas', simbolizando
      que el esfuerzo lleva al éxito. Refleja la filosofía estoica y se usa en contextos modernos.
    fr: Une phrase motivante signifiant 'À travers les épreuves jusqu'aux étoiles', symbolisant que la
      persévérance mène au succès. Elle reflète la philosophie stoïcienne et est largement utilisée aujourd'hui.
    de: Ein Motivationssatz mit der Bedeutung 'Durch Mühen zu den Sternen', der Durchhaltevermögen als
      Weg zum Erfolg symbolisiert. Er entstammt der Stoischen Philosophie und wird heute oft verwendet.
    it: Una frase motivazionale che significa 'Attraverso le asperità alle stelle', simboleggiando che
      la perseveranza porta al successo. Riflette la filosofia stoica ed è ampiamente usata nei contesti
      moderni.
    pt: Uma frase motivacional que significa 'Através das dificuldades às estrelas', simbolizando que
      a perseverança leva ao sucesso. Reflete a filosofia estoica e é amplamente adotada em contextos
      modernos.
    ru: Вдохновляющая фраза 'Через тернии к звёздам', символизирующая, что упорство ведёт к успеху. Восходит
      к стоической философии и широко используется в современных контекстах.
    ja: 「困難を乗り越えて星々へ」という意味のモットーで、忍耐が成功につながることを象徴する。ストア哲学に由来し、現代でも広く使われている。
    zh: 一句格言，意为‘通过艰辛通往星辰’，象征坚持通向成功。源自斯多葛哲学，现代广泛使用。
    ar: عبارة تحفيزية تعني 'من خلال المصاعب إلى النجوم'، ترمز إلى أن المثابرة تؤدي إلى النجاح. تنبع من
      الفلسفة الرواقية وتستخدم على نطاق واسع في السياقات الحديثة.
    he: ביטוי מוטיבציוני שפירושו 'דרכי קושי אל הכוכבים', המסמל כי התמדה מובילה להצלחה. נובע מהפילוסופיה
      הסטואית ונפוץ בהקשרים מודרניים.
