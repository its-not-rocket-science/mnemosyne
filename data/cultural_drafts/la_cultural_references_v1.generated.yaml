- id: la_literary_reference_brundisium_tarentumque_portus_romanos_0eff020b
  language: la
  canonical_reference: Brundisium Tarentumque portus Romanos
  reference_type: literary_reference
  surface_patterns:
  - Brundisium Tarentumque portus Romanos
  - portus Romanos Brundisium Tarentumque
  - Brundisium et Tarentum portus Romani
  short_explanation: This phrase highlights Brundisium (modern Brindisi) and Tarentum (modern Taranto)
    as key Roman ports, crucial for trade and military logistics in southern Italy. It underscores their
    strategic importance in Roman expansion and administration.
  i18n_explanations:
    en: This phrase highlights Brundisium (modern Brindisi) and Tarentum (modern Taranto) as key Roman
      ports, crucial for trade and military logistics in southern Italy. It underscores their strategic
      importance in Roman expansion and administration.
    es: Esta frase destaca a Brundisium (Brindisi moderna) y Tarentum (Taranto moderna) como puertos romanos
      clave, esenciales para el comercio y la logística militar en el sur de Italia. Subraya su importancia
      estratégica en la expansión y administración romana.
    fr: Cette expression met en avant Brundisium (Brindisi actuelle) et Tarentum (Tarente actuelle) comme
      ports romains majeurs, essentiels pour le commerce et la logistique militaire dans le sud de l'Italie.
      Elle souligne leur importance stratégique dans l'expansion et l'administration romaines.
    de: Dieser Ausdruck hebt Brundisium (das heutige Brindisi) und Tarentum (das heutige Tarent) als wichtige
      römische Häfen hervor, die für Handel und militärische Logistik in Süditalien entscheidend waren.
      Er unterstreicht ihre strategische Bedeutung für die römische Expansion und Verwaltung.
    it: Questa frase mette in evidenza Brundisium (l'odierna Brindisi) e Tarentum (l'odierna Taranto)
      come importanti porti romani, fondamentali per il commercio e la logistica militare nell'Italia
      meridionale. Sottolinea la loro importanza strategica nell'espansione e nell'amministrazione romana.
    pt: Esta frase destaca Brundísio (Brindisi moderna) e Tarento (Taranto moderna) como importantes portos
      romanos, essenciais para o comércio e a logística militar no sul da Itália. Ressalta sua importância
      estratégica na expansão e administração romanas.
    ru: Это выражение подчеркивает значение Брундизия (современный Бриндизи) и Тарента (современный Таранто)
      как ключевых римских портов, важных для торговли и военной логистики в Южной Италии. Оно подчеркивает
      их стратегическую роль в римской экспансии и управлении.
    ja: この表現は、ブルンディシウム（現代のブリンディジ）とタレントゥム（現代のターラント）を、イタリア南部における貿易と軍事物流に不可欠な重要なローマの港として強調しています。ローマの拡大と統治におけるその戦略的重要性を示しています。
    zh: 这一短语强调了布伦迪西（现代布林迪西）和塔伦图姆（现代塔兰托）作为罗马帝国的关键港口，对意大利南部的贸易和军事后勤至关重要。它突显了它们在罗马扩张和管理中的战略重要性。
    ar: تشير هذه العبارة إلى بروزنديسيوم (برينديزي الحديثة) وتارينtum (تارانتو الحديثة) كموانئ رومانية
      رئيسية، حيوية للتجارة واللوجستيات العسكرية في جنوب إيطاليا. إنها تبرز أهميتها الاستراتيجية في التوسع
      والإدارة الرومانية.
    he: ביטוי זה מדגיש את חשיבותם של ברונדיסיום (ברינדיזי של ימינו) וטארנטום (טאראנטו של ימינו) כנמלי
      המפתח של רומא, חיוניים לסחר וללוגיסטיקה צבאית בדרום איטליה. הוא מדגיש את חשיבותם האסטרטגית בהתרחבות
      ובניהול הרומי.
