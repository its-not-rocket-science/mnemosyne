  short_explanation: A phrase meaning 'one heart and one soul,' used to describe unity and harmony among
    people. It originates from the Vulgate Bible (Acts 4:32) describing the early Christian community.
  i18n_explanations:
    en: A phrase meaning 'one heart and one soul,' used to describe unity and harmony among people. It
      originates from the Vulgate Bible (Acts 4:32) describing the early Christian community.
    es: Frase que significa 'un solo corazón y un alma,' usada para describir la unidad y armonía entre
      personas. Proviene de la Vulgata (Hechos 4:32) y describe a la comunidad cristiana primitiva.
    fr: Expression signifiant 'un seul cœur et une seule âme,' utilisée pour décrire l'unité et l'harmonie
      entre les gens. Elle vient de la Vulgate (Actes 4:32) et décrit la communauté chrétienne primitive.
    de: Ein Ausdruck, der 'ein Herz und eine Seele' bedeutet und Einheit und Harmonie zwischen Menschen
      beschreibt. Er stammt aus der Vulgata (Apostelgeschichte 4:32) und beschreibt die frühe christliche
      Gemeinde.
    it: Un'espressione che significa 'un cuore solo e un'anima sola,' usata per descrivere unità e armonia
      tra persone. Deriva dalla Vulgata (Atti 4:32) e descrive la comunità cristiana primitiva.
    pt: Expressão que significa 'um só coração e uma só alma,' usada para descrever unidade e harmonia
      entre pessoas. Vem da Vulgata (Atos 4:32) e descreve a comunidade cristã primitiva.
