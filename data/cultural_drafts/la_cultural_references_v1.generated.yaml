- id: la_literary_reference_cato_maior_carthaginem_delendam_esse_censet_ffd952b5
  language: la
  canonical_reference: Cato Maior Carthaginem delendam esse censet
  reference_type: literary_reference
  surface_patterns:
  - Carthaginem delendam esse censet
  - Cato Carthaginem delendam esse censuit
  - Carthago delenda est
  short_explanation: This phrase, attributed to Cato the Elder, means 'Carthage must be destroyed.' It
    reflects the Roman sentiment of enmity toward Carthage after the Punic Wars and the belief that Carthage
    posed a perpetual threat to Rome.
  i18n_explanations:
    en: This phrase, attributed to Cato the Elder, means 'Carthage must be destroyed.' It reflects the
      Roman sentiment of enmity toward Carthage after the Punic Wars and the belief that Carthage posed
      a perpetual threat to Rome.
    es: Esta frase, atribuida a Catón el Viejo, significa 'Cartago debe ser destruida'. Refleja el sentimiento
      romano de enemistad hacia Cartago tras las Guerras Púnicas y la creencia de que Cartago representaba
      una amenaza perpetua para Roma.
    fr: Cette expression, attribuée à Caton l'Ancien, signifie 'Carthage doit être détruite'. Elle reflète
      le sentiment romain d'hostilité envers Carthage après les guerres puniques et la conviction que
      Carthage représentait une menace perpétuelle pour Rome.
    de: Dieser Ausspruch, dem älteren Cato zugeschrieben, bedeutet 'Karthago muss zerstört werden'. Er
      spiegelt die römische Feindseligkeit gegenüber Karthago nach den Punischen Kriegen und die Überzeugung
      wider, dass Karthago eine ständige Bedrohung für Rom darstellte.
    it: Questa frase, attribuita a Catone il Vecchio, significa 'Cartagine deve essere distrutta'. Riflette
      il sentimento romano di ostilità verso Cartagine dopo le guerre puniche e la convinzione che Cartagine
      rappresentasse una minaccia perpetua per Roma.
    pt: Esta frase, atribuída a Catão, o Velho, significa 'Cartago deve ser destruída'. Reflete o sentimento
      romano de inimizade em relação a Cartago após as Guerras Púnicas e a crença de que Cartago representava
      uma ameaça perpétua a Roma.
    ru: Этот афоризм, приписываемый Катону Старшему, означает 'Карфаген должен быть разрушен'. Он отражает
      римское чувство вражды к Карфагену после Пунических войн и убежденность в том, что Карфаген представлял
      постоянную угрозу для Рима.
    ja: この言葉は、大カトーに帰せられるもので、「カルタゴは滅ぼされなければならない」という意味です。これは、ポエニ戦争後のローマのカルタゴに対する敵意と、カルタゴがローマにとって永遠の脅威であったという信念を反映しています。
    zh: 这句名言，归于老加图，意思是'迦太基必须被毁灭'。它反映了罗马在布匿战争后对迦太基的敌意，以及认为迦太基对罗马构成永久威胁的信念。
    ar: هذه العبارة، المنسوبة إلى كاتو الأكبر، تعني 'يجب تدمير قرطاجة'. إنها تعكس المشاعر الرومانية العدائية
      تجاه قرطاجة بعد الحروب البونيقية والاعتقاد بأن قرطاجة شكلت تهديدًا دائمًا لروما.
    he: ביטוי זה, המיוחס לקאטו הזקן, פירושו 'קרתגו חייבת להיחרב'. הוא משקף את עוינות הרומאים כלפי קרתגו
      לאחר המלחמות הפוניות ואת האמונה שקרתגו היוותה איום מתמיד על רומא.
