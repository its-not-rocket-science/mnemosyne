      vor allem in akademischen und beruflichen Kontexten verwendet. Stammt aus dem Lateinischen und bedeutet
      'Lebenslauf'.
    it: Documento formale che riassume l'istruzione, l'esperienza lavorativa e le competenze di una persona,
      utilizzato principalmente in ambiti accademici e professionali. Deriva dal latino e significa 'corso
      della vita'.
    pt: Documento formal que resume a educação, experiência profissional e habilidades de uma pessoa,
      usado principalmente em contextos acadêmicos e profissionais. Deriva do latim e significa 'curso
      da vida'.
