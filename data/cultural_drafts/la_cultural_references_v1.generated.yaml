    the historical context of Roman interactions with Egypt.
  i18n_explanations:
    en: A phrase attributed to Cicero, suggesting that one should remember their origins or humble beginnings,
      particularly when reflecting on past struggles or achievements. It alludes to the historical context
      of Roman interactions with Egypt.
    es: Frase atribuida a Cicerón que invita a recordar los orígenes o humildes comienzos, especialmente
      al reflexionar sobre luchas o logros pasados. Alude al contexto histórico de las interacciones romanas
      con Egipto.
    fr: Une phrase attribuée à Cicéron, suggérant de se souvenir de ses origines ou débuts humbles, surtout
      en réfléchissant à des luttes ou réalisations passées. Elle fait référence au contexte historique
      des interactions romaines avec l'Égypte.
    de: Ein Cicero zugeschriebener Ausspruch, der dazu auffordert, sich an die eigenen Ursprünge oder
      bescheidenen Anfänge zu erinnern, besonders bei der Reflexion über vergangene Kämpfe oder Erfolge.
      Er bezieht sich auf den historischen Kontext der römischen Beziehungen zu Ägypten.
    it: Un detto attribuito a Cicerone che invita a ricordare le proprie origini o umili beginnings, soprattutto
      riflettendo su lotte o successi passati. Allude al contesto storico delle interazioni romane con
      l'Egitto.
    pt: Frase atribuída a Cícero que sugere lembrar das próprias origens ou humildes começos, especialmente
      ao refletir sobre lutas ou conquistas passadas. Alude ao contexto histórico das interações romanas
      com o Egito.
    ru: Фраза, приписываемая Цицерону, призывающая помнить о своих истоках или скромных началах, особенно
      при размышлениях о прошлых трудностях или достижениях. Отсылает к историческому контексту римских
      отношений с Египтом.
    ja: キケロに帰せられる言葉で、過去の苦労や成果を振り返る際に、自らの起源や謙虚な出発点を忘れないように促すもの。古代ローマとエジプトの交流の歴史的文脈を示唆している。
    zh: 古罗马政治家西塞罗的一句名言，建议人们在回顾过去的挣扎或成就时，应铭记自己的出身或卑微的起点。此语暗指古罗马与埃及交往的历史背景。
    ar: عبارة نسبت إلى شيشرون، تدعو إلى تذكر الأصول أو بدايات متواضعة، خاصة عند التفكير في النضالات أو
