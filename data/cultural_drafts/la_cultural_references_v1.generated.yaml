- id: la_literary_reference_forma_bonum_fragile_est_ee50fb0f
  language: la
  canonical_reference: Forma bonum fragile est
  reference_type: literary_reference
  surface_patterns:
  - Forma bonum fragile est
  - Forma bonum fragilis est
  - Forma, bonum fragile est
  short_explanation: This line translates to 'Beauty is a fragile good,' highlighting the transient and
    delicate nature of physical beauty. It is often cited in discussions about the fleeting nature of
    worldly pleasures and the importance of inner virtue.
  i18n_explanations:
    en: This line translates to 'Beauty is a fragile good,' highlighting the transient and delicate nature
      of physical beauty. It is often cited in discussions about the fleeting nature of worldly pleasures
      and the importance of inner virtue.
    es: Esta línea se traduce como 'La belleza es un bien frágil', destacando la naturaleza efímera y
      delicada de la belleza física. Se cita frecuentemente en discusiones sobre la fugacidad de los placeres
      mundanos y la importancia de la virtud interior.
    fr: Cette ligne se traduit par 'La beauté est un bien fragile', soulignant la nature éphémère et délicate
      de la beauté physique. Elle est souvent citée dans les discussions sur la fugacité des plaisirs
      terrestres et l'importance de la vertu intérieure.
    de: Diese Zeile lässt sich mit 'Schönheit ist ein zerbrechliches Gut' übersetzen und unterstreicht
      die vergängliche und zerbrechliche Natur physischer Schönheit. Sie wird oft in Diskussionen über
      die Vergänglichkeit irdischer Freuden und die Bedeutung innerer Tugend angeführt.
    it: Questa frase si traduce come 'La bellezza è un bene fragile', evidenziando la natura effimera
      e delicata della bellezza fisica. Viene spesso citata nelle discussioni sulla fugacità dei piaceri
      terreni e sull'importanza della virtù interiore.
    pt: Esta linha se traduz como 'A beleza é um bem frágil', destacando a natureza transitória e delicada
      da beleza física. É frequentemente citada em discussões sobre a efemeridade dos prazeres mundanos
      e a importância da virtude interior.
    ru: Эта строка переводится как 'Красота — хрупкое благо', подчеркивая преходящий и хрупкий характер
      физической красоты. Её часто цитируют в обсуждениях о мимолётности мирских удовольствий и важности
      внутренней добродетели.
    ja: この言葉は「美しさは脆い宝」と訳され、肉体的な美の儚く繊細な性質を強調しています。世俗の快楽の儚さや内面の美徳の重要性について語る際によく引用されます。
    zh: 这句话可译为“美貌是易逝的财富”，强调了外在美的短暂与脆弱。常在讨论世俗享乐的短暂性及内在美德重要性时被引用。
    ar: هذه العبارة تترجم إلى 'الجمال خير هش'، مما يبرز الطبيعة الزائلة والهشة للجمال الجسدي. غالبًا ما
      تُذكر في مناقشات حول زوال ملذات الدنيا وأهمية الفضيلة الداخلية.
    he: משפט זה מתורגם ל'יופי הוא טוב שביר', ומדגיש את טבעה החולף והעדין של היופי הגופני. לעיתים קרובות
      מצטטים אותו בדיונים על חולפותם של הנאות העולם ועל חשיבות המידות הטובות הפנימיות.
