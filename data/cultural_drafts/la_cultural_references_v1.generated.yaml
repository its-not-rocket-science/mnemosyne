  - Nil ultra
  short_explanation: A Latin phrase meaning 'nothing further beyond' or 'no more beyond,' historically
    used as a motto or warning. It originates from the Pillars of Hercules, marking the limits of the
    known world in antiquity.
  i18n_explanations:
    en: A Latin phrase meaning 'nothing further beyond' or 'no more beyond,' historically used as a motto
      or warning. It originates from the Pillars of Hercules, marking the limits of the known world in
      antiquity.
    es: Frase latina que significa 'nada más allá' o 'no hay más allá,' usada históricamente como lema
      o advertencia. Proviene de las Columnas de Hércules, que marcaban los límites del mundo conocido
      en la antigüedad.
    fr: Une expression latine signifiant 'rien au-delà' ou 'pas plus loin,' historiquement utilisée comme
      devise ou avertissement. Elle provient des Colonnes d'Hercule, marquant les limites du monde connu
      dans l'Antiquité.
    de: Ein lateinischer Ausdruck, der 'nichts darüber hinaus' oder 'kein weiter darüber hinaus' bedeutet
      und historisch als Motto oder Warnung verwendet wurde. Er stammt von den Säulen des Herkules, die
      die Grenzen der antiken Welt markierten.
    it: Un'espressione latina che significa 'nulla di più oltre' o 'niente di più in là,' usata storicamente
      come motto o avvertimento. Deriva dalle Colonne d'Ercole, che segnavano i limiti del mondo conosciuto
      nell'antichità.
    pt: Expressão latina que significa 'nada além' ou 'não há mais além,' usada historicamente como lema
      ou advertência. Origina-se das Colunas de Hércules, que marcavam os limites do mundo conhecido na
      antiguidade.
    ru: Латинское выражение, означающее 'ничего дальше' или 'нет ничего дальше', исторически использовавшееся
      как девиз или предупреждение. Происходит от Геркулесовых столпов, обозначавших границы известного
      мира в древности.
    ja: ラテン語の成句で、「これ以上先はない」または「これ以上先は存在しない」を意味し、歴史的にモットーや警告として用いられた。ヘラクレスの柱に由来し、古代における既知の世界の限界を示していた。
    zh: 拉丁语短语，意为“再无更远”或“没有更远之地”，历史上用作座右铭或警示。源自赫拉克勒斯之柱，标志着古代已知世界的边界。
    ar: عبارة لاتينية تعني 'لا شيء أبعد من ذلك' أو 'لا مزيد وراء ذلك'، استخدمت تاريخيًا كشعار أو تحذير.
      تنشأ من أعمدة هرقل، التي حددت حدود العالم المعروف في العصور القديمة.
    he: ביטוי לטיני שפירושו 'אין דבר מעבר לכך' או 'אין עוד מעבר לכך', ששימש היסטורית כמוטו או אזהרה. מקורו
