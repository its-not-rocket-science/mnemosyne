    ja: ウェルギリウスの《牧歌集》の有名な一節で、「愛はすべてに打ち勝つ」を意味し、人間の経験や文学における愛の絶大な力を象徴している。
    zh: 维吉尔《牧歌》中的著名诗句，意为“爱战胜一切”，象征着爱在人类经验和文学中的无可抗拒的力量。
    ar: سطر مشهور من *الأغاني* لفيرجيل يعني 'الحب يغلب كل شيء'، ويرمز إلى القوة التي لا تقاوم للحب في
