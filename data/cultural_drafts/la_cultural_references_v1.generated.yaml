    en: The personal motto of Louis XIV of France, meaning 'Not unequal to many' or 'Equal to the many.'
      It reflects the Sun King's belief in his divine right and absolute power.
    es: El lema personal de Luis XIV de Francia, que significa 'No inferior a muchos' o 'Igual a los muchos'.
      Refleja la creencia del Rey Sol en su derecho divino y poder absoluto.
    fr: La devise personnelle de Louis XIV de France, signifiant 'Non inférieur à beaucoup' ou 'Égal à
      beaucoup'. Elle reflète la croyance du Roi-Soleil en son droit divin et son pouvoir absolu.
    de: Das persönliche Motto Ludwigs XIV. von Frankreich, das 'Nicht geringer als viele' oder 'Gleich
      vielen' bedeutet. Es spiegelt den Glauben des Sonnenkönigs an sein Gottesgnadentum und absolute
      Macht wider.
    it: Il motto personale di Luigi XIV di Francia, che significa 'Non inferiore a molti' o 'Uguale a
      molti'. Riflette la convinzione del Re Sole nel suo diritto divino e nel potere assoluto.
    pt: O lema pessoal de Luís XIV da França, que significa 'Não inferior a muitos' ou 'Igual a muitos'.
      Reflete a crença do Rei Sol em seu direito divino e poder absoluto.
    ru: Личный девиз Людовика XIV Французского, означающий 'Не уступающий многим' или 'Равный многим'.
