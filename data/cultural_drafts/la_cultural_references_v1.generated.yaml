- id: la_literary_reference_carmina_burana_35aad607
  language: la
  canonical_reference: Carmina burana
  reference_type: literary_reference
  surface_patterns:
  - Carmina Burana
  short_explanation: A collection of medieval Latin poems and dramatic texts from the 11th–13th centuries,
    often satirical or moralizing. Best known today for Carl Orff's 1937 musical adaptation.
  i18n_explanations:
    en: A collection of medieval Latin poems and dramatic texts from the 11th–13th centuries, often satirical
      or moralizing. Best known today for Carl Orff's 1937 musical adaptation.
    es: Colección de poemas y textos dramáticos medievales en latín (siglos XI–XIII), a menudo satíricos
      o moralizantes. Hoy es más conocida por la adaptación musical de Carl Orff de 1937.
    fr: Recueil de poèmes et textes dramatiques médiévaux en latin (XIe–XIIIe siècles), souvent satiriques
      ou moralisateurs. Aujourd'hui surtout connu pour l'adaptation musicale de Carl Orff en 1937.
    de: Eine Sammlung mittelalterlicher lateinischer Gedichte und dramatischer Texte aus dem 11.–13. Jahrhundert,
      oft satirisch oder moralisierend. Heute vor allem durch Carl Orffs musikalische Adaption von 1937
      bekannt.
    it: Raccolta di poemi e testi drammatici medievali in latino (XI–XIII secolo), spesso satirici o moraleggianti.
      Oggi è nota soprattutto per l'adattamento musicale di Carl Orff del 1937.
    pt: Coleção de poemas e textos dramáticos medievais em latim (séculos XI–XIII), muitas vezes satíricos
      ou moralizantes. Hoje é mais conhecida pela adaptação musical de Carl Orff de 1937.
    ru: Сборник средневековых латинских стихов и драматических текстов XI–XIII веков, часто сатирических
      или назидательных. Известен сегодня благодаря музыкальной адаптации Карла Орфа 1937 года.
    ja: 11～13世紀のラテン語による詩と劇のテキストを集めた中世の作品集で、しばしば風刺的または教訓的な内容。今日ではカール・オルフによる1937年の音楽化で最も知られる。
    zh: 11至13世纪的拉丁语诗歌与戏剧文本集，常含讽刺或道德教诲。今以卡尔·奥尔夫1937年谱曲的音乐作品最为知名。
    ar: مجموعة من القصائد والنصوص الدرامية اللاتينية في القرون الوسطى (القرن 11–13)، غالبًا ما تكون ساخرة
      أو أخلاقية. تشتهر اليوم بتأليف كارل أورف الموسيقي لعام 1937.
    he: אוסף של שירים וטקסטים דרמטיים לטיניים מימי הביניים (המאות 11–13), לרוב סאטיריים או מוסרניים. ידוע
