  i18n_explanations:
    en: A Latin phrase meaning 'scraped tablet,' referring to a clean slate or unmarked surface. Philosophically,
      it denotes the mind before experience (associated with Aristotle and Locke).
    es: Frase latina que significa 'tabla raspada', refiriéndose a una pizarra limpia o superficie sin
      marcas. Filosóficamente, denota la mente antes de la experiencia (asociada con Aristóteles y Locke).
    fr: Expression latine signifiant 'tablette grattée', désignant une ardoise propre ou une surface vierge.
      Philosophiquement, elle évoque l'esprit avant l'expérience (liée à Aristote et Locke).
    de: Ein lateinischer Ausdruck für 'abgekratzte Tafel', der eine unbeschriebene Fläche bezeichnet.
      Philosophisch steht er für den unberührten Geist vor der Erfahrung (verbunden mit Aristoteles und
      Locke).
    it: Espressione latina che significa 'tavoletta raschiata', riferendosi a una lavagna pulita o superficie
      immacolata. Filosoficamente, indica la mente prima dell'esperienza (associata ad Aristotele e Locke).
    pt: Expressão latina que significa 'tábua raspada', referindo-se a uma lousa limpa ou superfície sem
      marcas. Filosoficamente, denota a mente antes da experiência (associada a Aristóteles e Locke).
    ru: Латинское выражение, означающее 'очищенная доска', относящееся к чистой поверхности или незаполненному
      уму. В философии обозначает разум до получения опыта (связано с Аристотелем и Локком).
    ja: 「削られた板」を意味するラテン語。未使用の状態や白紙の表面を指す。哲学的には経験前の心（アリストテレスやロックと関連）を表す。
    zh: 拉丁语短语，意为‘刮净的书板’，指一张干净的板或未被标记的表面。哲学上，指经验前的心灵状态（与亚里士多德和洛克相关）。
    ar: عبارة لاتينية تعني 'لوح محو'، وتشير إلى صفحة نظيفة أو سطح غير ممسوس. فلسفيًا، تدل على العقل قبل
