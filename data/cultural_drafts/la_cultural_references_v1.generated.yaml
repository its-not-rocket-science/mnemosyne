- id: la_classical_or_scriptural_allusion_graecum_est_non_legitur_895f10fb
  language: la
  canonical_reference: Graecum est; non legitur
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Graecum est; non legitur
  - Graecum est, non legitur
  - Graecum est non legitur
  - Graecum est; non legitur.
  - Graecum est, non legitur.
  short_explanation: A phrase attributed to St. Jerome, meaning 'It is Greek; it is not read.' It reflects
    the medieval practice of dismissing texts in Greek as unintelligible, often used metaphorically for
    anything obscure or unreadable.
  i18n_explanations:
    en: A phrase attributed to St. Jerome, meaning 'It is Greek; it is not read.' It reflects the medieval
      practice of dismissing texts in Greek as unintelligible, often used metaphorically for anything
      obscure or unreadable.
    es: Una frase atribuida a San Jerónimo que significa 'Es griego; no se lee'. Refleja la práctica medieval
      de descartar textos en griego por incomprensibles, usada metafóricamente para cualquier cosa oscura
      o ilegible.
    fr: Une phrase attribuée à saint Jérôme, signifiant 'C'est du grec ; cela ne se lit pas'. Elle reflète
      la pratique médiévale de rejeter les textes en grec comme incompréhensibles, souvent utilisée métaphoriquement
      pour désigner quelque chose d'obscur ou d'illisible.
    de: Ein Zitat, das dem heiligen Hieronymus zugeschrieben wird, mit der Bedeutung 'Es ist Griechisch;
      es wird nicht gelesen'. Es spiegelt die mittelalterliche Praxis wider, griechische Texte als unverständlich
      abzutun, oft metaphorisch für alles Unverständliche oder Unleserliche verwendet.
    it: Una frase attribuita a San Girolamo che significa 'È greco; non si legge'. Riflette la pratica
      medievale di respingere i testi in greco come incomprensibili, spesso usata metaforicamente per
      qualsiasi cosa oscura o illeggibile.
    pt: Uma frase atribuída a São Jerônimo que significa 'É grego; não se lê'. Reflete a prática medieval
      de descartar textos em grego como incompreensíveis, muitas vezes usada metaforicamente para qualquer
      coisa obscura ou ilegível.
    ru: Фраза, приписываемая святому Иерониму, означающая 'Это по-гречески; это не читается'. Отражает
      средневековую практику отвергать греческие тексты как непонятные, часто используется метафорически
      для всего непонятного или нечитаемого.
    ja: 聖ヒエロニムスに帰せられる言葉で、「ギリシャ語だ、読めない」という意味。中世においてギリシャ語のテキストを理解不能として退ける慣習を反映し、曖昧なものや読めないもの全般を指す隠喩として用いられる。
    zh: 圣杰罗姆名下的一句话，意为“这是希腊语；无法阅读”。反映了中世纪将希腊语文本视为无法理解而摒弃的做法，常隐喻性地用于描述任何晦涩或无法阅读的事物。
    ar: عبارة تنسب للقديس جيروم وتعني 'إنه يوناني؛ لا يُقرأ'. تعكس الممارسة الوسطى المتمثلة في رفض النصوص
      اليونانية باعتبارها غير مفهومة، وغالبًا ما تُستخدم مجازيًا لأي شيء غامض أو غير قابل للقراءة.
    he: ביטוי המיוחס לסנט ג'רום שפירושו 'זה יוונית; לא ניתן לקרוא'. משקף את המנהג בימי הביניים לזלזל בטקסטים
      יווניים כבלתי מובנים, ונעשה בו שימוש מטפורי לתיאור דברים מעורפלים או בלתי קריאים.
