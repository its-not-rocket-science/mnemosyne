  - Plenus venter non studet libenter
  - Plenus venter non libenter studet
  - Venter plenus non studet libenter
  short_explanation: A Latin proverb meaning 'a full belly does not study willingly,' emphasizing the
    difficulty of focusing on intellectual tasks when one is sated. It reflects ancient wisdom on the
    balance between physical and mental needs.
  i18n_explanations:
    en: A Latin proverb meaning 'a full belly does not study willingly,' emphasizing the difficulty of
      focusing on intellectual tasks when one is sated. It reflects ancient wisdom on the balance between
      physical and mental needs.
    es: Proverbio latino que significa 'un vientre lleno no estudia con gusto,' destacando la dificultad
      de concentrarse en tareas intelectuales cuando uno está satisfecho. Refleja la sabiduría antigua
      sobre el equilibrio entre necesidades físicas y mentales.
    fr: Un proverbe latin signifiant 'un ventre plein n'étudie pas volontiers,' soulignant la difficulté
      de se concentrer sur des tâches intellectuelles lorsqu'on est rassasié. Il reflète la sagesse antique
      sur l'équilibre entre les besoins physiques et mentaux.
    de: Ein lateinisches Sprichwort, das bedeutet 'ein voller Bauch studiert nicht gern,' und betont die
      Schwierigkeit, sich auf geistige Aufgaben zu konzentrieren, wenn man satt ist. Es spiegelt die antike
      Weisheit über das Gleichgewicht zwischen körperlichen und geistigen Bedürfnissen wider.
    it: Un proverbio latino che significa 'un ventre pieno non studia volentieri,' sottolineando la difficoltà
      di concentrarsi su compiti intellettuali quando si è sazi. Riflette la saggezza antica sull'equilibrio
      tra esigenze fisiche e mentali.
    pt: Um provérbio latino que significa 'uma barriga cheia não estuda de bom grado,' destacando a dificuldade
      de se concentrar em tarefas intelectuais quando se está saciado. Reflete a sabedoria antiga sobre
      o equilíbrio entre necessidades físicas e mentais.
    ru: Латинская пословица, означающая 'сытый живот неохотно учится', подчеркивающая трудности сосредоточения
      на умственных задачах, когда человек сыт. Отражает древнюю мудрость о балансе между физическими
      и умственными потребностями.
    ja: ラテン語の諺で、「満腹では勉強したくない」を意味し、満腹時には知的作業に集中するのが難しいことを強調する。肉体的・精神的ニーズのバランスに関する古代の知恵を反映している。
    zh: 拉丁谚语，意为“饱腹不愿学习”，强调当人吃饱时难以专注于脑力任务。体现了古人对身体与精神需求平衡的智慧。
    ar: مثل لاتيني يعني 'بطن ممتلئ لا يدرس برغبة'، مؤكدًا صعوبة التركيز في المهام الفكرية عند الشبع. يعكس
      الحكمة القديمة حول التوازن بين الاحتياجات الجسدية والعقلية.
    he: פתגם לטיני שפירושו 'בטן מלאה לא לומדת ברצון', המדגיש את הקושי להתרכז במשימות שכליות כשאדם שבע.
      משקף את החוכמה העתיקה על האיזון בין צרכים גופניים ונפשיים.
