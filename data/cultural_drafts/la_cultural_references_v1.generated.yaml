- id: la_proverb_tradition_qui_bene_vivit_bene_moritur_d688b0aa
  language: la
  canonical_reference: Qui bene vivit, bene moritur
  reference_type: proverb_tradition
  surface_patterns:
  - Qui bene vivit, bene moritur
  - Qui bene vixerit, bene morietur
  - Qui bene vivit, bene moritur, qui male, male
  short_explanation: A Stoic and Christian proverb meaning 'He who lives well, dies well.' It emphasizes
    the moral life as a preparation for a good death, reflecting Stoic and early Christian ideals.
  i18n_explanations:
    en: A Stoic and Christian proverb meaning 'He who lives well, dies well.' It emphasizes the moral
      life as a preparation for a good death, reflecting Stoic and early Christian ideals.
    es: Refrán estoico y cristiano que significa 'Quien vive bien, muere bien'. Destaca que una vida moral
      es preparación para una buena muerte, reflejando ideales estoicos y cristianos tempranos.
    fr: Proverbe stoïcien et chrétien signifiant 'Celui qui vit bien meurt bien'. Il souligne que la vie
      morale est une préparation à une bonne mort, reflétant les idéaux stoïciens et chrétiens primitifs.
    de: Ein stoischer und christlicher Spruch mit der Bedeutung 'Wer gut lebt, stirbt gut'. Er betont,
      dass ein moralisches Leben die Vorbereitung auf einen guten Tod ist und spiegelt stoische und frühe
      christliche Ideale wider.
    it: Un proverbio stoico e cristiano che significa 'Chi vive bene, muore bene'. Sottolinea come una
      vita morale sia una preparazione per una buona morte, riflettendo ideali stoici e cristiani antichi.
    pt: Um provérbio estoico e cristão que significa 'Quem vive bem, morre bem'. Enfatiza que uma vida
      moral é preparação para uma boa morte, refletindo ideais estoicos e cristãos primitivos.
    ru: Стоическая и христианская пословица, означающая 'Кто живёт хорошо, тот и умирает хорошо'. Подчеркивает,
      что нравственная жизнь готовит к достойной смерти, отражая идеалы стоицизма и раннего христианства.
    ja: ストア派とキリスト教の格言で「善く生きる者は善く死ぬ」を意味する。道徳的な生き方が良い死への準備であることを強調し、ストア派と初期キリスト教の理想を反映している。
    zh: 一句斯多葛派和基督教的谚语，意为‘善终者必先善生’。强调道德生活是对美好死亡的准备，体现了斯多葛派和早期基督教的理想。
