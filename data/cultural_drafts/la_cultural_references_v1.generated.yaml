      power of love in human experience and literature.
    es: Frase famosa de las *Églogas* de Virgilio que significa 'El amor lo vence todo', simbolizando
      el poder irresistible del amor en la experiencia humana y la literatura.
    fr: Vers célèbre des *Églogues* de Virgile signifiant 'L'amour triomphe de tout', symbolisant le pouvoir
      irrésistible de l'amour dans l'expérience humaine et la littérature.
    de: Berühmter Vers aus Vergils *Eklogen* mit der Bedeutung 'Die Liebe besiegt alles', der die unwiderstehliche
