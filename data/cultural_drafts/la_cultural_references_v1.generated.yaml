- id: la_literary_reference_cicero_consul_catilinae_coniurationem_repressit_c101452a
  language: la
  canonical_reference: Cicero consul Catilinae coniurationem repressit
  reference_type: literary_reference
  surface_patterns:
  - Cicero consul Catilinae coniurationem repressit
  - Catilinae coniurationem Cicero repressit
  - Cicero Catilinae coniurationem repressit
  short_explanation: This refers to Cicero's suppression of the Catilinarian Conspiracy in 63 BC, a pivotal
    event in Roman history where Cicero, as consul, exposed and thwarted a plot by Lucius Sergius Catilina
    to overthrow the Roman Republic.
  i18n_explanations:
    en: This refers to Cicero's suppression of the Catilinarian Conspiracy in 63 BC, a pivotal event in
      Roman history where Cicero, as consul, exposed and thwarted a plot by Lucius Sergius Catilina to
      overthrow the Roman Republic.
    es: Esto se refiere a la represión de la conspiración de Catilina por parte de Cicerón en el 63 a.C.,
      un evento crucial en la historia romana donde Cicerón, como cónsul, expuso y frustró un plan de
      Lucio Sergio Catilina para derrocar a la República Romana.
    fr: Cela fait référence à la répression de la conjuration de Catilina par Cicéron en 63 av. J.-C.,
      un événement clé de l'histoire romaine où Cicéron, en tant que consul, a démasqué et déjoué un complot
      de Lucius Sergius Catilina visant à renverser la République romaine.
    de: Dies bezieht sich auf Ciceros Niederschlagung der Catilinarischen Verschwörung im Jahr 63 v. Chr.,
      ein zentrales Ereignis der römischen Geschichte, bei dem Cicero als Konsul eine Verschwörung von
      Lucius Sergius Catilina zur Abschaffung der Römischen Republik aufdeckte und vereitelte.
    it: Questo si riferisce alla repressione della congiura di Catilina da parte di Cicerone nel 63 a.C.,
      un evento cruciale nella storia romana in cui Cicerone, in qualità di console, svelò e sventò un
      piano di Lucio Sergio Catilina per rovesciare la Repubblica romana.
    pt: Isso se refere à repressão da conspiração de Catilina por Cícero em 63 a.C., um evento crucial
      na história romana em que Cícero, como cônsul, expôs e frustrou um plano de Lúcio Sérgio Catilina
      para derrubar a República Romana.
    ru: Это относится к подавлению Цицероном заговора Катилины в 63 году до н.э., ключевого события в
      римской истории, когда Цицерон, будучи консулом, раскрыл и сорвал план Луция Сергия Катилины по
      свержению Римской Республики.
    ja: これは、紀元前63年にキケロがカティリナの陰謀を鎮圧したことを指します。ローマの歴史における重要な出来事であり、キケロが執政官としてルキウス・セルギウス・カティリナによるローマ共和国転覆の陰謀を暴露し阻止した事件です。
    zh: 这指的是西塞罗在公元前63年镇压卡提利那阴谋的事件，罗马历史上的一个关键事件，时任执政官的西塞罗揭露并挫败了卢基乌斯·塞尔吉乌斯·卡提利那推翻罗马共和国的阴谋。
    ar: يشير هذا إلى قمع شيشرون لمؤامرة كاتيلينا في عام 63 قبل الميلاد، وهو حدث محوري في التاريخ الروماني
      حيث كشف شيشرون، بصفته قنصلاً، عن خطة لوسيوس سيرغيوس كاتيلينا للإطاحة بالجمهورية الرومانية.
    he: ביטוי זה מתייחס לדיכוי הקשר של קאטילינה על ידי קיקרו בשנת 63 לפנה"ס, אירוע מכריע בהיסטוריה הרומית
      שבו קיקרו, כקונסול, חשף וסיכל מזימה של לוקיוס סרגיוס קאטילינה להפיל את הרפובליקה הרומית.
