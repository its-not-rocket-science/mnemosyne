  short_explanation: A phrase meaning 'The art is to conceal art,' emphasizing the importance of subtlety
    and naturalness in skilled performance, particularly in rhetoric and poetry. It is famously associated
    with Horace.
  i18n_explanations:
    en: A phrase meaning 'The art is to conceal art,' emphasizing the importance of subtlety and naturalness
      in skilled performance, particularly in rhetoric and poetry. It is famously associated with Horace.
    es: Una frase que significa 'El arte consiste en ocultar el arte,' destacando la importancia de la
      sutileza y la naturalidad en el desempeño experto, especialmente en retórica y poesía. Está famously
      asociada con Horacio.
    fr: Une phrase signifiant 'L'art consiste à cacher l'art,' soulignant l'importance de la subtilité
      et de la naturel dans l'exécution habile, notamment en rhétorique et en poésie. Elle est famously
      associée à Horace.
    de: Ein Spruch mit der Bedeutung 'Die Kunst besteht darin, die Kunst zu verbergen,' der die Wichtigkeit
      von Subtilität und Natürlichkeit in gekonnter Darstellung betont, besonders in Rhetorik und Dichtung.
      Er ist berühmt mit Horaz verbunden.
    it: Una frase che significa 'L'arte consiste nel nascondere l'arte,' che sottolinea l'importanza della
      sottigliezza e della naturalezza nell'esecuzione abile, soprattutto in retorica e poesia. È famosamente
      associata a Orazio.
    pt: Uma frase que significa 'A arte está em esconder a arte,' destacando a importância da sutileza
      e naturalidade em uma performance hábil, especialmente em retórica e poesia. Está famously associada
      a Horácio.
    ru: Фраза со значением 'Искусство — скрывать искусство,' подчёркивающая важность тонкости и естественности
      в мастерском исполнении, особенно в риторике и поэзии. Известно, что она связана с Горацием.
    ja: 「芸術とは芸術を隠すこと」という意味の言葉で、特に修辞学や詩において、熟練した演技における繊細さと自然さの重要性を強調する。ホラティウスとの関連で有名。
    zh: 一个说法，意为‘艺术在于隐藏艺术’，强调在熟练表演中（尤其是修辞与诗歌）的微妙与自然之重要。与贺拉斯的名言密切相关。
    ar: عبارة تعني 'الفن يكمن في إخفاء الفن'، مؤكدة على أهمية الدقة والطبيعية في الأداء الماهر، خاصة في
      البلاغة والشعر. ترتبط بشكل مشهور بهوراس.
    he: ביטוי שפירושו 'האמנות היא להסתיר את האמנות', המדגיש את חשיבות העדינות והטבעיות בביצוע מיומן, בעיקר
      ברטוריקה ובשירה. קשור באופן מפורסם להורטיוס.
