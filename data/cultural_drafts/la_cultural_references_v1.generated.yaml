  - Dianae arcum
  short_explanation: Diana, the Roman goddess of the hunt and the moon, was often depicted with a bow
    and arrows (arcus). The phrase refers to her as an archer and symbolizes her role as a huntress.
  i18n_explanations:
    en: Diana, the Roman goddess of the hunt and the moon, was often depicted with a bow and arrows (arcus).
      The phrase refers to her as an archer and symbolizes her role as a huntress.
    es: Diana, la diosa romana de la caza y la luna, era representada con un arco y flechas (arcus). La
      frase se refiere a ella como arquera y simboliza su papel como cazadora.
    fr: Diane, la déesse romaine de la chasse et de la lune, était souvent représentée avec un arc et
      des flèches (arcus). L'expression la désigne comme archère et symbolise son rôle de chasseresse.
    de: Diana, die römische Göttin der Jagd und des Mondes, wurde oft mit Bogen und Pfeilen (arcus) dargestellt.
      Der Ausdruck bezieht sich auf sie als Bogenschützin und symbolisiert ihre Rolle als Jägerin.
    it: Diana, la dea romana della caccia e della luna, era spesso raffigurata con un arco e frecce (arcus).
      La frase si riferisce a lei come arciera e simboleggia il suo ruolo di cacciatrice.
    pt: Diana, a deusa romana da caça e da lua, era frequentemente retratada com um arco e flechas (arcus).
      A frase refere-se a ela como arqueira e simboliza seu papel como caçadora.
    ru: Диана, римская богиня охоты и луны, часто изображалась с луком и стрелами (arcus). Фраза относится
      к ней как к лучнице и символизирует её роль охотницы.
    ja: ローマ神話の狩猟と月の女神ディアナは、しばしば弓と矢（アルクス）で描かれます。この表現は彼女を弓の名手として表し、狩人の役割を象徴します。
    zh: 戴安娜是罗马神话中的狩猎与月亮女神，常被描绘为持弓箭（arcus）的形象。这个短语指她作为弓箭手，象征其狩猎者的角色。
    ar: ديانا، إلهة الصيد والقمر الرومانية، كانت غالبًا تُصوَّر بقوس وسهام (أركوس). العبارة تشير إليها
      كرمية وترمز إلى دورها كصيادة.
    he: דיאנה, אלת הציד והירח הרומית, הוצגה לעיתים קרובות עם קשת וחצים (ארקוס). הביטוי מתייחס אליה כאל
