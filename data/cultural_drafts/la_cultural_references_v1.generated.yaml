- id: la_proverb_tradition_qui_tacet_consentire_videtur_7c9c1105
  language: la
  canonical_reference: Qui tacet, consentire videtur
  reference_type: proverb_tradition
  surface_patterns:
  - Qui tacet, consentire videtur
  - Qui tacet, consentire dicitur
  - Qui tacet, consentire videtur, qui negat, infitiari videtur
  - Qui tacet, consentire videtur, qui dissentit, negare debet
  short_explanation: A legal maxim meaning 'He who is silent is deemed to consent.' It reflects the principle
    that silence can imply agreement unless explicitly stated otherwise.
  i18n_explanations:
    en: A legal maxim meaning 'He who is silent is deemed to consent.' It reflects the principle that
      silence can imply agreement unless explicitly stated otherwise.
    es: Máxima jurídica que significa 'Quien calla, consiente'. Refleja el principio de que el silencio
      puede implicar acuerdo a menos que se indique lo contrario.
    fr: Maxime juridique signifiant 'Celui qui se tait est réputé consentir'. Elle reflète le principe
      selon lequel le silence peut impliquer un accord, sauf indication contraire.
    de: Eine Rechtsmaxime mit der Bedeutung 'Wer schweigt, gilt als einverstanden'. Sie besagt, dass Schweigen
      Zustimmung bedeuten kann, sofern nicht ausdrücklich das Gegenteil erklärt wird.
    it: Massima giuridica che significa 'Chi tace acconsente'. Riflette il principio secondo cui il silenzio
      può implicare accordo, a meno che non sia esplicitamente dichiarato diversamente.
    pt: Maxima jurídica que significa 'Quem cala consente'. Reflete o princípio de que o silêncio pode
      implicar acordo, a menos que seja explicitamente declarado o contrário.
    ru: Юридическая максима, означающая 'Молчание равносильно согласию'. Отражает принцип, что молчание
      может подразумевать согласие, если не указано иное.
    ja: 法的格言で「沈黙は同意とみなされる」を意味する。これは、明示的に反対されない限り、沈黙が同意を示す可能性を反映している。
    zh: 一条法律格言，意为‘沉默即表示同意’。这反映了沉默可以暗示同意的原则，除非另有明确说明。
    ar: مبدأ قانوني يعني 'من يسكت يُعتبر موافقًا'. يعكس المبدأ القائل بأن السكوت قد يدل على الموافقة ما
      لم يُنص على خلاف ذلك.
    he: פתגם משפטי שמשמעו 'השותק נחשב כמסכים'. משקף את העיקרון לפיו שתיקה עשויה להעיד על הסכמה אלא אם
      כן נאמר אחרת במפורש.
