- id: la_classical_or_scriptural_allusion_nihil_est_in_intellectu_quod_non_prius_fuerit_in_sensu_bfe91479
  language: la
  canonical_reference: Nihil est in intellectu quod non prius fuerit in sensu
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Nihil est in intellectu quod non prius fuerit in sensu
  - Nihil est in animo quod non antea in sensu fuerit
  - Nihil in intellectu nisi prius in sensu
  short_explanation: A foundational principle of empiricism, asserting that all knowledge originates from
    sensory experience. It was later adopted and popularized by John Locke in his formulation 'Nothing
    is in the mind that was not first in the senses.'
  i18n_explanations:
    en: A foundational principle of empiricism, asserting that all knowledge originates from sensory experience.
      It was later adopted and popularized by John Locke in his formulation 'Nothing is in the mind that
      was not first in the senses.'
    es: Principio fundamental del empirismo que afirma que todo conocimiento proviene de la experiencia
      sensorial. John Locke lo popularizó con la frase 'Nada hay en la mente que no haya estado primero
      en los sentidos'.
    fr: Principe fondamental de l'empirisme selon lequel toute connaissance provient de l'expérience sensorielle.
      John Locke l'a popularisé avec la formule 'Rien n'est dans l'esprit qui n'ait été d'abord dans les
      sens'.
    de: Grundprinzip des Empirismus, das besagt, dass alles Wissen aus sinnlicher Erfahrung stammt. John
      Locke prägte später die Formulierung 'Nichts ist im Verstand, was nicht zuvor in den Sinnen war'.
    it: Principio fondante dell'empirismo che afferma che ogni conoscenza deriva dall'esperienza sensoriale.
      John Locke lo rese popolare con la frase 'Nulla è nella mente che non sia stato prima nei sensi'.
    pt: Princípio fundamental do empirismo que afirma que todo conhecimento vem da experiência sensorial.
      John Locke o popularizou com a frase 'Nada está na mente que não tenha estado primeiro nos sentidos'.
    ru: Основной принцип эмпиризма, утверждающий, что всё знание исходит из чувственного опыта. Джон Локк
      позже популяризовал его формулировкой 'Нет ничего в разуме, чего не было бы сначала в чувствах'.
    ja: 経験主義の基本原則で、すべての知識は感覚経験に由来すると主張する。ジョン・ロックは後に「感覚に先立って心にあるものは何もない」という言葉でこれを普及させた。
    zh: 经验主义的基本原则，认为所有知识都源于感官经验。约翰·洛克后来用‘心灵中原本没有任何东西不是先在感官中’这一表述使其广为流传。
    ar: مبدأ أساسي في التجريبية ينص على أن كل المعرفة تأتي من الخبرة الحسية. تبناه جون لوك لاحقًا بصياغة
      'لا شيء في العقل لم يكن من قبل في الحواس'.
    he: עיקרון יסודי באמפיריציזם הטוען שכל הידע נובע מניסיון חושי. ג'ון לוק אימץ והפיץ מאוחר יותר את הנוסח
      'אין דבר במחשבה שלא היה קודם בחושים'.
