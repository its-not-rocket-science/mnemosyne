- id: la_literary_reference_hic_niger_est_hunc_tu_romane_caveto_7431d1c2
  language: la
  canonical_reference: Hic niger est, hunc tu, Romane, caveto
  reference_type: literary_reference
  surface_patterns:
  - Hic niger est, hunc tu, Romane, caveto
  - hic niger est, hunc tu Romane caveto
  - hic niger est; hunc tu, Romane, caveto
  short_explanation: A line from a Roman epigram warning Romans to beware of a dark-skinned man, often
    interpreted as a reference to danger or betrayal. It appears in the *Anthologia Latina* and has been
    debated for its racial and political implications.
  i18n_explanations:
    en: A line from a Roman epigram warning Romans to beware of a dark-skinned man, often interpreted
      as a reference to danger or betrayal. It appears in the *Anthologia Latina* and has been debated
      for its racial and political implications.
    es: Un verso de un epigrama romano que advierte a los romanos que desconfíen de un hombre de piel
      oscura, interpretado a menudo como una referencia al peligro o la traición. Aparece en la *Antología
      Latina* y ha sido debatido por sus implicaciones raciales y políticas.
    fr: Un vers d'un épigramme romain mettant en garde les Romains contre un homme à la peau foncée, souvent
      interprété comme une référence au danger ou à la trahison. Il apparaît dans l'*Anthologia Latina*
      et a fait l'objet de débats en raison de ses implications raciales et politiques.
    de: Ein Vers aus einem römischen Epigramm, der die Römer warnt, sich vor einem dunkelhäutigen Mann
      in Acht zu nehmen, oft als Hinweis auf Gefahr oder Verrat gedeutet. Er stammt aus der *Anthologia
      Latina* und wird wegen seiner rassistischen und politischen Implikationen diskutiert.
    it: Un verso di un epigramma romano che avverte i Romani di diffidare di un uomo dalla pelle scura,
      spesso interpretato come un riferimento al pericolo o al tradimento. Compare nell'*Anthologia Latina*
      ed è stato oggetto di dibattito per le sue implicazioni razziali e politiche.
    pt: Um verso de um epigrama romano que adverte os romanos para desconfiarem de um homem de pele escura,
      muitas vezes interpretado como uma referência ao perigo ou à traição. Aparece na *Antologia Latina*
      e tem sido debatido por suas implicações raciais e políticas.
    ru: Строка из римского эпиграммы, предупреждающая римлян остерегаться темнокожего мужчины, часто интерпретируемая
      как указание на опасность или предательство. Встречается в *Anthologia Latina* и вызывает споры
      из-за расовых и политических подтекстов.
    ja: ローマ人の警告で、暗い肌の男を警戒せよというローマのエピグラムの一節。しばしば危険や裏切りを示唆すると解釈され、*ラテン語詩選集*に見られる。人種的・政治的含意を巡って議論されている。
    zh: 罗马警句中的一句，告诫罗马人要提防一个黑皮肤男子，常被解读为对危险或背叛的隐喻。出自《拉丁诗选》，因其种族和政治含义备受争议。
    ar: سطر من إبيجرام روماني يحذر الرومان من الحذر من رجل أسود البشرة، غالبًا ما يُفهم على أنه إشارة
      إلى الخطر أو الخيانة. يظهر في *أنثولوجيا لاتينا* وقد نوقش بسبب دلالاته العرقية والسياسية.
    he: שורה מאפיגרמה רומית המזהירה את הרומאים להיזהר מגבר בעל עור כהה, לעיתים קרובות נתפסת כהתייחסות
      לסכנה או לבגידה. מופיעה ב*אנתולוגיה הלטינית* ונדונה בשל השלכותיה הגזעניות והפוליטיות.
