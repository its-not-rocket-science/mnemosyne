      euch gegeben hat', bezogen auf das Manna, das den Israeliten in der Wüste geschenkt wurde. Es wird
      auch in der christlichen Liturgie während der Eucharistie verwendet.
    it: Una frase della Bibbia Vulgata latina che significa 'Questo è il pane che il Signore vi ha dato',
      riferendosi alla manna fornita agli Israeliti nel deserto. Viene anche usata nella liturgia cristiana
      durante l'Eucaristia.
    pt: Uma frase da Bíblia Vulgata Latina que significa 'Este é o pão que o Senhor lhes deu', referindo-se
      ao maná dado aos israelitas no deserto. Também é usada na liturgia cristã durante a Eucaristia.
    ru: Фраза из латинской Вульгаты, означающая 'Вот хлеб, который Господь дал вам', относящаяся к манне,
