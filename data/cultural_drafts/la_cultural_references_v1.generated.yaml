    it: Una frase attribuita a Cicerone che significa 'L'abitudine è una seconda natura.' Sottolinea il
      potere dell'abitudine nel plasmare il comportamento e il carattere umani.
    pt: Uma frase atribuída a Cícero que significa 'O hábito é uma segunda natureza.' Destaca o poder
