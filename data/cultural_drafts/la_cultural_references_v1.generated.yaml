  - Cornelia mater Gracchorum fuit
  - Cornelia mater Tiberii et Gaii Gracchi
  - Cornelia mater Gracchorum dicitur
  short_explanation: Cornelia Africana, daughter of Scipio Africanus, was the mother of the Gracchi brothers,
    Tiberius and Gaius Gracchus, who were pivotal figures in the late Roman Republic. She is celebrated
    as a model of Roman maternal virtue.
  i18n_explanations:
    en: Cornelia Africana, daughter of Scipio Africanus, was the mother of the Gracchi brothers, Tiberius
      and Gaius Gracchus, who were pivotal figures in the late Roman Republic. She is celebrated as a
      model of Roman maternal virtue.
    es: Cornelia Africana, hija de Escipión el Africano, fue la madre de los hermanos Graco, Tiberio y
      Cayo Graco, figuras clave en la República Romana tardía. Es celebrada como modelo de virtud materna
      romana.
    fr: Cornélie l'Africaine, fille de Scipion l'Africain, fut la mère des frères Gracques, Tiberius et
      Caius Gracchus, figures majeures de la fin de la République romaine. Elle est célébrée comme un
      modèle de vertu maternelle romaine.
    de: Cornelia Africana, Tochter des Scipio Africanus, war die Mutter der Gracchus-Brüder Tiberius und
      Gaius Gracchus, die prägende Figuren der späten Römischen Republik waren. Sie gilt als Vorbild römischer
      Muttertugend.
    it: Cornelia Africana, figlia di Scipione l'Africano, fu madre dei fratelli Gracchi, Tiberio e Gaio
      Gracco, figure chiave della tarda Repubblica romana. È celebrata come modello di virtù materna romana.
    pt: Cornélia Africana, filha de Cipião Africano, foi mãe dos irmãos Graco, Tibério e Caio Graco, figuras
      fundamentais na República Romana tardia. É celebrada como modelo de virtude materna romana.
    ru: Корнелия Африканка, дочь Сципиона Африканского, была матерью братьев Гракхов, Тиберия и Гая Гракхов,
      ключевых фигур Поздней Римской Республики. Она почитается как образец римской материнской добродетели.
    ja: スキピオ・アフリカヌスの娘コルネリア・アフリカナは、後期ローマ共和国の重要人物であるグラックス兄弟（ティベリウスとガイウス）の母親であった。彼女はローマの母性の模範として称えられている。
    zh: 科尔内利娅·阿非利加娜（小西庇阿之女）是罗马共和国晚期重要人物提比略·格拉古和盖约·格拉古的母亲。她被誉为罗马母性美德的典范。
    ar: كورنيليا الأفريقية، ابنة سكيبيو الأفريقي، كانت أم الأخوين غراتشوس، تيبيريوس وغايوس غراتشوس، اللذين
      كانا شخصيتين محوريتين في أواخر الجمهورية الرومانية. تُحتفل بها كنموذج الفضيلة الأمومية الرومانية.
    he: קורנליה האפריקאית, בתו של סקיפיו אפריקנוס, הייתה אמם של האחים גרקכוס, טיבריוס וגאיוס גרקכוס, דמויות
