  i18n_explanations:
    en: A Latin epithet for Jesus Christ, meaning 'Nourishing Jesus' or 'Bountiful Jesus,' often used
      in Christian liturgy and hymns to emphasize His role as a source of spiritual sustenance.
    es: Epíteto latino de Jesucristo que significa 'Jesús Nutricio' o 'Jesús Generoso', usado en la liturgia
      y himnos cristianos para destacar su papel como fuente de sustento espiritual.
    fr: Épithète latine de Jésus-Christ signifiant 'Jésus le Nourricier' ou 'Jésus le Bienfaisant', souvent
      employée dans la liturgie et les hymnes pour souligner son rôle de source de subsistance spirituelle.
    de: Lateinische Bezeichnung für Jesus Christus mit der Bedeutung 'nährender Jesus' oder 'reichlicher
      Jesus', oft in Liturgie und Hymnen verwendet, um seine Rolle als Quelle geistlicher Nahrung zu betonen.
    it: Epitetto latino di Gesù Cristo che significa 'Gesù Nutritore' o 'Gesù Generoso', usato nella liturgia
      e negli inni cristiani per sottolineare il suo ruolo di fonte di sostentamento spirituale.
    pt: Epíteto latino de Jesus Cristo que significa 'Jesus Nutridor' ou 'Jesus Generoso', usado na liturgia
      e hinos cristãos para enfatizar seu papel como fonte de sustento espiritual.
    ru: Латинское прозвище Иисуса Христа, означающее 'Питающий Иисус' или 'Щедрый Иисус', часто используемое
      в христианской литургии и гимнах для подчеркивания Его роли как источника духовной поддержки.
