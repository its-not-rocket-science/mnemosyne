- id: la_literary_reference_cum_fenicis_morior_edf27436
  language: la
  canonical_reference: Cum fenicis morior
  reference_type: literary_reference
  surface_patterns:
  - Cum fenicis morior
  - cum phoenice morior
  - cum phoenice mori
  - cum phoenice moritur
  short_explanation: This Latin phrase means 'I die with the phoenix,' symbolizing a rare or unique death.
    It alludes to the mythical phoenix, which was said to die in flames and be reborn from its ashes.
  i18n_explanations:
    en: This Latin phrase means 'I die with the phoenix,' symbolizing a rare or unique death. It alludes
      to the mythical phoenix, which was said to die in flames and be reborn from its ashes.
    es: Esta frase latina significa 'Muero con el fénix', simbolizando una muerte rara o única. Alude
      al fénix mitológico, que según la leyenda moría en llamas y renacía de sus cenizas.
    fr: Cette phrase latine signifie 'Je meurs avec le phénix', symbolisant une mort rare ou unique. Elle
      fait référence au phénix mythologique, qui, selon la légende, mourait dans les flammes et renaissait
      de ses cendres.
    de: Dieser lateinische Ausdruck bedeutet 'Ich sterbe mit dem Phönix' und symbolisiert einen seltenen
      oder einzigartigen Tod. Er spielt auf den mythischen Phönix an, der angeblich in Flammen starb und
      aus seiner Asche wiederauferstand.
    it: Questa frase latina significa 'Muoio con la fenice', simbolizzando una morte rara o unica. Allude
      alla fenice mitologica, che secondo la leggenda moriva tra le fiamme e risorgeva dalle sue ceneri.
    pt: Esta frase em latim significa 'Eu morro com a fênix', simbolizando uma morte rara ou única. Faz
      referência à mítica fênix, que, segundo a lenda, morria em chamas e renascia de suas cinzas.
    ru: Эта латинская фраза означает 'Я умираю вместе с фениксом', символизируя редкую или уникальную
      смерть. Она отсылает к мифологической птице феникс, которая, согласно легенде, сгорала в огне и
      возрождалась из пепла.
    ja: このラテン語のフレーズは「私はフェニックスと共に死ぬ」を意味し、稀で独特な死を象徴します。伝説の不死鳥フェニックスが炎の中で死に、その灰から再生するとされることに由来します。
    zh: 这句拉丁语短语意为“与凤凰同生共死”，象征着一种罕见或独特的死亡。它指的是神话中的凤凰，传说中会在烈焰中死去并从灰烬中重生。
    ar: هذه العبارة اللاتينية تعني 'أموت مع العنقاء'، ترمز إلى موت نادر أو فريد. إنها تشير إلى الطائر
      الأسطوري العنقاء، الذي يُقال إنه يموت في النار ويعود للحياة من رماده.
    he: ביטוי לטיני זה פירושו 'אני מת עם הפניקס', המסמל מוות נדיר או ייחודי. הוא מתייחס לפניקס המיתולוגי,
      שלפי האגדה מת בשריפה ונולד מחדש מתוך אפרו.
