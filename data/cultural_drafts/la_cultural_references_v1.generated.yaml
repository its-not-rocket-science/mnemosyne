      and introspection.
    es: Un antiguo aforismo griego (Δελφικὸν γράμμα) inscrito en el Templo de Apolo en Delfos. Su equivalente
      latino, 'Nosce te ipsum', se convirtió en un pilar de la filosofía clásica, destacando la autoconciencia
      y la introspección.
    fr: Un aphorisme grec ancien (Δελφικὸν γράμμα) gravé sur le Temple d'Apollon à Delphes. Son équivalent
      latin, 'Nosce te ipsum', devint un pilier de la philosophie classique, soulignant l'introspection
      et la connaissance de soi.
    de: Ein altgriechischer Sinnspruch (Δελφικὸν γράμμα), der am Tempel des Apollon in Delphi eingraviert
      war. Die lateinische Entsprechung 'Nosce te ipsum' wurde zu einem Grundpfeiler der klassischen Philosophie
      und betont Selbstreflexion.
    it: Un antico aforisma greco (Δελφικὸν γράμμα) inciso sul Tempio di Apollo a Delfi. Il suo equivalente
      latino, 'Nosce te ipsum', divenne un pilastro della filosofia classica, enfatizzando l'autoconsapevolezza
      e l'introspezione.
    pt: Um antigo aforismo grego (Δελφικὸν γράμμα) inscrito no Templo de Apolo em Delfos. Seu equivalente
      latino, 'Nosce te ipsum', tornou-se um pilar da filosofia clássica, destacando a autoconsciência
      e a introspecção.
    ru: Древнегреческий афоризм (Δελφικὸν γράμμα), высеченный на храме Аполлона в Дельфах. Его латинский
      эквивалент 'Nosce te ipsum' стал основой классической философии, подчеркивая самопознание и саморефлексию.
    ja: デルポイのアポロン神殿に刻まれた古代ギリシャの格言（Δελφικὸν γράμμα）。ラテン語の等価表現 'Nosce te ipsum' は古典哲学の基礎となり、自己認識と内省を重視した。
    zh: 古希腊箴言（Δελφικὸν γράμμα），刻于德尔斐的阿波罗神庙。其拉丁文对应语‘Nosce te ipsum’成为古典哲学的基石，强调自我意识与内省。
    ar: مثل يوناني قديم (Δελφικὸν γράμμα) منقوش على معبد أبولو في دلف. نظيره اللاتيني 'اعرف نفسك' أصبح
