- id: es_cultural_reference_el_sitio_de_numancia_2bb542be
  language: es
  canonical_reference: El sitio de Numancia
  reference_type: cultural_reference
  surface_patterns:
  - el sitio de Numancia
  - sitio de Numancia
  - Numancia
  short_explanation: The prolonged Roman siege of the Celtiberian city of Numantia around 134-133 BCE,
    famous for the Numantines' heroic resistance against overwhelming odds. It is a symbol of resistance
    and honor in Spanish culture, and was dramatized by Cervantes in his play 'El cerco de Numancia'.
  i18n_explanations:
    en: The prolonged Roman siege of the Celtiberian city of Numantia around 134-133 BCE, famous for the
      Numantines' heroic resistance against overwhelming odds. It is a symbol of resistance and honor
      in Spanish culture, and was dramatized by Cervantes in his play 'El cerco de Numancia'.
    es: El prolongado asedio romano de la ciudad celtíbera de Numancia alrededor del 134-133 a.C., famoso
      por la heroica resistencia de los numantinos contra una abrumadora superioridad. Es un símbolo de
      resistencia y honor en la cultura española, y fue dramatizado por Cervantes en su obra 'El cerco
      de Numancia'.
    fr: Le long siège romain de la ville celtibère de Numance vers 134-133 av. J.-C., célèbre pour la
      résistance héroïque des Numantins face à des forces écrasantes. C'est un symbole de résistance et
      d'honneur dans la culture espagnole, et a été dramatisé par Cervantès dans sa pièce 'Le siège de
      Numance'.
    de: Die langwierige römische Belagerung der keltiberischen Stadt Numantia um 134-133 v. Chr., berühmt
      für den heldenhaften Widerstand der Numantiner gegen überwältigende Übermacht. Es ist ein Symbol
      für Widerstand und Ehre in der spanischen Kultur und wurde von Cervantes in seinem Stück 'Die Belagerung
      von Numantia' dramatisiert.
    it: Il prolungato assedio romano della città celtiberica di Numanzia intorno al 134-133 a.C., famoso
      per l'eroica resistenza dei numantini contro forze soverchianti. È un simbolo di resistenza e onore
      nella cultura spagnola, ed è stato drammatizzato da Cervantes nella sua opera 'L'assedio di Numanzia'.
    pt: O prolongado cerco romano à cidade celtibera de Numância por volta de 134-133 a.C., famoso pela
      heróica resistência dos numantinos contra forças esmagadoras. É um símbolo de resistência e honra
      na cultura espanhola, e foi dramatizado por Cervantes em sua peça 'O cerco de Numância'.
    ru: Длительная римская осада кельтиберского города Нумансия около 134-133 гг. до н.э., знаменитая
      героическим сопротивлением нумантийцев против превосходящих сил. Это символ сопротивления и чести
      в испанской культуре, и был драматизирован Сервантесом в его пьесе «Осада Нумансии».
    ja: 紀元前134～133年頃のケルティベリア都市ヌマンティアに対する長期にわたるローマの包囲戦。圧倒的な不利の中でのヌマンティア人の英雄的な抵抗で知られる。スペイン文化における抵抗と名誉の象徴であり、セルバンテスによって戯曲『ヌマンシアの包囲』で劇化された。
    zh: 约公元前134-133年，罗马对凯尔特伊比利亚城市努曼提亚的长期围城，因努曼提亚人在极端劣势下的英勇抵抗而闻名。它是西班牙文化中抵抗和荣誉的象征，并被塞万提斯在其戏剧《努曼西亚之围》中搬上舞台。
    ar: حصار روماني طويل لمدينة نومانسيا الكلتيبيرية حوالي 134-133 قبل الميلاد، اشتهر بالمقاومة البطولية
      للنومانسيين ضد قوى ساحقة. إنه رمز للمقاومة والشرف في الثقافة الإسبانية، وقد صوره ثيربانتس في مسرحيته
      'حصار نومانسيا'.
    he: המצור הרומי הממושך על העיר הקלטיברית נומנטיה בסביבות 134-133 לפנה"ס, המפורסם בהתנגדות הגבורה של
      הנומנטינים מול סיכויים עצומים. הוא סמל להתנגדות ולכבוד בתרבות הספרדית, והוצג על ידי סרוונטס במחזהו
      'המצור על נומנטיה'.
