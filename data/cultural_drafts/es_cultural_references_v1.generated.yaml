  short_explanation: 'A fable warning against greed: a goose that lays golden eggs is killed by its owner
    who wants all the gold at once, losing the source of wealth.'
  i18n_explanations:
    en: 'A fable warning against greed: a goose that lays golden eggs is killed by its owner who wants
      all the gold at once, losing the source of wealth.'
    es: 'Una fábula que advierte contra la codicia: una oca que pone huevos de oro es asesinada por su
      dueño, que quiere todo el oro de una vez, perdiendo la fuente de riqueza.'
    fr: 'Une fable mettant en garde contre l''avidité : une oie qui pond des œufs d''or est tuée par son
      propriétaire qui veut tout l''or à la fois, perdant ainsi la source de richesse.'
    de: 'Eine Fabel, die vor Gier warnt: Eine Gans, die goldene Eier legt, wird von ihrem Besitzer getötet,
      der das ganze Gold auf einmal haben will, und verliert so die Quelle des Reichtums.'
    it: 'Una favola che mette in guardia contro l''avidità: un''oca che depone uova d''oro viene uccisa
      dal suo proprietario che vuole tutto l''oro in una volta, perdendo la fonte di ricchezza.'
    pt: 'Uma fábula que adverte contra a ganância: uma gansa que põe ovos de ouro é morta por seu dono,
      que quer todo o ouro de uma vez, perdendo a fonte de riqueza.'
    ru: 'Басня, предупреждающая о жадности: гусыня, несущая золотые яйца, убивается своим хозяином, который
      хочет сразу всё золото, теряя источник богатства.'
    ja: 貪欲を戒める寓話：金の卵を産むガチョウを飼い主が一度にすべての金を得ようとして殺し、富の源を失う。
    zh: 一个告诫贪婪的寓言：一只下金蛋的鹅被它的主人杀死，主人想一次性得到所有金子，却失去了财富来源。
    ar: 'خرافة تحذر من الجشع: أوزة تضع بيضًا ذهبيًا يقتلها مالكها الذي يريد كل الذهب دفعة واحدة، فيفقد
      مصدر الثروة.'
    he: 'משל המזהיר מפני חמדנות: אווז המטיל ביצי זהב נהרג על ידי בעליו שרוצה את כל הזהב בבת אחת, ובכך
      מאבד את מקור העושר.'
