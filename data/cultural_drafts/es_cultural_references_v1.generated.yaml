- id: es_cultural_reference_la_reconquista_fbcd3c85
  language: es
  canonical_reference: La Reconquista
  reference_type: cultural_reference
  surface_patterns:
  - la Reconquista
  - Reconquista
  short_explanation: The centuries-long Christian reconquest of the Iberian Peninsula from Muslim rule,
    culminating in the fall of Granada in 1492. It is a foundational narrative in Spanish history.
  i18n_explanations:
    en: The centuries-long Christian reconquest of the Iberian Peninsula from Muslim rule, culminating
      in the fall of Granada in 1492. It is a foundational narrative in Spanish history.
    es: La reconquista cristiana de la Península Ibérica del dominio musulmán que duró siglos, culminando
      con la caída de Granada en 1492. Es una narrativa fundacional en la historia de España.
    fr: La reconquête chrétienne de la péninsule Ibérique sur la domination musulmane qui a duré des siècles,
      aboutissant à la chute de Grenade en 1492. C'est un récit fondateur de l'histoire espagnole.
    de: Die jahrhundertelange christliche Rückeroberung der Iberischen Halbinsel von der muslimischen
      Herrschaft, die mit dem Fall Granadas im Jahr 1492 ihren Höhepunkt erreichte. Es ist eine grundlegende
      Erzählung der spanischen Geschichte.
    it: La secolare riconquista cristiana della penisola iberica dal dominio musulmano, culminata con
      la caduta di Granada nel 1492. È una narrazione fondante della storia spagnola.
    pt: A reconquista cristã da Península Ibérica do domínio muçulmano que durou séculos, culminando com
      a queda de Granada em 1492. É uma narrativa fundamental na história espanhola.
    ru: Многовековое христианское отвоевание Пиренейского полуострова у мусульманского правления, кульминацией
      которого стало падение Гранады в 1492 году. Это основополагающее повествование в истории Испании.
    ja: 何世紀にもわたるキリスト教徒によるイベリア半島のイスラム支配からの再征服で、1492年のグラナダ陥落で頂点に達した。スペイン史の基盤となる物語である。
    zh: 长达几个世纪的基督徒从穆斯林统治下收复伊比利亚半岛的过程，以1492年格拉纳达的陷落告终。这是西班牙历史的一个基础性叙事。
    ar: الاسترداد المسيحي لشبه الجزيرة الأيبيرية من الحكم الإسلامي الذي استمر لقرون، وبلغ ذروته بسقوط
      غرناطة عام 1492. وهو سردية تأسيسية في التاريخ الإسباني.
    he: הרקונקיסטה הנוצרית של חצי האי האיברי משלטון מוסלמי שנמשכה מאות שנים, והגיעה לשיאה בנפילת גרנדה
