    Independence Day.
  i18n_explanations:
    en: The cry of rebellion uttered by Miguel Hidalgo in the town of Dolores on September 16, 1810, marking
      the beginning of the Mexican War of Independence. It is celebrated annually as Mexico's Independence
      Day.
    es: El grito de rebeldía pronunciado por Miguel Hidalgo en la ciudad de Dolores el 16 de septiembre
      de 1810, que marca el inicio de la Guerra de Independencia de México. Se celebra anualmente como
      el Día de la Independencia de México.
    fr: Le cri de rébellion lancé par Miguel Hidalgo dans la ville de Dolores le 16 septembre 1810, marquant
      le début de la guerre d'indépendance du Mexique. Il est célébré chaque année comme le jour de l'indépendance
      du Mexique.
    de: Der von Miguel Hidalgo am 16. September 1810 in der Stadt Dolores ausgerufene Aufruf zur Rebellion,
      der den Beginn des mexikanischen Unabhängigkeitskrieges markiert. Er wird jährlich als mexikanischer
      Unabhängigkeitstag gefeiert.
    it: Il grido di ribellione pronunciato da Miguel Hidalgo nella città di Dolores il 16 settembre 1810,
      che segna l'inizio della guerra d'indipendenza messicana. Viene celebrato ogni anno come il Giorno
      dell'Indipendenza del Messico.
    pt: O grito de rebelião proferido por Miguel Hidalgo na cidade de Dolores em 16 de setembro de 1810,
      marcando o início da Guerra de Independência do México. É celebrado anualmente como o Dia da Independência
      do México.
    ru: Крик восстания, произнесённый Мигелем Идальго в городе Долорес 16 сентября 1810 года, ознаменовавший
      начало Войны за независимость Мексики. Ежегодно отмечается как День независимости Мексики.
    ja: 1810年9月16日、ミゲル・イダルゴがドローレスの町で発した反乱の叫びで、メキシコ独立戦争の始まりを告げる。毎年メキシコ独立記念日として祝われる。
    zh: 1810年9月16日，米格尔·伊达尔戈在多洛雷斯镇发出的起义呐喊，标志着墨西哥独立战争的开始。每年作为墨西哥独立日庆祝。
    ar: صرخة التمرد التي أطلقها ميغيل إيدالغو في بلدة دولوريس في 16 سبتمبر 1810، إيذانا ببدء حرب الاستقلال
      المكسيكية. يتم الاحتفال بها سنويا كعيد الاستقلال المكسيكي.
    he: זעקת המרד שהשמיע מיגל אידלגו בעיירה דולורס ב-16 בספטמבר 1810, המסמנת את תחילת מלחמת העצמאות של
