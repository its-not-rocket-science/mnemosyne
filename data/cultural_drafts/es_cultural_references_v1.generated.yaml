    en: Phrase from the New Testament referring to John the Baptist's role as a herald of Jesus Christ.
      It is used metaphorically for someone who speaks out alone, often without being heard.
    es: Frase del Nuevo Testamento que se refiere al papel de Juan el Bautista como heraldo de Jesucristo.
      Se usa metafóricamente para alguien que habla solo, a menudo sin ser escuchado.
    fr: Phrase du Nouveau Testament faisant référence au rôle de Jean le Baptiste en tant que héraut de
      Jésus-Christ. Elle est utilisée métaphoriquement pour quelqu'un qui parle seul, souvent sans être
      entendu.
    de: Ausdruck aus dem Neuen Testament, der sich auf Johannes den Täufer als Herold Jesu Christi bezieht.
      Wird metaphorisch für jemanden verwendet, der allein spricht, oft ohne gehört zu werden.
    it: Frase del Nuovo Testamento che si riferisce al ruolo di Giovanni Battista come araldo di Gesù
      Cristo. È usata metaforicamente per qualcuno che parla da solo, spesso senza essere ascoltato.
    pt: Frase do Novo Testamento referindo-se ao papel de João Batista como arauto de Jesus Cristo. É
      usada metaforicamente para alguém que fala sozinho, muitas vezes sem ser ouvido.
    ru: Фраза из Нового Завета, относящаяся к роли Иоанна Крестителя как предтечи Иисуса Христа. Используется
      метафорически для человека, который говорит в одиночку, часто оставаясь неуслышанным.
    ja: 新約聖書の言葉で、イエス・キリストの先駆者としての洗礼者ヨハネの役割を指す。単独で語るが、しばしば聞かれない人を比喩的に表す。
    zh: 来自新约的短语，指施洗约翰作为耶稣基督先驱的角色。比喻指独自发言、常不被听见的人。
    ar: عبارة من العهد الجديد تشير إلى دور يوحنا المعمدان كنذير ليسوع المسيح. تستخدم مجازياً لشخص يتحدث
      بمفرده، غالباً دون أن يُسمع.
    he: ביטוי מהברית החדשה המתייחס לתפקידו של יוחנן המטביל כמבשרו של ישוע המשיח. הוא משמש באופן מטפורי
