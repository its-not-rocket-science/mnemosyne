  - Constitución de Cádiz
  - la Pepa
  short_explanation: The Spanish Constitution of 1812, enacted by the Cortes of Cádiz, was a liberal constitution
    that established national sovereignty and limited monarchy; it is known as 'La Pepa' because it was
    adopted on Saint Joseph's Day.
  i18n_explanations:
    en: The Spanish Constitution of 1812, enacted by the Cortes of Cádiz, was a liberal constitution that
      established national sovereignty and limited monarchy; it is known as 'La Pepa' because it was adopted
      on Saint Joseph's Day.
    es: La Constitución española de 1812, promulgada por las Cortes de Cádiz, fue una constitución liberal
      que estableció la soberanía nacional y la monarquía limitada; se la conoce como 'La Pepa' porque
      fue adoptada el día de San José.
    fr: La Constitution espagnole de 1812, promulguée par les Cortes de Cadix, était une constitution
      libérale qui établit la souveraineté nationale et la monarchie limitée ; elle est connue sous le
      nom de 'La Pepa' car elle a été adoptée le jour de la Saint-Joseph.
    de: Die spanische Verfassung von 1812, erlassen von den Cortes von Cádiz, war eine liberale Verfassung,
      die die nationale Souveränität und eine begrenzte Monarchie etablierte; sie ist als 'La Pepa' bekannt,
      weil sie am St. Josephstag angenommen wurde.
    it: La Costituzione spagnola del 1812, emanata dalle Cortes di Cadice, era una costituzione liberale
      che stabiliva la sovranità nazionale e la monarchia limitata; è conosciuta come 'La Pepa' perché
      fu adottata il giorno di San Giuseppe.
    pt: A Constituição espanhola de 1812, promulgada pelas Cortes de Cádiz, foi uma constituição liberal
      que estabeleceu a soberania nacional e a monarquia limitada; é conhecida como 'La Pepa' porque foi
      adotada no dia de São José.
    ru: Испанская конституция 1812 года, принятая Кортесами Кадиса, была либеральной конституцией, установившей
      национальный суверенитет и ограниченную монархию; она известна как 'Ла Пепа', потому что была принята
      в день Святого Иосифа.
    ja: 1812年のスペイン憲法は、カディス国会によって制定された自由主義憲法で、国家主権と制限君主制を確立した。聖ヨセフの日に採択されたことから「ラ・ペパ」として知られている。
    zh: 1812年西班牙宪法由加的斯议会颁布，是一部确立国家主权和有限君主制的自由宪法；因在圣约瑟夫日通过而被称为"拉佩帕"。
    ar: دستور إسبانيا عام 1812، الذي أقرته كورتيس قادس، كان دستورًا ليبراليًا أرسى السيادة الوطنية والملكية
      المحدودة؛ يُعرف باسم 'لا بيبا' لأنه تم تبنيه في عيد القديس يوسف.
