- id: es_cultural_reference_la_batalla_de_lepanto_2fd41a00
  language: es
  canonical_reference: La batalla de Lepanto
  reference_type: cultural_reference
  surface_patterns:
  - la batalla de Lepanto
  - batalla de Lepanto
  - Lepanto
  short_explanation: A major naval battle fought on October 7, 1571, in which the Christian Holy League
    defeated the Ottoman fleet, halting Ottoman expansion in the Mediterranean. It is famously referenced
    in Cervantes' works as he fought there.
  i18n_explanations:
    en: A major naval battle fought on October 7, 1571, in which the Christian Holy League defeated the
      Ottoman fleet, halting Ottoman expansion in the Mediterranean. It is famously referenced in Cervantes'
      works as he fought there.
    es: Una importante batalla naval librada el 7 de octubre de 1571, en la que la Liga Santa cristiana
      derrotó a la flota otomana, deteniendo la expansión otomana en el Mediterráneo. Es famosamente mencionada
      en las obras de Cervantes, quien luchó allí.
    fr: Une grande bataille navale livrée le 7 octobre 1571, au cours de laquelle la Sainte Ligue chrétienne
      a vaincu la flotte ottomane, stoppant l'expansion ottomane en Méditerranée. Elle est célèbre dans
      les œuvres de Cervantès, qui y a combattu.
    de: Eine bedeutende Seeschlacht am 7. Oktober 1571, in der die christliche Heilige Liga die osmanische
      Flotte besiegte und die osmanische Expansion im Mittelmeer stoppte. Sie wird berühmt in Cervantes'
      Werken erwähnt, da er dort kämpfte.
    it: Una grande battaglia navale combattuta il 7 ottobre 1571, in cui la Lega Santa cristiana sconfisse
      la flotta ottomana, fermando l'espansione ottomana nel Mediterraneo. È famosamente menzionata nelle
      opere di Cervantes, che vi combatté.
    pt: Uma grande batalha naval travada em 7 de outubro de 1571, na qual a Liga Santa cristã derrotou
      a frota otomana, interrompendo a expansão otomana no Mediterrâneo. É famosa por ser referenciada
      nas obras de Cervantes, que lutou lá.
    ru: Крупное морское сражение, произошедшее 7 октября 1571 года, в котором христианская Священная лига
      разгромила османский флот, остановив османскую экспансию в Средиземноморье. Знаменито упоминается
      в произведениях Сервантеса, так как он участвовал в этом сражении.
    ja: 1571年10月7日に行われた大規模な海戦で、キリスト教の神聖同盟がオスマン帝国艦隊を破り、地中海でのオスマン帝国の拡大を阻止した。セルバンテスがそこで戦ったことから、彼の作品で有名に言及されている。
    zh: 1571年10月7日发生的一场重大海战，基督教神圣联盟击败了奥斯曼舰队，阻止了奥斯曼在地中海的扩张。塞万提斯曾在此参战，因此他的作品中经常提及此战。
    ar: معركة بحرية كبرى وقعت في 7 أكتوبر 1571، هزم فيها التحالف المسيحي المقدس الأسطول العثماني، مما
      أوقف التوسع العثماني في البحر الأبيض المتوسط. ورد ذكرها الشهير في أعمال ثيربانتس، حيث قاتل هناك.
    he: קרב ימי מרכזי שהתחולל ב-7 באוקטובר 1571, בו הברית הקדושה הנוצרית הביסה את הצי העות'מאני, תוך עצירת
      ההתפשטות העות'מאנית בים התיכון. הוא מוזכר באופן מפורסם ביצירותיו של סרוונטס, שנלחם שם.
