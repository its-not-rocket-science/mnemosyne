  i18n_explanations:
    en: A psychoanalytic concept describing unconscious sexual desire for the opposite-sex parent, based
      on the Greek tragedy of Oedipus who unknowingly kills his father and marries his mother.
    es: Un concepto psicoanalítico que describe el deseo sexual inconsciente hacia el progenitor del sexo
      opuesto, basado en la tragedia griega de Edipo, quien sin saberlo mata a su padre y se casa con
      su madre.
    fr: Un concept psychanalytique décrivant le désir sexuel inconscient pour le parent de sexe opposé,
      basé sur la tragédie grecque d'Œdipe qui tue son père et épouse sa mère sans le savoir.
    de: Ein psychoanalytisches Konzept, das unbewusste sexuelle Wünsche gegenüber dem Elternteil des anderen
      Geschlechts beschreibt, basierend auf der griechischen Tragödie des Ödipus, der unwissentlich seinen
      Vater tötet und seine Mutter heiratet.
    it: Un concetto psicoanalitico che descrive il desiderio sessuale inconscio per il genitore del sesso
      opposto, basato sulla tragedia greca di Edipo che uccide inconsapevolmente suo padre e sposa sua
      madre.
    pt: Um conceito psicanalítico que descreve o desejo sexual inconsciente pelo genitor do sexo oposto,
      baseado na tragédia grega de Édipo, que mata seu pai sem saber e se casa com sua mãe.
    ru: Психоаналитическое понятие, описывающее бессознательное сексуальное влечение к родителю противоположного
      пола, основанное на греческой трагедии об Эдипе, который невольно убивает своего отца и женится
      на своей матери.
    ja: 無意識の異性親への性的欲求を説明する精神分析的概念。ギリシャ悲劇のオイディプスが知らずに父親を殺し母親と結婚したことに基づく。
    zh: 一种精神分析概念，描述对异性父母的无意识性欲望，源于希腊悲剧中俄狄浦斯在不知情的情况下杀死父亲并娶了母亲的故事。
    ar: مفهوم تحليلي نفسي يصف الرغبة الجنسية اللاواعية تجاه الوالد من الجنس الآخر، استنادًا إلى المأساة
