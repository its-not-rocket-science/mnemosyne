  short_explanation: The 'Disaster of 1898' refers to Spain's loss of its last overseas colonies (Cuba,
    Puerto Rico, Philippines) after the Spanish-American War, causing national trauma and a literary generation.
  i18n_explanations:
    en: The 'Disaster of 1898' refers to Spain's loss of its last overseas colonies (Cuba, Puerto Rico,
      Philippines) after the Spanish-American War, causing national trauma and a literary generation.
    es: El 'Desastre del 98' se refiere a la pérdida de las últimas colonias españolas de ultramar (Cuba,
      Puerto Rico, Filipinas) tras la guerra hispano-estadounidense, causando un trauma nacional y una
      generación literaria.
    fr: Le 'Désastre de 1898' fait référence à la perte par l'Espagne de ses dernières colonies d'outre-mer
      (Cuba, Porto Rico, Philippines) après la guerre hispano-américaine, provoquant un traumatisme national
      et une génération littéraire.
    de: Die 'Katastrophe von 1898' bezieht sich auf den Verlust der letzten spanischen Überseekolonien
      (Kuba, Puerto Rico, Philippinen) nach dem Spanisch-Amerikanischen Krieg, was ein nationales Trauma
      und eine literarische Generation verursachte.
    it: Il 'Disastro del 1898' si riferisce alla perdita da parte della Spagna delle sue ultime colonie
      d'oltremare (Cuba, Porto Rico, Filippine) dopo la guerra ispano-americana, causando un trauma nazionale
      e una generazione letteraria.
    pt: O 'Desastre de 1898' refere-se à perda das últimas colônias ultramarinas espanholas (Cuba, Porto
      Rico, Filipinas) após a Guerra Hispano-Americana, causando um trauma nacional e uma geração literária.
    ru: '''Катастрофа 1898 года'' относится к потере Испанией своих последних заморских колоний (Куба,
