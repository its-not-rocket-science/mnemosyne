    es: Se refiere al primer encuentro entre europeos y las Américas liderado por Cristóbal Colón en 1492,
      un evento pivotal en la historia española y mundial.
    fr: Fait référence à la première rencontre entre les Européens et les Amériques menée par Christophe
      Colomb en 1492, un événement crucial dans l'histoire espagnole et mondiale.
    de: Bezieht sich auf die erste Begegnung zwischen Europäern und Amerika unter der Führung von Christoph
      Kolumbus im Jahr 1492, ein entscheidendes Ereignis in der spanischen und Weltgeschichte.
    it: Si riferisce al primo incontro tra europei e Americhe guidato da Cristoforo Colombo nel 1492,
