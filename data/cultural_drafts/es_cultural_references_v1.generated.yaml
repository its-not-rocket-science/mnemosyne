    fr: Fait référence à la nuit du 30 juin au 1er juillet 1520, lorsque Hernán Cortés et ses forces espagnoles
      subirent une défaite dévastatrice face aux Aztèques à Tenochtitlán. Il symbolise un revers majeur
      dans la conquête espagnole du Mexique.
    de: Bezieht sich auf die Nacht vom 30. Juni auf den 1. Juli 1520, als Hernán Cortés und seine spanischen
      Truppen eine verheerende Niederlage durch die Azteken in Tenochtitlán erlitten. Es symbolisiert
      einen großen Rückschlag bei der spanischen Eroberung Mexikos.
    it: Si riferisce alla notte tra il 30 giugno e il 1 luglio 1520, quando Hernán Cortés e le sue forze
      spagnole subirono una devastante sconfitta per mano degli Aztechi a Tenochtitlán. Simboleggia una
      grave battuta d'arresto nella conquista spagnola del Messico.
    pt: Refere-se à noite de 30 de junho a 1 de julho de 1520, quando Hernán Cortés e suas forças espanholas
      sofreram uma derrota devastadora nas mãos dos astecas em Tenochtitlán. Simboliza um grande revés
      na conquista espanhola do México.
    ru: Относится к ночи с 30 июня на 1 июля 1520 года, когда Эрнан Кортес и его испанские силы потерпели
      сокрушительное поражение от рук ацтеков в Теночтитлане. Это символизирует крупную неудачу в испанском
      завоевании Мексики.
    ja: 1520年6月30日から7月1日にかけての夜、エルナン・コルテスと彼のスペイン軍がテノチティトランでアステカに壊滅的な敗北を喫したことを指す。これはメキシコ征服における大きな挫折を象徴している。
    zh: 指1520年6月30日至7月1日夜间，埃尔南·科尔特斯及其西班牙军队在特诺奇蒂特兰遭到阿兹特克人的毁灭性失败。它象征着西班牙征服墨西哥过程中的重大挫折。
    ar: يشير إلى ليلة 30 يونيو - 1 يوليو 1520، عندما تعرض هرنان كورتيس وقواته الإسبانية لهزيمة مدمرة على
      يد الأزتيك في تينوتشتيتلان. إنه يرمز إلى نكسة كبيرة في الغزو الإسباني للمكسيك.
    he: מתייחס ללילה שבין 30 ביוני ל-1 ביולי 1520, כאשר הרנאן קורטס וכוחותיו הספרדים ספגו תבוסה הרסנית
      בידי האצטקים בטנוכטיטלאן. הוא מסמל כישלון גדול בכיבוש הספרדי של מקסיקו.
