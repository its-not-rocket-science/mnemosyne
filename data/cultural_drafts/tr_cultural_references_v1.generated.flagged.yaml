  short_explanation: A line from a Turkish folk song or poem, expressing a strong refusal, often used
    humorously to mean 'I don't want it, messenger, I don't want it'.
  i18n_explanations:
    en: A line from a Turkish folk song or poem, expressing a strong refusal, often used humorously to
      mean 'I don't want it, messenger, I don't want it'.
    es: Una línea de una canción o poema popular turco, que expresa un fuerte rechazo, a menudo usado
      humorísticamente para significar 'No lo quiero, mensajero, no lo quiero'.
    fr: Un vers d'une chanson ou d'un poème folklorique turc, exprimant un refus catégorique, souvent
      utilisé humoristiquement pour dire 'Je ne le veux pas, messager, je ne le veux pas'.
    de: Eine Zeile aus einem türkischen Volkslied oder Gedicht, die eine starke Ablehnung ausdrückt, oft
      humorvoll verwendet, um zu bedeuten 'Ich will es nicht, Bote, ich will es nicht'.
    it: Un verso di una canzone o poesia popolare turca, che esprime un forte rifiuto, spesso usato umoristicamente
      per significare 'Non lo voglio, messaggero, non lo voglio'.
    pt: Uma linha de uma canção ou poema folclórico turco, expressando uma forte recusa, frequentemente
      usada humoristicamente para significar 'Não quero, mensageiro, não quero'.
    ru: Строка из турецкой народной песни или стихотворения, выражающая решительный отказ, часто используется
      с юмором в значении 'Я не хочу этого, посланник, я не хочу'.
    ja: トルコの民謡や詩の一節で、強い拒絶を表し、よくユーモラスに「いらない、使者よ、いらない」という意味で使われます。
    zh: 土耳其民歌或诗歌中的一句，表达强烈拒绝，常幽默地用于表示'我不要，信使，我不要'。
    ar: سطر من أغنية أو قصيدة شعبية تركية، يعبر عن رفض قوي، ويستخدم غالبًا بشكل فكاهي ليعني 'لا أريده،
      أيها الرسول، لا أريده'.
    he: שורה משיר או שיר עם טורקי, המבטאת סירוב נחרץ, המשמשת לעתים קרובות בהומור במשמעות 'אני לא רוצה
      את זה, שליח, אני לא רוצה'.
