  - Var olan devlet gece gündüz yatar
  - Var olan devlet gece gündüz yatarmış
  short_explanation: This Turkish proverb means 'The existing state sleeps day and night,' criticizing
    complacency and laziness in those who rely on past achievements. It warns against resting on one's
    laurels.
  i18n_explanations:
    en: This Turkish proverb means 'The existing state sleeps day and night,' criticizing complacency
      and laziness in those who rely on past achievements. It warns against resting on one's laurels.
    es: Este proverbio turco significa 'El estado existente duerme día y noche', criticando la complacencia
      y la pereza de quienes confían en logros pasados. Advierte contra dormirse en los laureles.
    fr: Ce proverbe turc signifie 'L'État existant dort jour et nuit', critiquant la complaisance et la
      paresse de ceux qui se reposent sur leurs acquis. Il met en garde contre le fait de se reposer sur
      ses lauriers.
    de: Dieses türkische Sprichwort bedeutet 'Der bestehende Staat schläft Tag und Nacht' und kritisiert
      Selbstzufriedenheit und Faulheit bei denen, die sich auf vergangene Errungenschaften verlassen.
      Es warnt davor, sich auf seinen Lorbeeren auszuruhen.
    it: Questo proverbio turco significa 'Lo stato esistente dorme giorno e notte', criticando l'autocompiacimento
      e la pigrizia di chi si affida ai successi passati. Avverte contro l'adagiarsi sugli allori.
    pt: Este provérbio turco significa 'O estado existente dorme dia e noite', criticando a complacência
      e a preguiça daqueles que confiam em conquistas passadas. Adverte contra descansar sobre os louros.
    ru: Эта турецкая пословица означает 'Существующее государство спит днем и ночью', критикуя самоуспокоенность
      и лень тех, кто полагается на прошлые достижения. Она предостерегает от почивания на лаврах.
    ja: このトルコのことわざは「現状の国家は昼夜眠る」という意味で、過去の成果に頼る人々の自己満足と怠惰を批判しています。功績に安住することへの警告です。
    zh: 这句土耳其谚语的意思是“现有的国家日夜沉睡”，批评那些依赖过去成就的人的自满和懒惰。它警告不要躺在功劳簿上。
    ar: يعني هذا المثل التركي 'الدولة القائمة تنام ليل نهار'، منتقدًا الرضا الذاتي والكسل لدى أولئك الذين
