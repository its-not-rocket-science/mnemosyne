- id: tr_cultural_reference_tarhana_eşeği_a41a7062
  language: tr
  canonical_reference: Tarhana eşeği
  reference_type: cultural_reference
  surface_patterns:
  - tarhana eşeği
  - tarhana eşek
  short_explanation: A Turkish idiom referring to a person who is lazy or good-for-nothing, literally
    'tarhana donkey', from the idea that a donkey used for making tarhana (a dried soup) is not very useful.
  i18n_explanations:
    en: A Turkish idiom referring to a person who is lazy or good-for-nothing, literally 'tarhana donkey',
      from the idea that a donkey used for making tarhana (a dried soup) is not very useful.
    es: Modismo turco que se refiere a una persona perezosa o inútil, literalmente 'burro de tarhana',
      de la idea de que un burro usado para hacer tarhana (una sopa seca) no es muy útil.
    fr: Idiome turc désignant une personne paresseuse ou bonne à rien, littéralement 'âne de tarhana',
      de l'idée qu'un âne utilisé pour faire du tarhana (une soupe séchée) n'est pas très utile.
    de: Eine türkische Redewendung, die sich auf eine faule oder nichtsnutzige Person bezieht, wörtlich
      'Tarhana-Esel', von der Vorstellung, dass ein Esel, der zur Herstellung von Tarhana (einer getrockneten
      Suppe) verwendet wird, nicht sehr nützlich ist.
    it: Idioma turco che si riferisce a una persona pigra o buona a nulla, letteralmente 'asino di tarhana',
      dall'idea che un asino usato per fare tarhana (una zuppa secca) non sia molto utile.
    pt: Expressão idiomática turca que se refere a uma pessoa preguiçosa ou inútil, literalmente 'burro
      de tarhana', da ideia de que um burro usado para fazer tarhana (uma sopa seca) não é muito útil.
    ru: Турецкий идиом, обозначающий ленивого или никчёмного человека, буквально 'тарханный осёл', от
      идеи, что осёл, используемый для приготовления тарханы (сухой суп), не очень полезен.
    ja: 怠け者や役立たずの人を指すトルコの慣用句で、文字通り「タルハナロバ」。タルハナ（乾燥スープ）を作るのに使われるロバはあまり役に立たないという考えから。
    zh: 土耳其习语，指懒惰或无用的人，字面意思是“塔哈纳驴”，源于用来制作塔哈纳（一种干汤）的驴子不太有用。
    ar: تعبير اصطلاحي تركي يشير إلى شخص كسول أو عديم الفائدة، حرفياً 'حمار الطرخانة'، من فكرة أن الحمار
      المستخدم في صنع الطرخانة (حساء مجفف) ليس مفيداً جداً.
    he: ביטוי טורקי המתייחס לאדם עצלן או חסר תועלת, מילולית 'חמור טרחנה', מהרעיון שחמור המשמש להכנת טרחנה
      (מרק מיובש) אינו מועיל במיוחד.
