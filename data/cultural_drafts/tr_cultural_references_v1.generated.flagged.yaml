    richness of Istanbul. It is often performed in folk music gatherings and represents the city's iconic
    status in Turkish culture.
  i18n_explanations:
    en: İstanbul Türküsü is a traditional Turkish folk song that praises the beauty and cultural richness
      of Istanbul. It is often performed in folk music gatherings and represents the city's iconic status
      in Turkish culture.
    es: İstanbul Türküsü es una canción folclórica turca tradicional que alaba la belleza y la riqueza
      cultural de Estambul. A menudo se interpreta en reuniones de música folclórica y representa el estatus
      icónico de la ciudad en la cultura turca.
    fr: İstanbul Türküsü est une chanson folklorique turque traditionnelle qui loue la beauté et la richesse
      culturelle d'Istanbul. Elle est souvent interprétée lors de rassemblements de musique folklorique
      et représente le statut emblématique de la ville dans la culture turque.
    de: İstanbul Türküsü ist ein traditionelles türkisches Volkslied, das die Schönheit und den kulturellen
      Reichtum Istanbuls preist. Es wird oft bei Volksmusiktreffen aufgeführt und repräsentiert den ikonischen
      Status der Stadt in der türkischen Kultur.
    it: İstanbul Türküsü è una canzone popolare turca tradizionale che elogia la bellezza e la ricchezza
      culturale di Istanbul. Viene spesso eseguita in raduni di musica folk e rappresenta lo status iconico
      della città nella cultura turca.
    pt: İstanbul Türküsü é uma canção folclórica turca tradicional que elogia a beleza e a riqueza cultural
      de Istambul. É frequentemente apresentada em encontros de música folclórica e representa o status
      icônico da cidade na cultura turca.
    ru: İstanbul Türküsü — традиционная турецкая народная песня, восхваляющая красоту и культурное богатство
