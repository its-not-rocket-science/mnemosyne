  short_explanation: 'A Finnish proverb: ''When luck kicks, it kicks hard.'' It implies that even good
    fortune can come with painful consequences, often used ironically or philosophically.'
  i18n_explanations:
    en: 'A Finnish proverb: ''When luck kicks, it kicks hard.'' It implies that even good fortune can
      come with painful consequences, often used ironically or philosophically.'
    es: 'Un proverbio finlandés: ''Cuando la suerte patea, patea fuerte''. Implica que incluso la buena
      fortuna puede venir con consecuencias dolorosas, a menudo usado de manera irónica o filosófica.'
    fr: 'Un proverbe finlandais : ''Quand la chance frappe, elle frappe fort''. Il implique que même la
      bonne fortune peut avoir des conséquences douloureuses, souvent utilisé de manière ironique ou philosophique.'
    de: 'Ein finnisches Sprichwort: ''Wenn das Glück tritt, tritt es hart.'' Es impliziert, dass selbst
      gutes Glück mit schmerzhaften Konsequenzen kommen kann, oft ironisch oder philosophisch verwendet.'
    it: 'Un proverbio finlandese: ''Quando la fortuna colpisce, colpisce duro''. Implica che anche la
      buona fortuna può portare conseguenze dolorose, spesso usato ironicamente o filosoficamente.'
    pt: 'Um provérbio finlandês: ''Quando a sorte chuta, chuta forte''. Implica que mesmo a boa sorte
      pode vir com consequências dolorosas, muitas vezes usado de forma irônica ou filosófica.'
    ru: 'Финская пословица: «Когда удача пинает, она пинает больно». Это подразумевает, что даже удача
      может иметь болезненные последствия, часто используется иронически или философски.'
    ja: フィンランドのことわざ：「幸運が蹴るとき、それは強く蹴る。」良い運でさえ痛みを伴う結果をもたらすことがあるという意味で、皮肉や哲学的に使われることが多い。
    zh: 芬兰谚语：‘当幸运踢你时，它会踢得很痛。’意味着即使是好运也可能带来痛苦的后果，常被用于讽刺或哲理性语境。
    ar: 'مثل فنلندي: ''عندما تركل الحظ، تركل بقوة''. يعني أنه حتى الحظ الجيد يمكن أن يأتي بعواقب مؤلمة،
      ويستخدم غالبًا بشكل ساخر أو فلسفي.'
    he: 'פתגם פיני: ''כשהמזל בועט, הוא בועט חזק''. הוא מרמז שאפילו מזל טוב יכול לבוא עם השלכות כואבות,
