- id: fi_classical_or_scriptural_allusion_juudaksen_suudelma_67bc64ad
  language: fi
  canonical_reference: Juudaksen suudelma
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Juudaksen suudelma
  - Juudaksen suudelma -metafora
  short_explanation: Biblical reference to Judas Iscariot's kiss betraying Jesus (Matthew 26:48-49). Metaphor
    for a treacherous act disguised as friendship, often used in political or personal contexts to describe
    hypocrisy.
  i18n_explanations:
    en: Biblical reference to Judas Iscariot's kiss betraying Jesus (Matthew 26:48-49). Metaphor for a
      treacherous act disguised as friendship, often used in political or personal contexts to describe
      hypocrisy.
    es: Referencia bíblica al beso de Judas Iscariote traicionando a Jesús (Mateo 26:48-49). Metáfora
      de un acto traicionero disfrazado de amistad, a menudo usado en contextos políticos o personales
      para describir hipocresía.
    fr: Référence biblique au baiser de Judas Iscariote trahissant Jésus (Matthieu 26:48-49). Métaphore
      d'un acte perfide déguisé en amitié, souvent utilisée dans des contextes politiques ou personnels
      pour décrire l'hypocrisie.
    de: Biblischer Hinweis auf den Kuss des Judas Iskariot, der Jesus verriet (Matthäus 26,48-49). Metapher
      für einen verräterischen Akt, der als Freundschaft getarnt ist, häufig in politischen oder persönlichen
      Zusammenhängen verwendet, um Heuchelei zu beschreiben.
    it: Riferimento biblico al bacio di Giuda Iscariota che tradisce Gesù (Matteo 26:48-49). Metafora
      di un atto traditore mascherato da amicizia, spesso usato in contesti politici o personali per descrivere
      l'ipocrisia.
    pt: Referência bíblica ao beijo de Judas Iscariotes traindo Jesus (Mateus 26:48-49). Metáfora para
      um ato traiçoeiro disfarçado de amizade, frequentemente usado em contextos políticos ou pessoais
      para descrever hipocrisia.
    ru: Библейская ссылка на поцелуй Иуды Искариота, предавшего Иисуса (Матфея 26:48-49). Метафора предательского
      акта, замаскированного под дружбу, часто используется в политических или личных контекстах для описания
      лицемерия.
    ja: イスカリオテのユダがイエスを裏切った接吻（マタイ26:48-49）への聖書の言及。友情を装った裏切りの行為の比喩で、政治や個人の文脈で偽善を表すのにしばしば用いられる。
    zh: 圣经中提及犹大以亲吻背叛耶稣（马太福音26:48-49）。比喻伪装成友谊的背叛行为，常用于政治或个人语境中描述虚伪。
    ar: 'إشارة كتابية إلى قبلة يهوذا الإسخريوطي التي خان بها يسوع (متى 26: 48-49). استعارة لعمل غادر متنكر
      في صورة صداقة، كثيرًا ما تستخدم في السياقات السياسية أو الشخصية لوصف النفاق.'
    he: התייחסות מקראית לנשיקת יהודה איש קריות שבגד בישוע (מתי כ"ו:48-49). מטפורה למעשה בוגדני המחופש
      לידידות, המשמשת לעיתים קרובות בהקשרים פוליטיים או אישיים לתיאור צביעות.
