- id: fi_classical_or_scriptural_allusion_hoosianna_8ee8cbdd
  language: fi
  canonical_reference: Hoosianna
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Hosianna
  - hoosianna
  short_explanation: Biblical exclamation from the Gospels (e.g., Matthew 21:9), meaning 'save us' or
    'praise', used during Jesus' triumphal entry into Jerusalem. In Finnish, it is a liturgical cry of
    praise, especially on Palm Sunday.
  i18n_explanations:
    en: Biblical exclamation from the Gospels (e.g., Matthew 21:9), meaning 'save us' or 'praise', used
      during Jesus' triumphal entry into Jerusalem. In Finnish, it is a liturgical cry of praise, especially
      on Palm Sunday.
    es: Exclamación bíblica de los Evangelios (p. ej., Mateo 21:9), que significa 'sálvanos' o 'alabanza',
      usada durante la entrada triunfal de Jesús en Jerusalén. En finés, es un grito litúrgico de alabanza,
      especialmente el Domingo de Ramos.
    fr: Exclamation biblique des Évangiles (p. ex., Matthieu 21:9), signifiant 'sauve-nous' ou 'louange',
      utilisée lors de l'entrée triomphale de Jésus à Jérusalem. En finnois, c'est un cri liturgique de
      louange, surtout le dimanche des Rameaux.
    de: Biblischer Ausruf aus den Evangelien (z. B. Matthäus 21,9), der 'rette uns' oder 'Lob' bedeutet,
      verwendet beim triumphalen Einzug Jesu in Jerusalem. Im Finnischen ist es ein liturgischer Lobruf,
      besonders am Palmsonntag.
    it: Esclamazione biblica dai Vangeli (ad es. Matteo 21:9), che significa 'salvaci' o 'lode', usata
      durante l'ingresso trionfale di Gesù a Gerusalemme. In finlandese è un grido liturgico di lode,
      specialmente la Domenica delle Palme.
    pt: Exclamação bíblica dos Evangelhos (por exemplo, Mateus 21:9), que significa 'salva-nos' ou 'louvor',
      usada durante a entrada triunfal de Jesus em Jerusalém. Em finlandês, é um grito litúrgico de louvor,
      especialmente no Domingo de Ramos.
    ru: Библейское восклицание из Евангелий (например, Матфея 21:9), означающее 'спаси нас' или 'хвала',
      использовавшееся во время торжественного входа Иисуса в Иерусалим. На финском языке это литургический
      возглас хвалы, особенно в Вербное воскресенье.
    ja: 福音書（例えばマタイ21:9）からの聖句の叫びで、「我らを救え」または「賛美」を意味し、イエスのエルサレムへの勝利の入場の際に使われた。フィンランド語では、特に棕櫚の主日に用いられる典礼上の賛美の叫びである。
    zh: 福音书（例如马太福音21:9）中的圣经呼喊，意为'拯救我们'或'赞美'，用于耶稣凯旋进入耶路撒冷之时。在芬兰语中，它是礼仪性的赞美呼喊，尤其在棕枝主日使用。
    ar: 'هتاف كتابي من الأناجيل (مثل متى 21: 9)، يعني ''خلصنا'' أو ''تسبيح''، استخدم أثناء دخول يسوع المنتصر
      إلى أورشليم. في اللغة الفنلندية، هو صيحة تسبيح طقسية، خاصة في أحد الشعانين.'
    he: קריאה מקראית מהבשורות (למשל מתי כ"א:9), משמעותה 'הושיענו' או 'שבח', שנאמרה במהלך כניסתו הניצחת
      של ישוע לירושלים. בפינית, היא קריאה ליטורגית של שבח, במיוחד ביום ראשון של הדקלים.
