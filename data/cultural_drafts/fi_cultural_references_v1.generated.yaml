- id: fi_proverb_tradition_ei_se_ole_se_mitä_sinä_sanot_vaan_mitä_minä_kuulen_3ec15fc9
  language: fi
  canonical_reference: Ei se ole se, mitä sinä sanot, vaan mitä minä kuulen
  reference_type: proverb_tradition
  surface_patterns:
  - Ei se ole se, mitä sinä sanot, vaan mitä minä kuulen
  - ei se ole se mitä sinä sanot vaan mitä minä kuulen
  - Se ei ole se mitä sanot, vaan se mitä kuulen
  short_explanation: A Finnish proverb meaning 'It's not what you say, but what I hear', highlighting
    the subjective nature of communication and perception. It is often used to remind that the listener's
    interpretation matters more than the speaker's intent.
  i18n_explanations:
    en: A Finnish proverb meaning 'It's not what you say, but what I hear', highlighting the subjective
      nature of communication and perception. It is often used to remind that the listener's interpretation
      matters more than the speaker's intent.
    es: Un proverbio finlandés que significa 'No es lo que dices, sino lo que yo oigo', destacando la
      naturaleza subjetiva de la comunicación y la percepción. A menudo se usa para recordar que la interpretación
      del oyente importa más que la intención del hablante.
    fr: Un proverbe finlandais signifiant 'Ce n'est pas ce que tu dis, mais ce que j'entends', soulignant
      la nature subjective de la communication et de la perception. Il est souvent utilisé pour rappeler
      que l'interprétation de l'auditeur importe plus que l'intention du locuteur.
    de: Ein finnisches Sprichwort, das bedeutet 'Es ist nicht das, was du sagst, sondern das, was ich
      höre', und unterstreicht die subjektive Natur von Kommunikation und Wahrnehmung. Es wird oft verwendet,
      um daran zu erinnern, dass die Interpretation des Zuhörers wichtiger ist als die Absicht des Sprechers.
    it: Un proverbio finlandese che significa 'Non è quello che dici, ma quello che sento io', evidenziando
      la natura soggettiva della comunicazione e della percezione. Viene spesso usato per ricordare che
      l'interpretazione dell'ascoltatore è più importante dell'intenzione del parlante.
    pt: Um provérbio finlandês que significa 'Não é o que você diz, mas o que eu ouço', destacando a natureza
      subjetiva da comunicação e percepção. É frequentemente usado para lembrar que a interpretação do
      ouvinte importa mais do que a intenção do falante.
    ru: Финская пословица, означающая 'Не то, что ты говоришь, а то, что я слышу', подчеркивающая субъективную
      природу общения и восприятия. Часто используется, чтобы напомнить, что интерпретация слушателя важнее,
      чем намерение говорящего.
    ja: 「あなたが言うことではなく、私が聞くことだ」という意味のフィンランドのことわざで、コミュニケーションと知覚の主観的な性質を強調しています。聞き手の解釈が話し手の意図よりも重要であることを思い出させるためによく使われます。
    zh: 芬兰谚语，意为‘不在于你说什么，而在于我听到什么’，强调沟通和感知的主观性。常被用来提醒听者的解释比说话者的意图更重要。
    ar: مثل فنلندي يعني 'ليس ما تقوله، بل ما أسمعه'، يسلط الضوء على الطبيعة الذاتية للتواصل والإدراك.
      غالبًا ما يستخدم للتذكير بأن تفسير المستمع أهم من نية المتحدث.
    he: פתגם פיני שמשמעותו 'לא מה שאתה אומר, אלא מה שאני שומע', המדגיש את האופי הסובייקטיבי של תקשורת
      ותפיסה. הוא משמש לעתים קרובות להזכיר שפרשנות המאזין חשובה יותר מכוונת הדובר.
