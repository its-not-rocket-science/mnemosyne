- id: fi_cultural_reference_kun_on_mieli_maassa_ei_voi_lentää_5c070ca0
  language: fi
  canonical_reference: Kun on mieli maassa, ei voi lentää
  reference_type: cultural_reference
  surface_patterns:
  - Kun on mieli maassa, ei voi lentää
  - Kun mieli on maassa, ei voi lentää
  - Mieli maassa - ei voi lentää
  short_explanation: This saying means that when one is feeling down or depressed, one cannot achieve
    great things. It is used to describe a state of low spirits and lack of motivation.
  i18n_explanations:
    en: This saying means that when one is feeling down or depressed, one cannot achieve great things.
      It is used to describe a state of low spirits and lack of motivation.
    es: Este dicho significa que cuando uno está deprimido o abatido, no puede lograr grandes cosas. Se
      usa para describir un estado de ánimo bajo y falta de motivación.
    fr: Ce dicton signifie que lorsque l'on se sent déprimé ou abattu, on ne peut pas accomplir de grandes
      choses. Il est utilisé pour décrire un état d'esprit bas et un manque de motivation.
    de: Diese Redewendung bedeutet, dass man, wenn man niedergeschlagen oder deprimiert ist, keine großen
      Dinge erreichen kann. Sie wird verwendet, um einen Zustand schlechter Stimmung und mangelnder Motivation
      zu beschreiben.
    it: Questo detto significa che quando ci si sente giù o depressi, non si possono raggiungere grandi
      cose. Viene usato per descrivere uno stato di morale basso e mancanza di motivazione.
    pt: Este ditado significa que quando alguém está se sentindo para baixo ou deprimido, não pode alcançar
      grandes coisas. É usado para descrever um estado de baixo astral e falta de motivação.
    ru: Эта поговорка означает, что когда человек чувствует себя подавленным или в депрессии, он не может
      достичь великих дел. Она используется для описания состояния упадка духа и отсутствия мотивации.
    ja: この言い回しは、落ち込んでいるときや憂鬱なときには、大きなことを成し遂げられないという意味です。低い気分ややる気のなさを表現するのに使われます。
    zh: 这句俗语的意思是，当一个人情绪低落或沮丧时，就无法成就大事。它用来描述情绪低落和缺乏动力的状态。
    ar: يعني هذا القول أنه عندما يشعر الشخص بالإحباط أو الاكتئاب، لا يمكنه تحقيق أشياء عظيمة. يستخدم لوصف
      حالة من انخفاض الروح المعنوية وقلة الدافع.
    he: פירושו של ביטוי זה הוא שכאשר אדם מרגיש מדוכא או בדיכאון, הוא אינו יכול להשיג דברים גדולים. הוא
      משמש לתיאור מצב של רוח נמוכה וחוסר מוטיבציה.
