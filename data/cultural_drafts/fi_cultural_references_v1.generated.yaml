- id: fi_proverb_tradition_ei_kanneta_vettä_kaivoon_ad64be24
  language: fi
  canonical_reference: Ei kanneta vettä kaivoon
  reference_type: proverb_tradition
  surface_patterns:
  - kanneta vettä kaivoon
  - vettä kaivoon
  short_explanation: This Finnish proverb means 'Don't carry water to the well,' equivalent to 'Don't
    carry coals to Newcastle.' It refers to doing something unnecessary or superfluous, as the well already
    has water.
  i18n_explanations:
    en: This Finnish proverb means 'Don't carry water to the well,' equivalent to 'Don't carry coals to
      Newcastle.' It refers to doing something unnecessary or superfluous, as the well already has water.
    es: Este proverbio finlandés significa 'No lleves agua al pozo', equivalente a 'Llevar agua al mar.'
      Se refiere a hacer algo innecesario o superfluo, ya que el pozo ya tiene agua.
    fr: Ce proverbe finlandais signifie 'Ne porte pas d'eau au puits', équivalent à 'Porter de l'eau à
      la rivière.' Il désigne le fait de faire quelque chose d'inutile ou de superflu, car le puits a
      déjà de l'eau.
    de: Dieses finnische Sprichwort bedeutet 'Trage kein Wasser zum Brunnen', gleichbedeutend mit 'Eulen
      nach Athen tragen.' Es bezieht sich auf etwas Unnötiges oder Überflüssiges, da der Brunnen bereits
      Wasser hat.
    it: Questo proverbio finlandese significa 'Non portare acqua al pozzo', equivalente a 'Portare acqua
      al mare.' Si riferisce al fare qualcosa di non necessario o superfluo, poiché il pozzo ha già acqua.
    pt: Este provérbio finlandês significa 'Não carregue água para o poço', equivalente a 'Levar água
      ao mar.' Refere-se a fazer algo desnecessário ou supérfluo, já que o poço já tem água.
    ru: 'Эта финская пословица означает: ''Не носи воду в колодец'', что эквивалентно ''Ездить в Тулу
      со своим самоваром.'' Она относится к выполнению ненужного или излишнего действия, поскольку в колодце
      уже есть вода.'
    ja: このフィンランドの諺は、「井戸に水を運ぶな」という意味で、「ニューカッスルに石炭を運ぶな」に相当します。井戸にはすでに水があるので、不必要または余計なことをすることです。
    zh: 这句芬兰谚语的意思是：‘不要把水带到井里’，等同于‘多此一举’。它指的是做不必要或多余的事情，因为井里已经有水了。
    ar: 'يعني هذا المثل الفنلندي: ''لا تحمل الماء إلى البئر''، المماثل لـ ''نقل الماء إلى البحر.'' يشير
      إلى القيام بشيء غير ضروري أو زائد عن الحاجة، لأن البئر بها ماء بالفعل.'
    he: 'הפתגם הפיני הזה אומר: ''אל תוביל מים לבאר'', המקביל ל''לשאת מים לים.'' הוא מתייחס לעשיית דבר
