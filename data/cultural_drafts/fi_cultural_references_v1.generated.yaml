    ja: 列王記上19章12節（フィンランド語：'hiljainen, pieni ääni'）の聖句で、神が穏やかな囁きで語ることを指す。静かな内なる声や確信を表し、しばしば精神的・道徳的な文脈で用いられる。
    zh: 出自列王纪上19:12的圣经短语（芬兰语：'hiljainen, pieni ääni'），指神以温柔的耳语说话。用来描述安静的内心声音或信念，通常用于精神或道德语境。
