- id: fi_proverb_tradition_oma_tupa_oma_lupa_53e19e58
  language: fi
  canonical_reference: Oma tupa, oma lupa
  reference_type: proverb_tradition
  surface_patterns:
  - oma tupa
  - oma lupa
  short_explanation: This Finnish proverb means 'Own home, own rule.' It emphasizes the value of personal
    independence and the freedom to live by one's own rules when living in one's own home.
  i18n_explanations:
    en: This Finnish proverb means 'Own home, own rule.' It emphasizes the value of personal independence
      and the freedom to live by one's own rules when living in one's own home.
    es: Este proverbio finlandés significa 'Casa propia, regla propia.' Enfatiza el valor de la independencia
      personal y la libertad de vivir según las propias reglas cuando se vive en la propia casa.
    fr: Ce proverbe finlandais signifie 'Propre maison, propre règle.' Il souligne la valeur de l'indépendance
      personnelle et la liberté de vivre selon ses propres règles lorsque l'on vit dans sa propre maison.
    de: Dieses finnische Sprichwort bedeutet 'Eigenes Zuhause, eigene Regel.' Es betont den Wert persönlicher
