- id: fi_classical_or_scriptural_allusion_kainin_merkki_75af5b8b
  language: fi
  canonical_reference: Kainin merkki
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Kainin merkki
  - Kainin merkin
  - merkki Kainissa
  short_explanation: Refers to the mark of Cain, a sign placed by God on Cain after he killed Abel to
    protect him (Genesis 4:15). It often symbolizes a curse or a stigmatized identity.
  i18n_explanations:
    en: Refers to the mark of Cain, a sign placed by God on Cain after he killed Abel to protect him (Genesis
      4:15). It often symbolizes a curse or a stigmatized identity.
    es: Se refiere a la marca de Caín, una señal puesta por Dios en Caín después de que mató a Abel para
      protegerlo (Génesis 4:15). A menudo simboliza una maldición o una identidad estigmatizada.
    fr: Se réfère à la marque de Caïn, un signe placé par Dieu sur Caïn après qu'il a tué Abel pour le
      protéger (Genèse 4:15). Elle symbolise souvent une malédiction ou une identité stigmatisée.
    de: Bezieht sich auf das Kainsmal, ein Zeichen, das Gott auf Kain setzte, nachdem er Abel getötet
      hatte, um ihn zu schützen (1. Mose 4:15). Es symbolisiert oft einen Fluch oder eine stigmatisierte
      Identität.
    it: Si riferisce al segno di Caino, un segno posto da Dio su Caino dopo che uccise Abele per proteggerlo
      (Genesi 4:15). Spesso simboleggia una maledizione o un'identità stigmatizzata.
    pt: Refere-se à marca de Caim, um sinal colocado por Deus em Caim depois que ele matou Abel para protegê-lo
      (Gênesis 4:15). Muitas vezes simboliza uma maldição ou uma identidade estigmatizada.
    ru: Относится к каиновой печати, знаку, поставленному Богом на Каина после того, как он убил Авеля,
      чтобы защитить его (Бытие 4:15). Часто символизирует проклятие или стигматизированную идентичность.
    ja: カインの印を指し、カインがアベルを殺した後に神が彼を守るために付けた印（創世記4:15）。しばしば呪いや烙印を押された身分を象徴する。
    zh: 指该隐的记号，是上帝在该隐杀了亚伯后放在他身上以保护他的记号（创世记4:15）。通常象征着诅咒或受歧视的身份。
    ar: يشير إلى علامة قايين، وهي علامة وضعها الله على قايين بعد أن قتل هابيل لحمايته (تكوين 4:15). وغالبًا
      ما يرمز إلى لعنة أو هوية موصومة.
    he: מתייחס לאות קין, סימן ששם אלוהים על קין לאחר שהרג את הבל כדי להגן עליו (בראשית ד':15). לעתים קרובות
      הוא מסמל קללה או זהות מתויגת.
