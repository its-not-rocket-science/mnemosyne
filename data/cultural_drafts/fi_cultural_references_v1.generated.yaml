  - Moskovan rauha 1940
  - Moskovan rauhansopimus
  short_explanation: The Moscow Peace Treaty, signed on 12 March 1940, ended the Winter War between Finland
    and the Soviet Union. Finland ceded territories but maintained independence.
  i18n_explanations:
    en: The Moscow Peace Treaty, signed on 12 March 1940, ended the Winter War between Finland and the
      Soviet Union. Finland ceded territories but maintained independence.
    es: El Tratado de Paz de Moscú, firmado el 12 de marzo de 1940, puso fin a la Guerra de Invierno entre
      Finlandia y la Unión Soviética. Finlandia cedió territorios pero mantuvo su independencia.
    fr: Le traité de paix de Moscou, signé le 12 mars 1940, a mis fin à la guerre d'Hiver entre la Finlande
      et l'Union soviétique. La Finlande a cédé des territoires mais a conservé son indépendance.
    de: Der Moskauer Friedensvertrag vom 12. März 1940 beendete den Winterkrieg zwischen Finnland und
      der Sowjetunion. Finnland trat Gebiete ab, bewahrte aber seine Unabhängigkeit.
    it: Il trattato di pace di Mosca, firmato il 12 marzo 1940, pose fine alla guerra d'Inverno tra Finlandia
      e Unione Sovietica. La Finlandia cedette territori ma mantenne l'indipendenza.
    pt: O Tratado de Paz de Moscou, assinado em 12 de março de 1940, encerrou a Guerra de Inverno entre
      Finlândia e União Soviética. A Finlândia cedeu territórios, mas manteve a independência.
    ru: Московский мирный договор, подписанный 12 марта 1940 года, завершил Советско-финляндскую (Зимнюю)
      войну. Финляндия уступила территории, но сохранила независимость.
    ja: 1940年3月12日に署名されたモスクワ平和条約は、フィンランドとソビエト連邦の間の冬戦争を終結させた。フィンランドは領土を割譲したが、独立を維持した。
    zh: 1940年3月12日签署的《莫斯科和平条约》结束了芬兰和苏联之间的冬季战争。芬兰割让了领土，但保持了独立。
    ar: معاهدة موسكو للسلام، التي وُقعت في 12 مارس 1940، أنهت حرب الشتاء بين فنلندا والاتحاد السوفيتي.
      تنازلت فنلندا عن أراضٍ لكنها حافظت على استقلالها.
    he: הסכם השלום של מוסקבה, שנחתם ב-12 במרץ 1940, סיים את מלחמת החורף בין פינלנד לברית המועצות. פינלנד
      ויתרה על שטחים אך שמרה על עצמאותה.
