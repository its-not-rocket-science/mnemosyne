  short_explanation: Refers to the wedding at Cana, where Jesus performed his first miracle of turning
    water into wine (John 2:1-11). It symbolizes divine intervention and joy.
  i18n_explanations:
    en: Refers to the wedding at Cana, where Jesus performed his first miracle of turning water into wine
      (John 2:1-11). It symbolizes divine intervention and joy.
    es: Se refiere a las bodas de Caná, donde Jesús realizó su primer milagro de convertir el agua en
      vino (Juan 2:1-11). Simboliza la intervención divina y la alegría.
    fr: Se réfère aux noces de Cana, où Jésus a accompli son premier miracle en transformant l'eau en
      vin (Jean 2:1-11). Cela symbolise l'intervention divine et la joie.
    de: Bezieht sich auf die Hochzeit zu Kana, bei der Jesus sein erstes Wunder vollbrachte, Wasser in
      Wein zu verwandeln (Johannes 2:1-11). Es symbolisiert göttliches Eingreifen und Freude.
    it: Si riferisce alle nozze di Cana, dove Gesù compì il suo primo miracolo trasformando l'acqua in
      vino (Giovanni 2:1-11). Simboleggia l'intervento divino e la gioia.
    pt: Refere-se ao casamento em Caná, onde Jesus realizou seu primeiro milagre de transformar água em
      vinho (João 2:1-11). Simboliza a intervenção divina e a alegria.
    ru: Относится к браку в Кане, где Иисус совершил свое первое чудо, превратив воду в вино (Иоанна 2:1-11).
      Символизирует божественное вмешательство и радость.
    ja: カナの婚礼を指し、イエスが水をぶどう酒に変える最初の奇跡を行った（ヨハネ2:1-11）。神の介入と喜びを象徴する。
    zh: 指迦拿的婚宴，耶稣在那里行了第一个神迹，将水变酒（约翰福音2:1-11）。象征着神圣的干预和喜乐。
    ar: 'يشير إلى عرس قانا، حيث أجرى يسوع معجزته الأولى بتحويل الماء إلى خمر (يوحنا 2: 1-11). يرمز إلى
      التدخل الإلهي والفرح.'
    he: מתייחס לחתונה בקנה, שם ישוע ביצע את הנס הראשון שלו בהפיכת מים ליין (יוחנן ב':1-11). זה מסמל התערבות
