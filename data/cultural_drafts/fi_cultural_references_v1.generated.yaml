  short_explanation: Refers to the sign of Jonah, a biblical term used by Jesus (Matthew 12:39, Luke 11:29)
    to indicate his own death and resurrection. It symbolizes a divine sign or a warning.
  i18n_explanations:
    en: Refers to the sign of Jonah, a biblical term used by Jesus (Matthew 12:39, Luke 11:29) to indicate
      his own death and resurrection. It symbolizes a divine sign or a warning.
    es: Se refiere a la señal de Jonás, un término bíblico usado por Jesús (Mateo 12:39, Lucas 11:29)
      para indicar su propia muerte y resurrección. Simboliza una señal divina o una advertencia.
    fr: Se réfère au signe de Jonas, un terme biblique utilisé par Jésus (Matthieu 12:39, Luc 11:29) pour
      indiquer sa propre mort et résurrection. Il symbolise un signe divin ou un avertissement.
    de: Bezieht sich auf das Zeichen des Jona, ein biblischer Begriff, den Jesus (Matthäus 12:39, Lukas
      11:29) verwendete, um auf seinen eigenen Tod und seine Auferstehung hinzuweisen. Es symbolisiert
      ein göttliches Zeichen oder eine Warnung.
    it: Si riferisce al segno di Giona, un termine biblico usato da Gesù (Matteo 12:39, Luca 11:29) per
      indicare la propria morte e resurrezione. Simboleggia un segno divino o un avvertimento.
    pt: Refere-se ao sinal de Jonas, um termo bíblico usado por Jesus (Mateus 12:39, Lucas 11:29) para
      indicar sua própria morte e ressurreição. Simboliza um sinal divino ou um aviso.
    ru: Относится к знаку Ионы, библейскому термину, использованному Иисусом (Мф. 12:39, Лк. 11:29) для
      указания на свою смерть и воскресение. Символизирует божественный знак или предупреждение.
    ja: ヨナのしるしを指し、イエスが自身の死と復活を示すために用いた聖書の用語（マタイ12:39、ルカ11:29）。神のしるしや警告を象徴する。
    zh: 指约拿的神迹，是耶稣使用的圣经术语（马太福音12:39，路加福音11:29），预示他自己的死亡和复活。象征着神圣的迹象或警告。
    ar: يشير إلى آية يونان، وهو مصطلح كتابي استخدمه يسوع (متى 12:39، لوقا 11:29) للإشارة إلى موته وقيامته.
      يرمز إلى علامة إلهية أو تحذير.
    he: מתייחס לאות יונה, מונח תנ"כי שבו השתמש ישוע (מתי י"ב:39, לוקס י"א:29) כדי לציין את מותו ותחייתו.
