- id: fi_proverb_tradition_ei_se_ole_hullu_joka_pyytää_vaan_se_joka_ei_pyytämällä_saa_2ed85809
  language: fi
  canonical_reference: Ei se ole hullu, joka pyytää, vaan se, joka ei pyytämällä saa
  reference_type: proverb_tradition
  surface_patterns:
  - Ei se ole hullu, joka pyytää
  - se joka ei pyytämällä saa
  - hullu joka pyytää
  short_explanation: This Finnish proverb means 'It's not the one who asks that is foolish, but the one
    who doesn't get by asking.' It encourages people to ask for what they need, implying that asking is
    wise while failing to obtain what you ask for is foolish.
  i18n_explanations:
    en: This Finnish proverb means 'It's not the one who asks that is foolish, but the one who doesn't
      get by asking.' It encourages people to ask for what they need, implying that asking is wise while
      failing to obtain what you ask for is foolish.
    es: Este proverbio finlandés significa 'No es el que pide el necio, sino el que no consigue pidiendo.'
      Anima a la gente a pedir lo que necesita, implicando que pedir es sabio mientras que no obtener
      lo que pides es necio.
    fr: Ce proverbe finlandais signifie 'Ce n'est pas celui qui demande qui est fou, mais celui qui n'obtient
      pas en demandant.' Il encourage les gens à demander ce dont ils ont besoin, impliquant que demander
      est sage tandis qu'échouer à obtenir ce que l'on demande est insensé.
    de: Dieses finnische Sprichwort bedeutet 'Nicht der, der bittet, ist dumm, sondern der, der durch
      Bitten nichts bekommt.' Es ermutigt die Menschen, um das zu bitten, was sie brauchen, und impliziert,
      dass Bitten weise ist, während das Scheitern, das Erbetene zu bekommen, dumm ist.
    it: Questo proverbio finlandese significa 'Non è stolto chi chiede, ma chi non ottiene chiedendo.'
      Incoraggia le persone a chiedere ciò di cui hanno bisogno, implicando che chiedere è saggio mentre
      non ottenere ciò che si chiede è stolto.
    pt: Este provérbio finlandês significa 'Não é tolo quem pede, mas sim quem não consegue pedindo.'
      Incentiva as pessoas a pedir o que precisam, implicando que pedir é sábio, enquanto falhar em obter
      o que se pede é tolice.
    ru: 'Эта финская пословица означает: ''Не тот глуп, кто просит, а тот, кто не получает, прося.'' Она
      призывает людей просить то, что им нужно, подразумевая, что просить мудро, а не получить то, о чем
      просишь, глупо.'
    ja: このフィンランドの諺は、「愚かなのは尋ねる人ではなく、尋ねても得られない人だ」という意味です。人々に必要なものを尋ねるよう促し、尋ねることは賢明だが、尋ねても得られないことは愚かであると示唆しています。
    zh: 这句芬兰谚语的意思是：‘愚蠢的不是提问的人，而是提问却得不到的人。’它鼓励人们去索取所需，暗示提问是明智的，而未能通过提问获得所需则是愚蠢的。
    ar: 'يعني هذا المثل الفنلندي: ''ليس الأحمق من يسأل، بل من لا يحصل بالسؤال.'' يشجع الناس على طلب ما
      يحتاجون إليه، مما يعني أن السؤال حكيم بينما الفشل في الحصول على ما تطلبه هو حمق.'
    he: 'הפתגם הפיני הזה אומר: ''לא הטיפש הוא מי שמבקש, אלא זה שלא מקבל על ידי בקשה.'' הוא מעודד אנשים
      לבקש את מה שהם צריכים, ומרמז כי הבקשה היא חכמה בעוד הכישלון להשיג את מה שמבקשים הוא טיפשי.'
