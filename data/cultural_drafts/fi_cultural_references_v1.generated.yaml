- id: fi_proverb_tradition_ei_ole_koiraa_karvoihin_katsominen_eeb39a0a
  language: fi
  canonical_reference: Ei ole koiraa karvoihin katsominen
  reference_type: proverb_tradition
  surface_patterns:
  - koiraa karvoihin katsominen
  - ei koiraa karvoihin
  short_explanation: This Finnish proverb means 'You shouldn't judge a dog by its hair,' equivalent to
    'Don't judge a book by its cover.' It warns against judging things or people based on outward appearances.
  i18n_explanations:
    en: This Finnish proverb means 'You shouldn't judge a dog by its hair,' equivalent to 'Don't judge
      a book by its cover.' It warns against judging things or people based on outward appearances.
    es: Este proverbio finlandés significa 'No se debe juzgar a un perro por su pelo', equivalente a 'No
      juzgues un libro por su portada.' Advierte contra juzgar cosas o personas basándose en apariencias
      externas.
    fr: Ce proverbe finlandais signifie 'Il ne faut pas juger un chien à son pelage', équivalent à 'Il
      ne faut pas juger un livre à sa couverture.' Il met en garde contre le fait de juger les choses
      ou les personnes sur les apparences.
    de: Dieses finnische Sprichwort bedeutet 'Man soll einen Hund nicht nach seinem Fell beurteilen',
      gleichbedeutend mit 'Man soll ein Buch nicht nach seinem Einband beurteilen.' Es warnt davor, Dinge
      oder Menschen nach dem äußeren Schein zu beurteilen.
    it: Questo proverbio finlandese significa 'Non si dovrebbe giudicare un cane dal suo pelo', equivalente
      a 'Non giudicare un libro dalla copertina.' Avverte di non giudicare le cose o le persone in base
      all'aspetto esteriore.
    pt: Este provérbio finlandês significa 'Não se deve julgar um cachorro pelo pelo', equivalente a 'Não
      julgue um livro pela capa.' Adverte contra julgar coisas ou pessoas com base em aparências externas.
    ru: 'Эта финская пословица означает: ''Не следует судить собаку по шерсти'', что эквивалентно ''Не
      судите книгу по обложке.'' Она предостерегает от суждения о вещах или людях на основе внешнего вида.'
    ja: このフィンランドの諺は、「犬を毛で判断してはいけない」という意味で、「本を表紙で判断してはいけない」に相当します。外見で物事や人を判断することに警告を発しています。
    zh: 这句芬兰谚语的意思是：‘你不应该通过毛发判断一只狗’，等同于‘不要以貌取人’。它警告不要根据外表来判断事物或人。
    ar: 'يعني هذا المثل الفنلندي: ''لا يجب أن تحكم على كلب من شعره''، وهو مماثل لـ ''لا تحكم على الكتاب
      من غلافه.'' يحذر من الحكم على الأشياء أو الأشخاص بناءً على المظاهر الخارجية.'
    he: 'הפתגם הפיני הזה אומר: ''אין לשפוט כלב לפי שערו'', המקביל ל''אל תשפוט ספר לפי כריכתו.'' הוא מזהיר
      מפני שיפוט דברים או אנשים על בסיס מראה חיצוני.'
