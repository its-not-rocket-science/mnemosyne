- id: fi_classical_or_scriptural_allusion_kymmenen_käskyä_2470824b
  language: fi
  canonical_reference: Kymmenen käskyä
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Kymmenen käskyä
  - kymmenen käskyä Jumalan
  short_explanation: Refers to the Ten Commandments, a set of biblical laws given to Moses on Mount Sinai
    (Exodus 20, Deuteronomy 5). They are foundational to Judeo-Christian ethics and are widely known in
    Finnish culture.
  i18n_explanations:
    en: Refers to the Ten Commandments, a set of biblical laws given to Moses on Mount Sinai (Exodus 20,
      Deuteronomy 5). They are foundational to Judeo-Christian ethics and are widely known in Finnish
      culture.
    es: Se refiere a los Diez Mandamientos, un conjunto de leyes bíblicas dadas a Moisés en el Monte Sinaí
      (Éxodo 20, Deuteronomio 5). Son fundamentales para la ética judeocristiana y son ampliamente conocidos
      en la cultura finlandesa.
    fr: Se réfère aux Dix Commandements, un ensemble de lois bibliques données à Moïse sur le mont Sinaï
      (Exode 20, Deutéronome 5). Ils sont fondamentaux pour l'éthique judéo-chrétienne et sont largement
      connus dans la culture finlandaise.
    de: Bezieht sich auf die Zehn Gebote, eine Reihe biblischer Gesetze, die Mose auf dem Berg Sinai gegeben
      wurden (2. Mose 20, 5. Mose 5). Sie sind grundlegend für die jüdisch-christliche Ethik und in der
      finnischen Kultur weithin bekannt.
    it: Si riferisce ai Dieci Comandamenti, un insieme di leggi bibliche date a Mosè sul Monte Sinai (Esodo
      20, Deuteronomio 5). Sono fondamentali per l'etica giudeo-cristiana e sono ampiamente conosciuti
      nella cultura finlandese.
    pt: Refere-se aos Dez Mandamentos, um conjunto de leis bíblicas dadas a Moisés no Monte Sinai (Êxodo
      20, Deuteronômio 5). Eles são fundamentais para a ética judaico-cristã e amplamente conhecidos na
      cultura finlandesa.
    ru: Относится к Десяти заповедям, набору библейских законов, данных Моисею на горе Синай (Исход 20,
      Второзаконие 5). Они являются основой иудео-христианской этики и широко известны в финской культуре.
    ja: 十戒を指し、シナイ山でモーセに与えられた聖書の律法（出エジプト記20章、申命記5章）。ユダヤ・キリスト教倫理の基礎であり、フィンランド文化で広く知られている。
    zh: 指十诫，是上帝在西奈山上赐给摩西的一套圣经律法（出埃及记20章，申命记5章）。它们是犹太-基督教伦理的基础，在芬兰文化中广为人知。
    ar: يشير إلى الوصايا العشر، وهي مجموعة من القوانين الكتابية التي أعطيت لموسى على جبل سيناء (سفر الخروج
      20، سفر التثنية 5). إنها أساسية للأخلاق اليهودية المسيحية ومعروفة على نطاق واسع في الثقافة الفنلندية.
    he: מתייחס לעשרת הדיברות, קבוצה של חוקים תנ"כיים שניתנו למשה בהר סיני (שמות כ', דברים ה'). הם יסוד
      לאתיקה היהודית-נוצרית ומוכרים היטב בתרבות הפינית.
