  - Kuusi kuulee, petäjä puhuu
  - Kyllä kuusi kuulee ja petäjä puhuu
  short_explanation: This Finnish proverb, literally 'the spruce hears, the pine speaks', means that nature
    is always listening and truth will come out. It is used to suggest that secrets cannot be hidden.
  i18n_explanations:
    en: This Finnish proverb, literally 'the spruce hears, the pine speaks', means that nature is always
      listening and truth will come out. It is used to suggest that secrets cannot be hidden.
    es: Este proverbio finlandés, literalmente 'el abeto oye, el pino habla', significa que la naturaleza
      siempre está escuchando y la verdad saldrá a la luz. Se usa para sugerir que los secretos no pueden
      ocultarse.
    fr: Ce proverbe finnois, littéralement 'l'épicéa entend, le pin parle', signifie que la nature écoute
      toujours et que la vérité finira par se savoir. Il est utilisé pour suggérer que les secrets ne
      peuvent être cachés.
    de: Dieses finnische Sprichwort, wörtlich 'die Fichte hört, die Kiefer spricht', bedeutet, dass die
      Natur immer zuhört und die Wahrheit ans Licht kommen wird. Es wird verwendet, um anzudeuten, dass
      Geheimnisse nicht verborgen bleiben können.
    it: Questo proverbio finlandese, letteralmente 'l'abete rosso sente, il pino parla', significa che
      la natura ascolta sempre e la verità verrà fuori. Viene usato per suggerire che i segreti non possono
      essere nascosti.
    pt: Este provérbio finlandês, literalmente 'o abeto ouve, o pinheiro fala', significa que a natureza
      está sempre ouvindo e a verdade virá à tona. É usado para sugerir que segredos não podem ser escondidos.
    ru: Эта финская пословица, буквально 'ель слышит, сосна говорит', означает, что природа всегда слушает,
      и правда выйдет наружу. Она используется, чтобы предположить, что секреты нельзя скрыть.
    ja: このフィンランドのことわざは、文字通り「トウヒが聞き、マツが話す」という意味で、自然は常に耳を傾けており、真実は明らかになるということを表しています。秘密は隠せないことを示唆するのに使われます。
    zh: 这句芬兰谚语字面意思是“云杉在听，松树在说”，意思是大自然总是在倾听，真相总会水落石出。它用来暗示秘密无法隐藏。
    ar: هذا المثل الفنلندي، حرفياً 'شجرة التنوب تسمع، الصنوبر يتكلم'، يعني أن الطبيعة تستمع دائماً وستظهر
      الحقيقة. يُستخدم للإيحاء بأن الأسرار لا يمكن إخفاؤها.
    he: פתגם פיני זה, בתרגום מילולי 'האשוחית שומעת, האורן מדבר', פירושו שהטבע תמיד מקשיב והאמת תצא לאור.
      הוא משמש כדי לרמוז שלא ניתן להסתיר סודות.
