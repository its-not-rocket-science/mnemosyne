- id: fi_classical_or_scriptural_allusion_isä_meidän_406fc074
  language: fi
  canonical_reference: Isä meidän
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Isämeidän
  - Isä meidän -rukous
  - Isä meidän
  short_explanation: The Lord's Prayer (Matthew 6:9-13), a central Christian prayer taught by Jesus. In
    Finnish, 'Isä meidän' is the opening phrase and commonly refers to the entire prayer, used in worship
    and personal devotion.
  i18n_explanations:
    en: The Lord's Prayer (Matthew 6:9-13), a central Christian prayer taught by Jesus. In Finnish, 'Isä
      meidän' is the opening phrase and commonly refers to the entire prayer, used in worship and personal
      devotion.
    es: El Padre Nuestro (Mateo 6:9-13), una oración cristiana central enseñada por Jesús. En finés, 'Isä
      meidän' es la frase inicial y se refiere comúnmente a toda la oración, usada en el culto y la devoción
      personal.
    fr: Le Notre Père (Matthieu 6:9-13), une prière chrétienne centrale enseignée par Jésus. En finnois,
      'Isä meidän' est la phrase d'ouverture et désigne couramment toute la prière, utilisée dans le culte
      et la dévotion personnelle.
    de: Das Vaterunser (Matthäus 6,9-13), ein zentrales christliches Gebet, das von Jesus gelehrt wurde.
      Im Finnischen ist 'Isä meidän' die Eröffnungsphrase und bezieht sich allgemein auf das gesamte Gebet,
      das im Gottesdienst und in der persönlichen Andacht verwendet wird.
    it: Il Padre Nostro (Matteo 6:9-13), una preghiera cristiana centrale insegnata da Gesù. In finlandese,
      'Isä meidän' è la frase di apertura e comunemente si riferisce all'intera preghiera, usata nel culto
      e nella devozione personale.
    pt: O Pai-Nosso (Mateus 6:9-13), uma oração cristã central ensinada por Jesus. Em finlandês, 'Isä
      meidän' é a frase de abertura e comumente se refere a toda a oração, usada no culto e na devoção
      pessoal.
    ru: Молитва Господня (Отче наш) (Матфея 6:9-13), центральная христианская молитва, преподанная Иисусом.
      На финском языке 'Isä meidän' — это начальная фраза и обычно относится ко всей молитве, используемой
      в богослужении и личной молитве.
    ja: 主の祈り（マタイ6:9-13）は、イエスが教えた中心的なキリスト教の祈り。フィンランド語では「Isä meidän」が冒頭の言葉であり、通常は祈り全体を指し、礼拝や個人の献身に用いられる。
    zh: 主祷文（马太福音6:9-13），是耶稣教导的核心基督教祈祷文。在芬兰语中，'Isä meidän' 是开头的短语，通常指整篇祷文，用于敬拜和个人灵修。
    ar: 'الصلاة الربانية (متى 6: 9-13)، صلاة مسيحية مركزية علمها يسوع. في الفنلندية، ''Isä meidän'' هي
      العبارة الافتتاحية وتشير عادةً إلى الصلاة بأكملها، وتُستخدم في العبادة والتفاني الشخصي.'
    he: תפילת האדון (מתי ו':9-13), תפילה נוצרית מרכזית שלימד ישוע. בפינית, 'Isä meidän' הוא הביטוי הפותח
      ומתייחס בדרך כלל לכל התפילה, המשמשת בפולחן ובמסירות אישית.
