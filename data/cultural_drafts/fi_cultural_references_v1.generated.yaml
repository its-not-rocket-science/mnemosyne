  short_explanation: This proverb teaches that contentment with little is more valuable than great wealth.
    It reflects a traditional Finnish value of modesty and satisfaction.
  i18n_explanations:
    en: This proverb teaches that contentment with little is more valuable than great wealth. It reflects
      a traditional Finnish value of modesty and satisfaction.
    es: Este proverbio enseña que la satisfacción con poco es más valiosa que la gran riqueza. Refleja
      un valor tradicional finlandés de modestia y satisfacción.
    fr: Ce proverbe enseigne que le contentement avec peu est plus précieux qu'une grande richesse. Il
      reflète une valeur traditionnelle finlandaise de modestie et de satisfaction.
    de: Dieses Sprichwort lehrt, dass Zufriedenheit mit wenig wertvoller ist als großer Reichtum. Es spiegelt
      einen traditionellen finnischen Wert der Bescheidenheit und Zufriedenheit wider.
    it: Questo proverbio insegna che l'essere contenti con poco è più prezioso della grande ricchezza.
