  - Lapin sota 1944–1945
  - Lapin sodan tapahtumat
  short_explanation: The Lapland War (1944–1945) was fought between Finland and Germany after Finland's
    armistice with the USSR. It drove German forces out of northern Finland and ended Finnish involvement
    in WWII.
  i18n_explanations:
    en: The Lapland War (1944–1945) was fought between Finland and Germany after Finland's armistice with
      the USSR. It drove German forces out of northern Finland and ended Finnish involvement in WWII.
    es: La Guerra de Laponia (1944–1945) se libró entre Finlandia y Alemania después del armisticio de
      Finlandia con la URSS. Expulsó a las fuerzas alemanas del norte de Finlandia y puso fin a la participación
      finlandesa en la Segunda Guerra Mundial.
    fr: La guerre de Laponie (1944–1945) opposa la Finlande à l'Allemagne après l'armistice finlandais
      avec l'URSS. Elle chassa les forces allemandes du nord de la Finlande et mit fin à l'engagement
      finlandais dans la Seconde Guerre mondiale.
    de: Der Lapplandkrieg (1944–1945) wurde zwischen Finnland und Deutschland nach dem finnischen Waffenstillstand
      mit der UdSSR geführt. Er vertrieb die deutschen Truppen aus Nordfinnland und beendete die finnische
      Beteiligung am Zweiten Weltkrieg.
    it: La guerra di Lapponia (1944–1945) fu combattuta tra Finlandia e Germania dopo l'armistizio finlandese
      con l'URSS. Cacciò le forze tedesche dalla Finlandia settentrionale e pose fine alla partecipazione
      finlandese alla seconda guerra mondiale.
    pt: A Guerra da Lapônia (1944–1945) foi travada entre Finlândia e Alemanha após o armistício finlandês
      com a URSS. Expulsou as forças alemãs do norte da Finlândia e encerrou o envolvimento finlandês
      na Segunda Guerra Mundial.
    ru: Лапландская война (1944–1945) велась между Финляндией и Германией после перемирия Финляндии с
      СССР. Она вытеснила немецкие войска из северной Финляндии и завершила участие Финляндии во Второй
      мировой войне.
    ja: ラップランド戦争（1944年～1945年）は、フィンランドとソ連の休戦後、フィンランドとドイツの間で戦われた。これによりドイツ軍はフィンランド北部から追い出され、フィンランドの第二次世界大戦への関与は終了した。
    zh: 拉普兰战争（1944-1945）是在芬兰与苏联停战后，芬兰与德国之间进行的战争。它将德军赶出了芬兰北部，结束了芬兰在二战中的参与。
    ar: حرب لابلاند (1944–1945) نشبت بين فنلندا وألمانيا بعد هدنة فنلندا مع الاتحاد السوفيتي. لقد طردت
      القوات الألمانية من شمال فنلندا وأنهت مشاركة فنلندا في الحرب العالمية الثانية.
    he: מלחמת לפלנד (1944–1945) התנהלה בין פינלנד לגרמניה לאחר שביתת הנשק של פינלנד עם ברית המועצות. היא
      גירשה את הכוחות הגרמניים מצפון פינלנד וסיימה את מעורבות פינלנד במלחמת העולם השנייה.
