    from his collection 'Hymyilevä Apollo'.
  i18n_explanations:
    en: A poetic metaphor meaning 'The word is a bow, the song is an arrow', emphasizing the power of
      words and songs to strike deeply. It is attributed to the Finnish poet Eino Leino, possibly from
      his collection 'Hymyilevä Apollo'.
    es: Una metáfora poética que significa 'La palabra es un arco, la canción es una flecha', enfatizando
      el poder de las palabras y las canciones para impactar profundamente. Se atribuye al poeta finlandés
      Eino Leino, posiblemente de su colección 'Hymyilevä Apollo'.
    fr: Une métaphore poétique signifiant 'La parole est un arc, le chant est une flèche', soulignant
      le pouvoir des mots et des chansons de frapper profondément. Elle est attribuée au poète finlandais
      Eino Leino, peut-être de son recueil 'Hymyilevä Apollo'.
    de: Eine poetische Metapher, die bedeutet 'Das Wort ist ein Bogen, das Lied ist ein Pfeil', und betont
      die Kraft von Worten und Liedern, tief zu treffen. Sie wird dem finnischen Dichter Eino Leino zugeschrieben,
      möglicherweise aus seiner Sammlung 'Hymyilevä Apollo'.
    it: Una metafora poetica che significa 'La parola è un arco, la canzone è una freccia', sottolineando
      il potere delle parole e delle canzoni di colpire profondamente. È attribuita al poeta finlandese
      Eino Leino, probabilmente dalla sua raccolta 'Hymyilevä Apollo'.
    pt: Uma metáfora poética que significa 'A palavra é um arco, a canção é uma flecha', enfatizando o
      poder das palavras e canções para atingir profundamente. É atribuída ao poeta finlandês Eino Leino,
      possivelmente de sua coleção 'Hymyilevä Apollo'.
    ru: Поэтическая метафора, означающая 'Слово — лук, песня — стрела', подчеркивающая силу слов и песен
      поражать глубоко. Приписывается финскому поэту Эйно Лейно, возможно из его сборника 'Hymyilevä Apollo'.
    ja: 「言葉は弓、歌は矢」という詩的な比喩で、言葉や歌が深く突き刺さる力を強調しています。フィンランドの詩人エイノ・レイノによるものとされ、彼の詩集『Hymyilevä Apollo』に収録されている可能性があります。
    zh: 一个诗意的隐喻，意思是‘言语是弓，歌曲是箭’，强调言语和歌曲的深刻影响力。它出自芬兰诗人埃诺·雷诺，可能来自他的诗集《Hymyilevä Apollo》。
    ar: استعارة شعرية تعني 'الكلمة قوس، والأغنية سهم'، تؤكد على قوة الكلمات والأغاني في التأثير العميق.
