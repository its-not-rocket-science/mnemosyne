- id: fi_classical_or_scriptural_allusion_hyvä_paimen_c9c49383
  language: fi
  canonical_reference: Hyvä paimen
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Hyvä Paimen
  short_explanation: Biblical metaphor for Jesus from John 10:11 ('I am the good shepherd'), symbolizing
    care, guidance, and sacrifice. Used in religious contexts and also metaphorically for leaders or protectors.
  i18n_explanations:
    en: Biblical metaphor for Jesus from John 10:11 ('I am the good shepherd'), symbolizing care, guidance,
      and sacrifice. Used in religious contexts and also metaphorically for leaders or protectors.
    es: Metáfora bíblica de Jesús de Juan 10:11 ('Yo soy el buen pastor'), que simboliza cuidado, guía
      y sacrificio. Se usa en contextos religiosos y también metafóricamente para líderes o protectores.
    fr: Métaphore biblique de Jésus tirée de Jean 10:11 ('Je suis le bon berger'), symbolisant la sollicitude,
      la guidance et le sacrifice. Utilisée dans des contextes religieux et aussi métaphoriquement pour
      les leaders ou protecteurs.
    de: Biblische Metapher für Jesus aus Johannes 10,11 ('Ich bin der gute Hirte'), die Fürsorge, Führung
      und Opfer symbolisiert. Wird in religiösen Kontexten und auch metaphorisch für Führer oder Beschützer
      verwendet.
    it: Metafora biblica di Gesù da Giovanni 10:11 ('Io sono il buon pastore'), che simboleggia cura,
      guida e sacrificio. Usata in contesti religiosi e anche metaforicamente per leader o protettori.
    pt: Metáfora bíblica para Jesus de João 10:11 ('Eu sou o bom pastor'), simbolizando cuidado, orientação
      e sacrifício. Usada em contextos religiosos e também metaforicamente para líderes ou protetores.
    ru: Библейская метафора Иисуса из Евангелия от Иоанна 10:11 ('Я есмь пастырь добрый'), символизирующая
      заботу, руководство и жертву. Используется в религиозных контекстах, а также метафорически для лидеров
      или защитников.
    ja: ヨハネによる福音書10章11節（「私は良い羊飼いである」）からのイエスに関する聖書の比喩で、思いやり、導き、犠牲を象徴する。宗教的な文脈で使われ、指導者や保護者を指す比喩としても用いられる。
    zh: 出自约翰福音10:11（'我是好牧人'）的圣经比喻，象征关怀、引导和牺牲。用于宗教语境，也隐喻领导者或保护者。
    ar: 'استعارة كتابية ليسوع من يوحنا 10: 11 (''أنا الراعي الصالح'')، ترمز إلى الرعاية والإرشاد والتضحية.
      تُستخدم في السياقات الدينية وأيضًا مجازيًا للقادة أو الحماة.'
    he: מטפורה מקראית לישוע מיוחנן י':11 ('אני הרועה הטוב'), המסמלת דאגה, הדרכה והקרבה. משמשת בהקשרים
      דתיים וגם באופן מטפורי למנהיגים או מגינים.
