- id: fi_cultural_reference_talin_ihantalan_taistelu_9e1f03d7
  language: fi
  canonical_reference: Talin–Ihantalan taistelu
  reference_type: cultural_reference
  surface_patterns:
  - Talin–Ihantalan taistelu
  - Tali-Ihantalan taistelu
  - Ihantalan taistelu
  short_explanation: The Battle of Tali-Ihantala (25 June – 9 July 1944) was the largest battle in Nordic
    history, where Finnish forces halted the Soviet offensive. It is a symbol of Finnish resistance.
  i18n_explanations:
    en: The Battle of Tali-Ihantala (25 June – 9 July 1944) was the largest battle in Nordic history,
      where Finnish forces halted the Soviet offensive. It is a symbol of Finnish resistance.
    es: La batalla de Tali-Ihantala (25 de junio – 9 de julio de 1944) fue la batalla más grande en la
      historia nórdica, donde las fuerzas finlandesas detuvieron la ofensiva soviética. Es un símbolo
      de la resistencia finlandesa.
    fr: La bataille de Tali-Ihantala (25 juin – 9 juillet 1944) fut la plus grande bataille de l'histoire
      nordique, où les forces finlandaises stoppèrent l'offensive soviétique. C'est un symbole de la résistance
      finlandaise.
    de: Die Schlacht von Tali-Ihantala (25. Juni – 9. Juli 1944) war die größte Schlacht der nordischen
      Geschichte, in der finnische Truppen die sowjetische Offensive zum Stillstand brachten. Sie ist
      ein Symbol des finnischen Widerstands.
    it: La battaglia di Tali-Ihantala (25 giugno – 9 luglio 1944) fu la più grande battaglia della storia
      nordica, in cui le forze finlandesi fermarono l'offensiva sovietica. È un simbolo della resistenza
      finlandese.
    pt: A Batalha de Tali-Ihantala (25 de junho – 9 de julho de 1944) foi a maior batalha da história
      nórdica, onde as forças finlandesas detiveram a ofensiva soviética. É um símbolo da resistência
      finlandesa.
    ru: Битва при Тали-Ихантала (25 июня – 9 июля 1944 года) была крупнейшим сражением в истории Северных
      стран, где финские войска остановили советское наступление. Она является символом финского сопротивления.
    ja: タリ＝イハンタラの戦い（1944年6月25日～7月9日）は、北欧史上最大の戦闘であり、フィンランド軍がソビエトの攻勢を阻止した。これはフィンランドの抵抗の象徴である。
    zh: 塔利-伊汉塔拉战役（1944年6月25日至7月9日）是北欧历史上规模最大的战役，芬兰军队在此阻止了苏联的进攻。它是芬兰抵抗的象征。
    ar: معركة تالي-إيهانتالا (25 يونيو – 9 يوليو 1944) كانت أكبر معركة في تاريخ الشمال، حيث أوقفت القوات
      الفنلندية الهجوم السوفيتي. إنها رمز للمقاومة الفنلندية.
    he: קרב טאלי-איהאנטלה (25 ביוני – 9 ביולי 1944) היה הקרב הגדול ביותר בהיסטוריה הנורדית, שבו עצרו הכוחות
      הפיניים את המתקפה הסובייטית. הוא סמל להתנגדות הפינית.
