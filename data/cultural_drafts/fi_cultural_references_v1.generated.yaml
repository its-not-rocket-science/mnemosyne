  short_explanation: The opening line of Eino Leino's famous poem 'Nocturne', meaning 'The earth is treacherous'.
    It reflects on the harshness of nature and human fate, and is a classic of Finnish poetry.
  i18n_explanations:
    en: The opening line of Eino Leino's famous poem 'Nocturne', meaning 'The earth is treacherous'. It
      reflects on the harshness of nature and human fate, and is a classic of Finnish poetry.
    es: El verso inicial del famoso poema 'Nocturne' de Eino Leino, que significa 'La tierra es traicionera'.
      Reflexiona sobre la dureza de la naturaleza y el destino humano, y es un clásico de la poesía finlandesa.
    fr: Le vers d'ouverture du célèbre poème 'Nocturne' d'Eino Leino, signifiant 'La terre est traîtresse'.
      Il réfléchit à la dureté de la nature et au destin humain, et est un classique de la poésie finlandaise.
    de: Die Eröffnungszeile von Eino Leinos berühmtem Gedicht 'Nocturne', die bedeutet 'Die Erde ist tückisch'.
      Sie reflektiert die Härte der Natur und das menschliche Schicksal und ist ein Klassiker der finnischen
      Dichtung.
    it: Il verso di apertura della famosa poesia 'Nocturne' di Eino Leino, che significa 'La terra è traditrice'.
      Riflette sulla durezza della natura e sul destino umano, ed è un classico della poesia finlandese.
    pt: O verso de abertura do famoso poema 'Nocturne' de Eino Leino, que significa 'A terra é traiçoeira'.
      Reflete sobre a dureza da natureza e o destino humano, e é um clássico da poesia finlandesa.
    ru: Начальная строка знаменитого стихотворения Эйно Лейно 'Nocturne', означающая 'Земля коварна'.
      Она размышляет о суровости природы и человеческой судьбе и является классикой финской поэзии.
    ja: エイノ・レイノの有名な詩「夜想曲（Nocturne）」の冒頭の行で、「大地は裏切る」という意味。自然の厳しさと人間の運命を反映しており、フィンランド詩の古典。
    zh: 埃诺·莱诺（Eino Leino）著名诗作《夜曲》（Nocturne）的开头一句，意思是“大地是阴险的”。它反思了自然的严酷和人类的命运，是芬兰诗歌的经典之作。
    ar: السطر الافتتاحي من قصيدة إينو لينو الشهيرة 'Nocturne'، ويعني 'الأرض خادعة'. يتأمل قسوة الطبيعة
      ومصير الإنسان، وهو من كلاسيكيات الشعر الفنلندي.
    he: שורת הפתיחה של שירו המפורסם של איינו ליינו 'Nocturne', שמשמעותה 'האדמה היא בוגדנית'. היא משקפת
