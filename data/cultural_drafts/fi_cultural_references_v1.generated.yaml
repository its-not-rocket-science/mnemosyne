    pt: Este provérbio ensina que a satisfação com pouco é mais valiosa do que grande riqueza. Reflete
      um valor tradicional finlandês de modéstia e satisfação.
    ru: Эта пословица учит, что довольство малым ценнее большого богатства. Она отражает традиционную
