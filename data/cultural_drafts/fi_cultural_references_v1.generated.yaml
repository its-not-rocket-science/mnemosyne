  short_explanation: Refers to the legendary killing of Bishop Henry by Lalli on the ice of Lake Köyliö
    in the 12th century. This event is considered a foundational myth of Finnish Christianity, though
    historical accuracy is disputed.
  i18n_explanations:
    en: Refers to the legendary killing of Bishop Henry by Lalli on the ice of Lake Köyliö in the 12th
      century. This event is considered a foundational myth of Finnish Christianity, though historical
      accuracy is disputed.
    es: Se refiere al asesinato legendario del obispo Enrique por parte de Lalli en el hielo del lago
      Köyliö en el siglo XII. Este evento se considera un mito fundacional del cristianismo finlandés,
      aunque su exactitud histórica es discutida.
    fr: Fait référence au meurtre légendaire de l'évêque Henry par Lalli sur la glace du lac Köyliö au
      12e siècle. Cet événement est considéré comme un mythe fondateur du christianisme finlandais, bien
      que l'exactitude historique soit contestée.
    de: Bezieht sich auf die legendäre Tötung von Bischof Heinrich durch Lalli auf dem Eis des Köyliö-Sees
      im 12. Jahrhundert. Dieses Ereignis gilt als Gründungsmythos des finnischen Christentums, obwohl
      die historische Genauigkeit umstritten ist.
    it: Si riferisce all'uccisione leggendaria del vescovo Enrico da parte di Lalli sul ghiaccio del lago
      Köyliö nel XII secolo. Questo evento è considerato un mito fondatore del cristianesimo finlandese,
      sebbene l'accuratezza storica sia discussa.
    pt: Refere-se ao assassinato lendário do bispo Henrique por Lalli no gelo do lago Köyliö no século
      XII. Este evento é considerado um mito fundador do cristianismo finlandês, embora a precisão histórica
      seja contestada.
    ru: Относится к легендарному убийству епископа Хенрика Лалли на льду озера Кюёлиё в XII веке. Это
      событие считается основополагающим мифом финского христианства, хотя историческая достоверность
      оспаривается.
    ja: 12世紀にラッリがコウリュオ湖の氷上でヘンリー司教を殺害したという伝説を指します。この出来事はフィンランドのキリスト教の創始神話と見なされていますが、歴史的正確性は疑問視されています。
    zh: 指12世纪拉利在科于利厄湖的冰上杀死亨利主教的传奇事件。这一事件被认为是芬兰基督教的奠基神话，尽管其历史准确性存在争议。
    ar: يشير إلى القتل الأسطوري للأسقف هنري على يد لالي على جليد بحيرة كويليو في القرن الثاني عشر. يعتبر
