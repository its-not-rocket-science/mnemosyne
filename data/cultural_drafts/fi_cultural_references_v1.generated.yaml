  - jääkärit
  short_explanation: The Jäger Movement involved Finnish volunteers who trained in Germany (1915–1918)
    to fight for Finnish independence from Russia. They became the elite of the Finnish army and a national
    symbol.
  i18n_explanations:
    en: The Jäger Movement involved Finnish volunteers who trained in Germany (1915–1918) to fight for
      Finnish independence from Russia. They became the elite of the Finnish army and a national symbol.
    es: El Movimiento Jäger involucró a voluntarios finlandeses que se entrenaron en Alemania (1915–1918)
      para luchar por la independencia finlandesa de Rusia. Se convirtieron en la élite del ejército finlandés
      y un símbolo nacional.
    fr: Le mouvement des Jägers impliquait des volontaires finlandais formés en Allemagne (1915–1918)
      pour lutter pour l'indépendance de la Finlande vis-à-vis de la Russie. Ils devinrent l'élite de
      l'armée finlandaise et un symbole national.
    de: Die Jägerbewegung umfasste finnische Freiwillige, die in Deutschland (1915–1918) ausgebildet wurden,
      um für die finnische Unabhängigkeit von Russland zu kämpfen. Sie wurden zur Elite der finnischen
      Armee und zu einem nationalen Symbol.
    it: Il movimento dei Jäger coinvolse volontari finlandesi che si addestrarono in Germania (1915–1918)
      per combattere per l'indipendenza finlandese dalla Russia. Divennero l'élite dell'esercito finlandese
      e un simbolo nazionale.
    pt: O Movimento Jäger envolveu voluntários finlandeses que treinaram na Alemanha (1915–1918) para
      lutar pela independência finlandesa da Rússia. Eles se tornaram a elite do exército finlandês e
      um símbolo nacional.
    ru: Движение егерей включало финских добровольцев, проходивших подготовку в Германии (1915–1918) для
      борьбы за независимость Финляндии от России. Они стали элитой финской армии и национальным символом.
    ja: イェーガー運動は、フィンランドのロシアからの独立のためにドイツで訓練を受けた（1915年～1918年）フィンランド人志願兵からなる。彼らはフィンランド軍の精鋭となり、国家の象徴となった。
    zh: 猎兵运动涉及在德国接受训练（1915-1918）的芬兰志愿者，他们为芬兰从俄罗斯独立而战。他们成为芬兰军队的精英和国家的象征。
    ar: حركة ييغر تضمنت متطوعين فنلنديين تدربوا في ألمانيا (1915–1918) للقتال من أجل استقلال فنلندا عن
      روسيا. أصبحوا نخبة الجيش الفنلندي ورمزًا وطنيًا.
    he: תנועת הייגר כללה מתנדבים פינים שהתאמנו בגרמניה (1915–1918) כדי להילחם למען עצמאות פינלנד מרוסיה.
      הם הפכו לעילית של הצבא הפיני ולסמל לאומי.
