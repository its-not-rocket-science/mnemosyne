    ja: このことわざは、少ないもので満足することが大きな富よりも価値があると教えています。慎み深さと満足感というフィンランドの伝統的な価値観を反映しています。
    zh: 这句谚语教导说，知足于微薄之物比巨大的财富更有价值。它反映了芬兰人谦逊和满足的传统价值观。
    ar: يعلم هذا المثل أن القناعة بالقليل أثمن من الثروة الكبيرة. إنه يعكس قيمة فنلندية تقليدية من التواضع
