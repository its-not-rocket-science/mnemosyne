- id: fi_cultural_reference_kannaksen_suurhyökkäys_3788a905
  language: fi
  canonical_reference: Kannaksen suurhyökkäys
  reference_type: cultural_reference
  surface_patterns:
  - Kannaksen suurhyökkäys
  - suurhyökkäys Karjalankannaksella
  - Kannaksen suurhyökkäys 1944
  short_explanation: The major Soviet offensive on the Karelian Isthmus in June 1944 during the Continuation
    War. It was a critical phase leading to Finnish defensive victories like the Battle of Tali-Ihantala.
  i18n_explanations:
    en: The major Soviet offensive on the Karelian Isthmus in June 1944 during the Continuation War. It
      was a critical phase leading to Finnish defensive victories like the Battle of Tali-Ihantala.
    es: La gran ofensiva soviética en el istmo de Carelia en junio de 1944 durante la Guerra de Continuación.
      Fue una fase crítica que condujo a victorias defensivas finlandesas como la Batalla de Tali-Ihantala.
    fr: La grande offensive soviétique sur l'isthme de Carélie en juin 1944 pendant la guerre de Continuation.
      Ce fut une phase critique menant à des victoires défensives finlandaises comme la bataille de Tali-Ihantala.
    de: Die große sowjetische Offensive auf der Karelischen Landenge im Juni 1944 während des Fortsetzungskrieges.
      Es war eine kritische Phase, die zu finnischen Verteidigungssiegen wie der Schlacht von Tali-Ihantala
      führte.
    it: La grande offensiva sovietica sull'istmo di Carelia nel giugno 1944 durante la guerra di Continuazione.
      Fu una fase critica che portò a vittorie difensive finlandesi come la battaglia di Tali-Ihantala.
    pt: A grande ofensiva soviética no istmo da Carélia em junho de 1944 durante a Guerra de Continuação.
      Foi uma fase crítica que levou a vitórias defensivas finlandesas como a Batalha de Tali-Ihantala.
    ru: Крупное советское наступление на Карельском перешейке в июне 1944 года в ходе Советско-финляндской
      войны (1941–1944). Это был критический этап, приведший к оборонительным победам Финляндии, таким
      как битва при Тали-Ихантала.
    ja: 継続戦争中の1944年6月、カレリア地峡に対するソビエトの大攻勢。これは、タリ＝イハンタラの戦いのようなフィンランドの防衛勝利につながる重要な局面であった。
    zh: 1944年6月，在持续战争中苏联对卡累利阿地峡发起的重大攻势。这是导致芬兰取得如塔利-伊汉塔拉战役等防御性胜利的关键阶段。
    ar: الهجوم السوفيتي الكبير على برزخ كاريليا في يونيو 1944 خلال حرب الاستمرار. لقد كانت مرحلة حرجة
      أدت إلى انتصارات دفاعية فنلندية مثل معركة تالي-إيهانتالا.
    he: המתקפה הסובייטית הגדולה על מצר קרליה ביוני 1944 במהלך מלחמת ההמשך. זה היה שלב קריטי שהוביל לניצחונות
      הגנה פיניים כמו קרב טאלי-איהאנטלה.
