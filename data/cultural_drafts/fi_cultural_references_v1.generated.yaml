- id: fi_literary_reference_mieleni_minun_tekevi_c78f624d
  language: fi
  canonical_reference: Mieleni minun tekevi
  reference_type: literary_reference
  surface_patterns:
  - Mieleni minun tekevi
  - Mieleni minun tekevi, aivoni ajattelevi
  short_explanation: 'The opening line of the Finnish national epic Kalevala: ''My mind is making me,
    my brain is thinking...'' It sets the tone for the epic''s invocation and is one of the most recognizable
    lines in Finnish literature.'
  i18n_explanations:
    en: 'The opening line of the Finnish national epic Kalevala: ''My mind is making me, my brain is thinking...''
      It sets the tone for the epic''s invocation and is one of the most recognizable lines in Finnish
      literature.'
    es: 'La línea de apertura de la epopeya nacional finlandesa Kalevala: ''Mi mente me está haciendo,
      mi cerebro está pensando...'' Establece el tono de la invocación de la epopeya y es una de las líneas
      más reconocibles de la literatura finlandesa.'
    fr: 'La première ligne de l''épopée nationale finlandaise Kalevala : ''Mon esprit me pousse, mon cerveau
      pense...'' Elle donne le ton de l''invocation de l''épopée et est l''une des lignes les plus reconnaissables
      de la littérature finlandaise.'
    de: 'Die Eröffnungszeile des finnischen Nationalepos Kalevala: ''Mein Geist treibt mich an, mein Gehirn
      denkt...'' Sie gibt den Ton für die Invokation des Epos vor und ist eine der bekanntesten Zeilen
      der finnischen Literatur.'
    it: 'La prima riga dell''epopea nazionale finlandese Kalevala: ''La mia mente mi sta facendo, il mio
      cervello sta pensando...'' Imposta il tono per l''invocazione dell''epopea ed è una delle righe
      più riconoscibili della letteratura finlandese.'
    pt: 'A primeira linha da epopeia nacional finlandesa Kalevala: ''Minha mente está me fazendo, meu
      cérebro está pensando...'' Define o tom para a invocação da epopeia e é uma das linhas mais reconhecíveis
      da literatura finlandesa.'
    ru: 'Начальная строка финского национального эпоса «Калевала»: «Мой разум побуждает меня, мой мозг
      думает...» Она задаёт тон для обращения эпоса и является одной из самых узнаваемых строк в финской
      литературе.'
    ja: フィンランドの国民的叙事詩『カレワラ』の冒頭の一節：「私の心が私を作り、私の脳が考えている...」叙事詩の呼びかけの調子を設定し、フィンランド文学で最も認知された行の一つです。
    zh: 芬兰民族史诗《卡勒瓦拉》的开篇句子：‘我的心灵在推动我，我的大脑在思考...’它奠定了史诗的祈求语调，是芬兰文学中最著名的句子之一。
    ar: 'السطر الافتتاحي للملحمة الوطنية الفنلندية كاليفالا: ''عقلي يحفزني، دماغي يفكر...'' يحدد نغمة
      استهلال الملحمة وهو أحد أكثر السطور شهرة في الأدب الفنلندي.'
    he: 'השורה הפותחת של האפוס הלאומי הפיני קלוואלה: ''מוחי דוחף אותי, מוחי חושב...'' היא קובעת את הטון
      לזימון האפוס והיא אחת השורות המוכרות ביותר בספרות הפינית.'
