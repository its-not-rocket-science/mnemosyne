- id: zh_classical_or_scriptural_allusion_三令五申_c07d23c2
  language: zh
  canonical_reference: 三令五申
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 三令五申
  - 三令五申之
  - 再三令申
  short_explanation: From Sima Qian's 'Records of the Grand Historian', describing Sun Tzu's repeated
    orders to concubines during military training. It means to give repeated instructions and warnings.
  i18n_explanations:
    en: From Sima Qian's 'Records of the Grand Historian', describing Sun Tzu's repeated orders to concubines
      during military training. It means to give repeated instructions and warnings.
    es: De los 'Registros del Gran Historiador' de Sima Qian, que describe las órdenes repetidas de Sun
      Tzu a las concubinas durante el entrenamiento militar. Significa dar instrucciones y advertencias
      repetidas.
    fr: Des 'Mémoires historiques' de Sima Qian, décrivant les ordres répétés de Sun Tzu aux concubines
      lors d'un entraînement militaire. Cela signifie donner des instructions et des avertissements répétés.
    de: Aus Sima Qians 'Aufzeichnungen des großen Historikers', die Sun Tzus wiederholte Befehle an Konkubinen
      während des Militärtrainings beschreiben. Es bedeutet, wiederholte Anweisungen und Warnungen zu
      geben.
    it: Dai 'Memorie storiche' di Sima Qian, che descrivono gli ordini ripetuti di Sun Tzu alle concubine
      durante l'addestramento militare. Significa dare istruzioni e avvertimenti ripetuti.
    pt: Dos 'Registros do Grande Historiador' de Sima Qian, descrevendo as ordens repetidas de Sun Tzu
      às concubinas durante o treinamento militar. Significa dar instruções e avisos repetidos.
    ru: Из «Исторических записок» Сыма Цяня, описывающих повторные приказы Сунь Цзы наложницам во время
      военной подготовки. Означает многократное повторение инструкций и предупреждений.
    ja: 司馬遷の『史記』に由来し、孫武が軍事訓練で側室たちに繰り返し命令を出した故事。繰り返し指示や警告を与えることを意味する。
    zh: 出自司马迁的《史记》，描述孙武在军事训练中反复命令嫔妃的故事。意为反复下达指令和警告。
    ar: من 'سجلات المؤرخ العظيم' لسيما تشيان، تصف الأوامر المتكررة لسون تزو للمحظيات أثناء التدريب العسكري.
      يعني إعطاء تعليمات وتحذيرات متكررة.
    he: מתוך 'רישומי ההיסטוריון הגדול' של סימה צ'יאן, המתאר את פקודותיו החוזרות של סון דזה לפילגשים במהלך
      אימון צבאי. פירושו לתת הוראות ואזהרות חוזרות.
