- id: zh_literary_reference_待月西厢_412fdca5
  language: zh
  canonical_reference: 待月西厢
  reference_type: literary_reference
  surface_patterns:
  - 待月西厢
  - 待月西厢下
  short_explanation: A line from Wang Shifu's 'The Story of the Western Wing', referring to a tryst under
    the moon in the western chamber, and it has become an allusion to secret romantic meetings.
  i18n_explanations:
    en: A line from Wang Shifu's 'The Story of the Western Wing', referring to a tryst under the moon
      in the western chamber, and it has become an allusion to secret romantic meetings.
    es: Un verso de 'La Historia del Ala Oeste' de Wang Shifu, que hace referencia a una cita bajo la
      luna en la cámara occidental, y se ha convertido en una alusión a encuentros románticos secretos.
    fr: Un vers de 'L'Histoire de l'Aile Ouest' de Wang Shifu, faisant référence à un rendez-vous sous
      la lune dans la chambre occidentale, et il est devenu une allusion à des rencontres romantiques
      secrètes.
    de: Ein Vers aus Wang Shifus 'Die Geschichte vom Westflügel', der sich auf ein heimliches Treffen
      unter dem Mond in der Westkammer bezieht, und ist zu einer Anspielung auf geheime romantische Treffen
      geworden.
    it: Un verso de 'La Storia dell'Ala Occidentale' di Wang Shifu, che si riferisce a un appuntamento
      sotto la luna nella camera occidentale, ed è diventato un'allusione a incontri romantici segreti.
    pt: Um verso de 'A História da Ala Ocidental' de Wang Shifu, referindo-se a um encontro sob a lua
      na câmara ocidental, e tornou-se uma alusão a encontros românticos secretos.
    ru: Строка из пьесы Ван Шифу «Западный флигель», отсылающая к любовному свиданию под луной в западной
      комнате, и стала аллюзией на тайные романтические встречи.
    ja: 王実甫の『西廂記』の一節で、西の部屋で月の下で密会することを指し、秘密の恋愛の寓喩となっている。
    zh: 王实甫《西厢记》中的一句唱词，指在西厢月下约会，现已成为秘密约会的典故。
    ar: سطر من مسرحية وانغ شيفو 'قصة الجناح الغربي'، يشير إلى لقاء تحت القمر في الغرفة الغربية، وأصبح
      إشارة إلى لقاءات رومانسية سرية.
    he: שורה מ'סיפור האגף המערבי' של וואנג שיפו, המתייחסת לפגישה חשאית תחת הירח בחדר המערבי, והפכה להרמז
      למפגשים רומנטיים סודיים.
