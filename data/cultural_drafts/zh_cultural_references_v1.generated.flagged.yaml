- id: zh_classical_or_scriptural_allusion_仁者爱人_d7890dd8
  language: zh
  canonical_reference: 仁者爱人
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 仁者爱人
  - 仁者爱人，有礼者敬人
  short_explanation: From Mencius, it means 'The benevolent person loves others.' It encapsulates the
    Confucian virtue of ren (benevolence) as fundamental to moral conduct.
  i18n_explanations:
    en: From Mencius, it means 'The benevolent person loves others.' It encapsulates the Confucian virtue
      of ren (benevolence) as fundamental to moral conduct.
    es: De Mencio, significa 'La persona benévola ama a los demás'. Resume la virtud confuciana del ren
      (benevolencia) como fundamental para la conducta moral.
    fr: De Mencius, cela signifie 'La personne bienveillante aime les autres'. Il résume la vertu confucéenne
      du ren (bienveillance) comme fondamentale pour la conduite morale.
    de: Von Menzius, es bedeutet 'Der gütige Mensch liebt andere'. Es fasst die konfuzianische Tugend
      des Ren (Güte) als grundlegend für moralisches Handeln zusammen.
    it: Da Mencio, significa 'La persona benevola ama gli altri'. Riassume la virtù confuciana del ren
      (benevolenza) come fondamentale per la condotta morale.
    pt: De Mêncio, significa 'A pessoa benevolente ama os outros'. Resume a virtude confuciana do ren
      (benevolência) como fundamental para a conduta moral.
    ru: От Мэн-цзы, это означает 'Добродетельный человек любит других'. Это воплощает конфуцианскую добродетель
      жэнь (человеколюбие) как основу нравственного поведения.
    ja: 孟子からで、「仁者は人を愛する」という意味。儒教の徳である仁（思いやり）を道徳的行動の基本として要約しています。
    zh: 出自《孟子》，意思是“仁爱的人关爱他人”。它概括了儒家之“仁”作为道德行为基础的观念。
    ar: من كتاب منسيوس، ويعني 'الشخص الخير يحب الآخرين'. يلخص الفضيلة الكونفوشيوسية رن (الخير) كأساس للسلوك
      الأخلاقي.
    he: מאת מנצ'יוס, פירושו 'האדם המיטיב אוהב אחרים'. הוא מגלם את המידה הקונפוציאנית רן (טוב לב) כבסיסית
      להתנהגות מוסרית.
