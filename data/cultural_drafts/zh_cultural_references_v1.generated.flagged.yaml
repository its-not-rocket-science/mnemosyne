- id: zh_classical_or_scriptural_allusion_人不知而不愠_0d0a5c69
  language: zh
  canonical_reference: 人不知而不愠
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 人不知而不愠
  - 人不知而不怄
  short_explanation: A Confucian phrase praising the virtue of not being annoyed when others fail to recognize
    one's abilities, highlighting humility and self-cultivation.
  i18n_explanations:
    en: A Confucian phrase praising the virtue of not being annoyed when others fail to recognize one's
      abilities, highlighting humility and self-cultivation.
    es: Una frase confuciana que alaba la virtud de no molestarse cuando otros no reconocen las propias
      habilidades, destacando la humildad y la autodisciplina.
    fr: Une phrase confucéenne louant la vertu de ne pas s'irriter lorsque les autres ne reconnaissent
      pas ses capacités, soulignant l'humilité et la culture de soi.
    de: Ein konfuzianischer Satz, der die Tugend preist, sich nicht zu ärgern, wenn andere die eigenen
      Fähigkeiten nicht anerkennen, und Bescheidenheit sowie Selbstkultivierung hervorhebt.
    it: Una frase confuciana che loda la virtù di non infastidirsi quando gli altri non riconoscono le
      proprie capacità, evidenziando umiltà e autocultivazione.
    pt: Uma frase confuciana que elogia a virtude de não ficar irritado quando outros não reconhecem as
      próprias habilidades, destacando humildade e autocultivo.
    ru: Конфуцианская фраза, восхваляющая добродетель не раздражаться, когда окружающие не признают твоих
      способностей, подчеркивающая смирение и самосовершенствование.
    ja: 他人が自分の能力を認めなくても腹を立てない美徳を称える孔子の言葉。謙虚さと自己修養を強調する。
    zh: 孔子的话，赞扬当别人不了解自己的才能时不恼怒的品德，强调谦逊和自我修养。
    ar: عبارة كونفوشيوسية تمدح فضيلة عدم الانزعاج عندما لا يعترف الآخرون بقدرات الفرد، وتسلط الضوء على
      التواضع وتهذيب الذات.
    he: אמרה קונפוציאנית המשבחת את המידה של לא להיעלב כאשר אחרים אינם מכירים ביכולותיו, תוך הדגשת ענווה
      וטיפוח עצמי.
