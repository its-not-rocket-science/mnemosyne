- id: fr_literary_reference_tout_ce_qui_brille_n_est_pas_or_aae806ff
  language: fr
  canonical_reference: Tout ce qui brille n’est pas or
  reference_type: literary_reference
  surface_patterns:
  - Tout ce qui brille n’est pas or
  - Tout ce qui brille n'est pas or
  - Tout ce qui reluit n'est pas or
  short_explanation: This French proverb means 'All that glitters is not gold,' cautioning against judging
    by appearances. It originates from Shakespeare's The Merchant of Venice and is widely used in French.
  i18n_explanations:
    en: This French proverb means 'All that glitters is not gold,' cautioning against judging by appearances.
      It originates from Shakespeare's The Merchant of Venice and is widely used in French.
    es: Este proverbio francés significa 'No todo lo que brilla es oro', advirtiendo contra juzgar por
      las apariencias. Se origina en El mercader de Venecia de Shakespeare y se usa ampliamente en francés.
    fr: Ce proverbe français signifie 'Tout ce qui brille n'est pas or', mettant en garde contre les jugements
      sur les apparences. Il provient du Marchand de Venise de Shakespeare et est largement utilisé en
      français.
    de: Dieses französische Sprichwort bedeutet 'Es ist nicht alles Gold, was glänzt' und warnt davor,
      nach dem Äußeren zu urteilen. Es stammt aus Shakespeares Der Kaufmann von Venedig und wird im Französischen
      häufig verwendet.
    it: Questo proverbio francese significa 'Non è tutto oro ciò che luccica', mettendo in guardia dal
      giudicare dalle apparenze. Ha origine ne Il mercante di Venezia di Shakespeare ed è ampiamente usato
      in francese.
    pt: Este provérbio francês significa 'Nem tudo que reluz é ouro', alertando contra julgar pelas aparências.
      Origina-se de O Mercador de Veneza de Shakespeare e é amplamente usado em francês.
    ru: Эта французская пословица означает 'Не всё то золото, что блестит', предостерегая от суждений
      по внешности. Она происходит из 'Венецианского купца' Шекспира и широко используется во французском
      языке.
    ja: このフランスのことわざは「輝くものすべてが金とは限らない」という意味で、外見で判断することに警告しています。シェイクスピアの『ベニスの商人』に由来し、フランス語で広く使われています。
