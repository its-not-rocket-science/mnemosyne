- id: fr_classical_or_scriptural_allusion_le_jugement_de_pâris_a0a42ad4
  language: fr
  canonical_reference: Le jugement de Pâris
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - jugement de Pâris
  - le jugement de Pâris
  - un jugement à la Pâris
  short_explanation: Refers to the mythological story where Paris, a Trojan prince, judges which of three
    goddesses (Hera, Athena, Aphrodite) is the fairest, leading to the Trojan War. Used metaphorically
    for a difficult or pivotal decision.
  i18n_explanations:
    en: Refers to the mythological story where Paris, a Trojan prince, judges which of three goddesses
      (Hera, Athena, Aphrodite) is the fairest, leading to the Trojan War. Used metaphorically for a difficult
      or pivotal decision.
    es: Se refiere a la historia mitológica en la que Paris, un príncipe troyano, juzga cuál de las tres
      diosas (Hera, Atenea, Afrodita) es la más bella, lo que lleva a la Guerra de Troya. Se usa metafóricamente
      para una decisión difícil o crucial.
    fr: Fait référence à l'histoire mythologique où Pâris, un prince troyen, juge laquelle des trois déesses
      (Héra, Athéna, Aphrodite) est la plus belle, menant à la guerre de Troie. Utilisé métaphoriquement
      pour une décision difficile ou capitale.
    de: Bezieht sich auf die mythologische Geschichte, in der Paris, ein trojanischer Prinz, entscheidet,
      welche der drei Göttinnen (Hera, Athene, Aphrodite) die schönste ist, was zum Trojanischen Krieg
      führt. Metaphorisch für eine schwierige oder entscheidende Wahl.
    it: Si riferisce alla storia mitologica in cui Paride, un principe troiano, giudica quale delle tre
      dee (Era, Atena, Afrodite) sia la più bella, portando alla guerra di Troia. Usato metaforicamente
      per una decisione difficile o cruciale.
    pt: Refere-se à história mitológica em que Páris, um príncipe troiano, julga qual das três deusas
      (Hera, Atena, Afrodite) é a mais bela, levando à Guerra de Troia. Usado metaforicamente para uma
      decisão difícil ou crucial.
    ru: Относится к мифологической истории, где Парис, троянский принц, судит, какая из трех богинь (Гера,
      Афина, Афродита) самая прекрасная, что приводит к Троянской войне. Используется метафорически для
      трудного или решающего выбора.
    ja: トロイの王子パリスが3人の女神（ヘラ、アテナ、アフロディーテ）のうち誰が最も美しいかを判断し、それがトロイ戦争へとつながる神話の物語を指す。困難または決定的な決断の比喩として用いられる。
    zh: 指的是特洛伊王子帕里斯评判三位女神（赫拉、雅典娜、阿佛洛狄忒）谁最美丽的神话故事，最终导致了特洛伊战争。比喻困难或关键的决定。
    ar: يشير إلى القصة الأسطورية حيث باريس، أمير طروادة، يحكم أي من الآلهة الثلاث (هيرا، أثينا، أفروديت)
      هي الأجمل، مما يؤدي إلى حرب طروادة. يستخدم مجازياً لقرار صعب أو محوري.
    he: מתייחס לסיפור המיתולוגי שבו פאריס, נסיך טרויאני, שופט מי מבין שלוש האלות (הרה, אתנה, אפרודיטה)
      היא היפה ביותר, מה שמוביל למלחמת טרויה. משמש כמטפורה להחלטה קשה או מכרעת.
