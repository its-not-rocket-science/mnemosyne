  i18n_explanations:
    en: A line from Yun Dong-ju's poem 'Prologue' (서시), expressing a wish to live without shame before
      the sky. It embodies the poet's moral integrity and resistance during Japanese colonial rule.
    es: Un verso del poema 'Prólogo' (서시) de Yun Dong-ju, que expresa el deseo de vivir sin vergüenza
      ante el cielo. Encarna la integridad moral y la resistencia del poeta durante el dominio colonial
      japonés.
    fr: Un vers du poème 'Prologue' (서시) de Yun Dong-ju, exprimant le souhait de vivre sans honte devant
      le ciel. Il incarne l'intégrité morale et la résistance du poète pendant la domination coloniale
      japonaise.
    de: Ein Vers aus Yun Dong-jus Gedicht 'Prolog' (서시), der den Wunsch ausdrückt, ohne Scham vor dem
      Himmel zu leben. Er verkörpert die moralische Integrität und den Widerstand des Dichters während
      der japanischen Kolonialherrschaft.
    it: Un verso dalla poesia 'Prologo' (서시) di Yun Dong-ju, che esprime il desiderio di vivere senza
