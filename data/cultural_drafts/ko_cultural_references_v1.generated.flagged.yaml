- id: ko_literary_reference_나_보기가_역겨워_73ecd45f
  language: ko
  canonical_reference: 나 보기가 역겨워
  reference_type: literary_reference
  surface_patterns:
  - 나 보기가 역겨워
  - 나 보기가 역겨우면
  - 나 보기가 싫어져
  short_explanation: The opening line of Kim So-wol's poem 'Azaleas' (진달래꽃), expressing the speaker's
    resignation as a lover grows tired of them. It is a classic symbol of Korean romantic sorrow.
  i18n_explanations:
    en: The opening line of Kim So-wol's poem 'Azaleas' (진달래꽃), expressing the speaker's resignation as
      a lover grows tired of them. It is a classic symbol of Korean romantic sorrow.
    es: El verso inicial del poema 'Azaleas' (진달래꽃) de Kim So-wol, que expresa la resignación del hablante
      cuando su amante se cansa de él/ella. Es un símbolo clásico del dolor romántico coreano.
    fr: Le premier vers du poème 'Azalées' (진달래꽃) de Kim So-wol, exprimant la résignation du locuteur
      alors que son amoureux se lasse de lui/elle. C'est un symbole classique de la tristesse romantique
      coréenne.
    de: Die erste Zeile von Kim So-wols Gedicht 'Azaleen' (진달래꽃), die die Resignation des Sprechers ausdrückt,
      wenn der Geliebte seiner/ihrer überdrüssig wird. Ein klassisches Symbol koreanischer romantischer
      Trauer.
    it: Il verso iniziale della poesia 'Azalee' (진달래꽃) di Kim So-wol, che esprime la rassegnazione del
      parlante quando l'amante si stanca di lui/lei. È un classico simbolo del dolore romantico coreano.
    pt: O verso inicial do poema 'Azaleias' (진달래꽃) de Kim So-wol, expressando a resignação do falante
      quando o amante se cansa dele/dela. É um símbolo clássico da tristeza romântica coreana.
    ru: Начальная строка стихотворения Ким Со-воль 'Азалии' (진달래꽃), выражающая смирение говорящего, когда
      любимый устаёт от него/неё. Это классический символ корейской романтической печали.
    ja: 김소월의 시 '진달래꽃'의 첫 구절로, 연인이 싫증을 낼 때 화자의 체념을 표현한다. 한국적 연정의 슬픔을 상징하는 고전적 구절이다.
    zh: 金素月的诗《杜鹃花》的开头诗句，表达了当恋人厌倦时说话者的无奈。它是韩国浪漫悲伤的经典象征。
