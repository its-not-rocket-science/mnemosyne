  short_explanation: A classic Korean folktale about a rabbit and a turtle, where the rabbit uses wit
    to escape being drowned, teaching lessons about cleverness and caution.
  i18n_explanations:
    en: A classic Korean folktale about a rabbit and a turtle, where the rabbit uses wit to escape being
      drowned, teaching lessons about cleverness and caution.
    es: Un cuento clásico coreano sobre un conejo y una tortuga, en el que el conejo usa su astucia para
      escapar de ser ahogado, enseñando lecciones sobre inteligencia y precaución.
    fr: Un conte classique coréen sur un lapin et une tortue, où le lapin utilise son esprit pour échapper
      à la noyade, enseignant des leçons sur la ruse et la prudence.
    de: Ein klassisches koreanisches Märchen über einen Hasen und eine Schildkröte, in dem der Hase mit
      List dem Ertrinken entkommt und Lehren über Klugheit und Vorsicht vermittelt.
    it: Una fiaba classica coreana su un coniglio e una tartaruga, dove il coniglio usa l'astuzia per
      sfuggire all'annegamento, insegnando lezioni sull'intelligenza e la prudenza.
    pt: Um conto clássico coreano sobre um coelho e uma tartaruga, onde o coelho usa a astúcia para escapar
      de ser afogado, ensinando lições sobre esperteza e cautela.
    ru: Классическая корейская сказка о кролике и черепахе, в которой кролик с помощью хитрости избегает
      утопления, преподавая уроки о сообразительности и осторожности.
    ja: ウサギとカメの古典的な韓国の民話で、ウサギが機知を駆使して溺れそうになるのを逃れ、賢さと用心の教訓を伝える。
    zh: 一个经典的朝鲜民间故事，讲述兔子和乌龟的故事，兔子用机智逃脱被淹死的命运，教导人们聪明和谨慎。
    ar: حكاية شعبية كورية كلاسيكية عن أرنب وسلحفاة، حيث يستخدم الأرنب ذكاءه ليهرب من الغرق، وتعلم دروسًا
      في الدهاء والحذر.
    he: סיפור עם קוריאני קלאסי על ארנב וצב, שבו הארנב משתמש בתבונה כדי להימלט מטביעה, ומלמד לקחים על ערנות
