- id: ko_cultural_reference_서희_장군_9f22107d
  language: ko
  canonical_reference: 서희 장군
  reference_type: cultural_reference
  surface_patterns:
  - 서희
  - 서희 장군님
  - 서희 장군
  - 장군 서희
  short_explanation: General Seo Hui was a Goryeo diplomat and military commander who negotiated with
    the Khitan Liao dynasty to prevent war and secure Goguryeo's former territories. He is praised for
    his diplomatic acumen and patriotic spirit.
  i18n_explanations:
    en: General Seo Hui was a Goryeo diplomat and military commander who negotiated with the Khitan Liao
      dynasty to prevent war and secure Goguryeo's former territories. He is praised for his diplomatic
      acumen and patriotic spirit.
    es: El general Seo Hui fue un diplomático y comandante militar de Goryeo que negoció con la dinastía
      Khitan Liao para evitar la guerra y asegurar los antiguos territorios de Goguryeo. Es elogiado por
      su perspicacia diplomática y espíritu patriótico.
    fr: Le général Seo Hui était un diplomate et commandant militaire de Goryeo qui a négocié avec la
      dynastie khitane Liao pour éviter la guerre et sécuriser les anciens territoires de Goguryeo. Il
      est loué pour son sens diplomatique et son esprit patriotique.
    de: General Seo Hui war ein Diplomat und militärischer Befehlshaber von Goryeo, der mit der Khitan-Liao-Dynastie
      verhandelte, um Krieg zu vermeiden und die ehemaligen Gebiete von Goguryeo zu sichern. Er wird für
      sein diplomatisches Geschick und seinen patriotischen Geist gelobt.
    it: Il generale Seo Hui fu un diplomatico e comandante militare di Goryeo che negoziò con la dinastia
      Khitan Liao per prevenire la guerra e assicurare gli ex territori di Goguryeo. È lodato per la sua
      acutezza diplomatica e spirito patriottico.
    pt: O general Seo Hui foi um diplomata e comandante militar de Goryeo que negociou com a dinastia
      Khitan Liao para evitar a guerra e assegurar os antigos territórios de Goguryeo. Ele é elogiado
      por sua perspicácia diplomática e espírito patriótico.
    ru: Генерал Со Хи был дипломатом и военачальником Корё, который вел переговоры с киданьской династией
      Ляо, чтобы предотвратить войну и обеспечить бывшие территории Когурё. Его хвалят за дипломатическую
      проницательность и патриотический дух.
    ja: 徐熙将軍は高麗の外交官であり軍事指揮官で、契丹の遼朝と交渉して戦争を回避し、高句麗の旧領土を確保しました。彼は外交的手腕と愛国心で称賛されています。
    zh: 徐熙将军是高丽的外交官和军事指挥官，与契丹辽朝谈判以避免战争并确保高句丽的旧领土。他以外交才能和爱国精神而受到赞扬。
    ar: كان الجنرال سو هي دبلوماسيًا وقائدًا عسكريًا من غوريو تفاوض مع سلالة لياو الخيتانية لمنع الحرب
      وتأمين أراضي غوغوريو السابقة. يُشاد بفطنته الدبلوماسية وروحه الوطنية.
    he: הגנרל סו הי היה דיפלומט ומפקד צבאי מגוריאו שניהל משא ומתן עם שושלת ליאו החיטאנית כדי למנוע מלחמה
      ולהבטיח את שטחי גוגוריאו לשעבר. הוא זוכה לשבחים על חוכמתו הדיפלומטית ורוחו הפטריוטית.
