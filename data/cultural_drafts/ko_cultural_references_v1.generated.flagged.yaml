- id: ko_proverb_tradition_작은_고추가_맵다_dd80d624
  language: ko
  canonical_reference: 작은 고추가 맵다
  reference_type: proverb_tradition
  surface_patterns:
  - 작은 고추가 맵다
  - 작다고 만만히 보지 마라
  short_explanation: This proverb means that small or seemingly insignificant things can be very powerful
    or intense, cautioning against underestimating someone or something based on size.
  i18n_explanations:
    en: This proverb means that small or seemingly insignificant things can be very powerful or intense,
      cautioning against underestimating someone or something based on size.
    es: Este proverbio significa que las cosas pequeñas o aparentemente insignificantes pueden ser muy
      poderosas o intensas, advirtiendo contra subestimar a alguien o algo por su tamaño.
    fr: Ce proverbe signifie que les petites choses ou apparemment insignifiantes peuvent être très puissantes
      ou intenses, mettant en garde contre le fait de sous-estimer quelqu'un ou quelque chose en raison
      de sa taille.
    de: Dieses Sprichwort bedeutet, dass kleine oder scheinbar unbedeutende Dinge sehr mächtig oder intensiv
      sein können, und warnt davor, jemanden oder etwas aufgrund seiner Größe zu unterschätzen.
    it: Questo proverbio significa che le cose piccole o apparentemente insignificanti possono essere
      molto potenti o intense, mettendo in guardia dal sottovalutare qualcuno o qualcosa in base alle
      dimensioni.
    pt: Este provérbio significa que coisas pequenas ou aparentemente insignificantes podem ser muito
      poderosas ou intensas, alertando contra subestimar alguém ou algo com base no tamanho.
    ru: Эта пословица означает, что маленькие или кажущиеся незначительными вещи могут быть очень мощными
      или интенсивными, предостерегая от недооценки кого-либо или чего-либо на основании размера.
    ja: このことわざは、小さく一見取るに足らないものでも、非常に強力または強烈である可能性があることを意味し、サイズに基づいて人や物事を過小評価しないように警告しています。
    zh: 这句谚语的意思是，小而看似微不足道的东西可能非常强大或强烈，警告不要以大小来低估某人或某物。
    ar: يعني هذا المثل أن الأشياء الصغيرة أو التي تبدو تافهة يمكن أن تكون قوية جدًا أو شديدة، محذرًا من
      الاستهانة بشخص أو شيء بناءً على الحجم.
    he: הפתגם הזה אומר שדברים קטנים או שנראים חסרי חשיבות יכולים להיות חזקים מאוד או עזים, ומזהיר מפני
      זלזול במישהו או במשהו על סמך גודל.
