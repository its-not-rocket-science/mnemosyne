  - Высоцкий, стоящий над Зарёй
  short_explanation: Refers to the monument to Vladimir Vysotsky in Moscow, located near the Moskva River
    embankment, symbolizing the poet and actor's connection to the city's cultural landscape.
  i18n_explanations:
    en: Refers to the monument to Vladimir Vysotsky in Moscow, located near the Moskva River embankment,
      symbolizing the poet and actor's connection to the city's cultural landscape.
    es: Se refiere al monumento a Vladimir Vysotsky en Moscú, ubicado cerca de la ribera del río Moskva,
      que simboliza la conexión del poeta y actor con el paisaje cultural de la ciudad.
    fr: Fait référence au monument dédié à Vladimir Vysotski à Moscou, situé près des quais de la Moskova,
      symbolisant le lien du poète et acteur avec le paysage culturel de la ville.
    de: Bezieht sich auf das Denkmal für Wladimir Wyssozki in Moskau am Moskwa-Ufer, das die Verbindung
      des Dichters und Schauspielers zur kulturellen Landschaft der Stadt symbolisiert.
    it: Si riferisce al monumento a Vladimir Vysotsky a Mosca, situato vicino al lungofiume della Moskva,
      che simboleggia il legame del poeta e attore con il paesaggio culturale della città.
    pt: Refere-se ao monumento a Vladimir Vysotsky em Moscou, localizado próximo à margem do rio Moskva,
      simbolizando a conexão do poeta e ator com a paisagem cultural da cidade.
