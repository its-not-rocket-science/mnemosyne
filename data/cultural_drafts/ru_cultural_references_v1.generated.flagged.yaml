  short_explanation: A famous line from Vladimir Mayakovsky's 1923 poem 'About This' (Про это), symbolizing
    the poet's commitment to pure artistry without compromise. It is often cited to emphasize dedication
    to one's craft.
  i18n_explanations:
    en: A famous line from Vladimir Mayakovsky's 1923 poem 'About This' (Про это), symbolizing the poet's
      commitment to pure artistry without compromise. It is often cited to emphasize dedication to one's
      craft.
    es: Frase famosa del poema de 1923 'Sobre esto' (Про это) de Vladimir Mayakovsky, que simboliza el
      compromiso del poeta con el arte puro sin concesiones. Se cita a menudo para enfatizar la dedicación
      a un oficio.
    fr: Une réplique célèbre du poème de 1923 'À ce sujet' (Про это) de Vladimir Maïakovski, symbolisant
      l'engagement du poète envers un art pur sans compromis. Elle est souvent citée pour souligner le
      dévouement à son métier.
    de: Ein berühmter Vers aus Wladimir Majakowskis Gedicht 'Davon' (Про это) von 1923, der die Verpflichtung
