  - Внемлите гласу разума, отроки
  short_explanation: A phrase from Russian Romantic literature, often associated with moral or philosophical
    exhortations to youth ('отроки' means 'young men'). Used in a lofty, didactic tone.
  i18n_explanations:
    en: A phrase from Russian Romantic literature, often associated with moral or philosophical exhortations
      to youth ('отроки' means 'young men'). Used in a lofty, didactic tone.
    es: Frase de la literatura romántica rusa, asociada a exhortaciones morales o filosóficas a los jóvenes
      ('отроки' significa 'jóvenes'). Se usa en un tono elevado y didáctico.
    fr: Une phrase de la littérature romantique russe, souvent liée à des exhortations morales ou philosophiques
      adressées à la jeunesse ('отроки' signifie 'jeunes gens'). Employée sur un ton élevé et didactique.
    de: Ein Satz aus der russischen Romantik, der oft mit moralischen oder philosophischen Ermahnungen
      an die Jugend ('отроки' bedeutet 'junge Männer') verbunden wird. Wird in einem erhabenen, belehrenden
      Ton verwendet.
    it: Una frase della letteratura romantica russa, spesso associata a esortazioni morali o filosofiche
      ai giovani ('отроки' significa 'giovani'). Usata in un tono elevato e didattico.
    pt: Uma frase da literatura romântica russa, frequentemente associada a exortações morais ou filosóficas
      à juventude ('отроки' significa 'jovens'). Usada em tom elevado e didático.
    ru: Фраза из русской романтической литературы, часто связанная с нравственными или философскими наставлениями
      молодёжи ('отроки' — 'юноши'). Используется в возвышенном, назидательном тоне.
    ja: ロシア・ロマン主義文学の一節で、若者への道徳的または哲学的な勧告と結びつけられる（「отроки」は「若者」を意味する）。崇高で教訓的な口調で用いられる。
    zh: 俄罗斯浪漫主义文学中的一句话，常与对青年（отроки意为“年轻人”）的道德或哲学劝诫相关联。以崇高、说教的语调使用。
    ar: عبارة من الأدب الرومانسي الروسي، غالبًا ما ترتبط بوعظ شباب道德يًا أو فلسفيًا («отроки» تعني «الشباب»).
      تُستخدم بنبرة رنانة وتعليمية.
    he: ביטוי מהספרות הרומנטית הרוסית, הקשור לעיתים קרובות להטפות מוסר או פילוסופיות לצעירים («отроки»
