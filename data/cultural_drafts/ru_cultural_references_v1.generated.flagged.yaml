  short_explanation: A poetic proverb describing swift, unstoppable movement, often used to emphasize
    speed or urgency. The black horse symbolizes power and grace in motion.
  i18n_explanations:
    en: A poetic proverb describing swift, unstoppable movement, often used to emphasize speed or urgency.
      The black horse symbolizes power and grace in motion.
    es: Un proverbio poético que describe un movimiento rápido e imparable, usado para enfatizar velocidad
      o urgencia. El caballo negro simboliza poder y gracia en el movimiento.
    fr: Un proverbe poétique décrivant un mouvement rapide et inarrêtable, souvent utilisé pour souligner
      la vitesse ou l'urgence. Le cheval noir symbolise la puissance et la grâce en mouvement.
    de: Ein poetisches Sprichwort, das eine schnelle, unaufhaltsame Bewegung beschreibt, oft verwendet,
      um Geschwindigkeit oder Dringlichkeit zu betonen. Das schwarze Pferd symbolisiert Kraft und Anmut
      in der Bewegung.
    it: Un proverbio poetico che descrive un movimento rapido e inarrestabile, usato per enfatizzare velocità
      o urgenza. Il cavallo nero simboleggia potenza e grazia nel movimento.
    pt: Um provérbio poético que descreve um movimento rápido e imparável, usado para enfatizar velocidade
      ou urgência. O cavalo negro simboliza poder e graça no movimento.
    ru: Поэтическая пословица, описывающая стремительное, неудержимое движение, часто используемая для
      подчеркивания скорости или срочности. Чёрный конь символизирует силу и изящество в движении.
    ja: 速くて止められない動きを詩的に表現したことわざで、速さや緊急性を強調する際に使われます。黒馬は動きの力強さと優雅さを象徴しています。
    zh: 形容迅捷、无法阻挡的动作的诗意谚语，常用于强调速度或紧迫感。黑马象征着动作中的力量与优雅。
    ar: مثل شعري يصف حركة سريعة لا يمكن إيقافها، يُستخدم غالبًا لتأكيد السرعة أو الإلحاح. يرمز الحصان
