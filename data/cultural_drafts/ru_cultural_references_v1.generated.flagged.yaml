  short_explanation: A line from the play 'Ревизор' by Nikolai Gogol, expressing frustration with chaos
    or absurdity. 'Кутерьма' refers to turmoil or mess, often used to describe bureaucratic or social
    disorder.
  i18n_explanations:
    en: A line from the play 'The Government Inspector' by Nikolai Gogol, expressing frustration with
      chaos or absurdity. 'Kuteryma' refers to turmoil or mess, often used to describe bureaucratic or
      social disorder.
    es: Una línea de la obra 'El inspector general' de Nikolai Gogol que expresa frustración ante el caos
      o la absurdidad. 'Kuteryma' se refiere al desorden o al lío, usado para describir el desorden burocrático
      o social.
    fr: Une réplique de la pièce 'Le Revizor' de Nicolas Gogol exprimant l'exaspération face au chaos
      ou à l'absurdité. 'Kuteryma' désigne le tumulte ou le désordre, souvent utilisé pour décrire le
      désordre bureaucratique ou social.
    de: Eine Zeile aus dem Theaterstück 'Der Revisor' von Nikolai Gogol, die Frustration über Chaos oder
      Absurdität ausdrückt. 'Kuteryma' bezieht sich auf Wirrwarr oder Durcheinander, oft zur Beschreibung
      bürokratischer oder sozialer Unordnung verwendet.
    it: Una frase della commedia 'Il revisore' di Nikolai Gogol che esprime frustrazione per il caos o
      l'assurdità. 'Kuteryma' si riferisce al trambusto o al disordine, spesso usato per descrivere il
      caos burocratico o sociale.
    pt: Uma linha da peça 'O Inspetor Geral' de Nikolai Gogol que expressa frustração com o caos ou a
      absurdidade. 'Kuteryma' refere-se ao tumulto ou desordem, usado para descrever desordem burocrática
      ou social.
    ru: Строка из пьесы Н.В. Гоголя 'Ревизор', выражающая раздражение от хаоса или абсурда. 'Кутерьма'
