      хаоса.
    ja: ニコライ・ゴーゴリの戯曲「検察官」の一節で、混沌や不条理へのいらだちを表す。「クテリマ」は混乱やごたごたを指し、官僚的または社会的な無秩序を表すのに使われる。
    zh: 尼古拉·果戈理戏剧《钦差大臣》中的台词，表达对混乱或荒诞的厌烦。‘Кутерьма’指混乱或杂乱，常用于描述官僚或社会的无序。
    ar: سطر من مسرحية 'المفتش العام' لنجيبان غوغول يعبر عن الإحباط تجاه الفوضى أو العبث. 'كوتيرما' تشير
