      to describe the forced collectivization and industrialization of the late 1920s–early 1930s. It
      signifies a transformative rupture in society.
    es: Término que designa un punto de inflexión radical o cambio decisivo, usado en la historiografía
      soviética para describir la colectivización forzada y la industrialización de finales de los años
      1920 y principios de los 1930. Significa una ruptura transformadora en la sociedad.
    fr: Terme désignant un tournant radical ou un changement décisif, souvent utilisé en historiographie
      soviétique pour décrire la collectivisation forcée et l'industrialisation des années 1920–1930.
      Il symbolise une rupture transformatrice dans la société.
    de: Begriff für einen radikalen Wendepunkt oder eine entscheidende Veränderung, oft in der sowjetischen
      Geschichtsschreibung verwendet, um die erzwungene Kollektivierung und Industrialisierung der späten
      1920er bis frühen 1930er Jahre zu beschreiben. Er steht für einen tiefgreifenden gesellschaftlichen
      Bruch.
    it: Termine che indica un punto di svolta radicale o un cambiamento decisivo, spesso usato nella storiografia
      sovietica per descrivere la collettivizzazione forzata e l'industrializzazione della fine degli
      anni 1920 e dei primi anni 1930. Simboleggia una rottura trasformativa nella società.
    pt: Termo que designa um ponto de virada radical ou uma mudança decisiva, frequentemente usado na
      historiografia soviética para descrever a coletivização forçada e a industrialização do final dos
      anos 1920 e início dos anos 1930. Representa uma ruptura transformadora na sociedade.
    ru: Термин, обозначающий радикальный перелом или решительное изменение, часто используемый в советской
      историографии для описания форсированной коллективизации и индустриализации конца 1920-х — начала
      1930-х годов. Означает преобразовательный разрыв в обществе.
    ja: ソ連の歴史学で用いられる、1920年代後半から1930年代初頭にかけての強制的な集団化と工業化を表す、急激な転換点や決定的な変化を指す用語。社会の根本的な断絶を象徴する。
    zh: 苏联历史学中用于描述20世纪20年代末至30年代初强制集体化和工业化的激进转折点或决定性变革的术语。象征着社会的根本性断裂。
    ar: مصطلح يشير إلى نقطة تحول جذرية أو تغيير حاسم، يُستخدم غالبًا في التأريخ السوفيتي لوصف التجميع
