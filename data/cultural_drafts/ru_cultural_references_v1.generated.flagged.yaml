    it: Un'affermazione filosofica che suggerisce che ogni conoscenza inizia con un senso di meraviglia.
      Spesso citata nelle discussioni sulle origini dell'indagine scientifica.
    pt: Uma afirmação filosófica que sugere que todo conhecimento começa com um senso de admiração ou
