  i18n_explanations:
    en: A phrase referencing a fairy-tale motif of an angel with golden hair, often used to describe a
      beautiful or ethereal person, typically a child or young woman.
    es: Frase que hace referencia a un motivo de cuento de hadas de un ángel de cabello dorado, usada
      para describir a una persona hermosa o etérea, generalmente un niño o una joven.
    fr: Expression faisant référence à un motif de conte de fées d'un ange aux cheveux d'or, souvent utilisée
      pour décrire une personne belle ou éthérée, généralement un enfant ou une jeune femme.
    de: Ein Ausdruck, der sich auf ein Märchenmotiv eines Engels mit goldenen Haaren bezieht, oft verwendet,
      um eine schöne oder ätherische Person, meist ein Kind oder eine junge Frau, zu beschreiben.
    it: Espressione che fa riferimento a un motivo fiabesco di un angelo dai capelli d'oro, spesso usata
