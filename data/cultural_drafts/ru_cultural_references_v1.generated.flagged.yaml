      menudo a Sócrates o al Oráculo de Delfos. En ruso, subraya el papel de la duda en el crecimiento
      intelectual y espiritual.
    fr: Une paraphrase de l'ancien proverbe grec 'Connais-toi toi-même' (Γνῶθι σεαυτόν), souvent attribué
      à Socrate ou à l'Oracle de Delphes. En russe, il souligne le rôle du doute dans la croissance intellectuelle
      et spirituelle.
    de: Eine Umschreibung des antiken griechischen Sprichworts 'Erkenne dich selbst' (Γνῶθι σεαυτόν),
      das oft Sokrates oder dem delphischen Orakel zugeschrieben wird. Im Russischen betont es die Rolle
      des Zweifels für intellektuelles und spirituelles Wachstum.
    it: Una parafrasi dell'antico proverbio greco 'Conosci te stesso' (Γνῶθι σεαυτόν), spesso attribuito
      a Socrate o all'Oracolo di Delfi. In russo sottolinea il ruolo del dubbio nella crescita intellettuale
      e spirituale.
    pt: Uma paráfrase do antigo provérbio grego 'Conhece-te a ti mesmo' (Γνῶθι σεαυτόν), frequentemente
      atribuído a Sócrates ou ao Oráculo de Delfos. Em russo, enfatiza o papel da dúvida no crescimento
      intelectual e espiritual.
    ru: Парафраз древнегреческого изречения 'Познай самого себя' (Γνῶθι σεαυτόν), часто приписываемого
      Сократу или Дельфийскому оракулу. В русском языке подчеркивается роль сомнения в интеллектуальном
      и духовном развитии.
    ja: 古代ギリシャの格言「汝自身を知れ」（Γνῶθι σεαυτόν）の言い換えで、しばしばソクラテスやデルフォイの神託に帰せられる。ロシア語では、知的・精神的成長における疑いの役割を強調する。
    zh: 对古希腊谚语“认识你自己”（Γνῶθι σεαυτόν）的意译，常被归于苏格拉底或德尔菲神谕。在俄语中，它强调怀疑在智识与精神成长中的作用。
    ar: إعادة صياغة للمثل اليوناني القديم 'اعرف نفسك' (Γνῶθι σεαυτόν)، الذي يُنسب غالبًا إلى سقراط أو
      وحي دلفاي. في الروسية، تؤكد على دور الشك في النمو الفكري والروحي.
    he: פרפרזה על פתגם יווני עתיק 'דע את עצמך' (Γνῶθι σεαυτόν), המיוחס לעיתים לסוקרטס או לאורקל מדלפי.
      ברוסית היא מדגישה את תפקידו של הספק בצמיחה אינטלקטואלית ורוחנית.
