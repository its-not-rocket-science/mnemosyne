  - К вам пришли гости
  - К вам пришли люди
  short_explanation: A phrase often used in Russian to announce visitors, popularized by a Soviet-era
    joke and later by a famous sketch featuring comedian Mikhail Zadornov, symbolizing unexpected or intrusive
    guests.
  i18n_explanations:
    en: A phrase often used in Russian to announce visitors, popularized by a Soviet-era joke and later
      by a famous sketch featuring comedian Mikhail Zadornov, symbolizing unexpected or intrusive guests.
    es: Frase rusa usada para anunciar visitas, popularizada por un chiste de la era soviética y luego
      por un famoso sketch del comediante Mikhail Zadornov, simbolizando invitados inesperados o intrusivos.
    fr: Expression russe utilisée pour annoncer des visiteurs, popularisée par une blague de l'ère soviétique
      puis par un sketch célèbre de l'humoriste Mikhail Zadornov, symbolisant des invités inattendus ou
      intrusifs.
    de: Ein russischer Ausdruck, der verwendet wird, um Besucher anzukündigen, populär gemacht durch einen
      Sowjet-Witz und später durch einen berühmten Sketch mit dem Komiker Mikhail Zadornov, der unerwartete
      oder aufdringliche Gäste symbolisiert.
    it: Frase russa usata per annunciare visite, resa popolare da una barzelletta dell'era sovietica e
      poi da uno sketch famoso dell'attore Mikhail Zadornov, che simboleggia ospiti inattesi o invadenti.
    pt: Expressão russa usada para anunciar visitas, popularizada por uma piada da era soviética e depois
      por um famoso esboço do comediante Mikhail Zadornov, simbolizando hóspedes inesperados ou intrusivos.
    ru: Распространённая русская фраза для объявления о визитёрах, популяризованная советским анекдотом
      и позже скетчем с Михаилом Задорновым, символизирующая нежданных или назойливых гостей.
    ja: ロシアで訪問者を知らせる際に使われるフレーズで、ソ連時代のジョークやコメディアンミハイル・ザドールノフの有名なスケッチによって広まり、予期せぬまたは押しの強い客を象徴する。
    zh: 俄罗斯人用来通报访客的常用语，因苏联时代的笑话及喜剧演员米哈伊尔·扎多尔诺夫的著名小品而流行，象征不速之客或打扰他人的来访。
    ar: عبارة روسية تُستخدم لإعلان وصول الزوار، اشتهرت من خلال نكتة سوفيتية ومن ثم من خلال مشهد كوميدي
