- id: ru_classical_or_scriptural_allusion_платон_друг_но_истина_дороже_56c83ad0
  language: ru
  canonical_reference: Платон — друг, но истина дороже
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Платон — друг, но истина дороже
  - Платон — друг, но правда дороже
  - Истина дороже дружбы
  - Платон — друг, но истина важнее
  short_explanation: A paraphrase of Plato's idea that truth is more valuable than friendship or personal
    loyalty. In Russian culture, it is used to justify prioritizing objective facts over personal relationships.
  i18n_explanations:
    en: A paraphrase of Plato's idea that truth is more valuable than friendship or personal loyalty.
      In Russian culture, it is used to justify prioritizing objective facts over personal relationships.
    es: Una paráfrasis de la idea de Platón de que la verdad es más valiosa que la amistad o la lealtad
      personal. En la cultura rusa, se usa para justificar la priorización de los hechos objetivos sobre
      las relaciones personales.
    fr: Une paraphrase de l'idée de Platon selon laquelle la vérité est plus précieuse que l'amitié ou
      la loyauté personnelle. Dans la culture russe, elle est utilisée pour justifier la priorité donnée
      aux faits objectifs sur les relations personnelles.
    de: Eine Umschreibung von Platons Idee, dass die Wahrheit wertvoller ist als Freundschaft oder persönliche
      Loyalität. In der russischen Kultur wird sie verwendet, um die Bevorzugung objektiver Fakten gegenüber
      persönlichen Beziehungen zu rechtfertigen.
    it: Una parafrasi dell'idea di Platone secondo cui la verità è più preziosa dell'amicizia o della
      lealtà personale. Nella cultura russa, viene usata per giustificare la priorità dei fatti oggettivi
      sulle relazioni personali.
    pt: Uma paráfrase da ideia de Platão de que a verdade é mais valiosa do que a amizade ou a lealdade
      pessoal. Na cultura russa, é usada para justificar a priorização de fatos objetivos sobre relacionamentos
      pessoais.
    ru: Парафраз идеи Платона о том, что истина дороже дружбы или личной преданности. В русской культуре
      используется для оправдания приоритета объективных фактов над личными отношениями.
    ja: プラトンの考え「真理は友情や個人的忠誠よりも価値がある」の意訳。ロシア文化では、個人的関係よりも客観的事実を優先する正当化として用いられる。
    zh: 柏拉图思想「真理比友谊或个人忠诚更有价值」的意译。在俄罗斯文化中，用于证明优先考虑客观事实而非个人关系的合理性。
    ar: إعادة صياغة لفكرة أفلاطون القائلة بأن الحقيقة أهم من الصداقة أو الولاء الشخصي. في الثقافة الروسية،
      تُستخدم لتبرير إعطاء الأولوية للحقائق الموضوعية على العلاقات الشخصية.
    he: פרפרזה על רעיון אפלטון לפיו האמת יקרה יותר מחברות או נאמנות אישית. בתרבות הרוסית משמשת להצדיק
