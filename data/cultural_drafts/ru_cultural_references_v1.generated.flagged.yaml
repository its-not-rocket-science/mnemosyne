  short_explanation: A humorous phrase referencing the Soviet poet Nikolay Gumilyov, often used to mock
    someone's pretentious or overly poetic speech. It implies that the speaker is trying too hard to sound
    artistic or profound.
  i18n_explanations:
    en: A humorous phrase referencing the Soviet poet Nikolay Gumilyov, often used to mock someone's pretentious
      or overly poetic speech. It implies that the speaker is trying too hard to sound artistic or profound.
    es: Frase humorística que hace referencia al poeta soviético Nikolay Gumilyov, usada para burlarse
      de un discurso pretencioso o excesivamente poético. Implica que el hablante intenta demasiado sonar
      artístico o profundo.
    fr: Expression humoristique faisant référence au poète soviétique Nikolaï Goumilev, utilisée pour
      moquer un discours prétentieux ou trop poétique. Elle suggère que le locuteur force pour paraître
      artistique ou profond.
    de: Ein humorvoller Spruch, der auf den sowjetischen Dichter Nikolai Gumiljow anspielt, oft genutzt,
      um übertrieben poetische oder gespreizte Rede zu verspotten. Er deutet an, dass der Sprecher zu
      sehr versucht, künstlerisch oder tiefgründig zu wirken.
    it: Un'espressione umoristica che fa riferimento al poeta sovietico Nikolaj Gumilëv, usata per deridere
      un discorso pretenzioso o eccessivamente poetico. Implica che il parlante cerchi troppo di sembrare
      artistico o profondo.
    pt: Expressão humorística que faz referência ao poeta soviético Nikolay Gumilyov, usada para zombar
      de um discurso pretensioso ou excessivamente poético. Implica que o falante tenta demais soar artístico
      ou profundo.
    ru: Шутливое выражение, отсылающее к советскому поэту Николаю Гумилёву, часто используется, чтобы
      высмеять чью-то претенциозную или излишне поэтичную речь. Оно подразумевает, что говорящий слишком
      старается казаться артистичным или глубокомысленным.
    ja: ソビエトの詩人ニコライ・グミリョフを皮肉った表現で、気取ったり過度に詩的な話し方を揶揄する際に使われる。話し手が芸術的や深遠に見せようと無理をしていることを暗示する。
    zh: 一句幽默用语，指向苏联诗人尼古拉·古米廖夫，常用于嘲笑某人矫揉造作或过度诗意的言辞。暗示说话者试图过度展现艺术性或深刻。
    ar: عبارة فكاهية تشير إلى الشاعر السوفيتي نيكولاي غوميليوف، تُستخدم للسخرية من كلام متكلف أو مفرط
      في الشعرية. تشير إلى أن المتحدث يحاول جاهدًا الظهور بمظهر فني أو عميق.
    he: ביטוי הומוריסטי המתייחס למשורר הסובייטי ניקולאי גומיליוב, המשמש ללעג לדיבור מתחכם או פיוטי מדי.
