  short_explanation: To solve a problem by using the same method that caused it, often in a negative or
    self-destructive way. Similar to 'fighting fire with fire.'
  i18n_explanations:
    en: To solve a problem by using the same method that caused it, often in a negative or self-destructive
      way. Similar to 'fighting fire with fire.'
    es: Resolver un problema usando el mismo método que lo causó, a menudo de manera negativa o autodestructiva.
      Similar a 'luchar contra el fuego con fuego'.
    fr: Résoudre un problème en utilisant la même méthode qui l'a causé, souvent de manière négative ou
      autodestructrice. Similaire à 'combattre le feu par le feu'.
    de: Ein Problem lösen, indem man dieselbe Methode anwendet, die es verursacht hat, oft auf negative
      oder selbstzerstörerische Weise. Ähnlich wie 'Feuer mit Feuer bekämpfen'.
    it: Risolvere un problema usando lo stesso metodo che lo ha causato, spesso in modo negativo o autodistruttivo.
      Simile a 'combattere il fuoco con il fuoco'.
    pt: Resolver um problema usando o mesmo método que o causou, muitas vezes de forma negativa ou autodestrutiva.
      Semelhante a 'combater fogo com fogo'.
    ru: Решить проблему, используя тот же метод, который её вызвал, часто негативным или саморазрушительным
      способом. Аналогично 'клин клином вышибают'.
    ja: 問題を引き起こした同じ方法を使って解決しようとすること。しばしば否定的または自己破壊的な方法で。'火に油を注ぐ'に似ている。
    zh: 用引发问题的相同方法来解决问题，通常是负面或自我毁灭的方式。类似于‘以毒攻毒’。
    ar: حل مشكلة باستخدام نفس الأسلوب الذي تسبب بها، غالبًا بطريقة سلبية أو مدمرة للذات. يشبه 'مكافحة
      النار بالنار'.
    he: לפתור בעיה באמצעות אותה שיטה שגרמה לה, לעיתים בצורה שלילית או הרסנית. דומה ל'אין כמו אש שמכבה
      אש'.
