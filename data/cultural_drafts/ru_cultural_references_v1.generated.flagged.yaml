- id: ru_literary_reference_были_у_отца_три_сына_три_могучих_богатыря_5bfd5200
  language: ru
  canonical_reference: Были у отца три сына, три могучих богатыря
  reference_type: literary_reference
  surface_patterns:
  - Были у отца три сына, три могучих богатыря
  - У отца были три сына, три могучих богатыря
  - Три сына, три могучих богатыря
  short_explanation: A formulaic opening line from Russian fairy tales, introducing the three heroic sons
    of a father, often used to set the scene for a quest or adventure. Symbolizes the archetypal trio
    of brave warriors.
  i18n_explanations:
    en: A formulaic opening line from Russian fairy tales, introducing the three heroic sons of a father,
      often used to set the scene for a quest or adventure. Symbolizes the archetypal trio of brave warriors.
    es: Fórmula tradicional de los cuentos rusos que presenta a los tres hijos heroicos de un padre, usada
      para ambientar una búsqueda o aventura. Simboliza el trío arquetípico de guerreros valientes.
    fr: Formule d'ouverture traditionnelle des contes russes introduisant les trois fils héroïques d'un
      père, souvent utilisée pour situer une quête ou une aventure. Symbolise le trio archétypal de guerriers
      courageux.
    de: Eine traditionelle Eröffnungszeile russischer Märchen, die die drei heldenhaften Söhne eines Vaters
      vorstellt und oft eine Quest oder ein Abenteuer einleitet. Symbolisiert das archetypische Trio tapferer
      Krieger.
    it: Una formula d'apertura tipica delle fiabe russe che introduce i tre figli eroici di un padre,
      spesso usata per ambientare una ricerca o un'avventura. Simboleggia il trio archetipico di guerrieri
      coraggiosi.
    pt: Fórmula tradicional de contos de fadas russos que apresenta os três filhos heroicos de um pai,
      usada para ambientar uma busca ou aventura. Simboliza o trio arquetípico de guerreiros valentes.
    ru: Традиционная зачинная строка русских сказок, представляющая трёх могучих сыновей отца, часто используемая
      для вступления к путешествию или приключению. Символизирует архетипическую троицу храбрых воинов.
    ja: ロシアのおとぎ話で定型的に用いられる冒頭の一節で、父親の三人の勇敢な息子を紹介し、しばしば冒険や使命を描く際に用いられる。勇敢な戦士の原型的な三人組を象徴する。
    zh: 俄罗斯童话中常见的开场白，介绍父亲的三个英勇儿子，常用于铺垫探险或冒险情节。象征着勇敢战士的原型三人组。
    ar: سطر افتتاح تقليدي في الحكايات الروسية الشعبية، يقدم ثلاثة أبناء أبطال لأب، غالبًا ما يُستخدم لإعداد
      مشهد لمغامرة أو رحلة. يرمز إلى الثالوث النمطي للفرسان الشجعان.
    he: פתיחה טיפוסית בסיפורי העם הרוסיים, המציגה שלושה בנים גיבורים לאביהם, המשמשת לעיתים קרובות לתיאור
      מסע או הרפתקה. מסמלת את הטריו הקלאסי של לוחמים אמיצים.
