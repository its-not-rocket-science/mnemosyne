- id: ru_cultural_reference_давай_убьём_октябрь_21e9f229
  language: ru
  canonical_reference: Давай, убьём Октябрь!
  reference_type: cultural_reference
  surface_patterns:
  - Давай, убьём Октябрь!
  - убьём Октябрь!
  - давай убьём Октябрь
  short_explanation: A phrase associated with the Russian Revolution and the October Revolution of 1917.
    It can be interpreted as a call to 'kill' or end the revolutionary period, often used metaphorically
    to criticize or reject revolutionary ideals.
  i18n_explanations:
    en: A phrase associated with the Russian Revolution and the October Revolution of 1917. It can be
      interpreted as a call to 'kill' or end the revolutionary period, often used metaphorically to criticize
      or reject revolutionary ideals.
    es: Frase asociada con la Revolución Rusa y la Revolución de Octubre de 1917. Puede interpretarse
      como un llamado a 'matar' o terminar con el período revolucionario, usada metafóricamente para criticar
      o rechazar los ideales revolucionarios.
    fr: Une expression associée à la Révolution russe et à la Révolution d'Octobre 1917. Elle peut s'interpréter
      comme un appel à 'tuer' ou mettre fin à la période révolutionnaire, souvent utilisée métaphoriquement
      pour critiquer ou rejeter les idéaux révolutionnaires.
    de: Ein Ausdruck, der mit der Russischen Revolution und der Oktoberrevolution von 1917 verbunden ist.
      Kann als Aufruf verstanden werden, die revolutionäre Phase zu 'beenden' oder zu 'töten', oft metaphorisch
      verwendet, um revolutionäre Ideale zu kritisieren oder abzulehnen.
    it: Un'espressione associata alla Rivoluzione russa e alla Rivoluzione d'Ottobre del 1917. Può essere
      interpretata come un invito a 'uccidere' o porre fine al periodo rivoluzionario, spesso usata metaforicamente
      per criticare o respingere gli ideali rivoluzionari.
    pt: Uma expressão associada à Revolução Russa e à Revolução de Outubro de 1917. Pode ser interpretada
      como um chamado para 'matar' ou pôr fim ao período revolucionário, frequentemente usada metaforicamente
      para criticar ou rejeitar os ideais revolucionários.
    ru: Выражение, связанное с Русской революцией и Октябрьской революцией 1917 года. Может восприниматься
      как призыв 'убить' или положить конец революционному периоду, часто используется метафорически для
      критики или отвержения революционных идеалов.
    ja: ロシア革命と1917年の十月革命に関連するフレーズ。革命期を「終わらせる」または「葬る」という呼びかけと解釈され、しばしば革命の理想を批判または拒否するための比喩として使われます。
    zh: 与俄罗斯革命和1917年十月革命相关的短语。可以理解为号召“终结”或“摧毁”革命时期，常用于隐喻性地批评或拒绝革命理想。
    ar: عبارة مرتبطة بالثورة الروسية والثورة البلشفية في أكتوبر 1917. يمكن تفسيرها على أنها دعوة إلى 'قتل'
      أو إنهاء الفترة الثورية، وغالبًا ما تُستخدم مجازيًا لنقد أو رفض المثل الثورية.
    he: ביטוי הקשור למהפכה הרוסית ולמהפכת אוקטובר 1917. ניתן לפרשו כקריאה ל'הרוג' או לסיים את התקופה המהפכנית,
