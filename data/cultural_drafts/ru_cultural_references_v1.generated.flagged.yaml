- id: ru_literary_reference_за_что_вы_дети_так_любите_бранные_слова_66b08ccc
  language: ru
  canonical_reference: За что вы, дети, так любите бранные слова?
  reference_type: literary_reference
  surface_patterns:
  - За что вы, дети, так любите бранные слова?
  - За что вы, дети, так любите бранные слова
  short_explanation: A line from Pushkin's 'Boris Godunov,' where the Tsar questions the people's love
    for coarse language, reflecting moral and social decay. It critiques societal values and language
    use.
  i18n_explanations:
    en: A line from Pushkin's 'Boris Godunov,' where the Tsar questions the people's love for coarse language,
      reflecting moral and social decay. It critiques societal values and language use.
    es: Un verso de 'Boris Godunov' de Pushkin, donde el zar cuestiona el amor del pueblo por las palabras
      groseras, reflejando la decadencia moral y social. Critica los valores y el uso del lenguaje en
      la sociedad.
    fr: Une réplique de 'Boris Godounov' de Pouchkine, où le tsar s'interroge sur l'amour du peuple pour
      les jurons, reflétant la décadence morale et sociale. Elle critique les valeurs et l'usage du langage
      dans la société.
    de: Eine Zeile aus Puschkins 'Boris Godunow,' in der der Zar die Liebe des Volkes zu groben Worten
      hinterfragt und so den moralischen und sozialen Verfall widerspiegelt. Sie kritisiert gesellschaftliche
      Werte und den Sprachgebrauch.
    it: Un verso di 'Boris Godunov' di Puškin, in cui lo zar mette in dubbio l'amore del popolo per le
      parolacce, riflettendo la decadenza morale e sociale. Critica i valori e l'uso del linguaggio nella
      società.
    pt: Um verso de 'Boris Godunov' de Pushkin, em que o czar questiona o amor do povo por palavrões,
      refletindo a decadência moral e social. Critica os valores e o uso da linguagem na sociedade.
    ru: Строка из 'Бориса Годунова' Пушкина, где царь вопрошает о любви народа к бранным словам, отражая
      моральный и социальный упадок. Критикует общественные ценности и использование языка.
    ja: プーシキンの「ボリス・ゴドゥノフ」の一節で、ツァーリが民衆の粗野な言葉への愛着を問い、道徳的・社会的堕落を反映する。社会の価値観と言葉の使用を批判している。
    zh: 出自普希金《鲍里斯·戈都诺夫》的诗句，沙皇质问民众对粗鄙语言的热爱，反映道德与社会的颓废。批评社会价值观与语言使用。
    ar: سطر من 'بوریس غودونوف' لبوشكين، حيث يتساءل القيصر عن حب الشعب للألفاظ البذيئة، مما يعكس الانحلال
