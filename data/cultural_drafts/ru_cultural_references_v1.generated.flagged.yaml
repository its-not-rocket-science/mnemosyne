- id: ru_literary_reference_вот_я_в_москве_как_в_аквариуме_bdbcb5c1
  language: ru
  canonical_reference: Вот я в Москве, как в аквариуме
  reference_type: literary_reference
  surface_patterns:
  - Вот я в Москве, как в аквариуме
  - Я в Москве, как в аквариуме
  - как в аквариуме в Москве
  short_explanation: A line from a popular Russian song expressing a sense of being trapped or confined
    in Moscow, likening the city to a fishbowl ('аквариум'). It reflects urban alienation and the feeling
    of being observed or restricted.
  i18n_explanations:
    en: A line from a popular Russian song expressing a sense of being trapped or confined in Moscow,
      likening the city to a fishbowl ('аквариум'). It reflects urban alienation and the feeling of being
      observed or restricted.
    es: Verso de una canción rusa popular que expresa la sensación de estar atrapado o limitado en Moscú,
      comparando la ciudad con una pecera ('аквариум'). Refleja la alienación urbana y la sensación de
      ser observado o restringido.
    fr: Un vers d'une chanson russe populaire exprimant un sentiment d'être piégé ou confiné à Moscou,
      comparant la ville à un bocal ('аквариум'). Cela reflète l'aliénation urbaine et le sentiment d'être
      observé ou limité.
    de: Eine Zeile aus einem beliebten russischen Lied, die ein Gefühl von Gefangensein oder Eingeschlossensein
      in Moskau ausdrückt, indem die Stadt mit einem Fischglas ('аквариум') verglichen wird. Es spiegelt
      die Entfremdung in der Stadt und das Gefühl, beobachtet oder eingeschränkt zu sein.
    it: Un verso di una famosa canzone russa che esprime la sensazione di essere intrappolato o limitato
      a Mosca, paragonando la città a un acquario ('аквариум'). Riflette l'alienazione urbana e la sensazione
      di essere osservati o vincolati.
    pt: Um verso de uma canção russa popular que expressa a sensação de estar preso ou limitado em Moscou,
      comparando a cidade a um aquário ('аквариум'). Reflete a alienação urbana e a sensação de ser observado
      ou restrito.
    ru: Строка популярной русской песни, выражающая чувство, что находишься в Москве как в аквариуме —
      в ловушке или в замкнутом пространстве. Отражает отчуждение в городе и ощущение, что за тобой наблюдают
      или ограничивают свободу.
    ja: 人気のロシアの歌の一節で、モスクワにいる自分を水槽の中のように閉じ込められた感覚を表します。都市の疎外感や監視されている、制限されているという気持ちを反映しています。
