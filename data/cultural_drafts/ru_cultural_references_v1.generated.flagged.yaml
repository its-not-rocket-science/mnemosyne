    de: Eine rhetorische Frage, die Hoffnung oder Unsicherheit über Russlands zukünftige Größe oder Wiedergeburt
      ausdrückt. Wird oft in patriotischen oder nostalgischen Kontexten verwendet.
    it: Una domanda retorica che esprime speranza o incertezza sul futuro splendore o rinascita della
