  short_explanation: A phrase attributed to the ancient Greek philosopher Protagoras, meaning 'Man is
    the measure of all things.' It reflects a relativist view of truth and reality.
  i18n_explanations:
    en: A phrase attributed to the ancient Greek philosopher Protagoras, meaning 'Man is the measure of
      all things.' It reflects a relativist view of truth and reality.
    es: Frase atribuida al filósofo griego antiguo Protágoras, que significa 'El hombre es la medida de
      todas las cosas'. Refleja una visión relativista de la verdad y la realidad.
    fr: Une phrase attribuée au philosophe grec ancien Protagoras, signifiant 'L'homme est la mesure de
      toute chose'. Elle reflète une vision relativiste de la vérité et de la réalité.
    de: Ein Zitat des antiken griechischen Philosophen Protagoras, das bedeutet 'Der Mensch ist das Maß
      aller Dinge'. Es spiegelt eine relativistische Sicht von Wahrheit und Wirklichkeit wider.
    it: Una frase attribuita al filosofo greco antico Protagora, che significa 'L'uomo è la misura di
      tutte le cose'. Riflette una visione relativista di verità e realtà.
    pt: Uma frase atribuída ao filósofo grego antigo Protágoras, que significa 'O homem é a medida de
      todas as coisas'. Reflete uma visão relativista da verdade e da realidade.
    ru: Фраза, приписываемая древнегреческому философу Протагору, означающая 'Человек есть мера всех вещей'.
      Отражает релятивистский взгляд на истину и реальность.
    ja: 古代ギリシャの哲学者プロタゴラスに帰せられる言葉で、「人間は万物の尺度である」という意味。真理と現実に対する相対主義的な見方を反映しています。
    zh: 古希腊哲学家普罗泰戈拉提出的名言，意为「人是万物的尺度」。反映了一种相对主义的真理与现实观。
    ar: قولة تنسب إلى الفيلسوف اليوناني القديم بروتاغوراس، وتعني 'الإنسان مقياس كل شيء'. تعكس نظرة نسبية
      للحقيقة والواقع.
    he: ציטוט המיוחס לפילוסוף היווני הקדום פרוטגורס, שפירושו 'האדם הוא מידת כל הדברים'. משקף תפיסה רלטיביסטית
      של אמת ומציאות.
