  - оперетта — лёгкое искусство
  - оперетта — искусство лёгкое и весёлое
  short_explanation: A phrase often attributed to composer Ivan Dunaevsky, reflecting the light and entertaining
    nature of operetta compared to more serious opera. Used to describe something frivolous or unserious.
  i18n_explanations:
    en: A phrase often attributed to composer Ivan Dunaevsky, reflecting the light and entertaining nature
      of operetta compared to more serious opera. Used to describe something frivolous or unserious.
    es: Frase atribuida al compositor Ivan Dunaevsky, que refleja la naturaleza ligera y entretenida de
      la opereta en comparación con la ópera más seria. Se usa para describir algo frívolo o poco serio.
    fr: Expression souvent attribuée au compositeur Ivan Dunaevsky, reflétant le caractère léger et divertissant
      de l'opérette par rapport à l'opéra, plus sérieux. Utilisée pour décrire quelque chose de frivole
      ou peu sérieux.
    de: Ein oft dem Komponisten Ivan Dunaevsky zugeschriebenes Zitat, das die leichte und unterhaltsame
      Natur der Operette im Vergleich zur ernsteren Oper widerspiegelt. Wird verwendet, um etwas Frivoles
      oder Unernstes zu beschreiben.
    it: Frase spesso attribuita al compositore Ivan Dunaevsky, che riflette la natura leggera e divertente
      dell'operetta rispetto all'opera più seria. Usata per descrivere qualcosa di frivolo o poco serio.
    pt: Frase frequentemente atribuída ao compositor Ivan Dunaevsky, que reflete a natureza leve e divertida
      da opereta em comparação com a ópera, mais séria. Usada para descrever algo frívolo ou pouco sério.
    ru: Фраза, часто приписываемая композитору Ивану Дунаевскому, отражающая лёгкий и развлекательный
      характер оперетты в отличие от более серьёзной оперы. Используется для описания чего-то легкомысленного
      или несерьёзного.
    ja: 作曲家イヴァン・ドゥナエフスキーに帰せられることの多い言葉で、オペラに比べてオペレッタの軽快で娯楽的な性質を反映している。軽薄なものや真面目でないものを表す際に用いられる。
    zh: 常被归于作曲家伊万·杜纳耶夫斯基的名下，反映了轻歌剧与正歌剧相比的轻松娱乐特性。用于形容轻浮或不严肃的事物。
    ar: عبارة تُنسب غالبًا إلى الملحن إيفان دونايفسكي، تعكس الطبيعة الخفيفة والترفيهية للأوبريت مقارنة
