- id: en_cultural_reference_a_delacroix_liberty_leading_the_people_d6619601
  language: en
  canonical_reference: A Delacroix Liberty Leading the People
  reference_type: cultural_reference
  surface_patterns:
  - a Delacroix Liberty Leading the People
  - Delacroix's Liberty Leading the People
  - the painting Liberty Leading the People by Delacroix
  - a symbol of revolution like Delacroix's Liberty
  short_explanation: Refers to Eugène Delacroix's 1830 painting 'Liberty Leading the People', an iconic
    image of the French Revolution symbolizing freedom, revolution, and the struggle for democracy. Often
    used to evoke revolutionary ideals or populist movements.
  i18n_explanations:
    en: Refers to Eugène Delacroix's 1830 painting 'Liberty Leading the People', an iconic image of the
      French Revolution symbolizing freedom, revolution, and the struggle for democracy. Often used to
      evoke revolutionary ideals or populist movements.
    es: Se refiere al cuadro de Eugène Delacroix 'La Libertad guiando al pueblo' (1830), imagen icónica
      de la Revolución Francesa que simboliza la libertad, la revolución y la lucha por la democracia.
      Se usa para evocar ideales revolucionarios o movimientos populistas.
    fr: Fait référence au tableau d'Eugène Delacroix 'La Liberté guidant le peuple' (1830), image emblématique
      de la Révolution française symbolisant la liberté, la révolution et la lutte pour la démocratie.
      Souvent utilisé pour évoquer des idéaux révolutionnaires ou des mouvements populistes.
    de: Bezieht sich auf Eugène Delacroix' Gemälde 'Die Freiheit führt das Volk' (1830), ein ikonisches
      Bild der Französischen Revolution, das Freiheit, Revolution und den Kampf für Demokratie symbolisiert.
      Wird oft verwendet, um revolutionäre Ideale oder populistische Bewegungen zu beschwören.
    it: Si riferisce al dipinto di Eugène Delacroix 'La Libertà che guida il popolo' (1830), immagine
      iconica della Rivoluzione francese che simboleggia libertà, rivoluzione e lotta per la democrazia.
      Spesso usato per evocare ideali rivoluzionari o movimenti populisti.
    pt: Refere-se à pintura de Eugène Delacroix 'A Liberdade guiando o povo' (1830), imagem icônica da
      Revolução Francesa que simboliza liberdade, revolução e a luta pela democracia. Usada para evocar
      ideais revolucionários ou movimentos populistas.
    ru: Относится к картине Эжена Делакруа 'Свобода, ведущая народ' (1830), знаковому образу Французской
      революции, символизирующему свободу, революцию и борьбу за демократию. Часто используется для передачи
      революционных идеалов или популистских движений.
    ja: ドラクロワの「民衆を導く自由の女神」（1830年）を指す。フランス革命の象徴的画で、自由、革命、民主主義への闘いを表す。革命的理想や大衆運動を喚起する際に用いられる。
    zh: 指代德拉克洛瓦的《自由引导人民》（1830年），法国大革命的标志性画作，象征自由、革命与争取民主的斗争。常用于引发革命理想或民粹运动。
