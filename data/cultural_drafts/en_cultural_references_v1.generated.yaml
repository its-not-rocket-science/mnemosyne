- id: en_classical_or_scriptural_allusion_tabula_rasa_762bddaa
  language: en
  canonical_reference: Tabula rasa
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - tabula rasa
  - tabula-rasa
  - a tabula rasa
  - tabulae rasae
  short_explanation: Latin for 'blank slate,' referring to the philosophical concept that individuals
    are born without innate knowledge or ideas, and all knowledge comes from experience or perception.
    It originates from Aristotle and was later developed by John Locke.
  i18n_explanations:
    en: Latin for 'blank slate,' referring to the philosophical concept that individuals are born without
      innate knowledge or ideas, and all knowledge comes from experience or perception. It originates
      from Aristotle and was later developed by John Locke.
    es: Latín para 'pizarra en blanco', se refiere al concepto filosófico de que los individuos nacen
      sin conocimiento ni ideas innatas, y todo el conocimiento proviene de la experiencia o la percepción.
      Proviene de Aristóteles y fue desarrollado más tarde por John Locke.
    fr: Latin pour 'table rase', désignant le concept philosophique selon lequel les individus naissent
      sans connaissance ni idées innées, et tout savoir provient de l'expérience ou de la perception.
      Il trouve son origine chez Aristote et fut développé plus tard par John Locke.
    de: Lateinisch für 'unbeschriebenes Blatt', bezeichnet das philosophische Konzept, dass Menschen ohne
      angeborenes Wissen oder Ideen geboren werden und alles Wissen aus Erfahrung oder Wahrnehmung stammt.
      Stammt von Aristoteles und wurde später von John Locke weiterentwickelt.
    it: Latino per 'tavola rasa', si riferisce al concetto filosofico secondo cui gli individui nascono
      senza conoscenze o idee innate e tutto il sapere deriva dall'esperienza o dalla percezione. Deriva
      da Aristotele e fu sviluppato in seguito da John Locke.
    pt: Latim para 'tábula rasa', refere-se ao conceito filosófico de que os indivíduos nascem sem conhecimento
      ou ideias inatas, e todo o conhecimento vem da experiência ou percepção. Origina-se em Aristóteles
      e foi desenvolvido posteriormente por John Locke.
    ru: Латинское выражение 'чистая доска', обозначающее философскую концепцию, согласно которой люди
      рождаются без врождённых знаний или идей, а всё знание приходит из опыта или восприятия. Впервые
      встречается у Аристотеля и позже развито Джоном Локком.
    ja: ラテン語の「タブラ・ラサ（白紙）」を指し、人間は生まれながらに知識や概念を持たず、全ての知識は経験や知覚から得られるという哲学的概念。アリストテレスに由来し、後にジョン・ロックによって発展された。
    zh: 拉丁语“白板”之意，指一种哲学概念：人生来没有先天知识或观念，所有知识均来自经验或感知。源于亚里士多德，后由约翰·洛克发展。
    ar: لاتيني يعني "الصفحة البيضاء"، يشير إلى المفهوم الفلسفي القائل بأن الأفراد يولدون دون معرفة أو
      أفكار فطرية، وأن كل المعرفة تأتي من التجربة أو الإدراك. ينسب إلى أرسطو ثم طوره جون لوك لاحقًا.
    he: לטינית ל'לוח חלק', מתייחסת למושג הפילוסופי לפיו בני אדם נולדים ללא ידע או רעיונות מולדים, וכל
      הידע מגיע מניסיון או תפיסה. מקורו באריסטו ופיתח אותו מאוחר יותר ג'ון לוק.
