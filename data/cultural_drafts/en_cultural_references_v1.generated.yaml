- id: en_classical_or_scriptural_allusion_medea_s_vengeance_d3a897ca
  language: en
  canonical_reference: Medea's vengeance
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Medea's vengeance
  - Medea's revenge
  - Medea's wrath
  - the vengeance of Medea
  - Medea's fury
  short_explanation: Refers to the extreme and often destructive vengeance taken by Medea in Greek mythology,
    who killed her own children to punish her unfaithful husband Jason. Symbolizes the depths of betrayal
    and the extremes of retributive justice.
  i18n_explanations:
    en: Refers to the extreme and often destructive vengeance taken by Medea in Greek mythology, who killed
      her own children to punish her unfaithful husband Jason. Symbolizes the depths of betrayal and the
      extremes of retributive justice.
    es: Se refiere a la venganza extrema y a menudo destructiva de Medea en la mitología griega, quien
      mató a sus propios hijos para castigar a su esposo infiel Jasón. Simboliza la profundidad de la
      traición y los extremos de la justicia retributiva.
    fr: Fait référence à la vengeance extrême et souvent destructrice de Médée dans la mythologie grecque,
      qui tua ses propres enfants pour punir son mari infidèle Jason. Symbolise l'extrême de la trahison
      et les limites de la justice rétributive.
    de: Bezieht sich auf die extreme und oft zerstörerische Rache der Medea aus der griechischen Mythologie,
      die ihre eigenen Kinder tötete, um ihren untreuen Ehemann Jason zu bestrafen. Symbolisiert die Tiefe
      des Verrats und die Extreme der vergeltenden Gerechtigkeit.
    it: Si riferisce alla vendetta estrema e spesso distruttiva di Medea nella mitologia greca, che uccise
      i suoi stessi figli per punire il marito infedele Giasone. Simboleggia la profondità del tradimento
      e gli estremi della giustizia retributiva.
    pt: Refere-se à vingança extrema e muitas vezes destrutiva de Medéia na mitologia grega, que matou
      seus próprios filhos para punir o marido infiel Jasão. Simboliza a profundidade da traição e os
      extremos da justiça retributiva.
    ru: Олицетворяет крайнее и часто разрушительное мщение Медеи из греческой мифологии, которая убила
      своих детей, чтобы наказать неверного мужа Ясона. Символизирует глубину предательства и крайности
      возмездия.
    ja: ギリシャ神話のメデイアが、裏切った夫イアソンへの復讐に自らの子供を殺した極端でしばしば破壊的な復讐を指す。裏切りの深さと報復の極限を象徴する。
    zh: 指希腊神话中美狄亚为报复不忠的丈夫伊阿宋而杀害自己孩子的极端且常具毁灭性的复仇。象征背叛的深度与报复正义的极致。
    ar: يشير إلى الانتقام الشديد والمدمّر الذي اتخذته ميديا في الميثولوجيا اليونانية، فقتلت أطفالها عقابًا
      لزوجها خايسون الغادر. يرمز إلى عمق الخيانة وأقصى حدود العدالة الانتقامية.
    he: מתייחס לנקמתה הקיצונית והרסנית של מדיאה במיתולוגיה היוונית, שהרגה את ילדיה שלה כדי לנקום בבעלה
      הבוגד יאסון. מסמל את עומק הבגידה ואת הקיצוניות של צדק תגמולי.
