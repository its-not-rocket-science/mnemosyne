- id: en_proverb_tradition_domesday_book_dab087cb
  language: en
  canonical_reference: Domesday Book
  reference_type: proverb_tradition
  surface_patterns:
  - Domesday Book
  - the Domesday Book
  - Domesday
  short_explanation: A record of a survey of England ordered by William the Conqueror in 1086, often used
    as a symbol of comprehensive or final judgment. The name 'Domesday' implies no appeal from its decisions.
  i18n_explanations:
    en: A record of a survey of England ordered by William the Conqueror in 1086, often used as a symbol
      of comprehensive or final judgment. The name 'Domesday' implies no appeal from its decisions.
    es: Registro de un censo de Inglaterra ordenado por Guillermo el Conquistador en 1086, utilizado a
      menudo como símbolo de un juicio exhaustivo o definitivo. El nombre 'Domesday' implica que no hay
      apelación a sus decisiones.
    fr: Registre d'un recensement de l'Angleterre ordonné par Guillaume le Conquérant en 1086, souvent
      utilisé comme symbole d'un jugement complet ou définitif. Le nom 'Domesday' implique qu'il n'y a
      pas d'appel possible contre ses décisions.
    de: Ein Register der von Wilhelm dem Eroberer 1086 angeordneten Volkszählung in England, das oft als
      Symbol für ein umfassendes oder endgültiges Urteil steht. Der Name 'Domesday' ('Tag des Jüngsten
      Gerichts') deutet darauf hin, dass es keine Berufung gegen seine Entscheidungen gibt.
    it: Registro di un censimento dell'Inghilterra ordinato da Guglielmo il Conquistatore nel 1086, spesso
      usato come simbolo di un giudizio completo o definitivo. Il nome 'Domesday' implica che non c'è
      appello alle sue decisioni.
    pt: Registro de um censo da Inglaterra ordenado por Guilherme, o Conquistador, em 1086, frequentemente
      usado como símbolo de um julgamento abrangente ou final. O nome 'Domesday' implica que não há apelação
      de suas decisões.
    ru: Запись переписи Англии, проведенной по приказу Вильгельма Завоевателя в 1086 году, часто используемая
      как символ всеобъемлющего или окончательного решения. Название 'Domesday' ('Судный день') подразумевает,
      что его решения обжалованию не подлежат.
    ja: ウィリアム征服王が1086年に命じたイギリスの土地台帳。包括的な判断の象徴とされる。名前の「Domesday」は、その決定に対して上訴できないことを示す。
    zh: 威廉征服者于1086年下令编纂的英格兰土地调查记录，常被用作全面或最终判断的象征。名称“末日审判书”暗示其决定无法上诉。
    ar: سجل تعداد إنجلترا الذي أمر به ويليام الفاتح عام 1086، يُستخدم غالبًا كرمز للحكم الشامل أو النهائي.
      يشير اسم 'Domesday' إلى عدم وجود استئناف لقراراته.
    he: רישום מפקד האוכלוסין של אנגליה שהוזמן על ידי ויליאם הכובש ב-1086, המשמש לעיתים כסמל לשיפוט מקיף
