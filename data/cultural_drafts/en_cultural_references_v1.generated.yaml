- id: en_cultural_reference_a_rembrandt_self_portrait_008e229d
  language: en
  canonical_reference: A Rembrandt self-portrait
  reference_type: cultural_reference
  surface_patterns:
  - a Rembrandt self-portrait
  - Rembrandt's self-portrait
  - a self-portrait by Rembrandt
  - Rembrandt self-portrait
  short_explanation: Refers to any painting by Rembrandt van Rijn depicting himself, symbolizing introspection,
    artistic mastery, and the human condition. These works are iconic in Western art for their psychological
    depth and technical brilliance.
  i18n_explanations:
    en: Refers to any painting by Rembrandt van Rijn depicting himself, symbolizing introspection, artistic
      mastery, and the human condition. These works are iconic in Western art for their psychological
      depth and technical brilliance.
    es: Se refiere a cualquier autorretrato de Rembrandt van Rijn, que simboliza la introspección, el
      dominio artístico y la condición humana. Estas obras son icónicas en el arte occidental por su profundidad
      psicológica y brillantez técnica.
    fr: Fait référence à tout autoportrait de Rembrandt van Rijn, symbolisant l'introspection, la maîtrise
      artistique et la condition humaine. Ces œuvres sont emblématiques de l'art occidental pour leur
      profondeur psychologique et leur excellence technique.
    de: Bezieht sich auf jedes Selbstporträt von Rembrandt van Rijn, das Selbstreflexion, künstlerische
      Meisterschaft und die menschliche Existenz symbolisiert. Diese Werke sind im westlichen Kunstkanon
      für ihre psychologische Tiefe und technische Brillanz ikonisch.
    it: Si riferisce a qualsiasi autoritratto di Rembrandt van Rijn, che simboleggia l'introspezione,
      la maestria artistica e la condizione umana. Queste opere sono iconiche nell'arte occidentale per
      la loro profondità psicologica e brillantezza tecnica.
    pt: Refere-se a qualquer autorretrato de Rembrandt van Rijn, simbolizando introspecção, maestria artística
      e a condição humana. Essas obras são icônicas na arte ocidental por sua profundidade psicológica
      e brilhantismo técnico.
    ru: Относится к любому автопортрету Рембрандта ван Рейна, символизирующему самоанализ, художественное
      мастерство и человеческое состояние. Эти работы являются знаковыми в западном искусстве благодаря
      своей психологической глубине и техническому совершенству.
    ja: レンブラント・ファン・レインの自画像を指し、内省、芸術的な卓越性、人間の状態を象徴します。これらの作品は、心理的深みと技術的な輝きで西洋美術において象徴的な存在です。
    zh: 指代伦勃朗·凡·莱因的任何自画像作品，象征着内省、艺术造诣与人类境况。这些作品在西方艺术中因其心理深度与技术精湛而成为经典。
    ar: يشير إلى أي لوحة ذاتية للرسم لفنان رمبرانت فان رijn، ترمز إلى التأمل الذاتي، الإتقان الفني، وحالة
      الإنسان. تعتبر هذه الأعمال أيقونية في الفن الغربي لعمقها النفسي وبراعتها الفنية.
    he: מתייחס לכל דיוקן עצמי של רמברנדט ואן ריין, המסמל התבוננות פנימית, שליטה אמנותית ותנאי האדם. יצירות
      אלו הן איקוניות באמנות המערבית בזכות עומק פסיכולוגי ומצוינות טכנית.
