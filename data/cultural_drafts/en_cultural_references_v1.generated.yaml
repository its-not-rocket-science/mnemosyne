    es: Se refiere al retrato de Thomas Gainsborough de 1770 de un joven con un traje de satén azul. Simboliza
      elegancia y el estilo rococó, asociado con la pintura de retratos británica.
    fr: Fait référence au portrait de Thomas Gainsborough de 1770 représentant un jeune homme en costume
      bleu en satin. Symbolise l'élégance et le style rococo, souvent associé à la peinture de portrait
      britannique.
    de: Bezieht sich auf Thomas Gainsboroughs Porträt von 1770 eines jungen Mannes in einem blauen Satinanzug.
      Symbolisiert Eleganz und den Rokoko-Stil, der oft mit der britischen Porträtmalerei verbunden wird.
    it: Si riferisce al ritratto di Thomas Gainsborough del 1770 di un giovane in un abito di raso blu.
