- id: en_literary_reference_miller_s_tragic_flaw_fc42534a
  language: en
  canonical_reference: Miller's tragic flaw
  reference_type: literary_reference
  surface_patterns:
  - Miller's tragic flaw
  - tragic flaw
  - the tragic flaw of [character]
  short_explanation: A critical concept in Arthur Miller's essays and plays (e.g., 'Death of a Salesman,'
    1949), where he argues that modern tragedy stems from societal flaws rather than personal hubris.
    It challenges classical definitions of tragedy.
  i18n_explanations:
    en: A critical concept in Arthur Miller's essays and plays (e.g., 'Death of a Salesman,' 1949), where
      he argues that modern tragedy stems from societal flaws rather than personal hubris. It challenges
      classical definitions of tragedy.
    es: Concepto clave en los ensayos y obras de Arthur Miller (como 'Muerte de un viajante,' 1949), donde
      argumenta que la tragedia moderna surge de fallos sociales, no de la soberbia personal. Cuestiona
      las definiciones clásicas de tragedia.
    fr: Concept central dans les essais et pièces d'Arthur Miller (comme 'Mort d'un commis voyageur,'
      1949), où il affirme que la tragédie moderne provient des défauts de la société plutôt que de l'orgueil
      personnel. Il remet en cause les définitions classiques de la tragédie.
    de: Ein zentrales Konzept in Arthur Millers Essays und Stücken (z. B. 'Tod eines Handlungsreisenden,'
      1949), in dem er argumentiert, dass moderne Tragödien aus gesellschaftlichen Fehlern und nicht aus
      persönlichem Hochmut entstehen. Es stellt klassische Tragödien-Definitionen infrage.
    it: Concetto fondamentale negli scritti e nelle opere di Arthur Miller (come 'Morte di un commesso
      viaggiatore,' 1949), in cui sostiene che la tragedia moderna deriva da difetti sociali piuttosto
      che dall'orgoglio personale. Mette in discussione le definizioni classiche di tragedia.
    pt: Conceito central nos ensaios e peças de Arthur Miller (como 'A Morte do Caixeiro Viajante,' 1949),
      onde ele argumenta que a tragédia moderna surge de falhas sociais, não de orgulho pessoal. Desafia
      as definições clássicas de tragédia.
    ru: Ключевая концепция в эссе и пьесах Артура Миллера (например, 'Смерть коммивояжёра,' 1949), где
      он утверждает, что современная трагедия проистекает из общественных пороков, а не из личной гордыни.
      Бросает вызов классическим определениям трагедии.
    ja: アーサー・ミラーのエッセイや戯曲（例：「セールスマンの死」1949年）における重要な概念で、現代の悲劇は個人の傲慢ではなく社会の欠陥に起因すると主張している。古典的な悲劇の定義に異議を唱える。
    zh: 亚瑟·米勒在其随笔与剧作（如《推销员之死》，1949年）中提出的关键概念，他认为现代悲剧源于社会缺陷而非个人傲慢。这一观点挑战了传统悲剧的定义。
    ar: مفهوم جوهري في مقالات وآثار آرثر ميلر (مثل "موت بائع متجول"، 1949)، حيث يجادل بأن المأساة الحديثة
      تنبع من عيوب اجتماعية بدلاً من الكبرياء الشخصي. يتحدى التعريفات الكلاسيكية للمأساة.
    he: מושג מרכזי במאמריו ובמחזותיו של ארתור מילר (כגון "מותו של סוכן", 1949), בו הוא טוען כי הטרגדיה
      המודרנית נובעת מפגמים חברתיים ולא מגאווה אישית. מאתגר את ההגדרות הקלאסיות של טרגדיה.
