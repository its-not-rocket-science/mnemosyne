  i18n_explanations:
    en: Refers to Leonardo da Vinci's 1495-1498 mural 'The Last Supper,' depicting Jesus' final meal with
      disciples. Symbolizes betrayal, revelation, or a pivotal gathering in modern contexts.
    es: Se refiere al fresco de Leonardo da Vinci 'La Última Cena' (1495-1498), que representa la última
      cena de Jesús con sus discípulos. Simboliza traición, revelación o un encuentro decisivo en contextos
      modernos.
    fr: Fait référence à la fresque de Léonard de Vinci 'La Cène' (1495-1498), représentant le dernier
      repas de Jésus avec ses disciples. Symbolise la trahison, la révélation ou une réunion décisive
      dans des contextes modernes.
    de: Bezieht sich auf das Wandgemälde von Leonardo da Vinci 'Das Abendmahl' (1495-1498), das das letzte
      Abendmahl Jesu mit seinen Jüngern zeigt. Symbolisiert Verrat, Enthüllung oder ein entscheidendes
      Treffen in modernen Kontexten.
    it: Si riferisce al dipinto murale di Leonardo da Vinci 'L'Ultima Cena' (1495-1498), che rappresenta
      l'ultima cena di Gesù con i discepoli. Simboleggia tradimento, rivelazione o un incontro cruciale
      in contesti moderni.
    pt: Refere-se ao afresco de Leonardo da Vinci 'A Última Ceia' (1495-1498), que retrata a última refeição
      de Jesus com seus discípulos. Simboliza traição, revelação ou um encontro decisivo em contextos
      modernos.
    ru: Относится к фреске Леонардо да Винчи 'Тайная вечеря' (1495-1498), изображающей последнюю трапезу
      Иисуса с учениками. Символизирует предательство, откровение или важное собрание в современных контекстах.
    ja: レオナルド・ダ・ヴィンチの壁画「最後の晩餐」（1495-1498年）を指し、イエスと弟子たちの最後の食事を描いています。現代の文脈で裏切り、啓示、あるいは決定的な集まりを象徴します。
    zh: 指代列奥纳多·达·芬奇的壁画《最后的晚餐》（1495-1498年），描绘耶稣与门徒的最后晚餐。象征背叛、启示或现代语境中的关键聚会。
