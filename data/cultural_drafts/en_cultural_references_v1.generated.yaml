    it: Questo proverbio suggerisce che l'indecisione o il ritardo possono portare alla perdita di opportunità
      o al fallimento. Incoraggia l'azione decisa per evitare conseguenze negative.
    pt: Este provérbio sugere que a indecisão ou o atraso podem levar à perda de oportunidades ou ao fracasso.
