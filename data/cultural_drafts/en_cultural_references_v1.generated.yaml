- id: en_literary_reference_we_are_all_worms_but_i_believe_that_i_am_a_glow_worm_ca5a51f1
  language: en
  canonical_reference: We are all worms, but I believe that I am a glow-worm
  reference_type: literary_reference
  surface_patterns:
  - We are all worms, but I believe that I am a glow-worm
  - We are all worms, but I am a glow-worm
  - We are all worms, but I believe I am a glow-worm
  short_explanation: This line reflects a modest yet self-assured attitude, suggesting that while all
    humans are inherently flawed or insignificant (worms), the speaker distinguishes themselves as something
    more luminous or exceptional (a glow-worm). It conveys a blend of humility and quiet pride.
  i18n_explanations:
    en: This line reflects a modest yet self-assured attitude, suggesting that while all humans are inherently
      flawed or insignificant (worms), the speaker distinguishes themselves as something more luminous
      or exceptional (a glow-worm). It conveys a blend of humility and quiet pride.
    es: Esta frase refleja una actitud modesta pero segura, sugiriendo que, aunque todos los humanos son
      inherentemente imperfectos o insignificantes (gusanos), el hablante se distingue como algo más luminoso
      o excepcional (una luciérnaga). Transmite una mezcla de humildad y orgullo discreto.
    fr: Cette phrase reflète une attitude modeste mais assurée, suggérant que, bien que tous les humains
      soient fondamentalement imparfaits ou insignifiants (vers), le locuteur se distingue comme quelque
      chose de plus lumineux ou exceptionnel (une luciole). Elle exprime un mélange d'humilité et de fierté
      discrète.
    de: Dieser Satz spiegelt eine bescheidene, aber selbstbewusste Haltung wider und deutet an, dass der
      Sprecher sich trotz der allgemeinen menschlichen Unzulänglichkeit (Würmer) als etwas Strahlenderes
      oder Besonderes (Glühwürmchen) betrachtet. Er vermittelt eine Mischung aus Demut und stillem Stolz.
    it: Questa frase riflette un atteggiamento modesto ma sicuro, suggerendo che, sebbene tutti gli esseri
      umani siano fondamentalmente imperfetti o insignificanti (vermi), il parlante si distingue come
      qualcosa di più luminoso o eccezionale (una lucciola). Trasmette una combinazione di umiltà e orgoglio
      discreto.
    pt: Esta frase reflete uma atitude modesta, mas confiante, sugerindo que, embora todos os seres humanos
      sejam inerentemente imperfeitos ou insignificantes (vermes), o falante se distingue como algo mais
      luminoso ou excepcional (uma vaga-lume). Transmite uma mistura de humildade e orgulho discreto.
    ru: Эта фраза отражает скромное, но уверенное отношение, подразумевая, что, хотя все люди изначально
      несовершенны или незначительны (черви), говорящий выделяет себя как нечто более светлое или исключительное
      (светлячок). Передаёт сочетание смирения и тихой гордости.
    ja: この言葉は、人間は皆、本質的に欠陥があり無価値な存在（虫）だが、話し手はより輝かしい特別な存在（蛍）だと信じているという、謙虚さと自信を込めた態度を表しています。
    zh: 这句话反映了一种谦逊而自信的态度，暗示虽然所有人本质上都有缺陷或微不足道（虫子），但说话者认为自己是更光亮或非凡的存在（萤火虫）。传达了谦卑与内敛自豪的结合。
    ar: تعكس هذه العبارة موقفًا متواضعًا لكنه واثق، حيث تشير إلى أن البشر جميعًا غير كاملين أو تافهين
      (دودة)، لكن المتحدث يميز نفسه بكونه أكثر لمعانًا أو استثنائية (دودة متوهجة). إنها تجمع بين التواضع
      والفخر الهادئ.
    he: משפט זה משקף עמדה צנועה אך בטוחה, ומרמז שכל בני האדם הם חסרי ערך או פגומים מטבעם (תולעים), אך
      הדובר מבדיל את עצמו כמשהו זוהר או יוצא דופן (גחלילית). הוא מעביר שילוב של ענווה וגאווה שקטה.
