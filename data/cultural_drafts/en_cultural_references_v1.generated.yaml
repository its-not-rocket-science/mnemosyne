- id: en_cultural_reference_a_gilbert_and_sullivan_patter_song_2bcaf6a9
  language: en
  canonical_reference: A Gilbert and Sullivan patter song
  reference_type: cultural_reference
  surface_patterns:
  - a Gilbert and Sullivan patter song
  - Gilbert and Sullivan patter song
  - a patter song by Gilbert and Sullivan
  - Gilbert and Sullivan's patter song
  short_explanation: A fast, humorous song with rapid lyrics, characteristic of the comic operas by W.S.
    Gilbert (librettist) and Arthur Sullivan (composer). Patter songs are known for their tongue-twisting,
    alliterative, and often absurd lyrics.
  i18n_explanations:
    en: A fast, humorous song with rapid lyrics, characteristic of the comic operas by W.S. Gilbert (librettist)
      and Arthur Sullivan (composer). Patter songs are known for their tongue-twisting, alliterative,
      and often absurd lyrics.
    es: Canción rápida y humorística con letras aceleradas, típica de las óperas cómicas de W.S. Gilbert
      (libretista) y Arthur Sullivan (compositor). Las canciones de este estilo destacan por sus letras
      trabadas, aliteraciones y a menudo absurdas.
    fr: Chanson rapide et humoristique aux paroles rapides, caractéristique des opéras comiques de W.S.
      Gilbert (librettiste) et Arthur Sullivan (compositeur). Les chansons de ce style sont connues pour
      leurs paroles difficiles à articuler, allitérations et souvent absurdes.
    de: Ein schnelles, humorvolles Lied mit schnellen Texten, typisch für die komischen Opern von W.S.
      Gilbert (Librettist) und Arthur Sullivan (Komponist). Solche Lieder sind für ihre zungenbrecherischen,
      alliterativen und oft absurden Texte bekannt.
    it: Una canzone veloce e umoristica con testi rapidi, tipica delle opere comiche di W.S. Gilbert (librettista)
      e Arthur Sullivan (compositore). Questi brani sono noti per i loro testi intricati, allitterazioni
      e spesso assurdi.
    pt: Uma canção rápida e humorística com letras aceleradas, característica das óperas cômicas de W.S.
      Gilbert (libretista) e Arthur Sullivan (compositor). Essas canções são conhecidas por seus textos
      difíceis de pronunciar, aliterações e muitas vezes absurdos.
    ru: Быстрая юмористическая песня с быстрым текстом, характерная для комических опер У.С. Гилберта
      (либреттист) и Артура Салливана (композитор). Такие песни славятся труднопроизносимыми, аллитерированными
      и часто абсурдными текстами.
    ja: W.S. ギルバート（作詞）とアーサー・サリヴァン（作曲）による喜劇オペラに特徴的な、早口でユーモアに富んだ歌。舌をかみそうな早口言葉、頭韻、そしてしばしば不条理な歌詞が特徴。
    zh: 一种快速、幽默的歌曲，以快速歌词为特点，是 W.S. Gilbert（剧作家）和 Arthur Sullivan（作曲家）喜歌剧的典型风格。这种歌曲以拗口、头韵和常常荒诞的歌词而闻名。
    ar: أغنية سريعة ومضحكة ذات كلمات سريعة، تميز الأوبرات الكوميدية للكاتب المسرحي دبليو إس جيلبرت والملحن
      آرثر سوليفان. تشتهر هذه الأغاني بكلماتها المتداخلة وصعوبتها في النطق، والتكرار الصوتي، وغالبًا ما
      تكون كلماتها سخيفة.
    he: שיר מהיר והומוריסטי עם מילים מהירות, המאפיין את האופרטות הקומיות של ו.ס. גילברט (לברית) וארתור
