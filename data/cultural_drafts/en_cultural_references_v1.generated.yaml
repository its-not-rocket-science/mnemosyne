    reflection on the inevitability of death, often used in art and literature to remind individuals of
    their mortality.'
  i18n_explanations:
    en: '''Memento mori'' is a Latin phrase meaning ''remember you must die.'' It is a philosophical reflection
      on the inevitability of death, often used in art and literature to remind individuals of their mortality.'
    es: '''Memento mori'' es una frase latina que significa ''recuerda que debes morir''. Es una reflexión
      filosófica sobre la inevitabilidad de la muerte, frecuentemente usada en arte y literatura para
      recordar a las personas su mortalidad.'
    fr: '''Memento mori'' est une expression latine signifiant ''Souviens-toi que tu vas mourir''. C''est
      une réflexion philosophique sur l''inévitabilité de la mort, souvent utilisée dans l''art et la
      littérature pour rappeler aux individus leur mortalité.'
    de: '''Memento mori'' ist ein lateinischer Ausdruck mit der Bedeutung ''Bedenke, dass du sterben musst''.
      Es ist eine philosophische Reflexion über die Unvermeidlichkeit des Todes, die oft in Kunst und
      Literatur verwendet wird, um den Menschen ihre Sterblichkeit vor Augen zu führen.'
    it: '''Memento mori'' è un''espressione latina che significa ''ricordati che devi morire''. È una
      riflessione filosofica sull''inevitabilità della morte, spesso usata nell''arte e nella letteratura
      per ricordare agli individui la loro mortalità.'
    pt: '''Memento mori'' é uma expressão latina que significa ''lembre-se de que você deve morrer''.
      É uma reflexão filosófica sobre a inevitabilidade da morte, frequentemente usada na arte e na literatura
      para lembrar os indivíduos de sua mortalidade.'
    ru: '''Memento mori'' — латинское выражение, означающее ''помни о смерти''. Это философское размышление
      о неизбежности смерти, часто используемое в искусстве и литературе для напоминания о человеческой
      смертности.'
    ja: '''メメント・モリ''はラテン語で「死を忘れるな」という意味です。これは死の不可避性についての哲学的省察であり、芸術や文学において個人の死を思い起こさせるためにしばしば用いられます。'
    zh: ‘Memento mori’是一句拉丁语，意为‘记住你终将死去’。这是对死亡必然性的哲学思考，常用于艺术和文学中提醒人们关注自身的有限性。
    ar: '''ممنتو موري'' عبارة لاتينية تعني ''تذكر أنك ستموت''. إنها تأمل فلسفي في حتمية الموت، تُستخدم
