    es: Un cuento de hadas inglés clásico sobre un niño que cambia una vaca por habichuelas mágicas, hace
      crecer una enorme planta de judías y sube a un mundo de gigantes, regresando con un arpa de oro
      y un ganso que pone huevos de oro.
    fr: Un conte de fées anglais classique sur un garçon qui échange une vache contre des haricots magiques,
