- id: en_classical_or_scriptural_allusion_armor_of_achilles_8145d918
  language: en
  canonical_reference: armor of Achilles
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - armor of Achilles
  - Achilles' armor
  - the armor of Achilles
  - shield of Achilles
  short_explanation: A symbol of invincibility and divine craftsmanship. In Greek mythology, Achilles'
    armor, forged by Hephaestus, is legendary and plays a key role in the Iliad, particularly in the armor's
    description and its role in the death of Patroclus.
  i18n_explanations:
    en: A symbol of invincibility and divine craftsmanship. In Greek mythology, Achilles' armor, forged
      by Hephaestus, is legendary and plays a key role in the Iliad, particularly in the armor's description
      and its role in the death of Patroclus.
    es: Un símbolo de invencibilidad y artesanía divina. En la mitología griega, la armadura de Aquiles,
      forjada por Hefesto, es legendaria y desempeña un papel clave en la Ilíada, especialmente en la
      descripción de la armadura y su papel en la muerte de Patroclo.
    fr: Un symbole d'invincibilité et de savoir-faire divin. Dans la mythologie grecque, l'armure d'Achille,
      forgée par Héphaïstos, est légendaire et joue un rôle clé dans l'Iliade, notamment dans la description
      de l'armure et son rôle dans la mort de Patrocle.
    de: Ein Symbol für Unbesiegbarkeit und göttliche Handwerkskunst. In der griechischen Mythologie ist
      Achills Rüstung, geschmiedet von Hephaistos, legendär und spielt eine zentrale Rolle in der Ilias,
      besonders in der Beschreibung der Rüstung und ihrem Einfluss auf den Tod des Patroklos.
    it: Un simbolo di invincibilità e di maestria divina. Nella mitologia greca, l'armatura di Achille,
      forgiata da Efesto, è leggendaria e gioca un ruolo chiave nell'Iliade, in particolare nella descrizione
      dell'armatura e nel suo ruolo nella morte di Patroclo.
    pt: Um símbolo de invencibilidade e artesanato divino. Na mitologia grega, a armadura de Aquiles,
      forjada por Hefesto, é lendária e desempenha um papel fundamental na Ilíada, especialmente na descrição
      da armadura e seu papel na morte de Pátroclo.
    ru: Символ непобедимости и божественного мастерства. В греческой мифологии доспехи Ахилла, выкованные
      Гефестом, легендарны и играют ключевую роль в 'Илиаде', особенно в описании доспехов и их роли в
      смерти Патрокла.
    ja: 不敗の象徴であり、神の技に例えられる。ギリシャ神話では、ヘパイストスによって鍛えられたアキレウスの甲冑は伝説的で、特にその記述とパトロクロスの死における役割において、『イリアス』で重要な位置を占める。
    zh: 象征着无敌与神工的典范。在希腊神话中，由赫菲斯托斯锻造的阿喀琉斯的盔甲举世闻名，在《伊利亚特》中扮演关键角色，尤其是对盔甲的描述及其在帕特洛克罗斯之死中的作用。
    ar: رمز للخلود والحرفية الإلهية. في الميثولوجيا اليونانية، درع أخيل، الذي صنعه هيفيستوس، أسطوري ويلعب
      دورًا رئيسيًا في الإلياذة، خاصة في وصف الدرع ودوره في موت باتروكلوس.
    he: סמל לחוסן בלתי מנוצח ולתחכום אלוהי. במיתולוגיה היוונית, שריונו של אכילס, שנ forged על ידי הפייסטוס,
      הוא אגדי וממלא תפקיד מרכזי ב'איליאדה', בעיקר בתיאור השריון ובתפקידו במותו של פאטרוקלוס.
