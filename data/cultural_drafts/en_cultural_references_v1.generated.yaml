- id: en_cultural_reference_bonnie_prince_charlie_419a2ec6
  language: en
  canonical_reference: Bonnie Prince Charlie
  reference_type: cultural_reference
  surface_patterns:
  - Bonnie Prince Charlie
  - the Young Pretender
  - Charles Edward Stuart
  - Bonnie Prince
  short_explanation: Refers to Charles Edward Stuart (1720–1788), a Jacobite claimant to the British throne.
    His romanticized rebellion in 1745 is a key episode in Scottish and British history, symbolizing lost
    causes and Highland culture.
  i18n_explanations:
    en: Refers to Charles Edward Stuart (1720–1788), a Jacobite claimant to the British throne. His romanticized
      rebellion in 1745 is a key episode in Scottish and British history, symbolizing lost causes and
      Highland culture.
    es: Se refiere a Carlos Eduardo Estuardo (1720–1788), pretendiente jacobita al trono británico. Su
      rebelión romántica de 1745 es un episodio clave en la historia escocesa y británica, simbolizando
      causas perdidas y la cultura de las Highlands.
    fr: Fait référence à Charles Édouard Stuart (1720–1788), prétendant jacobite au trône britannique.
      Sa rébellion romantisée de 1745 est un épisode clé de l'histoire écossaise et britannique, symbolisant
      les causes perdues et la culture des Highlands.
    de: Bezieht sich auf Charles Edward Stuart (1720–1788), einen jakobitischen Thronanwärter in Großbritannien.
      Sein romantisierter Aufstand von 1745 ist ein zentrales Ereignis der schottischen und britischen
      Geschichte und steht für verlorene Kämpfe und die Hochlandkultur.
    it: Si riferisce a Carlo Edoardo Stuart (1720–1788), pretendente giacobita al trono britannico. La
      sua ribellione romantizzata del 1745 è un episodio chiave nella storia scozzese e britannica, simbolo
      di cause perdute e cultura delle Highlands.
    pt: Refere-se a Carlos Eduardo Stuart (1720–1788), pretendente jacobita ao trono britânico. Sua rebelião
      romantizada de 1745 é um episódio-chave na história escocesa e britânica, simbolizando causas perdidas
      e a cultura das Terras Altas.
    ru: Относится к Карлу Эдуарду Стюарту (1720–1788), претенденту на британский престол от якобитов.
      Его романтизированное восстание 1745 года — ключевой эпизод в шотландской и британской истории,
      символизирующий проигранные дела и культуру Хайленда.
    ja: イギリス王位を主張したジャコバイトのチャールズ・エドワード・ステュアート（1720–1788）を指す。1745年の彼のロマンチックに描かれた反乱は、スコットランドとイギリスの歴史における重要な出来事であり、失われた大義とハイランド文化の象徴である。
    zh: 指的是詹姆斯党王位觊觎者查尔斯·爱德华·斯图亚特（1720–1788）。他1745年浪漫化的叛乱是苏格兰和英国历史上的关键事件，象征着失败的事业与高地文化。
    ar: يشير إلى تشارلز إدوارد ستيوارت (1720–1788)، المدعي اليعقوبي للعرش البريطاني. تمردُه الرومانسي
      عام 1745 هو حدث رئيسي في التاريخ الإسكتلندي والبريطاني، ويرمز إلى القضايا المفقودة وثقافة المرتفعات.
    he: מתייחס לנסיך צ'ארלס אדוארד סטיוארט (1720–1788), הטוען היעקוביטי לכס המלכות הבריטי. המרד הרומנטי
      שלו ב-1745 הוא פרק מרכזי בהיסטוריה הסקוטית והבריטית, המסמל מאבקים אבודים ותרבות ההיילנדס.
