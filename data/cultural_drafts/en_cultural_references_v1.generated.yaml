- id: en_cultural_reference_the_peterloo_massacre_05dfc3ae
  language: en
  canonical_reference: The Peterloo Massacre
  reference_type: cultural_reference
  surface_patterns:
  - the Peterloo Massacre
  - Peterloo
  short_explanation: A violent 1819 crackdown on a peaceful pro-democracy rally in Manchester, England,
    where cavalry charged into a crowd, killing 15 and injuring hundreds. It became a symbol of working-class
    oppression and reform.
  i18n_explanations:
    en: A violent 1819 crackdown on a peaceful pro-democracy rally in Manchester, England, where cavalry
      charged into a crowd, killing 15 and injuring hundreds. It became a symbol of working-class oppression
      and reform.
    es: Una represión violenta en 1819 contra una manifestación pacífica por la democracia en Mánchester,
      Inglaterra, donde la caballería cargó contra la multitud, matando a 15 e hiriendo a cientos. Símbolo
      de la opresión obrera y la reforma.
    fr: Une répression violente en 1819 contre un rassemblement pacifique pour la démocratie à Manchester,
      en Angleterre, où la cavalerie chargea la foule, tuant 15 personnes et en blessant des centaines.
      Symbole de l'oppression de la classe ouvrière et de la réforme.
    de: Ein gewaltsames Vorgehen 1819 gegen eine friedliche Demokratie-Demonstration in Manchester, England,
      bei dem die Kavallerie in die Menge stürmte, 15 tötete und Hunderte verletzte. Symbol für Unterdrückung
      der Arbeiterklasse und Reformen.
    it: Una repressione violenta nel 1819 contro una pacifica manifestazione per la democrazia a Manchester,
      in Inghilterra, dove la cavalleria caricò la folla, uccidendo 15 persone e ferendone centinaia.
      Simbolo dell'oppressione della classe operaia e della riforma.
    pt: Uma repressão violenta em 1819 contra um protesto pacífico pró-democracia em Manchester, Inglaterra,
      onde a cavalaria atacou a multidão, matando 15 e ferindo centenas. Tornou-se símbolo da opressão
      da classe trabalhadora e da reforma.
    ru: Жестокое подавление мирного митинга за демократию в Манчестере (Англия) в 1819 году, когда кавалерия
      атаковала толпу, убив 15 и ранив сотни. Символ угнетения рабочего класса и реформ.
    ja: 1819年にイギリスのマンチェスターで行われた平和的な民主化デモに対する暴力的弾圧。騎兵隊が群衆に突撃し、15人死亡、数百人負傷。労働者階級の抑圧と改革の象徴となった。
    zh: 1819年英国曼彻斯特和平民主集会遭暴力镇压，骑兵冲入人群致15人死亡、数百人受伤。成为工人阶级压迫与改革的象征。
    ar: قمع عنيف عام 1819 لمظاهرة سلمية مؤيدة للديمقراطية في مانشستر بإنجلترا، حيث هاجمت القوات المسلحة
      الحشود وقتلت 15 وأصابت مئات. أصبح رمزاً لقمع الطبقة العاملة والإصلاح.
    he: דיכוי אלים בשנת 1819 של הפגנה דמוקרטית שלוויה במנצ'סטר, אנגליה, בה הסתערה פרשים על הקהל, הרגו
      15 ופצעו מאות. הפך לסמל לדיכוי מעמד הפועלים ולרפורמה.
