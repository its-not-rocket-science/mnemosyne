  short_explanation: Refers to Nicolas Poussin’s 1637-38 painting 'Et in Arcadia ego,' depicting shepherds
    discovering a tomb inscribed with the phrase, symbolizing the inevitability of death even in idyllic
    paradise.
  i18n_explanations:
    en: Refers to Nicolas Poussin’s 1637-38 painting 'Et in Arcadia ego,' depicting shepherds discovering
      a tomb inscribed with the phrase, symbolizing the inevitability of death even in idyllic paradise.
    es: Se refiere al cuadro de Nicolas Poussin 'Et in Arcadia ego' (1637-38), que muestra pastores descubriendo
      una tumba con la inscripción, simbolizando la inevitabilidad de la muerte incluso en el paraíso
      idílico.
    fr: Fait référence au tableau de Nicolas Poussin 'Et in Arcadia ego' (1637-38), représentant des bergers
      découvrant une tombe gravée de cette phrase, symbolisant l'inévitabilité de la mort même dans un
      paradis idyllique.
    de: Bezieht sich auf Nicolas Poussins Gemälde 'Et in Arcadia ego' (1637-38), das Hirten zeigt, die
      ein Grab mit der Inschrift entdecken und damit die Unvermeidlichkeit des Todes selbst im Idyll symbolisieren.
    it: Si riferisce al dipinto di Nicolas Poussin 'Et in Arcadia ego' (1637-38), che ritrae pastori che
      scoprono una tomba con l'iscrizione, simboleggiando l'inevitabilità della morte anche nel paradiso
      idilliaco.
    pt: Refere-se à pintura de Nicolas Poussin 'Et in Arcadia ego' (1637-38), que retrata pastores descobrindo
      um túmulo com a inscrição, simbolizando a inevitabilidade da morte mesmo em um paraíso idílico.
