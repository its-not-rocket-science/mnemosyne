    it: Un'espressione che simboleggia la sorveglianza totalitaria e il controllo governativo, tratta
      dal romanzo distopico di George Orwell in cui l'autorità onnipresente controlla incessantemente
      i cittadini.
    pt: Expressão que simboliza a vigilância totalitária e o controle governamental, originária do romance
