  short_explanation: Refers to the famous literary partnership between James Boswell, who wrote the definitive
    biography of Samuel Johnson, and Johnson himself, a towering figure in 18th-century English literature
    and lexicography.
  i18n_explanations:
    en: Refers to the famous literary partnership between James Boswell, who wrote the definitive biography
      of Samuel Johnson, and Johnson himself, a towering figure in 18th-century English literature and
      lexicography.
    es: Se refiere a la famosa asociación literaria entre James Boswell, autor de la biografía definitiva
      de Samuel Johnson, e Johnson mismo, figura destacada de la literatura y lexicografía inglesa del
      siglo XVIII.
    fr: Fait référence à la célèbre collaboration littéraire entre James Boswell, auteur de la biographie
      définitive de Samuel Johnson, et Johnson lui-même, figure majeure de la littérature et de la lexicographie
      anglaises du XVIIIe siècle.
    de: Bezieht sich auf die berühmte literarische Partnerschaft zwischen James Boswell, der die definitive
      Biografie von Samuel Johnson verfasste, und Johnson selbst, einer prägenden Figur der englischen
      Literatur und Lexikografie des 18. Jahrhunderts.
    it: Si riferisce alla famosa collaborazione letteraria tra James Boswell, autore della biografia definitiva
      di Samuel Johnson, e lo stesso Johnson, figura di spicco della letteratura e lessicografia inglese
      del XVIII secolo.
    pt: Refere-se à famosa parceria literária entre James Boswell, autor da biografia definitiva de Samuel
      Johnson, e o próprio Johnson, figura proeminente da literatura e lexicografia inglesas do século
      XVIII.
    ru: Относится к знаменитому литературному союзу между Джеймсом Босуэллом, автором окончательной биографии
      Сэмюэля Джонсона, и самим Джонсоном, выдающейся фигурой английской литературы и лексикографии XVIII
