- id: en_classical_or_scriptural_allusion_a_house_divided_against_itself_cannot_stand_f6b194e9
  language: en
  canonical_reference: A house divided against itself cannot stand
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - A house divided against itself cannot stand
  - A house divided against itself will not stand
  - A house divided cannot stand
  short_explanation: A metaphorical statement emphasizing unity as essential for survival or success;
    often used to argue for political or social cohesion. The phrase originates from a biblical allusion
    to Jesus' teaching on divided kingdoms.
  i18n_explanations:
    en: A metaphorical statement emphasizing unity as essential for survival or success; often used to
      argue for political or social cohesion. The phrase originates from a biblical allusion to Jesus'
      teaching on divided kingdoms.
    es: Una metáfora que destaca que la unidad es esencial para la supervivencia o el éxito; se usa para
      defender la cohesión política o social. La frase proviene de una alusión bíblica a la enseñanza
      de Jesús sobre reinos divididos.
    fr: Une métaphore soulignant que l'unité est essentielle à la survie ou au succès ; souvent utilisée
      pour plaider en faveur de la cohésion politique ou sociale. La phrase vient d'une allusion biblique
      à l'enseignement de Jésus sur les royaumes divisés.
    de: Ein metaphorischer Ausspruch, der betont, dass Einheit für Überleben oder Erfolg entscheidend
      ist; oft verwendet, um für politischen oder sozialen Zusammenhalt zu argumentieren. Der Satz stammt
      aus einer biblischen Anspielung auf Jesu Lehre von geteilten Reichen.
    it: Una metafora che sottolinea come l'unità sia essenziale per la sopravvivenza o il successo; spesso
      usata per sostenere la coesione politica o sociale. La frase deriva da un'allusione biblica all'insegnamento
      di Gesù sui regni divisi.
    pt: Uma metáfora que destaca que a unidade é essencial para a sobrevivência ou o sucesso; frequentemente
      usada para defender a coesão política ou social. A frase origina-se de uma alusão bíblica ao ensino
      de Jesus sobre reinos divididos.
    ru: Метафорическое утверждение, подчеркивающее, что единство необходимо для выживания или успеха;
      часто используется для аргументации в пользу политической или социальной сплоченности. Фраза восходит
