- id: en_classical_or_scriptural_allusion_agamemnon_s_house_b4475f34
  language: en
  canonical_reference: Agamemnon’s house
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Agamemnon's house
  - house of Agamemnon
  - Agamemnon's family
  short_explanation: Refers to a cursed or doomed lineage marked by betrayal, murder, and vengeance. It
    stems from the tragic fate of Agamemnon, murdered by his wife Clytemnestra upon his return from Troy.
  i18n_explanations:
    en: Refers to a cursed or doomed lineage marked by betrayal, murder, and vengeance. It stems from
      the tragic fate of Agamemnon, murdered by his wife Clytemnestra upon his return from Troy.
    es: Se refiere a una estirpe maldita o condenada marcada por traición, asesinato y venganza. Proviene
      del trágico destino de Agamenón, asesinado por su esposa Clitemnestra a su regreso de Troya.
    fr: Désigne une lignée maudite ou condamnée marquée par la trahison, le meurtre et la vengeance. Vient
      du destin tragique d'Agamemnon, assassiné par son épouse Clytemnestre à son retour de Troie.
    de: Bezeichnet eine verfluchte oder dem Untergang geweihte Abstammung, geprägt von Verrat, Mord und
      Rache. Stammt vom tragischen Schicksal Agamemnons, der von seiner Frau Klytaimnestra nach seiner
      Rückkehr aus Troja ermordet wurde.
    it: Si riferisce a una stirpe maledetta o condannata segnata da tradimento, omicidio e vendetta. Deriva
      dal destino tragico di Agamennone, ucciso dalla moglie Clitemnestra al suo ritorno da Troia.
    pt: Refere-se a uma linhagem amaldiçoada ou condenada marcada por traição, assassinato e vingança.
      Origina-se do destino trágico de Agamemnon, assassinado por sua esposa Clitemnestra ao retornar
      de Troia.
    ru: Означает проклятый или обреченный род, отмеченный предательством, убийством и местью. Происходит
      от трагической судьбы Агамемнона, убитого своей женой Клитемнестрой по возвращении из Трои.
    ja: 裏切り、殺人、復讐に彩られた呪われた家系を指す。トロイからの帰還後に妻クリュタイムネストラに殺害されたアガメムノンの悲劇的な運命に由来する。
    zh: 指因背叛、谋杀和复仇而被诅咒或注定灭亡的家族。源于阿伽门农从特洛伊返回后被妻子克吕泰涅斯特拉谋杀的悲剧命运。
    ar: يشير إلى سلالة ملعونة أو محكومة بالفناء، مميزة بالخيانة والقتل والانتقام. ينبع من المصير المأساوي
      لأجاممنون، الذي قتلته زوجته كليتمنسترا عند عودته من طروادة.
    he: מתייחס לשושלת מקוללת או מיועדת לגורל רע, המסומנת בבגידה, רצח ונקמה. נובע מגורלו הטragי של אגממנון,
      שנרצח על ידי אשתו קליטמנסטרה עם שובו מטרויה.
