- id: en_cultural_reference_the_scopes_monkey_trial_ca0e5b1e
  language: en
  canonical_reference: The Scopes Monkey Trial
  reference_type: cultural_reference
  surface_patterns:
  - the Scopes Monkey Trial
  - Scopes Trial
  - the Monkey Trial
  - Scopes vs. State
  short_explanation: A 1925 court case in Tennessee where high school teacher John Scopes was tried for
    teaching evolution, challenging a state law banning it. It became a national debate on science vs.
    religion.
  i18n_explanations:
    en: A 1925 court case in Tennessee where high school teacher John Scopes was tried for teaching evolution,
      challenging a state law banning it. It became a national debate on science vs. religion.
    es: Un juicio de 1925 en Tennessee donde el profesor John Scopes fue acusado de enseñar evolución,
      desafiando una ley estatal que lo prohibía. Se convirtió en un debate nacional sobre ciencia vs.
      religión.
    fr: Un procès de 1925 au Tennessee où le professeur John Scopes fut jugé pour avoir enseigné l'évolution,
      défiant une loi de l'État qui l'interdisait. Il devint un débat national sur science vs. religion.
    de: Ein Gerichtsverfahren von 1925 in Tennessee, bei dem der Lehrer John Scopes wegen des Unterrichts
      der Evolutionstheorie angeklagt wurde und damit ein staatliches Verbot brach. Es wurde zu einer
      nationalen Debatte über Wissenschaft vs. Religion.
    it: Un processo del 1925 in Tennessee in cui il professore John Scopes fu processato per aver insegnato
      l'evoluzione, violando una legge statale che lo vietava. Divenne un dibattito nazionale tra scienza
      e religione.
    pt: Um julgamento de 1925 no Tennessee onde o professor John Scopes foi julgado por ensinar evolução,
      desafiando uma lei estadual que a proibia. Tornou-se um debate nacional sobre ciência vs. religião.
    ru: Судебный процесс 1925 года в Теннесси, где учитель Джон Скоупс был осужден за преподавание теории
      эволюции, нарушая запрещающий это закон штата. Это стало национальной дискуссией о науке против
      религии.
    ja: 1925年にテネシー州で行われた裁判で、高校教師ジョン・スコープスが進化論を教えたとして起訴された。州法で禁止されていた進化論教育をめぐり、科学と宗教の対立が全国的な議論となった。
    zh: 1925年田纳西州的一起法庭案件，高中教师约翰·斯科普斯因教授进化论而受审，挑战了该州禁止教授进化论的法律。此案成为全国关于科学与宗教的辩论焦点。
    ar: محاكمة عام 1925 في ولاية تينيسي حيث اتهم مدرس الثانوية جون سكوبس بتدريس نظرية التطور، مما خالف
