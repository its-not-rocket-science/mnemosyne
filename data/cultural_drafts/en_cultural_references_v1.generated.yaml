    ja: このことわざは、絶望的な状況に直面した人が、どんなに不十分な助けであっても受け入れてしまう様子を表します。人間の絶望の極みを示しています。
    zh: 这句谚语描述了一个人在面临绝境时，即使帮助微不足道也会抓住不放的情形。它展现了人类绝望的极限。
    ar: هذا المثل يصف شخصًا يائسًا يقبل أي مساعدة، مهما كانت غير كافية، عند مواجهة ظروف قاسية. يبرز مدى
