- id: en_literary_reference_all_s_well_that_ends_well_2fb023b0
  language: en
  canonical_reference: All's well that ends well
  reference_type: literary_reference
  surface_patterns:
  - All's well that ends well
  - All is well that ends well
  - All's well that ends well, they say
  short_explanation: This phrase suggests that a positive outcome justifies any difficulties encountered
    along the way. It is the title of a Shakespeare play and is often used to console or reassure.
  i18n_explanations:
    en: This phrase suggests that a positive outcome justifies any difficulties encountered along the
      way. It is the title of a Shakespeare play and is often used to console or reassure.
    es: Esta frase sugiere que un resultado positivo justifica cualquier dificultad encontrada en el camino.
      Es el título de una obra de Shakespeare y se usa a menudo para consolar o tranquilizar.
    fr: Cette expression suggère qu'un résultat positif justifie les difficultés rencontrées en chemin.
      C'est le titre d'une pièce de Shakespeare et elle est souvent utilisée pour réconforter ou rassurer.
    de: Dieser Ausdruck besagt, dass ein gutes Ende alle Schwierigkeiten auf dem Weg rechtfertigt. Er
      ist der Titel eines Shakespeare-Stücks und wird oft verwendet, um zu trösten oder zu beruhigen.
    it: Questa frase suggerisce che un esito positivo giustifica qualsiasi difficoltà incontrata lungo
      il percorso. È il titolo di un'opera di Shakespeare ed è spesso usata per consolare o rassicurare.
    pt: Esta frase sugere que um resultado positivo justifica quaisquer dificuldades encontradas pelo
      caminho. É o título de uma peça de Shakespeare e é frequentemente usada para consolar ou tranquilizar.
    ru: Эта фраза означает, что положительный результат оправдывает любые трудности на пути. Это название
      пьесы Шекспира и часто используется для утешения или успокоения.
    ja: この表現は、道中に起きた困難があっても、最終的に良い結果であればそれで良いということを示唆しています。シェイクスピアの戯曲のタイトルでもあり、慰めや安心を与えるためにしばしば使われます。
    zh: 这句成语的意思是，只要最终结果好，过程中遇到的任何困难都可以被原谅。它也是莎士比亚戏剧的标题，常用于安慰或宽慰他人。
    ar: هذا التعبير يشير إلى أن النتيجة الإيجابية تبرر أي صعوبات واجهتها في الطريق. إنه عنوان لمسرحية
      لشكسبير ويُستخدم غالبًا للتخفيف أو الطمأنينة.
    he: ביטוי זה מציע שתוצאה חיובית מצדיקה כל קושי שנפגש בדרך. זהו שמו של מחזה מאת שייקספיר ונעשה בו שימוש
