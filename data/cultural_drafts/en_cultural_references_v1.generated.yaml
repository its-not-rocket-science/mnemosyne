- id: en_cultural_reference_a_titian_bacchanal_cffd331b
  language: en
  canonical_reference: A Titian bacchanal
  reference_type: cultural_reference
  surface_patterns:
  - a Titian bacchanal
  - Titian's bacchanals
  - bacchanalian scenes in the style of Titian
  - Titianesque bacchanal
  short_explanation: Refers to the mythological and sensual paintings of bacchanals (wild, drunken celebrations)
    by Tiziano Vecellio (c. 1488–1576), known as Titian, a leading Venetian Renaissance artist. These
    works often depict classical themes with rich color and movement.
  i18n_explanations:
    en: Refers to the mythological and sensual paintings of bacchanals (wild, drunken celebrations) by
      Tiziano Vecellio (c. 1488–1576), known as Titian, a leading Venetian Renaissance artist. These works
      often depict classical themes with rich color and movement.
    es: Se refiere a los cuadros mitológicos y sensuales de bacanales (celebraciones salvajes y ebrias)
      de Tiziano Vecellio (c. 1488–1576), conocido como Tiziano, artista veneciano líder del Renacimiento.
      Estas obras suelen representar temas clásicos con ricos colores y movimiento.
    fr: Fait référence aux peintures mythologiques et sensuelles de bacchanales (célébrations sauvages
      et ivres) de Tiziano Vecellio (vers 1488–1576), dit Titien, artiste vénitien majeur de la Renaissance.
      Ces œuvres représentent souvent des thèmes classiques avec des couleurs riches et du mouvement.
    de: Bezieht sich auf die mythologischen und sinnlichen Gemälde von Bacchanalien (wilden, trunkfesten
      Festen) von Tiziano Vecellio (ca. 1488–1576), bekannt als Tizian, einem führenden Künstler der venezianischen
      Renaissance. Diese Werke zeigen oft klassische Themen mit kräftigen Farben und Bewegung.
    it: Si riferisce ai dipinti mitologici e sensuali di baccanali (celebrazioni selvagge e ubriache)
      di Tiziano Vecellio (ca. 1488–1576), noto come Tiziano, artista veneziano di spicco del Rinascimento.
      Queste opere spesso raffigurano temi classici con colori ricchi e movimento.
    pt: Refere-se às pinturas mitológicas e sensuais de bacanais (celebrações selvagens e embriagadas)
      de Tiziano Vecellio (c. 1488–1576), conhecido como Ticiano, artista veneziano líder do Renascimento.
      Essas obras geralmente retratam temas clássicos com cores ricas e movimento.
    ru: Относится к мифологическим и чувственным картинам вакханалий (диких, пьяных празднеств) Тициано
      Вечеллио (ок. 1488–1576), известного как Тициан, ведущего художника венецианского Ренессанса. Эти
      работы часто изображают классические темы с богатыми цветами и движением.
    ja: ヴェネツィア・ルネサンスを代表する画家ティツィアーノ・ヴェチェッリオ（1488頃–1576）による、神話的で官能的なバッカナール（狂乱の酒宴）の絵画を指す。これらの作品は、豊かな色彩と躍動感をもって古典的主題を描くことが多い。
    zh: 指的是威尼斯文艺复兴领军画家提香·韦切利奥（约1488–1576）创作的神话题材且 sensual 的酒神祭（狂欢与醉酒庆典）画作。这些作品常以丰富的色彩与动感描绘古典主题。
    ar: يشير إلى اللوحات الأسطورية والحسية لباكوس (احتفالات بربرية وسكر) لتيزيانو فيتشيلو (حوالي 1488–1576)،
      المعروف باسم تيتيان، الفنان الرائد في عصر النهضة الفينيسي. غالبًا ما تصور هذه الأعمال مواضيع كلاسيكية
      بألوان غنية وحركة.
    he: מתייחס לציורי הבאקאנאל המיתולוגיים והחושניים של טיציאן וצ'ליו (1488–1576), המכונה טיציאן, אמן
      ונציאני מוביל בתקופת הרנסאנס. יצירות אלו מציגות לרוב נושאים קלאסיים בצבעים עשירים ותנועה.
