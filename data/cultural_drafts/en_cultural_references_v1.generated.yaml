- id: en_cultural_reference_remember_the_maine_b2d672a2
  language: en
  canonical_reference: Remember the Maine
  reference_type: cultural_reference
  surface_patterns:
  - Remember the Maine
  - Remember the USS Maine
  - Remember the Maine!
  - Remember the Maine to hell with Spain
  short_explanation: A rallying cry during the Spanish-American War (1898) after the USS Maine battleship
    exploded in Havana Harbor. It symbolized American outrage and the call for war against Spain.
  i18n_explanations:
    en: A rallying cry during the Spanish-American War (1898) after the USS Maine battleship exploded
      in Havana Harbor. It symbolized American outrage and the call for war against Spain.
    es: Un grito de guerra durante la Guerra Hispano-Estadounidense (1898) tras la explosión del acorazado
      USS Maine en el puerto de La Habana. Simbolizó la indignación estadounidense y el llamado a la guerra
      contra España.
    fr: Un cri de ralliement pendant la guerre hispano-américaine (1898) après l'explosion du cuirassé
      USS Maine dans le port de La Havane. Il symbolisait l'indignation américaine et l'appel à la guerre
      contre l'Espagne.
    de: Ein Schlachtruf während des Spanisch-Amerikanischen Krieges (1898) nach der Explosion des Schlachtschiffs
      USS Maine im Hafen von Havanna. Er stand für die amerikanische Empörung und den Ruf zum Krieg gegen
      Spanien.
    it: Uno slogan durante la guerra ispano-americana (1898) dopo l'esplosione della corazzata USS Maine
      nel porto de L'Avana. Simboleggiava l'indignazione statunitense e la chiamata alla guerra contro
      la Spagna.
    pt: Um grito de guerra durante a Guerra Hispano-Americana (1898) após a explosão do encouraçado USS
      Maine no porto de Havana. Simbolizou a indignação americana e o chamado à guerra contra a Espanha.
    ru: Боевой клич во время испано-американской войны (1898) после взрыва броненосца USS Maine в гаванском
      порту. Он символизировал возмущение США и призыв к войне против Испании.
    ja: 1898年の米西戦争中、ハバナ湾でUSSメイン号が爆沈した後、戦争を煽るスローガンとなった。米国の怒りを象徴し、スペインに対する宣戦を促した。
    zh: 1898年美西战争期间，美国缅因号战舰在哈瓦那港爆炸后的战争动员口号。象征美国的愤怒与对西班牙宣战的号召。
    ar: شعار حشد خلال الحرب الإسبانية الأمريكية (1898) بعد انفجار السفينة الحربية الأمريكية يو إس إس ماين
