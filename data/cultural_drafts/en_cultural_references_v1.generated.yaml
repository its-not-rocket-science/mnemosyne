      и педагогике.
    ja: 彫刻家ピグマリオンが自らの彫像に恋したという神話に由来し、期待が高まることでパフォーマンスが向上する現象を指す。心理学や教育学で広く用いられる。
    zh: 源自皮格马利翁神话，一位雕塑家爱上了自己的雕像，该术语描述了期望越高表现越好的现象。在心理学和教育学中广泛使用。
