- id: en_literary_reference_sour_grapes_c471cb4c
  language: en
  canonical_reference: Sour grapes
  reference_type: literary_reference
  surface_patterns:
  - Sour grapes
  - It's just sour grapes
  - A case of sour grapes
  short_explanation: The attitude of pretending to despise something one cannot have, derived from Aesop's
    fable 'The Fox and the Grapes,' where a fox calls grapes sour after failing to reach them.
  i18n_explanations:
    en: The attitude of pretending to despise something one cannot have, derived from Aesop's fable 'The
      Fox and the Grapes,' where a fox calls grapes sour after failing to reach them.
    es: La actitud de fingir despreciar algo que no se puede tener, derivada de la fábula de Esopo 'El
      zorro y las uvas,' donde un zorro califica las uvas de ácidas tras no poder alcanzarlas.
    fr: L'attitude de prétendre mépriser quelque chose qu'on ne peut pas obtenir, tirée de la fable d'Ésope
      'Le Renard et les Raisins,' où un renard traite les raisins d'aigres après avoir échoué à les atteindre.
    de: Die Haltung, etwas zu verachten, das man nicht haben kann, abgeleitet aus der Fabel 'Der Fuchs
      und die Trauben' von Äsop, in der ein Fuchs die Trauben als sauer bezeichnet, nachdem er sie nicht
      erreichen konnte.
    it: L'atteggiamento di fingere di disprezzare qualcosa che non si può avere, tratto dalla favola di
      Esopo 'La volpe e l'uva,' in cui una volpe definisce l'uva acerba dopo non essere riuscita a raggiungerla.
    pt: A atitude de fingir desprezar algo que não se pode ter, derivada da fábula de Esopo 'A Raposa
      e as Uvas,' onde uma raposa chama as uvas de azedas após não conseguir alcançá-las.
    ru: Поведение, при котором человек притворяется, что презирает то, чего не может получить, восходит
      к басне Эзопа 'Лиса и виноград,' где лиса называет виноград кислым, не сумев до него добраться.
    ja: 手に入らないものを手に入らないと言い訳する態度。イソップ寓話「キツネとブドウ」に由来し、キツネがブドウに届かなかった後に酸っぱいと言う場面からきています。
    zh: 假装鄙视自己无法得到的东西的态度，源于伊索寓言《狐狸与葡萄》，其中狐狸因无法摘到葡萄而说葡萄是酸的。
    ar: الموقف الذي يتظاهر فيه المرء بازدراء شيء لا يمكنه الحصول عليه، مستمد من خرافة إيسوب 'الثعلب والعنب'،
