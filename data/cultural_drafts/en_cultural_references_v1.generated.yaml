- id: en_literary_reference_a_fuseli_the_nightmare_74788399
  language: en
  canonical_reference: A Fuseli The Nightmare
  reference_type: literary_reference
  surface_patterns:
  - The Nightmare
  - Fuseli's Nightmare
  - a Nightmare
  - the Nightmare of Fuseli
  short_explanation: Refers to Henry Fuseli's 1781 painting depicting a sleeping woman tormented by a
    demonic incubus, symbolizing repressed desires and the subconscious. The image became iconic in Romantic
    art and literature.
  i18n_explanations:
    en: Refers to Henry Fuseli's 1781 painting depicting a sleeping woman tormented by a demonic incubus,
      symbolizing repressed desires and the subconscious. The image became iconic in Romantic art and
      literature.
    es: Se refiere a la pintura de Henry Fuseli de 1781 que muestra a una mujer dormida atormentada por
      un íncubo demoníaco, simbolizando deseos reprimidos y el subconsciente. La imagen se volvió icónica
      en el arte y la literatura románticos.
    fr: Fait référence au tableau de Henry Fuseli de 1781 représentant une femme endormie tourmentée par
      un incubus démoniaque, symbolisant les désirs refoulés et l'inconscient. L'image est devenue emblématique
      de l'art et de la littérature romantiques.
    de: Bezieht sich auf Henry Fuselis Gemälde von 1781, das eine schlafende Frau zeigt, die von einem
      dämonischen Incubus gequält wird, und unterdrückte Begierden sowie das Unterbewusstsein symbolisiert.
      Das Bild wurde ikonisch in der Romantik.
    it: Si riferisce al dipinto di Henry Fuseli del 1781 che ritrae una donna addormentata tormentata
      da un incubo demoniaco, simbolizzando desideri repressi e l'inconscio. L'immagine divenne iconica
      nell'arte e nella letteratura romantica.
    pt: Refere-se à pintura de Henry Fuseli de 1781 que retrata uma mulher dormindo atormentada por um
      íncubo demoníaco, simbolizando desejos reprimidos e o inconsciente. A imagem tornou-se icônica na
      arte e literatura românticas.
    ru: Относится к картине Генри Фюзели 1781 года, изображающей спящую женщину, мучимую демоном-инкубом,
      что символизирует подавленные желания и подсознание. Картина стала знаковой в романтическом искусстве
      и литературе.
    ja: ヘンリー・フュースリーの1781年の絵画で、眠る女性が悪魔のインキュバスに苦しめられる様子を描き、抑圧された欲望と無意識を象徴する。この画像はロマン主義の芸術と文学で象徴的となった。
    zh: 指亨利·福赛斯1781年的画作，描绘一名熟睡女子被恶魔 incubus 折磨，象征着被压抑的欲望与潜意识。这幅画在浪漫主义艺术与文学中成为经典。
    ar: يشير إلى لوحة هنري فوسيلي لعام 1781 التي تصور امرأة نائمة تعاني من شيطان إ incubus، مما يرمز إلى
      الرغبات المكبوتة واللاشعور. أصبحت الصورة أيقونية في الفن والأدب الرومانسيين.
    he: מתייחס לציורו של הנרי פוזלי משנת 1781 המציג אישה ישנה הנתונה לייסורי אינקובוס דמוני, המסמל תשוקות
      מודחקות ותת-מודע. התמונה הפכה לאיקונית באמנות ובספרות הרומנטית.
