  short_explanation: A term popularized by Ernest Hemingway, referring to the disillusioned post-World
    War I generation of writers and artists who came of age during the war and felt alienated from society.
  i18n_explanations:
    en: A term popularized by Ernest Hemingway, referring to the disillusioned post-World War I generation
      of writers and artists who came of age during the war and felt alienated from society.
    es: Término popularizado por Ernest Hemingway para referirse a la generación de escritores y artistas
      desilusionados tras la Primera Guerra Mundial, que crecieron durante la guerra y se sintieron alienados
      de la sociedad.
    fr: Terme popularisé par Ernest Hemingway désignant la génération désillusionnée d'écrivains et d'artistes
      d'après la Première Guerre mondiale, qui ont grandi pendant la guerre et se sont sentis aliénés
      par la société.
    de: Ein von Ernest Hemingway geprägter Begriff für die desillusionierte Generation von Schriftstellern
      und Künstlern nach dem Ersten Weltkrieg, die während des Krieges erwachsen wurden und sich von der
      Gesellschaft entfremdet fühlten.
    it: Termine coniato da Ernest Hemingway per indicare la generazione di scrittori e artisti disillusi
      del primo dopoguerra, cresciuti durante la guerra e alienati dalla società.
    pt: Termo popularizado por Ernest Hemingway para se referir à geração de escritores e artistas desiludidos
      após a Primeira Guerra Mundial, que amadureceram durante a guerra e se sentiram alienados da sociedade.
    ru: Термин, популяризированный Эрнестом Хемингуэем, обозначающий разочарованное поколение писателей
      и художников после Первой мировой войны, которые выросли во время войны и чувствовали себя отчужденными
      от общества.
    ja: アーネスト・ヘミングウェイによって広められた用語で、第一次世界大戦後の幻滅した作家や芸術家の世代を指し、戦争中に成長し社会から疎外感を抱いた人々を表します。
