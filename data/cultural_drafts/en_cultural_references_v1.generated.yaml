- id: en_proverb_tradition_from_the_sublime_to_the_ridiculous_is_but_a_step_8d66d9db
  language: en
  canonical_reference: From the sublime to the ridiculous is but a step
  reference_type: proverb_tradition
  surface_patterns:
  - from the sublime to the ridiculous is but a step
  - from sublime to ridiculous is but a step
  - the sublime to the ridiculous is but a step
  - from the sublime to the ridiculous is only a step
  short_explanation: This proverb suggests that a minor change can transform something grand or noble
    into something trivial or absurd. It is often used to describe sudden shifts in perception or quality.
  i18n_explanations:
    en: This proverb suggests that a minor change can transform something grand or noble into something
      trivial or absurd. It is often used to describe sudden shifts in perception or quality.
    es: Este refrán sugiere que un pequeño cambio puede transformar algo grandioso o noble en algo trivial
      o absurdo. Se usa a menudo para describir cambios repentinos en la percepción o la calidad.
    fr: Ce proverbe suggère qu'un petit changement peut transformer quelque chose de grandiose ou de noble
      en quelque chose de trivial ou d'absurde. Il est souvent utilisé pour décrire des changements soudains
      de perception ou de qualité.
    de: Dieses Sprichwort besagt, dass eine kleine Veränderung etwas Großartiges oder Edles in etwas Triviales
      oder Absurdes verwandeln kann. Es wird oft verwendet, um plötzliche Veränderungen in der Wahrnehmung
      oder Qualität zu beschreiben.
    it: Questo proverbio suggerisce che un piccolo cambiamento può trasformare qualcosa di grandioso o
      nobile in qualcosa di banale o assurdo. Viene spesso usato per descrivere cambiamenti improvvisi
      nella percezione o nella qualità.
    pt: Este provérbio sugere que uma pequena mudança pode transformar algo grandioso ou nobre em algo
      trivial ou absurdo. É frequentemente usado para descrever mudanças repentinas na percepção ou na
      qualidade.
    ru: Эта пословица подразумевает, что небольшое изменение может превратить нечто величественное или
      благородное во что-то тривиальное или абсурдное. Её часто используют для описания внезапных перемен
      в восприятии или качестве.
    ja: このことわざは、小さな変化が壮大なものや noble なものを trivial（些細な）あるいは ridiculous（ばかげた）ものに変えてしまう可能性を示唆しています。知覚や質の突然の変化を表す際によく使われます。
    zh: 这句谚语表明，微小的变化可以将崇高或高贵的事物变成平凡或荒谬的事物。它常用于描述感知或质量的突然转变。
    ar: هذا المثل يشير إلى أن تغييرًا طفيفًا يمكن أن يحول شيئًا عظيمًا أو نبيلًا إلى شيء تافه أو سخيف.
