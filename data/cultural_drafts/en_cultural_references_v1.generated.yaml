    pt: Refere-se ao retrato de Thomas Gainsborough de 1770 de um jovem usando um terno azul de cetim.
      Simboliza elegância e o estilo rococó, frequentemente associado à pintura de retratos britânica.
    ru: Относится к портрету Томаса Гейнсборо 1770 года, изображающему молодого человека в синем атласном
