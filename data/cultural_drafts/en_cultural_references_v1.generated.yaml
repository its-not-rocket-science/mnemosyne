- id: en_cultural_reference_the_gunpowder_treason_and_plot_bc768eca
  language: en
  canonical_reference: The Gunpowder Treason and Plot
  reference_type: cultural_reference
  surface_patterns:
  - the Gunpowder Plot
  - Gunpowder Treason
  - the Gunpowder Treason and Plot
  short_explanation: A failed 1605 assassination attempt in England against King James I by a group of
    Catholic conspirators, including Guy Fawkes. It is commemorated annually on November 5th with fireworks
    and bonfires.
  i18n_explanations:
    en: A failed 1605 assassination attempt in England against King James I by a group of Catholic conspirators,
      including Guy Fawkes. It is commemorated annually on November 5th with fireworks and bonfires.
    es: Un fallido intento de asesinato en 1605 contra el rey Jacobo I de Inglaterra por un grupo de conspiradores
      católicos, entre ellos Guy Fawkes. Se conmemora cada 5 de noviembre con fuegos artificiales y hogueras.
    fr: Une tentative d'assassinat ratée en 1605 contre le roi Jacques Ier d'Angleterre par un groupe
      de conspirateurs catholiques, dont Guy Fawkes. Célébré chaque 5 novembre avec des feux d'artifice
      et des feux de joie.
    de: Ein gescheiterter Attentatsversuch 1605 gegen König Jakob I. von England durch katholische Verschwörer,
      darunter Guy Fawkes. Wird jährlich am 5. November mit Feuerwerk und Lagerfeuern begangen.
    it: Un fallito attentato nel 1605 contro il re Giacomo I d'Inghilterra da parte di un gruppo di cospiratori
      cattolici, tra cui Guy Fawkes. Si commemora ogni 5 novembre con fuochi d'artificio e falò.
    pt: Uma tentativa fracassada de assassinato em 1605 contra o rei Jaime I da Inglaterra por um grupo
      de conspiradores católicos, incluindo Guy Fawkes. Comemorado anualmente em 5 de novembro com fogos
      de artifício e fogueiras.
    ru: Неудачное покушение 1605 года на английского короля Якова I группой католических заговорщиков,
      включая Гая Фокса. Отмечается 5 ноября фейерверками и кострами.
    ja: 1605年にイギリスのジェームズ1世に対するカトリック陰謀団（ガイ・フォークスを含む）による暗殺未遂事件。毎年11月5日には花火と焚き火で記念される。
    zh: 1605年英国天主教徒阴谋分子（包括盖伊·福克斯）刺杀詹姆斯一世未遂。每年11月5日以烟花和篝火纪念。
    ar: محاولة اغتيال فاشلة عام 1605 ضد الملك جيمس الأول ملك إنجلترا من قبل مجموعة من المتآمرين الكاثوليك،
      بما في ذلك غاي فوكس. يتم إحياء ذكراها سنوياً في 5 نوفمبر بالألعاب النارية وحرق النيران.
    he: ניסיון התנקשות כושל ב-1605 נגד מלך אנגליה ג'יימס הראשון על ידי קושרים קתולים, בהם גאי פוקס. מצוין
