    en: A Latin phrase meaning 'divide and rule,' used to describe a strategy of maintaining power by
      keeping those under authority divided. It originates from Roman political thought and has been attributed
      to figures like Julius Caesar and Machiavelli.
    es: Frase latina que significa 'divide y vencerás', usada para describir una estrategia de mantener
      el poder dividiendo a quienes están bajo autoridad. Proviene del pensamiento político romano y se
      atribuye a figuras como Julio César y Maquiavelo.
    fr: Locution latine signifiant 'diviser pour régner', décrivant une stratégie de maintien du pouvoir
      en divisant ceux qui sont sous l'autorité. Elle vient de la pensée politique romaine et a été attribuée
      à des figures comme Jules César et Machiavel.
    de: Ein lateinischer Ausdruck, der 'teile und herrsche' bedeutet und eine Strategie beschreibt, Macht
      zu erhalten, indem man Untergebene spaltet. Er stammt aus der römischen politischen Theorie und
      wurde Figuren wie Julius Cäsar und Machiavelli zugeschrieben.
    it: Un'espressione latina che significa 'dividi e conquista', usata per descrivere una strategia di
      mantenimento del potere dividendo chi è sotto autorità. Deriva dal pensiero politico romano ed è
      stata attribuita a figure come Giulio Cesare e Machiavelli.
    pt: Expressão latina que significa 'dividir para governar', usada para descrever uma estratégia de
      manter o poder dividindo aqueles sob autoridade. Origina-se do pensamento político romano e foi
      atribuída a figuras como Júlio César e Maquiavel.
    ru: Латинское выражение, означающее 'разделяй и властвуй', описывающее стратегию удержания власти
