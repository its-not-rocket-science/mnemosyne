- id: en_cultural_reference_a_degas_dancer_2a737dcf
  language: en
  canonical_reference: A Degas dancer
  reference_type: cultural_reference
  surface_patterns:
  - a Degas dancer
  - Degas' dancer
  - dancer in the style of Degas
  - Degas-esque dancer
  short_explanation: Refers to the ballet dancers painted or sculpted by Edgar Degas, known for their
    dynamic poses, fleeting movement, and candid realism. Degas' works capture the backstage and rehearsal
    life of dancers, often in pastel or oil.
  i18n_explanations:
    en: Refers to the ballet dancers painted or sculpted by Edgar Degas, known for their dynamic poses,
      fleeting movement, and candid realism. Degas' works capture the backstage and rehearsal life of
      dancers, often in pastel or oil.
    es: Se refiere a las bailarinas pintadas o esculpidas por Edgar Degas, conocidas por sus poses dinámicas,
      movimientos fugaces y realismo espontáneo. Las obras de Degas capturan la vida entre bambalinas
      y los ensayos de las bailarinas, a menudo en pastel o óleo.
    fr: Fait référence aux danseuses peintes ou sculptées par Edgar Degas, connues pour leurs poses dynamiques,
      leurs mouvements fugaces et leur réalisme spontané. Les œuvres de Degas capturent la vie en coulisses
      et les répétitions des danseuses, souvent en pastel ou à l'huile.
    de: Bezieht sich auf die von Edgar Degas gemalten oder skulptierten Balletttänzerinnen, die für ihre
      dynamischen Posen, flüchtigen Bewegungen und ungekünstelten Realismus bekannt sind. Degas' Werke
      fangen das Leben hinter der Bühne und die Proben der Tänzerinnen ein, oft in Pastell oder Öl.
    it: Si riferisce alle ballerine dipinte o scolpite da Edgar Degas, note per le loro pose dinamiche,
      i movimenti fugaci e il realismo spontaneo. Le opere di Degas catturano la vita dietro le quinte
      e le prove delle ballerine, spesso a pastello o olio.
    pt: Refere-se às bailarinas pintadas ou esculpidas por Edgar Degas, conhecidas por suas poses dinâmicas,
      movimentos fugazes e realismo espontâneo. As obras de Degas capturam a vida nos bastidores e os
      ensaios das bailarinas, frequentemente em pastel ou óleo.
    ru: Описывает балерин, изображённых или вылепленных Эдгаром Дега, известных своими динамичными позами,
      мимолётными движениями и непринуждённым реализмом. Работы Дега запечатлевают жизнь за кулисами и
      репетиции балерин, часто выполненные пастелью или маслом.
    ja: エドガー・ドガによって描かれたり彫刻されたバレリーナを指し、そのダイナミックなポーズ、儚い動き、そして率直な写実性で知られる。ドガの作品はバレリーナの舞台裏やリハーサルの生活を捉え、しばしばパステルや油彩で描かれる。
    zh: 指代埃德加·德加绘制或雕塑的芭蕾舞者，以其动态的姿势、瞬间的动作和自然的写实风格著称。德加的作品捕捉了芭蕾舞者的后台与排练生活，常以粉彩或油画形式呈现。
    ar: يشير إلى الراقصات اللاتي رسمهن أو نحتهن إدغار ديجا، المعروفات بوضعياتهن الديناميكية وحركاتهن العابرة
      والواقعية الصادقة. أعمال ديجا تصور حياة الراقصات خلف الكواليس والتدريبات، غالبًا بالباستيل أو الزيت.
    he: מתייחס לרקדניות שצייר או פיסל אדגר דגה, המוכרות בתנוחותיהן הדינמיות, תנועותיהן החולפות והריאליזם
      הספונטני שלהן. עבודותיו של דגה seize את חיי הרקדניות מאחורי הקלעים ואת החזרות, לרוב בפסטל או שמן.
