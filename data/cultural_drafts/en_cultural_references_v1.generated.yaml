  - those who live by the sword die by the sword
  - live by the sword, die by the sword
  short_explanation: A proverb warning that violence begets violence, suggesting that those who rely on
    aggression will ultimately face its consequences. It reflects themes of justice and retribution.
  i18n_explanations:
    en: A proverb warning that violence begets violence, suggesting that those who rely on aggression
      will ultimately face its consequences. It reflects themes of justice and retribution.
    es: Un proverbio que advierte que la violencia engendra violencia, sugiriendo que quienes dependen
      de la agresión enfrentarán sus consecuencias. Refleja temas de justicia y retribución.
    fr: Un proverbe avertissant que la violence engendre la violence, suggérant que ceux qui recourent
      à l'agression en subiront les conséquences. Il reflète des thèmes de justice et de rétribution.
    de: Ein Sprichwort, das warnt, dass Gewalt Gewalt erzeugt, und andeutet, dass diejenigen, die auf
      Aggression setzen, letztlich deren Folgen tragen werden. Es spiegelt Themen von Gerechtigkeit und
      Vergeltung wider.
    it: Un proverbio che avverte che la violenza genera violenza, suggerendo che chi fa affidamento sull'aggressività
      ne subirà le conseguenze. Riflette temi di giustizia e ritorsione.
    pt: Um provérbio que adverte que a violência gera violência, sugerindo que quem depende da agressão
      enfrentará suas consequências. Reflete temas de justiça e retribuição.
    ru: Поговорка, предупреждающая, что насилие порождает насилие, и предполагающая, что те, кто полагается
      на агрессию, в итоге столкнутся с её последствиями. Отражает темы справедливости и возмездия.
    ja: 暴力は暴力を生むという警句。暴力に頼る者は最終的にその報いを受けるという意味で、正義と報復のテーマを反映する。
    zh: 一句警语，意为暴力招致暴力，暗示依赖暴力者最终将面临其后果。反映正义与报应的主题。
    ar: مثل يحذر من أن العنف يولد العنف، مما يشير إلى أن من يعتمد على العدوان سيواجه عواقبه في النهاية.
