      prendre plus de temps. Il reflète une expérience humaine courante de la perception du temps.
    de: Dieses Sprichwort bedeutet, dass etwas länger zu dauern scheint, wenn man ungeduldig darauf wartet.
      Es spiegelt eine allgemeine menschliche Erfahrung der Zeitwahrnehmung wider.
    it: Questo proverbio significa che quando si aspetta con impazienza che qualcosa accada, sembra che
      impieghi più tempo. Riflette un’esperienza umana comune della percezione del tempo.
    pt: Este provérbio significa que, quando se espera ansiosamente que algo aconteça, parece que demora
