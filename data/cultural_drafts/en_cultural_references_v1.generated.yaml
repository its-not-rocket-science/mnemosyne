      для объективации молодости.
    ja: ウラジーミル・ナボコフの小説「ロリータ」（1955年）で使われた用語で、性的に早熟な少女を指す。小説の物議を醸す欲望と道徳の探求を反映し、しばしば若者を物化するために誤用される。
    zh: 弗拉基米尔·纳博科夫在《洛丽塔》（1955年）中创造的术语，用以描述性早熟的少女。反映了小说对欲望与道德的争议性探索，却常被误用以物化青春。
