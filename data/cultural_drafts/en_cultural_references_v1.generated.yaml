- id: en_classical_or_scriptural_allusion_cincinnatus_leaves_his_plow_dbd417b6
  language: en
  canonical_reference: Cincinnatus leaves his plow
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Cincinnatus leaves his plow
  - Cincinnatus and the plow
  - Cincinnatus returned to his plow
  short_explanation: Refers to Lucius Quinctius Cincinnatus, the Roman farmer who temporarily left his
    plow to become dictator, save Rome, and then return to his farm. Symbolizes selfless leadership and
    civic duty.
  i18n_explanations:
    en: Refers to Lucius Quinctius Cincinnatus, the Roman farmer who temporarily left his plow to become
      dictator, save Rome, and then return to his farm. Symbolizes selfless leadership and civic duty.
    es: Se refiere a Lucio Quincio Cincinato, el agricultor romano que dejó temporalmente su arado para
      convertirse en dictador, salvar Roma y luego regresar a su granja. Simboliza el liderazgo desinteresado
      y el deber cívico.
    fr: Fait référence à Lucius Quinctius Cincinnatus, le fermier romain qui quitta temporairement sa
      charrue pour devenir dictateur, sauver Rome, puis retourner à sa ferme. Symbolise le leadership
      désintéressé et le devoir civique.
    de: Bezieht sich auf Lucius Quinctius Cincinnatus, den römischen Bauern, der vorübergehend seinen
      Pflug verließ, um Diktator zu werden, Rom zu retten und dann auf seinen Hof zurückzukehren. Symbolisiert
      selbstloses Führungsverhalten und Pflichtbewusstsein.
    it: Si riferisce a Lucio Quinzio Cincinnato, il contadino romano che lasciò temporaneamente l'aratro
      per diventare dittatore, salvare Roma e poi tornare alla sua fattoria. Simboleggia la leadership
      disinteressata e il dovere civico.
    pt: Refere-se a Lúcio Quíncio Cincinato, o fazendeiro romano que deixou temporariamente seu arado
      para tornar-se ditador, salvar Roma e depois retornar à sua fazenda. Simboliza a liderança altruísta
      e o dever cívico.
    ru: Относится к Луцию Квинцию Цинциннату, римскому крестьянину, который временно оставил свой плуг,
      чтобы стать диктатором, спасти Рим и вернуться к хозяйству. Символизирует бескорыстное лидерство
      и гражданский долг.
    ja: ローマの農民ルキウス・クインクティウス・キンキナトゥスが、一時的に鋤を置いて独裁官となりローマを救い、農地に戻った故事を指す。自己犠牲的な指導力と市民の義務を象徴する。
    zh: 指古罗马农民卢修斯·昆克提乌斯·辛辛纳图斯暂时放下犁耕，出任独裁官拯救罗马后重返农田的故事。象征无私的领导和公民责任。
    ar: يشير إلى لوسيوس كوينتيوس سينسيناتوس، المزارع الروماني الذي ترك محره مؤقتًا ليصبح دكتاتورًا، وينقذ
      روما، ثم يعود إلى مزرعته. يرمز إلى القيادة غير الأنانية والواجب المدني.
    he: מתייחס ללוקיוס קווינקטיוס קincinnatus, החוואי הרומי שעזב זמנית את המחרשה שלו כדי להפוך לדיקטטור,
      להציל את רומא ולאחר מכן לחזור לחוותו. מסמל מנהיגות ללא אנוכיות וחובה אזרחית.
