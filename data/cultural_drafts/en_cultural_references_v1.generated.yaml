- id: en_cultural_reference_golden_handshake_8e61af78
  language: en
  canonical_reference: Golden handshake
  reference_type: cultural_reference
  surface_patterns:
  - golden handshake
  - golden handshakes
  - a golden handshake
  short_explanation: A generous severance package or financial compensation given to an executive or employee
    upon leaving a company, often to soften the impact of dismissal. The term emerged in the late 20th
    century as corporate practices evolved.
  i18n_explanations:
    en: A generous severance package or financial compensation given to an executive or employee upon
      leaving a company, often to soften the impact of dismissal. The term emerged in the late 20th century
      as corporate practices evolved.
    es: Un paquete de indemnización generoso o compensación económica otorgado a un ejecutivo o empleado
      al dejar una empresa, a menudo para suavizar el impacto de un despido. El término surgió a finales
      del siglo XX con la evolución de las prácticas corporativas.
    fr: Un généreux package de départ ou une compensation financière accordée à un cadre ou un employé
      lors de son départ d'une entreprise, souvent pour atténuer l'impact d'un licenciement. Le terme
      est apparu à la fin du XXe siècle avec l'évolution des pratiques corporatives.
    de: Ein großzügiges Abfindungspaket oder eine finanzielle Entschädigung, die einer Führungskraft oder
      einem Mitarbeiter beim Verlassen eines Unternehmens gewährt wird, oft um die Folgen einer Entlassung
      abzumildern. Der Begriff entstand Ende des 20. Jahrhunderts mit der Entwicklung der Unternehmenspraxis.
    it: Un pacchetto di liquidazione generoso o una compensazione finanziaria data a un dirigente o dipendente
      al momento di lasciare un'azienda, spesso per mitigare l'impatto di un licenziamento. Il termine
      è emerso alla fine del XX secolo con l'evoluzione delle pratiche aziendali.
    pt: Um pacote generoso de indenização ou compensação financeira dado a um executivo ou funcionário
      ao deixar uma empresa, muitas vezes para amenizar o impacto de uma demissão. O termo surgiu no final
      do século XX com a evolução das práticas corporativas.
    ru: Щедрый пакет выходного пособия или финансовая компенсация, выплачиваемая руководителю или сотруднику
      при увольнении из компании, часто для смягчения последствий увольнения. Термин появился в конце
      XX века с развитием корпоративных практик.
    ja: 退職する役員や従業員に対して支払われる寛大な退職金や経済的補償のこと。解雇の影響を和らげる目的で用いられることが多く、この用語は20世紀後半に企業慣行の変化とともに生まれました。
    zh: 在高管或员工离职时给予的慷慨离职补偿或经济补偿，通常为了减轻解雇的影响。该术语在20世纪末随着企业惯例的演变而出现。
    ar: حزمة تعويضات سخية أو تعويض مالي يمنح لمدير تنفيذي أو موظف عند مغادرة الشركة، غالبًا لتخفيف أثر
      الفصل. ظهر المصطلح في أواخر القرن العشرين مع تطور الممارسات المؤسسية.
    he: חבילת פרישה נדיבה או פיצוי כספי הניתן למנהל או עובד בעת עזיבת החברה, לעיתים כדי להקל על השפעת
      הפיטורים. המונח הופיע בסוף המאה ה-20随着 התפתחות נוהגי התאגידים.
