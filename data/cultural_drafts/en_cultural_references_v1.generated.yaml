  short_explanation: Refers to Nazi Germany’s systematic plan to exterminate Jewish people during World
    War II, known as the *Endlösung der Judenfrage*. Symbolizes genocide, Holocaust, and the horrors of
    totalitarian regimes.
  i18n_explanations:
    en: Refers to Nazi Germany’s systematic plan to exterminate Jewish people during World War II, known
      as the *Endlösung der Judenfrage*. Symbolizes genocide, Holocaust, and the horrors of totalitarian
      regimes.
    es: Se refiere al plan sistemático de la Alemania nazi para exterminar al pueblo judío durante la
      Segunda Guerra Mundial, conocido como la *Solución Final*. Simboliza el genocidio, el Holocausto
      y los horrores de los regímenes totalitarios.
    fr: Fait référence au plan systématique de l'Allemagne nazie visant à exterminer le peuple juif pendant
      la Seconde Guerre mondiale, connu sous le nom de *Solution finale*. Symbolise le génocide, l'Holocauste
      et les horreurs des régimes totalitaires.
    de: Bezieht sich auf den systematischen Plan des nationalsozialistischen Deutschlands zur Ausrottung
      der jüdischen Bevölkerung während des Zweiten Weltkriegs, bekannt als die *Endlösung der Judenfrage*.
      Symbolisiert Völkermord, Holocaust und die Schrecken totalitärer Regime.
    it: Si riferisce al piano sistematico della Germania nazista per sterminare il popolo ebraico durante
      la Seconda guerra mondiale, noto come *Soluzione finale*. Simboleggia il genocidio, l'Olocausto
      e gli orrori dei regimi totalitari.
    pt: Refere-se ao plano sistemático da Alemanha nazista para exterminar o povo judeu durante a Segunda
      Guerra Mundial, conhecido como a *Solução Final*. Simboliza o genocídio, o Holocausto e os horrores
      dos regimes totalitários.
    ru: Относится к систематическому плану нацистской Германии по истреблению еврейского народа во время
      Второй мировой войны, известному как *Окончательное решение еврейского вопроса*. Символизирует геноцид,
      Холокост и ужасы тоталитарных режимов.
    ja: 第二次世界大戦中にナチス・ドイツがユダヤ人を絶滅させるために立案したシステム的な計画、*ユダヤ人問題の最終的解決*を指す。大量虐殺、ホロコースト、全体主義体制の恐怖を象徴する。
    zh: 指的是纳粹德国在第二次世界大战期间系统性地灭绝犹太人的计划，即所谓的“最终解决方案”。象征着种族灭绝、大屠杀以及极权主义政权的恐怖。
    ar: يشير إلى الخطة المنهجية لألمانيا النازية لإبادة الشعب اليهودي خلال الحرب العالمية الثانية، المعروفة
      باسم *الحل النهائي*. يرمز إلى الإبادة الجماعية، الهولوكوست، ورعب الأنظمة الشمولية.
    he: מתייחס לתוכנית השיטתית של גרמניה הנאצית להשמדת העם היהודי במהלך מלחמת העולם השנייה, המכונה *הפתרון
      הסופי*. מסמל רצח עם, השואה ואת זוועות המשטרים הטוטליטריים.
