- id: en_literary_reference_a_conrad_heart_of_darkness_1d05a035
  language: en
  canonical_reference: A Conrad heart of darkness
  reference_type: literary_reference
  surface_patterns:
  - Conrad's Heart of Darkness
  - Heart of Darkness
  - the heart of darkness
  - Conrad darkness
  short_explanation: Refers to Joseph Conrad's novella exploring colonialism, human savagery, and moral
    ambiguity in Africa. The phrase symbolizes the 'dark' or corrupt core of human nature and imperialism,
    often used metaphorically to describe any hidden evil.
  i18n_explanations:
    en: Refers to Joseph Conrad's novella exploring colonialism, human savagery, and moral ambiguity in
      Africa. The phrase symbolizes the 'dark' or corrupt core of human nature and imperialism, often
      used metaphorically to describe any hidden evil.
    es: Se refiere a la novela de Joseph Conrad que explora el colonialismo, la barbarie humana y la ambigüedad
      moral en África. La frase simboliza el 'lado oscuro' o corrupto de la naturaleza humana y el imperialismo,
      y se usa metafóricamente para describir cualquier mal oculto.
    fr: Fait référence à la nouvelle de Joseph Conrad qui explore le colonialisme, la sauvagerie humaine
      et l'ambiguïté morale en Afrique. L'expression symbolise le 'côté obscur' ou corrompu de la nature
      humaine et de l'impérialisme, souvent utilisée métaphoriquement pour décrire tout mal caché.
    de: Bezieht sich auf Joseph Conrads Novelle, die Kolonialismus, menschliche Grausamkeit und moralische
      Ambivalenz in Afrika erkundet. Der Ausdruck symbolisiert das 'dunkle' oder korrupte Innere der menschlichen
      Natur und des Imperialismus, oft metaphorisch für jedes verborgene Übel verwendet.
    it: Si riferisce al romanzo di Joseph Conrad che esplora il colonialismo, la crudeltà umana e l'ambiguità
      morale in Africa. La frase simboleggia il 'cuore oscuro' o corrotto della natura umana e dell'imperialismo,
      spesso usata metaforicamente per descrivere qualsiasi male nascosto.
    pt: Refere-se ao romance de Joseph Conrad que explora o colonialismo, a barbárie humana e a ambiguidade
      moral na África. A expressão simboliza o 'coração das trevas' ou a natureza corrupta humana e do
      imperialismo, frequentemente usada metaforicamente para descrever qualquer mal oculto.
    ru: Относится к повести Джозефа Конрада, исследующей колониализм, человеческую жестокость и моральную
      двусмысленность в Африке. Фраза символизирует 'тёмное' или испорченное начало человеческой природы
      и империализма, часто используемое метафорически для описания любого скрытого зла.
    ja: ジョゼフ・コンラッドの小説で、アフリカにおける植民地主義、人間の残虐性、道徳的曖昧さを探求した作品。このフレーズは人間性や帝国主義の「暗黒面」または腐敗した核心を象徴し、隠された悪を比喩的に表す際に用いられる。
    zh: 指约瑟夫·康拉德的中篇小说，探讨非洲的殖民主义、人性的残暴与道德模糊。该短语象征着人性与帝国主义的'黑暗'或腐化核心，常被用作比喻来描述任何隐藏的邪恶。
    ar: يشير إلى رواية جوزيف كونراد التي تستكشف الاستعمار، الوحشية البشرية والغموض الأخلاقي في أفريقيا.
      العبارة ترمز إلى 'القلب المظلم' أو الفاسد للطبيعة البشرية وللإمبريالية، وغالبًا ما تستخدم مجازيًا
      لوصف أي شر مخفي.
    he: מתייחס לנובלה של ג'וזף קונרד שחקרה קולוניאליזם, אכזריות אנושית ואמביוולנטיות מוסרית באפריקה. הביטוי
      מסמל את 'הלב האפל' או השחיתות שבנפש האדם ובאימפריאליזם, ונעשה בו שימוש מטאפורי לתיאור כל רוע מוסתר.
