  short_explanation: Refers to Boudicca (or Boadicea), the Celtic queen who led a rebellion against Roman
    rule in ancient Britain. Her chariots symbolize resistance and defiance against imperial oppression.
  i18n_explanations:
    en: Refers to Boudicca (or Boadicea), the Celtic queen who led a rebellion against Roman rule in ancient
      Britain. Her chariots symbolize resistance and defiance against imperial oppression.
    es: Se refiere a Boudica (o Boadicea), la reina celta que lideró una rebelión contra el dominio romano
      en la antigua Britania. Sus carros simbolizan la resistencia y el desafío a la opresión imperial.
    fr: Fait référence à Boadicée (ou Boudicca), la reine celte qui mena une révolte contre la domination
      romaine dans la Bretagne antique. Ses chars symbolisent la résistance et la défiance face à l'oppression
      impériale.
    de: Bezieht sich auf Boudicca (oder Boadicea), die keltische Königin, die einen Aufstand gegen die
      römische Herrschaft in Britannien anführte. Ihre Streitwagen symbolisieren Widerstand und Trotz
      gegen imperiale Unterdrückung.
    it: Si riferisce a Boudicca (o Boadicea), la regina celtica che guidò una ribellione contro il dominio
      romano nell'antica Britannia. I suoi carri simboleggiano la resistenza e la sfida all'oppressione
      imperiale.
    pt: Refere-se a Boudica (ou Boadiceia), a rainha celta que liderou uma rebelião contra o domínio romano
      na antiga Britânia. Seus carros simbolizam resistência e desafio à opressão imperial.
    ru: Относится к Боудике (или Боадицее), кельтской королеве, возглавившей восстание против римского
      владычества в древней Британии. Её колесницы символизируют сопротивление и неповиновение имперскому
      гнёту.
    ja: 古代ブリタニアでローマ支配に反抗したケルトの女王ボウディッカ（またはボアディケア）を指す。彼女の戦車は帝国の圧政に対する抵抗と反抗の象徴である。
    zh: 指的是古代不列颠的凯尔特女王布狄卡（或称博阿迪西亚），她领导了反抗罗马统治的起义。她的战车象征着对帝国压迫的反抗与蔑视。
    ar: يشير إلى بوديكا (أو باديكيا)، الملكة الكلتية التي قادت تمردًا ضد الحكم الروماني في بريطانيا القديمة.
