      all'adattamento musicale del 1986.
    pt: Referência ao romance de Gaston Leroux de 1910 *O Fantasma da Ópera*, que conta a história de
      uma figura misteriosa que assombra a Ópera de Paris. A expressão tornou-se amplamente conhecida
      graças à adaptação musical de 1986.
    ru: Отсылка к роману Гастона Леру 1910 года *Призрак Оперы*, рассказывающему о таинственной фигуре,
      преследующей Парижскую оперу. Фраза широко известна благодаря популярному мюзиклу 1986 года.
    ja: ガストン・ルロウの1910年の小説『オペラ座の怪人』を指す。パリ・オペラ座を彷徨う謎の人物の物語で、1986年のミュージカル化により広く知られるようになった。
    zh: 指代加斯东·勒鲁1910年的小说《歌剧魅影》，讲述一个神秘身影出没于巴黎歌剧院的故事。因1986年音乐剧改编而广为人知。
