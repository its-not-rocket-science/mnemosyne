    zh: 1932年澳大利亚的一场幽默战争，军队试图控制鸸鹋数量但未能成功。成为人类傲慢对抗自然的象征。
    ar: صراع هزلي عام 1932 في أستراليا حيث فشلت القوات العسكرية في السيطرة على أعداد طيور الإيمو، ليصبح
