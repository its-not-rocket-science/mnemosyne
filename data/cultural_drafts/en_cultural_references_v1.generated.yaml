  short_explanation: A rousing speech from Shakespeare’s *Henry V* (Act 4, Scene 3), delivered before
    the Battle of Agincourt (1415), rallying troops with themes of honor, unity, and destiny. Symbolizes
    leadership and patriotic rhetoric.
  i18n_explanations:
    en: A rousing speech from Shakespeare’s *Henry V* (Act 4, Scene 3), delivered before the Battle of
      Agincourt (1415), rallying troops with themes of honor, unity, and destiny. Symbolizes leadership
      and patriotic rhetoric.
    es: Un discurso inspirador de la obra *Enrique V* de Shakespeare (Acto 4, Escena 3), pronunciado antes
      de la Batalla de Agincourt (1415), que enardece a las tropas con temas de honor, unidad y destino.
      Simboliza el liderazgo y la retórica patriótica.
    fr: Un discours enflammé tiré de *Henri V* de Shakespeare (Acte 4, Scène 3), prononcé avant la bataille
      d'Azincourt (1415), galvanisant les troupes autour de thèmes d'honneur, d'unité et de destin. Symbolise
      le leadership et la rhétorique patriotique.
    de: Eine mitreißende Rede aus Shakespeares *Heinrich V.* (Akt 4, Szene 3), gehalten vor der Schlacht
      von Azincourt (1415), die die Truppen mit Themen von Ehre, Einheit und Schicksal begeistert. Symbolisiert
      Führung und patriotische Rhetorik.
    it: Un discorso ispiratore tratto da *Enrico V* di Shakespeare (Atto 4, Scena 3), pronunciato prima
      della Battaglia di Azincourt (1415), che incita le truppe con temi di onore, unità e destino. Simboleggia
      la leadership e la retorica patriottica.
    pt: Um discurso empolgante de *Henrique V* de Shakespeare (Ato 4, Cena 3), proferido antes da Batalha
      de Azincourt (1415), que motiva as tropas com temas de honra, unidade e destino. Simboliza liderança
      e retórica patriótica.
    ru: Вдохновенная речь из пьесы Шекспира «Генрих V» (Акт 4, Сцена 3), произнесенная перед битвой при
      Азенкуре (1415), в которой войска вдохновляются идеями чести, единства и судьбы. Символизирует лидерство
      и патриотическую риторику.
    ja: シェイクスピアの戯曲「ヘンリー五世」（第4幕第3場）に登場する、アジャンクールの戦い（1415年）の前に行われた激励の演説。名誉、団結、運命といったテーマで兵士を鼓舞する。指導力と愛国的レトリックの象徴。
    zh: 出自莎士比亚《亨利五世》（第四幕第三场）的激励演讲，于阿金库尔战役（1415年）前发表，以荣誉、团结和命运为主题鼓舞士气。象征着领导力和爱国主义的修辞。
    ar: خطاب ملهم من مسرحية شكسبير *هنري الخامس* (المشهد 3، الفصل 4)، ألقاه قبل معركة أجينكورت (1415)،
      يحفز الجنود بمواضيع الشرف والوحدة والمصير. يرمز إلى القيادة والخطاب الوطني.
    he: נאום נלהב מתוך המחזה *הנרי החמישי* לשקספיר (מערכה 4, תמונה 3), שנשא לפני קרב אז'נקור (1415), אשר
      מלא בנושאים של כבוד, אחדות וגורל. מסמל מנהיגות וריטוריקה פטריוטית.
