  short_explanation: Refers to someone who disguises their true harmful nature under a deceptive appearance
    of innocence or kindness. Originates from Jesus' Sermon on the Mount warning against false prophets
    (Matthew 7:15).
  i18n_explanations:
    en: Refers to someone who disguises their true harmful nature under a deceptive appearance of innocence
      or kindness. Originates from Jesus' Sermon on the Mount warning against false prophets (Matthew
      7:15).
    es: Se refiere a alguien que disfraza su verdadera naturaleza dañina bajo una apariencia engañosa
      de inocencia o bondad. Proviene del Sermón de la Montaña de Jesús, donde advierte contra falsos
      profetas (Mateo 7:15).
    fr: Fait référence à quelqu'un qui dissimule sa véritable nature nuisible sous une apparence trompeuse
      d'innocence ou de gentillesse. Provient du Sermon sur la Montagne de Jésus, où il met en garde contre
      les faux prophètes (Matthieu 7:15).
    de: Bezieht sich auf jemanden, der seine wahre schädliche Natur unter einer täuschenden Maske der
      Unschuld oder Freundlichkeit verbirgt. Stammt aus der Bergpredigt Jesu, in der er vor falschen Propheten
      warnt (Matthäus 7:15).
    it: Si riferisce a qualcuno che nasconde la sua vera natura dannosa sotto un'apparenza ingannevole
      di innocenza o gentilezza. Proviene dal Discorso della Montagna di Gesù, dove mette in guardia contro
      falsi profeti (Matteo 7:15).
    pt: Refere-se a alguém que disfarça sua verdadeira natureza prejudicial sob uma aparência enganosa
      de inocência ou bondade. Origina-se do Sermão da Montanha de Jesus, onde ele adverte contra falsos
      profetas (Mateus 7:15).
    ru: Относится к тому, кто скрывает свою истинную вредоносную природу под обманчивой маской невинности
      или доброты. Восходит к Нагорной проповеди Иисуса, где он предупреждает о ложных пророках (Матфей
      7:15).
    ja: 無害または優しさを装って真の有害な本性を隠す人を指す。イエスの山上の垂訓（マタイによる福音書7:15）に由来し、偽預言者への警告。
    zh: 指的是伪装成无辜或善良的外表，掩盖真实有害本性的人。源自耶稣在山上宝训中对假先知的警告（马太福音7:15）。
    ar: 'يشير إلى شخص يخفي طبيعته الضارة الحقيقية تحت مظهر خادع من البراءة أو اللطف. ينشأ من عظة يسوع
