  - the Artful Dodger
  - an artful dodger
  short_explanation: A clever and skillful trickster or pickpocket, often used to describe someone who
    avoids trouble through cunning. The term originates from a character in Charles Dickens' novel who
    is adept at evading capture.
  i18n_explanations:
    en: A clever and skillful trickster or pickpocket, often used to describe someone who avoids trouble
      through cunning. The term originates from a character in Charles Dickens' novel who is adept at
      evading capture.
    es: Un tramposo astuto y hábil, que suele describir a alguien que evita problemas con astucia. El
      término proviene de un personaje de la novela de Charles Dickens que sabe eludir la captura.
    fr: Un escroc rusé et adroit, souvent utilisé pour décrire quelqu'un qui évite les ennuis par la ruse.
      Le terme vient d'un personnage du roman de Charles Dickens, expert en échapper à la capture.
    de: Ein schlauer und geschickter Trickbetrüger oder Taschendieb, oft für jemanden, der durch List
      Ärger vermeidet. Der Begriff stammt von einer Figur aus Charles Dickens' Roman, die der Gefangennahme
      entkommt.
    it: Un furfante astuto e abile, spesso usato per descrivere qualcuno che evita guai con l'astuzia.
      Il termine deriva da un personaggio del romanzo di Charles Dickens che sa sfuggire alla cattura.
    pt: Um malandro esperto e habilidoso, usado para descrever alguém que evita problemas com astúcia.
      O termo vem de um personagem do romance de Charles Dickens que sabe escapar da prisão.
    ru: Хитрый и ловкий мошенник или карманник, часто используется для описания того, кто избегает неприятностей
