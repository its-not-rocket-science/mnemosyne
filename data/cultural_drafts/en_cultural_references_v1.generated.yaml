- id: en_cultural_reference_a_chopin_nocturne_9519f253
  language: en
  canonical_reference: A Chopin nocturne
  reference_type: cultural_reference
  surface_patterns:
  - a Chopin nocturne
  - Chopin's nocturne
  - nocturne in the style of Chopin
  - Chopin-esque nocturne
  short_explanation: Refers to the lyrical, dreamy piano compositions by Frédéric Chopin, characterized
    by their melodic expressiveness and nocturnal mood. The term 'nocturne' itself originates from John
    Field but was popularized by Chopin.
  i18n_explanations:
    en: Refers to the lyrical, dreamy piano compositions by Frédéric Chopin, characterized by their melodic
      expressiveness and nocturnal mood. The term 'nocturne' itself originates from John Field but was
      popularized by Chopin.
    es: Se refiere a las composiciones pianísticas líricas y oníricas de Frédéric Chopin, caracterizadas
      por su expresividad melódica y su atmósfera nocturna. El término 'nocturno' proviene originalmente
      de John Field, pero fue Chopin quien lo popularizó.
    fr: Fait référence aux compositions pianistiques lyriques et oniriques de Frédéric Chopin, caractérisées
      par leur expressivité mélodique et leur ambiance nocturne. Le terme 'nocturne' vient à l'origine
      de John Field, mais c'est Chopin qui l'a popularisé.
    de: Bezieht sich auf die lyrischen, traumhaften Klavierkompositionen von Frédéric Chopin, die durch
      ihre melodische Ausdruckskraft und ihre nächtliche Stimmung geprägt sind. Der Begriff 'Nocturne'
      stammt ursprünglich von John Field, wurde aber von Chopin populär gemacht.
    it: Si riferisce alle composizioni pianistiche liriche e sognanti di Frédéric Chopin, caratterizzate
      dalla loro espressività melodica e dall'atmosfera notturna. Il termine 'notturno' deriva originariamente
      da John Field, ma fu Chopin a renderlo popolare.
    pt: Refere-se às composições pianísticas líricas e sonhadoras de Frédéric Chopin, caracterizadas por
      sua expressividade melódica e atmosfera noturna. O termo 'noturno' foi originalmente cunhado por
      John Field, mas foi Chopin quem o popularizou.
    ru: Описывает лирические, мечтательные фортепианные произведения Фредерика Шопена, отличающиеся мелодической
      выразительностью и ночной атмосферой. Термин 'ноктюрн' изначально введён Джоном Филдом, но популяризирован
      Шопеном.
    ja: フレデリック・ショパンによる叙情的で夢のようなピアノ曲を指し、メロディーの表現力と夜のムードで特徴付けられる。'ノクターン'という用語はジョン・フィールドに由来するが、ショパンによって普及した。
    zh: 指代弗雷德里克·肖邦创作的抒情而梦幻的钢琴曲，以其旋律表现力和夜晚氛围为特征。'夜曲'一词最初源自约翰·菲尔德，但由肖邦推广开来。
    ar: يشير إلى المؤلفات الموسيقية البيانية والحلمية للبيانو التي ألفها فريدريك شوبان، والتي تتميز بالتعبير
      اللحني وأجواء الليل. مصطلح ' nocturn ' نشأ في الأصل من جون فيلد، لكن شوبان هو من عممه.
    he: מתייחס ליצירות הפסנתר הליריות והחלומיות של פרדריק שופן, המאופיינות בביטוי מלודי ואווירה לילית.
      המונח 'נוקטורן' מקורו בג'ון פילד, אך שופן הוא שהפך אותו לפופולרי.
