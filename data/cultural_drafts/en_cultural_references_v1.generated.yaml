- id: en_cultural_reference_break_a_leg_8f3bcec6
  language: en
  canonical_reference: Break a leg
  reference_type: cultural_reference
  surface_patterns:
  - break a leg
  - break your leg
  - break a leg!
  - break legs
  short_explanation: A superstitious phrase used to wish someone good luck, especially in performing arts.
    The origin is uncertain but may stem from the idea of bowing deeply (as if breaking the leg) to receive
    applause.
  i18n_explanations:
    en: A superstitious phrase used to wish someone good luck, especially in performing arts. The origin
      is uncertain but may stem from the idea of bowing deeply (as if breaking the leg) to receive applause.
    es: Una frase supersticiosa usada para desearle buena suerte a alguien, especialmente en las artes
      escénicas. El origen es incierto, pero podría derivar de la idea de hacer una reverencia profunda
      (como si se rompiera la pierna) para recibir aplausos.
    fr: Une phrase superstitieuse utilisée pour souhaiter bonne chance à quelqu'un, surtout dans les arts
      de la scène. L'origine est incertaine, mais pourrait venir de l'idée de s'incliner profondément
      (comme pour casser la jambe) pour recevoir des applaudissements.
    de: Ein abergläubischer Ausdruck, um jemandem Glück zu wünschen, besonders in den darstellenden Künsten.
      Der Ursprung ist ungewiss, könnte aber von der Idee stammen, sich tief zu verbeugen (als würde man
      sich das Bein brechen), um Applaus zu erhalten.
    it: Una frase superstiziosa usata per augurare buona fortuna a qualcuno, soprattutto nelle arti performative.
      L'origine è incerta, ma potrebbe derivare dall'idea di inchinarsi profondamente (come per spezzare
      la gamba) per ricevere applausi.
    pt: Uma frase supersticiosa usada para desejar boa sorte a alguém, especialmente nas artes cênicas.
      A origem é incerta, mas pode vir da ideia de fazer uma reverência profunda (como se quebrasse a
      perna) para receber aplausos.
    ru: Суеверное пожелание удачи, особенно в сценических искусствах. Происхождение неясно, но, возможно,
      связано с идеей глубокого поклона (как будто ломаешь ногу), чтобы получить аплодисменты.
    ja: 特に舞台芸術で誰かに幸運を祈る迷信的な言い回し。起源は不明だが、深々とお辞儀をする（足を折るかのように）ことで拍手をもらうという考えに由来するとされる。
