    between them.
  i18n_explanations:
    en: A metaphor for being forced to choose between two equally dangerous or undesirable options. In
      Greek mythology, Scylla was a sea monster and Charybdis a whirlpool; sailors had to navigate between
      them.
    es: Metáfora para elegir entre dos opciones igualmente peligrosas o indeseables. En la mitología griega,
      Escila era un monstruo marino y Caribdis un remolino; los navegantes debían pasar entre ambos.
    fr: Métaphore pour choisir entre deux options tout aussi dangereuses ou indésirables. Dans la mythologie
      grecque, Scylla était un monstre marin et Charybde un tourbillon ; les marins devaient naviguer
      entre les deux.
    de: Metapher für die Wahl zwischen zwei gleich gefährlichen oder unerwünschten Optionen. In der griechischen
      Mythologie war Scylla ein Meeresungeheuer und Charybdis ein Strudel; Seefahrer mussten zwischen
      ihnen hindurchsegeln.
    it: Metafora per scegliere tra due opzioni ugualmente pericolose o indesiderabili. Nella mitologia
      greca, Scilla era un mostro marino e Cariddi un vortice; i naviganti dovevano passare tra i due.
    pt: Metáfora para escolher entre duas opções igualmente perigosas ou indesejáveis. Na mitologia grega,
      Cila era um monstro marinho e Caríbdis um redemoinho; os navegantes tinham de passar entre os dois.
    ru: Метафора, описывающая выбор между двумя одинаково опасными или нежелательными вариантами. В греческой
      мифологии Сцилла была морским чудовищем, а Харибда — водоворотом; морякам приходилось проплывать
      между ними.
    ja: 二つの同等に危険または望ましくない選択肢の間で迫られる葛藤のたとえ。ギリシャ神話ではスキュラは海の怪物、カリュブディスは渦潮で、船乗りはその間を航海しなければならなかった。
    zh: 比喻在两个同样危险或不理想的选项之间做出抉择。在希腊神话中，斯库拉是海怪，卡律布狄斯是漩涡；水手必须在两者之间航行。
    ar: استعارة للاختيار بين خيارين متساويين في الخطورة أو عدم الرغبة. في الميثولوجيا اليونانية، سكيلا
