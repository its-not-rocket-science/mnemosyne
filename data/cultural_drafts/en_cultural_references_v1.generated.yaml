- id: en_classical_or_scriptural_allusion_caesar_s_rubicon_7c02e6e2
  language: en
  canonical_reference: Caesar's Rubicon
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - crossing the Rubicon
  - Caesar's Rubicon
  - the Rubicon
  - cross the Rubicon
  short_explanation: Refers to Julius Caesar's 49 BCE crossing of the Rubicon River, a decisive act that
    led to civil war and his rise as dictator. It symbolizes making an irreversible decision with significant
    consequences.
  i18n_explanations:
    en: Refers to Julius Caesar's 49 BCE crossing of the Rubicon River, a decisive act that led to civil
      war and his rise as dictator. It symbolizes making an irreversible decision with significant consequences.
    es: Se refiere al cruce del río Rubicón por Julio César en el 49 a.C., un acto decisivo que desencadenó
      una guerra civil y su ascenso como dictador. Simboliza tomar una decisión irreversible con consecuencias
      importantes.
    fr: Fait référence au franchissement du fleuve Rubicon par Jules César en 49 av. J.-C., un acte décisif
      qui déclencha une guerre civile et son ascension comme dictateur. Symbolise la prise d'une décision
      irréversible aux conséquences majeures.
    de: Bezieht sich auf Julius Caesars Überquerung des Rubikon im Jahr 49 v. Chr., eine entscheidende
      Handlung, die zum Bürgerkrieg und zu seiner Diktatur führte. Symbolisiert eine unwiderrufliche Entscheidung
      mit weitreichenden Folgen.
    it: Si riferisce al passaggio del fiume Rubicone da parte di Giulio Cesare nel 49 a.C., un atto decisivo
      che portò alla guerra civile e alla sua ascesa come dittatore. Simboleggia una decisione irreversibile
      con conseguenze significative.
    pt: Refere-se à travessia do rio Rubicão por Júlio César em 49 a.C., um ato decisivo que levou à guerra
      civil e à sua ascensão como ditador. Simboliza a tomada de uma decisão irreversível com consequências
      significativas.
    ru: Относится к переходу Юлием Цезарем реки Рубикон в 49 году до н.э., решающему шагу, который привел
      к гражданской войне и его возвышению как диктатора. Символизирует принятие необратимого решения
      с серьезными последствиями.
    ja: 紀元前49年にユリウス・カエサルがルビコン川を渡った決定的な行為を指す。これは内戦を引き起こし、彼が独裁者としての地位を確立した。取り返しのつかない決断と重大な結果を象徴する。
    zh: 指公元前49年尤利乌斯·恺撒渡过卢比孔河这一决定性行动，导致内战并使其成为独裁者。象征做出具有重大后果的不可逆转决定。
    ar: يشير إلى عبور يوليوس قيصر لنهر روبيكون في عام 49 قبل الميلاد، وهو قرار حاسم أدى إلى حرب أهلية
      وصعوده كديكتاتور. يرمز إلى اتخاذ قرار لا رجعة فيه له عواقب كبيرة.
    he: מתייחס לחצייתו של יוליוס קיסר את נהר הרוביקון בשנת 49 לפנה"ס, מעשה מכריע שהוביל למלחמת אזרחים
      ולעלייתו כדיקטטור. מסמל קבלת החלטה בלתי הפיכה עם השלכות משמעותיות.
