    ja: ギリシャ人とトロイア人の間で10年にわたって行われた伝説の戦争。ヘレンの誘拐が発端となり、トロイの木馬の策略で終結した。西洋文学の基礎となる神話。
    zh: 希腊人与特洛伊城之间持续十年的传奇战争，因海伦被劫而起，以木马计告终。是西方文学的奠基神话。
    ar: حرب أسطورية دامت عشر سنوات بين الإغريق ومدينة طروادة، اندلعت بسبب اختطاف هيلين وانتهت بخدعة حصان
