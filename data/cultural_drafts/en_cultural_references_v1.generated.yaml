      not be genuine. It emphasizes the importance of deeper scrutiny.
    es: Un refrán que advierte contra juzgar por las apariencias, ya que las cosas que parecen valiosas
      o atractivas pueden no ser genuinas. Destaca la importancia de un análisis más profundo.
    fr: Un proverbe mettant en garde contre les jugements superficiels, car les choses qui semblent précieuses
      ou attrayantes ne sont pas toujours authentiques. Il souligne l'importance d'un examen plus approfondi.
    de: Ein Sprichwort, das davor warnt, nach dem Schein zu urteilen, da Dinge, die wertvoll oder anziehend
      wirken, nicht immer echt sind. Es betont die Bedeutung einer genaueren Prüfung.
    it: Un proverbio che avverte di non giudicare dalle apparenze, poiché ciò che sembra prezioso o attraente
      potrebbe non essere genuino. Sottolinea l'importanza di un esame più approfondito.
    pt: Um provérbio que adverte contra o julgamento pela aparência, pois as coisas que parecem valiosas
      ou atraentes podem não ser genuínas. Enfatiza a importância de uma análise mais profunda.
    ru: Поговорка, предупреждающая не судить по внешнему виду, так как то, что кажется ценным или привлекательным,
      может оказаться ненастоящим. Подчеркивает важность более глубокого анализа.
    ja: 外見だけで判断してはいけないという格言。価値あるように見えるものや魅力的に見えるものが必ずしも本物ではないことを示す。より深い吟味の重要性を強調する。
    zh: 一句谚语，告诫不要以貌取人，因为看似有价值或吸引人的事物可能并不真实。强调深入审视的重要性。
