- id: en_classical_or_scriptural_allusion_occam_s_razor_797716c7
  language: en
  canonical_reference: Occam’s razor
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Occam's razor
  - Ockham's razor
  - law of parsimony
  - the simplest explanation
  short_explanation: A principle attributed to the medieval philosopher William of Ockham, stating that
    among competing theories, the one with the fewest assumptions should be preferred. It is a foundational
    concept in scientific and philosophical reasoning.
  i18n_explanations:
    en: A principle attributed to the medieval philosopher William of Ockham, stating that among competing
      theories, the one with the fewest assumptions should be preferred. It is a foundational concept
      in scientific and philosophical reasoning.
    es: Principio atribuido al filósofo medieval Guillermo de Ockham, que establece que, entre teorías
      rivales, debe preferirse aquella con menos supuestos. Es un concepto fundamental en el razonamiento
      científico y filosófico.
    fr: Principe attribué au philosophe médiéval Guillaume d'Ockham, selon lequel, parmi des théories
      concurrentes, celle qui repose sur le moins d'hypothèses doit être privilégiée. C'est un concept
      fondamental dans le raisonnement scientifique et philosophique.
    de: Ein Prinzip, das dem mittelalterlichen Philosophen Wilhelm von Ockham zugeschrieben wird, wonach
      von konkurrierenden Theorien diejenige mit den wenigsten Annahmen bevorzugt werden sollte. Es ist
      ein grundlegendes Konzept in wissenschaftlicher und philosophischer Argumentation.
    it: Un principio attribuito al filosofo medievale Guglielmo di Occam, secondo cui, tra teorie concorrenti,
      va preferita quella con il minor numero di assunti. È un concetto fondamentale nel ragionamento
      scientifico e filosofico.
    pt: Princípio atribuído ao filósofo medieval Guilherme de Ockham, segundo o qual, entre teorias concorrentes,
      deve-se preferir aquela com menos pressupostos. É um conceito fundamental no raciocínio científico
      e filosófico.
    ru: Принцип, приписываемый средневековому философу Уильяму Оккаму, согласно которому из конкурирующих
      теорий следует предпочесть ту, которая содержит меньше предположений. Это основополагающее понятие
      в научном и философском мышлении.
    ja: 中世の哲学者ウィリアム・オブ・オッカムに帰せられる原理で、複数の理論がある場合、最も少ない前提で説明できるものを選ぶべきとする考え。科学的および哲学的推論の基礎概念である。
    zh: 归于中世纪哲学家奥卡姆的威廉的原则，指出在多个竞争理论中，应选择假设最少的理论。这是科学和哲学推理的基础概念。
    ar: مبدأ يُنسب إلى الفيلسوف الوسيط ويليام أوف أوكام، ينص على أنه بين النظريات المتنافسة، يجب تفضيل
      تلك التي تحتوي على أقل الافتراضات. هو مفهوم أساسي في التفكير العلمي والفلسفي.
    he: עיקרון המיוחס לפילוסוף התיכוני ויליאם מאוקאם, הקובע כי בין תאוריות מתחרות, יש להעדיף את זו עם
      ההנחות המעטות ביותר. מהווה מושג יסודי בחשיבה מדעית ופילוסופית.
