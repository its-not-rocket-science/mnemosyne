      figure mystérieuse hantant l'Opéra de Paris. Cette expression est largement connue grâce à l'adaptation
      musicale de 1986.
    de: Ein Verweis auf den Roman *Das Phantom der Oper* (1910) von Gaston Leroux, der die Geschichte
      einer geheimnisvollen Gestalt erzählt, die die Pariser Oper heimsucht. Der Ausdruck wurde durch
      das erfolgreiche Musical von 1986 populär.
    it: Riferimento al romanzo di Gaston Leroux del 1910 *Il Fantasma dell'Opera*, che racconta la storia
