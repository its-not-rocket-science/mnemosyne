      vers sa destruction. Symbole du déclin de l'ère de la voile et des thèmes sublimes du romantisme.
    de: Bezieht sich auf J.M.W. Turners Gemälde (1839), das das außer Dienst gestellte Schiff HMS Temeraire
      zeigt, das zu seiner Zerstörung geschleppt wird. Symbolisiert den Niedergang des Zeitalters der
      Segelschifffahrt und die erhabenen Themen der Romantik.
    it: Si riferisce al dipinto di J.M.W. Turner (1839) che ritrae la HMS Temeraire, dismessa, trainata
      verso la sua distruzione. Simboleggia il declino dell'Età della Vela e i temi sublimi del Romanticismo.
    pt: Refere-se à pintura de J.M.W. Turner (1839) que retrata o HMS Temeraire, desativado, sendo rebocado
      para sua destruição. Simboliza o declínio da Era da Vela e os temas sublimes do Romantismo.
    ru: Относится к картине Дж. М. У. Тёрнера (1839), изображающей списанный HMS Temeraire, буксируемый
