- id: en_cultural_reference_watergate_1b6466c6
  language: en
  canonical_reference: Watergate
  reference_type: cultural_reference
  surface_patterns:
  - Watergate
  - the Watergate scandal
  - Watergate affair
  short_explanation: A major political scandal in the United States in the early 1970s, stemming from
    a break-in at the Democratic National Committee headquarters and the subsequent cover-up by the Nixon
    administration. It led to Nixon's resignation and is a symbol of political corruption and investigative
    journalism.
  i18n_explanations:
    en: A major political scandal in the United States in the early 1970s, stemming from a break-in at
      the Democratic National Committee headquarters and the subsequent cover-up by the Nixon administration.
      It led to Nixon's resignation and is a symbol of political corruption and investigative journalism.
    es: Un gran escándalo político en Estados Unidos a principios de los años 1970, originado por un allanamiento
      en la sede del Comité Nacional Demócrata y el encubrimiento posterior por parte de la administración
      Nixon. Provocó la renuncia de Nixon y es un símbolo de corrupción política y periodismo de investigación.
    fr: Un important scandale politique aux États-Unis au début des années 1970, déclenché par un cambriolage
      au siège du Comité national démocrate et la dissimulation qui a suivi par l'administration Nixon.
      Il a conduit à la démission de Nixon et symbolise la corruption politique et le journalisme d'investigation.
    de: Ein großer politischer Skandal in den USA Anfang der 1970er Jahre, ausgelöst durch einen Einbruch
      in das Hauptquartier des Democratic National Committee und die anschließende Vertuschung durch die
      Nixon-Regierung. Er führte zum Rücktritt Nixons und steht für politische Korruption und investigativen
      Journalismus.
    it: Uno scandalo politico di grandi proporzioni negli Stati Uniti all'inizio degli anni 1970, scaturito
      da un'effrazione nella sede del Comitato Nazionale Democratico e dal successivo insabbiamento da
      parte dell'amministrazione Nixon. Portò alle dimissioni di Nixon ed è un simbolo di corruzione politica
      e giornalismo investigativo.
    pt: Um grande escândalo político nos Estados Unidos no início dos anos 1970, originado por um arrombamento
      na sede do Comitê Nacional Democrata e a subsequente ocultação pela administração Nixon. Levou à
      renúncia de Nixon e é um símbolo de corrupção política e jornalismo investigativo.
    ru: Крупный политический скандал в США в начале 1970-х годов, вызванный проникновением в штаб-квартиру
      Национального комитета Демократической партии и последовавшим сокрытием со стороны администрации
      Никсона. Привел к отставке Никсона и стал символом политической коррупции и журналистских расследований.
    ja: 1970年代初頭のアメリカにおける主要な政治スキャンダルで、民主党全国委員会本部への侵入とその後のニクソン政権による隠蔽から発生。ニクソンの辞任につながり、政治腐敗と調査報道の象徴となった。
    zh: 20世纪70年代初美国的一起重大政治丑闻，起因于对民主党全国委员会总部的闯入及尼克松政府的后续掩盖。导致尼克松辞职，成为政治腐败和调查性新闻的象征。
    ar: فضيحة سياسية كبرى في الولايات المتحدة في أوائل السبعينيات، نشأت عن اقتحام مقر اللجنة الوطنية الديمقراطية
      ولاحقًا التستر من قبل إدارة نيكسون. أدى إلى استقالة نيكسون وهو رمز للفساد السياسي والصحافة الاستقصائية.
    he: פרשת מיםgate – פרשיית השחיתות הפוליטית הגדולה בארצות הברית בתחילת שנות ה-1970, שפרצה בעקבות פריצה
      למטה המפלגה הדמוקרטית והסתרתה על ידי ממשל ניקסון. הובילה להתפטרות ניקסון והיא סמל לשחיתות פוליטית
      ועיתונות חוקרת.
