- id: en_cultural_reference_a_wyeth_christina_s_world_d07a6a0f
  language: en
  canonical_reference: A Wyeth Christina's World
  reference_type: cultural_reference
  surface_patterns:
  - Christina's World
  - Wyeth's Christina's World
  - Christina's World painting
  - Andrew Wyeth's Christina's World
  short_explanation: Refers to Andrew Wyeth's iconic 1948 painting depicting a woman lying in a field,
    gazing at a distant farmhouse. Symbolizes themes of isolation, longing, and human resilience.
  i18n_explanations:
    en: Refers to Andrew Wyeth's iconic 1948 painting depicting a woman lying in a field, gazing at a
      distant farmhouse. Symbolizes themes of isolation, longing, and human resilience.
    es: Se refiere a la icónica pintura de Andrew Wyeth de 1948 que muestra a una mujer acostada en un
      campo, mirando una granja lejana. Simboliza el aislamiento, la nostalgia y la resiliencia humana.
    fr: Fait référence au tableau emblématique d'Andrew Wyeth de 1948 représentant une femme allongée
      dans un champ, contemplant une ferme lointaine. Symbolise l'isolement, la nostalgie et la résilience
      humaine.
    de: Bezieht sich auf Wyeths ikonisches Gemälde von 1948, das eine Frau zeigt, die in einem Feld liegt
      und ein entferntes Bauernhaus betrachtet. Symbolisiert Isolation, Sehnsucht und menschliche Widerstandsfähigkeit.
    it: Si riferisce al celebre dipinto di Andrew Wyeth del 1948 che ritrae una donna sdraiata in un campo,
      intenta a osservare una fattoria lontana. Simboleggia isolamento, nostalgia e resilienza umana.
    pt: Refere-se à icônica pintura de Andrew Wyeth de 1948 que retrata uma mulher deitada em um campo,
      olhando para uma fazenda distante. Simboliza isolamento, saudade e resiliência humana.
    ru: Относится к знаковой картине Эндрю Уайета 1948 года, изображающей женщину, лежащую в поле и глядящую
