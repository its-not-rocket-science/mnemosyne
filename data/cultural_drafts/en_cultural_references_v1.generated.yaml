- id: en_cultural_reference_the_trail_of_tears_7bba2eff
  language: en
  canonical_reference: The Trail of Tears
  reference_type: cultural_reference
  surface_patterns:
  - the Trail of Tears
  - Trail of Tears
  - the Trail of Tears (1830–1850)
  short_explanation: Refers to the forced relocation of Native American nations from their ancestral homelands
    in the Southeastern United States to areas west of the Mississippi River, resulting in thousands of
    deaths due to disease, starvation, and exposure. It is a symbol of injustice and suffering in American
    history.
  i18n_explanations:
    en: Refers to the forced relocation of Native American nations from their ancestral homelands in the
      Southeastern United States to areas west of the Mississippi River, resulting in thousands of deaths
      due to disease, starvation, and exposure. It is a symbol of injustice and suffering in American
      history.
    es: Se refiere a la reubicación forzada de naciones nativas americanas desde sus tierras ancestrales
      en el sureste de Estados Unidos hacia zonas al oeste del río Mississippi, causando miles de muertes
      por enfermedades, hambre y exposición. Es un símbolo de injusticia y sufrimiento en la historia
      estadounidense.
    fr: Fait référence à la déportation forcée des nations amérindiennes depuis leurs terres ancestrales
      dans le sud-est des États-Unis vers des régions à l'ouest du Mississippi, entraînant des milliers
      de morts par maladie, famine et exposition. C'est un symbole d'injustice et de souffrance dans l'histoire
      américaine.
    de: Bezieht sich auf die Zwangsumsiedlung nordamerikanischer indigener Völker aus ihren angestammten
      Gebieten im Südosten der USA in Gebiete westlich des Mississippi, die durch Krankheiten, Hunger
      und Kälte zum Tod von Tausenden führte. Es ist ein Symbol für Ungerechtigkeit und Leid in der amerikanischen
      Geschichte.
    it: Si riferisce alla deportazione forzata delle nazioni native americane dalle loro terre ancestrali
      nel sud-est degli Stati Uniti verso aree a ovest del fiume Mississippi, causando migliaia di morti
      per malattie, fame ed esposizione. È un simbolo di ingiustizia e sofferenza nella storia americana.
    pt: Refere-se à remoção forçada de nações nativas americanas de suas terras ancestrais no sudeste
      dos Estados Unidos para áreas a oeste do rio Mississippi, resultando em milhares de mortes por doenças,
      fome e exposição. É um símbolo de injustiça e sofrimento na história americana.
    ru: Относится к насильственному переселению коренных американских народов с их исторических земель
      на юго-востоке США на запад от реки Миссисипи, что привело к гибели тысяч людей из-за болезней,
      голода и холода. Это символ несправедливости и страданий в американской истории.
    ja: アメリカ合衆国南東部の先住民諸国をミシシッピ川以西の地へ強制移住させ、病気、飢餓、寒さにより数千人が死亡した出来事。アメリカ史における不正と苦難の象徴。
    zh: 指的是美国东南部原住民部落被迫迁往密西西比河以西地区，因疾病、饥饿和严寒导致数千人死亡。这是美国历史上不公与苦难的象征。
    ar: يشير إلى الترحيل القسري للشعوب الأمريكية الأصلية من أراضيها الأصلية في جنوب شرق الولايات المتحدة
      إلى مناطق غرب نهر المسيسيبي، مما أدى إلى وفاة آلاف الأشخاص بسبب الأمراض والجوع والتعرض. إنه رمز
      للظلم والمعاناة في التاريخ الأمريكي.
    he: מתייחס לגירוש הכפוי של אומות ילידיות אמריקאיות מאדמותיהן ההיסטוריות בדרום-מזרח ארצות הברית לאזורים
      ממערב לנהר המיסיסיפי, שהביא למותם של אלפים ממחלות, רעב וחשיפה. סמל לאי-צדק וסבל בהיסטוריה האמריקאית.
