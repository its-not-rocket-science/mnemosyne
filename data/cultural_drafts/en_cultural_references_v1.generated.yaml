- id: en_proverb_tradition_a_friend_in_need_is_a_friend_indeed_5bb4cf81
  language: en
  canonical_reference: A friend in need is a friend indeed
  reference_type: proverb_tradition
  surface_patterns:
  - A friend in need is a friend indeed
  - A friend in need is a true friend
  - A friend who helps in need is a real friend
  short_explanation: This proverb means that a true friend is someone who supports you during difficult
    times, not just in good times. It emphasizes the value of loyalty and reliability in friendship.
  i18n_explanations:
    en: This proverb means that a true friend is someone who supports you during difficult times, not
      just in good times. It emphasizes the value of loyalty and reliability in friendship.
    es: Este refrán significa que un verdadero amigo es quien te apoya en los momentos difíciles, no solo
      en los buenos. Destaca el valor de la lealtad y la confiabilidad en la amistad.
    fr: Ce proverbe signifie qu'un vrai ami est celui qui vous soutient dans les moments difficiles, pas
      seulement dans les moments heureux. Il souligne l'importance de la loyauté et de la fiabilité dans
      l'amitié.
    de: Dieses Sprichwort bedeutet, dass ein wahrer Freund jemand ist, der dich in schwierigen Zeiten
      unterstützt, nicht nur in guten. Es betont den Wert von Loyalität und Zuverlässigkeit in einer Freundschaft.
    it: Questo proverbio significa che un vero amico è chi ti sostiene nei momenti difficili, non solo
      in quelli felici. Sottolinea il valore della lealtà e dell'affidabilità nell'amicizia.
    pt: Este provérbio significa que um verdadeiro amigo é aquele que te apoia nos momentos difíceis,
      não apenas nos bons. Enfatiza o valor da lealdade e confiabilidade na amizade.
    ru: Эта пословица означает, что настоящий друг — это тот, кто поддерживает тебя в трудные времена,
      а не только в хорошие. Она подчёркивает ценность верности и надёжности в дружбе.
    ja: このことわざは、真の友人とは困難な時にも支えてくれる人であり、良い時だけではないことを意味します。友情における忠誠心と信頼性の価値を強調します。
    zh: 这句谚语的意思是，真正的朋友是在你困难时支持你的人，而不仅仅是在顺利时。它强调了友谊中忠诚和可靠的价值。
