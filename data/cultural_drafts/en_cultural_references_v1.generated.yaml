  short_explanation: In Greek mythology, Cassandra was cursed to prophesy truth but never be believed.
    The phrase refers to someone whose warnings are ignored despite being accurate.
  i18n_explanations:
    en: In Greek mythology, Cassandra was cursed to prophesy truth but never be believed. The phrase refers
      to someone whose warnings are ignored despite being accurate.
    es: En la mitología griega, Casandra fue maldecida para profetizar la verdad pero nunca ser creída.
      La frase se refiere a alguien cuyas advertencias son ignoradas a pesar de ser precisas.
    fr: Dans la mythologie grecque, Cassandre était maudite pour prophétiser la vérité sans jamais être
      crue. L'expression désigne quelqu'un dont les avertissements sont ignorés malgré leur exactitude.
    de: In der griechischen Mythologie wurde Kassandra verflucht, die Wahrheit zu prophezeien, aber nie
      geglaubt zu werden. Der Ausdruck bezieht sich auf jemanden, dessen Warnungen ignoriert werden, obwohl
      sie zutreffen.
    it: Nella mitologia greca, Cassandra fu condannata a profetizzare la verità ma a non essere mai creduta.
      La frase si riferisce a chi viene ignorato nonostante i suoi avvertimenti siano accurati.
    pt: Na mitologia grega, Cassandra foi amaldiçoada para profetizar a verdade, mas nunca ser acreditada.
