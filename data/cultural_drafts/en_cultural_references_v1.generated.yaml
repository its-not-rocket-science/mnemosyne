- id: en_cultural_reference_break_the_ice_e486b720
  language: en
  canonical_reference: Break the ice
  reference_type: cultural_reference
  surface_patterns:
  - break the ice
  - broke the ice
  - broken the ice
  - to break the ice
  short_explanation: To initiate conversation in a social setting, often to relieve tension. The phrase
    originates from the literal practice of breaking ice on a river to allow ships to pass.
  i18n_explanations:
    en: To initiate conversation in a social setting, often to relieve tension. The phrase originates
      from the literal practice of breaking ice on a river to allow ships to pass.
    es: Iniciar una conversación en un entorno social, a menudo para aliviar la tensión. La expresión
      proviene de la práctica literal de romper el hielo en un río para permitir el paso de barcos.
    fr: Engager la conversation dans un cadre social, souvent pour détendre l'atmosphère. L'expression
      vient de l'action littérale de briser la glace sur une rivière pour permettre le passage des bateaux.
    de: Ein Gespräch in geselliger Runde beginnen, oft um Spannungen abzubauen. Der Ausdruck stammt von
      der wörtlichen Praxis, Eis auf einem Fluss zu brechen, um Schiffen die Passage zu ermöglichen.
    it: Iniziare una conversazione in un contesto sociale, spesso per alleviare la tensione. L'espressione
      deriva dalla pratica letterale di rompere il ghiaccio su un fiume per permettere il passaggio delle
      navi.
    pt: Iniciar uma conversa em um ambiente social, muitas vezes para aliviar a tensão. A expressão vem
      da prática literal de quebrar o gelo em um rio para permitir a passagem de navios.
    ru: Начать разговор в социальной обстановке, чтобы снять напряжение. Фраза возникла из буквальной
      практики ломать лёд на реке, чтобы пропустить корабли.
    ja: 社交の場で会話を始め、緊張をほぐすこと。この表現は、川の氷を割って船を通すという文字通りの行為に由来する。
    zh: 在社交场合开始交谈，通常是为了缓解紧张气氛。此短语源于在河上破冰以便船只通行的字面意思。
    ar: بدء محادثة في موقف اجتماعي، غالبًا لتخفيف التوتر. تأتي العبارة من الممارسة الحرفية لكسر الجليد
      على النهر لتمرير السفن.
    he: ליזום שיחה במצב חברתי, לרוב כדי להקל על המתח. הביטוי נובע מהפעולה המילולית של שבירת קרח בנהר כדי
      לאפשר מעבר ספינות.
