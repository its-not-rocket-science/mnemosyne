    pt: Uma situação em que avisos ou previsões de alguém são ignorados, levando ao desastre. Origina-se
      da mitologia grega, onde Cassandra foi amaldiçoada a profetizar a verdade, mas nunca ser acreditada.
    ru: Ситуация, когда предупреждения или предсказания кого-либо игнорируются, что приводит к катастрофе.
