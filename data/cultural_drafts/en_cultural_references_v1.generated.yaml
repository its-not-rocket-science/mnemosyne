    turned into swans, by weaving shirts from nettles. The story symbolizes perseverance, sacrifice, and
    the power of love.
  i18n_explanations:
    en: A fairy tale by Hans Christian Andersen about a princess who rescues her brothers, turned into
      swans, by weaving shirts from nettles. The story symbolizes perseverance, sacrifice, and the power
      of love.
    es: Un cuento de hadas de Hans Christian Andersen sobre una princesa que rescata a sus hermanos, convertidos
      en cisnes, tejiendo camisas con ortigas. La historia simboliza perseverancia, sacrificio y el poder
      del amor.
    fr: Un conte de fées de Hans Christian Andersen sur une princesse qui sauve ses frères, transformés
      en cygnes, en tissant des chemises avec de l'ortie. L'histoire symbolise la persévérance, le sacrifice
      et la puissance de l'amour.
    de: Ein Märchen von Hans Christian Andersen über eine Prinzessin, die ihre in Schwäne verwandelten
      Brüder rettet, indem sie Hemden aus Brennnesseln webt. Die Geschichte symbolisiert Durchhaltevermögen,
      Opferbereitschaft und die Kraft der Liebe.
    it: Una fiaba di Hans Christian Andersen su una principessa che salva i suoi fratelli, trasformati
      in cigni, tessendo camicie con le ortiche. La storia simboleggia perseveranza, sacrificio e il potere
      dell'amore.
    pt: Um conto de fadas de Hans Christian Andersen sobre uma princesa que resgata seus irmãos, transformados
      em cisnes, tecendo camisas com urtigas. A história simboliza perseverança, sacrifício e o poder
      do amor.
    ru: Сказка Ханса Кристиана Андерсена о принцессе, которая спасает своих братьев, превращённых в лебедей,
