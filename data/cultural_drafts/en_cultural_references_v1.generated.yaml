  short_explanation: A single fatal weakness in otherwise strong or invincible person or thing. The phrase
    originates from the Greek myth of Achilles, whose mother dipped him in the River Styx to make him
    invulnerable, leaving his heel unprotected.
  i18n_explanations:
    en: A single fatal weakness in otherwise strong or invincible person or thing. The phrase originates
      from the Greek myth of Achilles, whose mother dipped him in the River Styx to make him invulnerable,
      leaving his heel unprotected.
    es: Un punto débil fatal en una persona o cosa por lo demás fuerte o invencible. La expresión proviene
      del mito griego de Aquiles, cuya madre lo sumergió en el río Estigia para hacerlo invulnerable,
      dejando su talón desprotegido.
    fr: Une faiblesse fatale unique chez une personne ou une chose autrement forte ou invincible. L'expression
      vient du mythe grec d'Achille, dont la mère le plongea dans le fleuve Styx pour le rendre invulnérable,
      sauf au talon.
    de: Eine einzige tödliche Schwachstelle bei einer ansonsten starken oder unbesiegbaren Person oder
      Sache. Der Ausdruck stammt aus der griechischen Sage von Achilles, dessen Mutter ihn in den Styx
      tauchte, um ihn unverwundbar zu machen – bis auf die Ferse.
    it: Un punto debole fatale in una persona o cosa altrimenti forte o invincibile. L'espressione deriva
      dal mito greco di Achille, la cui madre lo immerse nel fiume Stige per renderlo invulnerabile, lasciando
      solo il tallone scoperto.
    pt: Um ponto fraco fatal em uma pessoa ou coisa de outra forma forte ou invencível. A expressão vem
      do mito grego de Aquiles, cuja mãe o mergulhou no rio Estige para torná-lo invulnerável, exceto
      no calcanhar.
    ru: Единственная смертельная слабость у иначе сильного или неуязвимого человека или предмета. Выражение
      восходит к греческому мифу об Ахилле, мать которого окунула его в реку Стикс, чтобы сделать неуязвимым,
      оставив пятку незащищённой.
    ja: 他の強い者や不死身の者にとっての唯一の致命的な弱点。この表現はギリシャ神話のアキレウスに由来し、母が彼をステュクス川に浸して不死身にしたが、踵だけは守られなかった。
    zh: 原本强大或不可战胜的人或事物的唯一致命弱点。典出希腊神话，阿喀琉斯的母亲将他浸入冥河使其刀枪不入，唯脚踵未被保护。
    ar: نقطة ضعف قاتلة وحيدة في شخص أو شيء قوي أو لا يقهر في العادة. تأتي العبارة من الأسطورة اليونانية
