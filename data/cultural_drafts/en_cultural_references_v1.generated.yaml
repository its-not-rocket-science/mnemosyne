- id: en_cultural_reference_a_seurat_pointillism_665ad090
  language: en
  canonical_reference: A Seurat pointillism
  reference_type: cultural_reference
  surface_patterns:
  - Seurat's pointillism
  - a pointillist style like Seurat
  - pointillism in the manner of Seurat
  - Seurat-esque pointillism
  short_explanation: Refers to the technique of pointillism, pioneered by Georges Seurat (1859–1891),
    a French Neo-Impressionist painter. It involves applying small, distinct dots of color to form an
    image, emphasizing optical mixing of hues.
  i18n_explanations:
    en: Refers to the technique of pointillism, pioneered by Georges Seurat (1859–1891), a French Neo-Impressionist
      painter. It involves applying small, distinct dots of color to form an image, emphasizing optical
      mixing of hues.
    es: Se refiere a la técnica del puntillismo, pionera de Georges Seurat (1859–1891), pintor francés
      neoimpresionista. Consiste en aplicar pequeños puntos de color distintos para formar una imagen,
      destacando la mezcla óptica de tonos.
    fr: Fait référence à la technique du pointillisme, développée par Georges Seurat (1859–1891), peintre
      français néo-impressionniste. Elle consiste à appliquer de petites touches de couleur distinctes
      pour former une image, en mettant l'accent sur le mélange optique des teintes.
    de: Bezieht sich auf die Technik des Pointillismus, die von Georges Seurat (1859–1891), einem französischen
      Neo-Impressionisten, geprägt wurde. Dabei werden kleine, klar abgegrenzte Farbpunkte gesetzt, um
      ein Bild zu erzeugen, wobei die optische Farbmischung betont wird.
    it: Si riferisce alla tecnica del puntinismo, pionieristicamente sviluppata da Georges Seurat (1859–1891),
      pittore francese neoimpressionista. Consiste nell'applicare piccoli punti distinti di colore per
      formare un'immagine, enfatizzando la mescolanza ottica delle sfumature.
    pt: Refere-se à técnica do pontilhismo, pioneiramente desenvolvida por Georges Seurat (1859–1891),
      pintor francês neoimpressionista. Consiste em aplicar pequenos pontos distintos de cor para formar
      uma imagem, enfatizando a mistura óptica de tons.
    ru: Относится к технике пуантилизма, разработанной Жоржем Сёра (1859–1891), французским неоимпрессионистом.
      Она заключается в нанесении мелких, чётко различимых точек цвета для создания изображения, подчеркивая
      оптическое смешение оттенков.
    ja: フランスの新印象派画家ジョルジュ・スーラ（1859–1891）によって確立された点描技法を指す。小さな色点を並べて画像を形成し、色の視覚的混合を強調する手法。
    zh: 指的是由法国新印象派画家乔治·修拉（1859–1891）开创的点画技法。通过使用小而分明的色点组成图像，强调色彩的视觉混合效果。
    ar: يشير إلى تقنية الانطباعية النقطية التي ابتكرها جورج سورا (1859–1891)، الرسام الفرنسي الانطباعي
      الجديد. تتضمن هذه التقنية وضع نقاط صغيرة منفصلة من اللون لتشكيل صورة، مع التركيز على المزج البصري
      للألوان.
    he: מתייחס לטכניקת הפוינטיליזם שפיתח ז'ורז' סרה (1859–1891), צייר צרפתי נאו-אימפרסיוניסט. הטכניקה
      כוללת הנחת נקודות צבע קטנות וברורות ליצירת תמונה, תוך הדגשת ערבוב הצבעים האופטי.
