  short_explanation: A phrase attributed to Admiral David Farragut during the American Civil War, meaning
    to proceed boldly despite obstacles or dangers. It has since become a metaphor for determined action
    in the face of adversity.
  i18n_explanations:
    en: A phrase attributed to Admiral David Farragut during the American Civil War, meaning to proceed
      boldly despite obstacles or dangers. It has since become a metaphor for determined action in the
      face of adversity.
    es: Frase atribuida al almirante David Farragut durante la Guerra Civil estadounidense, que significa
      avanzar con audacia a pesar de los obstáculos o peligros. Desde entonces se ha convertido en una
      metáfora de acción decidida ante la adversidad.
    fr: Phrase attribuée à l'amiral David Farragut pendant la guerre de Sécession américaine, signifiant
      avancer avec audace malgré les obstacles ou les dangers. Elle est devenue depuis une métaphore d'action
      déterminée face à l'adversité.
    de: Ein Ausspruch, der Admiral David Farragut während des Amerikanischen Bürgerkriegs zugeschrieben
      wird und bedeutet, trotz Hindernissen oder Gefahren mutig voranzuschreiten. Seitdem ist es eine
      Metapher für entschlossenes Handeln angesichts von Widrigkeiten.
    it: Frase attribuita all'ammiraglio David Farragut durante la guerra civile americana, che significa
      procedere con audacia nonostante gli ostacoli o i pericoli. Da allora è diventata una metafora di
      azione determinata di fronte all'avversità.
    pt: Frase atribuída ao almirante David Farragut durante a Guerra Civil Americana, significando prosseguir
      com ousadia apesar de obstáculos ou perigos. Desde então, tornou-se uma metáfora de ação determinada
      diante da adversidade.
    ru: Фраза, приписываемая адмиралу Дэвиду Фаррагуту во время Гражданской войны в США, означающая смелое
      продолжение действий несмотря на препятствия или опасности. С тех пор она стала метафорой решительных
      действий перед лицом трудностей.
    ja: 南北戦争中のアメリカ海軍提督デイヴィッド・ファラガットの言葉で、障害や危険にもかかわらず勇敢に前進せよという意味。その後、逆境に立ち向かう決意ある行動の比喩となった。
    zh: 一句据说出自美国南北战争时期海军上将戴维·法拉格特之口的话，意思是不顾障碍或危险勇往直前。此后成为面对逆境时坚定行动的隐喻。
    ar: عبارة نسبت إلى الأدميرال ديفيد فاراغوت خلال الحرب الأهلية الأمريكية، وتعني المضي قدمًا بشجاعة
