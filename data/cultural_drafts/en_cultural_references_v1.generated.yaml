  short_explanation: A reference to the myth of Sisyphus, who was punished in the underworld by being
    forced to roll a boulder up a hill, only for it to roll back down each time, making his task endless.
    It symbolizes futile or repetitive effort.
  i18n_explanations:
    en: A reference to the myth of Sisyphus, who was punished in the underworld by being forced to roll
      a boulder up a hill, only for it to roll back down each time, making his task endless. It symbolizes
      futile or repetitive effort.
    es: Referencia al mito de Sísifo, quien fue castigado en el inframundo a empujar una roca cuesta arriba,
      solo para que rodara de vuelta cada vez, haciendo su tarea interminable. Simboliza el esfuerzo vano
      o repetitivo.
    fr: Référence au mythe de Sisyphe, condamné dans les enfers à pousser éternellement un rocher en haut
      d'une colline, pour le voir redescendre à chaque fois. Elle symbolise l'effort vain ou répétitif.
    de: Eine Anspielung auf den Mythos des Sisyphos, der in der Unterwelt dazu verurteilt war, einen Felsen
      einen Hügel hinaufzurollen, der jedoch jedes Mal wieder hinabrollte, wodurch seine Aufgabe endlos
      wurde. Sie steht für vergebliche oder sich wiederholende Mühe.
    it: Riferimento al mito di Sisifo, condannato negli inferi a spingere eternamente un masso su per
      una collina, solo per vederlo rotolare di nuovo giù ogni volta. Simboleggia lo sforzo vano o ripetitivo.
    pt: Referência ao mito de Sísifo, condenado no submundo a empurrar eternamente uma pedra morro acima,
      só para vê-la rolar de volta cada vez, tornando sua tarefa interminável. Simboliza o esforço vão
      ou repetitivo.
    ru: Отсылка к мифу о Сизифе, который в подземном мире был обречён вечно катить вверх по холму огромный
      камень, который каждый раз скатывался обратно. Символизирует тщетные или повторяющиеся усилия.
    ja: シジフォスの神話的な象徴。冥界で巨石を丘の上まで転がし続ける罰を受けましたが、常に転がり落ち、永遠に終わらない作業となりました。無駄な努力や繰り返しの労力を象徴しています。
    zh: 对西西弗斯神话的典故。他在冥界被判永远推一块巨石上山，每次巨石滚下，任务无尽。象征徒劳或重复的努力。
    ar: إشارة إلى أسطورة سيزيف، الذي عوقب في العالم السفلي بدفع صخرة إلى أعلى تلة، لتعود وتنزل في كل مرة،
