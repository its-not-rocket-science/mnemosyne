      oft genutzt, um Loyalität zur Familie gegenüber Freunden oder Außenstehenden zu rechtfertigen.
    it: Un proverbio che sottolinea come i legami familiari siano più forti di altre relazioni. Spesso
      usato per giustificare la lealtà verso la famiglia piuttosto che verso amici o estranei.
    pt: Um provérbio que enfatiza que os laços familiares são mais fortes do que outras relações. Muitas
      vezes usado para justificar lealdade à família em detrimento de amigos ou estranhos.
    ru: Поговорка, подчеркивающая, что семейные узы крепче других отношений. Часто используется для оправдания
      преданности семье в ущерб друзьям или посторонним.
    ja: 家族の絆は他の関係よりも強いという諺。友人や他人よりも家族への忠誠を正当化する際に用いられる。
    zh: 强调家族纽带比其他关系更牢固的谚语。常用于为对家人而非朋友或外人的忠诚辩护。
