    ja: 重くて逃れられない呪いや責任。この表現は、サミュエル・テイラー・コールリッジの詩「老水夫行」に由来し、そこで船乗りがアホウドリを殺した罰を受ける。
    zh: 一个沉重而无法摆脱的诅咒或责任。源自萨缪尔·泰勒·柯勒律治的诗作《老水手谣》，其中一名水手因杀死信天翁而受到惩罚。
    ar: لعنة أو مسؤولية ثقيلة لا مفر منها. تأتي العبارة من قصيدة صموئيل تايلور كوليردج 'أنشودة البحار
