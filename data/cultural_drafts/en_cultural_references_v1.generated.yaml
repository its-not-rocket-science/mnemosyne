- id: en_proverb_tradition_let_the_cat_out_of_the_bag_5d1d6c1d
  language: en
  canonical_reference: Let the cat out of the bag
  reference_type: proverb_tradition
  surface_patterns:
  - Let the cat out of the bag
  - Let the cat out
  - To let the cat out of the bag
  - The cat is out of the bag
  short_explanation: To reveal a secret or disclose information that was meant to be kept hidden. The
    phrase may originate from medieval markets where dishonest traders sold cats in bags as piglets.
  i18n_explanations:
    en: To reveal a secret or disclose information that was meant to be kept hidden. The phrase may originate
      from medieval markets where dishonest traders sold cats in bags as piglets.
    es: Revelar un secreto o divulgar información que debía mantenerse oculta. La expresión puede provenir
      de mercados medievales donde comerciantes deshonestos vendían gatos en bolsas como si fueran lechones.
    fr: Révéler un secret ou divulguer une information qui devait rester cachée. L'expression pourrait
      venir des marchés médiévaux où des marchands malhonnêtes vendaient des chats dans des sacs en prétendant
      qu'il s'agissait de porcelets.
    de: Ein Geheimnis verraten oder Informationen preisgeben, die verborgen bleiben sollten. Der Ausdruck
      stammt möglicherweise aus mittelalterlichen Märkten, wo unehrliche Händler Katzen in Säcken als
      Ferkel verkauften.
    it: Rivelare un segreto o divulgare informazioni che dovevano restare nascoste. L'espressione potrebbe
      derivare dai mercati medievali, dove commercianti disonesti vendevano gatti in sacchi spacciandoli
      per maialini.
    pt: Revelar um segredo ou divulgar informações que deveriam permanecer ocultas. A expressão pode ter
      origem em mercados medievais onde comerciantes desonestos vendiam gatos em sacos como se fossem
      leitões.
    ru: Разгласить секрет или раскрыть информацию, которую следовало хранить в тайне. Выражение, возможно,
      возникло на средневековых рынках, где нечестные торговцы продавали кошек в мешках под видом поросят.
    ja: 隠すべき情報や秘密を明かすこと。中世の市場で、不正直な商人が子豚と偽って猫を袋に入れて売っていたことに由来すると言われています。
    zh: 泄露本应保密的信息或秘密。该短语可能源于中世纪市场，不诚实的商贩将猫装在袋子里冒充小猪出售。
    ar: إفشاء سر أو الكشف عن معلومات كان من المفترض إبقاؤها سرية. قد تأتي العبارة من أسواق القرون الوسطى،
      حيث كان التجار غير النزيهون يبيعون القطط في أكياس على أنها خنازير صغيرة.
    he: לגלות סוד או למוסר מידע שהיה אמור להישאר חסוי. הביטוי עשוי לנבוע משווקים מימי הביניים, שבהם סוחרים
      לא ישרים מכרו חתולים בשקים כחבילות חזירים.
