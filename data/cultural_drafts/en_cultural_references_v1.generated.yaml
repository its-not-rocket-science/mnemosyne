- id: en_proverb_tradition_a_fool_and_his_money_are_soon_parted_bb26b574
  language: en
  canonical_reference: A fool and his money are soon parted
  reference_type: proverb_tradition
  surface_patterns:
  - A fool and his money are soon parted
  - Fools and their money are soon parted
  - A fool and his money are parted quickly
  - A fool's money is soon parted
  short_explanation: This proverb warns that foolish or reckless people tend to lose their money quickly,
    often due to poor decisions or being easily deceived. It serves as a caution against financial irresponsibility.
  i18n_explanations:
    en: This proverb warns that foolish or reckless people tend to lose their money quickly, often due
      to poor decisions or being easily deceived. It serves as a caution against financial irresponsibility.
    es: Este refrán advierte que las personas necias o imprudentes suelen perder su dinero rápidamente,
      a menudo por malas decisiones o ser fácilmente engañadas. Sirve como advertencia contra la irresponsabilidad
      financiera.
    fr: Ce proverbe met en garde contre le fait que les personnes naïves ou imprudentes perdent souvent
      leur argent rapidement, souvent à cause de mauvaises décisions ou d'être facilement dupées. Il sert
      d'avertissement contre l'irresponsabilité financière.
    de: Dieses Sprichwort warnt davor, dass törichte oder leichtsinnige Menschen ihr Geld schnell verlieren,
      oft aufgrund schlechter Entscheidungen oder weil sie sich leicht täuschen lassen. Es dient als Warnung
      vor finanzieller Verantwortungslosigkeit.
    it: Questo proverbio avverte che le persone sciocche o sconsiderate tendono a perdere i loro soldi
      rapidamente, spesso a causa di cattive decisioni o di essere facilmente ingannate. Serve come monito
      contro l'irresponsabilità finanziaria.
    pt: Este provérbio alerta que pessoas tolas ou imprudentes tendem a perder seu dinheiro rapidamente,
      muitas vezes por más decisões ou por serem facilmente enganadas. Serve como um aviso contra a irresponsabilidade
      financeira.
    ru: Эта пословица предупреждает, что глупые или неосторожные люди быстро теряют свои деньги, часто
      из-за плохих решений или легкой доверчивости. Она служит предостережением от финансовой безответственности.
    ja: このことわざは、愚かな人や無謀な人がしばしばすぐに金を失うことを警告します。しばしば悪い決断や簡単にだまされることが原因です。金銭的な無責任さへの戒めです。
    zh: 这句谚语告诫说，愚蠢或鲁莽的人往往会很快失去金钱，通常是由于糟糕的决策或容易受骗。它提醒人们要避免财务上的不负责任。
    ar: هذا المثل يحذر من أن الأشخاص السذج أو المتهورين يميلون إلى فقدان أموالهم بسرعة، غالبًا بسبب قرارات
      سيئة أو سهولة خداعهم. يعمل كتحذير من عدم المسؤولية المالية.
    he: פתגם זה מזהיר שאנשים טיפשים או פזיזים נוטים לאבד את כספם במהירות, לעיתים קרובות בשל החלטות גרועות
      או היותם ניתנים להולכה שולל. משמש כאזהרה מפני חוסר אחריות כלכלית.
