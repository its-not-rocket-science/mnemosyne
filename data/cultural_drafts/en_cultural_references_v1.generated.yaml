- id: en_cultural_reference_fifth_column_cccfd75c
  language: en
  canonical_reference: Fifth column
  reference_type: cultural_reference
  surface_patterns:
  - fifth column
  - the fifth column
  - fifth columnists
  - fifth column activity
  short_explanation: Coined during the Spanish Civil War (1936–1939) to describe secret sympathizers or
    traitors working within a country to undermine it. It now refers to any subversive group within an
    organization or nation.
  i18n_explanations:
    en: Coined during the Spanish Civil War (1936–1939) to describe secret sympathizers or traitors working
      within a country to undermine it. It now refers to any subversive group within an organization or
      nation.
    es: Acuñado durante la Guerra Civil Española (1936–1939) para describir a simpatizantes o traidores
      secretos que actúan dentro de un país para socavarlo. Hoy se refiere a cualquier grupo subversivo
      dentro de una organización o nación.
    fr: Inventé pendant la guerre civile espagnole (1936–1939) pour décrire des sympathisants ou traîtres
      agissant secrètement au sein d’un pays pour le saper. Désigne aujourd’hui tout groupe subversif
      infiltré dans une organisation ou une nation.
    de: Prägte während des Spanischen Bürgerkriegs (1936–1939) den Begriff für geheime Sympathisanten
      oder Verräter, die innerhalb eines Landes zu dessen Untergrabung arbeiten. Heute bezeichnet es jede
      subversive Gruppe innerhalb einer Organisation oder Nation.
    it: Coniato durante la guerra civile spagnola (1936–1939) per descrivere simpatizzanti o traditori
      segreti che operano all'interno di un paese per minarlo. Oggi si riferisce a qualsiasi gruppo sovversivo
      all'interno di un'organizzazione o nazione.
    pt: Cunhado durante a Guerra Civil Espanhola (1936–1939) para descrever simpatizantes ou traidores
      secretos que atuam dentro de um país para miná-lo. Hoje refere-se a qualquer grupo subversivo dentro
      de uma organização ou nação.
    ru: Впервые использовано во время Гражданской войны в Испании (1936–1939) для описания тайных сторонников
      или предателей, действующих внутри страны, чтобы её подорвать. Сегодня термин относится к любой
      подрывной группе внутри организации или государства.
    ja: スペイン内戦（1936–1939年）で生まれた言葉で、国内で活動する秘密の支持者や裏切り者を指す。今日では、組織や国家内のあらゆる破壊活動グループを指す。
    zh: 源于西班牙内战（1936–1939年），用于描述在国内秘密活动以颠覆国家的同情者或叛徒。如今泛指任何组织或国家内部的颠覆性团体。
    ar: مصطلح صاغ خلال الحرب الأهلية الإسبانية (1936–1939) لوصف متعاطفين سريين أو خونة يعملون داخل بلد
      ما لتقويضه. الآن يشير إلى أي جماعة تخريبية داخل منظمة أو أمة.
    he: נטבע במהלך מלחמת האזרחים בספרד (1936–1939) לתיאור תומכים סמויים או בוגדים הפועלים בתוך מדינה כדי
