  - Wherefore art thou Romeo?
  - O Romeo, Romeo, wherefore art thou Romeo?
  - Wherefore art thou, Romeo?
  short_explanation: A famous line from Romeo and Juliet where Juliet laments Romeo's name and family,
    questioning why he must be a Montague. It is often misinterpreted as asking where Romeo is, but 'wherefore'
    means 'why.'
  i18n_explanations:
    en: A famous line from Romeo and Juliet where Juliet laments Romeo's name and family, questioning
      why he must be a Montague. It is often misinterpreted as asking where Romeo is, but 'wherefore'
      means 'why.'
    es: Una famosa línea de Romeo y Julieta donde Julieta se lamenta del nombre y la familia de Romeo,
      cuestionando por qué debe ser un Montesco. A menudo se malinterpreta como preguntando dónde está
      Romeo, pero 'wherefore' significa 'por qué'.
    fr: Une réplique célèbre de Roméo et Juliette où Juliette se lamente du nom et de la famille de Roméo,
      se demandant pourquoi il doit être un Montaigu. On l'interprète souvent à tort comme une question
      sur l'endroit où se trouve Roméo, mais 'wherefore' signifie 'pourquoi'.
    de: Ein berühmter Vers aus Romeo und Julia, in dem Julia über Romeos Namen und Familie klagt und fragt,
      warum er ein Montague sein muss. Oft wird fälschlicherweise angenommen, sie frage nach seinem Aufenthaltsort,
      doch 'wherefore' bedeutet 'warum'.
    it: Una famosa battuta di Romeo e Giulietta in cui Giulietta si lamenta del nome e della famiglia
      di Romeo, chiedendosi perché debba essere un Montecchi. Spesso viene erroneamente interpretata come
      una domanda sul dove si trovi Romeo, ma 'wherefore' significa 'perché'.
    pt: Uma famosa linha de Romeu e Julieta onde Julieta lamenta o nome e a família de Romeu, questionando
      por que ele deve ser um Montéquio. Muitas vezes é mal interpretada como perguntando onde Romeu está,
      mas 'wherefore' significa 'por que'.
    ru: Знаменитая строка из «Ромео и Джульетты», где Джульетта сетует на имя и семью Ромео, вопрошая,
      почему он должен быть Монтекки. Часто ошибочно принимается за вопрос о том, где находится Ромео,
      но 'wherefore' означает 'почему'.
    ja: ロミオとジュリエットの有名なセリフで、ジュリエットがロミオの姓と家柄を嘆き、なぜモンタギューでなければならないのかと問うもの。しばしばロミオの居場所を尋ねていると誤解されるが、「wherefore」は「なぜ」を意味する。
    zh: 《罗密欧与朱丽叶》中著名的一句台词，朱丽叶哀叹罗密欧的姓氏和家族，质问他为何必须是蒙太古。常被误解为问罗密欧在哪里，但'wherefore'意为'为什么'。
    ar: سطر مشهور من روميو وجولييت حيث تتساءل جولييت عن اسم روميو وعائلته، متسائلة لماذا يجب أن يكون من
      عائلة مونتيغي. غالبًا ما يُساء فهمها على أنها تسأل عن مكان روميو، لكن 'wherefore' تعني 'لماذا'.
    he: שורה מפורסמת מרומיאו ויוליה שבה יוליה מתאבלת על שמו ומשפחתו של רומיאו, ושואלת מדוע הוא חייב להיות
      מונטגיו. לעיתים קרובות מפרשים אותה בטעות כשאלה היכן רומיאו נמצא, אך 'wherefore' פירושו 'מדוע'.
