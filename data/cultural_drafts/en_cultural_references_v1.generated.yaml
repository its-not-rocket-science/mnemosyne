- id: en_proverb_tradition_cry_wolf_224cf114
  language: en
  canonical_reference: Cry wolf
  reference_type: proverb_tradition
  surface_patterns:
  - cry wolf
  - cried wolf
  - crying wolf
  short_explanation: To raise a false alarm, often leading to disbelief in future warnings. The phrase
    comes from Aesop's fable where a shepherd boy repeatedly tricks villagers into thinking a wolf is
    attacking his flock, until a real wolf appears and no one believes him.
  i18n_explanations:
    en: To raise a false alarm, often leading to disbelief in future warnings. The phrase comes from Aesop's
      fable where a shepherd boy repeatedly tricks villagers into thinking a wolf is attacking his flock,
      until a real wolf appears and no one believes him.
    es: Dar una falsa alarma, lo que suele llevar a que no se crea en futuras advertencias. La expresión
      proviene de una fábula de Esopo en la que un pastor engaña repetidamente a los aldeanos haciendo
      creer que un lobo ataca a su rebaño, hasta que aparece un lobo real y nadie le cree.
    fr: Donner une fausse alerte, ce qui conduit souvent à ce que l'on ne croie plus aux avertissements
      ultérieurs. L'expression vient d'une fable d'Ésope où un berger trompe les villageois en leur faisant
      croire qu'un loup attaque son troupeau, jusqu'à ce qu'un vrai loup apparaisse et que plus personne
      ne le croie.
    de: Einen falschen Alarm auslösen, was oft dazu führt, dass spätere Warnungen nicht mehr ernst genommen
      werden. Der Ausdruck stammt aus einer Fabel des Äsop, in der ein Hirtenjunge die Dorfbewohner wiederholt
      glauben lässt, ein Wolf greife seine Herde an, bis ein echter Wolf kommt und niemand ihm mehr glaubt.
    it: Lanciare un falso allarme, portando spesso a non credere a future avvertimenti. L'espressione
      deriva da una favola di Esopo in cui un pastore inganna ripetutamente i paesani facendo loro credere
      che un lupo attacchi il suo gregge, finché non appare un lupo vero e nessuno gli crede.
    pt: Dar um falso alarme, muitas vezes levando a que não se acredite em futuros avisos. A expressão
      vem de uma fábula de Esopo em que um pastor engana repetidamente os aldeões fazendo-os acreditar
      que um lobo ataca seu rebanho, até que um lobo de verdade aparece e ninguém acredita nele.
    ru: Поднимать ложную тревогу, что часто приводит к недоверию к последующим предупреждениям. Выражение
      восходит к басне Эзопа, где пастушок обманывает жителей деревни, заставляя их думать, что на его
      отару нападает волк, пока не появляется настоящий волк и ему больше не верят.
    ja: 偽の警報を発することで、その後の警告が信じられなくなること。この表現はイソップ寓話に由来し、羊飼いの少年が村人を騙して自分の羊の群れを狼が襲っていると思わせ、本物の狼が現れても誰も信じなくなるという話に基づいています。
    zh: 发出虚假警报，通常导致人们不再相信未来的警告。此短语源于伊索寓言，讲述一个牧童反复欺骗村民，让他们认为狼在袭击他的羊群，直到真正的狼出现时，却无人相信他。
    ar: إطلاق إنذار كاذب، مما يؤدي غالبًا إلى عدم تصديق التحذيرات المستقبلية. تأتي العبارة من قصة إيسوب
      حيث يخدع راعي غنم القرويين مرارًا باتهام ذئب بمهاجمة قطيعه، حتى يظهر ذئب حقيقي ولا يصدقه أحد.
    he: להשמיע אזעקה כוזבת, מה שגורם לאי-אמון באזהרות עתידיות. הביטוי מגיע ממשל של איזופוס בו רועה צאן
      מרמה שוב ושוב את אנשי הכפר לחשוב שזאב תוקף את עדרו, עד שזאב אמיתי מופיע ואף אחד לא מאמין לו.
