- id: en_literary_reference_a_camus_existential_angst_d04ace83
  language: en
  canonical_reference: A Camus existential angst
  reference_type: literary_reference
  surface_patterns:
  - Camus's existential angst
  - existential angst
  - Camus angst
  - Camus existentialism
  short_explanation: Refers to the philosophical anxiety and absurdity central to Albert Camus's works,
    particularly 'The Stranger' and 'The Myth of Sisyphus'. Camus explores the human condition in a godless
    universe, emphasizing the tension between meaning-seeking and the universe's indifference.
  i18n_explanations:
    en: Refers to the philosophical anxiety and absurdity central to Albert Camus's works, particularly
      'The Stranger' and 'The Myth of Sisyphus'. Camus explores the human condition in a godless universe,
      emphasizing the tension between meaning-seeking and the universe's indifference.
    es: Se refiere a la angustia filosófica y el absurdo centrales en las obras de Albert Camus, especialmente
      'El extranjero' y 'El mito de Sísifo'. Camus explora la condición humana en un universo sin Dios,
      destacando la tensión entre la búsqueda de sentido y la indiferencia del universo.
    fr: Fait référence à l'angoisse philosophique et à l'absurdité au cœur des œuvres d'Albert Camus,
      notamment 'L'Étranger' et 'Le Mythe de Sisyphe'. Camus explore la condition humaine dans un univers
      sans Dieu, soulignant la tension entre la quête de sens et l'indifférence de l'univers.
    de: Bezieht sich auf die philosophische Angst und Absurdität, die Albert Camus' Werk prägen, insbesondere
      'Der Fremde' und 'Der Mythos des Sisyphos'. Camus untersucht die menschliche Existenz in einem gottlosen
      Universum und betont die Spannung zwischen Sinnsuche und universeller Gleichgültigkeit.
    it: Si riferisce all'angoscia filosofica e all'assurdità centrali nelle opere di Albert Camus, in
      particolare 'Lo straniero' e 'Il mito di Sisifo'. Camus esplora la condizione umana in un universo
      senza Dio, sottolineando la tensione tra la ricerca di significato e l'indifferenza dell'universo.
    pt: Refere-se à angústia filosófica e ao absurdo centrais nas obras de Albert Camus, especialmente
      'O Estrangeiro' e 'O Mito de Sísifo'. Camus explora a condição humana em um universo sem Deus, enfatizando
      a tensão entre a busca por sentido e a indiferença do universo.
    ru: Относится к философской тревоге и абсурду, центральным в произведениях Альбера Камю, особенно
      'Посторонний' и 'Миф о Сизифе'. Камю исследует человеческое существование в безбожной вселенной,
      подчеркивая напряжение между поиском смысла и равнодушием вселенной.
    ja: アルベール・カミュの作品、特に「異邦人」や「シジフォスの神話」における中心的な哲学的不安と不条理を指す。カミュは神のいない宇宙における人間の状態を探求し、意味の探求と宇宙の無関心との緊張を強調する。
    zh: 指阿尔贝·加缪作品中核心的哲学焦虑与荒诞，尤以《局外人》和《西西弗神话》为代表。加缪探讨在无神宇宙中的人类境况，强调寻求意义与宇宙冷漠之间的张力。
    ar: يشير إلى القلق الوجودي والعبث المركزيين في أعمال ألبير كامو، لا سيما 'الغريب' و'أسطورة سيزيف'.
      يستكشف كامو الحالة الإنسانية في كون بلا إله، مؤكدًا التوتر بين البحث عن المعنى ولامبالاة الكون.
    he: מתייחס לחרדת הקיום והאבסורד המרכזיים ביצירותיו של אלבר קאמי, במיוחד ב'הזר' וב'מיתוס סיזיפוס'.
      קאמי חוקר את מצב האדם ביקום חסר אלוהים, ומדגיש את המתח בין חיפוש משמעות לאדישות היקום.
