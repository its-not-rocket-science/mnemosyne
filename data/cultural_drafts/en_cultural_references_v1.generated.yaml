  short_explanation: Refers to Michelangelo's 1498-1499 marble sculpture depicting the Virgin Mary holding
    the dead body of Jesus. Symbolizes grief, compassion, and the Renaissance mastery of sculpture.
  i18n_explanations:
    en: Refers to Michelangelo's 1498-1499 marble sculpture depicting the Virgin Mary holding the dead
      body of Jesus. Symbolizes grief, compassion, and the Renaissance mastery of sculpture.
    es: Se refiere a la escultura de mármol de Miguel Ángel de 1498-1499 que representa a la Virgen María
      sosteniendo el cuerpo muerto de Jesús. Simboliza el dolor, la compasión y el dominio renacentista
      de la escultura.
    fr: Fait référence à la sculpture en marbre de Michel-Ange de 1498-1499 représentant la Vierge Marie
      tenant le corps mort de Jésus. Symbolise le chagrin, la compassion et la maîtrise de la sculpture
      de la Renaissance.
    de: Bezieht sich auf Michelangelos Marmorskulptur von 1498-1499, die die Jungfrau Maria mit dem toten
      Körper Jesu zeigt. Symbolisiert Trauer, Mitgefühl und die meisterhafte Beherrschung der Bildhauerkunst
      in der Renaissance.
    it: Si riferisce alla scultura in marmo di Michelangelo del 1498-1499 che ritrae la Vergine Maria
      che sostiene il corpo morto di Gesù. Simboleggia dolore, compassione e la maestria rinascimentale
      nella scultura.
    pt: Refere-se à escultura de mármore de Michelangelo de 1498-1499 que retrata a Virgem Maria segurando
      o corpo morto de Jesus. Simboliza luto, compaixão e a maestria renascentista na escultura.
    ru: Относится к мраморной скульптуре Микеланджело 1498-1499 годов, изображающей Деву Марию, держащую
      мёртвое тело Иисуса. Символизирует скорбь, сострадание и мастерство скульптуры эпохи Возрождения.
    ja: ミケランジェロの1498-1499年の大理石彫刻で、聖母マリアが死んだイエスの体を抱える様子を描く。悲しみ、慈悲、ルネサンス彫刻の傑作を象徴する。
    zh: 指的是米开朗基罗1498-1499年的大理石雕塑，描绘圣母玛利亚抱着死去的耶稣。象征悲伤、怜悯与文艺复兴时期雕塑的精湛技艺。
    ar: يشير إلى تمثال الرخام لميكلانجيلو (1498-1499) الذي يصور السيدة العذراء ممسكة بجثة يسوع الميت.
      يرمز إلى الحزن، الرحمة، وإتقان النحت في عصر النهضة.
    he: מתייחס לפסלו של מיכלאנג'לו משנת 1498-1499, המציג את מרים הבתולה אוחזת בגופת ישו המת. מסמל צער,
      חמלה ומיומנות הרנסאנס בפיסול.
