  - portrait by Holbein
  short_explanation: Refers to the meticulous, highly detailed portraits by Hans Holbein the Younger,
    such as 'The Ambassadors' (1533), known for their realism, symbolism, and influence on Tudor-era portraiture.
  i18n_explanations:
    en: Refers to the meticulous, highly detailed portraits by Hans Holbein the Younger, such as 'The
      Ambassadors' (1533), known for their realism, symbolism, and influence on Tudor-era portraiture.
    es: Se refiere a los retratos meticulosos y altamente detallados de Hans Holbein el Joven, como 'Los
      embajadores' (1533), conocidos por su realismo, simbolismo e influencia en la pintura de retratos
      de la era Tudor.
    fr: Fait référence aux portraits méticuleux et très détaillés de Hans Holbein le Jeune, comme 'Les
      Ambassadeurs' (1533), reconnus pour leur réalisme, leur symbolisme et leur influence sur le portrait
      à l'époque Tudor.
    de: Bezieht sich auf die akribischen, hochdetaillierten Porträts von Hans Holbein dem Jüngeren, wie
      'Die Gesandten' (1533), die für ihren Realismus, Symbolik und Einfluss auf die Porträtmalerei der
      Tudor-Zeit bekannt sind.
    it: Si riferisce ai ritratti meticolosi e altamente dettagliati di Hans Holbein il Giovane, come 'Gli
      ambasciatori' (1533), noti per il loro realismo, simbolismo e influenza sulla ritrattistica dell'epoca
      Tudor.
    pt: Refere-se aos retratos meticulosos e altamente detalhados de Hans Holbein, o Jovem, como 'Os Embaixadores'
      (1533), conhecidos por seu realismo, simbolismo e influência na retratística da era Tudor.
    ru: Относится к тщательно проработанным, высокодетализированным портретам Ганса Гольбейна Младшего,
      таким как 'Послы' (1533), известным своим реализмом, символизмом и влиянием на портретную живопись
      эпохи Тюдоров.
    ja: ハンス・ホルバイン（子）の緻密で非常に詳細な肖像画、「大使たち」（1533年）などを指し、その写実性、象徴性、テューダー時代の肖像画への影響で知られる。
    zh: 指的是小汉斯·霍尔拜因的精细且高度详尽的肖像画，如《大使们》（1533年），以其写实性、象征意义以及对都铎王朝时期肖像画的影响而闻名。
    ar: يشير إلى الصور الشخصية الدقيقة والمفصلة للغاية لهانس هولباين الأصغر، مثل 'السفراء' (1533)، المعروفة
