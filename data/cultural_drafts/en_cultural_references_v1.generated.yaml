- id: en_classical_or_scriptural_allusion_a_trojan_horse_e8203013
  language: en
  canonical_reference: a Trojan horse
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - a Trojan horse
  - Trojan horse
  - the Trojan horse
  short_explanation: A deceptive gift or strategy that appears harmless but contains a hidden threat.
    It originates from the ancient Greek story of the Trojan War, where the Greeks hid soldiers inside
    a giant wooden horse to infiltrate Troy.
  i18n_explanations:
    en: A deceptive gift or strategy that appears harmless but contains a hidden threat. It originates
      from the ancient Greek story of the Trojan War, where the Greeks hid soldiers inside a giant wooden
      horse to infiltrate Troy.
    es: Un regalo o estrategia engañosa que parece inofensivo pero contiene una amenaza oculta. Proviene
      de la antigua historia griega de la guerra de Troya, donde los griegos escondieron soldados dentro
      de un enorme caballo de madera para infiltrarse en Troya.
    fr: Un cadeau ou une stratégie trompeuse qui semble inoffensive mais cache une menace. Elle vient
      de l'histoire grecque antique de la guerre de Troie, où les Grecs cachèrent des soldats dans un
      immense cheval de bois pour infiltrer Troie.
    de: Ein scheinbar harmloses Geschenk oder eine Strategie, das bzw. die eine verborgene Bedrohung enthält.
      Der Begriff stammt aus der antiken griechischen Sage vom Trojanischen Krieg, bei dem die Griechen
      Soldaten in einem hölzernen Pferd versteckten, um Troja zu infiltrieren.
    it: Un dono o una strategia ingannevole che sembra innocua ma nasconde una minaccia. Deriva dall'antica
      storia greca della guerra di Troia, in cui i Greci nascosero soldati dentro un enorme cavallo di
      legno per infiltrarsi a Troia.
    pt: Um presente ou estratégia enganosa que parece inofensivo, mas contém uma ameaça oculta. Origina-se
      da antiga história grega da Guerra de Troia, onde os gregos esconderam soldados dentro de um enorme
      cavalo de madeira para infiltrar-se em Troia.
    ru: Обманчивый подарок или стратегия, которая кажется безобидной, но содержит скрытую угрозу. Происходит
      из древнегреческого мифа о Троянской войне, где греки спрятали солдат внутри огромного деревянного
      коня, чтобы проникнуть в Трою.
    ja: 見かけは無害だが隠された脅威を含む、詐欺的な贈り物や戦略。トロイア戦争のギリシャ神話に由来し、ギリシャ人は巨大な木馬に兵士を隠してトロイアに侵入した。
    zh: 看似无害但隐藏威胁的欺骗性礼物或策略。源于古希腊特洛伊战争的故事，希腊人将士兵藏在巨大的木马中潜入特洛伊。
