- id: en_cultural_reference_a_caravaggio_basket_of_fruit_c62f917f
  language: en
  canonical_reference: A Caravaggio basket of fruit
  reference_type: cultural_reference
  surface_patterns:
  - a Caravaggio basket of fruit
  - Caravaggio's basket of fruit
  - the basket of fruit by Caravaggio
  - a still life in the style of Caravaggio
  short_explanation: Refers to Caravaggio's 1599 painting 'Basket of Fruit', a masterpiece of still-life
    art known for its hyper-realistic depiction of decay and imperfection. Symbolizes the fleeting nature
    of life and the beauty in transience.
  i18n_explanations:
    en: Refers to Caravaggio's 1599 painting 'Basket of Fruit', a masterpiece of still-life art known
      for its hyper-realistic depiction of decay and imperfection. Symbolizes the fleeting nature of life
      and the beauty in transience.
    es: Se refiere a la pintura de Caravaggio 'Cesta de frutas' (1599), obra maestra del bodegón por su
      realismo extremo en la representación de la decadencia y lo imperfecto. Simboliza la fugacidad de
      la vida y la belleza en lo efímero.
    fr: Fait référence au tableau de Caravage 'Corbeille de fruits' (1599), chef-d'œuvre de nature morte
      célèbre pour son réalisme saisissant de la décadence et de l'imperfection. Symbolise la fugacité
      de la vie et la beauté dans la transience.
    de: Bezieht sich auf Caravaggios Gemälde 'Fruchtkorb' (1599), ein Meisterwerk der Stilllebenmalerei,
      bekannt für seine hyperrealistische Darstellung von Verfall und Unvollkommenheit. Symbolisiert die
      Vergänglichkeit des Lebens und die Schönheit im Vergänglichen.
    it: Si riferisce al dipinto di Caravaggio 'Canestra di frutta' (1599), capolavoro di natura morta
      noto per il suo realismo iperdettagliato di decadenza e imperfezione. Simboleggia la fugacità della
      vita e la bellezza nel transitorio.
    pt: Refere-se à pintura de Caravaggio 'Cesto de Frutas' (1599), obra-prima da natureza-morta conhecida
      por seu realismo hiperdetalhado da decadência e imperfeição. Simboliza a fugacidade da vida e a
      beleza no transitório.
    ru: Относится к картине Караваджо 'Корзина с фруктами' (1599), шедевру натюрморта, известному своим
      гиперреалистичным изображением увядания и несовершенства. Символизирует быстротечность жизни и красоту
      в преходящем.
    ja: カラヴァッジョの「果物の籠」（1599年）を指す。腐敗と不完全さを写実的に描いた静物画の傑作で、生命の儚さと移ろいの美しさを象徴する。
    zh: 指代卡拉瓦乔的《水果篮》（1599年），静物画的杰作，以其对腐朽与不完美的超写实描绘著称。象征生命的短暂与转瞬即逝之美。
    ar: يشير إلى لوحة كارافاجيو "سلة الفواكه" (1599)، تحفة فنية في فن الطبيعة الصامتة، معروفة بتجسيدها
      الواقعي المفرط للفساد وعدم الكمال. ترمز إلى زوال الحياة وجمال الزوال.
    he: מתייחס לציורו של קאראווג'ו 'סל פירות' (1599), יצירת מופת של טבע דומם הידועה בתיאור ההיפר-ריאליסטי
      שלה של ריקבון וחוסר שלמות. מסמל את חולפת החיים ויופי החולף.
