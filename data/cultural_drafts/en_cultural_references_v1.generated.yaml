- id: en_classical_or_scriptural_allusion_eye_for_an_eye_tooth_for_a_tooth_14ac1fd8
  language: en
  canonical_reference: Eye for an eye, tooth for a tooth
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
