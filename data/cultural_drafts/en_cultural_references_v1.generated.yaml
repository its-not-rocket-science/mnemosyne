- id: en_proverb_tradition_a_man_s_home_is_his_castle_f4be7d91
  language: en
  canonical_reference: A man's home is his castle
  reference_type: proverb_tradition
  surface_patterns:
  - A man's home is his castle
  - A man's home is his castle.
  - Man's home is his castle
  short_explanation: Reflects the legal principle that a person's home is their private domain, protected
    from intrusion. The phrase has roots in English common law and was popularized by 17th-century jurist
    Sir Edward Coke.
  i18n_explanations:
    en: Reflects the legal principle that a person's home is their private domain, protected from intrusion.
      The phrase has roots in English common law and was popularized by 17th-century jurist Sir Edward
      Coke.
    es: Refleja el principio legal de que el hogar de una persona es su dominio privado, protegido de
      intrusiones. La frase tiene raíces en el derecho consuetudinario inglés y fue popularizada por el
      jurista del siglo XVII sir Edward Coke.
    fr: Reflète le principe juridique selon lequel le domicile d'une personne est son domaine privé, protégé
      contre les intrusions. Cette expression trouve ses racines dans la common law anglaise et a été
      popularisée par le juriste du XVIIe siècle sir Edward Coke.
    de: Spiegelt den Rechtsgrundsatz wider, dass das Zuhause eines Menschen sein privater Bereich ist,
      der vor Eindringlingen geschützt ist. Der Ausdruck hat Wurzeln im englischen Common Law und wurde
      vom Juristen des 17. Jahrhunderts Sir Edward Coke geprägt.
    it: Riflette il principio giuridico secondo cui la casa di una persona è il suo dominio privato, protetto
      da intrusioni. La frase affonda le radici nella common law inglese ed è stata resa popolare dal
      giurista del XVII secolo sir Edward Coke.
    pt: Reflete o princípio legal de que a casa de uma pessoa é seu domínio privado, protegido de intrusões.
      A expressão tem raízes no direito consuetudinário inglês e foi popularizada pelo jurista do século
      XVII sir Edward Coke.
    ru: Отражает правовой принцип, согласно которому дом человека является его частной территорией, защищённой
      от вторжения. Фраза уходит корнями в английское общее право и была популяризирована юристом XVII
      века сэром Эдвардом Коком.
    ja: 個人の住居は私的な領域であり、侵害から保護されるという法的原則を反映する。この言葉はイギリスのコモンローに起源を持ち、17世紀の法学者サー・エドワード・コークによって広められた。
    zh: 反映了法律原则，即一个人的住所是其私人领域，受到保护免受侵扰。该短语源于英国普通法，并由17世纪法学家爱德华·科克爵士推广。
    ar: يعكس المبدأ القانوني القائل بأن منزل الشخص هو مملكته الخاصة، المحمي من التعدي. الجملة لها جذور
      في القانون العام الإنجليزي وتم تداولها على يد الفقيه السير إدوارد كوك في القرن السابع عشر.
    he: משקפת את העיקרון המשפטי לפיו ביתו של אדם הוא ממלכתו הפרטית, המוגנת מפני חדירה. הביטוי נטוע במשפט
      המקובל האנגלי וזכה לפופולריות על ידי המשפטן בן המאה ה-17 סר אדוארד קוק.
