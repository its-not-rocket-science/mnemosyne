      inspirée par les œuvres de Franz Kafka. Décrit des situations où les individus se sentent piégés
      par des règles impersonnelles et déshumanisantes.
    de: Bezieht sich auf die albtraumhafte, unlogische und unterdrückende Natur bürokratischer Systeme,
