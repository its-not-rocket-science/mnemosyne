    ja: セルキーはケルトの伝承に登場する神話上の生き物で、アザラシの皮を脱ぎ捨て人間になることができる。その「呪い」とは、人間が皮を盗んだり隠したりすることでアイデンティティや自由を失う悲劇を指す。
