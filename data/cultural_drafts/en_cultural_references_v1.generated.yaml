    en: A meditation on the interconnectedness of humanity; the phrase suggests that every death diminishes
      the living, and the bell tolls for all of us. It is the title of a novel by Hemingway and derived
      from a sermon by John Donne.
    es: Una reflexión sobre la interconexión de la humanidad; la frase sugiere que cada muerte nos afecta
      a todos y la campana repica por cada uno de nosotros. Es el título de una novela de Hemingway y
      proviene de un sermón de John Donne.
    fr: Une méditation sur l'interconnexion de l'humanité ; la phrase suggère que chaque mort nous diminue
      tous, et le glas sonne pour chacun de nous. C'est le titre d'un roman d'Hemingway et provient d'un
      sermon de John Donne.
    de: Eine Betrachtung über die Verbundenheit der Menschheit; der Ausdruck deutet darauf hin, dass jeder
      Tod uns alle betrifft und die Totenglocke für uns alle läutet. Er ist der Titel eines Romans von
      Hemingway und stammt aus einer Predigt von John Donne.
    it: Una riflessione sull'interconnessione dell'umanità; la frase suggerisce che ogni morte ci diminuisce
      tutti e la campana suona per ciascuno di noi. È il titolo di un romanzo di Hemingway e deriva da
      un sermone di John Donne.
    pt: Uma reflexão sobre a interconexão da humanidade; a frase sugere que cada morte nos diminui e o
      sino toca por todos nós. É o título de um romance de Hemingway e deriva de um sermão de John Donne.
    ru: Размышление о взаимосвязи человечества; фраза подразумевает, что каждая смерть умаляет всех живущих,
