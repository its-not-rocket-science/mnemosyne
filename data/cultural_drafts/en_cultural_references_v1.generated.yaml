- id: en_classical_or_scriptural_allusion_caesar_s_wife_must_be_above_suspicion_b5588ef0
  language: en
  canonical_reference: Caesar's wife must be above suspicion
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Caesar's wife must be above suspicion
  short_explanation: A phrase meaning that the spouse of a powerful or public figure must maintain the
    highest standards of integrity to avoid any appearance of impropriety. It originates from the Roman
    statesman Julius Caesar's reported statement.
  i18n_explanations:
    en: A phrase meaning that the spouse of a powerful or public figure must maintain the highest standards
      of integrity to avoid any appearance of impropriety. It originates from the Roman statesman Julius
      Caesar's reported statement.
    es: Frase que significa que la cónyuge de una figura poderosa o pública debe mantener los más altos
      estándares de integridad para evitar cualquier apariencia de impropiedad. Proviene de una supuesta
      declaración del estadista romano Julio César.
    fr: Expression signifiant que l'épouse d'une personnalité puissante ou publique doit maintenir les
      plus hauts standards d'intégrité pour éviter toute apparence d'indécence. Elle provient d'une déclaration
      rapportée du homme d'État romain Jules César.
    de: Ein Sprichwort, das bedeutet, dass die Ehefrau einer mächtigen oder öffentlichen Person höchste
      Integritätsstandards wahren muss, um jeden Anschein von Unangemessenheit zu vermeiden. Es geht auf
      eine angebliche Aussage des römischen Staatsmanns Julius Caesar zurück.
    it: Frase che significa che il coniuge di una figura potente o pubblica deve mantenere i più alti
      standard di integrità per evitare qualsiasi apparenza di scorrettezza. Deriva da una presunta dichiarazione
      dello statista romano Giulio Cesare.
    pt: Expressão que significa que o cônjuge de uma figura poderosa ou pública deve manter os mais altos
      padrões de integridade para evitar qualquer aparência de impropriedade. Origina-se de uma suposta
      declaração do estadista romano Júlio César.
    ru: Выражение, означающее, что супруг влиятельной или публичной фигуры должен поддерживать высочайшие
      стандарты честности, чтобы избежать любых подозрений в непорядочности. Происходит от якобы сказанного
      римским государственным деятелем Юлием Цезарем.
    ja: 「カエサルの妻は疑惑の余地なし」という意味で、権力者や公人の配偶者は品行方正でなければならないという意味。古代ローマの政治家ユリウス・カエサルの発言とされるものに由来する。
    zh: 意为“恺撒的妻子必须无可指摘”，指权贵或公众人物的配偶必须保持最高的诚信标准，以避免任何不当嫌疑。源于古罗马政治家朱利叶斯·恺撒的传闻说法。
    ar: تعبير يعني أن زوجة الشخصية القوية أو العامة يجب أن تحافظ على أعلى معايير النزاهة لتجنب أي مظهر
      من مظاهر عدم اللياقة. ينشأ من تصريح منسوب إلى السياسي الروماني يوليوس قيصر.
    he: ביטוי שמשמעו שבת הזוג של דמות בעלת השפעה או ציבורית חייבת לשמור על סטנדרטים גבוהים ביותר של יושרה
      כדי להימנע מכל חשד בהתנהגות בלתי הולמת. מקורו באמירה שנקשרה למדינאי הרומי יוליוס קיסר
