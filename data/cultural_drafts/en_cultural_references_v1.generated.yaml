- id: en_cultural_reference_diamond_in_the_rough_d1fb117c
  language: en
  canonical_reference: Diamond in the rough
  reference_type: cultural_reference
  surface_patterns:
  - diamond in the rough
  - a diamond in the rough
  - diamonds in the rough
  short_explanation: A person or thing with potential or talent that is not yet developed or refined.
    The phrase evokes the idea of a rough, unpolished stone containing a valuable gem.
  i18n_explanations:
    en: A person or thing with potential or talent that is not yet developed or refined. The phrase evokes
      the idea of a rough, unpolished stone containing a valuable gem.
    es: Una persona o cosa con potencial o talento que aún no está desarrollado o refinado. La expresión
      evoca la idea de una piedra áspera y sin pulir que contiene una gema valiosa.
    fr: Une personne ou une chose dotée de potentiel ou de talent qui n'est pas encore développé ou affiné.
      L'expression évoque l'idée d'une pierre brute et non polie contenant une gemme précieuse.
    de: Eine Person oder Sache mit Potenzial oder Talent, das noch nicht entwickelt oder verfeinert ist.
      Der Ausdruck ruft die Vorstellung eines rauen, ungeschliffenen Steins in Erinnerung, der einen wertvollen
      Edelstein enthält.
    it: Una persona o cosa con potenziale o talento non ancora sviluppato o raffinato. L'espressione evoca
      l'idea di una pietra grezza e non levigata che contiene una gemma preziosa.
    pt: Uma pessoa ou coisa com potencial ou talento ainda não desenvolvido ou refinado. A expressão evoca
