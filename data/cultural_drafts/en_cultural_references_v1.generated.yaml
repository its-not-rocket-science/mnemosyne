    something obvious due to social pressure.
  i18n_explanations:
    en: Originates from Hans Christian Andersen's fairy tale (1837) about a vain emperor deceived into
      wearing invisible clothes. It now describes a situation where people refuse to criticize something
      obvious due to social pressure.
    es: Proviene del cuento de hadas de Hans Christian Andersen (1837) sobre un emperador vanidoso engañado
      para usar ropa invisible. Hoy describe una situación en la que la gente no critica algo obvio por
      presión social.
    fr: Provient du conte de Hans Christian Andersen (1837) sur un empereur vaniteux trompé en portant
      des vêtements invisibles. Désigne aujourd’hui une situation où les gens évitent de critiquer l’évidence
      par peur du jugement social.
    de: Stammt aus dem Märchen 'Des Kaisers neue Kleider' (1837) von Hans Christian Andersen über einen
      eitlen Kaiser, der unsichtbare Kleider trägt. Heute beschreibt es eine Situation, in der Menschen
      etwas Offensichtliches aus Angst vor sozialer Ächtung nicht kritisieren.
    it: Deriva dalla fiaba di Hans Christian Andersen (1837) su un imperatore vanitoso ingannato a indossare
      vestiti invisibili. Oggi descrive una situazione in cui le persone non criticano qualcosa di ovvio
      per pressione sociale.
    pt: Originário do conto de fadas de Hans Christian Andersen (1837) sobre um imperador vaidoso enganado
      a usar roupas invisíveis. Hoje descreve uma situação em que as pessoas não criticam algo óbvio por
      pressão social.
    ru: Восходит к сказке Ханса Кристиана Андерсена (1837) о тщеславном императоре, обманутом ношением
      невидимой одежды. Сегодня это выражение описывает ситуацию, когда люди не осмеливаются критиковать
      очевидное из-за социального давления.
    ja: ハンス・クリスチャン・アンデルセンの童話（1837年）に由来する、虚栄心の強い皇帝が見えない服を着せられるという話。今日では、社会的圧力により人々が明らかなことを批判しない状況を指す。
    zh: 源自安徒生童话《皇帝的新装》（1837年），描述一个虚荣的皇帝被骗穿上看不见的衣服。如今用于形容人们因社会压力而不敢批评明显问题的情况。
    ar: مأخوذ من قصة هانس كريستيان أندرسن الخيالية (1837) عن إمبراطور vain خدعه لارتداء ملابس غير مرئية.
