      поимки.
    ja: ずる賢くて器用な詐欺師やスリを指す言葉で、機転でトラブルを避ける人のたとえ。チャールズ・ディケンズの小説に登場するキャラクターに由来する。
    zh: 指机智灵活的骗子或扒手，常用来形容善于通过狡猾手段避免麻烦的人。该词源于查尔斯·狄更斯小说中的一个角色，擅长逃避抓捕。
    ar: محتال ماهر وذكي، غالبًا ما يوصف به من يتجنب المتاعب بالمكر. المصطلح مستمد من شخصية في رواية تشارلز
