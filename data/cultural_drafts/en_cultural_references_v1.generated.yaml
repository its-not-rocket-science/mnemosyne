- id: en_cultural_reference_the_mousetrap_will_never_end_3bd6148b
  language: en
  canonical_reference: The Mousetrap will never end
  reference_type: cultural_reference
  surface_patterns:
  - the Mousetrap will never end
  - the mousetrap never ends
  - Mousetrap will never end
  short_explanation: Refers to the world's longest-running play, Agatha Christie's 'The Mousetrap,' which
    has been performed continuously in London's West End since 1952. The phrase is used to describe something
    that persists indefinitely, often humorously or ironically.
  i18n_explanations:
    en: Refers to the world's longest-running play, Agatha Christie's 'The Mousetrap,' which has been
      performed continuously in London's West End since 1952. The phrase is used to describe something
      that persists indefinitely, often humorously or ironically.
    es: Se refiere a la obra más longeva del mundo, 'La ratonera' de Agatha Christie, representada ininterrumpidamente
      en el West End de Londres desde 1952. La expresión se usa para describir algo que perdura indefinidamente,
      a menudo con ironía o humor.
    fr: Fait référence à la pièce la plus longue au monde, 'La Souricière' d'Agatha Christie, jouée sans
      interruption dans le West End de Londres depuis 1952. L'expression décrit quelque chose qui persiste
      indéfiniment, souvent avec ironie ou humour.
    de: Bezieht sich auf das am längsten laufende Theaterstück der Welt, Agatha Christies 'Die Mausefalle,'
      das seit 1952 ununterbrochen im Londoner West End aufgeführt wird. Der Ausdruck beschreibt etwas,
      das endlos weitergeht, oft humorvoll oder ironisch.
    it: Si riferisce alla pièce teatrale più longeva al mondo, 'Trappola per topi' di Agatha Christie,
      in scena ininterrottamente nel West End di Londra dal 1952. L'espressione descrive qualcosa che
      perdura indefinitamente, spesso con ironia o umorismo.
    pt: Refere-se à peça de teatro mais longeva do mundo, 'A ratoeira' de Agatha Christie, encenada ininterruptamente
      no West End de Londres desde 1952. A expressão é usada para descrever algo que persiste indefinidamente,
      muitas vezes com ironia ou humor.
    ru: Относится к самому долгопроигрываемому спектаклю в мире, 'Мышеловке' Агаты Кристи, идущему без
      перерыва в лондонском Вест-Энде с 1952 года. Фраза используется для описания чего-то, что длится
      бесконечно, часто с иронией или юмором.
    ja: 世界最長のロングラン演劇、アガサ・クリスティの「ねずみとり」を指す。1952年からロンドンのウエストエンドで途切れることなく上演されている。この表現は、しばしば皮肉やユーモアを込めて、永遠に続くものを表す際に用いられる。
    zh: 指世界上连续上演时间最长的戏剧，阿加莎·克里斯蒂的《捕鼠器》，自1952年起在伦敦西区不间断上演。该短语用于描述某种无限持续的事物，常带有幽默或讽刺意味。
    ar: يشير إلى أطول مسرحية مستمرة في العالم، 'فخ الف鼠' لأجاثا كريستي، التي تُعرض دون انقطاع في وست إند
      بلندن منذ 1952. تُستخدم العبارة لوصف شيء يستمر إلى الأبد، غالبًا بسخرية أو فكاهة.
    he: מתייחס למחזה הרץ הכי הרבה זמן בעולם, 'מלכודת העכברים' של אגתה כריסטי, המוצג ללא הפסקה בווסט אנד
      בלונדון מאז 1952. הביטוי משמש לתיאור דבר מה שנמשך לנצח, לעיתים בהומור או באירוניה.
