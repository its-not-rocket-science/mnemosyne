- id: en_classical_or_scriptural_allusion_a_poussin_et_in_arcadia_ego_ca88ea22
  language: en
  canonical_reference: A Poussin Et in Arcadia Ego
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Et in Arcadia ego
  - Arcadia ego
  - the Arcadia of Poussin
  short_explanation: Refers to Nicolas Poussin's 1637-38 painting depicting shepherds discovering a tomb
    in Arcadia, with the Latin inscription 'Et in Arcadia ego' ('Even in Arcadia, I am present'), symbolizing
    the inevitability of death.
  i18n_explanations:
    en: Refers to Nicolas Poussin's 1637-38 painting depicting shepherds discovering a tomb in Arcadia,
      with the Latin inscription 'Et in Arcadia ego' ('Even in Arcadia, I am present'), symbolizing the
      inevitability of death.
    es: Se refiere al cuadro de Nicolas Poussin de 1637-38 que muestra a pastores descubriendo una tumba
      en Arcadia, con la inscripción latina 'Et in Arcadia ego' ('Incluso en Arcadia, yo estoy presente'),
      simbolizando la inevitabilidad de la muerte.
    fr: Fait référence au tableau de Nicolas Poussin de 1637-38 représentant des bergers découvrant une
      tombe en Arcadie, avec l'inscription latine 'Et in Arcadia ego' ('Même en Arcadie, je suis présent'),
      symbolisant l'inévitabilité de la mort.
    de: Bezieht sich auf Nicolas Poussins Gemälde von 1637-38, das Hirten zeigt, die ein Grab in Arkadien
      entdecken, mit der lateinischen Inschrift 'Et in Arcadia ego' ('Auch in Arkadien bin ich'), die
      die Unvermeidlichkeit des Todes symbolisiert.
    it: Si riferisce al dipinto di Nicolas Poussin del 1637-38 che ritrae pastori che scoprono una tomba
      in Arcadia, con l'iscrizione latina 'Et in Arcadia ego' ('Anche in Arcadia, io sono'), simbolizzando
      l'inevitabilità della morte.
    pt: Refere-se à pintura de Nicolas Poussin de 1637-38 que retrata pastores descobrindo um túmulo na
      Arcádia, com a inscrição latina 'Et in Arcadia ego' ('Até na Arcádia, eu estou presente'), simbolizando
      a inevitabilidade da morte.
    ru: Относится к картине Николя Пуссена 1637-38 годов, изображающей пастухов, открывающих гробницу
      в Аркадии, с латинской надписью 'Et in Arcadia ego' ('Даже в Аркадии я присутствую'), что символизирует
      неизбежность смерти.
    ja: ニコラ・プッサンの1637-38年の絵画で、羊飼いがアルカディアで墓を発見する様子を描き、ラテン語の銘文「Et in Arcadia ego」（「アルカディアであっても、私はそこにいる」）が死の
      inevitability を象徴する。
    zh: 指尼古拉·普桑1637-38年的画作，描绘牧羊人在阿卡迪亚发现一座坟墓，拉丁文铭文为“Et in Arcadia ego”（“即使在阿卡迪亚，我也存在”），象征死亡的必然性。
    ar: يشير إلى لوحة نيكولا بوسان (1637-1638) التي تصور رعاة يكتشفون قبرًا في أركاديا، مع النقش اللاتيني
      "Et in Arcadia ego" ("حتى في أركاديا، أنا موجود")، مما يرمز إلى حتمية الموت.
    he: מתייחס לציורו של ניקולא פוסן משנת 1637–1638 המציג רועים המגלים קבר בארקדיה, עם הכתובת הלטינית
      "Et in Arcadia ego" ("גם בארקדיה אני נמצא"), המסמלת את אי-הנמנעות של המוות.
