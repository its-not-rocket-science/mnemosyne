  short_explanation: A burdensome, inescapable curse or responsibility. The phrase originates from Samuel
    Taylor Coleridge's poem 'The Rime of the Ancient Mariner,' where a sailor is punished for killing
    an albatross.
  i18n_explanations:
    en: A burdensome, inescapable curse or responsibility. The phrase originates from Samuel Taylor Coleridge's
      poem 'The Rime of the Ancient Mariner,' where a sailor is punished for killing an albatross.
    es: Una maldición o responsabilidad pesada e inevitable. La frase proviene del poema de Samuel Taylor
      Coleridge 'La balada del viejo marinero', donde un marinero es castigado por matar un albatros.
    fr: Une malédiction ou une responsabilité pesante et inévitable. L'expression vient du poème de Samuel
      Taylor Coleridge 'La Complainte du vieux marin', où un marin est puni pour avoir tué un albatros.
    de: Eine lästige, unentrinnbare Last oder Verantwortung. Der Ausdruck stammt aus Samuel Taylor Coleridges
      Gedicht 'The Rime of the Ancient Mariner', in dem ein Matrose für das Töten eines Albatros bestraft
      wird.
    it: Un peso o responsabilità opprimente e inevitabile. L'espressione deriva dalla poesia di Samuel
      Taylor Coleridge 'La ballata del vecchio marinaio', in cui un marinaio viene punito per aver ucciso
      un albatro.
    pt: Um fardo ou responsabilidade pesada e inevitável. A expressão vem do poema de Samuel Taylor Coleridge
      'A Balada do Velho Marinheiro', em que um marinheiro é punido por matar um albatroz.
    ru: Тяжкое, неотвратимое проклятие или бремя. Фраза восходит к поэме Сэмюэла Тейлора Кольриджа 'Сказание
