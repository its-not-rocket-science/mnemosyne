  short_explanation: Refers to Jean-François Millet's 1857 painting depicting peasant women gathering
    leftover grain after harvest. Symbolizes rural labor, poverty, and the dignity of manual work in 19th-century
    France.
  i18n_explanations:
    en: Refers to Jean-François Millet's 1857 painting depicting peasant women gathering leftover grain
      after harvest. Symbolizes rural labor, poverty, and the dignity of manual work in 19th-century France.
    es: Se refiere a la pintura de Jean-François Millet de 1857 que representa a mujeres campesinas recogiendo
      granos sobrantes tras la cosecha. Simboliza el trabajo rural, la pobreza y la dignidad del trabajo
      manual en la Francia del siglo XIX.
    fr: Fait référence au tableau de Jean-François Millet de 1857 représentant des paysannes ramassant
      les épis restants après la moisson. Symbole du travail rural, de la pauvreté et de la dignité du
      labeur manuel dans la France du XIXe siècle.
    de: Bezieht sich auf Jean-François Millets Gemälde von 1857, das Bäuerinnen beim Sammeln von Nachlese
      zeigt. Symbolisiert ländliche Arbeit, Armut und die Würde manueller Arbeit im Frankreich des 19.
      Jahrhunderts.
    it: Si riferisce al dipinto di Jean-François Millet del 1857 che ritrae contadine che raccolgono le
      spighe rimaste dopo la mietitura. Simboleggia il lavoro rurale, la povertà e la dignità del lavoro
      manuale nella Francia del XIX secolo.
    pt: Refere-se à pintura de Jean-François Millet de 1857 que retrata camponesas recolhendo espigas
      após a colheita. Simboliza o trabalho rural, a pobreza e a dignidade do trabalho manual na França
      do século XIX.
    ru: Относится к картине Жана-Франсуа Милле 1857 года, изображающей крестьянок, собирающих оставшиеся
