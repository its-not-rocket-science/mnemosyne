  - peacemakers shall be called the children of God
  short_explanation: A phrase from the Sermon on the Mount (Matthew 5:9) in the New Testament, emphasizing
    the virtue of peace-making and its divine reward. It is a foundational Christian teaching on reconciliation.
  i18n_explanations:
    en: A phrase from the Sermon on the Mount (Matthew 5:9) in the New Testament, emphasizing the virtue
      of peace-making and its divine reward. It is a foundational Christian teaching on reconciliation.
    es: Frase del Sermón de la Montaña (Mateo 5:9) en el Nuevo Testamento, que destaca la virtud de hacer
      la paz y su recompensa divina. Es una enseñanza cristiana fundamental sobre la reconciliación.
    fr: Phrase tirée du Sermon sur la Montagne (Matthieu 5:9) dans le Nouveau Testament, soulignant la
      vertu de faire la paix et sa récompense divine. C'est un enseignement chrétien fondamental sur la
      réconciliation.
    de: Ein Zitat aus der Bergpredigt (Matthäus 5,9) im Neuen Testament, das die Tugend des Friedensstifters
      und ihre göttliche Belohnung betont. Es ist eine grundlegende christliche Lehre zur Versöhnung.
    it: Frase tratta dal Discorso della Montagna (Matteo 5:9) nel Nuovo Testamento, che sottolinea la
      virtù di fare la pace e la sua ricompensa divina. È un insegnamento cristiano fondamentale sulla
      riconciliazione.
    pt: Frase do Sermão da Montanha (Mateus 5:9) no Novo Testamento, que destaca a virtude de fazer a
      paz e sua recompensa divina. É um ensinamento cristão fundamental sobre reconciliação.
    ru: Цитата из Нагорной проповеди (Евангелие от Матфея 5:9) в Новом Завете, подчеркивающая добродетель
      миротворчества и его божественное вознаграждение. Это основополагающее христианское учение о примирении.
    ja: 新約聖書の「山上の垂訓」（マタイによる福音書5:9）に由来する言葉で、平和をもたらす者の徳とその神からの報いを強調する。和解についてのキリスト教の基本的教えである。
    zh: 出自《新约圣经》中的《登山宝训》（马太福音5:9），强调和平缔造者的美德及其神圣奖赏。这是基督教关于和解的核心教义。
    ar: عبارة من عظة الجبل (متى 5:9) في العهد الجديد، تؤكد فضيلة صنع السلام ومكافأته الإلهية. إنها تعاليم
      مسيحية أساسية عن المصالحة.
    he: משפט מתוך דרשת ההר (מתי ה:9) בברית החדשה, המדגיש את מעלת עושי השלום ופרס האלוהי. זוהי הוראה נוצרית
      יסודית על פיוס.
