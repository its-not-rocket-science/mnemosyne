  - a Grande Odalisque
  short_explanation: Refers to Jean-Auguste-Dominique Ingres' 1814 painting of a reclining nude odalisque,
    notable for its elongated proportions and sensuality, symbolizing 19th-century European exoticism
    and idealized beauty.
  i18n_explanations:
    en: Refers to Jean-Auguste-Dominique Ingres' 1814 painting of a reclining nude odalisque, notable
      for its elongated proportions and sensuality, symbolizing 19th-century European exoticism and idealized
      beauty.
    es: Se refiere a la pintura de 1814 de Jean-Auguste-Dominique Ingres que representa a una odalisca
      desnuda reclinada, destacada por sus proporciones alargadas y sensualidad, que simboliza el exotismo
      y la belleza idealizada del siglo XIX en Europa.
    fr: Fait référence au tableau de 1814 de Jean-Auguste-Dominique Ingres représentant une odalisque
      nue allongée, remarquable par ses proportions allongées et sa sensualité, symbolisant l'exotisme
      et la beauté idéalisée du XIXe siècle en Europe.
    de: Bezieht sich auf Ingres' Gemälde von 1814 einer liegenden nackten Odaliske, das durch seine überlangen
      Proportionen und Sinnlichkeit besticht und europäische Exotik sowie idealisierte Schönheit des 19.
      Jahrhunderts symbolisiert.
    it: Si riferisce al dipinto del 1814 di Jean-Auguste-Dominique Ingres che ritrae una odalisca nuda
      sdraiata, noto per le sue proporzioni allungate e sensualità, che simboleggia l'esotismo e la bellezza
      idealizzata dell'Europa del XIX secolo.
    pt: Refere-se à pintura de 1814 de Jean-Auguste-Dominique Ingres que retrata uma odalisca nua reclinada,
      notável por suas proporções alongadas e sensualidade, simbolizando o exotismo e a beleza idealizada
      da Europa do século XIX.
    ru: Относится к картине Жана Огюста Доминика Энгра 1814 года, изображающей лежащую обнажённую одалиску,
      известной своими удлинёнными пропорциями и чувственностью, что символизирует европейский экзотизм
      и идеализированную красоту XIX века.
    ja: ジャン＝オーギュスト＝ドミニク・アングルの1814年の作品で、横たわる裸のオダリスクを描いたこの絵画は、その長いプロポーションと官能性で知られ、19世紀ヨーロッパのエキゾチシズムと理想化された美を象徴しています。
    zh: 指的是让-奥古斯特-多米尼克·安格尔1814年的画作，描绘了一位斜卧的裸体奥达利斯克，以其修长的比例和感官性而著称，象征着19世纪欧洲的异国情调与理想化的美。
    ar: يشير إلى لوحة جان أوغست دومينيك إنجرس لعام 1814 التي تصور جارية عارية مستلقية، والتي تتميز بنسبها
      الممدودة وحساسيتها، مما يرمز إلى الغرابة الأوروبية والجمال المثالي للقرن التاسع عشر.
    he: מתייחס לציורו של ז'אן-אוגוסט-דומיניק אנגר משנת 1814 המתאר שפחה עירומה שוכבת, אשר ידועה בפרופורציות
