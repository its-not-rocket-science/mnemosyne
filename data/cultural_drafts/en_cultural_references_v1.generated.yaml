  short_explanation: Refers to the harsh legal code of Draco, an Athenian lawmaker in the 7th century
    BCE, known for its extreme severity. The term 'Draconian' now describes excessively strict or cruel
    laws.
  i18n_explanations:
    en: Refers to the harsh legal code of Draco, an Athenian lawmaker in the 7th century BCE, known for
      its extreme severity. The term 'Draconian' now describes excessively strict or cruel laws.
    es: Se refiere al código legal severo de Dracón, legislador ateniense del siglo VII a.C., conocido
      por su extrema dureza. El término 'draconiano' describe hoy leyes excesivamente estrictas o crueles.
    fr: Fait référence au code juridique sévère de Dracon, législateur athénien du VIIe siècle av. J.-C.,
      connu pour son extrême sévérité. Le terme 'draconien' désigne aujourd'hui des lois excessivement
      strictes ou cruelles.
    de: Bezieht sich auf den harten Gesetzeskodex des Drako, eines athenischen Gesetzgebers im 7. Jahrhundert
      v. Chr., bekannt für seine extreme Strenge. Der Begriff 'drakonisch' beschreibt heute übermäßig
      harte oder grausame Gesetze.
    it: Si riferisce al severo codice legale di Dracone, legislatore ateniese del VII secolo a.C., noto
      per la sua estrema durezza. Il termine 'draconiano' descrive oggi leggi eccessivamente severe o
      crudeli.
    pt: Refere-se ao código legal severo de Dracão, legislador ateniense do século VII a.C., conhecido
      por sua extrema dureza. O termo 'draconiano' descreve hoje leis excessivamente rígidas ou cruéis.
    ru: Относится к суровому законодательству Дракона, афинского законодателя VII века до н.э., известного
      своей крайней жестокостью. Термин 'драконовский' теперь описывает чрезмерно строгие или жестокие
      законы.
    ja: 紀元前7世紀のアテネの立法者ドラコンによる極めて厳しい法典を指す。その極端な厳しさで知られ、「ドラコニア」という言葉は今日では過度に厳しいまたは残酷な法律を表す。
    zh: 指的是公元前7世纪雅典立法者德拉古制定的严苛法律，以极端严厉著称。如今“德拉古式”形容过于严厉或残酷的法律。
    ar: يشير إلى القانون القاسي لدراكو، المشرع الأثيني في القرن السابع قبل الميلاد، المعروف بقسوته الشديدة.
