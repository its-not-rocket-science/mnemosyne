- id: en_cultural_reference_the_manhattan_project_c31cc16a
  language: en
  canonical_reference: The Manhattan Project
  reference_type: cultural_reference
  surface_patterns:
  - the Manhattan Project
  - Manhattan Project
  - Manhattan Project (1942–1946)
  short_explanation: The code name for the U.S. government's secret research and development project during
    World War II that produced the first atomic bombs. It symbolizes the dawn of the nuclear age and the
    ethical dilemmas of scientific advancement.
  i18n_explanations:
    en: The code name for the U.S. government's secret research and development project during World War
      II that produced the first atomic bombs. It symbolizes the dawn of the nuclear age and the ethical
      dilemmas of scientific advancement.
    es: El nombre en clave del proyecto secreto de investigación y desarrollo del gobierno de EE.UU. durante
      la Segunda Guerra Mundial que produjo las primeras bombas atómicas. Simboliza el inicio de la era
      nuclear y los dilemas éticos del avance científico.
    fr: Le nom de code du projet secret de recherche et développement du gouvernement américain pendant
      la Seconde Guerre mondiale qui a produit les premières bombes atomiques. Il symbolise l'avènement
      de l'ère nucléaire et les dilemmes éthiques du progrès scientifique.
    de: Der Deckname für das geheime Forschungs- und Entwicklungsprojekt der US-Regierung während des
      Zweiten Weltkriegs, das zur Herstellung der ersten Atombomben führte. Es steht für den Beginn des
      Atomzeitalters und die ethischen Dilemmata des wissenschaftlichen Fortschritts.
    it: Il nome in codice del progetto segreto di ricerca e sviluppo del governo statunitense durante
      la Seconda Guerra Mondiale che portò alla creazione delle prime bombe atomiche. Simboleggia l'inizio
      dell'era nucleare e i dilemmi etici del progresso scientifico.
    pt: O nome em código do projeto secreto de pesquisa e desenvolvimento do governo dos EUA durante a
      Segunda Guerra Mundial, que produziu as primeiras bombas atômicas. Simboliza o início da era nuclear
      e os dilemas éticos do avanço científico.
    ru: Кодовое название секретного исследовательского проекта правительства США во время Второй мировой
      войны, в результате которого были созданы первые атомные бомбы. Символ начала ядерной эпохи и этических
      дилемм научного прогресса.
    ja: 第二次世界大戦中にアメリカ政府が極秘で行った研究開発プロジェクトで、最初の原子爆弾を製造した。核時代の幕開けと科学的進歩の倫理的ジレンマの象徴。
    zh: 美国政府在第二次世界大战期间秘密研发并制造出首批原子弹的项目代号。象征着核时代的开端和科学进步的伦理困境。
    ar: الاسم الرمزي للمشروع السري للبحث والتطوير الذي نفذته حكومة الولايات المتحدة خلال الحرب العالمية
      الثانية وأنتجت أول القنابل الذرية. يرمز إلى بداية العصر النووي والمعضلات الأخلاقية للتقدم العلمي.
    he: פרויקט מנהטן – שם הקוד לפרויקט המחקר והפיתוח הסודי של ממשלת ארצות הברית במהלך מלחמת העולם השנייה,
      שהביא ליצירת הפצצות האטומיות הראשונות. סמל לתחילתה של עידן הגרעין ולדileמות האתיות של ההתקדמות המדעית.
