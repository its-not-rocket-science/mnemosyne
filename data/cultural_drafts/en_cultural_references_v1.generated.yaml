- id: en_classical_or_scriptural_allusion_the_fates_threads_68fb155a
  language: en
  canonical_reference: The Fates' threads
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - the Fates' threads
  - the threads of the Fates
  - the Fates' thread
  - the threads of fate
  - the Fates' spinning
  short_explanation: Refers to the three mythological sisters (Clotho, Lachesis, and Atropos) who spin,
    measure, and cut the threads of human life, symbolizing destiny and inevitability. The phrase evokes
    the idea that life is predetermined and inescapable.
  i18n_explanations:
    en: Refers to the three mythological sisters (Clotho, Lachesis, and Atropos) who spin, measure, and
      cut the threads of human life, symbolizing destiny and inevitability. The phrase evokes the idea
      that life is predetermined and inescapable.
    es: Se refiere a las tres hermanas mitológicas (Cloto, Láquesis y Átropos) que hilan, miden y cortan
      los hilos de la vida humana, simbolizando el destino y la inevitabilidad. La expresión evoca la
      idea de que la vida está predeterminada e inescapable.
    fr: Fait référence aux trois sœurs mythologiques (Clotho, Lachésis et Atropos) qui filent, mesurent
      et coupent les fils de la vie humaine, symbolisant le destin et l'inévitabilité. L'expression évoque
      l'idée que la vie est prédéterminée et inévitable.
    de: Bezieht sich auf die drei mythologischen Schwestern (Clotho, Lachesis und Atropos), die die Fäden
      des menschlichen Lebens spinnen, messen und durchtrennen, was Schicksal und Unausweichlichkeit symbolisiert.
      Der Ausdruck verweist auf die Idee eines vorbestimmten und unausweichlichen Lebens.
    it: Si riferisce alle tre sorelle mitologiche (Cloto, Lachesi e Atropo) che filano, misurano e tagliano
      i fili della vita umana, simboleggiando il destino e l'inevitabilità. L'espressione evoca l'idea
      che la vita sia predeterminata e ineluttabile.
    pt: Refere-se às três irmãs mitológicas (Cloto, Láquesis e Átropos) que fiam, medem e cortam os fios
      da vida humana, simbolizando o destino e a inevitabilidade. A expressão evoca a ideia de que a vida
      é predeterminada e inescapável.
    ru: Относится к трём мифологическим сестрам (Клото, Лахесис и Атропос), которые прядут, измеряют и
      обрезают нити человеческой жизни, символизируя судьбу и неизбежность. Фраза выражает идею предопределённости
      и неотвратимости жизни.
    ja: 人間の命の糸を紡ぎ、測り、断ち切る三人の神話上の姉妹（クロートー、ラケシス、アトロポス）を指す。運命と不可避性を象徴し、人生があらかじめ決められており逃れられないという考えを表す。
    zh: 指代三位命运女神（克洛托、拉克西斯和阿特洛波斯），她们纺织、测量并剪断人类生命的线，象征命运与不可避免。此短语表达生命已被预定且无法逃脱的概念。
    ar: يشير إلى الأخوات الثلاث الأسطوريات (كلوثو، لاخيسيس، أتروبوس) اللواتي يغزلن ويقصدن ويقصدن خيوط
      الحياة البشرية، ويرمزن إلى القدر والحتمية. يعبر التعبير عن فكرة أن الحياة محددة مسبقًا ولا مفر منها.
    he: מתייחס לשלוש האחיות המיתולוגיות (קלוטו, לקסיס ואטרופוס) שטוות, מודדות וקוצצות את חוטי החיים האנושיים,
