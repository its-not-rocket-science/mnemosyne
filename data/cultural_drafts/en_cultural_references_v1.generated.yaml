    a British law requiring authorities to read a proclamation before dispersing a riot.
  i18n_explanations:
    en: To reprimand or scold someone severely for their actions, originally referring to a British law
      requiring authorities to read a proclamation before dispersing a riot.
    es: Regañar o amonestar severamente a alguien por sus acciones, originalmente en referencia a una
      ley británica que obligaba a las autoridades a leer una proclama antes de dispersar una revuelta.
    fr: Réprimander ou gronder sévèrement quelqu'un pour ses actes, à l'origine en référence à une loi
      britannique exigeant que les autorités lisent une proclamation avant de disperser une émeute.
    de: Jemanden für seine Taten streng zurechtweisen oder tadeln, ursprünglich bezogen auf ein britisches
      Gesetz, das Behörden verpflichtete, vor der Auflösung einer Aufruhr eine Proklamation vorzulesen.
    it: Sgridare o rimproverare severamente qualcuno per le sue azioni, in origine riferito a una legge
      britannica che obbligava le autorità a leggere una proclamazione prima di disperdere una rivolta.
    pt: Reprimir ou repreender severamente alguém por suas ações, originalmente referindo-se a uma lei
