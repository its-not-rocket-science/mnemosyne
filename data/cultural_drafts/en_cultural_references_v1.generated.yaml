    en: Refers to Caravaggio's 1599-1600 painting depicting the moment Jesus calls Matthew to discipleship.
      Known for its dramatic use of light and shadow, symbolizing divine revelation.
    es: Se refiere al cuadro de Caravaggio de 1599-1600 que representa el momento en que Jesús llama a
      Mateo a seguirlo. Destaca por su uso dramático de luz y sombra, simbolizando la revelación divina.
    fr: Fait référence au tableau de Caravage de 1599-1600 représentant le moment où Jésus appelle Matthieu
      à le suivre. Connu pour son usage dramatique de la lumière et de l'ombre, symbolisant la révélation
      divine.
    de: Bezieht sich auf Caravaggios Gemälde von 1599-1600, das den Moment zeigt, in dem Jesus Matthäus
      zur Nachfolge beruft. Bekannt für den dramatischen Einsatz von Licht und Schatten, der göttliche
      Offenbarung symbolisiert.
    it: Si riferisce al dipinto di Caravaggio del 1599-1600 che ritrae il momento in cui Gesù chiama Matteo
      alla sequela. Celebre per l'uso drammatico di luce e ombra, simbolo di rivelazione divina.
    pt: Refere-se à pintura de Caravaggio de 1599-1600 que retrata o momento em que Jesus chama Mateus
      para segui-lo. Conhecida pelo uso dramático de luz e sombra, simbolizando revelação divina.
    ru: Относится к картине Караваджо 1599-1600 годов, изображающей момент, когда Иисус призывает Матфея
