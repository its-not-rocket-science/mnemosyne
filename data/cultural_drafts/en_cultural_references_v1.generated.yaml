- id: en_cultural_reference_curse_of_the_bambino_a3773730
  language: en
  canonical_reference: Curse of the Bambino
  reference_type: cultural_reference
  surface_patterns:
  - Curse of the Bambino
  - the Curse of the Bambino
  - Bambino Curse
  short_explanation: A superstitious belief that the Boston Red Sox baseball team was cursed after selling
    Babe Ruth ('the Bambino') to the New York Yankees in 1920, preventing them from winning the World
    Series for 86 years until 2004.
  i18n_explanations:
    en: A superstitious belief that the Boston Red Sox baseball team was cursed after selling Babe Ruth
      ('the Bambino') to the New York Yankees in 1920, preventing them from winning the World Series for
      86 years until 2004.
    es: Creencia supersticiosa de que el equipo de béisbol Boston Red Sox estuvo maldito tras vender a
      Babe Ruth ('el Bambino') a los New York Yankees en 1920, lo que les impidió ganar la Serie Mundial
      durante 86 años hasta 2004.
    fr: Croyance superstitieuse selon laquelle l'équipe de baseball des Boston Red Sox était maudite après
      avoir vendu Babe Ruth ('le Bambino') aux New York Yankees en 1920, les empêchant de remporter la
      Série mondiale pendant 86 ans jusqu'en 2004.
    de: Ein abergläubischer Glaube, dass das Baseballteam Boston Red Sox verflucht war, nachdem es 1920
      Babe Ruth ('den Bambino') an die New York Yankees verkauft hatte, was sie 86 Jahre lang daran hinderte,
      die World Series zu gewinnen, bis 2004.
    it: Credenza superstiziosa secondo cui la squadra di baseball dei Boston Red Sox era maledetta dopo
      aver venduto Babe Ruth ('il Bambino') ai New York Yankees nel 1920, impedendo loro di vincere le
      World Series per 86 anni fino al 2004.
    pt: Crença supersticiosa de que o time de beisebol Boston Red Sox estava amaldiçoado após vender Babe
      Ruth ('o Bambino') para os New York Yankees em 1920, impedindo-os de vencer a World Series por 86
      anos até 2004.
    ru: Суеверное убеждение, что бейсбольная команда Boston Red Sox была проклята после продажи Бабе Рута
      ('Бамбино') в New York Yankees в 1920 году, что помешало ей выиграть Мировую серию в течение 86
      лет до 2004 года.
    ja: 1920年にボストン・レッドソックスがベーブ・ルース（「バンビーノ」）をニューヨーク・ヤンキースに売却したことで、86年間ワールドシリーズ優勝を逃していたという迷信的な信念。2004年にその呪いが解けたと言われる。
    zh: 一种迷信说法，认为波士顿红袜队在1920年将贝比·鲁斯（绰号“小婴儿”）卖给纽约洋基队后遭到诅咒，导致86年未能赢得世界职业棒球大赛，直到2004年才打破诅咒。
    ar: اعتقاد خرافي بأن فريق بوسطن ريد سوكس تعرض للّعن بعد بيع بيبي روث (المعروف بـ
    البامبينو: إلى فريق نيويورك يانكيز عام 1920، مما منعهم من الفوز ببطولة العالم لمدة 86 عامًا حتى عام
      2004.
