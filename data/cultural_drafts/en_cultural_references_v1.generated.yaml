- id: en_classical_or_scriptural_allusion_fiddling_while_rome_burns_19496980
  language: en
  canonical_reference: Fiddling while Rome burns
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - fiddling while Rome burns
  - fiddle while Rome burns
  - fiddling while Rome is burning
  short_explanation: A phrase describing a situation where someone is negligently or irresponsibly ignoring
    a crisis while engaging in trivial or unimportant activities. It refers to the legend that Emperor
    Nero played the lyre while Rome burned in 64 AD.
  i18n_explanations:
    en: A phrase describing a situation where someone is negligently or irresponsibly ignoring a crisis
      while engaging in trivial or unimportant activities. It refers to the legend that Emperor Nero played
      the lyre while Rome burned in 64 AD.
    es: Frase que describe una situación en la que alguien ignora negligentemente o irresponsablemente
      una crisis mientras se dedica a actividades triviales o sin importancia. Se refiere a la leyenda
      de que el emperador Nerón tocó la lira mientras Roma ardía en el año 64 d.C.
    fr: Expression décrivant une situation où quelqu'un ignore négligemment ou irresponsablement une crise
      tout en s'adonnant à des activités futiles ou sans importance. Elle fait référence à la légende
      selon laquelle l'empereur Néron jouait de la lyre pendant que Rome brûlait en 64 ap. J.-C.
    de: Ein Sprichwort, das eine Situation beschreibt, in der jemand fahrlässig oder verantwortungslos
      eine Krise ignoriert, während er sich mit trivialen oder unwichtigen Aktivitäten beschäftigt. Es
      bezieht sich auf die Legende, dass Kaiser Nero während des Brandes Roms im Jahr 64 n. Chr. die Lyra
      spielte.
    it: Frase che descrive una situazione in cui qualcuno ignora negligentemente o irresponsabilmente
      una crisi mentre si dedica ad attività banali o di poco conto. Si riferisce alla leggenda secondo
      cui l'imperatore Nerone suonava la lira mentre Roma bruciava nel 64 d.C.
    pt: Expressão que descreve uma situação em que alguém ignora negligentemente ou irresponsavelmente
      uma crise enquanto se envolve em atividades triviais ou sem importância. Refere-se à lenda de que
      o imperador Nero tocava lira enquanto Roma ardia em 64 d.C.
    ru: Выражение, описывающее ситуацию, когда кто-то халатно или безответственно игнорирует кризис, занимаясь
      пустяками или незначительными делами. Отсылает к легенде о том, что император Нерон играл на лире,
      пока Рим горел в 64 году н.э.
    ja: 「ローマが燃えているのにバイオリンを弾く」という意味で、危機を無視して trivial な活動に没頭する状況を表す。64年に皇帝ネロがローマの火事の最中にリラを弾いていたという伝説に由来する。
    zh: 意为“罗马在燃烧，他却在拉小提琴”，描述有人在危机面前漠然或不负责任地忙于琐事的情况。源于传说中公元64年皇帝尼禄在罗马大火时仍弹奏竖琴。
    ar: تعبير يصف موقفًا يتجاهل فيه شخص ما بإهمال أو تهور أزمة بينما ينشغل بأنشطة تافهة أو غير مهمة. يشير
      إلى الأسطورة التي تقول إن الإمبراطور نيرون كان يعزف على القيثارة بينما كانت روما تحترق عام 64 م.
    he: ביטוי המתאר מצב שבו מישהו מתעלם באדישות או בחוסר אחריות ממשבר תוך כדי עיסוק בפעילויות טריוויאליות
      או חסרות חשיבות. מתייחס לאגדה על הקיסר נירון שנגן בלירה בזמן ש روما בערה בשנת 64 לספירה
