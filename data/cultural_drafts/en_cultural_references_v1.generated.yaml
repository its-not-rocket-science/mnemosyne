    en: A phrase attributed to Jesus on the cross, asking God to forgive those who crucified him due to
      their ignorance. It signifies mercy and understanding toward those who act without full awareness
      of their actions.
    es: Frase atribuida a Jesús en la cruz, pidiendo a Dios que perdone a quienes lo crucificaron por
      ignorancia. Simboliza misericordia y comprensión hacia quienes actúan sin plena conciencia.
    fr: Une phrase attribuée à Jésus sur la croix, demandant à Dieu de pardonner ceux qui l'ont crucifié
      par ignorance. Elle symbolise la miséricorde et la compréhension envers ceux qui agissent sans pleine
      conscience.
    de: Ein Jesus zugeschriebenes Wort am Kreuz, in dem er Gott bittet, die zu vergeben, die ihn aus Unwissenheit
