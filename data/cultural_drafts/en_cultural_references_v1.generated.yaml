    ja: サミュエル・ジョンソンの決定版伝記を執筆したジェームズ・ボズウェルと、18世紀イギリス文学・辞書編纂の巨人ジョンソン自身との有名な文学的パートナーシップを指す。
    zh: 指的是詹姆斯·鲍斯韦尔与塞缪尔·约翰逊之间著名的文学合作，鲍斯韦尔撰写了约翰逊的权威传记，而约翰逊本人则是18世纪英国文学与词典学的泰斗。
    ar: يشير إلى الشراكة الأدبية الشهيرة بين جيمس بوسويل، مؤلف السيرة الذاتية النهائية لسامويل جونسون،
