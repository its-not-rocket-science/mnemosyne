- id: en_literary_reference_to_gild_the_lily_537e30ed
  language: en
  canonical_reference: To gild the lily
  reference_type: literary_reference
  surface_patterns:
  - to gild the lily
  - gilding the lily
  - gilded the lily
  short_explanation: To embellish something already perfect, often unnecessarily, making it worse. The
    phrase originates from Shakespeare's play 'King John' and is frequently used to criticize over-decoration
    or excessive praise.
  i18n_explanations:
    en: To embellish something already perfect, often unnecessarily, making it worse. The phrase originates
      from Shakespeare's play 'King John' and is frequently used to criticize over-decoration or excessive
      praise.
    es: Embellecer algo ya perfecto, a menudo innecesariamente, empeorándolo. La expresión proviene de
      la obra de Shakespeare 'El rey Juan' y se usa para criticar el exceso de decoración o alabanzas.
    fr: Embellir quelque chose déjà parfait, souvent inutilement, en l'abîmant. Cette expression vient
      de la pièce de Shakespeare 'Le Roi Jean' et sert à critiquer la surdécoration ou les éloges excessifs.
    de: Etwas bereits Perfektes unnötig verzieren und dadurch verschlimmern. Der Ausdruck stammt aus Shakespeares
      Stück 'König Johann' und wird oft für übertriebene Dekoration oder Lob verwendet.
    it: Abbellire qualcosa già perfetto, spesso inutilmente, rovinandolo. L'espressione proviene da Shakespeare
      e si usa per criticare l'eccesso di decorazione o di elogi.
    pt: Embelezar algo já perfeito, muitas vezes desnecessariamente, piorando-o. A expressão vem da peça
      de Shakespeare 'Rei João' e é usada para criticar o excesso de decoração ou elogios.
    ru: Украшать то, что уже идеально, часто излишне, ухудшая это. Фраза из пьесы Шекспира 'Король Иоанн'
      и используется для критики избыточного украшательства или похвал.
    ja: すでに完璧なものをさらに飾り立て、却って台無しにすること。シェイクスピアの戯曲「ジョン王」に由来し、過剰な装飾や賞賛を批判する際に用いられる。
    zh: 画蛇添足，将已完美的事物过度装饰，反而变得更糟。源自莎士比亚戏剧《约翰王》，常用于批评过度装饰或溢美之词。
    ar: تجميل شيءٍ أصلاً مثاليّ، غالبًا دون داعٍ، مما يفسده. العبارة مأخوذة من مسرحية شكسبير "الملك جون"
      وتُستخدم لانتقاد المبالغة في الزخرفة أو المديح.
    he: להציג דבר שכבר מושלם באופן מוגזם ולהרוס אותו. הביטוי מקורו במחזה 'המלך ג'ון' של שייקספיר ומשמש
      לביקורת על קישוט יתר או שבח מופרז.
