      und den kubanischen Widerstand.
    it: Un fallito sbarco militare a Cuba nel 1961 organizzato dal gruppo paramilitare Brigade 2506, finanziato
      dalla CIA. È un simbolo delle tensioni della Guerra Fredda, dei fallimenti della politica estera
      statunitense e della resistenza cubana.
    pt: Uma invasão militar fracassada de Cuba em 1961, realizada pelo grupo paramilitar Brigade 2506,
      financiado pela CIA. É um símbolo das tensões da Guerra Fria, dos fracassos da política externa
      dos EUA e da resistência cubana.
    ru: Неудачная военная операция по вторжению на Кубу в 1961 году, организованная ЦРУ и осуществленная
      парамилитарной группой Бригада 2506. Символ напряженности Холодной войны, провалов внешней политики
      США и кубинского сопротивления.
    ja: 1961年にCIAが支援した準軍事組織ブリゲード2506によるキューバ侵攻の失敗。冷戦の緊張、米国の外交政策の失敗、キューバの抵抗の象徴。
    zh: 1961年由中央情报局资助的准军事组织猪湾旅发动的对古巴的失败入侵。这是冷战紧张局势、美国外交政策失败和古巴抵抗的象征。
    ar: غزو عسكري فاشل لكوبا نفذته مجموعة شبه عسكرية برعاية وكالة المخابرات المركزية الأمريكية، brigade
