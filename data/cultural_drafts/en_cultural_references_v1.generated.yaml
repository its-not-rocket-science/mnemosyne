- id: en_literary_reference_the_social_contract_ab917c7e
  language: en
  canonical_reference: The social contract
  reference_type: literary_reference
  surface_patterns:
  - the social contract
  - social contract
  - a social contract
  short_explanation: A foundational concept in political philosophy, referring to an implicit agreement
    among individuals to form a society and submit to authority in exchange for security and collective
    benefits. Most famously articulated by Rousseau, Hobbes, and Locke.
  i18n_explanations:
    en: A foundational concept in political philosophy, referring to an implicit agreement among individuals
      to form a society and submit to authority in exchange for security and collective benefits. Most
      famously articulated by Rousseau, Hobbes, and Locke.
    es: Concepto fundamental en filosofía política que se refiere a un acuerdo implícito entre individuos
      para formar una sociedad y someterse a la autoridad a cambio de seguridad y beneficios colectivos.
      Articulado principalmente por Rousseau, Hobbes y Locke.
    fr: Concept fondamental en philosophie politique désignant un accord implicite entre individus pour
      former une société et se soumettre à l'autorité en échange de sécurité et d'avantages collectifs.
      Formulé notamment par Rousseau, Hobbes et Locke.
    de: Ein grundlegendes Konzept der politischen Philosophie, das sich auf eine implizite Übereinkunft
      zwischen Individuen bezieht, eine Gesellschaft zu bilden und sich der Autorität zu unterwerfen,
      um dafür Sicherheit und kollektive Vorteile zu erhalten. Berühmtester Ausdruck durch Rousseau, Hobbes
      und Locke.
    it: Concetto fondamentale nella filosofia politica che si riferisce a un accordo implicito tra individui
      per formare una società e sottomettersi all'autorità in cambio di sicurezza e benefici collettivi.
      Articolato principalmente da Rousseau, Hobbes e Locke.
    pt: Conceito fundamental na filosofia política que se refere a um acordo implícito entre indivíduos
      para formar uma sociedade e se submeter à autoridade em troca de segurança e benefícios coletivos.
      Articulado principalmente por Rousseau, Hobbes e Locke.
    ru: Фундаментальное понятие политической философии, обозначающее неявное соглашение между индивидами
      о создании общества и подчинении власти в обмен на безопасность и коллективные блага. Наиболее известные
      выразители — Руссо, Гоббс и Локк.
    ja: 政治哲学の基礎概念で、個人間の暗黙の合意により社会を形成し、権力に服従する代わりに安全と集団的利益を得るという考え。ルソー、ホッブズ、ロックによって最も有名に説明された。
    zh: 政治哲学的基础概念，指个人间的隐含协议以形成社会并服从权威，以换取安全与集体利益。最著名的阐述者为卢梭、霍布斯和洛克。
    ar: مفهوم أساسي في الفلسفة السياسية يشير إلى اتفاق ضمني بين الأفراد لتشكيل مجتمع والخضوع للسلطة مقابل
      الأمن والمنافع الجماعية. تم التعبير عنه بشكل بارز على يد روسو وهوبز ولوك.
    he: מושג יסודי בפילוסופיה פוליטית המתייחס להסכם סמוי בין אנשים ליצירת חברה ולהכפפת עצמם לסמכות בתמורה
      לביטחון ולתועלות קולקטיביות. מנוסח בעיקר על ידי רוסו, הובס ולוק.
