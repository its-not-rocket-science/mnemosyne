    en: Refers to a precociously seductive young girl or to Vladimir Nabokov's 1955 novel about a middle-aged
      man's obsession with a 12-year-old girl. The term has also been used to describe a sexual attraction
      to young girls.
    es: Se refiere a una joven seductora de manera precoz o a la novela de Vladimir Nabokov de 1955 sobre
      la obsesión de un hombre maduro con una niña de 12 años. El término también se ha usado para describir
      un atractivo sexual hacia niñas jóvenes.
    fr: Désigne une jeune fille d'une séduction précoce ou le roman de Vladimir Nabokov (1955) sur l'obsession
      d'un homme mûr pour une fillette de 12 ans. Le terme est aussi utilisé pour évoquer une attirance
      sexuelle envers des jeunes filles.
    de: Bezeichnet ein frühreif verführerisches Mädchen oder Nabokovs 1955 erschienenen Roman über die
      Besessenheit eines älteren Mannes von einem 12-jährigen Mädchen. Der Begriff wird auch für eine
      sexuelle Anziehung zu jungen Mädchen verwendet.
    it: Si riferisce a una ragazza seduttiva in modo precoce o al romanzo di Vladimir Nabokov del 1955
      sull'ossessione di un uomo di mezza età per una ragazza di 12 anni. Il termine è stato anche usato
      per descrivere un'attrazione sessuale verso ragazze giovani.
    pt: Refere-se a uma jovem sedutora de forma precoce ou ao romance de Vladimir Nabokov de 1955 sobre
