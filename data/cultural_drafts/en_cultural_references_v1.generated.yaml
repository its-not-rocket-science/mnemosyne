  - Beware a man of one book
  short_explanation: A warning against dogmatism or narrow-mindedness, suggesting that someone who relies
    on only one source of knowledge may be intellectually limited or dangerous. Often attributed to Thomas
    Aquinas.
  i18n_explanations:
    en: A warning against dogmatism or narrow-mindedness, suggesting that someone who relies on only one
      source of knowledge may be intellectually limited or dangerous. Often attributed to Thomas Aquinas.
    es: Advertencia contra el dogmatismo o la mente cerrada, sugiriendo que quien depende de una sola
      fuente de conocimiento puede ser intelectualmente limitado o peligroso. Atribuido a menudo a Tomás
      de Aquino.
    fr: Un avertissement contre le dogmatisme ou l'étroitesse d'esprit, suggérant que celui qui ne s'appuie
      que sur une seule source de connaissance peut être intellectuellement limité ou dangereux. Souvent
      attribué à Thomas d'Aquin.
    de: Eine Warnung vor Dogmatismus oder Engstirnigkeit, die besagt, dass jemand, der sich nur auf eine
      Wissensquelle stützt, geistig begrenzt oder gefährlich sein kann. Oft Thomas von Aquin zugeschrieben.
    it: Un avvertimento contro il dogmatismo o la mentalità ristretta, che suggerisce come chi si basa
      su un'unica fonte di conoscenza possa essere limitato o pericoloso. Spesso attribuito a Tommaso
      d'Aquino.
    pt: Um alerta contra o dogmatismo ou a mente fechada, sugerindo que quem depende de uma única fonte
      de conhecimento pode ser limitado ou perigoso. Atribuído frequentemente a Tomás de Aquino.
    ru: Предупреждение против догматизма или ограниченности, предполагающее, что тот, кто опирается только
      на один источник знаний, может быть интеллектуально ограничен или опасен. Часто приписывается Фоме
      Аквинскому.
    ja: 独善的な考えや偏狭さに対する警告で、知識源を一つに限定する人は知的に制限されているか危険である可能性を示唆する。しばしばトマス・アクィナスに帰せられる言葉。
    zh: 对教条主义或心胸狭隘的警告，暗示只依赖单一知识源的人可能在智识上受限或危险。常被归于托马斯·阿奎那。
