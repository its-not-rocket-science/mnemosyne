    ja: エドワード・ホッパーによる、アメリカのダイナーや孤独な人物を描いた象徴的でしばしば物悲しい作品を指し、20世紀中頃のアメリカ生活における孤独と静かな内省を象徴しています。
    zh: 指的是画家爱德华·霍普笔下标志性的、常常带有忧郁色彩的美国餐厅和孤独身影，象征着20世纪中叶美国生活中的孤独与静默反思。
