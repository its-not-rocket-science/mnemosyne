    en: Symbolizes an obsessive, unattainable goal or an insurmountable challenge. It originates from
      Herman Melville's novel 'Moby-Dick,' where Captain Ahab relentlessly pursues the white sperm whale
      that took his leg.
    es: Simboliza una meta obsesiva e inalcanzable o un desafío insuperable. Proviene de la novela 'Moby
      Dick' de Herman Melville, donde el capitán Ahab persigue incansablemente a la ballena blanca que
      le arrancó una pierna.
    fr: Symbolise un objectif obsessionnel et inaccessible ou un défi insurmontable. Il vient du roman
      'Moby Dick' d'Herman Melville, où le capitaine Achab poursuit sans relâche la baleine blanche qui
      lui a pris une jambe.
    de: Symbolisiert ein obsessives, unerreichbares Ziel oder eine unüberwindbare Herausforderung. Der
      Begriff stammt aus Herman Melvilles Roman 'Moby-Dick', in dem Kapitän Ahab den weißen Pottwal, der
      ihm ein Bein kostete, unerbittlich jagt.
    it: Simboleggia un obiettivo ossessivo e irraggiungibile o una sfida insormontabile. Deriva dal romanzo
      'Moby Dick' di Herman Melville, in cui il capitano Ahab insegue instancabilmente la balena bianca
      che gli ha portato via una gamba.
    pt: Simboliza uma meta obsessiva e inalcançável ou um desafio insuperável. Origina-se do romance 'Moby
      Dick' de Herman Melville, onde o capitão Ahab persegue incansavelmente a baleia branca que lhe arrancou
      uma perna.
    ru: Символизирует навязчивую, недостижимую цель или непреодолимую задачу. Впервые упоминается в романе
      Германа Мелвилла 'Моби Дик', где капитан Ахав безуспешно преследует белого кашалота, лишившего его
      ноги.
    ja: 執拗なまでに追い求める達成不可能な目標や克服できない課題を象徴する。ハーマン・メルヴィルの小説「白鯨」に由来し、エイハブ船長が脚を奪った白いマッコウクジラを執拗に追跡する物語。
    zh: 象征着执着而无法实现的目标或无法克服的挑战。源于赫尔曼·梅尔维尔的小说《白鲸》，其中亚哈船长疯狂追捕夺去他一条腿的白色抹香鲸。
    ar: يرمز إلى هدف مفرط في التعلق وغير قابل للتحقيق أو تحدٍ لا يمكن التغلب عليه. ينشأ من رواية هرمان
