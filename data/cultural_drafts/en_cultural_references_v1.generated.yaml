      l'urbanisme et les réglementations de sécurité incendie. Il reste un événement marquant de l'histoire
      britannique.
    de: Ein verheerender Brand im Jahr 1666, der weite Teile des mittelalterlichen London zerstörte und
      Stadtplanung sowie Brandschutzvorschriften prägte. Er bleibt ein prägendes Ereignis der britischen
      Geschichte.
    it: Un disastroso incendio nel 1666 che distrusse gran parte della Londra medievale, influenzando
      la pianificazione urbana e le norme antincendio. Rimane un evento chiave della storia britannica.
    pt: Um incêndio catastrófico em 1666 que destruiu grande parte da Londres medieval, moldando o planejamento
