  short_explanation: A French term meaning 'nobility obligates,' suggesting that those with privilege
    or high status have a duty to act with generosity and honor toward those less privileged. It reflects
    ethical expectations in aristocratic societies.
  i18n_explanations:
    en: A French term meaning 'nobility obligates,' suggesting that those with privilege or high status
      have a duty to act with generosity and honor toward those less privileged. It reflects ethical expectations
      in aristocratic societies.
    es: Término francés que significa 'la nobleza obliga', sugiriendo que quienes tienen privilegios o
      alto estatus tienen el deber de actuar con generosidad y honor hacia los menos privilegiados. Refleja
      expectativas éticas en sociedades aristocráticas.
    fr: Locution française signifiant 'la noblesse oblige', suggérant que ceux qui ont des privilèges
      ou un statut élevé ont le devoir d'agir avec générosité et honneur envers les moins favorisés. Elle
      reflète les attentes éthiques des sociétés aristocratiques.
    de: Ein französischer Begriff, der 'Adel verpflichtet' bedeutet und besagt, dass Menschen mit Privilegien
      oder hohem Status die Pflicht haben, gegenüber weniger Privilegierten großzügig und ehrenhaft zu
      handeln. Er spiegelt ethische Erwartungen in aristokratischen Gesellschaften wider.
    it: Un termine francese che significa 'la nobiltà obbliga', suggerendo che chi ha privilegi o alto
      status ha il dovere di agire con generosità e onore verso i meno privilegiati. Riflette le aspettative
      etiche nelle società aristocratiche.
    pt: Termo francês que significa 'a nobreza obriga', sugerindo que aqueles com privilégios ou alto
      status têm o dever de agir com generosidade e honra para com os menos privilegiados. Reflete expectativas
      éticas em sociedades aristocráticas.
    ru: Французский термин, означающий 'благородство обязывает', подразумевающий, что люди с привилегиями
      или высоким статусом обязаны проявлять щедрость и честь по отношению к менее привилегированным.
      Отражает этические нормы аристократических обществ.
    ja: 「高貴なる者には義務が伴う」という意味のフランス語の概念で、特権や高い地位にある者は、より恵まれない人々に対して寛大さと名誉をもって行動する義務があるとする考え。貴族社会の倫理的期待を反映している。
    zh: 法语术语，意为「贵族义务」，指有特权或高社会地位的人有义务以慷慨和荣誉对待弱势群体。反映了贵族社会的道德期望。
