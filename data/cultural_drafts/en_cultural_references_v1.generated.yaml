  short_explanation: A 1930 protest led by Mahatma Gandhi against British salt taxes, where he marched
    240 miles to the coastal town of Dandi to make salt from seawater. Symbolizes nonviolent civil disobedience
    and Indian independence activism.
  i18n_explanations:
    en: A 1930 protest led by Mahatma Gandhi against British salt taxes, where he marched 240 miles to
      the coastal town of Dandi to make salt from seawater. Symbolizes nonviolent civil disobedience and
      Indian independence activism.
    es: Una protesta de 1930 liderada por Mahatma Gandhi contra los impuestos británicos a la sal, en
      la que marchó 386 km hasta el pueblo costero de Dandi para producir sal del agua de mar. Simboliza
      la desobediencia civil no violenta y la lucha por la independencia de la India.
    fr: Une protestation de 1930 menée par Mahatma Gandhi contre les taxes britanniques sur le sel, lors
      de laquelle il a marché 386 km jusqu'à la ville côtière de Dandi pour produire du sel à partir d'eau
      de mer. Symbolise la désobéissance civile non violente et l'activisme pour l'indépendance de l'Inde.
    de: Ein 1930 von Mahatma Gandhi geführter Protest gegen britische Salzsteuern, bei dem er 386 km bis
      zum Küstenort Dandi marschierte, um Salz aus Meerwasser zu gewinnen. Symbolisiert gewaltfreien zivilen
      Ungehorsam und indischen Unabhängigkeitskampf.
    it: Una protesta del 1930 guidata da Mahatma Gandhi contro le tasse britanniche sul sale, durante
      la quale marciò per 386 km fino alla città costiera di Dandi per produrre sale dall'acqua di mare.
      Simboleggia la disobbedienza civile non violenta e l'attivismo per l'indipendenza indiana.
    pt: Uma manifestação de 1930 liderada por Mahatma Gandhi contra os impostos britânicos sobre o sal,
      na qual ele marchou 386 km até a cidade costeira de Dandi para produzir sal da água do mar. Simboliza
      a desobediência civil não violenta e o ativismo pela independência da Índia.
    ru: Протест 1930 года под руководством Махатмы Ганди против британских налогов на соль, в ходе которого
      он прошел 386 км до прибрежного города Данди, чтобы добыть соль из морской воды. Символизирует ненасильственное
      гражданское неповиновение и борьбу за независимость Индии.
    ja: 1930年にマハトマ・ガンディーがイギリスの塩税に抗議して行った行進。海岸の町ダンディまで386キロを歩き、海水から塩を作った。非暴力的な市民的不服従とインド独立運動の象徴。
    zh: 1930年，圣雄甘地领导的反对英国食盐税的抗议活动，他行进386公里到海滨小镇丹迪，从海水中提取食盐。象征着非暴力公民不服从和印度独立运动。
    ar: احتجاج عام 1930 بقيادة المهاتما غاندي ضد ضرائب الملح البريطانية، حيث سار 386 كيلومترًا إلى بلدة
      داندي الساحلية لصنع الملح من مياه البحر. يرمز إلى عدم الامتثال المدني السلمي ونشاط استقلال الهند.
    he: צעדה בת 1930 שהוביל מהטמה גנדי נגד מיסי המלח הבריטיים, בה צעד 386 קילומטרים לעיר החוף דאנדי כדי
      להפיק מלח ממי ים. מסמל התנגדות אזרחית לא אלימה ופעילות למען עצמאות הודו.
