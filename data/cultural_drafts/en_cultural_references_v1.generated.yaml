- id: en_literary_reference_a_the_waste_land_wasteland_7cde7732
  language: en
  canonical_reference: A The Waste Land wasteland
  reference_type: literary_reference
  surface_patterns:
  - The Waste Land wasteland
  - a Waste Land wasteland
  - wasteland of The Waste Land
  - The Waste Land
  short_explanation: Refers to a barren, desolate, or spiritually empty state, both personally and societally.
    It originates from T.S. Eliot's 1922 modernist poem 'The Waste Land,' which depicts post-World War
    I disillusionment and cultural decay.
  i18n_explanations:
    en: Refers to a barren, desolate, or spiritually empty state, both personally and societally. It originates
      from T.S. Eliot's 1922 modernist poem 'The Waste Land,' which depicts post-World War I disillusionment
      and cultural decay.
    es: Se refiere a un estado de desolación, vacío espiritual o decadencia, tanto a nivel personal como
      social. Proviene del poema modernista de T.S. Eliot de 1922 'La tierra baldía', que retrata el desencanto
      tras la Primera Guerra Mundial y la decadencia cultural.
    fr: Désigne un état de désolation, de vide spirituel ou de décadence, tant sur le plan personnel que
      sociétal. Provient du poème moderniste de T.S. Eliot de 1922 'La Terre vaine', qui dépeint le désenchantement
      d'après la Première Guerre mondiale et la décadence culturelle.
    de: Bezeichnet einen öden, verlassenen oder geistig leeren Zustand, sowohl persönlich als auch gesellschaftlich.
      Stammt aus T.S. Eliots modernistischem Gedicht 'The Waste Land' (1922), das die Ernüchterung nach
      dem Ersten Weltkrieg und den kulturellen Verfall darstellt.
    it: Si riferisce a uno stato di desolazione, vuoto spirituale o decadenza, sia personale che sociale.
      Deriva dal poema modernista di T.S. Eliot del 1922 'La terra desolata', che ritrae il disincanto
      post Prima guerra mondiale e il declino culturale.
    pt: Refere-se a um estado de desolação, vazio espiritual ou decadência, tanto pessoal quanto social.
      Vem do poema modernista de T.S. Eliot de 1922 'A Terra Desolada', que retrata o desencanto após
      a Primeira Guerra Mundial e a decadência cultural.
    ru: Обозначает состояние опустошённости, духовной пустоты или упадка, как на личном, так и на общественном
      уровне. Впервые использовано в модернистской поэме Т.С. Элиота 'Бесплодная земля' (1922), изображающей
      разочарование после Первой мировой войны и культурный упадок.
    ja: 個人的にも社会的にも、荒涼とした、精神的に空虚な状態を指す。T.S.エリオットの1922年のモダニスト詩「荒地」に由来し、第一次世界大戦後の幻滅と文化的衰退を描いている。
    zh: 指个人或社会层面的荒芜、凄凉或精神空虚状态。源自T.S.艾略特1922年现代主义诗作《荒原》，描绘一战后的幻灭与文化衰颓。
    ar: يشير إلى حالة من القحط أو الفراغ الروحي أو الانحطاط، على الصعيدين الشخصي والاجتماعي. ينشأ من قصيدة
      تي. إس. إليوت الحداثية 'الأرض الخراب' (1922)، التي تصوّر خيبة الأمل بعد الحرب العالمية الأولى والانحطاط
      الثقافي.
    he: מתייחס למצב של שממה, ריקנות רוחנית או הידרדרות, הן ברמה אישית והן חברתית. מקורו בשירו המודרניסטי
      של ט״ס אליוט 'ארץ השממה' (1922), המתאר את האכזבה שלאחר מלחמת העולם הראשונה ואת ההידרדרות התרבותית.
