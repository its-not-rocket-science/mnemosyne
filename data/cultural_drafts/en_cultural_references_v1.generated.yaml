      un humano roba u oculta su piel.
    fr: Un selkie est une créature mythique du folklore celtique qui peut se défaire de sa peau de phoque
      pour devenir humain. La 'malédiction' fait référence à la perte tragique d'identité ou de liberté
      lorsqu'un humain vole ou cache sa peau.
    de: Ein Selkie ist ein mythologisches Wesen aus dem keltischen Volksglauben, das seine Robbenhaut
