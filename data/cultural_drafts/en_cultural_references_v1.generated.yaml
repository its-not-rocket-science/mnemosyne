  short_explanation: A theatrical convention where the audience pretends to be observing real events through
    an invisible wall. Breaking it refers to characters acknowledging the audience.
  i18n_explanations:
    en: A theatrical convention where the audience pretends to be observing real events through an invisible
      wall. Breaking it refers to characters acknowledging the audience.
    es: Convención teatral en la que el público finge observar eventos reales a través de una pared invisible.
      Romperla significa que los personajes reconocen al público.
    fr: Convention théâtrale où le public fait semblant d'observer des événements réels à travers un mur
      invisible. La briser signifie que les personnages reconnaissent le public.
    de: Theatrale Konvention, bei der das Publikum so tut, als würde es durch eine unsichtbare Wand echte
      Ereignisse beobachten. Das Durchbrechen bezieht sich auf Figuren, die das Publikum wahrnehmen.
    it: Convenzione teatrale in cui il pubblico finge di osservare eventi reali attraverso una parete
      invisibile. Romperla significa che i personaggi riconoscono il pubblico.
    pt: Convenção teatral em que o público finge observar eventos reais através de uma parede invisível.
      Quebrá-la significa personagens reconhecerem o público.
    ru: Театральное условное правило, при котором зрители делают вид, что наблюдают реальные события через
      невидимую стену. Нарушение означает, что персонажи обращаются к зрителям.
    ja: 観客が見えない壁を通して現実の出来事を観察しているかのように振る舞う演劇の慣習。壁を破るとは、登場人物が観客に気づくことを指す。
    zh: 戏剧惯例，观众假装透过一面无形的墙观看真实事件。打破第四面墙指的是角色意识到观众的存在。
    ar: مفهوم مسرحي يتظاهر فيه الجمهور بمراقبة أحداث حقيقية من خلال جدار غير مرئي. كسره يعني أن الشخصيات
