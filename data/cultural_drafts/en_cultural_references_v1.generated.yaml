- id: en_cultural_reference_cromwell_s_ironsides_6259efa0
  language: en
  canonical_reference: Cromwell's Ironsides
  reference_type: cultural_reference
  surface_patterns:
  - Cromwell's Ironsides
  - the Ironsides
  - Ironsides
  short_explanation: Refers to the elite cavalry force of Oliver Cromwell's New Model Army during the
    English Civil War, known for their discipline and iron discipline. Symbolizes military prowess and
    strict adherence to principles.
  i18n_explanations:
    en: Refers to the elite cavalry force of Oliver Cromwell's New Model Army during the English Civil
      War, known for their discipline and iron discipline. Symbolizes military prowess and strict adherence
      to principles.
    es: Se refiere a la élite de caballería del ejército de Oliver Cromwell durante la Guerra Civil Inglesa,
      conocida por su disciplina férrea. Simboliza el poderío militar y la estricta adhesión a los principios.
    fr: Fait référence à l'élite de la cavalerie de l'armée de Oliver Cromwell pendant la guerre civile
      anglaise, connue pour sa discipline de fer. Symbolise la puissance militaire et l'adhésion stricte
      aux principes.
    de: Bezieht sich auf die Elite-Kavallerie von Oliver Cromwells New Model Army während des Englischen
      Bürgerkriegs, bekannt für ihre eiserne Disziplin. Symbolisiert militärische Stärke und strikte Prinzipientreue.
    it: Si riferisce all'élite della cavalleria dell'esercito di Oliver Cromwell durante la Guerra Civile
      Inglese, nota per la sua disciplina ferrea. Simboleggia il potere militare e l'adesione rigorosa
      ai principi.
    pt: Refere-se à elite da cavalaria do exército de Oliver Cromwell durante a Guerra Civil Inglesa,
      conhecida por sua disciplina de ferro. Simboliza o poderio militar e a adesão estrita a princípios.
    ru: Относится к элитной кавалерии армии Оливера Кромвеля во время Английской революции, известной
      своей железной дисциплиной. Символизирует военное мастерство и строгое соблюдение принципов.
    ja: イギリス内戦中のオリバー・クロムウェルの鉄騎隊（ニューモデルアーミーの精鋭騎兵部隊）を指す。その鉄の規律で知られ、軍事的な力と原則への厳格な忠誠を象徴する。
    zh: 指的是英国内战期间奥利弗·克伦威尔的新模范军中的精锐骑兵部队，以其铁一般的纪律著称。象征着军事力量和对原则的严格坚持。
    ar: يشير إلى قوات الفرسان النخبة لجيش أوليفر كرومويل خلال الحرب الأهلية الإنجليزية، المعروفة بانضباطها
