      несущим золотые яйца.
    ja: ジャックと豆の木はイギリスの古典童話で、少年が牛を魔法の豆と交換し、巨大な豆の木を育てて巨人の国へ登り、金のハープと金の卵を産むガチョウを持ち帰る物語。
    zh: 《杰克与豆茎》是英国经典童话，讲述一个男孩用一头母牛换来魔法豆子，长出一根巨大的豆茎，爬上巨人国，带回一把金竖琴和一只下金蛋的鹅。
    ar: حكاية خرافية إنجليزية كلاسيكية عن فتى يبدل بقرة بحبوب سحرية، ينمو له ساق فاصولياء عملاقة، ويتسلق
