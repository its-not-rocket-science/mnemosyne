  - a tooth for a tooth
  short_explanation: A principle of justice advocating retaliation in kind for injury, originating from
    ancient legal codes. It symbolizes proportional justice but is often critiqued for promoting vengeance.
  i18n_explanations:
    en: A principle of justice advocating retaliation in kind for injury, originating from ancient legal
      codes. It symbolizes proportional justice but is often critiqued for promoting vengeance.
    es: Principio de justicia que aboga por la retaliación equivalente por un daño, originario de códigos
      legales antiguos. Simboliza la justicia proporcional, aunque a menudo se critica por promover la
      venganza.
    fr: Un principe de justice prônant la rétribution équivalente pour un préjudice, issu de codes juridiques
      anciens. Il symbolise la justice proportionnelle mais est souvent critiqué pour favoriser la vengeance.
    de: Ein Gerechtigkeitsprinzip, das für eine gleichwertige Vergeltung bei Verletzung plädiert und aus
      alten Rechtskodizes stammt. Es steht für proportionale Gerechtigkeit, wird aber oft für die Förderung
      von Rache kritisiert.
    it: Un principio di giustizia che sostiene la ritorsione equivalente per un danno, originario di antichi
      codici legali. Simboleggia la giustizia proporzionale ma viene spesso criticato per promuovere la
      vendetta.
    pt: Um princípio de justiça que defende a retaliação equivalente por um dano, originário de antigos
      códigos legais. Simboliza a justiça proporcional, mas é frequentemente criticado por promover a
      vingança.
    ru: Принцип справедливости, требующий равного возмездия за причинённый ущерб, восходящий к древним
      правовым кодексам. Олицетворяет пропорциональное правосудие, но часто критикуется за поощрение мести.
    ja: 傷害に対する同等の報復を求める正義の原則で、古代の法典に由来する。比例的正義を象徴するが、報復を助長すると批判されることも多い。
    zh: 主张以牙还牙、以眼还眼的正义原则，源自古代法律。象征比例正义，但常因助长报复而受到批评。
    ar: مبدأ للعدالة يدعو إلى معاقبة الجاني بمثل جريمته، مستمد من القوانين القديمة. يرمز إلى العدالة المتناسبة
