- id: en_proverb_tradition_hubris_leads_to_nemesis_ff8fb755
  language: en
  canonical_reference: Hubris leads to nemesis
  reference_type: proverb_tradition
  surface_patterns:
  - Hubris leads to nemesis
  - Hubris brings nemesis
  - Hubris is followed by nemesis
  - Hubris and nemesis
  short_explanation: A proverb stating that excessive pride (hubris) inevitably results in retribution
    or downfall (nemesis). It reflects ancient Greek moral philosophy emphasizing balance and humility.
  i18n_explanations:
    en: A proverb stating that excessive pride (hubris) inevitably results in retribution or downfall
      (nemesis). It reflects ancient Greek moral philosophy emphasizing balance and humility.
    es: Un proverbio que afirma que el exceso de orgullo (hybris) inevitablemente conlleva un castigo
      o caída (némesis). Refleja la filosofía moral griega antigua que enfatiza el equilibrio y la humildad.
    fr: Un proverbe affirmant que l'excès d'orgueil (hybris) entraîne inévitablement une punition ou une
      chute (némésis). Il reflète la philosophie morale grecque antique, mettant l'accent sur l'équilibre
      et l'humilité.
    de: Ein Sprichwort, das besagt, dass übermäßiger Stolz (Hybris) unweigerlich Vergeltung oder Untergang
      (Nemesis) nach sich zieht. Es spiegelt die antike griechische Moralphilosophie wider, die Ausgewogenheit
      und Demut betont.
    it: Un proverbio che afferma che l'eccessiva superbia (hybris) porta inevitabilmente a una punizione
      o rovina (nemesi). Riflette la filosofia morale greca antica che enfatizza equilibrio e umiltà.
    pt: Um provérbio que afirma que o excesso de orgulho (hybris) inevitavelmente resulta em retribuição
      ou queda (némese). Reflete a filosofia moral grega antiga, que enfatiza equilíbrio e humildade.
    ru: Поговорка, утверждающая, что чрезмерная гордыня (гибрис) неизбежно ведет к возмездию или падению
      (немизис). Отражает древнегреческую моральную философию, подчеркивающую равновесие и смирение.
    ja: 過剰な傲慢（ハイbris）が必然的に報い（ネメシス）を招くという格言。古代ギリシャの倫理哲学を反映し、バランスと謙虚さを重視する。
    zh: 一句格言，认为过度的傲慢（hybris）必然导致报应或毁灭（nemesis）。体现了古希腊道德哲学强调的平衡与谦卑。
    ar: مثل يقول إن الغرور المفرط (هيبرس) يؤدي حتماً إلى عقاب أو سقوط (نيميسيس). يعكس الفلسفة الأخلاقية
      اليونانية القديمة التي تؤكد على التوازن والتواضع.
    he: פתגם הטוען כי גאווה יתרה (היבריס) מובילה בהכרח לנקמה או לנפילה (נמסיס). משקף את הפילוסופיה המוסרית
      היוונית העתיקה, המדגישה איזון וענווה.
