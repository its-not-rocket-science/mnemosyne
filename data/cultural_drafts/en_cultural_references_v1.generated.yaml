- id: en_literary_reference_all_the_world_s_a_stage_06ad565c
  language: en
  canonical_reference: All the world’s a stage
  reference_type: literary_reference
  surface_patterns:
  - all the world's a stage
  - the world's a stage
  - all the world is a stage
  short_explanation: A metaphor for life as a theatrical performance, with people playing different roles
    at various stages of life. It is one of the most famous speeches from Shakespeare's 'As You Like It.'
  i18n_explanations:
    en: A metaphor for life as a theatrical performance, with people playing different roles at various
      stages of life. It is one of the most famous speeches from Shakespeare's 'As You Like It.'
    es: Una metáfora de la vida como una representación teatral, donde las personas interpretan distintos
      papeles en las diferentes etapas de la existencia. Es uno de los monólogos más famosos de Shakespeare
      en 'Como gustéis'.
    fr: Une métaphore de la vie comme une représentation théâtrale, où les gens jouent différents rôles
      à différentes étapes de l'existence. C'est l'un des discours les plus célèbres de Shakespeare dans
      'Comme il vous plaira'.
    de: Eine Metapher für das Leben als theatralische Darstellung, bei der Menschen in verschiedenen Lebensphasen
      unterschiedliche Rollen spielen. Es ist einer der berühmtesten Monologe Shakespeares aus 'Wie es
      euch gefällt'.
    it: Una metafora della vita come rappresentazione teatrale, in cui le persone recitano ruoli diversi
      nelle varie fasi dell'esistenza. È uno dei discorsi più famosi di Shakespeare in 'Come vi piace'.
    pt: Uma metáfora da vida como uma performance teatral, em que as pessoas desempenham diferentes papéis
      em várias fases da existência. É um dos discursos mais famosos de Shakespeare em 'Como Gostais'.
    ru: Метафора жизни как театрального представления, где люди играют разные роли на разных этапах существования.
      Это одна из самых известных речей Шекспира из пьесы 'Как вам это понравится'.
    ja: 人生を演劇のようなものと見立て、人々が人生の様々な段階で異なる役を演じるという比喩。シェイクスピアの「お気に召すまま」で最も有名なスピーチの一つ。
    zh: 将人生比作戏剧表演，人们在生命的不同阶段扮演不同角色。这是莎士比亚《皆大欢喜》中最著名的台词之一。
    ar: استعارة للحياة باعتبارها عرضًا مسرحيًا، حيث يلعب الناس أدوارًا مختلفة في مراحل مختلفة من الحياة.
      إنها واحدة من أشهر الخطابات لشكسبير في 'كما تشاء'.
    he: מטאפורה לחיים כהצגה תיאטרלית, שבה אנשים מגלמים תפקידים שונים בשלבים שונים של החיים. זוהי אחת הנאומים
      המפורסמים ביותר של שייקספיר ב'כטוב בעיניכם'.
