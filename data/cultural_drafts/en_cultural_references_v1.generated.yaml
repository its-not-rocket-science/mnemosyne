    ja: デヴィッド・ホックニーによる象徴的なプールの絵画、特に1960年代から1970年代にかけてのシリーズ作品「A Bigger Splash」などを指す。これらの作品は鮮やかな色彩とモダニズムのスタイルで称賛され、カリフォルニアのライフスタイルの本質を捉えている。
