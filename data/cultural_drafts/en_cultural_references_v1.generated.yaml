  reference_type: literary_reference
  surface_patterns:
  - Big Brother is watching you
  - Big Brother is watching
  - Big Brother watches
  - Big Brother
  short_explanation: A phrase symbolizing totalitarian surveillance and government control, originating
    from George Orwell's dystopian novel where the omnipresent authority monitors citizens relentlessly.
