  - a great deal of ado about nothing
  - all this fuss about nothing
  short_explanation: A phrase indicating unnecessary or exaggerated concern over trivial matters. It originates
    from Shakespeare's comedy of the same name, where characters engage in deceptive schemes that lead
    to misunderstandings.
  i18n_explanations:
    en: A phrase indicating unnecessary or exaggerated concern over trivial matters. It originates from
      Shakespeare's comedy of the same name, where characters engage in deceptive schemes that lead to
      misunderstandings.
    es: Frase que indica una preocupación innecesaria o exagerada por asuntos triviales. Proviene de la
      comedia de Shakespeare del mismo nombre, donde los personajes se involucran en esquemas engañosos
      que generan malentendidos.
    fr: Expression désignant une préoccupation inutile ou exagérée pour des choses insignifiantes. Elle
      vient de la comédie de Shakespeare du même nom, où les personnages s'engagent dans des intrigues
      trompeuses qui mènent à des malentendus.
    de: Ein Ausdruck für unnötige oder übertriebene Sorgen um belanglose Dinge. Er stammt aus Shakespeares
      gleichnamiger Komödie, in der Figuren durch trügerische Pläne zu Missverständnissen führen.
    it: Un'espressione che indica una preoccupazione inutile o esagerata per questioni banali. Deriva
      dalla commedia di Shakespeare dallo stesso titolo, in cui i personaggi si imbarcano in intrighi
      ingannevoli che portano a fraintendimenti.
    pt: Expressão que indica uma preocupação desnecessária ou exagerada com assuntos triviais. Vem da
      comédia de Shakespeare de mesmo nome, onde personagens se envolvem em esquemas enganosos que levam
      a mal-entendidos.
    ru: Выражение, обозначающее ненужную или преувеличенную озабоченность пустяками. Оно восходит к одноимённой
      комедии Шекспира, где герои строят обманные планы, приводящие к недоразумениям.
    ja: 些細なことに対して不必要に大げさな心配をすることを表す言葉。シェイクスピアの同名の喜劇に由来し、登場人物が騙し合いの策略を巡らせ、誤解が生じる場面から生まれた。
    zh: 表示对无关紧要的事情进行不必要或夸张的担忧。源自莎士比亚同名喜剧，其中角色通过欺骗计划引发误会。
    ar: عبارة تشير إلى قلق غير ضروري أو مبالغ فيه بشأن أمور تافهة. تأتي من مسرحية شكسبير التي تحمل نفس
      الاسم، حيث يتورط الشخصيات في مخططات خادعة تؤدي إلى سوء فهم.
    he: ביטוי המציין דאגה מופרזת או מיותרת בנושאים שוליים. מקורו במחזהו של שייקספיר באותו שם, בו הדמויות
