- id: en_cultural_reference_a_rembrandt_night_watch_700ffd3d
  language: en
  canonical_reference: A Rembrandt night watch
  reference_type: cultural_reference
  surface_patterns:
  - a Rembrandt night watch
  - Rembrandt's Night Watch
  - the Night Watch
  short_explanation: Refers to Rembrandt van Rijn's 1642 masterpiece depicting a militia company, notable
    for its dramatic use of light and dynamic composition, symbolizing Dutch Golden Age civic pride and
    artistic innovation.
  i18n_explanations:
    en: Refers to Rembrandt van Rijn's 1642 masterpiece depicting a militia company, notable for its dramatic
      use of light and dynamic composition, symbolizing Dutch Golden Age civic pride and artistic innovation.
    es: Se refiere a la obra maestra de Rembrandt van Rijn de 1642 que representa a una compañía de milicia,
      destacada por su uso dramático de la luz y composición dinámica, simbolizando el orgullo cívico
      y la innovación artística de la Edad de Oro neerlandesa.
    fr: Fait référence au chef-d'œuvre de Rembrandt van Rijn de 1642 représentant une compagnie de milice,
      remarquable par son usage dramatique de la lumière et sa composition dynamique, symbolisant la fierté
      civique et l'innovation artistique de l'âge d'or néerlandais.
    de: Bezieht sich auf Rembrandts Meisterwerk von 1642, das eine Bürgerwehr darstellt, bekannt für seinen
      dramatischen Lichteinsatz und die dynamische Komposition, das niederländischen Stolz und künstlerische
      Innovation im Goldenen Zeitalter symbolisiert.
    it: Si riferisce al capolavoro di Rembrandt van Rijn del 1642 che ritrae una compagnia di milizia,
      noto per l'uso drammatico della luce e la composizione dinamica, che simboleggia l'orgoglio civico
      e l'innovazione artistica dell'età dell'oro olandese.
    pt: Refere-se à obra-prima de Rembrandt van Rijn de 1642 que retrata uma companhia de milícia, notável
      pelo uso dramático da luz e composição dinâmica, simbolizando o orgulho cívico e a inovação artística
      da Idade de Ouro holandesa.
    ru: Относится к шедевру Рембрандта ван Рейна 1642 года, изображающему роту ополчения, известному драматическим
      использованием света и динамичной композицией, что символизирует гражданскую гордость и художественные
      инновации Золотого века Нидерландов.
    ja: レンブラント・ファン・レインの1642年の傑作で、民兵隊を描いたこの作品は、劇的な光の使い方とダイナミックな構図で知られ、オランダ黄金時代の市民的誇りと芸術的革新を象徴しています。
    zh: 指的是伦勃朗·凡·莱因1642年的杰作，描绘了一队民兵，以其戏剧性的用光和动态构图而著称，象征着荷兰黄金时代的市民自豪感与艺术创新。
    ar: يشير إلى تحفة رامبرانت فان رijn لعام 1642 التي تصور شركة ميليشيا، والتي تتميز باستخدامها الدرامي
      للضوء والتركيب الديناميكي، مما يرمز إلى فخر المواطنة والابتكار الفني للعصر الذهبي الهولندي.
    he: מתייחס ליצירת המופת של רמברנדט ואן ריין משנת 1642 המתארת פלוגת מיליציה, אשר ידועה בשימוש הדרמטי
      שלה באור ובהרכב הדינמי שלה, ומסמלת את גאוות האזרחים והתקדמות האמנותית של תור הזהב ההולנדי.
