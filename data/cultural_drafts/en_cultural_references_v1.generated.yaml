- id: en_cultural_reference_a_caravaggio_chiaroscuro_0ae0b36a
  language: en
  canonical_reference: A Caravaggio chiaroscuro
  reference_type: cultural_reference
  surface_patterns:
  - a Caravaggio chiaroscuro
  - Caravaggio's chiaroscuro
  - chiaroscuro in the style of Caravaggio
  - Caravaggio-style chiaroscuro
  short_explanation: Refers to the dramatic use of light and shadow in painting, pioneered by Michelangelo
    Merisi da Caravaggio. The technique creates stark contrasts and depth, often highlighting moral or
    emotional tension in figures.
  i18n_explanations:
    en: Refers to the dramatic use of light and shadow in painting, pioneered by Michelangelo Merisi da
      Caravaggio. The technique creates stark contrasts and depth, often highlighting moral or emotional
      tension in figures.
    es: Se refiere al uso dramático de la luz y la sombra en la pintura, pionero de Michelangelo Merisi
      da Caravaggio. La técnica crea contrastes marcados y profundidad, resaltando a menudo la tensión
      moral o emocional en las figuras.
    fr: Fait référence à l'utilisation dramatique de la lumière et de l'ombre en peinture, initiée par
      Michelangelo Merisi da Caravaggio. La technique crée des contrastes marqués et de la profondeur,
      mettant souvent en valeur la tension morale ou émotionnelle des personnages.
    de: Bezieht sich auf den dramatischen Einsatz von Licht und Schatten in der Malerei, der von Michelangelo
      Merisi da Caravaggio geprägt wurde. Die Technik schafft starke Kontraste und Tiefe und hebt oft
      moralische oder emotionale Spannungen in den Figuren hervor.
    it: Si riferisce all'uso drammatico di luce e ombra nella pittura, introdotto da Michelangelo Merisi
      da Caravaggio. La tecnica crea contrasti netti e profondità, spesso evidenziando la tensione morale
      o emotiva delle figure.
    pt: Refere-se ao uso dramático de luz e sombra na pintura, pioneiro de Michelangelo Merisi da Caravaggio.
      A técnica cria contrastes marcados e profundidade, destacando frequentemente a tensão moral ou emocional
      nas figuras.
    ru: Описывает драматическое использование света и тени в живописи, pioneered by Michelangelo Merisi
      da Caravaggio. Эта техника создает резкие контрасты и глубину, часто подчеркивая моральное или эмоциональное
      напряжение в фигурах.
    ja: ミケランジェロ・メリジ・ダ・カラヴァッジョによって確立された、光と影の劇的な使い方を指す。この技法は強いコントラストと奥行きを生み出し、しばしば人物の道徳的または感情的な緊張を強調する。
    zh: 指代由米开朗基罗·梅里西·达·卡拉瓦乔开创的绘画中光影的戏剧性运用。这种技法创造出强烈的对比与深度，常用于突出人物的道德或情感张力。
    ar: يشير إلى الاستخدام الدرامي للضوء والظل في الرسم، والذي ابتكره ميكيلانجيلو ميريسي دا كارافاجيو.
      تخلق هذه التقنية تباينات حادة وعمقًا، وغالبًا ما تسلط الضوء على التوتر الأخلاقي أو العاطفي في الشخصيات.
    he: מתייחס לשימוש הדרמטי באור ובצל בציור, אותו פיתח מיכלאנג'לו מריסי דה קראווג'ו. הטכניקה יוצרת ניגודים
      חדים ועומק, ומדגישה לעיתים קרובות מתח מוסרי או רגשי בדמויות.
