      que sea, ante circunstancias extremas. Subraya los límites de la desesperación humana.
    fr: Ce proverbe décrit une personne désespérée qui acceptera n'importe quelle aide, aussi inadéquate
      soit-elle, face à des circonstances extrêmes. Il illustre les limites du désespoir humain.
    de: Dieses Sprichwort beschreibt eine verzweifelte Person, die in auswegloser Lage jede Hilfe ergreifen
      wird, selbst wenn sie unzureichend ist. Es zeigt die Grenzen menschlicher Verzweiflung.
    it: Questo proverbio descrive una persona disperata che accetterà qualsiasi aiuto, per quanto inadeguato,
      di fronte a circostanze estreme. Sottolinea i limiti della disperazione umana.
    pt: Este provérbio descreve uma pessoa desesperada que aceitará qualquer ajuda, por mais inadequada
