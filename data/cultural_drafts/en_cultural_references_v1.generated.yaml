- id: en_cultural_reference_a_rubens_fleshy_nudes_80bcd3e0
  language: en
  canonical_reference: A Rubens fleshy nudes
  reference_type: cultural_reference
  surface_patterns:
  - a Rubens fleshy nude
  - Rubens's fleshy nudes
  - Rubensian fleshy nudes
  - fleshy nudes in the style of Rubens
  short_explanation: Refers to the voluptuous, full-bodied nudes painted by Peter Paul Rubens (1577–1640),
    a Flemish artist known for his sensual and dynamic depictions of human flesh. These works are often
    associated with Baroque opulence and physical abundance.
  i18n_explanations:
    en: Refers to the voluptuous, full-bodied nudes painted by Peter Paul Rubens (1577–1640), a Flemish
      artist known for his sensual and dynamic depictions of human flesh. These works are often associated
      with Baroque opulence and physical abundance.
    es: Se refiere a los desnudos voluptuosos y de cuerpos llenos pintados por Peter Paul Rubens (1577–1640),
      artista flamenco conocido por sus representaciones sensuales y dinámicas de la carne humana. Estas
      obras suelen asociarse con la opulencia barroca y la abundancia física.
    fr: Fait référence aux nus voluptueux et aux corps généreux peints par Pierre Paul Rubens (1577–1640),
      artiste flamand célèbre pour ses représentations sensuelles et dynamiques de la chair humaine. Ces
      œuvres sont souvent associées à l'opulence baroque et à l'abondance physique.
    de: Bezieht sich auf die üppigen, vollbusigen Akte, die von Peter Paul Rubens (1577–1640) gemalt wurden,
      einem flämischen Künstler, der für seine sinnlichen und dynamischen Darstellungen des menschlichen
      Fleisches bekannt ist. Diese Werke werden oft mit barocker Opulenz und körperlicher Fülle in Verbindung
      gebracht.
    it: Si riferisce ai nudi voluttuosi e dai corpi pieni dipinti da Peter Paul Rubens (1577–1640), artista
      fiammingo noto per le sue rappresentazioni sensuali e dinamiche della carne umana. Queste opere
      sono spesso associate all'opulenza barocca e all'abbondanza fisica.
    pt: Refere-se aos nus voluptuosos e de corpos cheios pintados por Peter Paul Rubens (1577–1640), artista
      flamengo conhecido por suas representações sensuais e dinâmicas da carne humana. Essas obras são
      frequentemente associadas à opulência barroca e à abundância física.
    ru: Относится к пышным, полным телам в картинах Питера Пауля Рубенса (1577–1640), фламандского художника,
      известного своими чувственными и динамичными изображениями человеческой плоти. Эти работы часто
      ассоциируются с барочной пышностью и физической полнотой.
    ja: 1577年から1640年にかけて活躍したフランドルの画家ピーテル・パウル・ルーベンスによる、肉感的でボリューム感のある裸体画を指す。これらの作品はバロックの豪華さと肉体的な豊かさと結びつけて語られることが多い。
    zh: 指的是佛兰德画家彼得·保罗·鲁本斯（1577–1640）所绘的丰满、肉感的裸体画。这些作品以其对人体的感性而动态的描绘著称，常与巴洛克时期的奢华与肉体丰盈联系在一起。
    ar: يشير إلى اللوحات العارية الممتلئة والجسدية التي رسمها بيتر بول روبنز (1577–1640)، الفنان الفلمنكي
      المعروف بتصويراته الحسية والديناميكية للجسد البشري. ترتبط هذه الأعمال غالبًا بترف الباروك ووفرته
      الجسدية.
    he: מתייחס לציורי עירום מלאי בשר ומרובי נפח שצייר פיטר פאול רובנס (1577–1640), צייר פלמי הידוע בציוריו
      החושניים והדינמיים של גוף האדם. יצירות אלו מקושרות לעתים קרובות לעושר הבארוק ולשפע הפיזי.
