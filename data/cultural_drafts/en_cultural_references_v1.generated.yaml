- id: en_proverb_tradition_it_takes_two_to_tango_bf11de29
  language: en
  canonical_reference: It takes two to tango
  reference_type: proverb_tradition
  surface_patterns:
  - It takes two to tango
  - It takes two to dance the tango
  short_explanation: This proverb implies that cooperation or mutual effort is required for a situation
    to succeed or for blame to be shared. It is often used to suggest that both parties involved in a
    conflict or problem share responsibility.
  i18n_explanations:
    en: This proverb implies that cooperation or mutual effort is required for a situation to succeed
      or for blame to be shared. It is often used to suggest that both parties involved in a conflict
      or problem share responsibility.
    es: Este refrán implica que se requiere cooperación o esfuerzo mutuo para que una situación tenga
      éxito o para compartir la culpa. Suele usarse para sugerir que ambas partes involucradas en un conflicto
      o problema comparten la responsabilidad.
    fr: Ce proverbe implique qu'une coopération ou un effort mutuel est nécessaire pour qu'une situation
      réussisse ou pour partager la responsabilité. Il est souvent utilisé pour suggérer que les deux
      parties impliquées dans un conflit ou un problème partagent la responsabilité.
    de: Dieses Sprichwort besagt, dass Zusammenarbeit oder gemeinsame Anstrengung nötig sind, damit eine
