- id: en_literary_reference_to_gild_refined_gold_25ed417a
  language: en
  canonical_reference: To gild refined gold
  reference_type: literary_reference
  surface_patterns:
  - to gild refined gold
  - gilding refined gold
  - gilded refined gold
  short_explanation: To attempt to improve something that is already perfect, often resulting in unnecessary
    or harmful embellishment. The phrase is derived from Shakespeare's 'King John' and is used to describe
    futile or counterproductive efforts.
  i18n_explanations:
    en: To attempt to improve something that is already perfect, often resulting in unnecessary or harmful
      embellishment. The phrase is derived from Shakespeare's 'King John' and is used to describe futile
      or counterproductive efforts.
    es: Intentar mejorar algo que ya es perfecto, a menudo con resultados innecesarios o perjudiciales.
      La expresión proviene de 'El rey Juan' de Shakespeare y describe esfuerzos vanos o contraproducentes.
    fr: Tenter d'améliorer quelque chose déjà parfait, souvent en vain ou de manière nuisible. Cette expression
      vient de 'Le Roi Jean' de Shakespeare et décrit des efforts futiles ou contre-productifs.
    de: Etwas bereits Vollkommenes verbessern wollen, oft mit unnötigen oder schädlichen Folgen. Der Ausdruck
      stammt aus Shakespeares 'König Johann' und beschreibt vergebliche oder kontraproduktive Bemühungen.
    it: Cercare di migliorare qualcosa che è già perfetto, spesso con risultati inutili o dannosi. L'espressione
      proviene da Shakespeare e descrive sforzi vani o controproducenti.
    pt: Tentar melhorar algo que já é perfeito, muitas vezes com resultados desnecessários ou prejudiciais.
      A expressão vem de 'Rei João' de Shakespeare e descreve esforços fúteis ou contraproducentes.
    ru: Пытаться улучшить то, что уже идеально, часто приводя к ненужным или вредным изменениям. Фраза
      из пьесы Шекспира 'Король Иоанн' и описывает тщетные или контрпродуктивные усилия.
    ja: すでに完璧なものをさらに磨こうとすること。シェイクスピアの戯曲「ジョン王」に由来し、無駄な努力や逆効果な試みを表す際に用いられる。
    zh: 画蛇添足，试图改善已臻完美的事物，常导致无谓或有害的装饰。源自莎士比亚《约翰王》，用于描述徒劳或适得其反的努力。
    ar: محاولة تحسين شيءٍ أصلاً مثاليّ، مما يؤدي غالبًا إلى زخرفة غير ضرورية أو ضارة. العبارة مأخوذة من
      مسرحية شكسبير "الملك جون" وتُستخدم لوصف جهود عقيمة أو ضارة.
    he: לנסות לשפר דבר שכבר מושלם, לעיתים קרובות תוך יצירת קישוטים מיותרים או מזיקים. הביטוי לקוח מ'המלך
      ג'ון' של שייקספיר ומתאר מאמצים סרק או נגד-תועלת.
