  short_explanation: A failed assassination attempt against King James I of England in 1605, where Catholic
    conspirators planned to blow up the Houses of Parliament. It is commemorated annually on November
    5th with fireworks and bonfires.
  i18n_explanations:
    en: A failed assassination attempt against King James I of England in 1605, where Catholic conspirators
      planned to blow up the Houses of Parliament. It is commemorated annually on November 5th with fireworks
      and bonfires.
    es: Un intento fallido de asesinato contra el rey Jacobo I de Inglaterra en 1605, en el que conspiradores
      católicos planeaban volar el Parlamento. Se conmemora cada 5 de noviembre con fuegos artificiales
      y hogueras.
    fr: Une tentative d'assassinat ratée contre le roi Jacques Ier d'Angleterre en 1605, où des conspirateurs
      catholiques prévoyaient de faire sauter le Parlement. Elle est commémorée chaque 5 novembre avec
      des feux d'artifice et des feux de joie.
    de: Ein gescheiterter Attentatsversuch gegen König Jakob I. von England im Jahr 1605, bei dem katholische
      Verschwörer das Parlament in die Luft sprengen wollten. Er wird jährlich am 5. November mit Feuerwerk
      und Lagerfeuern begangen.
    it: Un fallito attentato contro il re Giacomo I d'Inghilterra nel 1605, in cui cospiratori cattolici
      progettavano di far saltare in aria il Parlamento. Si commemora ogni 5 novembre con fuochi d'artificio
      e falò.
    pt: Uma tentativa fracassada de assassinato contra o rei Jaime I da Inglaterra em 1605, em que conspiradores
      católicos planejavam explodir o Parlamento. É comemorado anualmente em 5 de novembro com fogos de
      artifício e fogueiras.
    ru: Неудавшееся покушение на короля Англии Якова I в 1605 году, когда католические заговорщики планировали
      взорвать здание парламента. Отмечается ежегодно 5 ноября фейерверками и кострами.
    ja: 1605年にイギリス国王ジェームズ1世暗殺を企てたカトリック教徒の陰謀。議会を爆破する計画だった。毎年11月5日には花火と焚き火で記念される。
    zh: 1605年，英国天主教徒密谋刺杀国王詹姆斯一世并炸毁议会，计划失败。每年11月5日以烟花和篝火纪念。
    ar: محاولة فاشلة لاغتيال الملك جيمس الأول ملك إنجلترا عام 1605، حيث خطط متآمرون كاثوليك لتفجير البرلمان.
      يتم إحياء الذكرى سنوياً في 5 نوفمبر بالألعاب النارية وحرق النيران.
    he: ניסיון התנקשות כושל נגד המלך ג'יימס הראשון מאנגליה בשנת 1605, בו קושרים קתולים תכננו לפוצץ את
