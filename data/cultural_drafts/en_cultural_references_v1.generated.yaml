- id: en_proverb_tradition_let_sleeping_dogs_lie_2421df2a
  language: en
  canonical_reference: Let sleeping dogs lie
  reference_type: proverb_tradition
  surface_patterns:
  - Let sleeping dogs lie
  - Let well enough alone
  short_explanation: This proverb advises against interfering in a situation that is currently peaceful
    or stable, as doing so may cause unnecessary trouble. It encourages leaving well enough alone to avoid
    complications.
  i18n_explanations:
    en: This proverb advises against interfering in a situation that is currently peaceful or stable,
      as doing so may cause unnecessary trouble. It encourages leaving well enough alone to avoid complications.
    es: Este refrán aconseja no interferir en una situación que actualmente es pacífica o estable, ya
      que hacerlo puede causar problemas innecesarios. Fomenta dejar las cosas como están para evitar
      complicaciones.
    fr: Ce proverbe conseille de ne pas interférer dans une situation actuellement paisible ou stable,
      car cela pourrait causer des ennuis inutiles. Il encourage à laisser les choses telles quelles pour
      éviter des complications.
    de: Dieses Sprichwort rät davon ab, in eine Situation einzugreifen, die derzeit friedlich oder stabil
      ist, da dies unnötige Probleme verursachen kann. Es ermutigt dazu, die Dinge ruhen zu lassen, um
      Komplikationen zu vermeiden.
    it: Questo proverbio consiglia di non interferire in una situazione attualmente pacifica o stabile,
      poiché farlo potrebbe causare problemi inutili. Incoraggia a lasciare le cose come stanno per evitare
      complicazioni.
    pt: Este provérbio aconselha a não interferir em uma situação que atualmente é pacífica ou estável,
      pois isso pode causar problemas desnecessários. Incentiva a deixar as coisas como estão para evitar
      complicações.
    ru: Эта пословица советует не вмешиваться в ситуацию, которая в данный момент спокойна или стабильна,
