    fr: Fait référence au tableau de Titien (1538) représentant une femme nue allongée. Symbole de l'art
      vénitien de la Renaissance et de la forme féminine idéalisée dans la peinture occidentale.
    de: Bezieht sich auf Tizians Gemälde (1538), das eine liegende nackte Frau zeigt. Symbolisiert die
      venezianische Renaissancekunst und die idealisierte weibliche Form in der westlichen Malerei.
    it: Si riferisce al dipinto di Tiziano (1538) che ritrae una donna nuda sdraiata. Simboleggia l'arte
      veneziana del Rinascimento e la forma femminile idealizzata nella pittura occidentale.
    pt: Refere-se à pintura de Ticiano (1538) que retrata uma mulher nua deitada. Simboliza a arte veneziana
      do Renascimento e a forma feminina idealizada na pintura ocidental.
    ru: Относится к картине Тициана (1538), изображающей лежащую обнажённую женщину. Символизирует венецианское
      искусство эпохи Ренессанса и идеализированный женский образ в западной живописи.
    ja: ティツィアーノの1538年の絵画で、横たわる裸婦を描いている。ルネサンス期ヴェネツィア美術と西洋絵画における理想化された女性像を象徴する。
    zh: 指提香于1538年创作的画作《乌尔比诺的维纳斯》，描绘一位斜卧的裸体女子。象征文艺复兴时期威尼斯艺术及西方绘画中理想化的女性形象。
    ar: يشير إلى لوحة تيزيانو (1538) التي تصور امرأة عارية مستلقية. ترمز إلى الفن الفينيسي في عصر النهضة
      والشكل الأنثوي المثالي في الرسم الغربي.
    he: מתייחס לציורו של טיציאן (1538) המתאר אישה עירומה שוכבת. מסמל את אמנות הרנסאנס הוונציאנית ואת דמות
