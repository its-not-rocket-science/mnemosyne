- id: en_proverb_tradition_give_him_an_inch_and_he_ll_take_a_mile_f66c46eb
  language: en
  canonical_reference: Give him an inch and he’ll take a mile
  reference_type: proverb_tradition
  surface_patterns:
  - give him an inch and he'll take a mile
  - give him an inch he'll take a mile
  - give him an inch and he will take a mile
  short_explanation: This proverb warns that if you grant someone a small concession, they may exploit
    it to demand much more. It reflects a cautionary view of human nature and greed.
  i18n_explanations:
    en: This proverb warns that if you grant someone a small concession, they may exploit it to demand
      much more. It reflects a cautionary view of human nature and greed.
    es: Este refrán advierte que si le das a alguien una pequeña concesión, puede aprovecharla para exigir
      mucho más. Refleja una visión cautelosa de la naturaleza humana y la codicia.
    fr: 'Ce proverbe met en garde : si vous accordez une petite concession à quelqu''un, il pourrait en
      profiter pour en exiger beaucoup plus. Il reflète une vision prudente de la nature humaine et de
      la cupidité.'
    de: Dieses Sprichwort warnt davor, dass jemand, dem man eine kleine Zugeständnis macht, dies ausnutzen
      könnte, um viel mehr zu verlangen. Es spiegelt eine vorsichtige Sicht auf die menschliche Natur
      und Gier wider.
    it: Questo proverbio avverte che se concedi a qualcuno una piccola concessione, potrebbe approfittarne
      per chiedere molto di più. Riflette una visione cauta della natura umana e dell'avidità.
    pt: Este provérbio adverte que, se você concede a alguém uma pequena concessão, essa pessoa pode aproveitar
      para exigir muito mais. Reflete uma visão cautelosa da natureza humana e da ganância.
    ru: Эта пословица предупреждает, что если вы уступите кому-то в малом, он может этим воспользоваться,
      чтобы требовать гораздо большего. Она отражает осторожное отношение к человеческой природе и жадности.
    ja: このことわざは、小さな譲歩を与えると、相手がそれを利用してさらに多くを要求する可能性があると警告しています。人間の本性や貪欲に対する警戒心を反映しています。
    zh: 这句谚语告诫说，如果你对某人做出小小的让步，他们可能会得寸进尺。它反映了对人性和贪婪的警惕态度。
    ar: هذا المثل يحذر من أنه إذا منحت شخصًا تنازلًا صغيرًا، فقد يستغله ليطالب بكثير أكثر. إنه يعكس نظرة
      حذرة لطبيعة الإنسان والطمع.
    he: פתגם זה מזהיר שאם תיתן למישהו אינץ' אחד, הוא ינסה לקחת מיל. הוא משקף תפיסה זהירה של טבע האדם ושל
