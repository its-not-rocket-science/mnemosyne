- id: en_proverb_tradition_the_greatest_happiness_for_the_greatest_number_4efb3797
  language: en
  canonical_reference: The greatest happiness for the greatest number
  reference_type: proverb_tradition
  surface_patterns:
  - the greatest happiness for the greatest number
  - greatest happiness for the greatest number
  - the greatest good for the greatest number
  short_explanation: A utilitarian principle advocating that actions should aim to maximize overall well-being,
    even if it means sacrificing the happiness of a minority. It is often associated with Jeremy Bentham
    and John Stuart Mill.
  i18n_explanations:
    en: A utilitarian principle advocating that actions should aim to maximize overall well-being, even
      if it means sacrificing the happiness of a minority. It is often associated with Jeremy Bentham
      and John Stuart Mill.
    es: Principio utilitarista que defiende que las acciones deben buscar maximizar el bienestar general,
      incluso si ello implica sacrificar la felicidad de una minoría. Se asocia frecuentemente con Jeremy
      Bentham y John Stuart Mill.
    fr: Un principe utilitariste prônant que les actions doivent viser à maximiser le bien-être général,
      même si cela implique de sacrifier le bonheur d'une minorité. Souvent associé à Jeremy Bentham et
      John Stuart Mill.
    de: Ein utilitaristisches Prinzip, das besagt, dass Handlungen das allgemeine Wohl maximieren sollten,
      auch wenn dies auf Kosten des Glücks einer Minderheit geht. Wird oft mit Jeremy Bentham und John
      Stuart Mill in Verbindung gebracht.
    it: Un principio utilitarista che sostiene che le azioni dovrebbero mirare a massimizzare il benessere
      generale, anche se ciò significa sacrificare la felicità di una minoranza. Spesso associato a Jeremy
      Bentham e John Stuart Mill.
    pt: Um princípio utilitarista que defende que as ações devem buscar maximizar o bem-estar geral, mesmo
      que isso implique sacrificar a felicidade de uma minoria. Frequentemente associado a Jeremy Bentham
      e John Stuart Mill.
    ru: Утилитаристский принцип, согласно которому действия должны быть направлены на максимизацию общего
      благополучия, даже если это означает жертвовать счастьем меньшинства. Часто ассоциируется с Джереми
      Бентамом и Джоном Стюартом Миллем.
    ja: 功利主義の原則で、行動は少数の幸福を犠牲にしても全体の幸福を最大化すべきだと主張する。ジェレミー・ベンサムとジョン・スチュアート・ミルに関連付けられることが多い。
    zh: 功利主义原则，主张行动应以最大化整体福祉为目标，即使这意味着牺牲少数人的幸福。常与杰里米·边沁和约翰·斯图尔特·密尔联系在一起。
    ar: مبدأ نفعي يدعو إلى أن تهدف الأفعال إلى تعظيم الرفاهية العامة، حتى لو تطلب ذلك التضحية بسعادة الأقلية.
      غالبًا ما يرتبط بجереمي بنثام وجون ستيوارت ميل.
    he: עיקרון תועלתני הטוען שפעולות צריכות לשאוף למקסם את הרווחה הכללית, אפילו במחיר הקרבת האושר של מיעוט.
      לעיתים קרובות מקושר לג'רמי בנת'ם וג'ון סטיוארט מיל.
