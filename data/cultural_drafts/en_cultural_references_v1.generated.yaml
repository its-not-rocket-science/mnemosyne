- id: en_classical_or_scriptural_allusion_let_the_dead_bury_the_dead_4f79f22c
  language: en
  canonical_reference: Let the dead bury the dead
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Let the dead bury the dead
  - let the dead bury their dead
  - let the dead bury the dead (Matthew 8:22)
  short_explanation: A phrase from the New Testament, spoken by Jesus to a follower who asks to bury his
    father before following him. It signifies prioritizing spiritual duty over worldly obligations.
  i18n_explanations:
    en: A phrase from the New Testament, spoken by Jesus to a follower who asks to bury his father before
      following him. It signifies prioritizing spiritual duty over worldly obligations.
    es: Frase del Nuevo Testamento pronunciada por Jesús a un discípulo que pide enterrar a su padre antes
      de seguirle. Significa anteponer el deber espiritual a las obligaciones mundanas.
    fr: Une phrase du Nouveau Testament, prononcée par Jésus à un disciple qui demande à enterrer son
      père avant de le suivre. Elle signifie donner la priorité au devoir spirituel sur les obligations
      terrestres.
    de: Ein Ausspruch aus dem Neuen Testament, den Jesus zu einem Jünger sprach, der ihn bat, erst seinen
      Vater zu begraben, bevor er ihm folgt. Er bedeutet, die geistliche Pflicht über weltliche Verpflichtungen
      zu stellen.
    it: Una frase del Nuovo Testamento pronunciata da Gesù a un discepolo che chiede di seppellire suo
      padre prima di seguirlo. Significa anteporre il dovere spirituale agli obblighi terreni.
    pt: Uma frase do Novo Testamento dita por Jesus a um discípulo que pede para enterrar seu pai antes
      de segui-lo. Significa priorizar o dever espiritual sobre as obrigações mundanas.
    ru: Фраза из Нового Завета, сказанная Иисусом ученику, который просит похоронить отца перед тем, как
      следовать за ним. Означает приоритет духовного долга над мирскими обязанностями.
    ja: 新約聖書の言葉で、イエスが弟子に「父を葬るために先に行かせてくれ」と頼まれた際に言ったもの。霊的な義務を世俗的な義務より優先することを意味する。
    zh: 《新约》中的一句话，耶稣对一个请求先埋葬父亲再跟随他的门徒说的。强调精神责任重于世俗义务。
    ar: عبارة من العهد الجديد قالها يسوع لتلميذه الذي طلب منه أن يدفن أباه قبل أن يتبعه. تعني إعطاء الأولوية
      للواجب الروحي على الالتزامات الدنيوية.
    he: ביטוי מהברית החדשה שאמר ישו לתלמיד שביקש לקבור את אביו לפני שילך אחריו. משמעו לתת עדיפות לחובה
