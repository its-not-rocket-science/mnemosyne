- id: en_literary_reference_a_law_unto_themselves_ebc68942
  language: en
  canonical_reference: A law unto themselves
  reference_type: literary_reference
  surface_patterns:
  - a law unto themselves
  - law unto themselves
  - a law to themselves
  short_explanation: Describes someone who ignores rules or norms and acts entirely according to their
    own will. Originates from St Paul's Epistle to the Romans, where he criticizes Jews for judging Gentiles
    while practicing similar sins themselves.
  i18n_explanations:
    en: Describes someone who ignores rules or norms and acts entirely according to their own will. Originates
      from St Paul's Epistle to the Romans, where he criticizes Jews for judging Gentiles while practicing
      similar sins themselves.
    es: Describe a alguien que ignora las reglas o normas y actúa enteramente según su propia voluntad.
      Proviene de la Epístola de San Pablo a los Romanos, donde critica a los judíos por juzgar a los
      gentiles mientras ellos mismos practican pecados similares.
    fr: Décrit quelqu'un qui ignore les règles ou les normes et agit entièrement selon sa propre volonté.
      Provient de l'Épître de saint Paul aux Romains, où il critique les Juifs pour juger les Gentils
      tout en commettant eux-mêmes des péchés similaires.
    de: Beschreibt jemanden, der Regeln oder Normen ignoriert und ausschließlich nach eigenem Willen handelt.
      Stammt aus dem Römerbrief des Paulus, in dem er die Juden dafür kritisiert, dass sie die Heiden
      verurteilen, obwohl sie selbst ähnliche Sünden begehen.
    it: Descrive qualcuno che ignora le regole o le norme e agisce interamente secondo la propria volontà.
      Deriva dall'Epistola di San Paolo ai Romani, dove critica gli ebrei per giudicare i gentili mentre
      loro stessi praticano peccati simili.
    pt: Descreve alguém que ignora regras ou normas e age inteiramente segundo sua própria vontade. Origina-se
      na Epístola de Paulo aos Romanos, onde ele critica os judeus por julgarem os gentios enquanto praticam
      pecados semelhantes.
    ru: Описывает того, кто игнорирует правила или нормы и действует исключительно по собственной воле.
      Восходит к Посланию Павла к Римлянам, где он критикует евреев за осуждение язычников, при этом сами
      совершая подобные грехи.
    ja: 規則や規範を無視し、完全に自分の意思に従って行動する人を指す。ローマ人へのパウロの手紙（ローマ人への手紙12:1-2）に由来し、ユダヤ人が異邦人を裁きながら自分たちも同様の罪を犯していることを批判している箇所。
    zh: 指的是无视规则或规范、完全按照自己意愿行事的人。源自保罗致罗马人的书信，其中批评犹太人指责外邦人，自己却犯着类似的罪。
