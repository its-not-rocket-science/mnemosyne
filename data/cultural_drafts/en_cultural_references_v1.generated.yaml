- id: en_cultural_reference_the_ghost_light_77bbe343
  language: en
  canonical_reference: The ghost light
  reference_type: cultural_reference
  surface_patterns:
  - the ghost light
  - a ghost light
  - ghost light tradition
  - the ghost light on stage
  short_explanation: A single light left burning on an empty stage in theaters, rooted in folklore that
    it wards off spirits. It also serves a practical purpose, ensuring safety for performers entering
    the stage.
  i18n_explanations:
    en: A single light left burning on an empty stage in theaters, rooted in folklore that it wards off
      spirits. It also serves a practical purpose, ensuring safety for performers entering the stage.
    es: 'Una sola luz que permanece encendida en un escenario vacío en los teatros, basada en la creencia
      popular de que ahuyenta a los espíritus. También cumple una función práctica: garantizar la seguridad
      de los actores que entran al escenario.'
    fr: Une unique lumière laissée allumée sur une scène vide dans les théâtres, selon la tradition pour
      éloigner les esprits. Elle sert aussi à assurer la sécurité des artistes entrant sur scène.
    de: Ein einzelnes Licht, das auf einer leeren Bühne in Theatern brennt, basierend auf dem Aberglauben,
      dass es Geister fernhält. Es dient auch der Sicherheit von Künstlern, die die Bühne betreten.
    it: Una singola luce lasciata accesa su un palco vuoto nei teatri, secondo la tradizione per scacciare
      gli spiriti. Serve anche a garantire la sicurezza degli artisti che entrano in scena.
    pt: Uma única luz deixada acesa em um palco vazio nos teatros, baseada na crença popular de que afasta
      espíritos. Também serve para garantir a segurança dos artistas que entram no palco.
    ru: Единственный свет, оставленный горящим на пустой сцене в театрах, согласно фольклору, отгоняет
      духов. Также выполняет практическую функцию, обеспечивая безопасность артистов, выходящих на сцену.
    ja: 劇場の空の舞台に点けられた一灯の明かりで、迷信によれば悪霊を追い払うという。また、舞台に入る演者の安全を確保する実用的な役割も果たす。
    zh: 剧院空荡舞台上常燃的一盏灯，源于迷信认为它能驱走鬼魂。同时也有实用功能，确保演员上台时的安全。
    ar: ضوء وحيد يترك مشتعلاً على مسرح فارغ في المسارح، استناداً إلى التراث الشعبي القائل بأنه يطرد الأرواح.
      كما يخدم غرضاً عملياً يتمثل في ضمان سلامة الممثلين عند دخولهم المسرح.
    he: 'אור יחיד שנותר דולק על במה ריקה בתיאטראות, מתוך אמונה עממית שהוא מרחיק רוחות. הוא משמש גם למטרה
      מעשית: להבטיח בטיחותם של השחקנים הנכנסים לבמה.'
