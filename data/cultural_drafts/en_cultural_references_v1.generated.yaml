- id: en_cultural_reference_a_botticelli_birth_of_venus_d5971654
  language: en
  canonical_reference: A Botticelli birth of Venus
  reference_type: cultural_reference
  surface_patterns:
  - Botticelli's Birth of Venus
  - the Birth of Venus by Botticelli
  - Venus rising from the sea
  short_explanation: A famous painting by Sandro Botticelli depicting the Roman goddess Venus emerging
    from the sea on a shell, symbolizing divine beauty and the Renaissance revival of classical themes.
    It is an iconic work of Western art.
  i18n_explanations:
    en: A famous painting by Sandro Botticelli depicting the Roman goddess Venus emerging from the sea
      on a shell, symbolizing divine beauty and the Renaissance revival of classical themes. It is an
      iconic work of Western art.
    es: Una famosa pintura de Sandro Botticelli que representa a la diosa romana Venus emergiendo del
      mar sobre una concha, simbolizando la belleza divina y el renacimiento de temas clásicos durante
      el Renacimiento. Es una obra icónica del arte occidental.
    fr: Un célèbre tableau de Sandro Botticelli représentant la déesse romaine Vénus émergeant de la mer
      sur une coquille, symbolisant la beauté divine et le renouveau des thèmes classiques à la Renaissance.
      C'est une œuvre emblématique de l'art occidental.
    de: Ein berühmtes Gemälde von Sandro Botticelli, das die römische Göttin Venus zeigt, wie sie auf
      einer Muschel dem Meer entsteigt. Es symbolisiert göttliche Schönheit und die Renaissance-Wiederbelebung
      klassischer Themen. Es ist ein ikonisches Werk der westlichen Kunst.
    it: Un famoso dipinto di Sandro Botticelli che raffigura la dea romana Venere emergere dal mare su
      una conchiglia, simboleggiando la bellezza divina e la rinascita dei temi classici durante il Rinascimento.
      È un'opera iconica dell'arte occidentale.
    pt: Uma famosa pintura de Sandro Botticelli que retrata a deusa romana Vênus emergindo do mar sobre
      uma concha, simbolizando a beleza divina e o renascimento de temas clássicos durante o Renascimento.
      É uma obra icônica da arte ocidental.
    ru: Знаменитая картина Сандро Боттичелли, изображающая римскую богиню Венеру, рождающуюся из моря
      на раковине, символизирующая божественную красоту и возрождение классических тем в эпоху Ренессанса.
      Это знаковая работа западного искусства.
    ja: サンドロ・ボッティチェッリによる有名な絵画で、ローマ神話のヴィーナスが貝殻に乗って海から現れる様子を描き、神聖な美しさとルネサンス期の古典的テーマの復興を象徴している。西洋美術の象徴的作品である。
    zh: 桑德罗·波提切利的名画，描绘罗马女神维纳斯从海中乘贝壳而出，象征神圣之美以及文艺复兴时期对古典主题的复兴。是西方艺术的标志性作品。
    ar: لوحة شهيرة لساندرو بوتيتشيلي تصور إلهة الحب الرومانية فينوس وهي تخرج من البحر على صدفة، ترمز إلى
      الجمال الإلهي وإحياء المواضيع الكلاسيكية خلال عصر النهضة. تعد من الأعمال الأيقونية في الفن الغربي.
    he: ציור מפורסם של סנדרו בוטיצ'לי המתאר את אלת האהבה הרומית ונוס עולה מן הים על קונכייה, המסמל יופי
