  short_explanation: A metaphor from Jesus' Sermon on the Mount (Matthew 5:14) describing a city set on
    a hill as a beacon of light, symbolizing an ideal society that others should emulate. It was later
    used by John Winthrop in 1630 to describe the Massachusetts Bay Colony.
  i18n_explanations:
    en: A metaphor from Jesus' Sermon on the Mount (Matthew 5:14) describing a city set on a hill as a
      beacon of light, symbolizing an ideal society that others should emulate. It was later used by John
      Winthrop in 1630 to describe the Massachusetts Bay Colony.
    es: Metáfora de la Sermón de la Montaña de Jesús (Mateo 5:14) que describe una ciudad en una colina
      como faro de luz, simbolizando una sociedad ideal que otros deben emular. Más tarde, John Winthrop
      la usó en 1630 para describir la Colonia de la Bahía de Massachusetts.
    fr: Métaphore issue du Sermon sur la Montagne de Jésus (Matthieu 5:14) décrivant une ville sur une
      colline comme un phare, symbolisant une société idéale que les autres devraient imiter. John Winthrop
      l'utilisa en 1630 pour décrire la colonie de la baie du Massachusetts.
    de: Ein Gleichnis aus der Bergpredigt Jesu (Matthäus 5:14), das eine auf einem Hügel gelegene Stadt
      als Leuchtfeuer beschreibt und eine ideale Gesellschaft symbolisiert, der andere nacheifern sollten.
      Später nutzte John Winthrop es 1630 zur Beschreibung der Massachusetts Bay Colony.
    it: Metafora tratta dal Discorso della Montagna di Gesù (Matteo 5:14) che descrive una città su una
      collina come faro di luce, simbolo di una società ideale da emulare. In seguito, John Winthrop la
      utilizzò nel 1630 per descrivere la Colonia della Baia del Massachusetts.
    pt: Metáfora do Sermão da Montanha de Jesus (Mateus 5:14) que descreve uma cidade sobre uma colina
      como um farol de luz, simbolizando uma sociedade ideal que outros devem emular. Mais tarde, John
      Winthrop a usou em 1630 para descrever a Colônia da Baía de Massachusetts.
    ru: Метафора из Нагорной проповеди Иисуса (Матфей 5:14), описывающая город на холме как маяк, символ
      идеального общества, которому следует подражать. Позднее Джон Уинтроп использовал её в 1630 году
      для описания Массачусетской колонии.
    ja: イエスの山上の垂訓（マタイ5:14）に由来する比喩で、丘の上の都市を光の灯台として描き、他者が模範とすべき理想社会を象徴する。後にジョン・ウィンスロップが1630年にマサチューセッツ湾植民地を表すのに用いた。
    zh: 出自耶稣《山上宝训》（马太福音5:14）的比喻，将山丘上的城市描述为光明的灯塔，象征着他人应效仿的理想社会。后由约翰·温斯罗普于1630年用以描述马萨诸塞湾殖民地。
