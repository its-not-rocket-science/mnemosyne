  - the Nebuchadnezzar of Blake
  short_explanation: Refers to William Blake's depiction of King Nebuchadnezzar II from the Book of Daniel,
    symbolizing madness and divine punishment. The image represents the biblical king's descent into animalistic
    behavior as divine retribution.
  i18n_explanations:
    en: Refers to William Blake's depiction of King Nebuchadnezzar II from the Book of Daniel, symbolizing
      madness and divine punishment. The image represents the biblical king's descent into animalistic
      behavior as divine retribution.
    es: Se refiere a la representación de William Blake del rey Nabucodonosor II del Libro de Daniel,
      que simboliza la locura y el castigo divino. La imagen muestra al rey bíblico descendiendo a un
      comportamiento animalístico como retribución divina.
    fr: Fait référence à la depiction par William Blake du roi Nabuchodonosor II dans le Livre de Daniel,
      symbolisant la folie et le châtiment divin. L'image représente la descente du roi biblique vers
      un comportement bestial en punition divine.
    de: Bezieht sich auf William Blakes Darstellung von König Nebukadnezar II. aus dem Buch Daniel, die
      Wahnsinn und göttliche Strafe symbolisiert. Das Bild zeigt den biblischen König in tierisches Verhalten
      verfallen als göttliche Vergeltung.
    it: Si riferisce alla raffigurazione di William Blake del re Nabucodonosor II nel Libro di Daniele,
      che simboleggia la follia e il castigo divino. L'immagine rappresenta la discesa del re biblico
      verso un comportamento animalesco come punizione divina.
    pt: Refere-se à representação de William Blake do rei Nabucodonosor II no Livro de Daniel, simbolizando
      a loucura e o castigo divino. A imagem mostra o rei bíblico regredindo a um comportamento animalesco
      como retribuição divina.
    ru: Относится к изображению царя Навуходоносора II в произведении Уильяма Блейка из Книги Даниила,
      символизирующему безумие и божественное наказание. На картине библейский царь низводится до животного
      поведения как божественное воздаяние.
    ja: ウィリアム・ブレイクによるダニエル書のネブカドネザル2世の描写を指し、狂気と神罰を象徴する。画像は、神の報復として王が獣のような振る舞いに堕ちる様を表す。
