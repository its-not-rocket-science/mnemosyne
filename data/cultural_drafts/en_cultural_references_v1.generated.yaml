- id: en_cultural_reference_a_pre_raphaelite_maiden_fac0b097
  language: en
  canonical_reference: A Pre-Raphaelite maiden
  reference_type: cultural_reference
  surface_patterns:
  - a Pre-Raphaelite maiden
  - Pre-Raphaelite maiden
  - a maiden in Pre-Raphaelite style
  short_explanation: Refers to the idealized, often red-haired female figures painted by the Pre-Raphaelite
    Brotherhood, symbolizing purity, medieval romance, and the aesthetic movement's rejection of industrial
    modernity.
  i18n_explanations:
    en: Refers to the idealized, often red-haired female figures painted by the Pre-Raphaelite Brotherhood,
      symbolizing purity, medieval romance, and the aesthetic movement's rejection of industrial modernity.
    es: Se refiere a las figuras femeninas idealizadas, a menudo pelirrojas, pintadas por la Hermandad
      Prerrafaelita, que simbolizan la pureza, el romance medieval y el rechazo del movimiento estético
      a la modernidad industrial.
    fr: Fait référence aux figures féminines idéalisées, souvent rousses, peintes par la Confrérie préraphaélite,
      symbolisant la pureté, le romantisme médiéval et le rejet du mouvement esthétique de la modernité
      industrielle.
    de: Bezieht sich auf die idealisierten, oft rothaarigen Frauengestalten der Präraffaeliten, die Reinheit,
      mittelalterliche Romantik und die ästhetische Bewegung als Gegenentwurf zur industriellen Moderne
      symbolisieren.
    it: Si riferisce alle figure femminili idealizzate, spesso dai capelli rossi, dipinte dalla Confraternita
      dei Preraffaelliti, che simboleggiano la purezza, il romanticismo medievale e il rifiuto del movimento
      estetico della modernità industriale.
    pt: Refere-se às figuras femininas idealizadas, muitas vezes ruivas, pintadas pela Irmandade Pré-Rafaelita,
      que simbolizam a pureza, o romance medieval e a rejeição do movimento estético à modernidade industrial.
    ru: Относится к идеализированным женским образам, часто с рыжими волосами, созданным Братством прерафаэлитов,
      которые символизируют чистоту, средневековый романтизм и отказ эстетического движения от индустриальной
      современности.
    ja: ラファエル前派のメンバーによって描かれた理想化された女性像（しばしば赤毛）を指し、純潔、中世のロマンス、そして産業近代主義を拒絶した美学運動を象徴しています。
    zh: 指的是拉斐尔前派画家笔下理想化的女性形象（常为红发），象征着纯洁、中世纪的浪漫主义以及该美学运动对工业现代性的拒绝。
    ar: يشير إلى الشخصيات النسائية المثالية، غالبًا ذات الشعر الأحمر، التي رسمتها أخوية ما قبل الرفائيلية،
