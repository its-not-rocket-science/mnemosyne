    en: Refers to the nightmarish, illogical, and oppressive nature of bureaucratic systems, inspired
      by the works of Franz Kafka. It describes situations where individuals feel trapped by impersonal,
      dehumanizing rules.
    es: Se refiere a la naturaleza aterradora, ilógica y opresiva de los sistemas burocráticos, inspirada
