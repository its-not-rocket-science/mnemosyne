    truth are inseparable and eternal. It reflects the Romantic ideal of art's transcendence.
  i18n_explanations:
    en: A famous line from Keats's poem 'Ode on a Grecian Urn,' suggesting that beauty and truth are inseparable
      and eternal. It reflects the Romantic ideal of art's transcendence.
    es: Una famosa línea del poema de Keats 'Oda a una urna griega,' que sugiere que la belleza y la verdad
      son inseparables y eternas. Refleja el ideal romántico de la trascendencia del arte.
    fr: Une célèbre ligne du poème de Keats 'Ode sur une urne grecque,' suggérant que la beauté et la
      vérité sont inséparables et éternelles. Elle reflète l'idéal romantique de la transcendance de l'art.
    de: Ein berühmter Vers aus Keats' Gedicht 'Ode an eine griechische Urne,' der besagt, dass Schönheit
      und Wahrheit untrennbar und ewig sind. Er spiegelt das romantische Ideal der Transzendenz der Kunst
      wider.
    it: Un famoso verso della poesia di Keats 'Ode su un'urna greca,' che suggerisce come bellezza e verità
      siano inseparabili ed eterne. Riflette l'ideale romantico della trascendenza dell'arte.
    pt: Uma famosa linha do poema de Keats 'Ode numa Urna Grega,' sugerindo que beleza e verdade são inseparáveis
      e eternas. Reflete o ideal romântico da transcendência da arte.
    ru: Знаменитая строка из стихотворения Китса 'Ода греческой урне,' утверждающая, что красота и истина
      неразделимы и вечны. Она отражает романтический идеал трансцендентности искусства.
    ja: キーツの詩「ギリシャの壺に寄せて」の有名な一節で、美と真実は切り離せず永遠であるとする。ロマン主義の芸術の超越性という理想を反映している。
    zh: 济慈诗作《希腊古瓮颂》中的著名诗句，主张美即真理，真理即美，两者永恒不分。体现了浪漫主义艺术超越性的理想。
    ar: سطر مشهور من قصيدة كيتس 'أود إلى إناء يوناني'، يقترح أن الجمال والحقيقة لا ينفصلان وأبديان. يعكس
