      XIX века.
    ja: 1857年のジャン＝フランソワ・ミレーの絵画に描かれた、収穫後の残り穂を拾う農婦たちを指す。19世紀フランスの農村労働、貧困、手仕事の尊厳を象徴する。
    zh: 指的是让-弗朗索瓦·米勒1857年的画作，描绘了收割后拾穗的农妇。象征19世纪法国的乡村劳动、贫困与体力劳动的尊严。
    ar: يشير إلى لوحة جان فرانسوا ميليه عام 1857 التي تصور نساء فلاحات يجمعن السنابل المتبقية بعد الحصاد.
