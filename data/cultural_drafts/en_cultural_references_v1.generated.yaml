- id: en_cultural_reference_tudor_court_portraiture_f429df81
  language: en
  canonical_reference: Tudor court portraiture
  reference_type: cultural_reference
  surface_patterns:
  - Tudor court portraiture
  - Tudor portraits
  - Tudor court paintings
  - the Tudor portrait style
  short_explanation: Refers to the distinctive portrait style of the Tudor dynasty (1485–1603), characterized
    by formal poses, rich fabrics, and symbolic elements like jewelry and crowns, often used to assert
    royal authority.
  i18n_explanations:
    en: Refers to the distinctive portrait style of the Tudor dynasty (1485–1603), characterized by formal
      poses, rich fabrics, and symbolic elements like jewelry and crowns, often used to assert royal authority.
    es: Se refiere al estilo distintivo de retratos de la dinastía Tudor (1485–1603), caracterizado por
      poses formales, telas lujosas y elementos simbólicos como joyas y coronas, usados para afirmar la
      autoridad real.
    fr: Fait référence au style distinctif des portraits de la dynastie Tudor (1485–1603), caractérisé
      par des poses solennelles, des tissus riches et des éléments symboliques comme bijoux et couronnes,
      souvent utilisés pour affirmer l'autorité royale.
    de: Bezieht sich auf den charakteristischen Porträtstil der Tudor-Dynastie (1485–1603), der durch
      formelle Posen, prunkvolle Stoffe und symbolische Elemente wie Schmuck und Kronen geprägt ist und
      oft zur Betonung königlicher Autorität diente.
    it: Si riferisce allo stile distintivo dei ritratti della dinastia Tudor (1485–1603), caratterizzato
      da pose formali, tessuti ricchi e elementi simbolici come gioielli e corone, spesso usati per affermare
      l'autorità reale.
    pt: Refere-se ao estilo distinto de retratos da dinastia Tudor (1485–1603), caracterizado por poses
      formais, tecidos ricos e elementos simbólicos como joias e coroas, usados para afirmar a autoridade
      real.
    ru: Относится к характерному портретному стилю династии Тюдоров (1485–1603), отличающемуся формальными
      позами, роскошными тканями и символическими элементами вроде украшений и корон, часто использовавшихся
      для утверждения королевской власти.
    ja: テューダー王朝（1485–1603）の特徴的な肖像画様式を指す。形式張ったポーズ、豪華な布地、宝石や王冠などの象徴的要素で構成され、王権の権威を示すために用いられた。
    zh: 指的是都铎王朝（1485–1603）独特的肖像画风格，以正式的姿势、华丽的织物以及珠宝和王冠等象征性元素为特征，常用于彰显王权。
    ar: يشير إلى الأسلوب المميز للصور الشخصية في عهد أسرة تيودور (1485–1603)، والذي يتميز بوضعيات رسمية،织物
      فاخرة وعناصر رمزية مثل المجوهرات والتاج، وغالبًا ما استخدم لتعزيز السلطة الملكية.
    he: מתייחס לסגנון הדיוקנאות האופייני של שושלת טיודור (1485–1603), המאופיין בתנוחות רשמיות, בדים עשירים
