  short_explanation: A technique in which actors fully immerse themselves in their characters' experiences
    to achieve realism. It originated in the early 20th century and is associated with actors like Marlon
    Brando and Robert De Niro.
  i18n_explanations:
    en: A technique in which actors fully immerse themselves in their characters' experiences to achieve
      realism. It originated in the early 20th century and is associated with actors like Marlon Brando
      and Robert De Niro.
    es: Técnica en la que los actores se sumergen por completo en las experiencias de sus personajes para
      lograr realismo. Surgió a principios del siglo XX y está asociada a actores como Marlon Brando y
      Robert De Niro.
    fr: Une technique où les acteurs s'immergent totalement dans les expériences de leurs personnages
      pour atteindre le réalisme. Elle est née au début du XXe siècle et est associée à des acteurs comme
      Marlon Brando et Robert De Niro.
    de: Eine Schauspielmethode, bei der sich Schauspieler vollständig in die Erfahrungen ihrer Rollen
      vertiefen, um Realismus zu erreichen. Sie entstand Anfang des 20. Jahrhunderts und ist mit Schauspielern
      wie Marlon Brando und Robert De Niro verbunden.
    it: Una tecnica in cui gli attori si immergono completamente nelle esperienze dei loro personaggi
      per ottenere realismo. È nata all'inizio del XX secolo ed è associata ad attori come Marlon Brando
      e Robert De Niro.
    pt: Técnica em que atores se imergem completamente nas experiências de seus personagens para alcançar
      realismo. Surgiu no início do século XX e está associada a atores como Marlon Brando e Robert De
      Niro.
    ru: Метод актёрской игры, при котором актёры полностью погружаются в опыт своих персонажей для достижения
      реализма. Возник в начале XX века и ассоциируется с такими актёрами, как Марлон Брандо и Роберт
      Де Ниро.
    ja: 俳優が役の体験に完全に没入し、リアルさを追求する演技法。20世紀初頭に生まれ、マーロン・ブランドやロバート・デ・ニーロといった俳優に関連付けられている。
    zh: 一种演技方法，演员完全沉浸于角色的体验以达到逼真效果。起源于20世纪初，与马龙·白兰度、罗伯特·德尼罗等演员相关。
