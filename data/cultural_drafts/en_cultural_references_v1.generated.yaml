- id: en_cultural_reference_a_stubbs_horse_painting_aaee076b
  language: en
  canonical_reference: A Stubbs horse painting
  reference_type: cultural_reference
  surface_patterns:
  - a Stubbs horse painting
  - Stubbs's horse paintings
  - Stubbsian horse portrait
  - a painting in the style of Stubbs
  short_explanation: Refers to the highly detailed and anatomically precise horse paintings by George
    Stubbs (1724–1806), an English artist renowned for his scientific approach to equine art. His works
    are celebrated for their realism and elegance.
  i18n_explanations:
    en: Refers to the highly detailed and anatomically precise horse paintings by George Stubbs (1724–1806),
      an English artist renowned for his scientific approach to equine art. His works are celebrated for
      their realism and elegance.
    es: Se refiere a los cuadros de caballos altamente detallados y anatómicamente precisos de George
      Stubbs (1724–1806), artista inglés famoso por su enfoque científico del arte ecuestre. Sus obras
      son celebradas por su realismo y elegancia.
    fr: Fait référence aux peintures de chevaux extrêmement détaillées et anatomiquement précises de George
      Stubbs (1724–1806), artiste anglais renommé pour son approche scientifique de l'art équestre. Ses
      œuvres sont célébrées pour leur réalisme et leur élégance.
    de: Bezieht sich auf die hochdetaillierten und anatomisch präzisen Pferdegemälde von George Stubbs
      (1724–1806), einem englischen Künstler, der für seinen wissenschaftlichen Ansatz in der Pferdedarstellung
      bekannt ist. Seine Werke werden für ihren Realismus und ihre Eleganz gefeiert.
    it: Si riferisce ai dipinti di cavalli estremamente dettagliati e anatomicamente precisi di George
      Stubbs (1724–1806), artista inglese noto per il suo approccio scientifico all'arte equestre. Le
      sue opere sono celebrate per il loro realismo ed eleganza.
    pt: Refere-se às pinturas de cavalos altamente detalhadas e anatomicamente precisas de George Stubbs
      (1724–1806), artista inglês renomado por sua abordagem científica à arte equestre. Suas obras são
      celebradas por seu realismo e elegância.
    ru: Относится к высокодетализированным и анатомически точным картинам лошадей Джорджа Стаббса (1724–1806),
      английского художника, известного своим научным подходом к изображению лошадей. Его работы славятся
      реализмом и элегантностью.
    ja: イギリスの画家ジョージ・スタッブス（1724–1806）による、詳細で解剖学的に正確な馬の絵画を指す。彼は馬術芸術に科学的アプローチを取ったことで知られ、作品は写実性と優雅さで称賛されている。
    zh: 指的是英国画家乔治·斯塔布斯（1724–1806）创作的高度细致且解剖学精确的马匹画作。他以科学的方法描绘马匹艺术而闻名，其作品因写实与优雅而备受推崇。
    ar: يشير إلى لوحات الخيول المفصلة للغاية والمتعلقة بالتشريح بدقة، التي رسمها جورج ستابز (1724–1806)،
