- id: en_cultural_reference_a_rodin_thinker_9fcee866
  language: en
  canonical_reference: A Rodin thinker
  reference_type: cultural_reference
  surface_patterns:
  - the Thinker
  - a Rodin Thinker
  - Rodin's Thinker
  - the thinker by Rodin
  short_explanation: Refers to Auguste Rodin's famous sculpture 'The Thinker,' symbolizing contemplation,
    intellectual effort, and the human condition. Originally part of 'The Gates of Hell,' it is now an
    emblem of philosophy and deep thought.
  i18n_explanations:
    en: Refers to Auguste Rodin's famous sculpture 'The Thinker,' symbolizing contemplation, intellectual
      effort, and the human condition. Originally part of 'The Gates of Hell,' it is now an emblem of
      philosophy and deep thought.
    es: Se refiere a la famosa escultura 'El Pensador' de Auguste Rodin, que simboliza la contemplación,
      el esfuerzo intelectual y la condición humana. Originalmente parte de 'Las Puertas del Infierno,'
      hoy es un emblema de la filosofía y el pensamiento profundo.
    fr: Fait référence à la célèbre sculpture 'Le Penseur' d'Auguste Rodin, symbolisant la contemplation,
      l'effort intellectuel et la condition humaine. À l'origine partie des 'Portes de l'Enfer,' elle
      est aujourd'hui un emblème de la philosophie et de la réflexion approfondie.
    de: Bezieht sich auf Auguste Rodins berühmte Skulptur 'Der Denker,' die Kontemplation, geistige Anstrengung
      und die menschliche Existenz symbolisiert. Ursprünglich Teil von 'Das Höllentor,' ist sie heute
      ein Sinnbild für Philosophie und tiefes Nachdenken.
    it: Si riferisce alla famosa scultura 'Il Pensatore' di Auguste Rodin, che simboleggia la contemplazione,
      lo sforzo intellettuale e la condizione umana. Originariamente parte de 'La Porta dell'Inferno,'
      oggi è un emblema della filosofia e del pensiero profondo.
    pt: Refere-se à famosa escultura 'O Pensador' de Auguste Rodin, que simboliza a contemplação, o esforço
      intelectual e a condição humana. Originalmente parte de 'As Portas do Inferno,' hoje é um emblema
      da filosofia e do pensamento profundo.
    ru: Относится к знаменитой скульптуре Огюста Родена 'Мыслитель,' символизирующей созерцание, интеллектуальные
      усилия и человеческое состояние. Изначально часть 'Врат ада,' сегодня она стала эмблемой философии
      и глубоких размышлений.
    ja: オーギュスト・ロダンの有名な彫刻「考える人」を指し、瞑想、知的努力、人間の状態を象徴します。もともとは「地獄の門」の一部でしたが、今では哲学と深い思考の象徴となっています。
