- id: en_proverb_tradition_a_penny_saved_is_a_penny_earned_00a99307
  language: en
  canonical_reference: A penny saved is a penny earned
  reference_type: proverb_tradition
  surface_patterns:
  - A penny saved is a penny earned
  - A penny saved is a penny gained
  - Every penny saved is a penny earned
  - A penny saved is a penny got
  short_explanation: This proverb emphasizes the value of thrift and frugality, suggesting that saving
    money is as beneficial as earning it. It is widely used in financial advice and everyday discourse.
  i18n_explanations:
    en: This proverb emphasizes the value of thrift and frugality, suggesting that saving money is as
      beneficial as earning it. It is widely used in financial advice and everyday discourse.
    es: Este refrán destaca el valor del ahorro y la frugalidad, sugiriendo que ahorrar dinero es tan
      beneficioso como ganarlo. Se usa ampliamente en consejos financieros y en el habla cotidiana.
    fr: Ce proverbe souligne l'importance de l'économie et de la frugalité, suggérant que épargner de
      l'argent est aussi bénéfique que de l'acquérir. Il est largement utilisé dans les conseils financiers
      et le discours quotidien.
    de: Dieses Sprichwort betont den Wert von Sparsamkeit und Genügsamkeit und besagt, dass Geld zu sparen
      genauso vorteilhaft ist wie es zu verdienen. Es wird häufig in finanziellen Ratschlägen und im Alltag
      verwendet.
    it: Questo proverbio sottolinea il valore del risparmio e della frugalità, suggerendo che risparmiare
      denaro è altrettanto vantaggioso che guadagnarlo. È ampiamente usato nei consigli finanziari e nel
      linguaggio quotidiano.
    pt: Este provérbio destaca o valor da economia e da frugalidade, sugerindo que poupar dinheiro é tão
      benéfico quanto ganhá-lo. É amplamente usado em conselhos financeiros e no discurso cotidiano.
    ru: Эта пословица подчеркивает ценность бережливости и экономии, утверждая, что сбережение денег столь
      же выгодно, как и их заработок. Широко используется в финансовых советах и повседневной речи.
    ja: このことわざは倹約と節約の価値を強調し、お金を貯めることが稼ぐことと同じくらい有益であることを示唆しています。金融アドバイスや日常会話で広く使われています。
    zh: 这句谚语强调节俭的价值，认为存钱和挣钱同样有益。在理财建议和日常话语中广泛使用。
    ar: هذا المثل يبرز قيمة الادخار والبساطة، مقترحًا أن توفير المال مفيد بقدر كسبه. يُستخدم على نطاق
      واسع في النصائح المالية وفي الخطاب اليومي.
    he: פתגם זה מדגיש את ערך החיסכון והצניעות, ומציע שחסכון כסף מועיל באותה מידה כמו הרווחתו. משמש רבות
      בעצות פיננסיות ובשיח היומיומי.
