  short_explanation: This phrase, originating from ancient legal codes, represents the principle of proportional
    retribution for wrongdoing. It is famously associated with the Code of Hammurabi and the Hebrew Bible.
  i18n_explanations:
    en: This phrase, originating from ancient legal codes, represents the principle of proportional retribution
      for wrongdoing. It is famously associated with the Code of Hammurabi and the Hebrew Bible.
    es: Esta frase, originaria de antiguos códigos legales, representa el principio de retribución proporcional
      por un agravio. Está asociada al Código de Hammurabi y a la Biblia hebrea.
    fr: Cette expression, issue de codes juridiques anciens, représente le principe de la rétribution
      proportionnelle pour un tort commis. Elle est notamment associée au Code de Hammurabi et à la Bible
      hébraïque.
    de: Dieser Ausdruck, der aus alten Rechtskodizes stammt, steht für das Prinzip der angemessenen Vergeltung
      für begangenes Unrecht. Er ist berühmt mit dem Codex Hammurabi und der hebräischen Bibel verbunden.
    it: Questa frase, originaria da antichi codici legali, rappresenta il principio della retribuzione
      proporzionale per un torto subito. È famosa per essere associata al Codice di Hammurabi e alla Bibbia
      ebraica.
    pt: Esta frase, originária de antigos códigos legais, representa o princípio da retribuição proporcional
      por um dano cometido. Está associada ao Código de Hamurabi e à Bíblia Hebraica.
    ru: Это выражение, восходящее к древним правовым кодексам, представляет принцип пропорционального
      возмездия за причинённое зло. Оно тесно связано с Кодексом Хаммурапи и еврейской Библией.
    ja: この言葉は古代の法典に由来し、悪行に対する比例した報復の原則を表しています。ハムラビ法典やヘブライ語聖書と関連付けられています。
    zh: 这句话源自古代法律法典，代表了对错误进行比例报复的原则。它与《汉谟拉比法典》和《希伯来圣经》密切相关。
    ar: هذا القول، الذي ينحدر من مدونات قانونية قديمة، يمثل مبدأ العقاب المتناسب على الإساءة. وهو مرتبط
