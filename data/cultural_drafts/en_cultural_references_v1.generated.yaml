      descrever um fascínio sexual por garotas jovens.
    ru: Описывает соблазнительно развитую девочку или роман Владимира Набокова 1955 года об одержимости
      мужчины средних лет 12-летней девочкой. Термин также используется для обозначения сексуального влечения
      к юным девушкам.
    ja: 早熟で魅惑的な少女、またはウラジーミル・ナボコフの1955年の小説で、中年の男性が12歳の少女に執着する物語を指す。この用語はまた、若い少女への性的魅力を表すのにも使われる。
    zh: 指代早熟且具有诱惑力的少女，或指弗拉基米尔·纳博科夫1955年的小说，讲述一名中年男子对12岁少女的痴迷。该词也用于描述对年轻女孩的性吸引。
    ar: يشير إلى فتاة صغيرة مبكرة النضج وجذابة بشكل مفرط، أو إلى رواية فلاديمير نابوكوف لعام 1955 حول
