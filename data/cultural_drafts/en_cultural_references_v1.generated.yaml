- id: en_cultural_reference_hitler_s_final_solution_5b9106dc
  language: en
  canonical_reference: Hitler’s Final Solution
  reference_type: cultural_reference
  surface_patterns:
  - Hitler’s Final Solution
  - the Final Solution
  - Final Solution
