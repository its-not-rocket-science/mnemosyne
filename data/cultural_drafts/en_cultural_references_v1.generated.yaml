    fr: Un conflit humoristique de 1932 en Australie où l'armée tenta en vain de contrôler une population
      d'émeus. Symbole de l'arrogance humaine face à la nature.
    de: Ein humorvoller Konflikt von 1932 in Australien, bei dem das Militär vergeblich versuchte, die
      Emu-Population zu kontrollieren. Symbol für menschliche Hybris gegenüber der Natur.
    it: Un conflitto umoristico del 1932 in Australia in cui l'esercito fallì nel controllare la popolazione
