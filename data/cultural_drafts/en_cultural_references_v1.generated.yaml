- id: en_cultural_reference_a_monet_waterlily_moment_127fcfef
  language: en
  canonical_reference: A Monet waterlily moment
  reference_type: cultural_reference
  surface_patterns:
  - a Monet waterlily moment
  - Monet's waterlily
  - waterlily in the style of Monet
  - Monet-esque waterlily
  short_explanation: Refers to the serene, luminous paintings of water lilies by Claude Monet, part of
    his late-career series. These works emphasize light, color, and the fleeting effects of nature, embodying
    Impressionist ideals.
  i18n_explanations:
    en: Refers to the serene, luminous paintings of water lilies by Claude Monet, part of his late-career
      series. These works emphasize light, color, and the fleeting effects of nature, embodying Impressionist
      ideals.
    es: Se refiere a las serenas y luminosas pinturas de nenúfares de Claude Monet, parte de su serie
      de la etapa tardía. Estas obras enfatizan la luz, el color y los efectos efímeros de la naturaleza,
      encarnando los ideales impresionistas.
    fr: Fait référence aux peintures sereines et lumineuses de nymphéas de Claude Monet, faisant partie
      de sa série de la fin de sa carrière. Ces œuvres mettent en valeur la lumière, la couleur et les
      effets éphémères de la nature, incarnant les idéaux impressionnistes.
    de: Bezieht sich auf die ruhigen, leuchtenden Gemälde von Seerosen von Claude Monet, die Teil seiner
      Spätwerk-Serie sind. Diese Werke betonen Licht, Farbe und die flüchtigen Effekte der Natur und verkörpern
      impressionistische Ideale.
    it: Si riferisce ai dipinti sereni e luminosi di ninfee di Claude Monet, parte della sua serie della
      tarda carriera. Queste opere enfatizzano la luce, il colore e gli effetti fugaci della natura, incarnando
      gli ideali impressionisti.
    pt: Refere-se aos quadros serenos e luminosos de lírios-d'água de Claude Monet, parte de sua série
      da fase tardia. Essas obras enfatizam a luz, a cor e os efeitos fugazes da natureza, personificando
      os ideais impressionistas.
    ru: Описывает умиротворённые, светящиеся картины кувшинок Клода Моне, часть его позднего творчества.
      Эти работы акцентируют внимание на свете, цвете и мимолётных эффектах природы, воплощая идеалы импрессионизма.
    ja: クロード・モネによる静謐で光に満ちたスイレンの絵画を指し、彼の後期作品シリーズの一部。これらの作品は光、色彩、そして自然の儚い効果を強調し、印象主義の理想を体現している。
    zh: 指代克劳德·莫奈晚年创作的宁静而明亮的睡莲画作系列。这些作品强调光线、色彩与自然的瞬息变化，体现了印象派的理想。
    ar: يشير إلى لوحات الزنابق المائية الهادئة والمضيئة لكلود مونيه، والتي تعد جزءًا من سلسلة أعماله المتأخرة.
      تركز هذه الأعمال على الضوء واللون والأثر الزائل للطبيعة، متجسدةً المثل العليا للانطباعية.
    he: מתייחס לציורי הנימפאות השלווים והזוהרים של קלוד מונה, חלק מסדרת יצירותיו המאוחרות. עבודות אלו
      מדגישות אור, צבע ואת השפעותיה החולפות של הטבע, ומגלמות את האידיאלים האימפרסיוניסטיים.
