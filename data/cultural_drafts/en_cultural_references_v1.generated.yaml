- id: en_classical_or_scriptural_allusion_panem_et_circenses_3078b700
  language: en
  canonical_reference: Panem et circenses
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - panem et circenses
  - bread and circuses
  - bread and games
  short_explanation: A Latin phrase from the Roman poet Juvenal, criticizing the Roman populace for being
    placated by food and entertainment rather than demanding meaningful political change. It symbolizes
    the manipulation of the masses through distraction.
  i18n_explanations:
    en: A Latin phrase from the Roman poet Juvenal, criticizing the Roman populace for being placated
      by food and entertainment rather than demanding meaningful political change. It symbolizes the manipulation
      of the masses through distraction.
    es: Frase latina del poeta romano Juvenal, que critica a la población romana por ser apaciguada con
      comida y entretenimiento en lugar de exigir cambios políticos significativos. Simboliza la manipulación
      de las masas mediante la distracción.
    fr: Locution latine du poète romain Juvénal, critiquant le peuple romain pour être apaisé par la nourriture
      et les divertissements plutôt que par des changements politiques significatifs. Elle symbolise la
      manipulation des masses par la distraction.
    de: Ein lateinischer Ausdruck des römischen Dichters Juvenal, der das römische Volk dafür kritisiert,
      sich mit Essen und Unterhaltung abspeisen zu lassen, statt politische Veränderungen zu fordern.
      Er symbolisiert die Manipulation der Massen durch Ablenkung.
    it: Un'espressione latina del poeta romano Giovenale, che critica il popolo romano per essere placato
      dal cibo e dagli spettacoli invece di chiedere cambiamenti politici significativi. Simboleggia la
      manipolazione delle masse attraverso la distrazione.
    pt: Expressão latina do poeta romano Juvenal, que critica o povo romano por ser acalmado com comida
      e entretenimento em vez de exigir mudanças políticas significativas. Simboliza a manipulação das
      massas por meio da distração.
    ru: Латинское выражение из произведений римского поэта Ювенала, критикующее римский народ за то, что
      он успокаивается едой и развлечениями вместо требования значимых политических перемен. Символизирует
      манипуляцию массами через отвлечение внимания.
    ja: 古代ローマの詩人ユウェナリスによるラテン語の成句で、ローマ市民が食べ物や娯楽によってなだめられ、実質的な政治変革を求めないことを批判したもの。大衆を娯楽で操作することを象徴する。
    zh: 古罗马诗人尤维纳利斯的拉丁语短语，批评罗马民众沉迷于食物和娱乐而非追求有意义的政治变革。象征着通过分散注意力来操控大众。
    ar: عبارة لاتينية للشاعر الروماني جوفينال، تنتقد الشعب الروماني لكونه يرضى بالطعام والترفيه بدلاً
      من المطالبة بتغييرات سياسية ذات معنى. ترمز إلى manipulation الجماهير من خلال التشتت.
    he: ביטוי לטיני מן המשורר הרומי יובנאליס, המבקר את העם הרומי על כך שהוא נרגע באוכל ובבידור במקום לדרוש
      שינוי פוליטי משמעותי. מסמל את המניפולציה של ההמונים באמצעות הסחת דעת.
