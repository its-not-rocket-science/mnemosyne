- id: en_cultural_reference_pearls_before_swine_8fc7011a
  language: en
  canonical_reference: Pearls before swine
  reference_type: cultural_reference
  surface_patterns:
  - pearls before swine
  - cast pearls before swine
  - don't cast pearls before swine
  short_explanation: To offer something valuable or precious to someone who cannot appreciate it. The
    phrase comes from Jesus' teachings in the New Testament, warning against wasting wisdom or goodness
    on those who are unworthy.
  i18n_explanations:
    en: To offer something valuable or precious to someone who cannot appreciate it. The phrase comes
      from Jesus' teachings in the New Testament, warning against wasting wisdom or goodness on those
      who are unworthy.
    es: Ofrecer algo valioso o precioso a quien no puede apreciarlo. La expresión proviene de las enseñanzas
      de Jesús en el Nuevo Testamento y advierte contra malgastar sabiduría o bondad en quienes no la
      merecen.
    fr: Offrir quelque chose de précieux à quelqu'un qui ne peut l'apprécier. L'expression vient des enseignements
      de Jésus dans le Nouveau Testament et met en garde contre le gaspillage de sagesse ou de bonté envers
      ceux qui ne la méritent pas.
    de: Edelsteine vor jemanden werfen, der ihren Wert nicht zu schätzen weiß. Der Ausdruck stammt aus
      den Lehren Jesu im Neuen Testament und warnt davor, Weisheit oder Güte an Unwürdige zu verschwenden.
    it: Offrire qualcosa di prezioso a chi non può apprezzarlo. L'espressione proviene dagli insegnamenti
      di Gesù nel Nuovo Testamento e mette in guardia contro lo spreco di saggezza o bontà verso chi non
      la merita.
    pt: Oferecer algo valioso ou precioso a quem não pode apreciá-lo. A expressão vem dos ensinamentos
      de Jesus no Novo Testamento e alerta contra desperdiçar sabedoria ou bondade com quem não a merece.
    ru: Разбрасываться чем-то ценным перед теми, кто этого не ценит. Фраза восходит к учению Иисуса в
      Новом Завете и предупреждает о напрасной трате мудрости или добра на недостойных.
    ja: 価値あるものを、それを理解できない人に与えること。この表現は新約聖書のイエスの教えに由来し、知恵や善意をふさわしくない人に無駄にすることを戒めています。
    zh: 将珍贵的东西给予不懂欣赏的人。此短语源于《新约圣经》中耶稣的教诲，告诫不要将智慧或善意浪费在不配的人身上。
    ar: إهداء شيء ثمين أو نفيس إلى من لا يقدر قيمته. تأتي العبارة من تعاليم يسوع في العهد الجديد، وتحذر
