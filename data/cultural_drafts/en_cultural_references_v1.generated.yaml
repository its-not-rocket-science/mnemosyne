- id: en_literary_reference_a_eliot_hollow_men_13230109
  language: en
  canonical_reference: A Eliot Hollow Men
  reference_type: literary_reference
  surface_patterns:
  - Eliot's Hollow Men
  - The Hollow Men
  - hollow men
  - Eliot hollow
  short_explanation: Refers to T.S. Eliot's poem 'The Hollow Men', which depicts spiritual emptiness and
    the failure of modern civilization. The phrase symbolizes people devoid of meaning, trapped between
    life and death, often used to critique societal alienation.
  i18n_explanations:
    en: Refers to T.S. Eliot's poem 'The Hollow Men', which depicts spiritual emptiness and the failure
      of modern civilization. The phrase symbolizes people devoid of meaning, trapped between life and
      death, often used to critique societal alienation.
    es: Se refiere al poema de T.S. Eliot 'Los hombres huecos', que retrata la vacuidad espiritual y el
      fracaso de la civilización moderna. La frase simboliza a personas carentes de sentido, atrapadas
      entre la vida y la muerte, y se usa para criticar el desapego social.
    fr: Fait référence au poème de T.S. Eliot 'Les Hommes creux', qui dépeint le vide spirituel et l'échec
      de la civilisation moderne. L'expression symbolise des personnes privées de sens, prisonnières entre
      la vie et la mort, souvent utilisée pour critiquer l'aliénation sociale.
    de: Bezieht sich auf T.S. Eliots Gedicht 'Die hohlen Männer', das geistige Leere und das Scheitern
      der modernen Zivilisation darstellt. Der Ausdruck symbolisiert Menschen ohne Sinn, gefangen zwischen
      Leben und Tod, oft zur Kritik an gesellschaftlicher Entfremdung verwendet.
    it: Si riferisce alla poesia di T.S. Eliot 'Gli uomini vuoti', che ritrae il vuoto spirituale e il
      fallimento della civiltà moderna. La frase simboleggia persone prive di significato, intrappolate
      tra la vita e la morte, spesso usata per criticare l'alienazione sociale.
    pt: Refere-se ao poema de T.S. Eliot 'Os Homens Vazios', que retrata o vazio espiritual e o fracasso
      da civilização moderna. A expressão simboliza pessoas sem sentido, presas entre a vida e a morte,
      frequentemente usada para criticar o distanciamento social.
    ru: Относится к поэме Т.С. Элиота 'Полоые люди', изображающей духовную пустоту и крах современной
      цивилизации. Фраза символизирует людей, лишённых смысла, застрявших между жизнью и смертью, часто
      используется для критики социального отчуждения.
    ja: T・S・エリオットの詩「 hollow men（空虚な人々）」を指す。現代文明の失敗と精神的な空虚を描いたこの詩は、生と死の間で意味を見失った人々を象徴し、社会的疎外を批判する際に用いられる。
    zh: 指T.S.艾略特的诗作《空心人》，描绘了精神空虚与现代文明的失败。该短语象征着毫无意义、徘徊于生死之间的人们，常用于批判社会疏离。
    ar: يشير إلى قصيدة تي. إس. إليوت 'الرجال المجوفون'، التي تصوّر الفراغ الروحي وفشل الحضارة الحديثة.
      العبارة ترمز إلى أشخاص فاقدي المعنى، عالقين بين الحياة والموت، وغالبًا ما تُستخدم لنقد الاغتراب
      الاجتماعي.
    he: מתייחס לשירו של טי אס אליוט 'האנשים החלולים', המתאר ריקנות רוחנית וכישלונה של הצivilיזציה המודרנית.
