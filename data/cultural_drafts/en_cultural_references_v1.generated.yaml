  short_explanation: Refers to the mythical bed of Procrustes, a robber who forced victims to fit the
    bed by stretching or cutting them. Symbolizes arbitrary or cruel standards that force conformity,
    often used to describe rigid or oppressive systems.
  i18n_explanations:
    en: Refers to the mythical bed of Procrustes, a robber who forced victims to fit the bed by stretching
      or cutting them. Symbolizes arbitrary or cruel standards that force conformity, often used to describe
      rigid or oppressive systems.
    es: Se refiere al lecho mítico de Procusto, un ladrón que obligaba a sus víctimas a adaptarse a la
      cama estirándolas o cortándolas. Simboliza estándares arbitrarios o crueles que imponen la conformidad,
      a menudo usados para describir sistemas rígidos u opresivos.
    fr: Fait référence au lit mythique de Procruste, un brigand qui forçait ses victimes à s'adapter au
      lit en les étirant ou en les coupant. Symbolise des normes arbitraires ou cruelles imposant la conformité,
      souvent utilisées pour décrire des systèmes rigides ou oppressifs.
    de: Bezieht sich auf das mythische Bett des Prokrustes, eines Räubers, der seine Opfer zwang, sich
      dem Bett anzupassen, indem er sie dehnte oder verstümmelte. Steht für willkürliche oder grausame
      Maßstäbe, die Konformität erzwingen, oft zur Beschreibung starrer oder unterdrückerischer Systeme
      verwendet.
    it: Si riferisce al letto mitico di Procuste, un brigante che costringeva le sue vittime ad adattarsi
      al letto allungandole o tagliandole. Simboleggia standard arbitrari o crudeli che impongono la conformità,
      spesso usati per descrivere sistemi rigidi o oppressivi.
    pt: Refere-se ao leito mítico de Procrusto, um ladrão que forçava suas vítimas a se adaptarem à cama
      esticando-as ou cortando-as. Simboliza padrões arbitrários ou cruéis que impõem a conformidade,
      muitas vezes usados para descrever sistemas rígidos ou opressivos.
    ru: Олицетворяет мифическое ложе Прокруста, разбойника, который насильно подгонял жертв под размер
      кровати, растягивая или увеча их. Символизирует произвольные или жестокие стандарты, навязывающие
      конформизм, часто используется для описания жёстких или угнетающих систем.
    ja: プロクルステスの神話上のベッドを指す。強盗のプロクルステスは犠牲者をベッドに合わせるために引き伸ばしたり切り刻んだりした。恣意的または残酷な基準が強制されることを象徴し、しばしば硬直的または抑圧的なシステムを表すのに用いられる。
    zh: 指普罗克rustes的神话之床：强盗普罗克rustes强迫受害者通过拉伸或切割来适应床的尺寸。象征强制顺从的武断或残酷标准，常用于描述僵化或压迫性体制。
    ar: يشير إلى سرير بروكرستس الأسطوري، وهو لص أجبر ضحاياه على ملاءمة السرير بمدهم أو بترهم. يرمز إلى
