    he: מתייחס לבודיקה (או בואדיציאה), מלכת הקלטים שהובילה מרד נגד השלטון הרומי בבריטניה העתיקה. מרכבותיה
      מסמלות התנגדות ומרי נגד דיכוי אימפריאלי.
