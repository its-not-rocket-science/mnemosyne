      exterior de EE.UU. y la resistencia cubana.
    fr: Une invasion militaire avortée de Cuba menée en 1961 par le groupe paramilitaire Brigade 2506,
      soutenu par la CIA. Elle symbolise les tensions de la Guerre froide, les échecs de la politique
      étrangère américaine et la résistance cubaine.
    de: Ein gescheiterter militärischer Angriff auf Kuba 1961, durchgeführt von der CIA-gesponserten paramilitärischen
