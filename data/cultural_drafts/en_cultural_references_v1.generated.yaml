- id: en_proverb_tradition_a_bird_in_the_hand_is_worth_two_in_the_bush_3c318f95
  language: en
  canonical_reference: A bird in the hand is worth two in the bush
  reference_type: proverb_tradition
  surface_patterns:
  - A bird in the hand is worth two in the bush
  - A bird in the hand is worth more than two in the bush
  - One bird in the hand is worth two in the bush
  - Better a bird in the hand than two in the bush
  short_explanation: This proverb advises that it is better to hold onto something certain than to risk
    losing it by pursuing something greater but uncertain. It emphasizes the value of security over potential
    but risky gains.
  i18n_explanations:
    en: This proverb advises that it is better to hold onto something certain than to risk losing it by
      pursuing something greater but uncertain. It emphasizes the value of security over potential but
      risky gains.
    es: Este refrán aconseja que es mejor conservar algo seguro que arriesgarse a perderlo persiguiendo
      algo mayor pero incierto. Destaca el valor de la seguridad frente a ganancias potenciales pero arriesgadas.
    fr: Ce proverbe conseille de conserver ce que l'on a plutôt que de risquer de tout perdre en cherchant
      à obtenir davantage, mais de manière incertaine. Il souligne l'importance de la sécurité face à
      des gains potentiels mais risqués.
    de: Dieses Sprichwort rät, sich mit dem zufriedenzugeben, was man sicher hat, statt es zu riskieren,
      um etwas Größeres, aber Ungewisses zu erlangen. Es betont den Wert von Sicherheit gegenüber unsicheren,
      aber möglichen Gewinnen.
    it: Questo proverbio consiglia di accontentarsi di ciò che si ha piuttosto che rischiare di perderlo
      inseguendo qualcosa di più grande ma incerto. Sottolinea il valore della sicurezza rispetto a potenziali
      guadagni rischiosi.
    pt: Este provérbio aconselha a contentar-se com o que se tem do que arriscar perdê-lo em busca de
      algo maior, mas incerto. Enfatiza o valor da segurança em relação a ganhos potenciais arriscados.
    ru: Эта пословица советует довольствоваться тем, что у тебя есть, вместо того чтобы рисковать всем
      ради чего-то большего, но неопределённого. Она подчёркивает ценность безопасности перед потенциальными,
      но рискованными выгодами.
    ja: このことわざは、不確実なより大きなものを追うよりも、確実なものを手に入れておくほうが良いと助言します。潜在的な利益よりも安全性の価値を強調します。
    zh: 这句谚语建议，与其冒险追求更大但不确定的东西而失去现有的确定收益，不如保有手中的东西。它强调了安全的价值超过潜在但有风险的收益。
    ar: هذا المثل ينصح بالاكتفاء بما هو متاح وعدم المخاطرة بفقدان ما نملكه في سبيل الحصول على شيء أكبر
      لكن غير مؤكد. يبرز قيمة الأمان مقارنة بالمكاسب المحتملة والمحفوفة بالمخاطر.
    he: הפתגם הזה מייעץ להסתפק במה שיש בידינו ולא לסכן זאת בחיפוש אחר משהו גדול יותר אך בלתי ודאי. הוא
      מדגיש את ערך הביטחון מול רווחים פוטנציאליים אך מסוכנים.
