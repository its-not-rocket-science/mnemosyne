- id: en_literary_reference_albatross_around_one_s_neck_1436f19d
  language: en
  canonical_reference: Albatross around one’s neck
  reference_type: literary_reference
  surface_patterns:
  - albatross around one's neck
  - albatross on one's neck
  - albatross around the neck
  short_explanation: A burdensome, inescapable curse or responsibility. The phrase originates from Samuel
    Taylor Coleridge's poem 'The Rime of the Ancient Mariner,' where an albatross is hung around the mariner's
    neck as punishment.
  i18n_explanations:
    en: A burdensome, inescapable curse or responsibility. The phrase originates from Samuel Taylor Coleridge's
      poem 'The Rime of the Ancient Mariner,' where an albatross is hung around the mariner's neck as
      punishment.
    es: Una maldición o responsabilidad pesada e inevitable. La expresión proviene del poema de Samuel
      Taylor Coleridge 'La balada del viejo marinero', donde un albatros es colgado del cuello del marinero
      como castigo.
    fr: Une malédiction ou une responsabilité pesante et inévitable. L'expression vient du poème de Samuel
      Taylor Coleridge 'Le Dit du vieux marin', où un albatros est pendu au cou du marin comme punition.
    de: Eine lästige, unentrinnbare Last oder Verantwortung. Der Ausdruck stammt aus Samuel Taylor Coleridges
      Gedicht 'The Rime of the Ancient Mariner', in dem einem Seemann ein Albatros um den Hals gehängt
      wird als Strafe.
    it: Un peso o responsabilità opprimente e inevitabile. L'espressione deriva dal poema di Samuel Taylor
      Coleridge 'La ballata del vecchio marinaio', in cui un albatro viene appeso al collo del marinaio
      come punizione.
    pt: Um fardo ou responsabilidade pesada e inevitável. A expressão origina-se do poema de Samuel Taylor
      Coleridge 'A Balada do Velho Marinheiro', onde um albatroz é pendurado no pescoço do marinheiro
      como punição.
    ru: Обременительное, неотвратимое проклятие или обязанность. Фраза происходит из поэмы Сэмюэля Тейлора
      Кольриджа 'Сказание о старом мореходе', где альбатрос вешается на шею моряка в наказание.
    ja: 負担の重い、逃れられない呪いまたは責任。この表現は、サミュエル・テイラー・コールリッジの詩「老水夫行」に由来し、航海士の首にアルバトロスが吊るされる罰を表す。
    zh: 指一种沉重、无法摆脱的诅咒或责任。该短语源于萨缪尔·泰勒·柯勒律治的诗作《老水手谣》，诗中水手因惩罚脖子上挂着信天翁。
    ar: عبء أو مسؤولية ثقيلة لا مفر منها. تأتي العبارة من قصيدة صموئيل تايلور كوليردج 'أنشودة البحار القديم'،
      حيث يُعلق طائر القطرس حول عنق البحار كعقاب.
    he: נטל או אחריות כבדים ובלתי נמנעים. הביטוי מקורו בשירו של סמואל טיילור קולרידג' 'זמרו של העלם הימי',
      בו תלו עיטור בצווארו של המלח כעונש.
