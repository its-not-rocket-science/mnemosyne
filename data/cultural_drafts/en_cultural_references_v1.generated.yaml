- id: en_proverb_tradition_columbus_s_egg_1af8a813
  language: en
  canonical_reference: Columbus's egg
  reference_type: proverb_tradition
  surface_patterns:
  - Columbus's egg
  - Columbus egg
  - the Columbus egg
  short_explanation: A clever solution to a seemingly difficult problem that is actually simple once explained.
    The phrase originates from an anecdote where Christopher Columbus challenged others to balance an
    egg on its end, demonstrating that with a slight modification (flattening one end), the task becomes
    trivial.
  i18n_explanations:
    en: A clever solution to a seemingly difficult problem that is actually simple once explained. The
      phrase originates from an anecdote where Christopher Columbus challenged others to balance an egg
      on its end, demonstrating that with a slight modification (flattening one end), the task becomes
      trivial.
    es: Una solución ingeniosa a un problema aparentemente difícil que resulta simple una vez explicado.
      La expresión proviene de una anécdota en la que Cristóbal Colón retó a otros a equilibrar un huevo
      sobre su punta, demostrando que con un pequeño cambio (aplastar un extremo), la tarea se vuelve
      trivial.
    fr: Une solution ingénieuse à un problème apparemment difficile qui devient simple une fois expliqué.
      L'expression vient d'une anecdote où Christophe Colomb défia d'autres à équilibrer un œuf sur sa
      pointe, montrant qu'avec une légère modification (aplatir un bout), la tâche devient triviale.
    de: Eine clevere Lösung für ein scheinbar schwieriges Problem, das nach der Erklärung einfach ist.
      Der Ausdruck stammt aus einer Anekdote, in der Christoph Kolumbus andere herausforderte, ein Ei
      auf seiner Spitze zu balancieren, und zeigte, dass die Aufgabe mit einer kleinen Veränderung (Abflachen
      eines Endes) trivial wird.
    it: Una soluzione ingegnosa a un problema apparentemente difficile che diventa semplice una volta
      spiegato. L'espressione deriva da un aneddoto in cui Cristoforo Colombo sfidò altri a bilanciare
      un uovo sulla sua punta, dimostrando che con una piccola modifica (appiattire un'estremità), il
      compito diventa banale.
    pt: Uma solução engenhosa para um problema aparentemente difícil que se torna simples quando explicado.
      A expressão vem de uma anedota em que Cristóvão Colombo desafiou outros a equilibrar um ovo em sua
      ponta, mostrando que, com uma pequena modificação (achatar uma extremidade), a tarefa se torna trivial.
    ru: Остроумное решение, казавшейся сложной задачи, которое оказывается простым, если объяснить. Выражение
      восходит к анекдоту, где Христофор Колумб предложил другим уравновесить яйцо на конце, показав,
      что стоит слегка изменить его (приплюснуть один конец), и задача становится тривиальной.
    ja: 一見難しい問題に対する巧妙な解決策で、説明すれば簡単なもの。この表現は、 Christopher Columbus が他者に卵を先端で立てるという難題に挑戦した逸話に由来し、片方の端を平らにするという小さな工夫で簡単にできることを示したもの。
    zh: 看似困难的问题的巧妙解决方案，一旦解释清楚就会变得简单。这个短语源于一个轶事：克里斯托弗·哥伦布向他人挑战，让他们将鸡蛋立在尖端上，并通过稍微改变（将一端压扁）证明这件事变得轻而易举。
    ar: حل ذكي لمشكلة تبدو صعبة ولكنه يصبح بسيطًا عند شرحه. تأتي العبارة من حادثة حيث تحدى كريستوفر كولومبوس
      الآخرين ليوازنوا بيضة على طرفها، موضحًا أنه مع تعديل بسيط (تسطيح أحد الأطراف)، تصبح المهمة تافهة.
    he: פתרון מבריק לבעיה שנראית קשה, אך הופך פשוט לאחר ההסבר. הביטוי נובע מאנקדוטה שבה כריסטופר קולומבוס
      אתגר אחרים לאזן ביצה על קצהּ, תוך שהוא מראה שבעזרת שינוי קל (שטוח קצה אחד), המשימה הופכת טריוויאלית.
