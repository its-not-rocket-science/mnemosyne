- id: en_cultural_reference_a_turneresque_storm_e278f851
  language: en
  canonical_reference: A Turneresque storm
  reference_type: cultural_reference
  surface_patterns:
  - a Turneresque storm
  - Turner's stormy seascapes
  - stormy scenes in the style of Turner
  - Turnerian tempest
  short_explanation: Refers to the dramatic, swirling storm paintings by J.M.W. Turner (1775–1851), an
    English Romantic painter known for his emotive and atmospheric depictions of nature's power. His work
    often blurs the line between abstraction and realism.
  i18n_explanations:
    en: Refers to the dramatic, swirling storm paintings by J.M.W. Turner (1775–1851), an English Romantic
      painter known for his emotive and atmospheric depictions of nature's power. His work often blurs
      the line between abstraction and realism.
    es: Se refiere a los dramáticos cuadros de tormentas arremolinadas de J.M.W. Turner (1775–1851), pintor
      inglés romántico conocido por sus representaciones emotivas y atmosféricas del poder de la naturaleza.
      Su obra a menudo difumina la línea entre abstracción y realismo.
    fr: Fait référence aux peintures dramatiques de tempêtes tourbillonnantes de J.M.W. Turner (1775–1851),
      peintre anglais romantique célèbre pour ses représentations émotives et atmosphériques de la puissance
      de la nature. Son œuvre brouille souvent la frontière entre abstraction et réalisme.
    de: Bezieht sich auf die dramatischen, wirbelnden Sturmgemälde von J.M.W. Turner (1775–1851), einem
      englischen Romantiker, der für seine gefühlsbetonten und atmosphärischen Darstellungen der Naturgewalten
      bekannt ist. Sein Werk verwischt oft die Grenze zwischen Abstraktion und Realismus.
    it: Si riferisce ai dipinti drammatici e vorticosi di tempeste di J.M.W. Turner (1775–1851), pittore
      inglese romantico noto per le sue rappresentazioni emotive e atmosferiche del potere della natura.
      Le sue opere spesso sfumano i confini tra astrazione e realismo.
    pt: Refere-se às pinturas dramáticas e turbilhonantes de tempestades de J.M.W. Turner (1775–1851),
      pintor inglês romântico conhecido por suas representações emotivas e atmosféricas do poder da natureza.
      Sua obra muitas vezes borra a linha entre abstração e realismo.
    ru: Относится к драматичным, вихревым картинам бурь Дж. М. В. Тёрнера (1775–1851), английского романтического
      художника, известного своими эмоциональными и атмосферными изображениями силы природы. Его работы
      часто стирают грань между абстракцией и реализмом.
    ja: イギリスのロマン主義画家J.M.W.ターナー（1775–1851）による、ドラマチックで渦巻く嵐の絵画を指す。自然の力を情緒的かつ大気的に描写したことで知られ、作品は抽象と写実の境界を曖昧にすることが多い。
    zh: 指的是英国浪漫主义画家J.M.W.透纳（1775–1851）创作的戏剧性旋涡风暴画作。他以对自然力量的情感化与氛围化描绘闻名，其作品常在抽象与写实间模糊边界。
    ar: يشير إلى لوحات العواصف الدرامية والدوامة لجيه إم دبليو ترنر (1775–1851)، الرسام الإنجليزي الرومانسي
      المعروف بتصويراته العاطفية والجوّية لقوة الطبيعة. غالبًا ما تمحو أعماله الحدود بين التجريد والواقعية.
    he: מתייחס לציורי הסערות הדרמטיות והמסתחררות של ג'י.אם.וו. טרנר (1775–1851), צייר רומנטי אנגלי הידוע
      בתיאוריו הרגשיים והאטמוספריים של כוחה של הטבע. עבודתו מטשטשת לעיתים קרובות את הגבול בין מופשט לריאליסטי.
