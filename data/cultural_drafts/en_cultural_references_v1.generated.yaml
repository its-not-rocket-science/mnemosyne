- id: en_classical_or_scriptural_allusion_daniel_in_the_lion_s_den_778d7cfd
  language: en
  canonical_reference: Daniel in the lion’s den
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Daniel in the lion's den
  - Daniel in the lions' den
  - the lion's den
  - the lions' den
  - Daniel's ordeal in the lions' den
  short_explanation: A biblical story of faith and divine protection, where Daniel survives unharmed overnight
    in a den of lions due to his unwavering trust in God. It symbolizes courage in the face of adversity
    and miraculous deliverance.
  i18n_explanations:
    en: A biblical story of faith and divine protection, where Daniel survives unharmed overnight in a
      den of lions due to his unwavering trust in God. It symbolizes courage in the face of adversity
      and miraculous deliverance.
    es: Historia bíblica de fe y protección divina en la que Daniel sobrevive ileso toda la noche en un
      foso de leones gracias a su inquebrantable confianza en Dios. Simboliza el coraje ante la adversidad
      y la liberación milagrosa.
    fr: Une histoire biblique de foi et de protection divine où Daniel survit indemne toute une nuit dans
      une fosse aux lions grâce à sa confiance inébranlable en Dieu. Elle symbolise le courage face à
      l'adversité et la délivrance miraculeuse.
    de: Eine biblische Geschichte von Glauben und göttlichem Schutz, in der Daniel dank seines unerschütterlichen
      Vertrauens in Gott eine Nacht unverletzt im Löwengrube überlebt. Sie symbolisiert Mut angesichts
      von Widrigkeiten und wundersame Errettung.
    it: Una storia biblica di fede e protezione divina in cui Daniele sopravvive indenne una notte nella
      fossa dei leoni grazie alla sua incrollabile fiducia in Dio. Simboleggia il coraggio di fronte all'avversità
      e la liberazione miracolosa.
    pt: Uma história bíblica de fé e proteção divina em que Daniel sobrevive ileso a uma noite na cova
      dos leões graças à sua inabalável confiança em Deus. Simboliza coragem diante da adversidade e livramento
      miraculoso.
    ru: Библейская история о вере и божественной защите, в которой Даниила остаётся невредимым в львином
      рву благодаря непоколебимой вере в Бога. Символизирует мужество перед лицом невзгод и чудесное избавление.
    ja: 信仰と神の守りを示す聖書の物語で、ダニエルは神への揺るぎない信頼ゆえに、一晩ライオンの穴で無傷で生き延びる。逆境への勇気と奇跡的な救いを象徴する。
    zh: 圣经故事，但以理因对上帝坚定的信仰而在狮子坑中安然度过一夜。象征面对逆境的勇气与奇迹般的拯救。
    ar: قصة توراتية عن الإيمان والحماية الإلهية، حيث نجا دانيال سليماً طوال ليلة في جب الأسود بفضل ثقته
      الثابتة بالله. ترمز إلى الشجاعة أمام الشدائد والخلاص المعجزي.
    he: סיפור מקראי על אמונה והגנה אלוהית, שבו דניאל שרד לילה שלם ללא פגע בגוב האריות בזכות אמונתו האיתנה
      באל. מסמל אומץ מול צרה וישועה ניסית.
