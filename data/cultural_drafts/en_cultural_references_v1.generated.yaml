  - be neither a borrower nor a lender
  - neither borrow nor lend
  - don't borrow or lend
  short_explanation: A proverb advising against borrowing or lending money to avoid financial or personal
    conflicts. It originates from Polonius' advice to his son Laertes in Shakespeare's Hamlet.
  i18n_explanations:
    en: A proverb advising against borrowing or lending money to avoid financial or personal conflicts.
      It originates from Polonius' advice to his son Laertes in Shakespeare's Hamlet.
    es: Un proverbio que aconseja no pedir prestado ni prestar dinero para evitar conflictos financieros
      o personales. Proviene del consejo de Polonio a su hijo Laertes en Hamlet de Shakespeare.
    fr: Un proverbe conseillant de ne pas emprunter ni prêter d'argent pour éviter les conflits financiers
      ou personnels. Il vient du conseil de Polonius à son fils Laërte dans Hamlet de Shakespeare.
    de: Ein Sprichwort, das rät, weder Geld zu leihen noch zu verleihen, um finanzielle oder persönliche
      Konflikte zu vermeiden. Es stammt aus Polonius' Rat an seinen Sohn Laertes in Shakespeares Hamlet.
    it: Un proverbio che consiglia di non prendere in prestito né prestare denaro per evitare conflitti
      finanziari o personali. Deriva dal consiglio di Polonio a suo figlio Laerte nell'Amleto di Shakespeare.
    pt: Um provérbio que aconselha a não pedir nem emprestar dinheiro para evitar conflitos financeiros
      ou pessoais. Vem do conselho de Polônio a seu filho Laertes em Hamlet de Shakespeare.
    ru: Поговорка, советующая не одалживать и не брать в долг деньги, чтобы избежать финансовых или личных
      конфликтов. Восходит к совету Полония своему сыну Лаэрту в «Гамлете» Шекспира.
    ja: 金銭の貸し借りを避けることで、経済的または個人的なトラブルを防ぐという古い格言。シェイクスピアの「ハムレット」で、ポローニアスが息子ラエルテスに与えた助言に由来する。
    zh: 一句格言，劝诫人们既不要借钱也不借钱，以避免经济或个人纠纷。源自莎士比亚《哈姆雷特》中波洛涅斯对儿子雷尔提斯的忠告。
    ar: مثل يحذر من الاقتراض أو إقراض المال لتجنب الصراعات المالية أو الشخصية. يأتي من نصيحة بولونيوس
      لابنه لايرتيس في هاملت لشكسبير.
    he: פתגם המזהיר שלא ללוות כסף ולא להלוות אותו כדי להימנע מקונפליקטים כלכליים או אישיים. מקורו בנאומו
