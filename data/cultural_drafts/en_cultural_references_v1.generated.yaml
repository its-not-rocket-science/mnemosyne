- id: en_cultural_reference_bonnie_prince_charlie_s_escape_29e3404b
  language: en
  canonical_reference: Bonnie Prince Charlie's escape
  reference_type: cultural_reference
  surface_patterns:
  - Bonnie Prince Charlie's escape
  - the escape of Bonnie Prince Charlie
  - Bonnie Prince Charlie fled
  short_explanation: Refers to the 1746 escape of Charles Edward Stuart (Bonnie Prince Charlie) after
    the failed Jacobite rising in Scotland. It symbolizes resilience, adventure, and the romanticized
    struggle for Scottish independence.
  i18n_explanations:
    en: Refers to the 1746 escape of Charles Edward Stuart (Bonnie Prince Charlie) after the failed Jacobite
      rising in Scotland. It symbolizes resilience, adventure, and the romanticized struggle for Scottish
      independence.
    es: Se refiere a la huida de Carlos Eduardo Estuardo (Bonnie Prince Charlie) en 1746 tras el fracaso
      del levantamiento jacobita en Escocia. Simboliza resiliencia, aventura y la lucha romántica por
      la independencia escocesa.
    fr: Fait référence à la fuite de Charles Édouard Stuart (Bonnie Prince Charlie) en 1746 après l'échec
      du soulèvement jacobite en Écosse. Symbolise la résilience, l'aventure et la lutte romantisée pour
      l'indépendance écossaise.
    de: Bezieht sich auf die Flucht von Charles Edward Stuart (Bonnie Prince Charlie) 1746 nach dem gescheiterten
      Jakobitenaufstand in Schottland. Symbolisiert Widerstandsfähigkeit, Abenteuer und den romantisierten
      Kampf um schottische Unabhängigkeit.
    it: Si riferisce alla fuga di Carlo Edoardo Stuart (Bonnie Prince Charlie) nel 1746 dopo il fallimento
      della rivolta giacobita in Scozia. Simboleggia resilienza, avventura e la lotta romantizzata per
      l'indipendenza scozzese.
    pt: Refere-se à fuga de Carlos Eduardo Stuart (Bonnie Prince Charlie) em 1746, após o fracasso da
      revolta jacobita na Escócia. Simboliza resiliência, aventura e a luta romântica pela independência
      escocesa.
    ru: Относится к побегу Карла Эдуарда Стюарта (Бонни Принца Чарли) в 1746 году после провала якобитского
      восстания в Шотландии. Символизирует стойкость, приключение и романтизированную борьбу за независимость
      Шотландии.
    ja: 1746年にスコットランドで失敗したジャコバイト蜂起の後、チャールズ・エドワード・ステュアート（ボニー・プリンス・チャーリー）が逃亡した出来事を指す。これは、不屈の精神、冒険、そしてロマンチックに描かれるスコットランド独立の闘いを象徴する。
    zh: 指1746年苏格兰詹姆斯党起义失败后，查尔斯·爱德华·斯图亚特（小王子查理）的逃亡。象征着坚韧、冒险以及浪漫化的苏格兰独立斗争。
    ar: يشير إلى هروب تشارلز إدوارد ستيوارت (الأمير تشارلي الجميل) عام 1746 بعد فشل انتفاضة اليعاقبة في
      اسكتلندا. يرمز إلى المرونة والمغامرة والنضال الرومانسي من أجل استقلال اسكتلندا.
    he: מתייחס לבריחתו של צ'ארלס אדוארד סטיוארט (הנסיך היפה צ'ארלי) בשנת 1746 לאחר כישלון מרד היעקוביטים
