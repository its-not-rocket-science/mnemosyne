- id: en_literary_reference_frankenstein_s_monster_269083eb
  language: en
  canonical_reference: Frankenstein's monster
  reference_type: literary_reference
  surface_patterns:
  - Frankenstein's monster
  - Frankenstein monster
  - the monster
  - Frankenstein
  short_explanation: Refers to the artificial being created by Victor Frankenstein in Mary Shelley's 1818
    novel. Often misnamed 'Frankenstein,' the creature symbolizes the dangers of unchecked scientific
    ambition and the consequences of playing God.
  i18n_explanations:
    en: Refers to the artificial being created by Victor Frankenstein in Mary Shelley's 1818 novel. Often
      misnamed 'Frankenstein,' the creature symbolizes the dangers of unchecked scientific ambition and
      the consequences of playing God.
    es: Se refiere al ser artificial creado por Victor Frankenstein en la novela de Mary Shelley de 1818.
      Aunque suele llamarse erróneamente 'Frankenstein', la criatura simboliza los peligros de la ambición
      científica desmedida y las consecuencias de jugar a ser Dios.
    fr: Fait référence à l'être artificiel créé par Victor Frankenstein dans le roman de Mary Shelley
      de 1818. Souvent appelé à tort 'Frankenstein', la créature symbolise les dangers de l'ambition scientifique
      débridée et les conséquences de jouer à Dieu.
    de: Bezieht sich auf das künstliche Wesen, das Victor Frankenstein in Mary Shelleys Roman von 1818
      erschafft. Oft fälschlich 'Frankenstein' genannt, symbolisiert das Geschöpf die Gefahren unkontrollierter
      wissenschaftlicher Ambitionen und die Folgen des 'Gottspielens'.
    it: Si riferisce all'essere artificiale creato da Victor Frankenstein nel romanzo di Mary Shelley
      del 1818. Spesso chiamato erroneamente 'Frankenstein', la creatura simboleggia i pericoli dell'ambizione
      scientifica sfrenata e le conseguenze del voler giocare a fare Dio.
    pt: Refere-se ao ser artificial criado por Victor Frankenstein no romance de Mary Shelley de 1818.
      Frequentemente chamado erroneamente de 'Frankenstein', a criatura simboliza os perigos da ambição
      científica desmedida e as consequências de brincar de Deus.
    ru: Относится к искусственному существу, созданному Виктором Франкенштейном в романе Мэри Шелли 1818
      года. Часто ошибочно называемое 'Франкенштейн', это создание символизирует опасности безудержных
      научных амбиций и последствия игры в Бога.
    ja: 1818年のメアリー・シェリーの小説でヴィクター・フランкенシュタインによって創造された人工生命体を指す。しばしば誤って「フランкенシュタイン」と呼ばれるこの生物は、抑制されない科学的野心の危険性と、神の役割を果たすことの結果を象徴する。
    zh: 指的是玛丽·雪莱1818年小说中维克多·弗兰肯斯坦创造的人工生物。常被误称为“弗兰肯斯坦”，这个生物象征着无节制的科学野心的危险以及扮演上帝的后果。
    ar: يشير إلى الكائن الاصطناعي الذي خلقه فيكتور فرانكنشتاين في رواية ماري شيلي لعام 1818. غالبًا ما
