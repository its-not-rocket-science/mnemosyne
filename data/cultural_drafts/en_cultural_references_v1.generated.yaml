  - Hieronymus Bosch's hellscape
  short_explanation: Refers to the nightmarish, surreal landscapes painted by Hieronymus Bosch, particularly
    his triptych 'The Garden of Earthly Delights,' symbolizing moral corruption and divine punishment.
    The phrase evokes chaotic, grotesque imagery.
  i18n_explanations:
    en: Refers to the nightmarish, surreal landscapes painted by Hieronymus Bosch, particularly his triptych
      'The Garden of Earthly Delights,' symbolizing moral corruption and divine punishment. The phrase
      evokes chaotic, grotesque imagery.
    es: Se refiere a los paisajes oníricos y surrealistas pintados por Hieronymus Bosch, especialmente
      su tríptico 'El Jardín de las Delicias,' que simboliza la corrupción moral y el castigo divino.
      La expresión evoca imágenes caóticas y grotescas.
    fr: Fait référence aux paysages cauchemardesques et surréalistes peints par Hieronymus Bosch, notamment
      son triptyque 'Le Jardin des délices,' symbolisant la corruption morale et le châtiment divin. L'expression
      évoque des images chaotiques et grotesques.
    de: Bezieht sich auf die albtraumhaften, surrealen Landschaften, die Hieronymus Bosch malte, insbesondere
      sein Triptychon 'Der Garten der Lüste,' das moralische Verderbtheit und göttliche Strafe symbolisiert.
      Der Begriff evoziert chaotische, groteske Bilder.
    it: Si riferisce ai paesaggi onirici e surrealisti dipinti da Hieronymus Bosch, in particolare il
      suo trittico 'Il Giardino delle Delizie,' che simboleggia la corruzione morale e il castigo divino.
      L'espressione evoca immagini caotiche e grottesche.
    pt: Refere-se às paisagens oníricas e surrealistas pintadas por Hieronymus Bosch, especialmente seu
      tríptico 'O Jardim das Delícias,' que simboliza a corrupção moral e o castigo divino. A expressão
      evoca imagens caóticas e grotescas.
    ru: Описывает кошмарные, сюрреалистические пейзажи, написанные Иеронимом Босхом, особенно его триптих
      'Сад земных наслаждений,' символизирующий моральное разложение и божественное наказание. Фраза вызывает
      в воображении хаотичные, гротескные образы.
    ja: ヒエロニムス・ボスが描いた悪夢のようなシュールな風景、特に「快楽の園」の三連祭壇画を指し、道徳的腐敗と神の罰を象徴する。この表現は混沌としたグロテスクなイメージを喚起する。
    zh: 指代希罗尼穆斯·博斯绘制的梦魇般的超现实景观，尤以其三联画《人间乐园》为代表，象征道德腐化与神罚。此短语唤起混乱而荒诞的意象。
    ar: يشير إلى المناظر الكابوسية والسريالية التي رسمها هيرونيموس بوس، ولا سيما لوحته الثلاثية "حديقة
      المتعة الأرضية"، التي ترمز إلى الفساد الأخلاقي والعقاب الإلهي. يثير المصطلح صورًا فوضوية ومروعة.
    he: מתייחס לנופים הסוריאליסטיים והסיוטיים שצייר הירונימוס בוש, ובמיוחד לטריפטיך שלו 'גן התענוגות הארציים',
