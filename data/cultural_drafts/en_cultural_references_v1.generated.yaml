- id: en_classical_or_scriptural_allusion_an_eye_for_an_eye_and_a_tooth_for_a_tooth_9b6fdb7a
  language: en
  canonical_reference: An eye for an eye, and a tooth for a tooth
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
