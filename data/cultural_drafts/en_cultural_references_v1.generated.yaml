- id: en_cultural_reference_the_somme_adad4cb5
  language: en
  canonical_reference: The Somme
  reference_type: cultural_reference
  surface_patterns:
  - the Somme
  - Battle of the Somme
  - the Somme Offensive
  - Somme
  short_explanation: A major World War I battle (1916) fought by British and French forces against Germany
    near the Somme River in France. It became a symbol of the horrors of trench warfare and massive casualties.
  i18n_explanations:
    en: A major World War I battle (1916) fought by British and French forces against Germany near the
      Somme River in France. It became a symbol of the horrors of trench warfare and massive casualties.
    es: Una batalla clave de la Primera Guerra Mundial (1916) entre fuerzas británicas y francesas contra
      Alemania cerca del río Somme en Francia. Se convirtió en un símbolo de los horrores de la guerra
      de trincheras y las enormes bajas.
    fr: Une bataille majeure de la Première Guerre mondiale (1916) opposant les forces britanniques et
      françaises à l'Allemagne près de la rivière Somme en France. Elle est devenue un symbole de l'horreur
      de la guerre de tranchées et des lourdes pertes.
    de: Eine bedeutende Schlacht des Ersten Weltkriegs (1916), in der britische und französische Truppen
      gegen Deutschland nahe der Somme in Frankreich kämpften. Sie wurde zum Symbol für die Schrecken
      des Stellungskriegs und die hohen Verluste.
    it: Una battaglia fondamentale della Prima Guerra Mondiale (1916) tra forze britanniche e francesi
      contro la Germania vicino al fiume Somme in Francia. Divenne simbolo dell'orrore della guerra di
      trincea e delle enormi perdite.
    pt: Uma batalha importante da Primeira Guerra Mundial (1916) entre forças britânicas e francesas contra
      a Alemanha perto do rio Somme na França. Tornou-se um símbolo dos horrores da guerra de trincheiras
      e das enormes baixas.
    ru: Крупное сражение Первой мировой войны (1916), в котором британские и французские войска сражались
      против Германии у реки Сомма во Франции. Стало символом ужасов позиционной войны и огромных потерь.
    ja: 第一次世界大戦中の主要な戦い（1916年）で、イギリス・フランス軍がフランスのソンム川近くでドイツと交戦。塹壕戦の悲惨さと膨大な犠牲の象徴となった。
    zh: 第一次世界大战中的一场重要战役（1916年），英法联军在法国索姆河附近对阵德国。成为塹壕战恐怖与巨大伤亡的象征。
    ar: معركة رئيسية في الحرب العالمية الأولى (1916) خاضتها القوات البريطانية والفرنسية ضد ألمانيا بالقرب
      من نهر السوم في فرنسا. أصبحت رمزا لفظائع حرب الخنادق والخسائر البشرية الهائلة.
    he: קרב מרכזי במלחמת העולם הראשונה (1916) בו לחמו כוחות בריטניה וצרפת נגד גרמניה ליד נהר הסום בצרפת.
      הפך לסמל זוועות מלחמת החפירות והאבדות הכבדות.
