    ja: 北欧神話のいたずら神ロキを指す。その狡猾さ、欺瞞、混沌を引き起こす能力で知られる。この表現は、意図しない結果を招くいたずらや操作的な行動を強調する。
    zh: 指代北欧神话中的骗子神洛基，以其狡猾、欺骗和制造混乱的能力闻名。此短语强调恶作剧或操纵行为导致意想不到的后果。
    ar: يشير إلى لوكي، إله الخداع في الميثولوجيا الإسكندنافية، المعروف بمكره وخداعه وقدرته على إثارة الفوضى.
