  - Jefferson’s acquisition of Louisiana
  short_explanation: The 1803 acquisition of approximately 828,000 square miles of territory from France
    by President Thomas Jefferson, doubling the size of the United States. Symbolizes American expansionism
    and diplomatic negotiation.
  i18n_explanations:
    en: The 1803 acquisition of approximately 828,000 square miles of territory from France by President
      Thomas Jefferson, doubling the size of the United States. Symbolizes American expansionism and diplomatic
      negotiation.
    es: La adquisición en 1803 de aproximadamente 2.14 millones de km² de territorio a Francia por el
      presidente Thomas Jefferson, duplicando el tamaño de Estados Unidos. Simboliza el expansionismo
      estadounidense y la negociación diplomática.
    fr: L'acquisition en 1803 d'environ 2,14 millions de km² de territoire à la France par le président
      Thomas Jefferson, doublant la taille des États-Unis. Symbolise l'expansionnisme américain et la
      négociation diplomatique.
    de: Der 1803 von Präsident Thomas Jefferson getätigte Kauf von etwa 2,14 Millionen km² Land von Frankreich,
      wodurch sich die Größe der USA verdoppelte. Symbolisiert den amerikanischen Expansionismus und diplomatische
      Verhandlungen.
    it: L'acquisizione nel 1803 di circa 2,14 milioni di km² di territorio dalla Francia da parte del
      presidente Thomas Jefferson, raddoppiando le dimensioni degli Stati Uniti. Simboleggia l'espansionismo
      americano e la negoziazione diplomatica.
    pt: A aquisição em 1803 de aproximadamente 2,14 milhões de km² de território da França pelo presidente
      Thomas Jefferson, dobrando o tamanho dos Estados Unidos. Simboliza o expansionismo americano e a
      negociação diplomática.
    ru: Приобретение в 1803 году президентом Томасом Джефферсоном у Франции территории площадью около
      2,14 миллиона км², что удвоило размер США. Символизирует американский экспансионизм и дипломатические
      переговоры.
    ja: 1803年にトーマス・ジェファーソン大統領がフランスから約214万平方キロメートルの領土を購入し、アメリカ合衆国の面積を倍増させた。アメリカの拡張主義と外交交渉の象徴。
    zh: 1803年，托马斯·杰斐逊总统从法国购得约214万平方公里领土，使美国面积翻倍。象征着美国的扩张主义和外交谈判。
    ar: الشراء الذي قام به الرئيس توماس جيفرسون عام 1803 لمساحة تقدر بنحو 2.14 مليون كيلومتر مربع من الأراضي
