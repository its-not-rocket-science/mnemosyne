- id: en_cultural_reference_a_hokusai_great_wave_69328044
  language: en
  canonical_reference: A Hokusai Great Wave
  reference_type: cultural_reference
  surface_patterns:
  - a Hokusai Great Wave
  - Hokusai's Great Wave
  - the Great Wave off Kanagawa by Hokusai
  - a wave like Hokusai's Great Wave
  short_explanation: Refers to Katsushika Hokusai's 1831 woodblock print 'The Great Wave off Kanagawa',
    an iconic image of Japanese art symbolizing the power of nature and the sublime. Often used to evoke
    themes of overwhelming force or artistic mastery.
  i18n_explanations:
    en: Refers to Katsushika Hokusai's 1831 woodblock print 'The Great Wave off Kanagawa', an iconic image
      of Japanese art symbolizing the power of nature and the sublime. Often used to evoke themes of overwhelming
      force or artistic mastery.
    es: Se refiere a la estampa xilográfica de Katsushika Hokusai 'La gran ola de Kanagawa' (1831), imagen
      icónica del arte japonés que simboliza el poder de la naturaleza y lo sublime. Se usa para evocar
      temas de fuerza abrumadora o maestría artística.
    fr: Fait référence à l'estampe sur bois de Katsushika Hokusai 'La Grande Vague de Kanagawa' (1831),
      image emblématique de l'art japonais symbolisant la puissance de la nature et le sublime. Souvent
      utilisée pour évoquer des thèmes de force écrasante ou de maîtrise artistique.
    de: Bezieht sich auf Katsushika Hokusais Holzschnitt 'Die große Welle vor Kanagawa' (1831), ein ikonisches
      Bild der japanischen Kunst, das die Macht der Natur und das Erhabene symbolisiert. Wird oft verwendet,
      um Themen überwältigender Kraft oder künstlerischer Meisterschaft zu beschwören.
    it: Si riferisce alla stampa xilografica di Katsushika Hokusai 'La grande onda di Kanagawa' (1831),
      immagine iconica dell'arte giapponese che simboleggia la potenza della natura e il sublime. Spesso
      usata per evocare temi di forza travolgente o maestria artistica.
    pt: Refere-se à xilogravura de Katsushika Hokusai 'A Grande Onda de Kanagawa' (1831), imagem icônica
      da arte japonesa que simboliza o poder da natureza e o sublime. Usada para evocar temas de força
      avassaladora ou maestria artística.
    ru: Относится к гравюре на дереве Кацусики Хокусая 'Большая волна в Канагаве' (1831), знаковому образу
      японского искусства, символизирующему могущество природы и возвышенное. Часто используется для передачи
      тем подавляющей силы или художественного мастерства.
    ja: 葛飾北斎の版画「神奈川沖浪裏」（1831年）を指す。日本美術の象徴的画で、自然の力と崇高さを表す。圧倒的な力や芸術的な卓越性を喚起する際に用いられる。
    zh: 指代葛饰北斋1831年的版画《神奈川冲浪里》（《巨浪》），日本艺术的标志性形象，象征自然的力量与崇高。常用于引发压倒性力量或艺术精湛的主题。
    ar: يشير إلى الطبعة الخشبية لكاتسوشيكا هوكوساي "الموجة العظيمة قبالة كاناغاوا" (1831)، صورة أيقونية
      للفن الياباني ترمز إلى قوة الطبيعة والعظمة. غالبًا ما تستخدم لاستحضار مواضيع القوة الساحقة أو الإتقان
      الفني.
    he: מתייחס להדפסת העץ של קצושיקה הוקוסאי 'הגל הגדול בקנגאווה' (1831), דימוי אייקוני באמנות היפנית
      המסמל את עוצמת הטבע והנשגב. לעיתים מצוטט כדי לעורר נושאים של כוח מוחץ או שליטה אמנותית.
