- id: en_proverb_tradition_haste_makes_waste_68bab7c7
  language: en
  canonical_reference: Haste makes waste
  reference_type: proverb_tradition
  surface_patterns:
  - Haste makes waste
  - More haste, less speed
  - Haste makes waste, but delay saves the day
  short_explanation: This proverb advises against rushing, as careless speed can lead to mistakes or poor
    outcomes. It emphasizes the value of patience and thoroughness in achieving better results.
  i18n_explanations:
    en: This proverb advises against rushing, as careless speed can lead to mistakes or poor outcomes.
      It emphasizes the value of patience and thoroughness in achieving better results.
    es: Este refrán advierte contra la prisa, pues la velocidad descuidada puede llevar a errores o malos
      resultados. Destaca el valor de la paciencia y la meticulosidad para lograr mejores frutos.
    fr: Ce proverbe met en garde contre la précipitation, car la hâte négligente peut entraîner des erreurs
      ou de mauvais résultats. Il souligne l'importance de la patience et de la rigueur pour obtenir de
      meilleurs résultats.
    de: Dieses Sprichwort warnt davor, zu hetzen, denn unüberlegtes Tempo kann zu Fehlern oder schlechten
      Ergebnissen führen. Es betont den Wert von Geduld und Gründlichkeit für bessere Ergebnisse.
    it: Questo proverbio sconsiglia la fretta, poiché la velocità affrettata può portare a errori o risultati
      scadenti. Sottolinea l'importanza della pazienza e della precisione per ottenere risultati migliori.
    pt: Este provérbio adverte contra a pressa, pois a velocidade descuidada pode levar a erros ou maus
      resultados. Enfatiza o valor da paciência e do cuidado para alcançar melhores resultados.
    ru: Эта пословица предостерегает от поспешности, так как небрежная скорость может привести к ошибкам
      или плохим результатам. Она подчеркивает ценность терпения и тщательности для достижения лучших
      результатов.
    ja: このことわざは、急ぐことは慎むべきだと教えます。不注意な速さは間違いや悪い結果を招くからです。より良い結果を得るためには忍耐と丁寧さが大切だと強調しています。
    zh: 这句谚语告诫不要急躁，因为草率的速度会导致错误或糟糕的结果。它强调耐心和细致的价值，以取得更好的成果。
    ar: هذا المثل يحذر من التسرع، إذ أن السرعة المتهورة قد تؤدي إلى أخطاء أو نتائج سيئة. وهو يبرز أهمية
