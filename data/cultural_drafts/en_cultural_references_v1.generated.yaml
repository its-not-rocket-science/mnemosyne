      Олицетворяет упорство и профессионализм, часто используется метафорически в повседневной жизни.
    ja: 困難にもかかわらず、公演やイベントを続けなければならないという意味の表現。忍耐とプロ意識を反映し、日常生活でも比喩的に使われる。
