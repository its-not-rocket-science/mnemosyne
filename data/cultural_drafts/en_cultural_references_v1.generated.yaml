- id: en_cultural_reference_a_botticelli_venus_84d1d8d7
  language: en
  canonical_reference: A Botticelli Venus
  reference_type: cultural_reference
  surface_patterns:
  - a Botticelli Venus
  - Botticelli's Venus
  - Venus by Botticelli
  short_explanation: Refers to Sandro Botticelli's iconic painting 'The Birth of Venus' (c. 1485), symbolizing
    classical beauty, Renaissance art, and the mythological goddess of love emerging from the sea.
  i18n_explanations:
    en: Refers to Sandro Botticelli's iconic painting 'The Birth of Venus' (c. 1485), symbolizing classical
      beauty, Renaissance art, and the mythological goddess of love emerging from the sea.
    es: Se refiere a la icónica pintura de Sandro Botticelli 'El nacimiento de Venus' (c. 1485), que simboliza
      la belleza clásica, el arte renacentista y la diosa mitológica del amor emergiendo del mar.
    fr: Fait référence au tableau emblématique de Sandro Botticelli 'La Naissance de Vénus' (vers 1485),
      symbolisant la beauté classique, l'art de la Renaissance et la déesse mythologique de l'amour émergeant
      de la mer.
    de: Bezieht sich auf das ikonische Gemälde 'Die Geburt der Venus' (ca. 1485) von Sandro Botticelli,
      das klassische Schönheit, Renaissance-Kunst und die mythologische Liebesgöttin zeigt, die aus dem
      Meer auftaucht.
    it: Si riferisce al celebre dipinto di Sandro Botticelli 'La nascita di Venere' (ca. 1485), che simboleggia
      la bellezza classica, l'arte rinascimentale e la dea mitologica dell'amore che emerge dal mare.
    pt: Refere-se à icônica pintura de Sandro Botticelli 'O Nascimento de Vênus' (c. 1485), que simboliza
      a beleza clássica, a arte renascentista e a deusa mitológica do amor emergindo do mar.
    ru: Относится к знаковой картине Сандро Боттичелли 'Рождение Венеры' (ок. 1485), символизирующей классическую
      красоту, искусство эпохи Возрождения и мифологическую богиню любви, появляющуюся из моря.
    ja: サンドロ・ボッティチェッリの代表作「ヴィーナスの誕生」（1485年頃）を指し、古典的な美、ルネサンス美術、海から現れる愛の女神を象徴している。
    zh: 指的是桑德罗·波提切利的标志性画作《维纳斯的诞生》（约1485年），象征着古典美、文艺复兴艺术以及从海中诞生的爱神。
    ar: يشير إلى اللوحة الأيقونية لساندرو بوتيتشيلي 'مولد فينوس' (حوالي 1485)، التي ترمز إلى الجمال الكلاسيكي،
      وفن عصر النهضة، وإلهة الحب الأسطورية وهي تخرج من البحر.
    he: מתייחס לציור האיקוני של סנדרו בוטיצ'לי 'הולדת ונוס' (בערך 1485), המסמל יופי קלאסי, אמנות הרנסאנס
      ואלת האהבה המיתולוגית העולה מן הים.
