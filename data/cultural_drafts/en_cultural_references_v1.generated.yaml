  short_explanation: Refers to the violent, slang-speaking youth gang in Anthony Burgess's dystopian novel
    'A Clockwork Orange'. The term 'droogs' (from Russian 'друг' meaning 'friend') symbolizes youth rebellion
    and moral decay in a futuristic society.
  i18n_explanations:
    en: Refers to the violent, slang-speaking youth gang in Anthony Burgess's dystopian novel 'A Clockwork
      Orange'. The term 'droogs' (from Russian 'друг' meaning 'friend') symbolizes youth rebellion and
      moral decay in a futuristic society.
    es: Se refiere a la pandilla juvenil violenta y de jerga en la novela distópica de Anthony Burgess
      'La naranja mecánica'. El término 'droogs' (del ruso 'друг', 'amigo') simboliza la rebelión juvenil
      y la decadencia moral en una sociedad futurista.
    fr: Fait référence à la bande de jeunes violents et argotiques dans le roman dystopique d'Anthony
      Burgess 'Orange mécanique'. Le terme 'droogs' (du russe 'друг', 'ami') symbolise la rébellion juvénile
      et la décadence morale dans une société futuriste.
    de: Bezieht sich auf die gewalttätige, slangsprechende Jugendbande in Anthony Burgess' dystopischem
      Roman 'A Clockwork Orange'. Der Begriff 'droogs' (vom russischen 'друг', 'Freund') symbolisiert
      Jugendrebellion und moralischen Verfall in einer futuristischen Gesellschaft.
    it: Si riferisce alla banda giovanile violenta e gergale nel romanzo distopico di Anthony Burgess
      'Arancia meccanica'. Il termine 'droogs' (dal russo 'друг', 'amico') simboleggia la ribellione giovanile
      e la decadenza morale in una società futuristica.
    pt: Refere-se à gangue juvenil violenta e de gíria no romance distópico de Anthony Burgess 'Laranja
      Mecânica'. O termo 'droogs' (do russo 'друг', 'amigo') simboliza a rebelião juvenil e a decadência
      moral numa sociedade futurista.
    ru: Относится к жестокой подростковой банде, говорящей на сленге, в антиутопическом романе Энтони
      Бёрджесса 'Заводной апельсин'. Термин 'droogs' (от русского 'друг', 'друг') символизирует молодёжный
      бунт и моральный упадок в футуристическом обществе.
    ja: アンソニー・バージェスのディストピア小説「時計じかけのオレンジ」に登場する暴力的でスラングを使う若者のギャングを指す。'droogs'（ロシア語の'друг'＝「友達」に由来）は、未来社会における若者の反抗と道徳の崩壊を象徴している。
    zh: 指安东尼·伯吉斯反乌托邦小说《发条橙》中暴力且使用俚语的青年帮派。术语'droogs'（源自俄语'друг'，意为'朋友'）象征着未来社会中的青年叛逆与道德沦丧。
    ar: يشير إلى عصابة شبابية عنيفة تتحدث بلغة عامية في رواية أنتوني بورغيس الديستوبية "برتقالة آلية".
      مصطلح "droogs" (من الروسية "друг" بمعنى "صديق") يرمز إلى تمرد الشباب وانهيار الأخلاق في مجتمع مستقبلي.
    he: מתייחס לכנופיית נוער אלימה המדברת בסלנג ברומן הדיסטופי של אנתוני ברג'ס 'תפוז מכני'. המונח 'droogs'
