  - every dog will have its day
  short_explanation: A proverb meaning that everyone will have their chance or moment of success, no matter
    how insignificant they may seem.
  i18n_explanations:
    en: A proverb meaning that everyone will have their chance or moment of success, no matter how insignificant
      they may seem.
    es: Un refrán que significa que todos tendrán su oportunidad o momento de éxito, por insignificantes
      que parezcan.
    fr: Un proverbe signifiant que chacun aura sa chance ou son moment de réussite, aussi insignifiant
      qu'il puisse paraître.
    de: Ein Sprichwort, das bedeutet, dass jeder seine Chance oder seinen Erfolg haben wird, egal wie
      unbedeutend er erscheinen mag.
    it: Un proverbio che significa che tutti avranno la loro occasione o momento di successo, per quanto
      possano sembrare insignificanti.
    pt: Um provérbio que significa que todos terão sua chance ou momento de sucesso, por mais insignificantes
      que pareçam.
    ru: Поговорка, означающая, что у каждого будет свой шанс или момент успеха, каким бы незначительным
      он ни казался.
    ja: 誰にでも成功のチャンスや輝く時が来るという諺。どんなに無名に見えても関係ない。
