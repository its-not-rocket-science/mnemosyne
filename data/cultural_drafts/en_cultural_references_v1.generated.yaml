- id: en_classical_or_scriptural_allusion_colossus_of_rhodes_ef92fecf
  language: en
  canonical_reference: Colossus of Rhodes
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Colossus of Rhodes
  - the Colossus
  - Rhodes Colossus
  short_explanation: Refers to the giant statue of the Greek sun-god Helios that once stood in the harbor
    of Rhodes. Symbolizes grandeur and ambition, often used metaphorically for something massive or impressive.
  i18n_explanations:
    en: Refers to the giant statue of the Greek sun-god Helios that once stood in the harbor of Rhodes.
      Symbolizes grandeur and ambition, often used metaphorically for something massive or impressive.
    es: Se refiere a la gigantesca estatua del dios griego del sol Helios que alguna vez estuvo en el
      puerto de Rodas. Simboliza grandeza y ambición, y se usa metafóricamente para algo masivo o impresionante.
    fr: Fait référence à la statue colossale du dieu grec du soleil Hélios qui se dressait autrefois dans
      le port de Rhodes. Symbolise la grandeur et l'ambition, souvent utilisée métaphoriquement pour quelque
      chose de massif ou impressionnant.
    de: Bezieht sich auf die riesige Statue des griechischen Sonnengottes Helios, die einst im Hafen von
      Rhodos stand. Symbolisiert Größe und Ehrgeiz und wird oft metaphorisch für etwas Massives oder Eindrucksvolles
      verwendet.
    it: Si riferisce alla gigantesca statua del dio greco del sole Helios che un tempo si ergeva nel porto
      di Rodi. Simboleggia grandezza e ambizione, spesso usata metaforicamente per qualcosa di maestoso
      o impressionante.
    pt: Refere-se à estátua gigante do deus grego do sol, Helios, que outrora esteve no porto de Rodes.
      Simboliza grandiosidade e ambição, frequentemente usada metaforicamente para algo massivo ou impressionante.
    ru: Относится к гигантской статуе греческого бога солнца Гелиоса, некогда стоявшей в гавани Родоса.
      Символизирует величие и амбициозность, часто используется метафорически для чего-то грандиозного
      или впечатляющего.
    ja: かつてロードス島の港に立っていた、ギリシャの太陽神ヘリオスの巨大な彫像を指す。壮大さと野心を象徴し、しばしば比喩的に巨大で印象的なものを表すのに用いられる。
    zh: 指古希腊太阳神赫利俄斯的巨型雕像，曾矗立于罗德岛港口。象征宏伟与抱负，常用于比喻庞大或令人印象深刻的事物。
    ar: يشير إلى التمثال الضخم للإله اليوناني هيليوس، إله الشمس، الذي كان يقف في ميناء رودس. يرمز إلى
      العظمة والطموح، وغالبًا ما يستخدم مجازًا لوصف شيء ضخم أو مثير للإعجاب.
    he: מתייחס לפסל הענק של אל השמש היווני הליוס שעמד פעם בנמל רודוס. מסמל גדולה ושאפתנות, ומשמש לעיתים
      קרובות באופן מטפורי למשהו עצום או מרשים.
