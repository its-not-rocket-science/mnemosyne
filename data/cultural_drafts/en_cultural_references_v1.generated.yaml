- id: en_cultural_reference_the_lolita_complex_ebe7e461
  language: en
  canonical_reference: The Lolita complex
  reference_type: cultural_reference
  surface_patterns:
  - Lolita complex
  - Lolita syndrome
  - Lolita fantasy
  short_explanation: A psychological term describing an adult's sexual attraction to a young girl, often
    prepubescent. The term derives from Nabokov's *Lolita* but is not explicitly used in the novel.
  i18n_explanations:
    en: A psychological term describing an adult's sexual attraction to a young girl, often prepubescent.
      The term derives from Nabokov's *Lolita* but is not explicitly used in the novel.
    es: Término psicológico que describe la atracción sexual de un adulto hacia una niña, a menudo prepúber.
      El término proviene de *Lolita* de Nabokov, aunque no se usa explícitamente en la novela.
    fr: Terme psychologique désignant l'attirance sexuelle d'un adulte pour une jeune fille, souvent prépubère.
      Le terme vient de *Lolita* de Nabokov, mais n'est pas utilisé explicitement dans le roman.
    de: Ein psychologischer Begriff für die sexuelle Anziehung eines Erwachsenen zu einem jungen Mädchen,
      oft vor der Pubertät. Der Begriff stammt aus Nabokovs *Lolita*, wird im Roman aber nicht explizit
      verwendet.
    it: Termine psicologico che descrive l'attrazione sessuale di un adulto verso una ragazza giovane,
      spesso prepubere. Il termine deriva da *Lolita* di Nabokov, ma non è usato esplicitamente nel romanzo.
    pt: Termo psicológico que descreve a atração sexual de um adulto por uma menina jovem, muitas vezes
      pré-púbere. O termo deriva de *Lolita* de Nabokov, mas não é usado explicitamente no romance.
    ru: Психологический термин, описывающий сексуальное влечение взрослого к юной девушке, часто препубертатного
      возраста. Термин происходит от «Лолиты» Набокова, но в романе не используется явно.
    ja: 大人の男性が少女（しばしば思春期前）に対して抱く性的魅力を表す心理学用語。ナボコフの*ロリータ*に由来するが、小説内では明確に使われていない。
    zh: 心理学术语，描述成年人对年轻女孩（通常是青春期前）的性吸引。该术语源于纳博科夫的《洛丽塔》，但在小说中并未明确使用。
    ar: مصطلح نفسي يصف جاذبية جنسية لشخص بالغ تجاه فتاة صغيرة، غالبًا قبل سن البلوغ. المصطلح مشتق من *لوليتا*
