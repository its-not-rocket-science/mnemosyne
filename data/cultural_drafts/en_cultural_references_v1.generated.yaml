- id: en_cultural_reference_the_alamo_ecbae059
  language: en
  canonical_reference: The Alamo
  reference_type: cultural_reference
  surface_patterns:
  - the Alamo
  - remember the Alamo
  - Alamo defenders
  - fall of the Alamo
  short_explanation: The Alamo refers to a pivotal battle in the Texas Revolution (1836), where a small
    group of Texan defenders were defeated by Mexican forces. It symbolizes courage in the face of overwhelming
    odds and is a rallying cry in American history.
  i18n_explanations:
    en: The Alamo refers to a pivotal battle in the Texas Revolution (1836), where a small group of Texan
      defenders were defeated by Mexican forces. It symbolizes courage in the face of overwhelming odds
      and is a rallying cry in American history.
    es: El Álamo se refiere a una batalla clave en la Revolución de Texas (1836), donde un pequeño grupo
      de defensores texanos fue derrotado por las fuerzas mexicanas. Simboliza el coraje ante probabilidades
      abrumadoras y es un grito de guerra en la historia estadounidense.
    fr: L'Alamo fait référence à une bataille décisive de la Révolution texane (1836), où un petit groupe
      de défenseurs texans fut vaincu par les forces mexicaines. Elle symbolise le courage face à des
      odds écrasants et est un cri de ralliement dans l'histoire américaine.
    de: Die Schlacht von Alamo bezieht sich auf eine entscheidende Schlacht der Texanischen Revolution
      (1836), in der eine kleine Gruppe texanischer Verteidiger von mexikanischen Truppen besiegt wurde.
      Sie steht für Mut angesichts überwältigender Übermacht und ist ein Schlachtruf der amerikanischen
      Geschichte.
    it: L'Alamo si riferisce a una battaglia cruciale della Rivoluzione del Texas (1836), in cui un piccolo
      gruppo di difensori texani fu sconfitto dalle forze messicane. Simboleggia il coraggio di fronte
      a probabilità schiaccianti ed è un grido di battaglia nella storia americana.
    pt: O Álamo refere-se a uma batalha crucial na Revolução do Texas (1836), onde um pequeno grupo de
      defensores texanos foi derrotado pelas forças mexicanas. Simboliza a coragem diante de probabilidades
      esmagadoras e é um grito de guerra na história americana.
    ru: Аламо — это ключевая битва Техасской революции (1836), в которой небольшая группа техасских защитников
      была разбита мексиканскими войсками. Она символизирует мужество перед лицом превосходящих сил и
      является боевым кличем в американской истории.
    ja: アラモ砦はテキサス革命（1836年）の重要な戦いを指し、少数のテキサス防衛隊がメキシコ軍に敗れました。それは圧倒的な odds に立ち向かう勇気を象徴し、アメリカ史における戦いの叫びです。
    zh: 阿拉莫战役指的是德克萨斯革命（1836年）中的关键战役，一小群德克萨斯守军被墨西哥军队击败。它象征着面对压倒性困难时的勇气，并成为美国历史上的战斗口号。
    ar: تشير الألامو إلى معركة حاسمة في ثورة تكساس (1836)، حيث هُزم مجموعة صغيرة من المدافعين التكسانيين
      على يد القوات المكسيكية. إنها ترمز إلى الشجاعة في مواجهة odds ساحقة وتعتبر نداء حشد في التاريخ الأمريكي.
    he: אלמו מתייחס לקרב מכריע במהפכת טקסס (1836), בו קבוצת מגינים טקסנים קטנה הובסה על ידי כוחות מקסיקניים.
      הוא מסמל גבורה מול הסתברויות מכריעות ומהווה קריאה למלחמה בהיסטוריה האמריקאית.
