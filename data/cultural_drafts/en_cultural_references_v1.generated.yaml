- id: en_cultural_reference_baker_s_dozen_e11bf264
  language: en
  canonical_reference: Baker's dozen
  reference_type: cultural_reference
  surface_patterns:
  - baker's dozen
  - a baker's dozen
  - bakers dozen
  short_explanation: Refers to thirteen items instead of twelve, historically to avoid penalties for shortchanging
    customers. The practice originated from medieval bakers who added an extra loaf to prevent accusations
    of fraud.
  i18n_explanations:
    en: Refers to thirteen items instead of twelve, historically to avoid penalties for shortchanging
      customers. The practice originated from medieval bakers who added an extra loaf to prevent accusations
      of fraud.
    es: Se refiere a trece artículos en lugar de doce, históricamente para evitar sanciones por engañar
      a los clientes. La práctica surgió de panaderos medievales que añadían un pan extra para evitar
      acusaciones de fraude.
    fr: Fait référence à treize articles au lieu de douze, historiquement pour éviter des pénalités pour
      tromperie envers les clients. La pratique vient de boulangers médiévaux qui ajoutaient une miche
      supplémentaire pour éviter des accusations de fraude.
    de: Bezeichnet dreizehn statt zwölf Stücke, historisch um Strafen für Kundenbetrug zu vermeiden. Die
      Praxis stammt von mittelalterlichen Bäckern, die ein zusätzliches Brot hinzufügten, um Betrugsvorwürfe
      zu verhindern.
    it: Si riferisce a tredici articoli invece di dodici, storicamente per evitare sanzioni per aver ingannato
      i clienti. La pratica nasce da panettieri medievali che aggiungevano un pane extra per prevenire
      accuse di frode.
    pt: Refere-se a treze itens em vez de doze, historicamente para evitar penalidades por enganar clientes.
      A prática surgiu de padeiros medievais que adicionavam um pão extra para evitar acusações de fraude.
    ru: Означает тринадцать предметов вместо двенадцати, исторически для избежания наказания за обвес
      клиентов. Практика возникла у средневековых пекарей, которые добавляли лишнюю буханку, чтобы избежать
      обвинений в мошенничестве.
    ja: 12個ではなく13個を指す言葉で、歴史的には客をごまかす罰を避けるため。中世のパン職人が不正の疑いを避けるために余分にパンを入れたことに由来する。
    zh: 指十三件物品而非十二件，历史上是为了避免因克扣顾客而受罚。这种做法源于中世纪面包师为防止被指控欺诈而在每打中多送一个面包。
    ar: يشير إلى ثلاثة عشر عنصرًا بدلاً من اثني عشر، تاريخيًا لتجنب عقوبات التغرير بالزبائن. الممارسة
      نشأت من خبازين في العصور الوسطى الذين كانوا يضيفون رغيفًا إضافيًا لمنع اتهامات بالغش.
    he: מתייחס לשלושה עשר פריטים במקום שנים עשר, היסטורית כדי להימנע מעונשים על רמאות לקוחות. המנהג מקורו
      אצל אופים מימי הביניים שסיפקו כיכר נוספת כדי למנוע האשמות בהונאה.
