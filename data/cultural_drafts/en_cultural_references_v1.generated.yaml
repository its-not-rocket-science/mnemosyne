      отражает идею грубого, необработанного камня, содержащего драгоценный камень.
    ja: まだ開花していない才能や可能性を秘めた人や物。この表現は、価値ある宝石を含む粗削りで磨かれていない石というイメージに由来する。
    zh: 指一个人或事物具有潜力或才能，但尚未发展或完善。此短语源于未经雕琢的石头中蕴含宝贵钻石的意象。
