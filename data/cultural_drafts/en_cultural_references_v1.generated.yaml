    en: A phrase symbolizing totalitarian surveillance and government control, originating from George
      Orwell's dystopian novel where the omnipresent authority monitors citizens relentlessly.
    es: Frase que simboliza la vigilancia totalitaria y el control gubernamental, originada en la novela
