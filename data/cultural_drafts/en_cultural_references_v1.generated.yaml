- id: en_literary_reference_a_pound_of_flesh_932990aa
  language: en
  canonical_reference: A pound of flesh
  reference_type: literary_reference
  surface_patterns:
  - a pound of flesh
  - pound of flesh
  - the pound of flesh
  short_explanation: Refers to Shylock's demand for a pound of Antonio's flesh in Shakespeare's 'The Merchant
    of Venice' as collateral for a loan. Symbolizes a ruthless, legalistic claim that disregards mercy
    or humanity.
  i18n_explanations:
    en: Refers to Shylock's demand for a pound of Antonio's flesh in Shakespeare's 'The Merchant of Venice'
      as collateral for a loan. Symbolizes a ruthless, legalistic claim that disregards mercy or humanity.
    es: Se refiere a la exigencia de Shylock de una libra de la carne de Antonio en 'El mercader de Venecia'
      de Shakespeare como garantía de un préstamo. Simboliza una reclamación despiadada y legalista que
      ignora la misericordia o la humanidad.
    fr: Fait référence à la demande de Shylock d'une livre de chair d'Antonio dans 'Le Marchand de Venise'
      de Shakespeare en garantie d'un prêt. Symbolise une revendication impitoyable et légaliste qui ignore
      la pitié ou l'humanité.
    de: Bezieht sich auf Shylocks Forderung nach einem Pfund von Antonios Fleisch in Shakespeares 'Der
      Kaufmann von Venedig' als Sicherheit für ein Darlehen. Symbolisiert einen rücksichtslosen, legalistischen
      Anspruch, der Barmherzigkeit oder Menschlichkeit ignoriert.
    it: Si riferisce alla richiesta di Shylock di una libbra di carne di Antonio ne 'Il mercante di Venezia'
      di Shakespeare come garanzia per un prestito. Simboleggia una pretesa spietata e legalistica che
      ignora la misericordia o l'umanità.
    pt: Refere-se à exigência de Shylock por uma libra da carne de Antônio em 'O Mercador de Veneza' de
      Shakespeare como garantia de um empréstimo. Simboliza uma reivindicação impiedosa e legalista que
      desconsidera a misericórdia ou a humanidade.
    ru: Относится к требованию Шейлока отрубить фунт плоти Антонио в пьесе Шекспира 'Венецианский купец'
      в качестве залога за долг. Символизирует безжалостное, буквоедское требование, пренебрегающее милосердием
      или человечностью.
    ja: シェイクスピアの「ヴェニスの商人」で、シャイロックがアントニオへの融資の担保として要求した「一ポンドの肉」を指す。これは、慈悲や人間性を無視する冷酷で法的な主張を象徴する。
    zh: 指莎士比亚《威尼斯商人》中夏洛克要求安东尼奥以一磅肉作为贷款抵押的情节。象征着一种无情且严格依法的要求，忽视仁慈或人性。
    ar: يشير إلى مطلب شايلوك بقطعة من لحم أنطونيو في مسرحية شكسبير "تاجر البندقية" كضمان للقرض. يرمز إلى
      مطالبة قاسية قانونية تتجاهل الرحمة أو الإنسانية.
    he: מתייחס לדרישתו של שיילוק לקבל פאונד מבשרו של אנטוניו במחזה 'הסוחר מוונציה' של שייקספיר כערבות
      להלוואה. מסמל דרישה אכזרית ופורמליסטית שאינה מתחשבת ברחמים או באנושיות.
