    de: Ein mittelalterliches und renaissancezeitliches Symbol, das die launische Natur des Schicksals
      darstellt, bei dem Wohlstand und Unglück zyklisch und unberechenbar sind.
    it: Un simbolo medievale e rinascimentale che rappresenta la natura capricciosa del destino, in cui
      prosperità e sventura sono cicliche e imprevedibili.
    pt: Um símbolo medieval e renascentista que representa a natureza caprichosa do destino, onde prosperidade
      e desgraça são cíclicas e imprevisíveis.
    ru: Средневековый и ренессансный символ, олицетворяющий капризную природу судьбы, где процветание
      и несчастья цикличны и непредсказуемы.
    ja: 中世およびルネサンス期の象徴で、運命の気まぐれな性質を表し、繁栄と不幸が循環的で予測不可能であることを示す。
    zh: 中世纪和文艺复兴时期的象征，代表命运的反复无常，繁荣与不幸交替循环且难以预测。
    ar: رمز من القرون الوسطى وعصر النهضة يمثل الطبيعة المتقلبة للقدر، حيث الازدهار والمصائب دورية وغير
      متوقعة.
    he: סמל מימי הביניים ומתקופת הרנסאנס המייצג את טבעו הבלתי צפוי של הגורל, בו שגשוג וצער הם מחזוריים
      ובלתי צפויים.
