    zh: 1666年的一场大火摧毁了中世纪伦敦的大部分地区，影响了城市规划和消防安全法规，成为英国历史上的一个标志性事件。
    ar: حريق مدمر حدث عام 1666 دمر معظم لندن في العصور الوسطى، مما أثر على التخطيط الحضري وقوانين السلامة
