  - Gainsborough's Blue Boy
  - a Blue Boy
  short_explanation: Refers to Thomas Gainsborough's 1770 portrait of a young man in a blue costume, symbolizing
    18th-century aristocratic fashion and artistic mastery. The painting is one of the most famous in
    British art.
  i18n_explanations:
    en: Refers to Thomas Gainsborough's 1770 portrait of a young man in a blue costume, symbolizing 18th-century
      aristocratic fashion and artistic mastery. The painting is one of the most famous in British art.
    es: Se refiere al retrato de Thomas Gainsborough de 1770 de un joven con traje azul, que simboliza
      la moda aristocrática del siglo XVIII y el dominio artístico. La pintura es una de las más famosas
      del arte británico.
    fr: Fait référence au portrait de Thomas Gainsborough de 1770 représentant un jeune homme en costume
      bleu, symbolisant la mode aristocratique du XVIIIe siècle et la maîtrise artistique. Ce tableau
      est l'un des plus célèbres de l'art britannique.
    de: Bezieht sich auf Thomas Gainsboroughs Porträt eines jungen Mannes in blauem Kostüm aus dem Jahr
      1770, das die aristokratische Mode des 18. Jahrhunderts und künstlerische Meisterschaft symbolisiert.
      Das Gemälde ist eines der berühmtesten der britischen Kunst.
    it: Si riferisce al ritratto di Thomas Gainsborough del 1770 di un giovane in abito blu, che simboleggia
      la moda aristocratica del XVIII secolo e la maestria artistica. Il dipinto è uno dei più famosi
      dell'arte britannica.
    pt: Refere-se ao retrato de Thomas Gainsborough de 1770 de um jovem com traje azul, que simboliza
      a moda aristocrática do século XVIII e a maestria artística. A pintura é uma das mais famosas da
      arte britânica.
    ru: Относится к портрету Томаса Гейнсборо 1770 года молодого человека в синем костюме, символизирующему
      аристократическую моду XVIII века и художественное мастерство. Картина является одной из самых известных
      в британском искусстве.
    ja: トーマス・ゲインズバラの1770年の肖像画で、青い衣装の若者を描き、18世紀の貴族的なファッションと芸術的な卓越性を象徴する。この絵画はイギリス美術で最も有名な作品の一つである。
    zh: 指托马斯·庚斯博罗1770年的肖像画，描绘一名身着蓝色服装的青年，象征着18世纪贵族时尚与艺术造诣。这幅画作是英国艺术中最著名的作品之一。
    ar: يشير إلى بورتريه توماس غينسبورو لعام 1770 لطفل يرتدي ملابس زرقاء، مما يرمز إلى الموضة الأرستقراطية
