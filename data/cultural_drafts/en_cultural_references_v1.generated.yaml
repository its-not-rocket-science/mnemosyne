- id: en_cultural_reference_hobson_s_choice_9cd82a2e
  language: en
  canonical_reference: Hobson's choice
  reference_type: cultural_reference
  surface_patterns:
  - Hobson's choice
  - a Hobson's choice
  - Hobson choice
  short_explanation: A situation in which someone is given a choice but only one option is truly available,
    named after Thomas Hobson, a 17th-century stable owner who only allowed customers to take the horse
    nearest the stable door.
  i18n_explanations:
    en: A situation in which someone is given a choice but only one option is truly available, named after
      Thomas Hobson, a 17th-century stable owner who only allowed customers to take the horse nearest
      the stable door.
    es: Una situación en la que a alguien se le da una elección, pero solo hay una opción realmente disponible,
      llamada así por Thomas Hobson, dueño de un establo en el siglo XVII que solo permitía a los clientes
      llevarse el caballo más cercano a la puerta del establo.
    fr: Une situation où l'on donne le choix à quelqu'un, mais où une seule option est réellement disponible,
      nommée d'après Thomas Hobson, propriétaire d'écuries au XVIIe siècle qui n'autorisait ses clients
      à prendre que le cheval le plus proche de la porte.
    de: Eine Situation, in der jemand eine Wahl hat, aber nur eine Option wirklich verfügbar ist, benannt
      nach Thomas Hobson, einem Stallbesitzer des 17. Jahrhunderts, der seinen Kunden nur das Pferd anbot,
      das am nächsten zur Stalltür stand.
    it: Una situazione in cui a qualcuno viene data una scelta, ma solo un'opzione è realmente disponibile,
      dal nome di Thomas Hobson, proprietario di una scuderia nel XVII secolo che permetteva ai clienti
      di prendere solo il cavallo più vicino alla porta della scuderia.
    pt: Uma situação em que alguém recebe uma escolha, mas apenas uma opção está realmente disponível,
      nomeada em homenagem a Thomas Hobson, dono de estábulos no século XVII que só permitia aos clientes
      levarem o cavalo mais próximo da porta do estábulo.
    ru: Ситуация, когда человеку предоставляется выбор, но на самом деле доступна только одна опция, названная
      в честь Томаса Хобсона, владельца конюшни XVII века, который разрешал клиентам брать только лошадь,
      ближайшую к двери.
    ja: 選択肢が与えられているように見えて、実際には一つの選択肢しかない状況を指す。17世紀の馬屋主トーマス・ホブソンが、顧客に馬屋の扉に最も近い馬しか選べなかった故事に由来します。
    zh: 一种看似有选择但实际上只有一种真正可行的选项的情况，源于17世纪马房主托马斯·霍布森，他只允许顾客选择离马房门最近的马。
    ar: موقف يُعطى فيه شخص خيارًا لكن لا تتوفر سوى خيار واحد حقيقي، سمي على اسم توماس هوبسون، مالك إسطبل
      في القرن السابع عشر كان يسمح للعملاء بأخذ الحصان الأقرب إلى باب الإسطبل فقط.
    he: מצב שבו ניתנת לאדם בחירה, אך למעשה קיימת רק אפשרות אחת זמינה. מקור הביטוי הוא בתומאס הובסון, בעל
      אורווה מהמאה ה-17, שאפשר ללקוחותיו לקחת רק את הסוס הקרוב ביותר לדלת האורווה.
