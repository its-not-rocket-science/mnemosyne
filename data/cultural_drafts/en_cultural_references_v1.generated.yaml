    en: A paraphrase of Abraham Lincoln's opening line in the Gettysburg Address (1863), which begins
      'Four score and seven years ago.' It refers to the founding of the United States in 1776.
    es: Una paráfrasis de la frase inicial del Discurso de Gettysburg de Abraham Lincoln (1863), que comienza
      con 'Hace cuatro veintenas y siete años'. Se refiere a la fundación de Estados Unidos en 1776.
    fr: Une paraphrase de la phrase d'ouverture du discours de Gettysburg d'Abraham Lincoln (1863), qui
      commence par 'Il y a quatre-vingt-sept ans'. Cela fait référence à la fondation des États-Unis en
      1776.
