- id: en_literary_reference_the_invisible_hand_0363f91a
  language: en
  canonical_reference: The invisible hand
  reference_type: literary_reference
  surface_patterns:
  - the invisible hand
  - invisible hand
  - an invisible hand
  short_explanation: A metaphor introduced by Adam Smith to describe how individual self-interest in a
    free market unintentionally benefits society as a whole, as if guided by an unseen force. Found in
    'The Wealth of Nations.'
  i18n_explanations:
    en: A metaphor introduced by Adam Smith to describe how individual self-interest in a free market
      unintentionally benefits society as a whole, as if guided by an unseen force. Found in 'The Wealth
      of Nations.'
    es: Metáfora introducida por Adam Smith para describir cómo el interés individual en un mercado libre
      beneficia inconscientemente a la sociedad en su conjunto, como si estuviera guiado por una fuerza
      invisible. Aparece en 'La riqueza de las naciones'.
    fr: Métaphore introduite par Adam Smith pour décrire comment l'intérêt individuel dans un marché libre
      bénéficie involontairement à la société dans son ensemble, comme s'il était guidé par une force
      invisible. Trouvée dans 'La Richesse des nations'.
    de: Eine von Adam Smith eingeführte Metapher, die beschreibt, wie individuelles Eigeninteresse auf
      einem freien Markt unbewusst der gesamten Gesellschaft zugutekommt, als würde es von einer unsichtbaren
      Hand gelenkt. Zu finden in 'Der Wohlstand der Nationen'.
    it: Metafora introdotta da Adam Smith per descrivere come l'interesse individuale in un mercato libero
      benefici inavvertitamente la società nel suo complesso, come se fosse guidato da una forza invisibile.
      Presente ne 'La ricchezza delle nazioni'.
    pt: Metáfora introduzida por Adam Smith para descrever como o interesse individual em um mercado livre
      beneficia inconscientemente a sociedade como um todo, como se guiado por uma força invisível. Encontrada
      em 'A riqueza das nações'.
    ru: Метафора, введённая Адамом Смитом, описывающая, как личный интерес в свободном рынке непреднамеренно
      приносит пользу обществу в целом, как будто им управляет невидимая рука. Встречается в 'Богатстве
      народов'.
    ja: アダム・スミスが提唱した比喩で、自由市場における個人の利己心が社会全体に無意識のうちに利益をもたらす様を、まるで見えざる手に導かれているかのように説明したもの。'国富論'に見られる。
    zh: 亚当·斯密提出的隐喻，描述自由市场中个人利己主义如何无意间造福整个社会，仿佛受到一只看不见的手的引导。出自《国富论》。
    ar: استعارة قدمها آدم سميث لوصف كيف أن المصلحة الذاتية الفردية في السوق الحرة تفيد المجتمع ككل بشكل
      غير مقصود، كما لو كانت توجهها قوة خفية. وردت في 'ثروة الأمم'.
    he: מטאפורה שהציג אדם סמית לתיאור כיצד האינטרס העצמי האישי בשוק חופשי מביא בטעות תועלת לחברה כולה,
