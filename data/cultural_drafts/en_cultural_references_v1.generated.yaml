- id: en_cultural_reference_the_boston_massacre_b4ab4518
  language: en
  canonical_reference: The Boston Massacre
  reference_type: cultural_reference
  surface_patterns:
  - the Boston Massacre
  - Boston Massacre
  - the Massacre
  short_explanation: A deadly confrontation (1770) between British soldiers and colonists in Boston, where
    five colonists were killed. It became a key event leading to the American Revolution.
  i18n_explanations:
    en: A deadly confrontation (1770) between British soldiers and colonists in Boston, where five colonists
      were killed. It became a key event leading to the American Revolution.
    es: Un enfrentamiento mortal (1770) entre soldados británicos y colonos en Boston, donde murieron
      cinco colonos. Se convirtió en un evento clave que llevó a la Revolución Americana.
    fr: Une confrontation mortelle (1770) entre des soldats britanniques et des colons à Boston, où cinq
      colons furent tués. Elle devint un événement clé menant à la Révolution américaine.
    de: Eine tödliche Konfrontation (1770) zwischen britischen Soldaten und Kolonisten in Boston, bei
      der fünf Kolonisten getötet wurden. Sie wurde zu einem Schlüsselmoment, der zur Amerikanischen Revolution
      führte.
    it: Uno scontro mortale (1770) tra soldati britannici e coloni a Boston, in cui morirono cinque coloni.
      Divenne un evento chiave che portò alla Rivoluzione Americana.
    pt: Um confronto mortal (1770) entre soldados britânicos e colonos em Boston, onde cinco colonos foram
      mortos. Tornou-se um evento-chave que levou à Revolução Americana.
    ru: Смертельное столкновение (1770) между британскими солдатами и колонистами в Бостоне, в результате
      которого погибли пять колонистов. Это событие стало ключевым, приведшим к Американской революции.
    ja: 1770年にボストンでイギリス兵と植民地住民が衝突し、5人の植民地住民が死亡した事件。アメリカ独立戦争へと繋がる重要な出来事となった。
    zh: 1770年波士顿英国士兵与殖民地居民的致命冲突，五名殖民者死亡。成为引发美国独立战争的关键事件。
    ar: اشتباك مميت (1770) بين جنود بريطانيين ومستعمرين في بوسطن، قتل فيه خمسة مستعمرين. أصبح حدثا رئيسيا
      أدى إلى الثورة الأمريكية.
    he: עימות קטלני (1770) בין חיילים בריטים למתיישבים בבוסטון, בו נהרגו חמישה מתיישבים. הפך לאירוע מרכזי
      שהוביל למהפכה האמריקאית.
