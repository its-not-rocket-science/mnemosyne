- id: en_literary_reference_a_capote_socialite_moths_620808c0
  language: en
  canonical_reference: A Capote socialite moths
  reference_type: literary_reference
  surface_patterns:
  - Capote's socialite moths
  - socialite moths
  - moths to a flame
  - Capote moths
  short_explanation: Refers to Truman Capote's portrayal of high-society figures as 'moths' drawn to glamour
    and scandal in works like 'Breakfast at Tiffany's' and 'Answered Prayers'. The metaphor suggests both
    attraction and self-destruction in elite circles.
  i18n_explanations:
    en: Refers to Truman Capote's portrayal of high-society figures as 'moths' drawn to glamour and scandal
      in works like 'Breakfast at Tiffany's' and 'Answered Prayers'. The metaphor suggests both attraction
      and self-destruction in elite circles.
    es: Se refiere a la representación que hace Truman Capote de las figuras de la alta sociedad como
      'polillas' atraídas por el glamour y el escándalo en obras como 'Desayuno en Tiffany's' y 'Oraciones
      atendidas'. La metáfora sugiere tanto atracción como autodestrucción en los círculos elitistas.
    fr: Fait référence à la façon dont Truman Capote dépeint les figures de la haute société comme des
      'papillons de nuit' attirés par le glamour et le scandale dans des œuvres comme 'Petit-déjeuner
      chez Tiffany' et 'Prières exaucées'. La métaphore suggère à la fois l'attraction et l'autodestruction
      dans les cercles élitistes.
    de: Bezieht sich auf Truman Capotes Darstellung von High-Society-Persönlichkeiten als 'Nachtfalter',
      die von Glanz und Skandal angezogen werden, wie in 'Frühstück bei Tiffany' und 'Erhörte Gebete'.
      Die Metapher deutet sowohl Anziehung als auch Selbstzerstörung in elitären Kreisen an.
    it: Si riferisce alla rappresentazione che Truman Capote fa delle figure dell'alta società come 'farfalle
      notturne' attratte dal glamour e dallo scandalo in opere come 'Colazione da Tiffany' e 'Preghiere
      esaudite'. La metafora suggerisce sia attrazione che autodistruzione nei circoli elitari.
    pt: Refere-se à representação de Truman Capote das figuras da alta sociedade como 'mariposas' atraídas
      pelo glamour e pelo escândalo em obras como 'Boneca de Luxo' e 'Oraçãoes Respondidas'. A metáfora
      sugere tanto atração quanto autodestruição nos círculos elitistas.
    ru: Относится к изображению Трумэном Капоте представителей высшего общества как 'мотыльков', привлечённых
      гламуром и скандалами в произведениях 'Завтрак у Тиффани' и 'Молитвы, услышанные'. Метафора подразумевает
      как влечение, так и саморазрушение в элитарных кругах.
    ja: トルーマン・カポーティが「ティファニーで朝食を」や「祈りの答え」などの作品で描く、高級社会の人物像を「蛾」にたとえた表現。この比喩は、エリート層における魅力と自己破滅の両方を示唆している。
    zh: 指的是杜鲁门·卡波特在《蒂凡尼的早餐》和《应答的祈祷》等作品中将上流社会人物比作被光鲜与丑闻吸引的'飞蛾'。这一比喻既体现了对精英圈的吸引，也暗示了其自我毁灭。
    ar: يشير إلى تصوير ترومان كابوت للنخب الاجتماعية على أنهم 'فراشات' تنجذب إلى البريق والفضائح في أعمال
      مثل 'إفطار عند تيفاني' و'صلوات مجابة'. تشير الاستعارة إلى الجذب والدمار الذاتي في الدوائر Elite.
    he: מתייחס לייצוגו של טרומן קפוטה לדמויות החברה הגבוהה כ'עשים' הנמשכות לזוהר ולשערוריות ביצירות כמו
