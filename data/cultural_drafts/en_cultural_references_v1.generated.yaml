- id: en_literary_reference_the_world_is_my_oyster_8bcdc292
  language: en
  canonical_reference: The world is my oyster
  reference_type: literary_reference
  surface_patterns:
  - The world is my oyster
  - world is my oyster
  - the world's my oyster
  short_explanation: A phrase meaning that the speaker has the opportunity to do anything they want or
    take advantage of all the opportunities life has to offer. It originates from Shakespeare's play 'The
    Merry Wives of Windsor.'
  i18n_explanations:
    en: A phrase meaning that the speaker has the opportunity to do anything they want or take advantage
      of all the opportunities life has to offer. It originates from Shakespeare's play 'The Merry Wives
      of Windsor.'
    es: Frase que significa que el hablante tiene la oportunidad de hacer lo que quiera o aprovechar todas
      las oportunidades que la vida ofrece. Proviene de la obra de Shakespeare 'Las alegres comadres de
      Windsor'.
    fr: Expression signifiant que le locuteur a l'opportunité de faire ce qu'il veut ou de saisir toutes
      les chances que la vie offre. Elle provient de la pièce de Shakespeare 'Les Joyeuses Commères de
      Windsor'.
    de: Ein Sprichwort, das bedeutet, dass der Sprecher die Möglichkeit hat, alles zu tun, was er will,
      oder alle Chancen zu nutzen, die das Leben bietet. Es stammt aus Shakespeares Stück 'Die lustigen
      Weiber von Windsor'.
    it: Frase che significa che il parlante ha l'opportunità di fare ciò che vuole o di cogliere tutte
      le opportunità che la vita offre. Deriva dalla commedia di Shakespeare 'Le allegre comari di Windsor'.
    pt: Expressão que significa que o falante tem a oportunidade de fazer o que quiser ou aproveitar todas
      as oportunidades que a vida oferece. Origina-se da peça de Shakespeare 'As Alegres Comadres de Windsor'.
    ru: Выражение, означающее, что говорящий имеет возможность делать всё, что пожелает, или воспользоваться
      всеми предоставляемыми жизнью возможностями. Восходит к пьесе Шекспира 'Виндзорские насмешницы'.
    ja: 「世界は私のカキ」という意味で、話し手が望むことを何でもできる、あるいは人生が提供するあらゆる機会を活かせるという意味。シェイクスピアの戯曲「ウィンザーの陽気な女房たち」に由来する。
    zh: 意为“世界是我的牡蛎”，表示说话者可以为所欲为，或充分利用生活提供的一切机会。源于莎士比亚的戏剧《温莎的风流娘儿们》。
    ar: تعبير يعني أن المتحدث لديه فرصة ليفعل ما يريد أو يستفيد من جميع الفرص التي تقدمها الحياة. ينشأ
      من مسرحية شكسبير 'زوجات ويندسور المرحات'.
    he: ביטוי שמשמעו שהדובר יכול לעשות כל מה שהוא רוצה או לנצל את כל ההזדמנויות שהחיים מציעים. מקורו במחזה
      'נשות וינדזור העליזות' של שייקספיר
