- id: en_classical_or_scriptural_allusion_cleopatra_s_asp_6400afa3
  language: en
  canonical_reference: Cleopatra's asp
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Cleopatra's asp
  - the asp of Cleopatra
  - Cleopatra's suicide
  - the asp
  short_explanation: Refers to Cleopatra VII's suicide by allowing an asp (a venomous snake) to bite her,
    rather than surrender to the Romans. It symbolizes defiance, tragedy, and the end of an era.
  i18n_explanations:
    en: Refers to Cleopatra VII's suicide by allowing an asp (a venomous snake) to bite her, rather than
      surrender to the Romans. It symbolizes defiance, tragedy, and the end of an era.
    es: Se refiere al suicidio de Cleopatra VII al permitir que una cobra (una serpiente venenosa) la
      mordiera, en lugar de rendirse a los romanos. Simboliza desafío, tragedia y el fin de una era.
    fr: Fait référence au suicide de Cléopâtre VII, qui se fit mordre par un aspic (un serpent venimeux)
      plutôt que de se rendre aux Romains. Symbolise la rébellion, la tragédie et la fin d'une époque.
    de: Bezieht sich auf den Selbstmord von Kleopatra VII, die sich von einer Aspisviper (einer giftigen
      Schlange) beißen ließ, statt sich den Römern zu ergeben. Symbolisiert Trotz, Tragik und das Ende
      einer Ära.
    it: Si riferisce al suicidio di Cleopatra VII, che si fece mordere da un aspide (un serpente velenoso)
      piuttosto che arrendersi ai romani. Simboleggia ribellione, tragedia e la fine di un'epoca.
    pt: Refere-se ao suicídio de Cleópatra VII, que permitiu que uma áspide (uma cobra venenosa) a mordesse,
      em vez de se render aos romanos. Simboliza desafio, tragédia e o fim de uma era.
    ru: Относится к самоубийству Клеопатры VII, которая позволила укусить себя аспиду (ядовитой змее),
      вместо того чтобы сдаться римлянам. Символизирует неповиновение, трагедию и конец эпохи.
    ja: クレオパトラ7世がローマ人に降伏する代わりに、アスプ（毒蛇）に噛ませて自殺したことを指す。反抗、悲劇、そして時代の終焉を象徴する。
    zh: 指克利奥帕特拉七世让一条有毒的眼镜蛇（asp）咬死自己，而非向罗马人投降。象征反抗、悲剧与一个时代的终结。
    ar: يشير إلى انتحار كليوباترا السابعة عن طريق السماح لأفعى (أسب) سامة بعضتها بدلاً من الاستسلام للرومان.
      يرمز إلى التمرد والمأساة ونهاية حقبة.
    he: מתייחס להתאבדותה של קלאופטרה השביעית באמצעות הכשת נחש (אפעה) במקום להיכנע לרומאים. מסמל מרי, טרגדיה
      וסוף תקופה.
