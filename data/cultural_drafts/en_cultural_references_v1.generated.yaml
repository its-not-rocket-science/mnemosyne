  short_explanation: Refers to the Revolutionary War battle in 1775 near Boston, symbolizing early American
    resistance against British rule. Often used metaphorically for a pivotal or costly struggle.
  i18n_explanations:
    en: Refers to the Revolutionary War battle in 1775 near Boston, symbolizing early American resistance
      against British rule. Often used metaphorically for a pivotal or costly struggle.
    es: Se refiere a la batalla de la Guerra de Independencia de 1775 cerca de Boston, que simboliza la
      resistencia temprana de EE.UU. contra el dominio británico. Se usa metafóricamente para una lucha
      decisiva o costosa.
    fr: Fait référence à la bataille de la guerre d'Indépendance de 1775 près de Boston, symbolisant la
      résistance américaine précoce contre la domination britannique. Souvent utilisé métaphoriquement
      pour une lutte décisive ou coûteuse.
    de: Bezieht sich auf die Schlacht im Unabhängigkeitskrieg 1775 nahe Boston, die den frühen amerikanischen
      Widerstand gegen die britische Herrschaft symbolisiert. Wird oft metaphorisch für einen entscheidenden
      oder kostspieligen Kampf verwendet.
    it: Si riferisce alla battaglia della Guerra d'Indipendenza del 1775 vicino a Boston, che simboleggia
      la resistenza americana contro il dominio britannico. Spesso usato metaforicamente per una lotta
      decisiva o costosa.
    pt: Refere-se à batalha da Guerra de Independência de 1775 perto de Boston, simbolizando a resistência
      americana precoce contra o domínio britânico. Frequentemente usado metaforicamente para uma luta
      decisiva ou custosa.
    ru: Относится к битве войны за независимость 1775 года у Бостонa, символизирующей раннее сопротивление
      США британскому правлению. Часто используется метафорически для обозначения решающей или дорогостоящей
      борьбы.
    ja: 1775年のボストン近郊の独立戦争の戦いを指し、イギリス支配に対するアメリカ初期の抵抗を象徴する。しばしば比喩的に、重大な決断や犠牲を伴う闘いを表すのに用いられる。
    zh: 指的是1775年波士顿附近的独立战争战役，象征着美国早期对英国统治的抵抗。常用于比喻性地描述一场关键或代价高昂的斗争。
    ar: يشير إلى معركة حرب الاستقلال الأمريكية عام 1775 بالقرب من بوسطن، والتي ترمز إلى المقاومة الأمريكية
      المبكرة ضد الحكم البريطاني. غالبًا ما تُستخدم مجازًا لوصف صراع حاسم أو مكلف.
    he: מתייחס לקרב מלחמת העצמאות האמריקאית ב-1775 ליד בוסטון, המסמל את ההתנגדות האמריקאית המוקדמת לשלטון
