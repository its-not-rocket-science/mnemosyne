- id: en_cultural_reference_a_hogarth_engraving_of_gin_lane_7c4ed0dd
  language: en
  canonical_reference: A Hogarth engraving of Gin Lane
  reference_type: cultural_reference
  surface_patterns:
  - Hogarth's Gin Lane
  - Gin Lane
  - a Hogarth engraving of Gin Lane
  - Hogarth's engraving of Gin Lane
  short_explanation: A famous 1751 engraving by William Hogarth depicting the destructive effects of gin
    consumption on London's poor. It is part of a pair of engravings (with 'Beer Street') and is a powerful
    critique of social and moral decay.
  i18n_explanations:
    en: A famous 1751 engraving by William Hogarth depicting the destructive effects of gin consumption
      on London's poor. It is part of a pair of engravings (with 'Beer Street') and is a powerful critique
      of social and moral decay.
    es: Grabado famoso de 1751 de William Hogarth que muestra los efectos destructivos del consumo de
      ginebra en los pobres de Londres. Forma parte de un par de grabados (junto a 'Beer Street') y es
      una fuerte crítica al deterioro social y moral.
    fr: Gravure célèbre de 1751 par William Hogarth illustrant les effets destructeurs de la consommation
      de gin sur les pauvres de Londres. Elle fait partie d'une paire de gravures (avec 'Beer Street')
      et est une critique puissante du déclin social et moral.
    de: Berühmter Kupferstich von 1751 von William Hogarth, der die zerstörerischen Auswirkungen des Gin-Konsums
      auf die Armen Londons zeigt. Er ist Teil eines Paares von Stichen (mit 'Beer Street') und eine scharfe
      Kritik am sozialen und moralischen Verfall.
    it: Incisione famosa del 1751 di William Hogarth che ritrae gli effetti distruttivi del consumo di
      gin sui poveri di Londra. Fa parte di una coppia di incisioni (con 'Beer Street') ed è una forte
      critica al degrado sociale e morale.
    pt: Gravura famosa de 1751 de William Hogarth que retrata os efeitos destrutivos do consumo de gim
      nos pobres de Londres. Faz parte de um par de gravuras (com 'Beer Street') e é uma crítica contundente
      ao declínio social e moral.
    ru: Знаменитая гравюра 1751 года Уильяма Хогарта, изображающая разрушительные последствия потребления
      джина для лондонской бедноты. Она является частью пары гравюр (вместе с 'Beer Street') и представляет
      собой мощную критику социального и морального упадка.
    ja: 1751年にウィリアム・ホガースが制作した版画で、ロンドンの貧困層におけるジン消費の破壊的な影響を描いている。同作品は「ビア・ストリート」と並ぶペアの版画の一つであり、社会的・道徳的荒廃を鋭く批判した作品として知られる。
    zh: 威廉·贺加斯于1751年创作的著名版画，描绘了伦敦穷人因饮用杜松子酒而导致的毁灭性后果。它是一对版画中的一幅（另一幅为《啤酒街》），并对社会和道德的堕落进行了强有力的批判。
    ar: نقش محفور شهير لعام 1751 بواسطة ويليام هوجارث يصور الآثار المدمرة لاستهلاك الجين على فقراء لندن.
      وهو جزء من زوج من النقوش (مع 'شارع البيرة') ويعتبر نقدًا قويًا للانهيار الاجتماعي والأخلاقي.
    he: תחריט מפורסם משנת 1751 מאת ויליאם הוגארת' המתאר את ההשפעות ההרסניות של צריכת gin על עניי לונדון.
      זהו חלק מזוג תחריטים (עם 'Beer Street') והוא ביקורת נוקבת על הידרדרות חברתית ומוסרית.
