- id: en_classical_or_scriptural_allusion_crossing_the_rubicon_26f7a7d0
  language: en
  canonical_reference: Crossing the Rubicon
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - cross the Rubicon
  - crossing the Rubicon
  - to cross the Rubicon
  short_explanation: Refers to Julius Caesar's illegal crossing of the Rubicon River in 49 BCE, an act
    that sparked civil war and marked a point of no return. Symbolizes making an irreversible decision.
  i18n_explanations:
    en: Refers to Julius Caesar's illegal crossing of the Rubicon River in 49 BCE, an act that sparked
      civil war and marked a point of no return. Symbolizes making an irreversible decision.
    es: Se refiere al cruce ilegal del río Rubicón por Julio César en el 49 a.C., un acto que desencadenó
      una guerra civil y marcó un punto de no retorno. Simboliza tomar una decisión irreversible.
    fr: Fait référence au franchissement illégal par Jules César de la rivière Rubicon en 49 av. J.-C.,
      un acte qui déclencha une guerre civile et marqua un point de non-retour. Symbolise la prise d'une
      décision irréversible.
    de: Bezieht sich auf den illegalen Übergang Julius Caesars über den Rubikon im Jahr 49 v. Chr., eine
      Handlung, die einen Bürgerkrieg auslöste und einen Punkt ohne Rückkehr markierte. Symbolisiert eine
      unwiderrufliche Entscheidung.
    it: Si riferisce all'attraversamento illegale del fiume Rubicone da parte di Giulio Cesare nel 49
      a.C., un atto che scatenò una guerra civile e segnò un punto di non ritorno. Simboleggia prendere
      una decisione irreversibile.
    pt: Refere-se à travessia ilegal do rio Rubicão por Júlio César em 49 a.C., um ato que desencadeou
      uma guerra civil e marcou um ponto sem retorno. Simboliza tomar uma decisão irreversível.
    ru: Относится к незаконному переходу Юлия Цезаря через реку Рубикон в 49 году до н.э., акту, который
      развязал гражданскую войну и стал точкой невозврата. Символизирует принятие необратимого решения.
    ja: 紀元前49年にユリウス・カエサルがルビコン川を違法に渡ったことを指す。この行為は内戦を引き起こし、後戻りできない局面を示した。不可逆的な決断を下すことを象徴する。
    zh: 指公元前49年儒略·恺撒非法渡过卢比孔河的事件，这一行为引发了内战并标志着无法回头的关键点。象征做出不可逆转的决定。
    ar: يشير إلى عبور يوليوس قيصر غير القانوني لنهر روبيكون في عام 49 قبل الميلاد، وهو الفعل الذي أشعل
      الحرب الأهلية وحدد نقطة اللاعودة. يرمز إلى اتخاذ قرار لا رجعة فيه.
    he: מתייחס למעבר הבלתי חוקי של יוליוס קיסר את נהר הרוביקון בשנת 49 לפנה"ס, מעשה שהצית מלחמת אזרחים
      וסימן נקודת אל-חזור. מסמל קבלת החלטה בלתי הפיכה.
