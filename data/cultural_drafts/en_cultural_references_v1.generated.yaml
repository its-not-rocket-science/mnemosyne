  - hubris precedes a fall
  - pride comes before a fall
  - pride goeth before destruction
  - hubris before the fall
  short_explanation: A proverb warning that excessive pride or arrogance often leads to downfall. It originates
    from the biblical phrase 'Pride goeth before destruction, and an haughty spirit before a fall' (Proverbs
    16:18).
  i18n_explanations:
    en: A proverb warning that excessive pride or arrogance often leads to downfall. It originates from
      the biblical phrase 'Pride goeth before destruction, and an haughty spirit before a fall' (Proverbs
      16:18).
    es: Un proverbio que advierte que el exceso de orgullo o arrogancia suele llevar a la ruina. Proviene
      de la frase bíblica 'El orgullo precede a la destrucción, y la altivez al fracaso' (Proverbios 16:18).
    fr: Un proverbe avertissant que l'orgueil excessif ou l'arrogance mènent souvent à la chute. Il vient
      de la phrase biblique 'L'orgueil précède la ruine, et l'arrogance précède la chute' (Proverbes 16:18).
    de: Ein Sprichwort, das warnt, dass übermäßiger Stolz oder Arroganz oft zum Untergang führen. Es stammt
      aus dem biblischen Vers 'Hochmut kommt vor dem Fall' (Sprüche 16,18).
    it: Un proverbio che avverte che l'eccessiva superbia o arroganza porta spesso alla rovina. Deriva
      dal versetto biblico 'L'orgoglio precede la rovina e l'arroganza precede la caduta' (Proverbi 16:18).
    pt: Um provérbio que adverte que o excesso de orgulho ou arrogância geralmente leva à ruína. Vem da
      frase bíblica 'O orgulho precede a destruição, e a altivez precede a queda' (Provérbios 16:18).
    ru: 'Поговорка, предупреждающая, что чрезмерная гордость или высокомерие часто ведут к падению. Впервые
      встречается в Библии: ''Погибели предшествует гордость, а падению — надменность'' (Притчи 16:18).'
    ja: 過剰な誇りや傲慢がしばしば破滅につながるという警句。聖書のことわざ「高慢は破滅に先立ち、驕りは転落に先立つ」（箴言16:18）に由来します。
    zh: 警示过度骄傲或傲慢常导致失败的谚语。源自圣经箴言16:18：‘骄傲在败坏以先，狂心在跌倒之前。’
    ar: مثل يحذر من أن الكبرياء أو الغرور المفرط يؤدي غالبًا إلى السقوط. يأتي من الآية الكتابية 'الكبرياء
      قبل السقوط، والروح المتغطرسة قبل الهلاك' (أمثال 16:18).
    he: פתגם המזהיר כי גאווה או יהירות מופרזת מובילות לרוב לנפילה. מקורו בפסוק המקראי 'גאות לפני שבר וגאווה
