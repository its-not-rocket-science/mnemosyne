  i18n_explanations:
    en: In Norse mythology, Fenrir is a monstrous wolf destined to kill Odin during Ragnarök. The gods
      bind him with the unbreakable ribbon Gleipnir to prevent his destruction.
    es: En la mitología nórdica, Fenrir es un lobo monstruoso destinado a matar a Odín durante el Ragnarök.
      Los dioses lo atan con la cinta indestructible Gleipnir para evitar su destrucción.
    fr: Dans la mythologie nordique, Fenrir est un loup monstrueux destiné à tuer Odin lors du Ragnarök.
      Les dieux l'enchaînent avec le ruban indestructible Gleipnir pour empêcher sa destruction.
    de: In der nordischen Mythologie ist Fenrir ein riesiger Wolf, der Odin während des Ragnarök töten
      soll. Die Götter binden ihn mit dem unzerreißbaren Band Gleipnir, um seine Zerstörung zu verhindern.
    it: Nella mitologia norrena, Fenrir è un lupo mostruoso destinato a uccidere Odino durante il Ragnarök.
      Gli dèi lo legano con il nastro indistruttibile Gleipnir per impedirne la distruzione.
    pt: Na mitologia nórdica, Fenrir é um lobo monstruoso destinado a matar Odin durante o Ragnarök. Os
      deuses o prendem com a fita indestrutível Gleipnir para evitar sua destruição.
    ru: В скандинавской мифологии Фенрир — чудовищный волк, обречённый убить Одина во время Рагнарёка.
      Боги связывают его неразрывной лентой Глейпнир, чтобы предотвратить его разрушения.
    ja: 北欧神話ではフェンリルはラグナロクでオーディンを殺すとされる巨大な狼。神々は彼を壊すことのできない紐グレイプニルで縛り、破壊を防ごうとする。
    zh: 在北欧神话中，芬里尔是一只注定在诸神黄昏时杀死奥丁的巨狼。众神用无法解开的绳索格莱普尼尔将其束缚，以阻止其毁灭行为。
    ar: في الميثولوجيا النوردية، فينرير هو ذئب عملاق مُقدّر له قتل أودين خلال رagnarök. يربطه الآلهة بشريط
