    fr: Une expression symbolisant la surveillance totalitaire et le contrôle gouvernemental, tirée du
      roman dystopique de George Orwell où l'autorité omniprésente surveille sans relâche les citoyens.
    de: Ein Ausdruck, der totale Überwachung und staatliche Kontrolle symbolisiert, stammt aus George
