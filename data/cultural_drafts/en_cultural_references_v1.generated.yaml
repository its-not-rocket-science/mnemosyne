      откровение.
    ja: カラヴァッジョの1599-1600年の絵画で、イエスがマタイを弟子に招く瞬間を描く。光と影の劇的な使い方で知られ、神の啓示を象徴する。
    zh: 指的是卡拉瓦乔1599-1600年的画作，描绘耶稣呼召马太成为门徒的瞬间。以光影的戏剧性运用著称，象征神圣启示。
    ar: يشير إلى لوحة كارافاجيو (1599-1600) التي تصور لحظة دعوة يسوع لمتى ليصبح تلميذه. تشتهر باستخدامها
