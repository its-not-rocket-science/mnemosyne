  i18n_explanations:
    en: A symbol of impending danger or a precarious situation, derived from the Greek legend of Damocles,
      who was seated at a banquet with a sword hanging above him by a single thread.
    es: Símbolo de un peligro inminente o una situación precaria, basado en la leyenda griega de Damocles,
      quien estaba sentado en un banquete con una espada colgando sobre él por un solo hilo.
    fr: Symbole d'un danger imminent ou d'une situation précaire, issu de la légende grecque de Damoclès,
      qui était assis à un banquet avec une épée suspendue au-dessus de lui par un simple fil.
    de: Ein Symbol für eine drohende Gefahr oder eine prekäre Situation, abgeleitet von der griechischen
      Legende des Damokles, der bei einem Bankett mit einem über ihm hängenden Schwert an einem einzigen
      Faden saß.
    it: Simbolo di un pericolo imminente o di una situazione precaria, tratto dalla leggenda greca di
      Damocle, che era seduto a un banchetto con una spada appesa sopra di lui da un singolo filo.
    pt: Símbolo de um perigo iminente ou de uma situação precária, derivado da lenda grega de Damocles,
      que estava sentado em um banquete com uma espada pendurada acima dele por um único fio.
    ru: Символ надвигающейся опасности или шаткого положения, восходящий к греческой легенде о Дамокле,
      который сидел на пиру с мечом, висящим над ним на одном волоске.
    ja: ギリシャ神話のダモクレスの逸話に由来する、差し迫った危険や不安定な状況を象徴する言葉。ダモクレスは宴会の最中、頭上に一本の糸で吊るされた剣の下に座っていた。
    zh: 源自希腊传说中达摩克利斯的故事，象征即将到来的危险或岌岌可危的处境。达摩克利斯在宴会上头顶悬挂的一根头发丝上的剑下就座。
    ar: رمز للخطر المحدق أو الموقف الحرج، مستمد من الأسطورة اليونانية لداموكليس، الذي كان جالسًا في مأدبة
