      Hand an die Wand schrieb und seinen Untergang vorhersagte. Symbolisiert ein unausweichliches Schicksal
      oder göttliches Gericht.
    it: Riferimento biblico al banchetto del re Baldassarre di Babilonia, durante il quale una mano misteriosa
      scrisse sul muro, preannunciando la sua caduta. Simboleggia una sventura imminente o un giudizio
      divino.
    pt: Referência bíblica ao banquete do rei Belsazar da Babilônia, onde uma mão misteriosa escreveu
      na parede, prenunciando sua queda. Simboliza um destino inevitável ou um julgamento divino.
    ru: Библейский образ пира вавилонского царя Валтасара, на котором таинственная рука написала на стене,
      предсказав его гибель. Символизирует неминуемую погибель или божественное возмездие.
    ja: バビロンの王ベルシャザルの饗宴に関する聖書の引用。不思議な手が壁に文字を書き、彼の没落を予言した。これは迫り来る破滅や神の裁きを象徴する。
    zh: 圣经典故，指巴比伦王伯沙撒的宴会上，一只神秘的手在墙上写字，预示其灭亡。象征即将来临的厄运或神的审判。
    ar: إشارة توراتية إلى وليمة الملك بيلشاصر البابلي، حيث كتبت يد غامضة على الحائط تنذر بسقوطه. ترمز
