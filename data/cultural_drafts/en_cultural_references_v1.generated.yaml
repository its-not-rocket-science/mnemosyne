      prison en utilisant des ailes de cire et de plumes ; Icare vole trop près du soleil, ses ailes fondent
      et il tombe à sa mort. Symbolise l’orgueil démesuré et les dangers de la démesure.
    de: Ein griechischer Mythos über einen Vater (Dädalus) und seinen Sohn (Ikarus), die mit aus Wachs
      und Federn gebauten Flügeln aus dem Gefängnis fliehen; Ikarus fliegt der Sonne zu nah, seine Flügel
      schmelzen, und er stürzt in den Tod. Symbolisiert Hybris und die Gefahren des Übermuts.
    it: Un mito greco su un padre (Dedalo) e suo figlio (Icaro) che fuggono dalla prigionia usando ali
      di cera e piume; Icaro vola troppo vicino al sole, le sue ali si sciolgono e cade a morte. Simboleggia
      l’orgoglio smisurato e i pericoli dell’eccesso.
    pt: Um mito grego sobre um pai (Dédalo) e seu filho (Ícaro) que escapam da prisão usando asas de cera
      e penas; Ícaro voa muito perto do sol, suas asas derretem e ele cai para a morte. Simboliza a arrogância
      e os perigos de se exceder.
    ru: Греческий миф о отце (Дедале) и сыне (Икаре), которые сбегают из заключения на крыльях из воска
      и перьев; Икар летит слишком близко к солнцу, его крылья тают, и он падает насмерть. Символизирует
      гордыню и опасность чрезмерных амбиций.
    ja: ギリシャ神話で、父（ダイダロス）と息子（イカロス）が蝋と羽で作った翼で牢から逃げるが、イカロスが太陽に近づきすぎて翼が溶け、落下死する。傲慢と過信の危険性を象徴する。
    zh: 希腊神话中，代达罗斯和儿子伊卡洛斯用蜡和羽毛制成的翅膀逃离监禁；伊卡洛斯飞得离太阳太近，翅膀融化坠亡。象征傲慢与过度自信的危险。
    ar: أسطورة يونانية عن أب (ديدالوس) وابن (إيكاروس) يهربان من السجن باستخدام أجنحة من الشمع والريش؛
