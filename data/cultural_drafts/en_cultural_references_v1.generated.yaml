- id: en_classical_or_scriptural_allusion_cross_the_rubicon_d555692b
  language: en
  canonical_reference: Cross the Rubicon
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - cross the Rubicon
  - crossed the Rubicon
  - crossing the Rubicon
  short_explanation: To make an irreversible decision or take a decisive step that commits one to a course
    of action. The phrase originates from Julius Caesar's crossing of the Rubicon River in 49 BCE, which
    marked the start of a civil war in Rome.
  i18n_explanations:
    en: To make an irreversible decision or take a decisive step that commits one to a course of action.
      The phrase originates from Julius Caesar's crossing of the Rubicon River in 49 BCE, which marked
      the start of a civil war in Rome.
    es: Tomar una decisión irreversible o dar un paso decisivo que compromete a alguien con un curso de
      acción. La expresión proviene del cruce del río Rubicón por Julio César en el 49 a.C., que marcó
      el inicio de una guerra civil en Roma.
    fr: Prendre une décision irréversible ou franchir une étape décisive engageant irrévocablement une
      action. L'expression vient du franchissement du Rubicon par Jules César en 49 av. J.-C., déclenchant
      une guerre civile à Rome.
    de: Eine unwiderrufliche Entscheidung treffen oder einen entscheidenden Schritt wagen, der jemanden
      auf einen bestimmten Weg festlegt. Der Ausdruck stammt von Julius Caesars Überquerung des Rubikon
      im Jahr 49 v. Chr., die den Bürgerkrieg in Rom auslöste.
    it: Prendere una decisione irreversibile o compiere un passo decisivo che impegna irreversibilmente
      verso una linea d'azione. L'espressione deriva dall'attraversamento del Rubicone da parte di Giulio
      Cesare nel 49 a.C., che segnò l'inizio della guerra civile a Roma.
    pt: Tomar uma decisão irreversível ou dar um passo decisivo que compromete alguém com um curso de
      ação. A expressão vem da travessia do rio Rubicão por Júlio César em 49 a.C., que marcou o início
      de uma guerra civil em Roma.
    ru: Принять необратимое решение или сделать решительный шаг, который обязывает к определённому курсу
      действий. Выражение восходит к переходу Юлия Цезаря через реку Рубикон в 49 году до н.э., что положило
      начало гражданской войне в Риме.
    ja: 後戻りできない決断を下すこと、または行動の方向を決定づける重大な一歩を踏み出すこと。この表現は、紀元前49年にユリウス・カエサルがルビコン川を渡り、ローマ内戦のきっかけとなったことに由来します。
    zh: 做出不可逆转的决定或采取决定性的行动，使自己承诺于某一行动方针。此短语源于公元前49年尤利乌斯·恺撒横渡卢比孔河，由此引发了罗马内战。
    ar: اتخاذ قرار لا رجعة فيه أو اتخاذ خطوة حاسمة تلزم المرء بمسار معين. تأتي العبارة من عبور يوليوس
      قيصر لنهر روبيكون في عام 49 قبل الميلاد، والذي بدأ الحرب الأهلية في روما.
    he: לקבל החלטה בלתי הפיכה או לבצע צעד מכריע שמחייב לפעולה מסוימת. הביטוי נובע מחצייתו של יוליוס קיסר
      את נהר הרוביקון בשנת 49 לפנה"ס, אשר סימנה את תחילת מלחמת האזרחים ברומא.
