- id: en_cultural_reference_dances_with_wolves_8f2b9603
  language: en
  canonical_reference: Dances with wolves
  reference_type: cultural_reference
  surface_patterns:
  - dances with wolves
  - danced with wolves
  - dancing with wolves
  short_explanation: To interact harmoniously with a group or culture different from one's own. The phrase
    originates from the 1990 film 'Dances with Wolves,' where a Union Army officer befriends and assimilates
    into a Lakota Sioux tribe.
  i18n_explanations:
    en: To interact harmoniously with a group or culture different from one's own. The phrase originates
      from the 1990 film 'Dances with Wolves,' where a Union Army officer befriends and assimilates into
      a Lakota Sioux tribe.
    es: Interactuar en armonía con un grupo o cultura diferente al propio. La expresión proviene de la
      película de 1990 'Dances with Wolves', en la que un oficial del ejército de la Unión entabla amistad
      y se integra en una tribu lakota sioux.
    fr: S'intégrer harmonieusement à un groupe ou une culture différente de la sienne. L'expression vient
      du film de 1990 'Danse avec les loups', où un officier de l'armée de l'Union se lie d'amitié et
      s'intègre à une tribu lakota sioux.
    de: Harmonisch mit einer Gruppe oder Kultur interagieren, die sich von der eigenen unterscheidet.
      Der Ausdruck stammt aus dem Film 'Der mit dem Wolf tanzt' (1990), in dem ein Offizier der Unionsarmee
      Freundschaft schließt und sich in einen Lakota-Sioux-Stamm integriert.
    it: Interagire armoniosamente con un gruppo o una cultura diversa dalla propria. L'espressione deriva
      dal film del 1990 'Balla con i lupi', in cui un ufficiale dell'esercito dell'Unione stringe amicizia
      e si integra in una tribù dei Lakota Sioux.
    pt: Interagir harmonicamente com um grupo ou cultura diferente do seu. A expressão vem do filme de
      1990 'Danças com Lobos', em que um oficial do Exército da União faz amizade e se assimila a uma
      tribo lakota sioux.
    ru: Взаимодействовать гармонично с группой или культурой, отличной от своей. Выражение возникло из
      фильма 1990 года 'Танцы с волками', где офицер армии Союза подружился и ассимилировался в племя
      лакота сиу.
    ja: 自分とは異なる集団や文化と調和して交流すること。この表現は1990年の映画「ダンス・ウィズ・ウルブズ」に由来し、南北戦争中の北軍士官がラコタ・スー族と友好を深め、同化していく様子を描いています。
    zh: 与不同于自身的群体或文化和谐相处。此短语源于1990年的电影《与狼共舞》，讲述一位联邦军军官与拉科塔苏族部落结交并融入其中。
    ar: التفاعل بانسجام مع مجموعة أو ثقافة مختلفة عن ثقافتك. تأتي العبارة من فيلم 'Dances with Wolves'
      لعام 1990، حيث يصبح ضابط في جيش الاتحاد صديقًا ويتكامل مع قبيلة لاكوتا سيوكس.
    he: ליצור אינטראקציה הרמונית עם קבוצה או תרבות שונה משלך. הביטוי מגיע מהסרט 'רוקד עם זאבים' משנת 1990,
