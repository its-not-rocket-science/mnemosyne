    en: Refers to Jan van Eyck's 'Arnolfini Portrait,' which features a convex mirror reflecting the room
      and the artist himself. The mirror symbolizes truth, perspective, and the artist's role as a witness
      to the scene.
    es: Se refiere al 'Retrato de Arnolfini' de Jan van Eyck, que incluye un espejo convexo que refleja
      la habitación y al propio artista. El espejo simboliza la verdad, la perspectiva y el papel del
      artista como testigo de la escena.
    fr: Fait référence au 'Portrait des Arnolfini' de Jan van Eyck, qui présente un miroir convexe reflétant
      la pièce et l'artiste lui-même. Le miroir symbolise la vérité, la perspective et le rôle de l'artiste
      comme témoin de la scène.
    de: Bezieht sich auf Jan van Eycks 'Arnolfini-Porträt,' das einen konvexen Spiegel zeigt, der den
      Raum und den Künstler selbst widerspiegelt. Der Spiegel symbolisiert Wahrheit, Perspektive und die
      Rolle des Künstlers als Zeugen der Szene.
    it: Si riferisce al 'Ritratto degli Arnolfini' di Jan van Eyck, che presenta uno specchio convesso
      che riflette la stanza e l'artista stesso. Lo specchio simboleggia la verità, la prospettiva e il
      ruolo dell'artista come testimone della scena.
    pt: Refere-se ao 'Retrato de Arnolfini' de Jan van Eyck, que apresenta um espelho convexo refletindo
      o cômodo e o próprio artista. O espelho simboliza a verdade, a perspectiva e o papel do artista
      como testemunha da cena.
    ru: Относится к 'Портрету четы Арнольфини' Яна ван Эйка, на котором изображено выпуклое зеркало, отражающее
      комнату и самого художника. Зеркало символизирует истину, перспективу и роль художника как свидетеля
      сцены.
    ja: ヤン・ファン・エイクの「アルノルフィーニ夫妻像」を指し、凸面鏡に部屋と画家自身が映っています。鏡は真実、視点、そして画家がシーンの目撃者であることを象徴しています。
    zh: 指代扬·范·艾克的《阿诺菲尼夫妇像》，画中有一面凸面镜反射出房间与画家本人。这面镜子象征着真相、透视与画家作为场景见证者的角色。
