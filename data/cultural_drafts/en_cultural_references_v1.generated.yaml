- id: en_cultural_reference_a_david_oath_of_the_horatii_1f591826
  language: en
  canonical_reference: A David Oath of the Horatii
  reference_type: cultural_reference
  surface_patterns:
  - a David Oath of the Horatii
  - David's Oath of the Horatii
  - the Oath of the Horatii by David
  - a neoclassical painting like David's Oath of the Horatii
  short_explanation: Refers to Jacques-Louis David's 1784 painting 'The Oath of the Horatii', a seminal
    work of Neoclassicism symbolizing patriotism, sacrifice, and civic duty. Often invoked to evoke themes
    of loyalty and heroism.
  i18n_explanations:
    en: Refers to Jacques-Louis David's 1784 painting 'The Oath of the Horatii', a seminal work of Neoclassicism
      symbolizing patriotism, sacrifice, and civic duty. Often invoked to evoke themes of loyalty and
      heroism.
    es: Se refiere a la pintura de Jacques-Louis David 'El juramento de los Horacios' (1784), obra fundamental
      del Neoclasicismo que simboliza el patriotismo, el sacrificio y el deber cívico. Se invoca para
      evocar lealtad y heroísmo.
    fr: Fait référence au tableau de Jacques-Louis David 'Le Serment des Horaces' (1784), œuvre fondatrice
      du néoclassicisme symbolisant le patriotisme, le sacrifice et le devoir civique. Souvent invoquée
      pour évoquer la loyauté et l'héroïsme.
    de: Bezieht sich auf Jacques-Louis Davids Gemälde 'Der Schwur der Horatier' (1784), ein grundlegendes
      Werk des Klassizismus, das Patriotismus, Opferbereitschaft und Pflichtbewusstsein symbolisiert.
      Wird oft verwendet, um Loyalität und Heldentum zu beschwören.
    it: Si riferisce al dipinto di Jacques-Louis David 'Il giuramento degli Orazi' (1784), opera fondamentale
      del Neoclassicismo che simboleggia patriottismo, sacrificio e dovere civico. Spesso evocato per
      temi di lealtà ed eroismo.
    pt: Refere-se à pintura de Jacques-Louis David 'O Juramento dos Horácios' (1784), obra seminal do
      Neoclassicismo que simboliza patriotismo, sacrifício e dever cívico. Invocada para evocar lealdade
      e heroísmo.
    ru: Относится к картине Жака-Луи Давида 'Клятва Горациев' (1784), ключевому произведению неоклассицизма,
      символизирующему патриотизм, самопожертвование и гражданский долг. Часто используется для передачи
      тем верности и героизма.
    ja: ジャック＝ルイ・ダヴィッドの「ホラティウス兄弟の誓い」（1784年）を指す。新古典主義の代表作で、愛国心、犠牲、市民の義務を象徴。忠誠心や英雄主義を喚起する際に引用される。
    zh: 指代雅克-路易·大卫的《荷拉斯兄弟的誓言》（1784年），新古典主义的代表作，象征爱国主义、牺牲与公民义务。常用于引发忠诚与英雄主义主题。
    ar: يشير إلى لوحة جاك لوي دافيد "يمين الحوراسيين" (1784)، عمل أساسي في الكلاسيكية الجديدة يرمز إلى
      الوطنية والتضحية والواجب المدني. غالبًا ما يستشهد به لاستحضار الولاء والبسالة.
    he: מתייחס לציורו של ז'אק-לואי דavid 'שבועת ההוראטים' (1784), יצירת מופת נאו-קלאסית המסמלת פטריוטיות,
      הקרבה וחובה אזרחית. לעיתים מצוטט כדי לעורר נושא נאמנות וגבורה.
