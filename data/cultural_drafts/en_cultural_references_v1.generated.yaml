- id: en_proverb_tradition_as_mad_as_a_march_hare_17554233
  language: en
  canonical_reference: As mad as a March hare
  reference_type: proverb_tradition
  surface_patterns:
  - as mad as a March hare
  - mad as a March hare
  - March hare madness
  short_explanation: Describes someone acting wildly or eccentrically, particularly in springtime. The
    phrase stems from observations of hares' erratic behavior during mating season in March.
  i18n_explanations:
    en: Describes someone acting wildly or eccentrically, particularly in springtime. The phrase stems
      from observations of hares' erratic behavior during mating season in March.
    es: Describe a alguien que actúa de manera salvaje o excéntrica, especialmente en primavera. La expresión
      proviene de la observación del comportamiento errático de las liebres durante la temporada de apareamiento
      en marzo.
    fr: Décrit quelqu'un qui agit de manière sauvage ou excentrique, surtout au printemps. L'expression
      vient de l'observation du comportement erratique des lièvres pendant la saison des amours en mars.
    de: Beschreibt jemanden, der wild oder exzentrisch handelt, besonders im Frühling. Der Ausdruck stammt
      von der Beobachtung des unberechenbaren Verhaltens von Hasen während der Paarungszeit im März.
    it: Descrive qualcuno che agisce in modo selvaggio o eccentrico, soprattutto in primavera. La frase
      deriva dall'osservazione del comportamento imprevedibile delle lepri durante la stagione degli amori
      a marzo.
    pt: Descreve alguém que age de forma selvagem ou excêntrica, especialmente na primavera. A expressão
      vem da observação do comportamento errático das lebres durante a época de acasalamento em março.
    ru: Описывает того, кто ведет себя дико или эксцентрично, особенно весной. Фраза возникла из наблюдений
      за беспокойным поведением зайцев во время брачного сезона в марте.
    ja: 特に春に誰かが荒々しく奇妙に振る舞うことを表す。この表現は3月の交尾期に野うさぎが見せる不規則な行動に由来する。
    zh: 形容某人行为疯狂或古怪，尤指在春季。该短语源于对三月交配季节野兔行为异常的观察。
    ar: تصف شخصًا يتصرف بشكل جنوني أو غريب، خاصة في الربيع. العبارة مستمدة من ملاحظة سلوك الأرانب البرية
      غير المنتظم خلال موسم التزاوج في مارس.
    he: מתאר מישהו שפועל באופן פרוע או אקסצנטרי, במיוחד באביב. הביטוי נובע מהתבוננות בהתנהגות הבלתי צפויה
      של ארנבות בעונת הרבייה במרץ.
