- id: en_literary_reference_leviathan_s_sovereignty_b2b98794
  language: en
  canonical_reference: Leviathan's sovereignty
  reference_type: literary_reference
  surface_patterns:
  - Leviathan's sovereignty
  - the sovereignty of Leviathan
  - Leviathan sovereignty
  short_explanation: Refers to the absolute power and authority of the state as described in Thomas Hobbes'
    1651 political treatise 'Leviathan,' where the sovereign (monarch or assembly) holds undivided power
    to ensure social order and prevent civil war.
  i18n_explanations:
    en: Refers to the absolute power and authority of the state as described in Thomas Hobbes' 1651 political
      treatise 'Leviathan,' where the sovereign (monarch or assembly) holds undivided power to ensure
      social order and prevent civil war.
    es: Se refiere al poder y autoridad absoluta del Estado, como se describe en el tratado político de
      Thomas Hobbes 'Leviatán' (1651), donde el soberano (monarca o asamblea) ejerce un poder indiviso
      para garantizar el orden social y evitar la guerra civil.
    fr: Désigne le pouvoir et l'autorité absolue de l'État, tel que décrit dans le traité politique de
      Thomas Hobbes 'Léviathan' (1651), où le souverain (monarque ou assemblée) détient un pouvoir indivis
      pour assurer l'ordre social et éviter la guerre civile.
    de: Bezieht sich auf die absolute Macht und Autorität des Staates, wie in Thomas Hobbes' politischem
      Werk 'Leviathan' (1651) beschrieben, in dem der Souverän (Monarch oder Versammlung) ungeteilte Macht
      besitzt, um soziale Ordnung zu gewährleisten und Bürgerkrieg zu verhindern.
    it: Si riferisce al potere e all'autorità assoluta dello Stato, come descritto nel trattato politico
      di Thomas Hobbes 'Leviatano' (1651), in cui il sovrano (monarca o assemblea) detiene un potere indiviso
      per garantire l'ordine sociale e prevenire la guerra civile.
    pt: Refere-se ao poder e autoridade absoluta do Estado, como descrito no tratado político de Thomas
      Hobbes 'Leviatã' (1651), onde o soberano (monarca ou assembleia) detém poder indiviso para garantir
      a ordem social e evitar a guerra civil.
    ru: Означает абсолютную власть и авторитет государства, как описано в политическом трактате Томаса
      Гоббса 'Левиафан' (1651), где суверен (монарх или собрание) обладает нераздельной властью для поддержания
      социального порядка и предотвращения гражданской войны.
    ja: トマス・ホッブズの政治論「リヴァイアサン」（1651年）で述べられた、国家の絶対的な権力と権威を指す。主権者（君主または議会）が分割されない権力を持ち、社会秩序を維持し内戦を防ぐ。
    zh: 指托马斯·霍布斯1651年政治著作《利维坦》中描述的国家绝对权力与权威，其中主权者（君主或议会）拥有不可分割的权力以维护社会秩序并防止内战。
    ar: يشير إلى السلطة المطلقة للدولة وسلطتها كما وصفها توماس هوبز في كتابه السياسي "الليفياثان" (1651)،
      حيث يمتلك الحاكم (ملك أو مجلس) سلطة مطلقة غير مجزأة لضمان النظام الاجتماعي ومنع الحرب الأهلية.
    he: מתייחס לכוחו המוחלט והסמכות של המדינה כפי שתואר בחיבורו הפוליטי של תומס הובס 'לווייתן' (1651),
      בו הריבון (מונרך או אספה) מחזיק בכוח בלתי מחולק כדי להבטיח סדר חברתי ולמנוע מלחמת אזרחים.
