- id: en_classical_or_scriptural_allusion_epistēmē_and_doxa_a740c758
  language: en
  canonical_reference: Epistēmē and doxa
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - epistēmē and doxa
  - epistēmē vs. doxa
  - epistēmē and doxa distinction
  - epistēmē and doxa in Plato
  short_explanation: In classical Greek philosophy, 'epistēmē' refers to true knowledge or science, while
    'doxa' denotes mere opinion or belief. This distinction is central to Plato's epistemology, particularly
    in works like the Republic.
  i18n_explanations:
    en: In classical Greek philosophy, 'epistēmē' refers to true knowledge or science, while 'doxa' denotes
      mere opinion or belief. This distinction is central to Plato's epistemology, particularly in works
      like the Republic.
    es: En la filosofía griega clásica, 'epistēmē' se refiere al conocimiento verdadero o ciencia, mientras
      que 'doxa' denota una simple opinión o creencia. Esta distinción es clave en la epistemología de
      Platón, especialmente en obras como 'La República'.
    fr: Dans la philosophie grecque classique, 'epistēmē' désigne la connaissance vraie ou la science,
      tandis que 'doxa' renvoie à une simple opinion ou croyance. Cette distinction est centrale dans
      l'épistémologie de Platon, notamment dans des œuvres comme 'La République'.
    de: In der klassischen griechischen Philosophie bezieht sich 'epistēmē' auf wahres Wissen oder Wissenschaft,
      während 'doxa' bloße Meinung oder Glauben bezeichnet. Diese Unterscheidung ist zentral für Platons
      Erkenntnistheorie, insbesondere in Werken wie 'Der Staat'.
    it: Nella filosofia greca classica, 'epistēmē' indica la conoscenza vera o la scienza, mentre 'doxa'
      denota una semplice opinione o credenza. Questa distinzione è fondamentale nella teoria della conoscenza
      di Platone, soprattutto in opere come 'La Repubblica'.
    pt: Na filosofia grega clássica, 'epistēmē' refere-se ao conhecimento verdadeiro ou ciência, enquanto
      'doxa' denota mera opinião ou crença. Essa distinção é central na epistemologia de Platão, especialmente
      em obras como 'A República'.
    ru: В классической греческой философии 'epistēmē' означает истинное знание или науку, тогда как 'doxa'
      — всего лишь мнение или убеждение. Это различие лежит в основе эпистемологии Платона, особенно в
      таких произведениях, как 'Государство'.
    ja: 古代ギリシャ哲学では、「エピステーメー（epistēmē）」は真の知識や科学を指し、「ドクサ（doxa）」は単なる意見や信念を表します。この区別はプラトンの認識論、特に「国家」などの著作で中心的な役割を果たしています。
    zh: 在古希腊哲学中，「epistēmē」指的是真知或科学，「doxa」则指仅仅是意见或信念。这种区分是柏拉图认识论的核心，特别是在《理想国》等著作中。
    ar: في الفلسفة اليونانية الكلاسيكية، يشير مصطلح 'epistēmē' إلى المعرفة الحقيقية أو العلم، بينما يدل
      'doxa' على مجرد رأي أو اعتقاد. هذا التمييز أساسي في نظرية المعرفة لأفلاطون، لا سيما في أعماله مثل
      'الجمهورية'.
    he: בפילוסופיה היוונית הקלאסית, 'epistēmē' מתייחסת לידע האמיתי או למדע, בעוד 'doxa' מציינת דעה או
      אמונה בלבד. ההבחנה הזו מרכזית באפיסטמולוגיה של אפלטון, במיוחד ביצירות כמו 'המדינה'.
