- id: en_cultural_reference_the_dust_bowl_62583f1b
  language: en
  canonical_reference: The Dust Bowl
  reference_type: cultural_reference
  surface_patterns:
  - the Dust Bowl
  - Dust Bowl
  - the Dust Bowl (1930s)
  short_explanation: A period of severe dust storms in the 1930s that greatly damaged the ecology and
    agriculture of the American and Canadian prairies, displacing millions and exacerbating the Great
    Depression. It symbolizes environmental disaster and human resilience.
  i18n_explanations:
    en: A period of severe dust storms in the 1930s that greatly damaged the ecology and agriculture of
      the American and Canadian prairies, displacing millions and exacerbating the Great Depression. It
      symbolizes environmental disaster and human resilience.
    es: Un período de severas tormentas de polvo en los años 1930 que dañó gravemente la ecología y la
      agricultura de las praderas estadounidenses y canadienses, desplazando a millones y agravando la
      Gran Depresión. Simboliza el desastre ambiental y la resiliencia humana.
    fr: Une période de violentes tempêtes de poussière dans les années 1930 qui a gravement endommagé
      l'écologie et l'agriculture des Grandes Plaines américaines et canadiennes, déplaçant des millions
      de personnes et aggravant la Grande Dépression. Elle symbolise la catastrophe environnementale et
      la résilience humaine.
    de: Eine Phase schwerer Staubstürme in den 1930er Jahren, die die Ökologie und Landwirtschaft der
      amerikanischen und kanadischen Prärien stark schädigte, Millionen vertrieb und die Große Depression
      verschärfte. Sie steht für eine Umweltkatastrophe und menschliche Widerstandsfähigkeit.
    it: Un periodo di violente tempeste di polvere negli anni 1930 che danneggiò gravemente l'ecologia
      e l'agricoltura delle praterie americane e canadesi, spostando milioni di persone e aggravando la
      Grande Depressione. Simboleggia il disastro ambientale e la resilienza umana.
    pt: Um período de severas tempestades de poeira na década de 1930 que danificou gravemente a ecologia
      e a agricultura das pradarias americanas e canadenses, deslocando milhões e agravando a Grande Depressão.
      Simboliza o desastre ambiental e a resiliência humana.
    ru: Период сильных пыльных бурь в 1930-х годах, который нанес серьезный ущерб экологии и сельскому
      хозяйству американских и канадских прерий, вынудив миллионы людей покинуть свои дома и усугубив
      Великую депрессию. Это символ экологической катастрофы и человеческой стойкости.
    ja: 1930年代にアメリカとカナダの大草原で発生した激しい砂嵐の時代で、生態系と農業に大きな被害を与え、数百万人を追放し、世界大恐慌を悪化させた。環境災害と人間のレジリエンスの象徴。
    zh: 20世纪30年代美国和加拿大大草原地区发生的严重沙尘暴，严重破坏生态和农业，导致数百万人流离失所并加剧了大萧条。这是环境灾难和人类韧性的象征。
    ar: فترة العواصف الترابية الشديدة في ثلاثينيات القرن الماضي، التي ألحقت أضرارًا كبيرة بالبيئة والزراعة
      في السهول الأمريكية والكندية، مما أدى إلى نزوح الملايين وتفاقم الكساد الكبير. يرمز إلى الكارثة البيئية
      ومرونة الإنسان.
    he: תקופה של סופות אבק קשות בשנות ה-1930 שהזיקו קשות לאקולוגיה ולחקלאות בערבות ארצות הברית וקנדה,
      גרמו לעקירת מיליונים והחמירו את השפל הגדול. סמל לאסון סביבתי וחוסן אנושי.
