- id: en_classical_or_scriptural_allusion_achilles_in_the_tent_0e1b9218
  language: en
  canonical_reference: Achilles in the tent
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Achilles in his tent
  - Achilles in the tent
  - Achilles' tent
  short_explanation: Refers to a person who withdraws from active participation, often due to pride or
    resentment. It originates from Achilles' refusal to fight in the Trojan War after his quarrel with
    Agamemnon.
  i18n_explanations:
    en: Refers to a person who withdraws from active participation, often due to pride or resentment.
      It originates from Achilles' refusal to fight in the Trojan War after his quarrel with Agamemnon.
    es: Se refiere a una persona que se retira de la participación activa, a menudo por orgullo o resentimiento.
      Proviene de la negativa de Aquiles a luchar en la guerra de Troya tras su disputa con Agamenón.
    fr: Désigne une personne qui se retire de la participation active, souvent par orgueil ou ressentiment.
      Vient du refus d'Achille de combattre lors de la guerre de Troie après sa querelle avec Agamemnon.
    de: Bezeichnet eine Person, die sich aus aktiver Teilnahme zurückzieht, oft aus Stolz oder Groll.
      Stammt aus Achills Weigerung, nach dem Streit mit Agamemnon im Trojanischen Krieg zu kämpfen.
    it: Si riferisce a una persona che si ritira dalla partecipazione attiva, spesso per orgoglio o risentimento.
      Deriva dal rifiuto di Achille di combattere nella guerra di Troia dopo la lite con Agamennone.
    pt: Refere-se a uma pessoa que se afasta da participação ativa, muitas vezes por orgulho ou ressentimento.
      Origina-se da recusa de Aquiles de lutar na Guerra de Troia após sua briga com Agamemnon.
    ru: Означает человека, который отказывается от активного участия, часто из-за гордости или обиды.
      Происходит от отказа Ахилла сражаться в Троянской войне после ссоры с Агамемноном.
    ja: プライドや恨みから、積極的な参加を拒む人のことを指す。トロイ戦争でアガメムノンとの口論の後、アキレスが戦いを拒否したことに由来する。
    zh: 指因骄傲或怨恨而退出积极参与的人。源于阿喀琉斯在与阿伽门农争吵后拒绝参加特洛伊战争。
    ar: يشير إلى شخص ينسحب من المشاركة النشطة، غالبًا بسبب الكبرياء أو الاستياء. ينشأ من رفض آخيل القتال
      في حرب طروادة بعد شجار مع أغاممنون.
    he: מתייחס לאדם שפורש מהשתתפות פעילה, לרוב בשל גאווה או טינה. מקורו בסירובו של אכילס להילחם במלחמת
      טרויה לאחר ריב עם אגממנון.
