    ru: Слова Иисуса на кресте, в которых он просит Бога простить тех, кто распял его по неведению. Олицетворяет
      милосердие и понимание к действующим без полного осознания.
    ja: 十字架にかけられたイエスの言葉で、無知ゆえに自分を十字架にかけた者たちを神が赦すよう願ったもの。無知ゆえの行動に対する慈悲と理解を象徴する。
    zh: 耶稣在十字架上的话，祈求上帝宽恕那些因无知而钉死他的人。象征着对无意识行为的仁慈与理解。
    ar: قول منسوب إلى يسوع على الصليب، يطلب من الله أن يغفر لمن صلبوه جهلاً منهم. يرمز إلى الرحمة والتفهم
