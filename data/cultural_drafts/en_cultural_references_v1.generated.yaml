- id: en_cultural_reference_a_goya_black_painting_2a8b4f8d
  language: en
  canonical_reference: A Goya black painting
  reference_type: cultural_reference
  surface_patterns:
  - a Goya black painting
  - Goya's black paintings
  - black paintings by Goya
  short_explanation: Refers to Francisco Goya's series of dark, haunting murals painted directly on the
    walls of his home, such as 'Saturn Devouring His Son' (1819–1823), reflecting themes of madness, violence,
    and existential dread.
  i18n_explanations:
    en: Refers to Francisco Goya's series of dark, haunting murals painted directly on the walls of his
      home, such as 'Saturn Devouring His Son' (1819–1823), reflecting themes of madness, violence, and
      existential dread.
    es: Se refiere a la serie de murales oscuros y perturbadores que Francisco Goya pintó directamente
      en las paredes de su casa, como 'Saturno devorando a su hijo' (1819–1823), que reflejan temas de
      locura, violencia y angustia existencial.
    fr: Fait référence à la série de fresques sombres et troublantes que Francisco Goya a peintes directement
      sur les murs de sa maison, comme 'Saturne dévorant son fils' (1819–1823), reflétant des thèmes de
      folie, de violence et de dread existentiel.
    de: Bezieht sich auf Goyas Serie düsterer, beunruhigender Wandgemälde, die er direkt an die Wände
      seines Hauses malte, wie 'Saturn verschlingt seinen Sohn' (1819–1823), die Themen wie Wahnsinn,
      Gewalt und existenzielle Angst widerspiegeln.
    it: Si riferisce alla serie di affreschi oscuri e inquietanti dipinti da Francisco Goya direttamente
      sulle pareti della sua casa, come 'Saturno che divora suo figlio' (1819–1823), che riflettono temi
      di follia, violenza e angoscia esistenziale.
    pt: Refere-se à série de murais sombrios e perturbadores que Francisco Goya pintou diretamente nas
      paredes de sua casa, como 'Saturno devorando seu filho' (1819–1823), refletindo temas de loucura,
      violência e angústia existencial.
    ru: Относится к серии мрачных, пугающих фресок Франсиско Гойи, написанных прямо на стенах его дома,
      таких как 'Сатурн, пожирающий своего сына' (1819–1823), отражающих темы безумия, насилия и экзистенциального
      ужаса.
    ja: フランシスコ・デ・ゴヤが自宅の壁に直接描いた暗く不気味な連作壁画、「我が子を食らうサトゥルヌス」（1819–1823）などを指し、狂気、暴力、存在の恐怖といったテーマを反映している。
    zh: 指的是弗朗西斯科·戈雅直接在家中墙壁上绘制的一系列阴暗、令人不安的壁画，如《农神吞噬自己的儿子》（1819–1823），反映了疯狂、暴力和存在恐惧等主题。
    ar: يشير إلى سلسلة من الجدران المظلمة والمقلقة التي رسمها فرانسيسكو غويا مباشرة على جدران منزله، مثل
      'زحل يلتهم ابنه' (1819–1823)، والتي تعكس مواضيع الجنون والعنف والخوف الوجودي.
    he: מתייחס לסדרת ציורי הקיר האפלים והמטרידים שפרנסיסקו גויה צייר ישירות על קירות ביתו, כמו 'שבתאי
      בולע את בנו' (1819–1823), המשקפים נושאים של טירוף, אלימות וחרדת הקיום.
