- id: en_cultural_reference_bread_and_circuses_72a8a11d
  language: en
  canonical_reference: Bread and circuses
  reference_type: cultural_reference
  surface_patterns:
  - bread and circuses
  - bread-and-circuses
  - panem et circenses
  short_explanation: A phrase criticizing policies designed to placate a population with superficial pleasures
    (bread) and entertainment (circuses) to distract from issues. Originates from Roman satirist Juvenal.
  i18n_explanations:
    en: A phrase criticizing policies designed to placate a population with superficial pleasures (bread)
      and entertainment (circuses) to distract from issues. Originates from Roman satirist Juvenal.
    es: Frase que critica políticas diseñadas para apaciguar a la población con placeres superficiales
      (pan) y entretenimiento (circos) para distraer de los problemas. Proviene del satirista romano Juvenal.
    fr: Expression critiquant des politiques visant à apaiser la population par des plaisirs superficiels
      (pain) et des divertissements (cirques) pour détourner l'attention des problèmes. Vient du satiriste
      romain Juvénal.
    de: Ein Ausdruck, der Politik kritisiert, die die Bevölkerung mit oberflächlichen Annehmlichkeiten
      (Brot) und Unterhaltung (Zirkus) ruhigstellen soll, um von Problemen abzulenken. Stammt vom römischen
      Satiriker Juvenal.
    it: Espressione che critica politiche volte a placare la popolazione con piaceri superficiali (pane)
      e intrattenimento (circhi) per distrarre dai problemi. Deriva dal satirico romano Giovenale.
    pt: Expressão que critica políticas destinadas a acalmar a população com prazeres superficiais (pão)
      e entretenimento (circos) para distrair dos problemas. Origina-se do satirista romano Juvenal.
    ru: Выражение, осуждающее политику, направленную на успокоение народа с помощью поверхностных удовольствий
      (хлеб) и развлечений (зрелища), чтобы отвлечь от проблем. Впервые встречается у римского сатирика
      Ювенала.
    ja: 表面的な快楽（パン）と娯楽（見世物）で民衆をなだめ、問題から注意をそらす政策を批判する言葉。ローマの風刺詩人ユウェナリスに由来する。
    zh: 批评用表面的享乐（面包）和娱乐（马戏）来安抚民众、转移对问题注意力的政策的短语。源自罗马讽刺作家朱韦纳尔。
    ar: عبارة تنتقد سياسات تهدف إلى تهدئة السكان بالملذات السطحية (الخبز) والترفيه (السيرك) لتشتيت الانتباه
      عن القضايا. تعود إلى الساخر الروماني جوفينال.
    he: ביטוי המבקר מדיניות שנועדה להרגיע את הציבור באמצעות הנאות שטחיות (לחם) ובידור (קרקסים) כדי להסיח
