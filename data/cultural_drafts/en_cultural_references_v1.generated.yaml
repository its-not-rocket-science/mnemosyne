- id: en_literary_reference_the_noble_savage_86a30ec1
  language: en
  canonical_reference: The noble savage
  reference_type: literary_reference
  surface_patterns:
  - the noble savage
  - noble savage
  - a noble savage
  short_explanation: A romanticized ideal of the 'uncivilized' human, uncorrupted by society, who embodies
    innate goodness and virtue. The phrase originates from 18th-century European literature, notably in
    works by Rousseau and Shakespeare.
  i18n_explanations:
    en: A romanticized ideal of the 'uncivilized' human, uncorrupted by society, who embodies innate goodness
      and virtue. The phrase originates from 18th-century European literature, notably in works by Rousseau
      and Shakespeare.
    es: Ideal romántico del ser humano 'incivilizado', no corrompido por la sociedad, que encarna la bondad
      y la virtud innatas. La expresión surge en la literatura europea del siglo XVIII, especialmente
      en obras de Rousseau y Shakespeare.
    fr: Idéal romantique de l'être humain 'non civilisé', non corrompu par la société, incarnant la bonté
      et la vertu innées. L'expression apparaît dans la littérature européenne du XVIIIe siècle, notamment
      dans les œuvres de Rousseau et Shakespeare.
    de: Ein romantisiertes Ideal des 'unzivilisierten' Menschen, der von der Gesellschaft unberührt bleibt
      und angeborene Güte und Tugend verkörpert. Der Begriff stammt aus der europäischen Literatur des
      18. Jahrhunderts, insbesondere aus Werken von Rousseau und Shakespeare.
    it: Ideale romantico dell'essere umano 'selvaggio', non corrotto dalla società, che incarna bontà
      e virtù innate. L'espressione nasce nella letteratura europea del XVIII secolo, soprattutto nelle
      opere di Rousseau e Shakespeare.
    pt: Ideal romântico do ser humano 'incivilizado', não corrompido pela sociedade, que encarna bondade
      e virtude inatas. A expressão surge na literatura europeia do século XVIII, notadamente em obras
      de Rousseau e Shakespeare.
    ru: Романтизированный идеал 'нецивилизованного' человека, не испорченного обществом, воплощающего
      врожденную доброту и добродетель. Выражение возникло в европейской литературе XVIII века, особенно
      в произведениях Руссо и Шекспира.
    ja: 未開の人間のロマン主義的理想像で、社会に汚されておらず、生来の善良さと美徳を体現している。この表現は18世紀のヨーロッパ文学、特にルソーやシェイクスピアの作品に由来する。
    zh: 浪漫主义理想中未受社会腐化的“未开化”人类，体现天生的善良与美德。该词源于18世纪欧洲文学， notably卢梭和莎士比亚的作品。
    ar: المثالية الرومانسية للإنسان 'البدائي' غير الفاسد من قبل المجتمع، والذي تجسد الخير الفطري والفضيلة.
      نشأت العبارة في الأدب الأوروبي في القرن الثامن عشر، ولا سيما في أعمال روسو وشكسبير.
    he: האידיאל הרומנטי של האדם 'הפראי', שלא ניזוק מהחברה, הטומן בחובו טוב ומעלות מולדים. הביטוי מקורו
      בספרות האירופית של המאה ה-18, במיוחד ביצירותיהם של רוסו ושייקספיר.
