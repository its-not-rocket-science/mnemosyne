- id: en_classical_or_scriptural_allusion_achilles_and_the_tortoise_dilemma_a312f6b7
  language: en
  canonical_reference: Achilles and the tortoise dilemma
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Achilles and the tortoise
  - Achilles and the tortoise paradox
  - the Achilles and tortoise dilemma
  - Achilles paradox
  short_explanation: A paradox from Zeno of Elea illustrating that motion is an illusion. Achilles, though
    faster, can never overtake a tortoise given a head start, challenging the concept of continuous motion.
  i18n_explanations:
    en: A paradox from Zeno of Elea illustrating that motion is an illusion. Achilles, though faster,
      can never overtake a tortoise given a head start, challenging the concept of continuous motion.
    es: Un paradigma de Zenón de Elea que ilustra que el movimiento es una ilusión. Aquiles, aunque más
      rápido, nunca puede alcanzar a una tortuga con ventaja inicial, desafiando el concepto de movimiento
      continuo.
    fr: Un paradoxe de Zénon d'Élée illustrant que le mouvement est une illusion. Achille, bien que plus
      rapide, ne peut jamais rattraper une tortue avec une avance initiale, remettant en cause le concept
      de mouvement continu.
    de: Ein Paradoxon von Zenon von Elea, das zeigt, dass Bewegung eine Illusion ist. Achilles kann, obwohl
      schneller, eine Schildkröte mit Vorsprung nie einholen, was das Konzept der kontinuierlichen Bewegung
      infrage stellt.
    it: Un paradosso di Zenone di Elea che illustra come il movimento sia un'illusione. Achille, pur essendo
      più veloce, non potrà mai raggiungere una tartaruga con un vantaggio iniziale, mettendo in discussione
      il concetto di moto continuo.
    pt: Um paradoxo de Zenão de Eleia que ilustra que o movimento é uma ilusão. Aquiles, embora mais rápido,
      nunca pode ultrapassar uma tartaruga com uma vantagem inicial, desafiando o conceito de movimento
      contínuo.
    ru: Парадокс Зенона из Элеи, иллюстрирующий иллюзорность движения. Ахиллес, хоть и быстрее, никогда
      не догонит черепаху с форой, ставя под сомнение концепцию непрерывного движения.
    ja: エレアのゼノンのパラドックスで、運動が幻想であることを示す。アキレスは速いが、先行するカメを追い越せないという問題で、連続的な運動の概念に疑問を投げかける。
    zh: 埃利亚的芝诺提出的悖论，说明运动是一种幻觉。尽管阿喀琉斯更快，但如果乌龟先出发，他永远无法超越，挑战了连续运动的概念。
    ar: مفارقة لزينون الإيلي توضح أن الحركة وهم. أخيل، رغم سرعته، لا يمكنه أبدًا تجاوز سلحفاة حصلت على
      تقدم، مما يتحدى مفهوم الحركة المستمرة.
    he: פרדוקס של זנון מאליאה המראה כי תנועה היא אשליה. אכילס, למרות מהירותו, לעולם לא ישיג צב שקיבל יתרון
      התחלתי, ובכך מאתגר את מושג התנועה הרציפה.
  learner_level: C2
