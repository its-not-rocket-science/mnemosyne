- id: en_literary_reference_a_room_of_one_s_own_7b1b9a8d
  language: en
  canonical_reference: A Room of One's Own
  reference_type: literary_reference
  surface_patterns:
  - a room of one's own
  - Room of One's Own
  short_explanation: A phrase symbolizing the need for personal space, financial independence, and creative
    freedom, especially for women. It originates from Virginia Woolf's 1929 essay arguing that women need
    both literal and metaphorical space to write fiction.
  i18n_explanations:
    en: A phrase symbolizing the need for personal space, financial independence, and creative freedom,
      especially for women. It originates from Virginia Woolf's 1929 essay arguing that women need both
      literal and metaphorical space to write fiction.
    es: Frase que simboliza la necesidad de espacio personal, independencia económica y libertad creativa,
      especialmente para las mujeres. Proviene de un ensayo de Virginia Woolf de 1929 que argumenta que
      las mujeres necesitan espacio tanto literal como metafórico para escribir ficción.
    fr: Expression symbolisant le besoin d'espace personnel, d'indépendance financière et de liberté créative,
      surtout pour les femmes. Elle vient d'un essai de Virginia Woolf de 1929 affirmant que les femmes
      ont besoin d'espace, tant littéral que métaphorique, pour écrire de la fiction.
    de: Ein Ausdruck, der den Bedarf an privatem Raum, finanzieller Unabhängigkeit und kreativer Freiheit
      symbolisiert, besonders für Frauen. Er stammt aus einem Essay von Virginia Woolf aus dem Jahr 1929,
      in dem sie argumentiert, dass Frauen sowohl wörtlichen als auch übertragenen Raum zum Schreiben
      brauchen.
    it: Un'espressione che simboleggia il bisogno di spazio personale, indipendenza economica e libertà
      creativa, soprattutto per le donne. Deriva da un saggio di Virginia Woolf del 1929 in cui sostiene
      che le donne hanno bisogno di spazio, sia letterale che metaforico, per scrivere narrativa.
    pt: Expressão que simboliza a necessidade de espaço pessoal, independência financeira e liberdade
      criativa, especialmente para as mulheres. Vem de um ensaio de Virginia Woolf de 1929, que argumenta
      que as mulheres precisam de espaço, tanto literal quanto metafórico, para escrever ficção.
    ru: Выражение, символизирующее необходимость личного пространства, финансовой независимости и творческой
      свободы, особенно для женщин. Впервые использовано в эссе Вирджинии Вулф 1929 года, где она утверждает,
      что женщинам нужно пространство — как буквальное, так и метафорическое — для писательского творчества.
    ja: 個人の空間、経済的独立、創造的自由の必要性を象徴する言葉。特に女性にとって重要で、ヴァージニア・ウルフの1929年のエッセイに由来し、女性が小説を書くには文字通りの空間と比喩的な空間の両方が必要だと主張している。
    zh: 象征着个人空间、经济独立和创作自由的必要性，尤其是对女性而言。源自弗吉尼亚·伍尔夫1929年的散文，她在文中主张女性需要实体和精神上的空间来创作小说。
    ar: تعبير يرمز إلى الحاجة إلى المساحة الشخصية والاستقلال المالي والحرية الإبداعية، خاصة للنساء. ينشأ
      من مقال لفرجينيا وولف عام 1929، حيث تدعو إلى ضرورة توفير مساحة مادية ومعنوية للنساء لكتابة الخيال.
    he: ביטוי המסמל את הצורך במרחב אישי, עצמאות כלכלית וחופש יצירתי, בעיקר עבור נשים. מקורו במאמר של וירג'יניה
      וולף משנת 1929, בו היא טוענת שנשים זקוקות למרחב הן במובן הפיזי והן המטפורי כדי לכתוב בדיונית.
