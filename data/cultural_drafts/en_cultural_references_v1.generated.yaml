- id: en_proverb_tradition_lion_s_share_1ed04e43
  language: en
  canonical_reference: Lion's share
  reference_type: proverb_tradition
  surface_patterns:
  - the lion's share
  - lion's share
  - a lion's share
  - the lion share
  short_explanation: A phrase meaning the largest or best part of something, derived from Aesop's fable
    where the lion claims all the spoils of a hunt. It reflects greed and dominance.
  i18n_explanations:
    en: A phrase meaning the largest or best part of something, derived from Aesop's fable where the lion
      claims all the spoils of a hunt. It reflects greed and dominance.
    es: Frase que significa la mayor o mejor parte de algo, basada en la fábula de Esopo donde el león
      reclama todo el botín de la caza. Refleja la avaricia y la dominación.
    fr: Une expression désignant la plus grande ou la meilleure partie de quelque chose, tirée de la fable
      d'Ésope où le lion s'attribue tout le butin de la chasse. Elle reflète la cupidité et la domination.
    de: Ein Ausdruck für den größten oder besten Teil von etwas, abgeleitet von der Fabel des Äsop, in
      der der Löwe sich die ganze Beute der Jagd aneignet. Er spiegelt Gier und Dominanz wider.
    it: Un'espressione che indica la parte più grande o migliore di qualcosa, tratta dalla favola di Esopo
      in cui il leone si appropria di tutto il bottino della caccia. Riflette avidità e dominio.
    pt: Uma expressão que significa a maior ou melhor parte de algo, originada da fábula de Esopo em que
      o leão reivindica todo o espólio da caçada. Reflete ganância e domínio.
    ru: Выражение, означающее самую большую или лучшую часть чего-либо, восходящее к басне Эзопа, где
      лев присваивает себе всю добычу охоты. Отражает жадность и доминирование.
    ja: 何かの最大または最良の部分を指す表現で、アエソプスの寓話でライオンが狩りの獲物を独占することに由来。貪欲と支配を反映している。
    zh: 一个成语，指某物最大或最好的部分，源自《伊索寓言》中狮子独占狩猎战利品的故事。体现贪婪与霸权。
    ar: عبارة تعني الجزء الأكبر أو الأفضل من شيء ما، مستمدة من حكاية إيسوب حيث يطالب الأسد بكل غنائم الصيد.
      تعكس الجشع والهيمنة.
    he: ביטוי שפירושו החלק הגדול או הטוב ביותר של משהו, שמקורו במשל של איזופוס בו האריה טוען לכל השלל
