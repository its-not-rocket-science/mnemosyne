- id: en_cultural_reference_down_with_the_bastille_f5fcec78
  language: en
  canonical_reference: Down with the Bastille
  reference_type: cultural_reference
  surface_patterns:
  - Down with the Bastille!
  - Down with the Bastille
  - À bas la Bastille!
  short_explanation: A revolutionary slogan from the French Revolution (1789), symbolizing the overthrow
    of tyranny and the monarchy. The Bastille was a prison representing royal oppression, and its fall
    marked the beginning of the revolution.
  i18n_explanations:
    en: A revolutionary slogan from the French Revolution (1789), symbolizing the overthrow of tyranny
      and the monarchy. The Bastille was a prison representing royal oppression, and its fall marked the
      beginning of the revolution.
    es: Eslogan revolucionario de la Revolución Francesa (1789), que simboliza el derrocamiento de la
      tiranía y la monarquía. La Bastilla era una prisión que representaba la opresión real, y su caída
      marcó el inicio de la revolución.
    fr: Slogan révolutionnaire de la Révolution française (1789), symbolisant le renversement de la tyrannie
      et de la monarchie. La Bastille était une prison incarnant l'oppression royale, et sa chute marqua
      le début de la révolution.
    de: Ein revolutionärer Schlachtruf aus der Französischen Revolution (1789), der den Sturz von Tyrannei
      und Monarchie symbolisiert. Die Bastille war ein Gefängnis, das die königliche Unterdrückung verkörperte,
      und ihr Fall markierte den Beginn der Revolution.
    it: Uno slogan rivoluzionario della Rivoluzione francese (1789), che simboleggia la caduta della tirannia
      e della monarchia. La Bastiglia era una prigione che rappresentava l'oppressione reale, e la sua
      caduta segnò l'inizio della rivoluzione.
    pt: Um slogan revolucionário da Revolução Francesa (1789), simbolizando a derrubada da tirania e da
      monarquia. A Bastilha era uma prisão que representava a opressão real, e sua queda marcou o início
      da revolução.
    ru: Революционный лозунг времен Великой французской революции (1789), символизирующий свержение тирании
      и монархии. Бастилия была тюрьмой, олицетворявшей королевское угнетение, и ее падение ознаменовало
      начало революции.
    ja: フランス革命（1789年）の革命的スローガンで、専制と王政の打倒を象徴する。バスティーユ牢獄は王権の圧政を表す監獄であり、その陥落が革命の始まりとなった。
    zh: 法国大革命（1789年）的革命口号，象征推翻暴政与君主制。巴士底狱是象征王室压迫的监狱，其陷落标志着革命的开始。
    ar: شعار ثوري من الثورة الفرنسية (1789)، يرمز إلى إسقاط الطغيان والملكية. كانت الباستيل سجنًا يمثل
      القمع الملكي، وسقوطها كان بداية الثورة.
    he: סיסמה מהפכנית ממהפכת צרפת (1789), המסמלת את הפלת העריצות והמונרכיה. הבסטיליה הייתה כלא שסימל את
