    ja: ジョージ・オーウェルのディストピア小説に登場する、全体主義的監視と政府統制を象徴する言葉。常に市民を監視する権力の存在を表す。
    zh: 源自乔治·奥威尔反乌托邦小说的一个短语，象征极权主义监控与政府控制，其中无所不在的权力机构不间断地监视着公民。
