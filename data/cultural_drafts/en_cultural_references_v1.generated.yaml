    es: El Kraken es un monstruo marino legendario del folclore escandinavo, a menudo representado como
      un calamar o pulpo gigante capaz de arrastrar barcos bajo el agua. 'Ira' enfatiza su poder destructivo.
    fr: Le Kraken est un monstre marin légendaire issu du folklore scandinave, souvent représenté comme
      un calmar ou une pieuvre géante capable d'entraîner des navires sous l'eau. 'Colère' souligne son
      pouvoir destructeur.
    de: Der Kraken ist ein legendäres Seeungeheuer aus skandinavischem Volksglauben, oft als riesiger
      Tintenfisch oder Oktopus dargestellt, der Schiffe unter Wasser ziehen kann. 'Zorn' betont seine
      zerstörerische Kraft.
    it: Il Kraken è una leggendaria creatura marina del folclore scandinavo, spesso raffigurato come un
      calamaro o un polpo gigante in grado di trascinare navi sott'acqua. 'Ira' sottolinea il suo potere
      distruttivo.
    pt: O Kraken é um monstro marinho lendário do folclore escandinavo, geralmente retratado como um polvo
      ou lula gigante capaz de afundar navios. 'Ira' enfatiza seu poder destrutivo.
    ru: Кракен — легендарный морской монстр из скандинавского фольклора, часто изображаемый как гигантский
      кальмар или осьминог, способный топить корабли. 'Гнев' подчеркивает его разрушительную мощь.
    ja: クラーケンはスカンジナビアの伝承に登場する伝説の海の怪物で、巨大なタコやイカのように描かれ、船を海中に引きずり込むとされる。その「怒り」は破壊的な力を強調している。
    zh: 克拉肯是来自斯堪的纳维亚民间传说的传奇海怪，常被描绘为巨型章鱼或乌贼，能将船只拖入水下。‘愤怒’强调了其破坏力。
    ar: الكراكن هو وحش بحري أسطوري من الفولكلور الإسكندنافي، غالبًا ما يُصوَّر كحبار عملاق أو أخطبوط قادر
