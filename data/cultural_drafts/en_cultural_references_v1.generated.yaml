  short_explanation: Refers to the mythical stables of King Augeas, which had never been cleaned and were
    purged by Heracles as one of his twelve labors. Symbolizes an extremely difficult or unpleasant task,
    often one that seems impossible to complete.
  i18n_explanations:
    en: Refers to the mythical stables of King Augeas, which had never been cleaned and were purged by
      Heracles as one of his twelve labors. Symbolizes an extremely difficult or unpleasant task, often
      one that seems impossible to complete.
    es: Se refiere a los establos míticos del rey Augías, que nunca habían sido limpiados y fueron purgados
      por Heracles como uno de sus doce trabajos. Simboliza una tarea extremadamente difícil o desagradable,
      a menudo parece imposible de completar.
    fr: Fait référence aux écuries mythiques du roi Augias, qui n'avaient jamais été nettoyées et furent
      purgées par Hercule dans le cadre de ses douze travaux. Symbolise une tâche extrêmement difficile
      ou désagréable, souvent perçue comme impossible à accomplir.
    de: Bezieht sich auf die mythischen Ställe des Königs Augeias, die niemals gereinigt worden waren
      und von Herakles im Rahmen seiner zwölf Arbeiten gesäubert wurden. Steht für eine extrem schwierige
      oder unangenehme Aufgabe, die oft unmöglich erscheint.
    it: Si riferisce alle stalle mitiche del re Augia, mai pulite e purificate da Ercole come una delle
      sue dodici fatiche. Simboleggia un compito estremamente difficile o sgradevole, spesso apparentemente
      impossibile da completare.
    pt: Refere-se aos estábulos míticos do rei Augias, que nunca haviam sido limpos e foram purgados por
      Héracles como um de seus doze trabalhos. Simboliza uma tarefa extremamente difícil ou desagradável,
      muitas vezes parece impossível de completar.
    ru: Олицетворяет мифические конюшни царя Авгия, которые никогда не чистились и были очищены Гераклом
      в рамках его двенадцати подвигов. Символизирует чрезвычайно трудную или неприятную задачу, которая
      часто кажется невыполнимой.
    ja: ヘラクレスによって12の功業の一つとして清められた、決して掃除されたことのないアウゲイアス王の mythical な厩舎を指す。極めて困難で不快な仕事、しばしば達成不可能に見えるものを象徴する。
    zh: 指奥革阿斯国王的神话马厩，从未被清理过，后由赫拉克勒斯在其十二项功绩中清理。象征极其困难或令人不快的任务，常指看似不可能完成的工作。
