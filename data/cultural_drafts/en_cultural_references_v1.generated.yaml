- id: en_proverb_tradition_if_the_cap_fits_wear_it_425a365c
  language: en
  canonical_reference: If the cap fits, wear it
  reference_type: proverb_tradition
  surface_patterns:
  - If the cap fits, wear it
  - If the shoe fits, wear it
  short_explanation: This proverb advises accepting criticism or blame if it applies to you. It suggests
    that if someone's words or accusations are accurate, you should acknowledge them rather than deny
    the truth.
  i18n_explanations:
    en: This proverb advises accepting criticism or blame if it applies to you. It suggests that if someone's
      words or accusations are accurate, you should acknowledge them rather than deny the truth.
    es: Este refrán aconseja aceptar las críticas o culpas si te corresponden. Sugiere que, si las palabras
      o acusaciones de alguien son ciertas, debes reconocerlas en lugar de negar la verdad.
    fr: Ce proverbe conseille d'accepter les critiques ou les reproches si elles vous concernent. Il suggère
      que, si les paroles ou accusations de quelqu'un sont justes, vous devriez les reconnaître plutôt
      que de nier la vérité.
    de: Dieses Sprichwort rät, Kritik oder Schuld anzunehmen, wenn sie auf einen zutreffen. Es besagt,
      dass man die Worte oder Vorwürfe anderer anerkennen sollte, wenn sie zutreffend sind, statt die
      Wahrheit zu leugnen.
    it: Questo proverbio consiglia di accettare le critiche o le colpe se ti si addicono. Suggerisce che,
      se le parole o le accuse di qualcuno sono vere, dovresti riconoscerle piuttosto che negare la verità.
    pt: Este provérbio aconselha a aceitar críticas ou culpas se elas se aplicam a você. Sugere que, se
      as palavras ou acusações de alguém forem verdadeiras, você deve reconhecê-las em vez de negar a
      verdade.
    ru: Эта пословица советует принимать критику или вину, если они к вам относятся. Она предполагает,
      что если чьи-то слова или обвинения справедливы, вам следует признать их, а не отрицать правду.
    ja: このことわざは、自分に当てはまる批判や非難を受け入れるよう助言します。誰かの言葉や非難が正しい場合、それを認めるべきであり、真実を否定すべきではないと示唆しています。
    zh: 这句谚语建议，如果批评或指责适用于你，就应该接受。它的意思是，如果别人的言辞或指控属实，你应该承认，而不是否认事实。
    ar: هذا المثل ينصح بقبول النقد أو اللوم إذا كان ينطبق عليك. وهو يقترح أنه إذا كانت كلمات أو اتهامات
