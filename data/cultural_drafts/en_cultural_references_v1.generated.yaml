- id: en_cultural_reference_bite_the_bullet_52000c21
  language: en
  canonical_reference: Bite the bullet
  reference_type: cultural_reference
  surface_patterns:
  - bite the bullet
  - biting the bullet
  - bite the bullet and make the best of it
  short_explanation: To endure a painful situation with courage or resolve, often without complaint. The
    phrase likely originates from the practice of having patients bite on a bullet during surgery before
    anesthesia to avoid screaming.
  i18n_explanations:
    en: To endure a painful situation with courage or resolve, often without complaint. The phrase likely
      originates from the practice of having patients bite on a bullet during surgery before anesthesia
      to avoid screaming.
    es: Soportar una situación dolorosa con valentía o determinación, a menudo sin quejarse. La expresión
      probablemente proviene de la práctica de hacer que los pacientes mordieran una bala durante una
      cirugía antes de la anestesia para evitar gritos.
    fr: Endurer une situation douloureuse avec courage ou détermination, souvent sans se plaindre. L'expression
      vient probablement de la pratique de faire mordre une balle aux patients pendant une opération avant
      l'anesthésie pour éviter les cris.
    de: Eine schmerzhafte Situation mit Mut oder Entschlossenheit ertragen, oft ohne zu klagen. Der Ausdruck
      stammt wahrscheinlich aus der Praxis, Patienten vor einer Operation ohne Betäubung eine Kugel beißen
      zu lassen, um Schreie zu vermeiden.
    it: Affrontare una situazione dolorosa con coraggio o determinazione, spesso senza lamentarsi. La
      frase probabilmente deriva dalla pratica di far mordere una pallottola ai pazienti durante un intervento
      chirurgico prima dell'anestesia per evitare urla.
    pt: Suportar uma situação dolorosa com coragem ou determinação, muitas vezes sem reclamar. A expressão
      provavelmente vem da prática de fazer pacientes morderem uma bala durante uma cirurgia antes da
      anestesia para evitar gritos.
    ru: Стоять насмерть в болезненной ситуации с мужеством или решимостью, часто без жалоб. Фраза, вероятно,
      возникла из практики заставлять пациентов кусать пулю во время операции до введения анестезии, чтобы
      избежать криков.
    ja: 痛みを伴う状況に勇気や決意を持って耐えること。この表現は、手術前に患者に麻酔なしで弾丸を噛ませて叫び声を上げないようにした慣習に由来するとされる。
    zh: 指以勇气或决心忍受痛苦的处境，通常不发出抱怨。该短语可能源于让患者在手术前未经麻醉时咬住子弹以避免喊叫的做法。
    ar: تحمل موقف مؤلم بالشجاعة أو العزيمة، غالبًا دون شكوى. من المحتمل أن العبارة تأتي من ممارسة جعل
      المرضى يعضون رصاصة أثناء الجراحة قبل التخدير لتجنب الصراخ.
    he: לסבול מצב כואב באומץ או נחישות, לרוב ללא תלונות. הביטוי כנראה נובע מהמנהג לגרום למטופלים לנשוך
      כדור במהלך ניתוח לפני הרדמה כדי למנוע צעקות.
