- id: en_proverb_tradition_caesar_s_wife_must_be_above_suspicion_e329b419
  language: en
  canonical_reference: Caesar’s wife must be above suspicion
  reference_type: proverb_tradition
  surface_patterns:
  - Caesar's wife must be above suspicion
  - Caesar's wife is above suspicion
  - wife of Caesar must be above suspicion
  short_explanation: A proverb emphasizing the need for unblemished reputation, especially for those in
    positions of power or scrutiny. Originates from the suspicion surrounding Julius Caesar's wife, Pompeia,
    during the Bona Dea scandal.
  i18n_explanations:
    en: A proverb emphasizing the need for unblemished reputation, especially for those in positions of
      power or scrutiny. Originates from the suspicion surrounding Julius Caesar's wife, Pompeia, during
      the Bona Dea scandal.
    es: Un proverbio que enfatiza la necesidad de una reputación intachable, especialmente para quienes
      ocupan puestos de poder o son objeto de escrutinio. Proviene de la sospecha que rodeó a Pompeya,
      esposa de Julio César, durante el escándalo de la Bona Dea.
    fr: Un proverbe soulignant la nécessité d'une réputation irréprochable, surtout pour ceux qui occupent
      des postes de pouvoir ou sont sous surveillance. Vient des soupçons entourant l'épouse de Jules
      César, Pompeia, lors du scandale de la Bona Dea.
    de: Ein Sprichwort, das die Notwendigkeit eines makellosen Rufs betont, besonders für Menschen in
      Machtpositionen oder unter Beobachtung. Stammt aus dem Verdacht um die Ehefrau Julius Caesars, Pompeia,
      während des Bona-Dea-Skandals.
    it: Un proverbio che sottolinea la necessità di una reputazione impeccabile, soprattutto per chi ricopre
      cariche di potere o è sotto scrutinio. Deriva dal sospetto che circondò Pompeia, moglie di Giulio
      Cesare, durante lo scandalo della Bona Dea.
    pt: Um provérbio que enfatiza a necessidade de uma reputação impecável, especialmente para aqueles
      em posições de poder ou sob escrutínio. Origina-se da suspeita que cercou Pompeia, esposa de Júlio
      César, durante o escândalo da Bona Dea.
    ru: Поговорка, подчеркивающая необходимость безупречной репутации, особенно для тех, кто находится
      у власти или под пристальным вниманием. Происходит от подозрений в адрес жены Юлия Цезаря, Помпеи,
      во время скандала с Бона Деа.
    ja: 権力者や注目の的となる者には、疑惑の余地のない清廉な評判が必要であることを強調することわざ。ユリウス・カエサルの妻ポンペイアがボナ・デアのスキャンダルで疑われたことに由来する。
    zh: 强调权力者或备受关注者必须保持清白名声的谚语。源于儒略·恺撒之妻庞培娅在博那·迪亚丑闻中受到的怀疑。
    ar: مثل يسلط الضوء على ضرورة سمعة لا تشوبها شائبة، خاصة لمن هم في مناصب السلطة أو موضع شك. ينشأ من
      الشك المحيط بزوجة يوليوس قيصر، بومبي، أثناء فضيحة بونا ديا.
    he: פתגם המדגיש את הצורך במוניטין ללא רבב, במיוחד לאלו הנמצאים בעמדות כוח או תחת עין בוחנת. מקורו
      מהחשדות סביב אשתו של יוליוס קיסר, פומפיאה, במהלך פרשת בונה דיאה.
