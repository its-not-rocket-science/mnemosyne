- id: en_cultural_reference_waterloo_was_won_on_the_playing_fields_of_eton_18a79953
  language: en
  canonical_reference: Waterloo was won on the playing fields of Eton
  reference_type: cultural_reference
  surface_patterns:
  - Waterloo was won on the playing fields of Eton
  - the playing fields of Eton won Waterloo
  - Eton's playing fields won Waterloo
  short_explanation: This phrase attributes the British victory at the Battle of Waterloo (1815) to the
    discipline and character-building of Eton College students. It emphasizes the role of education and
    sportsmanship in national success.
  i18n_explanations:
    en: This phrase attributes the British victory at the Battle of Waterloo (1815) to the discipline
      and character-building of Eton College students. It emphasizes the role of education and sportsmanship
      in national success.
    es: Esta frase atribuye la victoria británica en la Batalla de Waterloo (1815) a la disciplina y formación
      del carácter de los estudiantes del Colegio Eton. Destaca el papel de la educación y el espíritu
      deportivo en el éxito nacional.
    fr: Cette phrase attribue la victoire britannique à Waterloo (1815) à la discipline et au développement
      du caractère des élèves d'Eton College. Elle souligne l'importance de l'éducation et du fair-play
      dans le succès national.
    de: Dieser Ausdruck schreibt den britischen Sieg in der Schlacht von Waterloo (1815) der Disziplin
      und Charakterbildung der Schüler des Eton College zu. Er betont die Rolle von Erziehung und Sportsgeist
      für den nationalen Erfolg.
    it: Questa frase attribuisce la vittoria britannica a Waterloo (1815) alla disciplina e alla formazione
      del carattere degli studenti del Collegio Eton. Sottolinea il ruolo dell'educazione e dello spirito
      sportivo nel successo nazionale.
    pt: Esta frase atribui a vitória britânica em Waterloo (1815) à disciplina e formação do caráter dos
      alunos do Colégio Eton. Destaca o papel da educação e do espírito esportivo no sucesso nacional.
    ru: Это выражение приписывает британскую победу при Ватерлоо (1815) дисциплине и воспитанию характера
      учеников Итонского колледжа. Оно подчеркивает роль образования и спортивного духа в национальном
      успехе.
    ja: この言葉は、イギリスのワーテルローの勝利（1815年）をイートン校の生徒たちの規律と人格形成に帰します。国家の成功における教育とスポーツマンシップの役割を強調しています。
    zh: 这句话将英国在滑铁卢战役（1815年）的胜利归功于伊顿公学学生的纪律和品格培养。它强调了教育和体育精神在国家成功中的作用。
    ar: تشير هذه العبارة إلى أن النصر البريطاني في معركة واترلو (1815) يعود إلى انضباط وتكوين شخصية طلاب
