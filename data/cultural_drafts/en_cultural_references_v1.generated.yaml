    introduces themes of deception and moral ambiguity central to the play.
  i18n_explanations:
    en: A paradoxical phrase from Shakespeare's *Macbeth* (Act 1, Scene 1), spoken by the witches. It
      suggests a world where moral values are inverted, and appearances are deceptive. The line introduces
      themes of deception and moral ambiguity central to the play.
    es: Frase paradójica de *Macbeth* de Shakespeare (Acto 1, Escena 1), pronunciada por las brujas. Sugiere
      un mundo donde los valores morales están invertidos y las apariencias engañan. La línea introduce
      temas de engaño y ambigüedad moral centrales en la obra.
    fr: Locution paradoxale tirée de *Macbeth* de Shakespeare (Acte 1, Scène 1), prononcée par les sorcières.
      Elle suggère un monde où les valeurs morales sont inversées et où les apparences sont trompeuses.
