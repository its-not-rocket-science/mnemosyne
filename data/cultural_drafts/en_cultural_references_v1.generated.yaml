- id: en_cultural_reference_a_bruegel_peasant_dance_2cf95517
  language: en
  canonical_reference: A Bruegel peasant dance
  reference_type: cultural_reference
  surface_patterns:
  - a Bruegel peasant dance
  - Bruegel's peasant dance
  - peasant dance by Bruegel
  short_explanation: Refers to Pieter Bruegel the Elder's paintings depicting lively, often chaotic rural
    festivities, such as 'The Peasant Dance' (1567), which capture 16th-century Flemish peasant life with
    humor and detail.
  i18n_explanations:
    en: Refers to Pieter Bruegel the Elder's paintings depicting lively, often chaotic rural festivities,
      such as 'The Peasant Dance' (1567), which capture 16th-century Flemish peasant life with humor and
      detail.
    es: Se refiere a las pinturas de Pieter Bruegel el Viejo que representan fiestas rurales animadas
      y a menudo caóticas, como 'La danza de los aldeanos' (1567), que capturan la vida campesina flamenca
      del siglo XVI con humor y detalle.
    fr: Fait référence aux peintures de Pieter Bruegel l'Ancien représentant des fêtes rurales animées
      et souvent chaotiques, comme 'La Danse des paysans' (1567), qui dépeignent la vie paysanne flamande
      du XVIe siècle avec humour et précision.
    de: Bezieht sich auf die Gemälde von Pieter Bruegel dem Älteren, die lebhafte, oft chaotische ländliche
      Feste darstellen, wie 'Der Bauerntanz' (1567), die das flämische Bauernleben des 16. Jahrhunderts
      mit Humor und Detailreichtum einfangen.
    it: Si riferisce ai dipinti di Pieter Bruegel il Vecchio che raffigurano feste rurali vivaci e spesso
      caotiche, come 'La danza dei contadini' (1567), che catturano la vita contadina fiamminga del XVI
      secolo con umorismo e dettagli.
    pt: Refere-se às pinturas de Pieter Bruegel, o Velho, que retratam festas rurais animadas e muitas
      vezes caóticas, como 'A Dança dos Camponeses' (1567), que capturam a vida camponesa flamenga do
      século XVI com humor e detalhes.
    ru: Относится к картинам Питера Брейгеля Старшего, изображающим оживленные, часто хаотичные сельские
      празднества, такие как 'Крестьянский танец' (1567), которые с юмором и детализацией передают жизнь
      фламандских крестьян XVI века.
    ja: ピーテル・ブリューゲル（父）の作品で、活気がありしばしば混沌とした農村の祝祭を描いた「農民の踊り」（1567年）などを指し、16世紀フランドルの農民生活をユーモアと詳細に捉えている。
    zh: 指的是老彼得·勃鲁盖尔的绘画作品，描绘生动而常常混乱的乡村庆典，如《农民舞蹈》（1567年），以幽默和细节捕捉16世纪弗拉芒农民生活。
    ar: يشير إلى لوحات بيتر بروغل الأكبر التي تصور احتفالات ريفية حية وغالبًا فوضوية، مثل 'رقصة الفلاحين'
      (1567)، والتي تصور حياة الفلاحين الفلمنكية في القرن السادس عشر بروح الدعابة والتفاصيل.
    he: מתייחס לציוריו של פיטר ברויגל האב המתארים חגיגות כפריות חיות ולעיתים כאוטיות, כמו 'ריקוד האיכרים'
      (1567), אשר seize את חיי האיכרים הפלמים של המאה ה-16 בהומור ובפירוט.
