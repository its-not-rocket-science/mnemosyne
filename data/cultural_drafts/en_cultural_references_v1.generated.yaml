      al volar una cometa con una llave metálica durante una tormenta. Simboliza la curiosidad científica
      y la investigación temprana de la electricidad.
    fr: Fait référence à l'expérience de Benjamin Franklin en 1752, où il a démontré que la foudre est
      électrique en faisant voler un cerf-volant avec une clé métallique pendant un orage. Symbolise la
      curiosité scientifique et les premières recherches sur l'électricité.
    de: Bezieht sich auf Benjamin Franklins Experiment von 1752, bei dem er durch das Fliegen eines Drachen
      mit einem Metallschlüssel während eines Gewitters nachwies, dass Blitze elektrisch sind. Symbolisiert
      wissenschaftlichen Forscherdrang und frühe Elektrizitätsforschung.
    it: Si riferisce all'esperimento di Benjamin Franklin del 1752, in cui dimostrò che i fulmini sono
      elettrici facendo volare un aquilone con una chiave metallica durante un temporale. Simboleggia
      la curiosità scientifica e le prime ricerche sull'elettricità.
    pt: Refere-se ao experimento de Benjamin Franklin em 1752, onde demonstrou que os raios são elétricos
      ao empinar uma pipa com uma chave metálica durante uma tempestade. Simboliza a curiosidade científica
      e as primeiras pesquisas sobre eletricidade.
    ru: Относится к эксперименту Бенджамина Франклина 1752 года, в котором он продемонстрировал электрическую
      природу молнии, запуская воздушного змея с металлическим ключом во время грозы. Символизирует научное
      любопытство и ранние исследования электричества.
    ja: 1752年にベンジャミン・フランクリンが雷が電気であることを証明するために、雷雨の中で金属の鍵を付けた凧を飛ばした実験を指す。科学的な好奇心と初期の電気研究の象徴。
    zh: 指的是1752年本杰明·富兰克林通过在暴风雨中放风筝并系上金属钥匙，证明闪电是电的实验。象征着科学好奇心和早期电学研究。
    ar: يشير إلى تجربة بنيامين فرانكلين عام 1752، حيث أثبت أن البرق كهربائي عن طريق تحليق طائرة ورقية
      مع مفتاح معدني أثناء عاصفة رعدية. يرمز إلى الفضول العلمي والبحث المبكر في الكهرباء.
    he: מתייחס לניסוי של בנג'מין פרנקלין בשנת 1752, בו הוכיח כי הברקים הם חשמליים באמצעות עפיפון עם מפתח
      מתכתי במהלך סופת רעמים. מסמל סקרנות מדעית ומחקר מוקדם בחשמל.
