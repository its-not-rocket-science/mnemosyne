  short_explanation: Refers to Gustav Klimt's iconic 1907-1908 painting 'The Kiss,' symbolizing romantic
    intimacy, art nouveau style, and fin-de-siècle Vienna. Often used to evoke passionate or tender moments
    in modern contexts.
  i18n_explanations:
    en: Refers to Gustav Klimt's iconic 1907-1908 painting 'The Kiss,' symbolizing romantic intimacy,
      art nouveau style, and fin-de-siècle Vienna. Often used to evoke passionate or tender moments in
      modern contexts.
    es: Se refiere a la icónica pintura de Gustav Klimt 'El Beso' (1907-1908), que simboliza intimidad
      romántica, estilo art nouveau y la Viena de fin de siglo. Suele evocar momentos apasionados o tiernos
      en contextos modernos.
    fr: Fait référence au tableau emblématique de Gustav Klimt 'Le Baiser' (1907-1908), symbole d'intimité
      romantique, de style Art nouveau et de Vienne de la fin du siècle. Utilisé pour évoquer des moments
      passionnés ou tendres dans des contextes modernes.
    de: Bezieht sich auf Gustav Klimts ikonisches Gemälde 'Der Kuss' (1907-1908), das romantische Intimität,
      den Jugendstil und das Wien der Jahrhundertwende symbolisiert. Wird oft verwendet, um leidenschaftliche
      oder zärtliche Momente in modernen Kontexten zu beschwören.
    it: Si riferisce al celebre dipinto di Gustav Klimt 'Il Bacio' (1907-1908), che simboleggia l'intimità
      romantica, lo stile Art Nouveau e la Vienna di fine secolo. Spesso usato per evocare momenti appassionati
      o teneri in contesti moderni.
    pt: Refere-se à icônica pintura de Gustav Klimt 'O Beijo' (1907-1908), que simboliza a intimidade
      romântica, o estilo Art Nouveau e a Viena da virada do século. Frequentemente usada para evocar
      momentos passionais ou ternos em contextos modernos.
    ru: Относится к знаковой картине Густава Климта 'Поцелуй' (1907-1908), символизирующей романтическую
      близость, стиль ар нуво и Вену fin-de-siècle. Часто используется для описания страстных или нежных
      моментов в современных контекстах.
    ja: グスタフ・クリムトの代表作「接吻」（1907-1908年）を指し、ロマンチックな親密さ、アール・ヌーヴォー様式、世紀末のウィーンを象徴します。現代の文脈で情熱的または優しい瞬間を想起させる際に用いられます。
    zh: 指代古斯塔夫·克里姆特的代表作《吻》（1907-1908年），象征浪漫亲密、新艺术风格与世纪末维也纳。常用于现代语境中引发激情或温柔的时刻。
    ar: يشير إلى اللوحة الأيقونية لفنان جوستاف كليمت "القبلة" (1907-1908)، التي ترمز إلى الحب الرومانسي،
      الأسلوب الفنّي الجديد، وفيينا في نهاية القرن. غالبًا ما تُستخدم للإشارة إلى لحظات عاطفية أو رقيقة
      في السياقات الحديثة.
    he: מתייחס לציור האיקוני של גוסטב קלימט 'הנשיקה' (1907-1908), המסמל אינטימיות רומנטית, סגנון האר נובו
      ווינה של סוף המאה. משמש לעיתים קרובות לתאר רגעים של תשוקה או חיבה בהקשרים מודרניים.
