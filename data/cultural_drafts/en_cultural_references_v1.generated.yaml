- id: en_literary_reference_a_newspeak_word_562bbd94
  language: en
  canonical_reference: A Newspeak word
  reference_type: literary_reference
  surface_patterns:
  - a Newspeak word
  - Newspeak word
  - the Newspeak term
  - Newspeak vocabulary
  short_explanation: Refers to the artificial, simplified, and ideologically controlled language from
    George Orwell's dystopian novel '1984'. Newspeak is designed to limit free thought by eliminating
    words that express dissent or complexity.
  i18n_explanations:
    en: Refers to the artificial, simplified, and ideologically controlled language from George Orwell's
      dystopian novel '1984'. Newspeak is designed to limit free thought by eliminating words that express
      dissent or complexity.
    es: Se refiere al lenguaje artificial, simplificado y controlado ideológicamente de la novela distópica
      '1984' de George Orwell. La neolengua está diseñada para limitar el pensamiento libre eliminando
      palabras que expresen disidencia o complejidad.
    fr: Fait référence au langage artificiel, simplifié et contrôlé idéologiquement issu du roman dystopique
      '1984' de George Orwell. La novlangue est conçue pour limiter la pensée libre en éliminant les mots
      exprimant la dissidence ou la complexité.
    de: Bezieht sich auf die künstliche, vereinfachte und ideologisch kontrollierte Sprache aus George
      Orwells dystopischem Roman '1984'. Newspeak soll freies Denken einschränken, indem Wörter, die Dissens
      oder Komplexität ausdrücken, eliminiert werden.
    it: Si riferisce al linguaggio artificiale, semplificato e controllato ideologicamente tratto dal
      romanzo distopico '1984' di George Orwell. La neolingua è progettata per limitare il pensiero libero
      eliminando parole che esprimano dissenso o complessità.
    pt: Refere-se à linguagem artificial, simplificada e controlada ideologicamente do romance distópico
      '1984' de George Orwell. A Novilíngua é projetada para limitar o pensamento livre eliminando palavras
      que expressem dissidência ou complexidade.
    ru: Описывает искусственный, упрощённый и идеологически контролируемый язык из антиутопического романа
      Джорджа Оруэлла '1984'. Новояз предназначен для ограничения свободного мышления путём устранения
      слов, выражающих инакомыслие или сложность.
    ja: ジョージ・オーウェルのディストピア小説「1984」に由来する、人工的で簡略化され、思想的に管理された言語を指します。ニュースピークは、異議や複雑さを表す言葉を排除することで、自由な思考を制限するよう設計されています。
    zh: 指代乔治·奥威尔反乌托邦小说《1984》中的一种人工、简化且受意识形态控制的语言。新话通过消除表达异议或复杂性的词汇，旨在限制自由思想。
    ar: يشير إلى اللغة الاصطناعية المبسطة والمسيطر عليها أيديولوجيًا من رواية جورج أورويل الديستوبية '1984'.
