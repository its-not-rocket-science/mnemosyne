    the dangers of overambition or defying natural limits.
  i18n_explanations:
    en: A mythological reference to the story of Icarus, who flew too close to the sun with wax wings
      made by his father Daedalus, causing them to melt and leading to his tragic fall. It symbolizes
      the dangers of overambition or defying natural limits.
    es: Referencia mitológica a la historia de Ícaro, quien voló demasiado cerca del sol con alas de cera
      hechas por su padre Dédalo, lo que hizo que se derritieran y provocara su trágica caída. Simboliza
      los peligros de la ambición desmedida o desafiar los límites naturales.
    fr: Référence mythologique à l'histoire d'Icare, qui vola trop près du soleil avec des ailes de cire
      fabriquées par son père Dédale, ce qui les fit fondre et entraîna sa chute tragique. Elle symbolise
      les dangers de l'ambition excessive ou de défier les limites naturelles.
    de: Eine mythologische Anspielung auf die Geschichte des Ikarus, der mit von seinem Vater Daidalos
      gebastelten Wachflügeln zu nah an die Sonne flog, wodurch diese schmolzen und er tödlich abstürzte.
      Sie steht für die Gefahren von maßlosem Ehrgeiz oder das Überschreiten natürlicher Grenzen.
    it: Riferimento mitologico alla storia di Icaro, che volò troppo vicino al sole con ali di cera fatte
      da suo padre Dedalo, facendole sciogliere e portando alla sua tragica caduta. Simboleggia i pericoli
      dell'ambizione smisurata o del violare i limiti naturali.
    pt: Referência mitológica à história de Ícaro, que voou muito perto do sol com asas de cera feitas
      por seu pai Dédalo, fazendo-as derreter e levando à sua trágica queda. Simboliza os perigos da ambição
      excessiva ou desafiar os limites naturais.
    ru: Мифологический образ полёта Икара, который на восковых крыльях, сделанных его отцом Дедалом, приблизился
      слишком близко к солнцу, растопил их и трагически упал. Символизирует опасность чрезмерных амбиций
      или нарушения естественных границ.
    ja: イカロスの飛行の神話的象徴。イカロスは父ダイダロスが作った蝋の翼で太陽に近づきすぎ、翼が溶けて tragically 落下しました。これは過剰な野心や自然の限界を超える危険性を象徴しています。
    zh: 希腊神话中伊卡洛斯的飞行。他用父亲代达罗斯制作的蜡翼飞得离太阳太近，导致蜡翼融化并坠落身亡。象征着过度野心或挑战自然极限的危险。
