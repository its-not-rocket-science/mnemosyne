      play 'King John,' where it is used to criticize unnecessary embellishment.
    es: Adornar algo que ya es hermoso, a menudo perjudicándolo. La expresión proviene de la obra de Shakespeare
      'El rey Juan', donde se usa para criticar el embellecimiento innecesario.
    fr: Orner quelque chose qui est déjà beau, souvent au détriment de celui-ci. L'expression vient de
