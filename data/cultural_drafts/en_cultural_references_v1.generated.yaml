  short_explanation: A term coined by Vladimir Nabokov in 'Lolita' (1955) to describe a sexually precocious
    young girl. It reflects the novel's controversial exploration of desire and morality, often misused
    to objectify youth.
  i18n_explanations:
    en: A term coined by Vladimir Nabokov in 'Lolita' (1955) to describe a sexually precocious young girl.
      It reflects the novel's controversial exploration of desire and morality, often misused to objectify
      youth.
    es: Término acuñado por Vladimir Nabokov en 'Lolita' (1955) para describir a una joven sexualmente
      precoz. Refleja la exploración controvertida de la novela sobre el deseo y la moralidad, frecuentemente
      malinterpretado para objetivar a la juventud.
    fr: Terme inventé par Vladimir Nabokov dans 'Lolita' (1955) pour décrire une jeune fille sexuellement
      précoce. Il reflète l'exploration controversée du roman sur le désir et la morale, souvent détourné
      pour objectifier la jeunesse.
    de: Ein von Vladimir Nabokov in 'Lolita' (1955) geprägter Begriff für ein sexuell frühreifes Mädchen.
      Er spiegelt die umstrittene Auseinandersetzung des Romans mit Begierde und Moral wider, die oft
      missbraucht wird, um Jugend zu objektivieren.
    it: Termine coniato da Vladimir Nabokov in 'Lolita' (1955) per descrivere una ragazza sessualmente
      precoce. Riflette l'esplorazione controversa del romanzo sul desiderio e la morale, spesso usata
      in modo distorto per oggettivare la gioventù.
    pt: Termo criado por Vladimir Nabokov em 'Lolita' (1955) para descrever uma jovem sexualmente precoce.
      Reflete a exploração controversa do romance sobre desejo e moralidade, frequentemente mal utilizada
      para objetificar a juventude.
    ru: Термин, введённый Владимиром Набоковым в романе 'Лолита' (1955), для описания сексуально преждевременно
