- id: en_cultural_reference_the_lewis_and_clark_expedition_70c253c5
  language: en
  canonical_reference: The Lewis and Clark expedition
  reference_type: cultural_reference
  surface_patterns:
  - the Lewis and Clark expedition
  - Lewis and Clark expedition
  - the Corps of Discovery
  - Lewis and Clark's journey
  short_explanation: A 1804–1806 expedition led by Meriwether Lewis and William Clark to explore the newly
    acquired western United States, commissioned by President Thomas Jefferson. It significantly expanded
    American knowledge of the continent.
  i18n_explanations:
    en: A 1804–1806 expedition led by Meriwether Lewis and William Clark to explore the newly acquired
      western United States, commissioned by President Thomas Jefferson. It significantly expanded American
      knowledge of the continent.
    es: Una expedición de 1804–1806 dirigida por Meriwether Lewis y William Clark para explorar el oeste
      de Estados Unidos, recién adquirido, por encargo del presidente Thomas Jefferson. Amplió significativamente
      el conocimiento estadounidense del continente.
    fr: Une expédition de 1804 à 1806 dirigée par Meriwether Lewis et William Clark pour explorer l'ouest
      des États-Unis, nouvellement acquis, sur ordre du président Thomas Jefferson. Elle a considérablement
      élargi les connaissances américaines sur le continent.
    de: Eine von 1804 bis 1806 von Meriwether Lewis und William Clark geleitete Expedition zur Erkundung
      des neu erworbenen westlichen Teils der USA im Auftrag von Präsident Thomas Jefferson. Sie erweiterte
      das amerikanische Wissen über den Kontinent erheblich.
    it: Una spedizione dal 1804 al 1806 guidata da Meriwether Lewis e William Clark per esplorare il nuovo
      territorio occidentale degli Stati Uniti, su incarico del presidente Thomas Jefferson. Ha ampliato
      notevolmente la conoscenza americana del continente.
    pt: Uma expedição de 1804 a 1806 liderada por Meriwether Lewis e William Clark para explorar o recém-adquirido
      oeste dos Estados Unidos, encomendada pelo presidente Thomas Jefferson. Expandiu significativamente
      o conhecimento americano sobre o continente.
    ru: Экспедиция 1804–1806 годов под руководством Мериуэтера Льюиса и Уильяма Кларка по исследованию
      недавно приобретенных западных территорий США по поручению президента Томаса Джефферсона. Значительно
      расширила знания Америки о континенте.
    ja: 1804年から1806年にかけて、トーマス・ジェファーソン大統領の委託でメリウェザー・ルイスとウィリアム・クラークが率いた、新たに獲得したアメリカ西部の探検。大陸に関するアメリカの知識を大幅に広げた。
    zh: 1804至1806年，受托马斯·杰斐逊总统委托，梅里韦瑟·刘易斯和威廉·克拉克率领的探险队，勘探新获得的美国西部地区。极大地拓展了美国对这片大陆的认知。
    ar: رحلة استكشافية من 1804 إلى 1806 قادها ميريويذر لويس وويليام كلارك لاستكشاف غرب الولايات المتحدة
      المكتسب حديثاً، بأمر من الرئيس توماس جيفرسون. وسعت بشكل كبير المعرفة الأمريكية بالقارة.
    he: משלחת מחקר מ-1804 עד 1806 בראשות מרייוות'ר לואיס וויליאם קלארק לחקור את המערב האמריקאי שנרכש לאחרונה,
