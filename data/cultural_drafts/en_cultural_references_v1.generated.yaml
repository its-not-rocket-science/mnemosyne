- id: en_cultural_reference_sweet_fanny_adams_1d62932c
  language: en
  canonical_reference: Sweet Fanny Adams
  reference_type: cultural_reference
  surface_patterns:
  - Sweet Fanny Adams
  - Fanny Adams
  short_explanation: A British euphemism for 'sweet fuck all,' originating from the 1867 murder of Fanny
    Adams, a young girl, whose name was humorously used to soften vulgar language. It later evolved into
    a slang term meaning 'nothing at all.'
  i18n_explanations:
    en: A British euphemism for 'sweet fuck all,' originating from the 1867 murder of Fanny Adams, a young
      girl, whose name was humorously used to soften vulgar language. It later evolved into a slang term
      meaning 'nothing at all.'
    es: Eufemismo británico para 'nada de nada,' surgido tras el asesinato en 1867 de Fanny Adams, una
      niña, cuyo nombre se usó humorísticamente para suavizar lenguaje vulgar. Evolucionó a término coloquial
      que significa 'absolutamente nada'.
    fr: Euphémisme britannique pour 'rien du tout,' issu du meurtre en 1867 de Fanny Adams, une jeune
      fille, dont le nom fut utilisé avec humour pour adoucir un langage vulgaire. Il est devenu un terme
      argotique signifiant 'absolument rien'.
    de: Britischer Euphemismus für 'verdammt noch mal nichts,' entstanden nach der Ermordung der jungen
      Fanny Adams 1867, deren Name humorvoll zur Abmilderung vulgärer Sprache verwendet wurde. Später
      wurde es zu einem Slangausdruck für 'gar nichts'.
    it: Eufemismo britannico per 'un bel niente,' nato dal delitto nel 1867 di Fanny Adams, una bambina,
      il cui nome fu usato scherzosamente per attenuare un linguaggio volgare. In seguito divenne un termine
      gergale che significa 'proprio nulla'.
    pt: Eufemismo britânico para 'porra nenhuma,' originado do assassinato em 1867 de Fanny Adams, uma
      menina, cujo nome foi usado jocosamente para suavizar linguagem vulgar. Evoluiu para gíria que significa
      'absolutamente nada'.
    ru: Британский эвфемизм для 'ни хрена,' возникший после убийства в 1867 году девочки Фэнни Адамс,
      чьё имя использовали шутливо для смягчения грубой лексики. Позже стал сленговым выражением, означающим
      'совсем ничего'.
    ja: イギリスの婉曲表現で「全くの無駄」を意味する。1867年に少女ファンニー・アダムスが殺害された事件に由来し、下品な言葉を和らげるためにその名が皮肉に用いられた。後に「全く何もない」というスラングとなった。
    zh: 英国委婉语，意为“根本没有”，源于1867年一名叫范妮·亚当斯的女孩被谋杀的事件，其名字被幽默地用来缓和粗俗语言。后演变为俚语，表示“完全没有”。
    ar: مُرادِف بريطاني خَفيّ لِـ'لا شيء على الإطلاق'، نشأ بعد مقتل الفتاة فاني آدامز عام 1867، حيث استُخدم
      اسمها بشكل هزلي لتخفيف الألفاظ البذيئة. تطور لاحقاً إلى مصطلح عامي يعني 'لا شيء على الإطلاق'.
    he: ביטוי בריטי מעודן ל'שום דבר', שמקורו ברצח הילדה פאני אדמס ב-1867, שאת שמה השתמשו בו באופן הומוריסטי
      כדי להמעיט בלשון גסה. מאוחר יותר הפך לסלנג שמשמעו 'אין שום דבר'
