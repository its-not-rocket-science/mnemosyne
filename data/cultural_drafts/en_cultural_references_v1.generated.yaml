- id: en_cultural_reference_a_hogarth_marriage_à_la_mode_81b48d3d
  language: en
  canonical_reference: A Hogarth Marriage à la Mode
  reference_type: cultural_reference
  surface_patterns:
  - a Hogarth Marriage à la Mode
  - Hogarth's Marriage à la Mode
  - the Marriage à la Mode series by Hogarth
  - a satirical depiction of marriage like Hogarth's
  short_explanation: Refers to William Hogarth's 1743-1745 series of six paintings (and engravings) 'Marriage
    à-la-Mode', a satirical critique of 18th-century aristocratic marriage customs, infidelity, and moral
    decay. Often invoked to highlight hypocrisy in social institutions.
  i18n_explanations:
    en: Refers to William Hogarth's 1743-1745 series of six paintings (and engravings) 'Marriage à-la-Mode',
      a satirical critique of 18th-century aristocratic marriage customs, infidelity, and moral decay.
      Often invoked to highlight hypocrisy in social institutions.
    es: Se refiere a la serie de seis pinturas (y grabados) de William Hogarth 'Matrimonio a la moda'
      (1743-1745), una crítica satírica de las costumbres matrimoniales aristocráticas del siglo XVIII,
      la infidelidad y la decadencia moral. Se invoca para resaltar la hipocresía en las instituciones
      sociales.
    fr: Fait référence à la série de six peintures (et gravures) de William Hogarth 'Mariage à la mode'
      (1743-1745), une critique satirique des coutumes matrimoniales aristocratiques du XVIIIe siècle,
      de l'infidélité et de la décadence morale. Souvent invoquée pour souligner l'hypocrisie des institutions
      sociales.
    de: Bezieht sich auf William Hogarths Serie von sechs Gemälden (und Radierungen) 'Die Mode-Ehe' (1743-1745),
      eine satirische Kritik an den aristokratischen Heiratsbräuchen, Untreue und moralischem Verfall
      des 18. Jahrhunderts. Wird oft herangezogen, um Heuchelei in sozialen Institutionen zu entlarven.
    it: Si riferisce alla serie di sei dipinti (e incisioni) di William Hogarth 'Matrimonio alla moda'
      (1743-1745), una critica satirica ai costumi matrimoniali aristocratici del XVIII secolo, all'infedeltà
      e al degrado morale. Spesso evocata per evidenziare l'ipocrisia nelle istituzioni sociali.
    pt: Refere-se à série de seis pinturas (e gravuras) de William Hogarth 'Casamento à Moda' (1743-1745),
      uma crítica satírica aos costumes matrimoniais aristocráticos do século XVIII, infidelidade e decadência
      moral. Invocada para destacar a hipocrisia nas instituições sociais.
    ru: Относится к серии из шести картин (и гравюр) Уильяма Хогарта 'Брак à la mode' (1743-1745), сатирической
      критике аристократических брачных обычаев, измен и морального упадка XVIII века. Часто используется
      для разоблачения лицемерия социальных институтов.
    ja: ホガースの連作「当世風の結婚」（1743-1745年）を指す。18世紀の貴族階級の結婚習慣、不倫、道徳的退廃を風刺的に批判した作品。社会制度の偽善を際立たせる際に引用される。
    zh: 指代威廉·贺加斯1743-1745年的连作《时尚婚姻》（六幅油画与版画），对18世纪贵族阶层的婚姻习俗、不忠与道德沦丧进行的讽刺性批判。常用于揭露社会制度的虚伪。
    ar: يشير إلى سلسلة ويليام هوجارث المكونة من ست لوحات (ونقوش) "زواج على الطريقة الحديثة" (1743-1745)،
      نقد ساخر لعادات الزواج الأرستقراطية في القرن الثامن عشر والخيانة والفساد الأخلاقي. غالبًا ما يستشهد
      بها لتسليط الضوء على النفاق في المؤسسات الاجتماعية.
    he: מתייחס לסדרת שישה ציורים (ורישומים) של ויליאם הוגארת' 'נישואים לפי האופנה' (1743-1745), ביקורת
      סאטירית על מנהגי הנישואים האריסטוקרטיים, בגידה ודעיכה מוסרית של המאה ה-18. לעיתים מצוטט כדי להדגיש
      צביעות במוסדות חברתיים.
