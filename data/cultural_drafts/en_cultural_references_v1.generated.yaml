- id: en_cultural_reference_a_piranesi_prison_7e0e8d2c
  language: en
  canonical_reference: A Piranesi prison
  reference_type: cultural_reference
  surface_patterns:
  - a Piranesi prison
  - Piranesi's prison
  - Piranesi's imaginary prison
  short_explanation: Refers to Giovanni Battista Piranesi's series of etchings, *Carceri d'Invenzione*
    (Imaginary Prisons), depicting vast, labyrinthine dungeons, symbolizing the sublime, the uncanny,
    and the limits of human perception.
  i18n_explanations:
    en: Refers to Giovanni Battista Piranesi's series of etchings, *Carceri d'Invenzione* (Imaginary Prisons),
      depicting vast, labyrinthine dungeons, symbolizing the sublime, the uncanny, and the limits of human
      perception.
    es: Se refiere a la serie de grabados *Carceri d'Invenzione* (Prisiones Imaginarias) de Giovanni Battista
      Piranesi, que representan vastas mazmorras laberínticas, simbolizando lo sublime, lo inquietante
      y los límites de la percepción humana.
    fr: Fait référence à la série de gravures *Carceri d'Invenzione* (Prisons imaginaires) de Giovanni
      Battista Piranesi, représentant des cachots labyrinthiques immenses, symbolisant le sublime, l'étrange
      et les limites de la perception humaine.
    de: Bezieht sich auf Piranesis Serie von Radierungen *Carceri d'Invenzione* (Erfundene Kerker), die
      gewaltige, labyrinthische Verliese darstellen und das Erhabene, Unheimliche sowie die Grenzen der
      menschlichen Wahrnehmung symbolisieren.
    it: Si riferisce alla serie di incisioni *Carceri d'Invenzione* (Prigioni immaginarie) di Giovanni
      Battista Piranesi, che raffigurano vasti sotterranei labirintici, simbolizzando il sublime, l'inquietante
      e i limiti della percezione umana.
    pt: Refere-se à série de gravuras *Carceri d'Invenzione* (Prisões Imaginárias) de Giovanni Battista
      Piranesi, que retratam masmorras labirínticas vastas, simbolizando o sublime, o estranho e os limites
      da percepção humana.
    ru: Относится к серии офортов Джованни Баттисты Пиранези *Carceri d'Invenzione* (Воображаемые тюрьмы),
      изображающих огромные лабиринтные темницы, что символизирует возвышенное, жуткое и пределы человеческого
      восприятия.
    ja: ジョヴァンニ・バッティスタ・ピラネージのエッチングシリーズ「カルチェリ・ディンヴェンツィオーネ（想像上の牢獄）」を指し、広大で迷路のような地下牢を描き、崇高さ、不気味さ、人間の知覚の限界を象徴しています。
    zh: 指的是乔瓦尼·巴蒂斯塔·皮拉内西的蚀刻版画系列《想象中的监狱》（*Carceri d'Invenzione*），描绘了广阔的迷宫般地牢，象征着崇高、怪诞以及人类感知的极限。
    ar: يشير إلى سلسلة من النقوش الحفرية *كارتشيري دى إينفينزيون* (السجون الخيالية) لجوفاني باتيستا بيرانيسي،
      التي تصور سجونًا متاهة ضخمة، مما يرمز إلى الرهيب والغريب وللحدود الإدراك البشري.
    he: מתייחס לסדרת התחריטים *Carceri d'Invenzione* (בתי כלא דמיוניים) של ג'ובאני בטיסטה פיראנזי, המתארים
