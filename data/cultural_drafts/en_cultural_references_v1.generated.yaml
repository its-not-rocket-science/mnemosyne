- id: en_cultural_reference_apples_of_discord_3443b4aa
  language: en
  canonical_reference: Apples of discord
  reference_type: cultural_reference
  surface_patterns:
  - apple of discord
  - apples of discord
  - the apple of discord
  short_explanation: A source of conflict or rivalry. Originates from Greek mythology, where the goddess
    Eris threw a golden apple inscribed 'to the fairest' among goddesses, sparking the Trojan War.
  i18n_explanations:
    en: A source of conflict or rivalry. Originates from Greek mythology, where the goddess Eris threw
      a golden apple inscribed 'to the fairest' among goddesses, sparking the Trojan War.
    es: Una fuente de conflicto o rivalidad. Proviene de la mitología griega, donde la diosa Eris lanzó
      una manzana de oro con la inscripción 'para la más bella' entre las diosas, desencadenando la Guerra
      de Troya.
    fr: Une source de conflit ou de rivalité. Provient de la mythologie grecque, où la déesse Éris lança
      une pomme d'or avec l'inscription 'pour la plus belle' parmi les déesses, déclenchant la guerre
      de Troie.
    de: Eine Quelle von Konflikt oder Rivalität. Stammt aus der griechischen Mythologie, wo die Göttin
      Eris einen goldenen Apfel mit der Aufschrift 'für die Schönste' unter die Göttinnen warf und so
      den Trojanischen Krieg auslöste.
    it: Una fonte di conflitto o rivalità. Deriva dalla mitologia greca, dove la dea Eris gettò una mela
      d'oro con la scritta 'alla più bella' tra le dee, scatenando la guerra di Troia.
    pt: Uma fonte de conflito ou rivalidade. Origina-se da mitologia grega, onde a deusa Éris lançou uma
      maçã de ouro com a inscrição 'para a mais bela' entre as deusas, desencadeando a Guerra de Troia.
    ru: Источник конфликта или соперничества. Восходит к греческой мифологии, где богиня Эрида бросила
      золотое яблоко с надписью 'для самой прекрасной' между богинями, что спровоцировало Троянскую войну.
    ja: 争いや対立の原因。ギリシャ神話で女神エリスが「最も美しい者へ」と書かれた黄金の林檎を投げ、トロイ戦争が勃発した故事に由来。
    zh: 冲突或竞争的根源。源自希腊神话，其中女神厄里斯将一只刻有‘献给最美者’的金苹果扔给众女神，引发了特洛伊战争。
    ar: مصدر نزاع أو منافسة. مستمد من الميثولوجيا اليونانية، حيث ألقت الآلهة إريس بتفاحة ذهبية مكتوب عليها
      'إلى أجمل الآلهة' بين الآلهة، مما أشعل حرب طروادة.
    he: מקור לסכסוך או תחרות. נלקח מן המיתולוגיה היוונית, בה השליכה האלה אריס תפוח זהב עם הכתובת 'ליפה
