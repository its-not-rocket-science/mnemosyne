  - the Dunkirk spirit
  - Dunkirk ethos
  short_explanation: Refers to the resilience, courage, and camaraderie displayed by British and Allied
    forces during the 1940 Dunkirk evacuation in World War II. It symbolizes perseverance in adversity.
  i18n_explanations:
    en: Refers to the resilience, courage, and camaraderie displayed by British and Allied forces during
      the 1940 Dunkirk evacuation in World War II. It symbolizes perseverance in adversity.
    es: Se refiere a la resiliencia, el valor y la camaradería mostrados por las fuerzas británicas y
      aliadas durante la evacuación de Dunkerque en 1940, en la Segunda Guerra Mundial. Simboliza la perseverancia
      ante la adversidad.
    fr: Désigne la résilience, le courage et la solidarité dont ont fait preuve les forces britanniques
      et alliées lors de l'évacuation de Dunkerque en 1940 pendant la Seconde Guerre mondiale. Cela symbolise
      la persévérance face à l'adversité.
    de: Bezeichnet die Widerstandskraft, den Mut und die Kameradschaft, die britische und alliierte Truppen
      während der Evakuierung von Dünkirchen 1940 im Zweiten Weltkrieg zeigten. Es steht für Durchhaltevermögen
      in schwierigen Zeiten.
    it: Si riferisce alla resilienza, al coraggio e alla solidarietà mostrati dalle forze britanniche
      e alleate durante l'evacuazione di Dunkerque nel 1940, durante la Seconda guerra mondiale. Simboleggia
      la perseveranza di fronte all'avversità.
    pt: Refere-se à resiliência, coragem e camaradagem demonstradas pelas forças britânicas e aliadas
      durante a evacuação de Dunquerque em 1940, na Segunda Guerra Mundial. Simboliza a perseverança diante
