    es: Se refiere al mito en el que Zeus, en forma de cisne, sedujo o violó a Leda, lo que llevó al nacimiento
      de Helena de Troya y otras figuras. A menudo se usa como símbolo de belleza, poder o coerción.
    fr: Fait référence au mythe où Zeus, sous la forme d'un cygne, séduisit ou viola Léda, donnant naissance
      à Hélène de Troie et d'autres figures. Souvent utilisé comme symbole de beauté, de pouvoir ou de
      contrainte.
    de: Bezieht sich auf den Mythos, in dem Zeus in Gestalt eines Schwans Leda verführte oder vergewaltigte,
      was zur Geburt von Helena von Troja und anderen Figuren führte. Wird oft als Symbol für Schönheit,
      Macht oder Zwang verwendet.
    it: Si riferisce al mito in cui Zeus, sotto forma di cigno, sedusse o violentò Leda, portando alla
