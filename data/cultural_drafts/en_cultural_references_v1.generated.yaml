- id: en_classical_or_scriptural_allusion_aeneas_descent_into_hades_5d8625cc
  language: en
  canonical_reference: Aeneas’ descent into Hades
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Aeneas' descent into Hades
  - Aeneas in the Underworld
  - Aeneas' journey to the dead
  short_explanation: Symbolizes a hero's journey into the afterlife to seek guidance or knowledge. It
    is a foundational myth in Virgil's epic, representing the hero's encounter with fate and the divine.
  i18n_explanations:
    en: Symbolizes a hero's journey into the afterlife to seek guidance or knowledge. It is a foundational
      myth in Virgil's epic, representing the hero's encounter with fate and the divine.
    es: Simboliza el viaje de un héroe al más allá en busca de guía o conocimiento. Es un mito fundacional
      en la épica de Virgilio, que representa el encuentro del héroe con el destino y lo divino.
    fr: Symbolise le voyage d'un héros vers l'au-delà pour y chercher guidance ou connaissance. C'est
      un mythe fondateur dans l'épopée de Virgile, représentant la rencontre du héros avec le destin et
      le divin.
    de: Symbolisiert die Reise eines Helden in die Unterwelt, um Führung oder Wissen zu suchen. Es ist
      ein grundlegender Mythos in Vergils Epos und steht für die Begegnung des Helden mit Schicksal und
      Göttlichem.
    it: Simboleggia il viaggio di un eroe nell'aldilà per cercare guida o conoscenza. È un mito fondante
      nell'epica di Virgilio, che rappresenta l'incontro dell'eroe con il destino e il divino.
    pt: Simboliza a jornada de um herói ao além em busca de orientação ou conhecimento. É um mito fundador
      na épica de Virgílio, representando o encontro do herói com o destino e o divino.
    ru: Символизирует путешествие героя в загробный мир за наставлением или знанием. Это основополагающий
      миф в поэме Вергилия, отражающий встречу героя с судьбой и божественным.
    ja: 英雄の死後の世界への旅を象徴し、指導や知識を求める。ウェルギリウスの叙事詩における基礎的な神話で、英雄の運命と神々との遭遇を表す。
    zh: 象征英雄进入冥界寻求指引或知识。这是维吉尔史诗中的基础神话，代表英雄与命运和神灵的相遇。
    ar: يرمز إلى رحلة بطل إلى العالم الآخر طلبًا للإرشاد أو المعرفة. إنه أسطورة أساسية في ملحمة فيرجيل،
      تمثل لقاء البطل بالمصير والإلهي.
    he: מסמל את מסעו של גיבור אל העולם הבא בחיפוש אחר הדרכה או ידע. זוהי מיתוס יסודי באפוס של ורגיליוס,
      המייצג את מפגשו של הגיבור עם הגורל והאלוהי.
