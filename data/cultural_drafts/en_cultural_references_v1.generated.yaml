    ja: J.M.W.ターナーの1839年の絵画で、退役したHMSテメレールが破壊のために曳航される様子を描いている。帆船時代の衰退とロマン主義の崇高なテーマを象徴する。
    zh: 指J.M.W.透纳于1839年创作的画作《战舰泰米雷尔号》，描绘一艘退役的HMS泰米雷尔号被拖往销毁的情景。象征帆船时代的衰落及浪漫主义的崇高主题。
    ar: يشير إلى لوحة جيه. إم. دبليو. تيرنر (1839) التي تصور سفينة HMS تيميراير وهي تُسحب إلى هلاكها بعد
