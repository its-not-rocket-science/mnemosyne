- id: en_literary_reference_the_play_s_the_thing_09dacf8f
  language: en
  canonical_reference: The play’s the thing
  reference_type: literary_reference
  surface_patterns:
  - the play’s the thing
  - the play is the thing
  - plays the thing
  short_explanation: A line from Hamlet’s soliloquy, suggesting that theater (or art) reveals truth and
    exposes hidden motives. It is often cited to emphasize the power of drama or performance as a means
    of understanding human nature.
  i18n_explanations:
    en: A line from Hamlet’s soliloquy, suggesting that theater (or art) reveals truth and exposes hidden
      motives. It is often cited to emphasize the power of drama or performance as a means of understanding
      human nature.
    es: Una línea del soliloquio de Hamlet que sugiere que el teatro (o el arte) revela la verdad y expone
      motivos ocultos. Se cita para destacar el poder del drama o la actuación como medio para entender
      la naturaleza humana.
    fr: Une réplique du monologue d'Hamlet suggérant que le théâtre (ou l'art) révèle la vérité et expose
      les motivations cachées. Elle est souvent citée pour souligner le pouvoir du drame ou de la performance
      comme moyen de comprendre la nature humaine.
    de: Eine Zeile aus Hamlets Monolog, die besagt, dass das Theater (oder die Kunst) die Wahrheit offenbart
      und verborgene Motive aufdeckt. Sie wird oft zitiert, um die Kraft des Dramas oder der Darstellung
      als Mittel zum Verständnis der menschlichen Natur zu betonen.
    it: Una battuta del monologo di Amleto che suggerisce come il teatro (o l'arte) riveli la verità e
      metta in luce motivazioni nascoste. Viene citata per sottolineare il potere del dramma o della recitazione
      come mezzo per comprendere la natura umana.
    pt: Uma linha do solilóquio de Hamlet que sugere que o teatro (ou a arte) revela a verdade e expõe
      motivos ocultos. É frequentemente citada para enfatizar o poder do drama ou da performance como
      meio de compreender a natureza humana.
    ru: Строка из монолога Гамлета, suggesting that theater (or art) reveals truth and exposes hidden
      motives. It is often cited to emphasize the power of drama or performance as a means of understanding
      human nature.
    ja: ハムレットの独白の一節で、演劇（あるいは芸術）が真実を明らかにし、隠された動機を暴くことを示唆している。人間の本質を理解する手段として、ドラマや演技の力を強調する際に引用される。
    zh: 哈姆雷特独白中的一句台词，意指戏剧（或艺术）揭示真相并暴露隐藏动机。常被引用以强调戏剧或表演作为理解人性的手段的力量。
    ar: سطر من مناجاة هاملت يقترح أن المسرح (أو الفن) يكشف الحقيقة ويظهر الدوافع الخفية. غالبًا ما يُستشهد
      به لتسليط الضوء على قوة الدراما أو الأداء كوسيلة لفهم الطبيعة البشرية.
    he: שורה מהמונולוג של המלט שמציעה כי התיאטרון (או האמנות) מגלה את האמת וחושף מניעים נסתרים. לעיתים
      קרובות מצוטטת כדי להדגיש את כוחו של הדרמה או הביצוע כאמצעי להבנת טבע האדם.
