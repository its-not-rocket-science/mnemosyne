- id: en_classical_or_scriptural_allusion_the_wild_hunt_ba587d05
  language: en
  canonical_reference: The Wild Hunt
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - the Wild Hunt
  - Wild Hunt
  - the Wild Hunt of Odin
  - the Wild Hunt of Woden
  - the Wild Hunt rides tonight
  short_explanation: A mythological procession led by a god (often Odin/Woden) through the sky, associated
    with storms and omens of war. It appears in Germanic and Norse folklore as a harbinger of doom or
    a supernatural hunt.
  i18n_explanations:
    en: A mythological procession led by a god (often Odin/Woden) through the sky, associated with storms
      and omens of war. It appears in Germanic and Norse folklore as a harbinger of doom or a supernatural
      hunt.
    es: Una procesión mitológica liderada por un dios (a menudo Odín/Woden) a través del cielo, asociada
      con tormentas y presagios de guerra. Aparece en el folclore germánico y nórdico como un augurio
      de fatalidad o una cacería sobrenatural.
    fr: Une procession mythologique menée par un dieu (souvent Odin/Woden) dans le ciel, associée aux
      tempêtes et aux présages de guerre. Elle apparaît dans le folklore germanique et nordique comme
      un présage de malheur ou une chasse surnaturelle.
    de: Ein mythologischer Zug, der von einem Gott (oft Odin/Wodan) am Himmel geführt wird und mit Stürmen
      und Kriegsvorzeichen verbunden ist. Er erscheint im germanischen und nordischen Volksglauben als
      Unheilsbote oder eine übernatürliche Jagd.
    it: Una processione mitologica guidata da un dio (spesso Odino/Woden) nel cielo, associata a tempeste
      e presagi di guerra. Appare nel folclore germanico e norreno come un presagio di sventura o una
      caccia sovrannaturale.
    pt: Uma procissão mitológica liderada por um deus (geralmente Odin/Woden) pelo céu, associada a tempestades
      e presságios de guerra. Aparece no folclore germânico e nórdico como um prenúncio de desgraça ou
      uma caçada sobrenatural.
    ru: Мифологическая процессия, возглавляемая богом (часто Одином/Воденом), проносящаяся по небу, связанная
      со штормами и предзнаменованиями войны. В германском и скандинавском фольклоре она предвещает гибель
      или охоту сверхъестественных сил.
    ja: 嵐と戦争の前兆と結びつけられた神（しばしばオーディン/ウォーデン）に率いられた空を駆ける神話的行列。ゲルマンと北欧の伝承では、災厄の前触れや超自然の狩りとして現れる。
    zh: 由一位神祇（通常是奥丁/沃登）率领的天空行进的神话队伍，与暴风雨和战争预兆相关。在日耳曼和北欧民间传说中，它是灾难的预兆或超自然的狩猎。
    ar: مسيرة أسطورية يقودها إله (غالبًا أودين/ودن) عبر السماء، ترتبط بالعواصف و علامات الحرب. تظهر في
      الفولكلور الجرماني و النوردي كمنذر بدمار أو صيد خارق للطبيعة.
    he: תהלוכה מיתולוגית בראשות אל (לרוב אודין/וודן) החוצה את השמיים, קשורה לסערות ולמבשרי מלחמה. מופיעה
