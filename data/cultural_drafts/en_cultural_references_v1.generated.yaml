- id: en_classical_or_scriptural_allusion_lotus_eaters_2a1fa234
  language: en
  canonical_reference: lotus-eaters
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - lotus-eaters
  - the lotus-eaters
  - lotus-eater
  - lotus-eating
  short_explanation: In Greek mythology, the lotus-eaters were a people who lived on an island where the
    fruit of the lotus plant made those who ate it forget their home and lose their desire to return.
    The term symbolizes escapism or indifference to duty.
  i18n_explanations:
    en: In Greek mythology, the lotus-eaters were a people who lived on an island where the fruit of the
      lotus plant made those who ate it forget their home and lose their desire to return. The term symbolizes
      escapism or indifference to duty.
    es: En la mitología griega, los lotófagos eran un pueblo que vivía en una isla donde el fruto del
      loto hacía que quienes lo comían olvidaran su hogar y perdieran el deseo de regresar. El término
      simboliza el escapismo o la indiferencia al deber.
    fr: Dans la mythologie grecque, les Lotophages étaient un peuple vivant sur une île dont le fruit
      du lotus faisait oublier à ceux qui le mangeaient leur foyer et leur désir de rentrer. Le terme
      symbolise l'évasion ou l'indifférence au devoir.
    de: In der griechischen Mythologie waren die Lotophagen ein Volk, das auf einer Insel lebte, deren
      Lotosfrucht diejenigen, die sie aßen, ihre Heimat vergessen und den Wunsch zu gehen verlieren ließ.
      Der Begriff symbolisiert Flucht vor der Pflicht oder Gleichgültigkeit.
    it: Nella mitologia greca, i Lotofagi erano un popolo che viveva su un'isola dove il frutto del loto
      faceva dimenticare a chi lo mangiava la propria casa e la voglia di tornare. Il termine simboleggia
      l'evasione o l'indifferenza al dovere.
    pt: Na mitologia grega, os lotófagos eram um povo que vivia em uma ilha onde o fruto da planta loto
      fazia com que quem o comesse esquecesse sua casa e perdesse o desejo de voltar. O termo simboliza
      o escapismo ou a indiferença ao dever.
    ru: В греческой мифологии лотофаги были народом, жившим на острове, где плод лотоса заставлял тех,
      кто его ел, забывать о доме и терять желание возвращаться. Этот термин символизирует бегство от
      обязанностей или равнодушие.
    ja: ギリシャ神話に登場するロートパゴイは、ロータスの実を食べると故郷を忘れ、帰る意思を失う島の住民です。この言葉は現実逃避や義務への無関心を象徴します。
    zh: 在希腊神话中，食莲人是一个生活在岛上的民族，岛上的莲花果实让食用者忘记家园并失去归乡之愿。该词语象征逃避现实或对职责的冷漠。
    ar: في الميثولوجيا اليونانية، كان آكلي اللوتس شعبًا عاشوا في جزيرة جعلتهم ثمرة نبات اللوتس من يأكلها
