  short_explanation: A principle of justice requiring retaliation in kind (e.g., an eye for an eye). Originating
    in ancient legal codes, it symbolizes proportional justice but is often criticized for promoting vengeance.
  i18n_explanations:
    en: A principle of justice requiring retaliation in kind (e.g., an eye for an eye). Originating in
      ancient legal codes, it symbolizes proportional justice but is often criticized for promoting vengeance.
    es: Principio de justicia que exige retaliación equivalente (como ojo por ojo). Surgido en códigos
      legales antiguos, simboliza la justicia proporcional, aunque a menudo se critica por fomentar la
      venganza.
    fr: Un principe de justice exigeant une rétribution équivalente (comme œil pour œil). Issu de codes
      juridiques anciens, il symbolise la justice proportionnelle, bien qu'il soit souvent critiqué pour
      encourager la vengeance.
    de: Ein Gerechtigkeitsprinzip, das eine gleichwertige Vergeltung verlangt (Auge um Auge). Ursprünglich
      aus alten Rechtskodizes, steht es für proportionale Gerechtigkeit, wird aber oft als Förderung von
      Rache kritisiert.
    it: Un principio di giustizia che richiede una ritorsione equivalente (occhio per occhio). Nato da
      antichi codici legali, simboleggia la giustizia proporzionale, ma è spesso criticato per promuovere
      la vendetta.
    pt: Princípio de justiça que exige retaliação equivalente (olho por olho). Originário de antigos códigos
      legais, simboliza a justiça proporcional, embora seja criticado por promover a vingança.
    ru: Принцип справедливости, требующий равного возмездия (око за око). Впервые появился в древних правовых
      кодексах, символизирует пропорциональное наказание, но часто критикуется за поощрение мести.
    ja: 同等の報復を求める正義の原則（目には目を）。古代の法典に起源を持ち、比例的正義を象徴するが、報復を助長すると批判されることも多い。
    zh: 要求同等报复的正义原则（以眼还眼）。源于古代法律，象征比例正义，但常因助长报复而受到批评。
    ar: مبدأ عدالة يقضي بالانتقام بمثل الفعل (مثل العين بالعين). نشأ في القوانين القديمة، ويرمز إلى العدالة
