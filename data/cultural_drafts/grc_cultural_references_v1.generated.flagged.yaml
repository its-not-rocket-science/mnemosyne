- id: grc_literary_reference_κτη_μα_ἐσ_αἰεί_b3bcb23e
  language: grc
  canonical_reference: Κτῆμα ἐς αἰεί
  reference_type: literary_reference
  surface_patterns:
  - κτῆμα ἐς αἰεί
  - κτῆμα ἐς ἀεὶ
  short_explanation: From Pericles' Funeral Oration in Thucydides' 'History of the Peloponnesian War',
    this phrase describes Athens as an eternal possession or legacy, and is often used to signify something
    of lasting value.
  i18n_explanations:
    en: From Pericles' Funeral Oration in Thucydides' 'History of the Peloponnesian War', this phrase
      describes Athens as an eternal possession or legacy, and is often used to signify something of lasting
      value.
    es: De la Oración Fúnebre de Pericles en la 'Historia de la Guerra del Peloponeso' de Tucídides, esta
      frase describe Atenas como una posesión o legado eterno, y se usa a menudo para significar algo
      de valor duradero.
    fr: Extrait de l'oraison funèbre de Périclès dans l''Histoire de la guerre du Péloponnèse' de Thucydide,
      cette phrase décrit Athènes comme une possession ou un héritage éternel, et est souvent utilisée
      pour signifier quelque chose de valeur durable.
    de: Aus der Gefallenenrede des Perikles in Thukydides' 'Geschichte des Peloponnesischen Krieges' beschreibt
      dieser Satz Athen als ewigen Besitz oder Vermächtnis und wird oft verwendet, um etwas von dauerhaftem
      Wert zu bezeichnen.
    it: Dal discorso funebre di Pericle nella 'Storia della guerra del Peloponneso' di Tucidide, questa
      frase descrive Atene come un possesso o un'eredità eterna, ed è spesso usata per significare qualcosa
      di valore duraturo.
    pt: Do Discurso Fúnebre de Péricles na 'História da Guerra do Peloponeso' de Tucídides, esta frase
      descreve Atenas como uma posse ou legado eterno, e é frequentemente usada para significar algo de
      valor duradouro.
    ru: Из надгробной речи Перикла в «Истории Пелопоннесской войны» Фукидида эта фраза описывает Афины
      как вечное владение или наследие и часто используется для обозначения чего-то непреходящей ценности.
    ja: トゥキディデスの『戦史』におけるペリクレスの葬礼演説から、この言葉はアテナイを永遠の所有物または遺産として描写し、持続的な価値を持つものを意味するためによく使われる。
    zh: 出自修昔底德《伯罗奔尼撒战争史》中伯里克利的葬礼演说，这句话将雅典描述为永恒的财产或遗产，常用来表示具有持久价值的事物。
    ar: من خطبة جنازة بريكليس في 'تاريخ الحرب البيلوبونيزية' لثوقيديدس، يصف هذا العبارة أثينا كممتلكات
      أو إرث أبدي، وغالبًا ما تستخدم للدلالة على شيء ذي قيمة دائمة.
    he: מתוך נאום ההספד של פריקלס ב'תולדות המלחמה הפלופונסית' של תוקידידס, ביטוי זה מתאר את אתונה כנחלה
      או מורשת נצחית, ומשמש לעתים קרובות לציון דבר בעל ערך מתמשך.
