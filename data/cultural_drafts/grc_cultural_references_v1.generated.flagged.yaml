  short_explanation: Prometheus' fire refers to the fire stolen from the gods by the Titan Prometheus
    and given to humanity. It symbolizes knowledge, civilization, and enlightenment, often used metaphorically
    for a creative or life-giving force.
  i18n_explanations:
    en: Prometheus' fire refers to the fire stolen from the gods by the Titan Prometheus and given to
      humanity. It symbolizes knowledge, civilization, and enlightenment, often used metaphorically for
      a creative or life-giving force.
    es: El fuego de Prometeo se refiere al fuego robado a los dioses por el titán Prometeo y entregado
      a la humanidad. Simboliza el conocimiento, la civilización y la ilustración, y a menudo se usa metafóricamente
      como una fuerza creativa o dadora de vida.
    fr: Le feu de Prométhée fait référence au feu volé aux dieux par le Titan Prométhée et donné à l'humanité.
      Il symbolise la connaissance, la civilisation et l'illumination, souvent utilisé métaphoriquement
      pour une force créatrice ou vivifiante.
    de: Das Feuer des Prometheus bezieht sich auf das Feuer, das der Titan Prometheus den Göttern stahl
      und den Menschen gab. Es symbolisiert Wissen, Zivilisation und Erleuchtung und wird oft metaphorisch
      für eine schöpferische oder lebensspendende Kraft verwendet.
    it: Il fuoco di Prometeo si riferisce al fuoco rubato agli dei dal titano Prometeo e donato all'umanità.
      Simboleggia conoscenza, civiltà e illuminazione, spesso usato metaforicamente per una forza creativa
      o vivificante.
    pt: O fogo de Prometeu refere-se ao fogo roubado dos deuses pelo titã Prometeu e dado à humanidade.
      Simboliza conhecimento, civilização e iluminação, frequentemente usado metaforicamente como uma
      força criativa ou geradora de vida.
    ru: Огонь Прометея относится к огню, украденному у богов титаном Прометеем и переданному человечеству.
      Он символизирует знание, цивилизацию и просвещение, часто используется метафорически для обозначения
      творческой или животворной силы.
    ja: プロメーテウスの火は、ティターン神プロメーテウスが神々から盗んで人類に与えた火を指す。知識、文明、啓蒙を象徴し、創造的または生命を与える力の比喩としてよく使われる。
