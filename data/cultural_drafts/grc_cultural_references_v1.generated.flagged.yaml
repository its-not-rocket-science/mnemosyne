  short_explanation: A phrase attributed to Heraclitus expressing the concept of universal flux, that
    everything is in constant change. It is a central tenet of Heraclitean philosophy.
  i18n_explanations:
    en: A phrase attributed to Heraclitus expressing the concept of universal flux, that everything is
      in constant change. It is a central tenet of Heraclitean philosophy.
    es: Frase atribuida a Heráclito que expresa el concepto de flujo universal, de que todo está en constante
      cambio. Es un principio central de la filosofía heracleíta.
    fr: Phrase attribuée à Héraclite exprimant le concept de flux universel, que tout est en changement
      constant. C'est un principe central de la philosophie héraclitéenne.
    de: Ein dem Heraklit zugeschriebener Ausdruck, der das Konzept des universellen Flusses ausdrückt,
      dass alles in ständigem Wandel ist. Es ist ein zentraler Grundsatz der heraklitischen Philosophie.
    it: Frase attribuita a Eraclito che esprime il concetto di flusso universale, che tutto è in costante
      cambiamento. È un principio centrale della filosofia eraclitea.
    pt: Frase atribuída a Heráclito que expressa o conceito de fluxo universal, de que tudo está em constante
      mudança. É um princípio central da filosofia heracleitana.
    ru: Фраза, приписываемая Гераклиту, выражающая концепцию всеобщего потока, что все находится в постоянном
      изменении. Это центральный принцип гераклитовой философии.
    ja: 万物は流転するという万物の流動性を表す、ヘラクレイトスに帰される言葉。ヘラクレイトス哲学の中心的概念である。
    zh: 归因于赫拉克利特的短语，表达了普遍流动的概念，即一切都在不断变化。这是赫拉克利特哲学的核心原则。
    ar: عبارة منسوبة إلى هيراقليطس تعبر عن مفهوم التدفق الكوني، أن كل شيء في تغير مستمر. إنها مبدأ أساسي
      في الفلسفة الهيراقليطية.
    he: ביטוי המיוחס להרקליטוס המבטא את מושג הזרימה האוניברסלית, שהכל נמצא בשינוי מתמיד. זהו עיקרון מרכזי
