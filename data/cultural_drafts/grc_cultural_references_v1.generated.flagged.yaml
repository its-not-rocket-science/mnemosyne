  short_explanation: Refers to the Golden Age of Athens under Pericles (c. 461–429 BCE), a period of cultural
    flourishing, imperial power, and democratic consolidation.
  i18n_explanations:
    en: Refers to the Golden Age of Athens under Pericles (c. 461–429 BCE), a period of cultural flourishing,
      imperial power, and democratic consolidation.
    es: Se refiere a la Edad de Oro de Atenas bajo Pericles (c. 461-429 a.C.), un período de florecimiento
      cultural, poder imperial y consolidación democrática.
    fr: Fait référence à l'Âge d'or d'Athènes sous Périclès (vers 461-429 av. J.-C.), une période d'épanouissement
      culturel, de puissance impériale et de consolidation démocratique.
    de: Bezieht sich auf das Goldene Zeitalter Athens unter Perikles (ca. 461–429 v. Chr.), eine Zeit
      kultureller Blüte, imperialer Macht und demokratischer Konsolidierung.
    it: Si riferisce all'Età dell'Oro di Atene sotto Pericle (ca. 461-429 a.C.), un periodo di fioritura
      culturale, potere imperiale e consolidamento democratico.
    pt: Refere-se à Era de Ouro de Atenas sob Péricles (c. 461-429 a.C.), um período de florescimento
      cultural, poder imperial e consolidação democrática.
    ru: Относится к Золотому веку Афин при Перикле (ок. 461–429 гг. до н.э.), периоду культурного расцвета,
      имперской мощи и укрепления демократии.
    ja: ペリクレス統治下のアテナイの黄金時代（紀元前461～429年頃）を指し、文化的繁栄、帝国の力、民主主義の確立の時代。
    zh: 指伯里克利统治下雅典的黄金时代（约公元前461-429年），这是一个文化繁荣、帝国权力和民主巩固的时期。
    ar: يشير إلى العصر الذهبي لأثينا تحت حكم بريكليس (حوالي 461-429 قبل الميلاد)، وهي فترة من الازدهار
      الثقافي والقوة الإمبراطورية وتعزيز الديمقراطية.
    he: מתייחס לתור הזהב של אתונה תחת פריקלס (כ-461–429 לפנה"ס), תקופה של פריחה תרבותית, כוח אימפריאלי
      וביסוס דמוקרטי.
