- id: ja_cultural_reference_承久の乱の後鳥羽上皇_78cac4ef
  language: ja
  canonical_reference: 承久の乱の後鳥羽上皇
  reference_type: cultural_reference
  surface_patterns:
  - 後鳥羽上皇
  - 承久の乱の後鳥羽上皇
  - 後鳥羽院
  - 後鳥羽天皇
  short_explanation: Emperor Go-Toba, who instigated the Jōkyū War (1221) against the Kamakura shogunate,
    was exiled to Oki Island after his defeat. His defiance symbolizes the struggle between imperial authority
    and military rule in medieval Japan.
  i18n_explanations:
    en: Emperor Go-Toba, who instigated the Jōkyū War (1221) against the Kamakura shogunate, was exiled
      to Oki Island after his defeat. His defiance symbolizes the struggle between imperial authority
      and military rule in medieval Japan.
    es: El emperador Go-Toba, que instigó la Guerra Jōkyū (1221) contra el shogunato de Kamakura, fue
      exiliado a la isla de Oki tras su derrota. Su desafío simboliza la lucha entre la autoridad imperial
      y el gobierno militar en el Japón medieval.
    fr: L'empereur Go-Toba, qui déclencha la guerre de Jōkyū (1221) contre le shogunat de Kamakura, fut
      exilé sur l'île d'Oki après sa défaite. Sa rébellion symbolise la lutte entre l'autorité impériale
      et le pouvoir militaire au Japon médiéval.
    de: Kaiser Go-Toba, der den Jōkyū-Krieg (1221) gegen das Kamakura-Shogunat anzettelte, wurde nach
      seiner Niederlage auf die Oki-Insel verbannt. Sein Widerstand symbolisiert den Kampf zwischen kaiserlicher
      Autorität und militärischer Herrschaft im mittelalterlichen Japan.
    it: L'imperatore Go-Toba, che scatenò la guerra di Jōkyū (1221) contro lo shogunato di Kamakura, fu
      esiliato sull'isola di Oki dopo la sconfitta. La sua ribellione simboleggia la lotta tra autorità
      imperiale e potere militare nel Giappone medievale.
    pt: O imperador Go-Toba, que instigou a Guerra Jōkyū (1221) contra o xogunato de Kamakura, foi exilado
      na ilha de Oki após sua derrota. Sua rebeldia simboliza a luta entre autoridade imperial e poder
      militar no Japão medieval.
    ru: Император Го-Тоба, поднявший войну Дзёкю (1221) против сёгуната Камакура, был сослан на остров
      Оки после поражения. Его сопротивление символизирует борьбу между императорской властью и военным
      правлением в средневековой Японии.
    ja: 承久の乱（1221年）で鎌倉幕府に反旗を翻した後鳥羽上皇は、敗北後に隠岐島へ流された。その抵抗は、中世日本における皇権と武家政権の争いを象徴している。
    zh: 发动承久之乱（1221年）反抗镰仓幕府的后鸟羽上皇，战败后被流放至隐岐岛。他的反抗象征着中世纪日本皇权与武家政权的斗争。
    ar: الإمبراطور غو-توبا، الذي أشعل حرب جوكيو (1221) ضد شوغونية كاماكورا، تم نفيه إلى جزيرة أوكي بعد
      هزيمته. مقاومته ترمز للنضال بين السلطة الإمبراطورية والحكم العسكري في اليابان الإقطاعية.
    he: הקיסר גו-טובה, שפתח במלחמת ג'וקיו (1221) נגד שוגונות קמקורה, הוגלה לאי אוקי לאחר תבוסתו. התנגדותו
      מסמלת את המאבק בין סמכות קיסרית לשלטון צבאי ביפן של ימי הביניים.
