  short_explanation: A mythical nine-tailed fox from East Asian folklore, often depicted as a shape-shifting
    yōkai with magical powers. In Japanese literature, it is frequently associated with trickery, seduction,
    or supernatural abilities, particularly in works like 'The Tale of the Bamboo Cutter' (Taketori Monogatari).
  i18n_explanations:
    en: A mythical nine-tailed fox from East Asian folklore, often depicted as a shape-shifting yōkai
      with magical powers. In Japanese literature, it is frequently associated with trickery, seduction,
      or supernatural abilities, particularly in works like 'The Tale of the Bamboo Cutter' (Taketori
      Monogatari).
    es: Un zorro de nueve colas de la mitología del este asiático, a menudo representado como un yōkai
      que cambia de forma con poderes mágicos. En la literatura japonesa, se asocia con frecuencia con
      el engaño, la seducción o habilidades sobrenaturales, especialmente en obras como 'El Cuento del
      Cortador de Bambú' (Taketori Monogatari).
    fr: Un renard à neuf queues issu du folklore est-asiatique, souvent représenté comme un yōkai métamorphe
      doté de pouvoirs magiques. Dans la littérature japonaise, il est fréquemment associé à la ruse,
      à la séduction ou à des capacités surnaturelles, notamment dans des œuvres comme 'Le Conte du Coupeur
      de Bambou' (Taketori Monogatari).
    de: Ein neunschwänziger Fuchs aus der ostasiatischen Mythologie, oft als wandelbarer Yōkai mit magischen
      Kräften dargestellt. In der japanischen Literatur wird er häufig mit Täuschung, Verführung oder
      übernatürlichen Fähigkeiten in Verbindung gebracht, besonders in Werken wie 'Das Märchen vom Bambusschneider'
      (Taketori Monogatari).
    it: Una volpe a nove code del folclore dell'Asia orientale, spesso raffigurata come uno yōkai metamorfico
      con poteri magici. Nella letteratura giapponese è spesso associata a inganni, seduzione o abilità
      soprannaturali, in particolare in opere come 'Il Racconto del Tagliatore di Bambù' (Taketori Monogatari).
    pt: Uma raposa de nove caudas do folclore do Leste Asiático, frequentemente retratada como um yōkai
      metamórfico com poderes mágicos. Na literatura japonesa, está associada a enganos, sedução ou habilidades
      sobrenaturais, especialmente em obras como 'O Conto do Cortador de Bambu' (Taketori Monogatari).
    ru: Мифологическая девятивостая лиса из восточноазиатского фольклора, часто изображаемая как оборотень-ёкай
      с магическими способностями. В японской литературе она ассоциируется с хитростью, соблазнением или
      сверхъестественными силами, особенно в произведениях, таких как 'Сказание о бамбукорезе' (Такетори
      моногатари).
    ja: 東アジアの伝承に登場する九本の尾を持つ架空の狐で、変化自在の妖怪として描かれる。日本文学では、特に「竹取物語」に登場するように、悪戯、誘惑、超自然的な能力と結びつけられることが多い。
    zh: 东亚传说中的九尾狐，常被描绘为能变形的妖怪，具有魔法能力。在日本文学中，它常与诡计、诱惑或超自然能力联系在一起，尤见于《竹取物语》等作品。
    ar: ثعلب أسطوري من تسع ذيول من الفولكلور الشرقي الآسيوي، غالبًا ما يُصوَّر كيان شيطاني متحول يمتلك
      قوى سحرية. في الأدب الياباني، يُرتبط غالبًا بالمكر أو الإغواء أو القدرات الخارقة، لا سيما في أعمال
      مثل 'قصة قاطع الخيزران' (تاكيتوري مونوغاتاري).
    he: שועל תשע זנבות מהפולקלור המזרח אסייתי, המוצג לעיתים קרובות כיצור על-טבעי משנה צורה בעל כוחות קסם.
      בספרות היפנית הוא קשור לעיתים קרובות לתחבולות, פיתוי או יכולות על-טבעיות, במיוחד ביצירות כמו 'אגדת
      החוטב הבמבוק' (טאקטורי מונogatari).
