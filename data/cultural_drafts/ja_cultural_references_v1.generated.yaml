  short_explanation: A divine spear mentioned in Japanese mythology, particularly in the Kojiki and Nihon
    Shoki, used by the gods Izanagi and Izanami to stir the primordial ocean and create the Japanese islands.
    Symbolizes creation and divine authority.
  i18n_explanations:
    en: A divine spear mentioned in Japanese mythology, particularly in the Kojiki and Nihon Shoki, used
      by the gods Izanagi and Izanami to stir the primordial ocean and create the Japanese islands. Symbolizes
      creation and divine authority.
    es: Una lanza divina mencionada en la mitología japonesa, especialmente en el Kojiki y Nihon Shoki,
      usada por los dioses Izanagi e Izanami para remover el océano primordial y crear las islas de Japón.
      Simboliza la creación y la autoridad divina.
    fr: Une lance divine mentionnée dans la mythologie japonaise, notamment dans le Kojiki et le Nihon
      Shoki, utilisée par les dieux Izanagi et Izanami pour remuer l'océan primordial et créer les îles
      du Japon. Symbolise la création et l'autorité divine.
    de: Eine göttliche Lanze aus der japanischen Mythologie, erwähnt im Kojiki und Nihon Shoki, die von
      den Göttern Izanagi und Izanami genutzt wurde, um den Ur-Ozean zu rühren und die japanischen Inseln
      zu erschaffen. Symbolisiert Schöpfung und göttliche Autorität.
    it: Una lancia divina menzionata nella mitologia giapponese, in particolare nel Kojiki e Nihon Shoki,
      usata dagli dèi Izanagi e Izanami per mescolare l'oceano primordiale e creare le isole del Giappone.
      Simboleggia la creazione e l'autorità divina.
    pt: Uma lança divina mencionada na mitologia japonesa, especialmente no Kojiki e Nihon Shoki, usada
      pelos deuses Izanagi e Izanami para agitar o oceano primordial e criar as ilhas do Japão. Simboliza
      a criação e a autoridade divina.
    ru: Божественное копьё, упоминаемое в японской мифологии, особенно в Кодзики и Нихон Сёки, которое
      боги Идзанаги и Идзанами использовали, чтобы взбалтывать первобытный океан и создавать японские
      острова. Символизирует творение и божественную власть.
    ja: 日本神話、特に古事記や日本書紀に登場する神の矛。イザナギとイザナミの神が原初の海をかき回して日本の島々を創造する際に用いられた。創造と神聖な権威を象徴する。
    zh: 日本神话中提到的神矛，特别是在《古事记》和《日本书纪》中，由伊邪那岐和伊邪那美神用来搅动原始海洋并创造日本诸岛。象征创造与神圣权威。
    ar: رمح إلهي ذكر في الميثولوجيا اليابانية، ولا سيما في الكوجيكي ونيهون شوكي، استخدمه الآلهة إيزاناغي
      وإيزانامي لتحريك المحيط البدائي وخلق جزر اليابان. يرمز إلى الخلق والسلطة الإلهية.
    he: חנית אלוהית המוזכרת במיתולוגיה היפנית, ובמיוחד בקוג'יקי ובניהון שוקי, ששימשה את האלים איזנגי ואיזנגמי
      לערבב את האוקיינוס הקדמוני וליצור את איי יפן. מסמלת בריאה וסמכות אלוהית.
