  - 壇ノ浦の戦
  short_explanation: The final naval battle of the Genpei War (1185), where the Taira clan was decisively
    defeated by the Minamoto clan. It marked the end of the Heian period and the rise of the samurai class,
    with the child Emperor Antoku drowning in the battle.
  i18n_explanations:
    en: The final naval battle of the Genpei War (1185), where the Taira clan was decisively defeated
      by the Minamoto clan. It marked the end of the Heian period and the rise of the samurai class, with
      the child Emperor Antoku drowning in the battle.
    es: La batalla naval final de la Guerra Genpei (1185), donde el clan Taira fue derrotado decisivamente
      por el clan Minamoto. Marcó el fin del período Heian y el ascenso de la clase samurái, con el emperador
      niño Antoku ahogándose en la batalla.
    fr: La bataille navale finale de la guerre de Genpei (1185), où le clan Taira fut vaincu de manière
      décisive par le clan Minamoto. Elle marqua la fin de la période Heian et l'ascension de la classe
      des samouraïs, avec la noyade de l'empereur enfant Antoku.
    de: Die letzte Seeschlacht des Genpei-Kriegs (1185), in der der Taira-Clan vom Minamoto-Clan entscheidend
      besiegt wurde. Sie markierte das Ende der Heian-Zeit und den Aufstieg der Samurai-Klasse, wobei
      der kindliche Kaiser Antoku ertrank.
    it: La battaglia navale finale della guerra Genpei (1185), in cui il clan Taira fu sconfitto in modo
      decisivo dal clan Minamoto. Segnò la fine del periodo Heian e l'ascesa della classe dei samurai,
      con l'imperatore bambino Antoku che annegò nella battaglia.
    pt: A batalha naval final da Guerra Genpei (1185), na qual o clã Taira foi decisivamente derrotado
      pelo clã Minamoto. Marcou o fim do período Heian e a ascensão da classe samurai, com o imperador
      criança Antoku afogando-se na batalha.
    ru: Последнее морское сражение войны Гэмпэй (1185), в котором клан Тайра был решительно разгромлен
      кланом Минамото. Это ознаменовало конец периода Хэйан и подъём класса самураев, при этом погиб малолетний
      император Антоку.
    ja: 1185年の源平合戦の最終海戦で、平家が源氏に完敗した。平安時代の終焉と武士階級の台頭を象徴し、幼帝安徳天皇が溺死した。
    zh: 1185年源平合战的最后一场海战，平氏被源氏彻底击败。标志着平安时代的终结与武士阶级的崛起，幼帝安德天皇在战斗中溺亡。
    ar: المعركة البحرية النهائية لحرب غينبي (1185)، حيث هُزم عشيرة تايرا بشكل حاسم على يد عشيرة ميناموتو.
      marked the end of the Heian period and the rise of the samurai class, مع غرق الإمبراطور الطفل أنتوكو
      في المعركة.
    he: הקרב הימי האחרון במלחמת גֶנְפֵּיי (1185), בו הובס שבט טָאִירָה באופן מכריע על ידי שבט מִינָמוֹטוֹ.
      סימן את סוף תקופת הֵיאַן ועליית מעמד הסמוראים, כאשר הקיסר הילד אַנְטוֹקוּ טבע בקרב.
