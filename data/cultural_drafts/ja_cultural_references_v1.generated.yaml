  - 聖徳太子の憲法
  - 憲法十七条
  short_explanation: A set of 17 moral and political principles attributed to Prince Shōtoku (574–622),
    serving as a foundational document for governance and ethics in early Japan. It emphasizes harmony,
    loyalty, and Confucian ideals.
  i18n_explanations:
    en: A set of 17 moral and political principles attributed to Prince Shōtoku (574–622), serving as
      a foundational document for governance and ethics in early Japan. It emphasizes harmony, loyalty,
      and Confucian ideals.
    es: Un conjunto de 17 principios morales y políticos atribuidos al príncipe Shōtoku (574–622), que
      sirvió como documento fundacional para la gobernanza y la ética en el Japón antiguo. Destaca la
      armonía, la lealtad y los ideales confucianos.
    fr: Un ensemble de 17 principes moraux et politiques attribués au prince Shōtoku (574–622), servant
      de document fondateur pour la gouvernance et l'éthique dans le Japon ancien. Il met l'accent sur
      l'harmonie, la loyauté et les idéaux confucéens.
    de: Ein Satz von 17 moralischen und politischen Prinzipien, die Prinz Shōtoku (574–622) zugeschrieben
      werden und als grundlegendes Dokument für die Regierungsführung und Ethik im alten Japan dienten.
      Es betont Harmonie, Loyalität und konfuzianische Ideale.
    it: Un insieme di 17 principi morali e politici attribuiti al principe Shōtoku (574–622), che funse
      da documento fondante per la governance e l'etica nel Giappone antico. Sottolinea armonia, lealtà
      e ideali confuciani.
    pt: Um conjunto de 17 princípios morais e políticos atribuídos ao príncipe Shōtoku (574–622), servindo
      como documento fundador para a governança e ética no Japão antigo. Enfatiza harmonia, lealdade e
      ideais confucianos.
    ru: Свод из 17 моральных и политических принципов, приписываемых принцу Сётоку (574–622), который
      стал основополагающим документом для управления и этики в древней Японии. Подчеркиваются гармония,
      преданность и конфуцианские идеалы.
    ja: 聖徳太子（574–622）に帰せられる17条の道徳的・政治的原則で、古代日本の統治と倫理の基礎となった。調和、忠誠、儒教の理想を重視する。
    zh: 圣德太子（574–622）所制定的17条道德与政治原则，成为日本早期治理与伦理的基础文献。强调和谐、忠诚与儒家理想。
    ar: مجموعة من 17 مبدأ أخلاقيًا وسياسيًا تُنسب إلى الأمير شوتوكو (574–622)، والتي شكلت وثيقة تأسيسية
      للحكم والأخلاق في اليابان القديمة. تركز على الانسجام والولاء والمثالية الكونفوشيوسية.
    he: אוסף של 17 עקרונות מוסריים ופוליטיים המיוחסים לנסיך שוטוקו (574–622), ששימש כמסמך יסוד לשלטון
      ולאתיקה ביפן העתיקה. מדגיש הרמוניה, נאמנות ואידיאלים קונפוציאניים.
