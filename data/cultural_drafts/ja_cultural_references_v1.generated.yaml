- id: ja_cultural_reference_腹が立つ_04029b2a
  language: ja
  canonical_reference: 腹が立つ
  reference_type: cultural_reference
  surface_patterns:
  - 腹が立つ
  - 腹が立った
  - 腹立たしい
  short_explanation: Literally 'the stomach rises,' meaning to get angry. Reflects the traditional Japanese
    view of anger as a visceral, physical reaction rather than an abstract emotion.
  i18n_explanations:
    en: Literally 'the stomach rises,' meaning to get angry. Reflects the traditional Japanese view of
      anger as a visceral, physical reaction rather than an abstract emotion.
    es: Literalmente 'el estómago se levanta,' significa enojarse. Refleja la visión japonesa tradicional
      de la ira como una reacción visceral y física, no como una emoción abstracta.
    fr: Littéralement 'l'estomac se soulève,' signifie se mettre en colère. Reflète la vision japonaise
      traditionnelle de la colère comme une réaction viscérale et physique plutôt qu'une émotion abstraite.
    de: Wörtlich 'der Magen steigt,' bedeutet wütend zu werden. Zeigt die traditionelle japanische Sicht
      von Wut als eine körperliche, viszerale Reaktion und nicht als abstrakte Emotion.
    it: Letteralmente 'lo stomaco si alza,' significa arrabbiarsi. Riflette la visione giapponese tradizionale
      della rabbia come una reazione viscerale e fisica, non come un'emozione astratta.
    pt: Literalmente 'o estômago sobe,' significa ficar com raiva. Reflete a visão tradicional japonesa
      da raiva como uma reação visceral e física, não como uma emoção abstrata.
    ru: Буквально 'желудок поднимается,' означает рассердиться. Отражает традиционное японское восприятие
      гнева как физической, а не абстрактной реакции.
    ja: 「腹が立つ」とは文字通り「お腹が立つ」という意味で、怒ることを表します。日本の伝統的な怒りの捉え方として、抽象的な感情ではなく、身体的な反応としての怒りを反映しています。
