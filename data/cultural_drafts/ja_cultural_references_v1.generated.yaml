- id: ja_literary_reference_平家物語の_祇園精舎_c90f0c58
  language: ja
  canonical_reference: 平家物語の「祇園精舎」
  reference_type: literary_reference
  surface_patterns:
  - 祇園精舎
  - 祇園精舎の鐘の声
  - 祇園精舎の句
  - 平家物語の祇園精舎
  short_explanation: The opening lines of 'The Tale of the Heike,' invoking the Gion Shōja temple in India
    to evoke the impermanence of worldly glory. The phrase '祇園精舎の鐘の声、諸行無常の響きあり' (The sound of the bell
    at Gion Shōja echoes the impermanence of all things) is iconic in Japanese literature.
  i18n_explanations:
    en: The opening lines of 'The Tale of the Heike,' invoking the Gion Shōja temple in India to evoke
      the impermanence of worldly glory. The phrase '祇園精舎の鐘の声、諸行無常の響きあり' (The sound of the bell at Gion
      Shōja echoes the impermanence of all things) is iconic in Japanese literature.
    es: Las líneas iniciales de 'El relato de los Heike', que evocan el templo Gion Shōja en la India
      para transmitir la impermanencia de la gloria terrenal. La frase '祇園精舎の鐘の声、諸行無常の響きあり' ('El sonido
      de la campana en Gion Shōja resuena con la impermanencia de todas las cosas') es icónica en la literatura
      japonesa.
    fr: Les premières lignes du 'Dit des Heike', qui évoquent le temple Gion Shōja en Inde pour illustrer
      l'impermanence de la gloire terrestre. La phrase '祇園精舎の鐘の声、諸行無常の響きあり' ('Le son de la cloche du Gion
      Shōja résonne avec l'impermanence de toute chose') est emblématique de la littérature japonaise.
    de: Die einleitenden Zeilen des 'Heike-Monogatari', die den Tempel Gion Shōja in Indien aufrufen,
      um die Vergänglichkeit irdischer Herrlichkeit zu beschwören. Der Satz '祇園精舎の鐘の声、諸行無常の響きあり' ('Der
      Klang der Glocke im Gion Shōja hallt wider mit der Vergänglichkeit aller Dinge') ist ikonisch in
      der japanischen Literatur.
    it: Le prime righe del 'Racconto degli Heike', che evocano il tempio Gion Shōja in India per trasmettere
      l'impermanenza della gloria terrena. La frase '祇園精舎の鐘の声、諸行無常の響きあり' ('Il suono della campana al Gion
      Shōja riecheggia l'impermanenza di tutte le cose') è iconica nella letteratura giapponese.
    pt: As linhas iniciais de 'A História dos Heike', que evocam o templo Gion Shōja na Índia para transmitir
      a impermanência da glória terrena. A frase '祇園精舎の鐘の声、諸行無常の響きあり' ('O som do sino no Gion Shōja ecoa
      a impermanência de todas as coisas') é icônica na literatura japonesa.
    ru: Начальные строки 'Повести о доме Тайра', где упоминается храм Гёнсёдзя в Индии, чтобы подчеркнуть
      непостоянство мирской славы. Фраза '祇園精舎の鐘の声、諸行無常の響きあり' ('Звук колокола в Гёнсёдзя отражает непостоянство
      всего сущего') стала иконой японской литературы.
    ja: 平家物語の冒頭の句で、インドの祇園精舎の鐘の音がこの世の栄華の無常を象徴する。'祇園精舎の鐘の声、諸行無常の響きあり'という一節は日本文学を代表する言葉である。
    zh: 《平家物语》的开篇，借印度祇园精舎的钟声象征世间荣华的无常。‘祇园精舎の鐘の声、諸行無常の響きあり’（祇园精舎的钟声回荡着万物无常）是日本文学中的经典名句。
    ar: السطور الافتتاحية لـ'حكاية هيكي'، التي تستحضر معبد غيون شوجا في الهند لتبين زوال المجد الدنيوي.
      العبارة '祇園精舎の鐘の声、諸行無常の響きあり' (صوت جرس غيون شوجا يتردد مع عدم ديمومة كل شيء) هي أيقونية في الأدب
      الياباني.
    he: השורות הפותחות של 'סיפור משפחת טאירה', המזכירות את מקדש גיון שוג'ה בהודו כדי להדגיש את חוסר הקביעות
      של התהילה הארצית. המשפט '祇園精舎の鐘の声、諸行無常の響きあり' (צלצול הפעמון במקדש גיון שוג'ה מהדהד את חוסר הקביעות
      של כל הדברים) הוא אייקוני בספרות היפנית.
