  short_explanation: A traditional Japanese bathtub with a small, deep design, named after the historical
    figure Ishikawa Goemon. It is associated with his legendary execution method (boiling in oil) and
    symbolizes luxury or indulgence in modern contexts.
  i18n_explanations:
    en: A traditional Japanese bathtub with a small, deep design, named after the historical figure Ishikawa
      Goemon. It is associated with his legendary execution method (boiling in oil) and symbolizes luxury
      or indulgence in modern contexts.
    es: Una bañera japonesa tradicional de diseño pequeño y profundo, llamada así por la figura histórica
      Ishikawa Goemon. Se asocia con su método de ejecución legendario (hervido en aceite) y simboliza
      lujo o indulgencia en contextos modernos.
    fr: Une baignoire japonaise traditionnelle de petite taille et profonde, nommée d'après la figure
      historique Ishikawa Goemon. Elle est associée à sa méthode d'exécution légendaire (ébouillantage
      dans l'huile) et symbolise le luxe ou l'indulgence dans des contextes modernes.
    de: Eine traditionelle japanische Badewanne mit kleiner, tiefer Bauweise, benannt nach der historischen
      Figur Ishikawa Goemon. Sie wird mit seiner legendären Hinrichtungsmethode (in Öl gekocht) in Verbindung
      gebracht und symbolisiert Luxus oder Genuss in modernen Kontexten.
    it: Una vasca da bagno giapponese tradizionale di design piccolo e profondo, chiamata così in onore
      della figura storica Ishikawa Goemon. È associata al suo leggendario metodo di esecuzione (bollitura
      nell'olio) e simboleggia il lusso o l'indulgenza nei contesti moderni.
    pt: Uma banheira japonesa tradicional de design pequeno e profundo, nomeada em homenagem à figura
      histórica Ishikawa Goemon. Está associada ao seu método de execução lendário (fervura em óleo) e
      simboliza luxo ou indulgência em contextos modernos.
    ru: Традиционная японская ванна небольшого, глубокого дизайна, названная в честь исторической фигуры
      Исикавы Гомона. Ассоциируется с его легендарным способом казни (варка в масле) и символизирует роскошь
      или излишество в современных контекстах.
    ja: 小さく深い伝統的な日本の浴槽で、歴史上の人物石川五右衛門にちなんで名付けられた。彼の伝説的な処刑方法（油で煮られる）と結びつけられ、現代では贅沢や贅沢の象徴とされる。
    zh: 一种传统的日本浴缸，设计小而深，以历史人物石川五右卫门命名。与其传奇的处决方式（油煮）相关联，在现代语境中象征奢华或纵情享乐。
    ar: حمام ياباني تقليدي صغير وعميق، سمي على اسم الشخصية التاريخية إيشيكاوا غومون. يرتبط بطريقة إعدامه
      الأسطورية (الغلي في الزيت) ويرمز إلى الترف أو الإسراف في السياقات الحديثة.
    he: אמבטיה יפנית מסורתית בעיצוב קטן ועמוק, הקרויה על שם דמות היסטורית, אישיקווה גואמון. היא קשורה
      לשיטת ההוצאה להורג האגדית שלו (הרתחה בשמן) ומשמשת כסמל לרווחה או לפינוק בהקשרים מודרניים.
