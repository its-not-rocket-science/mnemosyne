    fr: Un chapitre du 'Dit du Genji' où le protagoniste Genji réfléchit sur la beauté éphémère de la
      vie à travers la métaphore des ipomées (asagao), qui fleurissent brièvement à l'aube. Symbolise
      l'impermanence et la fugacité de l'existence humaine.
    de: Ein Kapitel aus 'Die Geschichte vom Prinzen Genji', in dem der Protagonist Genji über die vergängliche
      Schönheit des Lebens durch die Metapher der Morgenröschen (asagao) nachdenkt, die nur kurz bei Tagesanbruch
      blühen. Symbolisiert die Vergänglichkeit und die Kurzlebigkeit der menschlichen Existenz.
    it: Un capitolo de 'Il racconto di Genji' in cui il protagonista Genji riflette sulla fugace bellezza
      della vita attraverso la metafora delle asagao, che fioriscono solo per breve tempo all'alba. Simboleggia
      l'impermanenza e la transitorietà dell'esistenza umana.
    pt: Um capítulo de 'A História de Genji' onde o protagonista Genji reflete sobre a beleza efêmera
      da vida por meio da metáfora das asagao (glórias-da-manhã), que florescem brevemente ao amanhecer.
      Simboliza a impermanência e a transitoriedade da existência humana.
    ru: Глава из 'Повести о Гэндзи', где главный герой Гэндзи размышляет о бренной красоте жизни через
      метафору ипомеи (утренней красавицы), цветущей лишь на рассвете. Символизирует непостоянство и преходящесть
      человеческого существования.
    ja: 源氏物語の一帖で、主人公の光源氏が朝顔の花（朝顔）の儚さを通して人生の儚さを反省する章。無常と人の存在の儚さを象徴する。
    zh: 《源氏物语》中的一章，主人公光源氏通过朝颜花（清晨绽放的花朵）的短暂绽放反思生命的无常。象征生命的短暂与人生的虚无。
    ar: فصل من 'حكاية غينجي' حيث يتأمّل البطل غينجي في جمال الحياة الزائل من خلال استعارة زهرة الصباح
      (أزاغاو)، التي تزهر لفترة وجيزة عند الفجر. ترمز إلى عدم الدوام وزوال الوجود البشري.
    he: פרק מ'סיפור גנג'י' בו הגיבור גנג'י מהרהר ביופיה החולף של החיים דרך מטפורת הפרחים אסגאו (יפומית
      הבוקר), הפורחים לזמן קצר עם שחר. מסמל את חוסר הקביעות והחולפות של הקיום האנושי.
