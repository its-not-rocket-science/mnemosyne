- id: ja_classical_or_scriptural_allusion_鶏口となるも牛後となるなかれ_556c1cb1
  language: ja
  canonical_reference: 鶏口となるも牛後となるなかれ
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 鶏口となるも牛後となるなかれ
  - 鶏口牛後
  short_explanation: Better to be the head of a chicken than the tail of an ox. Advocates taking a leading
    role in a small group rather than a subordinate position in a large one.
  i18n_explanations:
    en: Better to be the head of a chicken than the tail of an ox. Advocates taking a leading role in
      a small group rather than a subordinate position in a large one.
    es: Mejor ser la cabeza de un pollo que la cola de un buey. Aboga por asumir un papel de liderazgo
      en un grupo pequeño antes que ser subordinado en uno grande.
    fr: Mieux vaut être la tête d'un poulet que la queue d'un bœuf. Prône l'idée de jouer un rôle de leader
      dans un petit groupe plutôt que d'être subalterne dans un grand.
    de: Besser der Kopf eines Huhns sein als das Hinterteil eines Ochsen. Plädiert dafür, in einer kleinen
      Gruppe eine Führungsrolle zu übernehmen, statt in einer großen Gruppe eine untergeordnete Position
      einzunehmen.
    it: Meglio essere la testa di un pollo che la coda di un bue. Consiglia di assumere un ruolo di leadership
      in un gruppo piccolo piuttosto che essere subordinato in uno grande.
    pt: Melhor ser a cabeça de um frango do que a cauda de um boi. Defende assumir um papel de liderança
      em um grupo pequeno do que uma posição subordinada em um grande.
    ru: Лучше быть головой курицы, чем хвостом быка. Призывает занять руководящую роль в небольшой группе,
      чем быть подчиненным в большой.
    ja: 鶏の口となっても牛の尻となるなかれ。大きな集団の末端よりも、小さな集団のリーダーになる方が良いという教え。
    zh: 宁为鸡口，毋为牛后。主张在小团体中担任领导，而不是在大团体中做末位。
    ar: الأفضل أن تكون رأس دجاجة من أن تكون ذيل ثور. ينصح بأن تتولى دورًا قياديًا في مجموعة صغيرة بدلاً
      من أن تكون تابعًا في مجموعة كبيرة.
    he: מוטב להיות ראש התרנגולת מאשר זנב השור. ממליץ לקחת תפקיד מוביל בקבוצה קטנה ולא להיות כפוף בקבוצה
      גדולה.
