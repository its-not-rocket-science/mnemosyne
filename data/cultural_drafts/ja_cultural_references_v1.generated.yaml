  short_explanation: Describes someone with a dark or malicious heart, implying deceitful or selfish intentions.
    It carries a strong negative connotation and is often used to criticize untrustworthy behavior.
  i18n_explanations:
    en: Describes someone with a dark or malicious heart, implying deceitful or selfish intentions. It
      carries a strong negative connotation and is often used to criticize untrustworthy behavior.
    es: Describe a alguien con un corazón oscuro o malicioso, lo que implica intenciones engañosas o egoístas.
      Tiene una fuerte connotación negativa y se usa para criticar un comportamiento poco confiable.
    fr: Décrit une personne au cœur noir ou malveillant, impliquant des intentions trompeuses ou égoïstes.
      Cela porte une forte connotation négative et est souvent utilisé pour critiquer un comportement
      peu fiable.
    de: Beschreibt jemanden mit einem dunklen oder böswilligen Herzen, was auf hinterlistige oder egoistische
      Absichten hindeutet. Es hat eine starke negative Konnotation und wird oft verwendet, um unzuverlässiges
      Verhalten zu kritisieren.
    it: Descrive una persona con un animo oscuro o malizioso, implicando intenzioni ingannevoli o egoistiche.
      Ha una forte connotazione negativa ed è spesso usato per criticare un comportamento sleale.
    pt: Descreve alguém com um coração escuro ou malicioso, implicando intenções enganosas ou egoístas.
      Tem uma forte conotação negativa e é frequentemente usado para criticar um comportamento de pouca
      confiança.
    ru: Описывает человека с чёрствым или злым сердцем, подразумевая коварные или эгоистичные намерения.
      Несёт сильную негативную окраску и часто используется для критики ненадёжного поведения.
    ja: 心の暗い、悪意のある人を表す。裏切りや利己的な意図を暗示し、強い否定的ニュアンスを持ち、信頼できない行動を批判する際に用いられる。
    zh: 形容心肠歹毒或险恶的人，暗示其欺骗或自私的意图。带有强烈的负面含义，常用于批评不可信的行为。
    ar: وصف شخص بقلب مظلم أو خبيث، مما يدل على نوايا خادعة أو أنانية. يحمل دلالة سلبية قوية وغالبًا ما
