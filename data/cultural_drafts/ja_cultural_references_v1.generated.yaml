    en: A proverb meaning 'even hell's judgment is for sale'—suggesting that money can influence outcomes,
      even in matters of life and death. Reflects cynicism about justice and corruption.
    es: Un refrán que significa 'incluso el juicio del infierno se puede comprar'—sugiere que el dinero
      puede influir en los resultados, incluso en asuntos de vida o muerte. Refleja cinismo sobre la justicia
      y la corrupción.
    fr: Un proverbe signifiant 'même le jugement de l'enfer s'achète'—suggérant que l'argent peut influencer
      les résultats, même dans des questions de vie ou de mort. Reflète un cynisme envers la justice et
      la corruption.
    de: Ein Sprichwort, das bedeutet 'sogar das Urteil der Hölle lässt sich kaufen'—suggeriert, dass Geld
      Ergebnisse beeinflussen kann, selbst in Fragen von Leben und Tod. Zeigt Zynismus gegenüber Gerechtigkeit
      und Korruption.
    it: Un proverbio che significa 'anche il giudizio dell'inferno si può comprare'—suggerisce che il
      denaro può influenzare i risultati, anche in questioni di vita o di morte. Riflette cinismo verso
      la giustizia e la corruzione.
    pt: Um provérbio que significa 'até o julgamento do inferno se compra'—sugere que o dinheiro pode
      influenciar resultados, mesmo em questões de vida ou morte. Reflete cinismo sobre justiça e corrupção.
    ru: Поговорка, означающая 'даже суд ада можно купить'—указывает на то, что деньги могут влиять на
      исход, даже в вопросах жизни и смерти. Отражает циничное отношение к правосудию и коррупции.
    ja: 地獄の沙汰も金次第とは、たとえ地獄の裁きであっても金次第でどうにでもなるという、金が力を持つ世の中を皮肉った言葉。
    zh: 地狱的判决也要看钱——意指金钱可以左右一切，甚至生死大事。反映了对正义与腐败的愤世嫉俗。
    ar: مثل يقول 'حتى حكم الجحيم يباع'—يشير إلى أن المال يمكنه التأثير في النتائج، حتى في مسائل الحياة
