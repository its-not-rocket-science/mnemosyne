- id: ja_classical_or_scriptural_allusion_三悪道_f75c4d20
  language: ja
  canonical_reference: 三悪道
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 三悪道
  - 三悪趣
  - 三悪趣道
  short_explanation: The three evil paths (三悪道) refer to the Buddhist concept of rebirth in the realms
    of hell (地獄道), hungry ghosts (餓鬼道), and animals (畜生道), representing suffering and moral degradation.
  i18n_explanations:
    en: The three evil paths (三悪道) refer to the Buddhist concept of rebirth in the realms of hell (地獄道),
      hungry ghosts (餓鬼道), and animals (畜生道), representing suffering and moral degradation.
    es: Las tres vías del mal (三悪道) se refieren al concepto budista de renacimiento en los reinos del
      infierno (地獄道), los espíritus hambrientos (餓鬼道) y los animales (畜生道), que representan el sufrimiento
      y la degradación moral.
    fr: Les trois chemins du mal (三悪道) désignent, dans le bouddhisme, la renaissance dans les royaumes
      de l'enfer (地獄道), des esprits affamés (餓鬼道) et des animaux (畜生道), symbolisant la souffrance et la
      dégradation morale.
    de: Die drei schlechten Pfade (三悪道) beziehen sich auf das buddhistische Konzept der Wiedergeburt in
      den Reichen der Hölle (地獄道), der hungrigen Geister (餓鬼道) und der Tiere (畜生道), die Leid und moralischen
      Verfall darstellen.
    it: I tre sentieri malvagi (三悪道) si riferiscono al concetto buddista di rinascita nei regni dell'inferno
      (地獄道), degli spiriti affamati (餓鬼道) e degli animali (畜生道), che rappresentano la sofferenza e la
      degradazione morale.
    pt: Os três caminhos do mal (三悪道) referem-se ao conceito budista de renascimento nos reinos do inferno
      (地獄道), dos espíritos famintos (餓鬼道) e dos animais (畜生道), representando o sofrimento e a degradação
      moral.
    ru: Три злых пути (三悪道) в буддизме обозначают перерождение в царствах ада (地獄道), голодных духов (餓鬼道)
      и животных (畜生道), символизирующих страдание и моральное падение.
    ja: 三悪道とは仏教における地獄道（地獄）、餓鬼道（餓鬼）、畜生道（動物）への輪廻を指し、苦しみと道徳的堕落を表す概念です。
    zh: 三恶道（三悪道）指佛教中地狱道（地獄道）、饿鬼道（餓鬼道）和畜生道（畜生道）的三恶趣，代表苦难与道德堕落。
    ar: تشير الطرق الثلاثة الشريرة (三悪道) في البوذية إلى إعادة الميلاد في عوالم الجحيم (地獄道) والأرواح الجائعة
      (餓鬼道) والحيوانات (畜生道)، وتمثل المعاناة والانحطاط الأخلاقي.
    he: שלוש הדרכים הרעות (三悪道) מתייחסות למושג הבודהיסטי של גלגול מחדש בעולמות הגיהנום (地獄道), הרוחות הרעבות
