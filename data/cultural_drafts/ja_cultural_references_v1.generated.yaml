      Tokugawa festigten. Die 'Winter'- und 'Sommer'-Feldzüge beendeten den Widerstand von Toyotomi Hideyori
      und vollendeten Japans Vereinigung.
    it: Una serie di battaglie (1614–1615) che distrussero il clan Toyotomi e consolidarono il dominio
