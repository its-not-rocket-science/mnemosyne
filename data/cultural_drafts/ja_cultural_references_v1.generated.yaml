      (Puppentheater).
    it: Un'opera di Chikamatsu Monzaemon che rappresenta una tragica storia d'amore ambientata nel contesto
      dei conflitti sociali e morali del periodo Edo. È una delle opere più famose del teatro di burattini
      *bunraku*.
    pt: Peça de Chikamatsu Monzaemon que retrata uma trágica história de amor em meio a conflitos sociais
      e morais do período Edo. É uma das obras mais famosas do teatro de bonecos *bunraku*.
    ru: Пьеса Тикамацу Мондзаэмона, изображающая трагическую любовную историю на фоне социальных и моральных
