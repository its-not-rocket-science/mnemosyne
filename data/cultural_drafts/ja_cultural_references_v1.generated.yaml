    ja: 日本神話に登場する天の橋。古事記に記され、天と地を結ぶ。神々が地上界に降りる際に用いられ、神界と人間界の境界を象徴する。
    zh: 日本神话中提到的天之浮桥，出现在《古事记》中，连接天与地。神明用它降临凡间，象征神界与人界的分界。
    ar: جسر سماوي في الميثولوجيا اليابانية، مذكور في الكوجيكي، يربط السماء والأرض. يستخدمه الآلهة للنزول
