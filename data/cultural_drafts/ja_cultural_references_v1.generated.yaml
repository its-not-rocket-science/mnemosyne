    zh: 日本民间故事，讲述一个穷人从一根稻草开始，通过一系列交易最终变得富有。展现了坚持和机智的价值。
    ar: حكاية يابانية شعبية عن رجل فقير يبدأ بحزمة قش واحدة وينتهي غنيًا من خلال سلسلة من الصفقات. توضح
