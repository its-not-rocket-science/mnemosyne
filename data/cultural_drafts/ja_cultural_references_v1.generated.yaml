- id: ja_literary_reference_おとぎ話の_桃太郎_e001659b
  language: ja
  canonical_reference: おとぎ話の「桃太郎」
  reference_type: literary_reference
  surface_patterns:
  - 桃太郎
  - 桃太郎の物語
  - 桃から生まれた子
  - 鬼退治
  short_explanation: A classic Japanese fairy tale about a boy born from a peach who grows up to defeat
    oni (demons) with the help of a dog, monkey, and pheasant. Symbolizes bravery, teamwork, and the triumph
    of good over evil.
  i18n_explanations:
    en: A classic Japanese fairy tale about a boy born from a peach who grows up to defeat oni (demons)
      with the help of a dog, monkey, and pheasant. Symbolizes bravery, teamwork, and the triumph of good
      over evil.
    es: Un cuento de hadas japonés clásico sobre un niño nacido de un melocotón que, al crecer, derrota
      a los oni (demonios) con la ayuda de un perro, un mono y un faisán. Simboliza la valentía, el trabajo
      en equipo y la victoria del bien sobre el mal.
    fr: Un conte de fées japonais classique sur un garçon né d'une pêche qui, en grandissant, vainc les
      oni (démons) avec l'aide d'un chien, d'un singe et d'un faisan. Symbolise le courage, le travail
      d'équipe et la victoire du bien sur le mal.
    de: Ein klassisches japanisches Märchen über einen Jungen, der aus einem Pfirsich geboren wird und
      mit Hilfe eines Hundes, eines Affen und eines Fasans die Oni (Dämonen) besiegt. Symbolisiert Mut,
      Teamwork und den Sieg des Guten über das Böse.
    it: Una fiaba giapponese classica su un ragazzo nato da una pesca che, crescendo, sconfigge gli oni
      (demoni) con l'aiuto di un cane, una scimmia e un fagiano. Simboleggia il coraggio, il lavoro di
      squadra e la vittoria del bene sul male.
    pt: Um conto de fadas japonês clássico sobre um menino nascido de um pêssego que, ao crescer, derrota
      os oni (demônios) com a ajuda de um cachorro, um macaco e um faisão. Simboliza a coragem, o trabalho
      em equipe e a vitória do bem sobre o mal.
    ru: Классическая японская сказка о мальчике, рождённом из персика, который, повзрослев, побеждает
      о́ни (демонов) с помощью собаки, обезьяны и фазана. Символизирует храбрость, командную работу и
      победу добра над злом.
    ja: 桃太郎は、桃から生まれた少年が成長し、犬、猿、雉の助けで鬼（悪鬼）を退治する日本の昔話。勇気、チームワーク、善の悪に対する勝利を象徴します。
    zh: 桃太郎是日本经典童话，讲述一个男孩从桃子中诞生，长大后在狗、猴子和雉鸡的帮助下打败恶鬼。象征着勇气、团队合作与正义战胜邪恶。
    ar: حكاية يابانية كلاسيكية عن صبي وُلد من خوخة، يكبر ليهزم الأوني (أرواح شريرة) بمساعدة كلب وقرد وحجل.
      ترمز إلى الشجاعة والعمل الجماعي وانتصار الخير على الشر.
    he: אגדה יפנית קלאסית על ילד שנולד מאפרסק, גדל וניצח שדים (אוני) בעזרת כלב, קוף ופסיון. מסמלת אומץ,
      עבודת צוות וניצחון הטוב על הרע.
