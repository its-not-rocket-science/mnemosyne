  short_explanation: The Pure Land (浄土) of Amida Buddha (阿弥陀仏), a central concept in Pure Land Buddhism,
    promising rebirth in a paradise for those who chant Amida's name. It represents hope for salvation
    and is deeply embedded in Japanese religious culture.
  i18n_explanations:
    en: The Pure Land (浄土) of Amida Buddha (阿弥陀仏), a central concept in Pure Land Buddhism, promising
      rebirth in a paradise for those who chant Amida's name. It represents hope for salvation and is
      deeply embedded in Japanese religious culture.
    es: La Tierra Pura (浄土) del Buda Amida (阿弥陀仏), un concepto central en el budismo de la Tierra Pura,
      que promete el renacimiento en un paraíso para quienes recitan el nombre de Amida. Representa la
      esperanza de salvación y está profundamente arraigado en la cultura religiosa japonesa.
    fr: La Terre Pure (浄土) du Bouddha Amida (阿弥陀仏), un concept central du bouddhisme de la Terre Pure,
      promettant la renaissance dans un paradis pour ceux qui invoquent le nom d'Amida. Elle incarne l'espoir
      de salut et est profondément ancrée dans la culture religieuse japonaise.
    de: Das Reine Land (浄土) des Buddha Amida (阿弥陀仏), ein zentraler Begriff im Reinen-Land-Buddhismus,
      das die Wiedergeburt in einem Paradies für diejenigen verspricht, die den Namen Amidas rezitieren.
      Es steht für die Hoffnung auf Erlösung und ist tief in der japanischen Religionskultur verwurzelt.
    it: La Terra Pura (浄土) del Buddha Amida (阿弥陀仏), un concetto centrale nel buddismo della Terra Pura,
      che promette la rinascita in un paradiso per coloro che recitano il nome di Amida. Rappresenta la
      speranza di salvezza ed è profondamente radicata nella cultura religiosa giapponese.
    pt: A Terra Pura (浄土) do Buda Amida (阿弥陀仏), um conceito central no budismo da Terra Pura, que promete
      o renascimento em um paraíso para aqueles que recitam o nome de Amida. Representa a esperança de
      salvação e está profundamente enraizada na cultura religiosa japonesa.
    ru: Чистая Земля (浄土) будды Амиды (阿弥陀仏), центральное понятие в буддизме Чистой Земли, обещающее возрождение
      в раю для тех, кто произносит имя Амиды. Оно олицетворяет надежду на спасение и глубоко укоренено
      в японской религиозной культуре.
    ja: 阿弥陀仏の浄土（浄土）は、浄土宗の中心的概念で、阿弥陀如来の名を唱える者が極楽浄土に生まれ変わることを約束する。救済への希望を象徴し、日本の宗教文化に深く根付いている。
    zh: 阿弥陀佛的净土（浄土）是净土宗的核心概念，承诺诵念阿弥陀名号者可往生极乐净土。它代表救赎的希望，并深深植根于日本宗教文化中。
    ar: الأرض الطاهرة (浄土) لبوذا أميدا (阿弥陀仏)، مفهوم مركزي في بوذية الأرض الطاهرة، يعد بولادة جديدة في
      جنة لمن يردد اسم أميدا. تمثل الأمل في الخلاص وهي متجذرة بعمق في الثقافة الدينية اليابانية.
    he: ארץ הטוהר (浄土) של בודהה אמידה (阿弥陀仏), מושג מרכזי בבודהיזם הארץ הטהורה, המבטיח לידה מחדש בגן עדן
      למי שמזכיר את שמו של אמידה. מייצגת תקווה לגאולה ומעוגנת עמוק בתרבות הדתית היפנית.
