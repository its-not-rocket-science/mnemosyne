  short_explanation: A famous Noh play (also performed as kyōgen) about a man who accidentally poisons
    himself with aconite (a highly toxic plant) while trying to commit suicide, only to be saved by a
    doctor. It explores themes of folly, chance, and human error.
  i18n_explanations:
    en: A famous Noh play (also performed as kyōgen) about a man who accidentally poisons himself with
      aconite (a highly toxic plant) while trying to commit suicide, only to be saved by a doctor. It
      explores themes of folly, chance, and human error.
    es: Una famosa obra de Nō (también representada como kyōgen) sobre un hombre que se envenena accidentalmente
      con acónito (una planta altamente tóxica) al intentar suicidarse, solo para ser salvado por un médico.
      Explora temas como la locura, el azar y el error humano.
    fr: Une célèbre pièce de Nō (aussi jouée en kyōgen) sur un homme qui s'empoisonne accidentellement
      avec de l'aconit (une plante très toxique) en tentant de se suicider, avant d'être sauvé par un
      médecin. Elle explore des thèmes comme la folie, le hasard et l'erreur humaine.
    de: Ein berühmtes Nō-Stück (auch als Kyōgen aufgeführt) über einen Mann, der sich versehentlich mit
      Eisenhut (einer hochgiftigen Pflanze) vergiftet, als er Selbstmord begehen will, und schließlich
      von einem Arzt gerettet wird. Es behandelt Themen wie Torheit, Zufall und menschliches Versagen.
    it: Un famoso dramma Nō (anche rappresentato come kyōgen) su un uomo che si avvelena accidentalmente
      con l'aconito (una pianta altamente tossica) cercando di suicidarsi, salvo poi essere salvato da
      un medico. Esplora temi come la follia, il caso e l'errore umano.
    pt: Uma famosa peça de Nō (também encenada como kyōgen) sobre um homem que se envenena acidentalmente
      com acônito (uma planta altamente tóxica) ao tentar cometer suicídio, sendo salvo por um médico.
      Explora temas como a loucura, o acaso e o erro humano.
    ru: Знаменитая пьеса Но (также исполняемая как кёгэн) о человеке, который случайно отравляется аконитом
      (очень токсичным растением), пытаясь покончить с собой, но его спасает врач. Исследуются темы безумия,
      случая и человеческой ошибки.
    ja: 狂言の有名な演目（能楽としても上演される）で、自殺を図った男がトリカブト（猛毒の植物）で誤って中毒し、医師に救われる物語。愚かさ、偶然、人間の過ちをテーマとする。
    zh: 著名的能剧作品（也作为狂言上演），讲述一个男人试图自杀时误食高毒植物乌头中毒，最终被医生救治的故事。探讨愚蠢、偶然与人为错误的主题。
    ar: مسرحية نوه الشهيرة (التي تُعرض أيضًا ككيوغن) عن رجل يتسمم بال accidentalmente مع نبات الأكونيت
