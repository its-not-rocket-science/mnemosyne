- id: ja_classical_or_scriptural_allusion_天の瓊矛_あまのぬほこ_334f1578
  language: ja
  canonical_reference: 天の瓊矛（あまのぬほこ）
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
