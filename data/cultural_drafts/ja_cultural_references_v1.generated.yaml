- id: ja_proverb_tradition_腹が据わる_557dbbf5
  language: ja
  canonical_reference: 腹が据わる
  reference_type: proverb_tradition
  surface_patterns:
  - 腹が据わる
  - 腹が据わらない
  - 腹が据わった
  - 腹が据わらず
  short_explanation: To have one's resolve or patience strengthened, often in the face of adversity. It
    conveys the idea of steeling oneself emotionally, similar to 'getting a grip' or 'toughening up.'
  i18n_explanations:
    en: To have one's resolve or patience strengthened, often in the face of adversity. It conveys the
      idea of steeling oneself emotionally, similar to 'getting a grip' or 'toughening up.'
    es: Fortalecer la determinación o la paciencia de alguien, a menudo ante la adversidad. Transmite
      la idea de endurecerse emocionalmente, similar a 'ponerse las pilas' o 'endurecerse'.
    fr: Renforcer sa détermination ou sa patience, souvent face à l'adversité. Cela évoque l'idée de se
      durcir émotionnellement, similaire à 'se ressaisir' ou 'se renforcer'.
    de: Seinen Entschluss oder seine Geduld stärken, oft angesichts von Widrigkeiten. Es vermittelt die
      Idee, sich emotional zu wappnen, ähnlich wie 'sich zusammenreißen' oder 'sich abhärten'.
    it: Rafforzare la determinazione o la pazienza di qualcuno, spesso di fronte all'avversità. Trasmette
      l'idea di indurirsi emotivamente, simile a 'farsi forza' o 'indurirsi'.
    pt: Fortalecer a determinação ou a paciência de alguém, muitas vezes diante da adversidade. Transmite
      a ideia de se endurecer emocionalmente, semelhante a 'se recompor' ou 'se fortalecer'.
    ru: Укрепить свою решимость или терпение, часто перед лицом трудностей. Передаёт идею эмоционального
      закаливания, подобно 'взять себя в руки' или 'закалиться'.
    ja: 困難に直面しても、決意や忍耐を強くすること。感情的に自分を鍛えるというニュアンスで、「踏ん張る」や「強くなる」に近い表現。
    zh: 在面对逆境时，增强决心或耐心。传达一种情感上的坚韧，类似于‘振作起来’或‘变得坚强’。
    ar: تعزيز التصميم أو الصبر، غالبًا في مواجهة الشدائد. ينقل فكرة التحلي بالقوة العاطفية، مشابهًا لـ
      'التحلي بالشجاعة' أو 'التصلب'.
    he: לחזק את נחישותו או סבלנותו של אדם, לעיתים קרובות מול מצוקה. מעביר את הרעיון של התחזקות רגשית,
