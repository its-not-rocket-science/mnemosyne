  short_explanation: A mythical creature from Japanese folklore, often depicted as a bird-like humanoid
    with a long nose, associated with mountain spirits, martial arts, and trickery. It appears in classical
    literature like 'The Tale of the Heike' and Noh plays.
  i18n_explanations:
    en: A mythical creature from Japanese folklore, often depicted as a bird-like humanoid with a long
      nose, associated with mountain spirits, martial arts, and trickery. It appears in classical literature
      like 'The Tale of the Heike' and Noh plays.
    es: Una criatura mítica del folclore japonés, a menudo representada como un humanoide con pico y nariz
      larga, asociada con espíritus de montaña, artes marciales y engaños. Aparece en la literatura clásica
      como 'El Cuento de Heike' y en obras de Noh.
    fr: Une créature mythique du folklore japonais, souvent représentée comme un humanoïde à bec et à
      long nez, associée aux esprits des montagnes, aux arts martiaux et aux ruses. Elle apparaît dans
      la littérature classique comme 'Le Dit des Heike' et dans les pièces de Noh.
    de: Ein mythologisches Wesen aus dem japanischen Folklore, oft als vogelartiger Humanoid mit langer
      Nase dargestellt, verbunden mit Berggeistern, Kampfkünsten und Täuschungen. Es taucht in klassischer
      Literatur wie 'Das Heike Monogatari' und Noh-Stücken auf.
    it: Una creatura mitologica del folclore giapponese, spesso raffigurata come un umanoide simile a
      un uccello con un lungo naso, associata a spiriti di montagna, arti marziali e inganni. Appare nella
      letteratura classica come 'Il Racconto degli Heike' e nelle opere di Noh.
    pt: Uma criatura mítica do folclore japonês, frequentemente retratada como um humanoide com bico e
      nariz longo, associada a espíritos das montanhas, artes marciais e truques. Aparece na literatura
      clássica como 'O Conto dos Heike' e em peças de Noh.
    ru: Мифологическое существо из японского фольклора, часто изображаемое как птицеподобный гуманоид
      с длинным носом, связанное с духами гор, боевыми искусствами и хитростями. Встречается в классической
      литературе, такой как 'Повесть о доме Тайра', и в пьесах Но.
    ja: 日本の伝承に登場する架空の生物で、長い鼻を持つ鳥のような人間型として描かれる。山の精霊、武術、悪戯と結びつけられ、古典文学の「平家物語」や能楽に登場する。
    zh: 日本传说中的神秘生物，常被描绘为长鼻鸟首人身的形象，与山神、武术及诡计相关。出现在《平家物语》等古典文学和能剧中。
    ar: كائن أسطوري من الفولكلور الياباني، غالبًا ما يُصوَّر ككائن شبيه بالإنسان ذو أنف طويل ومنقار، مرتبط
      بأرواح الجبال والفنون القتالية والمكر. يظهر في الأدب الكلاسيكي مثل 'قصة هيكي' والمسرحيات النoh.
    he: יצור מיתולוגי מהפולקלור היפני, המוצג לעיתים קרובות כיצור דמוי אדם בעל אף ארוך ודמוי מקור, הקשור
      לרוחות ההרים, אמנויות לחימה ותחבולות. מופיע בספרות קלאסית כמו 'סיפור משפחת טאירה' ויצירות תיאטרון
      נו.
