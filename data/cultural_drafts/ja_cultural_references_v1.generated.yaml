      transient nature of life.
    es: Un yōsei (espíritu) asociado con los cerezos en flor (sakura), a menudo representado en el folclore
      y los medios modernos como un guardián o encarnación de la belleza efímera de la primavera. Simboliza
      el renacimiento y la naturaleza transitoria de la vida.
    fr: Un yōsei (esprit) associé aux cerisiers en fleurs (sakura), souvent représenté dans le folklore
      et les médias modernes comme un gardien ou une incarnation de la beauté éphémère du printemps. Il
      symbolise le renouveau et la nature passagère de la vie.
    de: Ein Yōsei (Geist), der mit den Kirschblüten (Sakura) verbunden ist und oft im Folklore und modernen
      Medien als Hüter oder Verkörperung der vergänglichen Schönheit des Frühlings dargestellt wird. Er
      symbolisiert Erneuerung und die vergängliche Natur des Lebens.
    it: Uno yōsei (spirito) associato ai ciliegi in fiore (sakura), spesso raffigurato nel folclore e
      nei media moderni come un guardiano o incarnazione della bellezza effimera della primavera. Simboleggia
      il rinnovamento e la natura transitoria della vita.
    pt: Um yōsei (espírito) associado às cerejeiras em flor (sakura), frequentemente retratado no folclore
