- id: ja_literary_reference_平家物語の_那須与一_73f18db1
  language: ja
  canonical_reference: 平家物語の「那須与一」
  reference_type: literary_reference
  surface_patterns:
  - 那須与一
  - 与一
  - 扇射ち
  - 平家物語の与一
  short_explanation: A famous episode from 'The Tale of the Heike' where the warrior Nasu no Yoichi performs
    a legendary feat by shooting down a fan tossed into the sea during a naval battle. Symbolizes skill,
    honor, and the fleeting nature of glory.
  i18n_explanations:
    en: A famous episode from 'The Tale of the Heike' where the warrior Nasu no Yoichi performs a legendary
      feat by shooting down a fan tossed into the sea during a naval battle. Symbolizes skill, honor,
      and the fleeting nature of glory.
    es: Un episodio famoso de 'El relato de los Heike' en el que el guerrero Nasu no Yoichi realiza una
      hazaña legendaria al derribar un abanico lanzado al mar durante una batalla naval. Simboliza la
      habilidad, el honor y la fugacidad de la gloria.
    fr: Un épisode célèbre du 'Dit des Heike' où le guerrier Nasu no Yoichi accomplit un exploit légendaire
      en abattant un éventail lancé à la mer lors d'une bataille navale. Symbolise le talent, l'honneur
      et la fugacité de la gloire.
    de: Ein berühmtes Ereignis aus dem 'Heike-Monogatari', in dem der Krieger Nasu no Yoichi eine legendäre
      Tat vollbringt, indem er einen Fächer, der während einer Seeschlacht ins Meer geworfen wurde, herunterschießt.
      Symbolisiert Geschicklichkeit, Ehre und die Vergänglichkeit von Ruhm.
    it: Un episodio celebre del 'Racconto degli Heike' in cui il guerriero Nasu no Yoichi compie un'impresa
      leggendaria colpendo con una freccia un ventaglio gettato in mare durante una battaglia navale.
      Simboleggia l'abilità, l'onore e la fugacità della gloria.
    pt: Um episódio famoso de 'A História dos Heike' em que o guerreiro Nasu no Yoichi realiza um feito
      lendário ao derrubar um leque lançado ao mar durante uma batalha naval. Simboliza a habilidade,
      a honra e a fugacidade da glória.
    ru: Знаменитый эпизод из 'Повести о доме Тайра', где воин Насу но Ёити совершает легендарный подвиг,
      сбивая веер, брошенный в море во время морского сражения. Символизирует мастерство, честь и преходящий
      характер славы.
    ja: 平家物語の有名なエピソードで、武将那須与一が海戦で海に投げ込まれた扇を射落とした伝説的な武功を描く。技量、名誉、栄光の儚さを象徴する。
    zh: 《平家物语》中的著名篇章，描写武将那须与一在海战中射落海面扇子的传奇武功。象征技艺、荣誉与荣光的短暂。
    ar: ' Episode شهير من ''حكاية هيكي'' حيث يقوم المحارب ناسو نو يويتشي بإنجاز أسطوري بإطلاق سهم على
      مروحة ألقاها في البحر خلال معركة بحرية. يرمز إلى المهارة والشرف والزوال السريع للمجد.'
    he: אירוע מפורסם מ'סיפור משפחת טאירה', בו לוחם נאסו נו יואיצ'י מבצע מעשה אגדי בירי על מניפה שהושלכה
      לים במהלך קרב ימי. מסמל מיומנות, כבוד ואת חולפת התהילה.
