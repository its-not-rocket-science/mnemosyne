  - 狐の嫁入り現象
  short_explanation: A Japanese folktale and natural phenomenon where foxes are said to hold wedding processions
    at night, often accompanied by eerie lights. It reflects superstitions about foxes (kitsune) as shape-shifting
    tricksters.
  i18n_explanations:
    en: A Japanese folktale and natural phenomenon where foxes are said to hold wedding processions at
      night, often accompanied by eerie lights. It reflects superstitions about foxes (kitsune) as shape-shifting
      tricksters.
    es: Un cuento popular japonés y fenómeno natural en el que se dice que los zorros celebran procesiones
      nupciales por la noche, a menudo acompañadas de luces inquietantes. Refleja supersticiones sobre
      los zorros (kitsune) como seres que cambian de forma y embaucadores.
    fr: Un conte populaire japonais et un phénomène naturel où l'on dit que les renards organisent des
      processions nuptiales la nuit, souvent accompagnées de lumières étranges. Cela reflète les superstitions
      concernant les renards (kitsune) comme des êtres capables de changer de forme et de tromper.
    de: Ein japanisches Volksmärchen und Naturphänomen, bei dem Füchse nachts Hochzeitsprozessionen abhalten
      sollen, oft begleitet von unheimlichen Lichtern. Es spiegelt Aberglauben über Füchse (Kitsune) als
      gestaltwandelnde Trickbetrüger wider.
    it: Una fiaba giapponese e un fenomeno naturale in cui si dice che le volpi tengano processioni nuziali
      di notte, spesso accompagnate da luci inquietanti. Riflette superstizioni sulle volpi (kitsune)
      come creature che cambiano forma e ingannatrici.
    pt: Um conto popular japonês e fenômeno natural em que se diz que raposas realizam procissões nupciais
      à noite, muitas vezes acompanhadas de luzes estranhas. Reflete superstições sobre as raposas (kitsune)
      como seres que mudam de forma e trapaceiros.
    ru: Японская народная сказка и природное явление, согласно которому лисы устраивают ночные свадебные
      процессии, часто сопровождаемые жуткими огнями. Отражает суеверия о лисах (кицунэ) как о оборотнях-обманщиках.
    ja: 夜にキツネが結婚式の行列を行うとされる日本の昔話と自然現象。しばしば不気味な光を伴い、キツネ（化け狐）が変身するいたずら者であるという迷信を反映しています。
    zh: 日本民间故事与自然现象，传说狐狸会在夜间举行婚礼队伍，常伴有诡异的光亮。反映了对狐狸（ kitsune）作为变形恶作剧者的迷信。
    ar: حكاية يابانية شعبية وظاهرة طبيعية يُقال فيها إن الثعالب تقيم موكب زفاف ليلي، غالبًا مصحوبًا بأضواء
      مخيفة. يعكس الخرافات حول الثعالب (كيتسون) ككائنات قادرة على التحول وخداع الآخرين.
    he: אגדה יפנית ותופעה טבעית בה נאמר ששועלים עורכים תהלוכות חתונה בלילה, לעיתים מלוות באורות מטרידים.
