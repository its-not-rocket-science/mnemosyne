  short_explanation: A mythological spear said to have been used by the storm god Susanoo to slay the
    eight-headed serpent Yamata no Orochi. Symbolizes divine power and the triumph of order over chaos.
  i18n_explanations:
    en: A mythological spear said to have been used by the storm god Susanoo to slay the eight-headed
      serpent Yamata no Orochi. Symbolizes divine power and the triumph of order over chaos.
    es: Una lanza mítica que, según la leyenda, fue usada por el dios de la tormenta Susanoo para matar
      a la serpiente de ocho cabezas Yamata no Orochi. Simboliza el poder divino y la victoria del orden
      sobre el caos.
    fr: Une lance mythologique que le dieu de la tempête Susanoo aurait utilisée pour tuer le serpent
      à huit têtes Yamata no Orochi. Symbolise le pouvoir divin et la victoire de l'ordre sur le chaos.
    de: Eine mythologische Lanze, von der es heißt, dass sie vom Sturmgott Susanoo benutzt wurde, um die
      achtköpfige Schlange Yamata no Orochi zu töten. Symbolisiert göttliche Macht und den Sieg der Ordnung
      über das Chaos.
    it: Una lancia mitologica che si dice sia stata usata dal dio della tempesta Susanoo per uccidere
      il serpente a otto teste Yamata no Orochi. Simboleggia il potere divino e la vittoria dell'ordine
      sul caos.
