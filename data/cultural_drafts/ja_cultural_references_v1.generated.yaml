  short_explanation: A myth from Japanese mythology where the sun goddess Amaterasu hides in a cave, plunging
    the world into darkness. This event is resolved when she is coaxed out, restoring light. Symbolizes
    renewal and the cyclical nature of time.
  i18n_explanations:
    en: A myth from Japanese mythology where the sun goddess Amaterasu hides in a cave, plunging the world
      into darkness. This event is resolved when she is coaxed out, restoring light. Symbolizes renewal
      and the cyclical nature of time.
    es: Mito japonés en el que la diosa del sol Amaterasu se esconde en una cueva, sumiendo al mundo en
      la oscuridad. El mito se resuelve cuando es convencida de salir, restaurando la luz. Simboliza el
      renacimiento y la naturaleza cíclica del tiempo.
    fr: Myth japonais où la déesse du soleil Amaterasu se cache dans une grotte, plongeant le monde dans
      l'obscurité. L'événement est résolu lorsqu'elle est convaincue de sortir, restaurant la lumière.
      Symbolise le renouveau et la nature cyclique du temps.
    de: Ein japanischer Mythos, in dem die Sonnengöttin Amaterasu sich in einer Höhle versteckt und die
      Welt in Dunkelheit stürzt. Das Ereignis wird gelöst, als sie überredet wird, herauszukommen und
      das Licht wiederherstellt. Symbolisiert Erneuerung und die zyklische Natur der Zeit.
    it: Mito giapponese in cui la dea del sole Amaterasu si nasconde in una grotta, gettando il mondo
      nell'oscurità. Il mito si risolve quando viene convinta a uscire, riportando la luce. Simboleggia
      il rinnovamento e la natura ciclica del tempo.
    pt: Mito japonês em que a deusa do sol Amaterasu se esconde em uma caverna, mergulhando o mundo na
      escuridão. O mito se resolve quando ela é convencida a sair, restaurando a luz. Simboliza o renascimento
      e a natureza cíclica do tempo.
    ru: Японский миф, в котором богиня солнца Аматэрасу прячется в пещере, погружая мир во тьму. Миф разрешается,
      когда её уговаривают выйти, возвращая свет. Символизирует обновление и циклическую природу времени.
    ja: 日本神話で、太陽神アマテラスが洞窟に隠れて世界を闇に包む神話。彼女が説得されて出てくることで光が戻り、再生と時間の循環を象徴する。
    zh: 日本神话中，太阳女神天照隐藏在洞穴中，使世界陷入黑暗。当她被劝出洞穴后，光明得以恢复。象征着新生与时间的循环。
    ar: أسطورة يابانية تحكي عن إلهة الشمس أماتيراسو التي تختبئ في كهف، مما يغرق العالم في الظلام. تنتهي
      الأسطورة عندما تُقنع بالخروج، مما يعيد النور. ترمز إلى التجدد والطبيعة الدورية للزمن.
    he: מיתוס יפני בו אלת השמש אמטרסו מסתתרת במערה וגורמת לעולם לשקוע בחשכה. המיתוס נפתר כאשר היא מופתה
      לצאת, והשמש חוזרת. מסמל התחדשות ומחזוריות הזמן.
