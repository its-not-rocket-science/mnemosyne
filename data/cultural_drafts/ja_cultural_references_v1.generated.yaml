- id: ja_classical_or_scriptural_allusion_天の真名井_あまのまない_ca2b99d0
  language: ja
  canonical_reference: 天の真名井（あまのまない）
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 天の真名井
  - 天真名井
  - 真名井
  - 天の真名井（あまのまない）
  short_explanation: A sacred well or pool in Japanese mythology, associated with the gods Izanagi and
    Izanami. It is said to be the source of divine water used in rituals and creation myths, symbolizing
    purity and origin.
  i18n_explanations:
    en: A sacred well or pool in Japanese mythology, associated with the gods Izanagi and Izanami. It
      is said to be the source of divine water used in rituals and creation myths, symbolizing purity
      and origin.
    es: Un pozo o estanque sagrado en la mitología japonesa, asociado a los dioses Izanagi e Izanami.
      Se dice que es la fuente de agua divina utilizada en rituales y mitos de creación, simbolizando
      pureza y origen.
    fr: Un puits ou bassin sacré de la mythologie japonaise, associé aux dieux Izanagi et Izanami. Il
      serait la source d'eau divine utilisée dans les rituels et les mythes de création, symbolisant la
      pureté et l'origine.
    de: Ein heiliger Brunnen oder Teich der japanischen Mythologie, verbunden mit den Göttern Izanagi
      und Izanami. Er gilt als Quelle göttlichen Wassers für Rituale und Schöpfungsmythen und symbolisiert
      Reinheit und Ursprung.
    it: Un pozzo o stagno sacro della mitologia giapponese, associato agli dèi Izanagi e Izanami. Si dice
      sia la fonte dell'acqua divina usata in rituali e miti di creazione, simboleggiando purezza e origine.
    pt: Um poço ou lago sagrado na mitologia japonesa, associado aos deuses Izanagi e Izanami. Diz-se
      ser a fonte de água divina usada em rituais e mitos de criação, simbolizando pureza e origem.
    ru: Священный колодец или водоём в японской мифологии, связанный с богами Идзанаги и Идзанами. Считается
      источником божественной воды, используемой в ритуалах и мифах о сотворении, символизируя чистоту
      и происхождение.
    ja: 日本神話に登場する神聖な井戸や池。イザナギとイザナミの神と関連付けられ、儀式や創造神話に用いられる神聖な水の源とされる。純潔と起源を象徴する。
    zh: 日本神话中与伊邪那岐和伊邪那美神相关的圣井或圣池。传说是用于仪式和创世神话的神圣水源，象征纯洁与起源。
    ar: بئر أو بركة مقدسة في الميثولوجيا اليابانية، مرتبطة بالإلهين إيزاناغي وإيزانامي. يقال إنها مصدر
      الماء الإلهي المستخدم في الطقوس وأساطير الخلق، وترمز إلى الطهارة والأصل.
    he: באר או בריכה קדושה במיתולוגיה היפנית, הקשורה לאלים איזנגי ואיזנגמי. נאמר שהיא מקור המים האלוהיים
      המשמשים בטקסים ובמיתוסי הבריאה, וסמלה טוהר ומקור.
