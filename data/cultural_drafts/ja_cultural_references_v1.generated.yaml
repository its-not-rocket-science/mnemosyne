    en: A celestial bridge in Japanese mythology, mentioned in the Kojiki, connecting heaven and earth.
      It is used by the gods to descend to the mortal realm, symbolizing the boundary between the divine
      and human worlds.
    es: Un puente celestial en la mitología japonesa, mencionado en el Kojiki, que conecta el cielo y
      la tierra. Es utilizado por los dioses para descender al mundo mortal, simbolizando el límite entre
      los mundos divino y humano.
    fr: Un pont céleste de la mythologie japonaise, mentionné dans le Kojiki, reliant le ciel et la terre.
      Il est utilisé par les dieux pour descendre dans le monde des mortels, symbolisant la frontière
      entre les mondes divin et humain.
    de: Eine himmlische Brücke der japanischen Mythologie, erwähnt im Kojiki, die Himmel und Erde verbindet.
      Sie wird von den Göttern genutzt, um in die sterbliche Welt hinabzusteigen, und symbolisiert die
      Grenze zwischen göttlicher und menschlicher Sphäre.
    it: Un ponte celeste della mitologia giapponese, menzionato nel Kojiki, che collega cielo e terra.
      È usato dagli dèi per scendere nel mondo mortale, simboleggiando il confine tra i mondi divino e
      umano.
    pt: Uma ponte celestial na mitologia japonesa, mencionada no Kojiki, que conecta o céu e a terra.
      É usada pelos deuses para descer ao mundo mortal, simbolizando a fronteira entre os mundos divino
      e humano.
    ru: Небесный мост в японской мифологии, упоминаемый в Кодзики, соединяющий небо и землю. Им пользуются
