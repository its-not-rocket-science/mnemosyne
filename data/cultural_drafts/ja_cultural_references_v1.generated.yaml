  - 猫の手も借りたいほど
  short_explanation: Expresses extreme busyness, to the point of needing even a cat's help. Reflects Japanese
    cultural value of diligence and the humorous exaggeration of workload.
  i18n_explanations:
    en: Expresses extreme busyness, to the point of needing even a cat's help. Reflects Japanese cultural
      value of diligence and the humorous exaggeration of workload.
    es: Expresa una extrema ocupación, hasta el punto de necesitar incluso la ayuda de un gato. Refleja
      el valor cultural japonés de la diligencia y la exageración humorística de la carga laboral.
    fr: Exprime une extrême occupation, au point de nécessiter même l'aide d'un chat. Reflète la valeur
      culturelle japonaise de la diligence et l'exagération humoristique de la charge de travail.
    de: Drückt extreme Geschäftigkeit aus, bis hin zur Notwendigkeit, selbst die Hilfe einer Katze in
      Anspruch zu nehmen. Reflektiert den japanischen Kulturwert der Fleißes und die humorvolle Übertreibung
      der Arbeitslast.
    it: Esprime una estrema occupazione, al punto da aver bisogno anche dell'aiuto di un gatto. Riflette
      il valore culturale giapponese della diligenza e l'esagerazione umoristica del carico di lavoro.
    pt: Expressa uma extrema ocupação, a ponto de precisar até da ajuda de um gato. Reflete o valor cultural
      japonês da diligência e a exageração humorística da carga de trabalho.
    ru: Выражает крайнюю занятость, доходящую до необходимости помощи даже кота. Отражает японскую культурную
      ценность трудолюбия и юмористическое преувеличение нагрузки.
    ja: 猫の手まで借りたいほど忙しいことを表す。日本の勤勉の文化的価値と、仕事量のユーモラスな誇張を反映している。
    zh: 形容忙碌到连猫的帮助都需要的地步。反映了日本文化中勤奋的价值观以及对工作量的幽默夸张。
    ar: يعبر عن انشغال شديد لدرجة الحاجة حتى إلى مساعدة قطة. يعكس القيمة الثقافية اليابانية للجدية والمبالغة
      الفكاهية في حجم العمل.
    he: מבטא עומס קיצוני עד כדי צורך בעזרתה של חתול. משקף את ערך העבודה הקשה בתרבות היפנית ואת ההגזמה
