      sociaux et moraux de l'époque d'Edo. C'est l'une des œuvres les plus célèbres du théâtre de marionnettes
      *bunraku*.
    de: Ein Stück von Chikamatsu Monzaemon, das eine tragische Liebesgeschichte vor dem Hintergrund sozialer
