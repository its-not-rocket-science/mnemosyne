- id: ja_literary_reference_源氏物語の_桐壺_f0d2290a
  language: ja
  canonical_reference: 源氏物語の「桐壺」
  reference_type: literary_reference
  surface_patterns:
  - 桐壺
  - 桐壺の更衣
  - 桐壺の巻
  short_explanation: The first chapter of *The Tale of Genji*, introducing the protagonist's mother, the
    *Kiritsubo Consort*, whose tragic early death shapes Genji's life. The chapter sets the tone for the
    entire work, emphasizing themes of beauty, loss, and imperial politics.
  i18n_explanations:
    en: The first chapter of *The Tale of Genji*, introducing the protagonist's mother, the *Kiritsubo
      Consort*, whose tragic early death shapes Genji's life. The chapter sets the tone for the entire
      work, emphasizing themes of beauty, loss, and imperial politics.
    es: El primer capítulo del *Cuento de Genji*, que presenta a la madre del protagonista, la *Consorte
      Kiritsubo*, cuya trágica muerte temprana moldea la vida de Genji. El capítulo establece el tono
      de toda la obra, destacando temas de belleza, pérdida y política imperial.
    fr: Le premier chapitre du *Dit du Genji*, qui introduit la mère du protagoniste, la *Consorte Kiritsubo*,
      dont la mort prématurée et tragique façonne la vie de Genji. Ce chapitre établit le ton de l'œuvre
      entière, en mettant l'accent sur les thèmes de la beauté, de la perte et de la politique impériale.
    de: Das erste Kapitel des *Genji Monogatari*, das die Mutter des Protagonisten, die *Kiritsubo-Kaiserin*,
      vorstellt, deren tragischer früher Tod Genjis Leben prägt. Das Kapitel setzt den Ton für das gesamte
      Werk und betont Themen wie Schönheit, Verlust und kaiserliche Politik.
    it: Il primo capitolo del *Racconto di Genji*, che introduce la madre del protagonista, la *Consorte
      Kiritsubo*, la cui tragica morte precoce plasma la vita di Genji. Il capitolo stabilisce il tono
      dell'intera opera, sottolineando temi di bellezza, perdita e politica imperiale.
    pt: O primeiro capítulo de *A História de Genji*, que apresenta a mãe do protagonista, a *Consorte
      Kiritsubo*, cuja trágica morte precoce molda a vida de Genji. O capítulo estabelece o tom de toda
      a obra, enfatizando temas de beleza, perda e política imperial.
    ru: Первая глава «Повести о Гэндзи», представляющая мать главного героя, *Кирицубо-но онна*, чья ранняя
      трагическая смерть определяет жизнь Гэндзи. Глава задаёт тон всему произведению, акцентируя темы
      красоты, утраты и императорской политики.
    ja: 源氏物語の第一帖で、主人公の母である桐壺更衣を紹介する。彼女の早すぎる悲劇的な死が光源氏の生涯を形作り、作品全体のテーマである美、喪失、宮廷政治の基調を築いている。
    zh: 《源氏物语》的第一帖，介绍主人公的母亲桐壺更衣。她早逝的悲剧命运塑造了光源氏的一生，并奠定了全书美、失落与宫廷政治的基调。
    ar: الفصل الأول من *حكاية غينجي*، الذي يقدم والدة البطل، *الملكة كيريتسوبو*، التي شكلت وفاتها المبكرة
      المأساوية حياة غينجي. يضع الفصل نغمة العمل بأكمله، مؤكدًا على مواضيع الجمال والخسارة والسياسة الإمبراطورية.
    he: הפרק הראשון של *סיפורו של גנג'י*, המציג את אמו של הגיבור, *הקיסרית קיריטסובו*,whose מותה הטרגי
      המוקדם מעצב את חייו של גנג'י. הפרק קובע את הטון של כל היצירה, תוך הדגשת נושאים של יופי, אובדן ופוליטיקה
      קיסרית.
