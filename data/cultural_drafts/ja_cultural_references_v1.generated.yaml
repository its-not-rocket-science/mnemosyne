      charity, morality) that influence one's rebirth in a favorable existence.
    es: Concepto budista que significa 'buenas causas para la próxima vida', refiriéndose a acciones virtuosas
      (como caridad o moralidad) que influyen en un renacimiento favorable.
    fr: Concept bouddhiste désignant les 'bonnes causes pour la prochaine vie', c'est-à-dire les actions
      vertueuses (comme la charité ou la moralité) qui influencent une renaissance favorable.
    de: Ein buddhistischer Begriff für 'gute Ursachen für das nächste Leben', der sich auf tugendhafte
      Handlungen (z. B. Wohltätigkeit, Moral) bezieht, die eine günstige Wiedergeburt beeinflussen.
