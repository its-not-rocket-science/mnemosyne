- id: ja_literary_reference_方丈記の_ゆく河の流れは絶えずして_e334228d
  language: ja
  canonical_reference: 方丈記の「ゆく河の流れは絶えずして」
  reference_type: literary_reference
  surface_patterns:
  - ゆく河の流れは絶えずして
  - 方丈記の冒頭
  - 河の流れは絶えずして
  - 方丈記の一節
  short_explanation: The opening passage of 'The Record of a Ten-Foot Square Hut' by Kamo no Chōmei, reflecting
    on the ceaseless flow of the river as a metaphor for the impermanence of life and the world. A foundational
    work of Japanese Buddhist literature.
  i18n_explanations:
    en: The opening passage of 'The Record of a Ten-Foot Square Hut' by Kamo no Chōmei, reflecting on
      the ceaseless flow of the river as a metaphor for the impermanence of life and the world. A foundational
      work of Japanese Buddhist literature.
    es: El pasaje inicial de 'El registro de una cabaña de diez pies cuadrados' de Kamo no Chōmei, que
      reflexiona sobre el flujo incesante del río como metáfora de la impermanencia de la vida y el mundo.
      Obra fundamental de la literatura budista japonesa.
    fr: Le passage d'ouverture du 'Récit d'une hutte de dix pieds carrés' de Kamo no Chōmei, qui médite
      sur le flux incessant de la rivière comme métaphore de l'impermanence de la vie et du monde. Une
      œuvre fondatrice de la littérature bouddhiste japonaise.
    de: Die einleitenden Zeilen von 'Aufzeichnungen aus einer zehn Fuß großen Hütte' von Kamo no Chōmei,
      die den unaufhörlichen Fluss des Flusses als Metapher für die Vergänglichkeit des Lebens und der
      Welt reflektieren. Ein Grundlagenwerk der japanischen buddhistischen Literatur.
    it: Il passaggio iniziale di 'Il resoconto di una capanna di dieci piedi quadrati' di Kamo no Chōmei,
      che riflette sul flusso incessante del fiume come metafora dell'impermanenza della vita e del mondo.
      Un'opera fondamentale della letteratura buddista giapponese.
    pt: O trecho inicial de 'O Registro de uma Cabana de Dez Pés Quadrados' de Kamo no Chōmei, que reflete
      sobre o fluxo incessante do rio como metáfora da impermanência da vida e do mundo. Obra fundamental
      da literatura budista japonesa.
    ru: Начальные строки 'Записок из хижины в десять футов' Камо-но Тёмэя, где течение реки служит метафорой
      непостоянства жизни и мира. Основополагающее произведение японской буддийской литературы.
    ja: 鴨長明の「方丈記」の冒頭の句で、川の絶え間ない流れを人生と世界の無常のたとえとして捉える。日本仏教文学の基礎をなす作品。
    zh: 鸭长明《方丈记》的开篇，以川流不息的河水隐喻生命与世界的无常。日本佛教文学的奠基之作。
    ar: المقطع الافتتاحي لـ'سجل كوخ بمساحة عشرة أقدام مربعة' للكاتب كامو نو تشومي، الذي يتأمّل في جريان
      النهر الدائم كاستعارة لعدم ديمومة الحياة والعالم. عمل أساسي في الأدب البوذي الياباني.
    he: השורות הפותחות של 'רשימות מביתן עשרה רגל מרובעת' מאת קאמו נו צ'ומהי, המשקפות את זרימת הנהר הבלתי
      פוסקת כמטפורה לחוסר הקביעות של החיים והעולם. יצירה יסודית בספרות הבודהיסטית היפנית.
