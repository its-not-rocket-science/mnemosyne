    es: Término budista que se refiere a las 'perfecciones' (pāramitā) practicadas en este mundo (此岸,
      'esta orilla') para alcanzar la iluminación. Se opone a 彼岸 ('la otra orilla'), que simboliza el
      Nirvana.
    fr: Terme bouddhiste désignant les 'perfections' (pāramitā) pratiquées en ce monde (此岸, 'cette rive')
      pour atteindre l'éveil. Il s'oppose à 彼岸 ('l'autre rive'), symbole du Nirvana.
    de: Ein buddhistischer Begriff für die 'Vollkommenheiten' (pāramitā), die in dieser Welt (此岸, 'dieses
      Ufer') praktiziert werden, um Erleuchtung zu erlangen. Er steht im Kontrast zu 彼岸 ('das andere Ufer'),
      das das Nirvana symbolisiert.
    it: Termine buddista che si riferisce alle 'perfezioni' (pāramitā) praticate in questo mondo (此岸,
      'questa riva') per raggiungere l'illuminazione. Si contrappone a 彼岸 ('l'altra riva'), simbolo del
      Nirvana.
    pt: Termo budista que se refere às 'perfeições' (pāramitā) praticadas neste mundo (此岸, 'esta margem')
      para atingir a iluminação. Contrasta com 彼岸 ('a outra margem'), que simboliza o Nirvana.
    ru: Буддийский термин, обозначающий 'совершенства' (pāramitā), практикуемые в этом мире (此岸, 'этот
      берег') для достижения просветления. Противопоставляется 彼岸 ('другой берег'), символизирующему Нирвану.
    ja: 仏教用語で、この世（此岸）で実践する「波羅蜜（pāramitā）」を指す。向こう岸（彼岸）の涅槃と対比される。
    zh: 佛教术语，指在现世（此岸）修行的「波罗蜜（pāramitā）」以达到觉悟。与彼岸（涅槃）相对。
    ar: مصطلح بوذي يشير إلى الكماليات (pāramitā) التي تُمارس في هذا العالم (此岸، 'الشاطئ') لتحقيق التنوير.
      وهو يتناقض مع 彼岸 ('الشاطئ الآخر')، الذي يرمز إلى النيرفانا.
    he: מונח בודהיסטי המתייחס ל'שלמויות' (pāramitā) הנהוגות בעולם הזה (此岸, 'הגדה הזו') להשגת הארה. הוא
      מנוגד ל彼岸 ('הגדה האחרת'), המסמלת את הנירוונה.
