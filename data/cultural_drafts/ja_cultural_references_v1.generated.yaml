    es: Un cuento popular japonés sobre un hombre pobre que comienza con una sola paja y, a través de
      una serie de intercambios, termina siendo rico. Ilustra el valor de la perseverancia y la ingeniosidad.
    fr: Un conte populaire japonais sur un homme pauvre qui commence avec une simple paille et, grâce
      à une série d'échanges, finit par s'enrichir. Illustre la valeur de la persévérance et de la débrouillardise.
    de: Ein japanisches Volksmärchen über einen armen Mann, der mit einem einzigen Strohhalm beginnt und
