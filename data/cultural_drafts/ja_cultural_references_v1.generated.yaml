- id: ja_proverb_tradition_蛇の道は蛇_92aa8f67
  language: ja
  canonical_reference: 蛇の道は蛇
  reference_type: proverb_tradition
  surface_patterns:
  - 蛇の道は蛇
  - 蛇の道は蛇という
  - 蛇の道は蛇だ
  short_explanation: Those who share a common background or experience understand each other best. Literally,
    'the way of the snake is known by the snake.'
  i18n_explanations:
    en: Those who share a common background or experience understand each other best. Literally, 'the
      way of the snake is known by the snake.'
    es: Quienes comparten un mismo trasfondo o experiencia se entienden mejor. Literalmente, 'el camino
      de la serpiente lo conoce la serpiente'.
    fr: Ceux qui partagent un même passé ou une même expérience se comprennent le mieux. Littéralement,
      'le chemin du serpent est connu par le serpent'.
    de: 'Diejenigen, die einen gemeinsamen Hintergrund oder Erfahrung teilen, verstehen sich am besten.
      Wörtlich: ''Der Weg der Schlange ist der Schlange bekannt''.'
    it: Coloro che condividono un background o un'esperienza comune si capiscono meglio. Letteralmente,
      'la via del serpente è nota al serpente'.
    pt: Aqueles que compartilham um mesmo histórico ou experiência se entendem melhor. Literalmente, 'o
      caminho da cobra é conhecido pela cobra'.
    ru: 'Те, кто разделяет общий опыт или прошлое, понимают друг друга лучше всего. Буквально: ''путь
      змеи известен змее''.'
    ja: 同じ背景や経験を持つ者同士が最も理解し合える。文字通り「蛇の道は蛇」という意味。
    zh: 有着共同背景或经历的人最能相互理解。字面意思为‘蛇的路径只有蛇知道’。
    ar: أولئك الذين يشتركون في خلفية أو تجربة مشتركة يفهم بعضهم بعضًا بشكل أفضل. حرفيًا، 'طريق الثعبان
