- id: ja_literary_reference_春の夜の夢ばかりなる手枕に_1f87a69c
  language: ja
  canonical_reference: 春の夜の夢ばかりなる手枕に
  reference_type: literary_reference
  surface_patterns:
  - 春の夜の夢ばかりなる手枕に
  - 春の夜の夢ばかりなる手枕
  - 春の夜の夢ばかりなる枕
  short_explanation: A poetic phrase from the *Man'yōshū* (Book 10, poem 2213) expressing fleeting, dream-like
    love or affection, often used to evoke transient beauty. It reflects the Heian-era aesthetic of *mono
    no aware* (the pathos of things).
  i18n_explanations:
    en: A poetic phrase from the *Man'yōshū* (Book 10, poem 2213) expressing fleeting, dream-like love
      or affection, often used to evoke transient beauty. It reflects the Heian-era aesthetic of *mono
      no aware* (the pathos of things).
    es: Frase poética del *Man'yōshū* (Libro 10, poema 2213) que expresa un amor o afecto efímero y onírico,
      usado para evocar la belleza transitoria. Refleja la estética de la era Heian del *mono no aware*
      (la patética de las cosas).
    fr: Une phrase poétique du *Man'yōshū* (Livre 10, poème 2213) exprimant un amour ou une affection
      éphémère et onirique, souvent utilisée pour évoquer une beauté passagère. Elle reflète l'esthétique
      de l'ère Heian du *mono no aware* (la mélancolie des choses).
    de: Ein poetischer Vers aus dem *Man'yōshū* (Buch 10, Gedicht 2213), der flüchtige, traumhafte Liebe
      oder Zuneigung ausdrückt und oft vergängliche Schönheit evoziert. Er spiegelt die Ästhetik der Heian-Zeit
      mit *mono no aware* (die Pathos der Dinge) wider.
    it: Una frase poetica del *Man'yōshū* (Libro 10, poema 2213) che esprime un amore o affetto effimero
      e onirico, spesso usato per evocare una bellezza transitoria. Riflette l'estetica dell'era Heian
      del *mono no aware* (la malinconia delle cose).
    pt: Uma frase poética do *Man'yōshū* (Livro 10, poema 2213) que expressa um amor ou afeto efêmero
      e onírico, usada para evocar a beleza transitória. Reflete a estética da era Heian do *mono no aware*
      (a patética das coisas).
    ru: Поэтическая фраза из «Манъёсю» (Книга 10, стихотворение 2213), выражающая мимолётную, сновидную
      любовь или привязанность, часто используемая для передачи преходящей красоты. Отражает эстетику
      эпохи Хэйан — *моно-но аварэ* (пафос вещей).
    ja: 万葉集（巻第十、2213番）の詩句で、儚い夢のような愛や情愛を表し、移ろいやすい美しさを喚起する。平安時代の「物の哀れ」の美意識を反映している。
    zh: 《万叶集》（卷十，第2213首）的一句诗，表达短暂如梦的爱与情感，常用以体现易逝之美。反映了平安时代的“物哀”审美意识。
    ar: عبارة شعرية من *مانيوشو* (الكتاب العاشر، القصيدة 2213) تعبر عن حب أو عاطفة عابرة وحلمية، تُستخدم
      لإثارة جمال زائل. تعكس الجمالية في حقبة هييان *مونو نو aware* (حزن الأشياء).
    he: ביטוי שירי מ*מניושו* (ספר 10, שיר 2213) המבטא אהבה או חיבה חולפת ודמוית חלום, המשמש לעורר יופי
      חולף. משקף את האסתטיקה של תקופת הייאן – *מונו נו aware* (החמלה על הדברים).
