  - 三途の川を渡る
  - 三途の川の渡し守
  short_explanation: A mythical river in Japanese folklore representing the boundary between life and
    death. The 'boatman' (渡し守) guides souls across, often depicted in art and literature as a liminal
    space.
  i18n_explanations:
    en: A mythical river in Japanese folklore representing the boundary between life and death. The 'boatman'
      (渡し守) guides souls across, often depicted in art and literature as a liminal space.
    es: Un río mítico en el folclore japonés que representa el límite entre la vida y la muerte. El 'barquero'
      (渡し守) guía a las almas a través de él, a menudo representado en arte y literatura como un espacio
      liminal.
    fr: Une rivière mythique du folklore japonais représentant la frontière entre la vie et la mort. Le
      'passeur' (渡し守) guide les âmes à travers, souvent représenté dans l'art et la littérature comme
      un espace liminal.
    de: Ein mythischer Fluss im japanischen Volksglauben, der die Grenze zwischen Leben und Tod darstellt.
      Der 'Fährmann' (渡し守) geleitet die Seelen hinüber, oft als liminaler Raum in Kunst und Literatur
      dargestellt.
    it: Un fiume mitico nel folclore giapponese che rappresenta il confine tra la vita e la morte. Il
      'traghettatore' (渡し守) guida le anime oltre, spesso raffigurato in arte e letteratura come uno spazio
      liminale.
    pt: Um rio mítico no folclore japonês que representa o limite entre a vida e a morte. O 'barqueiro'
      (渡し守) conduz as almas através dele, frequentemente retratado na arte e literatura como um espaço
      liminar.
    ru: Мифическая река в японском фольклоре, олицетворяющая границу между жизнью и смертью. Перевозчик
      (渡し守) сопровождает души через неё, часто изображаемый в искусстве и литературе как пограничное пространство.
    ja: 日本の伝承における死と生の境界を象徴する mythical river。渡し守と呼ばれる船頭が魂を導き、芸術や文学で liminal space として描かれる。
    zh: 日本传说中象征生死界限的神话之河。船夫（渡し守）引渡灵魂，常在艺术与文学中被描绘为一个过渡空间。
    ar: نهر أسطوري في الفولكلور الياباني يمثل الحدود بين الحياة والموت. 'المُعبر' (渡し守) يرشد الأرواح عبره،
      وغالبًا ما يُصور في الفن والأدب كمساحة حدية.
    he: נהר מיתולוגי בפולקלור היפני המסמל את הגבול בין חיים למוות. ה'מעביר' (渡し守) מוביל את הנשמות מעברו,
