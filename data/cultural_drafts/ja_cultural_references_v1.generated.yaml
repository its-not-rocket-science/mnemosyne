- id: ja_literary_reference_源氏物語の_光源氏_928eba11
  language: ja
  canonical_reference: 源氏物語の「光源氏」
  reference_type: literary_reference
  surface_patterns:
  - 光源氏
  - 源氏
  - 光る源氏
  short_explanation: The protagonist of *The Tale of Genji* (Genji Monogatari), often called the 'Shining
    Genji.' He is the son of Emperor Kiritsubo and embodies idealized aristocratic beauty, charm, and
    tragic fate, central to Heian court literature.
  i18n_explanations:
    en: The protagonist of *The Tale of Genji* (Genji Monogatari), often called the 'Shining Genji.' He
      is the son of Emperor Kiritsubo and embodies idealized aristocratic beauty, charm, and tragic fate,
      central to Heian court literature.
    es: El protagonista del *Cuento de Genji*, conocido como 'Genji el Brillante'. Hijo del emperador
      Kiritsubo, encarna la belleza, el encanto y el destino trágico del ideal aristocrático, clave en
      la literatura de la corte Heian.
    fr: Le protagoniste du *Dit du Genji* (Genji Monogatari), souvent appelé 'Genji le Radieux'. Fils
      de l'empereur Kiritsubo, il incarne la beauté, le charme et le destin tragique de l'idéal aristocratique,
      central dans la littérature de cour de l'ère Heian.
    de: Die Hauptfigur des *Genji Monogatari*, oft 'der strahlende Genji' genannt. Als Sohn des Kaisers
      Kiritsubo verkörpert er idealisierte aristokratische Schönheit, Charme und tragisches Schicksal,
      zentral für die Heian-Hofkultur.
    it: Il protagonista del *Racconto di Genji*, spesso chiamato 'Genji lo Splendente'. Figlio dell'imperatore
      Kiritsubo, incarna la bellezza, il fascino e il destino tragico dell'ideale aristocratico, centrale
      nella letteratura di corte dell'era Heian.
    pt: O protagonista de *A História de Genji* (Genji Monogatari), conhecido como 'Genji, o Brilhante'.
      Filho do imperador Kiritsubo, ele encarna a beleza, o charme e o destino trágico do ideal aristocrático,
      central na literatura da corte Heian.
    ru: Главный герой «Повести о Гэндзи» (*Гэндзи моногатари*), часто именуемый «Сияющий Гэндзи». Сын
      императора Кирицубо, он олицетворяет идеализированную аристократическую красоту, обаяние и трагическую
      судьбу, ключевую для литературы двора эпохи Хэйан.
    ja: 源氏物語の主人公で「光源氏」とも呼ばれる。桐壺帝の子であり、平安貴族の理想美、魅力、悲劇的運命を体現し、平安朝文学の中心的存在である。
    zh: 《源氏物语》的主人公，常被称为“光源氏”。他是桐壺帝之子，体现了平安贵族理想化的美、魅力与悲剧命运，是平安宫廷文学的核心人物。
    ar: البطل الرئيسي لـ*حكاية غينجي* (غينجي مونوغاتاري)، المعروف بـ'غينجي الساطع'. ابن الإمبراطور كيريتسوبو،
      يجسد الجمال الأرستقراطي المثالي، السحر والمصير المأساوي، وهو محور الأدب في بلاط هييان.
    he: הגיבור הראשי של *סיפורו של גנג'י* (גנג'י מונogatari), המכונה לעיתים 'גנג'י הנוצץ'. בנו של הקיסר
      קיריטסובו, הוא מגלם את היופי, הכריזמה והגורל הטרגי של האצולה האידיאלית, המרכזי בספרות חצר הייאן.
