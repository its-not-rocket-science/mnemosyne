  short_explanation: The 'Ten Realms Mandala' (十界曼荼羅) is a Buddhist concept depicting ten spiritual realms
    (from hell to Buddhahood) and their interconnectedness, used in Nichiren Buddhism to illustrate the
    path to enlightenment.
  i18n_explanations:
    en: The 'Ten Realms Mandala' (十界曼荼羅) is a Buddhist concept depicting ten spiritual realms (from hell
      to Buddhahood) and their interconnectedness, used in Nichiren Buddhism to illustrate the path to
      enlightenment.
    es: El 'Mandala de los Diez Reinos' (十界曼荼羅) es un concepto budista que representa diez reinos espirituales
      (desde el infierno hasta la budeidad) y su interconexión, utilizado en el budismo Nichiren para
      ilustrar el camino hacia la iluminación.
    fr: Le 'Mandala des Dix Royaumes' (十界曼荼羅) est un concept bouddhiste représentant dix royaumes spirituels
      (de l'enfer à la bouddhéité) et leurs interconnexions, utilisé dans le bouddhisme Nichiren pour
      illustrer le chemin vers l'éveil.
    de: Das 'Mandala der Zehn Reiche' (十界曼荼羅) ist ein buddhistisches Konzept, das zehn spirituelle Reiche
      (von der Hölle bis zur Buddhaschaft) und ihre Vernetzung darstellt. Es wird im Nichiren-Buddhismus
      verwendet, um den Weg zur Erleuchtung zu veranschaulichen.
    it: Il 'Mandala dei Dieci Regni' (十界曼荼羅) è un concetto buddista che rappresenta dieci regni spirituali
      (dall'inferno alla buddità) e la loro interconnessione, usato nel buddismo Nichiren per illustrare
      il percorso verso l'illuminazione.
    pt: O 'Mandala dos Dez Reinos' (十界曼荼羅) é um conceito budista que representa dez reinos espirituais
      (do inferno à iluminação) e sua interconexão, utilizado no budismo Nichiren para ilustrar o caminho
      à iluminação.
    ru: Мандала 'Десяти царств' (十界曼荼羅) — это буддийское понятие, изображающее десять духовных царств
      (от ада до состояния Будды) и их взаимосвязь, используемое в буддизме Нитирэн для иллюстрации пути
      к просветлению.
    ja: 十界曼荼羅とは、地獄から仏界までの十の精神的な世界とその相互関係を描いた仏教の概念で、日蓮仏教において悟りへの道を示すために用いられます。
    zh: 十界曼荼罗（十界曼荼羅）是佛教概念，描绘从地狱到佛界的十个精神境界及其相互联系，在日莲佛教中用于说明通往觉悟的道路。
    ar: ماندالا 'العشرة عوالم' (十界曼荼羅) هو مفهوم بوذي يمثل عشرة عوالم روحية (من الجحيم إلى حالة البوذية)
      وترابطها، ويُستخدم في البوذية النيتشيرينية لتوضيح طريق التنوير.
    he: מנדלת 'עשרת העולמות' (十界曼荼羅) היא מושג בודהיסטי המתאר עשרה עולמות רוחניים (מגיהנום ועד לבודהה)
