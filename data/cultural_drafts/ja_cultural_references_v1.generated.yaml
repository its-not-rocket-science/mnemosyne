- id: ja_classical_or_scriptural_allusion_輪廻転生_53d7382f
  language: ja
  canonical_reference: 輪廻転生
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 輪廻転生
  - 輪廻と転生
  - 輪廻転生の理
  - 輪廻転生を信じる
  short_explanation: The cycle of rebirth in which beings are trapped until liberation (Nirvana) is achieved.
    Central to Buddhist and Hindu thought, emphasizing the impermanence of life.
  i18n_explanations:
    en: The cycle of rebirth in which beings are trapped until liberation (Nirvana) is achieved. Central
      to Buddhist and Hindu thought, emphasizing the impermanence of life.
    es: El ciclo de renacimiento en el que los seres están atrapados hasta alcanzar la liberación (Nirvana).
      Central en el pensamiento budista e hindú, destacando la impermanencia de la vida.
    fr: Le cycle des renaissances dans lequel les êtres sont piégés jusqu'à atteindre la libération (Nirvana).
      Central dans la pensée bouddhiste et hindoue, soulignant l'impermanence de la vie.
    de: Der Kreislauf der Wiedergeburt, in dem Wesen gefangen sind, bis die Befreiung (Nirvana) erreicht
      wird. Zentral im buddhistischen und hinduistischen Denken, betont die Vergänglichkeit des Lebens.
    it: Il ciclo delle rinascite in cui gli esseri sono intrappolati fino al raggiungimento della liberazione
      (Nirvana). Centrale nel pensiero buddista e induista, che sottolinea l'impermanenza della vita.
    pt: O ciclo de renascimentos no qual os seres estão presos até alcançar a libertação (Nirvana). Central
      no pensamento budista e hindu, enfatizando a impermanência da vida.
    ru: Цикл перерождений, в котором существа пребывают, пока не достигнут освобождения (Нирваны). Центральная
      идея в буддизме и индуизме, подчеркивающая непостоянство жизни.
    ja: 生まれ変わりの輪廻の中で、存在は解脱（涅槃）に至るまで繰り返される。仏教とヒンドゥー教の中心概念で、生命の無常を示す。
    zh: 众生在轮回中不断重生，直至解脱（涅槃）为止。佛教与印度教的核心思想，强调生命的无常。
    ar: دورة الولادة المتكررة التي تحبس الكائنات حتى تحقيق التحرر (النيرفانا). أساسية في الفكر البوذي
      والهندي، وتؤكد على عدم ديمومة الحياة.
    he: מעגל הגלגול בו נתונים היצורים עד להשגת השחרור (נירוונה). מרכזי במחשבה הבודהיסטית וההינדואית, המדגיש
      את ארעיות החיים.
