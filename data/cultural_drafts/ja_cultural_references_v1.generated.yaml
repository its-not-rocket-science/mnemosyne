      Meiji-Restauration einleitete. Sie markierte Japans Übergang vom Feudalismus zur Modernisierung
      und Verwestlichung.
    it: La restaurazione del 1868 del potere imperiale che pose fine allo shogunato Tokugawa e diede inizio
      alla Restaurazione Meiji. Segnò il passaggio del Giappone dal feudalesimo alla modernizzazione e
      occidentalizzazione.
    pt: A restauração de 1868 do governo imperial que pôs fim ao xogunato Tokugawa e iniciou a Restauração
      Meiji. Marcou a transição do Japão do feudalismo para a modernização e ocidentalização.
