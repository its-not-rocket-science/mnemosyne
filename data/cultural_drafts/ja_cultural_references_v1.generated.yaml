      completando l'unificazione del Giappone.
    pt: Uma série de batalhas (1614–1615) que destruíram o clã Toyotomi e consolidaram o governo dos Tokugawa.
      As campanhas de 'inverno' e 'verão' puseram fim à resistência de Toyotomi Hideyori, completando
      a unificação do Japão.
    ru: Серия битв (1614–1615), которые уничтожили клан Тoyотоми и укрепили власть Токугава. Зимняя и
      летняя кампании положили конец сопротивлению Тoyотоми Хидэёри, завершив объединение Японии.
    ja: 1614年から1615年にかけて行われた一連の戦いで、豊臣氏を滅ぼし徳川氏の支配を固めた。冬の陣・夏の陣により豊臣秀頼の抵抗を終わらせ、日本の統一を完遂した。
