- id: ja_literary_reference_関の落葉_06fe5392
  language: ja
  canonical_reference: 関の落葉
  reference_type: literary_reference
  surface_patterns:
  - 関の落葉
  - 関の落ち葉
  - 関の落葉のくだり
  short_explanation: A famous scene from *The Tale of the Heike* (Heike Monogatari) where the warrior
    Kumagai Naozane, overcome with grief, lets his son fall to his death at the Battle of Uji (1184).
    The phrase symbolizes the tragic impermanence of life and warrior duty.
  i18n_explanations:
    en: A famous scene from *The Tale of the Heike* (Heike Monogatari) where the warrior Kumagai Naozane,
      overcome with grief, lets his son fall to his death at the Battle of Uji (1184). The phrase symbolizes
      the tragic impermanence of life and warrior duty.
    es: Escena famosa del *Cantar de Heike* donde el guerrero Kumagai Naozane, abrumado por el dolor,
      deja caer a su hijo en la muerte durante la Batalla de Uji (1184). La frase simboliza la trágica
      fugacidad de la vida y el deber del guerrero.
    fr: Une scène célèbre du *Dit des Heike* où le guerrier Kumagai Naozane, submergé par le chagrin,
      laisse tomber son fils dans la mort lors de la bataille d'Uji (1184). La phrase symbolise la fugacité
      tragique de la vie et le devoir du guerrier.
    de: Eine berühmte Szene aus dem *Heike Monogatari*, in der der Krieger Kumagai Naozane, von Trauer
      überwältigt, seinen Sohn im Kampf von Uji (1184) in den Tod stürzen lässt. Der Ausdruck symbolisiert
      die tragische Vergänglichkeit des Lebens und die Pflicht des Kriegers.
    it: Una scena famosa del *Racconto di Heike* in cui il guerriero Kumagai Naozane, sopraffatto dal
      dolore, lascia cadere suo figlio nella morte durante la Battaglia di Uji (1184). La frase simboleggia
      la tragica fugacità della vita e il dovere del guerriero.
    pt: Cena famosa do *Conto de Heike* em que o guerreiro Kumagai Naozane, tomado pela dor, deixa seu
      filho cair para a morte na Batalha de Uji (1184). A frase simboliza a trágica efemeridade da vida
      e o dever do guerreiro.
    ru: Знаменитая сцена из «Повести о доме Тайра» (*Хэйкэ моногатари*), где воин Кумагаи Наодзанэ, охваченный
      горем, позволяет своему сыну погибнуть в битве при Удзи (1184). Фраза символизирует трагическую
      бренность жизни и долг воина.
    ja: 平家物語の有名な場面で、武将熊谷直実が悲嘆に暮れ、1184年の宇治の戦いで息子を死なせてしまう。この言葉は、人生の儚さと武士の義理を象徴している。
    zh: 《平家物语》中著名的一幕：武士熊谷直实在1184年宇治之战中因悲痛而让儿子坠崖身亡。这句话象征着生命的无常与武士之道的悲剧性。
    ar: مشهد شهير من *حكاية هيكي* (هيكي مونوغاتاري) حيث يترك المحارب كوماغاي ناوزاني ابنه يسقط ميتًا في
      معركة أوجي (1184) غارقًا في الحزن. العبارة ترمز إلى زوال الحياة المؤلم وواجب المحارب.
    he: סצנה מפורסמת מ*סיפורו של הייקה* (הייקה מונogatari) שבה הלוחם קומגאי נאוזאנה, המוצף בצער, מניח
      לבנו ליפול אל מותו בקרב אוג'י (1184). הביטוי מסמל את החולף הטרגי של החיים וחובת הלוחם.
