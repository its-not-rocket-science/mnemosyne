- id: ja_literary_reference_平家物語の_扇の的_487ba35b
  language: ja
  canonical_reference: 平家物語の「扇の的」
  reference_type: literary_reference
  surface_patterns:
  - 扇の的
  - 扇射ち
  - 那須与一の扇射ち
  - 平家物語の扇の的
  short_explanation: A pivotal episode from 'The Tale of the Heike' where Nasu no Yoichi is challenged
    to shoot down a fan floating on the sea, demonstrating his unparalleled archery skills. Symbolizes
    both martial prowess and the transient nature of power.
  i18n_explanations:
    en: A pivotal episode from 'The Tale of the Heike' where Nasu no Yoichi is challenged to shoot down
      a fan floating on the sea, demonstrating his unparalleled archery skills. Symbolizes both martial
      prowess and the transient nature of power.
    es: Un episodio clave de 'El relato de los Heike' en el que Nasu no Yoichi es retado a derribar un
      abanico que flota en el mar, demostrando su habilidad excepcional con el arco. Simboliza tanto el
      dominio marcial como la naturaleza efímera del poder.
    fr: Un épisode décisif du 'Dit des Heike' où Nasu no Yoichi est défié de tirer une éventail flottant
      sur la mer, démontrant son talent d'archer inégalé. Symbolise à la fois la prouesse martiale et
      la fugacité du pouvoir.
    de: Ein zentrales Ereignis aus dem 'Heike-Monogatari', in dem Nasu no Yoichi herausgefordert wird,
      einen auf dem Meer treibenden Fächer abzuschießen und damit seine unübertroffene Bogenschützenkunst
      unter Beweis zu stellen. Symbolisiert sowohl militärische Stärke als auch die Vergänglichkeit von
      Macht.
    it: Un episodio cruciale del 'Racconto degli Heike' in cui Nasu no Yoichi viene sfidato a colpire
      con una freccia un ventaglio che galleggia sul mare, dimostrando la sua abilità arcieristica senza
      pari. Simboleggia sia il valore marziale che la natura effimera del potere.
    pt: Um episódio crucial de 'A História dos Heike' em que Nasu no Yoichi é desafiado a atirar em um
      leque flutuando no mar, demonstrando sua habilidade excepcional com o arco. Simboliza tanto o domínio
      marcial quanto a natureza transitória do poder.
    ru: Важнейший эпизод из 'Повести о доме Тайра', где Насу но Ёити бросает вызов — сбить веер, плавающий
      на море, демонстрируя своё непревзойдённое мастерство лучника. Символизирует как воинскую доблесть,
      так и преходящий характер власти.
    ja: 平家物語の重要なエピソードで、那須与一が海に浮かぶ扇を射落とすという難題に挑み、その卓越した弓の技を示す。武芸の腕前と権力の儚さの両方を象徴する。
    zh: 《平家物语》中的关键篇章，描写那须与一挑战射落海面扇子的难题，展现其无与伦比的弓术。象征武艺与权力的短暂。
    ar: ' Episode حاسم من ''حكاية هيكي'' حيث يتحدى ناسو نو يويتشي لإطلاق سهم على مروحة تطفو على سطح البحر،
      مما يدل على مهارته الفائقة في الرماية. يرمز إلى كل من البراعة العسكرية والزوال السريع للسلطة.'
    he: אירוע מכריע מ'סיפור משפחת טאירה', בו נאסו נו יואיצ'י מתמודד עם האתגר לירות במניפה הצפה על פני
      הים, ובכך מוכיח את מיומנותו יוצאת הדופן בקשתות. מסמל הן את הגבורה הצבאית והן את חוסר הקביעות של
      הכוח.
