  short_explanation: A mythological cave in Japanese Shinto lore where the sun goddess Amaterasu hid,
    plunging the world into darkness until lured out by laughter. Symbolizes renewal and the return of
    light.
  i18n_explanations:
    en: A mythological cave in Japanese Shinto lore where the sun goddess Amaterasu hid, plunging the
      world into darkness until lured out by laughter. Symbolizes renewal and the return of light.
    es: Una cueva mítica de la tradición sintoísta japonesa donde la diosa del sol Amaterasu se escondió,
      sumiendo al mundo en la oscuridad hasta que fue atraída de nuevo con risas. Simboliza el renacimiento
      y el retorno de la luz.
    fr: Une grotte mythologique du shintoïsme japonais où la déesse du soleil Amaterasu se cacha, plongeant
      le monde dans l'obscurité jusqu'à ce qu'elle en soit sortie par des rires. Symbolise le renouveau
      et le retour de la lumière.
    de: Eine mythologische Höhle im japanischen Shinto-Glauben, in der sich die Sonnengöttin Amaterasu
      verbarg und die Welt in Dunkelheit stürzte, bis sie durch Lachen herausgelockt wurde. Symbolisiert
      Erneuerung und die Rückkehr des Lichts.
    it: Una grotta mitologica dello shintoismo giapponese dove la dea del sole Amaterasu si nascose, gettando
      il mondo nell'oscurità finché non fu attirata fuori dalle risate. Simboleggia il rinnovamento e
      il ritorno della luce.
    pt: Uma caverna mítica do xintoísmo japonês onde a deusa do sol Amaterasu se escondeu, mergulhando
      o mundo na escuridão até ser atraída de volta pela risada. Simboliza o renascimento e o retorno
      da luz.
    ru: Мифологическая пещера в японском синтоизме, где богиня солнца Аматэрасу спряталась, погрузив мир
      во тьму, пока её не выманили смехом. Символизирует обновление и возвращение света.
    ja: 日本神話に登場する天岩戸は、太陽神アマテラスが隠れて世界を暗闇に包んだ場所。笑い声で再び現れ、再生と光の回帰を象徴します。
    zh: 日本神道传说中的天岩户是太阳女神天照隐居之处，导致世界陷入黑暗，直到被笑声引出。象征着重生与光明的回归。
    ar: كهف أسطوري في الميثولوجيا الشنتوية اليابانية، اختبأت فيه آلهة الشمس أماتيراسو، مما plung العالم
      في الظلام حتى أخرجتها الضحكات. ترمز إلى التجدد وعودة النور.
    he: מערה מיתולוגית בשינטו היפני, שבה הסתתרה אלת השמש אמטרסו, הטילה את העולם בחשכה עד שהוצאה ממנה בצחוק.
      מסמלת התחדשות ושיבת האור.
