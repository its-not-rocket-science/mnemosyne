- id: ja_proverb_tradition_腹を読む_4bc03993
  language: ja
  canonical_reference: 腹を読む
  reference_type: proverb_tradition
  surface_patterns:
  - 腹を読む
  - 腹を読まれる
  - 腹を読まれた
  short_explanation: To read someone's mind or intentions, particularly their hidden thoughts or true
    feelings. It reflects the cultural emphasis on intuitive understanding and non-verbal communication
    in interpersonal relationships.
  i18n_explanations:
    en: To read someone's mind or intentions, particularly their hidden thoughts or true feelings. It
      reflects the cultural emphasis on intuitive understanding and non-verbal communication in interpersonal
      relationships.
    es: Leer la mente o las intenciones de alguien, especialmente sus pensamientos ocultos o sentimientos
      reales. Refleja el énfasis cultural en la comprensión intuitiva y la comunicación no verbal en las
      relaciones interpersonales.
    fr: Deviner les pensées ou les intentions de quelqu'un, en particulier ses idées cachées ou ses vrais
      sentiments. Cela reflète l'accent culturel mis sur la compréhension intuitive et la communication
      non verbale dans les relations interpersonnelles.
    de: Die Gedanken oder Absichten einer Person erraten, insbesondere ihre verborgenen Gedanken oder
      wahren Gefühle. Dies spiegelt die kulturelle Betonung intuitiven Verständnisses und nonverbaler
      Kommunikation in zwischenmenschlichen Beziehungen wider.
    it: Leggere la mente o le intenzioni di qualcuno, in particolare i suoi pensieri nascosti o sentimenti
      veri. Riflette l'enfasi culturale sulla comprensione intuitiva e la comunicazione non verbale nelle
      relazioni interpersonali.
    pt: Ler a mente ou as intenções de alguém, especialmente seus pensamentos ocultos ou sentimentos verdadeiros.
      Reflete a ênfase cultural na compreensão intuitiva e na comunicação não verbal em relacionamentos
      interpessoais.
    ru: Угадывать чьи-то мысли или намерения, особенно скрытые замыслы или истинные чувства. Отражает
      культурное значение интуитивного понимания и невербального общения в межличностных отношениях.
    ja: 人の心や意図を読み取ること、特に隠された考えや本心を見抜くこと。人間関係における直感的な理解と非言語的コミュニケーションの重要性を反映している。
    zh: 察觉他人的心思或意图，特别是其隐藏的想法或真实感受。反映了文化中对直觉理解和人际关系中非语言沟通的重视。
    ar: قراءة أفكار أو نوايا شخص ما، خاصة أفكاره الخفية أو مشاعره الحقيقية. يعكس التركيز الثقافي على الفهم
      الحدسي والتواصل غير اللفظي في العلاقات الشخصية.
    he: לקרוא את מחשבותיו או כוונותיו של מישהו, במיוחד את מחשבותיו הנסתרות או רגשותיו האמיתיים. משקף את
      הדגש התרבותי על הבנה אינטואיטיבית ותקשורת לא מילולית ביחסים בין אישיים.
