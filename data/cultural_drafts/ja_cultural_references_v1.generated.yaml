  short_explanation: The relocation of the Japanese capital to Heian-kyō (modern-day Kyoto) in 794 by
    Emperor Kammu, marking the beginning of the Heian period. It symbolized the end of Nara's Buddhist
    political influence and the establishment of a new cultural and political center.
  i18n_explanations:
    en: The relocation of the Japanese capital to Heian-kyō (modern-day Kyoto) in 794 by Emperor Kammu,
      marking the beginning of the Heian period. It symbolized the end of Nara's Buddhist political influence
      and the establishment of a new cultural and political center.
    es: La mudanza de la capital japonesa a Heian-kyō (la actual Kioto) en el año 794 por el emperador
      Kammu, que marcó el inicio del período Heian. Simbolizó el fin de la influencia política budista
      de Nara y el establecimiento de un nuevo centro cultural y político.
    fr: Le transfert de la capitale japonaise à Heian-kyō (l'actuelle Kyoto) en 794 par l'empereur Kammu,
      marquant le début de la période Heian. Cela symbolisait la fin de l'influence politique bouddhiste
      de Nara et l'établissement d'un nouveau centre culturel et politique.
    de: Die Verlegung der japanischen Hauptstadt nach Heian-kyō (dem heutigen Kyoto) im Jahr 794 durch
      Kaiser Kammu, die den Beginn der Heian-Zeit markierte. Sie symbolisierte das Ende des buddhistischen
      politischen Einflusses von Nara und die Gründung eines neuen kulturellen und politischen Zentrums.
    it: Il trasferimento della capitale giapponese a Heian-kyō (l'odierna Kyoto) nel 794 da parte dell'imperatore
      Kammu, che segnò l'inizio del periodo Heian. Simboleggiò la fine dell'influenza politica buddista
      di Nara e la nascita di un nuovo centro culturale e politico.
    pt: A transferência da capital japonesa para Heian-kyō (atual Quioto) em 794 pelo imperador Kammu,
      marcando o início do período Heian. Simbolizou o fim da influência política budista de Nara e o
      estabelecimento de um novo centro cultural e político.
    ru: Перенос японской столицы в Хэйан-кё (современный Киото) в 794 году императором Камму, ознаменовавший
      начало периода Хэйан. Это символизировало конец буддийского политического влияния Нара и создание
      нового культурного и политического центра.
    ja: 794年に桓武天皇が日本の首都を平安京（現在の京都）に遷したことで、平安時代が始まった。奈良の仏教政治勢力の終焉と、新たな文化・政治の中心地の成立を象徴した。
    zh: 794年，桓武天皇将日本首都迁至平安京（今京都），标志着平安时代的开始。象征着奈良佛教政治影响的终结与新文化政治中心的确立。
    ar: نقل العاصمة اليابانية إلى هِيان-كيو (كيوتو الحالية) عام 794 على يد الإمبراطور كامو، مما بدأ فترة
      هييان. رمز ذلك إلى نهاية النفوذ السياسي البوذي لنارا وبدء مركز ثقافي وسياسي جديد.
    he: העברת בירת יפן לקיוטו (הֵיאַן-קיוֹ) בשנת 794 על ידי הקיסר קַמוּ, אשר סימנה את תחילת תקופת הֵיאַן.
