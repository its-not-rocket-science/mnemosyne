- id: ja_proverb_tradition_因果応報_ea985577
  language: ja
  canonical_reference: 因果応報
  reference_type: proverb_tradition
  surface_patterns:
  - 因果応報
  - 因果応報の理
  - 因果は報いを持つ
  - 因果応報の法則
  short_explanation: A Buddhist principle meaning 'as you sow, so shall you reap'—actions have consequences
    in this life or the next. It reflects the moral order of the universe and is a foundational concept
    in Japanese ethical thought.
  i18n_explanations:
    en: A Buddhist principle meaning 'as you sow, so shall you reap'—actions have consequences in this
      life or the next. It reflects the moral order of the universe and is a foundational concept in Japanese
      ethical thought.
    es: 'Un principio budista que significa ''como siembras, así cosecharás'': las acciones tienen consecuencias
      en esta vida o en la siguiente. Refleja el orden moral del universo y es un concepto fundamental
      en el pensamiento ético japonés.'
    fr: 'Un principe bouddhiste signifiant ''comme tu sèmes, ainsi tu récolteras'' : les actions ont des
      conséquences dans cette vie ou dans la suivante. Il reflète l''ordre moral de l''univers et est
      un concept fondamental dans la pensée éthique japonaise.'
    de: Ein buddhistisches Prinzip, das bedeutet 'wie du säst, so wirst du ernten'—Handlungen haben Konsequenzen
      in diesem oder im nächsten Leben. Es spiegelt die moralische Ordnung des Universums wider und ist
      ein grundlegendes Konzept im japanischen ethischen Denken.
    it: Un principio buddista che significa 'come semini, così raccoglierai'—le azioni hanno conseguenze
      in questa vita o nella prossima. Riflette l'ordine morale dell'universo ed è un concetto fondamentale
      nel pensiero etico giapponese.
    pt: Um princípio budista que significa 'como você semeia, assim você colherá'—as ações têm consequências
      nesta vida ou na próxima. Reflete a ordem moral do universo e é um conceito fundamental no pensamento
      ético japonês.
    ru: Буддийский принцип, означающий 'что посеешь, то и пожнёшь'—поступки имеют последствия в этой или
      следующей жизни. Отражает моральный порядок вселенной и является основополагающим понятием в японской
      этической мысли.
    ja: 因果応報とは「蒔かぬ種は生えぬ」という仏教の原則で、行為は現世か来世に結果をもたらす。宇宙の道徳的秩序を反映し、日本の倫理思想の基礎概念となっている。
    zh: 因果报应是佛教原则，意为‘种瓜得瓜，种豆得豆’——行为在今生或来世会有结果。反映宇宙的道德秩序，是日本伦理思想的基础概念。
    ar: مبدأ بوذي يعني 'كما تدين تدان'—الأفعال لها عواقب في هذه الحياة أو في الحياة الآتية. يعكس النظام
      الأخلاقي للكون وهو مفهوم أساسي في الفكر الأخلاقي الياباني.
    he: עיקרון בודהיסטי שמשמעו 'כזרעך כך תקצור'—מעשים משפיעים על החיים הנוכחיים או הבאים. משקף את סדר
      העולם המוסרי והוא מושג יסודי במחשבה האתית היפנית.
