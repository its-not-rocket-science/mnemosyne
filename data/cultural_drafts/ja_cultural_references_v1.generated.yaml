  short_explanation: The concept of 'other-power fundamental vow' (他力本願) in Pure Land Buddhism emphasizes
    reliance on the compassion and vows of Amida Buddha for salvation, rather than one's own efforts.
  i18n_explanations:
    en: The concept of 'other-power fundamental vow' (他力本願) in Pure Land Buddhism emphasizes reliance
      on the compassion and vows of Amida Buddha for salvation, rather than one's own efforts.
    es: El concepto de 'voto de poder ajeno' (他力本願) en el budismo de la Tierra Pura enfatiza la dependencia
      de la compasión y los votos de Buda Amida para la salvación, en lugar de los propios esfuerzos.
    fr: Le concept de 'vœu de la puissance d'autrui' (他力本願) dans le bouddhisme de la Terre Pure souligne
      la reliance sur la compassion et les vœux du Bouddha Amida pour le salut, plutôt que sur ses propres
      efforts.
    de: Das Konzept des 'Fundamentale Gelübdes der Fremdkraft' (他力本願) im Reinen-Land-Buddhismus betont
      die Abhängigkeit von der Barmherzigkeit und den Gelübden des Buddha Amida für die Erlösung, statt
      von eigenen Anstrengungen.
    it: Il concetto di 'voto fondamentale della forza altrui' (他力本願) nel buddismo della Terra Pura sottolinea
      l'affidamento alla compassione e ai voti del Buddha Amida per la salvezza, piuttosto che ai propri
      sforzi.
    pt: O conceito de 'voto fundamental da força alheia' (他力本願) no budismo da Terra Pura enfatiza a dependência
      da compaixão e dos votos do Buda Amida para a salvação, em vez dos próprios esforços.
    ru: Понятие 'вне-себя-основанного обетования' (他力本願) в буддизме Чистой Земли подчеркивает упование
      на сострадание и обеты Будды Амиды для спасения, а не на собственные усилия.
    ja: 他力本願とは、浄土仏教において、阿弥陀如来の慈悲と本願に救いを依存する概念で、自力ではなく他力による救済を重視します。
    zh: 他力本愿（他力本願）在净土佛教中强调依靠阿弥陀佛的慈悲与誓愿获得救赎，而非自身的努力。
    ar: مفهوم 'القوة الخارجية' (他力本願) في بوذية الأرض الطيبة يؤكد الاعتماد على رحمة ونذور بوذا أميدا للخلاص،
      بدلاً من الجهود الذاتية.
    he: מושג 'הכוח החיצוני' (他力本願) בבודהיזם של ארץ הטוהר מדגיש את התלות בחמלה ובנדרי הבודהה אמידה לישועה,
