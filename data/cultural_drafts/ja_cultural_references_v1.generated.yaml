    a woman to repay his kindness by weaving beautiful cloth. It symbolizes gratitude and the rewards
    of compassion.
  i18n_explanations:
    en: A Japanese folktale where a man saves a wounded crane, which later transforms into a woman to
      repay his kindness by weaving beautiful cloth. It symbolizes gratitude and the rewards of compassion.
    es: Un cuento popular japonés en el que un hombre salva a una grulla herida, que luego se transforma
      en una mujer para pagarle su bondad tejiendo telas hermosas. Simboliza gratitud y las recompensas
      de la compasión.
    fr: Un conte populaire japonais où un homme sauve une grue blessée, qui se transforme ensuite en femme
      pour le remercier en tissant de magnifiques étoffes. Symbolise la gratitude et les récompenses de
      la compassion.
    de: Ein japanisches Volksmärchen, in dem ein Mann einen verletzten Kranich rettet, der sich später
      in eine Frau verwandelt, um seine Güte durch das Weben wunderschöner Stoffe zu vergelten. Symbolisiert
      Dankbarkeit und die Belohnungen der Mitgefühls.
    it: Una fiaba giapponese in cui un uomo salva una gru ferita, che in seguito si trasforma in una donna
      per ripagare la sua gentilezza tessendo tessuti bellissimi. Simboleggia gratitudine e le ricompense
      della compassione.
    pt: Um conto popular japonês em que um homem salva uma garça ferida, que depois se transforma em uma
      mulher para retribuir sua bondade tecendo tecidos lindos. Simboliza gratidão e as recompensas da
      compaixão.
    ru: Японская народная сказка, где мужчина спасает раненого журавля, который позже превращается в женщину,
      чтобы отплатить за его доброту, тку красивую ткань. Символизирует благодарность и вознаграждение
      за сострадание.
    ja: 傷ついた鶴を助けた男が、後に鶴が女に変身して美しい布を織り返礼する日本の昔話。感謝と慈悲の報いを象徴しています。
    zh: 日本民间故事，讲述一名男子救了一只受伤的鹤，后者化身女子以织出美丽布匹回报他的善意。象征感恩与同情的回报。
    ar: حكاية يابانية شعبية حيث ينقذ رجل كركيًا جريحًا، يتحول لاحقًا إلى امرأة لتكافئه على لطفه من خلال
