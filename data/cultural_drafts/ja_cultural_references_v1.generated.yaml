      carapace dure d'une tortue à la valeur de l'âge.
    de: Schätzt Weisheit und Erfahrung höher ein als körperliche Stärke oder Langlebigkeit. Vergleicht
      den harten Panzer einer Schildkröte mit dem Wert des Alters.
