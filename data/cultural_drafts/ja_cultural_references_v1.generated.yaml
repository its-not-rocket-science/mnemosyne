  short_explanation: The cycle of birth and death (生死流転) refers to the Buddhist concept of samsara, where
    beings are trapped in an endless cycle of rebirth, suffering, and impermanence.
  i18n_explanations:
    en: The cycle of birth and death (生死流転) refers to the Buddhist concept of samsara, where beings are
      trapped in an endless cycle of rebirth, suffering, and impermanence.
    es: El ciclo de nacimiento y muerte (生死流転) se refiere al concepto budista del samsara, donde los seres
      están atrapados en un ciclo interminable de renacimiento, sufrimiento e impermanencia.
    fr: Le cycle de naissance et de mort (生死流転) désigne le concept bouddhiste du samsara, où les êtres
      sont piégés dans un cycle sans fin de renaissance, de souffrance et d'impermanence.
    de: Der Kreislauf von Geburt und Tod (生死流転) bezieht sich auf das buddhistische Konzept des Samsara,
      in dem Wesen in einem endlosen Zyklus von Wiedergeburt, Leid und Vergänglichkeit gefangen sind.
    it: Il ciclo di nascita e morte (生死流転) si riferisce al concetto buddista del samsara, in cui gli esseri
      sono intrappolati in un ciclo infinito di rinascita, sofferenza e impermanenza.
    pt: O ciclo de nascimento e morte (生死流転) refere-se ao conceito budista do samsara, no qual os seres
      estão presos em um ciclo interminável de renascimento, sofrimento e impermanência.
    ru: Цикл рождения и смерти (生死流転) относится к буддийскому понятию сансары, в котором существа заперты
      в бесконечном круговороте перерождений, страданий и непостоянства.
    ja: 生死流転とは、仏教の輪廻（サンサーラ）の概念で、生きとし生けるものが永遠の生死の輪と苦しみ、無常を繰り返すことを指します。
    zh: 生死流转（生死流転）指佛教的轮回（samsara）概念，众生被困于无尽的再生、苦难与无常的循环之中。
    ar: دورة الميلاد والموت (生死流転) تشير إلى مفهوم البوذية للكارما (سنسارا)، حيث تقبع الكائنات في دورة
      لا نهاية لها من الولادة والمعاناة وعدم الدوام.
    he: מחזור הלידה והמוות (生死流転) מתייחס למושג הבודהיסטי של סמסרה, בו היצורים לכודים במחזור אין-סופי של
      לידה מחדש, סבל וחוסר קביעות.
