- id: ja_literary_reference_伊勢物語の_みちのくのしのぶもぢずり_2007a6d4
  language: ja
  canonical_reference: 伊勢物語の「みちのくのしのぶもぢずり」
  reference_type: literary_reference
  surface_patterns:
  - みちのくのしのぶもぢずり
  - 陸奥のしのぶもじずり
  - 陸奥の忍ぶもぢずり
  short_explanation: A famous opening poem from *The Tales of Ise* (Ise Monogatari), expressing longing
    for a distant lover. The phrase uses *shinobu mojizuri* (a patterned fabric from Michinoku) as a metaphor
    for the intertwined emotions of love and memory.
  i18n_explanations:
    en: A famous opening poem from *The Tales of Ise* (Ise Monogatari), expressing longing for a distant
      lover. The phrase uses *shinobu mojizuri* (a patterned fabric from Michinoku) as a metaphor for
      the intertwined emotions of love and memory.
    es: Poema inicial famoso del *Cuento de Ise*, que expresa el anhelo por un amante lejano. La frase
      usa *shinobu mojizuri* (un tejido estampado de Michinoku) como metáfora de las emociones entrelazadas
      del amor y la memoria.
    fr: Un poème célèbre du *Conte d'Ise* exprimant la nostalgie d'un amour lointain. La phrase utilise
      *shinobu mojizuri* (un tissu à motifs de Michinoku) comme métaphore des émotions entrelacées de
      l'amour et de la mémoire.
    de: Ein berühmtes Eröffnungsgedicht aus den *Erzählungen von Ise*, das Sehnsucht nach einem fernen
      Geliebten ausdrückt. Der Ausdruck verwendet *shinobu mojizuri* (ein gemustertes Tuch aus Michinoku)
      als Metapher für die verschlungenen Gefühle von Liebe und Erinnerung.
    it: Un famoso poema iniziale de *Le storie di Ise* che esprime nostalgia per un amante lontano. La
      frase usa *shinobu mojizuri* (un tessuto stampato di Michinoku) come metafora dei sentimenti intrecciati
      di amore e memoria.
    pt: Poema inicial famoso de *Os Contos de Ise*, expressando saudade de um amor distante. A frase usa
      *shinobu mojizuri* (um tecido estampado de Michinoku) como metáfora dos sentimentos entrelaçados
      de amor e memória.
    ru: Знаменитое вступительное стихотворение из «Повести о Исэ» (*Исэ моногатари*), выражающее тоску
      по далёкому возлюбленному. Фраза использует *синонобу модзидзури* (узорчатую ткань из Митиноку)
      как метафору переплетённых чувств любви и памяти.
    ja: 伊勢物語の有名な冒頭の和歌で、遠く離れた恋人への想いを表す。この句は陸奥の地の「しのぶもじずり」という模様布を、愛と記憶の絡み合う感情の象徴として用いている。
    zh: 《伊势物语》著名的开篇和歌，表达对远方恋人的思念。此句以陆奥的“忍藻纹印染布”（一种图案织物）为喻，象征爱与记忆交织的情感。
    ar: قصيدة افتتاحية شهيرة من *حكايا إيسي* (إيسي مونوغاتاري) تعبر عن الشوق لحبيب بعيد. تستخدم العبارة
      *شينوبو موجيزوري* (نسيج مزخرف من ميتشينوكو) كاستعارة للمشاعر المتشابكة بين الحب والذاكرة.
    he: שיר פתיחה מפורסם מ*סיפוריו של איסה* (איסה מונogatari), המבטא געגועים לאהוב רחוק. הביטוי משתמש
      ב*שינובו מוג'יזורי* (בד דפוס ממיצ'ינוקו) כמטפורה לרגשות הסבוכים של אהבה וזיכרון.
