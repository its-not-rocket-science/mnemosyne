      distress or effort.
    es: La expresión 'cuatro sufrimientos y ocho sufrimientos' (四苦八苦) describe las diversas dificultades
      y luchas de la vida, basada en las enseñanzas budistas sobre el sufrimiento (dukkha). Se usa comúnmente
      para expresar angustia o esfuerzo profundo.
    fr: L'expression 'quatre souffrances et huit souffrances' (四苦八苦) décrit les diverses épreuves et difficultés
      de la vie, issue des enseignements bouddhistes sur la souffrance (dukkha). Elle est souvent utilisée
      pour exprimer une profonde détresse ou un effort intense.
    de: Der Ausdruck 'vier Leiden und acht Leiden' (四苦八苦) beschreibt die vielfältigen Härten und Kämpfe
      des Lebens, abgeleitet von buddhistischen Lehren über das Leiden (dukkha). Er wird häufig verwendet,
      um tiefe Not oder Anstrengung auszudrücken.
    it: L'espressione 'quattro sofferenze e otto sofferenze' (四苦八苦) descrive le varie difficoltà e lotte
      della vita, derivata dagli insegnamenti buddisti sul dolore (dukkha). Viene comunemente usata per
      esprimere profonda angoscia o sforzo.
    pt: A expressão 'quatro sofrimentos e oito sofrimentos' (四苦八苦) descreve as diversas dificuldades e
      lutas da vida, derivada dos ensinamentos budistas sobre o sofrimento (dukkha). É comumente usada
      para expressar angústia ou esforço profundo.
    ru: Выражение 'четыре страдания и восемь страданий' (四苦八苦) описывает различные трудности и тяготы
      жизни, восходящие к буддийскому учению о страдании (дуккха). Оно часто используется для выражения
      глубокого горя или усилий.
    ja: 四苦八苦とは、人生のさまざまな苦難や葛藤を表す仏教用語で、苦しみ（dukkha）に関する教えに由来します。深い苦悩や努力を表現する際に用いられます。
    zh: 四苦八苦（四苦八苦）指人生的各种苦难与挣扎，源自佛教对苦（dukkha）的教义。常用于表达深切的痛苦或努力。
    ar: تشير عبارة 'أربعة آلام وثمانية آلام' (四苦八苦) إلى مختلف الصعوبات والنضالات في الحياة، المستمدة من
      التعاليم البوذية حول المعاناة (دوكها). تُستخدم غالبًا للتعبير عن ضيق عميق أو جهد.
    he: הביטוי 'ארבע סבלות ושמונה סבלות' (四苦八苦) מתאר את הקשיים והמאבקים השונים בחיים, הנגזרים מהלימוד
      הבודהיסטי על הסבל (דוקהה). משמש לרוב להבעת מצוקה עמוקה או מאמץ.
