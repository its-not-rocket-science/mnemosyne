- id: ja_cultural_reference_南北朝の動乱の足利尊氏_ba7d3673
  language: ja
  canonical_reference: 南北朝の動乱の足利尊氏
  reference_type: cultural_reference
  surface_patterns:
  - 足利尊氏
  - 尊氏
  - 室町幕府初代将軍
  - 南北朝の動乱
  short_explanation: Ashikaga Takauji, founder of the Ashikaga shogunate, shifted allegiance from Emperor
    Go-Daigo to the Northern Court during the Nanboku-chō period (1336–1392). His actions marked the transition
    from imperial to shogunal dominance in medieval Japan.
  i18n_explanations:
    en: Ashikaga Takauji, founder of the Ashikaga shogunate, shifted allegiance from Emperor Go-Daigo
      to the Northern Court during the Nanboku-chō period (1336–1392). His actions marked the transition
      from imperial to shogunal dominance in medieval Japan.
    es: Ashikaga Takauji, fundador del shogunato Ashikaga, cambió su lealtad del emperador Go-Daigo a
      la Corte del Norte durante el período Nanboku-chō (1336–1392). Sus acciones marcaron la transición
      del dominio imperial al poder del shogunato en el Japón medieval.
    fr: Ashikaga Takauji, fondateur du shogunat Ashikaga, changea d'allégeance de l'empereur Go-Daigo
      à la Cour du Nord pendant la période Nanboku-chō (1336–1392). Ses actions marquèrent la transition
      du pouvoir impérial à la domination du shogunat dans le Japon médiéval.
    de: Ashikaga Takauji, Gründer des Ashikaga-Shogunats, wechselte während der Nanboku-chō-Periode (1336–1392)
      die Loyalität vom Kaiser Go-Daigo zum Nordhof. Seine Handlungen markierten den Übergang von kaiserlicher
      zu shogunaler Vorherrschaft im mittelalterlichen Japan.
    it: Ashikaga Takauji, fondatore dello shogunato Ashikaga, passò dalla lealtà verso l'imperatore Go-Daigo
      alla Corte del Nord durante il periodo Nanboku-chō (1336–1392). Le sue azioni segnarono il passaggio
      dal dominio imperiale a quello dello shogunato nel Giappone medievale.
    pt: Ashikaga Takauji, fundador do xogunato Ashikaga, mudou sua lealdade do imperador Go-Daigo para
      a Corte do Norte durante o período Nanboku-chō (1336–1392). Suas ações marcaram a transição do poder
      imperial para a dominação do xogunato no Japão medieval.
    ru: Асикага Такаудзи, основатель сёгуната Асикага, перешёл от верности императору Го-Дайго к Северному
      двору в период Нанбоку-тё (1336–1392). Его действия означили переход от императорской власти к господству
      сёгуната в средневековой Японии.
    ja: 室町幕府を開いた足利尊氏は、南北朝時代（1336–1392）に後醍醐天皇から北朝へと寝返った。その行動は、中世日本における皇権から武家政権への移行を示した。
    zh: 室町幕府的创立者足利尊氏在南北朝时期（1336–1392）背弃后醍醐天皇，转而效忠北朝。他的行动标志着中世纪日本从皇权向幕府统治的转变。
    ar: أشيكاغا تاكاوغي، مؤسس شوغونية أشيكاغا، غير ولائه من الإمبراطور غو-دايغو إلى البلاط الشمالي خلال
      فترة نانبوكو-تشو (1336–1392). أفعاله مثلت انتقال السلطة من الإمبراطور إلى الشوغونية في اليابان الإقطاعية.
    he: אשיקאגה טקאוג'י, מייסד שוגונות אשיקאגה, עבר מנאמנות לקיסר גו-דאיגו אל החצר הצפונית בתקופת נאנבוקו-צ'ו
      (1336–1392). פעולותיו סימנו את המעבר משלטון קיסרי לשלטון השוגונות ביפן של ימי הביניים.
