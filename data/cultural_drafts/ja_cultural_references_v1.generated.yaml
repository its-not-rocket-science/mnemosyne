  - 舌切り雀のお話
  - 舌切り雀の昔話
  - 舌切り雀伝説
  short_explanation: A Japanese folktale about a kind old man who rescues a sparrow with a cut tongue,
    only to be rewarded by the sparrow's family, while his greedy neighbor is punished. It teaches lessons
    about kindness and greed.
  i18n_explanations:
    en: A Japanese folktale about a kind old man who rescues a sparrow with a cut tongue, only to be rewarded
      by the sparrow's family, while his greedy neighbor is punished. It teaches lessons about kindness
      and greed.
    es: Un cuento popular japonés sobre un anciano bondadoso que rescata a un gorrión con la lengua cortada
      y es recompensado por su familia, mientras su vecino avaro es castigado. Enseña lecciones sobre
      la bondad y la avaricia.
    fr: Un conte populaire japonais sur un vieil homme gentil qui sauve un moineau à la langue coupée
      et est récompensé par sa famille, tandis que son voisin avide est puni. Il enseigne des leçons sur
      la gentillesse et la cupidité.
    de: Ein japanisches Volksmärchen über einen gütigen alten Mann, der einen Spatz mit geschnittener
      Zunge rettet und von dessen Familie belohnt wird, während sein gieriger Nachbar bestraft wird. Es
      vermittelt Lehren über Güte und Gier.
    it: Una fiaba giapponese su un anziano gentile che salva un passero con la lingua tagliata e viene
      ricompensato dalla sua famiglia, mentre il vicino avido viene punito. Insegna lezioni sulla gentilezza
      e l'avidità.
    pt: Um conto popular japonês sobre um idoso bondoso que resgata um pardal com a língua cortada e é
      recompensado pela família do pássaro, enquanto seu vizinho ganancioso é punido. Ensina lições sobre
      bondade e ganância.
    ru: Японская народная сказка о добром старике, который спасает воробья с отрезанным языком и получает
      вознаграждение от его семьи, тогда как его жадный сосед наказывается. Учит урокам доброты и жадности.
    ja: 舌を切られた雀を助けた優しい老人に報いる雀の一家と、その隣人の欲深さを罰する日本の昔話。優しさと欲張りについて教えています。
    zh: 日本民间故事，讲述一位好心的老人救了一只舌头被割断的麻雀，并得到麻雀一家的回报，而他贪婪的邻居则受到惩罚。教人善良与贪婪的教训。
    ar: حكاية يابانية شعبية عن رجل عجوز طيب ينقذ عصفورًا مقطوعة لسانه، فيكافئه أهل العصفور بينما يعاقب
      جاره الجشع. تعلم الدروس عن اللطف والجشع.
    he: אגדה יפנית על איש זקן טוב לב שמציל דרור עם לשון חתוכה ומתוגמל על ידי משפחת הדרור, בעוד שכנו החמדן
      נענש. מלמדת לקחים על טוב לב וחמדנות.
