  - 信長の最期
  - 明智光秀の謀反
  - 天正十年六月二日
  short_explanation: The Honnō-ji Incident (1582) refers to the betrayal and death of Oda Nobunaga at
    the hands of his general Akechi Mitsuhide. This event marked the end of Nobunaga's unification efforts
    and is a pivotal moment in Japanese history.
  i18n_explanations:
    en: The Honnō-ji Incident (1582) refers to the betrayal and death of Oda Nobunaga at the hands of
      his general Akechi Mitsuhide. This event marked the end of Nobunaga's unification efforts and is
      a pivotal moment in Japanese history.
    es: El Incidente de Honnō-ji (1582) se refiere a la traición y muerte de Oda Nobunaga a manos de su
      general Akechi Mitsuhide. Este suceso marcó el fin de los esfuerzos de unificación de Nobunaga y
      es un momento crucial en la historia de Japón.
    fr: L'incident de Honnō-ji (1582) désigne la trahison et la mort d'Oda Nobunaga aux mains de son général
      Akechi Mitsuhide. Cet événement marqua la fin des efforts d'unification de Nobunaga et constitue
      un moment charnière de l'histoire japonaise.
    de: Der Honnō-ji-Zwischenfall (1582) bezieht sich auf den Verrat und Tod von Oda Nobunaga durch seinen
      General Akechi Mitsuhide. Dieses Ereignis markierte das Ende von Nobunagas Einigungsbemühungen und
      ist ein zentraler Moment der japanischen Geschichte.
    it: L'incidente di Honnō-ji (1582) si riferisce al tradimento e alla morte di Oda Nobunaga per mano
      del suo generale Akechi Mitsuhide. Questo evento segnò la fine degli sforzi di unificazione di Nobunaga
      ed è un momento cruciale nella storia giapponese.
    pt: O Incidente de Honnō-ji (1582) refere-se à traição e morte de Oda Nobunaga às mãos de seu general
      Akechi Mitsuhide. Este evento marcou o fim dos esforços de unificação de Nobunaga e é um momento
      pivotal na história japonesa.
    ru: Инцидент в Хоннодзи (1582) — это предательство и смерть Оды Нобунаги от руки его генерала Акети
      Мицухидэ. Это событие означило конец попыток Нобунаги объединить Японию и стало поворотным моментом
      в японской истории.
    ja: 本能寺の変（1582年）は、織田信長が家臣の明智光秀に裏切られ自害に追い込まれた事件。この出来事は信長の天下統一事業の終焉を告げ、日本史上の転換点となった。
    zh: 本能寺之变（1582年）指织田信长被其家臣明智光秀背叛并迫其自尽的事件。这一事件标志着信长统一日本事业的终结，成为日本历史的转折点。
    ar: حادثة هونوجي (1582) تشير إلى خيانة وموت أودا نوبوناغا على يد جنراله أكيتشي ميتسوهيدي. هذا الحدث
      أنهى جهود نوبوناغا في توحيد اليابان وأصبح لحظة حاسمة في التاريخ الياباني.
    he: תקרית הונוג'י (1582) מתייחסת לבגידתו ולמותו של אודה נובונאגה בידי גנרלו אקצ'י מיטסוהידה. אירוע
