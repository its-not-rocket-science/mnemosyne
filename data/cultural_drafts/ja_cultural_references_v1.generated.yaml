    nature's cycles.
  i18n_explanations:
    en: A yōsei associated with 'shigure,' a drizzling autumn rain in Japan. It is often depicted as a
      gentle but elusive spirit, symbolizing the melancholic beauty of transient seasons and nature's
      cycles.
    es: Un yōsei asociado con el 'shigure', una llovizna otoñal japonesa. A menudo se representa como
      un espíritu gentil pero esquivo, que simboliza la belleza melancólica de las estaciones transitorias
      y los ciclos de la naturaleza.
    fr: Un yōsei associé au 'shigure', une bruine automnale japonaise. Il est souvent représenté comme
      un esprit doux mais insaisissable, symbolisant la beauté mélancolique des saisons éphémères et les
      cycles de la nature.
    de: Ein Yōsei, der mit 'Shigure' verbunden ist, einem japanischen Nieselregen im Herbst. Er wird oft
