- id: ja_cultural_reference_応仁の乱の室町時代の混乱_bb82ff34
  language: ja
  canonical_reference: 応仁の乱の室町時代の混乱
  reference_type: cultural_reference
  surface_patterns:
  - 応仁の乱
  - 応仁・文明の乱
  - 室町時代の混乱
  - 戦国時代の前夜
  short_explanation: The Ōnin War (1467–1477), a decade-long civil conflict between the Hosokawa and Yamana
    clans, devastated Kyoto and marked the collapse of the Ashikaga shogunate's authority, leading to
    the Sengoku period of warring states.
  i18n_explanations:
    en: The Ōnin War (1467–1477), a decade-long civil conflict between the Hosokawa and Yamana clans,
      devastated Kyoto and marked the collapse of the Ashikaga shogunate's authority, leading to the Sengoku
      period of warring states.
    es: La Guerra de Ōnin (1467–1477), un conflicto civil de una década entre los clanes Hosokawa y Yamana,
      devastó Kioto y marcó el colapso de la autoridad del shogunato Ashikaga, dando inicio al período
      Sengoku de estados en guerra.
    fr: La guerre d'Ōnin (1467–1477), un conflit civil d'une décennie entre les clans Hosokawa et Yamana,
      dévasta Kyōto et marqua l'effondrement de l'autorité du shogunat Ashikaga, menant à la période Sengoku
      des États en guerre.
    de: Der Ōnin-Krieg (1467–1477), ein jahrzehntelanger Bürgerkrieg zwischen den Hosokawa- und Yamana-Clans,
      verwüstete Kyōto und markierte den Zusammenbruch der Autorität des Ashikaga-Shogunats, was zur Sengoku-Zeit
      der streitenden Staaten führte.
    it: La guerra di Ōnin (1467–1477), un conflitto civile decennale tra i clan Hosokawa e Yamana, devastò
      Kyoto e segnò il collasso dell'autorità dello shogunato Ashikaga, portando al periodo Sengoku degli
      stati in guerra.
    pt: A Guerra de Ōnin (1467–1477), um conflito civil de uma década entre os clãs Hosokawa e Yamana,
      devastou Quioto e marcou o colapso da autoridade do xogunato Ashikaga, levando ao período Sengoku
      de estados em guerra.
    ru: Война годов Онин (1467–1477), десятилетний гражданский конфликт между кланами Хосокава и Ямана,
      опустошила Киото и ознаменовала крах власти сёгуната Асикага, что привело к периоду Сэнгоку воюющих
      государств.
    ja: 応仁の乱（1467–1477）は、細川・山名両氏による10年にわたる内戦で、京都を荒廃させ室町幕府の権威を崩壊させた。これにより戦国時代（群雄割拠の時代）へと突入した。
    zh: 应仁之乱（1467–1477）是细川氏与山名氏两大家族间长达十年的内战，摧毁了京都并导致室町幕府权威崩溃，引发了战国时代群雄割据的局面。
    ar: حرب أونين (1467–1477)، صراع أهلي استمر عقدًا بين عشيرتي هوسوكاوا ويامانا، دمر كيوتو وسقط معه سلطة
      شوغونية أشيكاغا، مما أدى إلى فترة سينغوكو من الدول المتحاربة.
    he: מלחמת אונין (1467–1477), עימות אזרחי בן עשור בין משפחות הוסוקאווה וייאמנה, החריבה את קיוטו וסימנה
