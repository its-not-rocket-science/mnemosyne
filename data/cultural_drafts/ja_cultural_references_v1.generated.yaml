- id: ja_cultural_reference_豊臣秀吉の太閤検地_5575395f
  language: ja
  canonical_reference: 豊臣秀吉の太閤検地
  reference_type: cultural_reference
  surface_patterns:
  - 太閤検地
  - 豊臣秀吉の太閤検地
  - 秀吉の太閤検地
  - 検地
  short_explanation: A nationwide land survey conducted by Toyotomi Hideyoshi in the late 16th century
    to standardize tax collection and consolidate power. It established the foundation for the Edo period's
    rice-based taxation system.
  i18n_explanations:
    en: A nationwide land survey conducted by Toyotomi Hideyoshi in the late 16th century to standardize
      tax collection and consolidate power. It established the foundation for the Edo period's rice-based
      taxation system.
    es: Un censo nacional de tierras realizado por Toyotomi Hideyoshi a finales del siglo XVI para estandarizar
      la recaudación de impuestos y consolidar el poder. Sentó las bases del sistema de impuestos basado
      en el arroz del período Edo.
    fr: Un recensement national des terres mené par Toyotomi Hideyoshi à la fin du XVIe siècle pour uniformiser
      la collecte des impôts et consolider le pouvoir. Il posa les bases du système de taxation basé sur
      le riz de l'époque d'Edo.
    de: Eine landesweite Grundstücksvermessung unter Toyotomi Hideyoshi Ende des 16. Jahrhunderts zur
      Vereinheitlichung der Steuererhebung und Machtkonsolidierung. Sie legte den Grundstein für das auf
      Reis basierende Steuersystem der Edo-Zeit.
    it: Una rilevazione nazionale delle terre condotta da Toyotomi Hideyoshi alla fine del XVI secolo
      per standardizzare la tassazione e consolidare il potere. Fondò il sistema fiscale basato sul riso
      del periodo Edo.
    pt: Um levantamento nacional de terras realizado por Toyotomi Hideyoshi no final do século XVI para
      padronizar a cobrança de impostos e consolidar o poder. Estabeleceu as bases do sistema de tributação
      baseado em arroz do período Edo.
    ru: Всеобщая земельная перепись, проведённая Тоётоми Хидэёси в конце XVI века для унификации налогообложения
