    it: Si riferisce a un compito rischioso o impossibile, come provare a mettere un campanello al collo
      di un gatto. Simboleggia la futilità di certe imprese.
    pt: Refere-se a uma tarefa arriscada ou impossível, como tentar colocar um sino no pescoço de um gato.
      Simboliza a futilidade de certos empreendimentos.
    ru: Описывает рискованное или невозможное дело, как попытка надеть колокольчик на кота. Символизирует
      тщетность некоторых начинаний.
