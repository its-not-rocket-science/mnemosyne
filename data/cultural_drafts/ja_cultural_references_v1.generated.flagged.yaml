- id: ja_cultural_reference_源平合戦の義経の弓流し_6aa013db
  language: ja
  canonical_reference: 源平合戦の義経の弓流し
  reference_type: cultural_reference
  surface_patterns:
  - 弓流し
  - 義経の弓流し
  - 源平合戦の弓流し
  short_explanation: A legendary episode from the Genpei War where Minamoto no Yoshitsune, after a victorious
    battle, threw his bow into the sea as a gesture of humility, refusing to take credit for the victory.
    It symbolizes the warrior ethos of modesty and detachment from fame.
  i18n_explanations:
    en: A legendary episode from the Genpei War where Minamoto no Yoshitsune, after a victorious battle,
      threw his bow into the sea as a gesture of humility, refusing to take credit for the victory. It
      symbolizes the warrior ethos of modesty and detachment from fame.
    es: Un episodio legendario de la Guerra Genpei en el que Minamoto no Yoshitsune, tras una batalla
      victoriosa, arrojó su arco al mar como gesto de humildad, rechazando atribuirse el mérito de la
      victoria. Simboliza el ethos guerrero de la modestia y el desapego de la fama.
    fr: Un épisode légendaire de la guerre de Genpei où Minamoto no Yoshitsune, après une bataille victorieuse,
      jeta son arc à la mer en signe d'humilité, refusant de s'attribuer le mérite de la victoire. Cela
      symbolise l'éthique guerrière de la modestie et du détachement de la gloire.
    de: Eine legendäre Episode aus dem Genpei-Krieg, in der Minamoto no Yoshitsune nach einer siegreichen
      Schlacht seinen Bogen ins Meer warf, um Demut zu zeigen und den Ruhm für den Sieg abzulehnen. Es
      symbolisiert die Kriegerethik von Bescheidenheit und Loslösung vom Ruhm.
    it: Un episodio leggendario della guerra Genpei in cui Minamoto no Yoshitsune, dopo una battaglia
      vittoriosa, gettò il suo arco in mare come gesto di umiltà, rifiutando di attribuirsi il merito
      della vittoria. Simboleggia l'etica guerriera della modestia e del distacco dalla fama.
    pt: Um episódio lendário da Guerra Genpei em que Minamoto no Yoshitsune, após uma batalha vitoriosa,
      jogou seu arco no mar como gesto de humildade, recusando-se a tomar crédito pela vitória. Simboliza
      a ética guerreira da modéstia e do desapego da fama.
    ru: Легендарный эпизод войны Гэмпэй, в котором Минамото-но Ёсицунэ после победной битвы бросил свой
      лук в море в знак смирения, отказываясь присваивать себе заслугу победы. Это символизирует воинскую
      этику скромности и отречения от славы.
    ja: 源平合戦の伝説的なエピソードで、源義経が勝利の戦いの後、謙虚の gestureとして弓を海に投げ入れ、勝利の功名を拒んだ。武士の美学である謙遜と名誉への執着のなさを象徴する。
    zh: 源平合战中的传奇片段：源义经在取得胜利后，将自己的弓投入大海，以示谦逊，拒绝为胜利邀功。象征着武士精神中的谦卑与对名利的超脱。
    ar: ' Episode أسطوري من حرب غينبي حيث ألقى ميناموتو نو يوشيتسونه قوسه في البحر بعد معركة انتصارية
      كرمز للتواضع، ورفض أخذ الفضل في النصر. يرمز إلى أخلاق المحارب من التواضع والبعد عن الشهرة.'
    he: אירוע אגדי ממלחמת גֶנְפֵּיי שבו השליך מִינָמוֹטוֹ נוֹ יוֹשִׁיטְסוּנֶה את קשתו לים לאחר ניצחון
      כגesture של ענווה, וסירב לקחת קרדיט על הניצחון. מסמל את האתוס הלוחם של צניעות וניתוק מהתהילה.
  learner_level: B2
  confidence: 0.6
  review_status: draft
