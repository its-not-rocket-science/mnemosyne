- id: ja_cultural_reference_腹癒せ_298d8a24
  language: ja
  canonical_reference: 腹癒せ
  reference_type: cultural_reference
  surface_patterns:
  - 腹癒せ
  - 腹癒せをする
  - 腹癒せに
  - 腹癒せを晴らす
  short_explanation: To take revenge or seek retribution for a personal grievance. It reflects the cultural
    value placed on emotional catharsis and the resolution of personal conflicts, often through direct
    action.
  i18n_explanations:
    en: To take revenge or seek retribution for a personal grievance. It reflects the cultural value placed
      on emotional catharsis and the resolution of personal conflicts, often through direct action.
    es: Tomar venganza o buscar retribución por una ofensa personal. Refleja el valor cultural dado a
      la catarsis emocional y la resolución de conflictos personales, a menudo mediante acción directa.
    fr: Prendre sa revanche ou chercher à se venger d'une offense personnelle. Cela reflète la valeur
      culturelle accordée à la catharsis émotionnelle et à la résolution des conflits personnels, souvent
      par une action directe.
    de: Sich an jemandem rächen oder Vergeltung für ein persönliches Unrecht suchen. Dies spiegelt den
      kulturellen Wert wider, der emotionaler Katharsis und der Lösung persönlicher Konflikte beigemessen
      wird, oft durch direkte Maßnahmen.
    it: Prendere la propria rivincita o cercare di vendicarsi per un'offesa personale. Riflette il valore
      culturale attribuito alla catarsi emotiva e alla risoluzione dei conflitti personali, spesso attraverso
      un'azione diretta.
    pt: Tomar vingança ou buscar retribuição por uma ofensa pessoal. Reflete o valor cultural dado à catarse
      emocional e à resolução de conflitos pessoais, muitas vezes por meio de ação direta.
    ru: Отомстить или добиться возмездия за личную обиду. Отражает культурную ценность эмоциональной разрядки
      и разрешения личных конфликтов, часто через прямые действия.
    ja: 個人的な恨みを晴らすために復讐すること。感情の発散や個人的な対立の解決を重視する文化的価値観を反映し、しばしば直接的な行動を通じて行われる。
    zh: 为个人恩怨进行报复或寻求报应。反映了文化中对情感宣泄和个人冲突解决的重视，通常通过直接行动实现。
    ar: الانتقام أو السعي للقصاص من إساءة شخصية. يعكس القيمة الثقافية الممنوحة للتطهير العاطفي وحل الصراعات
      الشخصية، غالبًا من خلال عمل مباشر.
    he: לקחת נקמה או לחפש צדק על עוול אישי. משקף את הערך התרבותי המוענק לקתרזיס רגשי ולפתרון קונפליקטים
      אישיים, לעיתים קרובות באמצעות פעולה ישירה.
