  short_explanation: A Buddhist concept meaning 'good causes for the next life,' referring to virtuous
    actions (e.g., charity, morality) that influence one's rebirth in a favorable existence.
  i18n_explanations:
    en: A Buddhist concept meaning 'good causes for the next life,' referring to virtuous actions (e.g.,
      charity, morality) that influence one's rebirth in a favorable existence.
    es: Concepto budista que significa 'buenas causas para la próxima vida', refiriéndose a acciones virtuosas
      (como caridad o moralidad) que influyen en un renacimiento favorable.
    fr: Concept bouddhiste désignant les 'bonnes causes pour la prochaine vie', c'est-à-dire les actions
      vertueuses (comme la charité ou la moralité) qui influencent une renaissance favorable.
    de: Ein buddhistischer Begriff für 'gute Ursachen für das nächste Leben', der sich auf tugendhafte
      Handlungen (z. B. Wohltätigkeit, Moral) bezieht, die eine günstige Wiedergeburt beeinflussen.
    it: Concetto buddista che significa 'buone cause per la prossima vita', riferendosi ad azioni virtuose
      (come carità o moralità) che influenzano una rinascita favorevole.
    pt: Conceito budista que significa 'boas causas para a próxima vida', referindo-se a ações virtuosas
      (como caridade ou moralidade) que influenciam um renascimento favorável.
    ru: Буддийское понятие 'добрых причин для следующей жизни', подразумевающее добродетельные поступки
      (например, благотворительность, мораль), влияющие на благоприятное перерождение.
    ja: 来世のための善因を説く仏教の概念。慈善や道徳などの善行が、次世代の良い生まれを左右するという考え。
    zh: 佛教概念，指‘来世的善因’，即善行（如慈善、道德）会影响来世的善报。
    ar: مفهوم بوذي يعني 'الأسباب الجيدة للحياة القادمة'، ويشير إلى الأفعال الفاضلة (مثل الصدقة والأخلاق)
      التي تؤثر على ولادة مواتية في الحياة التالية.
    he: מושג בודהיסטי שפירושו 'גורמי טוב לחיים הבאים', המתייחס למעשים טובים (כגון צדקה או מוסר) המשפיעים
