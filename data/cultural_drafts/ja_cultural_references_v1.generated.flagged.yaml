- id: ja_literary_reference_徒然草の_月は流れて_37f5e149
  language: ja
  canonical_reference: 徒然草の「月は流れて」
  reference_type: literary_reference
  surface_patterns:
  - 月は流れて
  - 月は流るゝ
  - 月は流るるなり
  short_explanation: A passage from 'Tsurezuregusa' describing the moon's reflection on water, symbolizing
    the transient nature of beauty and life. Often cited in discussions of mono no aware.
  i18n_explanations:
    en: A passage from 'Tsurezuregusa' describing the moon's reflection on water, symbolizing the transient
      nature of beauty and life. Often cited in discussions of mono no aware.
    es: Un pasaje del 'Tsurezuregusa' que describe el reflejo de la luna en el agua, simbolizando la naturaleza
      efímera de la belleza y la vida. Citado frecuentemente en discusiones sobre mono no aware.
    fr: Un passage du 'Tsurezuregusa' décrivant le reflet de la lune sur l'eau, symbolisant la nature
      éphémère de la beauté et de la vie. Souvent cité dans les discussions sur le mono no aware.
    de: Ein Abschnitt aus 'Tsurezuregusa', der den Mondreflex auf dem Wasser beschreibt und die Vergänglichkeit
      von Schönheit und Leben symbolisiert. Wird oft in Diskussionen über mono no aware erwähnt.
    it: Un passaggio del 'Tsurezuregusa' che descrive il riflesso della luna sull'acqua, simbolo della
      natura effimera della bellezza e della vita. Spesso citato nelle discussioni sul mono no aware.
    pt: Um trecho do 'Tsurezuregusa' que descreve o reflexo da lua na água, simbolizando a natureza transitória
      da beleza e da vida. Frequentemente citado em discussões sobre mono no aware.
    ru: Отрывок из 'Цуредзурегуса', описывающий отражение луны в воде, символизирующее преходящий характер
      красоты и жизни. Часто цитируется в обсуждениях mono no aware.
    ja: 吉田兼好的「徒然草」の一節。水面に映る月の描写が、美と人生の儚さを象徴し、物の哀れの議論でしばしば引用される。
    zh: 《徒然草》中描写月亮倒映水面的段落，象征美与生命的短暂，常在物哀的讨论中被引用。
    ar: مقطع من «تسوريزورغوسا» يصف انعكاس القمر على الماء، يرمز إلى الطبيعة العابرة للجمال والحياة. غالبًا
      ما يُذكر في مناقشات حول «مونو نو aware».
    he: קטע מ'צורזורגסה' המתאר את השתקפות הירח במים, המסמל את ארעיות היופי והחיים. לעיתים קרובות מצוטט
      בדיונים על 'מונו נו aware'.
