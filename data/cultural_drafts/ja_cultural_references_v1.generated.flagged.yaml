- id: ja_classical_or_scriptural_allusion_六根清浄_c05020ad
  language: ja
  canonical_reference: 六根清浄
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 六根清浄
  - 六根
  - 清浄
  short_explanation: A Buddhist concept referring to the purification of the six senses (sight, hearing,
    smell, taste, touch, and mind) to achieve enlightenment. Often used metaphorically for spiritual clarity.
  i18n_explanations:
    en: A Buddhist concept referring to the purification of the six senses (sight, hearing, smell, taste,
      touch, and mind) to achieve enlightenment. Often used metaphorically for spiritual clarity.
    es: Un concepto budista que se refiere a la purificación de los seis sentidos (vista, oído, olfato,
      gusto, tacto y mente) para alcanzar la iluminación. Se usa a menudo metafóricamente para la claridad
      espiritual.
    fr: Un concept bouddhiste désignant la purification des six sens (vue, ouïe, odorat, goût, toucher
      et esprit) pour atteindre l'éveil. Souvent utilisé métaphoriquement pour évoquer la clarté spirituelle.
    de: Ein buddhistisches Konzept, das die Reinigung der sechs Sinne (Sehen, Hören, Riechen, Schmecken,
      Fühlen und Denken) zur Erlangung der Erleuchtung bezeichnet. Wird oft metaphorisch für geistige
      Klarheit verwendet.
    it: Un concetto buddista che si riferisce alla purificazione dei sei sensi (vista, udito, olfatto,
      gusto, tatto e mente) per raggiungere l'illuminazione. Spesso usato metaforicamente per indicare
      la chiarezza spirituale.
    pt: Um conceito budista que se refere à purificação dos seis sentidos (visão, audição, olfato, paladar,
      tato e mente) para alcançar a iluminação. Frequentemente usado metaforicamente para clareza espiritual.
    ru: Буддийское понятие, означающее очищение шести чувств (зрение, слух, обоняние, вкус, осязание и
      ум) для достижения просветления. Часто используется метафорически для обозначения духовной ясности.
    ja: 六根清浄とは、仏教で六根（眼・耳・鼻・舌・身・意）を浄化し、悟りに至る概念。しばしば精神的な明瞭さを表す比喩として用いられる。
    zh: 六根清净是佛教中指通过净化六根（眼、耳、鼻、舌、身、意）以达到觉悟的概念。常被用作精神清明的比喻。
    ar: مفهوم بوذي يشير إلى تطهير الحواس الستة (البصر، السمع، الشم، التذوق، اللمس، والعقل) لتحقيق التنوير.
      غالبًا ما يُستخدم مجازيًا للدلالة على الوضوح الروحي.
    he: מושג בודהיסטי המתייחס לטיהור שש החושים (ראייה, שמיעה, ריח, טעם, מגע ומחשבה) להשגת הארה. לעיתים
      קרובות משמש כמטפורה לטוהר רוחני.
