- id: ja_classical_or_scriptural_allusion_因果の縁_ba057d44
  language: ja
  canonical_reference: 因果の縁
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 因果の縁
  - 因果縁
  - 因果の縁起
  - 縁起因果
  short_explanation: A Buddhist term referring to the interconnectedness of cause (因) and condition (縁)
    that determines existence. It underpins the concept of dependent origination, central to understanding
    karma and rebirth.
  i18n_explanations:
    en: A Buddhist term referring to the interconnectedness of cause (因) and condition (縁) that determines
      existence. It underpins the concept of dependent origination, central to understanding karma and
      rebirth.
    es: Un término budista que se refiere a la interconexión entre causa (因) y condición (縁) que determina
      la existencia. Es la base del concepto de origen dependiente, esencial para entender el karma y
      el renacimiento.
    fr: Un terme bouddhiste désignant l'interdépendance entre la cause (因) et la condition (縁) qui détermine
      l'existence. Il sous-tend le concept d'origine dépendante, essentiel pour comprendre le karma et
      la renaissance.
    de: Ein buddhistischer Begriff, der sich auf die Wechselwirkung von Ursache (因) und Bedingung (縁)
      bezieht, die das Dasein bestimmt. Er bildet die Grundlage für das Konzept des bedingten Entstehens,
      das für das Verständnis von Karma und Wiedergeburt zentral ist.
    it: Un termine buddista che si riferisce all'interconnessione tra causa (因) e condizione (縁) che determina
      l'esistenza. È alla base del concetto di origine dipendente, fondamentale per comprendere il karma
      e la rinascita.
    pt: Um termo budista que se refere à interconexão entre causa (因) e condição (縁) que determina a existência.
      É a base do conceito de origem dependente, central para entender o carma e o renascimento.
    ru: Буддийский термин, обозначающий взаимосвязь причины (因) и условия (縁), определяющих существование.
      Он лежит в основе концепции зависимого происхождения, ключевой для понимания кармы и перерождения.
    ja: 因果の縁とは、存在を決定する原因（因）と条件（縁）の相互関係を指す仏教用語。縁起の概念の基盤であり、業と輪廻を理解する上で中心的な役割を果たす。
    zh: 因果之缘是佛教术语，指决定存在的原因（因）与条件（缘）之间的相互关联。它构成了缘起概念的基础，是理解业与轮回的核心。
    ar: مصطلح بوذي يشير إلى الترابط بين السبب (因) والشرط (縁) الذي يحدد الوجود. يشكل أساس مفهوم النشأة
      المعتمدة، وهو أساسي لفهم الكarma وإعادة الميلاد.
    he: מונח בודהיסטי המתייחס לקשר שבין סיבה (因) לתנאי (縁) הקובעים את הקיום. מהווה בסיס לתפיסת התלות בהתהוות,
      המרכזית להבנת הקarma ולידה מחדש.
