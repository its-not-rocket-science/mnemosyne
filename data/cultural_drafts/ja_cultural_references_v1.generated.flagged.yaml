  short_explanation: A yōsei associated with 'shigure,' a drizzling autumn rain in Japan. It is often
    depicted as a gentle but elusive spirit, symbolizing the melancholic beauty of transient seasons and
    nature's cycles.
  i18n_explanations:
    en: A yōsei associated with 'shigure,' a drizzling autumn rain in Japan. It is often depicted as a
      gentle but elusive spirit, symbolizing the melancholic beauty of transient seasons and nature's
      cycles.
    es: Un yōsei asociado con el 'shigure', una llovizna otoñal japonesa. A menudo se representa como
      un espíritu gentil pero esquivo, que simboliza la belleza melancólica de las estaciones transitorias
      y los ciclos de la naturaleza.
    fr: Un yōsei associé au 'shigure', une bruine automnale japonaise. Il est souvent représenté comme
      un esprit doux mais insaisissable, symbolisant la beauté mélancolique des saisons éphémères et les
      cycles de la nature.
    de: Ein Yōsei, der mit 'Shigure' verbunden ist, einem japanischen Nieselregen im Herbst. Er wird oft
      als sanfter, aber schwer fassbarer Geist dargestellt, der die melancholische Schönheit vergänglicher
      Jahreszeiten und die Zyklen der Natur symbolisiert.
    it: Uno yōsei associato allo 'shigure', una pioggerella autunnale giapponese. È spesso raffigurato
      come uno spirito gentile ma sfuggente, che simboleggia la bellezza malinconica delle stagioni effimere
      e i cicli della natura.
    pt: Um yōsei associado ao 'shigure', uma garoa outonal japonesa. É frequentemente retratado como um
      espírito gentil, mas elusivo, que simboliza a beleza melancólica das estações transitórias e os
      ciclos da natureza.
    ru: Ёсэй, связанный с 'сигурэ' — японским осенним моросящим дождем. Часто изображается как нежный,
      но неуловимый дух, символизирующий меланхоличную красоту преходящих сезонов и природных циклов.
    ja: 時雨（しぐれ）と呼ばれる日本の秋の細かな雨に関連する妖精。優しいが elusive な存在として描かれ、移ろいやすい季節や自然の循環の哀愁ある美しさを象徴する。
    zh: 与日本秋季细雨‘时雨’（shigure）相关的妖精。常被描绘为温柔却难以捉摸的精灵，象征着短暂季节与自然轮回的忧郁之美。
    ar: كائن روحي مرتبط بـ'شigure'، وهو رذاذ خريف ياباني. غالبًا ما يُصوَّر كروح لطيفة لكنها صعبة المنال،
      ترمز إلى الجمال الحزين للمواسم العابرة ودورات الطبيعة.
    he: רוח יפנית הקשורה ל'שיגורה' (גשם קל אוטumnלי יפני). לעיתים קרובות מוצגת כרוח עדינה אך חמקמקה, המסמלת
