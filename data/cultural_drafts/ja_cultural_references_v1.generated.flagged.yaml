- id: ja_literary_reference_浦島太郎_うらしまたろう_22b6ab55
  language: ja
  canonical_reference: 浦島太郎（うらしまたろう）
  reference_type: literary_reference
  surface_patterns:
  - 浦島太郎
  - 浦島
  - 浦島太郎の物語
  - うらしま
  short_explanation: A folktale about a fisherman who visits an underwater dragon palace, returns home
    centuries later, and opens a mysterious box given to him, turning into an old man. Symbolizes the
    consequences of curiosity and the passage of time.
  i18n_explanations:
    en: A folktale about a fisherman who visits an underwater dragon palace, returns home centuries later,
      and opens a mysterious box given to him, turning into an old man. Symbolizes the consequences of
      curiosity and the passage of time.
    es: Un cuento popular sobre un pescador que visita un palacio submarino de un dragón, regresa a casa
      siglos después y abre una caja misteriosa que le habían dado, convirtiéndose en un anciano. Simboliza
      las consecuencias de la curiosidad y el paso del tiempo.
    fr: Un conte populaire sur un pêcheur qui visite un palais sous-marin d'un dragon, revient chez lui
      des siècles plus tard et ouvre une boîte mystérieuse qu'on lui avait donnée, se transformant en
      un vieil homme. Symbolise les conséquences de la curiosité et le passage du temps.
    de: Ein Volksmärchen über einen Fischer, der einen unterwasser-Drachenpalast besucht, Jahrhunderte
      später nach Hause zurückkehrt und eine geheimnisvolle Schachtel öffnet, die ihm gegeben wurde, wodurch
      er zu einem alten Mann wird. Symbolisiert die Folgen von Neugier und den Lauf der Zeit.
    it: Una fiaba popolare su un pescatore che visita un palazzo sottomarino di un drago, torna a casa
      secoli dopo e apre una misteriosa scatola datagli, trasformandosi in un vecchio. Simboleggia le
      conseguenze della curiosità e il passare del tempo.
    pt: Um conto popular sobre um pescador que visita um palácio submarino de um dragão, retorna para
      casa séculos depois e abre uma caixa misteriosa que lhe foi dada, transformando-se em um velho.
      Simboliza as consequências da curiosidade e a passagem do tempo.
    ru: Народная сказка о рыбаке, который посетил подводный дворец дракона, вернулся домой спустя века
      и открыл таинственную коробку, данную ему, превратившись в старика. Символизирует последствия любопытства
      и течение времени.
    ja: 浦島太郎は、漁師が竜宮城に行き、数世紀後に帰宅して贈られた不思議な箱を開け、老人に変わる昔話。好奇心と時の流れの結果を象徴します。
    zh: 浦岛太郎是一个渔夫访问龙宫后，数百年后回家打开神秘盒子变成老人的民间故事。象征着好奇心的后果和时间的流逝。
    ar: حكاية شعبية عن صياد يزور قصر تنين تحت الماء، يعود إلى منزله بعد قرون ويفتح صندوقًا غامضًا أعطوه
      إياه، فيتحول إلى شيخ. ترمز إلى عواقب الفضول ومرور الزمن.
    he: אגדה עממית על דייג שמבקר בארמון תת-ימי של דרקון, חוזר לביתו מאות שנים לאחר מכן, פותח תיבה מסתורית
      שניתנה לו והופך לזקן. מסמלת את תוצאות הסקרנות וחלוף הזמן.
