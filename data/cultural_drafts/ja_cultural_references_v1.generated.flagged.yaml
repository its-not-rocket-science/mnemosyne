    en: Refers to a risky or impossible task, as trying to put a bell on a cat. Symbolizes the futility
      of certain endeavors.
    es: Se refiere a una tarea arriesgada o imposible, como intentar ponerle un cascabel a un gato. Simboliza
      la futilidad de ciertos empeños.
    fr: Fait référence à une tâche risquée ou impossible, comme essayer de mettre une clochette à un chat.
