- id: ja_literary_reference_牛若丸と弁慶_うしわかまるとべんけい_47ccd5ae
  language: ja
  canonical_reference: 牛若丸と弁慶（うしわかまるとべんけい）
  reference_type: literary_reference
  surface_patterns:
  - 牛若丸と弁慶
  - 牛若丸
  - 弁慶
  - 五条大橋の決闘
  - 武蔵坊弁慶
  short_explanation: A legendary meeting where the young warrior Ushiwaka (later Minamoto no Yoshitsune)
    defeats the warrior monk Benkei on the Gojo Bridge. Symbolizes fate, loyalty, and the rise of a legendary
    hero.
  i18n_explanations:
    en: A legendary meeting where the young warrior Ushiwaka (later Minamoto no Yoshitsune) defeats the
      warrior monk Benkei on the Gojo Bridge. Symbolizes fate, loyalty, and the rise of a legendary hero.
    es: Un encuentro legendario donde el joven guerrero Ushiwaka (más tarde Minamoto no Yoshitsune) derrota
      al monje guerrero Benkei en el puente Gojo. Simboliza el destino, la lealtad y el surgimiento de
      un héroe legendario.
    fr: Une rencontre légendaire où le jeune guerrier Ushiwaka (plus tard Minamoto no Yoshitsune) vainc
      le moine guerrier Benkei sur le pont Gojo. Symbolise le destin, la loyauté et l'ascension d'un héros
      légendaire.
    de: Eine legendäre Begegnung, bei der der junge Krieger Ushiwaka (später Minamoto no Yoshitsune) den
      Krieger-Mönch Benkei auf der Gojo-Brücke besiegt. Symbolisiert Schicksal, Loyalität und den Aufstieg
      eines legendären Helden.
    it: Un incontro leggendario in cui il giovane guerriero Ushiwaka (in seguito Minamoto no Yoshitsune)
      sconfigge il monaco guerriero Benkei sul ponte Gojo. Simboleggia il destino, la lealtà e l'ascesa
      di un eroe leggendario.
    pt: Um encontro lendário em que o jovem guerreiro Ushiwaka (mais tarde Minamoto no Yoshitsune) derrota
      o monge guerreiro Benkei na ponte Gojo. Simboliza o destino, a lealdade e o surgimento de um herói
      lendário.
    ru: Легендарная встреча, в которой молодой воин Усивака (позже Минамото-но Ёсицунэ) побеждает воина-монаха
      Бэнкэя на мосту Годзё. Символизирует судьбу, преданность и восхождение легендарного героя.
    ja: 牛若丸と弁慶は、若き武将牛若丸（後の源義経）が五条橋で僧兵弁慶を打ち破る伝説的な出会い。運命、忠誠、英雄の誕生を象徴します。
    zh: 牛若丸与弁慶的传说是年轻武士牛若丸（后为源义经）在五条桥上击败僧兵弁慶。象征着命运、忠诚与传奇英雄的崛起。
    ar: لقاء أسطوري حيث ينتصر الشاب المحارب أوشيواكا (لاحقًا ميناموتو نو يوشيتسونه) على الراهب المحارب
