  short_explanation: Refers to the National Assembly (HaKnesset HaLeumi) held in Jerusalem, often associated
    with the establishment of the State of Israel in 1948 or other significant national gatherings.
  i18n_explanations:
    en: Refers to the National Assembly (HaKnesset HaLeumi) held in Jerusalem, often associated with the
      establishment of the State of Israel in 1948 or other significant national gatherings.
    es: Se refiere a la Asamblea Nacional (HaKnesset HaLeumi) celebrada en Jerusalén, a menudo asociada
      con la creación del Estado de Israel en 1948 u otras reuniones nacionales significativas.
    fr: Fait référence à l'Assemblée nationale (HaKnesset HaLeumi) tenue à Jérusalem, souvent associée
      à la création de l'État d'Israël en 1948 ou à d'autres rassemblements nationaux importants.
    de: Bezieht sich auf die in Jerusalem abgehaltene Nationalversammlung (HaKnesset HaLeumi), die oft
      mit der Gründung des Staates Israel 1948 oder anderen bedeutenden nationalen Versammlungen in Verbindung
      gebracht wird.
    it: Si riferisce all'Assemblea Nazionale (HaKnesset HaLeumi) tenutasi a Gerusalemme, spesso associata
      alla fondazione dello Stato di Israele nel 1948 o ad altre importanti riunioni nazionali.
    pt: Refere-se à Assembleia Nacional (HaKnesset HaLeumi) realizada em Jerusalém, frequentemente associada
      à criação do Estado de Israel em 1948 ou a outras reuniões nacionais significativas.
    ru: Относится к Национальному собранию (Ха-Кнессет ха-Леуми), проходившему в Иерусалиме, которое часто
      связывают с созданием Государства Израиль в 1948 году или другими значимыми национальными собраниями.
    ja: これは、エルサレムで開催された国民議会（ハクネセット・ハレウミ）を指し、しばしば1948年のイスラエル建国やその他の重要な国家的集会と関連付けられる。
    zh: 指在耶路撒冷召开的国民议会（哈克内塞特·哈勒乌米），通常与1948年以色列建国或其他重要的全国性集会相关。
    ar: يشير إلى الجمعية الوطنية (الكنيست الوطني) التي عقدت في القدس، وغالباً ما ترتبط بتأسيس دولة إسرائيل
      عام 1948 أو غيرها من التجمعات الوطنية الهامة.
    he: מתייחס לכינוס הלאומי (הכנסת הלאומית) שהתכנס בירושלים, לעיתים קרובות קשור להקמת המדינה ב-1948 או
      לאירועים לאומיים משמעותיים אחרים.
