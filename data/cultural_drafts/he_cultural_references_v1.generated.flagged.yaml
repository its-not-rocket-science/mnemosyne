    providence.
  i18n_explanations:
    en: A midrashic statement attributed to God, emphasizing that the Jewish people are only sustained
      through the study of Torah. It underscores the centrality of Torah in Jewish life and divine providence.
    es: Una declaración midráshica atribuida a Dios que enfatiza que el pueblo judío solo subsiste mediante
      el estudio de la Torá. Subraya la centralidad de la Torá en la vida judía y la providencia divina.
    fr: Une déclaration midrashique attribuée à Dieu, soulignant que le peuple juif ne subsiste que par
      l'étude de la Torah. Elle met en avant le rôle central de la Torah dans la vie juive et la providence
      divine.
    de: Eine midraschische Aussage, die Gott zugeschrieben wird und betont, dass das jüdische Volk nur
      durch das Studium der Tora besteht. Sie unterstreicht die zentrale Rolle der Tora im jüdischen Leben
      und die göttliche Vorsehung.
    it: Un'affermazione midrashica attribuita a Dio che sottolinea come il popolo ebraico esista solo
      grazie allo studio della Torah. Evidenzia il ruolo centrale della Torah nella vita ebraica e nella
      provvidenza divina.
    pt: Uma declaração midráshica atribuída a Deus que enfatiza que o povo judeu só subsiste por meio
      do estudo da Torá. Ressalta a centralidade da Torá na vida judaica e na providência divina.
    ru: Мидрашическое изречение, приписываемое Богу, подчеркивающее, что еврейский народ существует только
      благодаря изучению Торы. Подчеркивает центральную роль Торы в еврейской жизни и божественное провидение.
    ja: 神に帰せられるミドラーシュの言葉で、ユダヤの民がトーラーの学びによってのみ存続することを強調しています。ユダヤの生活と神の摂理におけるトーラーの重要性を示しています。
    zh: 一则被归于上帝的米德拉什箴言，强调犹太人民唯有通过研习《托拉》才能得以延续。凸显了《托拉》在犹太生活和神圣天意中的核心地位。
    ar: قول مِدْراشي يُنسب إلى الله، يؤكد أن الشعب اليهودي لا يستمر إلا من خلال دراسة التوراة. يبرز الدور
      المركزي للتوراة في الحياة اليهودية وفي التدبير الإلهي.
    he: אמרה מדרשית המיוחסת לאל, המדגישה כי עם ישראל מתקיים רק באמצעות לימוד התורה. מדגישה את מרכזיותה
