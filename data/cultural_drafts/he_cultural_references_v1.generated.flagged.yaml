  short_explanation: A proverb advising one to consider both sides of an issue or to hold onto both ends
    of a thread (metaphorically, to maintain balance or perspective). It reflects a traditional Hebrew
    wisdom saying.
  i18n_explanations:
    en: A proverb advising one to consider both sides of an issue or to hold onto both ends of a thread
      (metaphorically, to maintain balance or perspective). It reflects a traditional Hebrew wisdom saying.
    es: Un proverbio que aconseja considerar ambos lados de un asunto o mantener ambas puntas de un hilo
      (metafóricamente, para mantener equilibrio o perspectiva). Refleja un dicho tradicional de sabiduría
      hebrea.
    fr: Un proverbe conseillant de considérer les deux côtés d'une question ou de tenir les deux extrémités
      d'un fil (métaphoriquement, pour garder l'équilibre ou la perspective). Reflète une sagesse traditionnelle
      hébraïque.
    de: Ein Sprichwort, das rät, beide Seiten einer Angelegenheit zu bedenken oder beide Enden eines Fadens
      festzuhalten (metaphorisch, um Balance oder Perspektive zu wahren). Entspringt einer traditionellen
      hebräischen Weisheitslehre.
    it: Un proverbio che consiglia di considerare entrambi i lati di una questione o di tenere entrambe
      le estremità di un filo (metaforicamente, per mantenere equilibrio o prospettiva). Riflette un antico
      detto di saggezza ebraica.
    pt: Um provérbio que aconselha a considerar os dois lados de uma questão ou a segurar as duas pontas
      de um fio (metaforicamente, para manter equilíbrio ou perspectiva). Reflete um dito tradicional
      de sabedoria hebraica.
    ru: Поговорка, советующая учитывать обе стороны вопроса или держаться за оба конца нити (метафорически,
      чтобы сохранять равновесие или перспективу). Отражает традиционное еврейское мудрое изречение.
    ja: 物事の両面を考慮するか、あるいは糸の両端を保持する（比喩的に、バランスや視点を維持するため）ことを勧めることわざ。伝統的なヘブライの知恵のことばを反映している。
    zh: 一句谚语，建议考虑问题的两面或把握事情的两端（比喻性地，保持平衡或视角）。反映了传统希伯来智慧箴言。
    ar: مثل يحث على النظر في جانبي القضية أو الإمساك بطرفَي الخيط (مجازيًا، للحفاظ على التوازن أو المنظور).
      يعكس قولًا تقليديًا من الحكمة العبرية.
    he: פתגם הממליץ לשקול את שני צדדי העניין או להחזיק בשני קצות החוט (מטפורית, לשמור על איזון או פרספקטיבה).
