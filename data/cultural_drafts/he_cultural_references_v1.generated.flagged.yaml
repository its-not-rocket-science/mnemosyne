  language: he
  canonical_reference: וְהָיָה כִּי תָבוֹא אֶל הָאָרֶץ וְיָצָאתָ לַמִּלְחָמָה
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - וְהָיָה כִּי תָבוֹא אֶל הָאָרֶץ וְיָצָאתָ לַמִּלְחָמָה
  - וְהָיָה כִּי תָבֹא אֶל הָאָרֶץ וְיָצָאתָ לַמִּלְחָמָה
  short_explanation: A biblical phrase from Deuteronomy, referring to the Israelites' obligation to wage
    war upon entering the Promised Land. Symbolizes the moral and religious duty to defend the land and
    its values.
  i18n_explanations:
    en: A biblical phrase from Deuteronomy, referring to the Israelites' obligation to wage war upon entering
      the Promised Land. Symbolizes the moral and religious duty to defend the land and its values.
    es: Frase bíblica de Deuteronomio que alude a la obligación de los israelitas de guerrear al entrar
      en la Tierra Prometida. Simboliza el deber moral y religioso de defender la tierra y sus valores.
    fr: Une phrase biblique du Deutéronome évoquant l'obligation pour les Israélites de faire la guerre
      en entrant en Terre Promise. Symbolise le devoir moral et religieux de défendre le pays et ses valeurs.
    de: Ein biblischer Vers aus Deuteronomium, der die Verpflichtung der Israeliten beschreibt, in das
      Gelobte Land einzumarschieren und Krieg zu führen. Symbolisiert die moralische und religiöse Pflicht,
      das Land und seine Werte zu verteidigen.
    it: Un versetto biblico del Deuteronomio che si riferisce all'obbligo degli Israeliti di combattere
      entrando nella Terra Promessa. Simboleggia il dovere morale e religioso di difendere la terra e
      i suoi valori.
    pt: Uma passagem bíblica de Deuteronômio que se refere à obrigação dos israelitas de guerrear ao entrar
      na Terra Prometida. Simboliza o dever moral e religioso de defender a terra e seus valores.
    ru: Библейский стих из Второзакония, описывающий обязанность израильтян воевать при входе в Землю
      Обетованную. Символизирует моральный и религиозный долг защищать землю и её ценности.
    ja: 申命記の一節で、イスラエル人が約束の地に入った際に戦う義務を示す。神の地とその価値を守る道徳的・宗教的義務を象徴する。
    zh: 《申命记》中的一节经文，指以色列人进入应许之地时必须作战。象征着捍卫这片土地及其价值观的道德与宗教义务。
    ar: آية من سفر التثنية تتحدث عن واجب بني إسرائيل القتال عند دخولهم الأرض المقدسة. ترمز إلى الواجب
      الأخلاقي والديني للدفاع عن الأرض وقيمها.
    he: פסוק מקראי מספר דברים המתייחס לחובת בני ישראל להילחם בכניסתם לארץ המובטחת. מסמל את החובה המוסרית
      והדתית להגן על הארץ וערכיה.
