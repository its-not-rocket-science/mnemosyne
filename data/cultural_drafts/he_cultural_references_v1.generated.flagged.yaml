- id: he_proverb_tradition_א_ין_י_פ_ה_מ_ן_ה_מ_ש_פ_ט_636dbd72
  language: he
  canonical_reference: אֵין יָפֶה מִן הַמִּשְׁפָּט
  reference_type: proverb_tradition
  surface_patterns:
  - אֵין יָפֶה מִן הַמִּשְׁפָּט
  - אֵין יָפֶה כַּמִּשְׁפָּט
  - אֵין יָפֶה מִן הַצֶּדֶק
  short_explanation: A proverb asserting that nothing is as beautiful as justice. It reflects the high
    value placed on fairness and righteousness in Jewish ethics and legal tradition.
  i18n_explanations:
    en: A proverb asserting that nothing is as beautiful as justice. It reflects the high value placed
      on fairness and righteousness in Jewish ethics and legal tradition.
    es: Un proverbio que afirma que nada es tan hermoso como la justicia. Refleja el alto valor que se
      otorga a la equidad y la rectitud en la ética y tradición legal judía.
    fr: Un proverbe affirmant que rien n'est aussi beau que la justice. Il reflète la haute valeur accordée
      à l'équité et à la droiture dans l'éthique et la tradition juridique juive.
    de: Ein Sprichwort, das behauptet, dass nichts so schön ist wie Gerechtigkeit. Es spiegelt den hohen
      Stellenwert wider, den Fairness und Rechtschaffenheit in der jüdischen Ethik und Rechtstradition
      genießen.
    it: Un proverbio che afferma che nulla è bello come la giustizia. Riflette l'alto valore attribuito
      all'equità e alla rettitudine nell'etica e nella tradizione giuridica ebraica.
    pt: Um provérbio que afirma que nada é tão belo quanto a justiça. Reflete o alto valor atribuído à
      equidade e à retidão na ética e tradição legal judaica.
    ru: Пословица, утверждающая, что ничто не прекраснее справедливости. Она отражает высокую ценность,
      придаваемую честности и праведности в еврейской этике и правовой традиции.
    ja: 正義ほど美しいものはないとする格言。ユダヤの倫理と法的伝統における公平性と正義の高い価値を反映しています。
    zh: 一句谚语，称没有什么比正义更美。它反映了犹太伦理和法律传统中对公平与正义的高度重视。
    ar: مثل يقول بأن لا شيء أجمل من العدل. يعكس القيمة العالية الممنوحة للإنصاف والاستقامة في الأخلاق
      والتقاليد القانونية اليهودية.
    he: פתגם הטוען כי אין דבר יפה כמו הצדק. משקף את הערך הרב המוענק ליושרה וצדקנות במסורת האתיקה והמשפט
      היהודית.
