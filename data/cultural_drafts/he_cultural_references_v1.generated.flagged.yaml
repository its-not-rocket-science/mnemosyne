    ja: 「道すがら」や「この道の過程で」を意味する表現で、現代ヘブライ語文学で旅や過程を描写する際に用いられ、反省的または物語的なニュアンスを持つ。
    zh: 一个短语，意为“沿途”或“在这个过程中”，常用于现代希伯来文学中描述旅程或过程，带有反思或叙事的语气。
