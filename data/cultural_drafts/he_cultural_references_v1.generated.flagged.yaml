  short_explanation: A phrase from modern Hebrew literature, often used to evoke nostalgia or longing
    for a lost past. It originates from a poem by Natan Alterman, symbolizing the disappearance of traditional
    life.
  i18n_explanations:
    en: A phrase from modern Hebrew literature, often used to evoke nostalgia or longing for a lost past.
      It originates from a poem by Natan Alterman, symbolizing the disappearance of traditional life.
    es: Una expresión de la literatura hebrea moderna, usada para evocar nostalgia o anhelo por un pasado
      perdido. Proviene de un poema de Natan Alterman y simboliza la desaparición de la vida tradicional.
    fr: Une expression de la littérature hébraïque moderne, souvent utilisée pour évoquer la nostalgie
      ou l'aspiration à un passé perdu. Elle provient d'un poème de Natan Alterman et symbolise la disparition
      de la vie traditionnelle.
    de: Ein Ausdruck der modernen hebräischen Literatur, der oft verwendet wird, um Nostalgie oder Sehnsucht
      nach einer verlorenen Vergangenheit zu wecken. Er stammt aus einem Gedicht von Natan Alterman und
      symbolisiert das Verschwinden des traditionellen Lebens.
    it: Un'espressione della letteratura ebraica moderna, spesso usata per evocare nostalgia o desiderio
      per un passato perduto. Proviene da una poesia di Natan Alterman e simboleggia la scomparsa della
      vita tradizionale.
    pt: Uma expressão da literatura hebraica moderna, frequentemente usada para evocar nostalgia ou saudade
      de um passado perdido. Origina-se de um poema de Natan Alterman e simboliza o desaparecimento da
      vida tradicional.
    ru: Выражение из современной еврейской литературы, часто используемое для выражения ностальгии или
      тоски по утраченному прошлому. Впервые встречается в стихотворении Натана Альтермана и символизирует
      исчезновение традиционной жизни.
    ja: 近代ヘブライ文学の表現で、失われた過去への郷愁や切望を喚起するのによく使われます。ナタン・アルテルマンの詩に由来し、伝統的な生活の消滅を象徴しています。
    zh: 现代希伯来文学中的一个短语，常用于唤起对失去过去的怀念或渴望。源自纳坦·阿尔特曼的诗歌，象征着传统生活的消逝。
    ar: تعبير من الأدب العبري الحديث، يُستخدم غالبًا لاستحضار الحنين أو الشوق إلى ماضٍ ضائع. ينحدر من
      قصيدة لناتان آلترمان ويرمز إلى زوال الحياة التقليدية.
    he: ביטוי מן הספרות העברית המודרנית, הנעשה שימושי לעורר געגועים או כיסופים לעבר שאבד. מקורו בשירו
      של נתן אלתרמן, המסמל את היעלמותה של החיים המסורתיים.
