    zh: 《箴言》30:4的一句话，描述神能提起海的深处，象征神的全能和对自然的掌控。常在神学和哲学语境中被引用。
    ar: عبارة من الأمثال (30:4) تصف قدرة الله على رفع أعماق البحر، مما يرمز إلى القدرة الإلهية المطلقة
