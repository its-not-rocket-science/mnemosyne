- id: he_proverb_tradition_א_ין_ל_ד_ע_ת_מ_א_ח_ר_מ_י_הו_א_מ_י_60a0cd51
  language: he
  canonical_reference: אֵין לָדַעַת מֵאַחַר מִי הוּא מִי
  reference_type: proverb_tradition
  surface_patterns:
  - אֵין לָדַעַת מֵאַחַר מִי הוּא מִי
  - אֵין לָדַעַת מֵאַחַר מִי הוּא
  short_explanation: A proverb meaning 'one cannot know who is who,' often used to express confusion about
    people's identities or roles, or to indicate that appearances can be deceiving.
  i18n_explanations:
    en: A proverb meaning 'one cannot know who is who,' often used to express confusion about people's
      identities or roles, or to indicate that appearances can be deceiving.
    es: Un refrán que significa 'no se puede saber quién es quién,' usado para expresar confusión sobre
      la identidad o el rol de las personas, o para indicar que las apariencias pueden engañar.
    fr: Un proverbe signifiant 'on ne peut savoir qui est qui,' utilisé pour exprimer la confusion quant
      à l'identité ou au rôle des gens, ou pour indiquer que les apparences peuvent tromper.
    de: Ein Sprichwort, das bedeutet 'man kann nicht wissen, wer wer ist,' oft verwendet, um Verwirrung
      über die Identität oder Rolle von Menschen auszudrücken oder zu zeigen, dass der Schein trügen kann.
    it: Un proverbio che significa 'non si può sapere chi è chi,' usato per esprimere confusione sull'identità
      o il ruolo delle persone, o per indicare che le apparenze possono ingannare.
    pt: Um provérbio que significa 'não se pode saber quem é quem,' usado para expressar confusão sobre
      a identidade ou o papel das pessoas, ou para indicar que as aparências podem enganar.
    ru: Поговорка, означающая 'невозможно знать, кто есть кто,' часто используется, чтобы выразить замешательство
      относительно чьей-либо личности или роли, или чтобы указать, что внешность может быть обманчива.
    ja: 「誰が誰かわからない」という意味の諺で、人のアイデンティティや役割についての混乱を表す際や、見た目が人を欺く可能性を示す際に使われます。
    zh: 一句谚语，意为‘无法知道谁是谁’，常用于表达对人们身份或角色的困惑，或指出外表可能具有欺骗性。
    ar: مثل يقول 'لا يمكن معرفة من هو من'، وغالبًا ما يُستخدم للتعبير عن الارتباك بشأن هوية أو دور الأشخاص،
      أو للإشارة إلى أن المظاهر قد تخدع.
    he: פתגם שמשמעו 'אי אפשר לדעת מי הוא מי', המשמש לבטא בלבול לגבי זהותם או תפקידם של אנשים, או לציין
      שהמראה עלול להטעות.
