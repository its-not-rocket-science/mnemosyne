- id: he_proverb_tradition_א_ין_ל_ה_ת_י_ח_ס_ל_ד_ב_ר_ש_א_ין_לו_ש_ו_ר_ש_47d1d9cf
  language: he
  canonical_reference: אֵין לְהִתְיַחֵס לְדָבָר שֶׁאֵין לוֹ שׁוֹרֶשׁ
  reference_type: proverb_tradition
  surface_patterns:
  - אֵין לְהִתְיַחֵס לְדָבָר שֶׁאֵין לוֹ שׁוֹרֶשׁ
  short_explanation: A proverb meaning 'one should not relate to something that has no roots,' suggesting
    that things without foundation or origin are not worthy of consideration or attention.
  i18n_explanations:
    en: A proverb meaning 'one should not relate to something that has no roots,' suggesting that things
      without foundation or origin are not worthy of consideration or attention.
    es: Un refrán que significa 'no se debe relacionar con algo que no tiene raíces,' lo que sugiere que
      las cosas sin fundamento o origen no merecen consideración ni atención.
    fr: Un proverbe signifiant 'on ne doit pas s'attacher à quelque chose qui n'a pas de racines,' suggérant
      que les choses sans fondement ou origine ne méritent pas d'être prises en compte ou d'attention.
    de: Ein Sprichwort, das bedeutet 'man sollte sich nicht mit etwas beschäftigen, das keine Wurzeln
      hat,' was darauf hindeutet, dass Dinge ohne Grundlage oder Ursprung nicht der Beachtung wert sind.
    it: Un proverbio che significa 'non si dovrebbe occuparsi di qualcosa che non ha radici,' suggerendo
      che le cose senza fondamento o origine non meritano considerazione o attenzione.
    pt: Um provérbio que significa 'não se deve se relacionar com algo que não tem raízes,' sugerindo
      que coisas sem fundamento ou origem não merecem consideração ou atenção.
    ru: Поговорка, означающая 'не стоит относиться к тому, у чего нет корней,' что подразумевает, что
      вещи без основы или происхождения не заслуживают внимания.
    ja: 「根のないものに関わるべきではない」という意味の諺で、基盤や起源のないものは考慮や注意に値しないことを示唆しています。
    zh: 一句谚语，意为‘不应关注没有根基的事物’，意指缺乏根基或起源的事物不值得考虑或关注。
    ar: مثل يقول 'لا ينبغي التعامل مع شيء لا جذور له'، مما يشير إلى أن الأشياء بدون أساس أو أصل لا تستحق
      الاعتبار أو الاهتمام.
    he: פתגם שמשמעו 'אין להתייחס לדבר שאין לו שורש', כלומר שדברים ללא בסיס או מקור אינם ראויים להתייחסות
      או תשומת לב.
