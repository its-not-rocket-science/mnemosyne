  short_explanation: A Talmudic saying emphasizing that one must enter the Temple (or a sacred space)
    with reverence and proper conduct, not in a state of mourning or disrespect.
  i18n_explanations:
    en: A Talmudic saying emphasizing that one must enter the Temple (or a sacred space) with reverence
      and proper conduct, not in a state of mourning or disrespect.
    es: Dicho talmúdico que enfatiza que se debe entrar al Templo (o un espacio sagrado) con reverencia
      y conducta adecuada, no en estado de duelo o irrespeto.
    fr: Un adage talmudique soulignant qu'il faut entrer dans le Temple (ou un lieu sacré) avec révérence
      et une conduite appropriée, et non dans un état de deuil ou de manque de respect.
    de: Ein talmudischer Ausspruch, der betont, dass man den Tempel (oder einen heiligen Raum) mit Ehrfurcht
      und angemessenem Verhalten betreten muss, nicht in Trauer oder Respektlosigkeit.
    it: Un detto talmudico che sottolinea come si debba entrare nel Tempio (o in uno spazio sacro) con
      riverenza e condotta appropriata, non in stato di lutto o disprezzo.
    pt: Um dito talmúdico que enfatiza que se deve entrar no Templo (ou um espaço sagrado) com reverência
      e conduta adequada, não em estado de luto ou desrespeito.
    ru: Талмудическое изречение, подчеркивающее, что в Храм (или священное место) следует входить с почтением
      и подобающим поведением, а не в состоянии траура или неуважения.
    ja: タルムードの格言で、神殿（または聖なる空間）に敬意と適切な振る舞いで入るべきであり、喪の状態や無礼な態度で入ってはならないことを強調している。
    zh: 《塔木德》中的一句格言，强调进入圣殿（或神圣空间）时必须怀着敬意和得体的举止，而不是在哀悼或失礼的状态下。
    ar: قول تلمودي يؤكد أنه يجب على المرء الدخول إلى الهيكل (أو مكان مقدس) باحترام وسلوك لائق، وليس في
      حالة حداد أو عدم احترام.
    he: אמרה תלמודית המדגישה שיש להיכנס לבית המקדש (או מקום קדוש) ברצינות ובהתנהגות נאותה, ולא במצב של
      אבל או חוסר כבוד.
