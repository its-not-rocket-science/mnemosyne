      absolutas o incomparables. Suele usarse para describir oscuridad extrema o depravación moral.
    fr: Un proverbe signifiant 'il n'y a pas de noir plus noir que la nuit', soulignant que certaines
      choses sont absolument absolues ou incomparables. Souvent utilisé pour décrire une obscurité extrême
      ou une dépravation morale.
    de: Ein Sprichwort mit der Bedeutung 'es gibt nichts Schwärzeres als die Nacht', das betont, dass
      manche Dinge von Natur aus absolut oder unübertroffen sind. Wird oft für extreme Dunkelheit oder
