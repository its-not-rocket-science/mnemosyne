  canonical_reference: אֵין מַטָּע בְּלִי שׁוֹרֵשׁ
  reference_type: proverb_tradition
  surface_patterns:
  - אֵין מַטָּע בְּלִי שׁוֹרֵשׁ
  - אֵין מַטָּע שֶׁאֵין לוֹ שׁוֹרֵשׁ
  - אֵין מַטָּע בִּלְעֲדֵי שׁוֹרֵשׁ
  short_explanation: A proverb meaning that every planted tree must have roots, symbolizing that all endeavors
    require a solid foundation. It underscores the importance of preparation and grounding in Jewish thought.
  i18n_explanations:
    en: A proverb meaning that every planted tree must have roots, symbolizing that all endeavors require
      a solid foundation. It underscores the importance of preparation and grounding in Jewish thought.
    es: Un proverbio que significa que todo árbol plantado debe tener raíces, simbolizando que todos los
      esfuerzos requieren una base sólida. Subraya la importancia de la preparación y el arraigo en el
      pensamiento judío.
    fr: Un proverbe signifiant que tout arbre planté doit avoir des racines, symbolisant que toute entreprise
      nécessite une base solide. Il souligne l'importance de la préparation et de l'enracinement dans
      la pensée juive.
    de: Ein Sprichwort, das bedeutet, dass jeder gepflanzte Baum Wurzeln haben muss, was symbolisiert,
      dass alle Vorhaben eine solide Grundlage benötigen. Es unterstreicht die Bedeutung von Vorbereitung
      und Verwurzelung im jüdischen Denken.
    it: Un proverbio che significa che ogni albero piantato deve avere radici, simboleggiando che ogni
      impresa richiede una solida base. Sottolinea l'importanza della preparazione e dell'adesione ai
      valori nella tradizione ebraica.
    pt: Um provérbio que significa que toda árvore plantada deve ter raízes, simbolizando que todos os
      empreendimentos requerem uma base sólida. Ressalta a importância da preparação e do enraizamento
      no pensamento judaico.
    ru: Пословица, означающая, что каждое посаженное дерево должно иметь корни, символизируя, что любое
      начинание требует прочной основы. Она подчеркивает важность подготовки и укорененности в еврейской
      мысли.
    ja: 植えられた木は根を持たなければならないという意味の格言で、あらゆる取り組みにはしっかりとした基盤が必要であることを象徴しています。ユダヤ思想における準備と根付きの重要性を強調しています。
    zh: 一句谚语，意为每棵种植的树都必须有根，象征着所有事业都需要坚实的基础。它强调了在犹太思想中准备和根基的重要性。
    ar: مثل يعني أن كل شجرة مزروعة يجب أن يكون لها جذور، مما يرمز إلى أن كل مسعى يتطلب أساسًا متينًا.
      يبرز أهمية الاستعداد والتأصيل في الفكر اليهودي.
    he: פתגם שפירושו שכל עץ נטוע חייב להיות בעל שורשים, המסמל שכל יוזמה זקוקה לבסיס איתן. מדגיש את חשיבות
      ההכנה והשרשיות במחשבה היהודית.
