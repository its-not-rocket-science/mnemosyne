- id: he_proverb_tradition_א_ין_ל_ש_נו_ת_ה_ד_ר_ך_ש_ב_ה_ה_י_ה_a66ba0b1
  language: he
  canonical_reference: אֵין לִשְׁנוֹת הַדֶּרֶךְ שֶׁבָּהּ הָיָה
  reference_type: proverb_tradition
  surface_patterns:
  - אֵין לִשְׁנוֹת אֶת הַדֶּרֶךְ שֶׁבָּהּ הָיָה
  - אֵין לִשְׁנוֹת דֶּרֶךְ שֶׁבָּהּ הָיָה
  - אֵין לְשַׁנּוֹת אֶת הַדֶּרֶךְ שֶׁבָּהּ הָיָה
  short_explanation: This proverb means 'one should not change the path they have taken'—advice to avoid
    deviating from a chosen course of action. It reflects a conservative approach to life decisions.
  i18n_explanations:
    en: This proverb means 'one should not change the path they have taken'—advice to avoid deviating
      from a chosen course of action. It reflects a conservative approach to life decisions.
    es: Este refrán significa 'no se debe cambiar el camino que se ha tomado'—aconseja evitar desviarse
      de una decisión tomada. Refleja un enfoque conservador en las decisiones de vida.
    fr: Ce proverbe signifie 'on ne doit pas changer le chemin qu’on a pris'—conseil pour éviter de s’écarter
      d’une décision prise. Il reflète une approche conservatrice dans les choix de vie.
    de: Dieses Sprichwort bedeutet 'man sollte den eingeschlagenen Weg nicht ändern'—Rat, um nicht von
      einer getroffenen Entscheidung abzuweichen. Es spiegelt eine konservative Lebensauffassung wider.
    it: Questo proverbio significa 'non si deve cambiare il percorso intrapreso'—consiglia di non deviare
      da una decisione presa. Riflette un approccio conservatore nelle scelte di vita.
    pt: Este provérbio significa 'não se deve mudar o caminho que se tomou'—aconselha evitar desviar-se
      de uma decisão tomada. Reflete uma abordagem conservadora nas decisões de vida.
    ru: Эта пословица означает 'не следует менять путь, который выбрал'—совет не отклоняться от принятого
      решения. Отражает консервативный подход к жизненным решениям.
    ja: このことわざは「人は自ら選んだ道を変えてはならない」という意味で、一度決めたことを曲げないように勧める言葉です。人生の決断に保守的な考え方を反映しています。
    zh: 这句谚语意思是“不要改变自己选择的道路”——劝诫人们不要偏离已做出的决定。体现了对生活决策的保守态度。
    ar: هذا المثل يعني 'لا ينبغي تغيير المسار الذي سلكته'—نصيحة لتجنب الانحراف عن قرار متخذ. يعكس نهجًا
      محافظًا في القرارات الحياتية.
    he: פתגם זה פירושו 'אין לשנות את הדרך בה הלכת'—עצה להימנע מסטייה מהחלטה שהתקבלה. משקף גישה שמרנית
      בהחלטות חיים.
