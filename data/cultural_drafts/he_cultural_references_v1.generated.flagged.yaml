    fr: Une expression des Proverbes (30:4) décrivant le pouvoir de Dieu pour élever les profondeurs de
      la mer, symbolisant l'omnipotence divine et le contrôle sur la nature. Souvent citée dans des contextes
      théologiques et philosophiques.
    de: Ein Ausdruck aus den Sprüchen (30:4), der Gottes Macht beschreibt, die Tiefen des Meeres zu erheben,
