- id: he_cultural_reference_ה_כ_נ_ו_ס_ה_ל_א_מ_י_ב_ירו_ש_ל_י_ם_b9dffcc4
  language: he
  canonical_reference: הַכִּנּוּס הַלְּאֻמִּי בִּירוּשָׁלָיִם
  reference_type: cultural_reference
