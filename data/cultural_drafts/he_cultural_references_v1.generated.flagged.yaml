      depravazione morale.
    pt: Um provérbio que significa 'não há negro como a noite', destacando que algumas coisas são inerentemente
      absolutas ou incomparáveis. Geralmente usado para descrever escuridão extrema ou depravação moral.
    ru: Пословица, означающая 'нет ничего чернее ночи', подчеркивающая, что некоторые вещи абсолютно непревзойдены
