  short_explanation: A proverb emphasizing the importance of acting in the right moment, as opportunities
    are fleeting. It reflects a pragmatic approach to time management and decision-making in Jewish wisdom
    literature.
  i18n_explanations:
    en: A proverb emphasizing the importance of acting in the right moment, as opportunities are fleeting.
      It reflects a pragmatic approach to time management and decision-making in Jewish wisdom literature.
    es: Un proverbio que enfatiza la importancia de actuar en el momento adecuado, ya que las oportunidades
      son fugaces. Refleja un enfoque pragmático de la gestión del tiempo y la toma de decisiones en la
      literatura sapiencial judía.
    fr: Un proverbe soulignant l'importance d'agir au bon moment, car les opportunités sont éphémères.
      Il reflète une approche pragmatique de la gestion du temps et de la prise de décision dans la littérature
      juive.
    de: Ein Sprichwort, das die Bedeutung des Handelns im richtigen Moment betont, da Chancen flüchtig
      sind. Es spiegelt einen pragmatischen Ansatz für Zeitmanagement und Entscheidungsfindung in der
      jüdischen Weisheitsliteratur wider.
    it: Un proverbio che sottolinea l'importanza di agire al momento giusto, poiché le opportunità sono
      fugaci. Riflette un approccio pragmatico alla gestione del tempo e al processo decisionale nella
      letteratura sapienziale ebraica.
    pt: Um provérbio que enfatiza a importância de agir no momento certo, pois as oportunidades são fugazes.
      Reflete uma abordagem pragmática de gestão do tempo e tomada de decisões na literatura sapiencial
      judaica.
    ru: Пословица, подчеркивающая важность действовать в нужный момент, так как возможности мимолетны.
      Отражает прагматичный подход к управлению временем и принятию решений в еврейской мудрой литературе.
    ja: 機会は儚いものであり、正しいタイミングで行動することの重要性を説くユダヤの格言。ユダヤの知恵文学における時間管理と意思決定の実用的なアプローチを反映しています。
    zh: 一句强调在正确时机行动的重要性的谚语，因为机会稍纵即逝。它反映了犹太智慧文学中对时间管理和决策的务实态度。
    ar: مثل يقول بأهمية التصرف في الوقت المناسب، لأن الفرص عابرة. يعكس نهجًا عمليًا لإدارة الوقت واتخاذ
      القرار في الأدب اليهودي الحكيم.
    he: פתגם המדגיש את חשיבות הפעולה בעת הנכונה, שכן ההזדמנויות חולפות. משקף גישה פרגמטית לניהול זמן וקבלת
      החלטות בספרות החכמה היהודית.
