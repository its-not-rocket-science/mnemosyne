  short_explanation: A phrase evoking a distant, romanticized place, often used in Hebrew songs and poetry
    to refer to an unattainable or idealized location, inspired by the Spanish city of Castellón de la
    Plana.
  i18n_explanations:
    en: A phrase evoking a distant, romanticized place, often used in Hebrew songs and poetry to refer
      to an unattainable or idealized location, inspired by the Spanish city of Castellón de la Plana.
    es: Frase que evoca un lugar lejano y romantizado, usada en canciones y poesía hebreas para referirse
      a un sitio inalcanzable o idealizado, inspirada en la ciudad española de Castellón de la Plana.
    fr: Une expression évoquant un lieu lointain et idéalisé, souvent utilisée dans les chansons et la
      poésie hébraïques pour désigner un endroit inaccessible ou idéalisé, inspiré de la ville espagnole
      de Castellón de la Plana.
    de: Ein Ausdruck, der einen fernen, verklärten Ort beschwört, der in hebräischen Liedern und Gedichten
      oft für einen unerreichbaren oder idealisierten Ort steht, inspiriert von der spanischen Stadt Castellón
      de la Plana.
    it: Un'espressione che evoca un luogo lontano e romantizzato, usata in canzoni e poesie ebraiche per
      riferirsi a un luogo irraggiungibile o idealizzato, ispirata dalla città spagnola di Castellón de
      la Plana.
    pt: Uma expressão que evoca um lugar distante e romantizado, usada em canções e poesia hebraicas para
      se referir a um local inalcançável ou idealizado, inspirada na cidade espanhola de Castellón de
      la Plana.
    ru: Выражение, вызывающее образ далекого, романтизированного места, часто используемое в еврейских
      песнях и поэзии для обозначения недостижимого или идеализированного места, вдохновленное испанским
      городом Кастельон-де-ла-Плана.
    ja: 遠くのロマンチックな場所を想起させる表現で、スペインの都市カステリョン・デ・ラ・プラナに着想を得た、到達不可能な理想郷を指すヘブライ語の歌や詩でよく使われる。
    zh: 一个唤起遥远、浪漫化之地的短语，常用于希伯来歌曲和诗歌中，指代一个无法企及或理想化的地方，灵感来自西班牙城市卡斯特利翁-德拉普拉纳。
    ar: عبارة تستحضر مكانًا بعيدًا ومثاليًا، تُستخدم غالبًا في الأغاني والشعر العبري للإشارة إلى مكان
