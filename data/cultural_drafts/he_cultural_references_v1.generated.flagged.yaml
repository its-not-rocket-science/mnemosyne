  short_explanation: A proverb meaning that an ignorant person does not know how to ask questions or seek
    knowledge. Highlights the importance of curiosity and learning.
  i18n_explanations:
    en: A proverb meaning that an ignorant person does not know how to ask questions or seek knowledge.
      Highlights the importance of curiosity and learning.
    es: Un refrán que significa que una persona ignorante no sabe cómo hacer preguntas o buscar conocimiento.
      Destaca la importancia de la curiosidad y el aprendizaje.
    fr: Un proverbe signifiant qu'une personne ignorante ne sait pas comment poser des questions ou chercher
      le savoir. Met en avant l'importance de la curiosité et de l'apprentissage.
    de: Ein Sprichwort, das besagt, dass ein unwissender Mensch nicht weiß, wie man Fragen stellt oder
      Wissen sucht. Unterstreicht die Bedeutung von Neugier und Lernen.
    it: Un proverbio che significa che una persona ignorante non sa come porre domande o cercare conoscenza.
      Sottolinea l'importanza della curiosità e dell'apprendimento.
    pt: Um provérbio que significa que uma pessoa ignorante não sabe como fazer perguntas ou buscar conhecimento.
      Destaca a importância da curiosidade e do aprendizado.
    ru: Поговорка, означающая, что невежественный человек не умеет задавать вопросы или искать знания.
      Подчеркивает важность любопытства и обучения.
    ja: 無知な人は質問の仕方や知識を求める方法を知らないという諺。好奇心と学習の重要性を強調している。
    zh: 一句谚语，意思是无知的人不知道如何提问或寻求知识。强调好奇心和学习的重要性。
    ar: مثل يقول إن الجاهل لا يعرف كيف يسأل أو يطلب المعرفة. يبرز أهمية الفضول والتعلم.
    he: פתגם שמשמעו שאדם בור אינו יודע כיצד לשאול או לחפש ידע. מדגיש את חשיבות הסקרנות והלמידה.
