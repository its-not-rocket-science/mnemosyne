    en: A Hebrew proverb warning against interrupting or speaking out of turn in a group. It advises patience
      and respect for communal discourse, reflecting social norms of politeness.
    es: Un refrán hebreo que advierte contra interrumpir o hablar fuera de lugar en un grupo. Recomienda
      paciencia y respeto por el discurso comunitario, reflejando normas sociales de cortesía.
    fr: Un proverbe hébreu mettant en garde contre les interruptions ou les prises de parole inappropriées
      dans un groupe. Il prône la patience et le respect du discours collectif, reflétant les normes sociales
      de politesse.
    de: Ein hebräisches Sprichwort, das davor warnt, in einer Gruppe zu unterbrechen oder unpassend zu
      sprechen. Es rät zu Geduld und Respekt für die gemeinschaftliche Diskussion und spiegelt soziale
      Höflichkeitsnormen wider.
    it: Un proverbio ebraico che mette in guardia contro le interruzioni o i discorsi fuori luogo in un
      gruppo. Consiglia pazienza e rispetto per il discorso comunitario, riflettendo norme sociali di
      cortesia.
    pt: Um provérbio hebraico que adverte contra interromper ou falar fora de hora em um grupo. Recomenda
      paciência e respeito pelo discurso comunitário, refletindo normas sociais de polidez.
    ru: Еврейская пословица, предостерегающая от перебивания или не вовремя высказываний в группе. Призывает
