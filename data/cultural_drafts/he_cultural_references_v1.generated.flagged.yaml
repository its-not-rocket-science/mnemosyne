  short_explanation: A phrase parodying the biblical formula 'אלה תולדות' (These are the generations of...),
    used in modern Hebrew literature to introduce a satirical or ironic account of events.
  i18n_explanations:
    en: A phrase parodying the biblical formula 'אלה תולדות' (These are the generations of...), used in
      modern Hebrew literature to introduce a satirical or ironic account of events.
    es: Frase que parodia la fórmula bíblica 'אלה תולדות' ('Estas son las generaciones de...'), usada
      en la literatura hebrea moderna para introducir un relato satírico o irónico de eventos.
    fr: Une expression qui parodie la formule biblique 'אלה תולדות' ('Voici les générations de...'), utilisée
      dans la littérature hébraïque moderne pour introduire un récit satirique ou ironique d'événements.
    de: Ein Ausdruck, der die biblische Formel 'אלה תולדות' ('Dies sind die Geschlechter von...') parodiert
      und in der modernen hebräischen Literatur verwendet wird, um eine satirische oder ironische Schilderung
      von Ereignissen einzuleiten.
    it: Un'espressione che parodia la formula biblica 'אלה תולדות' ('Questi sono i discendenti di...'),
      usata nella letteratura ebraica moderna per introdurre un resoconto satirico o ironico di eventi.
    pt: Uma expressão que parodia a fórmula bíblica 'אלה תולדות' ('Estas são as gerações de...'), usada
      na literatura hebraica moderna para introduzir um relato satírico ou irônico de eventos.
    ru: Выражение, пародирующее библейскую формулу 'אלה תולדות' ('Вот родословие...'), используемое в
      современной еврейской литературе для введения сатирического или ироничного повествования о событиях.
    ja: 聖書の定型句 'אלה תולדות' （「これらは…の系譜である」）をもじった表現で、現代ヘブライ語文学で出来事を風刺的または皮肉的に紹介する際に用いられる。
    zh: 一个模仿圣经公式 'אלה תולדות'（「……的后代」）的短语，用于现代希伯来文学中引入对事件的讽刺或反讽叙述。
    ar: عبارة تحاكي الصيغة التوراتية 'אלה תולדות' ('هذه نسب...')، وتستخدم في الأدب العبري الحديث لبدء
      رواية ساخرة أو ساخرة من الأحداث.
    he: ביטוי שמגחיך את הנוסחה המקראית 'אלה תולדות' ('אלה תולדות...'), הנפוץ בספרות העברית המודרנית כדי
      להציג תיאור אירוני או סאטירי של אירועים.
