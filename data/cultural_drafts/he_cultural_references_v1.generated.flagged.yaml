      und darauf hinweist, dass das Bewirten von Gästen unerwartete Probleme bringen kann. Zeigt traditionelle
      Vorsicht gegenüber Gastfreundschaft.
    it: Un proverbio ebraico che significa 'un ospite è un pericolo' o 'un ospite è un peso,' suggerendo
      che ospitare può portare problemi imprevisti. Riflette la cautela tradizionale verso l'ospitalità.
    pt: Um provérbio hebraico que significa 'um hóspede é um perigo' ou 'um hóspede é um fardo,' sugerindo
      que receber convidados pode trazer problemas inesperados. Reflete a cautela tradicional com a hospitalidade.
    ru: Еврейская пословица, означающая 'гость — это опасность' или 'гость — это обуза,' подразумевающая,
      что приём гостей может принести неожиданные неприятности. Отражает традиционную осторожность в отношении
      гостеприимства.
    ja: ヘブライのことわざで、「客は危険」または「客は負担」を意味し、客をもてなすことが思いもよらないトラブルを招く可能性を示唆する。伝統的なゲストへの警戒心を反映している。
    zh: 一句希伯来谚语，意为“客人即危险”或“客人即负担”，提醒接待客人可能带来意外的麻烦。体现了对待待客传统的谨慎态度。
    ar: مثل عبراني يعني 'الضيف خطر' أو 'الضيف عبء'، مما يوحي بأن استضافة الضيوف قد تجلب مشاكل غير متوقعة.
