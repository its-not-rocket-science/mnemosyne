- id: he_proverb_tradition_ד_ב_ר_מ_ת_ו_ר_ה_ו_א_ין_לו_ש_ו_ר_ש_ef069dfe
  language: he
  canonical_reference: דָּבָר מִתּוֹרָה וְאֵין לוֹ שֹׁוֹרֵשׁ
  reference_type: proverb_tradition
  surface_patterns:
  - דָּבָר מִתּוֹרָה וְאֵין לוֹ שֹׁוֹרֵשׁ
  - דָּבָר מִתּוֹרָה
  - אֵין לוֹ שֹׁוֹרֵשׁ
  short_explanation: A Hebrew proverb meaning 'A matter from the Torah that has no root,' implying a teaching
    or idea that lacks proper foundation or context. Often used to critique superficial or misapplied
    religious knowledge.
  i18n_explanations:
    en: A Hebrew proverb meaning 'A matter from the Torah that has no root,' implying a teaching or idea
      that lacks proper foundation or context. Often used to critique superficial or misapplied religious
      knowledge.
    es: Un proverbio hebreo que significa 'Una enseñanza de la Torá sin raíces', es decir, una idea o
      enseñanza sin fundamento o contexto adecuado. Se usa para criticar conocimientos religiosos superficiales
      o mal aplicados.
    fr: Un proverbe hébraïque signifiant 'Une chose tirée de la Torah sans racine', c'est-à-dire une idée
      ou un enseignement sans fondement ou contexte approprié. Utilisé pour critiquer les connaissances
      religieuses superficielles ou mal appliquées.
    de: Ein hebräisches Sprichwort, das bedeutet 'Eine Sache aus der Tora ohne Wurzel', also eine Lehre
      oder Idee ohne angemessene Grundlage oder Kontext. Wird oft verwendet, um oberflächliches oder falsch
      angewendetes religiöses Wissen zu kritisieren.
    it: Un proverbio ebraico che significa 'Una cosa tratta dalla Torah senza radici', cioè un insegnamento
      o un'idea senza fondamento o contesto adeguato. Usato per criticare conoscenze religiose superficiali
      o mal applicate.
    pt: Um provérbio hebraico que significa 'Uma coisa da Torá sem raiz', ou seja, um ensinamento ou ideia
      sem fundamento ou contexto adequado. Usado para criticar conhecimentos religiosos superficiais ou
      mal aplicados.
    ru: Еврейская пословица, означающая 'Учение из Торы без корня', то есть идея или учение без должного
      основания или контекста. Часто используется для критики поверхностных или неправильно применённых
      религиозных знаний.
    ja: ヘブライのことわざで、「トーラーに由来するが根がない」という意味。すなわち、適切な基盤や文脈のない教えや考えを指す。表面的または誤用された宗教知識を批判する際に用いられる。
    zh: 一句希伯来谚语，意为「出自《托拉》但无根基」，指缺乏适当基础或语境的教义或思想。常用于批评肤浅或误用的宗教知识。
    ar: مثل عبري يعني 'أمر من التوراة بلا جذور'، أي تعليم أو فكرة تفتقر إلى أساس أو سياق مناسب. يُستخدم
      غالبًا لانتقاد المعرفة الدينية السطحية أوMisapplied.
    he: פתגם עברי שמשמעו 'דבר מן התורה ואין לו שורש', כלומר לימוד או רעיון חסרי בסיס או הקשר ראוי. משמש
      לעיתים קרובות לביקורת על ידע דתי שטחי או מוטעה.
