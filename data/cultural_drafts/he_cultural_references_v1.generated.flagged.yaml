- id: he_classical_or_scriptural_allusion_ו_כ_ל_ב_כ_ר_ב_נ_י_ב_נ_י_י_ש_ר_א_ל_ל_מ_ש_מ_ר_ת_148b3a52
  language: he
  canonical_reference: וְכָל בְּכֹר בְּנֵי בְנֵי יִשְׂרָאֵל לְמִשְׁמָרַת
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - וְכָל בְּכֹר בְּנֵי יִשְׂרָאֵל
  - בְּכֹר בְּנֵי יִשְׂרָאֵל
  - וְכָל בְּכֹר מִבְּנֵי יִשְׂרָאֵל
  short_explanation: Refers to the biblical commandment regarding the consecration of the firstborn sons
    of Israel to divine service, as part of the covenant with God. It carries theological significance
    in Jewish tradition regarding the sanctity of the priestly class.
  i18n_explanations:
    en: Refers to the biblical commandment regarding the consecration of the firstborn sons of Israel
      to divine service, as part of the covenant with God. It carries theological significance in Jewish
      tradition regarding the sanctity of the priestly class.
    es: Se refiere al mandamiento bíblico sobre la consagración de los primogénitos de Israel al servicio
      divino, como parte del pacto con Dios. Tiene importancia teológica en la tradición judía respecto
      a la santidad del sacerdocio.
    fr: Fait référence au commandement biblique concernant la consécration des premiers-nés d'Israël au
      service divin, dans le cadre de l'alliance avec Dieu. Il revêt une signification théologique dans
      la tradition juive quant à la sainteté de la classe sacerdotale.
    de: Bezieht sich auf das biblische Gebot zur Weihe der erstgeborenen Söhne Israels zum göttlichen
      Dienst als Teil des Bundes mit Gott. Es trägt theologische Bedeutung in der jüdischen Tradition
      hinsichtlich der Heiligkeit der Priesterklasse.
    it: Si riferisce al comandamento biblico che consacra i primogeniti maschi di Israele al servizio
      divino, parte dell'alleanza con Dio. Ha un significato teologico nella tradizione ebraica riguardo
      alla santità della classe sacerdotale.
    pt: Refere-se ao mandamento bíblico sobre a consagração dos primogênitos de Israel ao serviço divino,
      como parte da aliança com Deus. Tem importância teológica na tradição judaica quanto à santidade
      da classe sacerdotal.
    ru: Относится к библейской заповеди о посвящении первенцев Израиля божественному служению как части
      завета с Богом. Имеет теологическое значение в еврейской традиции в отношении святости священнического
      класса.
    ja: これは、イスラエルの長子を神への奉仕のために聖別するという聖書の戒めを指す。神との契約の一環であり、ユダヤ教の伝統において祭司階級の聖性を示す重要な教義となっている。
    zh: 指的是圣经中关于以色列长子奉献给神圣服务的诫命，作为与上帝立约的一部分。在犹太传统中，它具有神学意义，强调祭司阶层的神圣性。
    ar: يشير إلى الوصية التوراتية بشأن تقديس أبكار بني إسرائيل للخدمة الإلهية، كجزء من العهد مع الله.
      وله أهمية لاهوتية في التقليد اليهودي بشأن قدسية الطبقة الكهنوتية.
    he: מתייחסת למצוות התורה על הקדשתו של הבכור מבני ישראל לעבודת האל, כחלק מברית עם האל. נושא משמעות
      תאולוגית במסורת היהודית לגבי קדושת מעמד הכהונה.
