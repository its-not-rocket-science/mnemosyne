  i18n_explanations:
    en: A Hebrew proverb meaning 'a guest is a danger' or 'a guest is a liability,' suggesting that hosting
      guests can bring unexpected trouble. Reflects traditional caution toward hospitality.
    es: Un refrán hebreo que significa 'un invitado es un peligro' o 'un invitado es una carga,' sugiriendo
      que recibir invitados puede traer problemas inesperados. Refleja la cautela tradicional hacia la
      hospitalidad.
    fr: Un proverbe hébreu signifiant 'un invité est un danger' ou 'un invité est une responsabilité,'
      suggérant que recevoir des invités peut apporter des ennuis inattendus. Traduit la prudence traditionnelle
      envers l'hospitalité.
