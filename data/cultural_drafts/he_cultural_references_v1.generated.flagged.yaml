- id: he_proverb_tradition_א_ין_לו_מ_ט_ע_מ_י_ש_מ_י_ם_3fe0e223
  language: he
  canonical_reference: אֵין לוֹ מִטְּעָמֵי שָׁמַיִם
  reference_type: proverb_tradition
  surface_patterns:
  - אֵין לוֹ מִטְּעָמֵי שָׁמַיִם
  - אֵין לוֹ מִטְעָמֵי שָׁמַיִם
  short_explanation: A proverb meaning 'he has no taste of heaven,' implying someone lacks refined or
    elevated sensibilities, often used to describe a person who is coarse or vulgar.
  i18n_explanations:
    en: A proverb meaning 'he has no taste of heaven,' implying someone lacks refined or elevated sensibilities,
      often used to describe a person who is coarse or vulgar.
    es: Un refrán que significa 'no tiene gusto por lo celestial,' lo que implica que alguien carece de
      sensibilidad refinada o elevada, usado para describir a una persona grosera o vulgar.
    fr: Un proverbe signifiant 'il n'a pas le goût du ciel,' impliquant que quelqu'un manque de sensibilité
      raffinée ou élevée, souvent utilisé pour décrire une personne grossière ou vulgaire.
    de: Ein Sprichwort, das bedeutet 'er hat keinen himmlischen Geschmack,' was impliziert, dass jemand
      feine oder erhabene Empfindungen vermissen lässt, oft für eine grobe oder vulgäre Person verwendet.
    it: Un proverbio che significa 'non ha il gusto del cielo,' implicando che qualcuno manca di sensibilità
      raffinata o elevata, spesso usato per descrivere una persona volgare o rozza.
    pt: Um provérbio que significa 'não tem gosto pelo celestial,' implicando que alguém carece de sensibilidade
      refinada ou elevada, usado para descrever uma pessoa grosseira ou vulgar.
    ru: Поговорка, означающая 'у него нет небесного вкуса,' что подразумевает отсутствие у человека утончённых
      или возвышенных чувств, часто используется для описания грубого или вульгарного человека.
    ja: 「天の味がしない」という意味の諺で、洗練された感性や高尚な感覚に欠けている人を指し、粗野で下品な人を表す際に使われます。
    zh: 一句谚语，意为“他没有‘天上的味道’”，暗指一个人缺乏高雅或崇高的品味，常用于形容粗俗或庸俗的人。
    ar: مثل يقول 'ليس له طعم السماء'، مما يعني أن شخصًا ما يفتقر إلى الحس الرفيع أو elevated، وغالبًا
      ما يُستخدم لوصف شخص فظ أو بذيء.
    he: פתגם שמשמעו 'אין לו טעם של שמים', כלומר שאדם חסר רגישות מעודנת או נעלה, ומשמש לתיאור אדם גס או
      vulgari.
