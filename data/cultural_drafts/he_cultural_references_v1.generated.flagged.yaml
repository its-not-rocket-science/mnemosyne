- id: he_classical_or_scriptural_allusion_ו_י_ב_א_ה_מ_ל_א_ך_ה_ז_ה_b475c0ba
  language: he
  canonical_reference: וַיָּבֹא הַמַּלְאָךְ הַזֶּה
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - וַיָּבֹא הַמַּלְאָךְ הַזֶּה
  - וַיָּבֹא מַלְאָךְ זֶה
  short_explanation: A phrase from the Hebrew Bible (Tanakh) referring to an angelic messenger arriving,
    often used to introduce a divine or miraculous event. It carries a tone of divine intervention or
    prophecy.
  i18n_explanations:
    en: A phrase from the Hebrew Bible (Tanakh) referring to an angelic messenger arriving, often used
      to introduce a divine or miraculous event. It carries a tone of divine intervention or prophecy.
    es: Frase de la Biblia hebrea (Tanaj) que se refiere a la llegada de un mensajero angelical, usada
      para introducir un evento divino o milagroso. Transmite un tono de intervención divina o profecía.
    fr: Une expression de la Bible hébraïque (Tanakh) évoquant l'arrivée d'un messager angélique, souvent
      utilisée pour introduire un événement divin ou miraculeux. Elle évoque une intervention ou une prophétie
      divine.
    de: Ein Ausdruck aus der hebräischen Bibel (Tanach), der die Ankunft eines Engels als Boten beschreibt
      und oft ein göttliches oder wundersames Ereignis einleitet. Er vermittelt einen Ton von göttlichem
      Eingreifen oder Prophezeiung.
    it: Un'espressione della Bibbia ebraica (Tanakh) che si riferisce all'arrivo di un messaggero angelico,
      usata per introdurre un evento divino o miracoloso. Ha un tono di intervento o profezia divina.
    pt: Uma expressão da Bíblia hebraica (Tanakh) que se refere à chegada de um mensageiro angelical,
      usada para introduzir um evento divino ou miraculoso. Transmite um tom de intervenção ou profecia
      divina.
    ru: Выражение из еврейской Библии (Танаха), описывающее прибытие ангельского посланника, часто используемое
      для введения божественного или чудесного события. Оно несёт оттенок божественного вмешательства
      или пророчества.
    ja: ヘブライ語聖書（タナハ）の一節で、天使の使者が到来することを指し、しばしば神聖な出来事や奇跡を導入する際に用いられる。神の介入や預言のニュアンスを含む。
    zh: 希伯来圣经（塔纳赫）中的一句话，指代天使使者的到来，常用于引出神圣或奇迹般的事件。带有神圣干预或预言的语气。
