    zh: 一个意为“空洞法令”或“无效法令”的短语，指那些缺乏实际权力或执行力的压迫性法律或法令。现代希伯来语中常用于描述无效政策。
    ar: تعبير يعني 'أوامر فارغة' أو 'أوامر عقيمة'، ويشير إلى قوانين أو أوامر قمعية لا تملك سلطة أو تنفيذ
      حقيقي. يُستخدم في العبرية الحديثة لوصف سياسات غير فعالة.
    he: ביטוי שפירושו 'גזרות ריקות' או 'גזרות סרק', המתייחס לחוקים או גזרות מדכאות חסרי כוח או אכיפה ממשיים.
