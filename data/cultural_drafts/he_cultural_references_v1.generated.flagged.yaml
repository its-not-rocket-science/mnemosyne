  - אֵין כַּחָכְמָה הֲגִינוּת
  short_explanation: A proverb stating that wisdom is as valuable as modesty or proper conduct. It highlights
    the cultural value placed on both intellectual and moral virtues in Jewish tradition.
  i18n_explanations:
    en: A proverb stating that wisdom is as valuable as modesty or proper conduct. It highlights the cultural
      value placed on both intellectual and moral virtues in Jewish tradition.
    es: Un proverbio que afirma que la sabiduría es tan valiosa como la modestia o la conducta adecuada.
      Destaca el valor cultural que se otorga tanto a las virtudes intelectuales como morales en la tradición
      judía.
    fr: Un proverbe affirmant que la sagesse est aussi précieuse que la modestie ou la conduite appropriée.
      Il met en avant la valeur culturelle accordée aux vertus intellectuelles et morales dans la tradition
      juive.
    de: Ein Sprichwort, das besagt, dass Weisheit genauso wertvoll ist wie Bescheidenheit oder angemessenes
      Verhalten. Es unterstreicht den kulturellen Wert, der sowohl intellektuellen als auch moralischen
      Tugenden in der jüdischen Tradition beigemessen wird.
    it: Un proverbio che afferma che la saggezza è preziosa quanto la modestia o la condotta appropriata.
      Sottolinea il valore culturale attribuito sia alle virtù intellettuali che a quelle morali nella
      tradizione ebraica.
    pt: Um provérbio que afirma que a sabedoria é tão valiosa quanto a modéstia ou a conduta adequada.
      Destaca o valor cultural atribuído tanto às virtudes intelectuais quanto morais na tradição judaica.
    ru: Пословица, утверждающая, что мудрость так же ценна, как скромность или правильное поведение. Она
      подчеркивает культурную ценность, придаваемую как интеллектуальным, так и моральным добродетелям
      в еврейской традиции.
    ja: 知恵は謙虚さや適切な行動と同じくらい価値があるとするユダヤの格言。ユダヤの伝統において知的および道徳的な美徳に与えられる文化的価値を強調しています。
    zh: 一句谚语，称智慧与谦逊或得体的行为同样珍贵。它强调了犹太传统中对智力和道德美德的文化重视。
    ar: مثل يقول بأن الحكمة تساوي التواضع أو السلوك السليم. يبرز القيمة الثقافية الممنوحة لكل من الفضائل
      الفكرية والأخلاقية في التقليد اليهودي.
    he: פתגם הטוען כי החכמה שווה בערכה לצניעות או להתנהגות הראויה. מדגיש את הערך התרבותי המוענק הן למידות
      שכליות והן למידות מוסריות במסורת היהודית.
