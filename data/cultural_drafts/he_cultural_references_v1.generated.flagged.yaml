  i18n_explanations:
    en: A proverb suggesting that the devil (or evil forces) interferes in everything, often used to explain
      misfortune or unexpected problems.
    es: Un refrán que sugiere que el diablo (o fuerzas malignas) se entromete en todo, usado a menudo
      para explicar desgracias o problemas inesperados.
    fr: Un proverbe suggérant que le diable (ou les forces du mal) s'immisce dans tout, souvent utilisé
      pour expliquer les malheurs ou les problèmes inattendus.
    de: Ein Sprichwort, das besagt, dass der Teufel (oder böse Mächte) sich in alles einmischt, oft verwendet,
      um Unglück oder unerwartete Probleme zu erklären.
    it: Un proverbio che suggerisce che il diavolo (o forze malvagie) si intromette in tutto, spesso usato
      per spiegare sventure o problemi imprevisti.
    pt: Um provérbio que sugere que o diabo (ou forças malignas) interfere em tudo, frequentemente usado
      para explicar infortúnios ou problemas inesperados.
    ru: Поговорка, предполагающая, что дьявол (или злые силы) вмешивается во всё, часто используется для
      объяснения несчастий или неожиданных проблем.
    ja: 悪魔（または邪悪な力）があらゆることに干渉するという諺。しばしば不幸や予期せぬ問題を説明する際に用いられる。
    zh: 一句谚语，意思是魔鬼（或邪恶势力）无处不在地干预一切，常用于解释不幸或意外问题。
    ar: مثل يقول إن الشيطان (أو القوى الشريرة) يتدخل في كل شيء، وغالبًا ما يُستخدم لتفسير المصائب أو المشاكل
      غير المتوقعة.
    he: פתגם הטוען שהשטן (או כוחות הרע) מתערב בכל דבר, ומשמש לעיתים קרובות להסביר אסונות או בעיות בלתי
      צפויות.
