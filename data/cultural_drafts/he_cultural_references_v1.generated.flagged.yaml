- id: he_cultural_reference_ע_ל_י_ו_ן_ב_מ_ל_ח_מ_ת_ש_ש_ת_ה_י_מ_ים_cab490a2
  language: he
  canonical_reference: עֲלִיּוֹן בְּמִלְחֶמֶת שִׁשֶׁת הַיָּמִים
  reference_type: cultural_reference
  surface_patterns:
  - עליון במלחמת ששת הימים
  - עליון בששת הימים
  - מלחמת ששת הימים
  short_explanation: Refers to the Israeli victory in the Six-Day War (1967), where Israel captured the
    Sinai Peninsula, Gaza Strip, West Bank, East Jerusalem, and the Golan Heights. The phrase emphasizes
    Israel's military superiority.
  i18n_explanations:
    en: Refers to the Israeli victory in the Six-Day War (1967), where Israel captured the Sinai Peninsula,
      Gaza Strip, West Bank, East Jerusalem, and the Golan Heights. The phrase emphasizes Israel's military
      superiority.
    es: Se refiere a la victoria israelí en la Guerra de los Seis Días (1967), durante la cual Israel
      capturó la península del Sinaí, la Franja de Gaza, Cisjordania, Jerusalén Este y los Altos del Golán.
      La frase enfatiza la superioridad militar de Israel.
    fr: Fait référence à la victoire israélienne lors de la guerre des Six Jours (1967), au cours de laquelle
      Israël a capturé le Sinaï, la bande de Gaza, la Cisjordanie, Jérusalem-Est et le plateau du Golan.
      L'expression souligne la supériorité militaire d'Israël.
    de: Bezieht sich auf den israelischen Sieg im Sechstagekrieg (1967), in dem Israel die Sinai-Halbinsel,
      den Gazastreifen, das Westjordanland, Ost-Jerusalem und die Golanhöhen eroberte. Der Ausdruck betont
      Israels militärische Überlegenheit.
    it: Si riferisce alla vittoria israeliana nella Guerra dei Sei Giorni (1967), durante la quale Israele
      conquistò la penisola del Sinai, la Striscia di Gaza, la Cisgiordania, Gerusalemme Est e le Alture
      del Golan. La frase sottolinea la superiorità militare di Israele.
    pt: Refere-se à vitória israelense na Guerra dos Seis Dias (1967), quando Israel capturou a península
      do Sinai, a Faixa de Gaza, a Cisjordânia, Jerusalém Oriental e os Altos do Golã. A expressão enfatiza
      a superioridade militar de Israel.
    ru: Относится к победе Израиля в Шестидневной войне (1967), в ходе которой Израиль захватил Синайский
      полуостров, сектор Газа, Западный берег, Восточный Иерусалим и Голанские высоты. Фраза подчеркивает
      военное превосходство Израиля.
    ja: これは、イスラエルが1967年の六日間戦争で勝利し、シナイ半島、ガザ地区、ヨルダン川西岸、東エルサレム、ゴラン高原を占領したことを指す。この表現はイスラエルの軍事的優位性を強調している。
    zh: 指以色列在1967年六日战争中的胜利，以色列在战争中占领了西奈半岛、加沙地带、约旦河西岸、东耶路撒冷和戈兰高地。该短语强调以色列的军事优势。
    ar: يشير إلى النصر الإسرائيلي في حرب الأيام الستة (1967)، حيث استولت إسرائيل على سيناء وغزة والضفة
      الغربية والقدس الشرقية وهضبة الجولان. تؤكد العبارة على التفوق العسكري الإسرائيلي.
    he: מתייחס לניצחון הישראלי במלחמת ששת הימים (1967), במהלכה כבשה ישראל את חצי האי סיני, רצועת עזה,
      הגדה המערבית, מזרח ירושלים ורמת הגולן. הביטוי מדגיש את העליונות הצבאית של ישראל.
