- id: zh_literary_reference_举杯消愁愁更愁_3ecb0bfd
  language: zh
  canonical_reference: 举杯消愁愁更愁
  reference_type: literary_reference
  surface_patterns:
  - 举杯消愁愁更愁
  - 抽刀断水水更流，举杯消愁愁更愁
  short_explanation: Lifting the cup to drown sorrow only makes sorrow more sorrowful. This famous line
    by Li Bai laments the futility of trying to escape sadness.
  i18n_explanations:
    en: Lifting the cup to drown sorrow only makes sorrow more sorrowful. This famous line by Li Bai laments
      the futility of trying to escape sadness.
    es: Levantar la copa para ahogar la pena solo hace que la pena sea más penosa. Este famoso verso de
      Li Bai lamenta la inutilidad de tratar de escapar de la tristeza.
    fr: Lever la coupe pour noyer le chagrin ne fait que rendre le chagrin plus chagrinant. Ce vers célèbre
      de Li Bai déplore la futilité d'essayer d'échapper à la tristesse.
    de: Das Heben des Bechers, um Kummer zu ertränken, macht den Kummer nur noch kummervoller. Diese berühmte
      Zeile von Li Bai beklagt die Sinnlosigkeit, der Traurigkeit zu entfliehen.
    it: Alzare la coppa per annegare il dolore rende il dolore ancora più doloroso. Questo famoso verso
      di Li Bai lamenta l'inutilità di cercare di sfuggire alla tristezza.
    pt: Levantar o copo para afogar a tristeza só torna a tristeza mais triste. Este famoso verso de Li
      Bai lamenta a futilidade de tentar escapar da tristeza.
    ru: Поднятие чаши, чтобы утопить печаль, только делает печаль еще более печальной. Эта знаменитая
      строка Ли Бо оплакивает тщетность попыток убежать от грусти.
    ja: 杯を挙げて憂いを紛らわそうとすると、かえって憂いが募る。李白のこの有名な句は、悲しみから逃れようとする無益さを嘆いている。
    zh: 举杯消愁愁更愁。李白这句名言感叹试图逃避悲伤的无用。
    ar: رفع الكأس لإغراق الحزن يزيد الحزن حزنًا. هذا البيت الشهير للي باي يندب عبث محاولة الهروب من الحزن.
    he: הרמת הכוס כדי להטביע את הצער רק הופכת את הצער לצערי יותר. השורה המפורסמת הזו של לי באי מקוננת
