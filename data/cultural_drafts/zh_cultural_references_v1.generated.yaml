    it: Proverbio cinese che significa 'Cadere in una fossa, guadagnare in arguzia', indicando che ogni
      errore insegna una lezione che porta alla saggezza.
    pt: Provérbio chinês que significa 'Cair em um buraco, ganhar em astúcia', indicando que cada erro
      ensina uma lição que leva à sabedoria.
    ru: Китайская пословица, означающая 'Упасть в яму — приобрести ум', указывающая, что каждая ошибка
      учит уроку, ведущему к мудрости.
