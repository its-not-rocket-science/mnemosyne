- id: zh_cultural_reference_疏可走马_密不透风_c994b8f7
  language: zh
  canonical_reference: 疏可走马，密不透风
  reference_type: cultural_reference
  surface_patterns:
  - 疏可走马，密不透风
  - 疏可走马密不透风
  - 疏处可走马，密处不透风
  short_explanation: 'A principle in Chinese painting and calligraphy: composition should be alternately
    sparse and dense to create rhythm and contrast. Sparse areas are spacious enough for a horse to gallop,
    while dense areas are impenetrable.'
  i18n_explanations:
    en: 'A principle in Chinese painting and calligraphy: composition should be alternately sparse and
      dense to create rhythm and contrast. Sparse areas are spacious enough for a horse to gallop, while
      dense areas are impenetrable.'
    es: 'Un principio en la pintura y caligrafía china: la composición debe ser alternativamente escasa
      y densa para crear ritmo y contraste. Las áreas escasas son lo suficientemente espaciosas para que
      un caballo galope, mientras que las densas son impenetrables.'
    fr: 'Un principe de la peinture et de la calligraphie chinoises : la composition doit être alternativement
      clairsemée et dense pour créer rythme et contraste. Les zones clairsemées sont assez spacieuses
      pour qu''un cheval galope, tandis que les zones denses sont impénétrables.'
    de: 'Ein Prinzip in der chinesischen Malerei und Kalligraphie: Die Komposition sollte abwechselnd
      spärlich und dicht sein, um Rhythmus und Kontrast zu erzeugen. Spärliche Bereiche sind weit genug
      für ein galoppierendes Pferd, während dichte Bereiche undurchdringlich sind.'
    it: 'Un principio nella pittura e calligrafia cinese: la composizione dovrebbe essere alternativamente
      rada e densa per creare ritmo e contrasto. Le aree rade sono abbastanza spaziose per far galoppare
      un cavallo, mentre quelle dense sono impenetrabili.'
    pt: 'Um princípio na pintura e caligrafia chinesa: a composição deve ser alternadamente esparsa e
      densa para criar ritmo e contraste. Áreas esparsas são espaçosas o suficiente para um cavalo galopar,
      enquanto áreas densas são impenetráveis.'
    ru: 'Принцип китайской живописи и каллиграфии: композиция должна быть попеременно разреженной и плотной
      для создания ритма и контраста. Разреженные участки достаточно просторны, чтобы лошадь могла скакать,
      а плотные – непроницаемы.'
    ja: 中国絵画と書道の原則：構成はリズムと対比を生み出すために、疎と密を交互にすべきである。疎の部分は馬が駆け抜けられるほど広く、密の部分は風も通さないほど詰まっている。
    zh: 中国绘画和书法的一个原则：布局应疏密交替以产生节奏和对比。疏处可让马奔跑，密处则连风都透不过。
    ar: 'مبدأ في الرسم والخط الصيني: يجب أن يكون التكوين متخلخلًا وكثيفًا بالتناوب لخلق إيقاع وتباين.
      المناطق المتخلخلة واسعة بما يكفي لركض حصان، بينما المناطق الكثيفة غير قابلة للاختراق.'
    he: 'עקרון בציור ובקליגרפיה סינית: הקומפוזיציה צריכה להיות לסירוגין דלילה וצפופה כדי ליצור קצב וניגודיות.
      אזורים דלילים מרווחים מספיק כדי שסוס ידהר, בעוד אזורים צפופים בלתי חדירים.'
