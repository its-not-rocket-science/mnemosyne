- id: zh_proverb_tradition_三个臭皮匠_顶个诸葛亮_89e20df1
  language: zh
  canonical_reference: 三个臭皮匠，顶个诸葛亮
  reference_type: proverb_tradition
  surface_patterns:
  - 三个臭皮匠，顶个诸葛亮
  - 三个臭皮匠，赛过诸葛亮
  - 三个臭皮匠，合成一个诸葛亮
  short_explanation: This proverb means that collective wisdom can surpass that of a single brilliant
    individual, emphasizing teamwork. It references Zhuge Liang, a famous strategist from the Three Kingdoms
    period.
  i18n_explanations:
    en: This proverb means that collective wisdom can surpass that of a single brilliant individual, emphasizing
      teamwork. It references Zhuge Liang, a famous strategist from the Three Kingdoms period.
    es: Este proverbio significa que la sabiduría colectiva puede superar a la de un solo individuo brillante,
      enfatizando el trabajo en equipo. Hace referencia a Zhuge Liang, un famoso estratega del período
      de los Tres Reinos.
    fr: Ce proverbe signifie que la sagesse collective peut surpasser celle d'un seul individu brillant,
      en mettant l'accent sur le travail d'équipe. Il fait référence à Zhuge Liang, un célèbre stratège
      de la période des Trois Royaumes.
    de: Dieses Sprichwort bedeutet, dass kollektive Weisheit die eines einzelnen brillanten Individuums
      übertreffen kann, und betont Teamarbeit. Es bezieht sich auf Zhuge Liang, einen berühmten Strategen
      der Zeit der Drei Reiche.
    it: Questo proverbio significa che la saggezza collettiva può superare quella di un singolo individuo
      brillante, enfatizzando il lavoro di squadra. Fa riferimento a Zhuge Liang, un famoso stratega del
      periodo dei Tre Regni.
    pt: Este provérbio significa que a sabedoria coletiva pode superar a de um único indivíduo brilhante,
      enfatizando o trabalho em equipe. Faz referência a Zhuge Liang, um famoso estrategista do período
      dos Três Reinos.
    ru: Эта пословица означает, что коллективная мудрость может превзойти мудрость одного блестящего человека,
      подчеркивая командную работу. В ней упоминается Чжугэ Лян, знаменитый стратег эпохи Троецарствия.
    ja: このことわざは、集団の知恵が一人の優秀な個人の知恵を上回る可能性があることを意味し、チームワークを強調しています。三国時代の有名な戦略家、諸葛亮を引用しています。
    zh: 这个俗语的意思是集体的智慧可以超过一个聪明的人，强调团队合作。它指的是三国时期著名的战略家诸葛亮。
    ar: يعني هذا المثل أن الحكمة الجماعية يمكن أن تفوق حكمة الفرد اللامع، مع التركيز على العمل الجماعي.
      ويشير إلى تشوغ ليانغ، الاستراتيجي الشهير من فترة الممالك الثلاث.
    he: פתגם זה אומר שהחוכמה הקולקטיבית יכולה לעלות על חוכמתו של אדם מבריק יחיד, תוך הדגשת עבודת צוות.
      הוא מתייחס לג'וגה ליאנג, אסטרטג מפורסם מתקופת שלוש הממלכות.
