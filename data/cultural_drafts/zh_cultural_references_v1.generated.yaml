    one's back and exhaust one's strength'. It denotes utter devotion and self-sacrifice to a cause.
  i18n_explanations:
    en: From Zhuge Liang's 'Chu Shi Biao' (Memorial on Sending Out the Troops), meaning 'bend one's back
      and exhaust one's strength'. It denotes utter devotion and self-sacrifice to a cause.
    es: De la 'Memorial sobre el envío de tropas' de Zhuge Liang, que significa 'doblar la espalda y agotar
      las fuerzas'. Denota devoción total y autosacrificio por una causa.
    fr: Du 'Mémorial sur l'envoi des troupes' de Zhuge Liang, signifiant 'courber le dos et épuiser sa
      force'. Il dénote un dévouement total et un sacrifice de soi pour une cause.
    de: Aus Zhuge Liangs 'Denkschrift zur Entsendung der Truppen', was 'den Rücken beugen und seine Kräfte
      erschöpfen' bedeutet. Es bezeichnet völlige Hingabe und Selbstaufopferung für eine Sache.
    it: Dal 'Memoriale sull'invio delle truppe' di Zhuge Liang, che significa 'piegare la schiena ed esaurire
      le forze'. Denota totale devozione e sacrificio di sé per una causa.
    pt: Do 'Memorial sobre o envio de tropas' de Zhuge Liang, significando 'curvar as costas e exaurir
      as forças'. Denota devoção total e auto sacrifício por uma causa.
    ru: Из «Докладной записки об отправке войск» Чжугэ Ляна, означающей «согнуть спину и истощить свои
      силы». Обозначает полную преданность и самопожертвование ради дела.
    ja: 諸葛亮の『出師表』に由来し、「背を曲げて力を尽くす」という意味。ある大義に対する完全な献身と自己犠牲を表す。
    zh: 出自诸葛亮的《出师表》，意为“弯下后背，耗尽力量”，表示对事业的完全奉献和自我牺牲。
    ar: من 'عريضة إرسال القوات' لتشوغ ليانغ، ومعناها 'ثني الظهر واستنفاد القوة'. تدل على التفاني الكامل
      والتضحية بالنفس من أجل قضية.
    he: מתוך 'המזכר על שליחת הכוחות' של ג'וגה ליאנג, שפירושו 'לכופף את הגב ולמצות את כוחו'. מסמל מסירות
      מוחלטת והקרבה עצמית למען מטרה.
