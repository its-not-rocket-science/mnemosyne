  short_explanation: A phrase meaning 'utter devotion to serve the country', originating from the story
    of the Song dynasty general Yue Fei, who had the characters tattooed on his back by his mother as
    a reminder of his duty. It symbolizes extreme loyalty and patriotism in Chinese culture.
  i18n_explanations:
    en: A phrase meaning 'utter devotion to serve the country', originating from the story of the Song
      dynasty general Yue Fei, who had the characters tattooed on his back by his mother as a reminder
      of his duty. It symbolizes extreme loyalty and patriotism in Chinese culture.
    es: Una frase que significa 'devoción absoluta para servir al país', originada en la historia del
      general de la dinastía Song, Yue Fei, quien tenía los caracteres tatuados en su espalda por su madre
      como recordatorio de su deber. Simboliza la lealtad extrema y el patriotismo en la cultura china.
    fr: Une phrase signifiant 'dévotion totale à servir le pays', provenant de l'histoire du général Yue
      Fei de la dynastie Song, qui avait les caractères tatoués sur son dos par sa mère pour lui rappeler
      son devoir. Elle symbolise la loyauté extrême et le patriotisme dans la culture chinoise.
    de: Ein Ausdruck, der 'absolute Hingabe, dem Land zu dienen' bedeutet, stammt aus der Geschichte des
      Generals Yue Fei der Song-Dynastie, der die Schriftzeichen von seiner Mutter als Erinnerung an seine
      Pflicht auf den Rücken tätowiert bekam. Es symbolisiert extreme Loyalität und Patriotismus in der
      chinesischen Kultur.
    it: Una frase che significa 'devozione assoluta per servire il paese', originata dalla storia del
      generale Yue Fei della dinastia Song, che aveva i caratteri tatuati sulla schiena da sua madre come
      promemoria del suo dovere. Simboleggia la lealtà estrema e il patriottismo nella cultura cinese.
    pt: Uma frase que significa 'devoção total para servir o país', originada da história do general Yue
      Fei da dinastia Song, que tinha os caracteres tatuados em suas costas por sua mãe como lembrete
      de seu dever. Simboliza lealdade extrema e patriotismo na cultura chinesa.
    ru: Фраза, означающая 'абсолютная преданность служению стране', происходит из истории генерала династии
      Сун Юэ Фэя, которому мать вытатуировала эти иероглифы на спине как напоминание о его долге. Она
      символизирует крайнюю лояльность и патриотизм в китайской культуре.
    ja: 「精忠報国」は、宋代の将軍・岳飛が母から背中に刻まれた文字で、「国に仕える絶対の献身」を意味する。中国文化における極度の忠誠心と愛国心を象徴する。
    zh: 一个意为‘全心全意报效国家’的短语，源自宋代将军岳飞的故事，他的母亲将这四个字刺在他的背上以提醒他的职责。它象征着中国文化中极端的忠诚和爱国主义。
    ar: عبارة تعني 'الإخلاص المطلق لخدمة البلاد'، نشأت من قصة الجنرال يوي فاي من أسرة سونغ، الذي نقش والدته
      الحروف على ظهره لتذكيره بواجبه. إنها ترمز إلى الولاء الشديد والوطنية في الثقافة الصينية.
    he: ביטוי שמשמעותו 'מסירות מוחלטת לשרת את המדינה', שמקורו בסיפורו של הגנרל יואה פיי משושלת סונג, אשר
