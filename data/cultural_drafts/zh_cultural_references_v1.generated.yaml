    ja: 1911年に清王朝を打倒し、中国における2000年以上にわたる帝国支配を終わらせた革命。孫文ら革命家によって主導され、中華民国を樹立した。
    zh: 1911年推翻清朝、结束中国两千多年帝制的革命。由孙中山等革命党人领导，建立了中华民国。
