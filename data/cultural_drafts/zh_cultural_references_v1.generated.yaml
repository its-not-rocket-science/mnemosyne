      popular ou de baixo nível, em oposição à arte erudita.
    ru: Первоначально народная песня из древнего царства Чу, этот термин теперь обозначает популярную
      или низкую культуру, в отличие от высокого искусства.
    ja: もともとは古代楚の国の民謡でしたが、現在この用語は高尚な芸術とは対照的に、大衆文化や低俗な文化を指します。
    zh: 原为古代楚国的民歌，现指通俗文化或低俗文化，以区别于高雅艺术。
    ar: في الأصل أغنية شعبية من ولاية تشو القديمة، يشير هذا المصطلح الآن إلى الثقافة الشعبية أو الثقافة
