      round sun setting over the long river, symbolizing the vastness and beauty of the frontier.
    es: Este pareado del poema de Wang Wei describe una columna de humo recta en el vasto desierto y el
      sol redondo que se pone sobre el largo río, simbolizando la inmensidad y belleza de la frontera.
    fr: Ce distique du poème de Wang Wei dépeint une fumée droite dans le vaste désert et le soleil rond
      se couchant sur le long fleuve, symbolisant l'immensité et la beauté de la frontière.
    de: Dieses Verspaar aus Wang Weis Gedicht zeigt eine gerade Rauchsäule in der weiten Wüste und die
      runde Sonne, die über dem langen Fluss untergeht, und symbolisiert die Weite und Schönheit der Grenze.
    it: Questo distico della poesia di Wang Wei raffigura un pennacchio di fumo dritto nel vasto deserto
      e il sole rotondo che tramonta sul lungo fiume, simboleggiando la vastità e la bellezza della frontiera.
    pt: Este dístico do poema de Wang Wei retrata uma coluna de fumaça reta no vasto deserto e o sol redondo
      se pondo sobre o longo rio, simbolizando a imensidão e a beleza da fronteira.
    ru: Это двустишие из стихотворения Ван Вэя изображает прямой столб дыма в бескрайней пустыне и круглое
