      of friendship and learning in Confucian culture.
    es: Un dicho de Confucio que expresa alegría por tener amigos que vienen de lejos, reflejando la importancia
      de la amistad y el aprendizaje en la cultura confuciana.
    fr: Un dicton de Confucius exprimant la joie d'avoir des amis venus de loin, reflétant l'importance
      de l'amitié et de l'apprentissage dans la culture confucéenne.
    de: Ein Spruch von Konfuzius, der Freude darüber ausdrückt, Freunde von weit her zu Besuch zu haben,
      was die Bedeutung von Freundschaft und Lernen in der konfuzianischen Kultur widerspiegelt.
    it: Un detto di Confucio che esprime gioia per l'arrivo di amici da lontano, riflettendo l'importanza
      dell'amicizia e dell'apprendimento nella cultura confuciana.
    pt: Um ditado de Confúcio que expressa alegria por ter amigos visitando de longe, refletindo a importância
      da amizade e do aprendizado na cultura confuciana.
    ru: Изречение Конфуция, выражающее радость от того, что друзья приезжают издалека, отражающее важность
      дружбы и обучения в конфуцианской культуре.
    ja: 孔子の言葉で、遠方から友人が訪れる喜びを表し、儒教文化における友情と学びの重要性を反映している。
    zh: 孔子的一句名言，表达对远方朋友来访的喜悦，反映了儒文化中友谊与学习的重要性。
    ar: قول منسوب إلى كونفوشيوس يعبر عن الفرح بقدوم الأصدقاء من بعيد، مما يعكس أهمية الصداقة والتعلم في
      الثقافة الكونفوشيوسية.
    he: אמרה מפי קונפוציוס המבטאת שמחה על ביקור חברים מרחוק, המשקפת את חשיבות הידידות והלמידה בתרבות הקונפוציאנית.
