- id: zh_cultural_reference_玄武门之变_f6a3b72f
  language: zh
  canonical_reference: 玄武门之变
  reference_type: cultural_reference
  surface_patterns:
  - 玄武门之变
  - 玄武门事变
  short_explanation: A coup in 626 AD where Prince Li Shimin killed his brothers and forced his father
    to abdicate, becoming Emperor Taizong, marking the start of a prosperous era.
  i18n_explanations:
    en: A coup in 626 AD where Prince Li Shimin killed his brothers and forced his father to abdicate,
      becoming Emperor Taizong, marking the start of a prosperous era.
    es: Un golpe de estado en el año 626 d.C. donde el príncipe Li Shimin mató a sus hermanos y obligó
      a su padre a abdicar, convirtiéndose en el emperador Taizong, marcando el inicio de una era próspera.
    fr: Un coup d'État en 626 ap. J.-C. où le prince Li Shimin tua ses frères et força son père à abdiquer,
      devenant l'empereur Taizong, marquant le début d'une ère prospère.
    de: Ein Staatsstreich im Jahr 626 n. Chr., bei dem Prinz Li Shimin seine Brüder tötete und seinen
      Vater zur Abdankung zwang, um Kaiser Taizong zu werden, was den Beginn einer blühenden Ära markierte.
    it: Un colpo di stato nel 626 d.C. in cui il principe Li Shimin uccise i suoi fratelli e costrinse
      suo padre ad abdicare, diventando l'imperatore Taizong, segnando l'inizio di un'era prospera.
    pt: Um golpe em 626 d.C. onde o príncipe Li Shimin matou seus irmãos e forçou seu pai a abdicar, tornando-se
      o imperador Taizong, marcando o início de uma era próspera.
    ru: Государственный переворот в 626 году н.э., когда принц Ли Шиминь убил своих братьев и заставил
      отца отречься от престола, став императором Тайцзуном, что положило начало процветающей эпохе.
    ja: 626年、李熙民（りきみん）皇子が兄弟を殺害し、父に退位を強いて太宗皇帝となり、繁栄の時代の始まりとなったクーデター。
    zh: 公元626年的一场政变，王子李世民杀死兄弟并迫使父亲退位，成为唐太宗，标志着繁荣时代的开始。
