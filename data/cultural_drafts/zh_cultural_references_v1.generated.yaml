      se disponía a asesinar al Rey de Qin, simbolizando la determinación heroica y el sacrificio.
    fr: Un vers d'un poème attribué à Jing Ke, décrivant l'atmosphère solennelle et tragique alors qu'il
      partait assassiner le roi de Qin, symbolisant la résolution héroïque et le sacrifice.
    de: Ein Vers aus einem Gedicht, das Jing Ke zugeschrieben wird, beschreibt die feierliche und tragische
