- id: zh_literary_reference_两情若是久长时_又岂在朝朝暮暮_16bee698
  language: zh
  canonical_reference: 两情若是久长时，又岂在朝朝暮暮
  reference_type: literary_reference
  surface_patterns:
  - 两情若是久长时，又岂在朝朝暮暮
  - 两情若是久长时
  - 岂在朝朝暮暮
  short_explanation: If love between two hearts lasts forever, why need they be together day and night?
    This Song dynasty verse redefines romantic love as transcendent and enduring, not dependent on physical
    proximity.
  i18n_explanations:
    en: If love between two hearts lasts forever, why need they be together day and night? This Song dynasty
      verse redefines romantic love as transcendent and enduring, not dependent on physical proximity.
    es: Si el amor entre dos corazones dura para siempre, ¿por qué necesitan estar juntos día y noche?
      Este verso de la dinastía Song redefine el amor romántico como trascendente y duradero, no dependiente
      de la proximidad física.
    fr: Si l'amour entre deux cœurs dure éternellement, pourquoi doivent-ils être ensemble jour et nuit?
      Ce vers de la dynastie Song redéfinit l'amour romantique comme transcendant et durable, non dépendant
      de la proximité physique.
    de: Wenn die Liebe zwischen zwei Herzen ewig währt, warum müssen sie Tag und Nacht zusammen sein?
      Dieser Vers aus der Song-Dynastie definiert romantische Liebe als transzendent und beständig, nicht
      abhängig von körperlicher Nähe.
    it: Se l'amore tra due cuori dura per sempre, perché devono stare insieme giorno e notte? Questo verso
      della dinastia Song ridefinisce l'amore romantico come trascendente e duraturo, non dipendente dalla
      vicinanza fisica.
    pt: Se o amor entre dois corações dura para sempre, por que precisam estar juntos dia e noite? Este
      verso da dinastia Song redefine o amor romântico como transcendente e duradouro, não dependente
      da proximidade física.
    ru: Если любовь между двумя сердцами длится вечно, зачем им быть вместе день и ночь? Этот стих династии
      Сун переопределяет романтическую любовь как трансцендентную и прочную, не зависящую от физической
      близости.
    ja: 二つの心の愛が永遠に続くなら、どうして朝な夕なに一緒にいる必要があるだろうか。この宋の詩は、ロマンチックな愛を、物理的な近さに依存しない、超越的で永続的なものとして再定義している。
    zh: 两情若是久长时，又岂在朝朝暮暮。这句宋词重新定义了浪漫爱情，认为它是超越时空、持久不变的，不依赖于朝夕相处。
    ar: إذا كان الحب بين قلبين يدوم إلى الأبد، فلماذا يحتاجان إلى أن يكونا معًا ليل نهار؟ هذا البيت من
      عصر سونغ يعيد تعريف الحب الرومانسي على أنه متسامي ودائم، لا يعتمد على القرب الجسدي.
    he: אם האהבה בין שני לבבות נמשכת לנצח, מדוע הם צריכים להיות יחד יום ולילה? שורה זו משושלת סונג מגדירה
      מחדש אהבה רומנטית כנשגבת ומתמשכת, שאינה תלויה בקרבה פיזית.
