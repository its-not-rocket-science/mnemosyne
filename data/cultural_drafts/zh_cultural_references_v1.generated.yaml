- id: zh_proverb_tradition_吃得苦中苦_方为人上人_9901c973
  language: zh
  canonical_reference: 吃得苦中苦，方为人上人
  reference_type: proverb_tradition
  surface_patterns:
  - 吃得苦中苦
  - 方为人上人
  - 吃得苦中苦，方为人上人
  - 吃得苦中苦，方做的人上人
  short_explanation: This proverb conveys that only by enduring the hardest hardships can one rise above
    others; it is a popular motivational saying encouraging perseverance and hard work.
  i18n_explanations:
    en: This proverb conveys that only by enduring the hardest hardships can one rise above others; it
      is a popular motivational saying encouraging perseverance and hard work.
    es: Este proverbio transmite que solo soportando las dificultades más duras se puede superar a los
      demás; es un dicho motivacional popular que fomenta la perseverancia y el trabajo duro.
    fr: Ce proverbe signifie que ce n'est qu'en endurant les épreuves les plus difficiles que l'on peut
      s'élever au-dessus des autres ; c'est un dicton motivant populaire encourageant la persévérance
      et le travail acharné.
    de: Dieses Sprichwort besagt, dass man nur durch das Ertragen der schwersten Härten über andere hinauswachsen
      kann; es ist eine beliebte motivierende Redewendung, die Ausdauer und harte Arbeit fördert.
    it: Questo proverbio esprime che solo sopportando le difficoltà più dure si può elevarsi al di sopra
      degli altri; è un detto motivazionale popolare che incoraggia la perseveranza e il duro lavoro.
    pt: Este provérbio transmite que somente suportando as dificuldades mais duras se pode superar os
      outros; é um ditado motivacional popular que incentiva a perseverança e o trabalho árduo.
    ru: Эта пословица гласит, что только перенеся самые тяжелые испытания, можно возвыситься над другими;
      это популярное мотивационное высказывание, поощряющее настойчивость и упорный труд.
    ja: このことわざは、最も厳しい苦労を耐え抜いて初めて人より上に立てるという意味で、忍耐と努力を促す人気の格言です。
    zh: 这句谚语的意思是只有忍受最艰苦的磨难才能超越他人；这是一句流行的励志谚语，鼓励坚持不懈和努力工作。
    ar: يعبر هذا المثل عن أنه فقط بتحمل أصعب المصاعب يمكن للمرء أن يرتفع فوق الآخرين؛ وهو قول تحفيزي شائع
      يشجع على المثابرة والعمل الجاد.
    he: פתגם זה מבטא שרק על ידי סבל הקשיים הקשים ביותר ניתן להתעלות מעל אחרים; זהו אמרה מוטיבציונית פופולרית
      המעודדת התמדה ועבודה קשה.
