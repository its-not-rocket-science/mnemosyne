  short_explanation: A 103-day reform movement in 1898 initiated by the Qing emperor Guangxu and reformers
    like Kang Youwei, aiming to modernize China's political, educational, and military systems. It was
    crushed by Empress Dowager Cixi, leading to the execution of six reformers.
  i18n_explanations:
    en: A 103-day reform movement in 1898 initiated by the Qing emperor Guangxu and reformers like Kang
      Youwei, aiming to modernize China's political, educational, and military systems. It was crushed
      by Empress Dowager Cixi, leading to the execution of six reformers.
    es: Un movimiento de reforma de 103 días en 1898 iniciado por el emperador Guangxu de la dinastía
      Qing y reformistas como Kang Youwei, con el objetivo de modernizar los sistemas políticos, educativos
      y militares de China. Fue aplastado por la emperatriz viuda Cixi, lo que llevó a la ejecución de
      seis reformistas.
    fr: Un mouvement de réforme de 103 jours en 1898 initié par l'empereur Guangxu de la dynastie Qing
      et des réformateurs comme Kang Youwei, visant à moderniser les systèmes politique, éducatif et militaire
      de la Chine. Il a été écrasé par l'impératrice douairière Cixi, entraînant l'exécution de six réformateurs.
    de: Eine 103-tägige Reformbewegung im Jahr 1898, initiiert vom Qing-Kaiser Guangxu und Reformern wie
      Kang Youwei, mit dem Ziel, Chinas politisches, Bildungs- und Militärsystem zu modernisieren. Sie
      wurde von der Kaiserinwitwe Cixi niedergeschlagen, was zur Hinrichtung von sechs Reformern führte.
    it: Un movimento di riforma di 103 giorni nel 1898 iniziato dall'imperatore Guangxu della dinastia
      Qing e da riformatori come Kang Youwei, mirato a modernizzare i sistemi politici, educativi e militari
      della Cina. Fu represso dall'imperatrice vedova Cixi, portando all'esecuzione di sei riformatori.
    pt: Um movimento de reforma de 103 dias em 1898 iniciado pelo imperador Guangxu da dinastia Qing e
      reformadores como Kang Youwei, visando modernizar os sistemas político, educacional e militar da
      China. Foi esmagado pela imperatriz viúva Cixi, levando à execução de seis reformadores.
    ru: 103-дневное реформаторское движение 1898 года, начатое императором Гуансюем из династии Цин и
      реформаторами, такими как Кан Ювэй, с целью модернизации политической, образовательной и военной
      систем Китая. Оно было подавлено императрицей Цыси, что привело к казни шести реформаторов.
    ja: 1898年に清の光緒帝と康有為らの改革派が開始した103日間の改革運動で、中国の政治、教育、軍事制度の近代化を目指した。西太后によって鎮圧され、六人の改革者が処刑された。
    zh: 1898年由清朝光绪皇帝和康有为等改革派发起的为期103天的改革运动，旨在实现中国政治、教育、军事体制的现代化。被慈禧太后镇压，导致六位改革者被处决。
    ar: حركة إصلاحية استمرت 103 أيام في عام 1898 بدأها الإمبراطور غوانغشو من أسرة تشينغ والإصلاحيين مثل
      كانغ يويوي، بهدف تحديث الأنظمة السياسية والتعليمية والعسكرية في الصين. تم قمعها من قبل الإمبراطورة
      الأرملة تسيشي، مما أدى إلى إعدام ستة من الإصلاحيين.
    he: תנועת רפורמה בת 103 ימים בשנת 1898 שיזם הקיסר גואנגשו משושלת צ'ינג ורפורמים כמו קאנג יוווי, במטרה
      למודרניזציה של המערכות הפוליטיות, החינוכיות והצבאיות של סין. היא נמחצה על ידי הקיסרית האלמנה צישי,
