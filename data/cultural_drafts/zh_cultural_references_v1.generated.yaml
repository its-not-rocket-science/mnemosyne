  - 老老幼幼
  short_explanation: From Mencius, it means 'Treat the elders of your own family as elders, and extend
    that to the elders of others.' It advocates for universal respect and care based on family values.
  i18n_explanations:
    en: From Mencius, it means 'Treat the elders of your own family as elders, and extend that to the
      elders of others.' It advocates for universal respect and care based on family values.
    es: De Mencio, significa 'Trata a los ancianos de tu propia familia como ancianos, y extiende eso
      a los ancianos de los demás'. Aboga por el respeto y cuidado universales basados en los valores
      familiares.
    fr: De Mencius, cela signifie 'Traitez les aînés de votre propre famille comme des aînés, et étendez
      cela aux aînés des autres'. Il prône le respect et les soins universels fondés sur les valeurs familiales.
    de: Von Menzius, es bedeutet 'Behandele die Älteren deiner eigenen Familie als Ältere und erweitere
      das auf die Älteren anderer'. Es befürwortet universellen Respekt und Fürsorge, die auf Familienwerten
      basieren.
    it: Da Mencio, significa 'Tratta gli anziani della tua famiglia come anziani, e estendi ciò agli anziani
      degli altri'. Sostiene il rispetto e la cura universali basati sui valori familiari.
    pt: De Mêncio, significa 'Trate os idosos da sua própria família como idosos, e estenda isso aos idosos
      dos outros'. Defende o respeito e cuidado universais baseados nos valores familiares.
    ru: От Мэн-цзы, это означает 'Относись к старейшинам своей семьи как к старейшинам, и распространи
      это на старейшин других'. Это выступает за всеобщее уважение и заботу, основанные на семейных ценностях.
    ja: 孟子からで、「自分の家族の年長者を年長者として敬い、それを他人の年長者にも広げよ」という意味。家族の価値観に基づいた普遍的な尊敬と配慮を提唱しています。
    zh: 出自《孟子》，意思是“尊敬自己的长辈，从而推广到尊敬别人的长辈”。它倡导基于家庭价值观的普遍尊重和关怀。
    ar: من كتاب منسيوس، ويعني 'عامل كبار السن في أسرتك ككبار، ووسع ذلك ليشمل كبار السن من الآخرين'. يدعو
