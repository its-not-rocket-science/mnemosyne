- id: zh_classical_or_scriptural_allusion_梨园子弟_2e7424a3
  language: zh
  canonical_reference: 梨园子弟
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 梨园子弟
  - 梨园弟子
  - 梨园
  short_explanation: 原指唐玄宗在梨园训练的音乐歌舞艺人，后泛指戏曲演员。
  i18n_explanations:
    en: Originally referred to the musicians and dancers trained by Emperor Xuanzong in the Pear Garden,
      later broadly refers to traditional opera performers.
    es: Originalmente se refería a los músicos y bailarines entrenados por el Emperador Xuanzong en el
      Jardín de Peras, luego se refiere ampliamente a los artistas de ópera tradicional.
    fr: Faisait initialement référence aux musiciens et danseurs formés par l'empereur Xuanzong dans le
      Jardin des Poires, désormais désigne largement les artistes d'opéra traditionnel.
    de: Ursprünglich bezog es sich auf die Musiker und Tänzer, die von Kaiser Xuanzong im Birnengarten
      ausgebildet wurden, später allgemein für traditionelle Opernkünstler.
    it: Originariamente si riferiva ai musicisti e ballerini addestrati dall'imperatore Xuanzong nel Giardino
      delle Pere, in seguito indica genericamente gli artisti dell'opera tradizionale.
    pt: Originalmente se referia aos músicos e dançarinos treinados pelo Imperador Xuanzong no Jardim
      das Peras, posteriormente passou a se referir amplamente aos artistas de ópera tradicional.
    ru: Первоначально относился к музыкантам и танцорам, обученным императором Сюаньцзуном в Грушевом
      саду, позднее стал обобщенно обозначать исполнителей традиционной оперы.
    ja: 元は唐の玄宗皇帝が梨園で訓練した音楽や舞踊の芸人を指し、後に伝統演劇の役者全般を指すようになった。
    zh: 原指唐玄宗在梨园训练的音乐歌舞艺人，后泛指戏曲演员。
