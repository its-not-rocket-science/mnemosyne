  short_explanation: A Confucian virtue teaching to respect elders and care for children as one would
    for their own, promoting universal love and social harmony.
  i18n_explanations:
    en: A Confucian virtue teaching to respect elders and care for children as one would for their own,
      promoting universal love and social harmony.
    es: Una virtud confuciana que enseña a respetar a los mayores y cuidar a los niños como si fueran
      propios, promoviendo el amor universal y la armonía social.
    fr: Une vertu confucéenne enseignant à respecter les aînés et à prendre soin des enfants comme on
      le ferait pour les siens, favorisant l'amour universel et l'harmonie sociale.
    de: Eine konfuzianische Tugend, die lehrt, die Älteren zu respektieren und sich um Kinder zu kümmern,
      wie man es für die eigenen tun würde, und fördert universelle Liebe und soziale Harmonie.
    it: Una virtù confuciana che insegna a rispettare gli anziani e prendersi cura dei bambini come si
      farebbe per i propri, promuovendo l'amore universale e l'armonia sociale.
    pt: Uma virtude confuciana que ensina a respeitar os mais velhos e cuidar das crianças como se fossem
      seus, promovendo o amor universal e a harmonia social.
    ru: Конфуцианская добродетель, которая учит уважать старших и заботиться о детях, как о своих собственных,
      способствуя всеобщей любви и социальной гармонии.
    ja: 年長者を自分のように敬い、子供を自分のように慈しむことを教える儒教の美徳。普遍的な愛と社会の調和を促進する。
    zh: 儒家美德，提倡尊老爱幼如同对待自己的家人，促进博爱与社会和谐。
    ar: فضيلة كونفوشيوسية تعلم احترام كبار السن ورعاية الأطفال كما يفعل المرء لأهله، وتعزز الحب العالمي
      والانسجام الاجتماعي.
    he: סגולה קונפוציאנית המלמדת לכבד זקנים ולדאוג לילדים כמו לשכמותך, מקדמת אהבה אוניברסלית והרמוניה
      חברתית.
