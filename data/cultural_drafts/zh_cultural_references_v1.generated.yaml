- id: zh_cultural_reference_蚕头燕尾_234065c6
  language: zh
  canonical_reference: 蚕头燕尾
  reference_type: cultural_reference
  surface_patterns:
  - 蚕头燕尾
  short_explanation: A stylistic feature in Chinese clerical script (lishu) where horizontal strokes start
    thick like a silkworm's head and end with a sharp, upward flick like a swallow's tail. It is a key
    characteristic of the script.
  i18n_explanations:
    en: A stylistic feature in Chinese clerical script (lishu) where horizontal strokes start thick like
      a silkworm's head and end with a sharp, upward flick like a swallow's tail. It is a key characteristic
      of the script.
    es: Una característica estilística en la escritura clerical china (lishu) donde los trazos horizontales
      comienzan gruesos como la cabeza de un gusano de seda y terminan con un movimiento ascendente y
      afilado como la cola de una golondrina. Es una característica clave del script.
    fr: Une caractéristique stylistique dans l’écriture cléricale chinoise (lishu) où les traits horizontaux
      commencent épais comme une tête de ver à soie et se terminent par un coup sec et ascendant comme
      une queue d’hirondelle. C’est une caractéristique clé de l’écriture.
    de: Ein stilistisches Merkmal in der chinesischen Kanzleischrift (Lishu), bei dem horizontale Striche
      dick wie ein Seidenraupenkopf beginnen und mit einem scharfen, aufwärts gerichteten Schnipp wie
      eine Schwalbenschwanz enden. Es ist ein Hauptmerkmal der Schrift.
    it: Una caratteristica stilistica nella scrittura clericale cinese (lishu) in cui i tratti orizzontali
      iniziano spessi come la testa di un baco da seta e terminano con un colpo secco e ascendente come
      la coda di una rondine. È una caratteristica chiave della scrittura.
    pt: Uma característica estilística na escrita clerical chinesa (lishu) onde os traços horizontais
      começam grossos como a cabeça de um bicho-da-seda e terminam com um movimento ascendente e afiado
      como a cauda de uma andorinha. É uma característica chave do script.
    ru: Стилистическая особенность в китайском официальном письме (лишу), где горизонтальные штрихи начинаются
      толстыми, как голова шелкопряда, и заканчиваются резким восходящим взмахом, как хвост ласточки.
      Это ключевая характеристика письма.
    ja: 中国の隷書における様式的特徴で、横画が蚕の頭のように太く始まり、燕の尾のように鋭く跳ね上がって終わる。隷書の重要な特徴である。
    zh: 中国隶书的一种风格特征，横画起笔如蚕头般粗重，收笔如燕尾般尖锐上翘。是该字体的关键特征。
    ar: سمة أسلوبية في الخط الكتابي الصيني (ليشو) حيث تبدأ الضربات الأفقية سميكة مثل رأس دودة القز وتنتهي
      بحركة حادة صاعدة مثل ذيل السنونو. إنها خاصية رئيسية للخط.
    he: תכונה סגנונית בכתב הקליגרפי הסיני (לישו) שבה משיכות אופקיות מתחילות עבות כמו ראש של תולעת משי
      ומסתיימות בתנועה חדה כלפי מעלה כמו זנב של סנונית. זהו מאפיין מרכזי של הכתב.
