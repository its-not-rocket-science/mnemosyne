    ja: 王維の詩のこの対句は、広大な砂漠に立つまっすぐな煙と、長い川に沈む丸い太陽を描き、辺境の広大さと美しさを象徴している。
    zh: 王维诗句描绘了广阔沙漠中的一缕孤烟直上，长河上圆圆的落日，象征边塞的壮阔与美丽。
    ar: هذا البيت من قصيدة وانغ وي يصور عمود دخان مستقيم في الصحراء الشاسعة والشمس المستديرة تغرب فوق
      النهر الطويل، مما يرمز إلى اتساع وجمال الحدود.
    he: צמד השורות הזה משירו של וואנג ווי מתאר עמוד עשן ישר במדבר העצום והשמש העגולה שוקעת מעל הנהר הארוך,
