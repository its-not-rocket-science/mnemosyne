- id: zh_cultural_reference_压轴戏_e7cf3df0
  language: zh
  canonical_reference: 压轴戏
  reference_type: cultural_reference
  surface_patterns:
  - 压轴戏
  - 压轴
  - 压轴大戏
  short_explanation: 原指京剧演出中倒数第二出戏，现多指最后一场或最精彩的部分，常用于比喻高潮或压场之作。
  i18n_explanations:
    en: Originally referred to the second-to-last play in a Peking opera performance, now often refers
      to the final act or the most exciting part, used metaphorically for a climax or showstopper.
    es: Originalmente se refería a la penúltima obra en una representación de ópera de Pekín, ahora suele
      referirse al acto final o la parte más emocionante, usado metafóricamente para un clímax o número
      estelar.
    fr: Faisait initialement référence à l'avant-dernière pièce d'un spectacle d'opéra de Pékin, désormais
      souvent utilisé pour désigner l'acte final ou la partie la plus excitante, employé métaphoriquement
      pour un point culminant ou un clou du spectacle.
    de: Ursprünglich bezog es sich auf das vorletzte Stück einer Peking-Oper-Aufführung, heute oft für
      den letzten Akt oder den aufregendsten Teil, metaphorisch für einen Höhepunkt oder eine Glanznummer.
    it: Originariamente si riferiva alla penultima opera in una rappresentazione dell'opera di Pechino,
      ora spesso indica l'atto finale o la parte più emozionante, usato metaforicamente per un climax
      o un numero clou.
    pt: Originalmente se referia à penúltima peça em uma apresentação de ópera de Pequim, agora frequentemente
      se refere ao ato final ou à parte mais emocionante, usado metaforicamente para um clímax ou número
      de destaque.
    ru: Первоначально обозначал предпоследнюю пьесу в представлении пекинской оперы, теперь часто обозначает
      финальный акт или самую захватывающую часть, используется метафорически для кульминации или гвоздя
      программы.
    ja: 元は京劇の公演で最後から2番目の演目を指したが、現在は最終幕や最も盛り上がる部分を指し、クライマックスや圧巻の比喩としてよく使われる。
    zh: 原指京剧演出中倒数第二出戏，现多指最后一场或最精彩的部分，常用于比喻高潮或压场之作。
    ar: كان يشير في الأصل إلى المسرحية قبل الأخيرة في عرض أوبرا بكين، ويشير الآن غالبًا إلى الفصل الأخير
      أو الجزء الأكثر إثارة، ويستخدم مجازًا للذروة أو العمل الختامي المبهر.
    he: במקור התייחס להצגה השנייה מהסוף בהופעת אופרה של בייג'ינג, כיום מתייחס לעתים קרובות למערכה האחרונה
