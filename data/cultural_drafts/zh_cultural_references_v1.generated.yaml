    ar: سطر شهير يصف جمال الغروب حيث تطير الغيوم الوردية المتساقطة مع بطة برية وحيدة، ويمتزج ماء الخريف
      بالسماء الواسعة.
    he: שורה מפורסמת המתארת את יופי השקיעה, שבה עננים ורודים נופלים עפים יחד עם ברווז פראי בודד, ומי הסתיו
      מתמזגים עם השמים הרחבים.
