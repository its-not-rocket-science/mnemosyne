  short_explanation: As Heaven operates vigorously, the noble person strives to strengthen themselves
    unceasingly. From the Yijing's Qian hexagram commentary, it encourages moral self-cultivation and
    perseverance.
  i18n_explanations:
    en: As Heaven operates vigorously, the noble person strives to strengthen themselves unceasingly.
      From the Yijing's Qian hexagram commentary, it encourages moral self-cultivation and perseverance.
    es: Así como el Cielo opera vigorosamente, la persona noble se esfuerza por fortalecerse incesantemente.
      Del comentario del hexagrama Qian del Yijing, fomenta la autodisciplina moral y la perseverancia.
    fr: Comme le Ciel fonctionne vigoureusement, la personne noble s'efforce de se renforcer sans cesse.
      Du commentaire de l'hexagramme Qian du Yijing, il encourage l'autocultivation morale et la persévérance.
    de: Wie der Himmel kraftvoll wirkt, strebt der edle Mensch danach, sich unaufhörlich zu stärken. Aus
      dem Kommentar zum Qian-Hexagramm des Yijing ermutigt es zur moralischen Selbstkultivierung und Ausdauer.
    it: Come il Cielo opera vigorosamente, la persona nobile si sforza di rafforzarsi incessantemente.
      Dal commentario dell'esagramma Qian dello Yijing, incoraggia l'autocoltivazione morale e la perseveranza.
    pt: Assim como o Céu opera vigorosamente, a pessoa nobre se esforça para se fortalecer incessantemente.
      Do comentário do hexagrama Qian do Yijing, incentiva a autocultivação moral e a perseverança.
    ru: Как Небо действует энергично, благородный человек стремится неустанно укреплять себя. Из комментария
      к гексаграмме Цянь «И цзина» это поощряет моральное самосовершенствование и настойчивость.
    ja: 天が盛んに運行するように、君子は絶えず自己を強めるよう努める。易経の乾卦の解説から、道徳的な自己修養と忍耐を促している。
    zh: 天行健，君子以自强不息。出自《易经》乾卦象传，鼓励道德修养和持之以恒。
    ar: كما تعمل السماء بقوة، يسعى الشخص النبيل إلى تقوية نفسه باستمرار. من تفسير سداسية تشيان في كتاب
      التغييرات، يشجع على التهذيب الذاتي الأخلاقي والمثابرة.
    he: כשם שהשמיים פועלים במרץ, האדם האציל שואף לחזק את עצמו ללא הרף. מפירוש ההקסגרמה צ'יאן של האי צ'ינג,
