- id: zh_cultural_reference_计白当黑_656c9e2b
  language: zh
  canonical_reference: 计白当黑
  reference_type: cultural_reference
  surface_patterns:
  - 计白当黑
  - 计白以当黑
  - 计白当黑原则
  short_explanation: In Chinese calligraphy and painting, treat blank space as an integral part of the
    composition, equal in importance to inked areas. Encourages balance and negative space to enhance
    the overall effect.
  i18n_explanations:
    en: In Chinese calligraphy and painting, treat blank space as an integral part of the composition,
      equal in importance to inked areas. Encourages balance and negative space to enhance the overall
      effect.
    es: En la caligrafía y pintura chinas, tratar el espacio en blanco como parte integral de la composición,
      con la misma importancia que las áreas entintadas. Fomenta el equilibrio y el espacio negativo para
      mejorar el efecto general.
    fr: Dans la calligraphie et la peinture chinoises, traiter l'espace blanc comme une partie intégrante
      de la composition, d'importance égale aux zones encrées. Encourage l'équilibre et l'espace négatif
      pour améliorer l'effet global.
    de: In der chinesischen Kalligraphie und Malerei wird der leere Raum als integraler Bestandteil der
      Komposition behandelt, gleich wichtig wie die bemalten Bereiche. Fördert Gleichgewicht und negativen
      Raum, um die Gesamtwirkung zu verbessern.
    it: Nella calligrafia e pittura cinese, trattare lo spazio bianco come parte integrante della composizione,
      ugualmente importante alle aree inchiostrate. Incoraggia l'equilibrio e lo spazio negativo per migliorare
      l'effetto complessivo.
    pt: Na caligrafia e pintura chinesas, trate o espaço em branco como parte integrante da composição,
      com igual importância às áreas com tinta. Incentiva o equilíbrio e o espaço negativo para melhorar
      o efeito geral.
    ru: В китайской каллиграфии и живописи пустое пространство рассматривается как неотъемлемая часть
      композиции, равная по важности закрашенным участкам. Поощряет баланс и негативное пространство для
      улучшения общего эффекта.
    ja: 中国の書道や絵画では、余白を構成の不可欠な部分として扱い、墨で描かれた部分と同じ重要性を持つ。全体の効果を高めるために、バランスとネガティブスペースを促進する。
    zh: 在中国书法和绘画中，将空白视为构图的有机组成部分，与墨色区域同等重要。提倡平衡和负空间以增强整体效果。
    ar: في الخط والرسم الصينيين، تعامل المساحة البيضاء كجزء لا يتجزأ من التكوين، متساوية في الأهمية مع
      المناطق المحبرة. تشجع على التوازن والمساحة السلبية لتعزيز التأثير العام.
    he: בקליגרפיה ובציור סיני, יש להתייחס לחלל הלבן כחלק בלתי נפרד מהקומפוזיציה, חשוב באותה מידה כמו האזורים
      המצוירים בדיו. מעודד איזון וחלל שלילי כדי לשפר את האפקט הכולל.
