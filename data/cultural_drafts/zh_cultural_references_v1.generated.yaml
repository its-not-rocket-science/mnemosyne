      Le Rêve de Nanke et L'Épingle à cheveux pourpre), connues collectivement pour leurs motifs de rêve
      et leur beauté lyrique.
    de: Bezieht sich auf die vier Stücke von Tang Xianzu (Der Pfingstrosenpavillon, Der Handan-Traum,
      Der Nanke-Traum und Die purpurne Haarnadel), die gemeinsam für ihre Traummotive und lyrische Schönheit
      bekannt sind.
    it: Si riferisce alle quattro commedie di Tang Xianzu (Il Padiglione delle Peonie, Il Sogno di Handan,
      Il Sogno di Nanke e La Forcina Purpurea), note collettivamente per i loro motivi onirici e la bellezza
      lirica.
    pt: Refere-se às quatro peças de Tang Xianzu (O Pavilhão das Peônias, O Sonho de Handan, O Sonho de
      Nanke e O Grampo de Cabelo Púrpura), conhecidas coletivamente por seus motivos de sonho e beleza
      lírica.
