    zh: 这句出自《金刚经》的话强调一切有为法都是短暂和虚幻的，如同梦境和泡影，鼓励人们放下世俗执着。
    ar: تؤكد هذه العبارة من سوترا الماس أن جميع الظواهر المشروطة عابرة ووهمية، مثل الأحلام والفقاعات،
