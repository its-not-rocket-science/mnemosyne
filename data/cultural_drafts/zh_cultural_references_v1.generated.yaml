- id: zh_cultural_reference_曹衣出水_286133a3
  language: zh
  canonical_reference: 曹衣出水
  reference_type: cultural_reference
  surface_patterns:
  - 曹衣出水
  - 曹衣出水风格
  short_explanation: Describes the painting style of Northern Qi artist Cao Zhongda, where figures' clothing
    appears wet and clinging to the body, contrasting with Wu Daozi's flowing style. It highlights the
    depiction of damp, translucent fabric.
  i18n_explanations:
    en: Describes the painting style of Northern Qi artist Cao Zhongda, where figures' clothing appears
      wet and clinging to the body, contrasting with Wu Daozi's flowing style. It highlights the depiction
      of damp, translucent fabric.
    es: Describe el estilo pictórico del artista de Qi del Norte Cao Zhongda, donde la vestimenta de las
      figuras aparece mojada y pegada al cuerpo, en contraste con el estilo fluido de Wu Daozi. Destaca
      la representación de tela húmeda y translúcida.
    fr: Décrit le style pictural de l'artiste des Qi du Nord Cao Zhongda, où les vêtements des figures
      semblent mouillés et collés au corps, contrastant avec le style fluide de Wu Daozi. Il met en évidence
      la représentation d'un tissu humide et translucide.
    de: Beschreibt den Malstil des Künstlers der Nördlichen Qi, Cao Zhongda, bei dem die Kleidung der
      Figuren nass erscheint und am Körper klebt, im Gegensatz zu Wu Daozi's fließendem Stil. Es betont
      die Darstellung von feuchtem, durchscheinendem Stoff.
    it: Descrive lo stile pittorico dell'artista Qi settentrionale Cao Zhongda, in cui gli abiti delle
      figure appaiono bagnati e aderenti al corpo, in contrasto con lo stile fluido di Wu Daozi. Evidenzia
      la rappresentazione di tessuto umido e traslucido.
    pt: Descreve o estilo de pintura do artista Qi do Norte Cao Zhongda, onde as roupas das figuras parecem
      molhadas e coladas ao corpo, contrastando com o estilo fluido de Wu Daozi. Destaca a representação
      de tecido úmido e translúcido.
    ru: Описывает стиль живописи художника Северной Ци Цао Чжунда, в котором одежда фигур выглядит влажной
      и прилипшей к телу, контрастируя с текучим стилем У Даоцзы. Подчеркивает изображение влажной, полупрозрачной
      ткани.
    ja: 北斉の画家曹仲達の描く人物の衣が濡れて体に張り付くようなスタイルを表し、呉道子の流れるようなスタイルと対照的である。湿った半透明の布地の描写を強調する。
    zh: 描述北齐画家曹仲达的画风，人物衣服像刚出水一样紧贴身体，与吴道子的飘逸风格形成对比。着重表现湿润透明的织物。
    ar: يصف أسلوب الرسم لفنان تشي الشمالية تساو تشونغدا، حيث تظهر ملابس الشخصيات مبلولة وملتصقة بالجسم،
      متناقضة مع الأسلوب الانسيابي لوو داو تسي. يبرز تصوير القماش الرطب الشفاف.
    he: מתאר את סגנון הציור של האמן צ'י הצפוני צאו ז'ונגדה, שבו בגדי הדמויות נראים רטובים ודבוקים לגוף,
      בניגוד לסגנון הזורם של וו דאו-דזה. מדגיש תיאור של בד לח ושקוף למחצה.
