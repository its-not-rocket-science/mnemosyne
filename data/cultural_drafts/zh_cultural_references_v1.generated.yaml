- id: zh_literary_reference_神通广大_bab6a4bb
  language: zh
  canonical_reference: 神通广大
  reference_type: literary_reference
  surface_patterns:
  - 神通广大
  - 神通广大的人
  - 神通广大的本领
  short_explanation: Literally 'magical powers are vast and great,' meaning someone has extraordinary
    abilities or skills. It is often used to praise a clever or capable person and appears frequently
    in Chinese mythology and classical novels.
  i18n_explanations:
    en: Literally 'magical powers are vast and great,' meaning someone has extraordinary abilities or
      skills. It is often used to praise a clever or capable person and appears frequently in Chinese
      mythology and classical novels.
    es: Literalmente 'los poderes mágicos son vastos y grandes', significa que alguien tiene habilidades
      o destrezas extraordinarias. Se usa a menudo para elogiar a una persona inteligente o capaz, y aparece
      con frecuencia en la mitología china y novelas clásicas.
    fr: Littéralement 'les pouvoirs magiques sont vastes et grands', signifiant que quelqu'un a des capacités
      ou compétences extraordinaires. Il est souvent utilisé pour louer une personne intelligente ou compétente
      et apparaît fréquemment dans la mythologie chinoise et les romans classiques.
    de: Wörtlich 'magische Kräfte sind weit und groß', bedeutet, dass jemand außergewöhnliche Fähigkeiten
      oder Fertigkeiten hat. Es wird oft verwendet, um eine kluge oder fähige Person zu loben, und kommt
      häufig in der chinesischen Mythologie und klassischen Romanen vor.
    it: Letteralmente 'i poteri magici sono vasti e grandi', significa che qualcuno ha abilità o capacità
      straordinarie. È spesso usato per lodare una persona intelligente o capace, e appare frequentemente
      nella mitologia cinese e nei romanzi classici.
    pt: Literalmente 'os poderes mágicos são vastos e grandes', significa que alguém possui habilidades
