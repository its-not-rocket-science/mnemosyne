    en: 'This proverb highlights the power of teamwork: when many people contribute, the result is greater.
      It is commonly used to encourage cooperation.'
    es: 'Este proverbio destaca el poder del trabajo en equipo: cuando muchas personas contribuyen, el
      resultado es mayor. Se usa comúnmente para fomentar la cooperación.'
    fr: 'Ce proverbe souligne la puissance du travail d''équipe : lorsque de nombreuses personnes contribuent,
      le résultat est plus grand. Il est couramment utilisé pour encourager la coopération.'
    de: 'Dieses Sprichwort unterstreicht die Kraft der Teamarbeit: Wenn viele Menschen ihren Beitrag leisten,
      ist das Ergebnis größer. Es wird häufig verwendet, um Zusammenarbeit zu fördern.'
    it: 'Questo proverbio evidenzia il potere del lavoro di squadra: quando molte persone contribuiscono,
      il risultato è maggiore. È comunemente usato per incoraggiare la cooperazione.'
    pt: 'Este provérbio destaca o poder do trabalho em equipe: quando muitas pessoas contribuem, o resultado
      é maior. É comumente usado para incentivar a cooperação.'
    ru: 'Эта пословица подчеркивает силу командной работы: когда многие люди вносят вклад, результат становится
      больше. Она часто используется для поощрения сотрудничества.'
    ja: このことわざはチームワークの力を強調しています。多くの人が貢献すると、結果はより大きくなります。協力を促すためによく使われます。
