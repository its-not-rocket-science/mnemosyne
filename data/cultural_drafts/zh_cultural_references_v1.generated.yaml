  short_explanation: 'This saying emphasizes the Confucian principle of altruism: to establish and achieve
    oneself, one must first help others do the same.'
  i18n_explanations:
    en: 'This saying emphasizes the Confucian principle of altruism: to establish and achieve oneself,
      one must first help others do the same.'
    es: 'Este dicho enfatiza el principio confuciano de altruismo: para establecerse y lograrse uno mismo,
      primero debe ayudar a otros a hacer lo mismo.'
    fr: 'Ce dicton met l''accent sur le principe confucéen d''altruisme : pour s''établir et s''accomplir,
      il faut d''abord aider les autres à faire de même.'
    de: 'Dieser Spruch betont das konfuzianische Prinzip des Altruismus: Um sich selbst zu etablieren
      und zu erreichen, muss man zuerst anderen helfen, dasselbe zu tun.'
    it: 'Questo detto enfatizza il principio confuciano dell''altruismo: per stabilirsi e realizzarsi,
      bisogna prima aiutare gli altri a fare lo stesso.'
    pt: 'Este ditado enfatiza o princípio confucionista do altruísmo: para se estabelecer e alcançar a
      si mesmo, deve-se primeiro ajudar os outros a fazer o mesmo.'
    ru: 'Эта поговорка подчеркивает конфуцианский принцип альтруизма: чтобы утвердиться и достичь успеха,
      нужно сначала помочь другим сделать то же самое.'
    ja: この言葉は儒教の利他主義の原則を強調しています。自分を確立し達成するには、まず他人が同じことをするのを助けなければならない。
    zh: 这句话强调了儒家利他主义的原则：要立己达人，首先要帮助他人做到同样的事。
    ar: 'يؤكد هذا القول على المبدأ الكونفوشيوسي للإيثار: لتؤسس نفسك وتحقق ذاتك، يجب أولاً مساعدة الآخرين
      على فعل الشيء نفسه.'
    he: 'אמרה זו מדגישה את העיקרון הקונפוציאני של אלטרואיזם: כדי לבסס ולהשיג את עצמך, תחילה עליך לעזור
