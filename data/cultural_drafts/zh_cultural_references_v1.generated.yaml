- id: zh_literary_reference_醉卧沙场君莫笑_古来征战几人回_a69f0e52
  language: zh
  canonical_reference: 醉卧沙场君莫笑，古来征战几人回
  reference_type: literary_reference
  surface_patterns:
  - 醉卧沙场君莫笑，古来征战几人回
  - 古来征战几人回
  - 醉卧沙场君莫笑
  short_explanation: Do not laugh if I lie drunk on the battlefield; since ancient times, how many soldiers
    have returned from war? This line from a Tang frontier poem captures the fatalism and camaraderie
    of soldiers.
  i18n_explanations:
    en: Do not laugh if I lie drunk on the battlefield; since ancient times, how many soldiers have returned
      from war? This line from a Tang frontier poem captures the fatalism and camaraderie of soldiers.
    es: No te rías si yago borracho en el campo de batalla; desde tiempos antiguos, ¿cuántos soldados
      han vuelto de la guerra? Este verso de un poema fronterizo Tang captura el fatalismo y la camaradería
      de los soldados.
    fr: Ne riez pas si je suis ivre mort sur le champ de bataille; depuis les temps anciens, combien de
      soldats sont revenus de la guerre? Ce vers d'un poème de frontière Tang capture le fatalisme et
      la camaraderie des soldats.
    de: Lache nicht, wenn ich betrunken auf dem Schlachtfeld liege; seit alters her, wie viele Soldaten
      sind aus dem Krieg zurückgekehrt? Diese Zeile aus einem Tang-Grenzgedicht fängt den Fatalismus und
      die Kameradschaft der Soldaten ein.
    it: Non ridere se giaccio ubriaco sul campo di battaglia; fin dai tempi antichi, quanti soldati sono
      tornati dalla guerra? Questo verso di una poesia di frontiera Tang cattura il fatalismo e la cameratismo
      dei soldati.
    pt: Não ria se eu estiver bêbado no campo de batalha; desde os tempos antigos, quantos soldados voltaram
      da guerra? Este verso de um poema de fronteira Tang captura o fatalismo e a camaradagem dos soldados.
    ru: Не смейтесь, если я лежу пьяный на поле боя; с древних времен, сколько солдат вернулось с войны?
      Эта строка из пограничного стихотворения эпохи Тан передает фатализм и товарищество солдат.
    ja: 戦場で酔って倒れても笑わないでほしい。古来より、戦から帰ってきた兵士は何人いるだろうか？この唐の辺塞詩の一節は、兵士たちの宿命論と仲間意識を捉えている。
    zh: 醉卧沙场君莫笑，古来征战几人回。这句唐诗描绘了士兵的宿命感和战友之情。
    ar: لا تضحك إذا كنت مستلقيًا سكرانًا في ساحة المعركة؛ منذ العصور القديمة، كم من الجنود عادوا من الحرب؟
      هذا البيت من قصيدة حدودية تانغ يلتقط القدرية والرفقة بين الجنود.
    he: אל תצחק אם אני שוכב שיכור בשדה הקרב; מימי קדם, כמה חיילים חזרו מהמלחמה? השורה הזו משיר גבול טאנג
      לוכדת את הפטליזם והאחווה של החיילים.
