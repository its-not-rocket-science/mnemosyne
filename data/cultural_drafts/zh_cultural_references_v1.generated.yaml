  i18n_explanations:
    en: A famous line describing the beauty of sunset where falling rosy clouds fly together with a lone
      wild duck, and the autumn water merges with the vast sky.
    es: Una famosa línea que describe la belleza del atardecer donde las nubes rosadas que caen vuelan
      junto con un pato salvaje solitario, y el agua otoñal se fusiona con el vasto cielo.
    fr: Un vers célèbre décrivant la beauté du coucher de soleil où des nuages roses tombants volent avec
      un canard sauvage solitaire, et l'eau automnale se confond avec le ciel vaste.
    de: Eine berühmte Zeile, die die Schönheit des Sonnenuntergangs beschreibt, wo fallende rosafarbene
      Wolken mit einer einsamen Wildente fliegen und das Herbstwasser mit dem weiten Himmel verschmilzt.
    it: Un verso famoso che descrive la bellezza del tramonto dove nuvole rosate cadenti volano insieme
      a un'anatra selvatica solitaria, e l'acqua autunnale si fonde con il vasto cielo.
    pt: Um verso famoso que descreve a beleza do pôr do sol onde nuvens rosadas cadentes voam junto com
      um pato selvagem solitário, e a água outonal se funde com o vasto céu.
    ru: Знаменитая строка, описывающая красоту заката, где падающие розовые облака летят вместе с одинокой
