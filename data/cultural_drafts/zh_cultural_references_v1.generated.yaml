    en: Refers to Xingtian, a mythical warrior who, after being decapitated by the Yellow Emperor, continued
      fighting using his nipples as eyes and navel as mouth, dancing with shield and battle-axe. It symbolizes
      unyielding defiance and perseverance.
    es: Se refiere a Xingtian, un guerrero mítico que, después de ser decapitado por el Emperador Amarillo,
      continuó luchando usando sus pezones como ojos y el ombligo como boca, bailando con escudo y hacha
      de batalla. Simboliza la obstinación y la perseverancia.
    fr: Fait référence à Xingtian, un guerrier mythique qui, après avoir été décapité par l'Empereur Jaune,
      a continué à se battre en utilisant ses mamelons comme yeux et son nombril comme bouche, dansant
      avec un bouclier et une hache de combat. Il symbolise la défiance inébranlable et la persévérance.
    de: Bezieht sich auf Xingtian, einen mythischen Krieger, der nach seiner Enthauptung durch den Gelben
      Kaiser weiterkämpfte, indem er seine Brustwarzen als Augen und seinen Bauchnabel als Mund benutzte,
      mit Schild und Streitaxt tanzend. Es symbolisiert unerschütterlichen Widerstand und Ausdauer.
    it: Si riferisce a Xingtian, un guerriero mitico che, dopo essere stato decapitato dall'Imperatore
      Giallo, continuò a combattere usando i suoi capezzoli come occhi e l'ombelico come bocca, ballando
      con scudo e ascia da battaglia. Simboleggia la sfida inflessibile e la perseveranza.
    pt: Refere-se a Xingtian, um guerreiro mítico que, após ser decapitado pelo Imperador Amarelo, continuou
      lutando usando seus mamilos como olhos e o umbigo como boca, dançando com escudo e machado de batalha.
      Simboliza a teimosia e a perseverança.
    ru: Относится к Синтяню, мифическому воину, который после обезглавливания Жёлтым Императором продолжал
      сражаться, используя соски как глаза, а пупок как рот, танцуя со щитом и боевым топором. Символизирует
      непоколебимое сопротивление и настойчивость.
    ja: 刑天舞干戚は、黄帝に首を切られた後も、乳首を目、へそを口として盾と斧を振るい戦い続けた神話の戦士、刑天を指す。不屈の反抗と忍耐を象徴する。
    zh: 指刑天，神话中的战士，被黄帝斩首后，以乳为目，以脐为口，手持盾和斧继续战斗。象征不屈的反抗和毅力。
    ar: يشير إلى شينغتيان، محارب أسطوري استمر في القتال بعد أن قطع الإمبراطور الأصفر رأسه، مستخدمًا حلمتيه
      كعيون وسرته كفم، راقصًا بالدرع والفأس. يرمز إلى التحدي الذي لا يلين والمثابرة.
    he: מתייחס לשינגטיאן, לוחם מיתולוגי שלאחר שנערף ראשו על ידי הקיסר הצהוב, המשיך להילחם תוך שימוש בפטמותיו
      כעיניים ובטבורו כפה, רוקד עם מגן וגרזן קרב. הוא מסמל מרדנות בלתי מתפשרת והתמדה.
