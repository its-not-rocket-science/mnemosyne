  i18n_explanations:
    en: Describes clear and proper pronunciation with a smooth, melodious tone, especially in Chinese
      opera singing. It emphasizes precision in enunciation and vocal quality.
    es: Describe una pronunciación clara y correcta con un tono suave y melodioso, especialmente en el
      canto de la ópera china. Enfatiza la precisión en la articulación y la calidad vocal.
    fr: Décrit une prononciation claire et correcte avec un ton doux et mélodieux, en particulier dans
      le chant d'opéra chinois. Il met l'accent sur la précision de l'articulation et la qualité vocale.
    de: Beschreibt eine klare und korrekte Aussprache mit einem sanften, melodischen Ton, besonders im
      chinesischen Operngesang. Es betont die Präzision der Artikulation und die Stimmqualität.
    it: Descrive una pronuncia chiara e corretta con un tono morbido e melodioso, specialmente nel canto
