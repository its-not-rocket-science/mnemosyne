- id: zh_literary_reference_三头六臂_252a58de
  language: zh
  canonical_reference: 三头六臂
  reference_type: literary_reference
  surface_patterns:
  - 三头六臂
  - 三个头六条臂
  - 三头六臂的神仙
  short_explanation: Literally 'three heads and six arms,' this idiom describes someone with superhuman
    abilities or extraordinary skills, often used to praise competence. It originates from depictions
    of the god Nezha in Chinese mythology and literature.
  i18n_explanations:
    en: Literally 'three heads and six arms,' this idiom describes someone with superhuman abilities or
      extraordinary skills, often used to praise competence. It originates from depictions of the god
      Nezha in Chinese mythology and literature.
    es: Literalmente 'tres cabezas y seis brazos', este modismo describe a alguien con habilidades sobrehumanas
      o destrezas extraordinarias, utilizado a menudo para elogiar la competencia. Se origina en las representaciones
      del dios Nezha en la mitología y literatura china.
    fr: Littéralement 'trois têtes et six bras', cet idiome décrit quelqu'un doté de capacités surhumaines
      ou de compétences extraordinaires, souvent utilisé pour louer la compétence. Il provient des représentations
      du dieu Nezha dans la mythologie et la littérature chinoises.
    de: Wörtlich 'drei Köpfe und sechs Arme', beschreibt diese Redewendung jemanden mit übermenschlichen
      Fähigkeiten oder außergewöhnlichen Fertigkeiten, oft verwendet, um Kompetenz zu loben. Sie stammt
      aus Darstellungen des Gottes Nezha in der chinesischen Mythologie und Literatur.
    it: Letteralmente 'tre teste e sei braccia', questo idioma descrive qualcuno con abilità sovrumane
      o capacità straordinarie, spesso usato per lodare la competenza. Ha origine dalle raffigurazioni
      del dio Nezha nella mitologia e letteratura cinese.
    pt: Literalmente 'três cabeças e seis braços', esse idioma descreve alguém com habilidades sobre-humanas
      ou capacidades extraordinárias, frequentemente usado para elogiar a competência. Origina-se das
      representações do deus Nezha na mitologia e literatura chinesas.
    ru: Буквально 'три головы и шесть рук', эта идиома описывает кого-то со сверхчеловеческими способностями
      или необычайными навыками, часто используется для похвалы компетентности. Происходит от изображений
      бога Нэчжа в китайской мифологии и литературе.
    ja: 直訳すると「三つの頭と六つの腕」。この慣用句は、超人的な能力や非凡な技能を持つ人を表し、しばしば有能さを称賛するのに使われる。中国神話や文学における哪吒（ネザ）の描写に由来する。
    zh: 字面意思是‘三头六臂’，这个成语形容某人有超人的能力或非凡的技能，常用来称赞才能。它源于中国神话和文学中对哪吒的描绘。
    ar: حرفياً 'ثلاثة رؤوس وستة أذرع'، يصف هذا التعبير الاصطلاحي شخصاً يتمتع بقدرات خارقة أو مهارات استثنائية،
      وغالباً ما يستخدم لمدح الكفاءة. ينشأ من تصوير الإله نيزها في الأساطير والأدب الصيني.
    he: בתרגום מילולי 'שלושה ראשים ושש זרועות', הביטוי הזה מתאר מישהו בעל יכולות על-אנושיות או כישורים
      יוצאי דופן, ומשמש לעתים קרובות לשבח כשירות. מקורו בתיאורים של האל נז'ה במיתולוגיה ובספרות הסינית.
