  short_explanation: Su Wu, a Han diplomat, was held captive by the Xiongnu and forced to herd sheep for
    19 years, refusing to surrender. It represents unwavering loyalty and perseverance.
  i18n_explanations:
    en: Su Wu, a Han diplomat, was held captive by the Xiongnu and forced to herd sheep for 19 years,
      refusing to surrender. It represents unwavering loyalty and perseverance.
    es: Su Wu, un diplomático Han, fue capturado por los xiongnu y obligado a pastorear ovejas durante
      19 años, negándose a rendirse. Representa lealtad inquebrantable y perseverancia.
    fr: Su Wu, un diplomate Han, a été capturé par les Xiongnu et forcé de garder des moutons pendant
      19 ans, refusant de se rendre. Cela représente une loyauté et une persévérance inébranlables.
    de: Su Wu, ein Han-Diplomat, wurde von den Xiongnu gefangen genommen und musste 19 Jahre lang Schafe
      hüten, wobei er sich weigerte, aufzugeben. Es steht für unerschütterliche Loyalität und Ausdauer.
    it: Su Wu, un diplomatico Han, fu tenuto prigioniero dagli Xiongnu e costretto a pascolare pecore
      per 19 anni, rifiutandosi di arrendersi. Rappresenta lealtà incrollabile e perseveranza.
    pt: Su Wu, um diplomata Han, foi mantido cativo pelos xiongnu e forçado a pastorear ovelhas por 19
      anos, recusando-se a render-se. Representa lealdade inabalável e perseverança.
    ru: Су У, дипломат Хань, был захвачен сюнну и вынужден пасти овец в течение 19 лет, отказываясь сдаться.
      Это символизирует непоколебимую верность и стойкость.
    ja: 漢の外交官・蘇武が匈奴に捕らえられ、19年間羊を飼いながら投降を拒否した故事。揺るぎない忠誠と忍耐の象徴。
    zh: 汉代使节苏武被匈奴扣留，牧羊19年拒不投降。代表坚定不移的忠诚和毅力。
    ar: سو وو، دبلوماسي من عهد هان، أسرته قبائل شيونغنو وأجبر على رعي الأغنام لمدة 19 عامًا، رافضًا الاستسلام.
      يرمز إلى الولاء الثابت والمثابرة.
    he: סו וו, דיפלומט משושלת האן, נשבה על ידי בני שיונגנו ונאלץ לרעות צאן במשך 19 שנים, וסירב להיכנע.
