- id: zh_classical_or_scriptural_allusion_空即是色_2e378955
  language: zh
  canonical_reference: 空即是色
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 空即是色
  - 色即是空空即是色
  - 色不异空空不异色
  short_explanation: A key phrase from the Heart Sutra (Prajnaparamita Hridaya Sutra), expressing the
    Mahayana Buddhist concept that emptiness (śūnyatā) is form, and form is emptiness. It underscores
    the interdependence and lack of inherent existence of all phenomena.
  i18n_explanations:
    en: A key phrase from the Heart Sutra (Prajnaparamita Hridaya Sutra), expressing the Mahayana Buddhist
      concept that emptiness (śūnyatā) is form, and form is emptiness. It underscores the interdependence
      and lack of inherent existence of all phenomena.
    es: Una frase clave del Sutra del Corazón (Prajnaparamita Hridaya Sutra), que expresa el concepto
      budista Mahayana de que el vacío (śūnyatā) es forma, y la forma es vacío. Subraya la interdependencia
      y la falta de existencia inherente de todos los fenómenos.
    fr: Une phrase clé du Sutra du Cœur (Prajnaparamita Hridaya Sutra), exprimant le concept bouddhiste
      Mahayana selon lequel le vide (śūnyatā) est forme, et la forme est vide. Elle souligne l'interdépendance
      et le manque d'existence inhérente de tous les phénomènes.
    de: Ein Schlüsselsatz aus dem Herz-Sutra (Prajnaparamita Hridaya Sutra), der das mahayana-buddhistische
      Konzept ausdrückt, dass Leerheit (śūnyatā) Form ist und Form Leerheit ist. Es unterstreicht die
      gegenseitige Abhängigkeit und die fehlende inhärente Existenz aller Phänomene.
    it: Una frase chiave del Sutra del Cuore (Prajnaparamita Hridaya Sutra), che esprime il concetto buddista
      Mahayana secondo cui il vuoto (śūnyatā) è forma e la forma è vuoto. Sottolinea l'interdipendenza
      e la mancanza di esistenza intrinseca di tutti i fenomeni.
    pt: Uma frase-chave do Sutra do Coração (Prajnaparamita Hridaya Sutra), expressando o conceito budista
      Mahayana de que o vazio (śūnyatā) é forma, e a forma é vazio. Enfatiza a interdependência e a falta
      de existência inerente de todos os fenômenos.
    ru: Ключевая фраза из Сутры сердца (Праджняпарамита Хридая сутра), выражающая концепцию буддизма Махаяны
      о том, что пустота (шуньята) есть форма, а форма есть пустота. Она подчеркивает взаимозависимость
      и отсутствие присущего существования всех явлений.
    ja: 般若心経の重要な句で、「色即是空、空即是色」の教えを表す。大乗仏教の概念である空（śūnyatā）がそのまま形であり、形がそのまま空であると説く。すべての現象の相互依存と本質的な実体の欠如を強調する。
    zh: 出自《心经》的关键语句，表达大乘佛教“空即是色，色即是空”的概念，强调一切现象的相互依存和缺乏自性。
    ar: عبارة رئيسية من 'سوترا القلب' (براجناباراميتا هرودايا سوترا)، تعبر عن المفهوم البوذي الماهاياني
      بأن الفراغ (شونياتا) هو الشكل، والشكل هو الفراغ. تؤكد على الترابط وعدم وجود وجود جوهري لجميع الظواهر.
    he: ביטוי מפתח מ'סוטרת הלב' (פראג'נאפארמיטה הרידאיה סוטרה), המבטא את המושג הבודהיסטי המהאיאני שהריק
      (שוניאטה) הוא צורה, והצורה היא ריק. הוא מדגיש את התלות ההדדית ואת חוסר הקיום העצמי של כל התופעות.
