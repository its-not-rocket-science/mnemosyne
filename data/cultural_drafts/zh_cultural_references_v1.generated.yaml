- id: zh_proverb_tradition_冰冻三尺_非一日之寒_6a6ab063
  language: zh
  canonical_reference: 冰冻三尺，非一日之寒
  reference_type: proverb_tradition
  surface_patterns:
  - 冰冻三尺，非一日之寒
  - 冰冻三尺非一日之寒
  short_explanation: A Chinese proverb meaning 'Three feet of ice is not formed in a single day,' equivalent
    to 'Rome was not built in a day,' suggesting that significant results require time and sustained effort.
  i18n_explanations:
    en: A Chinese proverb meaning 'Three feet of ice is not formed in a single day,' equivalent to 'Rome
      was not built in a day,' suggesting that significant results require time and sustained effort.
    es: Proverbio chino que significa 'Tres pies de hielo no se forman en un solo día', equivalente a
      'Roma no se construyó en un día', sugiriendo que los resultados significativos requieren tiempo
      y esfuerzo sostenido.
    fr: Proverbe chinois signifiant 'Trois pieds de glace ne se forment pas en un seul jour', équivalent
      à 'Rome ne s'est pas faite en un jour', suggérant que des résultats importants nécessitent du temps
      et un effort soutenu.
    de: Ein chinesisches Sprichwort, das bedeutet 'Drei Fuß Eis bilden sich nicht an einem einzigen Tag',
      gleichbedeutend mit 'Rom wurde nicht an einem Tag erbaut', und besagt, dass bedeutende Ergebnisse
      Zeit und anhaltende Anstrengung erfordern.
    it: Proverbio cinese che significa 'Tre piedi di ghiaccio non si formano in un solo giorno', equivalente
      a 'Roma non fu costruita in un giorno', suggerendo che risultati significativi richiedono tempo
      e sforzo costante.
    pt: Provérbio chinês que significa 'Três pés de gelo não se formam em um único dia', equivalente a
      'Roma não foi construída em um dia', sugerindo que resultados significativos exigem tempo e esforço
      contínuo.
    ru: Китайская пословица, означающая 'Три фута льда не образуются за один день', эквивалентна 'Рим
      не был построен за один день', указывая, что значительные результаты требуют времени и постоянных
      усилий.
    ja: 「三尺の氷は一日の寒さでできるものではない」という意味の中国の諺で、「ローマは一日にして成らず」に相当し、大きな成果には時間と継続的努力が必要であることを示す。
    zh: 中国谚语，意思是‘三尺厚的冰不是一天的寒冷造成的’，相当于‘罗马不是一天建成的’，说明重大成果需要时间和持续的努力。
    ar: مثل صيني يعني 'ثلاثة أقدام من الجليد لا تتكون في يوم واحد'، يعادل 'روما لم تُبنَ في يوم واحد'،
      مما يشير إلى أن النتائج الكبيرة تتطلب وقتاً وجهداً متواصلاً.
    he: פתגם סיני שמשמעותו 'שלושה מטרים של קרח לא נוצרים ביום אחד', המקביל ל'רומא לא נבנתה ביום אחד',
