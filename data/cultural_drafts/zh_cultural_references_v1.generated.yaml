    en: This proverb warns that without long-term planning, immediate troubles will arise. It encourages
      foresight and preparation.
    es: Este proverbio advierte que sin planificación a largo plazo, surgirán problemas inmediatos. Fomenta
      la previsión y la preparación.
    fr: Ce proverbe prévient que sans planification à long terme, des problèmes immédiats surgiront. Il
      encourage la prévoyance et la préparation.
    de: Dieses Sprichwort warnt davor, dass ohne langfristige Planung unmittelbare Probleme auftreten
      werden. Es fördert Voraussicht und Vorbereitung.
    it: Questo proverbio avverte che senza una pianificazione a lungo termine, sorgeranno problemi immediati.
      Incoraggia la previdenza e la preparazione.
    pt: Este provérbio adverte que, sem planejamento de longo prazo, surgirão problemas imediatos. Ele
      incentiva a previsão e a preparação.
    ru: Эта пословица предупреждает, что без долгосрочного планирования возникнут немедленные проблемы.
      Она поощряет предусмотрительность и подготовку.
