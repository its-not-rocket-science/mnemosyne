- id: zh_literary_reference_不积跬步_无以至千里_bb78b2f3
  language: zh
  canonical_reference: 不积跬步，无以至千里
  reference_type: literary_reference
  surface_patterns:
  - 不积跬步无以至千里
  - 积跬步以至千里
  - 不积跬步
  short_explanation: Without accumulating half-steps, one cannot reach a thousand miles. From Xunzi's
    'Encouraging Learning', it stresses that great accomplishments require gradual accumulation of small
    efforts.
  i18n_explanations:
    en: Without accumulating half-steps, one cannot reach a thousand miles. From Xunzi's 'Encouraging
      Learning', it stresses that great accomplishments require gradual accumulation of small efforts.
    es: Sin acumular medios pasos, no se puede llegar a mil millas. De 'Exhortación al aprendizaje' de
      Xunzi, destaca que los grandes logros requieren la acumulación gradual de pequeños esfuerzos.
    fr: Sans accumuler des demi-pas, on ne peut atteindre mille lieues. De 'Encouragement à l'apprentissage'
      de Xunzi, il souligne que les grandes réalisations nécessitent une accumulation progressive de petits
      efforts.
    de: Ohne das Anhäufen von halben Schritten kann man nicht tausend Meilen erreichen. Aus Xunzis 'Ermutigung
      zum Lernen' betont es, dass große Errungenschaften die allmähliche Anhäufung kleiner Anstrengungen
      erfordern.
    it: Senza accumulare mezzi passi, non si può raggiungere mille miglia. Da 'Incoraggiamento all'apprendimento'
      di Xunzi, sottolinea che i grandi risultati richiedono l'accumulazione graduale di piccoli sforzi.
    pt: Sem acumular meios passos, não se pode chegar a mil milhas. De 'Incentivo ao Aprendizado' de Xunzi,
      enfatiza que grandes realizações exigem o acúmulo gradual de pequenos esforços.
    ru: Без накопления половинных шагов нельзя пройти тысячу миль. Из «Поощрения к учению» Сюньцзы подчеркивается,
      что великие достижения требуют постепенного накопления маленьких усилий.
    ja: 半歩を積まなければ、千里に達することはできない。荀子の『勧学』から、偉大な成果は小さな努力の積み重ねを必要とすることを強調している。
    zh: 不积跬步，无以至千里。出自荀子《劝学》，强调伟大的成就需要逐步积累小努力。
    ar: بدون تجميع أنصاف الخطوات، لا يمكن الوصول إلى ألف ميل. من كتاب 'التشجيع على التعلم' لشونزي، يؤكد
      أن الإنجازات العظيمة تتطلب تراكمًا تدريجيًا للجهود الصغيرة.
    he: בלי לצבור חצאי צעדים, לא ניתן להגיע לאלף מיילים. מתוך 'עידוד ללמידה' של שונצי, זה מדגיש שהישגים
