  short_explanation: 'The Confucian Golden Rule: do not do to others what you do not want done to yourself,
    a core ethical concept in Chinese philosophy.'
  i18n_explanations:
    en: 'The Confucian Golden Rule: do not do to others what you do not want done to yourself, a core
      ethical concept in Chinese philosophy.'
    es: 'La Regla de Oro confuciana: no hagas a los demás lo que no quieras que te hagan a ti, un concepto
      ético central en la filosofía china.'
    fr: 'La Règle d''or confucéenne : ne fais pas à autrui ce que tu ne voudrais pas qu''on te fasse,
      un concept éthique fondamental dans la philosophie chinoise.'
    de: 'Die goldene Regel des Konfuzius: Was du nicht willst, dass man dir tut, das füge auch keinem
      anderen zu, ein zentrales ethisches Konzept in der chinesischen Philosophie.'
    it: 'La regola d''oro confuciana: non fare agli altri ciò che non vorresti fosse fatto a te, un concetto
      etico centrale nella filosofia cinese.'
    pt: 'A Regra de Ouro confuciana: não faça aos outros o que você não quer que façam a você, um conceito
      ético central na filosofia chinesa.'
    ru: 'Золотое правило Конфуция: не делай другим того, чего не желаешь себе, ключевое этическое понятие
      в китайской философии.'
    ja: 儒教の黄金律：自分がされたくないことを他人にするな。中国哲学における中心的な倫理概念。
    zh: 儒家的黄金法则：己所不欲，勿施于人，中国哲学中的核心伦理概念。
    ar: 'القاعدة الذهبية الكونفوشيوسية: لا تفعل بالآخرين ما لا تريده لنفسك، مفهوم أخلاقي أساسي في الفلسفة
      الصينية.'
    he: 'כלל הזהב הקונפוציאני: אל תעשה לאחרים מה שלא תרצה שיעשו לך, מושג אתי מרכזי בפילוסופיה הסינית.'
