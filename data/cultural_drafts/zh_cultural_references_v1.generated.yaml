    ja: もともとは湯顕祖の戯曲『牡丹亭』に由来し、色とりどりの花が咲き乱れる様子を表し、現在は成語として鮮やかな美しさの場面を描写するのに使われる。
    zh: 原出自汤显祖的戏剧《牡丹亭》，形容百花盛开、色彩艳丽，现作为成语用于描绘绚丽的美丽景象。
    ar: في الأصل من مسرحية تانغ شيانتسو 'جناح الفاوانيا'، يصف هذا التعبير وفرة من الزهور الملونة، ويستخدم
