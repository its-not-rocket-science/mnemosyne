  i18n_explanations:
    en: Refers to the two main tune systems (xipi and erhuang) in traditional Chinese opera, especially
      Peking opera, representing its melodic foundation.
    es: Se refiere a los dos sistemas principales de melodías (xipi y erhuang) en la ópera tradicional
      china, especialmente en la ópera de Pekín, representando su base melódica.
    fr: Fait référence aux deux principaux systèmes de mélodies (xipi et erhuang) dans l'opéra traditionnel
      chinois, en particulier l'opéra de Pékin, représentant sa base mélodique.
    de: Bezieht sich auf die beiden Hauptmelodiesysteme (xipi und erhuang) in der traditionellen chinesischen
      Oper, insbesondere der Peking-Oper, die ihre melodische Grundlage darstellen.
    it: Si riferisce ai due principali sistemi melodici (xipi e erhuang) nell'opera tradizionale cinese,
      in particolare nell'opera di Pechino, rappresentandone la base melodica.
    pt: Refere-se aos dois principais sistemas de melodia (xipi e erhuang) na ópera tradicional chinesa,
      especialmente na ópera de Pequim, representando sua base melódica.
    ru: Относится к двум основным мелодическим системам (сипи и эрхуан) в традиционной китайской опере,
      особенно в пекинской опере, представляющим её мелодическую основу.
