  short_explanation: Credits Cangjie, a legendary figure, with inventing Chinese characters, supposedly
    inspired by animal tracks. It marks the dawn of Chinese written civilization and represents the power
    of writing to transform society.
  i18n_explanations:
    en: Credits Cangjie, a legendary figure, with inventing Chinese characters, supposedly inspired by
      animal tracks. It marks the dawn of Chinese written civilization and represents the power of writing
      to transform society.
    es: Atribuye a Cangjie, una figura legendaria, la invención de los caracteres chinos, supuestamente
      inspirada por las huellas de animales. Marca el amanecer de la civilización escrita china y representa
      el poder de la escritura para transformar la sociedad.
    fr: Attribue à Cangjie, une figure légendaire, l'invention des caractères chinois, supposément inspirée
      par les empreintes d'animaux. Cela marque l'aube de la civilisation écrite chinoise et représente
      le pouvoir de l'écriture de transformer la société.
    de: Schreibt Cangjie, einer legendären Figur, die Erfindung der chinesischen Schriftzeichen zu, die
      angeblich von Tierspuren inspiriert war. Es markiert die Morgendämmerung der chinesischen Schriftkultur
      und repräsentiert die Macht der Schrift, die Gesellschaft zu verändern.
    it: Attribuisce a Cangjie, una figura leggendaria, l'invenzione dei caratteri cinesi, presumibilmente
      ispirata dalle impronte degli animali. Segna l'alba della civiltà scritta cinese e rappresenta il
      potere della scrittura di trasformare la società.
    pt: Atribui a Cangjie, uma figura lendária, a invenção dos caracteres chineses, supostamente inspirada
      por pegadas de animais. Marca o amanhecer da civilização escrita chinesa e representa o poder da
      escrita para transformar a sociedade.
    ru: Приписывает Цан Цзе, легендарной фигуре, изобретение китайских иероглифов, предположительно вдохновлённое
      следами животных. Это знаменует рассвет китайской письменной цивилизации и представляет силу письма
      преобразовывать общество.
    ja: 伝説の人物である倉頡が、動物の足跡に触発されて漢字を発明したとされる。中国の文字文明の夜明けを象徴し、社会を変革する文字の力を表す。
    zh: 归功于仓颉，一位传奇人物发明了汉字，据说是受动物足迹的启发。它标志着中国文字文明的曙光，并代表文字改造社会的力量。
    ar: ينسب إلى تسانغ جي، شخصية أسطورية، اختراع الحروف الصينية، المستوحاة supposedly من آثار الحيوانات.
      يمثل فجر الحضارة الصينية المكتوبة ويمثل قوة الكتابة في تحويل المجتمع.
    he: מייחס לקאנג ג'י, דמות אגדית, את המצאת התווים הסיניים, בהשראת עקבות בעלי חיים. זה מסמן את שחר הציוויליזציה
      הסינית הכתובה ומייצג את כוחה של הכתיבה לשנות את החברה.
