    fr: Du poème de Du Fu 'Mon toit de chaume est ruiné par le vent d'automne', exprimant le souhait de
      milliers de bâtiments spacieux pour abriter les érudits pauvres. Cela montre l'altruisme du poète.
    de: Aus Du Fus Gedicht 'Mein Strohdach ist vom Herbstwind zerstört', drückt den Wunsch nach tausenden
