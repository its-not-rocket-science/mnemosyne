    es: Un viaje de mil millas comienza con un solo paso. Del Dao De Jing de Laozi, enfatiza que los grandes
      logros comienzan con pequeños comienzos y esfuerzo persistente.
    fr: Un voyage de mille lieues commence par un premier pas. Du Dao De Jing de Laozi, il souligne que
