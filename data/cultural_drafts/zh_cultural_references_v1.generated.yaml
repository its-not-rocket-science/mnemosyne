- id: zh_classical_or_scriptural_allusion_中流击楫_7084bf5f
  language: zh
  canonical_reference: 中流击楫
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 中流击楫
  - 击楫中流
  - 中流誓
  - 祖逖击楫
  short_explanation: Derived from the story of Zu Ti (Zu Di) in the Jin Dynasty who, while crossing a
    river, struck his oar and swore to reclaim lost territory. It symbolizes resolute determination and
    a vow to achieve a difficult goal.
  i18n_explanations:
    en: Derived from the story of Zu Ti (Zu Di) in the Jin Dynasty who, while crossing a river, struck
      his oar and swore to reclaim lost territory. It symbolizes resolute determination and a vow to achieve
      a difficult goal.
    es: Derivado de la historia de Zu Ti (Zu Di) en la dinastía Jin, quien al cruzar un río golpeó su
      remo y juró recuperar el territorio perdido. Simboliza una determinación resuelta y el voto de lograr
      una meta difícil.
    fr: Dérivé de l'histoire de Zu Ti (Zu Di) dans la dynastie Jin qui, en traversant une rivière, frappa
      sa rame et jura de reconquérir le territoire perdu. Il symbolise une détermination résolue et un
      vœu d'atteindre un objectif difficile.
    de: Abgeleitet von der Geschichte von Zu Ti (Zu Di) in der Jin-Dynastie, der beim Überqueren eines
      Flusses sein Ruder schlug und schwor, verlorenes Gebiet zurückzuerobern. Es symbolisiert entschlossene
      Entschlossenheit und das Gelübde, ein schwieriges Ziel zu erreichen.
    it: Derivato dalla storia di Zu Ti (Zu Di) nella dinastia Jin che, mentre attraversava un fiume, colpì
      il remo e giurò di riconquistare il territorio perduto. Simboleggia una determinazione risoluta
      e un voto per raggiungere un obiettivo difficile.
    pt: Derivado da história de Zu Ti (Zu Di) na dinastia Jin que, ao cruzar um rio, bateu no remo e jurou
      recuperar o território perdido. Simboliza determinação resoluta e um voto para alcançar um objetivo
      difícil.
    ru: Происходит из истории Цзу Ти (Цзу Ди) в династии Цзинь, который, переправляясь через реку, ударил
      веслом и поклялся вернуть потерянные земли. Символизирует решимость и клятву достичь трудной цели.
    ja: 晋代の祖逖（祖狄）の故事に由来する。川を渡る際に櫂を打ち鳴らし、失われた領土を奪還する誓いを立てた。断固たる決意と困難な目標達成への誓いを象徴する。
    zh: 源于晋代祖逖（祖狄）的故事，他在渡河时击桨发誓要收复失地，象征着坚定的决心和实现艰难目标的誓言。
    ar: مستمد من قصة زو تي (زو دي) في أسرة جين، الذي ضرب مجدافه أثناء عبور نهر وأقسم على استعادة الأراضي
      المفقودة. يرمز إلى العزم الراسخ والتعهد بتحقيق هدف صعب.
    he: נגזר מסיפורו של זו טי (זו די) בשושלת ג'ין, אשר בעת חציית נהר היכה במשוטו ונשבע להשיב שטחים אבודים.
      הוא מסמל נחישות איתנה ונדר להגשמת מטרה קשה.
