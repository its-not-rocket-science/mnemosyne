    de: Wie die Erde empfänglich ist, kultiviert der edle Mensch Tugend, um die Welt zu tragen. Aus dem
      Kommentar zum Kun-Hexagramm des Yijing lehrt es Großzügigkeit und die Fähigkeit, andere zu unterstützen.
