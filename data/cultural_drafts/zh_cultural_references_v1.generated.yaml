- id: zh_cultural_reference_郑和下西洋_fbbf7ebe
  language: zh
  canonical_reference: 郑和下西洋
  reference_type: cultural_reference
  surface_patterns:
  - 郑和下西洋
  - 下西洋的壮举
  - 郑和七下西洋
  short_explanation: Refers to the seven maritime expeditions led by the Ming dynasty eunuch admiral Zheng
    He (1405–1433) across the Indian Ocean, reaching as far as East Africa. It showcases China's early
    naval power and diplomatic outreach.
  i18n_explanations:
    en: Refers to the seven maritime expeditions led by the Ming dynasty eunuch admiral Zheng He (1405–1433)
      across the Indian Ocean, reaching as far as East Africa. It showcases China's early naval power
      and diplomatic outreach.
    es: Se refiere a las siete expediciones marítimas lideradas por el almirante eunuco Zheng He de la
      dinastía Ming (1405–1433) a través del Océano Índico, llegando hasta África Oriental. Muestra el
      poder naval temprano y el alcance diplomático de China.
    fr: Fait référence aux sept expéditions maritimes menées par l'amiral eunuque Zheng He de la dynastie
      Ming (1405–1433) à travers l'océan Indien, atteignant l'Afrique de l'Est. Il illustre la puissance
      navale précoce de la Chine et son rayonnement diplomatique.
    de: Bezieht sich auf die sieben Seefahrts expeditionen unter der Leitung des Eunuchen-Admirals Zheng
      He aus der Ming-Dynastie (1405–1433) über den Indischen Ozean, die bis nach Ostafrika reichten.
      Es zeigt Chinas frühe Seemacht und diplomatische Reichweite.
    it: Si riferisce alle sette spedizioni marittime guidate dall'ammiraglio eunuco Zheng He della dinastia
      Ming (1405–1433) attraverso l'Oceano Indiano, arrivando fino all'Africa orientale. Mostra la potenza
      navale e la portata diplomatica della Cina antica.
    pt: Refere-se às sete expedições marítimas lideradas pelo almirante eunuco Zheng He da dinastia Ming
      (1405–1433) através do Oceano Índico, chegando até a África Oriental. Mostra o poder naval inicial
      da China e seu alcance diplomático.
    ru: Относится к семи морским экспедициям, возглавляемым евнухом-адмиралом Чжэн Хэ из династии Мин
      (1405–1433), через Индийский океан, достигая Восточной Африки. Это демонстрирует раннюю военно-морскую
      мощь и дипломатический охват Китая.
    ja: 明の宦官提督・鄭和が1405年から1433年にかけてインド洋を横断し、東アフリカにまで到達した7回の海上遠征を指す。中国の初期の海軍力と外交的展開を示している。
    zh: 指的是明朝太监郑和率领的七次远洋航行（1405–1433），穿越印度洋，最远到达东非。它展示了中国早期的海军实力和外交拓展。
    ar: يشير إلى الحملات البحرية السبع التي قادها الأدميرال الخصي تشنغ خه من أسرة مينغ (1405–1433) عبر
      المحيط الهندي، وصولاً إلى شرق أفريقيا. إنه يُظهر القوة البحرية المبكرة للصين ومدى تواصلها الدبلوماسي.
    he: מתייחס לשבע משלחות ימיות שהוביל האדמירל הסריס ג'נג חה משושלת מינג (1405–1433) ברחבי האוקיינוס
