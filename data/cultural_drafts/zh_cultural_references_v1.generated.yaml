  short_explanation: Refers to the mythical sage Fuxi, who is credited with drawing the Eight Trigrams
    (bagua), the fundamental symbols of the I Ching. It represents the origin of Chinese cosmology and
    the binary system underlying philosophy.
  i18n_explanations:
    en: Refers to the mythical sage Fuxi, who is credited with drawing the Eight Trigrams (bagua), the
      fundamental symbols of the I Ching. It represents the origin of Chinese cosmology and the binary
      system underlying philosophy.
    es: Se refiere al sabio mítico Fuxi, a quien se le atribuye el dibujo de los Ocho Trigramas (bagua),
      los símbolos fundamentales del I Ching. Representa el origen de la cosmología china y el sistema
      binario que subyace a la filosofía.
    fr: Fait référence au sage mythique Fuxi, à qui l'on attribue le dessin des Huit Trigrammes (bagua),
      les symboles fondamentaux du Yi Jing. Il représente l'origine de la cosmologie chinoise et le système
      binaire sous-jacent à la philosophie.
    de: Bezieht sich auf den mythischen Weisen Fuxi, dem das Zeichnen der Acht Trigramme (Bagua) zugeschrieben
      wird, der grundlegenden Symbole des I Ging. Es repräsentiert den Ursprung der chinesischen Kosmologie
      und des binären Systems, das der Philosophie zugrunde liegt.
    it: Si riferisce al saggio mitico Fuxi, a cui viene attribuito il disegno degli Otto Trigrammi (bagua),
      i simboli fondamentali dell'I Ching. Rappresenta l'origine della cosmologia cinese e il sistema
      binario alla base della filosofia.
    pt: Refere-se ao sábio mítico Fuxi, a quem é atribuído o desenho dos Oito Trigramas (bagua), os símbolos
      fundamentais do I Ching. Representa a origem da cosmologia chinesa e o sistema binário subjacente
      à filosofia.
    ru: Относится к мифическому мудрецу Фуси, которому приписывают создание Восьми триграмм (Багуа), основных
      символов Ицзин. Это представляет происхождение китайской космологии и двоичной системы, лежащей
      в основе философии.
    ja: 神話の賢者伏羲が、易経の基本記号である八卦を描いたとされることに由来する。中国の宇宙論と哲学の基盤となる二進法の起源を表す。
    zh: 指神话中的圣人伏羲，他绘制了八卦，即《易经》的基本符号。它代表中国宇宙论的起源以及构成哲学基础的二进制系统。
    ar: يشير إلى الحكيم الأسطوري فوكسي، الذي يُنسب إليه رسم الأشكال الثمانية (باغوا)، الرموز الأساسية
      لكتاب التغييرات. يمثل أصل علم الكون الصيني والنظام الثنائي الذي تقوم عليه الفلسفة.
    he: מתייחס לחכם המיתולוגי פושי, שמיוחס לו ציור שמונת הטריגרמות (באגואה), הסמלים הבסיסיים של האי צ'ינג.
