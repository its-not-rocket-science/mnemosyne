- id: zh_classical_or_scriptural_allusion_喜怒哀乐之未发谓之中_5cd7850d
  language: zh
  canonical_reference: 喜怒哀乐之未发谓之中
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
