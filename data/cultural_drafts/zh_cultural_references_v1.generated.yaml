- id: zh_classical_or_scriptural_allusion_吾生也有涯_ae35557c
  language: zh
  canonical_reference: 吾生也有涯
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 吾生也有涯
  - 吾生有涯
  - 生也有涯
  short_explanation: From Zhuangzi, it means 'My life has limits,' typically followed by 'but knowledge
    has no limits.' It highlights the paradox of pursuing infinite knowledge within finite existence.
  i18n_explanations:
    en: From Zhuangzi, it means 'My life has limits,' typically followed by 'but knowledge has no limits.'
      It highlights the paradox of pursuing infinite knowledge within finite existence.
    es: De Zhuangzi, significa 'Mi vida tiene límites', seguido típicamente de 'pero el conocimiento no
      tiene límites'. Destaca la paradoja de perseguir conocimiento infinito dentro de una existencia
      finita.
    fr: De Zhuangzi, cela signifie 'Ma vie a des limites', généralement suivi de 'mais la connaissance
      n'a pas de limites'. Cela souligne le paradoxe de la poursuite de la connaissance infinie dans une
      existence finie.
    de: Aus Zhuangzi, es bedeutet 'Mein Leben hat Grenzen', typischerweise gefolgt von 'aber Wissen hat
      keine Grenzen'. Es hebt das Paradox hervor, unendliches Wissen innerhalb einer endlichen Existenz
      zu verfolgen.
    it: Da Zhuangzi, significa 'La mia vita ha limiti', tipicamente seguito da 'ma la conoscenza non ha
      limiti'. Evidenzia il paradosso di perseguire conoscenza infinita entro un'esistenza finita.
    pt: De Zhuangzi, significa 'Minha vida tem limites', tipicamente seguido por 'mas o conhecimento não
      tem limites'. Destaca o paradoxo de buscar conhecimento infinito dentro de uma existência finita.
    ru: Из Чжуан-цзы, это означает 'Моя жизнь имеет пределы', обычно за которым следует 'но знания не
      имеют пределов'. Это подчеркивает парадокс стремления к бесконечному знанию в рамках конечного существования.
    ja: 荘子からで、『私の命には限りがある』という意味で、通常『しかし知識には限りがない』と続きます。有限の存在の中で無限の知識を追求する逆説を強調しています。
    zh: 出自《庄子》，意思是“我的生命是有尽头的”，通常后面跟着“但知识是没有尽头的”。它强调了在有限的存在中追求无限知识的悖论。
    ar: من كتاب تشوانغ تزو، ويعني 'حياتي لها حدود'، ويتبعه عادة 'ولكن المعرفة ليس لها حدود'. يسلط الضوء
      على مفارقة السعي وراء المعرفة اللانهائية ضمن وجود محدود.
    he: מאת ג'ואנג דזה, פירושו 'לחיי יש גבולות', ואחריו בדרך כלל 'אך לידע אין גבולות'. זה מדגיש את הפרדוקס
      של רדיפה אחר ידע אינסופי בתוך קיום סופי.
