- id: zh_literary_reference_青_取之于蓝_而青于蓝_0d13ac08
  language: zh
  canonical_reference: 青，取之于蓝，而青于蓝
  reference_type: literary_reference
  surface_patterns:
  - 青出于蓝而胜于蓝
  - 青出于蓝
  - 青取之于蓝而青于蓝
  short_explanation: Indigo blue is extracted from the indigo plant but is bluer than it. This metaphor
    from Xunzi's 'Encouraging Learning' signifies that a student can surpass the teacher through diligence
    and effort.
  i18n_explanations:
    en: Indigo blue is extracted from the indigo plant but is bluer than it. This metaphor from Xunzi's
      'Encouraging Learning' signifies that a student can surpass the teacher through diligence and effort.
    es: El añil se extrae de la planta del índigo, pero es más azul que ella. Esta metáfora de 'Exhortación
      al aprendizaje' de Xunzi significa que un estudiante puede superar al maestro mediante la diligencia
      y el esfuerzo.
    fr: L'indigo est extrait de la plante d'indigo mais il est plus bleu qu'elle. Cette métaphore du 'Encouragement
      à l'apprentissage' de Xunzi signifie qu'un élève peut surpasser son maître grâce à la diligence
      et à l'effort.
    de: Indigoblau wird aus der Indigopflanze gewonnen, ist aber blauer als sie. Diese Metapher aus Xunzis
      'Ermutigung zum Lernen' bedeutet, dass ein Schüler durch Fleiß und Anstrengung den Lehrer übertreffen
      kann.
    it: L'indaco viene estratto dalla pianta dell'indaco ma è più blu di essa. Questa metafora da 'Incoraggiamento
      all'apprendimento' di Xunzi significa che uno studente può superare l'insegnante attraverso la diligenza
      e lo sforzo.
