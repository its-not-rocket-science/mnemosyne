  - 尝百草
  - 神农氏尝百草
  short_explanation: Describes the legendary emperor Shennong (Divine Farmer) who tasted hundreds of herbs
    to discover their medicinal properties, laying the foundation for Chinese herbal medicine. It represents
    self-sacrifice for knowledge and the origins of pharmacology.
  i18n_explanations:
    en: Describes the legendary emperor Shennong (Divine Farmer) who tasted hundreds of herbs to discover
      their medicinal properties, laying the foundation for Chinese herbal medicine. It represents self-sacrifice
      for knowledge and the origins of pharmacology.
    es: Describe al legendario emperador Shennong (Granjero Divino) que probó cientos de hierbas para
      descubrir sus propiedades medicinales, sentando las bases de la medicina herbal china. Representa
      el autosacrificio por el conocimiento y los orígenes de la farmacología.
    fr: Décrit l'empereur légendaire Shennong (Le Fermier Divin) qui a goûté des centaines d'herbes pour
      découvrir leurs propriétés médicinales, jetant les bases de la médecine végétale chinoise. Il représente
      le sacrifice de soi pour la connaissance et les origines de la pharmacologie.
    de: Beschreibt den legendären Kaiser Shennong (göttlicher Bauer), der Hunderte von Kräutern kostete,
      um ihre medizinischen Eigenschaften zu entdecken, und damit die Grundlage der chinesischen Kräutermedizin
      legte. Es steht für Selbstaufopferung für Wissen und die Ursprünge der Pharmakologie.
    it: Descrive il leggendario imperatore Shennong (Divino Agricoltore) che assaggiò centinaia di erbe
      per scoprire le loro proprietà medicinali, gettando le basi della medicina erboristica cinese. Rappresenta
      il sacrificio di sé per la conoscenza e le origini della farmacologia.
    pt: Descreve o lendário imperador Shennong (Agricultor Divino) que provou centenas de ervas para descobrir
      suas propriedades medicinais, estabelecendo a base da medicina herbal chinesa. Representa o auto-sacrifício
      pelo conhecimento e as origens da farmacologia.
    ru: Описывает легендарного императора Шэньнуна (Божественного земледельца), который попробовал сотни
      трав, чтобы открыть их лечебные свойства, заложив основы китайской травяной медицины. Это олицетворяет
      самопожертвование ради знаний и истоки фармакологии.
    ja: 伝説の天皇である神農（神農氏）が、漢方医学の基礎を築くために何百もの草を味わい、その薬効を発見したことを表す。知識のための自己犠牲と薬理学の起源を象徴する。
    zh: 描述神农（神农氏）品尝数百种草药以发现其药性，奠定了中草药学的基础。它代表为知识自我牺牲以及药理学的起源。
    ar: يصف الإمبراطور الأسطوري شينونغ (المزارع الإلهي) الذي تذوق مئات الأعشاب لاكتشاف خصائصها الطبية،
      واضعًا أساس الطب الصيني بالأعشاب. يمثل التضحية بالنفس من أجل المعرفة وأصول علم الأدوية.
    he: מתאר את הקיסר האגדי שנונג (החקלאי האלוהי) שטעם מאות עשבי תיבול כדי לגלות את סגולותיהם הרפואיות,
      והניח את היסודות לרפואת הצמחים הסינית. הוא מייצג הקרבה עצמית למען ידע ומקורות הפרמקולוגיה.
