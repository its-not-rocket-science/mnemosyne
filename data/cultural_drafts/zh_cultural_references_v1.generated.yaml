  short_explanation: Describes the legendary battle between the Yellow Emperor and the war god Chiyou
    at Zhuolu, often cited as the founding myth of Chinese civilization. It symbolizes the triumph of
    order over chaos and the unification of tribes.
  i18n_explanations:
    en: Describes the legendary battle between the Yellow Emperor and the war god Chiyou at Zhuolu, often
      cited as the founding myth of Chinese civilization. It symbolizes the triumph of order over chaos
      and the unification of tribes.
    es: Describe la legendaria batalla entre el Emperador Amarillo y el dios de la guerra Chiyou en Zhuolu,
      a menudo citada como el mito fundacional de la civilización china. Simboliza el triunfo del orden
      sobre el caos y la unificación de las tribus.
    fr: Décrit la bataille légendaire entre l'Empereur Jaune et le dieu de la guerre Chiyou à Zhuolu,
      souvent citée comme le mythe fondateur de la civilisation chinoise. Elle symbolise le triomphe de
      l'ordre sur le chaos et l'unification des tribus.
    de: Beschreibt die legendäre Schlacht zwischen dem Gelben Kaiser und dem Kriegsgott Chiyou in Zhuolu,
      die oft als Gründungsmythos der chinesischen Zivilisation angeführt wird. Sie symbolisiert den Triumph
      der Ordnung über das Chaos und die Vereinigung der Stämme.
    it: Descrive la leggendaria battaglia tra l'Imperatore Giallo e il dio della guerra Chiyou a Zhuolu,
      spesso citata come il mito fondatore della civiltà cinese. Simboleggia il trionfo dell'ordine sul
      caos e l'unificazione delle tribù.
    pt: Descreve a lendária batalha entre o Imperador Amarelo e o deus da guerra Chiyou em Zhuolu, frequentemente
      citada como o mito fundador da civilização chinesa. Simboliza o triunfo da ordem sobre o caos e
      a unificação das tribos.
    ru: Описывает легендарную битву между Жёлтым Императором и богом войны Чию в Чжолу, часто упоминаемую
      как основополагающий миф китайской цивилизации. Символизирует торжество порядка над хаосом и объединение
      племён.
    ja: 黄帝と戦神蚩尤が涿鹿で戦った伝説の戦いを表し、中国文明の創始神話とされる。秩序の混沌に対する勝利と部族の統一を象徴する。
    zh: 描述黄帝与战神蚩尤在涿鹿的传奇战斗，常被引为中国文明的创始神话。它象征秩序战胜混乱以及部落的统一。
    ar: يصف المعركة الأسطورية بين الإمبراطور الأصفر وإله الحرب تشيو في تشولوه، والتي غالبًا ما تُستشهد
      بها كأسطورة تأسيس الحضارة الصينية. ترمز إلى انتصار النظام على الفوضى وتوحيد القبائل.
    he: מתאר את הקרב האגדי בין הקיסר הצהוב לאל המלחמה צ'יו בזואולו, המובא לעתים קרובות כמיתוס המייסד של
      הציוויליזציה הסינית. הוא מסמל את ניצחון הסדר על הכאוס ואיחוד השבטים.
