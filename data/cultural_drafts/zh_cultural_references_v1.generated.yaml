  - 生花妙笔
  - 妙笔生花的故事
  short_explanation: Literally 'wonderful pen gives birth to flowers', referring to the legend that the
    Tang poet Li Bai dreamed his pen blossomed, symbolizing brilliant writing or literary genius. Commonly
    used to praise outstanding literary works.
  i18n_explanations:
    en: Literally 'wonderful pen gives birth to flowers', referring to the legend that the Tang poet Li
      Bai dreamed his pen blossomed, symbolizing brilliant writing or literary genius. Commonly used to
      praise outstanding literary works.
    es: Literalmente 'la pluma maravillosa da a luz flores', en referencia a la leyenda de que el poeta
      Tang Li Bai soñó que su pluma florecía, simbolizando una escritura brillante o genio literario.
      Se usa comúnmente para elogiar obras literarias sobresalientes.
    fr: Littéralement 'la plume merveilleuse donne naissance à des fleurs', faisant référence à la légende
      selon laquelle le poète Tang Li Bai a rêvé que sa plume fleurissait, symbolisant une écriture brillante
      ou un génie littéraire. Couramment utilisé pour louer des œuvres littéraires remarquables.
    de: Wörtlich 'wunderbare Feder bringt Blumen hervor', bezogen auf die Legende, dass der Tang-Dichter
      Li Bai träumte, seine Feder erblühte, was brillantes Schreiben oder literarisches Genie symbolisiert.
      Wird häufig verwendet, um herausragende literarische Werke zu loben.
    it: Letteralmente 'la penna meravigliosa dà vita ai fiori', riferito alla leggenda secondo cui il
      poeta Tang Li Bai sognò che la sua penna fiorisse, simboleggiando scrittura brillante o genio letterario.
      Comunemente usato per lodare opere letterarie eccezionali.
    pt: Literalmente 'a caneta maravilhosa dá origem a flores', referindo-se à lenda de que o poeta Tang
      Li Bai sonhou que sua caneta florescia, simbolizando escrita brilhante ou gênio literário. Comumente
      usado para elogiar obras literárias notáveis.
    ru: Буквально 'чудесное перо рождает цветы', отсылка к легенде о том, что танскому поэту Ли Баю приснилось,
      что его перо расцвело, символизируя блестящее письмо или литературный гений. Обычно используется
      для похвалы выдающихся литературных произведений.
    ja: 文字通り「素晴らしい筆が花を生む」という意味で、唐の詩人李白が筆が咲く夢を見たという伝説に由来し、 brilliant な文章や文学的才能を象徴する。優れた文学作品を称賛する際によく使われる。
    zh: 字面意思是‘妙笔生花’，指唐代诗人李白梦见自己的笔开了花，象征写作才华横溢或文学天才。常用于赞扬杰出的文学作品。
    ar: حرفيًا 'القلم الرائع يلد الزهور'، إشارة إلى أسطورة أن الشاعر تانغ لي باي حلم أن قلمه أزهر، يرمز
      إلى الكتابة الرائعة أو العبقرية الأدبية. يُستخدم عادةً للثناء على الأعمال الأدبية البارزة.
    he: תרתי משמע 'עט נפלא מוליד פרחים', בהתייחסות לאגדה שהמשורר טאנג לי באי חלם שעטו פרח, המסמל כתיבה
