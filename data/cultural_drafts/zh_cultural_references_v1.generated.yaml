  short_explanation: From Du Fu's poem 'Five Hundred Words on a Journey from the Capital to Fengxian',
    contrasting the rich's rotting food and wine with the frozen bones of the poor on the road. It criticizes
    social inequality.
  i18n_explanations:
    en: From Du Fu's poem 'Five Hundred Words on a Journey from the Capital to Fengxian', contrasting
      the rich's rotting food and wine with the frozen bones of the poor on the road. It criticizes social
      inequality.
    es: Del poema de Du Fu 'Quinientas palabras en un viaje de la capital a Fengxian', contrasta la comida
      y el vino podridos de los ricos con los huesos congelados de los pobres en el camino. Critica la
      desigualdad social.
    fr: Du poème de Du Fu 'Cinq cents mots sur un voyage de la capitale à Fengxian', contrastant la nourriture
      et le vin pourris des riches avec les os gelés des pauvres sur la route. Il critique l'inégalité
      sociale.
    de: Aus Du Fus Gedicht 'Fünfhundert Worte auf einer Reise von der Hauptstadt nach Fengxian', stellt
      das verrottende Essen und den Wein der Reichen den gefrorenen Knochen der Armen auf der Straße gegenüber.
      Es kritisiert soziale Ungleichheit.
    it: Dalla poesia di Du Fu 'Cinquecento parole in un viaggio dalla capitale a Fengxian', contrappone
      il cibo e il vino marci dei ricchi alle ossa congelate dei poveri sulla strada. Critica la disuguaglianza
      sociale.
    pt: Do poema de Du Fu 'Quinhentas palavras em uma viagem da capital a Fengxian', contrastando a comida
      e o vinho podres dos ricos com os ossos congelados dos pobres na estrada. Critica a desigualdade
      social.
    ru: Из стихотворения Ду Фу «Пятьсот слов в путешествии от столицы до Фэнсяня», противопоставляющего
      гниющую еду и вино богатых замерзшим костям бедных на дороге. Критикует социальное неравенство.
    ja: 杜甫の詩『自京赴奉先県詠懐五百字』より、金持ちの腐った食べ物と酒と、道端の貧しい人々の凍えた骨を対比。社会的不平等を批判する。
    zh: 出自杜甫的诗歌《自京赴奉先县咏怀五百字》，将富人家腐烂的酒肉与路边穷人的冻骨形成对比。批判社会贫富不均。
    ar: من قصيدة دو فو 'خمسمائة كلمة في رحلة من العاصمة إلى فنغشيان'، تتناقض بين الطعام والنبيذ الفاسد
      للأغنياء وعظام الفقراء المتجمدة على الطريق. تنتقد عدم المساواة الاجتماعية.
    he: מתוך שירו של דו פו 'חמש מאות מילים במסע מהבירה לפנגשיאן', מנוגד בין האוכל והיין הרקובים של העשירים
      לבין העצמות הקפואות של העניים על הכביש. מבקר את אי השוויון החברתי.
