- id: zh_literary_reference_前事不忘_后事之师_d2820177
  language: zh
  canonical_reference: 前事不忘，后事之师
  reference_type: literary_reference
  surface_patterns:
  - 前事不忘
  - 后事之师
  - 前事不忘，后事之师
  - 前事不忘，后事之师也
  short_explanation: This proverb means that remembering past experiences can serve as a guide for future
    actions; it emphasizes learning from history and is commonly used in Chinese literature and education.
  i18n_explanations:
    en: This proverb means that remembering past experiences can serve as a guide for future actions;
      it emphasizes learning from history and is commonly used in Chinese literature and education.
    es: Este proverbio significa que recordar experiencias pasadas puede servir de guía para acciones
      futuras; enfatiza aprender de la historia y se usa comúnmente en la literatura y educación china.
    fr: Ce proverbe signifie que se souvenir des expériences passées peut servir de guide pour les actions
      futures ; il met l'accent sur l'apprentissage de l'histoire et est couramment utilisé dans la littérature
      et l'éducation chinoises.
    de: Dieses Sprichwort bedeutet, dass das Erinnern an vergangene Erfahrungen als Leitfaden für zukünftige
      Handlungen dienen kann; es betont das Lernen aus der Geschichte und wird häufig in der chinesischen
      Literatur und Bildung verwendet.
    it: Questo proverbio significa che ricordare le esperienze passate può servire da guida per le azioni
      future; enfatizza l'apprendimento dalla storia ed è comunemente usato nella letteratura e nell'educazione
      cinese.
    pt: Este provérbio significa que lembrar experiências passadas pode servir de guia para ações futuras;
      enfatiza aprender com a história e é comumente usado na literatura e educação chinesa.
    ru: Эта пословица означает, что память о прошлом опыте может служить руководством для будущих действий;
      она подчеркивает важность изучения истории и часто используется в китайской литературе и образовании.
    ja: このことわざは、過去の経験を忘れずに将来の行動の指針とすることを意味し、歴史から学ぶことを強調し、中国の文学や教育でよく使われます。
    zh: 这句谚语意思是记住过去的经验可以作为未来行动的指南；它强调从历史中学习，在中国文学和教育中常用。
    ar: يعني هذا المثل أن تذكر التجارب السابقة يمكن أن يكون دليلاً للإجراءات المستقبلية؛ ويؤكد على التعلم
      من التاريخ ويستخدم بشكل شائع في الأدب والتعليم الصيني.
    he: פתגם זה אומר שזכירת חוויות העבר יכולה לשמש כמדריך לפעולות עתידיות; הוא מדגיש למידה מההיסטוריה
