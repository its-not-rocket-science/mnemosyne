- id: zh_classical_or_scriptural_allusion_知之为知之_dd357a38
  language: zh
  canonical_reference: 知之为知之
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 知之为知之
  - 知之为知之不知为不知
  - 知之為知之
  short_explanation: From the Analects, it means 'To know when you know, and to know when you do not know,
    that is wisdom.' It emphasizes intellectual humility and honesty.
  i18n_explanations:
    en: From the Analects, it means 'To know when you know, and to know when you do not know, that is
      wisdom.' It emphasizes intellectual humility and honesty.
    es: De los Analectos, significa 'Saber cuando se sabe y saber cuando no se sabe, eso es sabiduría'.
      Enfatiza la humildad y honestidad intelectual.
    fr: Des Entretiens de Confucius, cela signifie 'Savoir quand on sait, et savoir quand on ne sait pas,
      voilà la sagesse'. Il met l'accent sur l'humilité et l'honnêteté intellectuelles.
    de: Aus den Gesprächen (Analekten), bedeutet es 'Wissen, wenn man weiß, und wissen, wenn man nicht
      weiß, das ist Weisheit'. Es betont intellektuelle Bescheidenheit und Ehrlichkeit.
    it: Dai Dialoghi (Analecta), significa 'Sapere quando si sa, e sapere quando non si sa, questa è saggezza'.
      Sottolinea l'umiltà e l'onestà intellettuale.
    pt: Dos Analectos, significa 'Saber quando se sabe e saber quando não se sabe, isso é sabedoria'.
      Enfatiza a humildade e honestidade intelectual.
    ru: Из 'Лунь юй' (Беседы и суждения), это означает 'Знать, когда знаешь, и знать, когда не знаешь,
      — это и есть мудрость'. Это подчеркивает интеллектуальную скромность и честность.
    ja: 論語からで、「知っていることを知っているとし、知らないことを知らないとすることが、これが知恵である」という意味。知的謙虚さと正直さを強調しています。
    zh: 出自《论语》，意思是“知道就是知道，不知道就是不知道，这才是智慧”。它强调智识上的谦逊和诚实。
    ar: من الحوارات (الأناليكت)، ويعني 'أن تعرف عندما تعرف، وأن تعرف عندما لا تعرف، هذه هي الحكمة'. يؤكد
      على التواضع الفكري والصدق.
    he: מהאנלקטים (שיחות קונפוציוס), פירושו 'לדעת כשאתה יודע, ולדעת כשאתה לא יודע, זו חכמה'. הוא מדגיש
      ענווה אינטלקטואלית ויושר.
