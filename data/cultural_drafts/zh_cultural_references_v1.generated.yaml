    es: Una famosa escena de 'Romance de los Tres Reinos' donde Cao Cao y Liu Bei discuten sobre héroes
      mientras beben vino caliente y ciruelas verdes, simbolizando ambición oculta e intriga psicológica.
    fr: Une scène célèbre du 'Roman des Trois Royaumes' où Cao Cao et Liu Bei discutent des héros autour
      de vin chaud et de prunes vertes, symbolisant l'ambition cachée et l'intrigue psychologique.
    de: Eine berühmte Szene aus 'Die Geschichte der Drei Reiche', in der Cao Cao und Liu Bei bei warmem
