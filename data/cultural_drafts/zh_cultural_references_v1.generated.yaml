- id: zh_classical_or_scriptural_allusion_树欲静而风不止_子欲养而亲不待_c566eddb
  language: zh
  canonical_reference: 树欲静而风不止，子欲养而亲不待
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 树欲静而风不止
  - 子欲养而亲不待
  - 树欲静而风不止，子欲养而亲不待
  - 树欲静而风不宁，子欲养而亲不待
  short_explanation: This saying expresses the regret that external circumstances prevent one from fulfilling
    filial duties; it is a classical Chinese proverb about filial piety often used to urge people to care
    for their parents while they are still alive.
  i18n_explanations:
    en: This saying expresses the regret that external circumstances prevent one from fulfilling filial
      duties; it is a classical Chinese proverb about filial piety often used to urge people to care for
      their parents while they are still alive.
    es: Este dicho expresa el pesar de que las circunstancias externas impiden cumplir con los deberes
      filiales; es un proverbio clásico chino sobre la piedad filial, frecuentemente usado para instar
      a las personas a cuidar a sus padres mientras aún viven.
    fr: Ce dicton exprime le regret que les circonstances extérieures empêchent d'accomplir ses devoirs
      filiaux ; c'est un proverbe classique chinois sur la piété filiale souvent utilisé pour exhorter
      les gens à prendre soin de leurs parents de leur vivant.
    de: Dieser Spruch drückt das Bedauern aus, dass äußere Umstände einen daran hindern, seine kindlichen
      Pflichten zu erfüllen; es ist ein klassisches chinesisches Sprichwort über kindliche Pietät, das
      oft verwendet wird, um Menschen zu ermutigen, sich um ihre Eltern zu kümmern, solange diese noch
      leben.
    it: Questo detto esprime il rammarico che le circostanze esterne impediscano di adempiere ai doveri
      filiali; è un proverbio classico cinese sulla pietà filiale spesso usato per esortare le persone
      a prendersi cura dei propri genitori finché sono in vita.
    pt: Este ditado expressa o arrependimento de que as circunstâncias externas impeçam alguém de cumprir
      seus deveres filiais; é um provérbio clássico chinês sobre piedade filial frequentemente usado para
      instar as pessoas a cuidar de seus pais enquanto ainda estão vivos.
    ru: Эта поговорка выражает сожаление о том, что внешние обстоятельства мешают человеку выполнять сыновний
      долг; это классическая китайская пословица о сыновней почтительности, часто используемая, чтобы
      призвать людей заботиться о родителях, пока они живы.
    ja: このことわざは、外的な事情によって親孝行ができない悔しさを表しており、生きている間に両親を大事にするよう促す中国の古典的な孝行の教えです。
    zh: 这句话表达了因外部环境阻碍而无法尽孝的遗憾；这是一句关于孝道的中国经典谚语，常用来劝诫人们趁父母健在时尽孝。
    ar: يعبر هذا المثل عن الأسف لأن الظروف الخارجية تمنع المرء من أداء واجباته البنوية؛ وهو مثل صيني كلاسيكي
      عن البر بالوالدين يُستخدم غالباً لحث الناس على رعاية والديهم أثناء حياتهم.
    he: פתגם זה מבטא צער על כך שנסיבות חיצוניות מונעות מאדם למלא את חובותיו הבנים; זהו פתגם סיני קלאסי
      על כיבוד הורים, המשמש לעיתים קרובות כדי לדרבן אנשים לטפל בהוריהם בעודם בחיים.
