- id: zh_proverb_tradition_一寸光阴一寸金_寸金难买寸光阴_4fb6cce4
  language: zh
  canonical_reference: 一寸光阴一寸金，寸金难买寸光阴
  reference_type: proverb_tradition
  surface_patterns:
