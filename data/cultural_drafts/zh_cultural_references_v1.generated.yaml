  short_explanation: Wang Zhaojun, a Han dynasty palace lady, was married to a Xiongnu chieftain to secure
    peace, symbolizing personal sacrifice for national interest. It is a popular theme in Chinese literature
    and art.
  i18n_explanations:
    en: Wang Zhaojun, a Han dynasty palace lady, was married to a Xiongnu chieftain to secure peace, symbolizing
      personal sacrifice for national interest. It is a popular theme in Chinese literature and art.
    es: Wang Zhaojun, una dama de palacio de la dinastía Han, se casó con un cacique xiongnu para asegurar
      la paz, simbolizando el sacrificio personal por el interés nacional. Es un tema popular en la literatura
      y el arte chinos.
    fr: Wang Zhaojun, une dame du palais de la dynastie Han, a été mariée à un chef Xiongnu pour assurer
      la paix, symbolisant le sacrifice personnel pour l'intérêt national. C'est un thème populaire dans
      la littérature et l'art chinois.
    de: Wang Zhaojun, eine Palastdame der Han-Dynastie, wurde mit einem Xiongnu-Häuptling verheiratet,
      um den Frieden zu sichern, und symbolisiert persönliches Opfer für das nationale Interesse. Es ist
      ein beliebtes Thema in der chinesischen Literatur und Kunst.
    it: Wang Zhaojun, una dama di palazzo della dinastia Han, fu sposata a un capo Xiongnu per garantire
      la pace, simboleggiando il sacrificio personale per l'interesse nazionale. È un tema popolare nella
      letteratura e nell'arte cinese.
    pt: Wang Zhaojun, uma dama do palácio da dinastia Han, foi casada com um chefe xiongnu para garantir
      a paz, simbolizando sacrifício pessoal pelo interesse nacional. É um tema popular na literatura
      e arte chinesas.
    ru: Ван Чжаоцзюнь, придворная дама династии Хань, была выдана замуж за вождя сюнну для обеспечения
      мира, символизируя личную жертву ради национальных интересов. Это популярная тема в китайской литературе
      и искусстве.
    ja: 漢代の宮女・王昭君が匈奴の首長に嫁ぎ平和を確保した故事。個人の犠牲が国家の利益となる象徴。中国文学や芸術で人気の題材。
    zh: 汉代宫女王昭君嫁给匈奴单于以保和平，象征着为国家利益牺牲个人。是中国文学和艺术中流行的主题。
    ar: وانغ تشاو جيون، سيدة قصر من عهد أسرة هان، تزوجت من زعيم شيونغنو لضمان السلام، وترمز إلى التضحية
      الشخصية من أجل المصلحة الوطنية. إنه موضوع شائع في الأدب والفن الصيني.
    he: ואנג ז'אוג'ון, גבירת ארמון משושלת האן, נישאה לראש שבט שיונגנו כדי להבטיח שלום, ומסמלת הקרבה אישית
      למען האינטרס הלאומי. זהו נושא פופולרי בספרות ובאמנות הסינית.
