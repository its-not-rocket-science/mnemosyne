- id: zh_literary_reference_天下兴亡_匹夫有责_5af4af49
  language: zh
  canonical_reference: 天下兴亡，匹夫有责
  reference_type: literary_reference
  surface_patterns:
  - 天下兴亡
  - 匹夫有责
  - 天下兴亡，匹夫有责
  - 国家兴亡，匹夫有责
  short_explanation: This saying means that every individual is responsible for the rise and fall of their
    country; it is a famous quote from Gu Yanwu's 'Rizhilu' and is widely used to inspire patriotism and
    civic duty.
  i18n_explanations:
    en: This saying means that every individual is responsible for the rise and fall of their country;
      it is a famous quote from Gu Yanwu's 'Rizhilu' and is widely used to inspire patriotism and civic
      duty.
    es: Este dicho significa que cada individuo es responsable del auge y caída de su país; es una famosa
      cita de 'Rizhilu' de Gu Yanwu y se usa ampliamente para inspirar patriotismo y deber cívico.
    fr: Ce dicton signifie que chaque individu est responsable de la montée et de la chute de son pays
      ; c'est une citation célèbre du 'Rizhilu' de Gu Yanwu et est largement utilisée pour inspirer le
      patriotisme et le devoir civique.
    de: Dieser Spruch bedeutet, dass jeder Einzelne für den Auf- und Abschwung seines Landes verantwortlich
      ist; es ist ein berühmtes Zitat aus Gu Yanwus 'Rizhilu' und wird häufig verwendet, um Patriotismus
      und staatsbürgerliche Pflicht zu inspirieren.
    it: Questo detto significa che ogni individuo è responsabile dell'ascesa e della caduta del proprio
      paese; è una famosa citazione dal 'Rizhilu' di Gu Yanwu ed è ampiamente usata per ispirare patriottismo
      e dovere civico.
    pt: Este ditado significa que cada indivíduo é responsável pela ascensão e queda de seu país; é uma
      famosa citação do 'Rizhilu' de Gu Yanwu e é amplamente usada para inspirar patriotismo e dever cívico.
    ru: Эта поговорка означает, что каждый человек несет ответственность за взлеты и падения своей страны;
      это известная цитата из «Жижилу» Гу Яньу, широко используемая для вдохновения патриотизма и гражданского
      долга.
    ja: このことわざは、国の盛衰には一人ひとりに責任があるという意味で、顧炎武の『日知録』からの有名な引用であり、愛国心と市民の義務を促すために広く使われています。
    zh: 这句话意味着每个人对自己国家的兴衰都有责任；它出自顾炎武的《日知录》，是名言，被广泛用于激发爱国主义和公民责任感。
    ar: يعني هذا القول أن كل فرد مسؤول عن صعود وهبوط بلده؛ وهو اقتباس مشهور من 'ريتشيلو' لغو يان وو ويستخدم
      على نطاق واسع لإلهام الوطنية والواجب المدني.
    he: אמרה זו פירושה שכל פרט אחראי לעלייה ולנפילה של ארצו; זהו ציטוט מפורסם מתוך 'ריז'ילו' של גו יאנו,
      ונמצא בשימוש נרחב להשראת פטריוטיות וחובה אזרחית.
