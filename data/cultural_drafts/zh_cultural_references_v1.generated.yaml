    es: Originalmente de la obra de Tang Xianzu 'El Pabellón de las Peonías', esta frase describe una
      profusión de flores coloridas, y ahora se usa como chengyu para representar una escena de belleza
      vibrante.
    fr: À l'origine de la pièce de Tang Xianzu 'Le Pavillon aux pivoines', cette expression décrit une
      profusion de fleurs colorées et est maintenant utilisée comme chengyu pour dépeindre une scène d'une
      beauté éclatante.
    de: Ursprünglich aus Tang Xianzus Stück 'Der Pfingstrosenpavillon' stammend, beschreibt diese Redewendung
