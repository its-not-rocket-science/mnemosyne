- id: zh_cultural_reference_科班出身_c25a5a78
  language: zh
  canonical_reference: 科班出身
  reference_type: cultural_reference
  surface_patterns:
  - 科班出身
  - 科班出身的演员
  - 非科班出身
  short_explanation: Refers to someone who has received formal, systematic training, originally from traditional
    Chinese opera schools (科班). Now used broadly to indicate professional training in any field.
  i18n_explanations:
    en: Refers to someone who has received formal, systematic training, originally from traditional Chinese
      opera schools (科班). Now used broadly to indicate professional training in any field.
    es: Se refiere a alguien que ha recibido formación formal y sistemática, originalmente de las escuelas
      tradicionales de ópera china (科班). Ahora se usa ampliamente para indicar formación profesional en
      cualquier campo.
    fr: Fait référence à quelqu'un qui a reçu une formation formelle et systématique, à l'origine dans
      les écoles d'opéra traditionnel chinois (科班). Désormais utilisé largement pour indiquer une formation
      professionnelle dans n'importe quel domaine.
    de: Bezieht sich auf jemanden, der eine formale, systematische Ausbildung erhalten hat, ursprünglich
      von traditionellen chinesischen Opernschulen (科班). Heute wird es allgemein verwendet, um eine professionelle
      Ausbildung in jedem Bereich zu kennzeichnen.
    it: Si riferisce a qualcuno che ha ricevuto una formazione formale e sistematica, originariamente
      dalle scuole di opera tradizionale cinese (科班). Ora è usato in senso lato per indicare una formazione
      professionale in qualsiasi campo.
    pt: Refere-se a alguém que recebeu treinamento formal e sistemático, originalmente das escolas tradicionais
      de ópera chinesa (科班). Agora é usado amplamente para indicar treinamento profissional em qualquer
      área.
    ru: Относится к человеку, прошедшему формальное систематическое обучение, изначально в традиционных
      школах китайской оперы (科班). Сейчас широко используется для обозначения профессиональной подготовки
      в любой области.
    ja: 元々は伝統的な中国オペラ学校（科班）で正式な体系的な訓練を受けた人を指します。現在ではあらゆる分野での専門的な訓練を示すのに広く使われます。
    zh: 指受过正规、系统训练的人，最初来自传统的戏曲学校（科班）。现在广泛用于表示任何领域的专业培训背景。
    ar: يشير إلى شخص تلقى تدريبًا رسميًا ومنهجيًا، نشأ في الأصل من مدارس الأوبرا الصينية التقليدية (科班).
      يُستخدم الآن على نطاق واسع للإشارة إلى التدريب المهني في أي مجال.
    he: מתייחס למי שקיבל הכשרה פורמלית ושיטתית, במקור מבתי ספר מסורתיים לאופרה סינית (科班). כיום משמש באופן
