      pour améliorer quelque chose ou faire une grande amélioration.
    de: Wörtlich 'einen Stein berühren und in Gold verwandeln', bezieht sich auf die magische Fähigkeit,
      etwas Gewöhnliches in etwas Wertvolles zu verwandeln. Es wird oft metaphorisch verwendet, um etwas
      zu verbessern oder eine große Verbesserung zu erzielen.
    it: Letteralmente 'toccare una pietra e trasformarla in oro', si riferisce alla capacità magica di
