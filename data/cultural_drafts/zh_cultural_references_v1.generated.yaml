      orderly, and well-organized. It originates from the rhythmic patterns in Chinese opera.
    es: Literalmente 'tener ritmo', este modismo describe acciones o discursos metódicos, ordenados y
      bien organizados. Se origina en los patrones rítmicos de la ópera china.
    fr: Littéralement « avoir des battements et du rythme », cet idiome décrit des actions ou un discours
      méthodiques, ordonnés et bien organisés. Il provient des motifs rythmiques de l'opéra chinois.
    de: Wörtlich „Rhythmus haben“, beschreibt diese Redewendung Handlungen oder Reden, die methodisch,
      ordentlich und gut organisiert sind. Sie stammt aus den rhythmischen Mustern der chinesischen Oper.
    it: Letteralmente 'avere battute e ritmo', questo modo di dire descrive azioni o discorsi metodici,
      ordinati e ben organizzati. Ha origine dai pattern ritmici dell'opera cinese.
    pt: Literalmente 'ter batidas e ritmo', este idioma descreve ações ou discursos metódicos, ordenados
      e bem organizados. Tem origem nos padrões rítmicos da ópera chinesa.
    ru: Буквально «иметь такты и ритм», этот идиома описывает действия или речь, которые являются методичными,
      упорядоченными и хорошо организованными. Происходит от ритмических рисунков китайской оперы.
    ja: 文字通り「拍子とリズムがある」という意味で、行動や話し方が整然としていることを表す慣用句です。中国オペラのリズムパターンに由来します。
    zh: 字面意思是“有节拍和节奏”，这个成语形容行动或说话有条理、有秩序、组织良好。它源自中国戏曲的节奏模式。
    ar: حرفيًا «وجود إيقاع ونغمة»، يصف هذا المصطلح الأفعال أو الكلام المنهجي والمنظم. ينشأ من الأنماط
      الإيقاعية في الأوبرا الصينية.
    he: פירושו המילולי 'יש פעימה וקצב', פתגם זה מתאר פעולות או דיבור שהם שיטתיים, מסודרים ומאורגנים היטב.
