- id: zh_literary_reference_路漫漫其修远兮_吾将上下而求索_9c01cc08
  language: zh
  canonical_reference: 路漫漫其修远兮，吾将上下而求索
  reference_type: literary_reference
  surface_patterns:
  - 路漫漫其修远兮，吾将上下而求索
  - 路漫漫其修远兮
  - 吾将上下而求索
  short_explanation: A line from Qu Yuan's Li Sao meaning 'the road ahead is long and winding, I will
    search high and low.' It symbolizes perseverance and the relentless pursuit of truth.
  i18n_explanations:
    en: A line from Qu Yuan's Li Sao meaning 'the road ahead is long and winding, I will search high and
      low.' It symbolizes perseverance and the relentless pursuit of truth.
    es: Un verso del Li Sao de Qu Yuan que significa 'el camino por delante es largo y sinuoso, buscaré
      arriba y abajo'. Simboliza la perseverancia y la búsqueda incansable de la verdad.
    fr: Un vers du Li Sao de Qu Yuan signifiant 'la route à venir est longue et sinueuse, je chercherai
      haut et bas'. Il symbolise la persévérance et la quête incessante de la vérité.
    de: Ein Vers aus Qu Yuans Li Sao mit der Bedeutung 'der Weg vor mir ist lang und gewunden, ich werde
      oben und unten suchen'. Es symbolisiert Ausdauer und das unermüdliche Streben nach Wahrheit.
    it: Un verso del Li Sao di Qu Yuan che significa 'la strada davanti è lunga e tortuosa, cercherò in
      alto e in basso'. Simboleggia la perseveranza e la ricerca incessante della verità.
    pt: Um verso do Li Sao de Qu Yuan que significa 'a estrada à frente é longa e sinuosa, procurarei
      em cima e em baixo'. Simboliza a perseverança e a busca incansável pela verdade.
    ru: Строка из «Лисао» Цюй Юаня, означающая «дорога впереди длинна и извилиста, я буду искать повсюду».
      Она символизирует настойчивость и неустанное стремление к истине.
    ja: 屈原の『離騒』の一節で、「道のりは長く曲がりくねっている、私は上も下も探し求める」という意味。忍耐と真実への絶え間ない追求を象徴する。
    zh: 出自屈原《离骚》的一句诗，意为‘前方的路漫长而曲折，我将上下求索’。它象征着坚持不懈和对真理的不懈追求。
    ar: بيت من قصيدة "لي ساو" لـ تشو يوان يعني 'الطريق أمامي طويل ومتعرج، سأبحث عالياً ومنخفضاً'. يرمز
      إلى المثابرة والسعي الدؤوب وراء الحقيقة.
    he: שורה מ'לי סאו' של קו יואן, משמעותה 'הדרך לפני ארוכה ומתפתלת, אחפש גבוה ונמוך'. היא מסמלת התמדה
      ורדיפה בלתי פוסקת אחר האמת.
