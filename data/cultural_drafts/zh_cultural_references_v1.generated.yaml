  short_explanation: A phrase from 'The Doctrine of the Mean', meaning 'Before the feelings of pleasure,
    anger, sorrow, and joy are aroused, it is called equilibrium (centrality).' It describes a state of
    inner balance before emotional reaction.
  i18n_explanations:
    en: A phrase from 'The Doctrine of the Mean', meaning 'Before the feelings of pleasure, anger, sorrow,
      and joy are aroused, it is called equilibrium (centrality).' It describes a state of inner balance
      before emotional reaction.
    es: Una frase de 'La Doctrina del Medio', que significa 'Antes de que se despierten los sentimientos
      de placer, ira, tristeza y alegría, se llama equilibrio (centralidad)'. Describe un estado de equilibrio
      interior antes de la reacción emocional.
    fr: Une phrase de 'La Doctrine du juste milieu', signifiant 'Avant que les sentiments de plaisir,
      de colère, de tristesse et de joie ne soient éveillés, on appelle cela l'équilibre (centralité).'
      Elle décrit un état d'équilibre intérieur avant la réaction émotionnelle.
    de: Ein Satz aus 'Die Lehre vom Maß', der bedeutet 'Bevor die Gefühle von Lust, Zorn, Trauer und Freude
      erregt werden, nennt man das Gleichgewicht (Zentralität).' Es beschreibt einen Zustand innerer Balance
      vor emotionaler Reaktion.
    it: Una frase da 'La Dottrina del Giusto Mezzo', che significa 'Prima che i sentimenti di piacere,
      rabbia, tristezza e gioia siano suscitati, si chiama equilibrio (centralità).' Descrive uno stato
      di equilibrio interiore prima della reazione emotiva.
    pt: Uma frase de 'A Doutrina do Meio', que significa 'Antes que os sentimentos de prazer, raiva, tristeza
      e alegria sejam despertados, chama-se equilíbrio (centralidade).' Descreve um estado de equilíbrio
      interno antes da reação emocional.
    ru: Фраза из «Учения о середине», означающая «До того, как чувства удовольствия, гнева, печали и радости
      возбуждены, это называется равновесием (центральностью)». Она описывает состояние внутреннего баланса
      до эмоциональной реакции.
    ja: 『中庸』の一節で、「喜び、怒り、悲しみ、楽しみの感情がまだ起こらない前の状態を『中』という」という意味。感情反応前の内面の均衡状態を述べている。
    zh: 出自《中庸》的一句，意为‘喜怒哀乐等感情尚未发生时，称为中’。形容情感反应前的内在平衡状态。
    ar: عبارة من 'مبدأ الوسط'، وتعني 'قبل أن تثار مشاعر اللذة والغضب والحزن والفرح، يسمى ذلك توازنًا (مركزية).'
      تصف حالة من التوازن الداخلي قبل رد الفعل العاطفي.
    he: ביטוי מ'תורת הממוצע', משמעותו 'לפני שמתעוררות הרגשות של עונג, כעס, עצב ושמחה, זה נקרא שיווי משקל
      (מרכזיות).' היא מתארת מצב של איזון פנימי לפני תגובה רגשית.
