- id: zh_classical_or_scriptural_allusion_天将降大任于是人也_必先苦其心志_cc01b6ca
  language: zh
  canonical_reference: 天将降大任于是人也，必先苦其心志
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 天将降大任于是人也，必先苦其心志
  - 天将降大任于斯人也
  - 苦其心志，劳其筋骨
  short_explanation: When Heaven is about to assign a great task to someone, it first troubles his mind.
    This Confucian adage emphasizes that hardship is a prerequisite for success.
  i18n_explanations:
    en: When Heaven is about to assign a great task to someone, it first troubles his mind. This Confucian
      adage emphasizes that hardship is a prerequisite for success.
    es: Cuando el Cielo va a asignar una gran tarea a alguien, primero perturba su mente. Este adagio
      confuciano enfatiza que la adversidad es un requisito previo para el éxito.
    fr: Quand le Ciel s'apprête à confier une grande tâche à quelqu'un, il trouble d'abord son esprit.
      Cet adage confucéen souligne que l'adversité est une condition préalable au succès.
    de: Wenn der Himmel jemandem eine große Aufgabe zuweisen will, quält er zuerst seinen Geist. Dieses
      konfuzianische Sprichwort betont, dass Härte eine Voraussetzung für Erfolg ist.
    it: Quando il Cielo sta per assegnare un grande compito a qualcuno, prima turba la sua mente. Questo
      adagio confuciano sottolinea che le difficoltà sono un prerequisito per il successo.
    pt: Quando o Céu está prestes a atribuir uma grande tarefa a alguém, primeiro perturba sua mente.
      Este adágio confuciano enfatiza que a adversidade é um pré-requisito para o sucesso.
    ru: Когда Небо собирается возложить великую задачу на кого-то, оно сначала тревожит его ум. Эта конфуцианская
      поговорка подчеркивает, что трудности являются предпосылкой успеха.
    ja: 天が人に大任を授けようとするとき、まずその心を苦しめる。この儒教の格言は、苦難が成功の前提条件であることを強調している。
    zh: 天将降大任于是人也，必先苦其心志。这句儒家格言强调苦难是成功的先决条件。
    ar: عندما توشك السماء أن تسند مهمة عظيمة لشخص ما، فإنها تزعج عقله أولاً. هذا المثل الكونفوشي يؤكد
      أن المشقة شرط أساسي للنجاح.
    he: כשהשמים עומדים להטיל משימה גדולה על מישהו, הם תחילה מטרידים את מוחו. הפתגם הקונפוציאני הזה מדגיש
      שהקשיים הם תנאי מקדים להצלחה.
