  short_explanation: Refers to Zhang Qian's diplomatic mission to Central Asia during the Han dynasty,
    which opened the Silk Road and expanded Chinese influence. It symbolizes pioneering exploration and
    cross-cultural exchange.
  i18n_explanations:
    en: Refers to Zhang Qian's diplomatic mission to Central Asia during the Han dynasty, which opened
      the Silk Road and expanded Chinese influence. It symbolizes pioneering exploration and cross-cultural
      exchange.
    es: Se refiere a la misión diplomática de Zhang Qian a Asia Central durante la dinastía Han, que abrió
      la Ruta de la Seda y expandió la influencia china. Simboliza la exploración pionera y el intercambio
      intercultural.
    fr: Fait référence à la mission diplomatique de Zhang Qian en Asie centrale sous la dynastie Han,
      qui a ouvert la Route de la Soie et étendu l'influence chinoise. Il symbolise l'exploration pionnière
      et les échanges interculturels.
    de: Bezieht sich auf Zhang Qians diplomatische Mission nach Zentralasien während der Han-Dynastie,
      die die Seidenstraße eröffnete und den chinesischen Einfluss erweiterte. Es symbolisiert bahnbrechende
      Erkundung und interkulturellen Austausch.
    it: Si riferisce alla missione diplomatica di Zhang Qian in Asia centrale durante la dinastia Han,
      che aprì la Via della Seta ed espanse l'influenza cinese. Simboleggia l'esplorazione pionieristica
      e lo scambio interculturale.
    pt: Refere-se à missão diplomática de Zhang Qian à Ásia Central durante a dinastia Han, que abriu
      a Rota da Seda e expandiu a influência chinesa. Simboliza exploração pioneira e intercâmbio intercultural.
    ru: Относится к дипломатической миссии Чжан Цяня в Центральную Азию во времена династии Хань, которая
      открыла Шелковый путь и расширила китайское влияние. Символизирует первопроходческие исследования
      и межкультурный обмен.
    ja: 漢の時代に張騫が中央アジアへ派遣した外交使節団を指し、シルクロードを開き中国の影響を広めた。先駆的な探検と異文化交流の象徴。
    zh: 指汉代张骞出使中亚的使命，开辟了丝绸之路，扩大了中国影响力。象征着开创性的探索和跨文化交流。
    ar: يشير إلى البعثة الدبلوماسية لتشانغ تشيان إلى آسيا الوسطى خلال عهد أسرة هان، والتي فتحت طريق الحرير
      ووسعت النفوذ الصيني. يرمز إلى الاستكشاف الرائد والتبادل الثقافي.
    he: מתייחס לשליחות הדיפלומטית של ג'אנג צ'יאן למרכז אסיה בתקופת שושלת האן, אשר פתחה את דרך המשי והרחיבה
      את ההשפעה הסינית. מסמל חקר חלוצי וחילופי תרבות.
