  short_explanation: 'Refers to the four fundamental performance skills in traditional Chinese opera:
    singing (唱), recitation (念), acting (做), and acrobatics (打). It represents the comprehensive training
    required for opera performers.'
  i18n_explanations:
    en: 'Refers to the four fundamental performance skills in traditional Chinese opera: singing (唱),
      recitation (念), acting (做), and acrobatics (打). It represents the comprehensive training required
      for opera performers.'
    es: 'Se refiere a las cuatro habilidades fundamentales de la ópera tradicional china: canto (唱), recitación
      (念), actuación (做) y acrobacia (打). Representa la formación integral requerida para los intérpretes
      de ópera.'
    fr: 'Fait référence aux quatre compétences fondamentales de l''opéra traditionnel chinois : le chant
      (唱), la récitation (念), le jeu (做) et l''acrobatie (打). Cela représente la formation complète nécessaire
      aux artistes d''opéra.'
    de: 'Bezieht sich auf die vier grundlegenden Aufführungsfähigkeiten in der traditionellen chinesischen
      Oper: Singen (唱), Rezitieren (念), Schauspiel (做) und Akrobatik (打). Es steht für die umfassende
      Ausbildung, die Opernkünstler benötigen.'
    it: 'Si riferisce alle quattro abilità fondamentali della recitazione nell''opera tradizionale cinese:
      canto (唱), recitazione (念), recitazione (做) e acrobazia (打). Rappresenta la formazione completa
      richiesta agli interpreti d''opera.'
    pt: 'Refere-se às quatro habilidades fundamentais de performance na ópera tradicional chinesa: canto
      (唱), recitação (念), atuação (做) e acrobacia (打). Representa o treinamento abrangente necessário
      para os artistas de ópera.'
    ru: 'Относится к четырем основным исполнительским навыкам в традиционной китайской опере: пение (唱),
      декламация (念), актерская игра (做) и акробатика (打). Это представляет собой всестороннюю подготовку,
      необходимую для оперных исполнителей.'
    ja: 伝統的な中国オペラにおける4つの基本的な演技技術を指します：歌唱（唱）、朗読（念）、演技（做）、曲芸（打）。オペラ出演者に必要な総合的な訓練を表しています。
    zh: 指中国传统戏曲中的四种基本表演技能：唱、念、做、打。它代表了戏曲演员所需的全面训练。
