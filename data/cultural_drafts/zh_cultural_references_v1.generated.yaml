  i18n_explanations:
    en: Refers to playing minor roles like soldiers or attendants in traditional opera, now metaphorically
      used for doing insignificant tasks or playing a supporting role.
    es: Se refiere a interpretar papeles menores como soldados o asistentes en la ópera tradicional, ahora
      se usa metafóricamente para hacer tareas insignificantes o desempeñar un papel secundario.
    fr: Désigne le fait de jouer des rôles mineurs comme soldats ou serviteurs dans l'opéra traditionnel,
      maintenant utilisé métaphoriquement pour effectuer des tâches insignifiantes ou jouer un rôle secondaire.
    de: Bezieht sich auf das Spielen von Nebenrollen wie Soldaten oder Dienern in der traditionellen Oper,
      jetzt metaphorisch für unbedeutende Aufgaben oder eine untergeordnete Rolle.
    it: Si riferisce all'interpretare ruoli minori come soldati o inservienti nell'opera tradizionale,
      ora usato metaforicamente per svolgere compiti insignificanti o fare da comprimario.
    pt: Refere-se a interpretar papéis menores como soldados ou assistentes na ópera tradicional, agora
      usado metaforicamente para fazer tarefas insignificantes ou atuar como coadjuvante.
    ru: Относится к исполнению второстепенных ролей, таких как солдаты или слуги в традиционной опере,
      теперь метафорически используется для выполнения незначительных задач или роли подручного.
    ja: 伝統的な演劇で兵士や従者などの端役を演じることを指し、現在は取るに足らない雑用や脇役をする比喩として使われる。
    zh: 指在戏曲中扮演兵卒、随从等次要角色，现比喻做无足轻重的杂事或充当配角。
    ar: يشير إلى أداء أدوار ثانوية مثل الجنود أو الحاشية في الأوبرا التقليدية، ويستخدم الآن مجازًا للقيام
