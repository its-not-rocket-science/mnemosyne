- id: zh_classical_or_scriptural_allusion_天将降大任于是人也_fe5cef20
  language: zh
  canonical_reference: 天将降大任于是人也
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 天将降大任于是人也
  - 天将降大任于斯人也
  - 降大任
  short_explanation: From Mencius, it means 'When Heaven is about to assign a great task to a person,
    it first afflicts his mind and will.' It expresses the idea that suffering precedes great achievement.
  i18n_explanations:
    en: From Mencius, it means 'When Heaven is about to assign a great task to a person, it first afflicts
      his mind and will.' It expresses the idea that suffering precedes great achievement.
    es: De Mencio, significa 'Cuando el Cielo está a punto de asignar una gran tarea a una persona, primero
      aflige su mente y voluntad'. Expresa la idea de que el sufrimiento precede al gran logro.
    fr: De Mencius, cela signifie 'Quand le Ciel est sur le point de confier une grande tâche à une personne,
      il afflige d'abord son esprit et sa volonté'. Il exprime l'idée que la souffrance précède le grand
      accomplissement.
    de: Von Menzius, es bedeutet 'Wenn der Himmel im Begriff ist, einem Menschen eine große Aufgabe zuzuweisen,
      quält er zuerst seinen Geist und Willen'. Es drückt die Idee aus, dass Leid vor großer Leistung
      kommt.
    it: Da Mencio, significa 'Quando il Cielo sta per assegnare un grande compito a una persona, prima
      affligge la sua mente e volontà'. Esprime l'idea che la sofferenza preceda il grande risultato.
    pt: De Mêncio, significa 'Quando o Céu está prestes a atribuir uma grande tarefa a uma pessoa, primeiro
      aflige sua mente e vontade'. Expressa a ideia de que o sofrimento precede grandes realizações.
