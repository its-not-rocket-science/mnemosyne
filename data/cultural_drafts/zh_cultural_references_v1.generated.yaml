- id: zh_classical_or_scriptural_allusion_余音绕梁_f04dc9c0
  language: zh
  canonical_reference: 余音绕梁
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 余音绕梁
  - 余音绕梁，三日不绝
  - 绕梁三日
  short_explanation: A Chinese idiom meaning 'the music lingers in the air even after it stops,' often
    used to describe a beautiful song or performance that leaves a lasting impression. Originates from
    a story in the Liezi about a singer.
  i18n_explanations:
    en: A Chinese idiom meaning 'the music lingers in the air even after it stops,' often used to describe
      a beautiful song or performance that leaves a lasting impression. Originates from a story in the
      Liezi about a singer.
    es: Un modismo chino que significa 'la música perdura en el aire incluso después de que se detiene',
      a menudo usado para describir una canción o actuación hermosa que deja una impresión duradera. Se
      origina de una historia en el Liezi sobre un cantante.
    fr: Un idiome chinois signifiant 'la musique persiste dans l'air même après son arrêt', souvent utilisé
      pour décrire une belle chanson ou performance qui laisse une impression durable. Il provient d'une
      histoire dans le Liezi à propos d'un chanteur.
    de: Eine chinesische Redewendung, die bedeutet 'die Musik schwebt noch in der Luft, nachdem sie aufgehört
      hat', oft verwendet, um ein schönes Lied oder eine Aufführung zu beschreiben, die einen bleibenden
      Eindruck hinterlässt. Sie stammt aus einer Geschichte im Liezi über einen Sänger.
    it: Un idioma cinese che significa 'la musica rimane nell'aria anche dopo che si ferma', spesso usato
      per descrivere una bella canzone o performance che lascia un'impressione duratura. Ha origine da
      una storia nel Liezi su un cantante.
    pt: Um idioma chinês que significa 'a música permanece no ar mesmo depois de parar', frequentemente
      usado para descrever uma bela canção ou performance que deixa uma impressão duradoura. Origina-se
      de uma história no Liezi sobre um cantor.
    ru: Китайский идиом, означающий 'музыка все еще витает в воздухе, даже когда она прекратилась', часто
      используется для описания красивой песни или выступления, которое оставляет неизгладимое впечатление.
      Происходит из истории в Лецзы о певце.
    ja: 「音がやんだ後も梁の上をめぐる」という意味の中国の慣用句で、美しい歌や演奏が長く印象に残ることを表します。『列子』の歌人の故事に由来します。
    zh: 一个中国成语，意思是'音乐停止后仍在空气中回荡'，常用来形容优美的歌曲或表演给人留下深刻印象。源自《列子》中关于一位歌者的故事。
    ar: تعبير اصطلاحي صيني يعني 'الموسيقى لا تزال عالقة في الهواء حتى بعد توقفها'، وغالبًا ما يستخدم لوصف
      أغنية جميلة أو أداء يترك انطباعًا دائمًا. ينشأ من قصة في كتاب ليزي عن مغني.
    he: ניב סיני שפירושו 'המוזיקה מרחפת באוויר גם לאחר שהיא נפסקת', לעתים קרובות משמש לתיאור שיר או הופעה
      יפה שמשאירים רושם מתמשך. מקורו בסיפור בספר ליאזי על זמר.
