  short_explanation: Various demons and monsters; a classical term for evil spirits, often used together
    with '牛鬼蛇神' to denote all kinds of malefactors. Found in ancient texts like Zuo Zhuan.
  i18n_explanations:
    en: Various demons and monsters; a classical term for evil spirits, often used together with '牛鬼蛇神'
      to denote all kinds of malefactors. Found in ancient texts like Zuo Zhuan.
    es: Varios demonios y monstruos; un término clásico para espíritus malignos, a menudo usado junto
      con '牛鬼蛇神' para denotar todo tipo de malhechores. Se encuentra en textos antiguos como Zuo Zhuan.
    fr: Divers démons et monstres ; un terme classique pour les esprits maléfiques, souvent utilisé avec
      '牛鬼蛇神' pour désigner toutes sortes de malfaiteurs. On le trouve dans des textes anciens comme Zuo
      Zhuan.
    de: Verschiedene Dämonen und Monster; ein klassischer Begriff für böse Geister, oft zusammen mit '牛鬼蛇神'
      verwendet, um alle Arten von Übeltätern zu bezeichnen. In alten Texten wie dem Zuo Zhuan zu finden.
    it: Vari demoni e mostri; un termine classico per spiriti maligni, spesso usato insieme a '牛鬼蛇神' per
      indicare ogni tipo di malvivente. Presente in testi antichi come Zuo Zhuan.
    pt: Vários demônios e monstros; um termo clássico para espíritos malignos, frequentemente usado junto
      com '牛鬼蛇神' para denotar todos os tipos de malfeitores. Encontrado em textos antigos como Zuo Zhuan.
    ru: Различные демоны и чудовища; классический термин для злых духов, часто используется вместе с '牛鬼蛇神'
      для обозначения всевозможных злоумышленников. Встречается в древних текстах, таких как Цзо Чжуань.
    ja: 魑魅魍魎。悪霊を表す古典的用語で、しばしば「牛鬼蛇神」と一緒に使われ、あらゆる悪党を指す。『左伝』などの古典に見られる。
    zh: 魑魅魍魉；指各种鬼怪，常用于与“牛鬼蛇神”连用，表示各类坏人。见于《左传》等古籍。
    ar: شياطين ووحوش متنوعة; مصطلح كلاسيكي للأرواح الشريرة، غالباً ما يستخدم مع '牛鬼蛇神' للإشارة إلى جميع
