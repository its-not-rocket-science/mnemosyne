- id: zh_proverb_tradition_少壮不努力_老大徒伤悲_8f64f2b0
  language: zh
  canonical_reference: 少壮不努力，老大徒伤悲
  reference_type: proverb_tradition
  surface_patterns:
  - 少壮不努力
  - 老大徒伤悲
  - 少壮不努力，老大徒伤悲
  short_explanation: This proverb advises that if one does not work hard in youth, they will regret it
    in old age. It stresses the importance of diligence early in life.
  i18n_explanations:
    en: This proverb advises that if one does not work hard in youth, they will regret it in old age.
      It stresses the importance of diligence early in life.
    es: Este proverbio aconseja que si uno no trabaja duro en la juventud, se arrepentirá en la vejez.
      Destaca la importancia de la diligencia al principio de la vida.
    fr: Ce proverbe conseille que si l'on ne travaille pas dur dans la jeunesse, on le regrettera dans
      la vieillesse. Il souligne l'importance de la diligence au début de la vie.
    de: Dieses Sprichwort rät, dass man es im Alter bereuen wird, wenn man in der Jugend nicht hart arbeitet.
      Es betont die Bedeutung von Fleiß zu Beginn des Lebens.
    it: Questo proverbio consiglia che se non si lavora sodo in gioventù, ci si pentirà in vecchiaia.
      Sottolinea l'importanza della diligenza all'inizio della vita.
    pt: Este provérbio aconselha que, se alguém não trabalhar duro na juventude, se arrependerá na velhice.
      Ele enfatiza a importância da diligência no início da vida.
    ru: Эта пословица советует, что если не усердно работать в молодости, то в старости об этом пожалеешь.
      Она подчеркивает важность прилежания в начале жизни.
    ja: このことわざは、若い時に一生懸命働かなければ、年老いて後悔することになると助言しています。人生の早い段階での勤勉さの重要性を強調しています。
    zh: 这个谚语建议，如果年轻时不下苦功，到老年只会徒增悲伤。它强调了早年勤奋的重要性。
    ar: ينصح هذا المثل بأنه إذا لم يعمل الشخص بجد في شبابه، فسوف يندم في شيخوخته. ويؤكد على أهمية الاجتهاد
      في بداية الحياة.
    he: פתגם זה מייעץ שאם אדם לא עובד קשה בצעירותו, הוא יתחרט על כך בזקנה. הוא מדגיש את חשיבות החריצות
      בשלב המוקדם של החיים.
