- id: zh_proverb_tradition_曲终人散_11acc186
  language: zh
  canonical_reference: 曲终人散
  reference_type: proverb_tradition
  surface_patterns:
  - 曲终人散
  - 曲终人散后
  - 人散后
  short_explanation: A Chinese idiom meaning 'all good things come to an end' or 'the party is over,'
    often used to describe the melancholy feeling after a gathering or event ends.
  i18n_explanations:
    en: A Chinese idiom meaning 'all good things come to an end' or 'the party is over,' often used to
      describe the melancholy feeling after a gathering or event ends.
    es: Un modismo chino que significa 'todas las cosas buenas llegan a su fin' o 'la fiesta terminó',
      a menudo usado para describir el sentimiento de melancolía después de que termina una reunión o
      evento.
    fr: Un idiome chinois signifiant 'toutes les bonnes choses ont une fin' ou 'la fête est finie', souvent
      utilisé pour décrire le sentiment de mélancolie après la fin d'un rassemblement ou d'un événement.
    de: Eine chinesische Redewendung, die bedeutet 'alle guten Dinge haben ein Ende' oder 'die Party ist
      vorbei', oft verwendet, um das melancholische Gefühl nach dem Ende einer Versammlung oder eines
      Ereignisses zu beschreiben.
    it: Un idioma cinese che significa 'tutte le cose belle finiscono' o 'la festa è finita', spesso usato
      per descrivere il sentimento malinconico dopo la fine di una riunione o di un evento.
    pt: Um idioma chinês que significa 'todas as coisas boas chegam ao fim' ou 'a festa acabou', frequentemente
      usado para descrever o sentimento melancólico após o término de uma reunião ou evento.
    ru: Китайский идиом, означающий 'все хорошее когда-нибудь заканчивается' или 'вечеринка окончена',
      часто используется для описания меланхоличного чувства после окончания собрания или события.
    ja: 「すべての良いことは終わりを迎える」または「宴会は終わった」という意味の中国の慣用句で、集まりやイベントが終わった後の憂鬱な気持ちを表すのに使われます。
    zh: 一个中国成语，意思是'所有美好的事情都会结束'或'聚会结束了'，常用于描述聚会或事件结束后的忧郁感受。
    ar: تعبير اصطلاحي صيني يعني 'كل الأشياء الجيدة تأتي إلى نهايتها' أو 'انتهت الحفلة'، وغالبًا ما يستخدم
      لوصف الشعور بالكآبة بعد انتهاء التجمع أو الحدث.
    he: ניב סיני שפירושו 'כל הדברים הטובים באים לקיצם' או 'המסיבה נגמרה', לעתים קרובות משמש לתיאור התחושה
      המלנכולית לאחר סיום התכנסות או אירוע.
