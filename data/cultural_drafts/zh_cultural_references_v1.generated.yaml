- id: zh_classical_or_scriptural_allusion_近朱者赤_近墨者黑_f6d982ad
  language: zh
  canonical_reference: 近朱者赤，近墨者黑
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - 近朱者赤，近墨者黑
  - 近朱者赤，近墨者黑，近贤者明
  short_explanation: This saying means that one's environment influences character; associating with good
    people makes one good, while bad company corrupts. It originates from a warning to a crown prince.
  i18n_explanations:
    en: This saying means that one's environment influences character; associating with good people makes
      one good, while bad company corrupts. It originates from a warning to a crown prince.
    es: Este dicho significa que el entorno de uno influye en el carácter; asociarse con personas buenas
      vuelve a uno bueno, mientras que la mala compañía corrompe. Se origina en una advertencia a un príncipe
      heredero.
    fr: Ce dicton signifie que l'environnement influence le caractère ; fréquenter de bonnes personnes
      rend bon, tandis que la mauvaise compagnie corrompt. Il provient d'un avertissement à un prince
      héritier.
    de: Diese Redewendung bedeutet, dass die Umgebung den Charakter beeinflusst; der Umgang mit guten
      Menschen macht einen gut, während schlechte Gesellschaft verdirbt. Sie stammt aus einer Warnung
      an einen Kronprinzen.
    it: Questo detto significa che l'ambiente influenza il carattere; frequentare persone buone rende
      buoni, mentre la cattiva compagnia corrompe. Trae origine da un avvertimento a un principe ereditario.
    pt: Este ditado significa que o ambiente influencia o caráter; associar-se a pessoas boas torna alguém
      bom, enquanto más companhias corrompem. Origina-se de um aviso a um príncipe herdeiro.
    ru: Эта поговорка означает, что окружение влияет на характер; общение с хорошими людьми делает человека
      хорошим, а плохая компания развращает. Она происходит из предупреждения наследному принцу.
    ja: このことわざは、環境が人格に影響を与えることを意味します。良い人と付き合えば良くなり、悪い仲間は堕落させます。皇太子への警告に由来します。
    zh: 这个说法意味着环境会影响一个人的品性；与好人交往使人变好，而坏朋友则会使人堕落。它源于对一位皇太子的告诫。
    ar: يعني هذا المثل أن البيئة تؤثر على الشخصية؛ فمصاحبة الأشخاص الطيبين تجعل المرء طيبًا، بينما الرفقة
