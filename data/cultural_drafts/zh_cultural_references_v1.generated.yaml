- id: zh_literary_reference_长太息以掩涕兮_哀民生之多艰_bf444484
  language: zh
  canonical_reference: 长太息以掩涕兮，哀民生之多艰
  reference_type: literary_reference
  surface_patterns:
  - 长太息以掩涕兮，哀民生之多艰
  - 长太息以掩涕兮
  - 哀民生之多艰
  short_explanation: From Qu Yuan's Li Sao, the poet sighs and wipes away tears, lamenting the hardships
    of the people's lives. It reflects concern for the common people.
  i18n_explanations:
    en: From Qu Yuan's Li Sao, the poet sighs and wipes away tears, lamenting the hardships of the people's
      lives. It reflects concern for the common people.
    es: Del Li Sao de Qu Yuan, el poeta suspira y se seca las lágrimas, lamentando las dificultades de
      la vida del pueblo. Refleja preocupación por la gente común.
    fr: Du Li Sao de Qu Yuan, le poète soupire et essuie ses larmes, déplorant les difficultés de la vie
      du peuple. Cela reflète son souci pour le peuple.
    de: 'Aus Qu Yuans Li Sao: Der Dichter seufzt und wischt sich die Tränen, beklagt die Mühsal des Volkslebens.
      Es spiegelt die Sorge um das gemeine Volk wider.'
    it: Dal Li Sao di Qu Yuan, il poeta sospira e si asciuga le lacrime, lamentando le difficoltà della
      vita della gente. Riflette la preoccupazione per la gente comune.
    pt: Do Li Sao de Qu Yuan, o poeta suspira e enxuga as lágrimas, lamentando as dificuldades da vida
      do povo. Reflete a preocupação com o povo comum.
    ru: 'Из «Лисао» Цюй Юаня: поэт вздыхает и вытирает слезы, оплакивая тяготы жизни народа. Это отражает
      заботу о простом народе.'
