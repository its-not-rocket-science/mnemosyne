  short_explanation: A Confucian principle emphasizing that reviewing the past helps to gain new understanding,
    widely used in education to encourage regular revision.
  i18n_explanations:
    en: A Confucian principle emphasizing that reviewing the past helps to gain new understanding, widely
      used in education to encourage regular revision.
    es: Un principio confuciano que enfatiza que revisar el pasado ayuda a obtener una nueva comprensión,
      ampliamente utilizado en la educación para fomentar la revisión regular.
    fr: Un principe confucéen soulignant que l'étude du passé aide à acquérir une nouvelle compréhension,
      largement utilisé dans l'éducation pour encourager la révision régulière.
    de: Ein konfuzianisches Prinzip, das betont, dass die Wiederholung der Vergangenheit zu neuem Verständnis
      verhilft, weit verbreitet in der Bildung zur Förderung regelmäßiger Wiederholung.
    it: Un principio confuciano che sottolinea che rivedere il passato aiuta ad acquisire una nuova comprensione,
      ampiamente utilizzato nell'istruzione per incoraggiare la revisione regolare.
    pt: Um princípio confuciano que enfatiza que revisar o passado ajuda a obter novos entendimentos,
      amplamente usado na educação para incentivar a revisão regular.
    ru: Конфуцианский принцип, подчеркивающий, что повторение прошлого помогает приобрести новое понимание,
      широко используемый в образовании для поощрения регулярного повторения.
    ja: 過去を復習することで新たな理解を得られるという儒教の原則で、教育において定期的な復習を促すために広く使われている。
    zh: 儒家原则，强调温习旧知识有助于获得新理解，广泛应用于教育中以鼓励定期复习。
    ar: مبدأ كونفوشيوسي يؤكد أن مراجعة الماضي تساعد على اكتساب فهم جديد، ويستخدم على نطاق واسع في التعليم
      لتشجيع المراجعة المنتظمة.
    he: עיקרון קונפוציאני המדגיש שחזרה על העבר מסייעת להשיג הבנה חדשה, בשימוש נרחב בחינוך לעידוד חזרה
      סדירה.
