  short_explanation: Metaphor for unwavering devotion; silkworm spins silk until death, candle weeps until
    it turns to ashes, often used to describe love or dedication.
  i18n_explanations:
    en: Metaphor for unwavering devotion; silkworm spins silk until death, candle weeps until it turns
      to ashes, often used to describe love or dedication.
    es: Metáfora de devoción inquebrantable; el gusano de seda hila seda hasta la muerte, la vela llora
      hasta convertirse en cenizas, usado a menudo para describir amor o dedicación.
    fr: Métaphore de la dévotion inébranlable ; le ver à soie file la soie jusqu'à la mort, la bougie
      pleure jusqu'à devenir cendres, souvent utilisée pour décrire l'amour ou le dévouement.
    de: Metapher für unerschütterliche Hingabe; der Seidenwurm spinnt Seide bis zum Tod, die Kerze weint,
      bis sie zu Asche wird, oft verwendet, um Liebe oder Hingabe zu beschreiben.
    it: Metafora di devozione incrollabile; il baco da seta fila seta fino alla morte, la candela piange
      fino a diventare cenere, spesso usata per descrivere amore o dedizione.
    pt: Metáfora de devoção inabalável; o bicho-da-seda fia seda até a morte, a vela chora até virar cinzas,
      frequentemente usado para descrever amor ou dedicação.
    ru: Метафора непоколебимой преданности; шелкопряд прядет шелк до смерти, свеча плачет, пока не превратится
      в пепел, часто используется для описания любви или самоотверженности.
    ja: 揺るぎない献身の比喩。蚕は死ぬまで糸を吐き、ろうそくは灰になるまで涙を流す。愛や献身を表すのにしばしば使われる。
    zh: 比喻至死不渝的奉献；春蚕到死才停止吐丝，蜡烛燃尽才停止流泪，常用来形容爱情或敬业精神。
    ar: استعارة للتفاني الثابت؛ دودة القز تغزل الحرير حتى الموت، والشمعة تبكي حتى تتحول إلى رماد، وغالبًا
      ما تستخدم لوصف الحب أو التفاني.
    he: מטאפורה למסירות בלתי מתפשרת; תולעת המשי טווה משי עד מותה, הנר בוכה עד שהוא הופך לאפר, משמש לעתים
      קרובות לתיאור אהבה או מסירות.
