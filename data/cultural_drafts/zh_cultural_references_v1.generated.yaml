  i18n_explanations:
    en: This passage from Mencius states that before heaven assigns a great mission to someone, it first
      tempers their mind and spirit through hardship; it is a classic Chinese philosophical teaching on
      resilience and perseverance.
    es: Este pasaje de Mencio afirma que antes de que el cielo asigne una gran misión a alguien, primero
      templa su mente y espíritu a través de la adversidad; es una enseñanza filosófica china clásica
      sobre la resiliencia y la perseverancia.
    fr: Ce passage de Mencius affirme qu'avant que le ciel n'assigne une grande mission à quelqu'un, il
      trempe d'abord son esprit et son âme par l'épreuve ; c'est un enseignement philosophique chinois
      classique sur la résilience et la persévérance.
    de: Diese Passage von Menzius besagt, dass der Himmel, bevor er jemandem eine große Aufgabe zuweist,
      zuerst seinen Geist und seine Seele durch Härten stärkt; es ist eine klassische chinesische philosophische
      Lehre über Belastbarkeit und Ausdauer.
    it: Questo passo di Mencio afferma che prima che il cielo assegni una grande missione a qualcuno,
      tempra la sua mente e il suo spirito attraverso le difficoltà; è un classico insegnamento filosofico
      cinese sulla resilienza e la perseveranza.
    pt: Esta passagem de Mêncio afirma que antes que o céu atribua uma grande missão a alguém, primeiro
      tempera sua mente e espírito através da adversidade; é um ensinamento filosófico clássico chinês
      sobre resiliência e perseverança.
    ru: Этот отрывок из Мэн-цзы гласит, что прежде чем небо возложит на человека великую миссию, оно сначала
      закаляет его ум и дух через лишения; это классическое китайское философское учение о стойкости и
      настойчивости.
    ja: 孟子のこの一節は、天が人に大任を授ける前に、まず苦難によってその心と精神を鍛えるという意味で、忍耐と粘り強さについての中国の古典的な哲学の教えです。
    zh: 孟子这段话意思是，上天将要把重大使命降临给某人之前，一定先使他的意志和心智受苦；这是关于坚韧和毅力的中国经典哲学教导。
    ar: تقول هذه الفقرة من منشيوس أنه قبل أن يكلف السماء شخصاً بمهمة عظيمة، فإنها تشذب عقله وروحه أولاً
      من خلال المشقة؛ وهو تعليم فلسفي صيني كلاسيكي حول المرونة والمثابرة.
    he: קטע זה ממנציוס קובע שלפני שהשמיים מטילים משימה גדולה על אדם, הם תחילה מצרפים את רוחו ונפשו באמצעות
      קשיים; זהו לימוד פילוסופי סיני קלאסי על חוסן והתמדה.
