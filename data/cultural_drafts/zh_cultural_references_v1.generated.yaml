- id: zh_cultural_reference_吴带当风_7e302c0d
  language: zh
  canonical_reference: 吴带当风
  reference_type: cultural_reference
  surface_patterns:
  - 吴带当风
  - 吴带当风风格
  short_explanation: Refers to the flowing, wind-swept drapery in the paintings of Tang artist Wu Daozi,
    emblematic of his dynamic style. Used as a standard to praise figurative painting, especially the
    depiction of robes and movement.
  i18n_explanations:
    en: Refers to the flowing, wind-swept drapery in the paintings of Tang artist Wu Daozi, emblematic
      of his dynamic style. Used as a standard to praise figurative painting, especially the depiction
      of robes and movement.
    es: Se refiere a los drapeados fluidos y barridos por el viento en las pinturas del artista Tang Wu
      Daozi, emblemáticos de su estilo dinámico. Se usa como estándar para elogiar la pintura figurativa,
      especialmente la representación de túnicas y movimiento.
    fr: Fait référence aux draperies fluides et balayées par le vent dans les peintures de l'artiste Tang
      Wu Daozi, emblématiques de son style dynamique. Utilisé comme standard pour louer la peinture figurative,
      en particulier la représentation des robes et du mouvement.
    de: Bezieht sich auf die fließenden, windgepeitschten Drapierungen in den Gemälden des Tang-Künstlers
      Wu Daozi, die für seinen dynamischen Stil stehen. Wird als Maßstab verwendet, um figurative Malerei
      zu loben, insbesondere die Darstellung von Gewändern und Bewegung.
    it: Si riferisce ai drappeggi fluidi e spazzati dal vento nei dipinti dell'artista Tang Wu Daozi,
      simbolo del suo stile dinamico. Usato come standard per lodare la pittura figurativa, in particolare
      la rappresentazione di vesti e movimento.
    pt: Refere-se aos drapeados fluidos e varridos pelo vento nas pinturas do artista Tang Wu Daozi, emblemáticos
      de seu estilo dinâmico. Usado como padrão para elogiar a pintura figurativa, especialmente a representação
      de vestes e movimento.
    ru: Относится к струящимся, развевающимся на ветру драпировкам в картинах танского художника У Даоцзы,
      символизирующим его динамичный стиль. Используется как эталон для похвалы фигуративной живописи,
      особенно изображения одежд и движения.
    ja: 唐の芸術家呉道子の絵画に見られる、風に吹かれて流れるようなドレープを指し、彼のダイナミックな様式を象徴する。人物画、特に衣装と動きの描写を称賛する基準として使われる。
    zh: 指唐代画家吴道子画中迎风飘动的衣带，体现其动态风格。常用于赞扬人物画，尤其是对衣袍和动作的描绘。
    ar: يشير إلى الأقمشة المتدفقة التي تجرفها الرياح في لوحات الفنان تانغ وو داو تسي، والتي ترمز إلى أسلوبه
      الديناميكي. يُستخدم كمعيار للإشادة بالرسم التصويري، خاصة تصوير الجلباب والحركة.
    he: מתייחס לבדים הזורמים והסחופים ברוח בציוריו של האמן טאנג וו דאו-דזה, סמליים לסגנונו הדינמי. משמש
      כתקן לשבח ציור פיגורטיבי, במיוחד תיאור גלימות ותנועה.
