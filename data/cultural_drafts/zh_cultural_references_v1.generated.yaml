  short_explanation: This proverb underscores the value of time, saying that time is as precious as gold,
    but gold cannot buy lost time. It urges people to use time wisely.
  i18n_explanations:
    en: This proverb underscores the value of time, saying that time is as precious as gold, but gold
      cannot buy lost time. It urges people to use time wisely.
    es: Este proverbio subraya el valor del tiempo, diciendo que el tiempo es tan precioso como el oro,
      pero el oro no puede comprar el tiempo perdido. Insta a las personas a usar el tiempo sabiamente.
    fr: Ce proverbe souligne la valeur du temps, disant que le temps est aussi précieux que l'or, mais
      que l'or ne peut acheter le temps perdu. Il exhorte les gens à utiliser le temps avec sagesse.
    de: Dieses Sprichwort unterstreicht den Wert der Zeit und sagt, dass Zeit so kostbar ist wie Gold,
      aber Gold kann verlorene Zeit nicht zurückkaufen. Es fordert die Menschen auf, die Zeit weise zu
      nutzen.
    it: Questo proverbio sottolinea il valore del tempo, dicendo che il tempo è prezioso come l'oro, ma
      l'oro non può comprare il tempo perduto. Esorta le persone a usare il tempo saggiamente.
    pt: Este provérbio ressalta o valor do tempo, dizendo que o tempo é tão precioso quanto o ouro, mas
      o ouro não pode comprar o tempo perdido. Insta as pessoas a usar o tempo com sabedoria.
    ru: Эта пословица подчеркивает ценность времени, говоря, что время так же драгоценно, как золото,
      но золотом нельзя купить потерянное время. Она призывает людей разумно использовать время.
    ja: このことわざは時間の価値を強調し、時間は金と同じくらい貴重だが、金で失われた時間は買えないと言っています。人々に時間を賢く使うよう促します。
    zh: 这个谚语强调了时间的价值，说时间像金子一样珍贵，但金子买不到失去的时间。它敦促人们明智地利用时间。
    ar: يؤكد هذا المثل على قيمة الوقت، قائلاً إن الوقت ثمين مثل الذهب، لكن الذهب لا يستطيع شراء الوقت
      الضائع. إنه يحث الناس على استخدام الوقت بحكمة.
    he: פתגם זה מדגיש את ערך הזמן, באומרו שהזמן יקר כזהב, אך זהב לא יכול לקנות זמן אבוד. הוא דוחק באנשים
