- id: zh_cultural_reference_五四运动_aa486f84
  language: zh
  canonical_reference: 五四运动
  reference_type: cultural_reference
  surface_patterns:
  - 五四运动
  - 五四爱国运动
  - 五卅运动的前奏
  short_explanation: A patriotic protest movement on May 4, 1919, triggered by the Treaty of Versailles'
    decision to transfer German concessions in Shandong to Japan. It marked the rise of Chinese nationalism,
    new culture, and anti-imperialist sentiment, influencing modern Chinese history.
  i18n_explanations:
    en: A patriotic protest movement on May 4, 1919, triggered by the Treaty of Versailles' decision to
      transfer German concessions in Shandong to Japan. It marked the rise of Chinese nationalism, new
      culture, and anti-imperialist sentiment, influencing modern Chinese history.
    es: Un movimiento de protesta patriótico el 4 de mayo de 1919, desencadenado por la decisión del Tratado
      de Versalles de transferir las concesiones alemanas en Shandong a Japón. Marcó el auge del nacionalismo
      chino, la nueva cultura y el sentimiento antiimperialista, influyendo en la historia moderna de
      China.
    fr: Un mouvement de protestation patriotique le 4 mai 1919, déclenché par la décision du traité de
      Versailles de transférer les concessions allemandes du Shandong au Japon. Il a marqué l'essor du
      nationalisme chinois, de la nouvelle culture et du sentiment anti-impérialiste, influençant l'histoire
      moderne de la Chine.
    de: Eine patriotische Protestbewegung am 4. Mai 1919, ausgelöst durch die Entscheidung des Versailler
      Vertrags, die deutschen Konzessionen in Shandong an Japan zu übertragen. Sie markierte den Aufstieg
      des chinesischen Nationalismus, der neuen Kultur und der antiimperialistischen Stimmung und beeinflusste
      die moderne chinesische Geschichte.
    it: Un movimento di protesta patriottico il 4 maggio 1919, innescato dalla decisione del Trattato
      di Versailles di trasferire le concessioni tedesche nello Shandong al Giappone. Ha segnato l'ascesa
      del nazionalismo cinese, della nuova cultura e del sentimento anti-imperialista, influenzando la
      storia moderna della Cina.
    pt: Um movimento de protesto patriótico em 4 de maio de 1919, desencadeado pela decisão do Tratado
      de Versalhes de transferir as concessões alemãs em Shandong para o Japão. Marcou o ascensão do nacionalismo
      chinês, da nova cultura e do sentimento anti-imperialista, influenciando a história moderna da China.
    ru: Патриотическое протестное движение 4 мая 1919 года, вызванное решением Версальского договора передать
      немецкие концессии в Шаньдуне Японии. Оно ознаменовало подъем китайского национализма, новой культуры
      и антиимпериалистических настроений, повлияв на современную историю Китая.
    ja: 1919年5月4日、ヴェルサイユ条約がドイツの山東省利権を日本に移譲する決定に端を発した愛国的抗議運動。中国ナショナリズム、新文化、反帝国主義感情の高まりを示し、近代中国史に影響を与えた。
    zh: 1919年5月4日爆发的爱国抗议运动，由凡尔赛条约决定将德国在山东的权益转让给日本所引发。它标志着中国民族主义、新文化和反帝情绪的兴起，影响了中国近代历史。
    ar: حركة احتجاج وطنية في 4 مايو 1919، أثارها قرار معاهدة فرساي بنقل الامتيازات الألمانية في شاندونغ
      إلى اليابان. شكلت صعود القومية الصينية والثقافة الجديدة والمشاعر المناهضة للإمبريالية، مما أثر على
      التاريخ الصيني الحديث.
    he: תנועת מחאה פטריוטית ב-4 במאי 1919, שהתעוררה בעקבות החלטת חוזה ורסאי להעביר את הזיכיונות הגרמניים
      בשאנדונג ליפן. היא סימנה את עליית הלאומיות הסינית, התרבות החדשה והסנטימנט האנטי-אימפריאליסטי, והשפיעה
      על ההיסטוריה הסינית המודרנית.
