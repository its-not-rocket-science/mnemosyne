  - 更上一层楼
  - 欲穷千里目
  short_explanation: To see a thousand miles further, one must ascend one more floor. This proverb from
    a Tang poem encourages continuous improvement and a broader perspective.
  i18n_explanations:
    en: To see a thousand miles further, one must ascend one more floor. This proverb from a Tang poem
      encourages continuous improvement and a broader perspective.
    es: Para ver mil millas más lejos, hay que subir un piso más. Este proverbio de un poema Tang anima
      a la mejora continua y una perspectiva más amplia.
    fr: Pour voir mille miles plus loin, il faut monter un étage de plus. Ce proverbe d'un poème Tang
      encourage l'amélioration continue et une perspective plus large.
    de: Um tausend Meilen weiter zu sehen, muss man eine Etage höher steigen. Dieses Sprichwort aus einem
      Tang-Gedicht ermutigt zu ständiger Verbesserung und einer breiteren Perspektive.
    it: Per vedere mille miglia più lontano, bisogna salire un altro piano. Questo proverbio di una poesia
      Tang incoraggia il miglioramento continuo e una prospettiva più ampia.
    pt: Para ver mil milhas mais longe, é preciso subir mais um andar. Este provérbio de um poema Tang
      incentiva a melhoria contínua e uma perspectiva mais ampla.
    ru: Чтобы увидеть на тысячу миль дальше, нужно подняться на один этаж выше. Эта пословица из стихотворения
      эпохи Тан призывает к постоянному совершенствованию и более широкому взгляду.
    ja: 千里先を見るためには、さらにもう一階上がらなければならない。これは唐詩の諺で、継続的な向上と広い視野を奨励している。
    zh: 要想看得更远，就要更上一层楼。这句唐诗谚语鼓励不断进步和开阔视野。
    ar: لرؤية ألف ميل أبعد، يجب الصعود طابقًا إضافيًا. هذا المثل من قصيدة تانغ يشجع على التحسين المستمر
      والنظرة الأوسع.
    he: כדי לראות אלף מייל הלאה, יש לעלות קומה אחת נוספת. הפתגם הזה משיר טאנג מעודד שיפור מתמשך ונקודת
      מבט רחבה יותר.
