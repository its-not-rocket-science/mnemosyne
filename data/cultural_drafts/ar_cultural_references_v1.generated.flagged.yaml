- id: ar_classical_or_scriptural_allusion_قارون_1b03c8b9
  language: ar
  canonical_reference: قارون
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - قارون
  - كارون
  - قارون الغني
  short_explanation: A wealthy man in the time of Prophet Moses who was swallowed by the earth for his
    arrogance and refusal to share his wealth. He symbolizes greed and the punishment of arrogance.
  i18n_explanations:
    en: A wealthy man in the time of Prophet Moses who was swallowed by the earth for his arrogance and
      refusal to share his wealth. He symbolizes greed and the punishment of arrogance.
    es: Un hombre rico en la época del profeta Moisés que fue tragado por la tierra por su arrogancia
      y negativa a compartir su riqueza. Simboliza la codicia y el castigo de la arrogancia.
    fr: Un homme riche à l'époque du prophète Moïse qui fut englouti par la terre pour son arrogance et
      son refus de partager sa richesse. Il symbolise l'avidité et le châtiment de l'arrogance.
    de: Ein reicher Mann zur Zeit des Propheten Mose, der wegen seiner Arroganz und Weigerung, seinen
      Reichtum zu teilen, von der Erde verschluckt wurde. Er symbolisiert Gier und die Bestrafung von
      Arroganz.
    it: Un uomo ricco al tempo del profeta Mosè che fu inghiottito dalla terra per la sua arroganza e
      il rifiuto di condividere la sua ricchezza. Simboleggia l'avidità e la punizione dell'arroganza.
    pt: Um homem rico na época do profeta Moisés que foi engolido pela terra por sua arrogância e recusa
      em compartilhar sua riqueza. Ele simboliza a ganância e a punição da arrogância.
    ru: Богатый человек во времена пророка Моисея, который был поглощен землей за свою гордыню и отказ
      делиться богатством. Он символизирует жадность и наказание за высокомерие.
    ja: 預言者モーセの時代の裕福な男で、傲慢さと富を分け与えなかったために地面に飲み込まれました。彼は貪欲さと傲慢への罰を象徴しています。
    zh: 在先知摩西时代的一个富人，因傲慢和拒绝分享财富而被大地吞没。他象征着贪婪和对傲慢的惩罚。
    ar: رجل ثري في زمن النبي موسى ابتلعته الأرض بسبب غطرسته ورفضه مشاركة ثروته. يرمز إلى الجشع وعقاب الغرور.
    he: איש עשיר בימי הנביא משה שנבלע על ידי האדמה בגלל יהירותו וסירובו לחלוק את עושרו. הוא מסמל חמדנות
      ואת עונשה של היהירות.
