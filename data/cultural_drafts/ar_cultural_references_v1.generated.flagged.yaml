      e malinconico di Qabbani.
    pt: Um verso do poema 'A leitora de xícaras' de Nizar Qabbani, expressando indiferença emocional à
      passagem do tempo quando se é consumido pelo amor ou pela tristeza. Reflete o estilo romântico e
      melancólico de Qabbani.
    ru: Строка из стихотворения Низара Каббани 'Гадалка на чайной гуще', выражающая эмоциональное безразличие
      к течению времени, когда человек охвачен любовью или печалью. Отражает романтический и меланхоличный
      стиль Каббани.
    ja: ニザール・カッバーニーの詩『カップ占い師』の一節で、愛や悲しみに心を奪われている時の時間の経過に対する感情的な無関心を表現している。カッバーニーのロマンティックで憂鬱なスタイルを反映している。
