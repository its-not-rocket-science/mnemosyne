      of time when consumed by love or sorrow. It reflects Qabbani's romantic and melancholic style.
    es: Un verso del poema 'La lectora de tazas' de Nizar Qabbani, que expresa indiferencia emocional
      ante el paso del tiempo cuando se está consumido por el amor o la tristeza. Refleja el estilo romántico
