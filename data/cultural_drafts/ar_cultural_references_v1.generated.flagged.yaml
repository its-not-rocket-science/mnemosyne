- id: ar_classical_or_scriptural_allusion_إنما_النصر_صبر_ساعة_12b21a98
  language: ar
  canonical_reference: إنما النصر صبر ساعة
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - إنما النصر صبر ساعة
  - النصر صبر ساعة
  - ما النصر إلا صبر ساعة
  short_explanation: Meaning 'Victory is only patience for a moment,' this saying highlights that perseverance
    leads to success. It is often attributed to Prophet Muhammad and appears in hadith collections.
  i18n_explanations:
    en: Meaning 'Victory is only patience for a moment,' this saying highlights that perseverance leads
      to success. It is often attributed to Prophet Muhammad and appears in hadith collections.
    es: Significa 'La victoria es solo paciencia por un momento', este dicho destaca que la perseverancia
      conduce al éxito. A menudo se atribuye al profeta Mahoma y aparece en colecciones de hadices.
    fr: Signifiant 'La victoire n'est que patience pour un moment', ce dicton souligne que la persévérance
      mène au succès. Il est souvent attribué au prophète Mahomet et apparaît dans des recueils de hadiths.
    de: Dieser Spruch bedeutet 'Der Sieg ist nur Geduld für einen Augenblick' und betont, dass Beharrlichkeit
      zum Erfolg führt. Er wird oft dem Propheten Muhammad zugeschrieben und erscheint in Hadith-Sammlungen.
    it: Significando 'La vittoria è solo pazienza per un momento', questo detto sottolinea che la perseveranza
      porta al successo. È spesso attribuito al profeta Maometto e appare in raccolte di hadith.
    pt: Significando 'A vitória é apenas paciência por um momento', este ditado destaca que a perseverança
      leva ao sucesso. É frequentemente atribuído ao profeta Maomé e aparece em coleções de hadith.
