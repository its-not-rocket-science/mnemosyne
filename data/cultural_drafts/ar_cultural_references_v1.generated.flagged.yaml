  short_explanation: A line from modern Arabic poetry (often attributed to Mahmoud Darwish) expressing
    a person's painful sharing of their mother with exile, reflecting themes of loss and displacement.
    It resonates deeply in Palestinian and broader Arab contexts.
  i18n_explanations:
    en: A line from modern Arabic poetry (often attributed to Mahmoud Darwish) expressing a person's painful
      sharing of their mother with exile, reflecting themes of loss and displacement. It resonates deeply
      in Palestinian and broader Arab contexts.
    es: Un verso de la poesía árabe moderna (a menudo atribuido a Mahmud Darwish) que expresa la dolorosa
      compartición de la madre con el exilio, reflejando temas de pérdida y desplazamiento. Resuena profundamente
      en contextos palestinos y árabes en general.
    fr: Un vers de la poésie arabe moderne (souvent attribué à Mahmoud Darwich) exprimant le partage douloureux
      de la mère avec l'exil, reflétant des thèmes de perte et de déplacement. Il résonne profondément
      dans les contextes palestiniens et arabes au sens large.
    de: Ein Vers aus der modernen arabischen Poesie (oft Mahmud Darwisch zugeschrieben), der das schmerzhafte
      Teilen der Mutter mit dem Exil ausdrückt und Themen von Verlust und Vertreibung widerspiegelt. Es
      hat eine tiefe Resonanz im palästinensischen und weiteren arabischen Kontext.
    it: Un verso della poesia araba moderna (spesso attribuito a Mahmoud Darwish) che esprime la dolorosa
      condivisione della madre con l'esilio, riflettendo temi di perdita e spostamento. Risuona profondamente
      nei contesti palestinesi e arabi in generale.
    pt: Um verso da poesia árabe moderna (muitas vezes atribuído a Mahmoud Darwish) expressando a dolorosa
      partilha da mãe com o exílio, refletindo temas de perda e deslocamento. Ressoa profundamente em
      contextos palestinos e árabes mais amplos.
    ru: Строка из современной арабской поэзии (часто приписывается Махмуду Дарвишу), выражающая болезненное
      разделение матери с изгнанием, отражающая темы потери и перемещения. Она глубоко резонирует в палестинском
      и более широком арабском контексте.
    ja: 現代アラビア詩の一節（しばしばマフムード・ダルウィーシュに帰される）で、喪失と避難のテーマを反映し、母を exile（亡命）と苦しく共有することを表現。パレスチナやアラブ世界で深く共感を呼んでいます。
    zh: 现代阿拉伯诗歌中的一行（常归于马哈茂德·达尔维什），表达了与流亡痛苦分享母亲的情感，反映了失落和流离失所的主题。在巴勒斯坦和更广泛的阿拉伯语境中引起深刻共鸣。
    ar: سطر من الشعر العربي الحديث (غالباً ما يُنسب إلى محمود درويش) يعبر عن المشاركة المؤلمة للأم مع
