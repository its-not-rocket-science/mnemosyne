  short_explanation: A classical Arabic proverb meaning 'Many a word ruins the quarrel', implying that
    a single word can escalate a dispute unnecessarily.
  i18n_explanations:
    en: A classical Arabic proverb meaning 'Many a word ruins the quarrel', implying that a single word
      can escalate a dispute unnecessarily.
    es: Un proverbio árabe clásico que significa 'Muchas palabras arruinan la disputa', implicando que
      una sola palabra puede escalar innecesariamente un conflicto.
    fr: Un proverbe arabe classique signifiant 'Beaucoup de mots ruinent la querelle', impliquant qu'un
      seul mot peut escalader inutilement un conflit.
    de: Ein klassisches arabisches Sprichwort, das bedeutet 'Viele Worte ruinieren den Streit', was impliziert,
      dass ein einziges Wort einen Konflikt unnötig verschärfen kann.
    it: Un proverbio arabo classico che significa 'Molte parole rovinano la lite', implicando che una
      singola parola può innescare inutilmente una disputa.
    pt: Um provérbio árabe clássico que significa 'Muitas palavras arruínam a briga', implicando que uma
      única palavra pode escalar desnecessariamente um conflito.
    ru: Классическая арабская пословица, означающая «Многие слова портят ссору», подразумевающая, что
      одно слово может ненужно обострить конфликт.
    ja: 古典的なアラビアのことわざで、「多くの言葉が争いを台無しにする」という意味。たった一言で不必要に紛争が激化することを示唆する。
    zh: 一句经典的阿拉伯谚语，意为‘许多言语会毁掉争吵’，暗示一句话可能会不必要地加剧争端。
    ar: مثل عربي كلاسيكي يعني 'رب كلمة تضيع الخصام'، يعني أن كلمة واحدة يمكن أن تصعد النزاع دون داع.
    he: פתגם ערבי קלאסי שמשמעותו 'מילים רבות הורסות את המריבה', ומרמז שמילה אחת יכולה להסלים מחלוקת שלא
