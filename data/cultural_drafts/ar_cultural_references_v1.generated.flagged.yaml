    fr: Un vers du poème 'La liseuse de tasses' de Nizar Qabbani, exprimant l'indifférence émotionnelle
      face au passage du temps lorsqu'on est consumé par l'amour ou la tristesse. Il reflète le style
      romantique et mélancolique de Qabbani.
    de: Ein Vers aus Nizar Qabbanis Gedicht 'Die Tassenleserin', der emotionale Gleichgültigkeit gegenüber
