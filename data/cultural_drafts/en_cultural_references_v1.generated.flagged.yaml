  i18n_explanations:
    en: Refers to the iconic photograph 'Migrant Mother' by Dorothea Lange, symbolizing the Great Depression's
      hardships. Often linked to John Steinbeck's novel 'The Grapes of Wrath,' which depicts migrant workers'
      struggles.
    es: Se refiere a la icónica fotografía 'Madre migrante' de Dorothea Lange, que simboliza las dificultades
      de la Gran Depresión. A menudo se vincula con la novela de John Steinbeck 'Las uvas de la ira',
      que retrata las luchas de los trabajadores migrantes.
    fr: Fait référence à la photographie emblématique 'Mère migrante' de Dorothea Lange, symbolisant les
      difficultés de la Grande Dépression. Souvent associée au roman de John Steinbeck 'Les Raisins de
      la colère', qui dépeint les luttes des travailleurs migrants.
    de: Bezieht sich auf das ikonische Foto 'Migrant Mother' von Dorothea Lange, das die Härten der Weltwirtschaftskrise
      symbolisiert. Oft mit John Steinbecks Roman 'Die Früchte des Zorns' in Verbindung gebracht, der
      die Kämpfe von Wanderarbeitern schildert.
    it: Si riferisce alla celebre fotografia 'Madre migrante' di Dorothea Lange, che simboleggia le difficoltà
      della Grande Depressione. Spesso collegata al romanzo di John Steinbeck 'Furore', che ritrae le
      lotte dei lavoratori migranti.
    pt: Refere-se à icônica fotografia 'Mãe migrante' de Dorothea Lange, que simboliza as dificuldades
      da Grande Depressão. Frequentemente associada ao romance de John Steinbeck 'As Vinhas da Ira', que
      retrata as lutas dos trabalhadores migrantes.
    ru: Относится к культовой фотографии Доротеи Ланге 'Мать-мигрантка', символизирующей тяготы Великой
      депрессии. Часто связывается с романом Джона Стейнбека 'Гроздья гнева', в котором описаны страдания
      мигрантов-рабочих.
    ja: ドロシア・ラングの象徴的な写真「移民の母」を指し、世界恐慌の困難を象徴する。ジョン・スタインベックの小説「怒りの葡萄」としばしば関連付けられ、移民労働者の苦闘を描いている。
    zh: 指多萝西娅·兰格拍摄的标志性照片《移民母亲》，象征着大萧条时期的苦难。常与约翰·斯坦贝克的小说《愤怒的葡萄》联系在一起，后者描绘了移民工人的挣扎。
    ar: يشير إلى الصورة الأيقونية 'الأم المهاجرة' لدوروثيا لانج، التي ترمز إلى معاناة الكساد العظيم. غالبًا
