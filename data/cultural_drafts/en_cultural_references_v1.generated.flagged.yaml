  short_explanation: A large wooden horse used by the Greeks during the Trojan War to sneak soldiers into
    Troy, as described in Homer's *Iliad* and *Odyssey*. It symbolizes deception or a seemingly harmless
    gift with hidden danger.
  i18n_explanations:
    en: A large wooden horse used by the Greeks during the Trojan War to sneak soldiers into Troy, as
      described in Homer's *Iliad* and *Odyssey*. It symbolizes deception or a seemingly harmless gift
      with hidden danger.
    es: Un gran caballo de madera usado por los griegos durante la guerra de Troya para introducir soldados
      en la ciudad, según se describe en la *Ilíada* y la *Odisea* de Homero. Simboliza el engaño o un
      regalo aparentemente inofensivo con peligro oculto.
    fr: Un grand cheval de bois utilisé par les Grecs pendant la guerre de Troie pour faire entrer des
      soldats dans Troie, comme le décrivent l’*Iliade* et l’*Odyssée* d’Homère. Il symbolise la tromperie
      ou un cadeau apparemment inoffensif mais porteur de danger caché.
    de: Ein großes hölzernes Pferd, das die Griechen während des Trojanischen Krieges benutzten, um Soldaten
      in Troja einzuschleusen, wie in Homers *Ilias* und *Odyssee* beschrieben. Es symbolisiert Täuschung
      oder ein harmlos wirkendes Geschenk mit versteckter Gefahr.
    it: Un grande cavallo di legno usato dai Greci durante la guerra di Troia per introdurre soldati nella
      città, come descritto nell’*Iliade* e nell’*Odissea* di Omero. Simboleggia l’inganno o un dono apparentemente
      innocuo con un pericolo nascosto.
    pt: Um grande cavalo de madeira usado pelos gregos durante a Guerra de Troia para infiltrar soldados
      na cidade, conforme descrito na *Ilíada* e na *Odisseia* de Homero. Simboliza a traição ou um presente
      aparentemente inofensivo com perigo oculto.
    ru: Большой деревянный конь, использованный греками во время Троянской войны, чтобы проникнуть в Трою,
      как описано в «Илиаде» и «Одиссее» Гомера. Символизирует обман или безобидный на вид подарок с скрытой
      опасностью.
    ja: トロイ戦争でギリシャ人がトロイに兵士を忍び込ませるために使った巨大な木馬。ホメロスの叙事詩『イリアス』『オデュッセイア』に描かれている。欺瞞や見かけは無害な贈り物に隠された危険を象徴する。
    zh: 希腊人在特洛伊战争中用来潜入士兵的巨大木马，如荷马史诗《伊利亚特》和《奥德赛》所述。象征欺骗或看似无害的礼物中隐藏的危险。
    ar: حصان خشبي كبير استخدمه الإغريق خلال حرب طروادة لدخول الجنود إلى المدينة، كما وصفه هوميروس في الإلياذة
