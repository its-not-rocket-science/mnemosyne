  short_explanation: A concept from George Orwell's '1984' (1949), describing the ability to hold two
    contradictory beliefs simultaneously and accept both as true. It critiques totalitarianism's manipulation
    of reality and language.
  i18n_explanations:
    en: A concept from George Orwell's '1984' (1949), describing the ability to hold two contradictory
      beliefs simultaneously and accept both as true. It critiques totalitarianism's manipulation of reality
      and language.
    es: Concepto de '1984' (1949) de George Orwell que describe la capacidad de sostener dos creencias
      contradictorias simultáneamente y aceptarlas como verdaderas. Critica la manipulación totalitaria
      de la realidad y el lenguaje.
    fr: Concept issu de '1984' (1949) de George Orwell désignant la capacité à entretenir simultanément
      deux croyances contradictoires et à les accepter comme vraies. Il critique la manipulation totalitaire
      de la réalité et du langage.
    de: Ein Konzept aus George Orwells '1984' (1949), das die Fähigkeit beschreibt, zwei widersprüchliche
      Überzeugungen gleichzeitig zu halten und beide als wahr zu akzeptieren. Es kritisiert die totalitäre
      Manipulation von Realität und Sprache.
    it: Concetto tratto da '1984' (1949) di George Orwell che descrive la capacità di mantenere simultaneamente
      due convinzioni contraddittorie e accettarle come vere. Critica la manipolazione totalitaria della
      realtà e del linguaggio.
    pt: Conceito de '1984' (1949) de George Orwell que descreve a capacidade de sustentar duas crenças
      contraditórias simultaneamente e aceitá-las como verdadeiras. Critica a manipulação totalitária
      da realidade e da linguagem.
    ru: Концепция из романа Джорджа Оруэлла '1984' (1949), описывающая способность одновременно придерживаться
      двух противоречивых убеждений и принимать их за истину. Критикует тоталитарное манипулирование реальностью
      и языком.
    ja: ジョージ・オーウェルの小説「1984年」（1949年）の概念で、同時に矛盾する二つの信念を持ち、両方を真実として受け入れる能力を指す。全体主義による現実と言語の操作を批判している。
    zh: 乔治·奥威尔小说《1984》（1949年）中的概念，指同时持有并接受两种矛盾信念的能力。批判极权主义对现实与语言的操控。
    ar: مفهوم من رواية "1984" (1949) لجورج أورويل، يصف القدرة على التمسك بمعتقدين متعارضين في آن واحد
