- id: en_proverb_tradition_a_house_is_not_a_home_d711a05b
  language: en
  canonical_reference: A house is not a home
  reference_type: proverb_tradition
  surface_patterns:
  - A house is not a home
  - A house isn't a home
  - House is not a home
  short_explanation: Emphasizes that a home is defined by the people and love within it, not just the
    physical structure. Often attributed to the song 'A House Is Not a Home' by Burt Bacharach and Hal
    David.
  i18n_explanations:
    en: Emphasizes that a home is defined by the people and love within it, not just the physical structure.
      Often attributed to the song 'A House Is Not a Home' by Burt Bacharach and Hal David.
    es: Enfatiza que un hogar se define por las personas y el amor que contiene, no solo por la estructura
      física. A menudo se atribuye a la canción 'A House Is Not a Home' de Burt Bacharach y Hal David.
    fr: Souligne qu'un foyer se définit par les personnes et l'amour qu'il contient, et non par sa structure
      physique. Souvent attribuée à la chanson 'A House Is Not a Home' de Burt Bacharach et Hal David.
    de: Betont, dass ein Zuhause durch die Menschen und die Liebe darin definiert wird, nicht nur durch
      die physische Struktur. Wird oft dem Lied 'A House Is Not a Home' von Burt Bacharach und Hal David
      zugeschrieben.
    it: Sottolinea che una casa è definita dalle persone e dall'amore al suo interno, non solo dalla struttura
      fisica. Spesso attribuita alla canzone 'A House Is Not a Home' di Burt Bacharach e Hal David.
    pt: Enfatiza que um lar é definido pelas pessoas e pelo amor dentro dele, não apenas pela estrutura
      física. Frequentemente atribuída à canção 'A House Is Not a Home' de Burt Bacharach e Hal David.
    ru: Подчеркивает, что дом определяется не физической структурой, а людьми и любовью внутри него. Часто
      связывается с песней 'A House Is Not a Home' Берта Бакарака и Хэла Дэвида.
    ja: 家は物理的な構造ではなく、そこに住む人々と愛によって定義されることを強調する。バート・バカラックとハル・デイヴィッドの曲 'A House Is Not a Home' に由来することが多い。
    zh: 强调家的定义在于居住其中的人和爱，而非仅仅是物理结构。常被归因于伯特·巴卡拉克和霍尔·大卫创作的歌曲《A House Is Not a Home》。
    ar: تؤكد أن المنزل يُعرف بالأشخاص والحب داخله، وليس فقط بالبنية المادية. غالبًا ما تُنسب إلى أغنية
      'A House Is Not a Home' لبيرتバカاراك وهال ديفيد.
    he: מדגישה כי בית מוגדר על ידי האנשים והאהבה שבו, ולא רק על ידי המבנה הפיזי. לעיתים מיוחסת לשיר 'A
      House Is Not a Home' של ברט בכרך והל דייוויד.
  learner_level: B1
