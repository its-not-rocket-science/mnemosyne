- id: en_literary_reference_dawn_with_golden_hands_052adc04
  language: en
  canonical_reference: Dawn with golden hands
  reference_type: literary_reference
  surface_patterns:
  - Dawn with golden hands
  - golden-handed dawn
  - dawn with hands of gold
  short_explanation: A poetic phrase describing sunrise, evoking imagery of the sun's rays as golden hands.
    Common in Romantic and Victorian poetry.
  i18n_explanations:
    en: A poetic phrase describing sunrise, evoking imagery of the sun's rays as golden hands. Common
      in Romantic and Victorian poetry.
    es: Frase poética que describe el amanecer, evocando la imagen de los rayos del sol como manos doradas.
      Común en la poesía romántica y victoriana.
    fr: Une expression poétique décrivant l'aube, évoquant l'image des rayons du soleil comme des mains
      dorées. Courante dans la poésie romantique et victorienne.
    de: Ein poetischer Ausdruck für den Sonnenaufgang, der die Strahlen der Sonne als goldene Hände bildhaft
      beschreibt. Häufig in der Romantik und Viktorianischen Lyrik.
    it: Una frase poetica che descrive l'alba, evocando l'immagine dei raggi del sole come mani dorate.
      Comune nella poesia romantica e vittoriana.
    pt: Uma frase poética que descreve o amanhecer, evocando a imagem dos raios do sol como mãos douradas.
      Comum na poesia romântica e vitoriana.
    ru: Поэтическое выражение, описывающее рассвет, с образом солнечных лучей как золотых рук. Распространено
      в романтической и викторианской поэзии.
    ja: 夜明けを描写する詩的な表現で、太陽の光線を黄金の手に見立てたイメージが特徴。ロマン主義やヴィクトリア朝の詩でよく用いられる。
    zh: 描述日出的诗意短语，将阳光比作金色的手。常见于浪漫主义和维多利亚时代的诗歌中。
    ar: عبارة شعرية تصف الفجر، مستحضرة صورة أشعة الشمس كأيدي ذهبية. شائعة في الشعر الرومانسي والفكتوري.
    he: ביטוי פיוטי המתאר את השחר, מעורר דימוי של קרני השמש כידיים זהובות. נפוץ בשירה הרומנטית והאנגלית
