- id: en_literary_reference_a_big_brother_is_watching_you_025c8af8
  language: en
  canonical_reference: A Big Brother is watching you
  reference_type: literary_reference
  surface_patterns:
  - Big Brother is watching you
  - A Big Brother is watching you
  - Big Brother watches you
  - Big Brother is always watching
  short_explanation: This phrase originates from George Orwell's dystopian novel '1984,' symbolizing oppressive
    surveillance and government control. It is often used to critique real-world surveillance practices.
  i18n_explanations:
    en: This phrase originates from George Orwell's dystopian novel '1984,' symbolizing oppressive surveillance
      and government control. It is often used to critique real-world surveillance practices.
    es: Esta frase proviene de la novela distópica '1984' de George Orwell y simboliza la vigilancia opresiva
      y el control gubernamental. Se usa a menudo para criticar prácticas de vigilancia en el mundo real.
    fr: Cette expression vient du roman dystopique '1984' de George Orwell et symbolise la surveillance
      oppressive et le contrôle gouvernemental. Elle est souvent utilisée pour critiquer les pratiques
      de surveillance dans le monde réel.
    de: Dieser Ausdruck stammt aus George Orwells dystopischem Roman '1984' und symbolisiert unterdrückende
      Überwachung und staatliche Kontrolle. Er wird oft verwendet, um reale Überwachungspraktiken zu kritisieren.
    it: Questa frase proviene dal romanzo distopico '1984' di George Orwell e simboleggia la sorveglianza
      oppressiva e il controllo governativo. Viene spesso usata per criticare le pratiche di sorveglianza
      nel mondo reale.
    pt: Esta frase origina-se do romance distópico '1984' de George Orwell e simboliza a vigilância opressiva
      e o controle governamental. É frequentemente usada para criticar práticas de vigilância no mundo
      real.
    ru: Это выражение происходит из антиутопического романа Джорджа Оруэлла '1984' и символизирует угнетающий
      надзор и государственный контроль. Часто используется для критики практики надзора в реальном мире.
    ja: この表現はジョージ・オーウェルのディストピア小説「1984」に由来し、抑圧的な監視と政府による支配を象徴しています。現実世界の監視慣行を批判する際にしばしば用いられます。
    zh: 这句话出自乔治·奥威尔的反乌托邦小说《1984》，象征着压迫性的监视和政府控制。常用于批评现实中的监视行为。
    ar: هذا التعبير مستوحى من رواية جورج أورويل الديستوبية '1984' ويرمز إلى المراقبة القمعية والسيطرة
      الحكومية. يُستخدم غالبًا لانتقاد ممارسات المراقبة في العالم الحقيقي.
    he: ביטוי זה מקורו ברומן הדיסטופי '1984' מאת ג'ורג' אורוול ומשמש כסמל למעקב מדכא ושליטה ממשלתית. משמש
      לעיתים קרובות לביקורת על פרקטיקות מעקב בעולם האמיתי.
