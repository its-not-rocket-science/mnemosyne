      pouvoir immédiat. L’expression vient de la légende de Faust, qui vendit son âme au diable pour le
      savoir et les plaisirs terrestres.
    de: Ein Deal, bei dem man moralische Integrität oder langfristiges Wohl für sofortigen Gewinn oder
      Macht opfert. Der Ausdruck stammt aus der Legende von Faust, der seine Seele dem Teufel für Wissen
      und irdische Freuden verkaufte.
    it: Un accordo in cui si sacrifica l'integrità morale o il benessere a lungo termine per un guadagno
      o potere immediato. L'espressione deriva dalla leggenda di Faust, che vendette l'anima al diavolo
      per conoscenza e piaceri terreni.
    pt: Um acordo em que se sacrifica a integridade moral ou o bem-estar a longo prazo por um ganho ou
      poder imediato. A expressão vem da lenda de Fausto, que vendeu sua alma ao diabo por conhecimento
      e prazeres terrenos.
    ru: Сделка, в которой ради сиюминутной выгоды или власти жертвуют моральной целостностью или долгосрочным
      благополучием. Выражение восходит к легенде о Фаусте, продавшем душу дьяволу за знания и земные
      удовольствия.
    ja: 道徳的な誠実さや長期的な幸福を犠牲にして、即時の利益や権力を得る取引。この表現は、知識と地上の快楽のために悪魔に魂を売ったファウストの伝説に由来します。
    zh: 为追求眼前利益或权力而牺牲道德或长远福祉的交易。典出浮士德传说，他为知识与世俗享乐将灵魂出卖给魔鬼。
    ar: صفقة يتخلى فيها المرء عن نزاهته الأخلاقية أو رفاهيته طويلة الأمد مقابل مكسب أو سلطة فورية. تأتي
      العبارة من أسطورة فاوست، الذي باع روحه للشيطان مقابل المعرفة واللذات الدنيوية.
    he: עסקה שבה מקריבים את היושרה המוסרית או הרווחה לטווח ארוך למען רווח או כוח מיידי. הביטוי נובע מאגדת
      פאוסט, שמכר את נשמתו לשטן תמורת ידע והנאות ארציות.
