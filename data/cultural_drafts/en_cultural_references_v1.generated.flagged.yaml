- id: en_classical_or_scriptural_allusion_happiness_is_the_contemplation_of_eternal_things_b5dd72a4
  language: en
  canonical_reference: Happiness is the contemplation of eternal things
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Happiness is the contemplation of eternal things
  - Happiness consists in the contemplation of eternal things
  - Contemplation of eternal things brings happiness
  short_explanation: This idea is rooted in Aristotelian philosophy, particularly his concept of eudaimonia,
    where true happiness is achieved through intellectual contemplation of timeless truths and virtues.
  i18n_explanations:
    en: This idea is rooted in Aristotelian philosophy, particularly his concept of eudaimonia, where
      true happiness is achieved through intellectual contemplation of timeless truths and virtues.
    es: Esta idea se basa en la filosofía aristotélica, especialmente en su concepto de eudaimonía, donde
      la verdadera felicidad se alcanza mediante la contemplación intelectual de verdades y virtudes eternas.
    fr: Cette idée s'inspire de la philosophie aristotélicienne, notamment de son concept d'eudaimonia,
      où le vrai bonheur s'obtient par la contemplation intellectuelle de vérités et de vertus éternelles.
    de: Diese Idee entspringt der aristotelischen Philosophie, insbesondere seinem Konzept der Eudaimonia,
      bei dem wahres Glück durch intellektuelle Betrachtung zeitloser Wahrheiten und Tugenden erreicht
      wird.
    it: Questa idea affonda le radici nella filosofia aristotelica, in particolare nel suo concetto di
      eudaimonia, dove la vera felicità si ottiene attraverso la contemplazione intellettuale di verità
      e virtù eterne.
    pt: Esta ideia tem raízes na filosofia aristotélica, especialmente em seu conceito de eudaimonia,
      onde a verdadeira felicidade é alcançada pela contemplação intelectual de verdades e virtudes eternas.
    ru: Эта идея уходит корнями в аристотелевскую философию, в частности в его концепцию эвдемонии, где
      истинное счастье достигается через интеллектуальное созерцание вечных истин и добродетелей.
    ja: この考えはアリストテレスの哲学、特に彼の「エウダイモニア」の概念に根ざしています。そこでは、真の幸福は永遠の真理や美徳を知的に contemplation（熟考）することで得られます。
    zh: 这一思想源于亚里士多德的哲学，特别是他的“幸福论”概念，即通过对永恒真理和美德的理性思考获得真正的幸福。
    ar: 'تنبع هذه الفكرة من الفلسفة الأرسطية، وخاصة مفهومه عن '
    السعادة الحقيقية: حيث يتم تحقيق السعادة من خلال التأمل الفكري في الحقائق والمبادئ الأخلاقية الأبدية.
    he: רעיון זה נטוע בפילוסופיה האריסטוטלית, ובמיוחד במושג האודימוניה שלו, לפיו האושר האמיתי מושג באמצעות
