- id: en_classical_or_scriptural_allusion_harpies_in_the_air_213d87db
  language: en
  canonical_reference: Harpies in the air
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - harpies in the air
  - harpies in the sky
  - like harpies in the air
  short_explanation: Refers to the mythological Harpies, winged creatures from Greek mythology known for
    snatching food or souls. The phrase suggests something chaotic or destructive appearing suddenly from
    above.
  i18n_explanations:
    en: Refers to the mythological Harpies, winged creatures from Greek mythology known for snatching
      food or souls. The phrase suggests something chaotic or destructive appearing suddenly from above.
    es: Se refiere a las Harpías de la mitología griega, criaturas aladas que robaban comida o almas.
      La expresión sugiere algo caótico o destructivo que aparece de repente desde lo alto.
    fr: Fait référence aux Harpies de la mythologie grecque, créatures ailées connues pour voler nourriture
      ou âmes. L'expression évoque quelque chose de chaotique ou destructeur apparaissant soudainement.
    de: Bezieht sich auf die mythologischen Harpyien, geflügelte Wesen aus der griechischen Mythologie,
      die Nahrung oder Seelen raubten. Der Ausdruck deutet auf plötzlich aus der Höhe auftauchende chaotische
      oder zerstörerische Kräfte hin.
    it: Si riferisce alle Arpie della mitologia greca, creature alate che rapivano cibo o anime. L'espressione
      suggerisce qualcosa di caotico o distruttivo che appare improvvisamente dall'alto.
    pt: Refere-se às Harpias da mitologia grega, criaturas aladas que roubavam comida ou almas. A expressão
      sugere algo caótico ou destrutivo que aparece de repente do alto.
    ru: Относится к мифологическим гарпиям — крылатым существам из греческой мифологии, которые похищали
      пищу или души. Фраза подразумевает нечто хаотичное или разрушительное, появляющееся внезапно сверху.
    ja: ギリシャ神話のハルピュイア、食物や魂を奪う翼のある生物を指す。この表現は、突然上空から現れる混沌や破壊的なものを示唆する。
    zh: 指希腊神话中的哈耳庇厄，有翼的生物，以掠夺食物或灵魂闻名。此短语暗示突然从空中出现的混乱或破坏性力量。
    ar: يشير إلى الهاربيز في الميثولوجيا اليونانية، كائنات مجنحة معروفة بسرقة الطعام أو الأرواح. العبارة
      تدل على شيء فوضوي أو مدمر يظهر فجأة من الأعلى.
    he: מתייחס להרפיות מהמיתולוגיה היוונית, יצורים מכונפים שגנבו מזון או נשמות. הביטוי מרמז על משהו כאוטי
      או הרסני המופיע לפתע מן האוויר.
