- id: en_classical_or_scriptural_allusion_a_rosencrantz_and_guildenstern_fate_6030e53c
  language: en
  canonical_reference: A Rosencrantz and Guildenstern fate
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Rosencrantz and Guildenstern fate
  - Rosencrantz and Guildenstern's fate
  - a Rosencrantz and Guildenstern end
  - Rosencrantz and Guildenstern
  short_explanation: Refers to being manipulated or used as pawns in a larger scheme, with an inevitable
    tragic outcome. It alludes to two minor characters in Shakespeare's Hamlet who are sent to their deaths
    by Hamlet's orders.
  i18n_explanations:
    en: Refers to being manipulated or used as pawns in a larger scheme, with an inevitable tragic outcome.
      It alludes to two minor characters in Shakespeare's Hamlet who are sent to their deaths by Hamlet's
      orders.
    es: Se refiere a ser manipulado o usado como peones en un plan más grande, con un desenlace trágico
      inevitable. Alude a dos personajes secundarios en Hamlet de Shakespeare que son enviados a su muerte
      por órdenes de Hamlet.
    fr: Désigne le fait d'être manipulé ou utilisé comme pions dans un plan plus vaste, avec une issue
      tragique inévitable. Fait référence à deux personnages secondaires de Hamlet de Shakespeare, envoyés
      à leur mort sur ordre d'Hamlet.
    de: Bezeichnet, als Marionette in einem größeren Plan missbraucht und mit einem unvermeidlichen tragischen
      Ende zu werden. Spielt auf zwei Nebenfiguren in Shakespeares Hamlet an, die auf Hamlets Befehl in
      den Tod geschickt werden.
    it: Si riferisce a essere manipolati o usati come pedine in un piano più grande, con un esito tragico
      inevitabile. Allude a due personaggi minori nell'Amleto di Shakespeare, mandati a morte per ordine
      di Amleto.
    pt: Refere-se a ser manipulado ou usado como peões em um esquema maior, com um desfecho trágico inevitável.
      Alude a dois personagens secundários em Hamlet de Shakespeare, enviados à morte por ordem de Hamlet.
    ru: Обозначает быть использованным как пешка в чужой игре с неизбежным трагическим исходом. Отсылает
      к двум второстепенным персонажам из «Гамлета» Шекспира, посланным на смерть по приказу Гамлета.
    ja: より大きな陰謀の駒として操られ、避けられない悲劇的な結末を迎えることを指す。シェイクスピアの「ハムレット」に登場する二人の脇役が、ハムレットの命令で死に追いやられることに由来する。
    zh: 指被操控或成为更大阴谋中的牺牲品，最终难逃悲剧命运。典出莎士比亚《哈姆雷特》中两个小角色被哈姆雷特派去送死的情节。
    ar: يشير إلى أن يتم التلاعب بك أو استخدامك كدمية في مخطط أكبر، مع نهاية مأساوية محتومة. يشير إلى شخصيتين
      ثانويتين في هاملت لشكسبير تم إرسالهن إلى الموت بأوامر من هاملت.
    he: מתייחס למצב שבו מנצלים או משתמשים באדם ככלי משחק בתוכנית גדולה יותר, עם סוף טרגי בלתי נמנע. מתייחס
      לשני דמויות משנה במחזה 'המלט' של שייקספיר, שנשלחו למותם בהוראת המלט.
