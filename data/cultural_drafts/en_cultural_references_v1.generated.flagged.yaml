- id: en_classical_or_scriptural_allusion_a_daniel_come_to_judgement_cb11c42f
  language: en
  canonical_reference: A Daniel come to judgement
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - a Daniel come to judgement
  - A Daniel come to judgment
  - like a Daniel come to judgement
  short_explanation: Refers to the biblical story of Daniel's wisdom in interpreting Nebuchadnezzar's
    dream, symbolizing fair and wise judgment. Often used to describe someone who delivers a just verdict.
  i18n_explanations:
    en: Refers to the biblical story of Daniel's wisdom in interpreting Nebuchadnezzar's dream, symbolizing
      fair and wise judgment. Often used to describe someone who delivers a just verdict.
    es: Se refiere a la historia bíblica de la sabiduría de Daniel al interpretar el sueño de Nabucodonosor,
      simbolizando un juicio justo y sabio. Se usa para describir a alguien que emite un veredicto justo.
    fr: Fait référence à l'histoire biblique de Daniel interprétant le rêve de Nabuchodonosor avec sagesse,
      symbolisant un jugement équitable. Utilisé pour décrire quelqu'un qui rend une sentence juste.
    de: Bezieht sich auf die biblische Geschichte von Daniels Weisheit bei der Deutung von Nebukadnezars
      Traum, die ein gerechtes und weises Urteil symbolisiert. Wird oft für jemanden verwendet, der ein
      faires Urteil fällt.
    it: Si riferisce alla storia biblica di Daniele che interpreta con saggezza il sogno di Nabucodonosor,
      simbolizzando un giudizio giusto e saggio. Usato per descrivere chi emette una sentenza equa.
    pt: Refere-se à história bíblica de Daniel interpretando com sabedoria o sonho de Nabucodonosor, simbolizando
      um julgamento justo e sábio. Usado para descrever quem emite uma sentença justa.
    ru: Отсылает к библейской истории о мудрости Даниила, истолковавшего сон Навуходоносора, что символизирует
      справедливое и мудрое суждение. Часто используется для описания того, кто выносит справедливый приговор.
    ja: ダニエルがネブカドネツァル王の夢を知恵をもって解き明かした旧約聖書の物語に由来し、公正で賢明な判断を象徴する。正しい裁定を下す人のたとえとして使われる。
    zh: 源于但以理智慧地解读尼布甲尼撒梦境的圣经故事，象征公正而明智的判断。常用于形容做出公正裁决的人。
    ar: يشير إلى القصة التوراتية عن حكمة دانيال في تفسير حلم نبوخذنصر، مما يرمز إلى العدل والحكمة في الحكم.
      يُستخدم لوصف من يصدر حكمًا عادلًا.
    he: מתייחס לסיפור המקראי על חכמתו של דניאל בפירוש חלומו של נבוכדנצר, המסמל שיפוט צודק וחכם. משמש לתיאור
      מי שמגיע להכרעה צודקת.
