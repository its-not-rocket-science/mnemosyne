- id: en_classical_or_scriptural_allusion_the_judgment_of_paris_1ba786f0
  language: en
  canonical_reference: The judgment of Paris
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Judgment of Paris
  - the judgment of Paris
  - Paris' judgment
  - the apple of discord
  short_explanation: A mythological event where Paris, a Trojan prince, was asked to choose which goddess
    (Hera, Athena, or Aphrodite) was the most beautiful, leading to the Trojan War. It symbolizes a difficult
    choice with far-reaching consequences.
  i18n_explanations:
    en: A mythological event where Paris, a Trojan prince, was asked to choose which goddess (Hera, Athena,
      or Aphrodite) was the most beautiful, leading to the Trojan War. It symbolizes a difficult choice
      with far-reaching consequences.
    es: Un evento mitológico en el que Paris, príncipe troyano, debió elegir a la diosa más bella (Hera,
      Atenea o Afrodita), lo que desencadenó la Guerra de Troya. Simboliza una elección difícil con consecuencias
      trascendentales.
    fr: Un événement mythologique où Pâris, prince troyen, dut choisir la déesse la plus belle (Héra,
      Athéna ou Aphrodite), déclenchant la guerre de Troie. Cela symbolise un choix difficile aux conséquences
      majeures.
    de: Ein mythologisches Ereignis, bei dem Paris, ein trojanischer Prinz, die schönste Göttin (Hera,
      Athene oder Aphrodite) wählen musste, was zum Trojanischen Krieg führte. Es symbolisiert eine schwierige
      Entscheidung mit weitreichenden Folgen.
    it: Un evento mitologico in cui Paride, principe troiano, dovette scegliere quale dea (Era, Atena
      o Afrodite) fosse la più bella, scatenando la guerra di Troia. Simboleggia una scelta difficile
      con conseguenze di vasta portata.
    pt: Um evento mitológico em que Páris, príncipe troiano, teve de escolher qual deusa (Hera, Atena
      ou Afrodite) era a mais bela, levando à Guerra de Troia. Simboliza uma escolha difícil com consequências
      de longo alcance.
    ru: Мифологический эпизод, в котором Парис, троянский царевич, должен был выбрать самую красивую богиню
      (Геру, Афину или Афродиту), что привело к Троянской войне. Символизирует сложный выбор с далеко
      идущими последствиями.
    ja: トロイの王子パリスが最も美しい女神（ヘラ、アテナ、アフロディテ）を選ぶという神話上の出来事。これによりトロイ戦争が引き起こされ、遠大な結果をもたらす難しい選択の象徴となります。
    zh: 特洛伊王子帕里斯被要求选择最美的女神（赫拉、雅典娜或阿芙罗狄蒂），这一神话事件引发了特洛伊战争。象征着一个艰难的选择及其深远后果。
    ar: حدث أسطوري حيث طلب من باريس، أمير طروادة، اختيار الإلهة الأكثر جمالًا (هرا، أثينا، أو أفروديت)،
      مما أدى إلى حرب طروادة. يرمز إلى اختيار صعب له عواقب بعيدة المدى.
    he: אירוע מיתולוגי שבו פריס, נסיך טרויה, נדרש לבחור באיזו אלוהית (הרה, אתנה או אפרודיטה) היא היפה
      ביותר, מה שהוביל למלחמת טרויה. מסמל בחירה קשה עם השלכות מרחיקות לכת.
