- id: en_classical_or_scriptural_allusion_caesar_crossing_the_rubicon_d2cb1ce9
  language: en
  canonical_reference: Caesar crossing the Rubicon
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - cross the Rubicon
  - crossing the Rubicon
  - crossed the Rubicon
  - the Rubicon moment
  short_explanation: Refers to Julius Caesar's decision in 49 BCE to lead his army across the Rubicon
    River into Italy, an act of war against the Roman Senate. Symbolizes an irreversible, fateful choice.
  i18n_explanations:
    en: Refers to Julius Caesar's decision in 49 BCE to lead his army across the Rubicon River into Italy,
