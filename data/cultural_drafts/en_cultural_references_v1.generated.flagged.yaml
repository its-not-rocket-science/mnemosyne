- id: en_classical_or_scriptural_allusion_bellerophon_s_fall_155e70e1
  language: en
  canonical_reference: Bellerophon's fall
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Bellerophon's fall
  - Bellerophon's downfall
  - Bellerophon's pride
  - Bellerophon's fall from grace
  short_explanation: Refers to the Greek hero Bellerophon, who, after achieving great feats (including
    taming Pegasus), became arrogant and attempted to ride Pegasus to Mount Olympus. Zeus punished him
    by casting him down to earth, symbolizing the dangers of hubris.
  i18n_explanations:
    en: Refers to the Greek hero Bellerophon, who, after achieving great feats (including taming Pegasus),
      became arrogant and attempted to ride Pegasus to Mount Olympus. Zeus punished him by casting him
      down to earth, symbolizing the dangers of hubris.
    es: Se refiere al héroe griego Belerofonte, quien, tras lograr grandes hazañas (incluyendo domar a
      Pegaso), se volvió arrogante e intentó cabalgar a Pegaso hacia el Monte Olimpo. Zeus lo castigó
      arrojándolo a la tierra, simbolizando los peligros de la hybris.
    fr: Fait référence au héros grec Bellérophon, qui, après avoir accompli de grandes exploits (dont
      avoir dompté Pégase), devint arrogant et tenta de chevaucher Pégase jusqu'à l'Olympe. Zeus le punit
      en le précipitant sur terre, symbolisant les dangers de l'hybris.
    de: Bezieht sich auf den griechischen Helden Bellerophon, der nach großen Taten (einschließlich der
      Zähmung des Pegasus) überheblich wurde und versuchte, auf dem Pegasus zum Olymp zu reiten. Zeus
      bestrafte ihn, indem er ihn auf die Erde stürzte, was die Gefahren der Hybris symbolisiert.
    it: Si riferisce all'eroe greco Bellerofonte, che, dopo aver compiuto grandi imprese (tra cui domare
      Pegaso), divenne arrogante e tentò di cavalcare Pegaso fino al Monte Olimpo. Zeus lo punì facendolo
      precipitare sulla Terra, simboleggiando i pericoli dell'hybris.
    pt: Refere-se ao herói grego Belerofonte, que, após realizar grandes feitos (incluindo domar Pégaso),
      tornou-se arrogante e tentou cavalgar Pégaso até o Monte Olimpo. Zeus o castigou jogando-o de volta
      à terra, simbolizando os perigos da hybris.
    ru: Относится к греческому герою Беллерофонту, который, после великих подвигов (включая приручение
      Пегаса), возгордился и попытался взлететь на Пегасе на Олимп. Зевс наказал его, сбросив на землю,
      что символизирует опасность гибриса.
    ja: ギリシャの英雄ベレロフォンを指す。ペガサスを従え偉業を成し遂げた後、傲慢になりペガサスに乗ってオリンポス山を目指した。ゼウスは彼を地上に落とし、傲慢（ヒュブリス）の危険性を象徴した。
    zh: 指代希腊英雄柏勒洛丰，他在完成伟业（包括驯服飞马佩加索斯）后变得傲慢，并试图骑佩加索斯登上奥林匹斯山。宙斯将其打落凡间，象征傲慢（hybris）的危险。
    ar: يشير إلى البطل اليوناني بيليروفون، الذي بعد إنجازاته العظيمة (بما في ذلك ترويض بيغاسوس) أصبح متغطرسًا
      وحاول ركوب بيغاسوس إلى جبل أوليمبوس. عاقبه زيوس بإلقائه على الأرض، مما يرمز إلى مخاطر الغرور.
    he: מתייחס לגיבור היווני בלרופון, אשר לאחר שהשיג מעשי גבורה (כולל רכיבה על פגסוס), הפך ליהיר וניסה
      לרכוב על פגסוס אל הר האולימפוס. זאוס העניש אותו בהפילו ארצה, וסימל את סכנות ההיבריס.
