- id: en_literary_reference_horatio_s_dilemma_134db5ea
  language: en
  canonical_reference: Horatio’s dilemma
  reference_type: literary_reference
  surface_patterns:
  - Horatio's dilemma
  - Hamlet's Horatio dilemma
  - Horatio's choice
  short_explanation: Refers to the character Horatio in Shakespeare’s *Hamlet*, who faces the dilemma
    of whether to believe the supernatural or trust reason. Symbolizes the conflict between faith and
    skepticism.
  i18n_explanations:
    en: Refers to the character Horatio in Shakespeare’s *Hamlet*, who faces the dilemma of whether to
      believe the supernatural or trust reason. Symbolizes the conflict between faith and skepticism.
    es: Se refiere al personaje Horacio en *Hamlet* de Shakespeare, quien enfrenta el dilema de creer
      en lo sobrenatural o confiar en la razón. Simboliza el conflicto entre fe y escepticismo.
    fr: Fait référence au personnage d'Horatio dans *Hamlet* de Shakespeare, confronté au dilemme de croire
      au surnaturel ou de faire confiance à la raison. Symbolise le conflit entre foi et scepticisme.
    de: Bezieht sich auf die Figur Horatio in Shakespeares *Hamlet*, der vor dem Dilemma steht, ob er
      dem Übernatürlichen glauben oder der Vernunft vertrauen soll. Symbolisiert den Konflikt zwischen
      Glauben und Skepsis.
    it: Si riferisce al personaggio di Orazio nell'*Amleto* di Shakespeare, che affronta il dilemma se
      credere al soprannaturale o fidarsi della ragione. Simboleggia il conflitto tra fede e scetticismo.
    pt: Refere-se ao personagem Horácio em *Hamlet* de Shakespeare, que enfrenta o dilema de acreditar
      no sobrenatural ou confiar na razão. Simboliza o conflito entre fé e ceticismo.
    ru: 'Относится к персонажу Горацио в пьесе Шекспира *Гамлет*, который сталкивается с дилеммой: верить
      ли в сверхъестественное или доверять разуму. Символизирует конфликт между верой и скептицизмом.'
    ja: シェイクスピアの『ハムレット』に登場するホレイショーのジレンマを指す。彼は超自然的なものを信じるか理性を信じるかの葛藤に直面する。信仰と懐疑主義の対立を象徴する。
    zh: 指莎士比亚《哈姆雷特》中的角色霍拉旭，他面临着是相信超自然还是相信理性的两难境地。象征着信仰与怀疑主义之间的冲突。
    ar: يشير إلى شخصية هوراشيو في هاملت لشكسبير، الذي يواجه معضلة الإيمان بالغيبيات أو الاعتماد على العقل.
      يرمز إلى الصراع بين الإيمان والتشكك.
    he: מתייחס לדמותו של הוראטיו ב'המלט' של שייקספיר, הניצב בפני הדילמה האם להאמין בקיומם של דברים על-טבעיים
      או לסמוך על ההיגיון. מסמל את המתח בין אמונה לספקנות.
