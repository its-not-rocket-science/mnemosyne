  short_explanation: Refers to the whimsical, satirical, and often neurotic characters created by American
    cartoonist and writer James Thurber. His work, published in The New Yorker, is known for its humor
    and insight into human foibles.
  i18n_explanations:
    en: Refers to the whimsical, satirical, and often neurotic characters created by American cartoonist
      and writer James Thurber. His work, published in The New Yorker, is known for its humor and insight
      into human foibles.
    es: Se refiere a los personajes caprichosos, satíricos y a menudo neuróticos creados por el caricaturista
      y escritor estadounidense James Thurber. Su obra, publicada en The New Yorker, es conocida por su
      humor y perspicacia sobre las debilidades humanas.
    fr: Désigne les personnages fantaisistes, satiriques et souvent névrotiques créés par le dessinateur
      et écrivain américain James Thurber. Son œuvre, publiée dans The New Yorker, est réputée pour son
      humour et sa perspicacité sur les faiblesses humaines.
    de: Bezieht sich auf die eigenwilligen, satirischen und oft neurotischen Figuren, die der amerikanische
      Cartoonist und Schriftsteller James Thurber schuf. Seine in The New Yorker veröffentlichten Werke
      sind für ihren Humor und ihre Einsichten in menschliche Schwächen bekannt.
    it: Si riferisce ai personaggi bizzarri, satirici e spesso nevrotici creati dal fumettista e scrittore
      statunitense James Thurber. Le sue opere, pubblicate su The New Yorker, sono note per l'umorismo
      e la profondità nell'analizzare le debolezze umane.
    pt: Refere-se aos personagens excêntricos, satíricos e muitas vezes neuróticos criados pelo cartunista
      e escritor americano James Thurber. Suas obras, publicadas na The New Yorker, são conhecidas por
      seu humor e percepção das fraquezas humanas.
    ru: Относится к эксцентричным, сатирическим и часто неврастеничным персонажам, созданным американским
      карикатуристом и писателем Джеймсом Тёрбером. Его работы, публиковавшиеся в The New Yorker, славятся
      юмором и проницательностью в изображении человеческих слабостей.
    ja: アメリカの漫画家・作家ジェームズ・サーバーが生み出した、気まぐれで風刺的、しばしば神経質なキャラクターを指す。彼の作品は「ザ・ニューヨーカー」に掲載され、ユーモアと人間の愚かさへの洞察で知られる。
    zh: 指美国漫画家兼作家詹姆斯·瑟伯创作的古怪、讽刺且常带神经质的角色。他的作品发表于《纽约客》，以幽默和对人性弱点的洞察而闻名。
    ar: يشير إلى الشخصيات العفوية والساخرة والمتقلبة التي ابتكرها الكاريكاتوري الأمريكي والكاتب جيمس ثوربر.
      اشتهرت أعماله، المنشورة في مجلة 'ذا نيويوركر'، بفكاهتها وعمقها في تحليل نواقص البشر.
    he: מתייחס לדמויות גחמניות, סאטיריות ולעיתים נוירוטיות שיצר הקריקטוריסט והסופר האמריקאי ג'יימס ת'רבר.
      עבודתו, שפורסמה ב'ניו יורקר', ידועה בהומור ובתובנותיה לגבי תכונות אנושיות.
