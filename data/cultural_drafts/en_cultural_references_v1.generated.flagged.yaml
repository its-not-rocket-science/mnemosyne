- id: en_literary_reference_a_dystopian_nightmare_8691a2f3
  language: en
  canonical_reference: A dystopian nightmare
  reference_type: literary_reference
  surface_patterns:
  - a dystopian nightmare
  - the dystopian nightmare
  - dystopian nightmares
  - a dystopian future
  short_explanation: A nightmarish vision of society characterized by oppressive control, suffering, and
    often totalitarian governance. The term originates from the literary genre of dystopia, which explores
    worst-case scenarios for humanity.
  i18n_explanations:
    en: A nightmarish vision of society characterized by oppressive control, suffering, and often totalitarian
      governance. The term originates from the literary genre of dystopia, which explores worst-case scenarios
      for humanity.
    es: Una visión aterradora de la sociedad caracterizada por un control opresivo, sufrimiento y, a menudo,
      un gobierno totalitario. El término proviene del género literario de la distopía, que explora los
      peores escenarios para la humanidad.
    fr: Une vision cauchemardesque de la société marquée par un contrôle oppressif, des souffrances et
      souvent un gouvernement totalitaire. Le terme vient du genre littéraire de la dystopie, qui explore
      les pires scénarios pour l'humanité.
    de: Ein albtraumhaftes Gesellschaftsbild, geprägt von unterdrückender Kontrolle, Leid und oft totalitärer
      Herrschaft. Der Begriff stammt aus dem literarischen Genre der Dystopie, das die schlimmsten Szenarien
      für die Menschheit erkundet.
    it: Una visione angosciante della società caratterizzata da un controllo oppressivo, sofferenze e
      spesso da un governo totalitario. Il termine deriva dal genere letterario della distopia, che esplora
      i peggiori scenari per l'umanità.
    pt: Uma visão aterradora da sociedade caracterizada por controle opressivo, sofrimento e, frequentemente,
      governo totalitário. O termo origina-se do gênero literário da distopia, que explora os piores cenários
      para a humanidade.
    ru: Ужасающее видение общества, характеризующееся угнетающим контролем, страданиями и часто тоталитарным
      правлением. Термин происходит из литературного жанра антиутопии, исследующего худшие сценарии для
      человечества.
    ja: 抑圧的な支配、苦難、そしてしばしば全体主義的な統治によって特徴づけられる、悪夢のような社会のビジョン。この用語は、人間性にとって最悪のシナリオを探求する文学ジャンルであるディストピアに由来します。
    zh: 一个充满压迫控制、苦难且通常由极权政府统治的噩梦般的社会景象。该术语源自探索人类最坏可能性的文学体裁——反乌托邦。
    ar: رؤية مرعبة للمجتمع تتميز بالسيطرة القمعية والمعاناة وحكم شمولي في كثير من الأحيان. المصطلح مشتق
      من النوع الأدبي الديستوبيا، الذي يستكشف أسوأ السيناريوهات للبشرية.
    he: חזון סיוטי של חברה המאופיין בשליטה מדכאת, סבל ושלטון טוטליטרי לעיתים קרובות. המונח נובע מז'אנר
      הספרות הדיסטופי, החוקר תרחישים הגרועים ביותר לאנושות.
