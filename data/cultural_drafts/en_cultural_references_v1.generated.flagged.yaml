      Originates from the idiom's use in 19th-century American and British literature.
    es: Se refiere a un problema obvio o controvertido que se ignora o evita en una discusión. Proviene
      del uso del modismo en la literatura estadounidense y británica del siglo XIX.
    fr: Fait référence à un problème évident ou controversé qui est ignoré ou évité dans une discussion.
      Vient de l'utilisation de l'expression dans la littérature américaine et britannique du XIXe siècle.
    de: Bezieht sich auf ein offensichtliches Problem oder kontroverses Thema, das in Diskussionen ignoriert
      oder vermieden wird. Stammt aus dem Gebrauch des Sprichworts in der amerikanischen und britischen
      Literatur des 19. Jahrhunderts.
    it: Si riferisce a un problema ovvio o controverso che viene ignorato o evitato in una discussione.
      Deriva dall'uso dell'espressione nella letteratura americana e britannica del XIX secolo.
    pt: Refere-se a um problema óbvio ou controverso que é ignorado ou evitado em uma discussão. Origina-se
      do uso da expressão na literatura americana e britânica do século XIX.
    ru: Описывает очевидную проблему или спорный вопрос, который игнорируется или избегается в обсуждениях.
      Происходит от использования идиомы в американской и британской литературе XIX века.
    ja: 議論で無視されたり避けられたりする明らかな問題や論争の的を指す表現。19世紀のアメリカ・イギリス文学における慣用句の使用に由来する。
    zh: 指讨论中被忽视或回避的明显问题或有争议的议题。源自19世纪美国和英国文学中的习语使用。
    ar: يشير إلى مشكلة واضحة أو قضية خلافية يتم تجاهلها أو تجنبها في المناقشة. ينشأ من استخدام التعبير
