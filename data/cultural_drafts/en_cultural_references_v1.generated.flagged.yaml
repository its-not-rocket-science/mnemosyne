      ou de danger. Courant dans les contextes modernes familiers et littéraires.
    de: Beschreibt metaphorisch riskantes oder gefährliches Verhalten, oft mit einem Gefühl von Aufregung
      oder Gefahr. Häufig in modernen umgangssprachlichen und literarischen Kontexten verwendet.
    it: Descrive metaforicamente un comportamento rischioso o precario, spesso con un senso di eccitazione
      o pericolo. Comune nei contesti colloquiali e letterari moderni.
    pt: Descreve metaforicamente um comportamento arriscado ou precário, muitas vezes com um senso de
      excitação ou perigo. Comum em contextos modernos coloquiais e literários.
    ru: Метафорически описывает рискованное или опасное поведение, часто с оттенком возбуждения или угрозы.
      Распространено в современной разговорной и литературной речи.
