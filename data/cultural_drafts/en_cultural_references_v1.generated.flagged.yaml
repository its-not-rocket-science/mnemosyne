- id: en_classical_or_scriptural_allusion_fiddle_while_rome_burns_304d63d8
  language: en
  canonical_reference: Fiddle while Rome burns
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - fiddle while Rome burns
  - fiddling while Rome burns
  - to fiddle while Rome burns
  - fiddling Rome away
  short_explanation: To engage in trivial or self-indulgent activities while ignoring a crisis or disaster.
    The phrase originates from the legend of Emperor Nero playing the lyre (often misrepresented as a
    fiddle) as Rome burned in 64 AD.
  i18n_explanations:
    en: To engage in trivial or self-indulgent activities while ignoring a crisis or disaster. The phrase
      originates from the legend of Emperor Nero playing the lyre (often misrepresented as a fiddle) as
      Rome burned in 64 AD.
    es: Dedicarse a actividades triviales o egoístas mientras se ignora una crisis o desastre. La expresión
      proviene de la leyenda del emperador Nerón tocando la lira (a menudo confundida con un violín) mientras
      Roma ardía en el año 64 d.C.
    fr: S'adonner à des activités futiles ou égoïstes en ignorant une crise ou un désastre. L'expression
      vient de la légende de l'empereur Néron jouant de la lyre (souvent confondue avec un violon) pendant
      l'incendie de Rome en 64 ap. J.-C.
    de: Sich mit trivialen oder selbstsüchtigen Aktivitäten beschäftigen, während eine Krise oder Katastrophe
      ignoriert wird. Der Ausdruck stammt aus der Legende, dass Kaiser Nero die Lyra spielte (oft fälschlich
      als Geige bezeichnet), während Rom im Jahr 64 n. Chr. brannte.
    it: Dedicarsi ad attività futili o egoistiche ignorando una crisi o un disastro. L'espressione deriva
      dalla leggenda secondo cui l'imperatore Nerone suonava la lira (spesso confusa con il violino) mentre
      Roma bruciava nel 64 d.C.
    pt: Dedicarse a atividades triviais ou egoístas enquanto ignora uma crise ou desastre. A expressão
      vem da lenda do imperador Nero tocando lira (muitas vezes confundida com violino) enquanto Roma
      ardia em 64 d.C.
    ru: Заниматься пустыми или эгоистичными делами, игнорируя кризис или бедствие. Выражение восходит
      к легенде об императоре Нероне, игравшем на лире (часто ошибочно называемой скрипкой), пока Рим
      горел в 64 году н.э.
    ja: 危機や災害を無視して、 trivial な活動や自己満足的な行為にふけること。この表現は、64年にローマが炎上する中、皇帝ネロがリラ（しばしばバイオリンと誤解される）を演奏していたという伝説に由来する。
    zh: 在危机或灾难面前仍然从事琐碎或自私的活动。该短语源于传说中尼禄皇帝在公元64年罗马大火时演奏里拉琴（常被误称为小提琴）的故事。
    ar: الانشغال بأنشطة تافهة أو أنانية أثناء تجاهل أزمة أو كارثة. تأتي العبارة من أسطورة الإمبراطور نيرون
      وهو يعزف على القيثارة (التي غالبًا ما تُخلط بالكمان) أثناء حريق روما عام 64 م.
    he: לעסוק בפעילויות טריוויאליות או אנוכיות תוך התעלמות ממשבר או אסון. הביטוי נובע מאגדה על הקיסר נירון
      שמנגן בלירה (שלעיתים מבלבלים אותה בכינור) בזמן שרומא בוערת בשנת 64 לספירה.
