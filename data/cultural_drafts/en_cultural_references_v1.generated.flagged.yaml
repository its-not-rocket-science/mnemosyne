  short_explanation: A phrase meaning a decision or action has been made and cannot be changed. It originates
    from Julius Caesar's crossing of the Rubicon River in 49 BCE, symbolizing an irreversible commitment.
  i18n_explanations:
    en: A phrase meaning a decision or action has been made and cannot be changed. It originates from
      Julius Caesar's crossing of the Rubicon River in 49 BCE, symbolizing an irreversible commitment.
    es: Frase que significa que una decisión o acción se ha tomado y no puede cambiarse. Proviene del
      cruce del río Rubicón por Julio César en el 49 a.C., simbolizando un compromiso irreversible.
    fr: Expression signifiant qu'une décision ou une action a été prise et ne peut être changée. Elle
      vient du franchissement du Rubicon par Jules César en 49 av. J.-C., symbolisant un engagement irréversible.
    de: Ein Sprichwort, das bedeutet, dass eine Entscheidung oder Handlung getroffen wurde und nicht mehr
      geändert werden kann. Es stammt aus Julius Caesars Überquerung des Rubikon im Jahr 49 v. Chr., was
      ein unwiderrufliches Engagement symbolisiert.
    it: Espressione che significa che una decisione o un'azione è stata presa e non può essere cambiata.
      Deriva dall'attraversamento del fiume Rubicone da parte di Giulio Cesare nel 49 a.C., simbolo di
      un impegno irreversibile.
    pt: Expressão que significa que uma decisão ou ação foi tomada e não pode ser mudada. Vem da travessia
      do rio Rubicão por Júlio César em 49 a.C., simbolizando um compromisso irreversível.
    ru: Выражение, означающее, что решение или действие принято и не может быть изменено. Оно восходит
      к переходу Юлия Цезаря через реку Рубикон в 49 году до н. э., символизируя необратимое обязательство.
    ja: 一度下された決断や行動は変えられないという意味の成句。紀元前49年のユリウス・カエサルによるルビコン川渡河に由来し、取り返しのつかない決断を象徴する。
    zh: 表示一个决定或行动已经做出且无法改变的短语。源于公元前49年尤利乌斯·恺撒横渡卢比孔河，象征着不可逆转的承诺。
    ar: تعبير يعني أن قرارًا أو فعلًا قد تم ولا يمكن تغييره. ينشأ من عبور يوليوس قيصر لنهر روبيكون في
      49 قبل الميلاد، مما يرمز إلى التزام لا رجعة فيه.
    he: ביטוי שמשמעותו החלטה או פעולה שנעשו ואינן ניתנות לשינוי. מקורו במעברו של יוליוס קיסר את נהר הרוביקון
      בשנת 49 לפנה"ס, המסמל התחייבות בלתי הפיכה.
