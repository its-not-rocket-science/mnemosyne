- id: en_classical_or_scriptural_allusion_hippocratic_oath_95e982d9
  language: en
  canonical_reference: Hippocratic oath
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Hippocratic oath
  - the Hippocratic oath
  - take the Hippocratic oath
  short_explanation: A pledge taken by medical professionals to practice medicine ethically, including
    the principles of beneficence, non-maleficence, and patient confidentiality. Attributed to Hippocrates,
    the ancient Greek physician known as the 'Father of Medicine.'
  i18n_explanations:
    en: A pledge taken by medical professionals to practice medicine ethically, including the principles
      of beneficence, non-maleficence, and patient confidentiality. Attributed to Hippocrates, the ancient
      Greek physician known as the 'Father of Medicine.'
    es: Un juramento que los profesionales de la medicina hacen para ejercer la medicina con ética, incluyendo
      los principios de beneficencia, no maleficencia y confidencialidad del paciente. Atribuido a Hipócrates,
      el médico griego antiguo conocido como el 'Padre de la Medicina'.
    fr: Un serment que les professionnels de la santé prêtent pour exercer la médecine de manière éthique,
      incluant les principes de bienfaisance, de non-malfaisance et de confidentialité du patient. Attribué
      à Hippocrate, le médecin grec antique surnommé le 'Père de la Médecine'.
    de: Ein Gelöbnis, das Mediziner ablegen, um Medizin nach ethischen Grundsätzen auszuüben, einschließlich
      der Prinzipien der Wohltätigkeit, Schadensvermeidung und Patientengeheimhaltung. Zugeschrieben wird
      es Hippokrates, dem antiken griechischen Arzt, der als 'Vater der Medizin' gilt.
    it: Un giuramento che i professionisti della medicina prestano per esercitare la professione in modo
      etico, includendo i principi di beneficenza, non maleficenza e riservatezza del paziente. Attribuito
      a Ippocrate, il medico greco antico noto come il 'Padre della Medicina'.
    pt: Um juramento que os profissionais de medicina fazem para exercer a profissão de forma ética, incluindo
      os princípios de beneficência, não maleficência e confidencialidade do paciente. Atribuído a Hipócrates,
      o antigo médico grego conhecido como o 'Pai da Medicina'.
    ru: Клятва, которую дают медицинские работники, обязуясь практиковать медицину этично, включая принципы
      благотворительности, непричинения вреда и конфиденциальности пациента. Приписывается Гиппократу,
      древнегреческому врачу, известному как 'Отец медицины'.
    ja: 医療従事者が倫理的に医療を実践することを誓うもので、慈悲の原則、害を与えないこと、患者の機密保持を含みます。古代ギリシャの医師ヒポクラテスに由来し、「医学の父」として知られています。
    zh: 医疗从业者承诺以道德方式行医的誓言，包括行善、不伤害和保护患者隐私的原则。该誓言归于被称为“医学之父”的古希腊医生希波克拉底。
