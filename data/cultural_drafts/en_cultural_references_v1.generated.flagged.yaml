- id: en_literary_reference_gild_the_lily_34ac6203
  language: en
  canonical_reference: Gild the lily
  reference_type: literary_reference
  surface_patterns:
  - gild the lily
  - gilding the lily
  - to gild the lily
  - gild the rose
  short_explanation: To adorn something already beautiful, often to its detriment. The phrase originates
    from Shakespeare's play 'King John,' where it is used to criticize unnecessary embellishment.
  i18n_explanations:
    en: To adorn something already beautiful, often to its detriment. The phrase originates from Shakespeare's
      play 'King John,' where it is used to criticize unnecessary embellishment.
    es: Adornar algo que ya es hermoso, a menudo perjudicándolo. La expresión proviene de la obra de Shakespeare
      'El rey Juan', donde se usa para criticar el embellecimiento innecesario.
    fr: Orner quelque chose qui est déjà beau, souvent au détriment de celui-ci. L'expression vient de
      la pièce de Shakespeare 'Le roi Jean', où elle est utilisée pour critiquer l'embellissement superflu.
    de: Etwas bereits Schönes verzieren, oft zum Schaden desselben. Der Ausdruck stammt aus Shakespeares
      Drama 'König Johann', wo er unnötige Verschönerung kritisiert.
    it: Abbellire qualcosa che è già bello, spesso a suo danno. L'espressione proviene dalla pièce di
      Shakespeare 'Il re Giovanni', dove viene usata per criticare l'abbellimento superfluo.
    pt: Adornar algo que já é bonito, muitas vezes prejudicando-o. A expressão vem da peça de Shakespeare
      'Rei João', onde é usada para criticar o embelezamento desnecessário.
    ru: Украшать то, что уже прекрасно, часто во вред ему. Выражение восходит к пьесе Шекспира 'Король
      Иоанн', где оно используется для критики излишнего украшательства.
    ja: すでに美しいものを飾り立てること、しばしばそのものを損なう。この表現はシェイクスピアの戯曲「ジョン王」に由来し、不必要な装飾を批判する際に使われる。
    zh: 给已经美丽的事物锦上添花，常常适得其反。该短语源于莎士比亚的戏剧《约翰王》，用于批评不必要的修饰。
    ar: تجميل شيء جميل بالفعل، غالبًا على حساب جودته. تأتي العبارة من مسرحية شكسبير 'الملك جون'، حيث تُستخدم
      لانتقاد التزيين غير الضروري.
    he: לקשט דבר שכבר יפה, לעיתים תוך פגיעה בו. הביטוי מקורו במחזה 'המלך ג'ון' של שייקספיר, שם הוא משמש
      לביקורת על קישוט מיותר.
