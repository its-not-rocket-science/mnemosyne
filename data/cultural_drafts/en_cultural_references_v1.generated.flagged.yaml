- id: en_classical_or_scriptural_allusion_apple_of_discord_99a34e36
  language: en
  canonical_reference: Apple of Discord
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - apple of discord
  - the apple of discord
  - golden apple of discord
  short_explanation: Refers to the golden apple inscribed 'for the fairest' thrown by Eris at the wedding
    of Peleus and Thetis, sparking the Trojan War. Symbolizes a small cause with large consequences.
  i18n_explanations:
    en: Refers to the golden apple inscribed 'for the fairest' thrown by Eris at the wedding of Peleus
      and Thetis, sparking the Trojan War. Symbolizes a small cause with large consequences.
    es: Se refiere a la manzana de oro inscrita 'para la más bella' lanzada por Eris en la boda de Peleo
      y Tetis, desencadenando la guerra de Troya. Simboliza una causa pequeña con grandes consecuencias.
    fr: Fait référence à la pomme d'or gravée 'pour la plus belle' lancée par Éris lors du mariage de
      Pélée et Thétis, déclenchant la guerre de Troie. Symbolise une petite cause aux grandes conséquences.
    de: Bezieht sich auf den goldenen Apfel mit der Aufschrift 'für die Schönste', den Eris bei der Hochzeit
      von Peleus und Thetis warf und so den Trojanischen Krieg auslöste. Symbolisiert eine kleine Ursache
      mit großen Folgen.
    it: Si riferisce alla mela d'oro incisa 'alla più bella' lanciata da Eris al matrimonio di Peleo e
      Teti, scatenando la guerra di Troia. Simboleggia una piccola causa con grandi conseguenze.
    pt: Refere-se à maçã de ouro inscrita 'para a mais bela' lançada por Éris no casamento de Peleu e
      Tétis, desencadeando a Guerra de Troia. Simboliza uma pequena causa com grandes consequências.
    ru: Относится к золотому яблоку с надписью 'для прекраснейшей', брошенному Эридой на свадьбе Пелея
      и Фетиды, что спровоцировало Троянскую войну. Символизирует малую причину с большими последствиями.
    ja: トロイ戦争のきっかけとなった、ペレウスとテティスの結婚披露宴でエリスが投げた「最も美しい者へ」と書かれた黄金のリンゴを指す。小さな原因が大きな結果を招く象徴。
    zh: 指的是希腊神话中不和女神厄里斯在佩琉斯和忒提斯的婚礼上投掷的「献给最美丽者」的金苹果，引发了特洛伊战争。象征小因引发大果。
    ar: يشير إلى التفاحة الذهبية المنقوشة 'للأجمل' التي ألقتها إريس في عرس بيليوس وثيتيس، مما أشعل حرب
      طروادة. ترمز إلى سبب صغير له عواقب كبيرة.
    he: מתייחס לתפוח הזהב החרות 'ליפה בנשים' שהושלך על ידי אריס בחתונת פלאוס ותטיס, מה שהצית את מלחמת
      טרויה. מסמל סיבה קטנה עם השלכות גדולות.
