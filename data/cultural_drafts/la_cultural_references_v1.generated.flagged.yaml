- id: la_classical_or_scriptural_allusion_pyrrhus_vicit_sed_non_est_victor_95168acf
  language: la
  canonical_reference: Pyrrhus vicit, sed non est victor
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Pyrrhus vicit, sed non est victor
  - Pyrrhus vicit, sed non victor
  - Pyrrhus victor non est
  short_explanation: Attributed to the Roman historian Cassius Dio, this phrase refers to Pyrrhus of Epirus,
    whose costly victories over Rome (e.g., at Asculum, 279 BCE) ultimately led to his defeat. It signifies
    a 'Pyrrhic victory'—a win that inflicts such damage that it is tantamount to defeat.
  i18n_explanations:
    en: Attributed to the Roman historian Cassius Dio, this phrase refers to Pyrrhus of Epirus, whose
      costly victories over Rome (e.g., at Asculum, 279 BCE) ultimately led to his defeat. It signifies
      a 'Pyrrhic victory'—a win that inflicts such damage that it is tantamount to defeat.
    es: 'Atribuida al historiador romano Casio Dión, esta frase se refiere a Pirro de Epiro, cuyas victorias
      costosas sobre Roma (por ejemplo, en Asculum, 279 a.C.) terminaron llevándolo a la derrota. Significa
      una ''victoria pírrica'': una victoria que causa tanto daño que equivale a una derrota.'
    fr: 'Attribuée à l''historien romain Cassius Dio, cette phrase fait référence à Pyrrhus d''Épire,
      dont les victoires coûteuses contre Rome (par exemple à Asculum, 279 av. J.-C.) ont finalement conduit
      à sa défaite. Elle désigne une ''victoire à la Pyrrhus'' : une victoire qui inflige tant de dommages
      qu''elle équivaut à une défaite.'
    de: Dem römischen Historiker Cassius Dio zugeschrieben, bezieht sich dieser Ausdruck auf Pyrrhus von
      Epirus, dessen teure Siege über Rom (z. B. in Asculum, 279 v. Chr.) letztlich zu seiner Niederlage
      führten. Er steht für einen 'Pyrrhussieg' – einen Sieg, der so hohe Kosten verursacht, dass er einer
      Niederlage gleichkommt.
    it: Attribuita allo storico romano Cassio Dione, questa frase si riferisce a Pirro d'Epiro, le cui
      vittorie costose su Roma (ad esempio ad Ascoli, 279 a.C.) portarono infine alla sua sconfitta. Indica
      una 'vittoria di Pirro' – una vittoria che infligge danni tali da equivalere a una sconfitta.
    pt: Atribuída ao historiador romano Cassius Dio, esta frase refere-se a Pirro de Épiro, cujas vitórias
      custosas sobre Roma (por exemplo, em Ásculo, 279 a.C.) levaram-no, por fim, à derrota. Significa
      uma 'vitória de Pirro' – uma vitória que causa danos tão grandes que equivale a uma derrota.
    ru: Приписывается римскому историку Кассию Диону, это выражение относится к Пирру Эпирскому, чьи победы
      над Римом (например, при Аскуле, 279 г. до н.э.) в итоге привели к его поражению. Оно означает 'пиррову
      победу' — победу, которая наносит такой ущерб, что равносильна поражению.
    ja: ローマの歴史家カッシウス・ディオに帰せられるこの言葉は、エピルスのピュロス王の、ローマに対する多大な犠牲を伴う勝利（紀元前279年のアスクルムの戦いなど）が最終的に敗北につながったことを指す。これは「ピュロスの勝利」を意味し、損害が甚大で敗北に等しい勝利を表す。
    zh: 据传为罗马历史学家卡修斯·狄奥所言，此语指皮洛士国王对罗马的代价高昂的胜利（如公元前279年阿斯库卢姆战役），最终却导致其失败。它指代“皮洛士式的胜利”——一种得不偿失的胜利。
    ar: تنسب إلى المؤرخ الروماني كاسيوس ديو، تشير هذه العبارة إلى بيروس الإبيري، الذي أدت انتصاراته المكلفة
      على روما (مثل معركة أسكولوم، 279 ق.م) في النهاية إلى هزيمته. تعني 'النصر البيروسي' – فوز يتسبب في
      أضرار كبيرة لدرجة أنه يعادل الهزيمة.
    he: מיוחס להיסטוריון הרומי קסיוס דיו, ביטוי זה מתייחס לפירוס מאפירוס, ש побеותיו היקרות על רומא (למשל
      בקרב אסקולום, 279 לפנה"ס) הובילו בסופו של דבר לתבוסתו. הוא מסמל 'ניצחון פירוסי' – ניצחון שגורם נזק
      כה רב עד שהוא שקול לתבוסה.
