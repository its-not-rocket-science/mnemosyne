    and later the Byzantine Empire.
  i18n_explanations:
    en: This refers to the refounding of Byzantium as Constantinople by Emperor Constantine the Great
      in 330 AD. It marks the city's transformation into the capital of the Eastern Roman Empire and later
      the Byzantine Empire.
    es: Esto se refiere a la refundación de Bizancio como Constantinopla por el emperador Constantino
      el Grande en el año 330 d.C. Marca la transformación de la ciudad en la capital del Imperio Romano
      de Oriente y, más tarde, del Imperio Bizantino.
    fr: Cela fait référence à la refondation de Byzance en tant que Constantinople par l'empereur Constantin
      le Grand en 330 ap. J.-C. Cela marque la transformation de la ville en capitale de l'Empire romain
      d'Orient, puis plus tard de l'Empire byzantin.
    de: Dies bezieht sich auf die Neugründung von Byzanz als Konstantinopel durch Kaiser Konstantin den
      Großen im Jahr 330 n. Chr. Es markiert die Verwandlung der Stadt in die Hauptstadt des Oströmischen
      Reiches und später des Byzantinischen Reiches.
    it: Questo si riferisce alla rifondazione di Bisanzio come Costantinopoli da parte dell'imperatore
      Costantino il Grande nel 330 d.C. Segna la trasformazione della città nella capitale dell'Impero
      Romano d'Oriente e, in seguito, dell'Impero Bizantino.
    pt: Isso se refere à refundação de Bizâncio como Constantinopla pelo imperador Constantino, o Grande,
