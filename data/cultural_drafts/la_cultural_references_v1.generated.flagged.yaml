- id: la_proverb_tradition_in_arte_veritas_1b23ace6
  language: la
  canonical_reference: In arte veritas
  reference_type: proverb_tradition
  surface_patterns:
  - In arte veritas
  - In arte sola veritas
  - In arte veritas est
  short_explanation: This phrase means 'In art, there is truth,' suggesting that art reveals deeper truths
    about life and human nature. It is often used to emphasize the power of art to convey authentic experiences
    and emotions.
  i18n_explanations:
    en: This phrase means 'In art, there is truth,' suggesting that art reveals deeper truths about life
      and human nature. It is often used to emphasize the power of art to convey authentic experiences
      and emotions.
    es: Esta frase significa 'En el arte, hay verdad', sugiriendo que el arte revela verdades más profundas
      sobre la vida y la naturaleza humana. Se usa para enfatizar el poder del arte para transmitir experiencias
      y emociones auténticas.
    fr: Cette phrase signifie 'Dans l'art, il y a la vérité', suggérant que l'art révèle des vérités plus
      profondes sur la vie et la nature humaine. Elle est souvent utilisée pour souligner le pouvoir de
      l'art à transmettre des expériences et des émotions authentiques.
    de: Dieser Satz bedeutet 'In der Kunst liegt die Wahrheit', was darauf hindeutet, dass Kunst tiefere
      Wahrheiten über das Leben und die menschliche Natur offenbart. Er wird oft verwendet, um die Kraft
      der Kunst zu betonen, authentische Erfahrungen und Emotionen zu vermitteln.
    it: Questa frase significa 'Nell'arte c'è la verità', suggerendo che l'arte rivela verità più profonde
      sulla vita e sulla natura umana. Viene spesso usata per enfatizzare il potere dell'arte di trasmettere
      esperienze ed emozioni autentiche.
    pt: Esta frase significa 'Na arte, há verdade', sugerindo que a arte revela verdades mais profundas
      sobre a vida e a natureza humana. É frequentemente usada para enfatizar o poder da arte de transmitir
      experiências e emoções autênticas.
    ru: Эта фраза означает 'В искусстве есть истина', что предполагает, что искусство раскрывает более
      глубокие истины о жизни и человеческой природе. Её часто используют, чтобы подчеркнуть силу искусства
      в передаче подлинных переживаний и эмоций.
    ja: この言葉は「芸術には真実がある」を意味し、芸術が人生や人間性についてのより深い真実を明らかにするという考えを表しています。芸術が本物の経験や感情を伝える力を強調する際にしばしば用いられます。
    zh: 这句话的意思是“艺术中蕴含真理”，意指艺术揭示了关于生命和人性的更深层次的真相。常用于强调艺术传达真实体验和情感的力量。
    ar: هذه العبارة تعني 'في الفن، هناك حقيقة'، مما يشير إلى أن الفن يكشف حقائق أعمق عن الحياة والطبيعة
