  short_explanation: A phrase from Horace's *Epistles*, meaning 'Proceed where you have been led.' It
    encourages following one's natural inclinations or calling, reflecting Horace's advice on living in
    accordance with one's nature.
  i18n_explanations:
    en: A phrase from Horace's *Epistles*, meaning 'Proceed where you have been led.' It encourages following
      one's natural inclinations or calling, reflecting Horace's advice on living in accordance with one's
      nature.
    es: Frase de las *Epístolas* de Horacio que significa 'Avanza por donde te lleve'. Anima a seguir
      los propios instintos o vocación, reflejando el consejo de Horacio sobre vivir en armonía con la
      naturaleza.
    fr: Une phrase des *Épîtres* d'Horace signifiant 'Avance là où tu as été conduit'. Elle encourage
      à suivre ses inclinations naturelles ou sa vocation, reflétant les conseils d'Horace sur la vie
      en accord avec la nature.
    de: Ein Zitat aus Horaz' *Episteln* mit der Bedeutung 'Gehe weiter, wohin du geführt wirst'. Es ermutigt,
      den eigenen natürlichen Neigungen oder Berufungen zu folgen und spiegelt Horaz' Rat wider, im Einklang
      mit der eigenen Natur zu leben.
    it: Una frase delle *Epistole* di Orazio che significa 'Prosegui dove sei stato guidato'. Incoraggia
      a seguire le proprie inclinazioni naturali o la propria vocazione, riflettendo il consiglio di Orazio
      di vivere in armonia con la propria natura.
    pt: Frase das *Epístolas* de Horácio que significa 'Avance por onde for conduzido'. Incentiva a seguir
      as próprias inclinações naturais ou vocação, refletindo o conselho de Horácio sobre viver de acordo
      com a própria natureza.
    ru: Цитата из «Посланий» Горация, означающая 'Иди туда, куда тебя ведут'. Призывает следовать своим
      природным склонностям или призванию, отражая совет Горация жить в согласии с собственной природой.
    ja: ホラティウスの『書簡集』の一節で「導かれたところへ進め」を意味する。自らの自然な傾向や使命に従うよう促し、ホラティウスの自然に従って生きるという助言を反映している。
    zh: 贺拉斯《书信集》中的一句话，意为‘顺势而行’。鼓励追随自己的天性或使命，体现了贺拉斯关于顺应自然生活的建议。
    ar: عبارة من رسائل هوراس تعني 'استمر حيثما تقودك'. تشجع على اتباع الميول الطبيعية أو الدعوة، تعكس
