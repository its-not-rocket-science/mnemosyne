- id: la_classical_or_scriptural_allusion_quintili_vare_legiones_redde_82bd7ecc
  language: la
  canonical_reference: Quintili Vare, legiones redde!
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Quintili Vare, legiones redde!
  - Quinctili Vare, legiones redde!
  - Quintili Vare, redde legiones!
  short_explanation: Attributed to the Roman emperor Augustus, this exclamation refers to the disastrous
    Battle of the Teutoburg Forest (9 CE), where three Roman legions under Publius Quinctilius Varus were
    annihilated by Germanic tribes. It expresses grief and outrage over a catastrophic military defeat.
  i18n_explanations:
    en: Attributed to the Roman emperor Augustus, this exclamation refers to the disastrous Battle of
      the Teutoburg Forest (9 CE), where three Roman legions under Publius Quinctilius Varus were annihilated
      by Germanic tribes. It expresses grief and outrage over a catastrophic military defeat.
    es: Atribuida al emperador romano Augusto, esta exclamación se refiere a la desastrosa Batalla del
      Bosque de Teutoburgo (9 d.C.), donde tres legiones romanas bajo Publio Quintilio Varo fueron aniquiladas
      por tribus germánicas. Expresa dolor e indignación por una derrota militar catastrófica.
    fr: Attribuée à l'empereur romain Auguste, cette exclamation fait référence à la désastreuse bataille
      de la forêt de Teutobourg (9 ap. J.-C.), où trois légions romaines sous le commandement de Publius
      Quinctilius Varus furent anéanties par des tribus germaniques. Elle exprime le deuil et l'indignation
      face à une défaite militaire catastrophique.
    de: Dem römischen Kaiser Augustus zugeschrieben, bezieht sich dieser Ausruf auf die vernichtende Schlacht
      im Teutoburger Wald (9 n. Chr.), bei der drei römische Legionen unter Publius Quinctilius Varus
      von germanischen Stämmen vernichtet wurden. Er drückt Trauer und Empörung über eine katastrophale
      militärische Niederlage aus.
    it: Attribuita all'imperatore romano Augusto, questa esclamazione si riferisce alla disastrosa Battaglia
      della Foresta di Teutoburgo (9 d.C.), dove tre legioni romane sotto Publio Quintilio Varo furono
      annientate dalle tribù germaniche. Esprime dolore e indignazione per una catastrofica sconfitta
      militare.
    pt: Atribuída ao imperador romano Augusto, esta exclamação refere-se à desastrosa Batalha da Floresta
      de Teutoburgo (9 d.C.), onde três legiões romanas sob o comando de Públio Quintílio Varo foram aniquiladas
      por tribos germânicas. Expressa luto e indignação por uma derrota militar catastrófica.
    ru: Приписывается римскому императору Августу, этот возглас относится к катастрофической битве в Тевтобургском
      Лесу (9 г. н.э.), где три римских легиона под командованием Публия Квинтилия Вара были уничтожены
      германскими племенами. Он выражает скорбь и возмущение по поводу катастрофического военного поражения.
    ja: ローマ皇帝アウグストゥスに帰せられるこの叫びは、テウトブルクの森の戦い（9年）を指す。そこで、プブリウス・クインクティリウス・ウァルス率いる3個ローマ軍団がゲルマン諸部族に壊滅させられた。これは壊滅的な軍事敗北に対する悲しみと怒りを表す。
    zh: 传为罗马皇帝奥古斯都所言，此语指公元9年条顿堡森林战役，三个由普布利乌斯·昆克提利乌斯·瓦鲁斯率领的罗马军团被日耳曼部落歼灭。它表达了对这场灾难性军事失败的悲痛与愤怒。
    ar: تنسب إلى الإمبراطور الروماني أغسطس، تشير هذه الصيحة إلى معركة غابة توتوبورغ الكارثية (9 م)، حيث
      دمرت ثلاث فيالق رومانية بقيادة بوبليوس كوينكتيليوس فاروس على يد القبائل الجرمانية. تعبر عن الحزن
      والغضب إزاء هزيمة عسكرية كارثية.
    he: מיוחס לקיסר הרומי אוגוסטוס, קריאה זו מתייחסת לקרב יער טויטובורג האסוני (9 לספירה), בו הושמדו שלושה
      לגיונות רומיים בפיקודו של פובליוס קווינקטיליוס וארוס על ידי שבטים גרמאניים. היא מבטאת צער וזעם על
      תבוסה צבאית קטסטרופלית.
