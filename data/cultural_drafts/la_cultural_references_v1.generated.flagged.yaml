    ja: これは、紀元前63年にキケロがカティリナの陰謀を鎮圧したことを指します。ローマの歴史における重要な出来事であり、キケロが執政官としてルキウス・セルギウス・カティリナによるローマ共和国転覆の陰謀を暴露し阻止した事件です。
    zh: 这指的是西塞罗在公元前63年镇压卡提利那阴谋的事件，罗马历史上的一个关键事件，时任执政官的西塞罗揭露并挫败了卢基乌斯·塞尔吉乌斯·卡提利那推翻罗马共和国的阴谋。
    ar: يشير هذا إلى قمع شيشرون لمؤامرة كاتيلينا في عام 63 قبل الميلاد، وهو حدث محوري في التاريخ الروماني
