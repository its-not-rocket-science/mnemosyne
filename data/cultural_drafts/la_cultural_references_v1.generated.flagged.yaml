  short_explanation: The 'fatal gift of the Danaans' refers to the Trojan Horse, a deceptive offering
    that led to the fall of Troy. It symbolizes treachery disguised as a gift.
  i18n_explanations:
    en: The 'fatal gift of the Danaans' refers to the Trojan Horse, a deceptive offering that led to the
      fall of Troy. It symbolizes treachery disguised as a gift.
    es: El 'regalo fatal de los dánaos' se refiere al caballo de Troya, una ofrenda engañosa que provocó
      la caída de Troya. Simboliza la traición disfrazada de regalo.
    fr: Le 'cadeau fatal des Danaens' fait référence au cheval de Troie, une offrande trompeuse qui a
      causé la chute de Troie. Il symbolise la trahison déguisée en présent.
    de: Das 'verhängnisvolle Geschenk der Danaer' bezieht sich auf das Trojanische Pferd, ein trügerisches
      Angebot, das zum Fall Trojas führte. Es symbolisiert Verrat, der als Geschenk getarnt ist.
    it: Il 'fatale dono dei Danai' si riferisce al cavallo di Troia, un'offerta ingannevole che portò
      alla caduta di Troia. Simboleggia il tradimento camuffato da dono.
    pt: O 'presente fatal dos Dânaos' refere-se ao Cavalo de Troia, uma oferta enganosa que levou à queda
      de Troia. Simboliza a traição disfarçada de presente.
    ru: «Роковой дар данайцев» — это Троянский конь, обманчивый подарок, который привёл к падению Трои.
      Он символизирует предательство, скрытое под видом подарка.
    ja: 「ダナオス族の災いの贈り物」とはトロイの木馬のことで、トロイを滅ぼした偽りの贈り物を指します。贈り物に偽装された裏切りを象徴しています。
    zh: “达那俄斯人的致命礼物”指的是特洛伊木马，一个导致特洛伊城陷落的诱饵。它象征着伪装成礼物的背叛。
    ar: «هدية الدانانيين المميتة» تشير إلى حصان طروادة، وهو هدية خادعة أدت إلى سقوط طروادة. إنها ترمز
      إلى الخيانة المتخفية بهدية.
    he: «מתנת הדאנאים המרושעת» מתייחסת לסוס הטרויאני, מתנה מרמה שהובילה לנפילת טרויה. היא מסמלת בגידה
      המוסווית כמתנה.
