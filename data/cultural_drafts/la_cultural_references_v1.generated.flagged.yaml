  - Fata viam invenient (si non est via, facient)
  short_explanation: A Latin proverb meaning 'Fate will find a way' or 'Fate will make a way.' It reflects
    the Stoic belief in destiny and perseverance.
  i18n_explanations:
    en: A Latin proverb meaning 'Fate will find a way' or 'Fate will make a way.' It reflects the Stoic
      belief in destiny and perseverance.
    es: Un proverbio latino que significa 'El destino abrirá camino' o 'El destino encontrará la manera.'
      Refleja la creencia estoica en el destino y la perseverancia.
    fr: Un proverbe latin signifiant 'Le destin trouvera un chemin' ou 'Le destin ouvrira la voie.' Il
      reflète la croyance stoïcienne en la destinée et la persévérance.
    de: Ein lateinisches Sprichwort mit der Bedeutung 'Das Schicksal findet einen Weg' oder 'Das Schicksal
      bahnt sich seinen Weg.' Es spiegelt den stoischen Glauben an Schicksal und Ausdauer wider.
    it: Un proverbio latino che significa 'Il destino troverà una via' o 'Il destino aprirà la strada.'
      Riflette la credenza stoica nel destino e nella perseveranza.
    pt: Um provérbio latino que significa 'O destino encontrará um caminho' ou 'O destino abrirá caminho.'
      Reflete a crença estoica no destino e na perseverança.
    ru: Латинская пословица, означающая 'Судьба найдет путь' или 'Судьба проложит дорогу'. Отражает стоическое
      убеждение в предопределении и настойчивости.
    ja: ラテン語の格言で、「運命は道を見つける」または「運命は道を切り開く」という意味。運命と忍耐を信じるストア哲学を反映している。
    zh: 一句拉丁谚语，意为「命运会找到出路」或「命运会开辟道路」。体现了斯多葛派对命运与坚韧的信念。
    ar: مثل لاتيني يعني 'القدر سيجد طريقًا' أو 'القدر سيفتح الطريق'. يعكس الإيمان الرواقي بالقدر والمثابرة.
    he: פתגם לטיני שפירושו 'הגורל ימצא דרך' או 'הגורל יסלול את הדרך'. משקף את האמונה הסטואית בגורל ובהתמדה.
