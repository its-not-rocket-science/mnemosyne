  short_explanation: The 'Greatest Altar' of Hercules in Rome, where sacrifices were made to the hero
    Hercules. It symbolized Hercules' role as a protector and his cult's importance in Roman religion.
  i18n_explanations:
    en: The 'Greatest Altar' of Hercules in Rome, where sacrifices were made to the hero Hercules. It
      symbolized Hercules' role as a protector and his cult's importance in Roman religion.
    es: El 'Altar Máximo' de Hércules en Roma, donde se hacían sacrificios al héroe. Simbolizaba su papel
      como protector y la importancia de su culto en la religión romana.
    fr: L'« Autel Majeur » d'Hercule à Rome, où des sacrifices étaient offerts au héros. Il symbolisait
      le rôle protecteur d'Hercule et l'importance de son culte dans la religion romaine.
    de: Der « Große Altar » des Herakles in Rom, wo dem Helden Opfer dargebracht wurden. Er symbolisierte
      Herakles' Rolle als Beschützer und die Bedeutung seines Kults in der römischen Religion.
    it: L'« Altare Massimo » di Ercole a Roma, dove venivano fatti sacrifici all'eroe. Simboleggiava il
      ruolo di Ercole come protettore e l'importanza del suo culto nella religione romana.
    pt: O 'Altar Máximo' de Hércules em Roma, onde sacrifícios eram feitos ao herói. Simbolizava o papel
      de Hércules como protetor e a importância de seu culto na religião romana.
    ru: Величайший алтарь Геркулеса в Риме, где приносили жертвы этому герою. Он символизировал роль Геркулеса
      как защитника и значение его культа в римской религии.
    ja: ローマのヘラクレスの「最大の祭壇」で、英雄へのいけにえが捧げられた。ローマ宗教におけるヘラクレスの守護者としての役割と、その信仰の重要性を象徴していた。
    zh: 罗马的赫拉克勒斯「最大祭坛」，供奉这位英雄。象征赫拉克勒斯作为守护者的角色及其在罗马宗教中的重要性。
    ar: «المذبح الأعظم» لهرقل في روما، حيث كانت تقدم القرابين لهذا البطل. كان يرمز لدور هرقل كحامي ولأهمية
      طائفته في الديانة الرومانية.
    he: «המזבח הגדול» של הרקולס ברומא, שם הוקרבו קורבנות לגיבור. סימל את תפקידו של הרקולס כמגן ואת חשיבות
      פולחנו בדת הרומית.
