- id: la_cultural_reference_sub_rosa_0ef26e53
  language: la
  canonical_reference: Sub rosa
  reference_type: cultural_reference
  surface_patterns:
  - sub rosa
  - sub rosā
  - under the rose
  short_explanation: A Latin phrase meaning 'under the rose,' symbolizing secrecy or confidentiality.
    The rose has been a symbol of silence since antiquity, often associated with the Greek myth of Cupid
    giving a rose to Harpocrates (god of silence) to ensure discretion.
  i18n_explanations:
    en: A Latin phrase meaning 'under the rose,' symbolizing secrecy or confidentiality. The rose has
      been a symbol of silence since antiquity, often associated with the Greek myth of Cupid giving a
      rose to Harpocrates (god of silence) to ensure discretion.
    es: Frase latina que significa 'bajo la rosa', simbolizando secreto o confidencialidad. La rosa ha
      sido símbolo de silencio desde la antigüedad, vinculada al mito griego de Cupido regalando una rosa
      a Harpócrates (dios del silencio) para garantizar discreción.
    fr: Expression latine signifiant 'sous la rose', symbolisant le secret ou la confidentialité. La rose
      est un symbole de silence depuis l'Antiquité, souvent associé au mythe grec de Cupidon offrant une
      rose à Harpocrate (dieu du silence) pour garantir la discrétion.
    de: Ein lateinischer Ausdruck, der 'unter der Rose' bedeutet und Geheimhaltung oder Vertraulichkeit
      symbolisiert. Die Rose steht seit der Antike für Schweigen und ist mit dem griechischen Mythos verbunden,
      in dem Cupido Harpocrates (Gott der Stille) eine Rose schenkt, um Diskretion zu sichern.
    it: Un'espressione latina che significa 'sotto la rosa', simbolo di segretezza o riservatezza. La
      rosa rappresenta il silenzio fin dall'antichità, spesso legata al mito greco di Cupido che dona
      una rosa a Arpocrate (dio del silenzio) per garantirne la discrezione.
    pt: Expressão latina que significa 'sob a rosa', simbolizando segredo ou confidencialidade. A rosa
      é um símbolo de silêncio desde a Antiguidade, frequentemente associada ao mito grego de Cupido oferecendo
      uma rosa a Harpócrates (deus do silêncio) para garantir discrição.
    ru: Латинское выражение, означающее 'под розой', символизирующее секретность или конфиденциальность.
      Роза с древности является символом молчания, часто связанным с греческим мифом, где Купидон дарит
      розу Гарпократу (богу молчания), чтобы обеспечить осмотрительность.
    ja: 「バラの下で」を意味するラテン語の成句で、秘密や機密を象徴します。バラは古代から沈黙の象徴であり、ギリシャ神話でクピドが沈黙の神ハルポクラテスにバラを贈り、口止めしたことに由来します。
    zh: 拉丁语短语，意为“在玫瑰下”，象征保密或机密。自古以来，玫瑰就是沉默的象征，常与希腊神话中丘比特赠予沉默之神哈耳波克拉忒斯一朵玫瑰以确保其谨慎相关。
    ar: عبارة لاتينية تعني "تحت الورد"، ترمز إلى السرية أو عدم الإفصاح. وقد كان الورد رمزًا للصمت منذ
      القدم، often associated with the Greek myth of Cupid giving a rose to Harpocrates (god of silence)
      to ensure discretion.
    he: ביטוי לטיני שפירושו 'מתחת לשושנה', המסמל סודיות או חיסיון. השושנה הייתה לסמל שתיקה עוד בעת העתיקה,
      לעיתים קשורה למיתוס היווני בו קופידון נתן שושנה להרפקרטס (אל השתיקה) כדי להבטיח שתיקה.
