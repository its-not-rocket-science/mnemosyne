    fr: Cela fait référence à la répression de la conjuration de Catilina par Cicéron en 63 av. J.-C.,
      un événement clé de l'histoire romaine où Cicéron, en tant que consul, a démasqué et déjoué un complot
      de Lucius Sergius Catilina visant à renverser la République romaine.
    de: Dies bezieht sich auf Ciceros Niederschlagung der Catilinarischen Verschwörung im Jahr 63 v. Chr.,
