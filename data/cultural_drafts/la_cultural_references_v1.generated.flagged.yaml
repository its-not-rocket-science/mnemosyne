- id: la_classical_or_scriptural_allusion_sic_semper_tyrannis_0064756f
  language: la
  canonical_reference: Sic semper tyrannis
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Sic semper tyrannis
  - Sic semper tyrannis!
  - Sic semper tyrannis...
  - Thus always to tyrants
  short_explanation: A Latin phrase meaning 'Thus always to tyrants,' expressing the idea that tyrants
    will ultimately fall. It is famously associated with the assassination of Julius Caesar and later
    adopted as a motto.
  i18n_explanations:
    en: A Latin phrase meaning 'Thus always to tyrants,' expressing the idea that tyrants will ultimately
      fall. It is famously associated with the assassination of Julius Caesar and later adopted as a motto.
    es: Frase latina que significa 'Así siempre a los tiranos', expresando que los tiranos caerán al final.
      Famosa por asociarse con el asesinato de Julio César y luego usada como lema.
    fr: Une phrase latine signifiant 'Ainsi en est-il toujours pour les tyrans', exprimant l'idée que
      les tyrans finissent par tomber. Célèbre pour son lien avec l'assassinat de Jules César et adoptée
      comme devise.
    de: Ein lateinischer Satz mit der Bedeutung 'So immer den Tyrannen', der ausdrückt, dass Tyrannen
      letztlich fallen werden. Berühmt durch die Verbindung mit der Ermordung Julius Caesars und später
      als Motto übernommen.
    it: Una frase latina che significa 'Così sempre ai tiranni', esprimendo l'idea che i tiranni cadranno
      alla fine. Famosa per essere associata all'assassinio di Giulio Cesare e poi adottata come motto.
    pt: Uma frase latina que significa 'Assim sempre aos tiranos', expressando a ideia de que os tiranos
      cairão no fim. Famosamente associada ao assassinato de Júlio César e depois adotada como lema.
    ru: Латинская фраза 'Так всегда тиранам', выражающая идею, что тираны неизбежно падут. Известна по
      связи с убийством Юлия Цезаря и позже стала девизом.
    ja: 「暴君には常にこうあれ」というラテン語の文句で、暴君が最終的に滅びるという考えを表す。ユリウス・カエサル暗殺と関連し、後にモットーとして採用された。
    zh: 拉丁语短语，意为‘暴君终将如此’，表达暴君终将覆灭的理念。因与尤利乌斯·恺撒遇刺相关而闻名，后被用作格言。
    ar: عبارة لاتينية تعني 'هكذا دائمًا إلى الطغاة'، تعبر عن فكرة أن الطغاة سينهزمون في النهاية. ارتبطت
