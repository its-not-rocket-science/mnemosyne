    es: Una frase latina humorística que sugiere algo absurdo o sin sentido, atribuyendo la autoría a
      una gallina. Proviene de una anécdota medieval sobre una gallina que supuestamente escribió una
      carta.
    fr: Une expression latine humoristique désignant quelque chose d'absurde ou de dénué de sens, en attribuant
      la paternité à une poule. Vient d'une anecdote médiévale où une poule aurait écrit une lettre.
    de: Ein humorvoller lateinischer Ausdruck für etwas Absurdes oder Unsinniges, dem eine Henne als Autorin
      zugeschrieben wird. Stammt aus einer mittelalterlichen Anekdote über eine angeblich einen Brief
      schreibende Henne.
    it: Una frase latina umoristica che suggerisce qualcosa di assurdo o senza senso, attribuendo la paternità
