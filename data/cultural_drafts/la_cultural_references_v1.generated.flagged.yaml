      империи.
    ja: これは、330年に皇帝コンスタンティヌス大帝によってビザンティウムがコンスタンティノープルとして再建されたことを指します。この出来事は、都市が東ローマ帝国、そして後にビザンツ帝国の首都へと変貌したことを示しています。
    zh: 这指的是公元330年由君士坦丁大帝重建拜占庭为君士坦丁堡。它标志着该城转变为东罗马帝国，后又成为拜占庭帝国的首都。
    ar: يشير هذا إلى إعادة تأسيس بيزنطة كقسطنطينية على يد الإمبراطور قسطنطين العظيم عام 330 م. إنه يرمز
