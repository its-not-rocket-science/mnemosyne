  short_explanation: A Latin phrase meaning 'an actor too much,' often used to criticize someone who is
    overly theatrical or pretentious. It appears in classical literature as a critique of exaggerated
    behavior.
  i18n_explanations:
    en: A Latin phrase meaning 'an actor too much,' often used to criticize someone who is overly theatrical
      or pretentious. It appears in classical literature as a critique of exaggerated behavior.
    es: Una frase latina que significa 'un actor demasiado', usada para criticar a alguien que es demasiado
      teatral o pretencioso. Aparece en la literatura clásica como crítica a un comportamiento exagerado.
    fr: Une expression latine signifiant 'un acteur trop', souvent utilisée pour critiquer quelqu'un qui
      est trop théâtral ou prétentieux. Elle apparaît dans la littérature classique comme une critique
      d'un comportement exagéré.
    de: Ein lateinischer Ausdruck mit der Bedeutung 'ein Schauspieler zu sehr', der oft verwendet wird,
      um jemanden zu kritisieren, der übertrieben theatralisch oder anmaßend ist. Er erscheint in der
      klassischen Literatur als Kritik an übertriebenem Verhalten.
    it: Una frase latina che significa 'un attore troppo', usata per criticare qualcuno che è eccessivamente
      teatrale o pretenzioso. Compare nella letteratura classica come critica a un comportamento esagerato.
    pt: Uma expressão latina que significa 'um ator demais', usada para criticar alguém que é excessivamente
      teatral ou pretensioso. Aparece na literatura clássica como uma crítica a um comportamento exagerado.
    ru: Латинское выражение, означающее 'слишком актёр', часто используется для критики того, кто слишком
      театрален или претенциозен. Встречается в классической литературе как критика преувеличенного поведения.
    ja: 「俳優過剰」を意味するラテン語の表現で、過度に演劇的または気取った人に対する批判として用いられる。古典文学では誇張された行動への批判として登場する。
    zh: 拉丁语短语，意为“过度的演员”，常用于批评过于矫揉造作或自命不凡的人。在古典文学中作为对夸张行为的批判出现。
    ar: عبارة لاتينية تعني 'ممثل مفرط'، تُستخدم غالبًا لنقد شخص مبالغ في التمثيل أو التكلف. تظهر في الأدب
