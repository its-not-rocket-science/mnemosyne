      Stoic and Christian views on life's transient nature.
    es: Metáfora que describe el mundo como un escenario donde los humanos interpretan papeles en un drama
      divino. Refleja las visiones estoica y cristiana sobre la naturaleza efímera de la vida.
    fr: Métaphore décrivant le monde comme une scène où les humains jouent des rôles dans un drame divin.
      Elle reflète les visions stoïcienne et chrétienne sur la nature éphémère de la vie.
    de: Eine Metapher, die die Welt als eine Bühne beschreibt, auf der Menschen Rollen in einem göttlichen
      Drama spielen. Sie spiegelt stoische und christliche Ansichten über die Vergänglichkeit des Lebens
      wider.
    it: Metafora che descrive il mondo come un palcoscenico in cui gli esseri umani recitano ruoli in
      un dramma divino. Riflette le visioni stoiche e cristiane sulla natura effimera della vita.
    pt: Metáfora que descreve o mundo como um palco onde os humanos desempenham papéis em um drama divino.
      Reflete as visões estoica e cristã sobre a natureza transitória da vida.
    ru: Метафора, описывающая мир как сцену, на которой люди играют роли в божественной драме. Отражает
      стоические и христианские взгляды на преходящую природу жизни.
    ja: 世界を神のドラマの中で人間が役割を演じる舞台に例えた比喩。人生の儚さに関するストア派とキリスト教の見方を反映している。
    zh: 将世界比作舞台，人类在其中扮演角色，上演一出神圣的戏剧。反映了斯多葛派和基督教对生命短暂性的看法。
    ar: استعارة تصف العالم كمسرح يلعب فيه البشر أدوارًا في دراما إلهية. تعكس وجهات النظر الرواقية والمسيحية
