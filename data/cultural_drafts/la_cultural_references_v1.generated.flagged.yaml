  short_explanation: A Latin proverb meaning 'A boar is often held by no great dog.' It suggests that
    even the smallest obstacle can stop a powerful force.
  i18n_explanations:
    en: A Latin proverb meaning 'A boar is often held by no great dog.' It suggests that even the smallest
      obstacle can stop a powerful force.
    es: Un proverbio latino que significa 'A menudo un jabalí es detenido por un perro no muy grande.'
      Sugiere que incluso el obstáculo más pequeño puede frenar una fuerza poderosa.
    fr: Un proverbe latin signifiant 'Un sanglier est souvent retenu par un chien pas très grand.' Il
      suggère que même le plus petit obstacle peut arrêter une force puissante.
    de: Ein lateinisches Sprichwort mit der Bedeutung 'Ein Eber wird oft von keinem großen Hund gehalten.'
      Es deutet darauf hin, dass selbst das kleinste Hindernis eine mächtige Kraft aufhalten kann.
    it: Un proverbio latino che significa 'Spesso un cinghiale è trattenuto da un cane non grande.' Suggerisce
      che anche il più piccolo ostacolo può fermare una forza potente.
    pt: Um provérbio latino que significa 'Muitas vezes um javali é contido por um cão não muito grande.'
      Sugere que até o menor obstáculo pode deter uma força poderosa.
    ru: Латинская пословица, означающая 'Кабана часто удерживает невеликая собака'. Подразумевает, что
      даже небольшое препятствие может остановить могущественную силу.
    ja: ラテン語の格言で、「しばしば猪は大きな犬に捕らえられない」という意味。小さな障害物でも強大な力を止めることがあるという教訓。
    zh: 一句拉丁谚语，意为「猪常被不大的狗挡住」。意指再小的障碍也能阻止强大的力量。
    ar: مثل لاتيني يعني 'غالبًا ما يتم حبس الخنزير البري بواسطة كلب ليس كبيرًا'. يشير إلى أن أصغر عقبة
      يمكن أن توقف قوة كبيرة.
    he: פתגם לטיני שפירושו 'לעיתים קרובות חזיר הבר נבלם על ידי כלב שאינו גדול'. מרמז שאפילו המכשול הקטן
