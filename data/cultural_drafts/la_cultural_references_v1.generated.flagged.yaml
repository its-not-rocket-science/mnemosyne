- id: la_classical_or_scriptural_allusion_horror_vacui_917407f7
  language: la
  canonical_reference: Horror vacui
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - horror vacui
  - horror vacui (art)
  - horror of the void
  short_explanation: A principle in ancient Greek philosophy and later art, describing an aversion to
    empty space. Aristotle discussed it in *Physics*, and it influenced artistic styles like Baroque.
  i18n_explanations:
    en: A principle in ancient Greek philosophy and later art, describing an aversion to empty space.
      Aristotle discussed it in *Physics*, and it influenced artistic styles like Baroque.
    es: Principio de la filosofía griega antigua y luego del arte, que describe la aversión al espacio
      vacío. Aristóteles lo discutió en *Física* y su influencia se ve en estilos artísticos como el Barroco.
    fr: Principe de la philosophie grecque antique puis de l'art, décrivant une aversion pour l'espace
      vide. Aristote en parle dans *Physique*, et il a influencé des styles artistiques comme le Baroque.
    de: Ein Prinzip der antiken griechischen Philosophie und später der Kunst, das eine Abneigung vor
      leerem Raum beschreibt. Aristoteles behandelte es in *Physik*, und es prägte Kunststile wie den
      Barock.
    it: Principio della filosofia greca antica e poi dell'arte, che descrive l'avversione allo spazio
      vuoto. Aristotele ne parlò nella *Fisica*, e influenzò stili artistici come il Barocco.
    pt: Princípio da filosofia grega antiga e depois da arte, que descreve a aversão ao espaço vazio.
      Aristóteles o discutiu na *Física*, e influenciou estilos artísticos como o Barroco.
    ru: Принцип древнегреческой философии и позже искусства, описывающий неприятие пустого пространства.
      Аристотель обсуждал его в *Физике*, и он повлиял на художественные стили, такие как барокко.
    ja: 古代ギリシャ哲学や芸術における原理で、空白の空間を嫌うことを表す。アリストテレスは*自然学*でこれを論じ、バロック様式などの芸術に影響を与えた。
    zh: 古希腊哲学及后来艺术中的一个原则，描述对空白空间的厌恶。亚里士多德在《物理学》中讨论过这一原则，并影响了巴洛克等艺术风格。
    ar: مبدأ في الفلسفة اليونانية القديمة ثم في الفن، يصف النفور من الفراغ. ناقش أرسطو هذا المفهوم في
      *الفيزياء*، وأثر في أنماط فنية مثل الباروك.
    he: עיקרון בפילוסופיה היוונית העתיקה ולאחר מכן באמנות, המתאר סלידה ממרחב ריק. אריסטו דן בו ב*פיזיקה*,
      והוא השפיע על סגנונות אמנותיים כמו הבארוק.
