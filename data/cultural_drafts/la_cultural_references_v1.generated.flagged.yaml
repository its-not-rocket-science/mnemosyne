    ja: トマス・アクィナスに帰せられる言葉で、「一冊の本しか持たない人間を恐れる」という意味。独断主義に警告し、幅広い学習を提唱する。
    zh: 托马斯·阿奎那的名言，意为‘我惧怕只读一本书的人’，告诫人们不要教条主义，倡导广泛学习。
