- id: la_classical_or_scriptural_allusion_danaidum_dolium_dc73b996
  language: la
  canonical_reference: Danaidum dolium
  reference_type: classical_or_scriptural_allusion
  surface_patterns:
  - Danaidum dolium
  - Danaidum dolia
  - dolium Danaidum
  - dolium sine fundo
  short_explanation: The 'Danaids' were the fifty daughters of Danaus who, in Greek myth, were punished
    in the Underworld by being forced to carry water in leaky jars (dolia) for eternity. The phrase symbolizes
    an endless, futile task.
  i18n_explanations:
    en: The 'Danaids' were the fifty daughters of Danaus who, in Greek myth, were punished in the Underworld
      by being forced to carry water in leaky jars (dolia) for eternity. The phrase symbolizes an endless,
      futile task.
    es: Las 'Dánaides' eran las cincuenta hijas de Dánao que, según la mitología griega, fueron castigadas
      en el Inframundo a llevar agua en jarras agujereadas (dolia) por toda la eternidad. La frase simboliza
      una tarea interminable y fútil.
    fr: Les 'Danaïdes' étaient les cinquante filles de Danaos qui, dans la mythologie grecque, furent
      condamnées aux Enfers à porter de l'eau dans des jarres percées (dolia) pour l'éternité. L'expression
      symbolise une tâche sans fin et vaine.
    de: Die 'Danaiden' waren die fünfzig Töchter des Danaos, die in der griechischen Mythologie im Tartarus
      bestraft wurden, indem sie Wasser in löchrigen Krügen (dolia) für alle Ewigkeit tragen mussten.
      Der Ausdruck steht für eine endlose, sinnlose Aufgabe.
    it: Le 'Danaidi' erano le cinquanta figlie di Danao che, nella mitologia greca, furono condannate
      negli Inferi a trasportare acqua in anfore bucate (dolia) per l'eternità. La frase simboleggia un
      compito infinito e vano.
    pt: As 'Danaides' eram as cinquenta filhas de Dánao que, na mitologia grega, foram condenadas no Mundo
      Inferior a carregar água em jarros furados (dolia) por toda a eternidade. A frase simboliza uma
      tarefa interminável e inútil.
    ru: Данаиды — пятьдесят дочерей Даная, которые в греческой мифологии были наказаны в подземном царстве
      тем, что должны были вечно носить воду в дырявых кувшинах (долиях). Фраза символизирует бесконечную,
      бесполезную работу.
    ja: ダナイダイはギリシャ神話で、タルタロスにおいて穴の開いた壺（ドリウム）で永遠に水を運ぶ罰を受けたダナオスの50人の娘たちを指します。この表現は果てしない無駄な作業を象徴します。
    zh: 达那伊得斯是希腊神话中达那俄斯的五十个女儿，她们被罚在地狱中永远用漏水的罐子（多利亚）运水。这个短语象征着无止境的徒劳任务。
    ar: الدانايدات هن خمسون ابنة لداناؤس، اللاتي عوقبن في العالم السفلي في الميثولوجيا اليونانية بحمل
      الماء في جرار مسربة (دوليوم) إلى الأبد. العبارة ترمز إلى مهمة لا نهاية لها وبلا جدوى.
    he: הדנאידות הן חמישים בנותיו של דנאוס, שנענשו במיתולוגיה היוונית לשאת מים בכדים מחוררים (דוליום)
      בעולם התחתון לנצח. הביטוי מסמל משימה אינסופית וחסרת תועלת.
