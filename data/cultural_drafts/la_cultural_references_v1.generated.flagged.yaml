  short_explanation: The opening verse of the Gospel of John in the Latin Vulgate, meaning 'In the beginning
    was the Word, and the Word was with God.' It is foundational in Christian theology, emphasizing the
    divine nature of Christ as the Logos.
  i18n_explanations:
    en: The opening verse of the Gospel of John in the Latin Vulgate, meaning 'In the beginning was the
      Word, and the Word was with God.' It is foundational in Christian theology, emphasizing the divine
      nature of Christ as the Logos.
    es: El versículo inicial del Evangelio de Juan en la Vulgata Latina, que significa 'En el principio
      era el Verbo, y el Verbo estaba con Dios'. Es fundamental en la teología cristiana, destacando la
      naturaleza divina de Cristo como el Logos.
    fr: Le verset d'ouverture de l'Évangile de Jean dans la Vulgate latine, signifiant 'Au commencement
      était le Verbe, et le Verbe était auprès de Dieu'. Il est fondamental dans la théologie chrétienne,
      soulignant la nature divine du Christ en tant que Logos.
    de: Der Eröffnungssatz des Johannesevangeliums in der lateinischen Vulgata mit der Bedeutung 'Im Anfang
      war das Wort, und das Wort war bei Gott'. Er ist grundlegend für die christliche Theologie und betont
      die göttliche Natur Christi als Logos.
    it: Il versetto iniziale del Vangelo di Giovanni nella Vulgata latina, che significa 'In principio
      era il Verbo, e il Verbo era presso Dio'. È fondamentale nella teologia cristiana, sottolineando
      la natura divina di Cristo come Logos.
    pt: O versículo inicial do Evangelho de João na Vulgata Latina, que significa 'No princípio era o
      Verbo, e o Verbo estava com Deus'. É fundamental na teologia cristã, destacando a natureza divina
      de Cristo como o Logos.
    ru: Начальный стих Евангелия от Иоанна в латинской Вульгате, означающий 'В начале было Слово, и Слово
      было у Бога'. Это фундаментальное положение христианской теологии, подчеркивающее божественную природу
      Христа как Логоса.
    ja: ラテン語のウルガタ訳ヨハネ福音書の冒頭の言葉で、「初めに言（ことば）があった。言は神と共にあった」という意味。キリスト教神学の基礎であり、キリストの神性、すなわちロゴスとしての本質を強調しています。
    zh: 拉丁文《武加大译本圣经》中《约翰福音》的开篇句，意为“太初有道，道与上帝同在”。这是基督教神学的基础，强调基督作为“道”（逻各斯）的神性。
    ar: الآية الافتتاحية لإنجيل يوحنا في فولغاتا اللاتينية، وتعني 'في البدء كان الكلمة، والكلمة كان عند
      الله'. تعد أساسية في اللاهوت المسيحي، مؤكدة الطبيعة الإلهية للمسيح بصفته اللوغوس.
    he: פסוק הפתיחה של הבשורה על-פי יוחנן בוולגטה הלטינית, שמשמעו 'בראשית היה הדבר, והדבר היה אצל האלוהים'.
      מהווה יסוד בתאולוגיה הנוצרית, ומדגיש את מהותו האלוהית של המשיח כ'לוגוס'.
