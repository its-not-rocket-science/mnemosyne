  short_explanation: A poetic epithet for Aeneas, the Trojan hero who fled Troy after its fall and became
    the legendary founder of Rome. It emphasizes his status as an exile and wanderer.
  i18n_explanations:
    en: A poetic epithet for Aeneas, the Trojan hero who fled Troy after its fall and became the legendary
      founder of Rome. It emphasizes his status as an exile and wanderer.
    es: Epíteto poético de Eneas, héroe troyano que huyó de Troya tras su caída y se convirtió en el legendario
      fundador de Roma. Destaca su condición de exiliado y errante.
    fr: Épithète poétique d'Énée, héros troyen ayant fui Troie après sa chute et devenu le fondateur légendaire
      de Rome. Souligne son statut d'exilé et d'errant.
    de: Poetische Bezeichnung für Aeneas, den trojanischen Helden, der nach dem Fall Trojas floh und zum
      legendären Gründer Roms wurde. Betont seinen Status als Verbannter und Wanderer.
    it: Epiteto poetico di Enea, eroe troiano fuggito da Troia dopo la sua caduta e divenuto il leggendario
      fondatore di Roma. Sottolinea il suo status di esule e viandante.
    pt: Epíteto poético de Eneias, herói troiano que fugiu de Troia após sua queda e tornou-se o lendário
      fundador de Roma. Enfatiza seu status de exilado e errante.
    ru: Поэтическое прозвище Энея, троянского героя, бежавшего из Трои после её падения и ставшего легендарным
      основателем Рима. Подчёркивает его статус изгнанника и странника.
    ja: トロイの没落後に逃れ、ローマの伝説的な建国者となったトロイの英雄アイネイアースの詩的な呼び名。放浪者としての彼の境遇を強調する。
    zh: 特洛伊陷落后逃离的特洛伊英雄埃涅阿斯的诗意称号，他成为罗马的传说建立者。强调他作为流亡者和漂泊者的身份。
    ar: لقب شعري لإينياس، البطل الطروادي الذي فر من طروادة بعد سقوطها وأصبح مؤسس روما الأسطوري. يبرز وضعه
      كلاجئ وتائه.
    he: כינוי שירי לאיניאס, גיבור טרויה שנמלט ממנה לאחר נפילתה והפך למיסד האגדי של רומא. מדגיש את מעמדו
