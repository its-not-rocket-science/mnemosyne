    it: Un proverbio che significa 'Le parole dette volano via, quelle scritte rimangono', sottolineando
      la permanenza e l'importanza dei documenti scritti rispetto al discorso effimero.
    pt: Um provérbio que significa 'Palavras ditas voam, escritas permanecem', destacando a permanência
      e importância dos registros escritos sobre a fala fugaz.
    ru: Поговорка 'Сказанное улетает, написанное остаётся', подчеркивающая неизменность и важность письменных
      записей по сравнению с мимолётной речью.
