  short_explanation: A Latin phrase meaning 'Adonis is beautiful,' referencing the mythological figure
    Adonis, renowned for his beauty. It is often used to describe someone of extraordinary physical attractiveness.
  i18n_explanations:
    en: A Latin phrase meaning 'Adonis is beautiful,' referencing the mythological figure Adonis, renowned
      for his beauty. It is often used to describe someone of extraordinary physical attractiveness.
    es: Frase latina que significa 'Adonis es hermoso', aludiendo a la figura mitológica de Adonis, famoso
      por su belleza. Se usa para describir a alguien de extraordinaria belleza física.
    fr: Locution latine signifiant 'Adonis est beau', faisant référence au personnage mythologique d'Adonis,
      célèbre pour sa beauté. Elle sert à décrire une personne d'une beauté physique exceptionnelle.
    de: Lateinischer Ausdruck für 'Adonis ist schön', der sich auf die mythologische Figur Adonis bezieht,
      bekannt für seine Schönheit. Wird oft für Menschen von außergewöhnlicher körperlicher Attraktivität
      verwendet.
    it: Locuzione latina che significa 'Adone è bello', riferendosi alla figura mitologica di Adone, noto
      per la sua bellezza. Viene usata per descrivere qualcuno di straordinaria bellezza fisica.
    pt: Expressão latina que significa 'Adônis é belo', referindo-se à figura mitológica de Adônis, famoso
      por sua beleza. Usada para descrever alguém de extraordinária beleza física.
    ru: Латинское выражение, означающее 'Адонис прекрасен', относящееся к мифологическому персонажу Адонису,
      известному своей красотой. Часто используется для описания человека с исключительной физической
      привлекательностью.
    ja: ラテン語の成句で、「アドーニスは美しい」を意味し、美の象徴である神話上のアドーニスに由来する。並外れた肉体的な美しさを持つ人を表す際に用いられる。
    zh: 拉丁语短语，意为“阿多尼斯很美”，指代以美貌著称的神话人物阿多尼斯。常用于描述极其俊美的人。
    ar: عبارة لاتينية تعني 'أدونيس جميل'، تشير إلى الشخصية الأسطورية أدونيس، المشهورة بجماله. تُستخدم
