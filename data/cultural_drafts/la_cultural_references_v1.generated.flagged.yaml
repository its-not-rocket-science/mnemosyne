      e importancia de los registros escritos sobre el habla efímera.
    fr: Un proverbe signifiant 'Les mots prononcés s'envolent, les écrits restent', soulignant la permanence
      et l'importance des documents écrits face à la parole éphémère.
    de: Ein Sprichwort mit der Bedeutung 'Gesprochene Worte verfliegen, geschriebene bleiben', das die
