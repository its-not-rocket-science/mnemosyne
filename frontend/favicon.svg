<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Mnemosyne">
  <title>Mnemosyne</title>

  <!-- Dark base with slight rounding -->
  <rect width="32" height="32" rx="5.5" fill="#0b0704"/>

  <!-- Terracotta medallion fill -->
  <circle cx="16" cy="16" r="15.2" fill="#b85c16"/>
  <!-- Greek key border: black dashes on terracotta ring simulate meander texture -->
  <circle cx="16" cy="16" r="13.7" fill="none" stroke="#0b0704" stroke-width="3.2" stroke-dasharray="2.1 1.05"/>
  <!-- Inner black field -->
  <circle cx="16" cy="16" r="12.1" fill="#0b0704"/>

  <!-- ── Seated woman in profile, facing left (as in the pottery) ── -->

  <!-- Head, slightly bowed toward tablet -->
  <ellipse cx="19.5" cy="8.8" rx="2.1" ry="2.3" fill="#c66a1d"/>

  <!-- Crown / diadem -->
  <path d="M17.8 7.3 L18.4 6.1 L19 7.1 L19.7 5.9 L20.3 7 L21 6.1 L21.6 7.3"
        fill="none" stroke="#f0a13a" stroke-width=".65" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Hair / chignon flowing right and down -->
  <path d="M21.2 8 Q23.2 8 23.4 10 Q23.2 12 21.8 12.4 L21 11.5" fill="#c66a1d"/>

  <!-- Upper body / torso -->
  <path d="M17.2 11 Q15.8 12.5 16.4 15.5 L22.5 15.5 Q23 12.5 21.8 11.2 Z" fill="#c66a1d"/>

  <!-- Robe / skirt with fold -->
  <path d="M16.4 15.5 Q16 19.5 16.5 23.4 L22.5 23.4 Q23 19.5 22.5 15.5 Z" fill="#c66a1d"/>
  <path d="M18.2 16.5 Q18.6 19.5 18.2 23" fill="none" stroke="#0b0704" stroke-width=".45" opacity=".8"/>

  <!-- Stars on robe — distinctive motif from the pottery -->
  <circle cx="20.8" cy="17.8" r=".42" fill="#0b0704"/>
  <circle cx="21.4" cy="20.4" r=".42" fill="#0b0704"/>
  <circle cx="20.8" cy="22.5" r=".42" fill="#0b0704"/>

  <!-- Extended arm reaching toward tablet -->
  <path d="M18 13.2 Q15.5 14 13.5 13" stroke="#c66a1d" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Stylus / pen -->
  <line x1="13.8" y1="13.2" x2="11.6" y2="11.4" stroke="#f0a13a" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Writing tablet -->
  <rect x="10.2" y="15.2" width="6" height="5.4" rx=".65" fill="#0b0704" stroke="#f0a13a" stroke-width=".78"/>
  <line x1="11.4" y1="16.9" x2="15" y2="16.9" stroke="#f0a13a" stroke-width=".55" stroke-linecap="round"/>
  <line x1="11.4" y1="18.2" x2="14.5" y2="18.2" stroke="#f0a13a" stroke-width=".55" stroke-linecap="round"/>
  <line x1="11.4" y1="19.5" x2="15" y2="19.5" stroke="#f0a13a" stroke-width=".55" stroke-linecap="round"/>

  <!-- Poppy / flower (left side of medallion) -->
  <line x1="8" y1="23.5" x2="8" y2="18.2" stroke="#c66a1d" stroke-width=".9" stroke-linecap="round"/>
  <ellipse cx="8" cy="17.3" rx="1.4" ry="1.6" fill="#c66a1d"/>
  <line x1="6.7" y1="17" x2="8" y2="18" stroke="#0b0704" stroke-width=".4" opacity=".8"/>
  <line x1="9.3" y1="17" x2="8" y2="18" stroke="#0b0704" stroke-width=".4" opacity=".8"/>

  <!-- Lyre (right background, behind figure) -->
  <path d="M23.2 9 L23.2 13.8" stroke="#f0a13a" stroke-width=".7" stroke-linecap="round"/>
  <path d="M23.2 9 Q25.2 9.5 25.2 11.4 Q25.2 13.3 23.2 13.8" fill="none" stroke="#f0a13a" stroke-width=".7" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="24" y2="13" stroke="#f0a13a" stroke-width=".45"/>
  <line x1="24.7" y1="10.6" x2="24.7" y2="12.6" stroke="#f0a13a" stroke-width=".45"/>
</svg>
