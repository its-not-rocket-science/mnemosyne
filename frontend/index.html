<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mnemosyne</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/components.css">
    <script type="module" src="./js/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="wrap">
        <!-- aria-hidden: the word is decorative; the h1 is the real page label -->
        <p class="eyebrow" aria-hidden="true">Mnemosyne</p>
        <h1>Turn text into a living lesson</h1>
        <p class="lede">Paste text, parse sentences, open micro-lessons, and rate recall.</p>
      </div>
    </header>

    <!--
      tabindex="-1" makes <main> programmatically focusable so the skip-link
      actually moves keyboard focus here (not just scroll position), which is
      required for the skip link to work in Safari and Firefox.
    -->
    <main id="main" tabindex="-1" class="wrap">

      <section class="panel" aria-labelledby="parse-heading">
        <h2 id="parse-heading">Create a lesson from text</h2>

        <!--
          novalidate: JS handles validation so the browser's native error
          bubbles don't fire.  aria-required and aria-invalid signal state to AT.
        -->
        <form id="parse-form" class="stack" novalidate>

          <div class="field">
            <label for="language">Language</label>
            <!--
              Options are populated from GET /languages on page load.
              A static fallback option is shown while loading or on error.
            -->
            <select id="language" name="language" aria-busy="true">
              <option value="">Loading languages…</option>
            </select>
          </div>

          <div class="field">
            <label for="source-title">
              Title
              <span class="field-hint">(optional)</span>
            </label>
            <input id="source-title" name="source-title" type="text"
              placeholder="Article or chapter title"
              autocomplete="off">
          </div>

          <div class="field">
            <label for="source-url">
              Source URL
              <span class="field-hint">(optional — attribution only, never fetched)</span>
            </label>
            <input id="source-url" name="source-url" type="url"
              placeholder="https://example.com/article"
              autocomplete="url">
          </div>

          <div class="field">
            <!--
              The label row holds both the field label and the file-picker trigger.
              The file input is visually hidden; its <label> acts as the trigger.
            -->
            <div class="field-header">
              <label for="source-text">Text to parse</label>
              <label class="file-pick-btn" for="file-input">
                Load .txt file
                <!--
                  sr-only hides the input visually; the wrapping label triggers it.
                  accept limits the file picker to plain text; JS re-validates.
                -->
                <input id="file-input" type="file" accept=".txt,text/plain"
                  class="sr-only" tabindex="-1" aria-hidden="true">
              </label>
            </div>
            <!--
              aria-live="polite": announces the loaded filename to screen readers
              without interrupting other announcements.
            -->
            <p id="file-info" class="field-hint file-info" aria-live="polite"></p>
            <!--
              aria-required: tells AT the field is mandatory.
              aria-describedby links to both the status region (parse errors) and
              the file-info paragraph (loaded filename feedback).
            -->
            <textarea id="source-text" name="source-text" rows="8"
              required aria-required="true"
              aria-describedby="file-info status"
              placeholder="Paste text here, or load a .txt file above…"></textarea>
          </div>

          <div class="button-row">
            <button type="submit" class="button-primary" id="parse-submit">
              Parse text
            </button>
          </div>

        </form>

        <!--
          role="status" implies aria-live="polite" and aria-atomic="true".
          JS clears then re-sets textContent so identical messages re-announce.
          Placed after the form so it doesn't interrupt typing.
        -->
        <p id="status" role="status" aria-atomic="true" class="status"></p>

      </section>

      <section class="panel" aria-labelledby="results-heading">
        <h2 id="results-heading">Sentence lessons</h2>

        <!--
          Script view toolbar — hidden until a language with transliteration
          support is selected.  JS populates the toggle button group inside it.
        -->
        <div id="results-toolbar" class="results-toolbar" hidden></div>

        <!--
          No aria-live here — announcing the full card dump is too noisy.
          The #status region announces the summary ("3 sentences parsed").
        -->
        <div id="results" class="results">
          <p class="results-empty">
            Parse some text above to see learnable items here.
          </p>
        </div>
      </section>

    </main>

    <mnemosyne-modal id="lesson-modal"></mnemosyne-modal>
  </body>
</html>
