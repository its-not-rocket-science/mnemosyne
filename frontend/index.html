<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mnemosyne</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/components.css">
    <script type="module" src="./js/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <div class="wrap">
        <p class="eyebrow">Mnemosyne</p>
        <h1>Turn text into a living lesson</h1>
        <p class="lede">Paste text, parse sentences, open micro-lessons, and rate recall.</p>
      </div>
    </header>

    <main id="main" class="wrap" aria-labelledby="page-title">
      <section class="panel" aria-labelledby="page-title">
        <h2 id="page-title">Create a lesson from text</h2>

        <form id="parse-form" class="stack">
          <label for="language">Language</label>
          <select id="language" name="language">
            <option value="es">Spanish</option>
          </select>

          <label for="source-url">Source URL (optional)</label>
          <input id="source-url" name="source-url" type="url" placeholder="https://example.com/article">

          <label for="source-text">Text</label>
          <textarea id="source-text" name="source-text" rows="10" required
            placeholder="Paste Spanish text here...">Hola. La casa roja habla. Yo hablo español.</textarea>

          <div class="button-row">
            <button type="submit" class="button-primary">Parse text</button>
          </div>
        </form>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel" aria-labelledby="results-title">
        <h2 id="results-title">Sentence lessons</h2>
        <div id="results" class="results" aria-live="polite"></div>
      </section>
    </main>

    <mnemosyne-modal id="lesson-modal"></mnemosyne-modal>
  </body>
</html>
