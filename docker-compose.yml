# Local development stack.
#
# Usage:
#   cp .env.example .env   # fill in values once
#   make up                # start everything
#   make logs              # tail output
#   make down              # stop
#
# The app service uses bind mounts + --reload so code changes are reflected
# without a rebuild.  For a deployed instance, remove the `volumes:` block
# from the app service and drop --reload from the command.

name: mnemosyne

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mnemosyne}
      POSTGRES_USER:     ${POSTGRES_USER:-mnemosyne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: >
        CMD-SHELL pg_isready
          -U ${POSTGRES_USER:-mnemosyne}
          -d ${POSTGRES_DB:-mnemosyne}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    # Bind mounts enable hot-reload in local development.
    # Remove both entries here when deploying (image already contains the code).
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    command: >
      uvicorn backend.main:app
        --host 0.0.0.0
        --port 8000
        --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
